body:
  text: 明詩綜卷八十一翰林院檢討朱彛尊編慶成宴静志居詩話明髙皇帝渡江丙午十二月命立郊社吳元年丁未圜丘方丘社稷壇成圜丘在京城東南正陽門外鍾山之陽方丘在太平門外鍾山之北社稷壇在宫城之西南洪武元年戊中正月南郊即位是年十一月冬至祀南郊禮成行慶成禮翼日大宴十年丁已帝以分祭天地揆之人情有所未安命舉合祀之典即圜丘舊址為壇而以屋覆之命名大祀殿十一月始合祀天地于奉天殿詔自今以首春合祀于南郊十一年戊午十月大祀殿成自是命太常每嵗合祭天地于春首至嘉靖九年因夏言之請改議分祀其詳載嘉靖祀典兩朝樂章詞臣分撰雜以曲譜合乎雅頌者寡今擇稍典麗者著于編慶成宴樂章十五年正月定一奏炎精開運之曲再奏皇風之曲三奏春皇明之曲四奏天道傳之曲五奏振皇綱之曲六奏金陵之曲七奏長楊之曲八奏芳醴之曲九奏駕六龍之曲皇風被八表熙熙聲教宣時和景象明紫宸開繡筵龍衮曜朝日金鑪裊祥烟濟濟公與侯被服麗且鮮列坐侍丹扆罄折在周旋羔豚升華俎玉饌充方圓初筵奏南風繼歌賡載篇瑶觴欣再舉拜俯禮無愆同樂及斯辰於皇千萬年右再奏周南詠麟趾卷阿歌鳯皇藹藹稱多士為楨振皇綱赫赫我大明徳尊踰漢唐百揆修庻績公輔理隂陽坐令八紘内熙熙民樂康氣和風雨時田疇見豐穣獻禮過三爵歡娱良未央右五奏長楊曳綠黄鳥和鳴菡萏呈祥日麗風清及時為樂芳尊在庭管音嘒嘒丝竹泠泠玉振金聲各奏爾能皤皤國老載勸載懲明徳惟馨永保嘉名無已太康哲人是聽右七奏夏王厭芳醴商湯逺色聲聖人示深戒千春垂令名惟皇登九五玉食保尊榮日昃不遑餐布徳延羣生大庖具豐膳鼎鼐事調烹豈僅資肥甘亦足養遐齡逹人悟茲理恒令五氣平隨時知有節昭哉天道行右八奏嘉靖祀典九年七月禮部議覆中允廖道南疏云慶成宴有平定天下撫安四裔車書㑹同表正萬邦天命有徳五舞又有仰天恩感地徳之曲載于㑹典或當時詞臣所撰猶為可觀太廟時享詩話太廟時享春以清明夏以端午秋以中元冬以冬至洪武二年正月定議行之迎神樂奏中和之曲初獻奏夀和之曲武功之舞亞獻奏豫和之曲文徳之舞終獻奏熙和之曲文徳之舞徹饌奏熙和之曲還宫奏安和之曲慶源發祥世徳惟崇致我眇躬開基建功京都之内親廟在東惟我子孫永懐祖宗氣體則同呼吸相通來格來崇皇靈顯融右迎神承前人之徳化家為國母曰予小子基命成績欲報之徳昊天罔極殷勤三獻我心悦懌右終獻顯兮幽兮神運無跡鸞馭逍遙安其所適其靈在天其主在室子子孫孫孝思無斁右還宫太學釋奠詩話洪武元年二月以太牢祀先師孔子于國學八月遣官釋奠于先師孔子五年尊孔子封號曰大成至聖文宣王六年八月翰林承旨詹同學士樂韶鳯等上所製釋奠先師孔子樂章迎神奏咸和之曲奠帛奏寧和之曲初獻奏安和之曲亞獻奏景和之曲終獻與亞獻同徹饌送神俱奏咸和之曲自生民來誰厎其盛維王嘉靖中勅改師神明度越前聖粢帛具成禮容斯稱黍稷非馨惟神之聼右奠帛大哉聖王嘉靖中勅改師寔天生徳作樂以崇時祀無斁清酤惟馨嘉牲孔碩薦修神明庻幾昭格右初獻百王宗師生民物軌瞻之洋洋神其寜止酌彼金罍惟清且旨登獻維三於戲成禮右亞獻終獻犧象在前豆籩在列以享以薦既芬既潔禮成樂備人和神悦祭則受福率遵無越右徹饌有嚴學宫四方來崇恪恭祀事威儀雝雝歆兹惟馨神馭還復明禋斯畢咸膺百福右送神雩祀詩話嘉靖九年禮臣等議日月令仲夏大雩帝用盛樂春秋左氏傳龍見而雩後世此禮不傳而在位者遇旱暵之災徃徃假異端術士祈禱誣亦甚矣今請於郊兆之旁擇地以為雩壇每嵗孟夏以後舉行陛下於孟春上辛既祈榖於上帝矣自二月至四月時雨而雨時𤾉而𤾉則大雩之祭陛下可免親行遣官代之若其雨澤愆期則陛下躬即其地以行禱祝其作樂陳舞宜仿古昔之儀庻於禮為不失也十一年又進議曰郊以禮為重雩以樂為主合照圜丘樂舞之數以四方之色成樂舞之服庻稱古人盛樂皇舞之制兼請三獻禮成之後九奏樂止之時命詞臣櫽括雲漢詩詞别製雲門一曲使文武之士青衣執羽並舞而合歌之乃定議迎神奏中和之曲奠帛奏肅和之曲進爼奏咸和之曲初獻奏壽和之曲亞獻奏景和之曲終獻奏永和之曲徹饌奏凝和之曲送神奏清和之曲望燎奏太和之曲祭畢使道童歌雲門之曲百川委潤名山出雲愆𤾉孔熾膏澤斯屯祈年于天載牲于爼神之格思報以甘雨右進爼立春特享武宗詩話嘉靖十四年二月重修太廟立春特享九廟於武宗迎神奏太和之曲初獻奏夀和之曲亞獻奏豫和之曲終獻奏寧和之曲徹饌奏雍和之曲還宫奏安和之曲列祖垂統景運重熙於惟武皇昭徳勅威用翦除姦兇大業弗隳専廟以享經禮攸宜爼豆式陳庻幾來思圜丘詩話圜丘樂章二首嘉靖初大學士霍韜撰嘉靖祀典不載殆進呈而别用他人之作也昊天在上我祖在側我奠我幣於焉踧踖昊天在上我祖在旁我奠我帛於焉皇皇天佑皇祖錫我民祐右奠帛巍巍蕩蕩帝徳無象無曰無象昭昭在上蕩蕩巍巍帝徳無為無曰無為下式九圍服帝之徳朝乾夕惕庻幾無斁帝心悦懌右送神升祔嘉靖中定詩話嘉靖十七年七月上興獻王尊諡曰知天守道洪徳淵仁寛穆純聖恭儉敬文獻皇帝廟號睿宗九月升祔于廟迎神樂奏太和之曲初獻奏夀和之曲亞獻奏豫和之曲終獻奏寜和之曲徹饌奏雍和之曲送神奏安和之曲皇妣慈孝貞順仁敬誠一安天誕聖獻皇后升祔樂章同酌彼鬱鬯玉瓚是將敬哉奉盈有飶其香儼皇祖在上八聖在旁合享交歆神容洋洋右初獻改上成祖諡號詩話嘉靖十七年九月更太宗文皇帝稱成祖迎神樂奏太和之曲舉册寳奏熙和之曲初獻奏夀和之曲亞獻奏豫和之曲終獻奏康和之曲徹饌奏永和之曲送神奏安和之曲髙皇謨烈我祖是成誕垂裕于後昆孝孫是徴援今稽古薦茲尊稱奕奕閟宫嵗事有恒子子孫孫百世其承右送神樂奏安和之曲伐倭告祭南郊嘉靖中撰天啟有明百神率職殄逆助順無征不克九州奠安維帝之徳載獻載趨既齊既稷告祭北郊粢盛既潔齊明是將精誠感通昭格洋洋威稜贊翼我伐用張邊燧永清海波不揚詩話魏樂府不成於曹劉而成於繆襲晋樂府不成於潘左張陸而成於傅𤣥宋樂府不成於鮑謝而成於何承天北齊樂府不成於蕭慤而成於陸卬皆屬恨事明洪武樂章率出四學士之筆嘉靖樂章率出議禮諸貴人之詞假孝陵改命伯温季廸永陵改命穉欽君采則其辭定逺追奚斯考父之盛不若是之懦鈍矣明詩綜卷八十一
