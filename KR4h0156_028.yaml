body:
  text: 明詩綜卷二十八翰林院檢討朱彞尊編桑悅六首悅字民懌常熟人舉成化乙酉鄉試除泰和訓導遷長沙通判調栁州有思玄集王元美云桑民懌如洛陽博徒家無擔石一擲百萬謂胡元瑞云民懌髙自矜詡其詩體格卑弱可大言無當俞汝成云思玄居士負氣自髙凌厲一世其詩賦類多率情有玩世自嘲之意可以資暇啓顔者亦復不少靜志居詩話民懌説易謂萬物莫逃乎數説詩謂刪後無詩率本堯夫之餘唾其於律吕亦拾蔡氏之陳言才識平平爾乃敢大言述道統論則曰夫子傳之我作學以至聖人論則曰我去而夫子來居然以孟子自况而非薄韓子比其文於小貌號嗄其在長沙著庸言自調窮究天人之際非儒者所知而曰吾詩根於太極天以高之地以下之山以峙之水以流之庶物以飛潛動植之日月宣其明雷霆發其震雨露播其潤澤散之則同元氣流行收之於心發之於言被之管絃則可感天地動鬼神乾坤毁日月息詩乃收聲復歸太極其言大而夸狂也幾於悖矣感懷逝日不可追誰能駐光景春陽媚花草荏苒嵗華冷威鳯德未成颯下丹山頂路逢清冷泉徘徊照孤影東園有竒花容姿鮮灼灼雖是春風開亦是春風落甘霖被郊原蔓草輕蘭藥所以高岡松無言倚寥廓住龍福寺龍福山虎形有寺枕山陲僧衆暗吞噬一二留披緇自注形家言如此法堂久欹傾羅漢無完肌空階劃鳥迹香案縈蛛絲我了催科業僧榻苦栖遲月黑響蝙蝠風定聞狐貍微官責聚斂百賦皆有期長沙病逋負此州更難醫譬如理亂髮恐傷首中皮膏油漸浸潤緩緩施梳篦審知曠厥職恬退乃其宜妻拏先遣發嶽麓不日辭幸逢中丞賢加禮免鞭笞言語如春溫勉令撫瘡痍徘徊不忍去我亦為我嗤憶昔少年日許國師皋伊豈知坐冗職出納伍有司與氏算升斗瑣屑誠堪悲登山拜虞舜臨淵弔湘纍終當拂衣去涕泪陳吾詞題鳯洲草堂效吳體江水四面圍髙丘草堂結在丘山頭頻經春雨打不漏苦耐秋風吹未休枕邊驚聞櫓聲過檻外俯看雲影浮我約吳郎來借住並吞沙草占溪鷗過十二磯在梧州亂石危磯急瀨聲扁舟泛泛水中萍月當秋夜十分白天到遐荒一倍青引路哨船鳴鼓吹前山軍堡出旗旌回頭便有開懷處無數峰巒列翠屏題畫浮雲出沒吞遙岑小亭日日巢秋隂美人如玉不可見松子自落空山深懷逺道中蓬蒿沒馬路通身在野真為草莽臣莫道先生無武備前驅負弩盡狪人文洪洪字功大長洲人成化乙酉舉人署淶水儒學教諭有括囊藳詩話長洲文氏世載其德希素先生實始之句如野猿窺落果林蝶戀殘花自得翻書趣渾忘對客言饒有恬憺之致傳之交木甫田髙曽之規矩不失也睡起寂寞掩林扉東風晝方永睡起落紅多斜陽半樓影南行舟中露白沙涼月滿空鴈聲歷歷度西風客程尚與鄉關近歸夢如何便不同訪徐尚容虎溪溪上草堂間千樹江梅杳藹間欲向南枝問消息東風吹我過西山羅倫一首偷字彞正永豐人成化丙戌賜進士第一授翰林修撰坐論事貶泉州市舶副提舉尋召還復職改南京有一峰集詩話一峰以論南陽奪情事謫廣東市舶副提舉實學士陳文所畫策也久之復官南陽巳謝世既而文死薛御史之綱作詩誚之曰九原若見南陽李為道羅倫己復官然李公賢相贊裕陵釋建庶人居之鳯陽許其自便即此一事啓沃巳多亦未可輕訾也一峰専心理學詩不與韻士爭長而集中紀夢詩多至三百餘首難乎免於癖矣節婦歌泉流不歸山雨落不上天妾心死不回金石無其堅白日經中天飄忽沉西海妾心日不如曈曈光不改明月揚清輝三五二八圓又虧妾心月不如耿耿無虧時憶妾二十春結髮事良人安知三載後羅帷生素塵懷中五嵗兒零落重悲辛吾聞陳孝婦夫死養姑心愈固朱幡入奏丹書來黃金北斗髙門户又聞杞梁妻慟哭梁山傾精神變天地黃土非無情妾髮可剪妾頭可截妾心之白不可涅詩話一峰節婦歌初不詳姓氏別本或加張字或以為節婦甄氏作誤也詞亦小異程敏政九首敏政字克勤休寧人成化丙戌賜進士第二授翰林編修進左春坊左諭德兼侍講歷詹事府少詹事兼翰林侍讀學士掌院事遷禮部右侍郎卒贈尚書有篁墩正續稿李時逺云篁墩著述甚富體格不髙詩話篁墩數與西涯酬和集中存詩數千究乏警䇿至其緝録諸書若明文衡新安文獻志甄綜有法餘如宋紀受終考宋遺民録皆有功史學獨是議孔廟祀典而屏鄭康成不與未免過於刻薄若夫蘇氏檮杌一編謂眉山父子罪浮於王安石蓋借文公雜學辨而周內之其意第欲為伊川復讐不知徒貽有識者笑也懷平江伯陳恭襄公﨣﨣陳將軍平江始開國小年八石弓勇氣屢破賊朅逢中興主得附升雲翼當寧念豐鎬京邑望南北安得蕭與韓晏嵗足兵食將軍家合肥老大諳稼穡一朝被簡知舞蹈奉明敕建牙淮水陽諸路盡承式孜孜竭衆智疏鑿靡餘力厫庾便交挽隄閘濟危嗇艘舸隨淺深湖壩幾通塞百年民力蘇萬里海濤息居然奠東南不復困供億將軍去幾時寢廟見顔色火旗與雲馬夜下不可測父老説遺事往往動遐憶征夫多苦辛國本在培植賢孫今代將當復守成則東風吹客衣清口日初昃公忠夙所欽再拜續銘刻踏車行田夫踏車如踏弩田婦踏車心更苦老夫不雨將奈何稻隴看看作焦土我行見此三歎息欲助農忙恨無力假令一旱似往年豈獨憂貧復憂賊我雖七尺金紫身聖恩許作歸耕人詩書不了糊口計與爾將來同苦辛擊鼓揚旗禱神福旦莫先憂食無粥賢侯恤民天所憐好雨時來嵗還熟功臣廟下作雞鳴山側英雄坊朱門半掩青松長功臣廟食自洪武下車進謁開中堂元勳佐命推六王儼然並坐徐與常左李右鄧沐最少霜鬢獨見東甌湯秉圭服冕垂衣裳異姓聮翩如鴈行公侯十六分兩傍金貂玉帶相輝光瓣香一炷三歎行却走苔階觀畫廊朅從真主興濠梁長江飛渡入建康血戰往往皆鷹揚當時陳冦號最強諸軍一衄番水陽不日降旗來武昌神威自此若破竹僣竊次第歸天亡按圖未取東海方下令先縛鹽城張逺清閩廣服蠻徼繼下滇蜀連氐羌東南略遣瘡痏息直指幽都驅犬羊氊裘北遁居龍荒乾坤一統成帝鄉九州入貢紛梯航文孫繼承萬億載諸將之功何可忘禮官四時奉蒸嘗令典與國同無疆摩挲丹青落日黃一時際遇思明良陸機有頌愧莫續風雲颯爽天茫茫暮雨野泊黑風摧山雨如注未到下邳無泊處暗中雜還人語聲且逐淮南漕舟住淮南漕舟三百強粉字舵樓成堵墻輪更轉箭鎮相續似覺人人嫌夜長滅燭悠然倚牀坐逺村曙雞聞一箇前途早有役夫來岸東相呼岸西和送黃欽都閫出守洮河岷三州前嵗平遼過海東今年分陜駐湟中三城斥􅕤提封逺千里蕃戎節制通開府欲施經濟䇿留屯先上便宜功從來禦侮須才俊莫向沙場歎轉蓬度東山嶺石橋駐馬問田翁一塢深深隔樹東帝子閣前沙似粟野神祠下路如弓疏松古澗風微動細草隂崖雪半融回望紅塵才數里不知身在亂山中海子十里城隂道西湖一派分秋晴沙岸尾時見白鷗羣送克寬弟南還至茶菴獨歸垂野隂雲一望迷送行愁問路東西不知幾日黃梅雨門外青泥沒馬蹄題小景雜畫緑樹蕭然蔭草亭酒船安近蓼花汀分明一夜溪頭雨洗出春山數點青莊昶五首昶字孔暘江浦人成化丙戌進士改庶吉士授檢討以諌謫桂陽判官遷南京行人司副終南京吏部郎中天啓初追諡文節有定山集李世賢云定山詩好用乾坤字太楊用修云定山早有詩名顧有絶可笑者如極圖貌大先生帽子髙贈我一壺陶靖節還他兩首邵堯夫又贈我兩包陳福建還他一匹好南京聞者捧腹然晚年詩入細竟有可並唐人者調俞汝成云莊定山詩雖不步武唐人而去時則逺王元美云莊孔賜佳處不必言惡處如村巫降神里老罵坐詩話湯義仍好填詞人或勸之講學湯云僕終身言之顧諸公勿省耳諸公所講者性僕所言者情也旨哉言乎自昔衮衣陳詩章甫雅言昔之聖賢類不廢詩至曰女心傷悲殆及公子同歸又曰其新孔嘉其舊如之何抑何其婉曲入情也自堯夫擊壤而後講學毋復言詩言詩輒祖堯夫遂若理學風雅不並立者然一峰康齋白沙定山咸本擊壤而定山尤甚所謂太極圈兒大先生帽子髙等句不一而足以是為詩其去張打油胡釘鉸無幾矣甘泉從而輯之以詔學者謂非此則與道學逺也然則打油釘鉸反為近道之言而詩三百篇春女秋士之思皆可置勿録也竊為理學諸先生不取也憶舍弟天邊聞一雁杳杳向南徂今夜西風冷他鄉小弟孤五人千里去九月一書無欲作千行淚憑誰寄客途題畫遙山青兩峰老樹紅一葉我懷不可羈月明江獨涉一作空山下明月送博羅何孝子白酒江門暖北來風正寒釀方君不録明日寄書難釣魚圖溪上春雲與浪飛溪頭春水鮆魚肥野人只是間無事日出船來月出歸寄夀州廖同知江鄉煙景不須爭客裏風花亦有情我見白頭張汝弼今年又在夀春城黃仲昭一首仲昭名潛以字行莆田人成化丙戌進士改庶吉士授編修坐諌鰲山煙火豫杖謫湘潭知縣遷南京大理評事進寺副乞休𢎞治初起江西提學僉事尋致仕有未軒劉玉執云先生遺文闡諸理者微徵諸事者核模寫窮物象之真吟咏得性情之正詩話僉事以詞臣建言宜有巖巖氣象而詩特和易近人其謫居寫懷也有云一片歸心留不住非因故國有蓴鱸其歸田雜咏也有云悔殺昔年成砥事紅塵鞭馬聽朝鐘其淡於世味也可見巳初自號未軒羅彝正謂曰君之未余知之吾道未至於孔孟吾功未至於伊周吾民未至於唐虞君之未也若士未大夫大夫未公卿則衆人之未也晚居下皋築俱樂亭更號退巖居士云明妃詞風起龍堆滿面沙舉頭何處望中華早知身被丹青誤但嫁巫山百姓家章懋一首懋字德懋蘭溪人成化丙戌進士纍官南京禮部尚書贈太子少保諡文懿有楓山集詩話楓山自言不工於詩故集中存者甚少嘗見思陵御書一幅詩云未央鐘動曙光生隱隱初聞桞外鶯風靜御爐香篆細日髙斧座衮衣明螭頭陛擁黃麾仗豹尾班聮白玉珩最喜及時勤庶政蒼蠅聲裏聽雞鳴真迹存髙上舍佑釲處觀者疑為思陵御製實楓山集中詩也惟及時二字集本作君王御筆更之是楓山一集曽歸乙夜之覽矣附識於此以當開寶舊事遊牛首山和沈仲律韻乘興來山寺清尊共解顔院深春晝永香裊午風間短屐行應遍危欄倦亦攀白雲飛不定何處是鄉關張弼十首弼字汝弼松江華亭人成化丙戌進士授兵部主事轉貟外出知南安府有鶴城東海二稿李賔之云東海詩清鍊脫俗力追古作其自評書不如詩詩不如文此英雄欺人不足信也王濟之云東海詩不苟作作必超詣豪宕擺脫近世尋常語王子衡云先生詩氣豪而逸發乎性情之正詩話汝弼詩云酒杯不及陶彭澤詩法將隨陸放翁故其律體全學劒南如魚兒浦口酒船小燕子風前茶焙香酒遇故人隨量飲花當好處及時看自從都下三年別不寄江東一紙書孤艇夕陽荷葉亂小樓春雨杏花殷鬢毛零落風前鷺心緒悠揚簇上蠶一頃新田收晚稻數椽茅屋補秋蘿浪花作雨汀煙濕沙鳥迎人水氣醒萋萋芳草日將暮點點飛花春可憐灤水入春冰半黑平山消雪草微青西飛白日忙於我南去青山冷笑人草露松風千里夢秋霜春雨百年心僧中今見大小朗世上爭傳長短歌霍光有傳何曽讀疏廣無金亦自歸可稱具體與定山輩專效擊壤者不同也紅梅贈翁僉事庾嶺小紅梅風標天下絶昨日幸同歡今日傷離别玉笛兩三聲吹落胭脂雪寫以贈知心相攜共明月咏竹擊節歌離騷湘靈招不得開門看月明幽篁倚蒼石春風千萬花花落春無迹此君冷淡姿常有好顔色假髻曲東家美人髮委地辛苦朝朝理髙髻西家美人髮及眉買妝假髻亦峨然金叉寶鈿圍朱翠眼砥何人辨真偽夭桃窗下來春風假髻美人歸上公宜興好寄弋陽尹李端卿兼柬諸公吳中山水宜興好曽在京華得飽聞蹤迹十年嗟未到風煙一壑要平分筍鑱茶塢銅官雨荷蓋蘭州洴浰雲更問東坡田可贖便教兒子蚤耕耘棠溪景悠悠下村路望望皆煙樹何處讀書聲山禽忽飛去送張維亨之沂州琅琊臺下看新晴聼得陽關第四聲千樹梅花滿城雪也應難比使君清俞舜卿僉憲許柑未送詩以促之南海黃柑未見分舉杯空望嶺頭雲元宵燈火相將近空手歸來惱細君絶句空濛山色晴還雨繚繞溪流直又斜短杖微吟過橋去東風滿路紫藤花方文美畫花落春歸客未歸仲宣樓上倚斜暉故園遙在三江外緑遍靡蕪燕子飛題畫雲杉如薺屋如蚶詰曲溪流瀉碧潭獨立小橋吟不盡插天晴翠太湖南賀欽一首欽字克恭廣寧人成化丙戌進士官給事中天啓初追諡恭定有醫閭先生集春晚落盡羣芳枝巳空遊人枉自怨東風誰知寂寞幽園裏猶著楸花一樹紅林瀚一首瀚字亨大閩縣人成化丙戌進士厯官南京吏部尚書贈太子太保諡文安有泉山集詩話文安公父元美中永樂辛丑進士仕至撫州守以循良聞公有子九人康懿文僖官皆至尚書諸孫為尚書者復二人其他階大夫郎者不數焉門閥可云盛矣公嫻於制舉藝吾鄉姚處士浣裒集明一代時文三百八十家特推公為之首詩不耐深思然一門濟濟儒雅風流不特三世五尚書有集而巳寄鄭郎中鳯臺一别四經秋羡子投間未白頭為問濓江江上路幾人煙雨棹歸舟李傑十五首傑字世賢常熟人成化丙戌進士改庶吉士授編修纍官禮部尚書贈太子太保諡文安有石城山房稿胡世髙云宗伯詩文明暢醇雅渾厚和平悉從經學流出未嘗為鈎棘詭亢之言以驚世取譽自然從容於矩度中詩話張乖崖詩云獨恨太平無一事江南間殺老尚書虞山李文安以忤劉瑾致政歸築逸我堂壘石為山暇遊昆尚二湖賦詩云虞山山下是吾廬三載棲遲得自如却怪四方多事日江南間殺老尚書蓋其時山東江西四川湖廣盜賊並起故為是言也文安不以詩名然與李文正吳文定諸公酬和不輟其自序云余於詩文初無師授亦未嘗規倣古人將以是名世但竊祿詞垣公私所需不容巳爾故意之所到信筆書之未嘗刻苦思索必求其工也可謂得失寸心知矣錢氏列朝詩集搜羅鄉曲先進靡遺獨不及文安何哉早行舟中有作荒雞一再號東方漸生白衆星尚駢羅天宇黯以黑晨光正蒙昧莫辨河山色舟行趁潮長寧費牽挽力蘆汀雁驚起鳴聲何嚦嚦輕飇拂涯樹涼露時一滴前村燈火明茆屋疏林隔蓬窗攬衣坐悠然忘盥櫛宵征自可怡此景更奇特登泰山絶頂五嶽鎮坤維其東雄泰岱巖巖一何髙屹立霄漢外神靈所攸鍾秩祀宜萬代我來屬深秋登陟覽勝槩雲開旭日升峰巒新染黛盤盤上澗谷石磴豁復隘涼飇起虛谷颯颯響靈籟兩崖戢霜樹斕斑殊可愛五松非秦封亦己類偃蓋躋攀入天門縹眇凌上界睇盼感廢興喟然發長慨七十二帝王封禪遺迹在玉檢時復出崖亦殘壞兹山自今古直與穹壤配絶頂氣益清衣袂浮沆瀣羣山紛後從厯厯同衆塊中原小如甌滄海縈若帶置身九重近誰謂天下大吾言良匪誇聊以志一快泰山竹林寺與陳大參楊僉憲同遊陟險千萬盤未識寺門處一澗委蛇來齒齒亂石聚飛梁忽橫亘清泉下奔注其間有靈湫蛟龍所蟠據時經不測溪心動髮毛豎肩輿尺寸進僕夫汗如雨我欲飛步登崖傾足難駐青鞋與布襪惜不攜此具貪奇不知止竟忘垂堂慮緬懷得一樂未足償千懼峰回見林薄飄然發佳趣古殿三兩楹滿庭蔭髙樹百果經秋霜甘美皆可茹同行得二妙把酒勸酬屢酒酣陟巑岏冀與仙靈遇髙寒覺衣單俯視飛鳥去白雲出巖阿英英若春絮登臨興無限日暮歸何遽摹寫詎能窮率爾成短句秋崖秋山鬱岧嶤懸崖削如壁自非插羽翰可望不可即若人何好竒捫蘿每登陟濕雲潤我衣落葉墮我幘逍遙空青外似與塵世隔便欲御冷風飛行覽八極題王孟端松泉圖次饒介之松濤韻山椒怪石蹲如羝松崖巉巖不可梯蒼濤洶湧翻地軸白日晦冥天為低高枝棲鶻巢欲墮哀鳴何處求其雌初疑龍蛇相格鬪鱗鬛無乃多傷夷又疑羣仙互來往翠蕤羽節紛祈祈影作大隂連巨壑根蟠絶澗滋寒漪何人圖此心獨苦九龍山人揮灑之筆端生意妙莫測真宰上訴天應悲驚風颯若坐間起毛骨凛凛難禁吹林泉逸趣我所嗜相對不覺心神馳世間真假俱一夢以夢非夢良亦癡卧遊何必謝公屐千峰遍閲消移時畢韋一去藝中原後代未聞工者誰山人能事寧止此布衣上結明主知圖窮載誦醉漁作此翁胸次亦己竒歌聲悲壯意超脫不似杜老憂時危豈期兩美偶相合有聲之畫無聲辭百年勝賞不昜得俯仰忽復令人思雪泥鴻爪宛然在風流雲往何由追後來視今今視昔揮毫試和松濤詩題謝廷循山水峰髙遲出日山氣曉氤氲葉潤林藏霧崖分谷吐雲客衣晴亦濕瀑響逺逾聞茅屋依深樾逃虛羡隱君遊靈谷次鄭司徒韻吾愛山中筍蕨甜山靈况復不吾嫌日華濃染緋桃色雲影輕籠翠柏尖尊酒興催詩興發管絃聲與鳥聲兼詔光滿眼供春望分付奚奴為卷簾過蔡村白沙灘接緑楊堤遍野青黃麥秀齊萬雉都城天咫尺幾家村落水東西濛濛細雨來帆重漠漠平蕪去鳥低岐路年年成砥事遣懷只合醉如泥奉祀天夀山有序五月十三日上以亢旱命臣傑祭告天夀山之神晚至昌平雷雨忽作次日四鼓祀畢出陵月色如晝歸至沙河回望西北諸山雲氣靉靆流水巳沒斷橋矣十六日京師雨十七日大雨畿甸霑足賦詩志之玄雲四合雨傾盆朝野歡騰頌至尊巳藉靈祇通上帝