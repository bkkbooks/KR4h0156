湖路逺身仍健天地恩深罪亦宜野寺可能添一榻水田應只欠雙鷗山腰樓閣天低樹江上人家水拍城八韻八乂皆秀句一年一度此深杯均饒風致宜西涯篁墩守溪邃菴諸公交與和酬也題畫寄楊應寧頽雲濕不飛釀作楚江雪林木凍己僵汀葦吹欲折荒村煙火稀野寺鐘聲歇端居思美人千里成闊别天寒鴻雁窅地僻音塵絶囊琴誰共彈悵望頗鬱結貽此瓊華圖聊以表髙潔小畫浦雲煙樹路盤紆白首青山興不孤我亦有亭歸未得東風吹雨長蘼蕪邵圭一首圭字文敬宜興人成化巳丑進士官至嚴州知府有半江集李賔之云邵文敬善書工碁詩亦有新意如江流如白龍金焦雙角短乂有半江帆影落尊前之句人稱為邵半江馬鬭虎天門名馬真龍媒萬里新自流沙來先皇知爾才磊落放入虎圈與虎搏霜蹄蹴踏虎即斃英風颯爽來天際當時觀者皆歎嗟唐家豈數拳毛騧周瑛瑛字梁石莆田人成化巳丑進士仕至四川右布政使有翠渠類稿林雨可云先生奇語奇情出之簡易嘗自題稿云老去歸平淡時人或未知當為定評履霜操母兮兒憎父兮兒恕局蹐天地憯不知其故父在髙堂兒在郊圻曩興履霜踵血淋漓荷衣不暖楟食不飽不即捐溝壑念我父母父本兒愛母本兒憐一朝放逐實兒之愆維鳥有鷇維蟲有裸父兮母兮其或歸我羅子應云韓子履霜操覺伯竒有怨怒之氣未免害義若翠渠作一篇之內吉甫惑於後妻之失既不可掩伯奇傷巳自訟不敢怨怒而覬父母自省之意亦明詞婉意切足補韓子之失與拘幽操並讀可謂一忠一孝也矣感興持刀斫月光月光何曽斷縛帚掃樹影樹影依然滿人皆惡樹影礙此月明多樹根茍不拔其如月明何詠古送陳白沙歸南海東都事矯激西晉尚清虛一時意自適社稷隨丘墟譬彼門戶開轉運由其樞大勢一傾倒力救將何如君子閲世多立説愼其初擇中而守固孔氏有遺書馮蘭蘭字佩之餘姚人成化巳丑進士改庶吉士仕至江西提學副使有雪湖集黃太沖云佩之在京師與西涯木齋雅相好木齋歸田後與佩之唱和無虛日間書以寄西涯西涯輒和之有云惟應兩巾屨長得夢中遊又云羡君江海上猶有舊同遊是時西涯為一世宗工而於佩之則敬為老友也詩話謝木齋以宰輔歸田與佩之締姻日以詩札酬報澶淵劉應徵知餘姚縣事為刋湖山唱和詩二卷集中句可采者謝如嘉客不來虛掃榻好山難致即移家路當樹與雲深處舟及潮隨月上時野色遙連晴樹杪秋聲忽動暮鴉羣樓臺月上寒雲盡村巷泥乾宿雨餘扶老最便方竹杖入秋却愛早禾田馮如鏡裏流年從老去山中舊業得生還逺林返照明村落斷岸分流入海田絶頂夜晴先見日中峰春暖易生雲雨疏籬落菊開晚水涸湖田雁下遲秋晚菜畦依水種日斜村嫗過鄰舂雲中僧住茅茨屋雨後人耕斥鹵田沙淨雨苔無屐齒竹深秋墅有碁聲雷霆忽作三更雨江海疑生六月氷燈火誰家無樂事江湖此夜有離人城市己無蹤迹到江湖合有畫圖傳其詩頗難優劣洵同調也奉答木齋病起見懷二十韻海氣明曙霞湖光渺秋昊十月木未霜楓林景逾好疏疏籬下花寂寂澗邊草間居田事休委巷人迹少東瞻牛屯峰秀矗雲之表種梅己成蹊中搆一亭小謝公有好懷藉此以終老佳辰縱嬉遊真境越清悄倚酣或髙歌興與秋空杳一卧動逾月豫懷幾昏曉得詩知強健頓紆腸九繞古人愼養生弭疾今須早周爻重勿藥莊篇戒如稿金蘭久要義嵗寒願相保詩古意與長三復開素抱喜公眼增明萬象都了了南齋冬日暄遺編得幽討擬尋亭上盟牽舟汝湖道梅溪香欲浮苔石淨於掃扶杖我能陪公無笑潦倒張習一首習字企翺吳縣人成化已丑進士除禮部主事厯貟外郎出為廣東提學僉事和石翁水悶舊居忽異東西瀼白水茫茫不見鄰始下方林堪濯足每疑泛宅僅棲身魚蝦易覔應兼味畎畝全沉己概貧好鼓蘭橈放歌去乘桴浮海是何人楊光溥一首光溥字文卿沂水人成化巳丑進士有沂川集春去樓外春簾近酒家鶯聲巷陌夕陽斜東風暗地隨春去幾日無人喚賣花梅江江字文淵嘉興人成化巳丑進士授廬江知縣擢南京貴州道御史出為四川按察僉事都門送弟還鄉作髙城曉角意如何執别離亭淚欲沱池館夢中青草盡鶺鴒原上白雲多西風苦憶歸帆影落日時聞鼓棹歌最是明朝傷獨處寒山古木對嵯峨吕常一首常字秉之秀水人大學士原子中成化辛卯順天鄉試由中書舍人遷禮部郎中仕至太常卿有九柏山房存稿石邦彥云太常遊於二泉方石之門詩古淡沖雅微婉緼藉家居日對九柏吟咏不輟忘其老之將至也詩話太常詩名藉甚朝野特為吳中文沈諸君所推重人不敢以任子視之是時詩𣲖方習為纎麗圓熟太常特好盤硬語宜其傲倪一世也六十詩云治聾社酒分鄰父含笑山花付侍兒移病詩云官衙馬瘦無餘粟海國魚鮮正晚潮寄友詩云愁無却老青精飰夢有藏書白石龕皆瀟灑可誦天寒夜卧雨久當成雪天寒不肻明君親南北夢城闕短長更有病官何物無聞老此生茅茨築新屋妻子念歸情吳寬十三首寬字原博長洲人成化壬辰賜進士第一授翰林修撰厯諭德左庶子少詹侍講學士擢吏部侍郎纍官禮部尚書兼翰林學士掌詹事府事卒贈太子太保諡文定有匏菴家藏集李賔之云原博詩深厚穠郁脫去凡近而古意獨存迹王濟之云匏菴為詩用事渾然天成不見䀶洗盡近世尖新之習雖王元美云吳匏菴如學究出身人復間雅不脫酸習詩話匏菴與沈啓南史明古襟契最深車馬簦笠往還無倦其詩亦足相敵在都門闢東園築玉延亭留客園中草木莫不有詩吏部後園亦為掃除欄藥檻花暇必酬和極友朋文字之樂余嘗見公家遺書偶有流傳者悉公手録以私印記之前輩風流不可及也讀廖司訓詩先生撫州彥來為婺州師清晨坐髙堂講席擁皋比弟子百數人出入矩與規先生以身教未嘗費言辭共云今人中得此胡翼之我友王允達托交兩無疑恨我不識面示我所寄詩詩長三過讀讀之竟忘疲其辭如劒鋒凛然白差差上憂吏治陋下憂士習卑三復先生言苦心良可悲欲將今世人化為唐虞時竊觀先生心卓爾出等夷但恐言太高反為當路嗤方今法宫中聖人貴無為一相久自擇謂能繫安危守櫝既有人自毁玉與龜諒非有言責勿起出位思幸卷三寸舌橫經固其宜撫州古名郡山川有諸竒草廬與道園近世尚可追著書寓微意足為千載埀再拜向先生吾言止於斯送張都水幽燕定都邑九鼎從而遷八政一曰食仰此東南偏嵗漕四百萬舳艫相後先雲帆罷轉海江淮達且沿迤邐經齊魯有渠昔人穿噫此尋丈耳譬如溝澮然置閘以啓閉相時為節宣巖巖魯山下平地多流泉泉流入漕渠其始才涓涓奫淪惟自足安知可浮船疏𨗳非人力濟世嗟何緣張君官水部治水思昔年往往相度之滌源同九川功成既歸朝大臣慕其賢封章始朝薦行李仍夕旋維此百泉眼利博人爭傳入渠有餘瀝可溉萬頃田只今東方民老幼咸顚連稿項與黃馘嗷嗷口流涎瀦泄倘有䇿旱潦何須憐漕粟國用足種粟民生全他年司馬氏載入河渠篇苦雨入夏憂不雨雨甚又可憂幸此米價減宿麥且有收人情稍覺舒天意復見尤一雨過三日其勢殊未休九市成九河可車翻可舟側聞城西偏水患更不侔一家三壓死傷者恐不瘳事急欲走避有足誰家投往夜東門火平明失其樓雨來火不作火滅雨乃流漢儒傳五行箕子敘初疇人邇天亦邇此理或可求賦詩遣孤悶廢卷發長謳謝屠公送西域眼鏡眼鏡從何來異哉不可詰圎與莢錢同淨與雲母匹又若台星然兩比半天出持之近眼眶偏宜對書帙蠅頭瑣細字明瑩類椽筆余生抱書淫視短苦目疾及兹佐吏曹文案夕未畢太宰定知我投贈不待乞一朝忽得此舊疾覺頓失謝却撥雲膏生白訝虛室扁鵲見五臟未必有奇術隨身或持此遂使目光溢世傳離婁明雙睛不能沒千年黃壤間化此直百鎰聞之西域産其名殊不一博物有張華吾當從彼質鍾馗元夜出遊圖終南進士狀酕醄虎鞾烏辨鴨色袍青天白日不肻出上元之夜始出為遊遨鬼婦塗兩頰鬼子垂一髦徒御雜沓聲嗷嘈𨗳以靈姑旗翼以大食刀離末罔兩不可一二數肩擔背負手且撡戰傷人血化磷火各出照地點點如焚膏隂風颯颯吹荒皋百怪屛氣不敢號汝輩逺遁莫我遭我欲飲汝血甘如飲醇醪我欲啖汝肉美如啖羊羔肻容汝輩在世長貪叨吁嗟乎馗也真為百鬼豪所以唐皇想其像詔令道子寫以五色毫憶當天寶年左右皆爾曹太真宫中逞狐媚祿山殿上作虎嗥當時便須縛以蒼水使者所捫之赤縧獻於天閽尸諸獸牢何為令溫泉生汙泥驪山長蓬蒿吾嘗疑其事展圖不覺再把短髮臨風搔送胡彥超年過四十不作官還將短髮籠儒冠平生一經己爛熟胡為挾入橋門觀前年鄉書名始刋曲江又避春風寒重來橋門住三載打頭矮屋聊盤桓朝虀暮鹽不滿盤何須故人勸加餐日髙對案笑捫腹自有五年之琅玕側身西北望長安眼中一朵紅雲團天門欲往澀如棘若比蜀道尤云難嗟哉出處誰得似頗似吳下吳生寬吳生作詩忽盈紙送君還到春闈裏春闈多士多如蟻勿將老少分憂喜君不見韓昌黎張童子同是陸公門下士昌黎文章如皎日童子聲名逐流水人生傳世有如此區區科第何難耳題鄭郎中所藏張師夔畫師夔畫好不可誣筆法頗似崑山朱未論人品髙與下胸次自是吞江湖平林絶澗雲糢糊深處自有哀猿呼青苔細路絶人迹遇著即是漁樵徒忽然空翠落衣袖崇山峻嶺相縈紆丹梯百尺通玄都仙家茫茫還有無卧遊三日猶不足王維輞川無此圖題詩却問鄭大夫此圖應著千金沽賦黃樓送李貞伯維河有源星宿同導河積石思神功濁流汗漫失故道積石却與澶淵通平郊脫轡萬馬逸一夜徑度徐州洪徐州太守蘇長公夜呼禁卒登城墉一身未足捍大患豈無木柵兼竹籠戲馬臺旁二十里有隄橫亘長如虹髙城不浸三版耳挽回魚鱉仍耆童防河録成有天工黃樓髙起城之東五行有土可制水砥用四壁塗青紅太守登樓賔客從舉杯酬水臨長風河伯稽首受約束不敢更與城爭雄水流滔滔向東去紓徐演漾殊從容負薪投璧竟何用漢家浪作宣房宫自公去後五百載水流有盡恩無窮我生慕公公不逢安得置我兹樓中穎濵淮海獨何幸留得兩賦摩蒼穹鳯池舍人今李雍南行别我何匆匆登髙眺逺必能賦封題須附冥飛鴻送王合州南出都門去逢人問合州一官為别駕萬里付扁舟巫峽流泉曉峨睂半月秋緣知蜀道易隨處有詩留登故友史西村小雅堂路繞黃家溪水長春風灑淚復登堂草荒求仲常來徑塵滿元龍舊卧牀分手死生嗟契闊傷心聚散覺凄涼髙丘數尺棲神地碧樹爭凋不待霜分韻送貞伯忽對春風南陌還思夜雨西窗髙丘恨不千尺望見離人渡江題畫水長鵝肫蕩口花飛鶯脰湖邊吳歌唱徹歸去日暮青山滿船除夜夜深燈火四無鄰強醉金陵麴米春却憶去年何處宿三叉河口更愁人楊一清二十一首一清字應寧雲南安寧州人成化壬辰進士授中書舍人升山西提學僉事遷陜西副使召為太常卿拜左副都御史巡撫陜西厯户部尚書入直內閣進少師兼太子太師吏部尚書華蓋殿大學士卒贈太保諡文襄有石淙稿李獻吉云先生詩矜持嚴整俊拔典則七言律為最工雖唐宋調雜瑜瑕靡掩然所謂千慮一失也詩詁邃菴古詩原本韓蘇近體一以陳簡齋陸放翁為師獻吉送昌榖詩云吾師崛起楊與李力挽元化回千鈞初意楊非李敵不過為師同耳及觀石淙集實有髙出李者乃知文士以千秋自命類不輕許人也舟中感興宋朝西事興廷議仗數公三䇿戰守和持論多不同韓公初主戰提旅當賊鋒至今好水川流血餘腥風范公圖經略志守不志攻雕隂扼其吭靈武城其雄大順屹有築清澗引而通雖無賊俘獻己遏賊馬衝終教賊膝屈西顧聊從容臣木鉛槧儒豈不念除凶功成枯萬骨生意隨秋蓬而况兵家事勝敗誰能窮設險有明訓著之易象中沙場四百里深塹連髙墉一勞還永佚誓以輸愚忠云胡嘵嘵者計不究初終作詩俟君子庶幾希後功聞人道漢中事相逢漢中人為問漢中事政殘令復弛此階誰作厲有兵不識鬭有地無遺利紛紛敓攘徒來自川西地初焉甚微眇可以折箠治玩寇者為誰彌文巧蒙蔽星星不時撲漸成燎原勢重煩宵旰憂撫捕勤大吏彼氓亦何知從亂豈其意分明盜兵革潢池作兒戲胡忘渤海言而味朝歌智居然恣屠戮為此首功計番兵及礦徒剽掠失防制如以賊禦賊進退誰適避寧偷從賊生懼作迎降斃遂令漢沔間羣盜益昌熾村落莽成墟野煙浩無際師久力漸屈饋餉逺難繼壯士飢而逃道途目相視關津不敢詰將領莫能致仲秋交兵辰諸軍自同異貔貅頗創傷狐鼠未懲艾如聞制府來轅門稍生氣夾攻本良䇿萬全亦非易成功在此舉莫使再顚躓人言川賊興正坐科徵敝民窮盜斯起思之無乃是反本宜急圖窮誅竟何濟邇來天監昭大姦伏砧鑕湯網解而疏武戈藏不試寄語賣劒人太平今立至山中吟兩旬天氣看復隂黑雲故故團春岑耳邊時聽潭龍吟深山大谷不可宿前途風雨愁人心未至府谷得山西胡憲副源梁詩先是豫與源梁約保德府谷為渡河之會源梁先至以詩來速和韻答之榆林東來神木道我心擾擾風中纛病軀不任馳驟勞况是長途阻霖淖眼前車馬恨躑躅夢裏衣裳或顚倒當秋一雨近嵗無破屋家家蛙産竈至今溽潤滿庭戶蟻蛭縱橫聚難掃人可勝天理則然古有堯湯非羿奡吾皇憂民過往聖德旨蠲租憫無告邇來天澤閟不流赤地茫茫方苦燥頓使呻吟化歌舞果然大命由人造知君命駕千里來神交豈是私相好一官同擁繡豸服矢心不愧皇天燾翻愁左顧勤撝訶賴有先憂繫懷抱晉陽一別六七載如瞽倀倀藉誰𨗳龍門尚隔衣帶川意逐書郵己先到陽春下里本非類木李瓊琚浪酬報吁嗟伐木久不聞友道蒼茫竟雕耗人間此會苦難得肻似山隂空返棹與君興在希聲前不待冰絃巳成操元龍大床吾欲卧可聼登堂窺寢奧送安成張都憲督運還鎮文皇北狩開洪基古之燕薊今邦畿官河舳艫挽飛粟嵗四百萬供京師直從三湖到瀛海四十餘閘中逶迤雖云恭襄擅勞績廟算天假非人為漕規百年漸成敝民財己盡兵兼疲豪門貸劵不知數公廪未入私逋追姦人復此恣漁獵罔念膏血成塗泥君王聞之重悽惻曰此瘡痍當砥綏詔求經濟起頽廢公名首應朝堂推都臺舊豸許重著先聲忽滿清淮湄褰帷問俗布新政風霜雨露無偏私人言更化先將領疏屏庸瑣將無遺明揚才俊給任使數月威令如飈馳髙山虎豹莫敢狎精采一變非前時疲氓敝卒總生氣昔者戚戚今嬉嬉朝廷綱紀藉臺憲頗恨吾人翻壞之姑息之風滿天下漢家三尺空然持剛者矯枉不達變志固可取終何禆不然淫刑肆屠刈忍寡人婦孤人兒公柔不茹剛不吐寬嚴兩酌還平施淵魚苛察豈公事權度在我誰能欺漕司政務亦填委老匠坐授羣工治如身使臂臂使指大綱一舉萬目隨安得皆公撫諸鎮頓使赤子回春熙嗟豫關中舊分憲蒞公節下叨公知迂疏未敢辱同調頗覺氣類元相宜公今入覲天顔喜縉紳動色瞻風儀太常間曹無報稱却望賢勞增忸怩秋風冠蓋送歸鎮把酒欲賦難為辭似聞臺省虛公位尚為淮人歌去思畫鴈江岸蘆花秋簌􅉡江頭旅鴈羣相逐啄者自啄宿者宿昨夜南樓聞北風天長水闊雲濛濛何當舟一葉棹入蘆花叢甘涼道中書事感懷二首望望日以逺行行春又闌蒼茫青海月咫尺玉門關北闕星辰上南州夢寐間青山隨處有一見一開顔弧矢威天下雷霆震域中大兵方出塞小醜自相攻繼絶君王義宣威將帥功從今宵旰慮不復在西戎聽雪庭樹蕭蕭夢屢驚幾回風景逼人清坐吟食葉春蠶句起聽空山裂帛聲寒落瓦溝停更響爽疑天籟靜還生憑誰為續幽蘭調萬古悠悠此夜情孤山堡簇簇青山隱戍樓暫時登眺使人愁西風畫角孤城曉落日晴沙萬里秋甲士解鞍休戰馬農兒持劵買耕牛回思未築邊墻日曽得清平似此不出連雲棧雞頭關下石杈牙傍險憑髙此駐車一水縈紆通漢沔萬峰回合控褒斜雲中板閣燒難絶谷口篔簹翠欲遮蜀道秦關俱莫論於今四海正為家山丹題壁關山逼仄人蹤少風雨蒼茫野色昏萬里一身方獨往百年多事共誰論東風四月初生草落日孤城蚤閉門記取漢兵追冦地沙場猶有未招魂還至莊浪平沙落日路漫漫千里風光一色看剛道雨來翻見雪偶然熱後忽生寒城非據險兵猶少地屢經荒食更難稍喜沿邊諸將吏肻甘清苦慰雕殘聞河套有警百二秦關故可憑延寧千里險堪乘濁河下繞還成套彍騎東來慣踏冰塞上煙塵嗟未息胸中兵甲愧無能粟芻山積君休羡民力年來己不勝出郊向來塵慮己真拋一卧經年始出郊天下華陽稱八洞人間福地是三茅病求仙木聊充餌老愛雲松願結巢夢覺迷途自兹始北山猿鶴謾相嘲將至寧夏奉詔西征駐節時元戎奏凱巳先期苖民自逆三旬命玁狁何勞六月師燈火家家開夜戶弓刀隊隊卷風旗益兵加賦休重道財力於今兩不支邊汝成侍郎詁舊病裏詩成手自書重逢又是十年餘己看精力消將盡何止聰明較不如西去幾回勞逺夢南來聊得慰間居故人不道吾衰甚猶有微言為起豫竹西書屋萬竹參差路不分草堂風景隔塵氛他年有約東鄰卜半為先生半此君和西涯漫興園亭風日入清秋緑樹隂隂護四周頗恨青山看不見似應别起看山樓遊茅山丹梯百丈許攀緣萬古華陽此洞天不獨山人能愛客野花啼鳥亦欣然題畫送謝岐歸閩有足不踏風塵車有手不草封禪書茫茫天地誰知巳還指梅花是故廬文林三首林字宗儒長洲人成化壬辰進士除永嘉知縣改博平升南京太僕寺丞遷知溫州府有文溫州集永嘉縣齋寫懷墨綬垂青絲銅符寵郎秩駕言謝朝行出領滄海邑脈脈辭親知依依去鄉國浙行僅千里巳在東南僻地逺煩刑誅年貧正艱食自顧書生愚疇堪付休戚流移己懷慚征斂况余職平生跌宕懷雅志山水適及此東嘉遊清真信靈域豈無康樂情坐有民社責斂板事承迎鉤稽困文籍拂意不能歸自愧陶彭澤靜海驛深夜驛途靜長河瀚海通舟明沉水月燈暗落潮風暝色浮煙外春光欲雨中年年苦行役蹤迹仕飄蓬舟中有懷林待用渺渺長波映逺空依依新栁揚春風相思人在青山外盡日舟行細雨中汲黯身為漢廷重杜陵詩到錦城工天王明聖江湖逺嬴得驅馳兩鬢蓬周軫一首軫字公載莆田人成化壬辰進士厯官江西按察使有章林藏稿和竹溪見贈歸來亭小亭岑寂四窗開坐看春風長緑苔為愛多情雙燕子暫時飛去又飛來黃榮一首榮字儼仁莆田人成化壬辰進士官按察僉事有栁南集牧牛圖江草青青江水流卧吹孤笛㺯清秋放牛莫放南山下昨日南山虎食牛楊榮榮字儼仁莆田人成化壬辰進士官按察僉事主事黃太沖云都水工於詩會試舟中取唐音和之月餘成秩一時風尚和唐音而都水能得其風致徐子元詩談與慈溪張式之同品江西旅懷客夢家千里鄉心栁萬條片雲遮海嶠一雨送江潮戀關綈袍在懷人尺素遙春光看又晚何處灞陵橋子規江天夏夜露氣清山鳥忽作斷腸聲莫道啼多不解意催人歸去最分明明詩綜卷二十八
