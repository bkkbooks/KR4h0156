body:
  text: 明詩綜卷四十一翰林院檢討朱彞尊編舒芬一首芬字國裳進賢人正德丁丑賜進士第一授翰林修撰以諫南廵受杖謫福建鹽課司副提舉嘉靖初議大禮再杖歸卒有梓溪集靜志居詩話舒公首犯逆鱗幾斃于杖其撰崇德李君墓志中書本末最詳謹抄撮于左始車駕議以三月十九日壬子東廵祀岱宗歴徐揚抵南京下蘇州復泝江浮漢登太和山人情洶洶懼變將相大臣多慫惠之十五日予率同館先上疏兵部黄鞏伯固陸震時亨疏亦上為太宰陸完所沮是夕夏良勝于中萬潮汝信過予憤惋邀太常陳九川至署名明日吏部張衍慶元承刑部陸俸天爵等疏亦入义明日禮部姜龍應賔兵部孫鳯鳴和行人余廷瓚伯獻等俱連疏入時又有太醫院醫士徐鏊以醫諫車駕不果出矣癸丑上忽震怒下黄鞏陸震夏良勝萬潮陳九川于錦衣衛獄以舒芬張衍慶姜龍孫鳳陸俸等百有七人跪午門外五日而行人司疏不報以通政司壅之也乙邜余廷瓚等俱下獄丙辰同黄鞏等六人亦跪午門外五日梏拲是日工部林大輅以乗等三人大理寺周子厚等十人亦連疏入丙辰俱下之獄亦梏拲跪五日時復有金吾衛指揮張英言車駕出必不利肉袒㦸刄於胷以死諫天威遂不可霽戊午芬等一百有七人午門受杖四月已卯杖鞏等六人發徐鏊邊逺充軍林大輅周叙余廷瓚俱受杖時死杖下者陸汝亨劉宗夏何孟循林質夫劉珏余伯獻孟子乾劉平甫李德卿詹敬子李崇德十有一人崇德諱紹賢盱眙人以行人齎孝貞純皇后遺詔至徐州開讀時羣閹勢熏炙率屬吏視州衛官偃然席班首君立紹左從容令去其席撝不得與職官同禮焉其文比之實録所紀尤詳詩頗涉理學語五言如江花迎載酒沙鳥避歸航菊黄三徑冷巖翠一松存七言如水入柁楞流去響風吹魚網過來腥思家我亦愁千里為客誰能耐十年紅粉滿樓初入趙青山百里尚圍燕芳草有情生夜雨夭桃如夢繞春山未如荘子舟藏壑欲買謝公墩結廬髙樹閒雲輕䕶鶴小橋新水淺通魚芹香華屋來𤣥鳥樹暗青山隱杜鵑誰為剪殘今夜韭獨憐開盡故園花皆蔫然有致東流遇雨歲晏東流縣江雲黯寂寥雨滋帆葉重風急浪花飄鴻雁飛何逺蛟龍舞更驕客懷何處遣隔岸酒旗招崔桐一首桐字來鳯海門人正德丁丑賜進士第三累官南京禮部右侍郎有東洲集玉虛山行是處瑶宫敞隨山羽客棲雲根百里路木杪萬重梯人語鳴虛壑鷄聲報隔溪桃源知不逺欲徃路仍迷夏言八首言字公謹貴溪人正德丁丑進士授行人歴吏科都給事中改翰林侍讀學士累官少師吏部尚書兼華蓋殿大學士後棄市追諡文愍有桂洲集顧𤣥言云相君優於詞自成别調頗多豔藻穆敬甫云夏公律法精嚴間出逸趣應李舒章云文愍詩頗長制第有形模而少氣色詩話貴溪游覽贈酬之作不及分宜而應制詩篇投頌合雅不若袁文榮之近於䙝也保定公館晝坐重門掩長晝槐隂知午過瓦雀上階行青蟲抱絲墮公暇亦憑几好風時入座終羡南村翁悠哉北牕卧安鄉道中觀婦人揷田南村北村競栽禾新婦小姑兼阿婆青裙束腰白裹首手擲新秧如擲梭打鼓不停歌不息似比男兒更膂力自古男耕女專織憐爾一身勤兩役吁嗟乎長安多少閨中人十指不動金滿身無逸殿西壁詩應制睿藻承遺訓農歌啟聖衷千秋無所逸七月詠豳風帝學詩書在神謀制作同光昭文祖業原上有新宫秋日同李序菴顧未齋張亭溪飲鄭氏莊雨後沙全濕風前竹半斜野橋通細水秋圃映餘花出郭悲塵鞅臨池憶釣槎清歌且終日應不問年華夜泊吳江月岸秋燈滅風湖夕浪翻橋連楓葉冷城帶水雲昏把燭延津吏停舟次驛門漁歌起何處瀟灑數家村漢川道中晩市浮烟歛春洲曲水連遥燈林表亂圓月浪中偏犬吠經村店蛙鳴逼稻田夜行三十里野興得蕭然次薛西原背郭茅齋僻沿堤竹徑斜杖藜逢野客酌酒共山家暖日熏芳草寒流漾淺沙江村二三月歲歲足鶯花象麓草堂初成和杜水碧沙明洲渚迴籬深竹静草堂開風吹山木蕭蕭下日落江帆片片來有客相過時載酒主人無事日登臺愁看直北關山迥白草黄雲秋正哀王邦瑞一首邦瑞字惟賢宜陽人正德丁丑進士改庻吉士累官兵部尚書贈太子少保諡襄毅有集伏𦍑道中曉發天水郡西行見城堡茅屋十餘家周垣亦百堵門前挂弓箭牆上施樓櫓居處雜牛羊街衢塞糞土危峰列戍臺疾騎飛傳羽一夕烽火至居人自比伍我從漢中來悠悠思徃古此地戎馬區從來多荼苦漢有隗囂據唐為吐蕃部宋人扼金遼歲歲苦侵侮干戈如鼎沸生靈飼豺虎皇天眷明德聖作乾坤覩窮塞入版圖混一歸神武向來蹂踐塲禾黍皆膴膴承平思預防綢繆在牖户勿使邊防弛宼入臨洮府蔡經五首經字廷彞候官人後復姓張正德丁丑進士累官南京兵部尚書總督浙直軍務改左都御史為趙文華所劾逮至京論死追諡襄愍有半洲集詩話襄愍死非其罪郡志寃之國史白之虞山錢氏以為東南之論殊不然傳聞異辭不可不覈以余所聞趙文華病篤命禱其平生所䧟六人襄愍其一則文華已心悔其誣且與楊忠愍同日死於市公論亦可定矣其詩特清婉無拔劍横槊氣同漳源侍郎遊華不注峰并泛大明湖平生慕幽曠雅懷避煩囂林園茍成趣亦足供逍遥况兹出東郭雲物如相招羣山秀嬝娜一峰特岧嶤開筵坐琳宇浩歌凌紫霄朋情藉軒豁客思翻飄颻睠言泛運沼復爾移蘭橈窈窕遵𤣥浦逶迤渡七橋菰蒲水清淺石竹風蕭條槐隂宿鳥下藻動潛鱗跳何緣對淑景且幸聯髙標因探歴城勝并采康衢謡中山早行客夢長不成鷄聲起偏早既無夜寐安寧似晨興好銀河澹欲沉朱炎寂猶埽摇斾指秦闗駕車歴周道古塔振風鈴髙槐䕶芳草對此忘驅馳翻以舒懷抱己丑陪祀南郊歲序南郊重齋居北闕䖍金輿下霄漢寳篆裊雲烟肅穆千官静歡呼萬姓傳天風引仙藥清切最堪憐鵞湖道中鵞湖山下春可憐野梅含雨柳生烟遊絲細細駐林杪浴鷺悠悠飛水田物候催人如過客朔雲回首忽經年征衣尚拂紅塵路悵望鄉關落照邊蘭河曉渡月落金城鼓角殘危關曉色拂雕鞍黄河𣺌𣺌中原隔紫塞迢迢邊地寒西望旌旗連瀚海東來風雪滿臯蘭萍踪萬里休惆悵虎節龍沙亦壮觀張岳三首岳字維喬惠安人正德丁丑進士除行人疏諫南巡受杖調南國子學正入為武選員外厯祠祭郎中出為廣西提學僉事調江西謫廣東鹽課提舉遷知廉州府轉浙江提學副使歴㕘政以僉都御史撫治鄖陽改江西尋以右副都御史總督兩廣軍務召入為刑部侍郎掌都察院事復出總督楚蜀卒贈太子少保諡襄惠有小山類稾詩話襄惠初釋褐與林希元陳琛談理學時目為泉州三狂始以言禮忤永嘉繼忤貴溪分宜幸以功名終文治武功所至登績詩其餘技然如宛宛西飛日餘光照我裳江空流月華白石光凌亂理深物有悟興極感相因幽篁迷􅃇蹊回蹬距飛轍微風萬里隂落日半江烟非熟精文選理者不能作也留客亭憑軒有所思所思在遠岑我有青絲瑟欲奏無知音萋萋芳草色遲遲美人心佳期不可敦離憂故難任冥迷風雨交歎息河梁深歸來卧山中浪浪涕霑襟願乗空谷駒翩翩夕巖隂桂枝聊攀折芳馨日相尋山阿華歲晏莫受霜霰侵同翁夢山游三海巖夙愛山水遊兹山屢延賞披雲入青冥巖屋岈𢎞敞玲瓏開北户峭壁排銀牓初駭溜石懸漸喜瓊芽長幽泉時一滴毛骨森蕭爽壺觴屢獻酬清言激靈響天末多風波陳迹成俯仰徒聞海上洲中宵勤夢想聊兹永日留真性非外奬暝色望征途何由釋塵鞅與夢山登欽州東城樓登髙易為感况兹萬里心髙城餘百雉翠色前山深詰屈水通海蒼茫日載隂美人隔宵旦末由攬芳襟舉手招青鳥願託瑶華音青鳥不我顧瑶華日以沉耿耿還自念有酒且共斟許宗魯二十二首宗魯字伯誠一字東侯咸寧人正德丁丑進士改庶吉士授監察御史歴湖南按察僉事副使太僕少卿大理少卿以僉都御史撫保定以副都御史撫遼東有少華陵下遼海歸田等集王元美云許伯誠如賈胡子作狎游隨事揮散無論中節蔣仲舒云中丞五七言位置勻穩首尾妥潔氣格麤備可當作手使更推思入𤣥取材進古得不渢渢其言哉黄清甫云許詩字句嚴飭篇章方整得古人之格白溝之作弔古慨今辭意俱盡志士讀之求見深衷定當擊節可謂無慙前作其近體雖多直語亦有爽氣曩秉鉞兩方戎事倥傯不廢文翰彌見其髙詩話少華諸體皆工寓和婉於悲壯之中譬之秦筝獨無西氣足與邊廷實王子衡竝驅渡白溝昔運遘屯厄恒紀變參商南風日不競朔吹亦逺揚英雄各乗御龍戰血𤣥黄矯矯平將軍獨立當中央張弧射九日撫劍盼四方事去迹故隳志伸願已償朅來歲月久道里未能忘仲生固有為忽死亦其常停驂覽故壘雪涕􅂂戰場清川帶瀠紆白骨浩縱横忱歎不能發總轡歌此章贈楊伯雨昔與君為别乃在黄金臺髙歌易水曲落日悲風來今與君相逢乃在廣陵郡朔雪滿江湖冉冉歲華盡與君昔紅顔雙鬢忽已素日月如逝川東流焉得住酌酒勸君飲援琴為君歌起望長江雲澹澹垂綠波丈夫有心期結交共終始南山青桂枝豈為歲寒死已酉元日作檢厯年華改看雲歲色新地天開泰日星斗建寅春去國身何逺趨朝夢轉頻江湖與廊廟憂樂竟誰人三月三日上已今朝是風光異徃時海雲成雪易塞桞得春遲目極關山道情懸曲水詩誰能修禊逺一浣望鄉思遼左雪中登樓歲杪崇朝雪天涯絶塞城凍雲連海色枯木助風聲懷土情無已登樓賦未成梅花南國思笛裏暮愁生東岳秩祀嚴東土明禋冠五宗金函神鬼籙玉簡帝王封海湧中宵日巖留上古松何時凌嶻􅑖飛舉跨蒼龍登岳陽樓澤水含秋盛樓光向晩孤倚䦨聞白鴈把酒對蒼梧楚客悲今昔湘靈怨有無興來留賞地落日下平湖零陵西亭同朱大㕘衮楊僉憲材賦入洞探幽賾登臺散逺心雷聲帶雨重虹影射江深地接三苗國天垂八桂林來游陪二妙詞賦總南金自清溪泛舟出江與柯元卿話别清溪澹無色客子放歸舟浦暗黄花雨江行白露秋故人惜逺别尊酒話中流漸近銅陵縣青山動我愁送馮子言還吳夢寐東吳好相違幾歲華憐君理歸櫂秋色滿天涯醉詠江樓月晴㸔海寺霞春來如憶我須寄早梅花自毘陵如姑蘇仙舟揺極浦驛路指吳門海氣春冬雜風潮日月昬鴈回書不到家逺夢空繁總是江南好何如歸故園晩渡黄河落日西山暗洪河夏漲餘昏黄沉鞏洛浩渺極梁徐鼓聽臨流驛燈㸔逺岸漁頻年在行役倚櫂一長吁西苑畫閣横青漢雕臺俯碧流苑雲低度雨宫樹早生秋水抱芙蓉殿山連翡翠樓何須浮海外即此見瀛洲徐氏南荘秋集九月重逢閏一年秋未殘城南時載酒樓上復憑䦨黄菊霜前放青山雨外看病軀猶自可不畏倚髙寒立秋日曲江别業作垂桞晝隂隂村居門巷深秋光來此日時序感吾心水鳥浮沉浴風蟬斷續吟江臯餘暑在竹下且披襟邊事先皇神武竝周宣北伐親兵駐萬全飲馬幾思臨瀚海銘功何止勒燕然龍沙夜静妖星落虎帳秋髙漢月懸分閫登壇諸將老至尊宵旰獨憂邊石首昭烈廟永安宫裏龍髯斷石首山頭寝廟孤三峽風烟沉王氣千年營壘識雄圖時移玉殿丹青古雪暗滄江雁鶩呼噓燼可憐延漢祚遺靈猶見禱荆巫醫閭春望同李户部醫閭登眺倚雄邊遼左封疆指顧全山勢北來連靺鞈海雲東盡辨朝鮮巖花競暖霏香雪塞草留春藹翠烟公暇暫問淹永日喜無烽火報甘泉登齊山樓近郭危樓俯碧湍倦游孤客倚層䦨淮淝山色尊前出吳楚江流畫裏看旅思逢秋增短髩鄉心隨鴈過長安黄花白酒登髙日玉笛金笳起暮寒班婕妤妾命由來薄君恩豈異同自憐團扇冷不敢怨秋風春興野霽花爭發川長桞漸齊春光更何許多在杜陵西城南游覽楊桞今無渚芙蓉舊有園請看蒿里地即是樂游原戴鱀四首鱀字時重鄞人正德丁丑進士除刑部主事歴官右副都御史巡撫四川有東石遺稾李杲堂云中丞擅經世才負氣髙亢居官四十餘年闗節不至其門權貴俱心憚之竟坐此三起三黜不得盡其用論者惜焉其詩老健蒼凉是一作手感興三首髙梧有良質斲為雙綺琴疏絃映金徽冷冷發佳音一彈薰風至更彈江月沉大雅久以寂志士寄幽吟坐令衆喧息洞見太古心蘭蕙種不長荆棘日以滋青青野中蔓引身百尺枝春風一吹拂垂垂得其宜夭桃開上苑苦李道傍遺賦命固如此物情胡不怡托根各有所聊用以自持離離庭樹花風日正妍好翻翻辭枝葉忽已及秋杪君子心百年小人計昏曉請君平生志慎勿事温飽宣風公館作家書後用壁間陽明先生韻雲外微紅見燒痕道邉寒水入溪渾此時日落楚山館後夜月明何處村已近閉關猶道路偶逢傳札念晨昏獨燒官燭看妻子卧聽郵更驚夢魂胡侍四首侍字承之咸寧人正德丁丑進士除刑部主事進員外陞鴻臚寺少卿坐議大禮謫潞州同知尋下詔獄論為民尋命復職有濛谿集王元美云胡承之如病措大習白猨公術操舞如度擊刺未堪詩話承之詩原北地而五言頗近信陽弇州稱之云雖於風雅未縣合往往時材骨格殊亦不失實宴王御史惟人山亭别館秋城側髙亭夕霧中疏簾通野色曲磴裊天風醉舞招松鶴悲吟和草蟲平生習池興遮莫笑山翁九日同陳魯南文徴仲劉希隱薛君采登海印寺鏡光閣湖景澄珠閣雲虹度石梁行攀雙樹杪坐對九華觴水抱香城入山横紫禁長慿髙不厭晩待月詠胡牀送劉德徴守䕫府國有蠶叢古城聞白帝雄龍蛇夏禹廟雲雨楚王宫羽檄通南徼樓船進北風還令蜀父老喜得漢文翁涼州詞落日黄河水倒流沙場旌斾風悠悠新降畨兒不解語笛中吹出古涼州陳文沛一首文沛字維德長樂人正德丁丑進士除工部主事歴郎中出知撫州府調蘇州遷霸州兵備副使以陜西行太僕寺卿罷歸有世槐堂稾懷逺堡和韻峭壁樓危石徒杠漫逺沙河流隨溜曲樹影逐風斜客枕移更鼓鄉愁起暮笳官齋何寂寞鄰舍兩三家吳仲一首仲字亞甫武進人正德丁丑進士歴官南京太僕寺少卿有鴻爪集送吳舍人使中州茅土分封重天書十道開浮槎乗月渡飛舄倚天迴南國王孫草西園驛使梅荆溪何處是遥在白雲隈汪佃二首佃字友之弋陽人正德丁丑進士改庻吉士有東麓集苑口别意圖為弋陽李生題秋來苑口漲初生羨爾歸㠶一片輕折桞離亭休弄笛客邊禁得斷觴聲雨行落花飛絮踏成泥烟雨連纎日向西行客正愁行不得鷓鴣偏傍馬前啼林希元一首希元字思獻晉江人正德丁丑進士官至大理寺丞有次厓集丁酉除夕有感牢落天涯兩歲除夢中曾幾賦歸與聖朝未有寛恩詔邊郡猶勞判事書忙裏不知殘臘去客邊惟覺二毛疎椒盤此夜誰觴酒忽憶家鄉萬里餘李士允一首士允字子中祥符人正德丁丑進士歴官陜西參政兼苑馬寺卿有山藏集晩過劉中丞園暝色延春徑烟花啟夜關緑深裴相野香滿白公山銀燭回花底金壺侍竹間不妨山簡馬乗醉月中還王漸逵一首漸逵字用儀番禺人正德丁丑進士授刑部主事建言不報乞歸隆慶初追贈光禄少卿有青蘿集洪舜臣云青蘿詩文如騏驥在御雖鳴鑾節奏而若􅌍若没之氣終不可掩詩話青蘿詩無定格遣興即題鐵橋一絶直追踪唐許碏閬苑花前之作鐵橋狂客山中不費招瑶池春宴夜聞簫醉餘不記歸時路曾跨青羊過鐵橋曹嘉一首嘉字仲禮扶溝人正德丁丑進士改庻吉士授御史以言事出補大名府推官尋復官御史又以言事下獄謫禹城知縣降茂州判官仍復原職升山西提學副使終江西右布政使有漫山集王元美云曹仲禮如公孫大孃弟子舞劍頗見淋漓見其師者不覺愴然詩話王元美撰卮言謂獻吉晩為其甥曹嘉所厄良苦而鄉黨之論不然朱秉器游宦餘談述汴人語謂仲禮終身父事獻吉勿衰梓行舅氏集選吳下以善書名者繕寫獻吉兄孟和有姊即仲禮母素與獻吉有隙恒不相見一日兄姊欲過獻吉獻吉喜劇盛供饌以竢比入門獻吉出迓方揖孟和即踣獻吉于階兄姊交毆之時仲禮在都聞之惶懼不寧者旬日專人以書慰獻吉是厄其舅者非仲禮矣仲禮好賔客所與游最密者詩則謝茂秦書則徐子仁奕則閻子明嘗語茂秦云吾舅氏稱詩家練字不如練句練句不如練意練意不如練格葢墨守舅説若是以此知卮言亦有不足深信者次韻答空同舅氏兩度微宮謫孤身絶塞行漢廷收墮淚蜀道軫離情玉壘蠶叢國龍標劔閣城乾坤形勝地何處挂冠纓王廷陳三十五首廷陳字稚欽黄岡人正德丁丑進士改庻吉士授吏科給事中諫南巡杖謫裕州知州尋下獄免歸有夢澤集皇甫子循云稚欽樂府古詩齊軌潘陸下擬隂何五律並肩沈杜元俞汝成云夢澤詩清切不凡榮潤可愛言王美云王稚欽如良馬走坂美女舞竿五尤自長城百穆敬甫云稚欽如阮嗣宗日坐歩兵厨醉態出而自無寒酸語顧𤣥言云王給事調髙趣新頗多竒句如深谷綿蠻冷然幽響殆與髙岑方軌蔣春甫云稚欽五言漸近自然頗多佳境章陳卧子云稚欽爽俊故意警而調圓李舒云稚欽操筆不煩軒然鵠舉儻宋轅文云稚欽才情麗逸加以沉思當不減徐昌榖詩話稚欽逸藻波騰雕文霞蔚音髙秋竹色艶春蘭樂府古詩既多精詣五言近體亦是長城固以邈後凌前足稱才子擬矯志篇蛟龍雖困不資凡魚一作䱇鰍鸑鷟雖孤不匹鶩雛雖有香草當户必除雖有仁人在敵必誅狐白雖美炎暑必置舟車之用易地則棄蘭蕙不采無異蓬蒿干將不試世比鉛刀以驥捕鼠曽不如貍餓夫獲璧不如得糜郭生純臣魯連髙士彼乃登臺此則蹈海寧直見伐無為曲全寧渴而死不飲盜泉放歌行竊鈎者誅竊國者王仁義資亂道豈不臧一解伐秦者吕襲楚者黄巍巍國君大盜在傍二解謂尺何短謂寸則長此不可度彼何可量三解獸殪罟裂鳥盡弓藏智勇既殫軀乃見殃四解䜛巧為忠直夫稱狂出門異趨毁譽曷常五解樂不可極憂來無方游心沖虛以保壽康六解妾薄命春風轉蕙披蘭髙臺曲榭中連經堂入奥張筵秦箏趙瑟俱前鳴絃度曲雙妍輕舉紈袖僊僊宛若游龍翔鸞翠盤金爵闌干呈能角技為歡種種厭射更端眼看陽景西馳髙張蘭燭承暉車倦馬怠不辭但歌不醉無歸夜深坐促尊移含悰寫意向誰衆中色授君知願言竝蔕䨇棲惡聞易别輕離佇立不勝傍徨獨宿寤言難忘何以報君明璫起視銀河爛光牛女咫尺相望終夜不成報章陳卧子云調本子建聲情極合行路難北風蕭蕭雨雪滂辭我親友之朔方中閨少婦走傍徨勸君斗酒牽衣裳道路縱横多虎狼歲暮天寒百草黄結髪本期不下堂君獨何為慕他鄉東流之水不西歸宛轉蛾眉能幾時人生冨貴亦有命辛苦馳奔空爾為子夜春歌初華綿繡舒千林望如一懷春廢機杼縑素難成匹子夜秋歌貪看秋月光夜久不成寢四顧寂無人玉階有雙影對酒歌二首惠施已不作荘生寡所宣伯牙失鍾期抱琴誰為彈知人誠不易知已良獨難周公輔王室管蔡乃流言骨肉且不諒他人固宜然人性稟静躁物則準方圓錐刀各有能情好各自妍隂霽難竝祈恩怨豈兩全於此雖不容於彼獲所安人無億萬身何能徧周旋兼濟聖不贍榮枯有自然富而如可求尼父願執鞭詠懷四首兩儀立樞要萬事具紀綱智士運機權一童驅百羊羽重金或輕尺短寸有長壯夫茍失據反為豎子傷獨繭引六鼇纖繳連䨇鶬操持貴不謬得失詎有常始悟制人術豈在多與强擊鼓以求亡疾馳以逃影驅介以乗髙驂蹇以求騁揮刄䘮其柄振衣失其領趨舍昧良圖存亡在俄頃姬旦制冠裳萬古承其賁偶以衣狙猱奔騰裂且棄承雲本妙音鱗羽爭辟易魯門鐘鼓聲轉使爰居悸物類何繽紛人已非一致韙哉尼父言盍各言爾志昔聞有游女逍遥翔碧潯交甫下請佩解贈情亦深可遇不可持變化愁予心影滅佩亦失漢廣無由尋眄睇絶髣髴徘徊逮夕隂青鳥忽來過貽我金石音憂思耿難忘寫意於鳴琴自傷非儔類感激長悲吟雜興偏才互短長名家殊去取連城償燕石千金享敝帚不識東家聖翻謂西施醜定價豈目前知已俟身後閨情種木期息隂結交期得心與君初㛰時安坐調瑟琴繫我大秦珠貽我玳瑁簪擕手同車遊徘徊歩春林俯拾竝蔕花仰聽和鳴禽折芳交贈持言誓一何深寧期被䜛妒棄我忽如沉曠歲不一接塵埃生錦衾明月入空帷中夜坐悲吟發篋理故物淚下誰能禁别張子言我友駕言邁去去之朔方晨起促中㕑為我具酒漿長别在須臾且願盡杯觴昔為骨肉親比翼雲中翔今當永乖違邈若參與商出門異鄉縣居世如朝霜世途轉傾側良㑹安可常羸馬感人情哀鳴衢路傍悲風振喬林颯颯摧中膓執手不能辭淚下霑衣裳恨無凌風翰送子還故鄉别曹仲禮四首與君一為别晷度逝不停奄忽二十載親串日以零短者已物化存者非壯齡况復異鄉縣散處如晨星但言長相思豈意今合并顔髩各已改不易惟兹情孤鴻號朔風黄鳥聲嚶嚶飛鳥戀儔匹况乃稱友生别子大河測見子長江濵對靣但疑歎含意慘莫陳豈無新知歡念此同袍人攀留不須臾羲陽忽以淪奮身思繫日天路邈無因安得附髙翮一舉摩青旻飽者豈念饑貴者羞賤貧薄終古所尤交誼貴在伸故心茍不移何必㑹合頻慷慨即長路無為兒女仁中夜起相送白露塗我襟低頭惜分手舉頭傷辰參斗酒良不薄對之不能斟唧唧草間蟲助我揚悲吟為君拭緑綺彈作清商音物理關人情淚下不可禁谷風刺小怨孔公贊同心延陵輕寳劍髙義垂至今親交信不薄先民良可欽冷冷山下澗童童山上松粼粼澗中石瑟瑟松上風波逝石不俱飈奔松莫從物理相倚藉動息難可同與君游宛雒矯若雙飛龍中道悵相失末路欣此逢既逢不須臾去復當嚴冬霜霰集衡軛虎豹啼林叢子其愼桑榆勞謙以令終駕幸南海子南郊初禮帝上苑復誇胡虎兕先聲伏車徒翼輦趨網羅張一面部曲用三驅侍從羣臣在應知諫獵無江上言懷二首野闊風雲入天迴楚蜀通渚禽多白鷺巖樹半青楓哀怨湘君曲平成夏后功晩來懷古意極目送冥鴻平野蒼烟合髙城白鳥過澤蘭懷楚客石竹隱湘娥谷響歸樵唱江鳴發櫂歌夕陽葭菼外將奈暮愁何楚眺眺迴臨髙閣三湘萬里餘草邊雲夢獵花下武陵漁白日山川氣清秋水竹居仙蹤同霸業消歇總愁予李沔陽自大梁經裕州因贈雪夜梁王宴霜秋宋玉愁回瞻嵩嶽峙去逐楚江流少室三花樹滄浪一葉舟南行正揺落知爾憶林丘張子魚過訪故人天上至清宴夜深開澤畔微芳度江臯暝色廻楓林停翠幰月岸擁金罍正苦歡娛逼無令候吏催生日有感簡同館漢東少泉二子五十年來是行藏徃日非因之念親舊存者亦幾希弧矢心猶壮文章力已微操觚從二子衰薄謝餘暉宴魏子園亭池館名江國賔朋實楚材屏間烟霧濕鏡裏芰荷開鶴以吹笙下漁因鼓瑟來邀一作盡歡須秉燭歌妓莫頻催病中得顔子書并見示諸作卧病當寒景空齋正爾思五禽終日戲雙鯉逺方貽久著潛夫論初傳幼婦碑君才猶不用如我復何悲春日山居二首野曠林爭出花深徑屢迴春風芳草外亂水白雲隈燕接飛蟲去鶯沾落絮來小堂宜竹䕶一一荷鋤栽草動三江色林占萬壑晴籬邊春水至簷際暖雲生溪犬迎船吠鄰鷄上樹鳴鹿門何必去此地可躬耕山莊雜興二首老夫諳稼穯次第葺園廬對酒惟田父呼門絶里胥桑麻經雨後花竹宛秦餘如此生涯足何勞薦子虛事去心逾壯年來迹轉孤濯纓臨漢沔安枕荷黄虞春澗偏魚鳥秋牕近竹梧出逢鄰叟飲醉倩野童扶聞箏花月可憐春房櫳映玉人思緐纖指亂愁劇翠蛾顰授色歌頻變留賔態轉新曲終仍自叙家世本西秦病後答友人一畆居連郢客鄉三年愁隔漢川長青山各有幽棲志白雪遥傳寡和章自傍雲霞開藥圃不將塵土灑荷裳洞庭雪後烟波濶花底乗舟到草堂燕京元夕曲香車一一渡星橋翠袖雙雙引玉簫但訝遊人爭辟易不知夫壻漢嫖姚江暉四首暉字景孚仁和人正德丁丑進士改庶吉士諫南巡杖闕下出為廣德州知州召授編修進修撰升河南按察僉事有亶爰子集陳卧子云景孚好怪合者亦六朝之遺詩話景孚穿文鑿句辭必自鑄其文有令綝閟始理訓闡詰範􅀈已邛臬揆原命稽彞九篇誦之若神經怪牒葢倣魁紀公而作王稚欽贈以詩云江生突兀揚文風千竒萬怪難與窮博物豈惟精爾雅識字何止過揚雄古心已出丘索上邃㫖或與神明通求深索隱不肯置一言忌使流俗同令弟大篆逼鐘鼎絶藝恥作斯邕等生也為文遣弟書一出皆稱二難竝縱有楚史不可讀滿堂觀者徒張目少年徃徃致譏評生也不言但捫腹讀未終篇覺殷仲堪之眸子裴叔則之頰毛傳寫畢露矣景孚詩稍文從字順然豈可與稚欽竝稱耶别劉子謙天運無停機變化一何速四時更迭謝寒暑互徃復雷霆促晝隂霜霰棲寒谷萬卉隨隙光安能久蕃育傷彼蕙蘭花凋零竝蕭蔌芳蕕竟同岑賦命焉可卜前上陵德勝門先皇巡狩日此地即行宫拜舞千官肅飛揚八駿雄雕弓開塞霧鼉鼓振山風今日緐華歇重過恨不窮謁康陵五柞淹珠葆千杉閟玉襦靈山鍾自肅虛殿珮仍趨雪暗蛟龍蟄雲寒燕雀呼塵沙迷列岫何處訊蒼梧感聞南極雲山阻中天貝錦盈如何去與住俱似穽中行迂拙甘衰病飄零寄友生秋風蓬户底蕭瑟旅魂驚馬汝驥三首汝驥字仲房綏德州人正德丁丑進士改庶吉士諌南巡罰跪闕下五日受杖出知澤州召還為編修歴修撰國子司業南京右通政南京國子祭酒升禮部右侍郎兼侍讀學士卒贈尚書諡文簡有西𤣥集王元美云馬仲房如程衛尉屯西營斥堠精嚴甲仗雄整而士乏樂用之氣但顧𤣥言云侍郎優於律取法初唐尤多華整少情性耳黄清甫云仲房詩整練似法顔謝隊仗森然且關中之産氣自不薄雖求之聲律未造其深亦不失髙流也有蔣仲舒云仲房詩沉理而無𤣥趣詩話仲房派沿北地由其體純存滓窳而舍神明雖與稚欽齊稱去而千里酬明卿見遲之作違時寡朋侣在世有羈縛雖抱投沙懷中欽臨海作美人惠前顧軒車戒䨇駱探幽肆廣筵握炙行髙爵宴晤稽故懽告别附新諾沁渚既緜芊樓峰復聯絡捫蘿情易暢攀桂興欲躍嚴程豈迂逺郵館祗淹泊復徃瑶華篇報桃恥凉薄吁嗟山水音非子諒誰託寄言儲醇醑俟我乎偕樂藏舟浦鳯殿臨瑶水龍舟鏁白雲樓臺疑上漢簫鼓憶横汾地豈昆明鑿波猶太液分昔年浮萬里蘭桂詠繽紛芭蕉園路轉山樓直園開水殿低碧荷春檻出紅藥晩階齊釣石蛟龍隱歌臺烏雀啼翠華當日幸一道緑天迷劉士竒一首士竒字邦正廣州順德一云龍門人正德丁丑進士除刑部主事諫大禮杖闕下遷郎中出知梧州府厯山東右布政使秋夜旅懷為客方如晉還家復入秦音書徒屬望燈火自相親草色連朝改砧聲向晩頻那堪千里外猶有未歸人王謳二首謳字舜夫白水人正德丁丑進士除工部主事遷刑部員外郎出為按察僉事有彭衙集王子衡云舜夫如敗鐵網取珊瑚用力堅深得寳自少備康德涵云舜夫才情之妙近日罕覩典麗咸機軸不凡葢作者之雋也駮蔣仲舒云舜夫頗饒氣格兼多沉思惜其純相半如披沙㨂金治璞取玉殊勞匠手詩話舜夫詩多至千六百篇譬田甫田種豆成萁若苗有莠當屬闗中下農夜行一篇其汙萊之嘉榖乎夜行夜行如在旦殘月清林光雲氣集深澗露華生早凉白沙鬰浩浩翠壁凝蒼蒼寂歴松柏徑經過花草香鷄聲互村落曙色動柴桑即事况多感離心含永傷送姚方伯野日流沙白山城落木黄秋來長送别何處折垂楊汪應軫一首應軫字子宿紹興山隂人正德丁丑進士改庶吉士諫南巡廷杖出知泗州嘉靖初召復館職授給事中出為江西按察僉事有青湖文集葉仁甫云先生以沉鬰澹雅之思出以温厚和平之詞譬之太羹味之正也詩話青湖知泗州康陵南巡中使傳㫖俾進美人善歌吹者奏言泗州僻左婦女不諳歌吹惟民間醜婦能蠶儻納之宫中受蠶事庶於治化有禆遂寢事雖迂而實可傳也及卒鄉人私諡日清憲先生蓋司諫為直臣牧民為㢘吏講學為醇儒皆第一流也其論學詩云語道豈捐陸扶世當從朱黯然思聖功二家皆真儒審擇於鵞鹿之間非偏黨陽明可知登浮峰寺攝衣入空山白雲留我住我欲卧白雲白雲又飛去王鳯靈三首鳯靈字應時莆田人正德丁丑進士歴官參政有筆峰存稾次梁學泉吏部徐州舟中夜酌之作石仄江逾勁峰迴日易斜歸鴻迷極浦飛鷺落平沙越客同杯酒春光正柳花相看仍意氣行路莫深嗟送林遷于得告還山祖席初分酒半酡相看無奈故人何生憎柳色臨岐路况聽春聲入櫂歌舊國雲山何處是他年風雨憶君多祗園簪組能相絆未得相從訪薜蘿次韻贈送鄧文溪刺維摩青瑣黄門記昔遊諫書常出殿西頭須知九死當年事豈分孤身萬里投瘴雨蠻烟仍壯節海雲江月重離憂最憐號泣攀轅意誰為中原赤子謀吳鼎一首鼎字維新錢塘人正德丁丑進士歴官廣西布政司參議有泉亭集讀史有感漢武雄才世莫倫輪臺一詔見天眞滿朝都入平津閣猶有淮陽卧病人陳良謨一首良謨字中夫安吉人正德丁丑進士除工部主事歴官貴州參政有天目山房稾詩話中夫生十月而孤母都夫人躬敎之學既第奉母入京邸水涸卧小舟中夜呻吟母責之曰貧生出入徒歩若初入官便思安逸縱此一歸念吾立見汝敗矣中夫泣伏罪歴任以清介聞田後入峴山社年已九十賦詩云夙駕侵寒露歸㠶拂暮星興復不淺三窮辭為周侍御作菰塘霜冷髙烟平孤雁失偶中夜鳴深閨􅊔婦心獨驚蘭膏無燄爆有聲盈盈淚落如斷縻妾心有苦誰則知上有舅姑下有子與爾同生不同死陸金一首金字德如吳江人正德丁丑進士授工部主事歴官江西按察副使宿京口驛風帆如馬過維揚滿目烟花路渺茫江上潮痕收暮雨渡頭人影立斜陽十年季子裘應敝三月王孫草正芳今夜月明京口驛計程應喜近家鄉許相卿四首相卿字伯台海寧人正德丁丑進士官兵科給事中補禮科致仕有雲村集董實甫云先生詩悲壯沉著格調髙逺詩話雲村澹於宦情居紫雲山四十年風花雪瀑游屐遍於巖椒而不一入城市其卒也聞人嘉言輓以詩云平生城市無䨇屐何物榮衰到兩眉葢實録也詩取適意集出其手刪自序謂棄其脱遺不可讀者存其餘可讀者自題絶句云雲村病老語多嚨造次詩成䧽宋腔還溯開元論風格拾遺壇上樹旌幢由今誦之諸體亦自清潤不全雜以宋腔也若老如舊歴渾無用病戀殘燈亦暫明此則宋腔之佳者古意新月生西嶺明河低逺林坐見大火中秋序忽見侵感歎老將至徘徊勞我心勞心復誰語聊撫東廂琴調髙曲未竟寡和難為音矯首文江子何時宣此襟諸弟夜集獻歲閟霖潦今夕欣澄和况我遠行歸兄弟㑹匪他晏晏言笑洽楚楚壺尊羅東風舉衣袖明月在庭柯一觴再三詠舞影時婆娑荏苒百年内白日如投梭載懷秉燭遊不樂如夜何晩晴苦雨連旬日初晴一振衣殘雲依海嶠新水到柴扉僻性嫌山淺塵縁與世違斜陽疎樹裏清影石邊歸霽色霽色林廬晩愁吟野水灣斷雲虹外雨殘日鳥邊山海字堪流涕朝班祗强顔獨嗟身世拙早見髩毛斑楊士雲五首士雲字從龍雲南太和人正德丁丑進士改庶吉士授工科給事中歴户科左給事中有𢎞山集詩話給事未老抽簪自號九龍眞逸坐卧小樓訂尚書蔡傳之得失撰黑水集證自春秋以來迄於元季厯代人物各詠以詩又取天文厯象律吕及皇極經世書地志皆分題成詠可謂好學也已其詩原出白沙定山近取裁於楊用修同時吳懋以給事及王廷表胡庭禄張含李元陽唐錡為楊門六學士六人皆滇産也四望謡望蓬萊駕蒼龍棗如瓜獻木公望崑崙驂白虎觴九霞進王母讀尚書二十八篇今自漢伏生授二十五篇古至晉梅賾奏二十八宿外二十五宿又仲尼不可作誰復百篇舊八月十五夜月今夜中秋月當圓尚未圓人皆瞻白我欲問青天把酒須來夕髙歌似去年盈虛誰握算擬測子雲𤣥春事龍關作春事今過二月中登山載酒喜相同三㸃兩㸃社公雨十番五番花信風子規啼血欲半夜蝴蝶掠香時一叢醉餘白石髙歌調日落水流西復東曹𢎞二首𢎞字毅之江隂人正德丁丑進士除知南豐縣入為監察御史西川清軍以病還里有方湖集御史馬子斚朱必東季明德陳良㑹主事林汝恒俱以言事忤㫖罷職謫官於其行詩以送之海樹連雲暗燕花帶雨飛啼鶯三月暮逐客五人歸聖代昭臣直危言犯主威賜環應有日留却舊朝衣下夷陵溪花丰茸溪雨凉雲水不分前路長山鳥一聲山竹裂思君半夜發瀟湘朱豹三首豹字子文上海人正德丁丑進士知奉化餘姚二縣擢監察御史出知福州府有朱福州集送顧經歴之福建京華倦羇旅憂思喜南天烟柳山頭驛春溪樹杪船官清蓮幕静地暖荔枝鮮况值干戈少詩篇紀歲年秋日遣懷雲物蕭條僧舍荒砌封蒼蘚半迴廊坐來草樹俱揺落望入闗山更渺茫憂國淚邊秋色老思家夢裏雨聲長臨風却羡天涯鴈去啄江南晩稻香寄程以道隴梅隄桞又春風客子光隂似轉蓬此日天涯千里隔昔年花底一尊同西川蹤迹孤雲外南浦離愁細雨中早晩瞿塘新水發雙魚煩爾下巴東袁淮一首淮字伯昭任邱人正德丁丑進士歴官知府有汾淮泗西征諸集秋夜宿堠馬驛寄舍弟渙月騎停沙浦風林出驛樓青燈萬里客玉露九霄秋失路添星鬢還家滯驛舟未成春草夢徒有越鄉愁廖世昭一首世昭字師賢懷安人正德丁丑進士除知海州改國子博士卒于官有越坡稾定光塔登髙寳塔層層上危欄面面開秋城圍野曲逺水接天迴日射珠光迥風迎鐸響哀長安知萬里目斷朔雲堆郭波一首波字澄卿閩縣人正德丁丑進士户部主事有巖存稾宿玶塘鋪獨樹郵亭影千山征路塵東鄉今夜月偏照未歸人明詩綜卷四十一
