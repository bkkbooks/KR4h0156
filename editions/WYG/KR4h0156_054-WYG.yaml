body:
  text: 明詩綜卷五十四翰林院檢討朱彞尊編萬表六首表字民望鄞縣人正徳末中武進士累官都督同知僉書南京中軍都督府晚號鹿園居士有玩鹿亭稾顧𤣥言云鹿園才清思逸稟履髙曠詩如空巖曲瀨宛轉寥夐時復滴瀝得幽閒真趣有韋應物深致七言氣骨稍弱静志居詩話鹿園裘帶翩翩志存開濟好從方外遊間與羅達夫唐應徳諸公講性天之學值倭冦為患守土者力不能支公逺結少林寺僧傳格鬭之法倭猝犯赭山公使釋孤舟統其徒二百人薄倭營縱火箭擊敗之俄太倉来乞師公别募月空等十八僧選經師天貟為戰將於翁家港諸僧衣錦袈裟持杖口含澱藍遇賊以藍塗面自地躍起若倮鬼前搏倭大驚以為神遂大敗倭追及嘉興之白沙灘盡殱焉後遷官留都道出蘇州卒遇冦楊涇橋孤軍與戰得出身中流矢以書報家人曰家世死戰唯吾持文墨論議未甞身將兵今晚年増一箭瘢可無憾矣葢萬氏自武略將軍斌戰死阿嚕完河子指揮僉事鍾與靖難兵戰死花園孫明威將軍武從征交趾師次檀舍江陷陣死武弟文襲兄爵守桃渚有龍夜戲潮浮水面遥望兩炬光以為賊火引强弩射之應弦落其一炬不知為龍目也龍負痛騰躍文船漂沒人稱射龍將軍三世不得裹骨歸𦵏故鹿園書云然鹿園子達甫仲章鎮國將軍孫邦孚汝永都督僉事皆材兼文武達甫有皆非集邦孚有一枝軒稾題江心寺云清磬龍聽法空階月送潮此仲章警句也憫黎吟三首㕘政平崖錢公出憫黎諸詠見示惻然傷懐因而有作地何産柟與速民何畜豕與犢豕犢盈盤吏反嗔柟速窮年采不足刻箭為約安得銷黎人借錢無約刻箭記之嵗嵗生當剜吾肉負戈因􅂸一命償嗟嗟黎人誰爾牧虎兕来猶可奔狼師一来人無存大征縱殺玉石焚昔人鵰𠞰只一村鵰𠞰功成賞不厚大征廕子還廕孫殺一不辜尚勿為何況萬國多寃魂鑿而飲畊而食撫黎何事来相逼舊設有撫黎老人瘠牛可畊豈不惜薑水那堪吞滿臆撫黎逼黎人之財則以薑水灌之遥明燈火忽驚疑一望旌旗我心惻撫黎至黎則明燈揚旗以往羣黎艸木豈有知貪吏朘削無休息攻掠犯順誰所為撫黎毒黎還毒國夏日飲許貟外山亭即景一亭梧竹裏迥出市塵間石逕縁蘿入江峰對座閒海雲朝屢變山鳥暮雙還别去衡茅下思君嬾閉關江南曲客從潮陽来夜泊秦淮口鄉語人不知兒童聞拍手宮人歎莫向雲屏羨阿嬌暫將清泪度春宵帶圍自此􅂸長減待得君王愛細腰劉銳一首銳字蓄之海鹽人世襲海寧衛指揮使有春臺集錢幼卿云海村抽簪薖軸寓意詩篇與瀛洲諸老和酬卓然自振於儔伍詩話海村少補諸生屢試不利乃食世禄里居賑飢散藥以厚徳聞有僕名木善射一日水鸛集資聖寺鴟吻木射之貫其左翮鸛帶矢盤旋良久竞集中庭如臆訴者海村曰嘻必木也命拔其矢縱之不能飛乃命木飼之旬日創愈向主人鳴舞翺翔而去海鹽人至今能道之和徐東濵何處幽棲好城西有茂林山来當戸翠竹長隔牆隂哺子飛梁燕窺魚下水禽閉門無所事赤日任流金余承恩四首承恩青神人官永寧㕘將有鶴池詩集詩話鶴池為太保肅敏公孫肅敏有社稷功世襲錦衣衛指揮其子忤權倖調外衛故鶴池終身不得侍禁籞詩集八卷銅梁張肖甫序之感興白日沈西陸返景流東岑端居屏塵翳欣然理鳴琴大雅僉不恱馳情在鄭音違俗信靡安安可同荒淫達人宜止足嘉遯我所諶富貴茍非義一唾麾千金答草池約汎蓉溪春来花鳥總關情夜雨愁聽不到明怪殺主人猶病酒晴江鼓柁放舟行泛舟芙蓉溪水三尺强蒼蒼兩岸花艸香若待長江新漲合撐舟直上小茒堂望忠州髙江落日片帆秋岸上魚罾次第收無數峰巒雲霧裏舟師指㸃認忠州戚繼光二首繼光字元敬登州人世襲衛千戸以㕘將備倭浙東大破倭於台州以副總兵鎮福建大破倭於平海衛閩冦既平以都督同知召理戎政岀為薊鎮總兵進左都督加少保卒諡武毅有止止堂集詩話少保平倭之功戰勝攻克撰有紀効新書在薊日與總制譚公綸樽俎折衝撰有錬兵實紀論者比之孫吳韓白焉軍中有暇輒與文士接席賦詩集名止止稾曰愚愚居曰夢夢是亦好竒矣盤山絶頂霜角一聲艸木哀雲頭對起石門開翔風鹵酒不成醉落葉歸鴉無數来但使雕戈銷殺氣未妨白髪老邊才勒名峰上吾誰與故李將軍舞劒臺度梅嶺溪流百折遶青山短髪秋風夕照間身入玉門猶是夢復從天末出梅關俞大猷一首大猷字志輔晉江人世為百戸嘉靖中舉武進士累官都督同知佩征蠻將軍印進右都督卒贈左都督諡武襄有正氣堂集挽薛養呆伐木風不還今古幾心知我與君結契相期弱冠時平生一然諾盛衰永不移我善君相助我過君相規嗟君忽奄逝一老不憖遺昔為暫離别今作長相思戚戚重戚戚良朋今有誰張通一首通鳳陽人官至都督僉事遊西林菴野寺蕭條一逕微山僧相見語禪機雲深石洞𤣥猿伏煙鎖松林白鶴歸上界疎鐘通碧落邊城鼓角送斜暉浮生自覺渾無定欲解鳴珂問釣磯周于徳一首于徳號南墩淮安人官至京營都督僉事平烏刺江春蒐馬跡遍南荒夷䝤新降罷畫彊絶壑危巖通鳥道飛旌疊鼓遶羊腸黔瀘東下歸辰浦箐砦西来即夜郎王化逺行銅柱外炎州萬里盡梯航張元凱十一首元凱字左虞吳縣人蘇州衛指揮有伐檀集王元美云將軍詩格務躋武徳貞觀其語寧有瑕璧而無完珷玞汰陳而使之新非有沈深劌刻之思未易致也詩話左虞西苑宮詞髙出元美之上元美比於沈慶之曹景宗仍以武夫遇之未為知己也春日游西苑宣室臨西苑靈臺對籍田宮鶯迷緑雨廐馬飲清川栁引金堤直松含玉殿圓先皇受釐處寂寞鎖春煙西苑宮詞十首肅將上帝祀明堂寳鼎昭回日月光九獻不須歌舊曲詞臣昨已撰芝房秋殿清齋正受釐迎和門外立諸姬大官不進麒麟脯御饌惟供五色芝陳詞瘞玉奏鈞天西苑宮牆近籍田水旱恐煩祠后土未央深處好祈年夕烽千里照甘泉一紙降魔勅已傳急遣六丁乗羽駕火輪金甲淨幽燕靈藥金壺百和珍仙家玉液字長春朱衣擎出髙元殿先賜分宜白髮臣通天臺上接三台景命重臨清醮開拜舞不同郊社禮科儀一一聖人裁香通紫氣靄晴空靈貺神休集聖躬垂拱萬年如一日禮臣何必議青宮金符寳笈䕶雲英鸞鶴銜將入上清拜受玉霄龍鳳簡元陽象一字分明蓬莱方丈可梯航勾漏丹砂近寄將昨貯銀山髙幾許試將玉尺殿中量瑞氣祥雲薄海濵逺藩齊獻百千春進来白鹿髙於馬馴擾金堦不畏人李元昭一首元昭字用晦杭州人世襲千戸有􅒖嶁山房集送周虚巖歸吳返棹嵗將晏離亭酒共斟一作亦深島雲寒沒影江日凍生隂莫惜飄蓬跡應傷折栁心丘中别同調聊復理鳴琴黄喬棟一首喬棟字以藩晉江人官㕘將半峰菴聽秀上人彈琴髙僧理鳴琴古調盈人耳濤生松下風龍起鉢中水聽罷猶泠然月出疎篁裏張如蘭一首如蘭字徳馨南京羽林衛世襲指揮官至淮徐漕運㕘將以子可大貴贈特進榮禄大夫右都督有功狗集吳門夜泊帆影初抽落日斜江橋風湧太湖沙行人莫上蘇臺望無復吳王苑裏花狄從夏一首從夏字以忠臨清衛人官㕘將月夜同劉天山作孤館寒燈夜相看聽晚笳清宵醒客夢明月落梅花碧海潮聲急清霜雁影斜不堪憐嵗暮況復是天涯袁應黻一首應黻字仲子揚州興化人守備鄭司馬入塞歌十載籌邊鬢欲秋玉門生入未封侯君王豈惜師中命尚有山隂十六州奚汝嘉一首汝嘉字子美江都人揚州衛百戸旅懐十日雨初霽一年春已殘苔痕蝕徑滑艸色釀隂寒昔悔從軍易今悲作客難殊方有桃李能得幾回看陳鶴十首鶴字鳴野紹興山隂人世襲百戸有海樵集王敬美云鳴野詩飄宕悽惋中顧𤣥言云鳴野詩初擬貞觀以還晚得大厯格錢去病云海樵七古流麗似李頎七絶爽朗似王昌齡詩話海樵家居怪山之麓金庭閣老其女夫也山上有息柯亭傳是閣老所建而海樵集中酬周山隂張㑹稽攜酒見訪之作中云相攜直上息柯亭恐是海樵故宅中物矣五言如近海潮通郡連山瘴入樓山川留别夜風雪望鄉人孤月長隨棹寒潮自到門繞廬松葉暗穿竹水聲齊明月幾家好故人今夜俱七言如床下鳴蛩偏入夜風前白苧不宜秋風塵㑹面猶難卜世事傷心只自知細雨殘燈岐路酒清江紅葉寺門舟薄游兩見雁歸塞多病却憎花滿樓髙士逺栖滄海曲好山多近永嘉場山深倦鵲猶依樹風定飛螢忽上樓比於田水月雖才鋒不及而鑄詞差醇夜坐見白髪寄别朱仲開張甌江坐久北風起江聲帶逺沙客愁初到鬢鄉夢不離家林靜無殘葉燈寒有落花懐君夜難寐别緒轉如麻髙郵贈龔山人近苦江東水轉憐淮北居入秋甞白稻留客鱠青魚樹柵春收犢穿潮夜灌渠期君結鄉社同著養生書泊京口望金山寺南徐一片石千古柱中流繞樹開僧舍縁空結梵樓疎燈明水底落月挂潮頭向晚禪鐘起風吹到客舟題楊法部容閒閣閣傍江城外春開雲水間秖因塵境逺自覺主人閒日落見歸鳥月明看逺山移船候潮至相送野僧還寫山水夜来風雨惡落葉打柴關曉起敞溪閣亂雲猶在山題畫贈姜明府暮雲春樹路千重雪後看山到處同夜永燈寒無過客月明江色滿樓中送張伯淳還關中憐君獨棹渡黄河西北山川入雍多料得到家春未至馬啼半在雪中過送王諫北上東去春潮到驛門半江風雨近黄昏由来知已難為别不是殷勤戀酒尊吹笛懐友玉笛横吹入夜分中天華月度流雲苕川兩岸春風起飛盡梅花不見君池上聽陳老琵琶夜深池上弄琵琶萬里銀河月在沙莫向尊前彈出塞只今邊將未還家陳第十一首第字季立號一齋連江人初為學官弟子俞都督大猷召致幕下教以兵法起家京營出守古北厯遊擊將軍有寄心集五岳兩粤游草詩話一齋投筆從軍受知於譚襄毅俞武襄戚武毅三公江陵既沒論者謂武毅不宜於北徙之嶺南一齋作塞外燒荒行有云年年至後罷防賊出塞燒荒灤水北枯根朽草縱火焚来春突騎飢無食又云隆慶二載譚戚来文武調和費心力從前弊政頓掃除臺城兵器重修飭迄今一十五年間閭閻雞犬獲寧息譚今已死戚復南邊境危疑慮叵測患難易共安樂難念之壯士摧顔色論者不引今昔觀紛紛捜擿臣滋惑又送戚都䕶絶句云轅門遺愛滿幽燕不見烽煙十六年誰把旌麾移嶺表黄童白叟哭天邊誦其詩扼腕於封疆之事深矣一齋儲書最富余甞游閩臨發林秀才侗持其後人所輯世善堂書目求售燈下閱之見唐五代遺書琳琅滿目如披靈威唐述之藏多平生所未見不覺狂喜秀才許至連江代購踰年得報書則已散佚徒有惋惜而已嵗暮客居呈弱侯仲尼本周流忽發歸與歎意在就六經匪為思鄉串嗟我老無聞託興游汗漫邈想古通人反側常宵半秣陵一君子少小登道岸嗜學自性成羲易旦夕翫近得從之談怳上中天觀詩書數千載立語窮真贗欣然遂忘家何知有嵗晏邵武舟次樵川泛輕舟青山起當面薄霧頻往還竒峰互隠見灘灘若峻坂下下如飛箭秋容西楚同人語南方變茂樹雜村煙澄溪勝江練始知溯洄艱轉喜隨流便對景持一杯幔亭未足羨禹碑行岳麓神禹碑何年鐫刻之真蹟雖莫窺字體殊瑋竒儼如冠冕之獨立矯若鳳鳥之来儀或盼而連目或聳而並肩或展而雙足或握而兩拳神藏藴蓄意騁蹁躚既非鳥跡之踖踖亦非垂露之㳙㳙篆𨽻八分抑又邈焉計厯年之既久何㸃畫之新妍豈鬼神之黙䕶故嵗久而彌鮮據譯讀之恍惚未必當日之真傳余過長沙弗覺偶至湘潭返船直肩輿而迅步遂冒雨而陟巔喜胸襟之豁滌獨坐翫而弗旋昔韓退之甞千捜而萬索至咨嗟而涕漣余實迷途之未逺無亦此生之宿縁山中早秋春夏詎能幾凄凄白露還秋容先到草客意未離山石䑕窺禾去清蟬抱樹間人生衣食外焉用苦間關江心寺除夜偶過江心寺何期又嵗除百年俱逆旅信宿即吾廬岸隔遥沽酒厨寒剩煮魚客游隨處好鬢髪任蕭疎客中立秋蒸濕前朝雨凄涼今夜風秋聲先蟋蟀露氣到梧桐頓覺絺衣薄尤憐旅槖空潞河問舟楫明月向吳中閩關旅夜已是吾鄉土離家尚十程疎窗通野色孤枕傍松聲揺落秋難賦悲歌夜不平僕夫催曉發燒燭待雞鳴南岳舟中吳門一水接楚塞衆山連書史同昏旦江湖且嵗年洲迴蘆莽莽檣動燕翩翩何處為南嶽雲開望杳然維揚謁文信公祠萬死艱難地千秋伏臘新山河終破國天地已成仁江橘南中像巖松雪後春徘徊歌正氣不覺淚沾巾過薊州燕京八千里復作薊門行剰有溪山興能忘沙塞情朔風催短草寒月近長城流涕二三䇿何人似賈生追懐宜黄大司馬譚公昔年飄泊入燕京制府憐才意不輕獻䇿獨過司馬署分符旋赴薊州營秖誇相國知韓信無復功臣妬賈生秋草春風今日淚不堪回首楚江城元夕宿泉州洛陽橋春風又渡洛陽橋栁色青青伴寂寥回首故園今夜月滿江燈火上寒潮李言恭六首言恭字惟寅岐陽武靖王裔孫襲封臨淮侯環衛侍直留守陪京加太保有青蓮閣貝葉齋游燕諸集穆敬甫云臨淮詩清逺有調庶幾大厯中語胡元瑞云敬美序臨淮詩郭定襄後一人咸謂寔録予以惟寅文雅尚當過之詩話李惟寅詩如四姓小侯橋門列席雍容韋帶哧咤鼓贔之氣都盡花朝二月寒猶峭燕山雪未消春来無草色病裏又花朝鴻鴈鄉書斷關河旅夢遥武陵溪上約今已負漁樵賦得匡廬山匡廬凌碧落青磴與塵分湖海逺還見雷霆低不聞石門鳴宿雨瀑布濕流雲獨有山人屐常隨飛鳥羣送陳玉叔郡守淮隂别思深難遣離魂暗欲銷人隨流水去心共暮雲遥野市懸髙岸江城響夜潮所嗟相憶處風雨正蕭蕭送仲弟南還兼懐老親無限離愁匹馬前況多風雨斷鴻邊板輿未得歸潘岳春草何堪送惠連伏枕夢回滄海月登臨望極白雲天飄零若見髙堂問雙鬢休言異昔年李僉憲招飲黄鶴樓勝地慚非作賦才清尊今向大江開當年黄鶴雲中去何處梅花笛裏催一作来風起一作卷潮聲喧島嶼日斜帆影上樓臺相逢俱是他鄉客衰草涔陽漫復哀顯靈宮先帝祈靈太乙祠重来空憶翠華旗殿中香火儀猶具海上仙人事轉疑客與方書閒指畫老来詩律舊心思調髙身健慚時輩髙閣憑闌眼故遲詩話京師顯靈宮在宮城之西長陵建以祀王靈官者也靈官藤像長陵每載之軍中有禱輒騐及金河川舁不可動宣徳初拓其祠額曰大徳顯靈宮復建東西二閣嘉靖三年營龍虎殿以奉元武焉閣中留題者衆以惟寅為擅場其云海上仙人者相傳藤像獲之東海中也呂時臣十首時臣字中甫鄞縣人有甬東山人集陳卧子云中甫詩頗有髙岑遺調詩話中甫以避仇客厯下與李中麓楊夢山切劘酬和既轉客青州衡莊王邸起髙樓東向眺逺樓成王於望後四日置酒召客時日景既盡疎星尚微王未肅客坐憑闌語笑已而月上王歡甚因命曰待月樓請客賦詩中甫詩云川原夕氣交暝色自相向月猶藏海底人已坐樓上王賞擊謂得待字義手觴奉之俾居客右晚客瀋宣王所客死河南中甫年六十治生壙於句章之夕陽里自撰墓銘後十年乃卒歸櫬𦵏焉詩品在中麓夢山之間同時曳裾王門者多遜之襄陽蹋銅蹄青蒲沒漢水白馬度襄陽男兒但得意何處非故鄉山中吟桃源渺何許武陵萬仞山緬想秦時人生死桃花間邇来逾千載曽無幾人閒桃樹摧為薪桃源平作田雞犬入租稅焉可住神仙交州古劒歌古交州天隂日落鬼啾啾終宵白氣衝牛斗過客往往驚回頭主人知此有靈物呼兒掘得雙吳鈎螭蟫半蝕銅花緑凄凄霜鍔寒光流古来異物不易取令人得之反生憂放之唯恐蛟龍怒卷之猶畏神鬼愁亟命冶人復解鑄神器恐遭真宰怒不然仍貯空匣中恣爾含光在泥土秋田為李生得衣字明農兼課子田舍有書幃䆉稏霜初下雞豚秋正肥西風菰米飯落日豆花扉已得遺安計無嫌老布衣夜懐起来喧不減䇿䇿動涼風月暗蟲聲裏人孤樹影中南埏寒尚早北地候難同想到鄞江上秋花滿舊叢留别少府子魯木落見中州遥連白帝愁黄河臨斷岸明月上孤舟作客已多嵗還家又暮秋思君西下日寒葉滿江流次李大㕘韻留别河北中秋盡江南九月歸草深藏虎穴潮滿上漁磯田舍舂新稻山妻補舊衣到家貧自得莫怪與君違金山寺萬古一卷石東南何壯哉半江截吳楚兩岸瞰樓臺僧飯蕪城乞人煙鐵甕来春深龍聽法風雨帶潮回諸公邀登甘露寺留别天風飄忽苧袍輕兩度登臨慰客情疎磬雨催山寺曉亂帆春放海門晴江迴鐵甕三吳盡潮過金陵七澤平明日别離何處問斷腸煙樹漫蕪城再經鍾吾懐許兵馬去日黄河邊水深不可渡故人久不回今作行人路鄭若庸五首若庸字中伯崑山人有蛣蜣集李時逺云山人與茂秦齊名其詩氣格稍弱詩話中伯曳裾王門妙擅樂府甞填玉玦詞以訕院妓一時白門楊栁少年無繫馬者羣妓患之乃醵金數百行薛生近兖作繡襦記以雪之秦淮花月頓復舊觀承平勝事雖小堪傳今之秋兔寒鵶想像昔年之酒旗歌扇良足豔也秋涉蒼山崔巍照秋渚紅樹離離夕陽渡行人涉水更看山馬足凌兢来復去雲際人家望欲迷松關蘿徑隔煙扉山僧卧穏西巖寺時有鐘聲落翠微王内輔三泉將命太嶽神嶽蟠中極凌虚勢自孤星辰低絳闕雷雨䕶清都山色遥連蜀江流直入吳金箱有靈秘到日佩真圖衛水離歌天涯何處客愁新濁酒初酣欲問津莫道三秋歸計晚尊前猶有未歸人送張甘蘖刺史衛水樓船曉向東青山南望一重重因君此别増鄉思目送春帆細雨中丁小山赴浙東藩幕值余清泉賦别清秋衛水汎樓船京國逢君已十年漫對緑尊悲白髪天涯去住一凄然顧聖少二首聖少一作之字季狂吳江人留别謝茂秦相對忽不樂愴然傷我心他鄉有同懐胡為遽分襟憶昔醉燕市擊筑誰知音意氣獨吾子排難輕千金重以易水歌兼之吳㑹吟論交豈不逺投分遂至今我亦慕三閭南去湘之隂楚山一何長楚水一何深他日遥相思鹿門還可㝷送李汝學還上黨傾葢同為客攜尊復送君悲涼誰作賦南北此離羣坂沒羊腸雪山横熊耳雲相思豈無鴈可待九秋聞尤嘉一首嘉字子嘉嘉興人有西陵集詩話予嘉亦趙康王客穆敬甫録其詩以比謝四溟句知偶因看竹来僧院不為求魚坐釣磯頗有自適之趣康王賔客無多而吾里有二其一則仲舍人春龍也送劉舍人往太原謁梁李二使君平原日落雁聲寒送子西游嵗欲殘共惜異鄉裁别賦更於何處解征鞍山横熊耳尖如削路遶羊腸曲似盤自是陳蕃能下榻匣中長鋏不須彈徐渭十三首渭字文清更字文長山隂人有櫻桃館集陶周望云文長詩雜出於中晚宋元往往深於法而略於貌袁中郎云文長詩有一段不可磨滅之氣如嗔如笑如寡婦之夜哭羇人之寒起當其放意平疇千里偶爾幽峭便是鬼語荒墳陳卧子云文長亦有正音往李舒章云文長詩材粗黠雅人所少然其一有雋處如部曲少將新跨紫騮詩話文長詩原本長吉間雜宋元流派所謂斐然成章不知所以裁之者其自評云吾書第一詩二文三畫四然詩文未免繁蕪不若畫品小塗大抹俱髙古也入燕董生抱利器鬱鬱走燕趙賤子亦何能飄然来逺道行止本無常譬彼雲中鳥朝飲西園池暮宿北林杪感事復懐人生年苦不早欲弔望諸君跡陳知者少垂首黙無言春風秀芳草栁元穀以所得晉太康間冢中杯及瓦劵来易余手繪遥思冡中人有杯不能飲孤此黄兔窑伴千三百稔劵鏹四百萬買地作衾枕想當不死時用物必𢎞甚尊壘羅寳玉裹袜賤繡錦豈有纎纎指捧此鍛泥蕈存亡隔一丘華寂迥千仞活䑕勝死王斯言豈不審送蘭公子阿翁學師也揚州人耶溪芹藻色相伴秋荷老公子朅重来傷心那可道㑹日苦無多相别一何早八月廣陵濤一葉渡殘照俠客結客少年場意氣何揚揚燕尾茨菰箭栁葉梨花槍為弔侯生暮騎驢入大梁隂風吹火篇呈錢工部隂風吹火火欲然老梟夜嘯白晝眠山頭月出狐狸去竹徑歸来天未曙黒松密處秋螢雨煙裏聞聲辨鄉語有身無首知是誰寒風莫射刀傷處髙旛影卧西陵渡幡底颯然人髪豎髑髏避月攫殘黍中流燈火青熒熒饑魂未食隂風鳴莫言墮地永為厲宰官功徳不可議詩話此美錢工部能憫國殤召僧施食而作隂風吹火八句句句警䇿具體長吉而得其骨髓者也以下嘽緩拖沓去嘔心人逺矣稍為芟易存之結語尤索然無味春日過宋諸陵藳𦵏未須憐生時已播遷威儀非舊典世代是何年過客悲山鳥王孫種墓田回看隴頭樹似接汴京煙嚴先生祠碧水映何深髙蹤那可㝷不知天子貴自是故人心山靄消春雪江風灑暮林如聞流水引誰識伯牙琴懐陳將軍同甫飛將逺從戎翩翩氣自雄椎牛千嶂外騎象百蠻中銅柱華封盡昆池漢鑿空雁飛真不到何處寄秋風與客登招寳山觀海遂有擊楫岑港一窺賊壘之興謹和開府胡公之韻奉呈滄海遥連雉堞明登臨喜共幕賔清千山見日天猶夜萬國浮空水自平不分番夷營别島願圖方略至金城歸来正值傳飛捷露布催書倚馬纓岳公祠墓門朱㦸碧湖中湖上桃花相映紅四海龍蛇寒食後六陵風雨大江東英雄幾夜乾坤博忠孝傳家俎豆同腸斷兩宮終朔雪年年麥飯隔春風宴遊爛柯山二首偏禆結束佩刀弓道上逢迎抹首紅夜雪不勞元帥入先擒賊將出洄中羣兇萬隊一時平滄海無波瘴嶺清帳下共推擒虎將江南只數義烏兵夏相國白鷗園白鷗池水拍天平相對瓊樓入太清試問歌臺生草處當時可許外人行沈明臣九首明臣字嘉則鄞縣人有豐對樓集莫廷韓云嘉則詩豪俊清婉情至之語足無古人詩話嘉則文長同在胡少保宗憲幕府並受少保知遇督府周防嚴宻文長恒戴敝烏巾衣白布澣衣非時闖入或出昵飲夜深猶開㦸戸以待嘉則嶽嶽不阿少保遥望見必起立甞讌將士於爛柯山酒酣樂作嘉則於席上賦凱歌十章吟至狹巷短兵相接處殺人如草不聞聲少保起捋其鬚曰何物沈郎雄快乃爾命刻石置山上及少保死請室中嘉則走哭墓下持所為誄遍為訟寃比於文長懼禍發狂者相越矣嘉隆間士大夫以篇什相髙最繁富者莫若弇州於時吳明卿之甔甀洞汪伯玉之太涵李本寧之大泌山房諸集以及劉子威馮元成余仲房屠緯真之徒糟丘肉林愈多愈􅁾下及布衣如王承父王百穀輩咸以多相尚嘉則先後積詩七千餘夫安得精然絜之承父則雖饒腐菌間有神芝即屬棼芻不無遺蕙非若請君之叢箐荒茅紛然彌望也大樹村劉氏少婦打虎行潤州城南山簇簇四月麥黄桑柘緑大樹村頭劉氏居短牆幽院參差屋曉炊未罷日始髙窣地猛虎来咆哮老小出門盡驚走犬亦吠虎聲嗥嗥虎聞犬聲急轉步一口斃之如搏兔欲從虎口奪狗還老嫗抱孫逢虎怒劉家少婦奪老姑氣猛視虎如匹雛手持鋼义刺虎目虎血濺面紅糢糊昨從大樹村前走少婦滌場猶髽首弱體孱然花不如徐家女子劉松婦抗首抗首望西秦朝廷急用人玉關疎控扼紫塞滿荆榛痛昔籌邊賦錦衣衛經厯沈錬所上有賦憐君侍從臣誰為謝安客談笑淨風塵送箕仲之衢州古路三衢外青山太末餘樵迷仙子質廟過偃王徐楚橘秋全熟吳楓江漸疎舊游題石處好為一躊躇顧晉卿席上聞其弟益卿憲副南越之捷喜而賦之廿年豺虎劇縱横百粤遥傳一日平再睹樓船横海出更標銅柱伏波名天青馬嶂春銷甲雨過龍川夜洗兵誰道虎頭非將種請纓原只是書生浣紗石不見浣紗人空留浣紗石石邊春草痕想見羅裙色凱歌銜枚夜度五千兵密領軍符號令明狹巷短兵相接處殺人如草不聞聲蘭皋竹枝東村西村姑􅁖啼家家麥熟黄雲齊春蠶作繭桑園緑睡起日斜聞竹雞過崑山桃花楊栁共西灣曽唱菱歌帶月還春色茫茫今莫問滿城煙雨過崑山無題夢裏相逢恐未真世間何物不傷春馬蹄明日天涯路誰是燈前昨夜人王寅二首寅字仲房一字亮卿歙縣人有十岳山人集汪禹又云亮卿詞意超逸詩話仲房少走大梁問詩於獻吉不遇遂從少林僧習兵杖海上用兵依胡尚書督府尚書不能用竟以敗晚緝鄉人之詩曰新都秀運集其持論頗偏與岳東伯今雨瑶華相類吳山秋晚有客閒居無奈閒為看秋色一躋攀百盤細草斜陽路二曲澄江隔岸山野寺最宜紅葉後孤鐘偏在白雲間賞心又得逢僧話此後幽期數往還答金在衡訊歸秣陵宮樹葉初飛客路何人為授衣我亦驚秋同海燕故鄉端在社前歸康從理四首從理字裕卿永嘉人有二雁山人集胡元瑞云裕卿近體閎麗翩翩布衣之雄詩話裕卿任俠談兵間閼戎幕劉將軍子髙建纛毘陵病革裕卿馳赴與訣經紀其喪扶其柩至武林逺近皆義之居燕偕黎惟敬輩游西山其倡和詩僅存餘多散佚太倉曹子念收而刻之再至京口有懐金焦舊游層城舒逺目迢遞送歸鴻嵗月更新厯江山憶舊蹤鐘聲春浪靜燈影暮流空媿有東林約無因問逺公同王必漸言懐江頭木落鴈初飛客子傷心賦授衣鄉夢不縁千里隔浪遊空說半生非雲山是處堪招隠塵海何年可息機漫向天涯愁極目幽懐已負北山薇懐顧太學登樓風雨暮蕭蕭久客離魂黯欲消楚樹吳雲春寂寞塞鴻江燕嵗迢遥新愁芳草天涯路舊事梅花月下簫今日分飛悲萬里憑闌搔首思無聊送陳京兆致政還白下挂冠東去共稱賢天外浮雲意渺然不是逢萌因世難祗縁𢎞景嗜神仙琴中白雪驚人調江上青山負郭田無限長干花栁色春風不乏杖頭錢郭造卿一首造卿字建初福清人諸生為少保戚繼光幕客有海嶽山房存稾葉進卿云建初詩諸體無不工冦退鄉人回口占代書城南烽火近何如留滯無從訊起居百里便同千里隔家書翻比捷書疎清秋涕淚唯懐土白髪庭闈正倚閭欲冩愁心愁不盡憑君傳語到吾廬王翹三首翹字叔楚蘇州嘉定人嘉靖中倭亂甞居幕府贊軍事有小竹集詩話叔楚工畫竹予甞覩其真蹟為賦長歌不知其幕府才雄也邑人侯大年述其繪草蟲更精惜未得見小竹集一冊中間贈酬諸將之作居多賞火謡并序吳城六門莫盛於西閶六月初賊舉火焚楓橋達晝夜時宰坐脾睨間飲酒顧望無異平日時烈風大作煙焰蔽天不辨咫尺哭聲遍城内外或指城上云勿啼哭看城上賞火吁有是哉作賞火謡金閶門外賊火赤萬室齊燒纔頃刻城頭坐擁肉食人對火銜杯如賞春城中哭聲接城外宰獨何心翻痛快憤兵獨有任公子夜半巡城淚不止縋城躍馬出沙河義師都向湖心死客夜山月漸髙低燭光有客逗遛衣滿霜凄凄獨夜還自語茫茫一水遥相望黄花勸酒酒不醉白石放歌歌轉長弧矢天涯男子事錯將岐路卜行藏秋懐碧天大火未全收一雨空庭帶葉流不為無家悲落莫他鄉燕子早知秋明詩綜卷五十四
