body:
  text: 明詩綜卷六十四翰林院檢討朱彛尊編張以誠一首以誠字君一松江華亭人萬厯辛丑賜進士第一授翰林修撰升右中允終右諭徳有酌春堂集贈蕭大將軍移鎮漁陽鳴沙城北接雲中千里飛狐一道通十萬健兒齊上馬旌旗獵獵動秋風王衡六首衡字辰玉太倉州人萬厯辛丑賜進士第二授翰林編修有緱山集髙孩之云辰玉詩清新踔越卒歸諸雅靜志居詩話緱山才氣無前而韶年相酬和者不過陳仲醇一流臨終自訟曰吾於詩窺其藩未造其域可謂得失寸心知矣惜也未盡其藴雨中徐州道上鄉山看在眼愁向暮山生驛舎清明雨人烟芒碭城花飛急流盡雲起大河平一路茫茫白歸心亂旅程十月此日田功晏未誅冬月茅雨收紅豆莢霜老木棉苞地薄秋畦苦官新雜稅交君看窮鳥至嵗暮亦登庖十月十五日册封分藩琅函五色下芝宫十月陽春驛樹紅夜半日輪重海上天邊星影照江東老臣涕淚謳歌裏㳺子衣冠拜舞中檢㸃退思真過計當年園綺幸無功穀城出山逢老人入山化黄石千載石人前紛紛拜行客支硎即事夜來月暈半無光今日風來不可當我勸㳺人且歸去百花如雨下山塘錢江浪淘沙聞道山隂雪半消北連湖水下桐橋桃花浪起衝沙破恰好東風上白鰷鄭以偉二首以偉字子夫上饒人萬厯辛丑進士改庶吉士授翰林檢討歴左贊善右諭徳左庶子少詹事升禮部右侍郎進尚書兼東閣大學士加太子少保有沍泥集徴兵羽書諸道召勤王羅幕營前送啓行隆萬邊兵恒十萬薊門但付戚南塘霜降疏請謁徳陵萬壑哀湍霜葉丹橋山劒舄碧天寒祾恩殿下千行淚白髪當年舊講官蔡毅中一首毅中字𢎞甫光山人萬厯辛丑進士改庶吉士授翰林檢討降麻城縣丞升行人司副遷尚寳司丞降長籚鹽運司判官再入為行人司副改國子司業進祭酒升禮部右侍郎兼侍讀學士秋興木落江空天氣清西風蕭颯雁南征浮雲暗逐年華變岐路虗憐短鬢生千里闗河懸客夢萬家砧杵動秋聲崇蘭芳芷依然在何處江潭弔屈平公鼐二十四首鼐字孝興䝉隂人萬厯辛丑進士改庶吉士授編修厯少詹事禮部右侍郎謚文介詩話言詩於萬厯則三齊之彦吾必以公文介為巨擘焉即其論詩大指云風雅之後有樂府如唐詩之後有詞曲聲聽之變有所必趨情詞之遷有所必至古樂之不可復久矣後人之不能漢魏猶漢魏之不能風雅勢使然也如漢朱鷺翁離之作魏晉諸臣擬之以鳴其一代之事易名别調當極其長豈以古今同異為病哉後世文士如李太白則沿其目而革其詞杜子羙白樂天之倫則創為意而不襲其目皆卓然作者後世有述焉近乃有擬古樂府者遂顓以擬名其説但取漢魏所傳之詞句模而字合之中間豈無陶隂之誤夏五之脱悉所不較或假借以附益或因文而増損跼蹐牀屋之下探胠縢篋之間乃藝林之根蟊學人之路阱矣以此語於作者之門不亦恧乎夫才有長短學有通塞取古今之人一一强同則千里之謬不容秋毫肖貌之形難為覿面若曰樂府則樂府矣盡人而能為樂府也若曰必此為古樂府使與古人同曹而並奏之其何以自容哉李于鱗曰擬議以成其變化噫擬議將以變化也不能變化而擬議奚取焉又云律詩出於古詩而難於古詩七言後於五言而難於五言故七言於諸體中最不易工古今長技惟杜氏耳杜氏之長則秋興懐古諸將數篇而已近世擬作甚多大率淺率牽合觀者厭焉又贈邢子愿長歌云為君歴代選宗工前稱𢎞正後嘉隆北地雄渾真大雅步趨盡出少陵下汝南俊􅇣誠天然邊幅姿態未全捐濟南匠心竒且麗藻繢無乃傷辭意武昌才美謝諸君節制之師獨出羣東呉囊括靡不有利鈍未能免人口大抵明興只數家瑜者從來不掩瑕餘子紛紛未易説擬議原非吾所恱丈夫樹立自有真何為效彼西家顰葢力攻摹擬之非然觀其七律仍以歴下為宗故有文章一代李滄溟之句同時名家者馮用韞于念東王季木皆拔萃者也唐蒙有絲唐蒙有絲不可以縫戴星有穀不可以舂天有匏𤓰其誰食之海有昆布其誰衣之飛鳥依人不可與語嘉樹蔽身不可與處鶴飛于天其鳴在隂魚沉于淵其潛在深客從逺方來客從逺方來貽我雙文禽置之巾箱中寳惜如兼金朝夕供飲啄顆粒比璆琳羽翼日以長翻飛歸逺林去不歸故棲來不懷好音聚散自恒理眷戀傷予心積羽投洪波誰能定浮沉臨崖激翻車誰能論髙深詠古二首齊糾亡公子乃有從死臣田横士五百臨難皆隕身西京萬億衆符命爭羙新古來稱得士惟在意氣真推心置人腹豚魚亦相親古人獲我心善達窮通理安危慮所居屈伸貴自巳已貴可復賤中立常不倚衰至易生驕腊毒恒在美薛公僅遺榮疏傅庶知止寥廓晞冥鴻矰繳安可擬歸田雜詠三首導汶自艾山南流達新甫東蒙配岱宗其首挈鄒魯一山一水間幽勝略可數薄營本荒陬芟除闢宿莽雙溪作襟帶連岡若環堵結屋八九間開徑數十武欹仄植亭棧夷曠築場圃畚鍤連朝昏胼胝易寒暑但求静者便不厭作者苦避地恐不深吾必在汶上曠野多平疇㳺目足自廣南岡一握中林麓稍森爽石壁拓精舎石門斸新壤陽崖連隂峰遨遊愜心賞呼兒荷銚鎒攜儷治績紡既欣禾豆登復見桑麻長八口可無饑亦足代禄養豈足規達人庶幾屏塵想逺遊得暫歸機事乆方釋漸與朝市逺轉戀林野寂田疇日以親風雨頗相習農人告及春欣然顧襏襫負杖桑隂午荷鉏麥隴夕遶屋榆烟暝隔水棃花白逺目任縱横安步隨偃息一區安蓬蒿一盂飽橡栗溪山本不亷琴酒堪自適擬杜遣興人苦不知足有願何終極當其入天門猶未厭羽翼一朝成蹭蹬唾井無復惜昔日李將軍灞亭人不識秋夜河之水清泠泠漾月色明空庭對牛女此夜情願為乾鳥飛青冥相思宛轉何時平濟河道中汶水南通楚清河北帶齊故山雲淰淰長路草萋萋野曠秋天闊峯髙夕日低前村疑漸近轉盼暝烟迷穆陵闗昔日齊侯履南疆盡此封諸山沂作鎮五岳岱為宗沂山亦名東太山霸國猶餘業重闗識舊蹤故園相去近回首海雲重棲霞邠都宫丘長春成道處乗槎涉弱水陟降迄仙都石室誰開闢丹臺跡有無十洲為近地五岳識真圖坐聴鸞笙晩勞峰天外孤南竺感舊鐘磬重巖裏楸梧亂石間水窮仍見水山近却無山感慨因懷舊淹留為愛閒自嗟塵網繫雖倦不知還過蒙隂舊城山家留飲故堞依山麓相傳漢舊城桑麻千畝遍梧竹一邨平客醉遲歸意來希重别情出門逢野老重與話躬耕辛丑得第赴館年逾仕矣釋褐明經暮操觚祕館嚴因知進士少唐諺五十少進士不遂老夫潛慣見蒼龍礎通典舉人獻充庭詩充庭初識蒼龍礎仍攀翠羽簾洞冥記漢武帝招賢閣以翠羽為簾傫然諸俊後白髪㡬莖添梁臺遇雨不見梁臺月孤亭暮雨昏感時思艮嶽懐古問夷門苑竹龍鍾發宫槐兎目存星軺疎應接白鳥對開尊諸將上谷漁陽拱帝京相連河外受降城一從塞馬來南牧遂使王師罷北征絶徼尚傳青海箭中原新動緑林兵主憂正值宵衣日誰向天山答太平過漢髙祖廟豐南松柏晩蒼蒼漢祖遺宫古道傍父老祗今餘涕淚風雲依舊各飛揚一抔事業歸陵土萬嵗神靈在故鄉却憶炎精銷歇後千秋王氣屬吾王習家池峴首岧嶤漢水長習家烟樹野亭荒羊公流涕山公醉並枕殘碑卧夕陽西郊金主釣臺花石遺京陷戰圖薊門衰草釣臺孤不知艮岳宫前叟得見南兵入蔡無畿南問宋遼戰地戰勝河東下薊丘髙梁失御陣雲愁六飛不入燕山府直見鑾輿到廣州明湖獨眺窄岸平橋萬栁斜半城春水半人家東風吹雨宵來急一片鄉心到海涯南樓十二樓開列玉京分明天上落層城檐前寂寂三珠樹半夜鶴飛枝上鳴掖縣道中齊疆行盡海雲生處處看山自問名麥秀漸漸桑柘緑馬頭不見曲侯城董光宏二首光宏字君謨鄞縣人萬厯辛丑進士除刑部主事歴員外郎中出為河南提學僉事轉參議副使參政遷陜西按察使江西右布政入為順天府尹升南大理卿致仕加南兵部右侍郎有秋水閣集補陀東南澤國半往往饒異蹟大海峙補陀懸崖㡬千尺層波山震撼斷柎石蒼赤明滅九㸃烟超忽萬里舶翻風鷙鳥退近岸亂帆擲西方有聖人東海乃其宅年來詔使至旛幢颭巖石我亦飛渡來流覽感今昔摩挲薝蔔花四望曉天白許昌道中青郊小雨裛㳺塵正是芳菲一半春花栁故園應共笑主人嵗嵗作行人許獬一首獬字子遜同安人萬厯辛丑㑹試第一賜進士出身改庶吉士授編修有許鍾斗集孟夏陪祀太廟仿顔延之郊祀歌皇祖於昭賓於帝里照臨萬方匪逺伊邇享祀苾芬陟降來止其祀維何大輅玉几穆穆皇皇百辟卿士其徳馨香升聞不已皇祖居歆醉飽具起孝孫有顒報以繁祉自今伊始雷思霈一首思霈字何思夷陵州人萬厯辛丑進士改庶吉士授簡討有嵗星堂集北郊鷹房作遼城金壘古鷹房羊角風沙接大荒野窟蒨無狐兎蹟小池今有芰荷香黄鸝獨語遮深栁粉蝶叢飛戀短牆千古幽州還禹甸卜年開統憶先皇袁懋謙五首懋謙字吉卿豐城人萬厯辛丑進士改庶吉士授兵科給事中有虎溪詩選擬古二首行者日以行思者日以思日月相代謝荏苒踰嵗時君子在萬里獨宿誰與怡徘徊増感傷託夢通音徽音徽不可接涕泣沾牀帷披衣還起立東西迷所之熠熠花間螢照我庭東廂髙飛不能起歛羽舒其芒云是腐草化耀此𤣥夜長逢時被渥澤朽質自生光山中晩歸晨出後鳴雞夕歸先倦馬山烟已染衣望之在平野霞光逐日散暝色浮空下追羣獨鳥飛韻壑奔流瀉事去無中戀情來非外假入門誰為娛村釀聊可把同年郭太素從廣陵攜姬人為白下之㳺賦别白門花月可憐宵宛轉朱欄映畫橋怪得彩雲飛不散玉人新度廣陵簫東封日本歌司馬頻年苦運籌東封擬解廟堂憂如今却似商人婦愁水愁風望去舟詩話此嘲東明石尚書拱辰作也俞彦十首彦字仲茅太倉州人萬厯辛丑進士除兵部主事歴員外郎升光禄少卿有擬古樂府詩話少卿擬樂府自南北朝入亦是解人第篇幅稍長輒未合古此韓退之所云不造其堂不嚌其胾者也企喻歌新降吐谷渾齊唱部落稽唶汝勿復驕來聽企喻辭琅琊王歌二首金陵山四圍都城帝王住江水從西來淮水東南注北面望琅琊可憐盡空闊鹿挺走他山復藉豐草活淳于王歌鬱鬱田中禾禾熟自成穗沉沉合歡帳獨寢不成寐讀曲歌與歡橋頭别楊栁纔垂絲空局不著子㝷思未有棊雍州曲可憐南雍州形勝山四抱南湖與北渚都上大堤道作蠶絲蠶老變作蛹吐絲外成繭但見外綢繆中心無由見自君之出矣自君之出矣心惄如調飢思君如貪吏無有饜飽時折楊栁二月江水平春洲春樹生垂楊復垂栁新雨更新晴蕩子年年别東風嵗嵗晴捉搦歌兩馬異力問輿騶兩絲異色問離婁兩狐異革問司裘兩人異處問蹇脩孫光裕一首光裕字子長嘉興人萬厯辛丑進士除建昌知縣補固始擢山西道御史升南光禄少卿有亷善堂集酌酒與求仲君不見塞上翁失馬不足憂得馬不足喜禍邪福邪迭相倚世事大都皆若此邯鄲婦嫁厮養兒宿瘤身入齊宫裏紛紛好醜難具陳好醜由天不在人大夢之中還説夢浮漚聚散蠖屈伸百年能得㡬時樂十九憂愁病與貧吁嗟乎侏儒飽欲死東方饑欲死才人坎壈自昔然落落寧惟吾與子且須飲酒醉莫辭人生亦貴適意耳趙士諤二首士諤字謇卿吳江人萬厯辛丑進士除㑹稽知縣入為職方主事調考功司厯文選郎中遷太僕少卿以僉都御史巡撫宣府有中丞詩選送周蓼洲吏部久繫中朝望嘉招慰物情不誇津地重獨喜市門清是處成蹊徑憑誰秉國成渙羣今日事行矣慎持衡來季方還蕭山仿彿經過三十秋年年盼望越來舟㡬番夜雨曽聮榻何處春山不共㳺往事茫茫渾是夢故人落落總堪愁老來轉覺難離别欲去還期十日留蔡善繼一首善繼字伯達烏程人萬厯辛丑進士除莆田知縣調香山入為工部主事歴郎中改兵部出知泉州府歴湖廣福建左右布政使有去去齋集春日閒居幽棲未擬絶塵寰楚帝橋西水一灣樹裏暗浮鄰寺塔樓頭青入傍城山不緣好客寧沽酒祗為髙僧遂出闗春鳥自鳴花自舞禪心竟日與雲閒譚昌言一首昌言字聖俞嘉興人萬厯甲午鄉試第一辛丑進士知常熟婺源欒城三縣遷南兵部主事歴員外郎中升福建參議提學轉山東按察副使以參政卒于官贈太僕寺卿有狷石居遺集詩話譚公宰常熟識瞿起田於諸生中移婺源盡鐫徽國文公遺書儲之髙閣課士子誦習迨視學于閩杜絶請託試卷不假一人寓目皆手自甄綜案未發公子來省覲寄食旅店中不許入廨嘗自謂此官可棄此案不可移葢視學三年而鬚髪盡白矣分守東萊有濰令與遼將相構遂以遼兵叛聞巡撫初蒞倉皇入奏檄登兵㑹𠞰登營多遼人偶語籍籍公大言曰遼將吾將遼民吾民誰敢言發兵者入營握遼鎮李性忠手令馳箭諭濰營將士皆感泣毛帥在島門舉朝交倚為重公獨以東江進兵為贋局曰此登冦爾公以積勞嘔血死思陵即阼䘏以死勤事諸臣特贈公太僕卿公在留都結詩社讀史社詩愛孟襄陽第不多作贈吳興蔡叟先生無俗侣野鶴與同羣奕對包山橘書開石室芸白蘋雙槳渡紅葉五亭分髙隠看誰似將無鄭巨君徐禎稷一首禎稷字叔開松江華亭人萬厯辛丑進士除刑部主事歴員外郎中出知䕫州府遷按察副使獨木橋獨木橋林下渡蔓草徑山前路杖藜躡屐閒來去不怕秋風與秋兩君不見六州都督三軍將轅門馬道廣十丈飛虎風開赤羽旗盤龍日灼紅絲世塗自合有翻覆蒼茫眼㡳生陵谷北闕霜摧壯士心西郊雨暗孤臣哭噫嘻東門黄天不肯牽赤血要灑咸陽阡傅淑訓一首淑訓字啓昧孝感人萬厯甲辰進士滁知濮州調澤州入為工部員外進郎中出知平陽府升山西按察副使㝷提督學政歴陜西參政四川按察使遷太常少卿累遷戸部尚書題香積寺平甸草鋪似繡髙峰石削如門牛羊十里五里雞犬前邨後邨趙彦復一首彦復字㣲生杞縣人萬厯甲辰進士官至湖廣按察副使有趙㣲生詩選汪明生云㣲生古詩有河梁之遺響下亦不失寳厯流風近體詞以興成格由骨振寧律不諧不使句弱詩話微生牽絲作宰不以簿書廢吟咏晩輯李獻吉何仲黙王子衡孟望之薛君采髙子業劉子素張助甫謝茂秦九人之詩目曰梁園風雅而以已作附之以為獻吉籍本扶溝聚族於斯婚嫁於斯長子孫於斯營丘墓於斯非梁人而何君采之先出自偃師而隸武平赤籍茂秦為趙王客因卜居子孫遂留不歸鄴志載在流寓故亦入選中州之文獻得存其略焉雨髙雲不可即飛雨作泥塗多難詩篇減新凉病骨蘇貧仍雞鶩食愚任馬牛呼往事庸堪問空嗟白日徂黄儒炳一首儒炳字士明廣州順徳人萬厯甲辰進士改庶吉士除編修歴右中允左諭徳右庶子遷南京國子祭酒升吏部右侍郎轉左侍郎兼翰林侍讀學士有影木軒集經始興江口三楓亭下路不盡瘴雲鄉亂石千峰落斜階一水長樓船通漢將鐃吹發陳王往事東流盡棲鴉遍夕陽汪煇一首煇字徳仲休寧人萬厯甲辰進士改庶吉士授編修厯官吏部左侍郎協理詹事府事春日山行過嬾倦宦遊歸來且多務命駕偶山行始叶泉石趣入澗窮窈窕陟峰出雲霧細雨灑春寒輕風飄日暮俄為桑門訪忽值友生顧蔬酌供野興晤言寫情素髙原恣遐眺幽徑暫閒步眷此永日歡信彼頽齡度城市苦氛囂誰能舎之去周炳謨一首炳謨字仲覲無錫人萬厯甲辰進士改庶吉士授檢討歴贊善諭徳少詹事以禮部右侍郎協理詹事府事卒諡文簡登雞鳴山寺琳宫突兀雞鳴嶺極目風烟天地寛山疊亂峰來北岳水連千峽入桑乾誰人禾黍谿邊種㡬處牛羊谷口看塞下只今歌樂業幕南昨日到呼韓吳應𤦺一首應𤦺字景韓桐城人萬歴甲辰進士官大理卿滇中有懐南詔春深暮雨昏懐歸畏有簡書存三年雪鬢行荒服萬里冰心答至尊永夜衰親頻入夢何時稚子一迎門龍眠櫻筍聞無恙短褐黄冠是主恩劉士驥一首士驥字允良禹城人萬歴甲辰進士官檢討長陵陪祀作赤縣歸真主青山鎖故宫玉魚沉永夜石馬立西風霜露秋容肅椒蘭祀典崇明禋鸞馭在濟濟駿奔同魏濬一首濬字禹欽松溪人萬歴甲辰進士官湖廣巡撫墟上詩紆迴巖徑轉嵯峨笑問蠻家第幾窠入市每衣芒木布出門時唱浪花歌峒丁慣筈殲狐矢獞女能抛織貝梭墟散盡投歸路去斷烟半隴罥荒蘿沈珣四首珣字㓜玉吳江人萬厯甲辰進士授中書舎人選山東道御史廵按貴州㝷轉福建參政歴湖廣按察使河南右布政司山東左布政使擢都察院右副都御史巡撫山東有淨華菴稾詩話先伯祖贈尚書君輿公為沈公分校京闈所拔其後申以婚姻公之曽祖漢正徳辛巳進士伯位隆慶戊辰進士同懷兄琦珫從兄璟瓚先後皆衣栁汁釋褐門才之盛甲于平江而子姓繼之文采風流代各有集則尤世禄之家所難矣晩愛逃禪所至廨舎輒事埽除或笑以為傳舍何必乃爾公曰宛其死矣他人入室吾未見故廬非傳舍也其達觀如是詩頗圓熟略與晜弟雁行春日懷長兄在燕聞道幽燕地蕭條異故鄉沙昏天欲黒春半草猶黄馬足衝霜冷鴻聲聴夜長今宵千里月飛夢舊池塘鄚州道中鄚州城北水連空蘋葉荷花處處風無數沙鷗飛上下馬頭仿彿見江東江南春繁花紅映赤欄橋楊栁新隄繫畫橈三十六陂春水碧滿船明月一聲簫女郎綺生卜居江上窈窕紅樓隔舊京重簾瑟瑟擁雕楹樓前咫尺官橋路認得蕭郎白馬聲王象晉一首象晉字子進濟南新城人萬厯甲辰進士授中書舎人遷禮部主事謫江西按察知事稍遷行人司副轉禮部員外歴郎中出為浙江參政官至浙江右布政使致仕卒鄉人私諡康節先生言志通籍三十年息肩猶未得靜中自㝷思永夜勞轉側來日苦無多胡不惜筋力富貴如浮雲百嵗猶頃刻世塗多險巇反覆無終極何不早挂冠戚友相親暱西塾課兒孫東臯藝黍稷早畢公家賦早完私家債濁醪聊適口麤糲堪供食八口可無饑四鄰好為徳時而曳杖游時而曲肱息一事不縈懷兩耳常緊塞用以怡吾神徜徉華胥國樊良樞二首良樞字尚黙進賢人萬厯甲辰進士厯官廣東右布政使有三山二酉等集暮春登滕王閣江上春歸思渺然危欄百尺瞰寒烟美人南國銷芳草帝子東風怨杜鵑半嶺孤雲銜落照一颿逺水淨浮天月明十二樓頭曲夜夜吹簫到客船登岳陽樓楚館迢迢楚水長雨餘新漲下瀟湘九歌緩節迎河伯千古傷心弔國殤肉食㡬人憂社稷野謀無計奠疆場衡雲莫障長安日搔首青天望帝鄉祁承㸁一首承㸁字爾光紹興山隂人萬厯甲辰進士授寧陽知縣調長洲遷南刑部主事轉兵部厯員外郎中出知吉安府京察謫沂州同知稍遷宿州知州入為兵部員外歴河南按察僉事副使江西右參政有澹生堂集詩話參政富於藏書將亂其家悉載至雲門山寺惟遺元明來傳竒多至八百餘部而葉兒樂府散套不與焉予猶及見之其手録羣書目八冊今存古林曹氏寺中所儲已盡流轉於姚江禦兒鄉矣聞警醫巫閭下水東流填盡枯骸剩作丘當局豈皆肉食鄙􅅖觀寧盡杞人憂既知殘奕惟爭劫坐視危檣欲覆舟可是樞臣饒逺策故將鎮靜作良謀閻世科一首世科字伯登太原人萬厯甲辰進士除湖州推官入為主事歴郎中出知河間府轉布政司参議楞伽臺垂老投簪稳憑髙對酒閒江風梳白髪海霧羃青山日極秋天逺身依暮鳥還禹功遺跡在千載喜追攀劉𦙍昌一首𦙍昌字燕及桐城人萬厯甲辰進士知宜黄臨川廣濟三縣遷南京大理評事歴官興化知府有遷草覲草遊草潘蜀藻云廷評詩不假思索衝口而出往往有逸氣間似香山増城流杯石増江有怪石形容類虎丘亦可坐千人而多巖厓幽曲澗自天成或云鬼斧修仰承千丈泉驚湍變安流土人不好事經年罕來游我行及暮春風日妍且柔結伴得數子大半髙陽儔脱舄坐曲澗杯盂任所投欲去忽復往將沉還能浮徘徊若就人想為知已留觀者盡拍手我意徒夷猶歎息下山去空坡驅牛羊范汝梓一首汝梓字君材鄞縣人萬厯甲辰進士除工部主事謫酉陽宣撫司經歴累遷任襄陽推官入為刑部主事歴員外郎中出知延平府拾遺謫襄陽同知㝷守襄陽卒于官采蓮曲風吹荷葉十里香采蓮女兒矜豔妝櫂聲驚起雙鴛鴦雙鴛鴦何處宿白蘋灣紅蓼谷戴耆顯一首耆顯字令微桐城人萬厯甲辰進士禮部主事有梳河集南旺湖古為陸地云即大野異代南湖水猶存大野名秋風一夕至蘆荻有餘清蕩􅃞浮堤淨微茫入檻明時時隂雨裏髣髴魯諸城明詩綜卷六十四
