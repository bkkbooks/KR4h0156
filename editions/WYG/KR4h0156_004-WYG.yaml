body:
  text: 明詩綜巻四翰林院檢討朱彞尊編汪廣洋三十一首廣洋字朝宗髙郵人洪武初為中書左丞封忠勤伯拜右丞相尋貶廣東有詔數其罪自縊死有鳳池吟稾宋景濓云右丞以絶人之資博極羣籍作為詩章從征伐則震蕩超越在廊廟則莊雅尊嚴王徐子元云忠勤詩如瑶臺月明鳳笙獨奏元美云汪朝宗如胡琴羌管雖非太常樂琅琅有致傳俞汝成云右丞氣骨雄渾語意爽朗卓然可顧𤣥言云忠勤詞新調閒不失唐人大簡髙穆敬甫云汪詩如春林舒葉嬌鳥羣飛又云朗有致構思頗覺不苦静志居詩話忠勤詩饒清剛之氣一洗元人纖縟之態五言如平沙誰戲馬落日自登臺湖水當門落松雲傍枕浮懐人當永夜看月上疎桐對客開春酒當門埽落花天垂芳草地漁唱夕陽村倒藤懸宿鳥絶壁挂晴霓暮雲生楚樹涼雨過邗溝碧樹藏蠻邏清歌發蜑舟江雲垂暝逺楚樹入秋多濁酒傳杯重烏絲界紙勻岸沙留醉卧山鳥荅行歌晴光生北固暮雨隔西津溼雲纒戍鼓髙栁聚城鴉濁浪横衝海斜陽半在船雲木深藏廟淮流直到門沙明宜見雪月上可行舟涼風吹雨過好鳥背人還春杯黄􅐕酒野飯碧芹羮欲往尋芝草因之采茯苓可入唐人主客圖静居北郭猶當遜之毋論孟載也别知已北風吹征帆飄飄西南馳山川聿修阻霜露忽淒其今我逺行邁豈不念嵗時翩彼晨飛鴻翱翔亦何之感我同袍友慼慼懐仳離仳離雖可懐觴酒當載持各言崇令徳金石以為期明發膏車待明發逶迤上河梁親朋羅祖餞冠蓋燦成章條風被原隰春日當載陽鳴鳥餘好音雜葩紛衆芳魴魚始登薦㫖酒屢充觴既醉復贐言欲去故傍徨維周仲山甫王命慎所將夙夜無有懈庶幾終允臧斯言啓深省勗哉何日忘過宜興西㫃廣韻於蹇切青青銅棺山下有郡西㫃㫃鹵居者多頗與市聲逺野篠接深塢疎梅照清淺一丘與一壑安分良足遣我行日驅馳適此遂逰衍登忠勤樓聽久孚賀架閣彈琴畫棟棲朝霞層檐宿秋霧振衣坐前楹援琴冩中素幽泉鳴澗深落花傷春暮油然聞至音令人起遐慕繁昌夾繁昌夾繁昌夾口江流狹波濤洶洶雲㝠㝠蘆葦蕭蕭風颯颯櫂郎三日無北風背牽百丈行澤中前歌未斷後歌發野煙孤沒驚飛鴻繁昌夾流深幾許繁昌人民夾前往苦竹截篙蘆縛舟打魚燒山自成趣人生處世何者榮一褐足以安其生但得有溪可漁有土可耕何用出入誇肥輕君不聞五陵公子多豪舉甲第連雲燿飛翥朝聞鼉鼔擊春風暮見彤扉鏁秋雨寄西掖諸友玉簫吹鳳皇闗月寫滄浪故國㡬時到髙樓今夜長候蟲啼露壁涼葉下銀牀無限懐人意裁詩逺寄將忠勤樓諸老夜直余時守省作詩寄之西掖延秋爽髙樓倚太清玉繩當坐轉銀漢近人明上相思經濟諸公任老成不知前席夜曽語及蒼生晚晴江上江水鴨頭緑楚山螺髻青鷓鴣啼不盡花發樹冥冥微風汎蘭槳落日過松亭勝境思彌愜漁歌隨處聽登蔣山望江亭次韻絶頂出華構有時來一登曽將六朝事閒問百年僧寓目誠多感投身媿未能暫留林下夕江浦散漁燈送院判俞子茂進兵番昜江東風日晴把酒送君行好慰三千士將收七十城煙花催疊鼓雲騎擁連營山國人争喜殊方自此清寄崔元初晴軒種竹罷好月到窓時坐我長松下歌君流水詩墓田歸野雀疎雨落山葵偶值南來使殷勤寄所思嶺南道中過盡梅闗路灘行喜順流潖江元到海横石不容輈嶺樹垂紅果汀沙聚白鷗從來交廣地還是古揚州灘行灘上水平沙梭舟蕩落花吳儂不相識對面浣春紗蘇溪亭蘇溪亭上草漫漫誰倚東風十二䦨燕子不歸春事晚一汀煙雨杏花寒山行米家圖畫不易得今日見山如見之偶上層巒縱游目不知駐馬已多時江上三首大山小山松樹齊千聲萬聲子規啼攬衣起舞夕露下三更月落吳城西褚磯口闊浪如山官船客船前後灣明日天晴大家喜看我鼓枻中流還象牙灘上百花開參差時復見樓臺翠香芹菜緣沙出雪色鰣魚上水來夜泊楊子橋楊子橋頭夜泊船水波纔定月初圓不眠細數經行日笑隔東風又一年嶺南雜詠五首牂牁流水碧潺潺潮落潮生草木閒一片海雲吹不起越人遥指是崖山鴈翅城東湧怒濤外洋水長蜑船髙莫言昨夜南風急今日登盤有海蠔越鹽如雪賽吳鹽藷蕷初肥竹筍甜何事眉山蘇太守只將雙蟹較團尖村團社日喜晴和銅鼓齊敲唱海歌都道二年生計足五收蠶繭兩收禾蠻落人家厭食魚兒孫生長不知書桄榔滿種緣山邏翡翠新收越海墟涼州曲琵琶初調古涼州萬壑風泉指下流好是貞元無事日玉宸宫裏按新秋竹枝詞三百六十灘水清桃花春漲近來生催歸不待臨岐語昨夜子規啼到明東吳櫂歌二首太湖茫茫水拍天呉儂只慣夜行船竹枝敲罷燈將滅風雨蕭蕭人未眠艇子搶風過太湖水雲行盡是東吳阿誰坐理青絲網遮得松江巨口鱸蘭溪櫂歌二首涼月如眉挂栁灣越中山色鏡中看蘭溪三日桃花雨夜半鯉魚來上灘櫂郎歌到竹枝詞一寸心腸一寸絲莫倚官船聽此曲白沙洲畔月生時晚過青河驛遡流西望渺如煙黄帽齊將百尺牽日暮雨來風浪惡隔河撾鼓換官船陶安二首安字主敬太平府人元末為明道書院山長王師渡江首率父老奉迎留置幕府厯左司郎中出知黄州降桐城令移知饒州仍改知黄州召為翰林院學士尋擢江西行中書省參知政事卒于官贈姑孰郡公追諡文憲有知新稿江行雜詠俞右吉云郡公謀略文章孝陵推為第一詩亦拔俗五古未免冗長耳寄豐叔良阿咸九月到寄我尺書看盡日不釋手空江頻倚䦨鄉山微雨外客夢一窓寒遥想林泉勝無憂寢食安湖鄉淝水新無警湖鄉頗有年稻田驅夜豕蓮蕩捕秋鯿邏卒黄茅戍歸人白板船數家依緑樹斜日照炊煙孫炎三首炎字伯融句容人國初辟行省掾尋以省都事總制處州㑹苗將叛被擒罵賊死追封丹陽縣男諡忠愍有左司集徐子元云左司詞氣豪邁類其為人渥洼神駒一蹴千里馬王元美云孫伯融如新就銜步驟未熟時見輕快詩話伯融至正中與天台丁復同郡夏煜皆以詩名下筆百紙立盡譎處似李長吉質處似元次山在處時明祖命招致伯温伯温堅不肯出以寳劒遺伯融伯融作詩以為劒當獻天子封還之伯温無以荅乃逡巡就見而李時逺詩統謂此劒左司家藏作歌以贈劉者誤也寶劒歌寶劒光耿耿佩之可以當一龍直是隂山太古雪為誰結此青芙蓉明珠為寶錦為帶三尺枯蛟出氷海自從虎革裹干戈飛入芒碭育光彩青田劉郎漢諸孫傳家惟有此物存匣中千年睡不醒白帝血染桃花痕山童神全眼如日時見蜿蜒走虚室我逢龍精不敢彈正氣直貫青天寒還君持之獻明主若嵗大旱為霖雨題好溪圖送憲使黄繼先君乘馬望君來栝蒼下君乘舟望君來好溪頭好溪水生玳瑁魚好溪水生明月珠好溪水生青珊瑚使君來此月再樞惟飲此水無一需使君之清水不如臨别贈君青絲轡隨君馬頭行萬里相思之心有如水贈黄鍊師留侯弟子有初平九嵗從師往玉京天與數書皆鳥迹家傳一劍是龍精瑶池桃核無消息海水桑田又淺清我為紫芝歌一曲夜深相荅洞簫聲全思誠一首思誠字希賢上海人洪武十五年以耆儒召為文華殿大學士兼左中允致仕有砂岡集寄題玉山草堂草堂中人天下竒昔聞盧鴻今見之鯨牙已出滄海厎鳳雛猶隱崑山陲村醪醉客飛鑿落竹牀卧月吹參差相知何必曽相識畫裏題詩寄所思鮑恂三首恂字仲孚崇徳人元末薦授翰林不就洪武四年㑹試充考試官十五年詔徵耆儒入見命為文華殿大學士固辭放歸有西溪漫稾周青士云西溪詩傳者絶少曩聞海鹽胡氏有刋本求之不得嘗見其題畫詩云山横紅葉晚寺鎻碧雲涼亦佳句也詩話湖州嘉興二志並云仲孚與安吉余詮上海全思誠髙郵張長年四人就徴考實録入見祗三人其同徴一人未至乃登州張紳非思誠也又洪武四年㑹試仲孚以前貢士與翰林院侍讀學士詹同同文國子監司業宋濓景濓吏部員外郎原本景道同充考試官是年主文官則禮部尚書陶凱中立前翰林院侍講學士潘庭堅升聞也王元美别集所述未合寓感迢迢漢川上有女麗且閒佩以雙明珠游戯清波間翩然若飛鴻可望不可攀贈我翡翠羽報之以秋蘭徘徊碧雲暮引領空長歎題吳仲圭平逺圖蒼山遥遥㡬千里緑樹叅差碧煙起雙帆忽從江上歸影落斜陽濕秋水林陰蒼莽鳥不飛石徑蹭蹬行人稀松根似可縛茅屋沙尾亦足容漁磯我嘗西遊倚江閣極目長空入寥廓好山不肯過江來恨不乘風跨黄鶴吳君畫手當代無落筆何年成此圖安能著我巖壑厎相覓老樵尋釣徒盛叔章畫煙濕空林翠靄飄渚花汀草共蕭蕭仙家應在雲深處秖許人間到石橋朱善一首善字備萬豐城人洪武初官至文淵閣大學士卒諡文恪有一齋集逺别辭送餘干令李謙山風淅淅兮雲悠悠木葉落兮天宇秋君胡為兮不返嗟久客兮淹留攬西山兮秀色泛東湖兮㺯明月樂莫樂兮新知心奚忍兮輕别山有虎兮湫有龍勞余思兮忡忡眇餘干兮何許揮五絃兮送孤鴻父老兮扶藜兒童兮竹馬侯之去兮我心悲侯之來兮我憂寫桂櫂兮蘭舟摻子袪兮夷猶南州雖好兮不可以久處嗟子去兮何以慰我之離愁宋訥八首訥字仲敏滑縣人元季官鹽山知縣國初徵為國子助教陞翰林院學士文淵閣大學士遷祭酒卒于官正徳中追諡文恪有西隱稾李時逺云宋公師道尊嚴為一代典型詩文渾健古雅同游諸儒皆推之詩話髙季迪之文蘇平仲之表箋泐公之詩當時文字之禍裂矣然其間遺民諸集類不避諱當王師之入燕也若王原吉丁鶴年戴叔能陳敬初輩其詩詞指斥未易更僕數宋公身厯通顯其過元宫諸詩悲涼酸楚雖初明通天之表子山江南之賦無以踰之他若華表柱頭相語鶴秣陵江上獨歸鴻半船涼色潮生海兩岸秋風浪拍沙縛蘆宻覆低低屋把竹輕撐小小船野航招客買蓮子沙鳥驚人入荻花夕陽野飯烹魚釜秋水蒲帆賣蟹船㫁壁野花迎客櫂壤牆津柳曬魚罾句亦自佳壬子秋過故宫八首離宫别館樹森森秋色荒寒上苑深北塞君臣方駐足中華將帥己離心興隆有管鸞笙歇劈正無官玉斧沈落日凭髙望燕薊黄金臺上棘如林萬國朝宗拜紫宸于今誰望屬車塵名聞少室徵竒士驛㫁髙麗進美人朝㑹寶燈沈轉漏授時玉厯罷頒春街頭野服儒冠老曽是花塼視草臣黄葉西風海子橋橋頭行客弔前朝鳳皇城改佳游歇龍虎臺荒王氣消十六天魔金屋貯八千霜塞玉鞭揺不知亡國瀘溝水依舊東風接海潮鬱蔥佳氣散無蹤宫外行人認九重一曲歌殘羽衣舞五更妝罷景陽鐘雲間有闕摧雙鳳天外無車駕六龍欲訪當時泛舟處滿池風雨脫芙蓉五雲雙闕俯人間嵗晏天王狩未還鸚鵡認人宫漏㫁水沈銷篆御牀閒朝儀無復風雲㑹郊祀空遺日月顔莫向邊陲動戎馬漢兵己過鐵門闗萬年海岳作金湯一望淒然感恨長禾黍秋風周洛邑山河殘照漢咸陽上林春去宫花落金水霜來御栁黄虎衛龍墀人不見戍兵騎馬出蕭牆清寧宫殿閉殘花塵世回頭換物華寶鼎百年歸漢室錦帆千古似隋家後宫鸞鏡投江渚北狩龍旗沒塞沙想見扶蘇城上月照人清淚落悲笳雲霄宫闕錦山川不在穹廬毳幕前螢燭夜游隋苑圃羊車春醉晉嬋娟翠華去國三千里玉璽傳家四十年今日消沈何處問居庸闗外草連天詹同十二首同字同文初名書婺源人元末為郴州路學正遇亂家黄州仕陳友諒為翰林學士承㫖歸附後賜今名授國子一云中書博士累官吏部尚書改翰林學士承㫖諡文憲有天衢舒嘯宋景濓云同文襟期瀟灑濟以雄博之學故體物瀏亮鏗鏗作金石聲徐子元云同文赤色精金與鍮鉐自别詩話同文與吳濬仲樂致和宋景濓齊名號中朝四學士吳樂韻語寥寥宋亦非其本色於四子中遂為翹楚清江曲清江水清峽水黄清江之上多緑楊浣花女兒立沙際青裙白足如秋霜蜀山雪消十日雨一夜扁舟欲齊樹兩岸猿聲不肯休送君流過峽川去北邙行纍纍北邙墳鑿石為虎羊憶昔𦵏此初爵封侯與王導以方相氏飄飄銘旌揚紫車雜縞騎鐃鼓喧周行執紼人如蟻哭聲動穹蒼相送至窀穸日暮下黄腸生既享華榮死亦増輝光焉知千載後無人奠殽漿寶氣夜忽露大盜發所藏不見馬鬛封但見白骨荒空留一斷碑龜趺卧夕陽遂令往來者過此生感傷感傷亦何為生死人之常陰陽有晝夜誰云無興亡萬物終消盡天地復渾茫何史垂功名何世存文章金石且不堅豈獨人久長秋夜吟桂樹叢叢月如霧山中故人讀書處白露濕衣不可去題方壺水石圖古壁之間屋漏痕淋漓元氣凝清渾道人山中守龍虎十日不見煙塵昬拂拭填作一枯木下有碎石分崑崙㫁劒插入怪厓厎老蛟迸出秋雲根神君怒立被𤣥髪欲騎鐵驥超天門當時揮灑妙莫測鬼物驚走如星奔青城仙伯絶筆久覩此髣髴其人存𤣥同隱者卧松雪得畫逺寄來江村却憶麻姑洞口樹使人一夜勞心魂題善原道韓幹黑馬圖善家堂上書滿厨古今名畫頻巻舒我來一見韓幹筆龍精自與凡馬殊𤣥鬛披披首渴烏紫瞳燄燄雙明珠黑雲一片忽墜地房星半夜飛神都御溝流水栁千樹圉人騎出拂春露黄金腰帶素花衣馬上回頭看飛絮絲韁在手不敢縱追風恐過龍樓去君不見向來畫馬只畫肉神逸之氣多不足幹遺真蹟世所稀使我見此思天育善家兄弟一馬驄此馬真與麒麟同白璧玉斗亦不換早晚持獻明光宫送徳安張用周遊廬山匡廬山髙雲氣多老木如石盤紫蘿松橋流水度金澗我昔結屋山之阿桑落洲邊種柑橘蓮花峰下尋芝术仙宫臺榭作比鄰每欲相從候丹術寄詩晝喚白猨來巡杏夜驅𤣥虎出飛仙别去今幾年海上不見回樓船思之夢繞瀑布水玉琴為奏氷絲絃張君多古學才器何卓犖紛紛文狸赤豹間五色麒麟生一角朝辭白兆山暮過黄鶴樓去觀五老峰翠色連天浮醉揮緑玉杯笑贈珊瑚鈎商婦亭前歌窈窕灌嬰井上嘶驊騮讀書白鹿之洞裏寫字洗墨之池頭匡廬清泉消百憂我所樂處君當遊霓旌羽駕在丘壑相逢往往皆仙流與君大藥駐光景人間回首三千秋髙暹獻天馬圖歌蜀人髙暹能畫馬令人往往愁龍化凡夫肉眼匪方歅世間誰是識龍者前年曉御慈仁殿佛郎國之天馬獻蘭筋虎脊渥洼姿長風西來起雷電侍臣傳敕貌真龍周郎為圖圖最工玉堂學士揭曼碩早朝奏賦蓬萊宫當時觀者集如堵敕賜金盤五色露天馬出馳海子東但見中天黑煙霧君不聞太宗奔虹赤𤣥宗照夜白唐初曽數江都王今之名畫亦難得吾聞髙暹善草書墨池向復飛龍駒黄鶴樓中獻馬圖藩王一見極所娯天機翦取雲錦段玉盌分賜葡萄珠好去京師謁周郎應見揮毫九天上翠華所駕皆龍媒何事江南繪屏障出獵圖朔風凜凜吹龍沙年年馬上長為家陰山大漠百草死獵遍青海濵天涯旌旗裂盡霜華濕萬騎貔貅似雲集蒼鷹歘起若飛電四尺神獒作人立什圍五攻兵法存發蹤指示知何人豈無詭遇獲禽者誰能為爾鸞梟分直將勇氣飽所欲寢虎之皮食虎肉生擒山下九青兕射殺巖前雙白鹿日暮歸來雪洗箭血灑腥風滿河曲穹廬散野如繁星凉月蕭蕭照平陸酪漿跪進瑪瑙盌黄面奚奴眼睛緑明朝滿馬䭾斕斑蕃王喜生紅玉顔焉知祝網三驅意但醉氍毹紫塞閒君不見暴殄天物焚咸丘畫師之筆學春秋還君此圖長太息使我忽憶比蒲蒐題松鶴蔡先生家藏李伯時西嶽降靈圖前二人騎行後三人徒步狀若馳獵者其最後則有雲氣神人居中嗟夫禹鼎象姦齊諧志怪世或有之但恨無胥臣之多聞子産之博物厯覽載籍未遑夷考模寫畫像為作短篇以俟知者龍眠居士畫入神展畫冥搜畫中意白日杲杲人出畋長風蕭蕭雲拂地前有一匹雪色駥次有一匹𤣥花驄兩人冠服何其雄若非將相應王公繁纓寶鞍金匼匝各持羽箭懸雕弓後有三人總徒步蒼鷹黄犬行相從雲中歘見光燦爛玉輅瑶輿下霄漢不駕紫鳳白麒麟海犀天駟多竒玩鸞旌虎節旋低昂星仗霞幢互繚亂無乃朝辭太華峰得非曉過雲臺觀輦中坐者真天人冕珠龍衮儼昭煥金童玉女繽往來慶雲為馭天為階長眉刷翠面如月知有道骨無塵埃令人可望不可及恍惚雲中相出入衣霑玉井碧蓮香旗翻仙掌露華濕我識泰山封禪書不識此畫當何如人言西嶽降靈圖西嶽或有人間無送黎蘭谷逰永川舟子開帆日天風吹雪時闗河歲將晏荆楚客何之水接三苖國雲迷二女祠經過逢北雁應有寄來詩題雲林丹房為葛元徳賦盤龍菴前翠可食道人鑿雲開竹房丹光出林如月白石髓滿山連水香每聞向此采芝术欲往從君愁虎狼展圗使我空歎息三十六峰清夢長題山陰草堂草堂正在匡廬山山陰緑玉相對閒雲從雙劒峰前下潮到小孤江上還茶煙滿室寫墨竹花雨一簾觀白鷴誰似南宫能篆古為君髙置軒忩間宋濓五首濓字景濓浦江人元末用薦除翰林編修以親老辭入仙華山為道士國初徵至授皇太子經居禮賢館修元史充總裁官仕至翰林學士承㫖兼太子贊善大夫正徳中追諡文憲有潛溪翰苑芝園蘿山諸集俞汝成云學士詩文俱著而文勝於詩然開國文獻之傳集固不可闕者嚴王元美云宋景濓王子克雖以文名而詩亦整妥切顧𤣥言云公文既博綜詩稍平易朗李舒章云公開國文士之冠猶襲元調朱詣云太史之文舍人璲之書評者以本朝第一目之韻語則非所長集雖多不作可也詩話王子克敘景濓集云古今文章作者未易悉數即婺而論南渡後有東萊吕氏説齊唐氏龍川陳氏各自成家而香溪范氏所性時氏先後又間出近則浦陽栁公烏傷黄公並時而作踵二公而起者為吳正傅氏張子長氏吳立夫氏當吕氏唐氏陳氏之並起也新安朱子弟子曰勉齋黄氏寔以其學傳之北山何氏而魯齋王氏仁山金氏白雲許氏以次相傳胡仲申敘王子克集云吾婺以學術稱者至元中則金公吉甫胡公汲仲為之倡汲仲之後則許公益之栁公道傳黄公晉卿吳公正傳胡公古愚卓立並起而張公子長陳公君采王公叔善又皆彬彬附和於下言文獻之緒者以婺為首稱合兩公之言繹之金華文章理學之源備於是矣景濓於詩亦用全力為之葢心慕韓蘇而具體者哀海東有序客有吏於海東者以能擊貪暴聞然終用是受誣嘔血死予友胡徵君為著哀辭一通予讀之甚悲竊取其意作哀海東傷妷女二操使善琴者彈而和之我哀東海而思之苦彼何人斯猛噬如虎我不擊之我民之憂縱不我與覆以我為仇蒼天雖髙冤其有極非血之嘔曷明心赤泱泱大風沈沈寒泉舍旃舍旃我尚何言傷妷女有妷者女顔如舜英詆我以醜我其何傷眩白為黑古亦多有自尤不遑敢誰之咎黄鵠飛來其音誾誾我心苟安何戚弗欣天上地下命也奈何我焉知其他灘哥石硯歌有序朱舍人芾雅士也近見灘哥石硯禁中遂摹搨一本裝池成軸懸之書齋命予作歌填其空處歌曰朱君嗜古米黻同三代彞器藏心胷灘哥古硯近獲見驚喜奚翅逢黄琮研煤敷紙巧摹搨訪我一一陳始終有唐四葉崇象教梵僧航海來番禺手持貝葉寫健相翻譯華竺談𤣥空辭義幽深衆莫識當時授筆唯房融硯中淋漓墨花濕助演真乘誠有功愛其厚重為題識七月七日元神龍鬼工雷斧琢削古天光電影生新容袤將四尺廣踰半作鎮弗遷猶華嵩涉唐入宋嵗五百但見寶氣浮晴虹南渡羣公競賞識氏名環列縈秋蟲朔元雖以實内府棄寘但使煙埃封方今聖人重文獻氈䝉舟載來江東風磨雨濯露精彩奉勅􅺢入文華宫宫中日昃萬幾暇侍臣左右咸雲從紫端𤣥歙盡斥去欣然為此回重瞳重瞳一顧光照日天章奎畫分纖穠有才沈霾恨巳久石如能語誇竒逢維昔成周全盛日兊戈𦙍衣并大弓藏諸天府遺孫子用以鎮國昭無窮願將斯硯傳萬世什襲不下古鼎鐘上明文徳化八極下書寛詔蘇疲癃君方執筆掌綸誥願以此言聞帝聰老臣作歌在何日洪武戊午當嚴冬題長白山居圖滿地雲林稱隱居燕泥汚我讀殘書五更風急鳥聲散時有隔花人賣魚宜興強如心避地而歸扁其居曰復初齋來徵予詩昔日欃槍照五兵今歸喜得見時平春風緑酒扶殘醉斜立官橋聽早鶯王褘十一首褘字子充義烏人國初徵為中書省掾詔修元史與宋濓同為總裁官書成拜翰林待制奉使招吐蕃至蘭州召還改使雲南抗節死建文元年贈翰林學士諡文節正統中改諡忠文有華川玉堂二集徐子元云子充詩亦純雅在俞汝成云忠文詩平易切實然當時與宋潛溪首倡浙東功不可泯詩話子充文脫去元人冗沓之病體製明潔當在景濓之右惟詩亦然南康郡齋書事郡廨新落成繁木蔭階戺稍欣吏牘稀麤覺民事理檐雀不相猜羣飲硯池水長安雜詩四首崔嵬終南山形勢甚磅礴西來挾崆峒東亘聮華嶽長雲覆重巒紫翠入寥廓杞梓産深林龍蛇蟄幽壑淑靈之所鍾宜有異人作如何千載間蹤跡轉蕭索姬旦不復生三代己云邈後來王佐才勞我思景略羣經載聖道昭昭如日星秦火一何烈燒燔滅其形漢儒事掇拾區區補殘零雖然有遺闕其功亦己宏唐世尚文學君臣益留情琬琰刻文字後先十三經謂兹金石堅不與竹帛并自從鴻都後此刻最為精羅列黌舍内奎璧映晶瑩我言金與石有時亦銷崩有形必有弊斯理詎難徵安知聖人道所託非所慿天地共終始猗歟罔能名步出城東門穹然見丹牆不知何王宫金碧猶煒煌云是元帝子分茅鎮此疆傳世僅三葉嗣𦙍今滅亡深宫閟珍果回溝亂垂楊撫物足流盼感時忽凝傷自古有興廢天道非茫茫人生百年中窮通無定跡譬如風前花榮謝亦頃刻當時牧羊豎尊貴今誰敵顦顇種𤓰翁乃是封侯客丈夫茍得時糞土成拱璧一朝恩寵衰黄金失顔色古昔諒皆然今我何歎息送許時用歸越舊擢庚寅第新題甲子篇老來諸事廢歸去此身全煙樹藏溪館霜禾被石田鑑湖求一曲吾計尚茫然秦州水積從天降山連與蜀通遺碑李廣宅廢寺隗嚻宫度隴遲迴際游秦感慨中長憐少陵老曽此歎塗窮澠池道中九月忽又暮吾行祗自傷秋兼人共老愁與路俱長野果迎霜赤園花帶雪黄故人相慰藉日晚引壺觴春日繡湖與徳元同行十里華川上年來足勝游雨花林下寺風柳驛邊樓漠漠芙蓉浦依依杜若洲平生身外事未許付浮鷗吳江客中冬至日十年奔走竟何依轉覺謀生事事非時序毎驚愁裏換家山長向夢中歸吳江嵗晚寒波積楚塞天空鴻鴈稀酒後登樓倍惆悵緇塵猶滿舊征衣桐廬舟中瀟灑溪山夢此邦輕風細雨過桐江川迴幾訝船無路林缺時看屋有忩野果青包垂个个水禽白羽去雙雙到家㑹值重陽節新釀村倍正滿缸張以寧十五首以寧字志道古田人元末官翰林學士承㫖明初例徙南京召為侍讀學士三使安南道卒有翠屏前後集陳廷器云學士詩沈鬱雄健者可追漢魏清婉俊逸者足配盛唐徐子元云志道髙雅俊逸超絶畦畛翠屏千仞可望不可躋王元美云學士韻語亦健氣格少完凌穆敬甫云翠屏健翮風急疾無前詩話承㫖重峰送别一篇仿太白可稱合作李方伯楨題雙燕圖寄人詩云君家吟谿北我家郡北西君家梁間燕我家梁間栖周尚書忱送人詩云我家白沙渚君家桐江頭我家門前水亦向桐江流當皆從此出可知是作膾炙當時送重峰阮子敬南還君家重峰下我家大溪頭君家門前水我家門前流我行久别家思憶故鄉水況乃一作何況故鄉人相見六千里十年在揚州五年在京城不見故鄉人見君難為情見君情尚爾别君奈何許送君遽不堪憶君良獨苦君歸過江上為問水中魚别時魚尾赤别後今何如林志尹秋江漁父圖江風揺柳雲㝠㝠小艚釣歸潮滿汀賣魚得錢共秋酌白酒船頭青瓦缾樵青勸酒漁童舞擊甌唱歌無曲譜船前野鴨莫驚飛我有竹弓不射汝予别黄巖十又六年謭焉徳薄父老當不復記然區區常往來於懐也如晦上人來見語亹亹不能休别乂依依不忍釋予不知何也賦此以贈朗公相見廣陵春自云家世黄山人老夫疇昔黄山客江海見之情轉親坡陀石上曽波雪遍海蓮峰白於月新詩句句鬭清妍髙誦長風動疎樾清晨言别索題詩我衰詩減黄山時春潮日夕海門去歸報山中耆舊知題海陵石仲銘所藏淵明歸隱圖昔無劉豫州隆中老諸葛所以陶彭澤歸興不可遏凌歊讌功臣旌旗蔽轇轕一壺從杖藜獨視天壤濶風吹黄金花南山在我闥蕭條蓬門秋穉子候明發豈知英雄人有志不得豁髙詠荆軻篇竦然動毛髮題句容同林景和縣尹子尚規登僧伽塔賦嵯峨崇明塔拔地一千丈我攀青雲梯倏到飛鳥上㣲風韻金鐸初日麗銀牓維時十月交葉脫天宇曠羣山東南奔平川疊波浪雲間三茅峰圜立儼相向碧瓦浮鱗鱗兹邑亦云壯雞鳴四闗開攘攘異得䘮塔中宴坐仙憐汝在塵坱古時登臨人今者亦何往俯觀世蜉蝣仰歎彼龍象乃知崑崙巔可以小穹壤同游皆雋英超遥寄心賞霜飇天際來毛髮颯森爽太白去千年吾何獨惆悵嚴州大浪灘東來亂石如山髙長江斗瀉湍聲豪蛟鼉奔走亡其曹青天白雲揚洪濤舟子撐殺白木篙長牽百丈嗟爾勞側身赤足如猨猱舟中行子心忉忉山木巃嵸杜鵑號夜飲醉歸贈王伯純是日王徳容程予初同飲嵗云莫矣客不樂青雨亭前翫孤鶴城頭愔愔雲下垂竹外騷騷風微作亭中王郎風格竒愛竹愛雪仍愛詩開尊酒好客更好坐中王程俱白眉紅爐照閣生春霧詩思騰騰天外去玉姬舞倦迴風來吹倒三山見瓊樹馬蹄蹴響客歸時留我更盡金屈巵塵空祗覺乾坤白飲醉那知賔主誰坐聞一聲兩聲折攜燈起看竹上雪瑶華翠色森陸離人影燈老兩清絶却歸覓紙醉自題烏啼舌寺風淒淒明年此夜知何處興發還應訪剡溪題焉致逺清溪曉渡圖致逺廣西憲掾子琬從予學今晨髙卧不出戸嵗晏黄塵九逵霧美人逺别索題詩眼明見此清溪之曉渡溪旁秀林昨夜雨落花一寸無行路歌欄桃葉人斷腸艇子招招過溪去紅日青霞半晦明白雲碧嶂相吞吐詩成君别我亦歸此景宛是經行處我呼九曲峰前船君帆正渡瀟湘渚鴈去㝠㝠紅葉天猨啼厯厯青楓樹是時美人不相見我思美人美無度美人之材濟時具我老但有滄洲趣他日開圖思我時溪上春深采芳杜送同年江學庭弟學文歸建昌白髮江夫子青雲信獨稀故人長北望令弟又南歸庭樹烏先喜江帆鴈共飛東湖春栁色到日上君衣泊河頭水長客路春將晚征帆日又曛深山昨夜雨流水滿溪雲渡黑漁舟集村空戍鼓聞故園頻夢去植杖己堪耘寄廣西叅政劉允中重臣授鉞殿南邦五月旌旗過上江青帶碧簪環畫省緑沈金鎖護油幢峒丁萬笠春耕野海估千帆曉渡瀧銅柱南邊相憶處尺書難寄鯉魚雙杭州歌西陵渡口潮水平十十五五放舟行樓中燕子慣見客不怕渡頭津鼓聲泊沽頭楚客歸心河水流三更月暈長年愁沙河雨漲催開閘半夜櫓聲無數舟有感馬首桓州又懿州朔風秋冷黑貂裘可憐吹得頭如雪更上安南萬里舟遇故人胡居敬臨江府送至新淦翠竹蒼松映白沙清江西畔是君家明年歸路重相問分食東陵五色𤓰劉三吾四首三吾初名如孫字坦甫茶陵人元末提舉靖江學洪武中用薦除左贊善陞學士三十年主㑹試以多中南人坐罪戍邊永樂中卒有璚署春坊北園知非化鶴正氣等集桐江俞藎知茶陵合為坦坦齋集詩話學士元之故老其詩雖不中程足補庚申外史當張士誠在吳海運阻遏元主以御酒龍衣請之不得及蘇州既平學士賦詩云姑蘇自王亦豪雄藩屏東南一旦空稉稻祗今誰阻遏海門元與直沽通又云吳中既失無門戸海道長驅有舳艫盖猶覬元之未亡其云亷藺同心如結好蜀吳異地豈俱亡則有感羣雄之失䇿至云萬年圖籍來江表一曲琵琶度塞門斯與宋文恪過元故宫詩並其悽切矣餞周左丞從戎江漢亦多年又領王師過極邊己展召公新土宇載開馬援舊山川諸生俎豆陳兵後父老壺漿拜馬前最是老儒淹滯久乞將骸骨早歸田次蔡元禮過洞庭翠湖渺渺共天寛過客登臨足觧顔兵後已非前殿閣望中仍是舊江山涼雲隱映波光裏壊棟欹斜樹杪間欲向黄陵懐帝子鷓鴣啼處雨斑斑寄家離别家山己數年故園桃李想依然東風客外歸心切落日雲邊望眼穿龍虎衛前花夾道鳳皇臺畔水連天丁寧為護溪邊石留取歸來繫釣船墨竹奎章閣老天邊字薊北山人霜後枝想見披圖明寫處循離看罷落花時魏觀七首觀初名己孫字杞山蒲圻人洪武初就徵授平江州學正遷國子助教厯兩浙都轉運使入為起居注進太常卿翰林侍讀學士遷國子祭酒尋兩知蘇州府事坐法死有蒲山牧唱詩話明初循吏政教兼行稱蘇守魏公其脩府學則宋景濓記之舉鄉飲酒禮則王常宗述之乞言養老賔饌有儀三代以後不多見也其五言古詩念切民瘼纒緜悱惻不減元道州近體亦清脫可誦當日髙皇游觀上苑召與危素宋濓詹同吳琳同宴奉天門東紫閣謂曰前日送卿還今日與卿飲何其樂也命各賦詩紀之亦稱殊渥矣乃縁誣善之人一言坐以惨法甚矣君恩之不可恃也大同江口舍舟而塗抵繁昌四十里紀實扁舟畏風濤上馬遵大路馬喜大路平騫然欲馳騖手疲兩足痛縱逸恐顛仆呼奴執其轡控馭使徐步前村望煙火稍逺得農扈蔬筍兼可求午膳當不誤少頃聞病翁喚出蓬頭婦婦出拜且言窮苦日難度夫逺充民兵兒小當遞鋪翁病經半年寒餒缺調護軍需未離門活計不成作荒山要收絲荒畝要輸賦誅求里長急責罰官府怒近來㸃弓兵拘貧放權富迫并多逃亡蒼黄互號愬左右三五家春深失耕務紛紜下牌帖勾捉猶未杜所言盡真悉俾我心駭怖兹行事咨詢拯恤懼遲暮州縣嗟匪才瑣屑誠可惡䘮亂民瘼深君王重憂顧所以諭㫖勤赤子相託付民為邦之本綏撫在完固胡為重釗剥上徳阻宣布明當抗封章為爾除巨蠧建徳縣三十韻乘舟至建徳頗愛山水清山水雖可愛人煙苦彫零種麥當縣前迂徑入縣庭瓦礫存故基小小才有㕔父老匍匐來形影何伶仃再拜泣且言弊邑頻遭兵大則吳楚交陳與張小則侯許征阻兵者二人逆彼族必夷順此身必刑逃者凍餒連竄者疾疫并所剩無幾家家户無全丁爰從甲辰秋始見官府明令薄來撫綏曲盡父母誠流離漸懐歸沈疴漸蘇醒田萊固多荒未免賦役徵里長紛並縁科需取餘贏語意殊可憐推言慰其情去嵗郡守朝綸音細丁寧民為邦之本本固邦則寧今而重傷殘救恤誠在卿譬猶澗中魚魚樂澗欲盈又如水載舟水激舟必傾此道垂昭昭卿等當力行單乏捐冗條力役止繕營治則待以寛罰則裁以輕耕稼勗有時教養資有成茍或負所期憲度亟爾懲懇懇數百言官庶曽共聽矧是半月餘捷音下三城疆土益廣逺禮樂逾作興於叟宜勉㫋行將慶昇平次韻陳亷使見寄三月雰雰雨曽無兩日晴旅懐常寂寞佳節負清明野樹暮雲合山溪春水平彭郎有音信處處避回兵寧國溪上轇轕山環水沿洄水繞山鳥啼山翠裏人語水聲間茆屋連溪塢松舟繫淺灣村翁驅犢去溪女得魚還遂安舟中溪徑斜斜入柴門側側開一牛臨水立雙鴨避舟迴病眼青山豁歸心白髪催何因蒓浦上野老共傳杯都昌懐舊隱江霧仍為雨山花故作容秋風餘鼠雀寒水落魚龍慷慨心雖壯羈棲力己慵白雲蒓浦上悵望最髙峰夜宿江夏水驛將往衡湘留贈親友茆屋江聲合松舟月色遲把杯頻改席翦燭共題詩攬瑟清湘夜聞簫赤壁時美人千里外迢逓寄相思吳伯宗一首伯宗名佑以字行金溪人洪武辛亥初開科帝親擢第一授禮部員外郎厯武英殿大學士尋降檢討有南宫使交成均玉堂四集詩話閣老首科状頭自後西江人物繼起於是有狀元多吉水朝士半江西之諺予嘗購得是科㑹試録就試者一百八十九人中式一百二十人浙江三十一江西二十七福建二十二山西一十三北平六河南廣東各五陜西四山東三廣西髙麗各一直𨽻止二人考宋景濓㑹試録稱先是京畿遵行鄉試中程式者七十二未及貢南宫上求治之切皆采用之盖庚戌京畿所取士先㑹試而授之官矣題李氏棲碧樓唐有謫仙人風骨特髙妙晚愛棲碧山閒心付登眺桃花與流水目擊領其要遐觀窮有象幽討入無竅不知誰相問但覺遺一笑聲落天地間松風紫鸞叫諸孫企髙躅異世頗同調璚樓睇空青銀牓生光耀予亦愛其人臨風劃長嘯危素四首素字太樸金谿人仕元至翰林學士承㫖洪武初授翰林侍讀學士兼𢎞文館學士謫佃和州有雲林詩集梁國狄文惠公親廟詩大江從西來萬里流湯湯維唐社稷臣勲業載旂常天子在房陵女后御明堂晨聞牝雞鳴腥聞溢穹蒼猗公秉忠義耿耿立廟廊周旋極黽勉論議忽慨慷載御巻冕歸宗社赫有光豈徒保國祚實欲扶天常雲孫江州牧思聖宫廟薦烝嘗豆籩孔嚴潔絲石載鏗鏘再拜久屏息低徊想忠良作歌勸臣子百代踵遺芳泊宫步門人歸石城邊鳥沒白沙尾秋風涼蕭蕭波静月如洗水鳬栖不定半夜猶飛起後買琴歌為鄧旭甫作鄧敦好琴如好色十年買琴不可得南城縣裏客攜來百鎰兼金君不惜竹林踞坐江盈盈臨江三奏魚龍聽蕭森巖壑秋氣肅洶湧天地霜風清商聲洋洋羽聲苦月墮寒光君罷撫餘音寄意愁人心别思蒼茫正如許為余再控白玉絃長謡楚語招飛仙招飛仙安得見獨立乾坤淚如霰期馮祥甫不至寒山壓樓三日雨風巻崩雲亞髙樹山人無事不下樓空谷寂寥誰與語平生故人大馮君約之不來嵗聿暮嵗聿暮君何之側聞他日撫州去又恐促駕江東歸梅花千樹化為雪寄贈惟有長相思明詩綜巻四
