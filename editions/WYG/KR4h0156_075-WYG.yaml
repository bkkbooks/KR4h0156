body:
  text: 明詩綜卷七十五翰林院檢討朱彛尊編張銓一首銓字宇衡沁水人萬厯甲辰進士除保定推官擢浙江道御史巡按江西再按遼東陣亡贈大理寺卿加贈兵部尚書謚忠烈有集宜春臺眺望臺以宜春勝登臨恰仲春竹風如款客花氣欲薰人山色平依檻江流曲抱城昔賢棲隠處覽古倍含情張振徳一首振徳字季修崑山人萬厯丙辰以選貢知興文縣事天啓辛酉死奢崇明之難贈光禄卿諡烈愍魚兜堡逖矣南荒地居然小有天魚兜沈夾浦龍洞閟靈泉耕鑿畨歌稳追呼羽檄連逺臣憂主辱未敢賦歸田張可大一首可大字觀甫其先孝感人世襲南京羽林左衛千户中萬厯辛丑武進士厯官都督同知轉右都督改南京左軍都督府管府事鎮登莱崇禎壬申吳橋兵變回攻登州城破自縊諡壯節書邊事無端小草出登壇壯士徒歌易水寒枉把全師輕一擲遂令宿將盡三韓腐儒誤國由房琯野老吞聲恨賀蘭豈是彼蒼開殺運祗因人事自摧殘陸夢龍一首夢龍字君啓紹興山隂人萬厯庚戌進士除刑部主事厯員外郎中出為廣西提學僉事轉江西參議湖廣副使貴州參政廣東按察使降補河南參議轉山東副使調陜西以參政分守固原道崇禎癸酉戰死贈太僕寺卿諡忠烈宿東林寺禪房獨樹鳥爭棲月色𠖇濛霧漸迷曉起不知山路滑西風吹雨過前溪孫承宗六首承宗字稚繩髙陽人萬厯甲辰賜進士第二除編修厯坊局以禮部右侍郎掌詹事府拜兵部尚書兼東閣大學士奉命督師出鎮山海加太子太保㝷加少傅兼太子太傅文華殿大學士再加少師兼太子太師予告回籍崇禎二年仍起督師又三年復予告歸七年髙陽失守入城南老營望闕拜叱持繯者縊死贈太傅諡文忠有南陽集魏環極云孫公古風近體靡不本英分攄雄才髙步作者之林而究無泥於古静志居詩話先生自任天下之重盡瘁師中司馬之檄方馳樂羊之篋已滿見危授命無媿全人集中三十五忠詩葢有感於璫禍而作三十五忠者趙尚書南星髙總憲攀龍周侍郎炳謨楊副院漣馮副院從吉何總督士晉左僉院光斗李御史應昇夏御史之今周中丞起元繆宫諭昌期蘇考功繼歐張尚書問達汪侍郎煇丁檢討乾學鄧中丞漢袁御史化中吳總督用先顧憲副大章王尚書紀魏給事大中鄒總憲元標王侍郎之宷周主事順昌夏文選嘉遇周御史宗建周冏少朝瑞黄御史尊素劉知府鐸萬郎中燝吳御史裕中張都事汶趙宗伯秉忠公侍郎鼐孟㕘軍淑孔也東林之君子已得十八九焉先生之言曰起三十五人于九京未必人人大有勛烈而有勛烈者必此三十五人痛惜人才之至矣山海闗甲胄詩篇少乾坤戎馬多幻仍看海市壯擬挽天河塞上人先老山頭月柰何羣雄驕語日一劒幾經過潮休嫁弄潮兒潮今亦失信乘我油壁車去向錢塘問送友人山城吹角月婆娑一派秋聲向客多已是愁中聽不得那堪重唱渭城歌閒圃閒身終日比雲閒不為秋風棲碧山却訝枝頭雙白鳥夕陽飛倦未知還秋日飲寗氏水亭孤閣臨流混太清烟波渺渺􅈽重城西風莫卷枯荷盡醉客重来聽雨聲哭門人李元冶海内交游已漸稀眼前老友幾相依夜来驚有西園信淚灑東風滿客衣吕維祺一首維祺字介孺河南新安人萬厯癸丑進士除兖州推官徵入為吏部主事厯員外郎中告歸崇禎初薦起尚寳卿改太常少卿進本寺卿提督四譯館升南京户部右侍郎兼都察院右僉都御史總督糧儲進兵部尚書流賊陷潁州都督趙世臣守清流闗兵潰廷議多咎之奪職辛巳洛陽陷被執不屈罵賊死事聞贈太子少保㝷諡忠節贈太傅南庾即事往事如譚虎先憂甚喘牛自煩前席召屢切北宸憂令甲漕難截呼庚例始留徙薪君不信毋乃到焦頭劉振之二首振之字而强慈谿人崇禎庚午舉人署東陽儒學教諭遷鄢陵知縣辛巳十二月城陷不屈為賊支解贈太僕寺卿有畫溪近草氷壺先生遺稾詩話先生初署廣文日以忠考勉諸弟子題官舍之署曰人熱難因吾鼎可愛又曰一片氷心堪贈友滿腔熱血欲輸君其後捐軀最烈不食其言闞湖即事秋容到處好碧水湛晴暉嶺樹隂逾宻湖雲濕不飛亭虚山易入野曠鵲忘歸户外塵雖滿那能上芰衣登青笑臺樓隂倒映水潺潺簾卷空青鳥乍還一幅雲林難著筆半沈半露霧中山汪喬年一首喬年字嵗星遂安人天啓壬戌進士除刑部主事累官兵部侍郎兼副都御史總督三邊死兵難贈兵部尚書商於懐古路入商源萬壑回據鞍懐古思悠哉茹芝髙士墳猶在徙木姦雄骨已灰計絶楚援游客詐詩題秦嶺逐臣哀古今得失俱陳迹惟有山花嵗嵗開蔡道憲二首道憲字元白號江門晉江人崇禎丁丑進士除大理推官改長沙癸未八月城陷被執不屈為賊所磔事聞贈太僕少卿諡忠烈有悔後集詩話江門自序悔後集云悔後者何前日妄作詩今而後悔也悔後而復有集者何吾但能焚前日之詩今日之作且輯之以竢後日之再悔也其虚懐可見詩雖音節未諧而清婉越俗如移竹已抽三尺筍種桃爭發一庭花又湘水清紫藤花落魚子生皆不失為佳句送堵牧游入覲十月迎君南千里送君北一嵗雙酒卮隨君變顔色誰能入長安便無故人憶下有洞庭上湘江為我留君不可得我在南君在北夢相思見顔色他鄉飯君强食歌再歌中歎息嵗暮美人無信至嵗暮江梅白家住嶺西東何處寄相憶馮一第一首一第字椳公長沙人天啓丁夘舉人崇禎癸未長沙不守走湘鄉將乞師酉陽以圖殺賊為賊所獲㫁兩手置營中一夕死野望江岸閒行處晴雲澹一天微風生逺樹吹送渡頭船蔡懋徳一首懋徳字公虞崑山人萬厯己未進士除杭州推官入為禮部主事厯員外郎中升江西提學僉事轉浙江參政累官僉都御史巡撫山西太原城破自經于三立祠諡忠襄月下步朱龍橋長虹何夭矯獨跨萬山中一道来飛練千林壓冷楓歸雲奔逺岫涌月洗寒空攬袂登髙立憑欄望莫窮金毓峒一首毓峒字鶴沖保定人崇禎甲戌進士除中書舍人擢湖廣道御史監宣大軍㝷奉命督禁旅扼畿南要害馳至保定登陴固守城陷投井死早春雜詠繫馬河濱及早春鳴鳩乳燕往来頻故園風景知何似自愧東西南北人范景文三首景文字夢章吳橋人萬厯癸丑進士授東昌推官擢吏部主事厯員外郎中移疾歸起太常少卿㝷以僉都御史巡撫河南升兵部侍郎轉南京都察院右都御史㝷升南京兵部尚書坐劾時相除名為民已復起工部尚書拜東閣大學士京城陷拜闕號哭投井死初諡文貞順治初定諡文忠有氷餐堂草陳皇士云范公詩古直豪邁稜稜露爽遇國步艱難故多悽戾之辭詩話啓禎之際秦聲變而至文天瑞楚調變而至尹宣子越吟變而至王季重正音掃地矣吳橋博綜舊章領袖羣雅其詩發揚而不厲新警而不佻獨自成家不飲狂泉之水有感天啓嗣祚年臺諫氣色盛憂危叫九閽所恃上神聖何来連斥逐無乃累新政薄謫亦主恩敢廢天子命所虞端一開庶言疑欲屏中璫思乘墉況可授以柄於惟我神皇髙拱握金鏡稍稍視下輕釀成結轖病今誰秉國成借之弄機穽罪人佚顯罰反憾言官諍漆室抱深懐能不心怲怲尚慎一怒加撫兹萬邦正宿長清署中有感作古驛昏鴉坐長塗病馬饑宵寒停柝早時亟啓闗遲落月三更信春風六日期年年行役苦兩度已於斯過維揚游子闗情處江空白露秋客程初問水旅思怯登樓非是瞻雲切還應見月愁鄉闗歸夢裡一夜下揚州倪元璐一首元璐字玉汝號鴻寳上虞人天啓壬戌進士改庶吉士授編修厯侍講南京國子監司業右中允左諭徳右庶子國子監祭酒升兵部右侍郎改户部尚書兼禮部尚書翰林院學士京師陷自縊死初諡文正定諡文貞有憶草詩話厯日之頒明太祖定於九月之朔其後改十一月朔繼又改十月朔遂為定制是日帝御殿比于大朝㑹士民拜于廷者例俱得賜倪尚書天啓中賦頒厯詩最為典重他詩過於新竒不然也尚書晚築室于紹興府城南隅牕檻法式皆手自繪畫巧匠見之束手既成始歎其精工時方患目疾取程君房方于魯所製墨塗壁黙坐其中堂東飛閣三層扁曰衣雲凭䦨則萬壑千巖皆在舄下適石齋黄公至越施以錦帷張燈四照黄公不怡謂國步多囏吾輩不宜宴樂尚書笑曰㑹與公訣爾既北行遂殉寇難閣順治初尚存曩甞攜舍弟千里暇輒登焉今已鞠為荒草矣皇極門頒厯作鳯闕開彤旭猊爐散紫烟六階齊度緯七政轉璣璿甲厯龍躔改寅賓象魏懸明時功在革資始義承乾黑帝威初試青皇位早傳周官新月令甘氏舊星篇人繼羲和後書成蓂莢前庚先三日戒貞下一元旋圖籙符垂赤干支徳應𤣥興王惟省嵗太史又編年賜出黄星曜披看緑字鮮因知天厯數如日起虞淵孟兆祥一首兆祥字允吉交河人天啓壬戌進士除大理評事升吏部主事厯郎中謫行人司副㝷遷光禄寺丞轉少卿左通政太僕卿通政使官至刑部右侍郎甲申三月守正陽門城陷不屈死贈尚書初諡忠貞定諡忠端詩話孟公峻節自樹取忤中璫卒殉節于正陽門子章明顯之以進士觀政吏部視公殮畢亦自盡時論翕然以為三百年特見之事初贈河南道御史諡節愍順治九年定諡忠僖其詩文惜無存硤石硤石分秦險郵亭日欲低未知山近逺已失路東西逺水看烟起深林畏鳥啼鳯城何處是彌望草萋萋􅇒義渠一首義渠字駿甫烏程人天啓乙丑進士除行人選授禮科給事中厯兵科都給事中升福建右參政轉湖廣按察使山東右布政使入為大理寺卿京師陷自經初諡忠清定諡忠介有使岷稾詩話凌公詩義見者解頤甞與閔文學元京共排纂湘煙録董上舍斯張稱其冷豔畢臚比之吳均入東記及官禮垣封事四十餘上皆切中時弊温輔以吏才稱之轉外温既謝政入為大理臨難之頃從容就義惟悉取平生撰述焚之為可惜也公清介特甚田廬一無所遺身後二十餘年猶未井椁江都吳綺園次守吳興時夫人閔尚有園次肅拜堂下秋深矣尚衣葛衣練帬退而歎息恒以鹽豉魚菽遺之且卜地葬公于驥邨之北為文祭之鄴中詩微風入樹冷修修漳水依然咽舊流何處髙樓思落月乆傳疑冢有荒丘佳人南國經春鎖公子西園愛夜遊最是英雄多慷慨當歌今日好銷憂施邦曜一首邦曜字爾韜餘姚人萬厯巳未進士武學教授遷國子監博士厯工部主事員外郎中出知漳州府升福建參政轉四川按察使福建右布政使南京光禄寺卿擢左副都御史殉國難初諡忠介定諡恭愍詩話浙人不幸萬厯以来執政者前有四明後有烏程徳清以是朝士不附東林者槩目之曰浙黨此指一時阿比執政者而言則可爾東林諸君子全倚浙人助之人品葢棺論定試觀建文壬午崇禎甲申殺身成仁潔已自靖者惟浙為多順治九年定諡甲申殉難文臣計二十人而浙居其六繼此授命者更難悉數浙黨之目庶幾可以一洒矣恭愍從容自經書其案云慙無半䇿匡時難惟有孤忠報國恩葢初不以詩名而自饒方格暮望返照開西峽穿林度逺塘卑枝散髙影逺岫駐餘光城市歸人急江天宿鳥忙自傷遲暮客日日送殘陽馬世竒三首世竒字君常無錫人崇禎辛未進士改庶吉士授編修累遷左春坊左諭徳兼翰林院侍講甲申京師陷自經死初諡文忠定諡文肅有集陳皇士云公詩舂容穠麗居然唐人風格詩話馬公清徳奉使諸藩餽贈一無所受比還朝夢中吟文信國詩從今别却江南日化作啼鵑帶血歸葢殉國之志已素定故先兆于夢云秦淮曲萬騎南巡正徳年内家前隊鐵連錢白衣舞罷乗鸞去應有霓裳曲未傳贈曹元宰守漳州靈查秋泛海天涼五夜心懸燕寢香總為至尊憂社稷漢臣何必薄淮陽贈鄭少府之任宦薄無妨吏隠尊清風一拂百年存流移滿目誰堪繪念爾監門舊子孫周鳯翔一首鳯翔字儀伯紹興山隂人崇禎戊辰進士改庶吉士授編修遷南京國子司業厯左春坊左諭徳兼翰林院侍讀都城陷自經死贈禮部右侍郎初諡文節定諡文介有集陳皇士云公詩清灑無館閣穠重之習詩話甲申三月之變文介授命獨遲十九日城陷語吳莊介云臣子義在必死然必一視大行殯宫縞素慟哭方可無憾爾二十一日赴東華門茶棚下舉哀復匍匐至邸自經絶命詩云碧血九原依聖主白頭二老哭忠魂時親猶具慶也於時大學士宜城丘公瑜集議朝房俄而賊入亟走民家自縊為旁人所持不死次日賊蹤跡得之挾入窩舖求死不得賊帥劉宗敏刑辱備加猶嫚罵不屈伺守者稍懈乃就縊論者責其濡忍至受羣盜之侮不得與忠臣之列文介東華之哭既不受賊帥之拘而萬舌一辭免腐儒吹疵之論是天所以成公大節而公之素行交孚于鄉國故也不其難哉舟中聞鴈一葦秋横渡三江鴈引羣北来應幾日消息可相聞嘹唳孤雲迥蕭疎夜色分當前渾欲訴木葉落紛紛劉理順一首理順字湛六杞縣人崇禎甲戌賜進士第一授修撰升左中允甲申殉國難初諡文正定諡文烈有劉文烈公集陳皇士云考宋元以来狀元及第死事者於宋得三人何㮚文天祥陳文龍於元得三人李黼泰不華李齊而明有五人靖難之時則有黄侍中觀土木之禍則有曹文忠鼐北京之變則有劉公而浙東有余庶子煌江右有劉中允同升先後皆死國事此亦科名人物之盛軼於前代者也詩話劉公退朝賊騎猝入回寓舍書曰成仁取義孔孟所傳信公踐之吾何不然暨其妻妾竝縊可謂不負科名矣詩多直抒胸臆不為體格所拘錢塘江遇雨微雨来江上濛濛曉未收故園千里隔客夢一身浮烏桕家家樹魚榔岸岸舟觀濤無不可須上幾重樓吳麟徴一首麟徴字来皇號磊齋海鹽人天啓壬戌進士除建昌府推官丁憂起補興化徴拜吏科給事中厯都給事中升太常寺少卿京師陷自縊初諡忠節定諡貞肅有集詩話磊齋在八舍知無不言又明於當世之務不茹不吐柰與執政齟齬不用其謀甞與伯兄石匏書云朝廷之是非臧否無恒而所號為正人専以門户聲氣為事疆場事日益決裂安之若固然惟一人焦勞于上而已又云近日用人倐更倐換當事全無確見惟覘上意所在其餘議論紛紜封疆事所以日壊良可歎也又云宜興敗後大獄頻興士大夫幾無生氣而言路更甚弟幸免風波然欲積誠以冀匡救之萬一則未可得也又云闖賊破潼闗直抵西安秦督三萬師一潰無餘獻賊破長沙進逼袁州江浙震動吾鄉恐未能安枕天下事有不忍言者子姪輩教以敦厚母事浮文為善於鄉黨足矣其言一一切中時弊臨終處置家事各有條理從容不亂尤人情之所難能詩不甚敦琢其工者每涉傷時存其二首吉人之言不在多也送王昆華前輩使節歸省由楚入滇益部占星信桐圭展萼親水瀠湘畹碧山入㸃蒼新休沐西南里諮諏逺近人潘輿聞送喜日望使車塵李子徳云全首清穏走筆招友人飲𤣥亭今在否竹馬舊過㝷尚憶人如玉那禁雪滿簪平湖秋水濶板屋夜燈深莫更疎還往相看嵗暮心送葛無竒侍御按粤刺桐花發粤山青一路爭看豸繡經迴鴈峰南望天北五雲長傍使臣星汪偉一首偉字叔度江寧籍休寧人崇禎戊辰進士除慈谿知縣選授翰林檢討甲申三月死國難贈詹事府詹事初諡文烈定諡文毅旅次述懐于役逢蕭序停鞍已夕舂酒餘忘逆旅湖外憶髙蹤挂壁留殘火披衣候曉鐘故園今漸近白岳有雲封沈山子云大厯十子遺響吳甘来一首甘来字節之瑞州新昌人崇禎戊辰進士授中書舍人擢刑科給事中厯户科都給事中甲申死寇難初諡忠節定諡莊介詩話思陵死社稷周文介欲哭殯宫而後死莊介口然其言而亟歸寓自縊時因哭殯宫而受榜辱者葢不止丘輔一人是則莊介之識逺也甲申之變諫垣數十人或竄或辱或汙偽命死節者僅莊介一人假踐文介之言安知不與丘輔同其辱乎君子論吳周兩公之死則先時者得其正矣經彭澤亦有東籬菊何人尚隠居夕陽催進艇殘夜擬焚魚物變看多異名髙謗未除懐歸無長物猶有一牀書許直一首直字若魯如皋人崇禎甲戌進士除義烏知縣以母喪歸補惠来選授吏部主事厯員外甲申三月死國難贈太僕卿初諡忠節定謚忠愍絶筆投筆翻然辭世行老親幼子隔幽明丹心未雪生前恨青簡空留身後名王章二首章字漢臣武進人崇禎戊辰進士除諸暨知縣調鄞縣徴授工部主事選陜西道御史以憂歸服闋補河南道御史京城陷死之初諡忠烈定諡節愍有公餘草詩話王公赴義最烈公餘草詩一卷序者以吉光一片喻之是年御史盡節者三人公與鄞陳公良謨零陵陳公純徳也聞有昆明趙譔字鎮所天啓甲子舉人除貴州龍泉知縣以禦土寇功行取擢四川道御史巡視中城城陷為賊所械瞋日大罵賊刀仗齊下殺於白帽衚衕其死與王公相類而逺方乙科無人為之請䘏國典野紀闕焉僅見於陳氏兩朝遺詩小傳特附書之聖駕閲城秋色當樓滿崇閫奠帝居虎門横雉堞鳯吹導龍輿峻阪雲臨近封泉地絡舒翠華迴輦處嵩呼遍丹除讀書篁川偶詠竹裏起茶烟白雲堆滿屋何處桔槔聲園丁灌花木成徳一首徳字元修懐柔籍霍州人崇禎辛未進士榜姓張有㫖復姓除知滋陽縣事被逮杖謫乆而赦還補如皋知縣入為兵部主事轉員外郎甲申殉國難贈大理寺卿初諡忠毅定諡介愍詩話元修牽絲作令不善事上官為守所揭巡按以貪酷聞被逮按臣及守温輔私人也元修母張具本聲寃於朝隨温輔肩輿詬罵温輔恚甚言於思陵杖之午門前下錦衣衛獄發遣時留家人居順義城破衆爭匿地窖中元修父文桂曰豈可男女雜入一窟中乎賊至遂遇害一妹二妾皆自經及甲申就義母張暨一妹一妾亦俱縊焉絶句一首葢謫戌日太行道中作也絶句出山已定盟心語作令須思遣戍時但卷琴書賦歸去莫因徇禄乞身遲金鉉一首鉉字伯玉留守前衛籍武進人崇禎戊辰進士選揚州府學教授入為國子監博士升工部主事㝷改兵部甲申殉國難初諡忠節定諡忠潔有集詩話思陵之去閹黨無異抜山曾不數年命張彛憲總理户工二部錢糧出帑金别建公廨俾諸司以屬吏之禮見金公再疏陳其不可謂以陛下迪簡之臣而今其罄折傴僂於刑餘之子不亦羞朝廷而辱當世之士耶思陵卒不允也中官借驗火器劾公落職公笑曰吾去官逺此軰如脱蟣蝨垢膩之衣豈不愉快遂與諸弟講古文辭尤精研易理壬午七月晦讀邵氏書題其後曰甲申之春定我進退進雖遇時外而弗内退若苦衷逺而弗滯外止三時逺不卒歳優哉游哉庶畢吾世又語其弟曰吾平生寡所好視棄官如揮涕唾今以巡城每過御河輒留連不能去何也卒沈於是從彭咸之所居公志葢已先走矣拜文信國祠下復姤自天運臣道無終窮殉節士所恒寧足矜子功偉哉一文士毅然任即戎棘行若履坦所在吟淒風一息茍可奮安忍即瘖聾九死固所甘但惜炎運終堪嗟生祭者不足語微衷申佳𦙍一首佳𦙍字孔嘉永年人崇禎辛未進士除儀封知縣擢吏部主事轉員外降南京國子監博士遷大理寺副升太僕寺丞都城陷投井死初諡節愍定諡端愍有君子亭集詩話中公循吏治最中州及考牧近畿聞寇逼居庸郡縣望風奔潰或勸母入都慷慨流涕曰固知京師不支如天子孤立何疾馳以入時三月十二日也徧謁大臣盡戰守䇿皆不省城陷自投王恭厰井中其詩娟秀不嚻不浮近劉半舫一派贈郭子下榻留征騎燒燈共客吟萬金烽火信一夜故園心世事風塵老交情契闊深此行須鄭重兵氣滿山岑王與𦙍二首與𦙍字永錫一字百斯濟南新城人崇禎戊辰進士改庶吉士授湖廣道御史巡視河東鹽課陜西茶馬應天學政引疾歸甲申四月聞京師陷暨妻子登樓齊縊死有隴首集陳伯璣云侍御以建言忤執政蕭然歸里聞難之日不以在野緩須㬰之死即其短嘆微吟已可知其嚴氣正性紀伯紫云先生忠孝大節日月爭光詩集僅存猶足挾風霜而鏗金石詩話新城王氏科第最盛盡節死者亦最多崇禎五年吳橋兵變南趨時則保定同知象復暨其子舉人與䕫死焉十五年城再破時則貢生與朋暨其子舉人士熊生員士雅死焉至是侍御暨妻于孺人子士和又死焉王氏之門才甲一世矣對瓶梅作鄉思那可禁況復逢驛使念我欲歸時已結垂垂子西羌雜詩紇干山下少人過大將行師按突何袖裏尚餘三尺練歸来生繋角斯囉王士和一首士和字允協御史與𦙍子新城儒學生詩話允協死不違親與孟忠僖比烈其妻於崇禎壬午城破時先自經忠臣孝子烈婦萃於一門尤難得也絶命詞痛余生之不辰兮天滅我之立王我父母一聞之兮涕滂沱以傍徨以身徇國難兮維千古之臣綱嗟反面而事讎兮方臣妾之未遑哀世溷濁兮四維不張大地無容身之隙兮願隨我父母歸于帝鄉許琰一首琰字玉重長洲縣學生贈五經博士詩話玉重青衿未受一命無必死之義而忠憤奮發始縊于家隨縊于福濟觀皆為人救解復投胥門城壕時潞王舟泊城下遙望見之亟令水夫掖起抵家聞哀詔至宛轉悲號賦詩有一箇書生難殺賊願為厲鬼効微忠之句絶粒七日而殁先玉重死者北京布衣贈中書舍人湯文瓊聞帝崩煤山書衣帶云位非文丞相之位心則文丞相之心慷慨自殺又聞金陵有丏者聞北京變摶膺大哭赴百川橋下死謝康樂詩所云本自江海人忠義感君子是也妾薄命妾本名家子幼小受人憐感君明珠贈含笑意不前左手執書策右手揮鳴絃皎皎明月光苦憶甞纒綿恩情恨不乆韶華無盡年忍作待嫁衣甘為他人妍君故未相知妾意殊不然有聲當徹天有淚當徹泉待醒深閨裏風光寧乆懸王行儉一首行儉字質行宜興人崇禎丁丑進士授南京户部主事厯郎中出知荆州府改重慶甲申六月死寇難詩話張獻忠奪佛圖闗用火具攻重慶時漢中已破瑞王来奔闗南道陳纁及隴右士大夫挈家從之城既陷賊俘巡撫陳士竒知巴縣事王錫暨太守王公縛之演武場將殺之俄而雷電晦㝠獻忠對天詬曰我殺人與天何涉架飛礮向天齊擊之既霽諸公皆遇害事載婁東沈荀蔚蜀難紀略軍中口號寄諸弟重闗烽火陣雲寒回首鄉園道路難忽憶髙堂清淚落還將尺素報平安沈雲祚一首雲祚字予凌太倉人崇禎庚辰進士除華陽知縣甲申死寇難有佀郊居存稾塗中悼亡一水東歸百里津每逢風雨便傷神而今帷帳辭秦淑誰憶江邊行路人尹伸三首伸字子求宜賓人萬厯戊戌進士授承天推官入為兵部主事厯員外郎中出知西安府致仕起補陜西按察副使厯河南左布政使㝷遷太甞卿張獻忠陷成都被執罵賊見殺得黔報寄示兩子仕宦通黔籍時比於放流頃者因戎馬反名才見收我昨權出處曾慮當見投未即猨奔林已同鷹在鞲衰年履瘴鄉病軀親戈矛中子不樂聞況使老妻憂惟予性頗達死生同一漚炙額兼噴鼻壯夫昔所羞茍能了二觀未必無一籌世法今頗解勉師老氏柔冠軍當辦戰都䕶或深謀聲靈仗英主小醜何足劉䖍勤奉簡書功利不敢求畸人儻天幸為我營菟裘叙南曲二首七星厯厯面煙鬟千佛巖頭翠岫班水合雙江波浪闊浮来墖影是東山鎖江北渡入涪溪亂石叢篁路欲迷太史遺文殘碣上武侯荒廟夕陽西孫士美一首士美字公粲松江華亭人天啓辛酉舉人知深州事崇禎戊寅十一月州城被圍力盡死于官一門殉難者十有三人事聞贈太僕寺卿守城作鐵騎繞孤城烽煙勢未平君親本至性南北總闗情地下難熏䑕原頭絶救兵一作此日魚書急何時鶴唳清寄言青史筆莫載罪臣名王佐聖一首佐聖字克仲一字魯生長洲人萬厯壬子舉人除知遵義縣事崇禎壬午城破死于難有緘庵詩鈔詩話明季用人専拘資格吏部除目乙科多投之逺方如張公季修王公克仲劉公而强馮公椳公殉節皆最烈豈惟千佛名經中人始可入顯忠録耶幽蘭篇送黄子羽應召入京芳蘭生空谷託根何孤清恥與羣卉伍修然挺素莖日月沐秀華雨露滋芳英一朝辭中阿以之植蓬瀛風姿益娟妙紉佩當瑤瓊允矣王者香不隨蕭艾榮蘇瓊一首瓊字赤友石埭人崇禎甲戌進士除知景州移瀘州張獻忠寇蜀死于難有青城先生詩略淮隂釣臺駐馬淮隂道王孫劇可憐已無諸母漂猶剩一臺偏試問藏弓日何如把釣年我来倍惆悵片石立寒煙吴爾壎四首爾壎字介子崇徳人崇禎癸未進士改庶吉士李自成陷京師從賊中脱歸依史可法軍死揚州之難有滋蘭堂初集聶許堂遺草詩話先生間道潛行依史閣部軍中以身許國遇鄉人祝孝亷淵南還㫁一指裹家書中遺其親誓不空返卒死于兵平居曾撰死臣傳目曰仁書傳有小序各繫以古人曰湛身曰焚曰炮烙曰炙曰自剄曰不食曰閉口曰雉經曰扼吭曰立稿曰没陣曰觸曰墜曰鴆曰烹曰葅醢曰臠曰斬曰車裂曰磔曰鋸曰囊撲曰剥曰剖曰拉曰杖曰笞曰搥撃曰刺曰幽曰凍曰疽發背曰慟哭統論之曰諸死者或假手于人或憤激自裁或罵賊畢命身死主寤者有之身死敵懼者有之身死家破者有之身死名榮者有之要與禽息鳥視者逺矣其曰被犀甲操吳戈氣之雄騰天河鶩廣野捐愛戚志之決頭匪恤我心赤我血碧長城雖壊白虹貫日則先生自道也先生之死有故人殮其尸而寄棺于佛寺寺燬於兵火棺亦熸焉其家函所寄指葬之四明葛編修世振入之昭忠録并銘其墓我行其野三章我行其野石田嶙峋荒原黯澹夐不見人黄埃接天有狐侁侁隂風吹車慮掣其輪相彼征駒尚求果腹嗟我人斯終朝無禄螟螣之生不遺荏粟哀哉鴈户載行載哭我丁匪辰紛此百罹寇訌于郊僉曰撫之惟憸人是咨俾大璫是司我行其野告哀以詩秋風辭秋風颯颯兮切素肌華林摧謝兮蛩螿啼綺席陳兮清歌闌美人去兮何當還羽葢飛兮龍媒乘發激楚兮箾韶鳴采三秀兮餐玉英思緜邈兮遐征嵗華荏苒兮何時平明詩綜卷七十五
