body:
  text: 明詩綜卷八十八翰林院檢討朱彞尊編張宇初八首宇初字子璿廣信人嗣漢四十二代天師賜號無為真人有峴泉集王仲縉云峴泉詩沖邃幽逺篇章翰墨各極精妙静志居詩話古今詩僧傳者不少黄冠率寥寂無聞唐惟上官儀吳筠曹唐稍能詩然儀唐皆不終于黄冠則不得以黄冠目之矣惟元時道教特盛所稱丘劉譚馬郝王孫七真者大半有集迄於至正如張雨伯雨馬臻志道是皆軼倫之才明初僅張宇初余善二人無戾風雅己爾餘皆卑卑鮮足當詩人之目此外龍虎山人張留紳有詩見臨川胡琰大明鼓吹又黄徴君俞邰編明史藝文志有余和叔同亭詩帨一卷武􅊂道士張蚩蚩適適吟一卷安仁沖虚山道士顔服膺潛菴詠物詩六卷訪之未得附載之擬古朝陽生東樹㣲月流西岑清泉活活流好鳥交交吟春夏氣候殊凉燠自駸㝷美人崇蘭佩芳香襲衣􅁭邈然與世隔空睇瑶華音謇修曷為言感慨投吾簪飬疾濯足山澗中杖䇿暝乃還寒蜩鳴疎樹落日下西山灌園露已濕倦息衡門間窶空非苦疾鶉衣畏早寒寧貽榮叟誚齒落無衰顔冬日還峴泉郊墟物候和野逕抱溪曲言旋白雲岑烟樹澹餘緑淺瀨引寒流崇巒披秀木荒疇已農穫隱構藏林屋深窟想兔脫危機絶羝觸毋為弓旌招静言抱松菊題夏山過雨圖夕雨過凉樹流雲吐層峰横橋蔓緑翳杖䇿宜丘中煩溽意俱滌邈然塵外蹤鍾山豈竟卧清瀨聞髙淙乙亥季夏還山居偶興末夏熾餘暑幽期諧素衿川源蔽繁緑溪渚澄深潯田舍靜雞犬荒蹊抱深林圓淵敞靈構疊嶂羅髙岑荷氣薄朝露魚波依重隂披襟遂恬息濯澗清閒心遺世非塵傲飬真宜自任秋風動早思寫我丘中琴過錢塘越上曽遊地年深感寂寥山光隨浦盡海色共天遥古刹藏秋樹寒江送暮潮故人渾不見愁緒酒難消望吳山吳越游程熟溪平驛路分夕陽回浦樹秋色滿湖雲曲溆船孤放淒風鴈獨聞浣花茅屋小别思夢紛紛山行晚眺縱目郊原趣依稀物候新溪寒回返照林暝促歸人山逕松隂雪漁家栁色春盡抛江海興期此坐垂綸余善四首善字復初玉峰清真觀道士楊亷夫云方外生余善追和張外史游仙詩讀至長桑樹爛金雞死有客遶牀三叫以為老鐵喉中語又如一壺天地小於𤓰雖老鐵無以著筆矣追和張外史游仙詩城闕芙蓉曉未分身騎金虎謁元君青童不道天家近笑指空中五色雲溪頭流水飯胡麻曽折璚林第一花欲識道人藏密處一壺天地小於𤓰不到麟洲五百年歸來風日尚依然穉龍化作雪衣女來問東華古玉篇春宴瑶池日景髙烏紗巾上插仙桃長桑樹爛金雞死一笑黄塵變海濤席應珍一首應珍字心齋號子陽子嘗熟人提舉致道觀題章復畫碧桃憶昔瑶池侍宴時碧桃花下酒盈卮今朝醉裏看圖畫羞對東風兩鬢絲鄧羽一首羽南海人明初知青陽縣事後為道士隱居武當之南巖自號松石道人不知所終有觀物吟絶句人生天地長如客何獨鄉闗定是家爭似山翁隨所寓年年處處看梅花盧大雅一首大雅貴溪人龍虎山道士有石矼樵唱顧𤣥言云大雅為張外史所知定非庸人舟中寄散木張外史櫂郎催踏春溪舫阻我辭君散木亭江水未應春去漲鄉人偏向别時青烟波釣艇新衝雨河漢仙查舊犯星輸與仙都吉居士一簾山雨聼鵝經周思得一首思得字飬真别字素菴錢塘人有𢎞道集俞汝成云真人扈從成祖北征恩寵甚厚歴事五朝晉秩二品享年九十諭塟賜塋亦古今所希覯者顧𤣥言云飬真羽流髙逸被文皇之眷游仙諸詩殊有思致夢游仙詩翩翩鶴羽拂重雲仙樂嘈嘈世未聞一虎借騎何處去定應月下訪茅君林復真一首復真字剛伯嘗熟人入龍虎山為道士預修永樂大典歸居致道觀之來雲堂有止菴集送東白副綱還雲間三年客裏惜居諸此日功成貝葉書幾度賜衣沾湛露滿懐歸興載籃輿山横齊魯吟情好月落秦淮鴈影踈若過吳門煩問訊故園松竹近何如章志宗一首志宗字清源號逍遥子松溪文昌觀道士有逍遥集閒述天無一片雲萬里清如水孤月自空明我心亦如此錢月齡二首月齡字鶴山無錫人居洞虚宫有丹丘漫稾俞汝成云鶴山吳越王鏐二十一世孫吟亦成章顧𤣥言云道人詩如盆涵魚藻小有幽致花前有酒當醉花前人莫教啼鳥傷殘春流光轉盼赴壑水好花回首飛成塵請看自古繁華地年年惟見蓬蒿新訪僧田舍出郭㝷僧舍青山隔水田扁舟孤墅入紅樹碧溪連菰米炊香積茅茨帶夕烟相留無限意我亦愛逃禪吳隱𤣥一首隱𤣥自號琴樂翁南昌鐵柱宫道士漁父詞扁舟一葉蘆花外短笛數聲楊柳隂隔浦樓髙看不見夜分何處得相㝷周休休一首休休正徳間居建昌隆道觀題院壁陌上紅塵撲面飛近來覺得世情㣲白雲深處招黄鶴不識人間有是非汪麗陽一首麗陽鉛山人嘉靖初武夷接筍峰道士遺蛻葬于石壁有野懐散稾荅葉東林柴扉終日對雲闗何事游人興未䦨一榻枕泉眠竹影茶烟初歇鶴聲殘林運素一首運素南都道士登天壇我覽圖經㝷岳瀆東至太行入王屋﨑嶇千里不敢辭手䇿桃枝九莭竹舉頭貪看華蓋峰驀然身入翠㣲谷上方樓閣與雲齊金碧交光射林麓探竒直度瘦龍脊千仞斷厓横獨木虚皇之觀紫金堂絶勝洞天三十六日精月華左右分黛色參天如削玉厓下飛流大乙泉自是天闗通地軸巡山使者持赤刀咫尺蛟宫誰敢黷或聞仙犬吠仙燈或睹仙人跨仙鹿林泉處處愜予心摒擋琴書將卜築藥櫃蔴籠春復春蟠桃畢竟何年熟吳孺子三首孺子字少君金華人嘉隆間以黄冠游吳楚間有吳少君集鄒彦吉云山人雅好杜詩而其詩不専學杜外枯中腴韻短意長詩不多作一嵗不過二三十篇而已詩話少君周游吳楚間留檇李獨久性至巧工于製噐一瓢精絶過荆溪為盜所撃王元美為作破瓢歌嘗煉白堊為竈名玉雪厨以白米置冬春囷中令㣲黄號檀香米一杖用緑萼枝條為之名紫玉杖最愛青苔天新雨輒㝷牆隂階面得一苔塼必詫人對客言毎稱荀卿性惡之說詩六卷沈嘉則趙汝師為作序鄒彦吉為作墓銘余仲房王伯穀為作傳姚叔祥為述遺事均未嘗言其為道士獨顧𤣥言輯國雅目為黄冠今從之吕家曲水寄别錢懋榖曲抱孤邨水長流斷岸隂借居方避地言别又沾襟客久衰偏易鄉遥恨轉深把君書在手侵曉到如今倚杖貧病吾將老江湖度嵗華艱難惟有淚飄泊更無家倚杖慚歸鳥臨池惜落花秋風何太早瑟瑟向蒹葭欲製羽衣野服前年製羽衣今日無忽見白鷺鷥逺在青草湖徐淵二首淵字湛虚一字月汀又字秋沙海鹽人萬厯中棲真觀道士一作文始道院有水月軒稾舟中逺水浮髙漢扁舟載夕暉人家隨岸斷沙鳥背帆飛旅况消村酒新寒戀布衣片雲何處起先我向南歸書竹溪僧扇寒玉千竿水一溪風光絶勝瀼東西山僧定起不知午滿地緑隂沙鳥啼吳道隆二首道隆字易水桐城太霞宫道士有蟲吟潘蜀藻云易水居郭西太霞宫崇禎末秦冦􅏳桐城宫毁㑹黄虎山將軍來援桐人徳焉構生祠祀之屬易水主其祀易水有蟲吟一凾自序而鋟之虎山黄公祠二首羽檄轅門至將軍不願生雷霆初下撃風雨但聞聲死賊退三舍生靈全一城至今遺老祀俎豆萬年情英雄經百戰忠勇實無雙浩氣今猶壯丹心矢不降虞淵争墮日楚些哭長江薄暮烏啼急隂雲繞法幢徐頴四首頴字渭友更字巢友海鹽學生以詿誤逃于僧自楚歸入茅山為道士好談兵以徐鴻客姚廣孝自許後不知所終葛震甫云巢友詩不多作不苟作不為應酬之作詩話巢友汗漫之游投軀嶺海其詩間入貝編雲笈之中拾孔翠一毛足勝凡鳥累百宿何氏山居日南氣多燠草樹冬未黄山行不山宿愛君溪上堂邨居百事集異書探石倉香秔初脱杵嘉魚出寒塘既觴復就奕明月登我牀野田犬驚睡每吠燈燭光乃知静者意所遇皆故鄉西嶽㧞地蓮花在多年玉井湮黄河西有影雲棧四無鄰冰窟難成水楓香漸化人夕陽不易落閒立數三秦嚴陵石几朝朝立鷺鷥苔檐露折野棠枝雙臺占得髙千尺不許他人下釣丝古墓草中斷碣先朝敕山下荒池舊祭田往往磨刀人上隴石函掘得五銖錢徐斗支二首斗支字梁父嘉興萬夀宫道士有蜀道唫荆南雜詠叙州逢鄉客留飲南溪古僰國信宿也相宜月白山當戸風輕水滿陂鳥呼秦吉了藥咀五加皮萬里逢鄉客銜杯話所知歸舟寄朱子蕃春江自蜀來半是岷峨雪千里下江陵山山響鶗鴂李延昰十九首延昰初名彦貞字我生一字期叔後更今名改字辰山上海人隱于醫晚居平湖佑聖宫自稱道士有放鷴亭集詩話辰山生長士族人不知其門閥䇿名仕版人不知其官資博綜圖籍人不知其儲藏潔治酒肴人不知其庖爨所撰崇禎甲申録南吳舊話足以禆國史之采擇及疾革平居玩好一瓢一笠一琴一硯悉分贈友朋而以儲書二千五百卷畀予誦其詩知為徐孝亷闇公之弟子然其出處本末終莫得而詳也詩亦伯仲幾社諸君入之黄冠中翹翹東楚和陶飲酒詩寄此一椽下日遭羣動喧我自飲吾酒勿覺日影偏終身在城市仍不異雲山清風與明月有時相往還昨者事已往今者又何言齋中讀書結廬西漾陂披雲攬丘壑絶塵自奔軌翰墨欣有託寤言聊獨賞古人良可作非必琴酒娛頗得詩歌樂達生貴知命引興在寥廓㣲陽明夕扉窈窕青山郭蜜蜂投蛛網救之遭螫痛定後示道士閬風天地孕萬物而各具殺機大小互為忍其事嘗因依蜘蛛尤巧惡以坐而制飛蜜蜂翩翩來含芳昧所歸忽在羅網中蛛喜逞其威但肆齒牙利不嫌軀體肥舉頭乍見之手與解其圍蛛既患得失蜂詎解從違賈勇螫吾手負痛心力㣲吾病蜂得生兒童任相非善且不可為斯言識者希縁溪行瘦笻不老芒鞵輕青錢三百隨我行溪橋數折入人境日落更喜羣山青酒壚遥對菊花好東籬豈有陶淵明中秋夜半對月準擬中秋月歸來撥悶看星踈懸海嶠風細駐林端老子興不淺清宵眠未安呼童重漉酒舊事話團圞鉏草次張元岵孝亷韻造化無私澤誅鉏有獨勞落花分徑闊迸筍出籬髙滋蔓非吾意為螢任爾曹何如張仲蔚門外滿蓬蒿永安湖送戴集之歸婺州一片滄浪水南湖與北湖柴扉明落日漁艇暗春蒲聚散當佳莭悲歡屬老夫戴顒棲隱處風物滿長塗慰孝先東湖一片水喜汝暫停舟既有故人在能無十日留殘花仍滴露新漲正浮鷗生計安垂白從人笑直鉤偶成早嵗辭鄉國歸來鬢已華朔鴻乗雪起海燕受風斜興起因鱸膾饑還倚蕨芽故交零落盡不敢歎無家送邵漢旬歸蘭溪屈指蘭溪路乗風四日程江聲欹枕急山色滿船輕汝自謀行止人誰解送迎金華仙洞裏瑶草石臺生上海萬里朝宗水喧豗滬壘東稽天新漲碧浴日曉雲紅地控三吳盡潮分兩浙通春申遺廟在社鼓賽村翁憶亡兒漢徴自汝云亡後蕭條恨不禁笑啼猶在眼出入總經心書帙憑魚蠧琴囊任䑕侵徒將老年淚㸃滴透衣􅁭羊叔子墓叔子名垂久荒碑夕照多功還存俎豆意不在干戈烟火三家市魚龍九曲河我來搔白首何事亦悲歌過宣和嶺至義烏界追憶先師孝亷徐闇公先生相期卜居處聞說烏傷界前期似夢中四圍青嶂合一道白雲通棲隱終難遂飄零轉易窮先生沒於潮州門生頭白盡無路哭遺蹤古意千金買緑綺一彈不再彈借問此何意欲言良獨難半山聞鶯一路籃輿穩山行日欲西藤花門未盡隨處有黄鸝言别夜值芭蕉雨時當鄠杜秋匆匆無一語相視上孤舟大報恩寺别張南邨垂柳絲絲挂夕陽百花春映遶迴塘他鄉杯酒前朝寺一曲相看各斷膓最憶年年作客不歸家緑遍平蕪一望賖最憶竹堂西畔坐茶烟吹過紫藤花陳泓二首泓字白浮嘉興萬夀宫道士有榔梅居詩稾寄鄭子擴暇日相期蕭寺東别來三月已秋風朝來載鶴船人報極浦芙蓉幾處紅聞笛塞垣髙柳暮􅆴㲚倚杖巡簷月已斜戍古無鄰霜易冷莫教吹落小梅花明詩綜卷八十八
