body:
  text: 明詩綜卷七十二翰林院檢討朱彛尊編魏學洢十六首學洢字子敬嘉善人贈太常卿大中子鄉人私諡孝烈先生有茒簷集静志居詩話魏忠節公被逮日天大雷電子敬徒跣攀號請隨行公語之曰覆巢豈有完卵父子並死無益也子敬乃微服緹騎後探起居抵國門邏卒四布乃變姓名匿都市營救不可得公既斃獄扶櫬歸朝夕躃踊未甞一入寝室淚盡脣焦家人捧水漿以進却之曰吾父詔獄中孰夜半而進之漿者病且革進以藥則又却之曰吾父詔獄中孰診視而進之藥者歴數旬而哀毁死矣思陵即阼朝士上聞于朝以是海内稱為孝子大學士同里錢公士升序其集云子敬之志父存則不獨死父死則不獨生是誠孝子之知已矣當甲子秋忠節掌吏垣以激濁揚清為已任天下仰望太平子敬獨私憂之歎曰無根之草其能久乎物不可以終通天殆藴隆正人之毒而速之慼也未朞而禍作人服其識猛虎行北山有猛虎不牝亦不牡哀哀無辜人吞噬十而九猛虎且勿道蝨乃伏其凥壮士困顛躓蝨喙紛相撓為語行路人且復忍此蝨撲蝨誤驚虎滅影苦無術虎頭置短枕虎皮罩塵埃猛虎有死日蝨乎何有哉長水怨為友人妾賦妾家住長水長水東西流青青湖畔栁迢迢湖上樓十三學釵書十四工箜篌十五臨忩繡精妙世無儔翩翩少年子窈窕行相求借問樓上女可似羅敷不里嫗前致辭願君且淹留美人好顔色終日樓上頭兼之臨忩繡精妙世無儔君子謬垂盼聞言中心喜語我長者行同聲謂應爾郎君美風度玉樹蒹葭倚十九渡長江聲名若江水好花不獨榮天生合連理行行隨君去黙黙思故里牽帷幾回喚低眉羞欲死臨鏡貼花鈿可憐體無比紗忩春日午脈脈情何已憶我在家時拈香繡大士金刀翦素綾瑩瑩白於紙刺成蓮花葉彷彿香風吹香風吹入夢夢到蓮花池繡痕細難識但覺生蛾眉静玩坐逾久忽忽心自疑似曽親見佛不知身是誰綾額尚餘尺皚皚氷雪姿淡濡碧玉毫邀郎為題詩郎書擬右軍妾心亦委婉鍼鋒與筆意曲折隨郎轉繡罷持似君秀色堪舒卷顧我每微笑妾顔先自靦落地為女子可憐側室難陡然一回想心事慘不歡雖復䝉君憐鮫綃恒不乾大婦貴家女妾身臧獲看上堂伺音聲下堂候顔色含羞入空房惻惻潛相憶雖然潛相憶無用長太息誠得君子歡不怨長離隔大婦奄逝世一家身獨當漂蕩若浮萍隨君流四方南都復北都終嵗長道㫄黄金散欲盡不思歸故鄉壮志在四海妾心暗悲傷君怯不勝衣年來益憔悴十日九卧病奄奄滯旅次妾首如飛蓬并日忘食事上無姑嫜親下無得力婢旋出又旋入常恐呼不至憂勞填胸臆刺刺肝腸碎嵗月漸消耗妾身亦不支帶圍日趨緩空復存腰肢事君垂十載不一生男兒羞佩宜男草悵然心中悲君甞兩畜婢中道旋棄之妾身非不容君自輕别離暮春三月盡束装謀南歸買舟僅如葉帷幕不得施長夜泊豐草巨蚊攢氷肌生小長閨閣辛苦實難為入秋弛行李僦人樓上居小姑家海濵聞之亦來依雖非久居計氣息聊得舒良人忽生心娶婦支門閭隨珠飾翠幃黄金飾綺疏紅羅複斗帳寳馬七香車今日媒妁來東鄰有美姝明日媒妁來西家有西施妾身匪木石焉得不孤悽對鏡影如削安敢生言辭禮數任頡頏難比先孃時新人入門來灼灼豔威儀二九頗不足二八頗有餘女伴覷鸞緯嘖嘖相嗟咨君心愛幸絶迥與舊人殊非必顔色殊新舊自相渝新人哭亦妍舊人笑不如孤房過慰藉眄睞聊斯須情知心不存詞說空爾為新婚浹旬日忽作南都遊俗語莫空房挽衣不能留新人暫歸寧登車去由由妾身姊為母同君亦登舟耳綰雙明月墮髻垂金瑬飄颻蕩湘裙色如安石榴輕盈作纖歩翩若雲端游鄰女相擁簇朱顔自生羞十年方得歸一喜還一愁顧君色悽慘何用心怮怮莫非眷新昏懷此離索憂千喚不一答黙黙自低頭舟行到長水妾自還家裏親戚往邀君君固不肯起詰朝云解維舟中須盤桓勿用再往返各使中心安恐君塗上寒幅巾裁合歡恐君塗上飢烘栗盈珠盤木落霜露急勿使衣裳單千語囑奚兒勸君幸加餐平明奚兒至顔色驟驚顫向前往叩問流淚先被面郎君乞致辭此生勿相見十年恩愛深謝卿重依戀奈卿久専妒㑹見中情變不如痛割絶免使腸輪轉妾身得聞之狂頓摧心肝天乎我何辜天乎真無端雖在夢魂中不料遭弃捐恨無晨風翼迅駛追君船淚珠千萬斛那得飛君前牽衣一慟哭身死妾亦甘縱然被驅遣曷不先一言一去永决絶何處鳴煩冤自從入君門歴今垂十年雖彼雞與犬亦當念周旋如何鐵石人一絶弗復憐椎胸胸血嘔委身赴清水骨肉痛如割黽勉相救止姊恩父母深我生不如死尚冀南都還重來過吾里性行吾熟知兹望殆已矣昔年别兩妾我淚揮不止誰料行及身苦境苦如此嗚呼倉浪天兹恨何日已新人入我門繡帷長日垂依稀覩容貌猶未通言詞臨行詳睇視恰在登車時蚤知生死隔揮淚一致辭念與小姑别淚落如連珠妾初進門來小姑九嵗餘探懷索果餌髮亂呼我梳今來已成婦骨肉情依依長别不一語腸斷當何如我有兩丫鬟事我五六年大者髮覆額小者亦比肩晨興聽呼喚夜深候我眠而今永隔别涕泗紛潺湲平時解思我料爾當亦然掩淚入房來忩前見鍼帖殘絲與剩綫寸寸皆儂血向日入君目從今長斷絶委婉隨郎心郎心太曲折忽見大士像不覺淚滂沱稽首乞慈悲妾身竟如何今生無罪過宿生愆怨多安得轉君心春風被女蘿君心終不回不如赴長河稽首乞慈悲再拜涕漣洏不望重聚首但願相見時雨落不上天一見知何期婦人失夫心百念無可為但願新人歡為君生男兒更念孱弱身疾苦不相離舊人識君性新人安得知十年守窮賤心事多苦悲願君振髙翮及時凌風飛妾身長已矣相見知何期一字一嗚咽行道皆酸悽朱近修云源出孔雀東南飛作而不盡規橅字句才氣無前擬古三首游思隨飄風逺歴杜陵道道旁合歡花悉成斷腸草紅顔不堪駐妾愁君亦老為樂逮良辰歸來何不早人生數離别百年非壽考擾忙風塵中榮名詎為寳所思不可見彈古相思曲曲中竟何言理短情自促野卉非不香采之徒躑躅今日白頭吟昨日黄金屋誰為不死人懷此終日憂來日當大難今日且行游行游須及時古語恒如兹口爾身不然留為他人嗤今古更相笑游者無還期和陶六首偶歩短檐下淡雲如逺山變幻斯須間玩之欲忘言栁青菊花黄樂飢以長年優游茍能爾奚用百世傳志士有竒懷何為翳我情吾身如聚沫所寳非榮名但問寓世間何以了一生秋風隕枯葉慄慄心自驚時哉不我待淹留欲何成夕陽在髙栁黄葉依風飛我心匪傷秋不覺心獨悲慷慨尚前行動念多所依長道眇無畛究竟将安歸中夜發長嘯一嘯百念衰但得此中樂百年願無違鄰家有新竹日夕百鳥喧更有古梅花植我西北偏啓忩與相向幽幽同空山朝看樵豎來暮看樵豎還似得古人趣有意未敢言忽忽有所思乃在天一隅豈敢憚修阻去去登前塗騕褭猶不疾揮鞭冀長驅向謂萬里長萬里更有餘一朝悟馳逐轉盼歸其居問余何所好所好在六經不作亦不述好古未有成笑彼百家言戛戛何紛更屏去勿復覽閉門書黄庭滴露小忩前好鳥向我鳴此際意無限黙黙緘我情讀史三首魯仲連鄙夫寧一身身外非所計有如魏帝秦何與魯連事先生獨倜儻慷慨决大義白日走秦兵誠哉天下士荆軻蕭蕭易水波日晏客未至十三死灰兒勉强共大計坐中撃筑人何不充秦使田光死也餞於期死也贄空死一無酬烈士䘮英氣願逐酒人游哭盡不平事諸葛亮受託誠不易知人良獨難南陽比子房誰為酇與韓将相兼簿書心中多苦酸十出九空歸一身亦凋殘為君歌梁父中夜發長歎九日同嚴知章澹如兄弟遊茶磨山我來松陵㝷好友到門恰值九月九主人大笑攜上船船頭載花腹載酒舟子勸上姑蘇臺衆客首肯我獨否青山宜作生面觀耳目熟爛妍亦醜但問誰家冨修竹我船便纜堤上栁布帆直指吳山陲起覽竒蹟竟何有洞庭縹緲波雲沉彷彿頑沙卧千畞細雨斜侵濕布袍放船倒出蓮花漊上方樹杪插浮圖石湖湖光照戸牖隔林前度茶磨山共約聽歌到申酉驟觀山石勢頗仄愁無平壤安杯瓿斯須簫管咽流雲畫船别駐清溪口蘆花楓葉舞凉風豈必美人垂素手同來伴侣大叫絶私喜兹櫂良不茍寒蒲縛蟹一十輩烏巾注酒七八斗酒酣不厭觴令酷衆人或辭我輒受推忩更問曀與晴皎月若出當坐守茅簷雜詩只在塵寰内居然徑獨迂此君疎類我石丈老於儒候雨迎鳩婦栽花薙䑕姑客來深自慰知有濁醪無王屋九首屋字孝峙初名畹字蘭九嘉善人有學可齋詩箋魏禹平云山人詩蒼茫磊落不作喁喁細響詩話孝峙以詩受知魏忠節因與忠節一門羣從和酬詩類劉改之詞學辛幼安甞過同里曹學士齋學士曰先生尚能著屐逺歩邪應曰有太史公不可無牛馬走鄉里傳為新語秋風辭秋風秋風汝何殺我芙蓉摧我梧桐梧桐折兮芙蓉死鳳鳥安棲兮鸂􅈃安宫鸂􅈃逝兮文章隠鳳鳥不至兮吾道窮夫誰使我至此極孰非爾朝夕之秋風子夜歌三首千金買良玉百金求良工為儂作雙環相連無始終妾身妾自惜君心君自知莫将日後情不如初見時家有千黄金不如得郎心家有千倉榖不如抱郎宿陌上桑可憐陌上桑朝看沃若暮萎黄銀蠶不了餵牛羊春日過聞溪贈别許清機我適後君來君復先我去人生如飄蓬能得幾回聚君今别我歸何處直到錢塘江口住江水江雲日日流相思時倚江頭樹辛酉端陽日午節今朝是開尊召酒徒趁晴刪艾葉冒雨翦菖蒲重碧杯中滿輕黄額上塗醉憐雙鬢短還插健人符送黄海歸新安清秋客子歎歸歟載酒題詩一送渠細雨亂山遮汝去淒風落葉對誰居江村處處休黄犢野店家家賣白魚見說雅懷多不減每逢佳勝輒停車題黄大癡横幅山水絶壁長松倒影低寺門殘日響迴溪老身意想如曽到八月虞山拂水西陸寳十五首寳字敬身鄞縣人官内閣中書有霜鏡集曹能始云中翰詩逍遥容與蟬蛻塵埃之外屠王伯榖云敬身詩篇麗逸讀之唯恐其盡田叔云敬身古詩敦厚得江謝門風近體深沉具髙岑家法詩話敬身近體好用助語辭不無狃於公安景陵之習然其才氣奔逸勝葛震甫陳仲醇且十倍近李處士杲堂輯甬上耆舊詩凡四百三十人三千餘首自詡捜隠獲竒而敬身曽與余太常君房屠儀部緯真楊處士伯翼識面卜鄰者乃獨遺之何與五雜俎五雜俎綺千箱往復來輦金忙不得已獻大璫怨歌行天胡以不五風十雨而旱潦螟賊嵗靡有寧人胡以不披襟吐哺而爪牙毒螫立意相傾世胡以不解繩錯象而戈矛荆棘日㝷戰争怨歌行此怨何時平相公來相公來合軍驚千夫執殳除道郊迎相公下車命長揖口雖不言心内泣伍符尺籍新有名鶴入鷄羣從自及昔時直上何壮哉呵聲百口迅如雷行者止立坐者起沙堤如拭大車來一朝禍至棲叢棘不賜屬鏤猶主徳皁帽騎驢出國門東海東頭聊假息秋髙汛撤問歸船手挈行囊只半肩冨貴如雲真大夢胡椒鍾乳在誰邊春雨吾廬不厭晴吾田不厭雨禾焦恒苦飢屋漏卒難補人心安有極天意竟誰主敢以一人私而忘四郊苦雨亦恤民間涔涔注環堵待旦問田家立苗青可數歡然荷鍤歸兩稅登天府大水瀕湖盈百堵積潦失寧居舟反髙于屋人誰免作魚撈萍迷曲巷望栁認前除正及西成日憂深藿食餘光宗皇帝挽歌二首辨色初勤政龍樓御蹕臨禹謨咨益稷殷祚促丁壬禁雪沾衣白宫池染淚深他年青史上從諫識天心䘮車蘭殿出隧道柏城通七月期方至元年厯未終仙遊無棄屣臣節有號弓嗣聖鴻猷在河山豈盡空周斗文自易水歸縱談燕太子及荆髙遺事嘅然賦此每讀燕丹傳長悲易水遥聽君談往事風起復蕭蕭庚午元日官㕑柏酒泛紅霞烽戍初停聚飲譁遥祝萬年天子壽小臣九十日看花行嘉善道中夜宿朱涇春潮覆草半江青長水分塗客未經少理蠶絲多織布百家烟火傍朱涇齋居二首層層樓榭枕松闗每到花時獨不閒酒榼茶罇人去後忩前一幅米家山浴蘭初罷振纖袿竹枕桃笙手自攜避熱不教人㸃燭滿樓凉月照登梯送人之秦川水鳥低飛狎榜歌木蘭雙槳送凌波浣紗人在中流見錯認前山作苧蘿湖上承恩坊裏緑楊烟翠幄朱樓大道邊誰似儂家湖上住當門人上木蘭船廣陵懷古茱茰灣接古䢴溝白塔河分上下流疏鑿當時有深意徒勞闗吏日持籌趙宦光一首宦光字凡夫吳人有寒山雜著詩話凡夫以篆書名略用草書體書之號曰草篆紺園琳觀精舎名園咸乞其書題扁所撰說文長箋一時紙貴然自解人觀之未有不齒冷也古之小學書數方名字或不正童子皆知之自周秦及漢無不識字之學生其後大小二篆生八分三真六草諸體雜出古法未盡亡者賴有許叔重說文一編自一至亥本之倉頡迨譜以四聲說文亡矣顧野王玉篇其文多於叔重孫强又増益之迨題以大廣益而玉篇亦亡矣葢書之最古者莫如篆學野王雜以𨽻書已失其舊李陽冰刋定說文頗出私意詆訶許氏學者已恨之凡夫草篆其又何所本乎世人一遵晦菴朱子之說以灑掃應對進退為小學書數方名槩置不講無怪乎小學放絶篆法日微可歎也已凡夫饒於財卜築城西寒山之麓淘洗泥沙俾山骨畢露髙下泉流凡游於吳者靡不造廬談讌廣為樂方特於韻語遜其鄉里登華山鳥道縈紆上深林幾折盤支公此銷夏五月晚猶寒朱鷺四首鷺初名家棟字白民吳人有青浮子䫇籟詩話白民負竒甞獨游黄山逺㝷嵩華所至畫竹以自給家居撰建文書法擬思進呈請復革除紀年不果崇禎初騎驢入都上所作甘露頌又不果歸結茅於郡西華山蓮子峰下躬親井臼不願見貴人年八十餘乃卒是時隠居者王在公芥菴趙宦光凡夫時稱吳下三髙而敦古節者白民為最文文肅特志其墓自君之出矣自君之出矣春去勞我思春去明年來君來定幾時二龍見感東宫議立未定一龍蒼一龍黄黄者不可以為蒼蒼者不可以為黄過曹氏園值玉蘭盛開花光何璀璨八忩揺一色春風過酒人忻與花相直謁采石磯李白祠沽酒不得先生邀月飲江邊此月年來夜夜懸我念先生對今月恨無一斗醉祠前徐𢎞澤一首𢎞澤字潤卿號春門嘉興處士有竹浪齋集李君實云隠君詩喜白香山陸放翁流利清越不為鈎棘索隠陳仲醇云隠君詩清真流便雅類元白題畫贈李尚寳風卷長蘆晚雲開積水明沙邊雙白鳥逐我釣船行周應儀五首應儀字元度吳江人光禄寺署丞有南北游草詩話元度絶句小詩極其纒綿温麗爛溪二首明月溪邊路秋風溪上船船頭何所有滿把水中蓮我家爛溪邊出門即溪水秋來溪水深處處菱歌起夏日風荻蕭蕭日欲斜水村無處不荷花遥看白鷺忽飛去占斷栁隂一片沙夏季風雨大作急雨斜風百尺樓樓頭殘暑一時收而今炎景成蕭瑟零落荷花十里秋聞歌桃花扇厎落紛紛宛轉清歌一曲聞醉殺文園渴司馬酒壚斜盼卓文君張大復一首大復字元長吳人有梅花草堂集少年行連錢細馬繡纒鬉翻鐙欹鞍踏曉風鞭指緑楊深樹裏誰家小袖杏衫紅王履和一首履和字仲美邢臺人驄馬行紀乙丑林侍御事貂璫行驄馬鳴緹騎至驄馬避驄馬欲鳴聲不長君不見昨日新殺屯田郎祝守範三首守範字更生海寧人有非非集戔戔草枕中拊缶堊室停雲諸稿雨中過郭四葑畦别墅和王二仲臯韻隙地新栽竹清隂覆短墻探幽停客舫引興雜飛觴暮雨沾花徑春流到草堂物情渾可適機事久相忘哭姑徐孺人訃自蜀中萬里勞行役經年苦未安風塵多躑躅蘭蕙忽凋殘旅櫬荆門逺歸魂蜀道難空餘游子淚泣涕滿江干急雨野曠雲垂黒山髙雨驟昏鳥飛不過樹人急欲投村暑氣清疎簟凉飇度晚軒客心愁褦襶賴此滌塵煩馮嘉言一首嘉言字國華慈谿人天啓初諸生有十菊山人詩集月夜舟行薄暝南川路相攜上釣舟江風鳴逺樹野水映危樓濁酒髙歌處征帆古渡頭月明動幽興擬作五湖游顧猷三首猷字若昔嘉興人有桃花里集出塞漢将當年此望鄉髙臺雲物自茫茫羌笳漫引孤城月金柝旋催子夜霜木落五原秋色浄草枯千磧暮烟黄材官朔漠聞亷李烽火年來總不防秋夜泊謝村水上人家半掩門寒鴉棲盡欲黄昏孤舟夜泊依紅樹記得唐人詠謝村西湖夜别葉環中水落西陵日已斜濃烟疎栁半藏鴉相逢莫漫輕相别燈火湖頭是酒家張志逺三首志逺字叔明嘉興人有竹嶼吟藳詩話叔明隠於市㕓詩為李九疑太僕所賞句如沙崩樵徑斷水濶野橋危香吹新竹粉翠惜小荷錢論者極稱其清醇穏順不誣也擬古七雄事紛争嬴秦獨虎視阿房亘長衢轉眼成荒壘縱横一何深翻為逐鹿始豈若魯仲連千古名不死偉哉達士心榮華安足齒集慶寺作參差紅樹倚晴空楖栗行吟度晚風忽憶翠華臨幸處滿山黄葉寺門東泛月烟雨微茫水國秋暮霞飛盡月當樓誰家短曲續長笛吹墮微霜上客舟殷仲春二首仲春字方叔秀水人有棲老堂集詩話方叔躬耕永樂南村陳仲醇贈詩却羡白頭殷處士鵓鴣聲裏獨耕田是也家居社南諸弟分處郭西之竹橋方叔葭墻茅屋不蔽風雪慕王績為人亦自號東臯子以醫為業得錢即入市買斷爛書讀之念浮屠道士之撰述皆編入藏乃盡收醫書著録號為醫藏岐黄家以為總龜焉方叔以天啓辛酉卒仲醇志其墓湖上岡桑柘隠斜日獨登湖上岡誰人攜小櫂載酒出菰蒋仲夏同仲醇子逸伯承秋潭汎舟城西兩槳夷猶風幔低湖流清淺荻蘆齊相将迎入烟波去晚泊竹橋西更西陳元素一首元素字古白長洲學生贈錦衣衛經歴白超宗參軍也得謁金門莫憾官卑獄吏尊彭澤先生新令尹參軍以彭澤令調香山居士老聞孫衣歸質庫仍留客印閣閒牀且校文冷署久淹殊不惡請看三載著書存黄光昇一首光昇字羲輪吳江人國子監生有破甕集懷許受先𤣥符緑字細能分家學須知有說文此去橋門摹十鼓籀書難讀益思君陸嘉穎二首嘉穎字子垂蘇州嘉定人天啓中官主簿有硯隠集望君山木葉下蕭蕭山容更寂寥浮天江縣小隔樹海門遥帝子何由降騷人不可招無心貪利渉來往信漁樵如臯道中滿目桑麻雨露稠白花籬落遶清流家家魚畧村村酒絶勝淮南十一州吳道一首道字實儒吳江人有山響齋詩草一室海内誠多故先生一室寛敢期花爛熳粗喜竹平安曝背晨曦暖推忩夜月寒逺遊無勝具四壁有烟巒周楨一首楨字伯知吳江人有不夜齋詩稿詩話伯知性最緩甞與其弟同舟宿有偷兒抉忩入竊其篋伯知審視不語比其弟覺訶之偷兒踉蹌出伯知徐曰吾欲静觀其如何脫身奈何使彼狼狽而返鄉人傳以為笑其詩流便而乏警䇿由其嬾於推敲也寄季華弟讀書石湖草堂青山遥入夢詩寄别愁生雨過添秋色雲開驗晚晴藤花鋪地滿澗水入池平轉憶湖邊好中宵月倍明陳衎四首衎字磐生閩縣人有大江集詩話磐生與徐興公同入曹能始䦘風樓詩社而賦才儒鈍光燄鬱而不舒其自序比於春草蔓生秋蟲孤響良亦自得之言善才岫夜坐江烟吐寒燄倒影星河明潮回石勢險孤岫西南傾扶笻倚危坐仰攀崖樹横夜色一何曠波濤良未平奈何羈塵鞅促促浮此生吾愛鄭子真谷口田可耕送潘子才送客上髙樓樓髙望客舟但見帆檣立不見客回頭始知登逺道兩情難自保聽泉閣早起山曉天氣肅衆星望已空殘雨戀宿雲猶在寒巖東物象紛勞役明晦互有窮瑽琤石上泉日夜流無終十不願辭不願化天上月那得盈盈長不缺一不願化天上星白日一照不分明二不願化土中石受人踐踏無人惜三不願化水中灘十歩上來九歩難四不願化忩前鏡十日不磨光不瑩五不願化沉水香煎熬燒灼心摧傷六不願化郎馬鞭下馬将他壁後懸七不願化白紈扇顛倒要他遮郎面八不願化錦駌鴦未必雌雄守得長九不願化楊栁花隨風飄蕩落誰家十吳為霖一首為霖字景傅無錫人有白賁集詩話景傅詩如集場墟市骨董斑駮陸離即而視之一錢不值客有澄江歸有贈浮逺堂前路微風穏放舟江昏茶磨雨烟暝弩臺秋入饌花雞脆開封緑蟻浮西塘十八里來往候潮頭詩話浮逺堂在君山宋紹興中建淳熙間李鶴田珏為江隂司法題柱聨云此水自當兵十萬昔人曽有客三千羅春伯㸃題名云淳熙丁未九月既望同侯叔平等九人登君山夕陽在波帆影散亂平淮千里去鴈無極蒼然暮色自逺而至須㬰月出東山之上江水湛然風露清美不知在人間世也吳一元一首一元字堯開宣城諸生冬望野爨孤烟起灘舟一水膠深林餘敗葉髙樹見危巢地僻無行騎家貧驗素交年年𤣥草在誰解子雲嘲戈金湯一首金湯字帶如平湖人用泰子郊游雨過青山碧四圍春風輕颺百花飛極知良㑹非容易馬上何妨酩酊歸麻三雍一首三雍字仲雍宣城諸生自平陽還襄陵道中聞蛙作三月三日試春衣千山萬山花亂飛行人何處覔相識啼鳥有時催早歸日漸衝山鞭影急烟初迷樹水光微草深陣陣喧蛙鼓鵝鴨軍聲似也非張丑一首丑字青父長洲人詩話青父精於鑒古所撰清河書盡舫真蹟目録時人比之黄伯思周公瑾詩草無傳亦有節度墨皇齋即事用拙經營少居閒興趣長閱書宗海岳展畫得瀟湘玩世歌漁父陶情付索郎向平昏嫁畢白首杖桄榔陳士鵠一首士鵠字季方秀水人有鍛齋集秋光好何處秋光好秋光在狹斜碧添螺上黛黄入鬢邊花蓄意纒頭錦輕寒繋臂紗江州何必怨任爾聽琵琶王彦泓十八首彦泓字次回金壇人慈谿儒學教授有疑雨集詩話風懷之作段柯古紅樓集不可得見矣存者玉溪生最擅塲韓冬郎次之由其緘情不露用事豔逸造語新柔令讀之者喚奈何所以擅絶也後之為豔體者言之惟恐不盡詩焉得工故必琴瑟鐘鼔之樂少而寤寐反側之情多然後可以追韓軼李金沙王次回結撰深得唐人遺意起句如雨下春泥月下霜幾年辛苦是蕭郎一層芳樹一層樓只隔歡娛不隔愁月到西南倍可憐照人雙笑影娟娟中聨如燒燈院落更衣影聽曲簾櫳㸃屐聲當初語笑渾閒事向後思量盡可憐畫舫簾衣凭雪蕅玉筝絃索見春蔥明明可愛人如月漠漠難㝷路隔烟臨水偶來同倚檻隔花何路可登樓封來淚㸃紅猶濕翦後香絲緑未齊繡佛像前同下拜泥金經尾獨僉名含毫愛學簪花格展畫慙看出浴圖花下小樓堆燭淚栁邊低舫載茶烟翻成繡譜傳人畫㑹得琴心允客挑忩下有時思夢笑燈前長不卸頭眠結句如水國不生紅豆子贈君何物助相思殘陽欲度梅梢盡纔向紅忩拂鏡奩蠟照漸微香灺冷珮聲纔達畫堂東闌干一曲無多地才著思量便渺然仙家合住烟霞外金屋藏渠也不堪今日席間誰認得舊時家令沈休文分明蠟燭身相似纔上歡筵淚已零一生長羡金泥蝶顫向釵邊與鏡邊皆饒風韻誦之感心嫮目迴腸蕩氣寄懷􅌢仲秣陵并促歸騎春光漂蕩别離天心似游絲百尺牽見說人歸歸鴈後那堪淚落落花前南都翠黛宜為史北里紅箋定幾篇争似碧忩銀燭夜月痕依約話纒緜寄懷端已白門客懷難耐日初長馬影斜陽踏幾坊花下玉杯甞苦筍燈前銀葉試甜香皆南朝風物愁來但禱清溪廟醉後無忘紫佩囊為覔繡鞵金縷樣倒提纖手學南唐逋客叔菊筵幾拍吳歈日漸曛後堂香發卷簾聞登牆雪貌東家子映燭明姿左阿君花氣與人渾不辨竹聲如肉驟難分分明玉樹尊前坐知是何人夢裏雲無聊把書移枕近牀稜歎息觀濤病未能怯暑心情猶喘月背時風調獨懷氷無勞天女持花散有媿髙人選藥稱肯過小樓言笑否不嫌同上第三層用陶𢎞景事城樓暝望魚鱗波面夕陽微旋見遊船續續歸酒後笙歌催急拍城根燈火喚開扉孤楊傍水疑人立病葉零風似蝶飛明旦出游晴得否月輪添暈幾重圍無題三首花繞迴廊曲繞梁暗中偏認杜蘭香登樓未定銀翹顫避燭難禁鳳屧狂怕見月痕催月姊恰宜秋色對秋孃持裙半刻留仙住纔隔紅簾便眇茫夜飲朝歌醉未眠輕狂全是倚孃憐妮他細語挑鍼綫替我悲愁肄管絃夜月不移歡枕畔借用不夜珠事春山長坐酒壚前何當荑玉親磨墨立到琉璃硯匣邊怯上蘭舟細歩來笑看波影按金釵陳王著眼先羅韤温尉闗心到錦鞵把酒熨衣容旋學摘花烹茗任頻差船孃為近牕紗泊免踏前門月露街有贈秋風長簟恨三年續命曽聞喚小憐已向緑珠稱弟子儻容張碩伴神仙筵前笑顧櫻桃擲燭下偷分茉莉穿端似悼亡唐後主見伊枝葉又情牽代所思别後阿姚相逢羞澀怕猜嫌别去那知悵恨添獨對鏡奩空怏怏乍拈鍼翦復懨懨夢魂弱絮從風亂心緒繁花被雨霑悔不暫留歡且住未妨長隔一重簾續遊嚴城間阻夢魂通小市門東更向東翦燭寄聲書草草背燈彈淚去悤悤花繁竹暗應迷路蝶趁鶯梢有便風梅蕊膽缾看漸減每朝分插到釵叢賦得别夢依依到謝家名花偏作隔墻枝愛影憐聲入手遲門第敢言非道藴才情端喜是芳姿桃邊未許裙題字子敬事栁下曽将帶乞詩今日眼波微動處半通商略半矜持左卿阿鎖玉浄花明秀出羣左家重見舊時芬因披樂府吟嬌女便上藩車訪阿君見陳遵傳素豔乍看疑是月清歡何暇想為雲那禁手炷熏籠罷笑遣蕭郎覆畫裙追和唐女冠魚𤣥機十二韻閨門文采羡𤣥耽更有青溪妹第三生小不闚青瑣閤家常希換白單衫釵梁風定蟲猶顫裙衩花深蝶競銜雅謔引經推鄭婢狂詩送抱想吳男紅兒詩裏歡兼恨素女圖前笑帶慙想見隔屏聲矻矻似聞昵枕訴諵諵加餐意託琉璃匕寄札愁憑瑇瑁篸古詩何計通音信蓮花瑇瑁篸豈有鵲頭能助憶願為雞舌與君含遥猜蹤影心先妬未接言辭性已諳體自生香防姊覺眉能為語任郎參髮光可鑑千盤滑脣味如飴一嚙甘記得那時偷近處唾絨紅㸃碧忩南寒詞三首從來國色玉光寒晝視常疑月下看况復此宵兼雪月白衣裳凭赤䦨干夜迢迢更路迢迢澹月飄燈自過橋想得阿嬌燃燭待也應初換第三條忩樓映日滿樓明雪豔初臨曉鏡清良久自看還獨笑不防身畔立卿卿過婦家有感歸寧去日淚痕濃鎖却妆樓第二重空剩一行遺墨在丙寅十月十三封王清臣一首清臣潁州人王貽上云天啓初潁川張逺度買田潁南地多桃花林一日攜榼獨游見耕而歌者聽之所歌皆杜詩也遂呼與語自言王姓清臣名舊有田畏徭役盡委諸族為人傭耕逺度過其廬見舊歴紙背以煤書所作詩其一篇云云述懷人生如泛梗飄飄殊無根飲啄得幾許營營晨與昏對此春日好荷鉏出南原近觀草色敷静聽鳥語繁有身貴適意窮達安足論明詩綜卷七十二
