body:
  text: 明詩綜卷十九翰林院檢討朱彝尊編姚廣孝四首廣孝長洲人幼名天僖既為僧名道衍字斯道洪武中以高僧應選侍燕邸永樂初論靖難功為僧錄左善世加太子少師復姓賜今名卒贈榮國公諡恭靖有逃虛子集高季廸云衍公詩險易竝陳濃淡迭顯能兼采衆家不事拘狹恭俞汝成云少師詩縱淺近宜傳顧𤣥言云靖性空思𤣥心寂語新恵休法振不得專譽禪藻命蔣仲舒云少師棲遁禪宗中嬰世網既參佐卒叛初服互逃儒釋之間未獲進退之所其詩如忉利天雖自快樂未就解脱魔障既深終當墮落静志居詩話少師與十高僧同徵當時孝陵知人則哲何不移來復之誅誅之考前代桑門得預軍謀者若佛圖澄道安鳩摩羅什支曇猛竺朗皆非盛丗之事少師獨早著才稱晚參帷幄文與北郭十友之林武居靖難諸臣之首咄咄怪事觀其入燕兩謁劉太保墓賦詩云良驥色同羣至人迹混俗知已苟不遇終世不怨讟偉哉藏春公簞瓢樂巖谷一朝風雲㑹君臣自心腹大業計巳成勛名照簡牘身退即長往川流去無復佳城百年後何人敢樵牧斯人不可作再拜還一哭蓋早以藏春子自况矣荅揚孟載棲棲泊城南春深抱幽獨餘花猶綴紅衆樹巳滋綠兹因塵内居始憶山中屋何時陪騎游吟看舊題竹送友人之松江潮來沙磧平月落海門曙汀蒲轉風葉堤栁搖煙絮江頭春可憐天涯人獨去有歌送君行無酒留君住雪浪没沙鷗雲帆出江樹回首讀書堆青山不知處題秋寺晚晴圖猨將朔吹哀雲帶溪流駛相送獨歸僧蕭蕭夕陽寺秋蝶粉態凋殘抱恨長此心應是怯凄凉如何不管身憔悴猶戀黄花雨後香解縉三首縉字大紳吉水人洪武戊辰進士試中書庶吉士尋除御史謫河州衞吏旋待詔翰林永樂初進侍讀學士直文淵閣預機務逾年進翰林學士出為廣西參議改交趾入奏事㑹太宗北征見東宫辭去為高煦所譖徵下獄命獄吏沃以燒酒薶雪中死有春雨齋集楊東里云大紳詩豪宕豐贍頗似李杜為黄廷臣云學士古體詩入太白集中孰别其近時之作蔡朔云先生詩豪縱放逸一自胸中流出譬之長江大河一㵼千里覽者為之心驚目駭李賓之云學士才名絶丗詩無全稾傳者真偽相半䪺令觀者有楓落吴江之歎廖𤣥素云學士興會所到肆意成章水搏蛟蚪陸剸犀象淵乎其不窮浩乎其有餘高皇智屈羣䇿親如善長貴如廣洋惟庸近侍如安如濓如觀如素雷霆所擊罔不震懾學士以一少年萬言批鱗靡所忌諱而聖度優容令其進學才難之歎猶可想見也遇徐子元云大紳獨駕青鸞翺翔八極使謫仙之當懸榻以待王元美云解大紳如河朔大俠鬚髯㦸張與之周旋酒食傖父俞汝成云解學士才冠一時積學尤冨發為詩文宜無與敵乃多率意遣辭不事磨錬若信筆斿戲者然蓋在國初風㑹習尚使然也中穆敬甫云解詩如塵起朱輪風生綠幰乃詩貴游也李時逺云學士天質甚美詞鋒甚鋭但少温厚和平之氣詩話明初詩傳者多失真如楊亷夫題鍾山作此吾鄉朱山人純詩也解學士題虎顧衆彪圖則又亷夫之詩也乃説詩者謂太宗幾欲廢嫡見詩而止傅㑹之言殊堪發笑學士詩敏捷不大推敲其言曰寧為有瑕玉莫作無瑕石其立意固如是矣然就近體而論如細雨乍過西掖樹熏風遥聽上林鶯青山拍拍風沙滿紅葉蕭蕭浦樹稀三千歲後桃花老二十四橋秋水通天連銅柱蠻烟黒地接珠厓海氣黄粤女艷妝爭丱髪徭人村鼓共鳴銅青山逺道遥相送畵舫中流獨自歸千家竹屋臨沙觜萬斛江船下石頭未嘗不符作者亦何至叫嚻隳突若丗所傳詠物諸詩衆惡皆歸皆由敏捷召之乃知騕褭以迅驟為主鷹隼以輕疾為妙張純之言大非篤論彭澤青山圍一縣隱隱見人家亂石邊江出孤帆帶日斜翠添官舍栁香泛驛樓花不見陶彭澤湓城起暮鴉寄黄𤣥齋來時蕭峽駐輕舟惆悵初年作逺遊夢裏相思不相見武功山下月輪秋龍州波羅蜜樹滿城闉銅鼓聲喧晝賽神黄帽葛衣墟市客青裙錦帶冶游人楊士竒十七首士竒名寓以字行泰和人建文時以辟召入翰林永樂初改編修入直文淵閣累官少師華蓋殿大學士贈太師諡文貞有沙羨石臺東里諸集楊𢎞濟云東里歌頌太平未嘗不致儆戒之意至於觸物起興亦莫不各極其趣體製音響皆發乎性情非求之工巧者比元李賓之云文頁學杜間得魏晉遺意徐子云東里格調清純實開西涯之派胡王元美云楊東里如流水平橋粗成小致元瑞云楊文貞文敏胡文穆金文靖皆大臣有篇什者頗以位遇掩之詩體實平正可觀蔣仲舒云少師韻語妥協聲度和平如潦倒書生雖酬酢雅馴無復生氣詩話東里優游按衍諸體皆藴藉可觀其自序云古之善詩者粹然一出於正用之鄉閭邦國皆有禆於丗道夫詩志之所發也三代公卿大夫下至閨門女子皆有作以言其志而其言可傳余早未聞道既溺於俗好又往往不得已而應人之求即其志之所存者無幾也亦可謂能自訟矣送尤文度歸吳中我友整遐裝誓將起旋歸平明發城邑率彼東路馳爰與二三子祖餞臨郊岐中觴趣分袂恨恨使我悲嚶鳴求其友竊慕伐木詩平生擕手好何為中仳離行當阻川岫安得睹光儀情敦思苦深久要諒不遺各言崇令徳庶保黄髪期漢江夜泛汎舟入𤣥夜奄忽越江干員景頽西林列宿粲以緐凝霜飛水裔回飇蕩㣲瀾孤鴻從北來哀鳴出雲間時遷物屢變游子殊未還短褐不掩脛歲暮多苦寒悠悠念行邁慊慊懐所歡豈不固時命苦辛誠獨難感彼式㣲詩喟然興長歎李舒章云楚楚自好不失選體同蔡尚逺尤文度朱仲禮楊仲舉蔡用嚴游東山步出城東門逍遥望雲巘累月懐佳遊兹晨遂登踐梵宇繞層阿飛樓凌絶峴方塘涵湛碧喬林茂敷衍緐翳幽莫通丰茸紛不剪攀磴窮高躋緣逕屢回轉是時㣲雨收輕霞澹舒卷睇遥素横川俯夷綠盈畎陟降體自便顧睇心巳􅃡况接曠士言復偶釋子辯析空理弗昧違喧抱逾展何因此閒棲永令浮慮遣永豐曽氏龍潭開軒面澄潭潭水綠於染其下蟠蛟虯四時興有渰嘉樹羅蔥蒨煙霞互舒斂晴漪漾春牖凉颸舍暑簟俗轍謝經過書卷恒不掩探㣲心有得行素道無歉逍遥視天宇油雲馳冉冉庶跂沂上樂誰當歎與㸃題劉逸人樂耕卷理生雖異業居丗皆有務治本既在兹食力余所慕九扈春始鳴興言向田墅初來正溝塍爰方藝禾黍雖有耘耨勞三時足甘雨歲功聿巳成屢豐報田祖儲峙何必多取具充寒暑有酒可同歡時時會鄰父既醉去悠然登高睇平楚一為擊壤謡㳺心緬千古雨中寄鄒仲熙炎月苦淫雨抱疾坐幽居淖泥横隘巷流潦溢深渠已絶還往迹遂將人事疎時聞黄鳥鳴交交屋東隅豈無斗酒酌間玩古人書興懐在君子夙昔同歡娱契誼託金蘭清徳重璠璵跬步不可即而况千里餘仰瞻白日暉屏翳何由舒念離余未弭單居子何如題費同知松樹障子當代畫松誰最精王紱卓廸俱馳聲兩生以來鮮繼者鳯池周璿新得名此圖筆有千鈞力全幅剡藤開潑墨雙株奮起如雙虯直氣森森勢千尺樛枝屈鐵蟠穹蒼勁節磊砢鱗甲張長風颯颯動滿座六月清晝高堂涼吉安别駕好奇古對此宛然巖壑趣茯苓琥珀焉足期堅操終懐共遲暮别駕别駕臨安彦浙東山東宦游徧四明徂徠千歲植所歴山林屢嘗見大材之成由化工自古匠輪希得逢明堂清廟選梁柱何限空老深山中賦得滄浪送陳景祺守襄陽漢水帶襄城滄浪舊有名分符來五馬如練照雙旌濟涉思為楫聽歌想濯纓須令郡人説堪比使君清荅黄宗載乂是三年别新來百感増薫蕕安可問枘鑿苦難勝白髪落垂盡青山歸未能故人贈佳句擬報玉壺氷夜發清江口日落煙水寒解纜清江渚中夜北風來相送潭州去過谷亭明月轉檣竿露下孤篷溼欲繫谷亭舟沙頭風正急夾溝遇邑人聞道故鄉來辭家今逺近恐有南京書停舟試相問題鄂渚贈别鸚鵡江中紅樹鳯皇城裏青山借問來游幾日秋水蘭舟獨還三十六灣湘隂縣南江水斜春來兩岸無人家深林日午鳥啼歇開遍滿山紅白花宣徳丙午謁二陵二首去年侍從謁長陵此日重來慟倍増春栁春花渾似昔獻陵陵樹復層層君恩追憶不勝哀老淚乾枯病骨摧陵下一來腸一斷餘生知復幾迴來過城陵磯城頭水落石層層石上魚檣半搭罾忽望高樓出城郭舟人指㸃説巴陵楊榮三首榮初名子榮字勉仁建安人建文庚辰進士除翰林編修靖難後入直内閣更今名累官工部尚書謹身殿大學士加少師卒贈太師諡文敏有雲山小稾静軒退思等集詩話東楊詩頗温麗上擬西陽不及下視南陽有餘題馮敏山水圖鳯池仙客天機精筆端㸃染真天成想當適意自盤礴呼吸造化含元英欣然寫此得佳趣雲水㣲茫帶烟樹左拏右攫森相樛恍若蛟龍飛不去懸厓峭壁不可攀岧嶤直入霄漢間幽亭卜築在深處塵氛不到清晝閒是誰蕭㪚事游賞短櫂輕舟自來往晚風不動碧波平瀲灧寒光映蘭槳斯人偉矣真罕儔飄飄儼若神仙流披圖一覽發清興仿彿萬里江南秋元夕賜觀燈象緯臨天闕瑶臺集萬靈雲霞紛掩映星斗疊晶熒寶地春應滿金門夜不扃千官陪宴樂拜舞在明庭鑑湖一曲為史院判題見説山隂道湖光一鏡秋逺含晴日動迥帶晚烟浮花發連堤樹帆飛隔浦舟横塘空有夢未許賦歸休楊溥一首溥字𢎞濟石首人建文庚辰進士除翰林編修靖難後轉太子洗馬宣徳初以太常卿兼學士直内閣歴官少保武英殿大學士諡文定有集詩話三楊位業竝稱南楊詩名獨不振楊思敬東郭草亭燕集芝蘭本同氣桃李自成蹊感彼歲易邁肯與心賞違迢迢禁城東桑麥連重畦聨轡縱遐覽我懐浩無涯惠風煦澄景㣲雨浥芳姿人生有至樂舉觴歌於斯胡廣二首廣字光大廬陵人建文庚辰賜進士第一更名靖除翰林修撰靖難後直内閣復名廣累官文淵閣大學士卒贈少師禮部尚書諡文穆有晃菴扈從集楊東里云胡公賦詩取適性情近體頗得盛唐之趣詩話楊東里楊白花云楊白花逐風起含霜弄雪太輕盈蕩日揺春無定止樓中佳人雙翠顰坐見紛紛渡江水天長水閵花渺茫一曲悲歌思千里胡光大楊白花云楊白花渡江竟不還非汝故來急恐落泥塗間春光憔悴如花顔相思不見空長歎浮雲流水何漫漫安得隨風返高樹仍結柔條莫飛去世傳袁景文賦此題蓋縁讓皇遜國而作然則兩公詩亦不無故主之思矣然邪否邪詆光大者謂金川門之變約周紀善同死既而人偵之尚在餵豕果爾則可鄙已甚觀集中過顔平原文信國余青陽祠輒有弔古之作其題宋思陵所書洛神賦云静夜焚香閲舊書洛神下筆意何如可憐不冩平戎䇿千古中興恨有餘汴水園林迹己荒南來宫館燕錢塘卧薪有志圖恢復好冩招魂酹岳王其辭悽惋不類牧豬奴東里尤與相契胡語楊曰吾兩人實兄弟後死則銘及胡没後楊夜夢偕胡泛舟自快閣至郡城下聨句胡云金螺瀟灑對芙蓉楊云鷺渚漁舟窈窕通逺樹白雲秋色浄胡云故人清興酒船同河山夢冷謳吟後楊覺而續之云生死交深感慨中猶想勝縁如夙昔竝騎黄鶴過江東永嘉謝庭循為作圖相傳東里亦與紀善誓同死後語其子曰吾若偕亡誰與尊公作傳豈兩人品行相近故友誼諄諄若是耶滕縣隨獵隨獵入深山山深多乳虎虎見人來却負嵎人一向之觸而怒羣犬聞虎聲競趨至虎傍下口亂咋虎莫當犬視齧虎如齧羊昔聞泰山麓有虎相馳逐尼父駐遊車下問婦人哭嗚呼安得此犬在當時盡驅猛虎食其肉重陪駕至太液池玉砌臨無地飛甍上倚天㣲風斜舞燕高栁沸鳴蟬芳草茸茸細池荷箇箇員孰知丹禁裏别有好林泉金幼孜一首幼孜初名善以字行新淦人建文己卯舉人授戸科給事中靖難後改翰林檢討歴右諭徳掌翰林學士陞文淵閣大學士歴官太子少保禮部尚書兼武英殿大學士卒贈少保諡文靖有北征集詩話文靖扈駕北征大漠窮沙靡不身歴故其詩時露悲壯之音元夕觀燈應制閶闔重重夜不扃瓊樓十二敞銀屏東風一曲昇平樂此夜都人盡許聽夏原吉一首原吉字維喆湘隂人以鄉薦㳺太學選授戸部主事建文初擢戸部右侍郎靖難後進尚書遣視江南水利歸掌行在吏禮兵部都察院事仁宗即位復戸部尚書加少保兼太子少傅宣徳五年卒贈太師諡忠靖有集詩話長陵靖難而後瑞應獨多黄河清甘露降嘉禾生醴泉出卿雲見野蠶成繭麒麟騶虞青鸞青獅白雉白燕白鹿白象𤣥兔𤣥犀史不一書甚矣天之難諶也當時詞臣爭獻賦頌夏公長律㑹粹而詳書之具見閎麗讀之如覽西周王㑹之圖披北魏南齊符瑞之志亦可云詩史矣特魚虞模並用殆猶遵洪武正韻乎聖徳瑞應詩聖主膺乾運垂衣馭八區道隆堯舜比功茂禹湯俱蕩蕩三邊肅熙熙兆姓娛普天歌至治率土發靈儲爰有諸蕃國能忘萬里塗隨槎超瀚漫獻瑞効勤渠渺渺來中夏惓惓覲帝居麒麟呈玉陛獅子貢金鋪紫象靈山種驊騮渥水駒駝雞同鸑鷟文豹擬騶虞福祿身紆錦靈羊尾載車霜姿猨更異長角獸尤殊綵檻竒音鳥雕籠雪色烏𤣥龜三尾曳山鳯五花敷日上龍墀麗風回貝闕迂禮官躬典設蕃使肅奔趨仙掌開丹扆祥烟散紫衢重瞳欣一顧百辟震三呼兹豈尋常致端由治化孚既將昭帝徳尤足壯神都炎漢何能擬姬周莫竝驅拜瞻嗟慶幸稱贊媿荒疎惟願皇風洽仍祈化日舒鴻圖千載固聖夀萬年餘黄淮一首淮字宗豫永嘉人洪武丁丑進士除中書舍人陞翰林編修歴侍讀左庶子進右春坊大學士輔東宫繫詔獄十年洪熙初入内閣兼武英殿大學士累官少保户部尚書卒諡文簡有介菴省愆歸田等集詩話長陵北征留文簡輔皇太孫漢庶人中以蜚語繫詔獄十年遂以省愆名集集中詩所云寶劍薶豐城斕斑土花碧又云十年頓足園屝間時向牆頭看栁色是也因是受知宣廟特深當其入朝賜游西苑肩輿登萬歲山宴太液池親灑宸翰贈行有云朝旭光升紫殿清相對清言良慰情留之累月不盡意歸心乂欲東南征雁宕峯高高不極中有謝公舊遊蹟采芝劚苓可長年應在天南憶天北君臣相悦可謂千載一時勵志猗猗者蘭于彼空谷悠悠我思曷云其穀猗猗者蘭維芳維馨我有好爵君子攸寧蘭之榮矣繁霜瘁之静言孔念中心悵而蘭之瘁矣益厚其根我之懐矣匪善奚敦蘭之瘁矣芳華載陽淑慎其身終焉允臧李至剛三首至剛名銅以字行松江華亭人洪武中舉明經試禮部郎中出為河南布政司參議永樂初以薦擢右通政拜禮部尚書兼左春坊大學士詩話尚書無詩名其僅存者頗娟秀題王孟端送行圖汀州杜蘅歇南浦西風生美人鼓蘭楫路指江南行南行向何許東望吳松去吳松秋水多綠遍芙蓉渚渚外九龍山山邊三泖灣人家臨水住日暮采菱還采菱歌易斷送子愁零亂愁來可奈何思滿江南岸江南不可思動子情依依皇都春色早遲子速來歸朱澤民秀野軒幽居逺城郭寂寞自成村野色還通市春潮直到門竹窗晴曬藥花塢晚開尊想象其中趣何由得具論趙子固水仙水精宫闕夜不閉仙子出游凌素波為愛低頭弄明月不知零露濕衣多趙羾一首羾字雲翰祥符人洪武丁卯舉人授兵部主事遷員外陞浙江右參政命使交趾還擢刑部右侍郎改工部復改禮部尚書尋改兵部再改刑部有傖父集詩話尚書識于忠肅於弱齡可謂具知人之鍳忠肅序其詩云尚書雍容廟堂之暇發為辭章長篇短什操楮立就有沈雄而典重者有舒徐而優柔者有平衍而沖淡者有光采煥發而豪宕放逸者有清新流麗而忼慨悽惋者變態不一豈區區拘泥聲律摹仿前人於萬一者之可擬哉其稱許未免過情蓋知巳之感深矣城南書事三年為客寄龍沙望斷南雲不見家惟有受降城外月照人清涙落悲笳陳卧子云頗有嘉州之風蔣仲舒云一字一淚黄福二首福字如錫昌邑人由鄉貢仕為主簿累官戸部尚書卒贈太保諡忠宣有後樂堂稾過武昌城頭黄鶴樓城外鸚鵡洲觚稜出漢表葭菼分江流棲棟白雲暮接天芳草秋我來吟不盡沽酒載行舟長沙懐古漢庭求士急洛下賈生賢損益乃長䇿紛更真少年楚江魂不返宣室席空前一櫂西風過令人倍惘然陳璉九首璉字廷器東莞人洪武中以明經薦為桂林教授遷國子助教永樂初知許州改滁州尋以揚州知府攝州事擢四川按察使入為南京通政使掌國子監事終南禮部侍郎有琴軒集詩話琴軒詩較仲衍不及視雪篷聽雨諸君似勝之游新安爛柯山王喬洞峨峨爛柯山日夕生紫煙仙人啓洞府澗水導其前白石寒齒齒幽篁静娟娟紺露泫瑶席慶雲集蕙櫋泠風從東來可以散煩悁萬變紛在目汎覽何茫然王事有嚴戒胡能久周旋振衣下山去滿耳淒鳴蟬蘇小小墓蘇小家錢塘檇李有遺墓芳姿竟何在碑石宛如故光隂百歲短聲色幾人悟可憐墓前花涓涓泣秋露曉發麻沙夾昨暮維輕舠蕭條近沙渚篷窗倚蒹葭淅瀝鳴秋雨晨興喜光霽萬象爭快覩雙帆駕順風如鳥插新羽潮來海氣腥浪起雪花舞行望鐵甕城雲邊見樓櫓羅稚川山水歌為孫伯貞賦郭熙後有羅稚川妙畫往往人争傳醉來乘興埽輕素下筆蕭颯生雲烟天台鴈宕宛相似仙樓佛閣紛滿前春風瑶草發幽澗暮雨藤蘿垂古阡危橋半空度羸馬斷厓千尺飛寒泉扁舟一葉欲何往人家多住沙岸邊牛羊雞犬各成隊武陵何必求神仙我亦平生好清致出山自笑歸無緣還君此畫三歎息羅浮東望心悠然哀洸口有序南漢禹餘宫東西招討使内侍監上柱國邵廷琄劉鋹愛將也宋太祖受禪廷琄言於鋹曰漢承唐亂居此五十年幸中國有故干戈不及而漢益驕於無事然兵不識旗鼓而人主不知存亡夫天下亂久矣亂久而治自然之勢也今真人巳出必將盡有海内其勢非一天下不巳宜修兵為備不然率珍寶奉中國遣使以通好鋹懵然不以為慮及宋師南伐鋹所遣將戰死始思廷琄言命廷琄以舟師出洸口有譖之者鋹遣使賜死士卒排軍門訴無反狀不能救為立祠洸口廷埍東莞人邵村居者即其遺族哀洸口天為愁海風吹鬢寒颼颼五羊城頭天狗墮南漢霸氣應全收天吳海鯨恣吞噬漠漠妖氛徧南裔皇風聞已暢中原嶺海瘡痍待湔洗禹餘宫使輸忠言主聰不悟誠堪憐舟師甫自屯洸口此身已殞讒人手至今山下有遺祠日色慘澹行人悲得家書聞舍弟琦來京喜而有賦偶得鄉人至今秋道爾來家書千里發懐抱一時開準擬同聮句安排共舉杯從今思更切頻上鳯皇臺曉過黄州黄州竹樓雪未晞獵獵寒風吹客衣征帆此時向東去行李何日從南歸青山幾㸃煙際出白鳥一雙江上飛欲訪蘇公舊游處倚篷回首思依依七星巖六丁何年開翠岑穹窿石室高千尋煙生丹竈火常在花落碧桃春又深倚巖懐古有誰會埽壁題詩還自吟日華月華去巳逺玉笛誰能傳妙音宿龍泉寺歸鶴翩翩帶夕曛上方鐘磬隔林聞不眠一夜聽春雨起視四山生白雲自是逺公偏好客獨憐支遁最能文閒身安得頻來此細草長坡數鹿羣胡儼四首儼字若思南昌人洪武末會試乙科授華亭教諭永樂初擢翰林檢討同解縉等直内閣尋遷國子監祭酒洪熙元年加太子賓客致仕有頤菴集熊伯幾云若思篤學好古辭氣英邁足以追蹤作者胡光大云若思温厚雅贍而有疎宕之氣里鄒孟熙云賓客鋪張至治冨瞻不窮楊東云若思體物緣情端厚㣲婉李時逺云賓客詩豐蔚為時所重詩話長陵靖難之後簡詞臣入贊機務者七人踰年而解大紳胡若思出續入者王行儉楊𢎞濟久而王亦出以是相業盛稱三楊論丗者謂解王胡三公才品學術在三楊之右使其不出發於事業必更有可觀者然揆之以時度之以勢有所不能也賓客學文於鄉先生熊釗伯幾伯幾學於虞集伯生故其文有源本詩亦近西江派逺將歸去年與即别楊花飛白雪今年候郎歸楊栁綠依依聞郎買船下湘渚日日門前望行旅行人過盡乳鴉啼徘徊日暮空延佇攬衣回洞房對鏡卸新妝那知清漏短但愛明月光月光照席凉於水帳裏燈花撒紅蕊好事從來不浪傳明日升堂拜姑喜村居秋興草蟲階下鳴夜久猶未歇掩卷坐闃寥秋聲振林樾人生知幾何憂來不可輟風吹浮雲開送我半窗月逍遥步前庭孤螢自明滅姑蘇姑蘇城郭水茫茫往事流傳過客傷夜月人歌黄菜葉秋風夢繞白駒場火中烏合歸真主井底蛙猶笑子陽天下車書今混一繁華終古勝維揚直閣即事清曉朝回秘閣重坐看宫樹露華濃綠窗朱戸圖書滿人在蓬萊第一峰尹昌隆一首昌隆字彦謙泰和人洪武丁丑賜進士第二授監察御史永樂間改左春坊中允再改禮部主事為尚書吕震所誣族誅有集送孟潛陽先生教授邵武府學理櫂辭京都之官越閩嶺樵峰渺何許川塗邈脩迥霜雪歲暮緐朔風吹雲冷嚴程既難滯别思當自領清波漾寒色孤帆明夕景巳過落星彎逺望杉闗境横經守清秩郡教知獨秉遐想諸生徒三席待開省吳溥三首溥字徳潤崇仁人建文庚辰進士授翰林編修永樂初陞修撰遷國子司業有古崖集胡若思云先生志不事浮藻故其詩質實不浮殆所謂布帛菽粟而温厚和平之意藹然見於辭氣之表其視丗之纎媚工巧者不侔矣詩話博士聘君尊人詩格楚楚不若聘君之塵腐滿楮也寄宋子環聖恩寛逐客不遣過輪臺談笑潼闗去雲霞仙掌開故鄉深念汝逺道竟能來明日相思處高秋鴻雁迴自歎去鄉三十年顔貌總非昔昨日鄉人來相看不相識悼外姪戴積善逺樹千重暗江聲日夜哀終南山下路不見汝重來王景一首景字景彰以字行松陽人洪武壬子領浙江行省鄉貢進士授懐逺教諭遣戍雲南建文初召修高廟實録陞禮部右侍郎兼翰林院侍講充副總裁官靖難後進學士詩話靖難師入相傳學士請塟建文君以天子之禮然鐘山不聞有封穴或請而不允也古風二首其一不無故主之思因録之古詩皇天無停樞四運迭相廹朝陽忽東升悵望倐己夕伊誰執其馭六轡不遑息使我下土人俯仰空役役我願攀六龍駐彼扶桑域遨游黄道中流光自輝赫萬物同一春欣欣布嘉澤羲和不我與徒有淚霑臆晝短夜乃長何以屏隂慝王達二首達字達善無錫人洪武中舉明經為大同訓導薦入官國子助教永樂初擢翰林編修遷侍讀學士有耐軒天游二稾黄才伯云耐軒詩有唐人風韵詩話耐軒與大紳孟敭汝王希範號東南五才子其詩太便利不耐咀嚼然如送人入都作起句云鶯啼細雨中一騎發城東又送人從軍作云細雨都門酒東風驛路塵未嘗不矜練也題山水一曲清琴酒一巵煙蘿贏得任棲遲千峰黛色嵐消後十里菱花子結時水氣入樓人不覺秋聲到樹鶴先知世無謝眺誰同語對畵空成萬古思題扇葉暗前朝雨花飛昨夜風空山人不見春在綠隂中王璲五首璲字汝玉後以字行長洲人洪武中舉浙江鄉試以薦攝府學教授改應天訓導擢翰林五經博士永樂初進檢討再進春坊贊善下詔獄死洪熙初贈太子賓客諡文靖有青城山人集徐子元云汝玉不及高楊漸入清雅詩話翰林四王竝稱而汝玉弟璉汝器璡汝嘉一門又有三焉其詩不費冥索斤斤唐人之訥吳人徐用理集永樂後詩家三百三十人以汝玉壓卷焉和高季廸將進酒君不見雲中月清光乍盈還又缺君不見枝上花容華不久落塵沙一生一死人皆有綠髪朱顔豈能久尊前但使酒如澠肘後何須印懸斗臨卭罏頭綠蟻香楊花卷雪春茫茫吳姬越女嬌相向痛飲須盡三千觴興來狂笑縱所適慎勿畏他權貴客東風吹落頭上巾此夕獨醒端可惜題採菱圖有序苕溪余舊所經游秋高氣淒風清水落逺近漁歌更唱互答舟行沿洄恍若世外别來不知幾寒暑矣中吴徐希孟擕謝孔昭所臨松雪翁採菱圖索詩為作吳歌題其上不能不動江南之思也湖南風信起湖北浪花多欲唱採蓮曲翻成採菱歌採菱歌斷汀洲暮何處却尋歸去路誰揺蘭艇笑相迎燈火遥生白蘋渡新秋早朝宫井梧桐一葉飛新涼先到侍臣衣蒼龍闕上銀河轉丹鳯樓頭玉漏稀曉仗分行環御輦夕郎鳴佩出仙闈自憐虎觀叨陪從簮筆慙無補萬幾𤓰洲道中清江杳杳水連空江北江南綠映紅三月異鄉逢換火經春游子怨漂蓬滿汀蘆葉鹽檣雨一樹棃花酒斾風遥望故山何處是依稀煙霧五湖東方壺畫紫府深沉白晝閒仙人歸去邈難攀當時暫謫來塵世寫遍江南雨後山王洪五首洪字希範仁和人洪武丁丑進士授行人永樂初擢吏科給事中入翰林為檢討歴修撰侍講左遷禮部主事有毅齋集徐子元云希範詩清雅惜氣不足吳明卿云希範擬陶風味似晉舟中雜興聲調似唐皆非人所易及詩話希範詩最為孟敭所重至不敢與雁行其對張宗海論詩自誦所作竊比漢魏張哂而未荅復曰終不作六朝語張曰子詩傍大李門牆猶未窺其奥也希範始屈服今誦其詩率規仿唐人具體而已品當在孟敭下歌風臺赤精自天啓黄屋凌空開冨貴歸故鄉遂築歌風臺佳人弄瑶瑟故老持金罍酒酣自擊筑浩歌何雄哉颯爽龍虎姿曠蕩風雲懐顧為萬歲後英魂尚歸來回首望彭城孤臺亦崔嵬百戰功不成千載令人哀擬劉公幹園林多嘉木秀氣何蒼蒼石梁冠崇阿淥水流方塘行樂在良夜飛蓋復翺翔涼風振華纓明月揚其光清池散芙蓉秋蘭一何芳君侯壯思發逸藻凌風揚小臣信愚劣狂歌安所詳擬陶彭澤我家南山下前有嘉樹林好鳥鳴其巔凉風吹衣襟泛此尊中酒撫我膝上琴禾黍亦巳繁桑麻藹餘隂如此良易足勞生非所任畦樂詩索居南野外頗與人事踈灌木䕃前庭隙地數畝餘蔬果因時藝薄言理其蕪聊以足晨夕過兹奚所須固窮亮吾分貪得寧非愚草糗可終身樂哉常宴如舟中雜興故國遍芳草高臺多大風河山千古在登眺幾人同野澤鳴山雉荒陂起塞鴻新豐不可見煙樹五陵東王紱十七首紱字孟端無錫人洪武中就徵坐累戍朔州永樂初以善書薦供事文淵閣拜中書舍人有友石山房稾胡光大云孟端律詩學大厯諸才子時有警句章昞如云孟端不羈之才所作古詩類韋栁律詩類晚唐興曾子啓云孟端觸景撫事即形之於詩隨其之所至情之所發初不計其工拙而自合矩度鄉王汝嘉云孟端幼負瑰偉之才㳺學邑庠時之先進若四輔官周士平侍讀學士王達善長史錢仲益教諭吕志學引禮舍人浦長源輩皆以詩著名於時過從賡和甚為諸公稱許集中長篇短章舂容爾雅無斧鑿痕而理趣兼至李時逺云舍人詩清新典麗想見其人間繆天自云舍人詩格踈爽有松石意詩話錫山自倪元鎮後孟端山水竹石瀟灑出麈筆蹤可繼人品亦未多遜在京邸與一商人鄰居月下聞吹簫聲明日往訪之寫竹以贈曰我聞簫聲用以簫材報其人不觧事以紅􅉊毺為餽乞再冩一枝為配孟端大笑取前畫裂之又嘗退朝黔國公從後呼之孟端不應私念曰是必索我畫爾後十年冩尺幅萬里遺焉予嘗見孟端為恵山僧畫竹茶壚圖羣賢題咏其衆今存顧典籍貞觀山莊當時夏太常㫤亦善冩竹儲藏家得其十幅不敵孟端之一也詩亦清疎一如其畫章舍人昞如狀云永樂初詔求天下文章之士洎善書者各二十八人登文淵關公被首薦盖與吉士竝入直者此國史所未詳也送楊徳昂我適桑乾歸君猶五溪去飄流若萍梗何繇復相遇迢迢江上山歴歴煙中樹後夜月明時相思渺何處題秋菊軒九月霜露零秋色已云肅草木盡彫瘁而有籬下菊粲粲如有情盈盈抱幽獨我欲餐其英采之不盈掬呼兒具雞黍白酒正可漉素心二三人於焉叙心曲陶然付一醉萬事亦巳足詠歌柴桑詩千載想遐躅寫竹寄顧謹中秋聲起巫峽暝色迷湘渚悵望千里遥佳人渺何許幽期邈難值欲往復延佇中夜獨遐思西窗颯風雨題成趣軒桑麻日已長稼穡日巳成門巷䕃榆栁隔屋繅車鳴生平寡營為遂此田園情衣食喜不乏公賦尤寛平舉家情欣欣澹然忘世榮力作雖云勞濁酒時共傾豈意事高尚所樂安吾生臘日大化無停機寒暑如循環歲華忽云暮陽和亦己還人生百年内憂喜互相闗顧匪金石姿安得長朱顔達人會斯理意與雲俱閒聞道愧獨晚衰也吾何歎題青山白雲圖我昔九龍山下住結廬正在雲深處日日看山還看雲長教剪却當檐樹無端一别猨鶴羣馬蹄南北徒紛紜塵塗底事拂衣晚回首愧負山中雲送張知縣作宰麻陽去民風雜五溪世傳盤瓠後地接夜郎西臘釀多藤酒春禽半竹雞到官應有便莫惜寄緘題静趣軒竹樹隂森映短牆蕭然絶俗似僧房出城相去路三里閉户獨眠書半牀風煖林花飄几席雨晴沙鳥入池塘慚余擾擾紅塵客到此猶能百慮忘送陳尚賓還靖州嗟余湖海度年華爾復飄零更可嗟舊業蹔歸翻似客異鄉重到即為家江連雲夢孤帆逺日落衡湘斷雁斜後夜月明何處泊相思回首各天涯峽中雜詠峽裏山高多晝隂未昏煙景暗秋林停舟晚飯柁樓底猶有夕陽明逺岑静樂軒二首竹几藤牀小硯屏熏風簾幕篆烟青間齋幾日黄梅雨添得芭蕉綠滿庭斗帳藏春日醉眠静中惟與嬾相便尋常甲子無心記看得梅花又一年皆山軒嵐光飛翠入簷楹枕簟生凉暑氣清公退日斜新浴罷坐看峰影過州城塞上雜詠用偶武孟韻漫天風雪掩穹廬客裏誰來問起居忽報鄉人喜新到寄來猶是隔年書題静照軒尋常客不到山家松火寒爐自煮茶風雪閉門才十日不知春巳到梅花題枯木竹石寄李公實罨畫溪邊水拍隄繞隄高樹倚雲齊君家正在樹深處滿地綠隂山鷓啼茅齋煮泉圖小結茅齋四五椽蕭蕭竹樹帶秋烟呼童埽取空階葉好煮山㕑第二泉錢仲益八首仲益無錫人永樂初以翰林編修轉周王府長史有錦樹集魏仲房云先生詩有體裁麗而不浮奇而不僻易而不俚詩話長史詩格爽朗惜遺集罕傳予從秦對巖前輩購得亟録其八首猶未盡其藴也送范宗暉赴雲南從軍投老怕送别送别即傷神况兹所别者乃是平生親行行赴何許逺在天之垠迢迢萬里餘欲見將何因近别猶不堪逺别情曷伸翻嫌交宻友不若交疎人我昔初還鄉憔悴賤且貧子來客吾邑漂泊埋風塵一見如舊識歲久情逾真自謂同心交不獨雷與陳我入訓鄉校子來寓城闉燕語恒及酉諷詠或達晨中間羅變故别我遊江濱陶朱既逺越張祿遂入秦間闊幾四載會晤復喜頻明年上京都聘充戚里賓我亦被薦書謁選拜紫宸繆居容臺屬幸得聮朝紳與聞復聚首相見不隔旬念子有俊才倜儻無儔倫財輕大義重實謂勇且仁願言永相從誨語煩諄諄夫何事難料告别何踆踆從軍赴滇陽西去逾峨岷吾皇啓昌運萬物皆維新及兹豔陽月鸎花曜青春惜子獨逺去書劍行隨身騏驥豈紲羈鵰鶚非籠馴丈夫志四方豈必長相憐嗟我已暮齒雙鬢垂秋銀受刃割老腸容易生酸辛予時在史館寅入出巳申不暇持一觴送子龍河漘江之水滔滔楚山青嶙峋咄此可奈何涙下霑衣巾題王孟端畫送祖韶石歸恵山危石壓寒篠高松挂枯藤長懐故山景况見故山僧僧今歸故山我歸嗟未能題詩送僧歸悵然離思増中秋翰林夜集分韻得月字雨餘殘暑謝夜久官事歇庭空起商飇雲霄吐華月於時秋方半古桂黄初發玉堂集僚友清燕足怡悦送鉤行觴頻分韻催詩切玉輪懸中天光輝轉明潔有如坐氷壺爽氣徹肌骨㣲聞更漏響漸見明河没人生寡歡會員魄亦易缺莫辭通夕玩動是經年别牧牛圖東臯二月春草生江邊放牛花雨晴牧兒唱歌牛齕草穩坐牛背隨牛行牛角攢攢耳濕濕斷隴荒陂隨意入煙蒲風栁不勝情日暮歸來荷蓑笠我本山林牧牛叟濫著朝衫今白首儗買江南黑牡丹乞取閒身老農畝青山白雲圖連山盤盤隔溪水翠滴風光浄如洗松梢日出初雨晴滿地白雲收不起溪窮路轉石徑斜隔溪遥見山人家柴門深閉人不見煖風吹落朱藤花良工貌得無窮景坐玩令人發深省何由築室住山間長卧雲窩弄秋影題江南春雨圖羣山鶻哭雲糢糊長蘿逺水連平蕪孤村絶浦望不極幾家茅屋懸魚罛輕舟數㸃小於葉出没烟浪同飛鳬江空雨勢來不巳水風颯颯吹菰蒲前山禪宫白雲際明滅時見金浮屠貌將一段丘壑趣冩出萬里煙霞圖憑軒寂聽無所見仿彿似有青猨呼我昔南遊會稽上雲門六寺尋僧徒手支枯笻躡短屐窮幽陟險隨樵夫曉雲漫天失老鶴暮雲擁樹聞飢烏石厓松瀑濺飛雪水流活活風胡胡若邪溪深不可渡沿流細路行縈紆歸來濯足憩小軒胷中塵氣一㸃無自從江海困奔走衝寒觸暑趨長塗追思勝賞不可到十年南望空嗟吁朝朝覽鏡獨惆悵兩鬢雪白容顔枯東陽山人特好古寶此名筆如瓊珠吳箋一幅不滿尺懐山卷海置座隅鋪牀展軸看未了何異短褐藏天吳王郎妙手信莫及功與小米論錙銖想當運意揮染際倒㵼水墨翻金壺祗今此景在何處欲往不得歲巳徂還君此畫重太息嗒然長吟據槁梧錢達可山房苦憶錢夫子幽居㠏􅣦山問梅殘雪外采藥亂雲間塵暗芸籖冷香銷蕙帳閒斷腸泉上月依舊照松闗㳺蓬萊道院聽李天山鼓琴仙人鼓琴花滿庭我亦洗耳為君聽風揺空林夜瑟瑟泉落幽澗秋泠泠平生青袍作行客千載絶調聞廣陵曲終日落醉歸去無數好山天外青梁潛一首潛字用之泰和人洪武丙子舉鄉試授訓導永樂初召修實録陞翰林修撰歴右春坊右贊善帝北狩留監國中讒死有泊菴集楊東里曰用之詩高處逼晉宋合州寫懐忘却儒官冷誰為蜀道吟一身猶長物萬事豈闗心水鳥窺魚立山雲帶雨沉人生聊適意莫受族愁侵鄒緝一首緝字仲熙吉水人洪武庚辰進士除星子訓導永樂初入為翰林檢討歴官左春坊左庶子有素菴集翰林院齋宿聽琴詩幷序永樂三年春正月丁未上將祀南郊誓戒羣臣致齋三日百官既受誓各就宿别館於是侍讀曽公日章脩撰錢公仲益徐公孟昭檢討蘇公伯厚沈公民則暨無錫王公孟端與予凡七人皆會宿於翰林之公署於時天宇澄霽月色清朗諸君子相與秉燭坐於公署之東偏沈公善琴因請鼓之作商調數引舒徐安適淳古澹泊有三代之遺音坐者聽之莫不心暢神怡乃相與分韻賦詩以紀其事且要孟端為之圖云禁直夜迢遞齋居澹無為同心聿來集良友具在兹懽言適嘉會秉燭坐彈棊華月照虛牖㣲風動綺帷上客發幽興援琴揮素絲一彈孤鶴舞再鼓心神怡清商既激烈雅調亦舒遲秋鴻唳逺空猗蘭芳葳蕤俯仰極餘韻邈與高山期燕賞亦云洽傾耳遂忘疲沉吟永終夕逍遥起遐思仰觀庭戸間爛然明星垂旭景不知曙永言歌此辭蘇伯厚二首伯厚名垶以字行建安人洪武中以薦授建寧府學訓導遷晉府伴讀永樂初擢翰林侍書遷檢討以子鎰仕贈吏部員外郎有履素齋集詩話蘇君傳詩絶少其五言神意間審綽有魏晉風陳嗣初稱南閩偉奇超卓之士必以蘇先生伯厚爲之首不誣也偕諸公齋宿聽琴作玉署宿齋居盍簮諧素約坐中有鳴琴宫商時閒作波澄楚江秋露下九臯鶴流泉響幽澗靈籟起寥廓維時雨初霽㣲月映疎箔鑪熏輕煙裊燭花紅燼落春風送餘寒夜久覺衣薄清談雜今古亦足資一噱相對竟忘眠更取茶甌瀹雞鳴整朝冠晨鐘動高閣畦樂詩青山遶我屋垂栁䕃我門來往絶塵鞅世事邈不聞惟有衣褐徒鄰曲相與言孰云生計拙亦有數畝園清晨荷鉏去除彼蔓草根但使無饑饉豈惜筋力煩濯足清澗濱矯首觀飛雲牀頭有濁酒欣然自開尊張洪一首洪字宗海常熟人洪武中謫戍雲南永樂初授行人仁宗召入翰林改修撰有集詩話張宗海集一冊予在史館曽見之無足采者仍録東門行一首古東門行僕夫顧我悲轅馬跼不行古來離别地青草不復生居人攀桃李悵望難為情流塵起阡陌逺樹花冥冥莫向秦東亭唱此東門行土中有死骨聞之復心驚曽烜二首烜字日章以字行吳江人洪武間以歲貢授黄陂知縣考最陞翰林院侍讀同修永樂大典使交趾交于冨良江舟至辰陵磯與楚百戸言别江到荆湘兩派分客情無奈况離羣爾從三峽迎春水我過重湖望楚雲白帝至今啼蜀魄蒼梧何處弔湘君孤舟夜向巴陵泊一曲商歌不忍聞寄友人與君離闊十年餘雨過江濱候起居咫尺猶如千里别飄零不寄一行書何時夏口同傾蓋此日王門好曳裾若問故人何似者鬢絲今已不勝梳黄守一首守字約仲以字行莆田人以汀州府學教授擢翰林院檢討有静齋集題燕文貴秋山蕭寺圖迴崖列岫鬱相連兜率樓臺際碧天飛鳥已還秋色裏疎鐘猶在夕陽邊溪橋緩轡官人馬野飯維稍客子船記得宦逰逢此景披圖不覺思茫然虞謙一首謙字伯益金壇人洪武中由太學生擢刑部郎出知杭州府永樂中召為大理寺少卿仁宗監國奏除都察院左副都御史轉大理卿有玉雪齋稾楊東里云大理善寫山川木石幽澹簡逺亦以工詩名於時田家晚泊風磴翻危葉霜槐出斷根過橋逢野老倚杖候柴門馴犬熟迎客歸鴉遥認村茅檐投晚泊煙霧斂初昏熊直二首直字敬方其初冒姓胡吉水人永樂中舉人以子槩貴贈右都御史有西磵集立秋後有懐京洛諸故舊秋序昨夜至炎蒸尚復然青山不改色黄葉墮我前物性固細㣲乃得氣之先人生宇宙間俛仰終百年質非金石固豈得恒雕鐫朱顔亦易失皓髪無由𤣥念我平生友聚散如雲煙行止固不齊所賦良由天昨尋東籬菊欲買南山田安分乃吾事冨貴甘棄捐瀟湘雨意圖萬竹叢深日未晡寒江煙雨翠糢糊東風無限瀟湘意獨倚篷窗聽鷓鴣陳繼二首繼字嗣初吳縣人經歴汝言子用薦授五經博士領𢎞文館事進檢討有怡菴集詩話嗣初為惟允遺孤惟允坐法誅家無長物惟閲過書二萬餘卷其母吳教之成學以薦授五經博士時獻陵於大内之西思善門闢𢎞文館命楊學士溥主之嗣初與王侍講璡入直焉其詩本之家學持論以為詩者非得乎天地之清氣則無以極其妙今所存怡菴集一十五卷詩未之録嘗見題漁父圖有云夕陽漸紅江轉綠分明畫出一幅漁材晚景也烏夜啼宫井烏啼宫樹碧月色生寒露華白啞啞不斷深夜閒明朝車馬天際還綠窗美人歡不寐未曉凝妝貼珠翠秋夜雨中懐施孟端愁雲接地隂城漏更沉沉寒雨驚秋盡殘燈入夜深凄凉千里客惆悵百年心誰料分攜後防邊直到今陳亢宗一首亢宗名宗以字行永嘉人官兵部員外郎詩話員外午門觀燈應制詩景陵品居第一然實遜曽襄敏陳文定諸公送友一律詞雖荏弱源本隨州送友人歸崑山官亭把酒送君歸回首吳山驛路㣲久别方期同笑語相逢那忍又分違平蕪積雨迷征騎疎栁寒煙掩舊扉此去思親還望闕朝朝應對白雲飛袁珙一首珙字廷玉鄞人以相術拜太常寺丞有栁莊集詩話寺丞得相法於别古厓識文皇於潜邸遂遷寺秩然家本士族其父彦章仕元為翰林國史檢閲世稱菊村先生嘗作布衣歌云我家頗讀書初非田舍翁盖道其實也寺丞於九流百氏靡不涉究歌詩亦能入格不失菊村家數長相思有美人兮天一方丹霞為織雲錦裳盤龍舞鳯交鴛鴦昔年飲我瓊瑶漿贈我白玉雙明璫欲往從之楚山長安得羽翼同翶翔望望不見令我傷仰天悲歌涕浪浪明月在戸光滿堂牽牛織女遥相當長相思愁未央袁忠徹一首忠徹字静思珙之子以父䕃由鴻臚序班歴官尚寶少卿有符臺外集和寔郎中冏竺菴見贈韻夕雲斂餘暉稍稍歸鳥集清磬林際浮樵歌峰外急懐人南斗邊露下銀漢濕瑶草春復生深山共誰拾徐晞一首晞字孟晞江隂人永樂中由縣功曹累官至兵部尚書有暨陽遺稾感懐十年騎馬戰龍沙不道功成兩鬢華昨夜思歸有鄉夢江南春色遍梅花劉廌二首廌字士瑞青田人誠意伯基之孫洪武庚午襲封辛未貶秩丁丑戌甘肅尋赦還永樂中卒于家有盤谷集詩話趙周臣自號間閒居士士瑞亦自號間閒子其集名盤谷者士瑞襲爵之後貶秩歸農築室于青田舊宅之西雞山之下因其地山水盤旋故以名焉詩師吳興沈原昭孟春贈徐仲成故人訪幽居時當孟春節寒氣尚嚴凝同雲靄欲雪長論懐始舒高吟興不絶開窗對松竹蒼翠色可悦豈不念榮華泉石甘守拙閉門有餘暇開卷對前哲長歎古今事理義同一轍丗隨氣化遷運逐人情别雖非聖賢資勉焉慕貞潔㷀㷀且獨守默默誰與説惟有知心友時過共捩揭但願無聞知豈敢尚英傑援筆賦新詩舉觴對明月高歌神鬼驚長嘯天地闊彭澤千載人百世誰能越高山與流水此興不可遏春㳺田家四景之一竹籬茅舍兩三家屋外青山綠樹遮行客偶來春己暮山南山北杜鵑花郭武五首武字炅隆贈定襄伯鈺長子官尚寶司丞詩見聮珠集晚渡白馬湖輕風小寒吹浪花新柳茸茸啼乳鴉平湖一望幾千頃逺水連天飛落霞斜陽忽墮澄波底白鳥猶明山色裏嚴更何處鼓鼕鼕櫂歌未斷漁燈起寄劉草窗原博空堂獨坐葉紛紛一雁南飛不可聞野色連天迷逺望高城落日亂寒雲故人眼底無多在客思秋來乂幾分莫怪臨風倍惆悵江鄉猶憶白鷗羣江南懐古隔斷中原數百年囊沙堪笑况投鞭桓温不合留王猛安石終能舉謝𤣥日落暮雲斜度鳥雪消春水逺連天子山空有江南賦北府淒涼最可憐江上即事綠水橋邊酒店白鷗沙上漁家山前山後春雨江北江南落花宿澧陽蘋花風急水茫茫今夜孤舟宿澧陽誰在江城吹畫角五更殘月一天霜沐昂一首昂字景顒黔寧昭靖王之子以左都督鎮守雲南卒贈定邊伯諡武襄有素軒集詩話定邊平麓川之㓂威著西南而能以餘暇留情文詠輯明初名下士官於滇及謫戍者自邾仲經以下二十一家詩凡二百五十首目曰滄海遺珠楊東里序之謂當時選録諸家劉仔肩過略王偁雖精且詳猶未免有遺惟沐公所擇和平婉麗可玩可傳其賞識若此送胡榿軒還永昌有客乘驂過洱西平原春草正萋萋人煙迢遞連金齒山勢逶迤拱碧雞流水小橋楊栁綠落花㣲雨鷓鴣啼遥知别後相思處雲樹蒼茫夢欲迷明經綜卷十九
