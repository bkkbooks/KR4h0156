body:
  text: 明詩綜卷六十三翰林院檢討朱彞尊編朱之蕃一首之蕃字元介南京錦衣衞籍茌平人萬厯乙未賜進士第一授翰林院修撰以右春坊右諭徳掌院印以右春坊右庶子掌坊印升少詹事進禮部右侍郎改吏部右侍郎贈禮部尚書有使朝鮮稾南還紀勝諸集静志居詩話元介文翰兼工張􅎶東國與館伴周旋有倡必和微嫌詩材愞熟語不驚人和周吉甫春日移居牆短山齋出庭空月易留泉香浮茗盌漁唱起蘋洲終嵗一無事平生百不憂奔忙渾未解酒伴且相求一作苦復何由孫慎行一首慎行字聞斯武進人萬厯乙未賜進士第三授編修歴官南京禮部尚書贈太子太保謚文介遭遇誰料恩深放棄餘山人猶帯舊銜居中山篋在猶寒膽上殿争時判引裾天地有情開一網江湖無夢到三閭自来多少欷歔感聖主英明古不如劉一燝一首一燝字季晦南昌人萬厯乙未進士改庶吉士授檢討厯官禮部尚書兼東閣大學士加太子太保謚文端歸田作乞得閒身返故林避賢者路漫沉吟當歸分合山中老戀主情彌闕下深鑿井耕田歌帝力量晴較雨答天心十年塵夢今畨破一曲滄浪思不禁陳于廷五首于廷字孟諤宜興人萬厯乙未進士授光山知縣補秀水擢監察御史巡按江西山東轉太僕少卿歴太常卿大理卿兵部侍郎坐削籍起南京都察院右都御史召總内臺加太子少保諡恭定有定軒稾詩話恭定為予友其年檢討之祖行事詳國史韻語不甚傳擬江文通雜詩頗稱具體古别離三歳為君婦未嘗下髙堂一朝逺送别佇泣官道傍君行官柳青君歸官柳黄與君别經年相思莫相忘行過無定河莫飲無定水天涯游子心飲之恐爾爾應思閨中人容光易摧毁擬陳思王贈丁儀王粲王師入京邑天宇俄廓清九廟肅鐘簴十陵翦棘荆皇路日就坦相君靡自盈吐哺則公旦闢門羅雋英黄髪緤珪組深巖賁弓旌嗟余同心侣夙昔諧嚶鳴胡為慕孤介堅欲解世纓延陵匪通誼干木庸近情願迴墨子車且過朝歌城擬王侍中粲懷德闗中搆喪亂浮渭向洛城京雒復殘破孑身遁蠻荆虎兕傷在野流離嗟獨行河山邈非故魂魄黯自驚乘桴浮海若登樓眺神京自斷秦川樹心揺伊闕旌哀哀孤飛鳥詎有擇木情公子忽我覯欬唾分瓊瑛魚藻醉明徳鹿苹賡和鳴鄙人守貞則嘉恵懐篤誠所期慎厥修福履永不傾擬謝僕射混遊覽大塊真勞生俯仰日縈感内庭鮮懽悰逺郊豁幽覽寓目極寥廓開襟愜澄澹巖阿秀菊庾江漘掲葭菼㑹歎景揺落任觀運流坎代謝亦何常章光總歸闇達人遺浮榮自視一何欿擬休上人怨别楚客思無賴涉秋逾黯然金飈起天末槁葉墮我前素帷延華月浄琴響哀絃白雪懐郢人滄洲憶成連壺觴對不舉何以暢幽悁王維儉一首維儉字損仲祥符人萬厯乙未進士除知濰縣徴授兵部主事㝷削籍起光禄寺丞累遷大理少卿以僉都御史撫山東入為工部右侍郎轉左侍郎有王損仲集詩話損仲宋史記予從吳興抄得之未見出人意表詩頗瀏亮送霍臨渠少府守河州不盡湟中路秋風促宦程佩刀辭佐郡分虎已專城積石攢雲起洮河近郭明羌戎亦赤子休使塞烟驚王思任一首思任字季重紹興山陰人萬厯乙未進士知興平當塗青浦三縣袁州推官所至鑴級稍遷南刑部主事九江僉事有避園擬存虞山詠詩話季重滑稽太甚有傷大雅勺園纔辭帝里入風烟處處亭臺鏡裏天夢到江南深樹底吳兒歌板放秋船髙承祚一首承祚字元錫松江華亭人萬厯壬辰中㑹試乙未賜同進士出身改庶吉士授檢討聚首人生聚首難離别何可久去日三春花今朝九秋柳沈覃九云語不在深詩家合作賀燦然二首燦然字伯闇秀水人萬厯乙未進士授行人升吏部主事終員外有六欲軒五欲軒集詩話吳中伍御史袁萃撰林居漫録詆諆前輩淆亂是非吏部不平作漫録評正駮之御史復撰駮漫録評正吏部又作駮駮漫録評正兩公不亦好辨哉然合而觀之曲直自見國史所宜審擇也泊彭城山城多宿雨日暮起悲風賈客行將絶中涓計已窮叩閽雙闕迥縣磬九州同應有輪臺詔朝來出漢宫邯鄲懷古雲迷襄國雨霏微舊日叢臺過客稀三晉河山仍不改六王宫殿已全非照眉池冷荒臺合講武臺空野雀飛猶有邯鄲樓上月餘光常照酒人歸米萬鍾一首萬鍾字仲詔宛平人萬厯乙未進士除永寧知縣補銅梁再補六合入為大理右評事遷戸部主事升員外改工部進郎中出為浙江右參政升江西按察使有北征吟詩話先生為水曹郎築園海淀之北中有色空天太一葉松垞翠葆榭林於澨總名之曰勺園又曰風烟里自念園在郊闗不能日涉因繪園中景為燈丘壑亭臺纖悉具備都人争尚之號曰米家燈嘗於元夜集客賦詩麗水吕太常邦耀即席口占二首其一云玉綃疊出上元村雙炬懸來景物繁怳惚重游丘壑裏米家燈是米家園其二云輕舟寒夜渡無氷波入銀綃訝月升宛似夢中曾一照米家園是米家燈一時和者數百人列成一集可稱好事亦太平佳話也新秋泛清溪共客邀新爽迴舟刺晚風凉生思越苧病起訝燕鴻星櫂揺虚白漁燈簇小紅怪來蕭颯早衰草怨吳宫范允臨二首允臨字長倩松江華亭人居吳縣萬厯乙未進士授南兵部主事改工部歴郎中以按察僉事提學雲南遷福建布政司參議有輸寥館集詩話先生筆精墨妙揮毫落紙與董尚書爭工晚築别業於天平山之陽彈絲吹竹選伎徴歌江表望為神仙中人又得佳耦唱和傳鈔片楮比於珊瑚之鉤范氏家藏逺祖隋其唐時告身尚在文正忠宣諸老手澤猶新義田長以振窮宰木未嘗改列清門百代四姓逺不及也有憶井唾不復顧花飛難再攀江頭一片石應化女郎山詠翦春羅君恩宴曲池為郎製宫錦月落杏花寒裁縫剪刀冷沈琦二首琦字仲玉吳江人萬厯乙未進士除淄川知縣以憂歸起補髙陵再調三原入為禮部主事有珠樹軒稾送馬長山擢守檇李我家住江南只盻江南路君今正向江南行却望君家又回顧執手空嗟離别難齊人感咽越人歡只今南北蒼生望總向循良傳裏看憶昔交君頓成契芝蘭金石盟前締相逢春日春更融相别秋風秋轉厲江南土俗舊清嘉到處風光盡可誇天目峰頭雲吐月餘杭城外水漂花天子黄扉方側席致治思同二千石語君暫作江南行㑹捧徴書向江北别家次諸兄弟韻握手他鄉路回頭故國城漸驚親舍逺真覺一官輕急櫂隨雲影悲笳雜鴈聲無情東去水相對亦淒清沈珫一首珫字季玉琦弟與兄同榜登第由鳳陽府學教授遷南國子監博士升南刑部主事歴郎中出知東昌府轉山東按察副使漂母偶然一飯進王孫荅贈千金未足論何事怨家還報徳淮隂年少亦推恩陸錫恩一首錫恩字伯承平湖人萬厯乙未進士除萬安知縣入為刑部主事歴員外郎有雙鳬草詩話伯承不耐判牘放情山水間自號夢蝶居士又號癯丈人亦號癡丈夫年四十二自撰壙誌而殞詩頗澹雅鮑叔牙故里落景滿齊郊雲横暮山紫緩轡問遺封云是鮑叔里三北識竒才一匡酬夙恥古人在信心今人多貴耳士苟未遇時畢生行蓬累長風不我借羽翼安得起所以管大夫没齒感知己袁時選一首時選字無擇鄞縣人萬厯乙未進士除遂溪知縣遷南刑部主事新興道中偪側新興路逶迤傍水隈萬山迎馬合片雨逐人来村犢騎偏穏江鷗下不猜頻年牽物役延眺亦悠哉吕克孝三首克孝字公原青浦人萬厯丁酉舉鄉試第一官工部司務歴郎中有媿翁詩草詩話公原領解之秋先文恪葉文忠偕主試事先公業拔公原卷將置第一矣文忠謂是卷文雖髙慮終不得第先公云吾亦知此人不第然學者也榜遂定既而公原屢試南宫輒擯落以學行稱於時先輩衡鑒不爽若是天啓初公原官工部司務時先大父君籲公承蔭選授都察院照磨署經歴司事同公原建首善書院乾魚脫粟比圬墁匠石不有加味書院成大父已遷官故碑記不列名旋為梁夢環所彈下獄思陵即阼得釋晚知楚雄府事歸貧不能治舟楫而公原還里詰窘略同其詩有云客歸三日典春衣又云慣住低頭屋能炊折脚鐺殆實録也青谿菴江令何年宅風流不可招荒烟迷斷礎陳迹寄空寮日影移雙樹谿聲自六朝遥分鐘阜影紫翠落層霄棲霞寺宅記明僧紹碑傳江總持淒凉自人代窈窕隠山茨明月千巖宿松風萬壑垂階前雙杏樹曾見劫灰時過田叟我欲驅黄犢移家傍屋東但容茅蓋頂先為築牛宫胡震亨二首震亨字孝轅海鹽人萬厯丁酉舉人官定州知州有赤城山人藳嵗晏悼室人詩二首嵗晏感物變志意鮮歡愉念我同懐子涕下沾衣襦如何苦寒節衾裯不復俱空閨一以閉飢䑕晨夜趨光儀怳不滅魂魄知有無煩冤日盈抱寜從促景徂空牀凛寒風殘照慘夜色沉思結幽感夢子来我側踟蹰將何愬容輝忽已匿昔如中洲鳩闗闗雙鼓翼今如失群獸哀嗚不遑食庶無荀生鄙媿彼蒙莊識豈伊生死情含義良不􅑯趙秉忠一首秉忠益都人萬歴戊戌賜進士第一官禮部尚書送張水部南歸平子歸田去山川賦舊游遺榮纔北闕髙興已南州鱸鱠三江月菰蒲五月秋襟期知曠達尊酒寫離憂黄河河水南浮泗漕渠北注燕衆心憂璧馬天意䕶樓船龍首疏秦日鴻陂復漢年園陵看王氣松柏正蒼然彭城九日彭城道髙天白鴈来但聞楓葉下不見菊花開風起横蛇澤雲横戲馬臺江闗何處所一望一徘徊閨體莫上翠樓㸔望見官城渡垂栁碧於篸是郎去時路曉行道中曉風蕭颯逗疎楊此日闗山别恨長試聴髙城吹畫角秋河不動月如霜靈濟宫星幢霞斾晝繽紛十二瓊樓駐彩雲鸞鶴紫霄時上下步虚雙引玉晨君何如寵一首如寵字康侯桐城人萬厯乙未進士戊戌殿試改庶吉士除編修厯官少保戸部尚書武英殿大學士贈太傅諡文端有後樂堂集七十自壽黄龍枉自説三闗白鶴何須鍊九還醉客豈真千日醉閒人難到十分閒清溪水滿長揺艇紅雨春深一看山時至便行無不可幾能塵世駐朱顔周如磐一首如磐字聖培莆田人萬厯戊戌進士改庻吉士歴官太子太保禮部尚書文淵閣大學士贈少保諡文懿有澹志齋集采菊髙秋凛風色百草遞萎黄嘉彼東籬英參差裛露光采之不盈掬悠然傾我觴杖策寄事外仰視歸鳥翔㑹心水木間獨坐以徜徉陳邦瞻四首邦瞻髙安人萬厯戊戌進士官吏部侍郎七夕嵗時還七夕風俗更杭州聞道湖船女争歸乞巧樓輕雲籠月度疎樹帶星流不有乗槎客憑誰識女牛久雨久雨牆苔積濃隂苑樹遮席門寒下雀蒿徑曲藏蛇浦水連街濶江潮帶閣斜誰憐都㑹地卑濕似長沙辛丑之秋自留署乞假歸省沿途觸景輒成水次兼山次昏星復曉星古城巢父廟仙迹吕公亭日落山光白雲流石氣青横塘秋浪濶鷗鳥自冥冥畢懋康一首懋康字孟侯歙人萬厯戊戌進士官兵部侍郎束茅行候人何太苦早晩迎官府間積數根茅為炊且結宇官府中夜行不絶吏呼聲燃火照官路猶云火不明燃茅茅無束次第拆茅屋官府猶未知宵征車􅣗􅣗徐良彦一首良彦字季良新建人萬歴戊戌進士官工部侍郎落葉落葉不上枝因風亦復起清風本無私何因有彼此一葉隨飄蕩一葉沾泥滓寄語風前葉莫墮東流水洪瞻祖一首瞻祖字貽孫仁和人萬歴戊戌進士改庶吉士授兵科給事中謫知嘉定縣稍遷南行人司副累遷太僕卿以右都御史巡撫南贑有清逺山人漫稾題李都督朝鮮圖王者安天下終資不戰功金城圖畧上青海戌樓空長笛闗山月寒砧木葉風還將憂國淚添入錦題中鄧渼六首渼字逺游建昌新城人萬厯戊戌進士除浦江知縣調秀水再調内黄徴授河南道御史巡按雲南升山東副使轉浙江右參政山東按察使擢右僉都御史撫順天有留夷館南中紅泉諸集詩話逺游詩敦琢而出頗近俞羨長何无咎二山人微嫌鬱耳然勝楚人之咻多矣武定變朝登武定城暮宿抵羅次有何龎睂叟遮車泣訴事問叟何所苦問叟何所覬叟耄復健忘憶一不記二往者萬厯初邊守幸康乂守令咸得人民物鮮札厲伍伯不到門什一有恒税㪷米纔十錢半鏹易一醉龜貝自轉輸工價集駢坒相歡太平人但供角觝戲嗚呼廿載間乾坤一幽閉中丞文且武抵掌談封拜羽檄豈虚來兵革靡寧歳忍以百萬命而快一人意忍白千里地而希茅土賜守臣本蟊賊中璫甚狂猘此輩紈袴子况彼糞除𨽻咆哮而負嵎逢者鮮不噬不忍因民怨奈何虎冠吏一夫敢倡難餘孽竟昌熾訛傳寇初集頗遭守者詈黽勉授殘甲垂頭望睥睨蜂涌圍已合蟻薄城遂潰巷戰力不敵免胄期殞碎烈烈金與王闔門竟死義宛轉蛾眉女慷慨丈夫氣泣抱黄口兒牽挽及娣姒相繼付烈燄義不汙賊鑕草間茍求活羞彼郡都尉難撲燎原火易乘破竹勢中丞文且武小醜曽蔕芥下令城中外毋得輒引避按堵第如故已定退賊計賊来如風雨剝膚患孔亟晨興牙門啓文武咸就位寇賊在門庭請問計安出中丞噤無語汗流手顫悸但云烏合衆不久自當退城外鼓盈天城中哭震地賊徒皆重鎧踉蹌錯其臂每聞得漢兒刃腹必洞刺刳腸絓樹枝烏鳶下争食尸積雲津橋血流滇海澨中丞非不武空拳安可試登樓望賊徒􅋏然思所畏或用緩賊謀姑為好語慰彼賊若罔聞瞋目仍攘袂惡詬至不堪左右皆沮媿甘受城下盟竊發虞姦細犒用十二牛文錦先皮幣葚紫織成衣黄金鈎落帶銀印龜形鈕本自上方裂名器敢輕假曽謝挈缾智賊衆始拜舞觀者猶惴惴賊来荷戈入賊去駝金回何對切可憐窈窕嬢抑作犬羊配虜獲動無算男婦必累騎輜重百里間緜緜行不絶此芮切玀賊固驍悍小勝輒忸忲餘制切中丞文且武開門悉精鋭擊歸伺其怠小醜安足殪但聞攀牆看誰將一矢遺去聲夷民舊部落府主新儀衞前歌後有舞送歸刺史廨昭昭漢日月幾向蠻天墜忍死幸須臾延頸王師至焚香拜馬首雙頰如雨淚不意溝壑軀復覩漢旌幟感激活我恩人持一笥餌長跽主帥前帥聞乃大誶怒聲吼如雷立命三軍士居此圍城中盡與賊勾結吉詣切從賊有顯戮任其所斬刈軍士擁向前兩手捽其髪方味切舉刀便欲斫觀者但􅌓眙叩頭連乞命我輩有何罪爾輩實無罪是爾命盡日而至切昨傳中丞令首開購級例重賞不踰時以此競趨利摉賊無所得失利且有害頭顱許借我誰能别真偽老幼聞此言號擗淚盈眥生既無門控死當訴上帝駢首就鋒刃流血如泉沸次第列功狀報捷日三四中丞啓捷書抵掌大稱快催軍益前進功多賞亦倍傳教諸將營努力功名㑹今年殺諸賊金印如斗大當取懸肘後急擊慎勿失式吏切天網恢恢布多殺神所忌逆賊既就俘將吏亦被逮糜爛同一理誰逃百六阨烏懈切叟昔有三子諸孫繞膝嬉酷經䘮亂来竝無髫齔嗣田園既蕪没居室遭焚燹親友凋殘盡生理迷所寄人皆羨髙年髙年有顦顇歎息老叟語停鞍重歔欷去聲召變良有初妖象著為篲町疃作戰場噫嘻豈偶值閒居敬通居里日彭澤去官辰酒熟邀田父花時對孺人素琴横竹几藜杖挂山巾在世無明畧猶堪傳隠淪田家樂二首烟火髙原合雞豚小市通夜行防虎阱寒至築牛宫捕雀遵桑翳澆麻引竹筒今年倍收秫不怕甕頭空挾彈驅田䑕持竿放野豚但令倉有粟寜使婦無褌賣藥曾過市催租少到門不知今去漢厯代幾兒孫奉陪蘇中丞游招寳山同作次壁間韻突兀如臨碣石傍天青島嶼辨微茫千年陰火疑潛爇三足陽烏本内翔魏闕遥瞻天北極戈船争指日南王臣心似水朝宗逺一任沮洳變作桑春日述懐寄湯義仍四十韻漢域春陰盡蒼山旅病淹梯航三面入風壤百夷兼五尺通秦道單車即瘴炎投荒虚繡斧覽勝引丹幨市有紅藤篾家珍白井鹽涔蹄規海闊岝㠋露峰尖霜蒨長含潤温泉側注瀸衣冠餘僰㸑貨貝古閭閻茉莉簪花艷稌秔釀酒甜緬文披似篆蠻語聽猶譫烽燧宵常警萑蒲日戒嚴由來稱卉服未可廢戎鈐往者勞徴發王師快殄殲傷心多戰哭無術救危阽退食聊閒步幽吟却卷簾磔雞初學卜射隼竟空占牽拙身何補浮湛趣自恬怪看顛種種轉益貌亷亷藥裹頻教命觚毫嬾欲拈神龜寧要灼廐馬剩須箝自笑名為累誰知意所忺以予嬰世網念子獨淵潛客坐閒垂釣妻鉏竝擁鎌游魚窺硯沼微雨映書籤句琢文心巧時推筆力銛七襄勞組織一字費鍼砭善戲非為虐雄文合愈痁木蘭舟汎汎荷芰帶襜襜麗曲傳箏柱閒情詠鏡奩吟當花纂纂舞愛玉摻摻多取天應忌髙名已亦嫌餘生甘劓刖抵死乞髠鉗老態杯中失窮愁病裏添澤糜安飲啄涸鮒且喁噞世外論歡賞私衷早屬饜筌蹄自有契膠漆乃非黏别怨稱殊未歸期歎不詹春心傷碧草秋望滿蒼蒹饑渴思瓊樹書題倚素縑空庭無過鴈竟夕坐明蟾今古論冤憤乾坤幾顧瞻已而應誚鳳宛彼一鳴鶼種竹籓官舎看雲到步檐池萍青靡靡砌卉緑纖纖戀闕心徒奮傷時口合鉗風塵途漸迮原野氣猶熸輦轂憂烽火深宫歎釡鬵迷津憐弱喪回策庶西崦瘴海愁空説鄉園淚暗沾思君遥送目烟雨晦巴黔毛堪一首堪字公輿吳縣人萬厯戊戌進士除吉安推官選授廣東道御史升大理寺丞歴官南京通政使卒贈工部右侍郎蘭津謁武侯祠羅岷山勢接哀牢丞相曽經駐節旄尚有里巫鳴社鼓依然陣石出江槽偏安西蜀非初願深入南方豈憚勞精爽不隨炎漢盡蘭津終古薦溪毛吳文企四首文企字季騧號白雪南京旗手衛籍景陵人萬厯戊戌進士除戸部主事歴郎中出知寜波湖州二府終陜西按察副使有絮菴慙録詩話白雪㢘吏守湖州時爨薪不給課僮僕刈後園豐草折枯樹以炊拾得石一片上有玉筍二字其旁題識已滿乃宋元豐間物笑曰太守落落如此石石應太守將去及遷秩載之以歸置香雨樓聞至今尚在也其菰蘆集在湖所著詩頗饒清韻題資福寺同寮友作行到寺邊寺坐看山外山講堂分戸牖野席對溪灣暗水香厨引髙雲絶頂還茶𤓰深話久欲起更牽攀登定海八面樓望海便欲乘潮去登臨小白華憑誰辨灰劫無術算河沙開士元居海仙姑舊姓麻蓬莱幾清淺好問蔡經家汎舟碧浪湖二首紺塔髙懸山寺蘭舟不逺人家載出村莊兒女折来楊栁桃花小櫂白蘋洲渡輕帆碧浪湖風歸到郡城春望湖山盡在樓中沈孝徴一首孝徴字公亷海鹽人萬厯戊戌進士除工部主事歴郎中出為河南按察副使有𤣥暢閣集顧太初云公亷諸體未嘗不師古人而惟陳言務去陪祀長陵憶昔攀龍向鼎湖幾回清夜聴啼烏南来風雨羣山合北望闗河落照孤累葉衣冠瞻祖廟中宵綵仗發清都霜華滿地松楸冷英􅐩于今陟降無髙出八首出字孩之莱陽人萬厯戊戌進士知曲周髙陽盧氏三縣升南京戸部主事歴郎中出為蘇松參議遷副使轉河南參政升按察使降廣寜道監軍副使改西平堡監軍有盧隠郎潛二集馮元成云孩之詩能不襲陳言玉焦弱侯云孩之因故為新去俗從雅譬之朗孤桐自中天律詩話孩之家本東莱不襲歴下遺派如蘋婆果初生食之味雖近醉猶勝冬月儲藏軟同緜絮古意鳯鳥久不至丹穴邈難㝷如其今来儀不異他山禽所以鳴岐後千古閟其音箕山箕山於太室如岱有梁甫輔嶽竝稱尊他山遑敢侮潁水源更清石流歴可數所以讓王人洗耳臨其滸一瓢棄陶唐飲牛媿巢父後代鮮若儔髙風激千古野憤三十六年秋髙子居于虢再覩燕辭壘感我留滯客葉墜洛水清虎鬭熊耳夕時物惕所懐山川察今昔嵳峩入雲雪八月中天白牛羊懸蒼崖横術帶阡陌其人或巢穴其俗無蓄積催科更復拙課殿甘督責十載曉吏事無能效涓滴折腰如尺蠖妻妾交不懌空谷幸無人時縦㝷山屐庶少填委煩且免多口讁四海今小康天威儼咫尺恭聞聖節前臺省員滿百意氣富指陳容易輸肝膈封事報寢多往往生彈射元氣存碩果剥廬獨安適夫誰作厲階至今餘毒螫天聴愈以髙嚚訟竟何益黨禍歴殷鑒賢者宜自惜紛争羣小利危言徒唶嘖虺域與鬼狐影響襲其迹國事視勝負秦越比肥瘠君子處嫌疑虚名中一擲乾坤氣日短萬姓生理窄􅊔緯誠過慮不敢不跼蹐巍巍太祖功百世可憑藉天子堯舜資式瞻四門闢恭已治無為洛蜀得氷釋小邑物亦遂豁此窮愁癖洛中感秋紅樹邙山路西風颯已驚東京有遺事游客不勝情金谷銅駝地周公召伯城二毛動秋興三十豈成名亭山園次道岸韻野色臨髙閣天風落綺筵屏寒松柏雨杯浄薜蘿烟細逕分籬斷春畦抱井圓囂塵憐市眼應接轉茫然荅贈劉載甫比部言别五月江流漲家人苦鬱蒸把君贈佳句忽似踏層氷為别亦常事忘情終不能漸深交態後知已感偏増自德州買舟北上紀見茫茫四野水水鳥掠風帆土屋無人閉江艘有使監新魚隨罩得遺穗進桴芟出涕憂無象凉飈拂露衫允修山林還作此奉問西山積翠抱長安銀海瓊泉勢鬱盤千樹春雲靈寢覆萬年仙月侍臣看旌旗羣帝迴鑾谷風雨諸陵委佩寒司馬相如消渇甚欲因多病乞祠官何慶元二首慶元字長人六安州人萬厯戊戌進士授工部主事歴郎中出為雲南按察副使有蘧来室稿新浴夜坐殘暑渾無賴炎炎赤日懸祼宜新浴後凉愛晩風前團扇蒲葵歇方牀莞蒻便明河想清淺烏鵲易教填雨霽積雨晨初霽歸心客轉多薄雲天縹緲深淖馬如何秋水發新漲孤帆揚逺波柴扉休更掩或者麴車過張履正二首履正字我先山隂人萬厯戊戌進士廣信府知府送别夏京兆如何夏京兆宦況獨蕭然雞肋君寜戀羊腸我自憐烟花洞庭路風雨石城船分手従兹地相逢何處天送堵師甫方伯之任嶺南限韻熊車曉發建朱幢帝簡名賢任大邦南海諸侯推最長中朝國士本無雙風清合浦明珠返雨過炎洲瘴癘降相送一尊須盡醉明朝回首隔滄江阮自華一首自華字堅之懐寜人萬厯戊戌進士除福州府推官歴遷戸部郎中出知慶陽府再補邵武罷歸有霧靈集詩話堅之跌宕縱飲為理官扶醉入謁巡按方下拜酒汚御史衫袖遂挂彈章晩為郡守不視吏事惟與賔客分簡賦詩遨遊山水而已嘗大㑹詞客於凌霄臺推屠長卿為祭酒絲管交作列炬薰人復為巡按所糾庶幾狂簡之士乎詩不求工君子誦詩論世寜舎詠懷堂而取霧靈集也歸路歸路數千里斜陽咫尺間角聲斷城堞離恨起鄉闗宿鳥先人入江流背客還月中聴砧杵游子復何顔曹徴庸四首徴庸字逺生一字平子平湖人萬厯戊戌進士辛丑殿試由延安推官入為大理評事選刑部主事歴員外郎中終汾州知府有氷雪軒詩集沈客子云逺生詩蒼凉曠達多出塵之想詩話汾州詩品超逸誦之如食哀棃脆棗大是爽人黄岡道中芳草展柔緑十里冒長堤藤花覆髙岡下與垂楊齊榖雨春欲盡雙禽互悲啼行子感于役思歸息山谿閒㸔理綸繩坐釣桃花西及春事偶耕烟蓑引鉏犂斗酒勞作苦壺觴恣提攜何為深泥中没此青驄蹄秋興愁来白苧一停歌老去青霜兩鬢過黯黯夕陽髙鳥没蕭蕭秋栁暮蟬多冠軍出塞嗟何及前箸籌邊定若何昨夜城南横索馬傳呼客騎渡黄河和秋栁詩長信宫前幾樹彫風吹灞岸更蕭蕭空勞好夢三千里無那輕霜十萬條青眼乍迷魂黯黯蒼烟忽暗路迢迢却憐二月春寒淺占斷東風紅板橋南康官舎偶住江城池上亭長松苦竹伴餘清牆西秋色斜陽外截得廬山一角明陳允升二首允升字雲逵烏程人萬厯戊戌進士滁州知州有燃藜閣遺稾秋日苦雨秋水漸浮堤青禾白鷺棲祝篝空有意抱甕已無畦蛩欲依人訴鳩偏逐婦啼不堪翹首望天際濕雲低碧浪湖城外烟波浸碧天城頭烟火萬家連中流塔影浮寒玉隔岸風光入畫船一片松雲歸獨鶴千秋俎豆列三賢由来問俗多淳樸不似西湖競管絃劉世教一首世教字少彞海鹽人萬厯庚子舉人官廣乘知縣有研寳齋藳古意髙樓有思婦光采瓊樹枝陸離雙玉佩明珠綴巾綦摻摻出手爪哀哀寫芳辭清商未終曲聴者淚已滋良人無故懽賤妾無前期空憐夜夜月流影過重栭王嗣奭二首嗣奭字右仲鄞縣人萬歴庚子舉人有宻娛齋集九日聞范君材補官戲簡龍山吹帽日北闕賜環新好飲黄花酒休令笑逐臣舟中即事黄河杳無際白浪卷山回不待窮源去方知天上来明詩綜卷六十三
