body:
  text: 明詩綜巻一翰林院檢討朱彞尊編太祖高皇帝三首帝諱元璋姓朱氏字國瑞濠之鍾離東鄉人元至正十一年辛夘起兵丁未稱吳元年戊申建元洪武在位三十一年崩𦵏孝陵在應天府治東北鍾山之陽永樂元年上尊諡曰聖神文武欽明啟運俊徳成功統天大孝髙皇帝廟號太祖嘉靖十七年改上尊諡曰開天行道肇紀立極大聖至神仁文義武俊徳成功髙皇帝有御製詩集五巻神鳳操鈞天奏兮列丹墀俄翩翩兮鳳皇儀歛翺翔兮棲梧枝彼觀徳兮直為我辭鍾山賡吳沉韻嵯峨倚空碧環山皆拱伏遥岑如劍㦸邇洞非茅屋青松秀紫崖白石生𤣥谷巖畔毓靈芝峯頂森神木時時風雨生日日山林沐和鳴盡啼鶯善舉皆飛鵠山中道者禪隴頭童子牧試問㡬經年答云常辟榖春望牛首遥岑峙立勢蒼然春日鶯啼景物鮮叠嶂倚天江月外三山映帶石城邉劉基曰皇帝提一旅之衆龍飛淮甸不十年間奄有區宇自古以來武功之盛未之有也及夫萬㡬之暇作為文章舉筆立就莫不雄深宏偉言雅而㫖逺真所謂天生聰明可望而不可及者矣縱宋濂曰皇帝臨御以來用人文化成天下天聖能形諸篇翰揮灑之際不待凝神而思若淵泉有長江大河一瀉萬里之勢自然度越千古郭傳曰自漢而下興王代作然文經武緯一弛一張率不能兼濟其美惟唐太宗以兵力定亂及踐祚之後詞章奮發論者以其雕竒鏤彩徒與騷人韻士争錙銖之巧惟皇上以一旅取天下不數年間混一南北至萬㡬之暇復游心道學志存詩書寓辭竹帛親搦管翰意無停機一揮數千百言粹然出於情性之正觧縉曰臣少侍髙皇帝早暮載筆墨楮以俟聖情尤善為詩歌睿思英發雷轟電燭玉音沛然數千百言一息無滯臣輒草書連幅筆不及成㸃畫上進才㸃定數韻而巳或不更一字故嘗喜誦古人鏗鍧炳朗之作尤惡寒酸吚嚶齪齷鄙陋以為衰世之調為不足觀詩僧宗泐進所精思刻苦以為得意之作百餘篇上一覽不竟日盡和其韻雄深闊偉下視泐詩真大明之於爝火也成陸釴曰洪惟太祖應天順人創業垂統巍乎功煥乎文章稱盛羙矣鄭嘵曰上初不識書每退朝暇延接儒士講論經典又取古帝王嘉言善行書之殿廡出入省視作為文章揮筆立就或命侍臣立榻下操觚授詞混混千言皆淳雅髙簡洞逹物情動引經史足法萬世飢髙岱曰太祖以武功定天下而崇尚文學如渴之於飲食每得儒臣皆待以腹心帷幄朝夕諮訪不倦至於解析經義又多天縱神啓有非老師宿儒之所能及者朱國祚曰髙皇帝詩發乎天籟自然成音當日賡歌颺言匪僅詹吳樂宋四學士而巳若逹魯與權吳伯宗劉仲質張翼宋璲朱芾桂慎戴安王釐周衡吳喆馬從馬懿易􅐧盧均裴植李睿韓文輝曹文夀單仲右諸臣進詩咸賡其韻今諸臣之作十九無聞而聖藻長垂宇宙髙矣羙矣静志居詩話孝陵不以馬上治天下雲雨賢才天地大文形諸篇翰七年而御製成集八年而正韻成書題詩不惹之菴置酒滕王之閣賞心胡閏蒼龍之詠擊節王佐黄馬之謡日歴成編和黄秀才有作大官設宴醉宋學士有歌顧天禄經進詩篇披之便殿桂彦良臨池聫句嫓於颺言韻事特多更僕難數惟其愛才不及因之觸物成章宜其開創之初遂見文明之治江左則髙楊張徐中朝則詹吳樂宋五先生蜚聲嶺表十才子奮起閩中而三百年詩教之盛遂超軼前代矣成祖文皇帝一首帝諱棣髙皇帝第四子初封燕王之國北平建文元年稱兵靖難四年入金川門建文帝自焚或傳出亡帝即位革除建文年號稱洪武三十五年踰年建元永樂在位二十二年崩於榆木川𦵏長陵在昌平州北一十八里天夀山諡曰體天𢎞道髙明廣嘉靖十七年更廣為肇運聖武神功純仁至孝文皇帝廟號太宗嘉靖中更成祖有御製集勃泥長寧鎮國山詩實録永樂六年十二月丁丑遣中官張謙行人周航䕶送嗣浡泥國王遐旺等還國初故浡泥國王麻那惹加耶乃言蒙朝廷厚恩賜封王爵國之境上皆屬職方而國有後山乞封為一國之鎮至是其子遐旺復以為請遂封其山為長寧鎮國之山命謙等即其地樹碑上親製文系之以詩炎海之墟浡泥所處喣仁漸義有順無忤慺慺賢王惟化之慕導以象胥遹來奔赴同其婦子兄弟陪臣稽顙闕下有言是陳謂君猶天遣其休樂一視同仁匪偏厚薄顧兹鮮徳弗稱所云浪舶風檣實勞懇勤稽古逺臣順來怒趌以躬或難矧曰家室王心亶誠金石其堅西南蕃長疇與王賢矗矗髙山以鎮王國鑱文於石懋昭王徳王徳克昭王國休寧於萬斯年仰我大明沈徳符曰文皇帝封外國山者凡四永樂三年十月封滿刺加國西山曰鎮國山四年正月封日本國鎮山曰夀安鎮國之山六月十二月封浡泥後山曰長寧鎮國之山十四年十二月封柯枝國中山曰鎭國山皆出御製詩文以炳燿海外且詞旨雋蔚斷非視草解楊諸臣所能辦因思唐文皇兵力僅伸於漠北而屈於遼水若文皇帝威徳直被東南古所未賔之國贔屭穹碑昭回雲漢萬禩所無也詩話長陵稱兵靖難踐位之後加意人文成均視學有碑闕里褒崇有述以及姑蘇寳山之石武當太岳之宮靡不親製宸章勒之豐碣而又五經四書性理大全有書聖學心法有書大典有書文華寶鑑有書為善隂騭有書孝順事實有書務本之訓有書不獨紀之以事抑且系之以詩至于過兖州則賜魯藩于吳則夀榮國交阯明經甘潤祖等一十一人庶常吉士曽棨等二十八宿咸承寵渥三勒石於幕南之廷四建碑于海外之國此諡法之所以定為文與由是文子文孫復加繼述内閣則有三楊翰林則有四王尚書則東王西王祭酒則南陳北李觀燈侍宴拜手賡歌嗚呼盛矣仁宗昭皇帝二首帝諱髙熾成祖長子建元洪熈在位一年崩𦵏獻陵在天夀山西峯之下諡曰敬天體道純誠至徳𢎞文欽武章聖逹孝昭皇帝廟號仁宗有御製文集二十巻詩集二巻冬至賜贊善徐好古清朝盛文治輔徳資儒耆念彼筋力倦趨朝諒非宜賦詩有佳致納誨多良規起予徳深趣歡懐浩無涯新陽屆初復况此承平時酬勞有尊酒庶以勞期頤池亭納凉夏日多炎熱臨池憩午凉雨滋槐葉翠風過藕花香舞燕來青𤨏流鶯出建章援琴彈雅操民物樂時康詩話獻陵天稟純明雅志經術東朝監國命徐贊善善述纂尚書直指進講詩成亦命善述改竄令㫖呼其字而不名又嘗與曽少詹棨賡和如江樓秋望詩云蘋洲晴亦雪楓岸晝常霞絶似唐太宗設享年加永則成功文章巍煥何如焉宣宗章皇帝九首帝諱瞻基仁宗長子建元宣徳在位十年崩𦵏景陵在天夀山東峯之下諡曰憲天崇道英明神聖欽文昭武寛仁純孝章皇帝廟號宣宗有御製文集四十四巻詩集六巻猗蘭操昔孔子自衛反魯隠居國中見蘭之茂與衆草伍自傷不逢時而託為此操予慮在野之賢有未出者故擬作焉蘭生中谷兮曄曄其芳賢人在野兮其道則光嗟蘭之茂兮與衆草為伍嗚呼賢人兮汝其予輔思賢詩有序宣徳九年正月予嗣守祖宗大位夙夜兢惕思惟致治之道必有賢臣相與贊輔雖屢詔求賢然恭黙之思未已乃作詩以著予志詩曰天命有赫付畀萬方肆予承之夙夜弗遑亮天之工其責在予亦惟求賢以作心膂堯舜大聖咨于臣鄰湯武致治敷求哲人稷契臯䕫周召伊傅同徳一心以匡以輔惟時匡輔百工允釐治效之隆臻于皞熙悠悠我心念之勿置欲得羣賢以弼予治告言惓惓束帛戔戔命彼皇華歴于丘園庶㡬多才㧞茅連茹奮其功庸翼我王度惟天昭昭維嶽降靈篤生賢哲聿馳駿聲啓心沃朕以迪先徳揚其耿光有永無斁賜許廓廵撫河南實録許廓字文超河南襄城人由國子生授錦衣衛經歴擢工科給事中轉鴻臚左寺丞升兵部右侍郎洪熙元年轉左侍郎宣徳六年升兵部尚書嘗扈從北征董饟運交阯入軄方朝廷遣廓徃覆實戸口田賦尋召還後命招撫河南流民歸者數萬戸尚書張本卒以廓代之河南百州縣七郡所分治前嵗農事缺旱潦始復繼衣食旣無資民生曷由遂顧予位民上日夕懐憂媿爾有敦厚資其徃勤撫字徙者必輯綏饑者必賑濟咨詢必周歴毋憚躬勞勩虚文徒瑣碎所至皆實恵勉旃罄乃誠庶用副予意憫農詩示吏部尚書郭璡雷禮列卿紀郭璡初名進字時用保定新安人由國子生出身永樂初為戸部主事歴遷福建參議山東參政進工部右侍郎改吏部洪熈初兼少詹事宣徳初命掌行在詹事府事進尚書農者國所重八政之本源辛苦事耕作憂勞亘晨昬豐年僅能給歉嵗安可論旣無穅覈肥安得縕絮温恭惟祖宗法周悉今具存遐邇同一視覆育如乾坤嘗聞古循吏卓有父母恩惟當慎所擇庶用安黎元示户部尚書夏原吉闗中嵗屢歉民倉無所資郡縣旣上言能不軫恤之周禮十二政散貨首所宜給帛遣使者發廪飭有司臨軒戒将命遄徃毋遲遲命下茍或後施濟安所期吾聞有道世民免寒與飢循巳不遑寧因請書媿詞捕蝗詩示尚書郭敦雷禮列卿紀郭敦字仲厚東昌棠邑人洪武癸酉中鄉試後入太學擢戸部主事出知衢州府庶務畢舉召為監察御史升河南布政司左參政調陜西以禮部尚書胡濙薦擢禮部右侍郎廵撫順天等處洪熈初降太僕卿旋進戸部左侍郎兼詹事府少詹事宣徳二年升戸部尚書蝗螽雖㣲物為患良不細其生實蕃滋殄滅端匪易方秋禾黍茂芃芃各生遂所忻嵗将登奄忽蝗已至害苖及根節而况葉與穂傷哉隴畞植民命之所繫一旦盡於斯何以卒年嵗上帝仁下民詎非人所致修省勿敢怠民患可坐視去螟古有詩捕蝗亦有使除患與養患昔人論已備拯民於水火朂哉勿玩愒減租詩實録宣徳七年三月庚申朔勅諭行在部院近年百姓稅糧逺運艱難官田糧重艱難尤甚自宣徳七年為始但係官田塘地稅糧不分古額近額悉依五年二月勅諭恩例減免中外該管官不許故違辛酉上退朝御左順門謂尚書胡濙曰朕昨以官田賦重百姓苦之詔减十之三以蘇民力嘗聞外間有言朝廷每下詔蠲租稅而戸部皆不凖甚者文移戒約有司有勿以詔書為詞之語若果然則是廢格詔言壅遏恩澤不使下流其咎若何今减租之令務在必行書曰民惟邦本本固邦寧有子曰百姓不足君孰與足卿等皆士人豈不知此朕昨有詩述此意卿當體念勿忘也六月戊子朔知蘇州府事况鍾上言近奉詔書官民田地有荒蕪者召人佃種官田凖民田起科無糧者勘實除豁租額臣勘得崑山等縣民以死徙從軍除籍者三萬三千四百七十二戸所遺官田召人佃種應凖民田科者二千九百八十二頃其間應减秋糧一十四萬九千五百一十石已嘗申達戸部未奉處分况官田有没入海者糧額尚在乞皆如詔書除豁從之七月戊午戸部奏直隸松江府屬舊設官田宜凖民田例起科古額官田積年逋負稅糧請蠲以甦民困上從之仍命今後各處官田糧俱凖此例官租頗繁重在昔葢有因而此服田者本皆貧下民耕作旣勤勞輸納亦苦辛遂令衣食微曷以贍其身殷念惻予懷故跡安得循下詔減十三行之四方均先王視萬姓有若父子親兹惟重邦本豈曰矜吾仁憫旱詩實録宣徳六年乙酉上以天久不雨禱祠未應憂之作憫旱詩亢陽久不雨夏景将及終禾稼紛欲槁望霓切三農祠神旣無益老壮憂忡忡饘粥不得繼何以至嵗窮予為兆民主所憂與民同仰首瞻紫微籲天攄精忠天徳在發育豈忍民瘝痌施霖貴及早其必昭感通翹跂望有渰兾以蘇疲癃草書歌賜程南雲有序宣徳七年二月朕㡬務之餘游心載籍及徧觀古人翰墨有契於懷嘗賦草書歌以寓意焉以爾日侍之勞書以賜之草書所自何所授初變楷法為章奏當時作者最得名崔瑗杜度張伯英三人真蹟巳罕見後來繼之有羲獻筆端變化妙入神逸態雄姿㸔勁健風驚電掣浮雲飛蛟龍奮躍猛虎馳漢晋草法千載師張顛藏真亦絶竒一代精藝才數輩遺墨千人萬人愛固知頓挫出腕力亦用飛動生神采古來篆籀今已譌何况𨽻草譌愈多吾書豈必論工緻誠懸有言當黙識何喬逺曰章皇寤寐思賢未嘗一日去書下筆螽涌皆傳修齊治平之道翰墨圖畫随意所在盡極精妙詩話景陵當海宇承平之日肆意篇章嘗于九年元夕羣臣觀燈各獻詩賦彚成六冊惜今巳無存即所遺御製集諸詩視民如傷從善不及宜薛祿武人比之南仲山甫而拊心感泣也英宗睿皇帝一首帝諱祁鎮宣宗長子建元正統十四年北狩皇弟郕王祁鈺奉皇太后令即皇帝位改元景泰尊帝為太上皇帝景泰元年帝還自迤北居南宫七年奪門復辟改元天順八年崩𦵏裕陵在石門山距獻陵西三里諡曰法天立道仁明誠敬昭文憲武至徳廣孝睿皇帝廟號英宗有御製詩文一巻漢江歌賜襄王漢江滔滔出嶓冢兮偉兹巨浸壯南邦兮萬有千里流無窮兮逶逶迤迤志必東兮於戲漢水殆與天地同始終兮廖道南曰粤稽諸古大舜卿雲之歌文王鳯鳥之詩太和氤氳溢於帝藻逮乎漢祖大風之詞霸心猶在唐宗興慶之詠玉跡斯㣲惟吾皇祖親撰鍾山之賦及閱江諸詩英廟載製峴山之賦及漢水諸詠直可追軼虞休上嫓姬羙豈漢唐諸君所可企及哉詩話裕陵以冲齡繼寳命即崇尚文治賜循良以招隱之歌及翠華返駕紫禁奪門而峴首襄陽頻頒宸藻昭同雲漢爛若星辰固知朔漠驚塵南宫夜雨文字之助所得良深耳御製詩文一冊後附寳文圖書春對酒帘諸作今亡襄王憲王瞻墡也仁宗第五子宣徳四年受封之國長沙正統元年遷襄陽府憲宗純皇帝一首帝諱見濟初名見深英宗長子建元成化在位二十三年崩葬茂陵在聚寳山距裕陵西一里諡曰繼天凝道誠明仁敬崇文肅武宏徳聖孝純皇帝廟號憲宗有詩集四巻闕里孔子廟詩天生孔子縱之為聖生知安行仁義中正師道興起從游三千徃聖是繼道統流傳六經旣明以詔後世三綱五常昭然不替道徳髙厚教化無窮人極斯立天地同功生民以來卓乎獨盛允集大成實天所命有天下者是尊是崇曰性聖道曷敢勿宗顧予眇躬承此大業惟聖之謨于心乃惬用之為治以康兆民聖澤流被萬世聿新報典之隆尤在闕里廟宇巍巍于兹重羙文諸貞石以光于前木鐸遺響於千萬年成化四年六月詩話茂陵撰文華大訓一十八巻以進學養徳厚倫明治為綱聖敬日躋終始典學間留意於詩章益荘王勿齋集有恭次皇祖憲宗皇帝四景連環詩韻四首則當時天藻曽頒諸藩服惜乎今不得而見之矣孝宗敬皇帝一首帝諱祜堂憲宗長子建元𢎞治在位十八年崩葬泰陵在史家山距茂陵西少北二里諡曰建天明道誠純中正聖文神武至仁大徳敬皇帝廟號孝宗闕里孔子廟詩聖人之生天豈偶然命之大君俾贊化權二帝三王君焉克聖繼天立極道形於政大化旣洽至治斯成巍巍蕩蕩渾乎難名周政不綱道隨時墜孔子聖人而不得位乃稽羣聖乃定六經萬世之師於焉足徴自漢而下數千餘嵗褒典代加有隆無替於皇吾祖居正體元六經是師卓爾化原列聖相承先後一揆逮及朕躬思𢎞前軌廟貌載崇祀事孔禋經言典訓彌謹彌敦俗化治成日升川至斯道之光允垂萬世𢎞治十七年閏四月李東陽記曰𢎞治甲子春正月重建闕里孔子廟成上親製碑文祝辭遣臣東陽申祭告臣東陽奉命以閏四月丁夘陛辭癸未至于廟衍聖公臣聞韶率族人迓于郊逺近大小來㑹者數百計前三日時雨降及期雨霽禮成之後星月朗耀神人懽暢歌工舞佾奉器執事之臣下逮胥吏僕從皆忻忻然如雲之從風水之赴壑有不令而集者敢紀成事用告來世若闡揚道徳以彰教化則奎章宸翰昭如日星有目者所共覩臣何敢贊一辭哉朱國祚曰敬皇帝恭儉慈恕寛仁愛人清閒之燕端坐肅然檢束身心謂嘗宜如是至于臨朝聽政剛毅果斷人莫敢撓而又霽色虚懐勵精訪落諌說雖切每見優容顧問大臣殆無虚日減膳節用尚徳緩刑織造之役常紓蠲租之詔屢下十八年間與民休息培養太和跡其治效巳庶㡬于唐虞三代之盛矣詩話泰陵聖學緝熙徳修時敏非惟政事之勤實啓人文之化置永樂大典于便殿暇即省覽又命儒臣集歴代御製詩以為規範其賜李東陽静中吟一首論者謂同二帝典謨三王訓誥焉帝旣殂落羣臣哀輓之章徧於朝野有云日神月無私照乾坤仰聖功孝可通金石誠能動鬼雲容常昊日露禱必深更嵗旱憂疑獄天寒憫戍兵近臣常造膝元老不呼名孝宗天子真聖人平生好武復好文文多咨謀武籌畧坐鎮海宇清風塵李東陽詩也人間何日忘𢎞治天下兹辰哭孝宗楊一清詩也惻怛蠲租詔丁寧餽戍金儲巏詩也年年揮淚地不見長蒼苔顧璘詩也十年放逐同梁苑中夜悲歌泣孝宗李夢陽詩也彌留念諸将顧命託三公何景明詩也當時侍從者慟哭㡬人存徐禎卿詩也祠官如可乞長奉泰陵園邊貢詩也誰期陵樹果猶許侍臣嘗王廷相詩也微官渾忘却惟記孝皇年鄭善夫詩也弓劒仙原閟謳歌帝徳昭王謳詩也要其觸景傷情引端而出雖不足包帝徳之大而公是之不可泯固灼然矣近聞史局有専毀泰陵非令主者將使是非混淆是不可以不辨世宗肅皇帝二首帝諱厚㷓興獻王子憲宗之孫武宗無子入繼大統建元嘉靖在位四十五年崩葬永陵在陽翠嶺距長陵東南三里諡曰欽天履道英毅聖神宣文廣武洪仁大孝肅皇帝廟號世宗有御製詩賦集共七巻御經筵講大學衍義有感賦此帝王所圖治務學當為先下作民之主上乃承之天致治貴有本本端化自平人君所學者其序有後前正心誠其意志定必不遷吾志旣能定理道豈復顛身修本心正家國治同然國治乃昭明萬邦斯協焉於變帝堯典思齊文王篇萬國修身始朕念方拳拳張萱等重編内府書目曰嘉靖六年大學士楊一清賈詠翰林學士翟鑾進講大學衍義御製五言古詩一章用金龍箋書一清等恭和集為一冊名翊學詩降勅諭答上用欽文之寳勅首三臣銜皆御筆也賜賈詠詩卿本中州俊簡在登台衡君臣際良難所貴徳業并朕固亮卿志夙夜懐忠貞巻阿有遺響終聽鳯皇鳴譚希思曰帝博綜經史親禮儒臣平臺召對西苑賡歌藹然如家人父子然終不少假以威福纂言屬意直抒自得徃徃有發前聖所未發者詩話世廟受天永命樂備禮明尤勤勤於韻語當時受賜者郭武定勛費文憲宏楊文襄一清石文介珤張文忠孚敬李文康時夏文愍言朱尚書衡他若席文襄書以病目期以弼亮趙尚書鑑以致仕嘉其止足龍箋御墨徃徃傳之世家而一清當歸田時武皇南廵親幸其第賜之絶句十二首其在政府詠元宵有愛㸔氷輪明似鏡之句世廟以其類中秋易以愛㸔金蓮明似月兩朝寵遇宸翰煒煌尤稱千古盛事云神宗顯皇帝二首帝諱翊鈞穆宗荘皇帝長子建元萬厯在位四十八年葬定陵在大峪山距昭陵北一里諡曰範天合道哲肅敦簡光文章武安仁止孝顯皇帝廟號神宗有集一巻畫眉山龍王廟碑詩有序畫眉山龍王廟在都城西一舎其地故有泉潭相傳以為龍之所居即其旁為廟祀龍王焉成化壬辰憲宗純皇帝禱雨有應新其廟而勒辭於豐碑萬厯十有三年春夏不雨麥稼焦枯以五月徃禱于廟浹旬之間嘉澍屢霈郊野霑足三農忭舞爰出内帑金錢重増葺之為之記而系以銘詩於赫龍王不顯其光上下帝旁􅌵翕無方為雷為霆為雲為雨有開必先靡求不與我求伊何黍稷稻粱爾與伊何千倉萬箱眉山之下龍王之宇迄用康年榖我士女漷縣景命殿詩實録萬歴三十六年勑建景命殿于漷縣永樂店聖母皇太后誕育之地上御製碑文系之以詩翼翼京邑漷水瀠之璇源逺濬載奠坤維尊靈長樂歡洽重闈緜緜景命百禄咸宜睠兹湯沐啓瑞集禧周原膴膴寳殿攸基重門邃閣崇敞逶迤仁祠左拱靈宇右麗甍連棟接鳥革翬飛虹祥式闡慈念載怡爰及薄海耀景咸熙聖母之徳綏此蒸黎百千萬禩永永無隳沈徳符曰帝髫年即工八法賜江陵吳門諸輔臣堂扁巳極偉麗其後漸入神化批答詔㫖間有改竄龍翔鳳翥運筆之妙有顔栁所不逮者可謂天縱多能矣詩話定陵筆精墨妙嘗覩先文恪公暨唐文恪公殿試巻御書第一甲第一名六字皆瘦硬通神餘如来青閣海淀諸扁亦然嘗序草韻辨體一書備古今翰墨之變内府向藏御製詩文一巻今已無存列朝詩集所載勸學詩一章未必出于御製也謹録龍王廟景命殿二碑銘詩廟在畫眉山俗名金山口成化中禱雨有應而建是碑立于萬歴十三年殿在漷縣永樂店萬歴三十六年勑建為孝定皇太后祝釐俗所稱九蓮菩薩者是莊烈愍皇帝一首帝諱由檢光宗貞皇帝第五子天啓七年以信王入踐位建元崇禎臨御十七年宼陷京師殉社稷𦵏思陵在鹿馬山賜石砫土司秦良玉蜀錦征袍手製成桃花馬上請長纓世間不少竒男子誰肯沙場萬里行王世徳曰四川石砫土司女帥秦良玉帥師勤王召見賜綵幣羊酒銀牌御製四詩旌之帝即位春秋方十七魏璫竊國柄積威震天下乃不動聲色翦除之其才豈中主所可及而畏天災遵祖訓勤經筵崇節儉察吏治求民瘼種種聖徳朝野共聞使得才堪辦賊之臣為之輔君臣一徳將相同心則太平何難致乃不幸有君無臣卒致身殉社稷悲夫詩話思陵聖學時敏甲乙之夜不輟經書又妙觧音律甞于深宫鳴琴製於變時雍之曲躬幸太學御經筵㑹稡四聲之書特擢五經之士用人惟巳立賢無方萬㡬餘暇灑墨為行草書龍跳虎卧甞書視民如傷望道未見八字于便殿詩不多作然長牋小扇徃徃流傳人間其最傳者賜秦良玉楊嗣昌五絶句也良玉者石砫掌印宣撫使其兄邦屏邦翰皆以援遼力戰死㓜弟民屏被創潰圍出歸不能視事諸部以良玉忠勇多大畧遂襲宣撫使敗奢崇明于佛圖闗破安邦彦于平越功居第一野紀謂良玉有男妾數十人而䕫州李吉士長祥力辯其誣謂川撫嘗遣陸緜州遜之按行諸營良玉冠帯飾佩刀出見設饗禮酒數廵論兵事遜之誤曵其袖良玉引佩刀自斷之其嚴肅若是張獻忠僭號四川良玉號咷曰吾兄弟三人皆死王事吾以一婦人受國恩二十年不幸至此其敢以餘年事逆賊哉悉召所部約曰有從賊者殺無赦獻忠鑄金印齎之易其官不為動賊黨無敢入其境者亦勝于丈夫矣思陵葬日皇朝未收江南福藩稱制遥上帝諡曰紹天繹道剛明恪儉揆文奮武敦仁懋孝烈皇帝廟號思宗后諡曰孝節貞肅淵恭荘􅐧奉天靖聖烈皇后尋改帝廟號曰􅐧宗唐藩稱制復改威宗皇朝順治初更諡帝曰欽天守道敏􅐧敦儉𢎞文襄武體仁致孝懐宗端皇帝后曰孝敬貞烈慈恵荘敏承天配聖端皇后旣而改稱荘烈愍皇帝凡五易而後定焉今神牌所書即順治初定一十六字第其下改書荘烈愍皇帝云當李自成陷京師思陵将殉社稷傳㫖後宫令自裁而宫監王永夀從懿安皇后宫至白帝曰懿安皇后業自縊矣帝連稱好好乃走煤山經於海棠花下福藩遥上懿安后諡曰孝哀慈靖恭恵溫貞偕天協聖哲皇后詔云旣慷慨以捐軀亦從容以就義而順治實録于甲申五月大書𦵏明崇禎帝后及天啓皇后張氏於昌平州陵國史存據可以無疑其後有魏忠賢養女任氏進之徳陵立為貴妃宼亂後流轉民間詐稱天啓皇后因送於官光禄寺月有廪給人遂疑后失節沉寃莫雪故附白之又按明自太祖至愍皇帝累朝多有御製詩文或傳或不傳敬録十帝之詩于巻首若武宗南廵過鎮江幸大學士楊一清第賜以十二詩命其和韻自題錦堂老人又于宣府製小詞有野花偏有色村酒醉人多之句傳誦人間惜乎未覩其全也昭皇后一首后姓張氏永城人彭城伯麟女洪武二十八年冊為燕世子妃永樂二年封皇太子妃二十二年仁宗即位冊立為皇后正統七年崩合𦵏獻陵諡曰誠孝恭肅明徳𢎞仁順天啓聖昭皇后送司寳黄維徳歸南海皇朝列聖御寰宇偉烈宏謨冠千古重惟仁化本家邦内庭百職需賢良咨爾惟徳女中士自少從容知禮義一從應召入皇宫夙夜孜孜勤乃事昔時黑髮今如霜嵗月悠悠老将至九重聖主天地仁欲使萬物同陽春體兹徳意賜歸去乃心感激情忻忻嶺海迢迢千萬里潞河官櫂春風裏賜衣宫錦生光輝親戚相迎人總喜喜爾富貴歸故鄉我心念爾恒不忘彩筆題詩意難盡目極天南去鴈翔明詩綜巻一
