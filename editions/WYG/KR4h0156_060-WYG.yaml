body:
  text: 明詩綜卷六十翰林院檢討朱彞尊編黃居中一首居中字明立晉江人萬厯乙酉舉人自上海教諭遷南京國子監丞有千頃齋集静志居詩話監丞鋭意藏書手自抄撮仲子虞稷繼之歲増月益太倉之米五升文館之燭一挺曉夜孜孜不廢讎勘著録凡八萬冊墳土未乾皆歸他人挿架深可惋惜也寄兒愛子遥相送臨岐轉憶家囊空嗟久客歲晏又天涯鬢逐風塵短心驚道路賖離情兼旅思一倍惜年華曽仕鑑一首仕鑑字人倩南海人萬厯乙酉舉人歴官户部主事有慶厯公車二集游羅浮石室春同入龍宫夜不服青天雙瀑下明月二樓懸羽蓋悲陳迹金書憶昔年相攜采芝叟勸酒鐵橋邊呉大纘一首大纘字于孝義烏人萬厯乙酉以官生中順天鄉試齋居感興蒼蚪九重淵𤣥豹七日霧欲以媚幽姿非為傲睨故驛請疲風塵夙夜謂多露廣游可成名無乃喪真素陳邦訓一首邦訓字彞父鄞縣人萬厯乙酉中順天鄉試被黜後署海鹽儒學教諭官至漳州通判有𤣥感軒集閣上雲合沙頭樹人歸浦口烟空山喧宿鳥小閣俯長川衣短宜殘暑歌長入遠天南風吹几席不飲亦陶然唐文獻五首文獻字元徵松江華亭人萬厯丙戌賜進士第一授翰林脩撰歴中允諭德右右庶子掌詹事升禮部侍郎翰林院學士教習庶吉士卒贈尚書加太子少保諡文恪有占星堂集詩話郭文毅坐妖書被逮人莫敢前文恪周旋患難不避危機當時稱為長者其治家整肅嘗患江南子弟無家法貽書告誡二子長諱允恭字欽甫即彞尊之外祖也仕兩浙鹽運司副遷石屏知州家藏殿試策神宗御題卷面瘦硬通神曾捧觀于占星堂上占星堂者文恪未第日人或見奎宿於堂於是徐奉化獻忠作記孫漢矣陽克𢎞以八分書於門屏亂離尚存今已易主長安春日感懷已覺吾衰久行藏未自由江鄉千里思夢醒五更愁鳥自吟清晝花應笑白頭初衣頻取拭肯負竹林游丁酉秋得請賜告天意容棲遁烟霞入夢長淺才羞竊禄漸老學休糧戢羽歸愚谷看人角智囊單車明日逺相似鴈隨陽寄施起東丈為溧陽司訓舊是文章伯居然弟子師絳紗傳舊業緑綬綰明時君有施讎易吾慙唐勒詞空懷問竒意未敢問前期登北固曉望清晨凌曲磴一望攬雄圖天塹仍連楚雲帆半入呉逺山籠日氣古寺隔烟蕪自覺登臨迥渾忘旅思孤夜泊吕城何處汀洲晩停橈信楫師雨餘霞散綺風静柳垂絲野寺鐘聲後夜潮人語時勞勞遊子意隴笛不堪吹楊道賓二首道賓字惟彦晉江人萬厯丙戌賜進士第二授編修累官禮部左侍郎兼翰林院學士贈尚書諡文恪有集何稚孝云公詩優柔恱懌而出之以鏗然之韻梧江即事春水萬山低江城宿霧迷征帆天上下去路粤東西荒逕餘亭障樓船急鼓鼙客心驚寂寞况復夜猿啼别徐尉之任廣昌遺愛苕溪上新綸楚水邊人疑徐孺子尉即漢神仙柳色憐分􅃑春風動别筵當官三事在慎勿負先賢薛三才一首三才字仲孺鄞縣人萬厯丙戌進士改庶吉士授兵科給事中累官兵部尚書贈太子太保諡恭敏有集春暮花圃即事退食閒亭自委蛇憑軒忽漫問花期韶光已過九十日闌藥纔舒三兩枝乍和酒香風細細長畱春色景遲遲看來最是牽情處嬝娜晴絲百尺垂黃汝良一首汝良字明起晉江人萬厯丙戌進士改庶吉士授編修厯官太子太傅禮部尚書掌詹事府事有河干集登樓作一卧滄江十二秋今辰獨上望京樓邊城幾處臨風嘯闗塞何人裂土侯萬里難傳青海信千峰不散白雲愁孤臣有涙向誰灑敢道歸田便得休袁宗道二首宗道字伯修公安人萬厯丙戍進士改庶吉士授編修歴中允洗馬庶子贈禮部右侍郎有白蘇齋集詩話嘉靖七子之派徐文長欲以李長吉體變之不能也湯義仍欲以尤蕭范陸體變之亦不能也王百榖王承父屠長卿雖迭有違言然寡不敵衆自袁伯修出服習香山眉山之結撰首以白蘇名齋既導其源中郎小修繼之益揚其波由是公安流派盛行然白蘇各有神采顧乃頺波自放舍其高潔專尚鄙俚鍾譚從而再變梟音鴃舌風雅蕩然泗鼎將沈魑魅齊見言作俑者孰謂非伯修也邪攜尊江上郭外同君去清尊對水涯寒潮鳴草徑積雪晃平沙小艇乘流急人家逐岸斜流連歸路晩高柳亂啼鴉兩岸芙蓉南垞與北垞岸逺𣺌難即此處好行舟面面芙蓉色呉應賓二首應賓字尚之又字客卿桐城人萬厯丙戍進士改庶吉士授編修天啟初以理學召不赴加左春坊右諭徳魚翰林侍讀門人私諡宗一先生有學易齋集感興雨氣澹將夕木末明殘霞流芳惜餘姿宛轉歸泥沙物化一以遷歡樂為咨嗟根株既不定無乃空中華渺然念獨往浩蕩隨無涯題張洪陽閒雲館賦就張平子飄然獨草亭回環一水緑髙下萬山青避世曾金馬焚香對石屛祇疑雲霧窟長䕶太𤣥經王士昌五首士昌字永叔臨海人萬厯丙戌進士厯官右僉都御史巡撫福建有投荒草出都八口家同在提㩦出國門艱危心未剖慷慨舌猶存戀闕原臣志投荒亦主恩長沙憐謫所不敢賦招魂三義廟遺像丹青蝕英名過客聞中原曽百戰大業竟三分旗影搖山月爐烟結水雲恰逢邨社近盲鼓説遺文武陵縣武陵城北道十里接平疇沙際餘寒斂湖隂積氣浮叢篁編作户獨木剡為舟指㸃仙源近清溪分外幽黔中雜詠南服天垂盡銅標向此分洞中厖吠日天半犢耕雲蠻語逢人譯夷歌到處聞干戈新戰後殘照幾家邨分宜道中野菊花黃楓葉丹衝寒日日據征鞍擔囊行旅休相訝蠻尉於今屬漢官李啓美一首啓美字成甫一字念方豐城人萬厯丙戌進士改庶吉士授檢討有李太史集呉㑹甫云誦念方詩如野寺孤鐘令人塵􅁭頓滌送王則之假歸千里一相送郊雲黯不飛潼闗何處是孤鴈獨西歸柳暗秦川失天高隴樹微如何向岐路春草正芳菲黃承𤣥一首承𤣥字履常秀水人萬厯丙戌進士除工部主事歴員外郎中出為湖廣參政調山東再補江西進按察使遷河南陜西左右布政使升應天府尹以右副都御史巡撫福建贈工部左侍郎有盟鷗堂集江上送陸伯生東歸𤓰步洲前歸思濃金焦忽送五更鐘一帆羡爾乘潮去數遍呉山到五茸王嘉謨五首嘉謨字伯俞直𨽻豹韜衛人萬厯丙戌進士除行人選禮科給事中官至按察使畿輔詩存作布政使有薊丘集詩話伯俞五言頗熟選體第北人用韻恒以入聲雜上去讀故不多存述懷脈脈泉初生粼粼氷始泮嘯歌念古人俯仰成愁歎貴賤本無方乘時若有判草木滿中唐㫖鷊巢其岸本欲慕崇高迺為耳目翫嶁兜橋淵淵溪水中青蒲葉靡靡翳然林木間幽懷信予美細藻唼潛鱗山梁雊文雉㝷幽復逺涉濟勝良堪喜夕陽忽西流平湖澹烟起慷慨賦新詩行歌出山市西勾橋微風何澹澹宿雨隨人飛遙望石梁前楊柳䕃重圍淵壑寂無聲獨行向霏微寒芳自可藉寄賞幸不違徙倚豐林間坦步徐言歸盤山法藏寺折坂殿懸厓悠然縱鞍韅緜緜谷口雲飄墮白如練峰巒忽相冒竒石還驚眩大者數十㝷小或等冠弁峰巔有嵌宇歴歴皆可見永懷僧棲樂倍覺塵情倦稀逢采芝侣獨立幾回盼雙峯寺逺眺翠微近雲木澹清姿石華浮半空飛泉激流澌其陽饒怪石小大紛參差萬嶺鬱相錯孤雲停不移中峰構翠龕一一能仁祠山僧衣蘿薜雜以松蘚皮導我磨蒼崖覽古生遐思沈瓚三首瓚字孝通一字子勺呉江人萬厯丙戌進士除南京刑部主事歴郎中出為江西按察僉事告歸起補廣東僉事有静暉堂集李伯逺云子勺詩格蒼以古致沖以逺高者何減魏晉次亦不失為陳射洪詩話子勺兄璟妙解音律撰南曲譜鄉里目為詞隱先生居家未嘗廢絲竹有子恒失學子勺去官身為墊師教其兄子一門之内一選伎徴聲一㝷章索句論者比之顧東橋兄弟云游元陽洞朝雲漸歸山松風晝淒𦂳重巒散晴暉皎日麗阡畛矚嶺目俱遙循巖步方窘一山别作阿亂石聚成囷徑穿斧斤餘崖覆松蘿盡危磴曲縁澗近坡平中凖洞啓石谽谺風高樹凌踳僧舍密綴蜂樵柯露棲隼居人茂花竹過客甘蔬筍迴思廿載前此地名跡泯七日鑿混沌一朝見𤣥牝境闢地孕靈氣開人示朕幽夢屢相闗孤笻自兹引為誦郗生言無貽謝公哂山中雨行夜宿民家好鳥知農候嚶嚶灌木間荒村無堠館樵斧出柴闗雨暗車前路雲埋屋後山虛疑檐澑急溪水夜潺潺立秋日送行石頭城下路三面是長江此地新秋色映君江上艭凉風動衣􅃑飛雨灑船牕無事嗟行役臨流倒玉缸潘大復二首大復字徵復鳥程人尚書季馴子萬厯丙戌進士工部郎中有毘山堂詩草同朱文寧庶常觀海烟波杳無際縱目喜同君雲外千峯出潮平各浦分競探蝴蝶窟驚起鷺鷥羣浮白宜兹地蕭蕭日就曛江行阻風得來字孤舟泊風雨日夜聽喧豗石燕排空至江豚鼓浪來人家少煙火田畝半蒿萊愁緒那堪破呼童發舊醅徐熥十九首熥字惟和閩縣人萬厯戊子舉人有幔亭集張㓜于云惟和調匪偏長體必兼善力追古則盡滌時趨謝在杭云惟和才情聲調伯仲季迪送人游吳楚津亭煙栁綠垂絲萬里闗山匹馬遲去國正當秋盡後登樓多在日斜時楚江草長悲鸚鵡呉苑花深走鹿麋話訊何須共惆悵秋風摇落是歸期旅次石頭岸石頭城下水㣲茫回首鄉闗驛路長𤓰步煙波連斷靄秦淮雲樹隔斜陽秋高落木迷村舍夜静寒潮到女牆客裏愁心已如此一聞南雁更淒涼金陵故宫先朝遺殿閉塵埃零落空勞過客哀五夜銅壺乾罷滴六宫金鎖澀難開翠華去後全無影羅綺焚餘尚有灰弓劒盡埋烟雨泠椒房一半上蒼苔金陵懷古白門京闕舊山川朱雀烏衣夕照邊百代荒陵崩夜雨六朝遺殿鎖秋烟臙脂歲久銷宫井苔蘚春深繡御筵往事淒涼無限淚傷心最是建文年閩王審知墓下作玉輦何年去不回霸圖千古總成灰秋深兔穴依寒壟歲久魚燈暗夜臺故國闗河甌越在遺民蘋藻鼎湖哀蓮花峰下黃昏月猶見三郎白馬來送邵武李太守擢憲滇南昆明池水静無波擁傳新從僰道過開府定能寛漢法采詩曽不廢蠻歌趂墟滇客龍名市納欵蠻王象渡河他日勒功畱片碣㸃蒼如黛石嵳峩送王玉生作客生涯薄依人去住難春光無限好空向異鄉看客中寒食去歲燕山道今朝劒水濵如何兩寒食俱作異鄉人漂母祠落落千金報悠悠國士心從今慙漂母不敢過淮隂彭城懷古雲龍山下鳥争啼戯馬臺前日欲西莫謂楚宫今寂寞王孫芳草正萋萋客中贈别呉姬把酒唱離歌一片愁心奈别何莫怪相看頻下淚江南春色已無多丹陽遇陳十八丹陽渡口遇同鄉欲語匆匆怨夕陽君返江南我江北雲山千疊斷人腸郵亭殘花征途微雨動春寒片片飛花馬上殘試問亭前來往客幾人花在故園看酒店逢李大偶向新豐市裏過故人尊酒共悲歌十年别淚知多少不道相逢淚更多元夕懷李伯賢往事傷心倍可憐故人今夜𣺌雲天燈光月色鞦韆影已隔春風二十年送李子行太守謫茶陵一官何事又投荒楚峽猿聲幾斷腸正是長沙遷謫地不堪夜雨渡瀟湘芋江驛樓送張四之白下春風吹柳萬條斜此去金陵驛路賖不必相思當後夜片帆開處即天涯交河道中黃沙漠漠馬驂驔北地春光久自諳不用褰帷縱遊目斷無山色似江南村中晩步青山迴合抱清溪村徑隂隂鳥自啼落盡疎林秋色晩水流楓葉過橋西張文柱二首文柱字仲立崑山人士瀹子萬厯戍子舉人臨清知州朱秉器云仲立詩清逸然多羇栖咨歎之語孫齊之云仲立高才燦發託意幽𤣥正如氷壺秋月本宜著烟霞外迺强使適俗故少年即有憂生之嗟塞下曲有鴈逐歸心無書返上林天山風不斷秋早雪花深白草分秦甸清笳雜漢音將軍誇戰馬價重一千金惜别惜别復惜别殘更為爾遙青楓薄命葉黃柳斷腸條天迥遲寒鴈江空急暮潮秣陵烟雨際畱得鬢蕭蕭李鼎一首鼎字長卿新建人萬厯戊子順天舉人有李長夜泊桃源迢逓憐行役其如客思何孤雲將短櫂十月渡黄河水泊兼鷗宿霜清聽雁過更堪寒夜盡欹枕逺鐘多塗中雜詩一騎風塵裏千山縣郭東畏途逢落日别思對孤鴻仗策心逾逺談詩氣更雄驅馳丈夫事不必恨飄蓬高攀龍二十二首攀龍字雲從無錫人萬厯己丑進士除行人謫掲陽典史起光禄寺丞厯官刑部侍郎都察院左都御史坐忤逆閹削籍被逮赴水死贈太子少保兵部尚書諡忠憲有髙景逸詩陳皇士云先生詩無意求工大約忬寫自得之志詩話先生天下規矩援世翼教不以聲律自繩然與歸待詔訂金石契宜同心之言自成蘭臭水居薄暮登樓四望逺疇時雨既降農人乍休乳燕来止鯈魚出游萬族有樂吾亦何憂卿集寄題故園三徑荒蕪久頻来入夢思空傳竹醉日不見栁眠時石室藏雲滿山花帶露滋到家開北牖觸目是新詩陶望齡四首望齡字周望㑹稽人萬厯己丑賜進士第三授翰林編修厯中允諭徳遷國子祭酒卒諡文簡有水天閣歇菴二集黄貞父云陶子詩為韋為栁間似長吉詩話周望早年詩格清越超超似神仙中人中嵗講學逃禪兼惑公安之論遂變為芸夫蕘䜿面目白沙在泥與之俱黑良可惜也旅次憶越中舊居宴坐雲歸後開尊月上初春衫裁越布晩食飽溪魚白鶴仙人箭𤣥夷使者書故鄉真可樂不是愛逃虚送商叔䕶朱叔懋應試秣陵仗劎他鄉意彈冠故友情秋風待行客落日事孤征尊酒逺相命寸心言未傾思君似流水寄向石頭城静坐吟我愛山中坐恍若羲皇時青松影寂寂白雲出遲遲獸窟有浚谷鳥棲無卑枝萬物得所止人豈不如之耕巖飲谷水常得中心怡夏日閒居長夏此静坐終日無一言問君何所為無事心自閒細雨漁舟歸兒童喧樹間北風忽南來落日在逺山顧此有好懷酌酒遂陶然池中鷗飛去兩兩復來還湖上閒居季思子往適至正爾山水間念吾烟霞友春風吹微波日暮倚楊柳我友惠然至童僕喜奔走相别歎幾時相逢慮非久所歡得晤言欲言仍無有黙黙各自怡一室閒相偶夜深不能寐明月在東牖七哀詩肅肅秋風深漫漫秋夜長中夜百感集攝衣步空堂俯聽蟲聲悲仰視明月光物色一如昨舊人何茫茫歲月日以疎髣髴日以亡一朝成永訣千載空相望靜心易生哀遺情難為方願從夢中路抽身至其旁諸公招飲石城隖勝㑹寧可常勿惜此淹畱竹樹有嘉䕃班坐無俗流念我平居日所愛在山丘願得素心侣引杯相勸酬今晨愜幽興不醉將焉求未須敕太康此樂可忘憂卓哉斜川人千載心悠悠夜步幽人夜未眠月出每孤往繁林亂螢照村屋人語響宿鳥時一鳴草徑露微上欣然意有㑹無與共此賞千載懷同心陶公調可仿潮陽縣觀海仲尼欲乘桴吾亦來海濱不作放逐客誰能得閒身澹澹風日和蕩滌怡心神一笑萬象間偃仰得其真快哉此日樂可以擬千春逝者只如斯世事徒繽紛安得無家累終焉此垂綸魯兩生吾愛魯兩生面折叔孫子灑然揮之去身隱名不紀是時風雲際豈不願膴仕大道吾所聞曲學有深恥從此謝世人聊以保厥美登子陵釣臺西京亂有象佛士鬱不揚鄙哉通津子奄奄孔與張謙黙祗自衛貞剛乃銷亡士氣日凋喪國勢遂不强為彼蟊賊資其心實先傷卓卓嚴子陵抗志輕侯王辭榮去上國垂釣來崇岡高風一以振芳躅久愈昌迺知姱修士與世為隄防登華頂峯遂至石梁斷崖觀瀑布晨䇿凌絶頂夕棲入浚谷攢峯插天表飛瀑掀地軸眛險騖前賞升虚騁極目春風澹冲襟朝曦扇輕燠深桃㸃澗紅弱柳抱溪緑想見桃源人胡麻飯應熟神仙不可期念此媚幽獨弢光靜坐二首偶來山中坐兀兀浹旬餘澹然心無事宛若生民初流泉當几席衆山立庭除高樹依巖秀修篁夾路疎所至得心賞終日忻忻如流光易蹉跎此日良不虚寄言繕性者速駕深山居落日在平野悵然懷千秋緬彼臨安區當年棲王侯樓臺何鬱鬱冠蓋紛相酬一朝世事盡百代成荒丘徒存指㸃跡令人心悲憂何如蓬廬士偃息巖壑幽圖書共朝夕花木逓春秋觴酌洽朋好卧起親鳬鷗豈不念世故中心自有求生有無窮娯既沒名長畱始歸三旬通仕籍六旬始歸田中間立朝日未嘗淹三年拙宦分自定遯世性所便每懷五湖志願棲一壑堅飛鳥脱籠中游魚歸故淵豈誠異時好所好各有專驅逐車馬塵何如松菊間晨起日三商夜坐月一天靜黙契神理夷猶翫簡編所務願不違至人樂已全題歐陽宜諸素風堂春風動庭草陳根坼新萌元化一以暢而我寧自縈浩浩發情志悠悠念羣生物生自有涯秉心自有貞茅茨已就治春畦復深耕蔬食聊自足萬事取不盈謫居并序余謫居揭陽官舍幽清庭有盆魚有竹石楹前橊花灼灼不絶樹間小鳥交交㺯語長至後謝病杜門益無往來終日静坐讀易誦詩月明靜夜活火焚香援琴小弄意興既極恬然而卧益從容乎樂也賦詩志之自昔悲羇旅局促亦奚為昭曠茍在懷憑運與委蛇嶺海何必惡四時有丹荑我生一甲子即事多所怡華舘絶塵氛水木澹幽姿好鳥時一鳴静藴流天機縱心八極外欽之在幾微歴覽千古書此理不吾欺被服誠無斁真賞欣自知持此以永念可用忘棲遲自非高堂戀鹿門乃在兹庚戌春月坡初成浩浩月初上一坡正受之以我無營心當此獨坐時為籌世中事無樂可代兹長林寒飇息春風藹如斯萬族各萌動我心豈不知俯視方輿静仰觀圓象馳靈襟既無際一形安足私持以畀大鈞榮悴非所思遊鴈蕩山昔我愛丘山名勝在夢想去去三十年塵事空鞅掌兹遊愜始願千里遂獨往望山屢馳騖入谷轉疑怳仰觀秋瀑飛俯聽潭流響陽崖峙雄突陰洞藏竒敞幽㝷碧澗底遐矚紫霄上春風蕩輕隂百里見開朗青丹未可圖文翰誰能髣棲心願止託回首空悵怏勝地古今存浮生俄頃賞安得結茅廬於此日偃仰湖上道人不識憂隤然罕所慮胷中有竒懷常得山水助時乘酒半醺或值寐初寤獨往恣幽㝷欣若有所遇有時深林行穿徑忽失路有時湖上還看雲忘所務凝目孤鳶歸傾耳細泉注所造趣未極原陸任昏暮非闗耽清娯曽是秉逺慕閒心始造理快意多失步嗟爾行道人迫迫焉所赴喜雨六月旱既甚雨來亦不遲即看雲漠漠已覺黍離離興劇惟需酒歡多且賦詩明朝應積水相與向東菑引泉次第竹根瀉相將得到家鳥啼春雨後流出滿山花偶成春來勝事逐時新早起風光倍可親忽見青天垂柳緑此時愛殺樹邊身馮從吾一首從吾字仲好長安人萬厯己丑進士改庶吉士授山西道御史歴官副都御史諡恭定有少墟集戊申暮春講學太華山中嘉㑹來喬嶽良朋喜共游白雲時去住野鳥亦夷猶雨霽千峰翠春深萬木稠山靈真有待吾道重千秋林堯俞十一首堯俞字咨伯莆田人萬厯巳丑進士改庶吉士除檢討累官太子太保禮部尚書諡文簡有谿堂集何穉孝云先生歴官大宗伯牴牾權閹不能久安其位歸一歲而遂卒其詩温潤典則瀏麗輕颺見若甚易而不知其磨錯之難卑不可抑高不可亢淺而有章深而不窮斯太和之元音也詩話陳文定善書嘗以南祭酒奏績之京王振致酒幣請書程子四箴文定書與之而却其幣論者韙之亡友莆田林嘉璣字衡者述其從祖文簡公亦善書法魏忠賢敦請不與忠賢矯詔命公題扁公大書畏天堂三字題曰禮部尚書某奉㫖書時忠賢出餅㗖公云出手製公以南人不慣食麪辭忠賢方銜之公遽請歸里陛見德陵謂曰長尚書乃欲歸邪賜之蟒玉以公儀表頎而長也若兩公者明哲保身淵然不可犯士大夫當以為師林子又言公五言律原出右丞誦谿堂集信衡者不我迋也三月三日棠林修禊良辰維上已選勝遵水側灌木翳繁隂原疇免登陟長川羡游鱗高雲睇歸翼羽觴催莫停陽烏漸西匿七里灘作雙笳引綵舟鳴榔下建德既經漁浦口還望定山色沿流苦奔峭入峽驚偪仄寓目恣游觀舉趾罷登陟一酹嚴陵祠清風邈難即如何謝人徒於焉解徽纆聞黔中平志喜皇風式九圍聲教暨邊鄙由來西南夷難用漢法理其居雜編氓其道羈縻耳撫馭乖所宜騷擾孰為弭黔本隸鬼方滇蜀相脣齒各自有君長號令亦齊止昨者糾諸樊西川亂無紀况乃安奢酋水藺負堅壘目覩貴陽城疊氊同折箠我軍寡且弱日夕呼庚癸相距及歲餘如肉置諸几疾聲望外援割髪而噬指幸然捄兵至背城判一死又逢賊氣惰乍合便披靡既以解重圍亦足療瘡痏雖未極兵威庶幾禠不軌斯維社稷靈人力詎至此但此全城功僉云李與史願懷往事虞勿生戰勝喜如聞老鴉闗去城僅五里出黃河纔過長淮口已見清河縣黃流昔澒洞兹焉束如箭更值凍初開盪來氷數片量水僅尺餘輕舠常患罥買酒澆龍神冀得南風便挂席就中央免入盤渦漩咫尺到黃樓役夫辭帶縴海東晩眺暮春命巾車言憇青溪涘徘徊芳樹林夕陽已在水東望窮扶桑波濤盪地紀日月互吐吞雲霞幻竒詭天呉晝不發珠母宵疑徙島嶼急樓船春疇閒耒耜鯨浪幾時平漁歌處處起夏日集高梁寺一逕隔流水沿洄到寺門瓢分香積供榻借給孤園山雨來花氣松風斷鳥言淹畱未遽返暝色下高原楓亭即事落日楓亭驛秋風荔子園人烟山外盡漁榜夜深喧地迥潮當寺僧閒月到門羣賢方䜿義吾意已忘言山行肩輿纔出郭倚杖即看山霜葉暗樵路寒花悽客顔石門通鶴柵松嶺入雲闗去去紅塵隔鳴禽時往還立秋苦積連旬雨况驚一葉秋亂雲低復合大火暗潛流商意迴蘋末笳聲到枕頭寧須感搖落不斷是邊愁送海印住華嚴寺雞足峰前寺相違知幾年山僧今易主舊路尚依然地逺黃茅瘴池分玉澗泉時來訪靈澈一榻伴雲眠送陳汝鑑大行入京是日為三月三日集棠林曲水共來修禊事及此送君行花雨林間散蘋風池上輕酒攜何次道歌借米嘉榮解作陽闗疊休賡第四聲陸彦章一首彦章初名彦璋字伯逹松江華亭人萬厯巳丑進士繇行人累官南京刑部侍郎歸次盧龍帝城東抱海山重迢逓單車出萬峯秋色長風吹白一作塞鴈歸心落日下盧龍傅新德二首新德字元明定襄人萬厯己丑進士改庶吉士除檢討歴官國子監祭酒贈禮部右侍郎諡文恪有集送郭青字參藩巴蜀殊方幾載歎離羣忽漫相逢又送君萬里江湖龍劒合一尊風雨薊門分峨岷迥出天連雪棧閣平臨馬度雲蜀相威名應不負他時消息好相聞送董兵備衡水帝城南望楚江開捧檄人看日下來萬里春光明使節千年王氣接金臺雲連湘浦雙星度天盡衡陽一鴈迴今日長沙同内地逢時翻羡洛陽材馮有經一首有經字正子錦衣衛籍慈谿人萬厯己丑進士改庶吉士授編修歴中允諭德掌司經局轉庶子後贈禮部侍郎登嘉禧寺高樓切天浮古木森在下峰峰開金碧四十二蘭若芳林擁桃李怪石帖松檟人語曠不喧啼鳥無冬夏對此懷巖耕局促何為者黃輝一首輝字昭素一字平倩南充人萬厯己丑進士改庶吉士除編修歴中允諭德庶子少詹事兼侍讀學士有怡春堂集詩話平倩盛有詩名而諸體未遒所謂似是而非者别汝鈍使者分岐路迢迢越五谿一為孤鳯唱無復冷猿啼方大鎮一首大鎮字君靜桐城人萬厯己丑進士除大名推官擢江西道御史遷大理寺丞歴左少卿有方大理集詩話少卿與鄒忠介馮恭定高忠憲顧端文諸公講學首善書院書院毁筮得同人于野遂乞休自號野同翁年七十廬母墓而終鄉人私諡曰文孝先生其歲杪聞召詩云仕途百折如浮海客邸孤蹤似出家足以占所守矣塗太僕揆宇先生滇中寄書附答白雲迢逓㸃蒼居十載闗心萬里餘枕上西風孤客夢天涯北鴈數行書黃花並憶漳河賦緑酒相從上谷車夷蹠報施無定論燕山迷望轉踟蹰陳所藴二首所藴字子有上海人萬厯己丑進士除刑部主事歴員外郎中調南文選司出為湖廣參政仕至南太僕少卿致仕有竹素堂正續集嘉善寺石壁出郭探幽竒驅車詣長薄禪林一片石絶壁聳虚壑既疑巨靈擘復類鬼斧鑿俯臨百仞崖飛度千㝷閣斗酒此盤桓與子聊斟酌人生㑹有盡奈何苦羈縛願言解徽纆負耒采靈藥得家報家園小山已成小築堪招隱新成曲水潯此時頻夢寐何日遂登臨但有風塵色空懸江海心故人相問訊應笑未抽簪徐應簧六首應簧字軒卿淳安人萬厯巳丑進士官至參政有鳯谷集逺别荒郊微雨歇一夜生秋草曉起望行塵離愁滿懷抱渺渺孤帆影迢迢萬里道回首故鄉心憑誰共顛倒人生衣食足在家貧亦好榮枯代相嬗賢聖莫能保昨日東隣花今朝淨如埽山中雜詠二首流水看不厭况兼溪上山倚闌終日坐紅葉擁柴闗欲訪南鄰居遙遙在何處隔浦見晴沙江村從此去春夜夢呉心淵文學昨夜從君歌竹枝醒來不記曲中詞徘徊獨望西泠岸正是潮平月落時晩春曉起扶笻步水涯緑楊烟裏酒旗斜春來愁殺連纎雨纔見開花又落花幽居陽翟幽居好納凉兩間草屋一株桑十年不出籬門外誰識人間杜五郎戈用泰一首用泰字來陽平湖人萬厯己丑進士授淶水知縣升南京刑部主事歴郎中有適適軒集烟雨樓平波四面八牕開盡日笙歌載酒來去矣詩人誰管領年年烟雨自樓臺樓為太守龔公勉建郝敬一首敬字仲輿京山人萬厯巳丑進士知縉雲永嘉二縣擢禮科給事中謫宜興縣丞再知江隂縣稍遷行人司副有山草堂嘯歌王百榖云仲輿詩削去雕鏤組繢獨寫性靈詩話仲輿難經伉伉詩非所擅讀春秋五霸亂王章春秋實經始邦國有遺文修緝人臣禮筆削非新義興亡沿舊史直道在人心毁譽吾何事後儒謾譸張紛紛凡例起穿鑿隻字間褒貶悉由已匹夫為素王何以懲賊子惟有孟氏言庶得遺經㫖章士雅三首士雅字循之常熟人萬厯己丑進士除嘉善知縣入為刑部主事改南工部有薄游小詠湖上曲白蓮花開秋水生蘭橈桂楫羅衣輕郎君試看花深處兩兩鴛鴦飛不去天雄道中天雄自昔推雄鎮鎖鑰於今重北門河近白溝人不渡闗連紫塞戍常屯重隂卷雪氷還合朔氣吹沙日易昏極目荒原無匹馬車輪何事促王孫暮秋經舊游有感傷心客子來還去况是重逢秋色殘落葉又從孤館聽青山不似故鄉看頻年馬足征夫老此夕雞鳴去路難猶憶驛門衰柳樹一枝曽是舊時攀朱家相一首家相字良輔侯官人萬厯己丑進士除江隂知縣調揭陽再調長興送馮南雍量移德清尹炎海憐孤憤臨溪喜量移才非黃綬吏望重白雲司桂枻渺然去春江空所思雲霄飛舄近遮莫數歸期明詩綜卷六十
