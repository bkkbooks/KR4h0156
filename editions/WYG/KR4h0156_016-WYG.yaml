body:
  text: 明詩綜巻十六翰林院檢討朱彛尊編劉仔肩三首仔肩字汝弼鄱陽人洪武初用薦應召至京静志居詩話汝弼一應鶴書旋集都人士詩為雅頌正音而以已作附之殆游大人以成名者是時許中麗仲孚則編光岳英華偶桓武盂則編乾坤清氣頼良善卿則編大雅集沈㢲士偁則編明詩選雖擇焉不精然草昧之初干戈甫戢風雅未墜於地至今得存不可謂非羣賢揚扢之力也贈張時敬還荆南隨牒適荆土倦游滯京畿謀生苦拙訥事與心恒違朋儔一疎濶山川復閒之音問曠莫逹何為遽来斯世故有變遷嵗月成推移顔藻減丹渥衣塵化為緇稍欣披雲霧復覩聫珠璣意惬苦不早情深發彌遲夕語厭促漏晨遊恐斜暉論舊已慨歎况乃重乖離春草滿南浦時花匝郊圻乖人無為懽感物悲路岐昔别已三載重来復何時幸兹書軌同逺邇無不宜逸足志四海羈禽戀故枝言念屬緐翰聊以叙所思春曉曲紫絲複帳流蘓結雲母屏風疊香雪門前嬌柳乳鴉啼暖漏丁丁曉將徹花枝入簾紅尚小蘭露著衣香不歇江南行客歸未歸芳草春風滿城闕望闕口號閶闔排雲玉一作寳殿開千官鳴珮一作鵷鷺早朝回不知誰獻升平一作王襃頌得奉君王萬夀杯陳謨二首謨字一徳號心吾泰和人明初聘脩禮書辭歸有海桑集劉子髙云先生鉅篇大軸流播郡邑幅巾野服翱翔山水之間門生兒子扶携後先使人望而敬之狎而愛之可羅子理云先生詩文出入古今變化不測詩話徴君大徳遺民雖應弓招未縻好爵楊東里梁不移皆其弟子洪武庚戌曾校文廣東則孫仲衍乃其所取士矣又嘗主奉新清節書院講席其没也蘓平仲輓以詩云道徳宗前代詩書啟後人胡光大詩云文章漢􅂜鼎聲價魯璠璵楊詩云純明程伯子灑落邵堯夫染詩云立志希濓洛研精續考亭諸公推許若是其論詩云稱詩者曰寂寥乎短章舂容乎大篇短章貴清夐纒綿涵思深逺造其極者陶韋是也大篇貴汪洋閎肆開闔變化不激不蔓超乎人者李杜是也韓退之蘓子瞻二公雄渾傑特非絺章繪句之比此詩之至也知言哉游天慶觀登衆妙堂堂有𤣥元像竒古而蘓公小大二碑及居士泉皆廢葢戍卒居之琳宫宅兜年䙝汙衆妙門試窺擣衣砧上有睂山文上堂羅兒婦下堂飼雞豚塑像古且竒稽首𤣥元君端居燕穆清誰使居人羣亦有居士泉澄源為之昏那無一寸膠可洗千丈渾聞道聞道潼闗下黄流似海深由来天設險過者日傷心漢殿芝房冷唐陵玉甃沉不應有佳氣鬱鬱尚如今金信三首信字中孚金華人以茂才舉不就隠居自怡人稱漫吟先生有春草軒集詩話中孚為鐵厓入室弟子嘗序其詩云金華金信從予游於松陵澤中談經㫁史於古歌詩尤工如古琴操趙壁辭荆卿篇博浪椎月支王頭飲器歌其氣充其情激其辭鬱以諧吁信之詩有法矣今鐵厓所稱諸篇皆不可得見惜也阮元聲金華詩粹謂仲孚於明初召入中書省進講經史以實録考之葢至正戊戌年事洞庭曲浩蕩太湖水東西兩洞庭吹簫明月裏龍女坐来聽湖上望蘓臺水與青天逺長風送飛帆忽到長洲縣太陽嶺淨刹菴林緑生晝寒蕭然水晶域今日復重来青苔見行迹雲生身上衣月照松下石坐久聞疎鐘空山未眠夕邾經三首經字仲誼仁和人元進士有玩齋稿詩話仲誼元之舊臣沐景顒編滄海遺珠以其詩壓巻葢明初徙滇者也春陪吕志學曾彦魯劉仲原同登虎丘賦呈居中長老虎丘山前新築城虎丘寺裏斷人行梵僧自識灰千劫蜀魄時飄淚一聲漸少松杉圍窣堵無多桃李過清明向来游事誇全盛曾對春風詠太平詩話虎丘詩集一巻王髙士賔所録吾鄉項氏萬巻樓藏書也中載仲誼是詩同時和者吕敏志學云山上樓䑓山下城朱旗夹道少人行曾朴彦魯云闔閭冢上見新城無復行人載酒行僧寜居中云公餘聨騎入山城老衲追陪得㪚行又周南老正道有至正丁酉冬督役城虎丘詩八首一云奉檄趨功城虎丘一云四疊新城遶澗隈一云百萬城春落杵齊虎丘築城吳人亦鮮有知者予嘗泊舟山後見遺址尚存題映雪圗夜雪明書几寒風入縕袍如何燒鳳蠟只解醉羊羔絡緯圖牽牛風露滿籬根淡月踈星夜未分燈下有人挑錦字機絲零亂不成文郭文一首文字仲炳號舟屋滇中詩人楊用修云滇中詩人永樂間稱平居陳郭郭名文號舟屋其詩有唐風三子逺不及也其登碧雞山太華寺一聨云湖勢欲浮雙塔去山形如擁五華来一時閣筆信佳句也但全篇未稱耳詩話舟屋竹枝詞顧仲瑛編入玉山雅集則是詩元季已流播矣用修稱是永樂間人其集既不可得無由臆決偶閲柯暹東崗集附録滇南别意詩則平居陳郭四人之作皆存焉平名宣武林人居名廣海昌人陳名謙吳人東崗䟦云郭居皆武士中賢者郭善詩文征南将軍都督沐繼軒璘師之居精吏事總府辟掌簿書數十年得官陳官鎮撫有詩名宣則松雨先生子也黔府西塾薦升廣南府通判所云松雨先生者知藤縣事顕字仲微考東崗引疾去滇在景泰二年七月别意詩即是年之作郭於元時撰竹枝入明八十四年未必尚存用修雖稱見其全集竊疑竹枝非集中詩玉山雅集所載當别是一人也竹枝詞金馬何曾半歩行碧雞那解五更鳴儂家夫婿乆離别恰似兩山空得名吕誠二首誠字敬之崑山人閠月二十四日陪館士秦文仲陸良貴奉省臣命祭劉龍洲先生墓黄鵠磯頭風雨秋中原一望使人愁羣臣誰決和戎議九廟猶銜誤國羞慨慷魯連寜入海淒涼王粲重登樓荒崗四尺先生墓再拜酹之雙玉舟感興静室無塵少客過新篁隂曳小坡陀朝来始悟春歸盡風裏楊花似雨多鄭昂四首昂字處抑温州平陽人有密菴集閠八月歸故山負郭曾無二頃田何由辦得買山錢秋風八月又八月客路一年還一年鸞鳯俱垂赤霄翅麒麟不受黄金鞭功名富貴真細事只問平生不問天棲遲棲遲久慕王官谷飄泊仍依謝客巖貧賤誰能從趙孟行藏我已卜巫咸冥鴻豈解投矰弋老馬惟思脫轡銜却笑杜陵生計拙晚將身世託長鑱感懐王粲淒涼仍去國杜陵老大竟飄蓬荆州豈免依劉表蜀道終須謁鄭公三禮賦成追昔日七哀歌罷起秋風青青亦有江南草鸚鵡洲邊恨不窮小景水驛山橋四五里楓林茅屋兩三家何人踏雪尋僧去潮退春船閣暮沙范再一首再字續卿休寜人有緝齋耕隐稾乙卯冬自陕回至中年夜與牛車同行故題驛亭我經中牟道夜竝牛車行何人問牛喘鞭撻勢伶仃更罹軛下苦犢兒隨母鳴車夫為我言吾家懐慶城来此數百里執役難具名流囚與軍裝日夜不少停黄昏伴牛卧飯牛到天明漢月皎千里風霜淒十程牛死急應官欲哭還吞聲白刃尚可蹈蒼天終無情吾家有老父日暮還力耕無糧可充飢無衣可蔽形行人聞此言泣下如雨傾我亦征塗間垂老重飄零何時息干戈時康歌太平沙可學一首可學永嘉人元進士行省掾詩話楊亷夫有送沙可學序其畧云某官来總行省事求從事掾之賢能者首得一人焉曰沙可學氏又得一人焉曰髙則誠氏又得一人焉曰葛元哲氏三人者用而浙稱治三人者天府登其賢書大廷榮其髙等而拜進士出身賜任州理佐理之職者也可學僅存詠懐詩葢憶庚申君北狩而作首句指賈魯挑河言也詠懐疏鑿功成王氣衰九重端拱尚無為貪夫柄國忠良没巨敵臨郊社稷危萬里朔雲沙漠漠六宫禁御草離離金輿玉輅無消息腸斷西風白鴈飛游莊一首莊字子敬所聞有感塵飛鹿走力難任廵幸沙邊悔恨深鳥篆未經銜軹道龍文先自徙汾隂空傳行在淪孤憤無復寰區遏八音聖徳神功俱泯滅英雄千載一沾襟詩話此詩葢聞庚申君之訃而作也是嵗庚戌北元人諡曰恵宗其子嗣立於應昌改元宣光頒示髙麗髙䴡不奉詔故云無復寰區遏八音既而北元主走和林没諡昭宗見鄭麟趾髙麗史王旬一首旬字子宣詩話髙季廸以詩得妻王子宣亦以詩得妻子宣宫詞諸家多誤作王叔明詩謂仁和俞友仁見此詩歎賞曰唐人得意句也遂以其妹妻之考凌彦翀柘軒集有悼王叔明室張氏詩云結髪為夫婦齊睂若主賔山同黄鶴隱書逼彩鸞真蘭樹人皆羨蘋蘩爾獨親情傷坦腹者臨穴重沾巾則叔明娶於張非俞也故定以為子宣作宫詞南風吹斷采蓮歌夜雨新添太液波水殿雲廊三十六不知何處月明多髙廷禮云婉麗絶似王龍標李時逺云盛唐音響所謂千首不為多一首不為少也陳卧子云亦杜牧李益耳何遽盛唐然景調俱佳嚴蓀友云子宣宫詞不可謂不工矣然不若薩天錫之入妙也薩詩云清夜宫車出上央紫衣小隊兩三行石闌干外銀燈過照見芙蓉葉上霜李鐸一首鐸字振道隴西人詩話吳人徐逹左良夫司訓建寜游乎武夷寫九曲欋歌圖書昔賢吟詠於前自紀其後復屬同人題句巻後題者隴西李鐸臨川劉亷浚儀趙友士西甌馮回括蒼張思齊鉅鹿林熈樵川蕭子和龍伯章隴右李裕三山周闕甌寕葉俊人建安楊恭葉季原蘇垶葉銘葉勝李佑龍虎山梁鵠凡一十八人續題者良夫兄子徐濟及青城王璲也良夫居太湖之濵光福市闢耕漁軒以延名士集其詩文為金蘭集其好事亞於顧仲瑛云題徐良夫九曲櫂歌圗徐君江海人雅有山林想逺遊賦幽尋徘徊脫征鞅長揖虹橋仙飄飄欲偕往牽舟泝岸廻著屐緣厓上萬壑風泉渟層巖土化長采鸞載玉笙隠隠遺清響幻迹杳難窮真源豁而敞永懐紫陽翁欣然契心賞馮回一首回字景淵福寕州人武夷大王峯亭亭大王峯壁立何嶢屼昔聞武夷君於兹脫真骨鳳駕杳不還虹橋忽焉没惟餘巖際松年年挂秋月葉俊一首俊福寜州人武夷武夷山下萬年宫九曲溪頭一棹通流水落花尋古道平林過雨見羣峰幔亭人去雲連壑華表仙歸月滿松正好相期問丹訣天風午夜客船東汪徳懋一首徳懋名天應以字行休寜人環谷東山弟子和商山書院諸公韻覆雨翻雲已十春恨無詩酒對芳辰秦疆再世終歸漢周弱何人共戍申邊境旋聞烽火息南風喜見稲花新為霖更得成豐嵗願作陶唐擊壤民田子貞一首子貞寜波人題安分軒圖一室蕭然萬慮忘幽棲真似斛斯莊春晴野澗多藜藿秋晚山田足稲粱待富却慚居易拙送窮應笑退之狂看君已在羲皇上老去從教白髪長趙次誠一首次誠字學之樂清人有雪溪集早梅江南冬十二月溪上梅三兩花載取小舟香影月明獨櫂回家杜伸之一首伸之温州人感興吾昔搓長絲繫彼渭川竹直鈎魚不吞何以充吾腹此心苟無嗜藜藿亦自足寜使不得魚吾鈎終不曲李應期一首應期字均饒瑞安人有菌翁集寄吳彦升積雨連朝過客稀亂紅墮地緑隂肥江南祗是歸耕好水遶孤村燕子飛范宗暉二首宗暉以字行寜波人詩話范君詩載滄海遺珠亦徙於滇者古意積雨可沉舟羣輕能折軸巧言必譸張利口多翻覆茍不塞其源涓流蔽川谷稂莠終亂苖珉瑜頗相類君子與小人顔面亦不異辨之如不早斯為名徳累李道生一首道生字本立休寜人有清意味集雨後山中曉起喜新晴杖屨尋詩獨自行幾樹好花春盡發隔溪流水夜来生游絲拂地應千尺啼鳥喚人時一聲趁暖田家曝蠶種明朝節候是清明劉逢原一首逢原字資深㑹稽人挽鐵厓先生已矣楊夫子春秋天下名醉生唐李白莭死晉淵明雲暗九山碧水洄三泖清游魂招不返悽惻故鄉情周翼二首翼字子羽無錫人中秋與楊氏昆季泛舟鵝津八月十五夜何其鵝湖漾舟人未歸水生金浪兼天涌雲度青冥傍月飛鴻鴈沙寒微有影芰荷秋冷不成衣故人一去渺何許黄鶴舊磯今是非鴈来紅翔鴈南来塞草秋未霜紅葉已先抽緑珠宴罷歸金谷七尺珊瑚夜不収王中五首中字懋建黄俞邰云洪武辛亥進士有沁水王中甲戌有同安王中未知即其人否要不敢以臆定也中秋述懐潦倒羈棲客傷心兩鬢華塗窮惟有涙世亂更無家暗雨聞寒鴈悲風急暮笳艱難今一槩何處問生涯天下兵長鬭山中客未歸塞鴻南度早星使北来稀草草年光換悠悠世態非自憐同社燕幾處傍人飛黄家洲客舎留别數載俱流落相逢鬢已秋生涯同寂寞書劒祗淹留沙濶隨天盡江平帶日流别離殊不惬回首思悠悠田家雜興煙火中林静秋風嵗律賖清霜催橘柚落日照蒹葭石經通流水山橋卧古槎武陵非境外不必問桃花泊鏡口日暮風濤穏扁舟泊此隅雲山歸夢杳鄰舫語音殊片月寒江永平沙旅鴈孤無才合漂泊不敢恨窮塗陳安二首安字克盟中秋有感畫省曾陪冠葢游華筵詩酒宴中秋星河不動天如水風露無聲月滿樓皓齒纖腰催象板珠簾涼影上銀鈎於今寂寞江城暮烏㡌西風歎白頭題髙理瞻所藏小景圖昔年為客楚江邊雨霽江南二月天楊柳畫橋深淺水桃花春岸往来船新篘白酒浮杯釅旋買青魚出網鮮因見畫圗驚舊夢東風吹面鬢蕭然錢子義一首子義無錫人題畫夕陽淡淡雨絲絲逺浦長天欲暝時腸斷楚山春雨後鷓鴣啼向女郎祠梁蘭七首蘭字庭秀一字不移泰和人贊善潛之父有畦樂先生集王希範云先生飬髙丘園攄悠逺之思著為詩歌曠然有古髙士之節王逹善云畦樂先生之詩出於自然黙契靖節於千載之上胡若思云誦先生詩蕭㪚閒淡之趣悠然於篇詠之間雅鄒熙仲云梁君隠居樂道其詩冲澹閒有自得之致西畦自適守拙一圃閒衡從五畞餘藝麻在髙丘雜以果與蔬春至百草生趂晴聊荷鉏筋力豈不勞蕪穢亦以除家人㑹知我慰以酒滿壺偶坐斟酌之日落西山隅歸来北窗下我心一事無留别楊分昭君還既不久我行復有期憶昨君未歸日久徒憂思忽聞車馬来僮僕走相隨入門一㑹面酌我金屈卮人生最歡樂莫若新相知歡樂苦不長明當與子辭大夫且行役敝車日驅馳吾徒本貧賤奔走何足悲但恐後来時君将復何之題素扇團圓復團圓月圓尚有虧致身君懐袖無有盈虧時知君重貞素采色亦不施物微幸相親願言常自持寒暑固代謝用舎適其宜古来婕妤怨此意君諒知荆湘道中江入瀟湘近山連楚塞髙兩厓如積鐵一水不容舠慣客寜辭逺藏身豈憚勞同門多宦逺漂泊媿吾曹寄劉珪春日已多夏日臨軥輈晝啼苦竹深野棠雨餘新水緑石壁樹杪浮雲隂安知天地有終極不覺嵗月還相侵我思劉郎何可見徒使遲廻勞寸心寄呈東原公劉子彦北闕前年一上書歸来髙卧楚郊墟西風短褐雙蓬鬢落日空山一草廬道直不殊梁太傅賦成端擬漢相如别来又是春三月盡日逢人問起居客舎秋雨燈前細雨夜初䦨枕上聞雞夢轉難壯節豈因今日改旅懐纔向故人寛江天雨色連窗白草樹風聲入室寒景物已殊歸計逺殘年飽飯共相看陳絅一首絅字簡文嘉興人布政約弟題畫五湖煙水渌生波一葉扁舟鼓枻歌愁殺故園戎馬後千章喬木已無多陳緝三首緝字熈文絅弟沈客子云四陳之中熙文詩秀舊可誦直逼晚唐和大兄八月十四夜月桂老金為粟蟾孤玉作團明朝應更好此夜不勝寒弟妹他鄉共闗山幾處看南飛有烏鵲未得一枝安春日湖頭誰復載吳娃鷗鳥多情戀白沙涪萬春深無杜宇武陵何處有桃花雨餘石燕晴歸穴市近山􅑣午報衙看到前朝丞相墓野人翻土種桑麻竹枝贈君曾出雙南金别君曾彈紫綺琴斷金還比阿儂意斷絃持比阿郎心鄭瀱一首瀱字仲飬浦江人詩話浦陽義門有三其一黄氏自度至逢吉其一王氏自茇至子覺皆止數世而已惟麟溪鄭氏族大且久先世自滎陽徙歙再徙睦州其居麟溪自淮始淮之孫綺乾道中賜號冲素處士朝請郎新淦晏穆志其墓是為義門第一世綺之子聞聞之子運運之子政政之子徳璋徳璋之子文融文融嗣子欽仲養葢欽之叔子也凡十三世一千六百六十餘年逮元季明初門才益盛曰深曰濓曰源曰濤曰泳曰渙曰淵曰湜曰濟曰洧曰濟曰淏曰沂出處不齊先後以才行著一門羣從又有櫄梴杕枋材彬榦楷模桐柎棠機柏栻木皆為士林所重於是公卿大夫先後詩文貽贈者編為麟溪集二十二巻洵盛事矣嗟乎江湖日下耰鋤徳色箕帚踞罵其不為秦人之續者幾希録義門子姓詩為之三嘆海棠仕女圖東風蕩漾百花潭翠袖迎風酒半酣好鳥隔窗催曉色美人殘夢到江南金敬徳一首敬徳樂清人鄭宜州蘆花淺水亭新築茅亭也自幽䦨干曲曲面滄洲一簾花氣都成雪片石潮㾗祗没鷗客醉有時迷夜泊月明無處覔漁舟老夫亦有滄浪趣便欲移家住上頭吳子莊一首子莊温州平陽人小景杖藜日日看芝山山下浮雲共往還昨夜小溪新水漲釣船流到寺前灣黎昶一首昶字伯輝清江人同安謡黄雲漲空雪欲飄長江落日生暮潮同安城頭獨延佇悲風拂鬢寒蕭蕭布蓬老翁年七十鶴髪鶉衣道傍立倚笻為我説興亡含憤未言先涕泣前朝值亂戍守奔土豪割據何紛紛攻城拜將争殺戮同安頼有余将軍将軍秉心盡忠義訓練民兵久精鋭城邊掘壕深百丈城上嚴更列旗幟朝廷消息乆莫通江襄羣盜矜豪雄樓船萬甲氣如虎戎衣染遍秋江紅將軍此時力匡國執鋭開闗屢迎敵鐵騎交馳白日昏雕戈上指青天拆樅陽門前殺氣髙奮身寜辭征戰勞江淮黎庻半為鬼僵死卧骨填空壕同安拒守經七嵗破圍不見官軍至銅柱難成馬援功睢陽不屈張廵志一朝羣盜登城闉揚鞭百里飛紅塵疲兵裹割不能戰計窮豈願圖全身將軍挺身出帥幕竟逐飛星陣前落半夜精靈出戰營千秋廟食依江郭聖人一出寰宇寜鳳麟應瑞黄河清當年逃亡命如蟻豈期年老逢昇平荆棘連雲戰争地近来茅屋方成市山鳥如呼耆舊名江流尚帶英雄涙當年繁華何足論聞翁此語傷吟魂樓臺盡隨灰燼滅人物風流今幸存尊前感慨應未已宦情總付東流水長歌因賦同安謡留與他年入詩史梁闗一首闗字用行㑹稽人哀余左丞世人孰不死死義心所安茍非明至理捐軀誠獨難偉哉青陽公忠義為肝膽伊昔奉朝命宣慰淮西藩遭世方板蕩荆襄肆兇殘公時在安慶寜忍視民患率衆力拒敵奮怒髪衝冠抗節守孤城援絶糧饋殫勢廹不獲已慷慨就清瀾妻孥亦同逝恥受汚辱干我昨聞其風嘅然發長嘆丈夫有如此何媿天地間逺繼張許流千載名不刋王珙一首珙字廷珪常熟人明初處士有竹居詩集王汝嘉云竹居道者詩無雕琢浮靡之習有渾厚淳雅之氣張宗海云處士治生富贍構幽居於深竹之中詠歌其情思詩皆和平之語治世之音人徐以恭云先生詩富麗清竒如秋月春雲起景仰萬李世賢云王君卜宅於虞山北之蕭溪植竹竿容與其中興之所寄輒形吟詠其詩和平典雅質不近於俚淡不流於枯詩話竹居治生之餘不廢吟詠華㓜武一流也詩嫌太熟溪橋晩歩日日隂雲思寂寥偶因新霽過溪橋不知門巷春多少柳外一聲婆餅焦陳川一首川天台人題夏圭溪山清逺圖我家東南丘壑好曲折雲林䕶危杪澗沙流水春自香石楠碎葉秋如埽縳柴野橋松雨涼鳴鐘破寺茶煙杳山椒茅亭如笠大石脚魚舟似瓢小人家制度太古前雞犬比鄰往還少酒杯吹香小店門落日漁樵多醉倒六年不歸長夢見白髪忘情負魚鳥晴窗見畫三摩挲舊夢微茫今了了不知何處得此圖覺我山居殊草草安得溪南寫石田更携妻子從兹老陳汝楫一首汝楫字濟明蒲圻人洪武初舉明經授徽州府通判轉泰州茶馬司謫知渭南縣遷廣平知府桃花泉桃花流水合荆溪夜雨春波拍斷隄偶爾今朝出門望平疇雉雊麥初齊李𢎞一首𢎞字徳庸蒲圻人洪武十九年授本縣訓導遷國子助教西良湖蕩舟歸去月黄昏湖上人家半掩門漁笛數聲何處起冷香一樹玉梅根王叔舟一首叔舟浮梁人洪武中以獻雪詩授徽州同知三月三日雪應制柳絮飛還早梅花落太遲天顔多喜色瑞氣滿瑶池明詩綜巻十六
