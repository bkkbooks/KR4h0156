body:
  text: 明詩綜卷八十九翰林院檢討朱彞尊編梵𤦺三十首梵𤦺字楚石小字曇曜象山人居海鹽天寧寺明初徴至京建法㑹賜座第一有北游鳳山西齋三集静志居詩話楚石僧中龍象筆有慧刃淨土詩累百可以無譏和寒山拾得豐干韻亦屬游戲讀其北游一集風土物候畢冩無遺志在新竒初無定則假令唐代緇流見之猶當瞠乎退舍矧癩可瘦權輩乎愚菴智及輓章云麻鞵直上黄金殿鐵錫時敲白下門誦之足以豪矣當日孝陵所賜袈裟及鉢至今尚存海鹽天寧寺中即上人所築西齋也擬陶新蟬何處來鳴我髙槐隂流水欲入屋好風自開襟牀頭一束書壁上三尺琴琴以散哀樂書以通古今所幸車馬稀非邀里人欽虚名如北斗有酒不能斟縱洗爰居耳寧知鐘鼔音西津月滿潮來盛天空野望低樹侵吳甸北帆入楚江西俊鶻秋方下慈烏曉更啼即看霜露及風景已凄凄贈江南故人煑茗羮羊酪看山駐馬檛地椒真小草芭欖有竒花塞月宵沉海邊風晝起沙登髙望吳越極目是雲霞上都四首突厥逢唐盛完顔與宋鄰君王饒戰畧公主再和親異域車書㑹中天雨露均皇朝真一統御厯正三辰塞外疑無地人間别有天宫墻倚樹直御榻愛花偏正想爐熏滿遥知漏㸃傳輪臺方奉詔版築更求賢夜斗低垂地秋河近著城有灰開月暈無扇減風聲角奏梅花早杯傳竹葉清尚衣綿欲折髙殿雪初晴萬國初無外諸羌更在西閤門朝見雪亭障晚開鞞天子黄龍府將軍白馬氐錦袍凉似水銀甕醉如泥開平書事六首射虎南山下看羊北海邉築城侵地斷居室與天連墨黒沾衣雨沙黄種黍田自從為帝里無復少人烟地勢斜臨北河流穩向東龍庭行萬里虎路遶三嵕羌女裁皮服奚兒挽角弓長吟對落景獨坐感飛蓬舊俗便弓馬新霜稱綺羅平原芳草歇古戍暮雲多翠䄂調鸚鵡金鞭制駱駝上樓看月得無酒奈君何北海何人到西天此路通㝷經舍衛國避暑醴泉宫盛夏不揮扇平時常起風遥瞻仙仗簇復有綵雲籠夜雪沙陀部春風勅勒川生涯惟釀黍樂事在彈弦不用臨城將何須負郭田雙鵰來海外一箭落天邉孤城横落日一望暗銷魂天大纎雲卷風多積草翻有田稀種粟無樹强名村土屋難安寢飛沙夜撃門漠北懐古十首世祖起沙漠臨軒銷甲兵羌中一片地秦後幾長城象膽隨時轉駝蹄入夜明何湏待秋獵不必問春耕曠野多遺骨前朝數用兵烽連都䕶府柵遶可敦城健鶻雲間落妖狐塞下鳴却因班定逺牽動故鄉情北向無城郭遥遥接大荒舊來聞漢土前去是河隍野蒜根含水沙蔥葉負霜何人鳴觱篥使我涕霑裳無樹可黄落有臺如白登三冬掘野䑕萬騎上河冰土厚不為井民淳猶結繩令人思太古極目眇平陵吾聞窮髪北此地即天涯夏有九河凍春無三月花清凉非枕簟富貴是雲沙愛爾捐居室長年到處家曠望重闗外蕭條萬里餘未嘗營粒食終不好樓居謬甚英雄事茫然草昧初大人饒畜牧隨分有穹廬漢使騎髙馬唐兵出近闗前臨蒲類海却上浚稽山帝號垂千古軍聲盖百蠻初無功可紀只有劒須殷每厭冰霜苦長㝷水草居控弦隨地獵刳木近河漁馬酒茶相似駝裘錦不如健兒雙眼碧慣讀左行書北入窮荒野人如曠古時天山新有作耶律晚能詩地坼河流大峰髙月上遲自言羊可種不信繭成絲逺客停驂處平沙落日時塞蓬穿土早河柳得春遲欲乳羊求母頻嘶馬顧兒朔方多雨雪南望是京師烏桓烏桓第一州白雲亂三秋不盡邉雲起無情塞水流兔銛䝉氏筆狐潔檜君裘自笑成癡坐何期作逺遊黒谷北去終無極南還未有期猶嫌江路逺不與土風宜晚翠看盧橘春香憶楚葵兹山吾可老飲水噉棠梨當山即事水草頻移徙烹庖稱有無肉多惟飼犬人少只防狐白毳千縑㲲清尊一味酥豪家足羊馬不羨水田租曉過西湖船上見月如可呼愛之且復留斯須青山倒影水連郭白藕作花香滿湖仙林寺逺鐘巳動靈隱墖髙燈欲無西風吹人不得寐坐聼魚蟹翻菰蒲贈王使君君持使節過繩橋已遣蠻方感聖朝良將未誇班定逺大臣猶數盖寛饒川香野馬銜青草雪暗天鵝避皁鵰西出陽闗九千里歸來莫惜鬢蕭蕭燕京二首髙昌王子出京師手把春風軟柳枝贈與臨洮逺行客雲沙漠漠見何時西山水落甕山浮無數人煙簇上頭好種荷花三十頃中間更著采蓮舟宗泐三十七首宗泐字季潭臨海人洪武初舉髙行沙門居首命住天界寺㝷往西域求遺經還授左善世有全室集徐大章云季潭學博才瓌詩不淪於枯寂在江湖則其言蕭散悠逺適行住坐卧之情在山林則其言幽夐簡澹得風泉雲月之趣在殊方異域則其言慨而不激直而不肆極山川之險易風俗之媺惡其詩衆體具矣揚朱伯賢云泐公識地髙邁調趣清古風度悠昂然若霜晨老鶴聲聞九皋澹乎苦清廟朱絃曲終三歎王達善云潭公詩章渾涵汪洋千彚萬狀而一以理為主來顧𤣥言云泐公博逺古雅詩從陶韋乗中當代𢎞秀之宗也詩話洪武十四年六月開設僧録司掌天下釋教事曰善世曰闡教曰講經曰覺義左右各一員府設僧綱司都綱有副州設僧正司僧正縣設僧㑹司僧㑹明年四月以戒資為左善世宗泐為右善世智輝為左闡教仲羲為右闡教玘太朴為左講經守仁為右講經來復為左覺義宗鬯為右覺義先是九年春孝陵幸天界泐公住持斯寺賞其識儒書知禮義命畜髭髮髪長數寸矣欲授以官固辭帝親作免官説時宋學士景濓好佛帝目為宋和尚泐公好儒帝呼以泐秀才嘗奉詔製讚佛樂章帝嘉歎賜和平日所作詩晚奉㫖佚老歸鳯陽之槎峰帝降書曰寂寞觀明月逍遥對白雲汝其往哉其後僧智聰坐胡惟庸黨詞連泐及來復謂泐西域取經惟庸令說土畨舉兵為外應有司奏當大辟詔免死孝陵御頒清教録僧徒坐胡黨者六十四人咸服上刑惟泐得宥盖受主知者深矣止菴讀其西游集賦詩云一字一寸珠一言一尺玉其推重若此雜詩三首我自來涇川星嵗已再周託兹山水勝謂可成遲留奈何物外牽撫事心悠悠久知世道惡奚事仍夷猶璚林有竒鶴未嘗識羅罦翩然覔靈鳳接翅崑崙丘夜乆無與適塊然坐空堂白鳥一何多營營來我傍静言聊假寐遂以襲單裳噆膚猶可忍聒耳諒難當晨星耀東廡明月墮西廂念爾能幾何滅跡於朝陽落葉委通衢紛然無人掃但覩新行迹不見舊時道古木倚道旁亂藤絡其杪嵗暮雖青青終非本容好世人懐往途悟此苦不早振衣無後期來從漢隂老送裕上人歸天台我家赤城東不識華頂嶠逺道送君歸昨夜夢中到崖泓有泉瓢竹室留茶竈珍重山中人拂衣願同調冬夜憶清逺道初二兄夜深霜氣寒窗月皎如燭鳴鴻尚遐征孤鶴亦驚宿念我平生親悵焉􅏒心曲四明是何處苕溪如在目異方詎能通逺道何由縮十年無一字嗣音如金玉白髪漸欺人晤言安可卜辛亥新嵗程處士見過常熟别墅臨别賦詩獻嵗春未迴風雨連十日荒村少朋驩窮巷絶人跡程君汎扁舟茅齋破幽寂逺來見真情疑言忘永夕顧惟艱難際出處各有役世紛日相纒誰能念疇昔因君尚道誼臨别増太息獨棹去茫茫空瞻海虞碧暮過賞溪日暮衆鳥歸孤雲亦還山市人爭渡息小舟沙際閒我屋西峰下半出青林間鐘聲􅏒深念無為尚塵寰答夏景瞻昔居賞溪曲訹迫靡所侵衲衣挂石壁燕坐長松隂子來慰幽寂語念相知深孤雲十年别明月千里心而我亦何事投迹此禪林向來結茅地回首空青岑寧知江海逺遇子復在今百挫志矯矯猶能發狂吟清辭入古調一鼓熏風琴吁嗟衆響作過耳無留音出峽圖瞿塘水如馬五月不可下兩舟何處來披圖一驚詫前行稍趍平勢若閒暇者後來方履險衆篙不停把巖迴古木披峽束哀湍瀉嗟爾駕舟人安危在操舍雨花臺送客梁日雨花臺近在城南陌不見講經人空林澹秋色登髙俯大江目送千里客白鳥下滄波孤帆逺山碧焦山寺鑑師臨江軒一峰如鉅石屹立江水中寳刹蔚崇構勢與山爭雄若人於此住超然塵外蹤開軒當水面下瞰馮夷宫魚龍近几席波濤蕩􅁭胷有時天宇淨倒影清若空燕坐觀衆有起滅殊無窮一念寂不動嗒焉心境融焦先邈千載遺丹射林紅浩歌倚䦨夕明月生海東送瑄上人揚舲下大江江寒欲飛雪髙帆天際遥獨鴈雲邉沒煙波渺何之倐忽成楚越遂令白首人年華感消歇不覊行贈吳客倜儻不偶世落魄江海游雖來京國乆不謁公與侯仙人五城髙彩雲十二樓天街看明月一身風露秋翩然下揚子棹歌發吳謳太湖三萬頃鳬鴈中沉浮且作拍浪兒赤脚坐船頭笑指闔閭墓千古成荒丘墨竹行平生不識雲心子墨妙通神有如此眼中何處修竹林湘水邉頭煙雨裏長林蔽虧天為隂鷓鴣啼斷江沉沉六月南風晝不熱人家住在叢篁深九疑山帶蒼梧野翩翩帝子雲中下鳳鸞飛舞虯龍驤羽葆􅆴㲖翠堪把我昔曽行賞溪曲兩岸波光漾寒緑萬玉森森一徑遥溪口清隂到山麓今朝看圖政自憐畫圖身世俱茫然雲心骨化丹陽土吁嗟墨妙何人傳短歌寄魏仲逺夏盖湖吞上虞浦魏君家在湖邉住岸花磴草幾春秋白鳥滄波自朝暮知君愛客仍好竒畫船載酒如渼陂櫂歌中流日將夕璧月湧出青琉璃嗟哉隱居端有道世上無如閒處好王充遺蹟尚可㝷賀老風流良不少去年聼詔來京國識君臉紅頭半白别懐空與水東流海燕江鴻斷消息今朝聞有東州船尺書欲寄心茫然福源精舎地最偏安得與君湖上相周旋賦一曲亭送趙本初待制致仕歸越鑑湖一曲亭猶在風物千年長不改賀公去後趙公來山水無情若相待當時季真得賜歸黄冠未必全忘機爭佀今朝玉堂老還鄉仍著宫錦衣鑑湖水闊吞平野酒船直到亭堦下荷華晚日照尊罍楊栁春風拂簷瓦題天童萬松圖小白市太白峰二十里松居其中一徑隂隂翠羽盖半空矗矗蒼髯龍太白之峰分九隴壯哉千古之佛宫香雲不動梵唄合樓閣倒影清池空左菴昔年此說法山谷答響撞鉅鐘只今九重城裏住夢魂夜夜鄞江東錢塘有客曰王䝉為君寫此千萬松座間慘慘起隂霧屋底䬃䬃生清風何來禪子松下度長衫大笠攜一笻亦有緇徒三四公青林路口衣裳紅我初展卷欲大呌海上湧出髙巃嵸雲端縹緲下玉童有路似與天相通自憐平生不一到吁嗟老矣將焉從還君此圖袖手坐有目只送南飛鴻聼泉軒為藏無盡作若人有耳唯聼泉泉聲入耳長涓涓穿林出澗度妙曲萬古不斷冰絲弦此聲不來耳不往中自寂然遺外響青燈照壁夜沉沉獨倚軒窗月東上送瀾法師歸雲門故山從此去何日更相逢獨倚千峰閣閒聼六寺鐘石牀流水繞蘿逕落花封㑹有東歸興來㝷雲外蹤故涇縣徐典史挽歌白髪神仙吏黄塵八十齡竟同華表鶴俄失老人星甕盡牀頭酒埃生案上經今朝來哭處墓草未全青與徐伯亷再往南陵又向南陵去復攜良友同人煙千嶂裏客路百花中雉雊初晴日鸎啼滿樹風漸知精舍近清磬出林東登多景樓水際一峰出飛樓倚泬寥煙雲連北土風物見南朝山勢臨淮盡江聲入海消偶來閒眺客憑檻興偏饒送王叔潤平涼來又去官滿復之宫塞晚黄雲合邊秋白草寒有儲諸將喜無訟逺人安萬里闗山月吟詩獨自看登相國寺樓冬日大梁城郊原四望平雲開太行碧霜落蔡河清欲問征西路兼懐弔古情夷門名尚在無處覔侯嬴發扶風曉發扶風縣雲低欲雪時長河王莽寺獨樹馬超祠營窟炊煙早牛車度坡遲非熊無復夢渭水自逶迤過鳳翔驅車過鳳翔驛路入汧陽地接戎羌逺山連蜀隴長平岡秋樹緑重谷晚風凉明日關山道登髙望帝鄉到河州自發烏思國於今數月過雪中臨黒水冰上渡黄河裘覺青貂敝經煩白馬䭾玉闗生得入定逺喜偏多和徐大章登南天竺山樓韻徐君為愛南竺幽登此塢口之飛樓鄉山數㸃海東際客路十年湖上頭澗泉翛翛落静夜風葉淅淅吹髙秋便當倚檻和新作為報主人須少留錢塘懐古欲識錢塘王氣徂紫宸宫殿入青蕪朔方鐵騎飛天塹師相樓船宿裏湖白鴈不知南國破青山還傍海門孤百年又見城池改多少英雄屈壯圖偶作一首新作方池水未平晚晴獨自繞池行好花都向雨中盡幽鳥忽來林外鳴科斗黒時初種藕鴨頭緑處欲生萍匡山舊業閒料理更結茅亭此計成偶作次王以中韻拄笏髙人塘外居作詩直與古人如偶從荷芰香邊得閒向篔簹節上書白露濕堦凉氣早青燈照壁雨聲疎曉來不署金吾事帶劒承明去直廬湘皋煙雨圖翠䄂湘江曲秋林淚㸃斑冥冥煙雨裏不見九疑山次白以中西塘即景落日雞鳴埭何人射雉回北湖山月上相送暮鐘來山中小景四山一片秋色埜客獨坐茅亭渡頭紅葉如雨石上長松自青送人歸南昌紅顔緑髮暎春􅂁三十年前白下橋亂後重逢天竺寺相看如夢說前朝秋塘小景西風昨夜到南塘楊栁蒹葭色轉蒼飛鳥獨來荷柄立不教凉露滿蓮房觀吾子行别仇山村詩作絶句弔之子行詩云劉伶一鍤事徒然胡蝶飛來别有天欲語太𤣥何處問西泠西畔斷橋邊吹簫人去竹房空海内猶憐翰墨工最是西泠橋畔路淡煙疎栁夕陽中來復九首來復字見心自號竺曇叟豐城人元季航海至鄞止定水寺洪武初召至京太祖覽其詩褒美賜金襴袈裟授僧録司左覺義詔住鳳陽圓通院坐胡黨凌遲死有蒲菴澹游二集顧𤣥言云復公富於題咏并多感慨所乏幽凈詩話蒲菴與全室齊名然不及全室逺甚盖全室風骨戍削而蒲菴未免癡肥也胡侍郎所藏㑹稽王冕梅花圖㑹稽王冕雙頰顴愛梅自號梅花仙豪來寫遍羅浮雪千樹脱巾大呌成花顛有時百金閒買東山屐有時一壺獨酌西湖船暮校梅花譜朝誦梅花篇水邊籬落見孤韻恍然悟得華光禪我昔識公蓬萊古城下臥雲草閣秋瀟灑短衣迎客嬾梳頭只把梅花索髙價不數楊補之每評湯叔雅筆精妙奪造化神坐使良工盡驚詫平生放蕩禮法疎開口每欲談孫吳一日騎牛入燕市嗔目怪殺黄髯胡地老天荒公已死留得清名傳畫史南宫侍郎鐵石腸愛公梅花入骨髓示我萬玉圖繁花爛無比香度禹陵風影落鏡湖水開圖看花良可吁咸平樹老無遺株詩魂有些招不返髙風誰起孤山逋赤壁圖為胡允中賦江空水落寒無波倚天赤壁髙嵯峨雪堂老蘇從二客攜酒夜載扁舟過中流扣舷發櫂歌有酒不飲當如何鱖魚三尺鱠白雪臨風細酌金叵羅酒酣耳熱歌再起直遡空明三百里一聲孤鶴横江來明月在天天在水酹月呼嫦娥仰天聼天語洞簫吹徹廣寒秋却挾飛仙共髙舉人生行樂須及時昨日少壯今日衰功名自昔等炊黍英雄徒為曹瞞悲畫史獨何心丹青託千載江雲山月想登臨彷彿圖中見風采後來游賞豈乏賢文章不如元祐前萬金詞賦爛星斗追逐騷雅光聮翩先生别去陵谷遷漠漠宇宙迷荒煙臨皋鶴夢骨可仙誰同此樂消閒年游石湖蘭若二首荷花蕩西湖水深上有蘭若當髙岑客吟時見􅆐鳥下僧定不聞鐘磬音雨香秋林橘子熟雲落空磵棠梨隂閒來掃石坐竹裏静與山人論素心五龍之峰雲作屏雙崖削出芙蓉青何人磵裏拾瑶草有客松間㝷茯苓林風不驚虎卧石山雨忽來龍聼經吳王臺榭今寂寞秋香薛荔花冥冥次韻王敏文待制燕京雜詠南風吹到運糧船萬斛香粳倍上年傳敕漕臺添氣力賜金多辦太平筵鴨緑㣲生太液波芙蓉楊栁受風多日長供奉傳新譜教舞天魔隊子歌秋滿龍沙草已霜射鵰風急朔雲長内官連日無宣喚獵取黄羊進尚方西湖雜詩二首芙蓉灣口緑隂斜吹笛何人隔彩霞驚起沙頭雙翠羽銜魚飛上刺桐花流觴亭子鳳山阿都護行春小隊過笑擲金錢花底醉玉簪彈出白翎歌守仁二十八首守仁字一初號夢觀富陽人四明延慶寺僧住持靈隱洪武中徴授僧録司右講經升右善世有夢觀集詩話明初詩僧有二南洲一温州人名文藻一山隂人名博洽有二無言一越人名明徳一不知何許人名至訥夢觀道人亦有二一晉江人名大圭一富陽人名守仁石倉曹氏乃誤合為一仁公詩諸體皆合有云盡抛身外無窮事遍讀人間未見書可謂有志者也相傳南粤貢翡翠仁公進詩云見説炎州進翠衣網羅一日遍東西羽毛亦足為身累那得秋林静處飛太祖怒曰汝謂我法網宻不欲仕我耶幾不獲免按此詩不載集中當出好事者附㑹使誠有之必不敢進呈也待月軒為式藏主作月出青松林照我松下户牀前光未滿裴回更延佇蓮漏下初更緑煙散東塢浩歌歩中庭衣露濕如雨秋夕病中夕雲斂中天月出萬象正九野聲影消平湖湛寒鏡驚風著露草栖螢光不定嘗新感時物金氣颯已應扶羸捲前幔銷肌怯虚静憂來復就枕蕭條發孤詠題錢選畫太華青蓮髙千仞苔壁古招提隔層雲孤逕入深塢鐘鳴谷口風木落溪上雨何處夜猿啼歸帆下秋浦𢎞上人蓄秋山圖萬峰霜晴翠如洗峰㡳行雲度流水西北髙樓爽氣邊江南落木秋聲裏蒹葭潮長魚在梁白鷗飛盡天茫茫松根丈人讀書處時有疎鐘來上方仙槎影没銀漢逺木末芙蓉為誰剪何處凉風送客船歸來似是東曹掾東曹頗笑未識機挂帆直待鱸魚肥山川揺落已如此不信草露沾人衣平生畫手不可遇坐閱新圖得真趣題詩寄與沃州僧吾亦買山從此去題方方壺畫方壺老人年九十醉把金壺傾墨汁染得蓬萊左股青煙霧空濛樹猶濕危橋過客徐徐行白石下見溪流清仙家樓館在何處雲中彷彿聞雞聲古苔蒼蒼煙景暮藥草春深滿山路招取吹笙兩玉童我欲凌風從此去題趙希逺畫蟠松玉兔圖子昻趙公鑑記天水王孫重豪素愛寫蟠根萬年樹上有徂徠五色雲下有中山雙白兔清隂散作秋滿林咫尺髙堂起煙霧丹桂吹香野菊黄玉葉金枝亂無數迢迢錦水泛蒼鳬漠漠青天飛雪鷺人間畫手非不多自是王孫得真趣浮玉山人列仙侣雅與王孫同出處妙畫題來字字真兵後収藏乃竒遇宣和遺譜世莫傳艮岳荒凉風景暮眼中人事已非前畫裏山川尚如故老我披圖一愴然落日長歌弔南渡金山寺神禹開天塹中流碣石存蓬萊分左股灔澦失孤根驛騎催官渡風帆拂寺門甕城燈火近鐘鼓報黄昏寄鐵厓先生先生謝客居東里使者傳宣拜下牀樂府謾推梁子範禮經須問魯髙堂酒須挏馬來光禄賦到龍旗說太常賜老鑑湖猶有待山隂茅屋未凄凉答倪元鎮禪榻清談屢有期茶煙想見鬢絲垂春風水榭停蘭槳夜雨何山寫竹枝甲煎沉香都入夢新蒲細栁總堪悲鸊鵜飛處重相憶擬和樊川五字詩過張侯舊宅畫㦸門開宿草新一過此地一沾巾歸來燕子驚新主開到梨花又暮春雨榻無因連海曲星槎何處泊天津夢中相見猶平昔翻訝傳來信未真題耕隱為王子安作讀殘書卷雨聲稀耕破春雲晚色㣲瓦缶自傾蒼朮酒金貂不換緑蓑衣江花未落秧針短隴草初深繭栗肥翻笑義熙陶縣令田園荒後始知歸次韻沈文舉忽見梅花看梅曽感故園情每到開時别恨生舊樹已從兵後盡新枝忽見水邊横夢迴山閣梨雲白月滿江城畫角清欲寄西湖早春信楚天霜冷雁無聲題畫積雨平原煙樹重翠厓千丈削芙蓉招提更在秋雲外只許行人聽曉鐘懐友湖草青青上客舟辛夷花老麥初秋一春多少懐人夢半在鄉山雨外樓題柯博士竹元統才人總寂寥奎章遺墨尚風標鈞天夢落江南逺腸斷雲中紫玉簫風雨歸莊圖濕雲漲斷隔溪山依約茅堂碧樹間好是鏡湖秋雨裏陸家莊下載書還書珉上人壁五年一度見西崑舊雨來人半不存只有髙梧三十本春風依舊長兒孫題杜少陵像闗山雲冷笛聲秋一曲南征感舊游滿地月明雙鬢雪斷腸今夜望鄜州陳檜吳楓楚柳逐煙空陳檜依然䕶梵宫可惜禎明歌舞地後庭無樹著秋風蘆子渡百里晴沙江水長蘆花風起碧天凉客舟㑹泊西城下滿地砧聲兩岸霜万金一首万一作力金字西白吳人元末住持瑞光寺洪武初召入禁庭奏對稱㫖總持法㑹事住天界寺有澹泊齋稾乙巳清明泊舟柳胥浦柳胥浦上緑楊邊客裏清明繋客船莫遣桃花作紅雨且看榆火散青煙笙歌漫說承平日耕稼深期大有年邂逅農人且相慰軍儲無限望吳天夷簡一首夷簡字易道號同菴宜興人住持杭州凈慈寺又主南京天界寺除僧録左善世鍾山法㑹詩千騎東華玉輦來春官詔許五王陪近臣共說天顔喜收得桫欏樹子回詩話洪武四年冬十有二月詔徴江南髙僧十人詣京師命欽天監筮日就鍾山太平興國禪寺建法㑹以薦國殤㤗厲御製文宣諭天下禁屠宰明年春正月辛酉昧爽帝服皮弁臨奉天前殿以表授禮部尚書陶凱出午門鼓吹前導至寺用梵法白而焚之癸亥帝搢圭面佛初奏善世之曲再奏昭信之曲三奏延慈之曲舞以應節四奏法喜之曲五奏禪恱之曲夜半六奏徧應之曲徹豆七奏善成之曲諸樂章皆出宗泐所撰勅僧寶金施摩伽陀斛法食十髙僧者宗泐來復梵𤦺守仁万金清濬曇噩慧日居頂及夷簡也建㑹之日天雨桫欏子於山中次日有詔皇太子諸王同觀故夷簡詩及之清濬字天淵居頂字𤣥極俱黄巖人濬徴授右覺義頂亦徴授僧録司慧日號東溟住天竺山曇噩字無夢主國清寺噩題華頂云山翠濕衣晴亦雨井華寒齒夏猶冰曹娥江云去越王城三十里到曹娥渡八分潮詩頗磊落惜無全篇合格者良𤦺三首良𤦺字元璞吳人住天平山之龍門又主檇李興聖寺楊亷夫云琦公既究禪理兼通儒學能詩其餘技耳七月既望玉山草堂分韻得爽字草堂凉夜延清賞石徑楓林秋颯爽鄰屋不同南北院稻畦真似東西瀼彈琴石上風生衣載酒船來月蕩槳青山自與白雲期莫遣移文謝來往月浦道中江似三巴曲星隨獨樹斜客行猶轉柁秋盡尚迷家白漲寒沙霧紅生曙海霞故人驚㑹面老大惜年華口占栁隂新月上銀盤入坐清輝落酒寒莫把閒情聼絡緯露華已濕玉䦨干法智一首法智吳山僧過安慶弔余忠宣公浮屠髙出暮雲低雉堞遥連碧樹齊茅屋人家兵火後樓船鼙鼓夕陽西大江千里水東去明月一天烏夜啼欲酹忠魂荒冢外白楊秋色轉凄迷詩話余忠宣輓詩方外作者四人非空恵恕祖皦法智惟智詩為佳廷俊二首廷俊字用章號嬾菴鄱陽人一云樂平人至正末主西湖淨慈寺洪武元年示寂於鍾山有泊川集送僧歸洞庭毎憶華山寺髙居俯洞庭煙中飛鳥白波面亂峰青賈舶朝依岸禪房夜不扃最憐霜後橘金子爛熒熒有渡有渡方舟小無家道路長大荒天渺渺滄海日茫茫水母浮還沒風鴛出復藏不須寒雁呌客意已凄凉懐渭二首懐渭字清逺南昌人洪武初奉詔至鍾山退居錢塘有竹菴外集送一初上人遊武林舞鳳飛龍若箇邊天涯送逺獨凄然江山南渡降王宅風雨西陵過客船蹋雪馬塍春買樹鬬茶龍井夜分泉落花寂寞東歸日煙嶼冥冥呌杜鵑寫扇贈明上人太湖六月暑氣㣲龍宫佛屋相因依蜃嘘翠霧作樓閣鮫織冰綃鳴杼機鐘磬無時空外發笙簫幾處月中歸投閒儗向上方住共看滄波白鳥飛克新三首克新字仲銘自號江左外史鄱陽人元末住嘉興水西寺洪武初召至南京奉詔往西域招諭吐蕃有雪廬南詢稾初至檇李通越門中逢故人爽溪橋上送餘春燕飛官巷桃花老鶯囀江亭楊栁新行李風塵千里道緼􅂁天地百年身未聞淮海休兵甲回首闗山一損神次韻方推官感興鴛湖風雨曉吹晴野曠天髙秋氣清鳳詔早頒南國使龍旗新動朔方兵闗河千里民初息吳越三年賦始輕戮力邦家戡禍難釣灘何處濯吾纓西湖景蘇子隄邊楊柳春湖中簫鼓畫船新誰知歌舞繁華地回首東風戰後塵自恱一首自恱號白雲天台人居餘姚之燭溪洪武初徴至南京賜歸住杭州靈隱寺續蘭亭㑹補任城吕系詩崇阿撫神秘㣲風扇和淳靈雨既云沐品彚區以陳蘭苕擢中沚葩蕚媚芳辰散懐得真契引觴答熙春福報一首福報字復原臨海人住四明智門寺洪武初被召賜還續蘭亭㑹補彭城曹謹詩柔條扇㣲風輕波漾晴旭羣彦此委蛇鳴條集中谷列席依巖隈飛觴隨水曲緬懐古先哲庶以繼遐躅如阜一首如阜字物元餘姚明真院僧洪武初徴至南京卒於天界寺詩話物元居雪秘山自營精舍宋无逸述其略云吾鄉雪秘山物元上人所營有軒曰入翠曰逍遥有室曰觀樹有篷曰雪蓬有閣曰怡雲曰西閣西閣之前有隙地植茶曰苦茶原植薇曰紫薇坡日離卉林日芭蕉亭閣之右偏有大沼瀦山泉而溢竇垣下入溝溝廣四尺泉流紺而潔經閣前不絶通溝植蓮有小木梁跨其上曰白蓮港港之前有地可遊息曰琅玕塢塢之左偏有小屋可宴坐曰桐隂舍其流循舍下注石竇以出而瀦於垣外曰白鷺池其曲曰鸂􅈑灣殿閣池館皆曲盡其妙當元之季隱居之士多治園亭結文酒之社方外自師子林外若阜公者可稱好事矣續蘭亭㑹補任城令吕本詩禊飲秘圖湖天氣淑且柔傳觴祭曲渚濯纓臨芳洲纎條亂風樹幽葩落晴溝衆賔亦以樂正忘塵世憂明詩綜卷八十九
