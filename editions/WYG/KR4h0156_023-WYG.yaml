body:
  text: 明詩綜巻二十三翰林院檢討朱􅂜尊編廖駒一首駒閩人有彊恕齋槀思親戎馬何時歇奔馳倦此身青燈孤館客白髪倚門人書信連年絶家山入夢頻歸來未有日囘首一沾巾李孟璿一首孟璿名均海鹽人以薦官府學訓導有南莊集静志居詩話海鹽半邏劉長卿詩所云半邏鶯滿樹也近市有吕冢土人相傳是呉孱陵侯䝉所葬考之呉志荆州記蒙卒於公安葬於蒲圻則非䝉冢明矣按漢季黄巾之亂呉有許昇妻吕榮不辱於賊為所殺麋府君歛錢葬之嘉興南地名義婦堰然則冢為榮之冢也南莊西溪兄弟實居於是予少日欲編緝檇李先民詩李布衣麟友為二李族孫録其宗譜所載南莊西溪詩各數十乂有李景孟詩一巻今已亡之僅就英華集中兄弟各録一首景孟中景泰甲戌進士求其詩不復可得附識於此擬古卞氏有美璞采之荆山中至寳不先剖獻君乃至公玉人何嫌猜三獻兩見刖抱之發長號淚盡繼以血宋人貴凡石得之梧臺東周客視之笑本與瓦甓同忠言翻見惡藏之愈深固自誇天下珍和璧安足覩嗟哉優與劣賤目豈能别李季衡一首季衡名平孟璿之弟有西溪集蘇臺姑蘇臺畔舊長洲江水無情只自流人去不生歌舞夢客來空動古今愁烟光漠漠孤城晚樹色蒼蒼故壘秋不獨凄凉眼前事越王宫闕亦荒丘徐璲一首璲字徳熈秋日江館寫懐水國天寒樹影稀西風又見鴈南飛郢中白雪無人和湖上青山有夢歸獨對浮雲傷往事驚看秋草又斜暉十年浪跡烟波外滿眼塵氛未拂衣朱純三首純字克粹紹興山隂人登龕山長江限呉越形勝一何雄島嶼蒼茫外乾坤浩蕩中江連理日霧汀暗走沙風忽起乗桴歎滄洲不可窮怨詞井上梧桐樹宻葉何沉沉傷心昨夜月照見雙棲禽天寳宫詞落盡宫花輦路荒鑾輿西狩嶺雲長詞臣休望金雞赦蜀道艱難勝夜郎李朂一首朂字文勉紹興山隂人送春彊對東風酒一尊留君無計黯消魂緑波芳草汀邊路飛絮殘陽柳外村鶯倦語時渾寂寞客傷離處又黄昏寒燈孤館何曽寐山雨蕭蕭獨閉門李仲訓一首仲訓號峴山南昌人仕至吏科給事中西臯詞酒熟黄雞肥後月圓丹桂香時誰道先生無事半醒半醉題詩賀承一首承字宗振蘇州人湖鄉佳處為朱昌年題湖鄉佳處足幽棲路入蒹葭望欲迷一水逺連天上下幾家如在瀼東西紅塵市迥人稀到綠樹春深鳥自啼何日編茆居此地杏花春雨看扶犁高璧二首璧字貴朋紹興山陰人有遯菴槀秋日逆旅送友人七澤波濤險三邊道路窮生涯同汎梗蹤跡歎飛蓬晚色平蕪外秋聲落木中毋將衰颯淚臨别灑西風春草宫宫花已寂寞宫柳亦凋零惟有宫前草春來依舊青胡紀二首紀字大年舒城人永樂甲午舉人歴官山東布政司左參議詩話大年以孝行聞父母之喪俱廬墓次猛虎引避羣鹿來馴有司旌表其門平生以詩畫書得名稱淮西三絶寄懐翁復初二首曽對東風倒玉壺花前痛飲醉相扶湘山此日君思我苦竹叢深聽鷓鴣别後茫茫嵗月催眼看花謝又花開相思莫道書難寄落鴈峰前有鴈來王佐二首佐字汝學臨高人正統丁卯舉人高州同知有雞助集瓊州二首斷虹飲海日光移西北雲屯少定姿颶母呼風千里至三間茅屋可能支五指分山析四州那盆峻嶺却當頭一支瀉下朝東水去與瓊州作上流俞膺一首膺富陽人詩話富陽春江隄在縣南莧浦至觀山三百餘丈皆壘以石縣令李濬所築嵗久圯宣徳十年知縣事呉堂允升重築之民感其惠更名呉公隄云呉公隄歌富春建邑臨濤江江聲日夕相舂撞颶風秋來簸銀屋海若欲使蛟鼉降蛟鼉降遲海若怒桑田往往棲鷗鷺幾人縮手空嗟吁謂是天閽杳難訴呉侯請命不憚勞隄成却恨來何暮老翁扶杖城南行喜見髫年舊游路錢塘己祀睂山蘇富春今拜畨陽呉乃知興廢有前定賢守賢令無時無賢守賢令無時無慿誰畫作雙隄圖陳延齡二首延齡冨陽縣丞妙智寺永安山髙一萬丈妙智寺建三千年古澗泠泠瀝蒼雪畫樓靣靣開青蓮老猨果熟占一壑怖鴿燈暝依諸天老夫登臨發長嘯風露滿身寒不眠大安院詩人假榻古蘭若松風澗水相泠泠優婆塞傾椰子酒須菩提譜蓮花經龍鱗樹老雨中翠佛髻山高雲露青借問金仙渺何許香臺去後三千齡黎公弁一首公弁字之冕臨川人舉明經正統中授臨潁教諭調蒲圻有蓴川雜詠金疊山青山天際來勢若雙飛蛾平明宿雨収嵐氣生林阿非煙亦非霧炫日金碧多流鶯緩語處坐愛春風和沐璘三首璘字廷章定邊伯昂之孫贈都督同知僖之子官至右軍都督特進榮禄大夫有集滇南即事二首自昔梁州域西南路盡通碧雞名岫逺金馬故關雄羅婦裙花布蒲蠻臂柘弓聖㤙同覆載處處樂時豐萬山藏古砦六詔雜諸蠻僰女頭籠㡌畨僧耳墜鐶啖蛇傳土俗屠犬祀神姦更有西戎種輕生性最頑午日蛇首裝船十丈長船頭鐃鼓間笙簧百夫劃漿齊聲去阿瓦城河沸似湯李分虎云阿瓦國王毎夏五月以舟師㑹諸小國於江上都督沐璘作詩至今傳誦之廖俊一首俊字文英號竹崖蒲圻人中景泰元年鄉試授漢州學正調嘉定州有芙蓉百詠詩話竹崖為漢州學正一日過開元寺聞諸僧誦經音韻朗然歎曰不愈於學生乎乃擇其年幼者四人趙杲方璧周冕張敖置之先賢堂中朝夕誨之後杲舉進士璧冕俱領鄉薦而敖亦由貢生為府通判再調嘉定手植海棠於學賦詩云曽於雨裏覔蒼苔幽洞移來手自栽枝幹巳成人欲去好花他日為誰開每賓興以花盛開為驗云西良湖南邦遺跡在西良鳬鴈依然滿石梁我向浮洲臺上立不勝惆悵到斜陽潘亨四首亨字從禮淮安山陽人景泰丙子舉人同知武昌府事有氷壑先生遺稾余子華云氷壑老人詩麗而雅郭克諧云氷壑之詩雋而不露深而不僻質而不俚渢渢乎大雅遺音詩話氷壑詩格高聳比於十才子似覺軼倫北固晚眺極目蒹葭外西風白紵凉殘霞隨野鶩落日送颿檣水接蓬萊近山連楚越長六朝遺恨在誰為管興亡七里灘怒濤催逺客帆落釣臺陰夜雨他鄉夢秋風何處砧渚煙籠樹杪澗水入溪深中有垂綸者茫茫不可尋蟋蟀愁對燈前影時聞牀下聲要知因物付何用不平鳴斷續許多意淒凉無限情誰家急砧杵海内已休兵聞子規﨑嶇蜀道馬行遲到處空山有子規愼莫夜啼枝上月思家正是夢囘時張振一首振字孟起嘉興人貧居青眼交逰覺漸稀側身天地可相依若知白石眞堪煮何待黄精為療飢己過禁煙無熟食不因沽酒典春衣蒼苔碧草侵階長高卧空齋晝掩扉周青士云孟起貧居之作曲盡窶人情狀誦之若有鬼捓揄於劉伯龍之側也楊範一首範字九疇鄞人有棲芸槀鏡川斜日一輪山上頭輕霞片片漾波流平蕪野岸碧千畆喬木人家紅半樓沙鳥廻翔將下宿田夫祓濯欲歸休漁舟各己収緡去漸有燈明蘆荻洲韓永一首永字景修嘉興人詠梅次竹鄰昔訪逋翁宅牆頭露半梢因吟暗香句行過段家橋盛寅一首寅字起東呉江人太醫有流光集暮春雜詠青青楊柳拂簷牙杏酪香來客念家惆悵墓田呉苑曲幾年寒食在京華周徳行一首德行嘉興人自號農圃居士寄泮水諸公早年曽許筆如杠老我於今興已降作客渾如錦江杜攜家未遂鹿門龎沙鷗睡熟原相並梁燕飛來偶自雙昨夜夢魂歸别墅富春山鎻白雲牕許穆一首穆字士深松江華亭人送邵昇逺之官吉州京華相見惜分攜歌罷驪駒思欲迷獨客自憐留日下一官君喜向山西天涯月落聞雞唱驛路花開聽鳥啼想得到州春未晚柳條垂緑草初齊沈恒一首恒字恒吉長洲人題劉廷美畫十載天涯作宦遊黄塵飛滿紫貂裘歸來不歎長塗險猶冩關山萬里秋岑琬二首琬字公琬餘姚人有雪崖集聞鶯懐戚學正在滄洲我有故人在滄洲思之不見心悠悠木蘭為楫沙棠舟南來鼓櫂乗中流嚶嚶好鳥如相求載飛載止鳴不休願以盟言結綢繆為予一洗離居愁何以報之青琳球松陵道中野闊煙凝樹湖深水近田了鬟挑菜女獨櫓賣魚船鳥去青山外帆収古驛前孤吟看北斗戀闕竟忘眠陳雝一首雝字惟肅海寧人葛嶺懐古山上樓臺湖上船平章醉後嬾朝天羽書莫報樊城急新得蛾眉正少年錢曄一首曄字允輝常熟人浙江都司經歴有避菴集李賓之云江陰周岐鳯多技能坐事亡命扁舟夜泊曄投以詩岐鳯得之大慟江南人至今傳之贈澄江周岐鳯琴劒漂零西復東舊游清興幾時同一身作客如張儉四海何人是孔融野寺鶯花春對酒河橋風雨夜推篷機心盡付東流水惟有家山在夢中陳顥一首顥字漢昭嘉興人有竹鄰集立春蕭條書劒客邊身望望歸期過立春宫柳漸黄梅己白東風應笑未歸人張愖二首愖字汝誠鄞縣人有東臯集四月三日未盡傷春酒一杯㣲風吹雨又南來浮雲心事何曽定逝水年華更不囘數尺雞頭添穉竹一簾鼠耳長高槐博山無火清香度何處薔薇昨夜開贈天童詩僧讓公自聞方外說天童夢繞青山十里松珍重能詩老支遁尋常結社勝爐峯傳書度海朝憑鶴擊鉢臨江夜擾龍今日東風花縣裏解衣留偈得從容李廸一首廸字叡迪鄞縣人郊游栗杖風前處處扶林花掩映失前途兒童也喜尋春客說與東村賣酒壚張肯二首肯字繼孟呉人有夢菴詩稾沈如美所畫美人圖為徐文輝作流蘇綴綵鴛帳寒金鴨不飛香縷殘新霜撲簾白如粉啞啞烏啼金井欄芙蓉屛開睡初醒守宫淺褪胭脂冷玉釵慵整雙鳯凰春愁壓翠蛾眉長送人之官嶺外曉裝帶雪出呉門惜别休辭酒滿尊邊徼一官同謫宦平安萬里即殊㤙月明好度梅花嶺雨過頻穿槲葉村想得龍城公退後故鄉風景與誰論杜瓊二首瓊字用嘉呉縣人自號鹿冠老人又號東原耕者卒門人私謚曰淵孝先生有東原集挽陸徴士蕭蕭白楊樹瑟瑟鳴西風嚴霜隕百草草下哀寒蟲方當嵗徂邁那堪悲送終平生結交好一旦隔音容魂氣竟何之遺軀返幽宫挽棺向西麓去去不復東斜照寒無光頑陰蔽羣峰隧道一深閉千秋恨難窮徘徊不能去灑淚心忡忡采菱圗苕溪秋高水初落菱花已老菱生角紅裙綠髻誰家人小艇如梭不停泊三三兩兩共采菱纎纎十指寒如氷不怕指寒并刺損只恐歸家無斗升湖州人家風俗美男解耕田女絲枲采菱即是采桑人又與家中助生理落日青山斂暮烟湖波十里鏡中天清歌一曲循歸路不似邪溪唱采蓮秦旭九首旭字景暘無錫人有修敬先生集趙柱野云先生詩因事成言遇景命賦直吐胷臆風骨自存之程克勤云公詩醲郁峻整諸體咸備李賓云公詩得肯綮能作驚人語詩話景𤾉五峰之父五峰於天順間通籍景暘詩名著於鄉䣊久矣成化壬寅結碧山吟社於惠山之麓與者十人陸勉懋成高直惟清陳履天澤黄祿公福楊理叔理李庻舜明陳公懋行之施亷彦清潘緒繼芳其一則景暘也時舜明年八十六景𤾉八十五天澤八十三懋成八十二惟清七十九公禄七十三叔理七十二行之六十九彦清六十一惟繼芳年未五十諸公彊之入社其後享年八十餘是時常熟馬紹榮宗勉榜其門長洲李應禎貞伯扁其堂旴江左贊時翊名其亭同邑邵寳國賢為之記長洲沈周啟南為之圖江左傳為佳話吟社九人皆處士獨景𤾉以子貴封武昌知府行之好著書故景𤾉詩云先生豈特天趣高著書厭嚼前人糟後於宏治元年上所著書大要謂尚書周易大學中庸注失經迷臣有一得頗能析理通政使以奏内自稱庶人且穿鑿害道乞正其罪泰陵命焚其書押遣還鄉事載實録而談修惠山古今考遺之傷春詞簡繼芳東風陣陣花狼籍老夫鈎簾空歎惜狂來扶病欲出門門外春泥深一尺徐家園裏葛家樓囘首繁華逐水流安得紅顔生羽翼玉笙吹上崑崙丘苦雨簡立夫鵓鳩雙雙啼屋角細雨斑斑晴復作碧水蒼苔野外昬挑燈坐聽簷花落輕寒側側透重扉畨把羅衣換裌衣出門可奈春泥滑孤負西山筍蕨肥雨齋簡惟清瀏瀏竹間雨瀟瀟牕外鳴小池収暑氣疎柳作秋聲鬢雪䝉頭冷腰金照眼明年光太怱廹何處學長生酬黄公禄春城無伴獨徜徉江草江波帶夕陽同學幾人千里夢相思一日九迴腸東呉文社今寥落南國音書孰寄將遙想杏花軒裏客習池蹤跡久荒凉寄公禄海内新詩久不聞東樓高卧思紛紛牕含竹色清如許人比梅花瘦幾分銀燭翠壺歌白苧畫船春水載紅裙昔年樂事俱陳迹愁對孤燈更憶君松菴避暑秋燈禪榻鬢絲絲行樂鄉山也自宜草閣共招溪上月茶爐重和巻中詩牧之有意尋春早靈運無縁入社遲且與諸公相對飲風流不减㑹昌時送人還京青楓江上葉蕭蕭汴水淮雲去路遙宫燭漸低鄉夢斷家山將近客愁消霜寒鐡甕秋聞柝月落揚州夜聽潮厚禄故人如問我白頭甘作惠山樵與懋成惟清公禄叔理舜明山行歸途有作落梅風急放湖船六客逍遙是散仙雪白河豚新入饌鵝黄楊柳未成綿松菴相地開詩社花市㽞衣當酒錢寄語諸公愼終始莫因勤怠誤流年題畫梅沙際春煙濕未消落梅風急送輕橈江邊有客尋詩去應在西湖第六橋明詩綜巻二十三
