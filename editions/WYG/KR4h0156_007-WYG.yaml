body:
  text: 明詩綜卷七翰林院檢討朱彛尊編朱右三首右字伯賢臨海人洪武三年召修元史六年修日厯除翰林院編修七年修洪武正韻尋遷晉府長史有白雲稾張楠渠云伯賢感興當不在魏晉下郭公葵云伯賢廣琴操出人意表非徒擬而作將歸操云九州博大兮將予遂之聖人待天下之心也猗蘭操云子如好修維我之求子如不好于我何郵道在我躬安於命也龜山操云周公上天奈龜山何家國之治否實存乎其人也拘幽操云日月有明容光弗留輔相之蔽也岐山操云既有吾土毋戕吾民太王之志也履霜操云民生有知以順天賦天下之為父子者定矣殘形操云曰修爾躬自天之佑君子惟自修而已琴操作於韓子之後立言尤難其宜與古人並傳哉靜志居詩話元史初成為期不過六月故極其牽率徐大年詩所云草草便垂千載後遲遲難俟百年餘是已李善長表進文亦云據十三朝實録之文成百餘年粗完之史於時以順帝三十六年事無實録可徵未為完書孝陵復詔儀曹分遣吕復張貫歐陽佑黄盅等一十二人分行天下凡涉史事者令郡國上之又遣儒生危於等歴燕南北開局於故國子監采訪文字請行中書官印封識達京師三年二月仍命宋濓王褘為總裁官續完元史纂修一十五人右與崇徳貝瓊廷琚義烏朱世廉伯清青田王廉希陽嘉定王彛常宗金華張丁孟兼河南高遜志士敏江陰張宣藻仲當塗李汶宗茂呉張簡仲簡青城杜寅彦正東平李懋暨俞寅殷弼而趙壎伯友仍與其列以是年七月竣事其牽率猶如故也獨怪宋王諸公負一代重望即伯賢當日亦以理學文章自命於春秋傳國語則有類編於戰國先秦兩漢則有秦漢文衡於唐宋則首定韓柳歐陽曽王三蘓文為八先生文集於元則有文穎而又於史則有厯代統紀要覧通鑑綱目考證其言曰凡民之欲足而止惟學不可以足而止可謂有志者矣宜其在局討論精詳用成信史乃任其繁蕪重複遂出宋金諸史之下何哉良由孝陵猜忌諸臣畏觸逆鱗表進之書不復更其隻字但就庚申君事補綴與前編絶不相蒙致有一人而作兩傳者史至此驚蛺蝶之不如矣白雲稾凡十巻予僅鈔得前五巻止有琴操無詩其後五巻僅得内閣本一過眼恨未鈔成足本琴操有郭公葵跋公葵吾鄉人唐處敬詩云我昔居秀州友有徐一䕫好為古文章自矜少所推每論其鄉人屈指二三希云有善詩者郭姓字公葵不習時所好刻意追古詞前後數百篇一一皆珠璣郭名秉心惜其詩無一存者可歎也遣興幽逕何偪側蔓草役行路此生苦不辰出門畏多露遲回蒙山居仿像商顔步籍籍春花萎冉冉芳年度寄語素心人朱顔恐非故次韻荅白雲悦禪師向來同覽赤城霞山寺吟行石徑斜來往風流成二老文章交好屬通家平安屢問東橋竹寄逺曽將小院花支遁肯酬南隖約相期嵗晚度年華春懐舵樓空闊望京華蘆荻江楓岸岸花山色漸濃昏霧薄水光搖動夕陽斜故鄉鴻鴈書千里逺浦牛羊屋數家邊塞栁營多苜蓿石田徒憶舊桑麻朱世濂一首世濂一名廉字伯清義烏人明初薦授釣臺書院山長洪武三年續修元史被召史成乞歸復與修日厯除翰林院編修遷楚府長史瀧湫和韻竹外煙浮僧煮茶草邊風暖鹿眠沙青鞵何處看山客瀑布巖前數落花張孟兼三首孟兼名丁以字行浦江人徵為國子學録與修元史以太常丞出為山西按察司僉事遷山東按察副使為呉印所訐論棄市有集詩話孟兼與景濂同里景源薦之朝伯温侍孝陵論一時文人謂宋濂第一其次臣不敢多讓又其次孟兼也然負才傲物屢凌其鄉曲及請假還縣令丞門謁奉牲酒孟兼坐受其拜不荅麾酒却之其亦無禮甚矣當其之官山西景濂以文贈行有云鷙鳥之揚揚不如威鳯之雝雝獅猊之彊彊不如祥麟之容容刑法之堂堂不如徳化之雍雍人不務徳則已茍有徳焉又何憸壬之不革其行孟兼盍於此而留意哉景濓可謂盡朋友相規之義矣卒之怙終不悛與呉印爭訐印兩上封事言狀帝怒械至闕下命衛士捽髮掠之垂死論棄市詔印曰吾除爾害矣善為之噫印一鍾山寺僧爾帝寵任之授室賜金至為之復讐必期快其意而後已毋乃過與漫興二首詩話杜子美集有漫與五絶九首又七言云老去詩篇渾漫與春來花鳥莫深愁渾漫與者言即景口占率意而作也其後蘇子曕黄魯直楊廷秀諸公皆襲用之押入語韻姜堯章詠蟋蟀詞云豳詩漫與笑籬落呼燈世間兒女段復之詞云詩句一春渾漫與紛紛紅紫俱塵土陰時夫輯韻府羣玉亦采入語字韻中蓋自元以前無有讀作漫興者迨楊廉夫作漫興七首妄謂學杜者必先得其情性語言而後可得其情性語言必自其漫興始而其弟子呉復見心從而傅㑹之注云漫興者老杜在浣花溪之所作也漫興之為言蓋即眼前之景以為漫成之辭其言語似邨而未始不俊此杜體之最難學者自廉夫詩出而世之人遂盡改杜集之舊易與為興矣首沿其誤者張孟兼也存其詩特糾其謬棃花半開夜雨催無奈李花如雪堆門外美人不見來東風楊栁吹千迴青驄驕嘶金鞿銜美人二月裁春衫江頭麥秀青蔪蔪西湖放船開錦帆義門鄭仲舒先生得請歸浦江予於先生同里且親故賦是詩情見乎辭矣鄭公去年離北平束書抱病來南京城隅邂逅喜且驚開顔握手言再生自從南北屢搆兵日夜悵望鄉闗情幾回寄書鴈南征中心搖搖若懸旌苦遭喪亂百病嬰客邊囊橐一旦傾此來四顧徒㷀㷀豈料吾子與合并我時聞之涕泗横况公素有文章名居官勝國職最清經筵之擢轉庠黌及當玉署宦已成又為奉常典粢盛人生際此自足榮但恨白髪己數莖懐哉屈子全忠貞誼與日月同光晶願言夕餐秋菊英佩明月璫紉茝蘅懸河之論春雷轟使旁覩者顔發赬索居半載留帝城坐聽夜雨哦寒檠眼前倏忽時變更春風一見衰草萌公家孝義好弟兄遣兒千里來逺迎乃今得請荷聖明身若插羽乘風輕過門云别明遂行開船要趁蒸雨晴夜久不寐視長庚長庚欲落鐘鼓鳴庭樹喔喔聞雞聲蒯緱起舞冠絶纓公歸我愁絲亂縈亦有夢寐懐先塋如過吾父款柴荆為言恨不同趨程終當早晚乞歸耕王彛二首彛字常宗嘉定人以布衣召修元史賜金幣遣還尋薦入翰林以母老乞歸洪武七年坐太守魏觀事伏法有三近齋稾詩話常宗自號媯蜼子學有淵源集中孔子廟學碑南門記鄉飲酒銘文甚高潔時鐡崖以文雄東南傾動一世常宗獨作文妖一篇詆之其畧曰天下所謂妖者狐而已矣俄而為女婦而世之男子惑焉則見其黛緑朱白柔曼傾衍之容無乎不至雖然以為人也則非人以為婦女也則非婦女而有室家之道焉此狐之所以妖也文者道之所在曷為而妖哉浙之西言文者必曰楊先生予觀其文以淫詞譎語裂仁義反名實濁亂先聖之道顧乃柔曼傾衍黛緑朱白奄然以自媚宜乎世之為男子者之惑之也予故曰㑹稽楊維楨之文狐也文妖也噫狐之妖至於殺人之身而文之妖往往後生小子羣趨而兢習焉其足為斯文禍非淺小也文而可妖哉妖固非文也世葢有男子而弗惑者何憂焉誦其文可謂獨立不懼者矣其為詩若神絃四曲露筋孃子篇尚沿鐵崖流𣲖而集外有題宋復古鞏洛圖六言云斜陽欲雨未雨别嶺歸人幾人峰迴忽見月出穉子相迎澗濵頗有摩詰文房遺韻又題宋徽宗畫百合圗云偶為美名圖百合不知南北已八分亦有思致秋林高士圖嵐峰半殘陽彩翠明林杪僧塢逺鐘微歸人下山少風杉落葉響驚起棲煙鳥攜手願言還前邨月初皎東歸有感路斷江淮己足憂繁華猶自説蘓州萬人金甲城頭騎十丈朱旗郡裏樓麋鹿昔遊何處草鴈鴻不似去年秋忍將一掬東歸淚付與婁江入海流張宣十四首宣字藻仲初名瑄江陰人洪武初與修元史擢翰林院編修既而謫濠道卒有青𤾉集詩話藻仲入翰林年未三十孝陵以小秀才呼之既奉詔歸娶邵亨貞女宋學士送之以詩所傳紅錦裁雲春奠鴈紫簫吹月夜乘鸞是也及謫濠道卒以詩辭其父溝南先生端云出世再當為父子此心終不間幽明誦之使人心惻孤鳯吟梧桐生高岡枝葉菀成林上有孤飛鳯結巢在其陰毛羽爛五采嗈嗈鳴好音虞舜去已逺王風不可尋來儀苟非時亦何異凡禽九日偕張思廉楊孟載徐二岳登虎丘招提憑崇岡石壁根空虚躋攀陟層巓歴覽壊劫餘清商振穹昊爽氣棲平蕪雲消初旭吐木落遙峰孤幽潭積水深修綆斷轆轤劒光欲飛騰神物今有無空令弔古人解笑英雄愚撫兹良辰及感我芳情紆長揖當塗者永與山林俱與慈邑諸公㑹宿茅甫生駐鶴樓得夜字白水冒平田積陰過初夏風雨招友生琴尊相慰藉飛梯倚孤撐連峯競迴迓晦㝠巖壑變空翠林木亞疎煙截山椒微月露天罅僧鐘隔逺寺漁父候歸舎鶴影渚雲迷風聲澗泉罷投迹山水邦脱身紛俗駕久忘簪組累不待休沐暇飲酣心為壯時危氣逾下佳㑹不再期兹遊偶來乍雞鳴起營營莫忘永清夜游四明山野人放浪山水情小弄雲海游四明半空下見日光動中夜起聽天雞鳴松風濤巻出萬壑耳邊無處無秋聲緑蘿碧澗月欲上澹煙逺岫天低横山中招隱者誰子相看擬和游仙行山川竒絶境復清秀色可攬難為名安得仙人衛叔卿身騎白鹿下來迎粲然一笑白雲裏授我寶訣教長生虞姬楚歌四面秋聲起美人如花帳中死重瞳將軍葢世雄淚流暗逐烏江水妾身妾身何足數八千健兒棄如土空留恨血漬平原碧草無風為誰舞王昭君却手為琶翻為琵馬上風裂宫中衣玉闗將軍兵百萬恨君枉殺丹青師穹廬夢斷悲笳曲淚眼朦朧漢宫燭荒邱遺恨草離離猶帶千年土花緑石門待謝雪坡不至古戍人何在春程驛尚存驅雞啼上樹秣馬出前邨白雨侵江郭青山對石門謝公游宿處清興與誰論桐廬舟行自在眠沙鳥參差上瀨船亂峰寒笛外疎雨暮鐘前灘轉旋無路林深别有天羊裘懐隱者高節已千年錫山道中風起晚凄凄愁雲墮漸低近人山鬼泣當路竹雞啼百里無煙火孤城只鼓鼙故園楓樹外歸夢遶梁谿送胡季城之官陽朔桂林南望八千里陽朔郵程又在西峒峒皆為狑狫住山山惟有鷓鴣啼天垂海國鄉闗逺雪壓江城草樹低恨不從君拜虞舜目窮閶闔意淒迷得鄧南隱書時在廣西風塵擾擾干戈際兩地俱為淪落人夢見亦憐風度好書來翻遣别愁新桄榔葉暗蠻溪雨茘子花濃海嶠春壯志幾回思奮迅出門誰慰白頭親題冷起敬山亭石滑巖前雨茶香樹杪風江山無限景都在一亭中畫梧石鳴琴罷瑤席鶴夢清宵警凉月下前除照見梧桐影送鄭希本還徽州從親南國久為官話别江城嵗欲闌三百灘聲流月色青山多處是新安張簡二首簡字仲簡呉人初師張伯雨為黄冠元季兵亂以母老歸養遂返巾服洪武初召修元史有白羊山樵集顧仲瑛云仲簡詩澹雅有陶韋風韋王子充云仲簡詩温麗清深有類栁詩話饒介之分守呉中自號醉樵延諸文士作歌仲簡詩擅場居首坐贈以黄金一餅高季迪白金三斤楊孟載一鎰今其詩載集中殊不見好次韻張田秀才見寄樹杪青蟲晴颺絲春城風物似年時貧餘許邁餐金法閒有陶潛飲酒詩芳草青青連野闊征鴻歴歴度江遲長洲故苑煙花外千里懐人入夢思游石湖治平寺用唐人許渾所題詩韻湖上春雲挾雨來楞伽山木盡低摧呉王廢冢花如雪猶自吹香上舞臺貝瓊四十二首瓊字廷琚一名闕字廷臣崇徳人洪武初徵修元史除國子助教遷中都國子助教有清江集詩話姚文公燧為承㫖時一日玉堂宴集聲妓畢奏有眞眞者操南音公疑而問之泣對曰妾建寧人西山之苗裔也父司筦庫於濟寧坐盜用縣官錢賣妾以償遂流落倡家公憫之遣使白丞相三寳努為落籍且謂翰林屬官王棣枤華曰汝無妻以此姬配汝吾即其父也貲裝皆出於公棣後官翰林待制廷琚為作真真曲以紀事盛傳於時廷琚從學於楊廉夫其言曰立言不在嶄絶刻峭而平衍為可觀不在荒唐險怪而豐腴為可樂葢學於楊而不阿所好者也其詩爽豁類汪朝宗整麗似劉伯温圓秀勝林子羽清空近袁景文風華亞高季迪朗凈過張來儀繁縟愈孫仲衍足以領袖一時此非鄉曲之私天下之公言也行路難采玉于闐河問君勃律何時過采珠鮫人室問君百粤何時出珠玉嵗久同為塵君何重利不重身海有波缺我楫山有石摧我輪行路難出門即羊腸何况萬里道管叔危周公匡人仇魯叟尊有酒盤有壺鼓坎坎歌烏烏海不可涉山不可徒路旁之人愛爾玉與珠行路難我以為父安知非虎我以為兄安知非狼仰天悲歌泣下霑裳郊居直木惡為輪疲馬思巻斾匡時既非才處約斯寡悔采詩鑒興亡讀易明進退永懐嵇阮放甘與沮溺對送潘時雍歸錢塘海縣兵未息公子今何之酌君萄葡酒聽我白苧詞憶昔來黄灣始為童子師連牀風雨夕秉燭聽新詩殷殷金石聲眞足解我頤同居石壁下斗柄倏三移脱畧勢利交所貴兩不疑久懐地主恩亦有蓴鱸思束書向錢唐磬折從此辭錢唐實都㑹西湖天下竒朱樓起相對上有千蛾眉樓前五陵子並馬金鞭垂酒酣復張樂但惜白日馳近者屬彫喪不及全盛時空山鳯皇去月黑號狐貍春風吹行殿碧草生荒基何當從子游觀濤酹鴟夷子實濟時具飛騰方在兹匠石既己遇小大隨所施從容宰相前奮舌論安危豈無一尺箠盜賊不足笞天空羽毛急水涸舟楫遲臨岐更揮淚中年傷别離荅客竊禄非本性適彼南山阿藜藿日不充慷慨獨商歌有客向我言與世同其波商君震七國季子傾三河區區守章句白首成蹉跎念之為三歎所樂良己多潛魚駭釣餌飛鳥愁網羅結駟非不榮違已當如何春日宴滄州并序嵗在著雍涒灘春三月一日筠谷高士合賔客序兄弟飲於滄州一曲平池湧翠高閣延青圓景中天繁陰四合微飇逺激幽芳襲人清醥在壺嘉肴既旅懲蟋蟀之刺儉美伐木之求友終宴忘疲遷坐復酌鳴葭間發協朱鳯之相和舞袖雙回翩驚鴻之欲舉嗚呼蘭亭金谷㑹豈能常滄海流沙兵猶未息懟神仙之無驗宜曠達以為高用綴新篇以紀雅集詩曰天闊無留雲山明洗新黛過從屬休暇置酒滄州㑹柔荑緑堪藉雜英紅尚在累觴既不辭秉燭還相對清彈促哀響祕舞呈修態蘭亭今已矣金谷徒増慨大化㑹有終四時寧復貸厭厭夜無歸從人譏倒載早春山寒花尚遲雪霽江巳緑懐新感游子哢節喧衆族且同尊俎樂幸免章綬束更擬登前峰青郊可遊目擬東野破屋夜通月霜氣刀稜稜病骨不受寒卒嵗仍無繒殘燈吐復翳僵卧如凍蠅事業漸蒸沙文章空鏤冰已失國士意頗為少年陵長歌獨慷慨坐候東方升四月十日兒子翔䎘來鳯陽留一月遣歸因令早營草堂殳山下為止息之所老病不得歸獨處長戚戚二子江南來眼暗初未識生常戒垂堂肌肉如雪白一月常塗間海風吹盡黑買酒為相勞問荅向中夕迢迢漢陽簿春來斷消息阿宣在母旁頗知工翰墨艱難且撥棄頓使沈憂釋所媿無定居百嵗半為客經營須及早尚愛龍湫僻况近讀書臺雲銷四山碧泉深出丹砂地冷多琥珀既非匡世資庶遂陶阮逸良辰戒僮僕悤怱及南北五月方鬱蒸日氣成霞赤出入非所宜川陸慎所歴惜别豈無淚向汝難再滴秋江有鱸魚當挂呉淞席次韻鐡崖先生醉歌先生愛酒稱酒仙清者為聖濁為賢清江三月百花合江頭日坐流萍船左攜張好右李娟紫檀雙鳯鵾雞絃傾家買酒且為樂老婦勿憂無酒錢白日西没大東旋秋霜入鏡何當𤣥蓬萊有路不可到祖龍己腐三重泉何如快飲三萬日酒樓即起糟丘邊願持北斗挹東海月落枕股樓頭眠穆陵行并序至元中西僧嘉木楊喇勒智利宋諸陵寶玉因倡妖言惑主盡發攢宫之在㑹稽者斷理宗頂骨為飲器璉敗歸内府九十年矣洪武二年正月詔宣國公求之得於僧汝訥所乃命葬金陵聚寶山石以表之予感而賦詩六陵草没迷東西冬青花落陵上泥黑龍斷首作飲器風雨空山魂夜啼當時直恐金棺腐鑿石通泉下深錮一聲白鴈度江來寶氣竟逐妖僧去金屋猶思宫女侍玉衣無復祠官䕶可憐持比月氐王寧飼烏鳶及狐兔眞人欻見起江東鐡馬九月踰崆峒百年枯骨却南返雨花臺下開幽宫流螢夜飛石虎殿江頭白墖今不見人間萬事安可知杜宇聲中淚如霰巳酉清明白苧衣鮮紫騮馬清明酌酒棃花下馬蹄一去不復來棃花又見清明開城南城北多新墓日落啼鴉滿高樹有酒誰澆千嵗魂子孫盡發濠州住主人更勸金叵羅阿蠻起舞玲瓏歌生前不飲君如何予避地千金圩屢游殳史兩山酒酣興發賦詩一首惜山中無賞音者姑録以自娯云神人夜割蓬萊股蒼然尚作青獅舞殳基得道此飛騰煙火千家自成塢前年盜起官軍下存者如星纔四五我來欲置讀書牀出入未愁穿猛虎山寒月黑無人聲夾道長松作風雨佩環何日歸公主泉下銅棺閟千古石仆麒麟罷官守林宿鴟鴞聞鬼語苦耽勝槩惜殘年共説當時悲老父錦繡池臺已零落田翁八十鉏新土傷哉土俗如巫覡伏臘荒祠沸簫鼓祠旁鑿井深不枯雲氣隨龍有時吐試上崔嵬望沃洲直將培塿齊天姥春前野桃渾欲放雪盡黄精亦堪煮興來起挾李長庚重賦琵琶雙玉女郭忠恕出峽圖巫峽何危哉夾拱如龍門禹治九州不得到此峽口水作雷霆奔問汝江中人幾日三巴去峩眉五月銷古雪灩澦堆深虎須怒巫峽之險安可攀胡為呉檣楚柁日日來往乎其間高堂中有如花顔銀屏翠箔青春閒涉此萬里道經年猶未還黄金不買死直欲髙南山汝舟非龍汝非虎黿鼉出沒饞蛟舞前者己脱後者號江神無情天又雨石巉巖兮利刃攢一葉宛轉行千盤覩此魂魄悸豈待杜宇夜呌猨聲酸安得鑿之盡平土萬古不識風波苦送迮士霖歸天台赤城雲氣神仙家千樹萬樹蟠桃花十二樓臺起花外石門水長通烏麻當時劉郎亦草草出山却憶山中好莫信丹丘日月長玉人己共桃花老山空水流雲自飛劉郎㸔花須早歸題董源寒林重汀圖天下畫師無董源學者紛紛工水石雲山萬里出巴陵白首淮南見眞蹟亂石平坡淨無土松根裂石蟠龍虎偃葢千年飽雪霜林深六月藏風雨江上邨墟何處入浮空逺黛蛾眉溼漁人日暮各已歸小舟如鳬落潮急我昔西清常看畫南唐此本千金價坐移絶境在雲間月出霜猨啼後夜薄游未挂呉淞帆令我一夕思江南安得買田築室幽絶境開忩日日分晴嵐十月十三日過梧桐涇時官籍濮彦宅龎氏唐氏自經感而賦之天寒水清石齒齒杏葉初黄豆花紫舞榭歌臺不見人頭白烏啼明月裏當時豪俠輕五侯一榮一枯八十秋緑珠亦解死金谷草露作淚無時流冬夜嵗月悲游子風塵老腐儒兵交連北冀客隱向東呉草白秦皇道天青陸瑁湖昔時尋樂處撫事一長吁排悶白首尚為客飄飄天一涯耳鳴通夜雨眼暗隔年花畏酒從今斷題詩浪自誇有邨如栗里準擬便移家夜泊武塘風帆如健馬一日過嘉興水鳥如相喚秋蚊尚可憎照人明月近接地白河澄耿耿渾無寐中宵對玉蠅横港南行入横港茅屋到林丘落日猶斜照寒潮忽倒流牛羊平野散鵝鴨小溪浮嘉見平生友籬邊一繫舟除日守嵗守嵗西清第幽懐强自寛極慚公子意須盡老夫懽明日王春始疎星客夜闌殷勤一杯酒到手莫辭乾晚眺極目三邊靜傷心萬室空斷山明落日飛藿巻回風漢節無歸使樵歌有野童煙塵幾時息歸釣古城東送胡鼎文同知赴安州别駕安州去青天蜀道危近辭丹鳯闕逺過碧雞祠暮雨歸神女春風怨子規宦游多好思重和杜陵詩壬子冬至日過來青堂示勉中祖南二友衣冠且從俗猶有晉風流我愛陶貞白人稱馬少游蜂房寒未割雞柵暖宜修不必論三仕何如號四休送王克讓員外赴陜西貂裘萬里獨衝寒舊是含香漢署官白雪作花人面落青山如鳯馬頭看闗中相國資王猛海内蒼生望謝安應念東南有遺佚采芝深谷尚盤桓十月聞雷天氣初寒春尚賖坎中夜半有鳴蛙百年宇宙喧戎馬十月雷霆起蟄蛇老栁黄垂霜後樹小桃紅破雨中花三公燮理無非術愁聽空江度鬼車清明日陪楊鐡崖飲城東門是日風雨盪舟撾鼓出東門怪雨盲風野色昏海上一春猶作客樓頭三日共開尊青山石馬新人冢錦樹黄鸝舊相園快意百年須痛飲轉頭何處不銷魂即事少海旌旗落照中沙陀兵馬鴈門雄朝宗久廢諸侯禮翊戴方尊節度功今日豈宜求騎劫當年應失倚全忠丹書鐡券存終始萬古山河帶礪同經故内山中玉殿盡蒼苔天子蒙塵豈復回地脈不從滄海斷潮聲猶上浙東來百年禁樹知誰惜三月宫花尚未開此日登臨解題賦白頭庾信不勝哀雨中書懐漢苑秦宫跡己陳金沙一簇為誰新山河有限空懐古風雨無情只送春南國鷓鴣愁北客東家胡蜨過西鄰尊前莫唱昇平曲白髪秋孃也自顰秋思雨河兵合盡紅巾豈有桃源可避秦馬上短衣多楚客城中高髻半淮人荷翻太液非前日花落蕃禧又暮春莫上高樓望西北逺山猶學捧心顰庚戌九日是日聞蟬今日出門風雨收東山西山須可遊那能束帶從王事且復開尊破客愁鴈别紫臺初避雪蟬鳴紅樹不知秋桃花細雨應相笑嵗月無情自白頭送楊九思赴廣西都尉經歴卭笮康居路盡通西南開鎮兩江雄漢家大將推楊僕蠻府參軍見郝隆象跡滿山雲氣白雞聲千户日車紅明珠薏苡無人辨行李歸來莫厭窮過泐季潭長老三塔院飲於志逺宅賦詩城南看花花正開清明微雨灑塵埃路從周處臺前過山轉曹彬廟下來墮地遊絲輕復起近人嬌燕去仍回高歌擊節狂懽賞共盡生春酒一杯殳山隱居夏日病客從教懶出邨兩山一月雨昏昏野花作雪都辭樹溪水如雲忽到門無復元戎喧鼓吹試從田父牧雞豚來青處士時相過猶是平原舊子孫懐内弟陸熙之我别語兒溪上宅月當二十四迴新如何故國尚戎馬即恐比鄰非昔人簫鼓誰家猶作社樓臺廢苑不成春夜闌憶爾無由見悵望黄姑析木津秋興和方文敏一日龍飛濠泗間槖駝牛馬走寘顔己來肅愼通滄海更却呼韓閉玉闗使者旌旗分道出將軍部曲凱歌還白頭野老知何事紫氣長瞻萬嵗山送馬伯温之廣西樓船搥鼓發江中昨夜檣烏喜北風可惜春歸還送客何知别後已成翁浮天雪浪三湘闊到海雲山百粤通有子漢陽専簿領一緘千里託飛鴻遣興我住雲間今四秋恰如杜甫在秦州賦詩黄耳冢前去打鼓白龍潭上游暮景飛騰如過翼此身浩蕩一虚舟黄塵紫陌繞車葢且伴老翁隨海鷗讀蘆笳曲日年已到甲辰終休倚山河百二雄八駿何勞巡海上一龍今見起江東専門學士空談道仗鉞將軍競䇿功忍聽蘆笳舊時曲此身飄泊歎秋蓬黄灣述懐二十二韻寄錢思復海岱初雲擾荆蠻遂土崩王公甘久辱奴僕盡同升逺適將妻子端居謝友朋草堂森苦竹瓜圃蔓寒藤地盡山光斷天昏海氣蒸夜深常畏虎秋後更多蠅鶴髪愁難理烏皮嬾自凭娉婷羞不薦齷齪怯先登拔劒歌誰和聞笳寢復興過逢欣巳絶疾病恨相仍自擬秦民去重煩魯使徵吹毛多見摘刺舌尚須懲耆老惟君在文章對客矜才全懐白璧道重比朱繩虎榜名非忝雞林價重増極知童子陋深媿大巫稱最憶春停騎高談夜翦燈病駒終棄擲生鶻必飛騰跡已從信屈時多任愛憎賦詩閒莫廢好事老猶能漢月今頻滿天河本自澄山陰有孤櫂雪下興還乘壬子夏端居二湖與二三子讀書而苦熱如焚一坐四遷杜少陵發狂大呌非過言也回思雲間時往來吕邵二族其地有林藪之美池臺之勝可以避暑而游士寓公咸㑹於此相與窮日夜為樂及兵變之後所至成墟海内忘形半為異物感衰榮之無定悼生死之相違遂成三十四韻地僻從吾放山深少客過昏昏蒸酷暑鬱鬱抱沈疴斷酒愁為敵抛書睡作魔雲生空望雨水涸不通河唱和聞蛙吹遨遊記鶴坡輞川移絶境瀑布激懸波數子論新好諸翁樂太和百篇齊屈賈楊鐡厓五字逼隂何鄭本初共哂佯狂徹魯道原焉知好辯軻馬文璧冰壺清莫比夏景淵鐡硯老猶磨呂徳厚公子時同載夏士文將軍夜不訶邵篔谷結交真有道倪菊存與物總無他倪耕閒每喜方舟坐何煩信馬䭾秋風千戸竹宿露半池荷席睹藏鈎令亭邀竊藥娥有賔月亭頗黎行凍蟻瑪瑙進寒鼉潦倒衣從溼欹傾弁或俄羌人能觱栗漢女善顰婆對舞翻朱袖羣謳歛翠蛾紛紛方大噱浩浩漸微酡壺中恒三馬詩成媿一螺如何棄俎豆却復老干戈落鴈長淮逺蜚鴻大野多死生俱異域出處不同科淚泣荆人玉腸迴織女梭祗憐成骯髒及此歎蹉跎室巳如懸磬門今信設羅凌霄榮小草平地引危柯水鳥浮沈戲林蟬斷續歌分甘留白屋身免束青緺晚牧幽湖上春耕曲澗阿丹砂尋舊井金刹過祗陀豈復同般樂應知廢切磋茫然感平昔興發强吟蛾殷弼一首弼字里未詳與修元史望海呉淞江口海門東萬里京師咫尺通白柁紅旗三月浪紫簫花鼓午潮風明詩綜巻七
