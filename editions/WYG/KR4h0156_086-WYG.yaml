body:
  text: 明詩綜卷八十六翰林院檢討朱彞尊編靜志居詩話明制設内書堂以教小内侍用史官四員主之從學者約四十人其後撥入讀書者多至三百人所以教之者有方矣而三百年來此輩善詩文者蓋寡予為搜訪僅得六人焉此外若楊友吕憲戴義李學輩雖間有詩句流傳多不成章雖欲廣之而未得也龔輦二首輦字中道南昌人𢎞治中為内官監左丞有沖虛集俞汝成云左丞雅事文墨兼尚理學沖虚一集所謂空谷之音贈顧潘與君少小定交游今日相逢兩鬢秋天上風雲真似夢人間嵗月竟如流可憐王粲依劉表不遇常何薦馬周安得忘機共漁父白蘋洲上數沙鷗見狻猊偶作聖徳彰戎服狻猊逺貢將雖然為異物費我大官羊陸咸一云辭㫖温厚張瑄一首瑄𢎞治中内官監太監鎮守廣西平南烏江道中山束平川小路斜不成村落兩三家分明横幅桃源景只欠溪流泛落花傅倫一首倫正徳中都知監太監鎮守桂林題望江亭山色拂雲青溪光照空碧靜觀元化初超然意自適王翶一首翶字鵬起順天通州人嘉靖中選入司禮監讀書歴御馬監右監丞有禁砌蛩吟詩話監丞集内鄉李䕃于美序之秋夜有懐西風吹雨夜蕭蕭客思逢秋倍寂寥十載已虚明主詔半生徒插侍中貂誰憐季子黄金盡無奈馮唐白髪饒何日一帆江左去獨㝷山水混漁樵張維二首維字四維霸州人隆慶初選入伴讀東宫歴乾清宫管事御馬監太監提督内忠勇營有蒼雪齋稾詩話張監丞以善詩稱定陵呼為秀才命掌兵㐲局駕幸局觀所造兵器手翫弄之奏曰兵凶器非至尊所宜操帝笑而止嘗於禁中退食地植竹數竿定陵題之曰蒼雪因以名其集瑶臺霽望天都五月雨一夜洗層臺日上芙蓉吐鐘鳴樓殿開石根雲卷盡松頂鶴飛來看盡南巖景筠籃詎忍囬老姥詞使節從天下﨑嶇不計程野花㣲辨色山鳥未知名仙姥鍼猶在真人誥已成倚蘭探舊跡何處步虚聲孫隆一首隆字東瀛三河人萬厯中以太監督織造駐杭州題慧因寺笙歌日日娛西子為愛幽閒到玉岑舊有髙人井西宅沿流且向寺門㝷詩話寺在西湖南五代天成二年吳越武肅王建面玉岑背兎嶺有箕泉流繞寺門元黄子久曽築室於是明詩綜卷八十六
