body:
  text: 明詩綜卷四十六翰林院檢討朱彞尊編羅洪先六首洪先字達夫吉水人嘉靖己丑賜進士第一授翰林修撰進左春坊贊善罷為民隆慶初贈光祿寺少卿諡文恭有念菴集王元美云羅達夫如講師參禪兩處著脚不堪髙坐甫穆敬甫云贊善多講學詩間有唐調黄清云羅詩詞意貴顯雖取材不逺而屬對為精静志居詩話達夫逺師撃壤近仿白沙定山然爽氣尚存未墮塵霧雜詩二首故人萬里外夜夢忽在兹一去二十年宛若平生儀因悲久離别再拜前吐辭舉手雙涕下自訴長相思覺來天一涯彼此安得知豈無同心言道逺孰致之人生重結交結交在當時對面不傾倒相思亦奚為煩􅃻不能寐披衣歩前楹仰視天漢流衆星一何明萬動皆有息人生何所營久佇風露下灑然當我情獨坐數月不出户庭前多夕隂閒看芳樹色一倍舊年深山中雜詩問我家何在山深多白雲巖前飛瀑下對語不相聞後園續詠二首棠棃花開深淺黄燕子初飛日漸長草亭坐久客不到半雨半風春太狂南村雲起北村晴晴鳩雨鳩更互鳴東風吹雨衣不濕我在桃花深處行唐順之十二首順之字應徳一字義修武進人嘉靖己丑進士除兵部主事改吏部尋改翰林編修歴右春坊司諫上疏請朝東宫奪職為民起兵部郎中巡視薊鎮還視師浙直超拜僉都御史巡撫淮揚天啓中追諡襄文有荆川先生集穆敬甫云唐公詩典雅舂容綽有盛唐體裁近顧元言云中丞古體如雲津躍龍幻變莫狀體如風澗鳴琴幽逸有致並足流響詞林屠胡元瑞云嘉靖初爲初唐者唐應徳袁永之文升王汝化任少海陳約之田叔禾等爲中唐者皇甫子安華子潛呉純叔陳鳴野施子羽蔡子木等俱有集行世就中古詩沖澹當首子潛律體精嚴必推應徳習蔣仲舒云𢎞正間李何輩出海内遵之迨其弊音響足聼意調必歸剽竊雷同正變雲擾太史振之爲初唐宏麗該整足稱羽儀黄清甫云應德初務清華晚趨險怪考其所撰若出二轍故譽有所自毁亦隨之陳卧子云應徳氣象爽邁才情駿發使能深造當有超乗其後馳騖功名詭託講學遂頽然自放詩話荆川開濟之才閎攬百家靡不融㑹毅然自任天下之重倭人構患志在捍牧圉以保鄉曲是時督師之權惟甬江梅林是寄公舍當局二人誰可與談方略者顧不知者以公爲甬江所薦介溪所知因此薄公豈惟昧于知人并不識時務者矣其建平倭之策謂當禦之海外故北自崇明南至蛟門乗桴破浪身作先鋒積勞而殞是豈專馳騖於功名者耶襄文之諡允符公論也已公初與遵巖論文兩不相下既乃舍所學從之竊怪集中五言古詩特少殆退舍以避遵巖也至於律詩質不傷文麗而有體送孔上公助祭太學歸闕里時賜衮衣一襲國喜嘉賔至人攀上客行來觀周室禮去入魯王城新衮山龍炫餘堂金石鳴聖朝稽古意待爾示諸生同皇甫子循游横山曲磴行來盡松隂轉寂寥不知茅屋近却望石梁遥葉響疑聞雨渠寒未上潮夫君軒冕客此地欲相招送白尉往湖州君家太湖北作吏太湖南驛路雞鳴近山城樹影含萬川疏沃野百室競春蠶幸此猶吾土微官也自堪張相公夀詩帷中運䇿九州清共說留侯在漢京賜第近連平樂觀入朝新給羽林兵儒生東閣承顔色酋長西蕃識姓名却望上台多氣象年年長傍紫宸明鍾廣漢云夀詩如此典重允稱㧞俗廣徳道中蒼山百轉見炊烟茆屋髙栖古樹顛細雨薜蘿侵石逕深秋秔稻滿山田雲中望影迷遥岫草裏聞聲覺暗泉儻遇秦人應不識只疑誤入武陵川聞復官報京師友人姓名不復挂朝參魚鳥由來性所耽箧裏符經都已廢山中藥草漸能諳疎狂自分三宜黜嬾病其如七不堪深謝故人推轂意莫將陽羨比終南崔鎮道中晚望懐陳約之郊原極目思依依楚水連天楚樹微逺浦潮生人獨往寒林風静鳥雙歸泥塗自覺朋游好日月偏催旅鬢稀念爾同爲南竄客煙波何事更相違覽徐養齋見懐毛古菴及小子之作存没感懐和韻早歲曽陪杖履遊遥思墓木已三秋美人去後空聞笛芳草歸時獨倚樓世上玉顔還易老山中石髓杳難求却慚司馬頻相許擬向清湖共釣舟冬至南郊明王敦大報泰畤禮神君位以南離正宵從甲子分月臨太乙館星動羽林軍除道欵豋岱鳴簫異度汾聲容六變合海嶽百靈紛封檢微題字屏帷悉畫雲神光人共見天語帝親聞盛跡誰能賦多慚扈從羣松闗月出照松闗松隂正滿地恐有山僧歸終夜不須閉筠徑面面隔深竹茅齋在何處遥聞犬吠聲試從此路去古北口諸城皆在山之㘭此城冠山如鳥巢到此令人思猛士天山萬里鳴弓弰李開先三首開先字伯華章邱人嘉靖己丑進士除户部主事改吏部歴貟外郎中擢太常少卿提督四夷館罷歸有閒居集朱中立云中麓著作甚富一韻百篇蓋白樂天之流也詞浮意淺繩墨尠中多何為焉詩話中麓撰述潦倒觕疎然最為好事藏書之富甲於齊東詩所云豈但三車富還過萬卷餘又云借抄先館閣博覽及瞿曇是也先時邊尚書華泉劉太常西橋亦好收書邊家失火劉氏散佚無遺獨中麓所儲百餘年無恙近徐尚書原一購得其半余嘗借觀愛籤帙必精研朱㸃勘北方學者能得斯趣殆無多人也噫嘻文淵閣藏書例許抄覽先具領狀以時繳納世所稱讀中秘書盖謂是己奈典籍微員收掌不慎嵗久攘竊抵換已鮮完書可為浩歎聞中麓後人尚餘殘書數十部巡撫丹徒張公物色之中有陸司農禮象一編張公殁後訪之不能得矣苦熱昏中日在栁炎帝司其職苦渇多病身煩熱何相逼浹旬難夜眠近午始朝食止螫藥無能驅蚊扇無力莫爲觸暑行且就繁隂息官微罷復久賜冰胡可得神馳寒露臺夢想雪山域妄念不須存秋凉當在即塞上曲二首虎旅紛紛列虎牙龍庭漠漠走龍沙未交八月先飛雪已盡三春不見花一春不見煖融天自是要荒氣候偏落地雪花原是雨漫天榆莢不成錢吕髙一首髙字山甫丹徒人嘉靖己丑進士授户部主事改兵部歴郎中出為山東提學副使轉行太僕少卿有江峰漫稾莫子良云先生詩本初唐燕國曲江二張而晚出杜陵大厯諸子間詩話詩莫盛於正徳文莫純于嘉靖之初自後七子𣲖行而真詩亡古文亦亡矣山甫與富順熊過叔仁名在八才子之列雖未能驂乘王唐亦一時之雋也王浚川數當時作者有唐子羅子趙子王子江右則有尹子曽子胡子陳子尹名臺字崇基有洞山集陳名昌積字子虛有龍津集曽胡二子不能悉舉矣省中直宿疎星歴歴露為霜獨宿瑶宫夜未央樹色暗浮天仗外香煙遥接御爐傍鈞天月上聞長樂玉漏風移出建章不遇武皇行幸日空憐頭白滯爲郎陳束五首束字約之鄞縣人嘉靖己丑進士選庻吉士改授禮部主事已復改編修出為湖廣僉事徙福建轉河南提學副使有后岡集王允寧云后岡誠穎秀第語淺氣促寡詩人之致軫皇甫子循云約之詩早鑄四傑晚鎔二張遒平原晞駕康樂王元美云陳約之如青樓小女月下箜篌初取閒適終成凄楚又如過雨殘荷雖爾衰落嫣然有態顧元言云約之詩篇篇都秀潤句句少警㧞亦就色相中自然寫出黄清甫云陳詩巧構新思善詠故跡華而不靡舊而彌鮮益以筋力美篇豈少哉陳卧子云約之典禮之作依然司隸衣冠詩話約之取組六朝亦稱典則咸寧山中雪霽晚行雪霽乍見山殘陽稍辭嶺暝色起煙氛寒光散墟井田空獵犬還林凍棲烏警遥聞野寺鐘初月生俄頃晚望有懐髙閣罷餘霧曠然見遥岑依微夕照滅窈窕寒雲深隠几獨成趣據梧時自吟惟當草元者寂寞知予心還浙夜泊江口越嶂宜春望江舠入夜乗潮移諸島出雲卷數峰層近郭翻多戀還家獨未能北堂今夕夢先已度西興都下秋雨夜飲王子長宅闊别時何屢蹉跎鬢已侵還朝明主賜卜夜故人心凉雨杯初覆空堂漏欲沉安知非夢寐相對帝城隂送李子山城細雨綠蕪滋黄鳥闗闗送别時海内為鄰千里近湖邊傾盖十年遲蟬聲驛路催官騎草色河橋映酒旗遥想經行多逸興逢人莫不寄新詩任瀚二首瀚字少海南充人嘉靖己丑進士繇吏部主事補春坊司直兼翰林簡討有忠齋稾詩話少海遇青城山異人授鴻寳修煉法家中盤盎皆㸃汞銀為之同時熊叔仁亦好服食煉形之說而羅達夫之死燕齊海上之士或言其仙去是時青詞丹籙西内尚未營齋而諸君愛道實開其先已少海老去自吹秦觱栗西征曽比漢嫖姚之句詩家類多稱之病懐海甸逢南菊殊方也自花江淹新卧病王粲老無家皓月千門夜秋風雙鬢華還持石函記勾漏訪丹砂五丁峽别衡崑峡天猨嘯萬山秋御宿相逢轉别愁後㑹知誰先白髪清時勞汝問滄洲繩牀對月此村夜霜杵擣衣何郡樓聞道西京最蕭瑟可堪歸路曲江頭程文徳一首文徳字舜敷永康人嘉靖己丑賜進士第二累官吏部左侍郎兼翰林院學士改南京工部左侍郎贈禮部尚書諡文恭有松溪集長洲訪常劉二子籃輿春曉度浮梁懶問城闉六十坊小艇忽臨山盡處美人宛在水中央疎籬仄徑紆村巷穉栁夭桃映草堂流寓江山元有分翛然安土即吾鄉蔡雲程一首雲程字亨之臨海人嘉靖己丑進士歴官刑部尚書贈太子少保有鶴田草堂集豋雷港驛樓空江返照映孤洲晚泊聊豋驛外樓可歎羇懐無住著挂帆隨月下舒州楊博一首博字維約蒲州人嘉靖己丑進士除盩厔知縣徙長安徴授兵部主事歴郎中出為山東提學副使遷參政以僉都御史撫甘肅進右都御史兵部侍郎升尚書加少保改吏部進少傅尋加少師兼太子太師卒贈太傅諡襄毅有虞坡集送雷信菴出按甘肅湟中形勝地尚記昔年游清海崑崙斷黄河積石流左賢失右臂上將得前籌為問乗槎客何時到隴州胡松一首松字汝茂滁州人嘉靖己丑進士累官吏部尚書贈太子太保諡莊肅有集舎弟病乆得書知小愈喜而有作汝病經年久常時繫我思池塘春草夢江海鶺鴒詩歲暮悠悠别天涯寂寂時忽傳消息到喜報細君知鄭大同一首大同字皆吾莆田人嘉靖己丑進士歴官刑部右侍郎贈尚書天游觀輕輿斜日上髙峰瘦竹疎花萬壑風獨鶴一聲松影亂月明人在白雲中楊爵一首爵字伯修富平人嘉靖己丑進士除行人擢河南道監察御史上書劾夏言郭勛因極言朝政廷杖繫獄者再乆而得釋卒追諡忠介有斛山集詩話斛山手觸逆鱗甘以其身顯棄封事大略謂目前之憂甚大大抵因仍苟且兵戎廢弛公私困竭奔競成俗賄賂通行遇災變而不憂非祥瑞而稱賀讒諂面䛕士風民俗於此大壊而國之所恃以為國者埽地盡矣又云天下之患莫大乎以危為安以菑為利實則可憂而以為可樂法家佛士日逺而快意肆情之事無敢有齟齬於其間積弊而至於蠱則不可得而救矣永陵見之震怒下鎮撫司重笞下獄於時晋江周主事天佐救之而死文豋浦御史鋐再救之而又死繫獄五稔始得釋纔旋里永陵復諭東厰拘之斛山之在獄也校尉蘇宣喬某楊棟獄官洪百户咸哀焉及再被逮緹騎亦憐之不相促廹斛山飯已即行立門屏前傳語家人曰有㫖見逮吾行矣觀者流涕獄中撰周易辨録其論文云文以理為主以氣為輔不以偏邪之見亂其心本諸聖賢之言以充養之如此則造語皆自胸中流出其吐詞立論愈出愈新而無窮如日月在天窮居深谷花石草木之㣲青者自青白者自白仰之以生輝觸之而成色矣㫖哉言乎詩則信口而作不求工也中秋懐友寂寞復寂寞還如去歲秋美人消息逺令我心悠悠呉水既東去秦山不可求思君譚道處念此日幽憂林恕三首恕字道近長樂人嘉靖己丑進士歴官雲南按察使有西橋集詩話西橋近詩依然林子羽王安中流派舟次白沙驛長安何處所孤櫂發閩闗白擁沙邊驛青迴江上山風濤添别淚村酒破愁顔羨爾溪中鳥閒雲共往還同蔣䝉菴朱豹厓登合浦海角寺共是天南客相攜海角行山連銅柱界水匯越裳城落日潮聲起髙秋蜃氣清故鄉囘首望歸雁斷南征宿唐浪村黄精釀熟豆初花籬落蕭疎逺市譁地僻虞羅依岸曲天寒漁火傍江义燕尋舊壘穿重幕竹引新篁過别家對景蕭然幽興發可甘萍梗負年華薛甲一首甲字應登江隂人嘉靖己丑進士除兵科給事中以言事謫累遷江西按察副使致仕有畏齋類稾生居生居盈萬間死居纔七尺七尺已有餘萬間何戚戚造物與我身此身應我役曷以我身故令我不自得楊祜五首祜字汝承錢塘人嘉靖己丑進士有丹泉集詩話汝承諸體瀟灑㧞俗今鄉䣊論詩無人屈一指者可歎也答陳李二侍御吏隠滄洲逺江楓伴索居秋風一雁過忽枉友朋書獻納看君輩聲名動直廬東南民力竭奏記意何如湖夜湖夜熒熒白蘋風嫋嫋秋斷霞斜照雨冥霧濕依樓萬國仍多難浮生祗百憂滄江有漁笛何事獨悠悠雨懐山城積雨春無事江閣停雲晚自怡芳草不知隨處合賔鴻何意獨歸遲壯游東閣題詩處恩幸南宫錫讌詩風景不殊京闕異江湖深繫廟堂思九日豋泰山殊方此日逢重九絶嶽髙吟散逺愁漢畤秦封空往事紫萸黄菊自深秋天清樓閣明三觀野曠山河辨九州獨是懐親憂國意白雲滄海共悠悠簡田長官矯矯田郎三輔賢省曹播越五經年河洲水竹新開郡暇日閒看沙鷺眠陳子文一首子文字在中閩縣人嘉靖己丑進士歴官湖廣按察副使夜泊皖城村舎孤舟野泊初逺寺疎鐘起茅屋兩三間懸燈深樹裏桂天祥一首天祥字子興臨川人嘉靖己丑進士由兵部主事改監察御史巡按山西山東出知大名府發和州樓船開旭日凉露灑征衣擊楫横江浦投詩采石磯潮來紅蓼没人語白鷗飛天際瞻宫殿金陵在翠微吳子孝四首子孝字純叔長洲人尚書一鵬子嘉靖己丑進士改庻吉士授工部主事以光祿寺丞出爲湖廣参議提督太和山有玉涵堂稾皇甫子循云龍峰才情既美興寄尤深其詞婉以麗其響和以平其思悠以儁故能蓄藻於建安騰聲於天寳希躅於少陵逸駕於長慶詩話純叔籍甚詩名特格未髙聳其論詩云世之蕘童牧豎矢口而成章田翁野嫗發聲而中節彼蓋不知何者之爲詩况詩之所以妙何也天地之機洩之於人者不知其所以然而然也夫詩以言傳亦以言隠求之於迹者非也求之於音者亦非也求之於揣摩擬議者亦非也數語足當正嘉詩人鍼砭燕數見沙頭燕翩翩故傍人定知巢已就偏愛語相親碧樹江波闊烏衣故國春卷簾誰爲汝飄泊數沾巾送郟薦和奉使東萊上宰承周賵王官抱楚才堂封鸞詔下鐃吹錦帆開海屋魚龍夜仙宫日月臺相如誇負弩旍節幾時迴秋日與子浚子約小集子循甫赴日南莫問銀河淺須憐玉斚空洛雲三歲隔楚月一宵同風櫪悲窮驥秋砧亂候蟲新凉有離思萬里憶征鴻送楊獻甫之官四川行閫參軍十二韻越巂憐君去相違萬里餘軍参孫楚事筆草孟嘉書魚鳥驚新陣貔貅耀舊旟桄榔山葉暗躑躅野花疎村女誇橦布羌人趁葦墟地當三蜀險府控百蠻居闗徼留繻日風雲按轡初巴渝歌甚樂兵騎報寧徐才重松州幕恩垂洱水車遷喬應不忝學武昔無如贊畫元戎喜籌邊勁寇除少年誰得似俠氣滿儲胥沈愷二首愷字舜臣松江華亭人嘉靖己丑進士歴官寧波知府升湖廣右參政有環溪漫集徐伯臣云鳯峰長于律之皇甫子循云環溪閎眇之製湛思以宣綺麗詞縁情而得茵鼎之貴不能奪蓴鱸之思熊軾之華無以輓扁舟之興不既深於詩乎逺穆敬甫云沈詩肉骨勻稱條達不滯李時云舜臣詞翰瀟灑有出塵之致園中雜言二首洪鈞陶萬象品彚皆天情四時忽代謝歲功賴有成物理鮮常盛天道有虧盈哲人秉大觀所以稱達生伊余無所好夙抱幽人貞一丘常自足千駟良可輕寵祿豈足貴賤者乃有名中歲不自好營慮相糾纒寧如返初服停策倚林泉豈不羨松喬生本無僊縁鍊形得長生此事終茫然有溪亦可漁有山亦可田營已良已足踰分詎自全青陽不再御朱華苦易捐欣然命㫖酒且以娛天年王穀祥二首糓祥字禄之長洲人嘉靖己丑進士官吏部主事有酉室集梅花風引上春香雪弄江南色為有惜花心樓中莫吹笛水仙瑶環月下鳴翠帶風中舉胡然洛浦神胡然漢濵女沈謐一首謐字靖夫秀水人嘉靖己丑進士除行人擢吏科給事中終江西按察僉事有石雲家藏集詩話先生師於陽明甘泉友于龍溪窮研理學故其詩品亦在元豐淳熙之間游殊勝寺畫舫連雲動驚濤帶雨飛青山天外出白鷺寺邉歸僧偈傳金粟蟬聲隠翠㣲洞庭乗興逺直欲老漁磯蔡靉一首靉字天章寧晋人嘉靖己丑進士除行人擢浙江道御史坐劾汪鋐廷杖為民尋以原官起用再謫山東按察知事隆慶初復職致仕有洨濵集過桑乾河入雲中白草黄沙漢使稀桑乾渡馬駐斜暉孤城雉堞依黄土古戍狼煙起翠微入夜角聲驚客夢凌風霜氣裂征衣雲州一望天連水惟是山頭朔雁飛周顯宗一首顯宗字子孝濮州人嘉靖巳丑進士除秀水知縣歴官漢中知府有桃村山人自適稾詩話桃村於詩未臻門徑惟意所之自序稱感興而作不事强索亦未嘗規規於古人自知之明亦已審矣集中絶句小詩有偶合者宿安平驛湖静冰初合人喧市晚收夜深誰共語寒月獨登樓莊一俊一首一俊字君棐晉江人嘉靖己丑進士官至參議小居雀飲硯池水蝶翻菜圃花雖非髙士宅終是野人家張意一首意字誠之崑山人嘉靖己丑進士官南職方郎有日渉園稾皇甫子循云誠之詩無取模擬而間合雅音本之性靈得於天趣也詩話誠之與兄情後先取甲第情有公餘寓拙稾詩無足録者自序以為習氣未除興到輒就不求其工自適其適可謂得失寸心知者也世宗皇帝輓詩神謨憑玉几顧命託儲君詔下輪臺悔哀傳薄海聞弓號遺劍舄龍去失風雲丹扆依然在宫鑪冷夕薰楊本仁一首本仁字次山祀縣人嘉靖己丑進士有少室集山行山路登攀倦鄉闗何處邊迷津岐路口立馬亂峰顛白髪雙親逺黄河一綫懸俯看鴻雁影難寄益門篇曹世盛一首世盛字際卿閩縣人嘉靖己丑進士歴官廣西參政有方坡集送凌應賢判常徳雄郡開南紀行旌出北燕别憐孤館夕交憶故鄉年曉月沈平楚春山帶逺煙離魂與孤鴈共逐洞庭船孔夭𦙍一首天𦙍字汝錫汾州人嘉靖壬辰賜進士第二以王府親外補陜西提學僉事歴浙江右布政使有文谷集詩話管涔山人如新調鸚鵡雖復多言舌音終是木强鴈山峰洞戀壑之勝水石之竒雲物之美多在靈巖予往臨眺述景散懐紆轡試委塗迴䇿亦尋壑過澗厲潺湲攀厓凌峭㟧歩滑苔已沈手援葛猶弱磴竟造幽禪山平臨化閣列峰非一竒芳林紛沃若空水望如煙絶巖驚欲落深洞海冥冥曽城天漠漠雲物倏然改霞氣時間作景與元閬并跡乃靈仙託將乗琴髙鯉或馭王喬鶴朱衡一首衡字士南萬安人嘉靖壬辰進士除尤溪知縣徙婺源徵授刑部主事累官右副都御史巡撫山東入為工部侍郎改吏部升南京刑部尚書尋以工部尚書兼副都御史總理河漕加太子少保召還掌部事有鍾山稿十四夜待月日入石梁暝攜僧待華月萬籟方澂瑩孤鐘助凄越素影澹青襟清輝鑑元髪憮焉遐意存暢矣浩歌發歌聲難以竟流響振林樾閔如霖一首如霖字師望烏程人嘉靖壬辰進士歴官南京禮部尚書贈太子少保有午堂集游迎恩寺寗氏園林逕轉金沙浄壇依石洞幽樹深寧受暑蜩咽似迎秋空翠含雲落新泉帶雨流歸驂楊栁陌十里暮煙浮蔡汝楠三首汝楠字子木徳清人嘉靖壬辰進士除行人遷南京刑部郎中出知衡州府歷江西参政山東按察使擢兵部侍郎改南京工部有自知堂稾唐應徳云白石盡洗鉛華獨存本質約侯舜舉云白石詩諸體皆合五言類陸機沈易者擬子昂七言近體與盛唐諸公相軋而七言古多似髙岑五言近體多似王孟穆敬甫云蔡詩思深語險不落塵詮既洪朝選云蔡白石弱冠即以詩聞初學六朝而學劉長卿最後又學陶韋强王元美云蔡子木如嬌女織流黄不知絲理自斐然又云子木少年雅慕建安晚攻錢劉索然易盡率顧元言云司空詩聲調清雅情興髙朗晚歲意應酬似出二手黄清甫云子木登第最早服官留都與皇甫伯仲日相倡和雅有令譽送别登臨佳句未嘗不在人口也既而官爵日尊詩格日損必窮乃工豈其然邪詩話白石詩名籍甚與四皇甫相酬和唐應徳亟賞之云白石今之名家也一變而得古作者之精僕非知音亦三歎不能自已而其鄉錢守中撰竹里老人沈宗殷傳備述正嘉之際湖州人物之盛有云長興則吳布衣珫安吉則陳大参良謨烏程則凌訓導震歸安則嚴知府鳯吳知縣廉唐主事樞徳清則沈僉事松武康則駱編修文盛而劉尚書麟自江右至居䝉塢孫山人一元自陕西至居戴山云云獨不及白石何也武夷山詩夙慕武夷游已入晴川境稅我塵中車振衣三秀嶺樹暝叠浮嵐溪虚寫澄影石竇通海流猨巖嘯峰頂空洞駭迴飇逺㟧眩殊景倐爾昇雲煙兼復徹軒屏晨翠流耳目霄隂濯襟領靈跡冠閩甌真機㑹箕潁榮素實殊塗俾予發慙省化劍閣贈田柜山督學昔與君子别乃在荆門山雲濤緬相失五載隔五闗武夷寧不懐欲來分水艱不因覲省暇何能晤清顔信矣延平津神㑹自昔然高閣出幽岫雙溪迅驚瀾山雨炎燠銷林華芬藻繁泓澄隠風雷磊落明琅玕方諧意未悉將别念彌難豈無聲音及獨悵形蹟單有縁期後逢更極平生歡握手何以贈永好在弗諼送陳郎中出守廣川戀别南州守聊為越客吟三江看雁盡五嶺入雲深風氣通蠻落人煙接海隂炎方將帝命并切飲冰心呂光洵一首光洵字信卿紹興新昌人嘉靖壬辰進士累官兵部尚書兼副都御史巡撫雲南改南京工部尚書未任卒有期齋集立春前雪應制天惟元徳感帝念小民依送臘能呈瑞先春果應期兩儀渾並色萬有倐交輝欲繼周文詠還輕郢曲稀林應亮一首應亮字熙載侯官人嘉靖壬辰進士歴官户部右侍郎總督倉場有少峰集宿㑹江古驛山城外寒江客到稀潮平見魚戲葉落聼禽飛逺火行人語荒原古渡歸徘徊不知夕零露忽沾衣范欽五首欽字堯卿一字安卿鄞縣人嘉靖壬辰進士累官兵部右侍郎有天一閣集詩話堯卿格律自矜第取材太近時倡和者沈嘉則吕中甫諸人未免聲調似之其藏書最富今浙中舊族若山隂鈕氏祁氏吳興潘氏沈氏檇李項氏郁氏髙氏胡氏遺書盡散惟范氏籤帙尚存惜未能泝江就閱也江上翫月萬里空江月孤舟日夜看闗山何處是烏鵲不勝寒氣逼銀河轉光含玉露團踟蹰瞻斗極髣髴辨長安寄陳駕部國祥不見陳司馬蹉跎幾歲年長江無旅鴈絶塞有風煙羽檄連宵動瘡痍何日痊憑將賈生疏太息漢庭前雪中簡王惟和寂寞梁園客迂迴剡曲家一冬初破雪萬里正飛花帶雨斜侵幔迴風曲抱沙相看如不醉孤負此年華姪澈使滇南鳳厯千齡啓龍圅六詔傳雲開使星路地盡夜郎天頒瑞符虞典祈靈異漢年可令籌國計人復數張騫東歸次錢塘先寄弟月落天將曙風髙浪欲層夜來春草夢先已度西陵蘇志臯一首志皐字徳明固安人嘉靖壬辰進士除瀏陽知縣徙進賢徴授刑部主事歴郎中出爲僉事遷副使升布政使以僉都御史撫遼東遷右副都御史有寒邨枹罕二集早朝奉天殿接詔禁漏沈沈曉色遲迴廊華月隠参差玉階直接承明殿銀漢遥通太液池咫尺雲函頒聖詔逶迤宫扇肅朝儀微臣亦見天顔喜未必長教近侍知顧存仁二首存仁字伯剛太倉州人嘉靖壬辰進士除餘姚知縣入為禮科給事中以言事廷杖編管保安隆慶初起用官至太僕寺卿有東白草堂集薛仲常云吳中詩大都模擬而出雖自相誇詡稱為作者而知言之士不無遺論矣伯剛諸體温厚和平忠愛怛惻根諸心而寓諸言不假組織而依詠成章得雅頌風騷之遺周子籲云居庸山人詩和平雅澹詩話陸子餘劾張桂作奏時鬼嘯於庭顧伯剛起草則鬼近榻前其聲迫矣詰旦鴉又鳴户上而兩公直言不諱雖受廷笞未嘗殞命使有畏縮何以成名乎伯剛所言五事其一論及黄冠故答鴻山漸山詩有潮海空傳佛骨書之句也是時金籙青詞猶未盛而徙薪曲突君子重其知先幾焉岔道目極長安嶺春生岔道屯看花頻掩淚聞鴈欲銷魂隴霧侵衣濕風沙隔面昏據鞍悲髀肉徒切壯心存對月清光此夕爲誰秋闗月能禁故國愁何處笛聲吹不斷卧看北斗挂城樓周復俊二首復俊字子籲太倉州人嘉靖壬辰進士仕至太僕寺卿有六梅館集詩話子籲甄綜鄉黨之詩為玉峯詩纂而以已詩請楊用修評㸃亦稱好事第諸體多膚淺不足觀淶水官舍感懐今夕復何夕倚此明燭光疎星燦前帷三五河漢旁天寒邊雲白嵗暮堠草黄古云易水寒重以繁露霜迢迢逺行遊塗軌浩無方眇余苦不達素髪垂中堂所嗟志徒菀四牡厲周行白水驛早發東方日未明寒林鳥將散靄靄川霧昏縷縷邨煙亂崩雲卧岑崖狂飇決門閈迢迢白水程栗栗黑墳岸隂隂蟲知曙喈喈雞迎旦狨猺儼狙伏徒御失魚貫稍聞滇水寒已習炎方暵凉冷雖迕時隂陽自貞觀吹萬感觱發致一疑漶漫霜封紫柯榮冰蝕舟蘤粲遊子悲逺鄉夙興轉勞憚朱輪一何翩元冬豈爲玩騂騂激靡懐鬰鬰累方歎五斗陶令奔一瓢許君判扣角白石咢乘桴滄海惋永言緝修軌末以塵嬰絆浦應麒一首應麒字道徴無錫人嘉靖壬辰進士官春坊贊善有後巖集次韻强徳州林屋秋高已自凉山中新酒熟鵝黄銀絲豈必鱸魚鱠金粟齊飄桂樹香泉石最憐微著雨芙蓉正好未經霜臨流不盡歸橈興隔水漁燈見小航呂懐一首懐字汝德廣信永豐人嘉靖壬辰進士改庻吉士歴官南京太僕寺少卿有巾石先生類稾阻風登觀音閣用韻憑髙獨上觀音閣落日還登燕子磯鳥道重重髙峽險煙波漠漠逺山微岸吹夜浪豚相拜厓䕶春巢鶻逺歸聞道鑾輿囘北闕歡心直向五雲飛王梅六首梅字時魁平湖人嘉靖壬辰進士選庻吉士除刑部主事謫判滁州有柘湖集詩話柘湖風神韶亮得無累之神絶句小詩尤見清㧞送林節推赴任瓊州見說瓊州地煙中疊浪開逺天分島溆晴蜃結樓䑓水館鮫人識風檣賈舶來桄榔秋樹好莫怨夜猿哀登滁州城淮北淮南節候同荒䑓無限北來鴻愁成短夢青山外倦倚髙城夕照中雲樹不堪連海岱啇歌何處起秋風横塘寂寂蘋花老欲采寒香薦醉翁江干曲估客乗潮去春風幾度寒江潮元有信日日至長干偶成滁州城樓雲滿梯滁州城下水連堤臨流欲渡無舟楫愛殺江蘺葉正齊題畫寄張廷瞻渺渺平蕪淺淺沙垂楊疎處見人家二年京洛緇塵滿愛殺芳洲杜若花南津南津津頭春水新草堂滉瀁揺青蘋漁歌窅窅逺山碧時有鵁鶄飛近人許應元二首應元字子春錢塘人嘉靖壬辰進士除泰安知州徙泰州徵授刑部貟外郎進郎中出知䕫州府升四川按察副使調廣西遷右布政使有漪堂稾皇甫子循云子春短律淒清長歌瓌壯再過懐玉感述瑟瑟零雨暮熒熒燈燭光我僕亦已痡偃息臨廣堂我何獨不寐起坐思縱横念我同懐人逺遊在冀方豈無二三子與子共翺翔良友信可懐寧知非爾兄引領既北睇側身復東望倚閭久相待何以遲遲行修途緐暑雨塗潦沾衣裳願言託晨風飛止即故鄉已酉夏宣城道中作水國去巳逺旱陸兹方永朝行指墟煙午餉閱田井曲薄蠶事歇來牟供秸秉丁男與紅女所務良自黽予亦勤饘粥安能厭馳騁微月沈西麓羣壑倐已冥杳靄聞鐘聲幽林隔人境且復息微躬明發還耿耿錢嶫六首嶫字君望揚州通州人嘉靖壬辰進士歴官参議憫黎詠六首有序嘉靖戊申崖吏失御重以積蠧之餘羣黎遂叛攻掠城邑逺近繹騷撫者無䇿漫以牛酒從事越歲不戢當路請命征討予分典戎事深悼誅夷之惨用廣咨諏卒藉天威誅獲渠首殲蕩醜類總五千餘級諸邨悔過悉歸順焉庚戍夏四月三日奏凱底定追惟致冦有因覆車當戒感時述事澘然有懐在昔邃古初鴻濛闢天地巨擘嶂南海五指鬰蒼翠中有黎母居伊人尚䝉昧鑿井以飲渇農田亦時藝荒路曖匪通幽扃或交市雖爾隔華界猶紀王正歲生黎若草木榮隕隨和厲熟黎若鳥獸于何勞智慧所以古先聖馭之以不治粤南本炎嶠矧此瓊崖東元冬日且和幽郊鮮隂風花栁䕃廣隰苖黍青芃芃皇仁漸南極草木均化工豈獨兹黎人物與非吾同軍行直人日感歎心沖沖朝發城東門夕駐藤江壘殺氣干層雲狼師渡藤水雞犬皆震驚人民盡奔徙海避愁蛟蛇山匿畏虎兕蛇虎猶可虞狼毒不可邇軍令甚分明顛仆何由弭伶俜泣路衢迸淚不能已嗟哉一將功豈獨萬骨毁海南無猛虎而有麖與麋𤣥崖産珍木種種稱絶竒斯物出異域頗為中國推以兹重徴索奔頓令人疲窮年務采獵為官共饋儀苦云近歲盡無以充攜持直欲訴真宰鏟此蘇民脂物理固有然忉怛勞人思葉落當歸根雲沉久必起黎人多良田征斂苦倍蓰誅求盡餘粒尚豢犢與豕昨當租吏來宰割充盤几吏怒反索金黎氓那有此泣向邏者借刻箭以為誓貸一每輸百朘削尤相擬生當剝肌肉死則長已矣薄訴吏轉嗔鎖縛不復視黎兒憤勇決挺身負戈矢鎗急千人奔犯順非得已赫赫皇章存今人棄如紙朔風戒良節赫赫張皇師軍門號令嚴震肅將天威壯士快鞍馬鋒鏃如星飛一舉破賊壘刀斧紛紜揮剖尸越丘阜踏血腥川坻白日暗西嶺瘴氣昏餘暉翅鼠墮我前饑烏逐人歸征夫懐慘憂涕泗霑我衣黎人本同性云胡登禍機神武貴勿殺不在斬獲為息火當息薪弭兵當弭饑誰生此厲階哲士知其非尹耕十四首耕字子莘蔚州人嘉靖壬辰進士由兵部郎中出知河間府升河南按察僉事坐劾戍遼左有朔野集詩話李何詩派並行曽未幾時而學李者漸少宗何者日多學李得其風骨者前有凌溪後有朔野而已朔野以邊才自負一蹶不振坎壈而終詩如曉角秋笳聼者悽楚修邊謡去年修邊君莫喜血作邊牆牆下水今年修邊君莫憂石作邊牆牆上頭邉牆上頭多凍雀侵曉霜明星漸落人生誰不念妻孥畏此營門雙畫角黟縣道中嶺峻橋横渡泉懸水逆流映空峰影亂觸石浪花浮歲月悲行役衣冠憶舊游望鄉雙淚眼休上最髙樓韓淮隂侯廟背水空留陣良弓早見收身危縁震主面相止封侯落日荒祠道西風澗水秋君臣終始義為爾淚長流關忠義祠盪冦襄樊日長濤渰魏軍氣雖雄百戰功竟偃三分鬼馬騰空皁靈旗掣亂雲神絃朝暮曲長向嶺頭聞秋興四首銅龍春闢曉光寒金水橋横白玉欄見說漢皇求大藥故邀王母到長安黄金夜獻文成竈青鳥朝翔太乙壇不是歲星陪帝輦蟠桃誰奉殿中歡薊門千里接雲中燧火清宵警報同合陣幾窺青海月鳴鞭争下黑山風殘冬戰士衣仍薄荒歲孤城廩欲空南國十年輸輓盡防秋諸將慢論功十萬鳴弦報吉囊去來飄忽是花當連姻故自輕中國分道頻看入漢疆推轂丈人空肉食操戈遺孽尚蕭牆不應干羽修文日歲歲三闗有戰場威名萬里馬將軍白首丹心天下聞遼水旌旗餘殺氣泰山松柏已髙墳條侯自靖中州變竇憲曽名塞外勲獨倚凌煙思將畧暮天征雁下寒雲上谷歌四首大寧無路援開平極目孤懸獨石城遥憶先皇親躍馬長驅絶塞苦提兵寒流汨汨交樵徑野戍荒荒列漢旌千載土人談往事伯顔山下有英聲永寧山外黄花鎮隆慶州旁土木城千里風烟開紫塞萬年根本是神京分工幸築沿邊壘深入宜防間道兵見說花當窺伺久窮邊誰識近年情飛狐倒馬紫荆連此去朝廷路一千向日北門嚴鎖鑰於今南牧盛烽煙時名受脤當闗將嵗徳臨分破陣年願假精兵臨塞上莫令疲病乆戈鋋陽河西帶鎮寧流順聖川南是蔚州比歲凶荒猶在眼向來荼毒幾曽收靈闗皆出紅沙嶺直峪斜通白草溝封植紫荆端在此倉場芻粟可深籌紫荆闗漢家鎖鑰惟元塞隘地旌旗見紫荆斥堠直通沙磧外戍樓髙並朔雲平峰巒百轉真無路草木千盤盡作兵誰識廟堂柔逺意㦸門煙雨試春耕春懐春深闗塞尚屯兵萬里邊防拱漢京不為翠華臨逺道豈應金甲廢深耕轉輸坐見司徒急經畧親看相國行莫訝至尊忘北顧顯陵遷附聖人情桑喬一首喬字子木江都人嘉靖壬辰進士除户部主事改授監察御史駕幸承天扈從未行乞歸逮赴詔獄廷杖謫戍九江卒戌所隆慶初贈光祿寺少卿有詩文集歐楨伯云子木詩清雅俊逸有昌黎眉山之風詩話子木按大同還一日劾四尚書嚴嵩與焉可謂敢言矣然幾殺其身得不死者幸耳歐禎伯撰廣陵十先生傳十先生者儲瓘静夫王軏載卿景暘伯時趙鶴叔鳴朱應登升之蔣山卿子雲曽銑子重朱曰藩子价宗臣子相其一則子木也流水江流九派是潯陽山勢千重擁建康日暮雲帆看不見夢隨江水過横塘包節三首節字元達華亭籍嘉興人嘉靖壬辰進士除東昌推官徵授監察御史出按湖廣抗疏劾守陵大璫廖斌不法為斌反誣下詔獄謫戍莊浪衛有臺中湟中二集莫子良云侍御詩於臺中見遂初之志焉其言麗以則於湟中見窮愁之藴焉其言婉以思玉顧元言云侍御詩意象都新令人炫目方之琢鼎彞欵識工緻特乏𢎞綽耳詩話侍御恱研風雅以文苑英華詩可續昭明文選體編成苑詩類選三十卷亦稱好事其所作大約取材于是西谷張氏惜其立志太銳任事太勇嫉惡太嚴為讒者所中其才與命妨志與時違故所就止是亦知己之言也九日宴西寧城樓九日依邊郡登髙倍黯然山風寒擁葉城日澹浮烟菊亦窮荒見萸應故國偏何期流竄客猶接歲時筵得侯介潭消息消息西來未忍聞若為多難復離羣投荒自分先朝露歎逝那知對隴雲隔歲行塵猶避馬早春芳草已孤墳生還儻過山陽道長笛何堪聼夜分贈俠少年早隨飛將戰龍沙日晚收營過狭斜下馬直趨盧女肆滿樓喧笑擁琵琶馮汝弼一首汝弼字惟良平湖人嘉靖壬辰進士工科給事中以言事謫潛山縣丞遷知太倉州調揚州府同知不赴隆慶初追贈布政司參政有祐山集詩話祐山入諌垣值汪尚書鋐掌吏部恃寵恣肆言官劾之不動祐山投袂起曰擊之不勝則其志益驕事有不可言者吾當以死争之疏入帝怒時禮科給事中掲陽蔡宗愷河南道御史泰和曽翀皆廷杖死祐山與諸暨翁給事溥等八人俱外謫然翁終以此逐斯隆慶初有追贈之典也祐山歸田後睦鄰敦俗鄉里徳之曽孫孝廉洪業守其家法輕財博施至今東湖言好義者必曰馮氏夜發天津明月天津岸孤帆水底明北來新鴈至仿彿是神京徐楨二首楨字世兆長洲人嘉靖壬辰進士歴官廣東参政有堯山詩集楊蘭亭奉使北上出闗稱使者知是棄繻生鳳詔從天下樓船截海行五雲還入夢千里欲遄征到處逢迎是無勞念去程鄒虹橋新居欲謝塵中鞅言從野外居短籬齊樹槿新水曲通渠俗客無停軫幽人有報書清風北牕下髙枕意何如謝少南二首少南字應午上元人嘉靖壬辰進士歴官廣西提學有粤臺集府江雜言二首蠻煙不雨似雲濃白日隂隂慘澹中炎氣熏人冬亦暖不知何地候春風落日官軍舉號齊琱戈畫盾障山蹊不嫌銅斗通宵擊却厭斑雞半嶺啼王畿一首畿字汝中紹興山陰人嘉靖壬辰進士官南京武選主事有龍溪集詩話龍溪學術不純詩亦駁雜登西天目早起登山去芒鞵結束牢但令雙足健不怕萬峯髙白恱一首恱字貞夫武進人嘉靖壬辰進士除户部主事改禮部歴貟外郎中未幾補左春坊司直謫永平通判轉南京後軍都督府經歴稍遷南吏部郎中再謫河間通判復轉户部主事改尚寳司丞有詔遷江西按察僉事俄令致事有雒原集皇甫子循云雒原調暢朗而思沉語婉麗而致逺音和平而易感㫖雋永而難斁顧元言云司直以建安風骨兼貞觀思致足以振響長慶繼軌大傅矣秦省諸君招飲愛山園亭幽林闢瑶圃飛閣臨華池髙賢敞燕㑹慰我逺遊思情酣衆音翕日永杯行遲鮮飈空中來坐令炎霧披綠竹䕃雕榱雜樹縁芳畦夕照燦雲峰澄波漾漣漪淵魚伏蒲藻鳴鳥遷樛枝歡樂良不極惜兹光景馳慷慨君子心明明孚令儀散聚靡有常邂逅天之涯眷言崇懿徳式彼周行詩趙伊一首伊字子衡平湖人嘉靖壬辰進士歴官廣西按察副使有序芳園稾案山沙圩塔前春草齊案山樓外曉鶯啼畫船載酒三湖遍簫鼓聲中日又西張謙一首謙字仲受慈谿人嘉靖壬辰進士歴官按察副使東門行歩出城東門泛彼河上舟河流東北馳念子悵悠悠子行一何逺乃在渤海頭白日照遼陽朔風吹高丘王事各有程焉得斯須留執手淚盈把杯至不能酬垂楊夾廣衢有鳥聲相求感之増煩惋怨彼道路修丈夫自有懐豈若兒女儔贈子明月珠照耀光九州所期在同心千載為我逑廖希顔三首希顔字叔愚茶陵人嘉靖壬辰進士有東雲集送岱宗諫議謫鎮逺明堂再續周王禮宣室能容賈誼狂抗世有人還諫草清時憐汝獨遐荒龍吟鎮澤千峰雨雁度偏橋八月霜去住天涯各何意長星猶在太微傍自注時有星變送李約齋戴前峰二諫議謫象郡天風吹雨氣蕭森行盡江潭是桂林萬死投荒明主意一封排闥小臣心城臨南斗桄榔出花暗春山瘴癘深彈劍長歌倍憐汝許身我亦愛南金送方兵備赴蜀兼懐楊芳洲夫子西路元戎看仗節南宫詞賦起明經天門初日餘殘雪江國浮雲伴使星乗興還移浣溪棹幾時同過草元亭生憎楊栁催春發故向愁邊却盡青王瑛一首瑛字汝玉無錫人嘉靖壬辰進士官監察御史有石沙溪上集任丘道中寓目萬山秋色送行韉髙樹雲生欲暮天可是河頭漁艇出鷺鷥驚起水西田王廷榦二首廷榦字維楨涇縣人嘉靖壬辰進士除行人遷南京刑部主事歷户部貟外郎中出知九江府有巖潭集天夀山行宮天斾三春發離宫四月開觀河懐禹跡問野見周才日氣生高嶺雲隂拂翠臺太平叨扈從文雅媿鄒枚後湖答皇甫司勲髙皇方息戰於此濬澄湖版籍封疆逺絲綸詔命敷萬年修禹貢九譯獻周圖自得清風句南中麗景無錢薇一首薇字懋垣海鹽人嘉靖壬辰進士除行人擢禮科給事中轉右給事中贈太常寺少卿有承啟堂稾贈呂東匯銀臺薊門十載别此日意何如濟世餘三䇿謀身合二疏浮踪寄天地真樂自樵漁好借盧敖杖周行五岳墟髙世彦一首世彦字仲修號白坪内江人嘉靖壬辰進士有自得齋槀詩話白坪軒名自得其詩意象從容五言如羣鷗穿藻出一鳥捕魚飛月令如潮信年光似水流白雲棲樹杪青竹露牆根瑶瑟難為調牙籤剰有書潮來沙作篆雲過石為衣七言如對月云佳辰若此不易得良夜何其分外明九日云清時容我林泉嬾黄菊笑人塵務勞自娛云花隂數酌陶元亮日課一詩梅聖俞蜀中尚楊用修派詞多穠郁而其詩清潤如此所當洗眼觀也冬江秋盡寒潭斂水痕斷雲殘雪送朝昏深冬野鳥巢溪樹近渚人家掩石門何處洞簫吹夜雨一竿漁火徹朝暾蜀江氣暖春光早已有林花暎小邨明詩綜卷四十六
