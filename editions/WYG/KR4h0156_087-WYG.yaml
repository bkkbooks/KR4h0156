body:
  text: 明詩綜卷八十七翰林院檢討朱彞尊編吳徹一首徹字文通崇仁人為陳友諒用事嘗偵太祖軍被獲命詠百馬圖黔其面目為詭譎秀才又賦西山夜雨詩云云西山夜雨莫厭西山夜雨多也應添起洞庭波東風肯與周郎便直上金陵奏凱歌周所立一首所立號盤谷臨江人仕陳友諒為草上梁文晚就臨江教授哭定位緑錦池頭舊使君近傳消息不堪聞的盧竟死檀溪險鸚鵡翻成鄂土墳蒿葉蕭條生夜月棠隂迢遞起秋雲陳琳老大頭如雪無復軍前草檄文静志居詩話定位字子靜為陳友諒守臨江抗太祖師於鄱陽被殺饒介一首介字介之臨川人元末自翰林應奉出僉江浙亷訪司事張氏入吳杜門不出自號華盖山樵亦曰醉翁士誠慕其名自往造請承制以為淮南行省参政吳亡俘至京師伏誅詩話介之在吳延攬名士一時如陳庶子姜羽儀宋仲温髙季迪楊孟載陳維寅維允虞勝伯秦文仲皆與訂交自目為醉樵盖仕於淮張非本懐也丁未嵗論書贈仲温太白流西荒音響一何切蒼精散𤾉谷光彩爛昭晰靈氣垂八芒雲漢自兹抉人文既開張象畫亦區别冥機不自見直待智者發誰能懐遂初心焉悟皇頡閉門工造車出門即合轍古人有成言得之盡毫髮流形歸自然萬古字不滅將同造化功豈獨在書訣神哉嶽瀆經鍊石補天裂馬玉麟二首玉麟海陵人張士誠據吳為参政城破死虎丘和范文正公韻緑蕪迷四野空翠擁千巖風過鶴鳴樹雲歸龍在潭雨花翻寳座積石護僧菴此地如容我移家住水南又次栁道傳韻髙城落日下樹擁半山青野鳥啼還歇溪雲散復停微官猶是客對此暫忘形為愛生公石移尊上小亭張憲三十二首憲字思亷紹興山隂人仕張士誠為樞宻院都事吳平後變姓名走杭州寄食報國寺以死有玉笥生集顧俠君云思亷師事楊亷夫尤多懐古感時之作成化中安成劉釘序其集曰思亷與鐵崖諸君同為一時能言之士當元季擾攘志不獲伸才不克售傷時感物而洩其悲憤于詩可謂思亷之知已也詩話鐵崖諸弟子才鋒犀利莫過張思亷讀其長歌波瀾横溢弟子不必不如師也元季居大都雙橋里有火主簿騎騮馬過之指示思亷曰能騎此否思亷笑曰虎則不能若馬也吾則能之矣適翰林承㫖任闊台從騎三十餘自西而東既過思亷執䇿就馬足甫及鐙則已奮迅馳突入翰林隊中羣馬辟易于烟塵中但聞翰林厲聲曰好馬南馳至雙橋越塹而過俯身就韁韁比及手已馳過樞密院街矣遂縱轡至哈達門而回主簿訝思亷乆不返騎他馬來追于天師菴執手大笑竝轡歸飲漏下初鼓乃散鐵崖評其走馬歌云決非驢背詩人語洵足異也琴操芒芒禹迹兮畫為九州侯伯牧守兮職貢是修其或不臣兮天討罔偷胡今世兮敵國同舟嗚呼哀哉兮吾誰與謀子夜吳聲歌朱雀街頭雨烏衣巷口風飛來雙燕子不入景陽宫估客行二首發舟石頭城繋舟梅根渚江月夜寥寥照見家人語割裳製家書刺指題日月不知何時到但記今朝發燭龍行燭龍燭龍汝居隂山之隂大漠之野視為晝瞑為夜吸為冬嘘為夏蛇身人面髪如赭銜珠吐光照天下天地寛日月小烏兔盤旋行不了窮隂極漠無昬曉汝代天光補天眇汝乃不知日被黒子遮月為妖蟇食五緯無精光萬象盡奪色下民媕菼皆昏惑燭龍燭龍代天職胡不張爾鬛奮爾翼磨牙礪爪起圖南遍吐神光照南極補缺兔無損傷正畸烏不傾昃妖蟇黒子紛誅殛重光重輪開萬國胡為藏頭縮尾窮隂北坐視乾坤黯然黒乾坤若崩摧吾恐汝龍有神無處匿夏盖山石鼓謡臨平石鼓不自鳴直待蜀桐魚作形陳倉石鼓載文字徒有鼓形無鼓聲夏盖之石或自鳴盖石一鳴三吳兵嗚呼三吳十年厭干櫓不縁夏盖鳴石鼔代魏徴田舍翁詞有序鐵崖楊先生以殺田舍翁為文皇根心語盖徴好直諫忤意者數矣是必有弗堪其直者故怒曰㑹須殺此田舍翁不覺其言之出口也此則是也然謂徴東宫臣節之虧故為太宗所薄而呼為田舍翁者此則非也徴能入夢于太宗而不能自明其事故代田舍翁詞補綴諫録云臣本山東農臣誠田舍翁臣以隋末亂出仕蒲山公蒲山愎諫自用故臣言不用臣計不從百萬糧一日盡百萬衆一夕空力屈事去歸山東臣義不忍棄故土事仇充相隨西來朝真龍先帝不臣識大臣不臣通故臣上書自請安山東山東歸皇圖授臣洗馬之職在東宫東宫多不徳兄弟不相容臣教太子翦黒闥親元戎又教太子除陛下太子不臣庸太子既死先帝命臣聼陛下處分臣安敢效匹夫小諒自與逆黨同陛下以臣盡心所事赦臣死罪除臣祕書登臣政府爵位崇臣於是感激時時進諫開皇衷陛下幸而時聼臣言以致四海太平年榖豐使陛下功徳及堯舜則臣心喜小有過失則臣心忡是以不四年中而有三代風陛下初年誠心聼諫故天耳聰今聼諫不逮昔故天耳聾往以未治為憂故人心恱今以既治為安故威徳隆往日用臣言賜臣以黄金甕天廐驄輟殿材構臣屋與墉今日以人言仆臣墓碑停臣子婚為恵胡不終喜臣則謂臣嫵媚惡臣則詈臣田舍翁陛下不宜以喜怒毁譽損厥躬臣薦侯與杜謂其才略雄臣豈阿黨預知其終凶臣録諫疏草前後三百封欲使後世知陛下能聼諫致時雍豈欲賣直歸過為已功避嫌焚草徒足恭臣幸而身先朝露使臣不幸恐不免隨比干侣龍逢獨不記臣言良與忠胡為乎㑹須殺此田舍翁田舍翁豈畏死但惜陛下既殺張亮又誅劉洎翦刈大臣如刈蓬臣不願陛下祠少牢立仆石但願陛下飬氣質除内訌毋以喜怒存諸胷大臣無災帝徳穹社稷無虞王業鴻千秋萬嵗為唐宗老臣不諱田舍翁於乎老臣不諱田舍翁聖母神皇詞東風未燥昭陵土感業尼稱天下母則天唐室山河忽變周李氏兒郎更姓武洛水泱泱出寳圖黄金爛爛鑄天樞五王不入迎仙院二豎能忘受命符君不見漢家元后號文母廟食從來姪祀姑餞梁王夀春殿延喜樓梁王欲歸天子留樓前百戲俳倡優百官陪宴酬未休梁王上馬樓上頭梁王東歸天子愁天子愁梁王喜鴟梟暗移傳國璽碭山王氣瓏瑽起皇后捧金卮天子歌柳枝家亡國破無多時楊亷夫曰讀此不覺涕泗横流恨不剸刃賊臣以快其心發白馬朝發白馬津暮及陳留縣兵事急星火驛程疾雷電左挾弓右擎箭獨飛一騎報軍書百里王城馳急變丞相鎮静材清談白羽扇天子蔽九重張樂絳宵殿内門三日不得朝咫尺天威意徒戀三十萬衆解兵降錦繡封疆成廣箭明日腥風彍騎來背城借一誰堪戰嬖倖竊魯弓姦諛齎紀甗街璧牽羊事已非束手藩臣忘入援收淚踏邉塵含悲别宫院回首東南漢月髙淅瀝風沙破顔面白草黄雲望莫窮西樓尚隔湯成淀木葉山前下馬時青衣始悟降王賤使者來君不見怯薛行怯薛兒郎年十八手中弓箭無虚發黄昏偷出齊化門大王莊前行劫奪通州到城四十里飛馬歸來門未啟平明立在白玉墀上直不曽違寸晷兩廂巡警不敢疑留守親姪尚書兒官軍但追上馬賊星夜又差都指揮指揮宜少止不用移文捕新李賊魁近在王城裏夜坐吟蜻蜓頭落鐙花黒瓦面寒蟾弄霜色玉壺水動漏聲乾夜冷蓮籌三十刻蓬頭兒子凍磨墨欲拾羇懐㝷不得起看庭樹響風箏斗杓墮地天盤側吕梁洪彭越廟黄河東南奔吕梁屹相向蕭蕭彭王廟淒然據其上空山藐秋色衰草蔚長望荒烟薄殘陽柔櫓破寒浪彭王古壯士志節素豪宕徒成百戰功不獲寸土葬哀哉虎兕軀竟作桮中醬可憐黄金甲采繪泥土像佇想忠壯魂隂風幾悲悵憂來不忍去駐馬更悽愴任城道中客行魯橋道路出毒山驛驅車上峻坂歇馬道傍石雨來松樹暗風起荷葉白一笑歎浮生胡為倦行役冬夜聞雷有感陽氣渙不收棃花開九月無何𤣥冬夜火靈飛列缺疾雷放匉訇大雨久不輟頑雲聚不散滛風赤如血蟲豸不入藏龍蛇競出穴寒威變融煥四序失故節胡為數嵗中雷向盛冬發委靡不執柄遂為羣隂竊及其不可忍奮迅始一決乃於涸寒時䃸磹未肯歇龍戰久不解險難紛糾結既乖長飬意愈使威權䙝天怒不終朝王綱有時裂何能堯吾君調理繼稷契先事誅權姦以次及羣孽假爾霹靂車為吾左黄鉞普天新號令坐使萬國恱煌煌世祖業中道復光烈自臨安往富春過芝泥嶺示隨行李巡檢平明升肩輿相與東西征浮嵐翳逺道宛在雲中行連山互低昻曲折如送迎接天蔽喬木澗與風爭聲前登芝泥嶺雨意漸覺晴曈曨日色薄蕭瑟衣裳輕畏途見鹿角高砦屯鄉兵綵旗病目眩嚴鼔羇魂驚憑軾若夢寐撫􅟆傷浮生顧謂李飛尉我行猶幾程臨安道中先寄賽景初朝入臨安山莫上由拳嶺周道無行蹤晴空斷飛影嚴闗固髙柵疊嶂列危屏荒坰斜日淡虚市野烟冷息肩坐茂樹瞑目發深省何庸一作事馬蹄塵兵鋒迭馳騁秋日山寨校兵呈同列露下草木空四山秋色峻起持餓鴟弓習作長蛇陣旅分貙虎徒翼若鷹隼奮文成牙既禡血祭鼓亦衅日光耀旗影霜威肅兵刃翕張更坐作勇怯失退進徐如磨蟻沿忽若奔馬迅向背月輪偃孤虚斗杓運渭原識諸葛泜水見韓信雖非勍敵遇敢忘出門慎堂堂固其遏整整孰敢近哀哀白骨堆纍纍黄金印縱無東可平豈患西難鎮誰為人中雄往雪天下憤盡取羈縻域帖然作州郡主家貓主家畜一貓文采玳瑁光晨餐溪魚飽午睡花隂凉營營溝中䑕白日亢我牀䑕東貓却西所恨不相當一朝忽相當反為䑕所戕淋漓兩脣紐跼促四足僵呼奴起撃䑕䑕去貓倉惶作炊實貓腹割裳裹貓瘡愛貓心雖仁敗事流毒長所媿主家闇貓駑庸何傷白頭母次徐孟岳韻道旁哀哀白頭母西馬塍上花翁婦數莖短髮不勝簮百結鶉衣常露股自言夫本業種樹一朝棄業從戎伍荷戈南征竟不歸不知被殺還被鹵屈指十年音信斷獨宿孤房誰共語家在錢唐古蕩東門前正壓官橋路却憶夫在種花時春來桃李下成蹊自從夫死花樹折錦繡園林成馬埒縱餘棃杏與梅茶無力入城供富家富家遭兵亦銷歇金錢誰復收名花何况邇來新將相一體好儉不好奢兵餘城市化村塢亂後名園作軍府年年寒食杜鵑啼人家上冢西湖西時光荏苒昜飄忽可憐誰拾花翁骨君不見海棠風楊栁雨牢落錦紋箏凋零金鴈柱黄四孃家客漸稀蛺蝶飛來過牆去為隱師題林若拙畫阿師堂上生雲霧突兀峰巒起縑素𤣥雲靉靆濕丹青積翠斕斑落庭戸漲空嵐起湧波濤噴石寒光飛瀑布鐘昏烟寺僧未歸澗跨板橋人不渡黄茅幾簇尖頭屋緑林一帶無根樹茸茸碧蘚雨乍晴恰恰黄鸝春欲暮新水桃花溪上舟閒亭芳草沙頭路意匠潛移造化機筆端想有神靈助尚書在昔已擅場弟子如今稱獨歩扺須指畫索我題不惜長篇為君賦贈鐫碑王生歌太湖之水通吳淞緑波冷浸青芙蓉巨靈神斧斫不去帝命留與歴代賢聖鐫竒功竒功曠世信希有至徳乃可齊不朽嗟哉王生習此藝功徳不逢長䄂手虞黄歐揭牛毛多筆端佞語如懸河銀鈎鐵畫衒竒麗天下匠石勞礱磨王生手握三寸鋼肥深瘦淺能自量神椎輕重心應手白螙食鐵森成行詞嚴筆勁逼晉漢學士何人美詞翰窅亭五采䕶龜趺峙立通衢人不看人不看恐淚垂晉朝羊公今為誰髙山深水苦自置後世誰人想見之王生王生女當知功徳豈在多文辭君不見延陵季子碑上僅十字千載萬載生光輝青山白雲圖青山青青白雲白一尺小溪千里隔扁舟艤岸不見人雞聲何處秦人宅桃花流水春粼鄰不識人間有戰塵待得紫芝如掌大歸來甘作太平民荅問湖源風土湖源源上路東與浦陽連地勝藏春塢民居小有天秋山紅入畫晴野白浮烟一道桃花水如今泊戰船聞說聞說江城破歸心夢裏驚肺肝從此熱手足近來輕春事愁花朶晨齋怯鼔聲平生慕王猛今日莫談兵聼雪齋萬籟入沉冥坐深牕戸明微于踈竹上時作碎瓊聲撲紙春蟲亂爬沙夜蟹行袁安政無寐欹枕漏三更大都即事二首三月西山道春風平則門繡鞍紅叱撥氊㡌黒昆侖衣襆分香裹壺缾借火温醉歸楊柳月緑霧掩黄昏千歩廊前月朦朧照御街風簷鳴寳鐸雷板耀金牌城影平鋪地樓隂半上階誰家吹短調一夜亂春懐投贈周元帥玉帳臨江近金城鎮海遥鼔聲秋動地劒氣夜衝霄露下星河白風髙草木凋山寒旗獵獵沙静馬蕭蕭左廣初傳駕西船已畏燒五離纔散䑕六博又成梟豪傑乗時奮賢材早見招紫樞虚上座黄闥待清朝㑹見擒姦操歸來醉小喬恩波門外栁長拂富春潮書憤離宫金翠化為烟土宇凋零舊幅員豈是相君酣醉日况逢天子中興年武闗兵馬全無信浯水文章久未鐫白髮詩翁憂帝室長歌泣血拜啼鵑畫扇渴龍飲清江江水皆倒立風雨滿山來石楠半身濕湖上紅杏牆頭粉蝶緑楊牕外黄鸝何處春光最好蹋青人在蘇隄陳秀民五首秀民字庶子温州人徙居嘉興仕張士誠為江浙行中書省參知政事翰林學士有寄亭集詩話庶子僑居于禾朱漢翔篹檇李英華集以其詩壓卷灤陽道中晨出建徳門暮宿居庸闗風鳴何蕭蕭月出何團團短轅駐空野悲笳生夕寒我本吳越人二年客幽燕幽燕非我鄉而復適烏桓前登桑乾嶺西望太行山太行何盤盤欲往愁險艱寓形天壤間忽如水上船役役何所求吾將返林泉送逺曲誰令車有輪去年載客西入秦誰令馬有蹄今年載客過遼西車輪雙馬蹄四念君獨行無近侍婦人由來不下堂側身西望涕沾裳恨不化為雙玉璫終日和鳴在君旁至武岡家居猶旅食兒子復南征婁縣千江隔都梁百日行鴈書天外逺馬角夢中生食禄非吾願何時復舊耕邳州青山一髮見邳州落日雲迷故國愁父老空傳黄石在仙人已伴赤松遊乾坤不信無清氣河水胡為尚濁流野樹昏鴉棲未定數聲哀角起髙樓姑蘇竹枝詞吳門二月柳如眉誰家女兒歌柳枝歌聲嫋嫋嬌無力恰如楊柳好腰肢劉仁本二首仁本字徳𤣥天台人元進士歴官江浙省左右司郎中佐方谷真謀議朱亮祖克温州被獲有羽庭詩藁續蘭亭㑹補參軍劉密詩并序庚子春仁本治師㑹稽之餘姚乃相龍泉之左麓州署之後山得神禹祕圖之處水出巖罅瀦為方沼疏為流泉卉木叢茂行列紫薇間以竹篁仿彿乎蘭亭景狀因作雩詠亭以表之合甌越來㑹之士得四十二人同修禊事取晉人蘭亭㑹圖詩缺不足者各占其次補四五言各一首因曰續蘭亭㑹云陽春沐膏澤草木生㣲暄靈圖發幽祕感此禹迹存衣冠繼芳集臨流引清樽性情聊自適理亂復奚言詩話左司結續蘭亭㑹與者四十二人今名氏未能悉考詩僅存者左司而外都事謝理補晉侍郎謝瑰鄉貢進士趙俶補参軍孔盛蕭山主簿朱右補餘杭令謝滕帥府都事王霖補王獻之蕭山教諭諸絅補府曹勞夷平江儒學正徐昭文補府主簿后緜祕圖隱者鄭彛補山隂令虞國嘉興路經歴張溥補鎮國大將軍掾卞迪天台僧自恱補任城吕系四明僧如阜補任城令吕本東山僧福報補彭城曹諲詩皆醇雅絶類晉人特事在至正庚子後九年始建元洪武諸君惟俶及右仕明故其詩不悉録再往三山去嵗才從上海還今年又復戴南冠榕隂巷陌春風老茘子樓臺宿雨乾幾處舊游重載酒十年往事一憑欄回頭却羨天台道有客吹簫跨玉鸞方行三首行字明敏黄巖人谷真子有東軒集題吳彦嘉所藏張秋蟾龍圖張公畫龍人不識筆法逺自僧繇得挂向髙堂神鬼驚怳忽電光來破壁想當渤海開筆力元氣淋滛浸無極吞吐日月天地昏摩蕩雲雷太隂黒江翻石轉窈莫測雪濤卷空銅柱側洞庭扶桑非爾誰顛倒滄溟為窟宅乃知前圖只數尺坐令萬里起古色何當置我君山湖上之髙峰聼此老翁吹鐵笛楊柳詞二首韶華無限暗中消揺蕩春光幾萬條却怪晚來風定後雪花飛滿赤欄橋曲江南陌亂垂烟勾引春風入管絃惆悵幾株憔悴盡與人長繋别離船明詩綜卷八十七
