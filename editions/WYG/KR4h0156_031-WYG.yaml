body:
  text: 明詩綜巻三十一翰林院檢討朱彛尊編錢福一首福字與謙松江華亭人𢎞治庚戌賜進士第一官翰林修撰有鶴灘集静志居詩話鶴灘吟情以捷敏勝故自觧春雨後凡俚詞儷句動輒歸之此選家皆棄不録也喬希大志其墓曰與謙卒年纔四十有四予與與謙同游邃菴西涯二先生之門與謙甞言作文須昌其氣先使一篇機軸定于胷中然後下筆當沛然莫禦矣又言辭必根據道理雖恒言近事亦不可略然則鶴灘亦不専以捷敏勝人所傅俚詞儷句亦未必皆出其手也少年行荻芽新長河豚肥吳姬作羮俊味稀金陵子弟快一飽挾彈走馬穿花歸靳貴一首貴字充道丹徒人𢎞治庚戌賜進士第三累官太子太保戸部尚書兼武英殿大學士贈太傅諡文僖有戒菴集詩話文僖康陵舊學南廵時臨其喪命詞臣撰祭文皆不稱旨御製一首云朕居東宫先生為傅朕登大寳先生為輔朕今南游先生巳矣嗚呼哀哉代言者歎息歛手晉江何氏輯明文徵以此壓巻焉碧渠為李宗朝賦白雲深處有山荘分得清渠入小塘水靣雨翻菱棄亂門前風過稻花香竹牀不作勞生夢石硯惟鈔種樹方樵子是兄漁是弟卜鄰何計得連牆周澤一首澤字天雨嘉善人𢎞治庚戌進士官贑州同知梅花道人墓古墓牆隂卧斷碑白楊髙樹叫寒鴟閒雲終日自來去不見梅花老畫師方良節一首良節字介卿莆田人𢎞治庚戌進士官至布政使有雪筠集題李在畫烟霏壓翠萬峰低樹樹隂濃路轉迷何處人家春不管落花流出小橋西楊旦一首旦字晉叔建安人𢎞治庚戌進士授吏部主事累官南京吏部尚書有惜隂小稾小圃即事池館圍春曲徑通虚檐掩映緑隂中入門頓覺風光别幾樹桃花隔竹紅祝允明六首允明字希哲長洲人𢎞治壬子舉人除興寧知縣遷應天府通判有祝氏集略又有金縷醉紅窺簾暢哉擲果拂絃王期等集顧華玉云希哲玩世自放憚近禮法之儒學務師古吐辭命意迥絶俗界效齊梁月露之體髙者凌徐庾下亦不失皮陸陸子餘云先生貫綜羣籍稗官雜家幽遐崑璅之言皆入記覽發為詩文横縱開闔茹含古今無所不有頗王元羙云祝希哲如盲賈人張肆有珍玩位置總雜不堪詩話六如居士畫枝指生書允稱絶品至于詩遜昌榖三十籌然如莫食汨羅魚腸中有靈均小山侵竹尾細水䕶松根麥響家家碓茶提處處筐人家低似岸湖水逺于天置之歎歎集中正自難辨和陶飲酒二首大道本一致無間寂與喧每有希夷時不見耳目偏逝水喜東流浮雲忘故山羙人隔秋風渉江恥空還旦暮或遇之荘周有遺言吾足如轉蓬遇風無停時節候迭代序甞與家室辭三歳凡五出别離復在兹行止豈有津誰為我稽疑不若巢中禽乃免霜霰欺天運實為爾通塞任所之愍農大麥青青四尺長大水過頭一尺強安得不託與餦餭無餦餭且自可秧不成苦殺我漢闕漢闕咸陽建山河百二開甘泉芝草出天馬大宛來宣室宵衣問長楊獻賦回寧知天禄閣不用子雲才廣州贈龍鴻臚吉水龍夫子論交嵗月長屢銜天子詔三使日南王欲餽舟無寳留題稾有囊一杯海濵館逺意共茫茫題畫栁風吹水細生鱗山色浮空澹抹銀總道江南風景好從前都讓罱泥人何孟春二首孟春字子元彬州人𢎞治癸丑進士除兵部主事歴郎中出補河南參政入為太僕卿以僉都御史廵撫雲南召為吏部右侍郎以議大禮泣諌左遷南工部右侍郎尋削籍卒諡文簡有燕泉先生集送王伯安南都審刑秋雨彌天來秋風動地發秋官方用權暑氣埽七月四牡復何之時當奉天罸黄紙下青冥欽哉惟帝曰罪毋脫秦黥法勿加楚刖三覆五覆間務使事情核宸衷一寸丹載拜書之笏年來民俗漓肯長其告訐年來吏事冗肯聽其唐突持此直如絃何人行請謁持此平如衡何人得乾没莫将五徳鳳擬以獨擊鶻筆端有造化還解肉冤骨山川幾經歴嵗月去飄忽簿書盈几席肯作塵勞咄夜分燈火孤清興諒難汩檢㸃紀行篇浮踪遍吳越歸朝擬何時欲及衆芳歇民物哀矜餘轉覺心如齕好為萬言書伏奏蒼龍闕洮岷道中景色來西徼蕭條信逺方水分羗部落山絶漢封疆幾處青稞熟深憂白雨傷荒城誰為守十室九逋亡顧清十八首清字士廉松江華亭人𢎞治癸丑進士改庶吉士授編修進侍讀忤劉瑾調南京車駕員外郎瑾誅還侍讀進少詹事引歸為南禮部侍郎進本部尚書致仕諡文僖有東江集孫貞父云文僖吟詠篇章有闗民情世用詩話東江詩法西涯觀其險韻再四疊用足見其能事當日諸公受長沙衣鉢或推方石或稱二泉或首熊峯以鄙見衡之要皆不敵也七月十六日鄉人㑹餞兩新令于寓舎書所感成三十四韻吾邦古壯縣馳望自宋唐勝國登使府因之啓上洋官曹雖日崇阡陌仍故疆宋季巳窮蹙取民猶甚凉報省稅十一萬貫實徵八萬納止三萬餘一壞賈綿州再困朱管張賈買公田加賦後籍沒朱國珍管明朱清張瑄名田按租起稅浸滛到國初乃至十倍強兩稅共一百四十萬浮名累仁政有識空歎傷宣祖痛裁損經綸更文襄民力旣巳紓賦入乃有常公家無闕事帑廩有餘藏後來諸君子率由如舊章至今鄉父老稽首周侍郎周文襄以侍郎廵撫後升尚書而民止呼其故官粤從近嵗來智者好紛更或云時世異古法今難行或云廣儲積典守為民殃墉坊一以決狐鼠恣披攘但見私稅増不聞公廩穰巳已及庚午諸倉惟棟梁茍能實蠲稅猶或幸小康功名掩慈恵白紙栽青桑都将烟水區指作禾黍塲一字挂經費年年理逋亡從此遂困弊蕭然類窮鄉去夏復霖雨湖田盡滄浪監司不肯奏郡邑徙蒼皇荒租二十萬積雪傅嚴霜君子清廟器牛刀試新芒顧此凋瘵餘宜爾勞運量立國自有本為政自有綱不聞慈母子飢寒啼路傍徃迹既非逺後賢慰相望區區閔人窮寝食熱中腸願見徳化成聨飛入明光還将鏤青管濃筆書循良送宗都運之長蘆我家東海居目擊鹺丁苦民勞莫如農衣食自王土輸官贏斗升小大得濡喣溟沙烈萬竈勺合盡官府燎薪與募直一一挂文簿商課或不充輸錢為市補緡鏹非天墜貿易復何所不應為法初乃爾自相牾公私兩煎迫稱貸日旁午窮年困炎歊肉盡繼肝膂坐令兼并徒旦暮收拾伍微文牽積弊魚爛不可舉常思桑孔意寧料遽如許必逢忠愛士重為整機杼宗君滄州行倚任切當宁北南雖殊風物久理同蠱執炎思冷風止亢覬霖雨予言未可窮君行念靡盬程徳望祠部登月亭方塘開我前明月出我東仙人騎鶴來憩我亭之中調笑弄月影徘徊吟天風夜久月漸髙光滿池若空遺我丹桂枝自擕白芙蓉飄然凌風去千里懷徳容飲酒故人飲我酒坐我清湖潯中燕游後園俛首交緑隂側磴度别渚回堂靣長林西日明逺陂流光蕩我襟喟然懐徃哲兹地幾登臨亭臺無遺構風水有餘音想當古人時豈不亦似今運去鳴鳥寂時來蛩蠋吟無為後者惜緑醑方在斟記蝎并序蟲之毒者南方之即且北方之蝎即且能飛見人輒疾走而蝎行甚緩聞人聲反止不動故多爲人得七月廿三夜聞牕間爬沙聲火燭之踞而翹尾卓然可畏乃知其不動者葢将以有為也而蝎止以伺之其甚矣然卒以自斃悲夫讀書心二三耳聞牕蝎走巻紙濡餘膏火起蝎在牖抑首伏不行翹尾若有候人言蝎易得此意殊未究懐毒乃忘身禍起遂莫救栁州憐蝮蛇釋械低予首因詩戒宵人隂賊恒反受張節婦詩節婦京師人錦衣衛指揮僉事讓之女許字華亭張少保鎣子昱昱卒女誓死不嫁妾靣君未識妾心君豈知君死妾獨存誰當知妾悲父母生我時願我有所歸生死向君家終我百嵗期我非慕共姜我非師伯姬自憐有此心不忍分兩岐皇天閔􅑱弱回光照孤闈大字表貞節黄金鑄門楣我女諒非婦拜命慙恩私翻思摧裂初一死真如飴餘生已多祜寧復知此為賢者有備責妾人無悔辭永抱一寸丹千秋從是非放船作時初中鄉舉濳魚不出椮栖鳥不出林不因風雷便豈識天地之大江湖深天風䬃䬃吹黄槐江船擊鼓凌晨開雲帆悠悠渡三泖使我塵襟豁如埽將軍祠前芳草多隂廊古瓦封苔窠英雄恨殺白衣櫓千載此地還來過陳湖北行勢尤大氣象渾疑在天外波光黯慘迷西東我疑此處藏蛟龍同舟之人半失色驚雷歕雪吹腥風出門咫尺巳如此况乃天涯千萬里壬申正月十九日過北野同南村訪北花園廢址明日北野有詩用蘇長公過清虛堂韻走筆奉荅築隄不擬長安沙鳴鼓巳放西曹衙夜游涇南鶴城北隨處幅巾宜㸔花花林髙下映叢冢池臺舊屬淇水家當時笙歌沸鄰里只今古樹啼寒鴉先生讀書洞千古過眼富貴如春葩時人不識競模擬徃徃背癢連衣爬消憂滿貯北海酒破悶亦有南山茶家生小奴解新曲時復羯鼓當軒撾郵筒徃復方此始一唱何止三人嗟詩成揮翰向落日墨光繞筆飛𤣥霞題計郎中汝和墨菊曹汝學家藏郎中畫菊真是菊蒙泉蒲萄太常竹一時能事并馳聲豈直文章難繼續狂揮急掃皆稱意不特品髙機亦熟西涯坐間生色障一見當時巳心服不知何日到君家淨洗朱鉛鬭清淑疎篁古木交映帶深淺生枯俱入態欹風一枝驚欲折倚竹數叢如有待飛鸞墜羽時自壓老蛟蛻骨令人駭張顛草聖久寂寞何意兹晨忽傾葢郎中郎中今有無後來尚逺眼中疎柔肌脆骨爭媚嫵不然蔓草紛黄壚頽波一去誰與返把巻撫玩増長吁君不見近來淮海上亦有菊花一𣲖徃徃傳京都冬至謁陵次三江送行韻初陽映雪暖欲蒸千門瑞氣通諸陵朝廷報本嚴奠埽秩禮逺自前王興秋霜春雨意慘慘奩香篚帛心兢兢髙皇統天祀萬世奮自隴畞揮㦸矜兩都並建始文祖鼎命重為諸孫凝傳聞橋山初啓邑鸞輿玉趾幾降登小臣何幸得將事敢論暑雨仍寒氷經塗百里淨如埽輿夫踴躍誇力勝廻龍小憩纔半道瞬息巳覩洪仁燈入門弛擔随所適東寮西館各有朋山僧頻見頭亦白為我載演牛車乘寒光凌亂入牕戸起視海月摩空升瑶宫銀闕自萬古雖有晦蝕無虧増嫦娥悄立如有恨欲斬桂樹嗟誰能齋居元不礙酬詠公詩險語何層層磨厓擬刻永昭頌挽斷千仞寒谿藤畫馬為内學生題􅆴􅆴嫩緑垂楊短冉冉晴沙御堤軟驊騮行慣穩不驚圉人徐牽不教逺飛黄食料三品豐青絲緑首飄風騣曽見沙場征戰苦方知此物是真龍筠屋為徐庭羙賦徐君愛竹如愛玉種竹成林密如束林間結屋三四楹自說此生心事足䦨干一徑曲復曲落翠飛青暗人目我疑月明深夜中定有青鸞屋頭宿送謝司倉寧知信宜邑乃在古髙州地接朱鳶近天連碧海浮官倉餘火米土俗罷綿裘莫作炎蒸慮男兒重逺遊春日将適郊外忽暴風阻行二月六日天氣惡巻地黑風吹倒人却㸔花栁俱無色忽訝江山不似春髙卧野人滋嬾散欲飛燕子自逡巡東園有約不如意須待來朝理釣綸家僮摘槐芽小奴擕筐緑掩苒斜日歸自東鄰家青精未試仙子訣泠淘的見詩翁誇人間正味竟何在天地育物真無涯紫蓴青荇更不惡髙秋誰泛三江槎題曲水草堂二首曲水村中景最幽也宜杖屨也宜舟白沙翠竹灣灣路楊栁芙蓉歳嵗秋紫蟹行沙菊有霜紅蓮登岸白蓮香何人謾説桃源好便有桃源是異鄉送宋惟徳分教池州池陽風物似長沙第一名山是九華輸與能詩宋文學芙蓉影裏岸烏紗鄭岳八首岳字汝華莆田人𢎞治癸丑進士歴官兵部左侍郎有山齋淨稾謝山子云侍郎深于諷諭之體塞下曲引弓兒騎射奄忽若星馳腥風吹馬來四靣衝我師我師勿輕動持滿以待之佯北勿輕追恐為彼所欺九江阻風泊舟有感白浪起層層峰頭雲正黑廻舟入小港聊兹一憩息路梗難為期滄波浩無極坐觀北來船㠶挂千仞直篙工意閒暇津津動顔色緬懷造化心施予難為力徃船風宜南來船風宜北南北本異途彼此那俱得物理每循環明朝未可測隱几澹無營冥心悟羲易過水口建溪昔隱險横流多怪石參差列牛馬廉利侔劒㦸篙工慣習水禱賽資神力前後互招呼分寸恐或失激盪轟雷鳴沫流飛雪白諦觀毛髪䜿一命試輕擲逶迤過水口灘盡溪流碧櫂歌發清響貰酒娛西夕患至慮煩紆險過事愉懌物理固其然臨流長太息安肅南山有劉伶墓碑鹿車一壺酒荷鍤以自隨云死即我薶曠逹不可羈如何此墟曲有冡髙纍纍刻石紀道旁無乃好事為沈酣弃禮法車服焉得維遭危固有託舉世人莫窺苦節多湮沒怪爾名獨垂秋水歎黄河横溢縣成渠人家半在水中居水邉漁父持空網吁嗟無稻復無魚鄰居相望隔河汜借貸無從飢欲死樓船伐鼓晨夜過怒向縣官索夫米江行即事府江江水惡一嵗九經過近午霧方散中流石更多漁樵荒舊路豺虎據深窩最念沿江戍天寒獨枕戈野望病告捐微禄官閒帶舊衘提攜惟藥裹嬾漫廢書緘海濶浮孤嶼天空桂一㠶吟眸隨處著秋色滿衣衫簡姑蘇陳粹之憲副吳苑鶯花滿舊墟先生翻笑出無車一官棄去還憂國十口飢來只賣書短屐香生莎逕暖疎欄雲傍草堂虛悤悤登拜慙予晚更報詩筒候起居秦金一首金字國聲無錫人𢎞治癸丑進士累官太子太保南京吏部尚書贈少保諡端敏有鳯山詩集落葉半庭黄雜半庭紅萬㸃飛來禁苑東祗愛玉河秋色好不因揺落怨西風吳一鵬六首一鵬字南夫長洲人𢎞治癸丑進士累官太子少保南京吏部尚書贈太子太保諡文端有集詩話尚書名位與原博濟之鼎峙中吳詩雖不敵原博品在濟之伯仲之間原博闢一鶴園于都下中有玉延亭海月菴及以憂去推尚書居焉趙栗夫過之謂其亭曰借玉謂其菴曰借月尚書詩所云乾坤浩蕩誰其主丘壑風流我所私也詩集十巻選家罕有録之者塞上曲去年搜河套今年搜河套河套水草多反以資寇盗歎息漢将軍旌麾幾曽到官軍行團營素操練精銳稱禁軍平時跨鞍馬揚揚氣凌雲山東苦多盗勢将及并汾上怒乃遣将徂征如救焚云何負委託宼至若㒺聞畏縮鮮鬬志久不樹功勲遂令萑苻輩所在皆成羣生能拔牛角古不有孟賁死能鞭荆尸古不有伍員賈勇今巳矣肉食徒紛紛民間且被害敢怒不敢云黷貨殘富室肆滛裂完裙忍以盗攻盗罪惡何區分勸汝早悔過直前破妖氛所貴出死力奏捷慰吾君知足篇戱效樂天我生幸為男魚米况鄉俗恬然熙洽餘蹤跡混樵牧父母教我書早已竊君禄優游翰墨林職業少拘束退朝時閉門爐茗清可掬有書讀幾章有紙揮㡬幅有酒飲幾杯有詞歌㡬曲客來或棊枰家居祗常服且有膝下兒家聲亦能續俯仰天地間我意無不足敢云求大官朱軒映華屋福過災恐生撫已覺顔忸吳江舊遺田聊以具饘粥為賦歸去來奚俟詹尹卜過李海務海國茫茫裏輕㠶整復斜楊花低度水萍葉細黏沙魚米三家市風烟一樹鴉不須嗟落寞吾意本天涯開河阻船慰同行諸君水宿風餐君莫愁他鄉聊復當春游花間啄食鳥紅尾沙上浣衣僧白頭三戸人烟看漠漠百年身世任悠悠關河過此知無礙萬里長風吹客舟查夏重云三四極似子瞻節後見菊重陽巳過十餘日纔見疎籬菊有花厭逐紛華供俗眼獨留冷淡伴詩家清霜數朶水邉淨落日一枝風外斜為汝秋深慰蕭索酒酣聊取插烏紗曹鏷四首鏷字良金吳江人𢎞治癸丑進士改庻吉士授刑部主事進員外郎調東昌府通判遷興化府同知擢湖廣按察司僉事有林歸集蒋慕皆云太史詩不學唐不擬選而寓託深至㢠出意表詩話良金仕未通顯而能力攻中貴人直節不易及歸田之後娛情繪事興到題詩于所居宅後積土為山植桐其上名曰桐丘句如一片酒旗春雨店數聲漁鼓夕陽村鵝翎白綴霜前菊鱣血紅生雨後柑剪紙為屏遮破屋牽蘿補屋透斜曛軒牕影暗梧桐密籬落香飄枳殻開漁鼓喚人敲轉急酒旗招客挂偏髙頗類白石翁楊白花楊白花輕且微春風吹逐何處飛春隂冥濛千萬里花小不愁飛不起重門深鎻寂無人夜永如年月如水山家圖茅屋青山裏居人不務耕雨晴攜短鍤隨處掘黄精秋郊晚眺潮落寒江淺沙陂露水痕漁人歸曬網撾鼓入遥村菊花霜落天涯草木稀疎花秋晚獨芳菲平生不愛杯中物嬾向西風望白衣陸相一首相字良弼餘姚人𢎞治癸丑進士累官長沙知府有吳舫集寳應道中百里平湖水輕㠶次第過魚鰕攢曉市鷗鷺浴寒波霧塔籠鬟髻秋花艶綺羅十年淮海夢愁絶竟如何許天錫一首天錫字啓衷閩縣人𢎞治癸丑進士改庶吉士授吏科給事中歴工科都給事中上疏劾劉瑾為瑾所殺嘉靖中追賜祭葬有黄門稾詩話黄門奉使安南却其贐賦詩云菁茅又喜重包貢薏苡何須滿載歸比歸劉瑾疑其金多不知其不受餽也黄門之死瑾矯詔逮問濳遣人殺之而撰府志者或謂其自經或謂是夜尚草疏皆謬當以世宗實録為正鄭少谷詩云風盤流不見許黄門遺字丹青閣上存却留詩句車驛黄犢青山何處村葢黄門過車盤驛曽題詩壁間有青山對靣疑無路黄犢出林知有村之句為時所稱謝在杭亦有詩紀其事楊白花春宫深深春晝長楊花起舞春雲香隨風忽度江南水蕩漾楊花幾千里楊花流落向天涯宫樹朝鴉復暮鴉杭濟濟字世卿宜興人𢎞治癸丑進士官至布政使有澤西集東溪小隱清溪東畔隠君家幽事人将擬浣花垂栁䕃牆縁岸仄短莎分徑入門斜春風到處隨吟杖秋水閒來放釣槎了却百年終隱計更無飛夢到東華栁枝詞玉溝縈繞水烟涼嫩葉垂垂窣地長百尺宫牆遮不到飛花猶自入昭陽杭淮十四首淮字東卿濟弟𢎞治巳未進士累官南京總督糧儲右副都御史有雙溪集王道思云東卿詩雖體製錯出律調不同而歸之嚴整雅健格髙而意正音舒而節越無嬛媚之習粉澤之餙有前代作者之風俞汝成云孝廟以還李何二公首倡詩學一時揚袂而起者如徐迪功熊士選康對山王浚川輩不啻數十家宜興杭澤西雙溪昆季亦同聲而應者也詩話雙溪詩極其遒鍊如繭絲抽自梭腸似澀而有條理五言尤擅場可亞少谷復送世恩得鳥字朔風吹客衣寒葉辭木杪晨發城東門君馬白騕褭南北紛多岐聚散感鷗鳥蹤跡雖屢違毋使聲聞杳相望江一涯素月出皎皎送劉羙之太守赴銅仁園栁何青青江草萋以碧送子適萬里執手情脈脈嗟彼雲中鴈翺翔依沙磧不為稻粱謀何以有南北努力慎所之悠悠豈終隔早發巢縣暮宿金城寺烟靄市上青霜露草根白日出雞尚鳴墟落溪南北渉野多寒風枯楊何蕭索山川莽迢遞嵗晏道路迫王事苦未休慘澹逾郡國暮逢禪房幽且復舒枕席送王陽明謫官龍塲驛白日野中微浮霾結朝隂送子逺行役躑躅傷我心豈無良朋儔不如子同音寂寞投窮荒誰能念浮沉願為雙玉軫相隨麗瑶琴送徐石東僉憲湖南分題得瀟湘瀟湘他日夢自注石東嘗夢官于此今上合江亭天闊浮吳楚山青入洞庭鷓鴣春渺渺斑竹雨冥冥舟檝雲中見依稀帝子靈西行回度滇池西行苦歴險落日放舟還海草微茫際沙鷗出没間烟青金馬寺天逺碧雞關諸嶺雲端出如看震澤山打牛坪驛諸葛孔明迎春於此亭因卧龍舊猶載打牛坪耕戰紆經略春秋幾送迎野花空晚落蔓草自春生悵望三分蹟流傳後代名山水小畫和韻金碧披毫末江山入座中橋分沙岸水樹繞石林風巳覺滄洲逺還疑𤣥圃通生綃僅盈尺萬里對無窮清平道中亦知春久去花尚滿陵岡小朶穿籬白微風過馬香清平蒙伐罪苗獞識尊王鹽米通吳蜀人今無異方鎮逺喜即舟連山霧不開壑轉一溪廻洶洶奔湍下濛濛細雨來巫山疑有峽灧澦不成堆撇旋㸔舟子乘流亦快哉雨中登樓節序黄梅候朝隂午不開浮雲暗山去急雨灑城來髙艶紅葵濕低翔白鷺迴洗心亭咫尺烟靄擁層臺新正二日發宜春次王陽明韻宜陽山前莎草痕春泥釋釋水流渾客行逺道無停轂人拜新年不出村三日暄蒸北風作清明隂霾江氣昬野館蕭條亦足賴梅花為我招吟魂經盤江次劉元瑞韻踰岡陟嶺兼多病臘盡春來不記程瘴水巳知多客淚窮山只是有人行縁崖晝霧愁俱黑觸馬春花眼一明西蜀未知天下險老夫筋力盡南征王思槐過訪押韻泊船郊扉暑雨清小樓山外恰新成打魚剪韭無他味把酒論文見客情野竹過牆初挺㧞林花照眼更分明新禾滿地農歌起白首對君懐一傾王良佐五首良佐字良弼松江華亭人𢎞治乙夘舉鄉試選靖海教諭遷知廣濟縣有鶴坡集孫貞父云鶴坡雅志髙古庸腐語淘洗殆盡如古仙劍客超脱塵外又云鶴坡抱負自許惜不用于世常有咨嗟慨歎之意其詩超㧞自喜終欠沉實詩話鶴坡與戚韶龍囦張冕一桂同居松江之珠涇咸有詩名孫文定刋三詩翁集行之王作較勝其與儲黄論詩云㡬許門牆黄太史三分局靣鄭都官其實𣲖出石田頗饒清曠之致招張一桂日日草堂江上開竹間亦有小亭臺酒杯欲棄那忍棄吾子不來誰復來案上離騷讀初罷坡頭獨鶴放仍回湖山每索驚人句須得張郎八斗才九日過九江一舟西下繫垂揚忽值黄花夾岸香逢著故人汪太守九江城裏過重陽舟次社公祠前五日雨白馬湖頭三尺潮客子掀篷正無賴隔船何處一聲簫暮渡江沙頭燈火見樓臺黄帽那堪隔岸催舊日風流王博士又吹長笛過江來紅牡亭沉香亭北午風微香霧濛濛燕子飛三十六宫春色好大家齊試絳羅衣明詩綜巻三十一
