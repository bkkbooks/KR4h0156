body:
  text: 明詩綜卷九十五翰林院檢討朱彛尊編朝鮮下林悌一首静志居詩話自悌至李仁老詩見朝鮮采風録其官爵世次未詳姑系於此中和塗中羸驂䭾倦客日暮發黄州可惜踏青節未登浮碧樓佳人金縷曲江水木蘭舟寂寂生陽舘孤燈夜似秋白光勲一首縣津夜泊旅泊依津口重遊屬暮年鐘聲隔岸寺人語渡湖船月上蒹葭逺燈横島嶼連夜深風更急落鴈不成眠崔壽城一首驪江日暮滄江上天寒水自波孤舟宜早泊風浪夜應多趙希逸一首謫中歸心日夜闗以東歸計即今還墮空一年春動萬里外孤山月出千林中愁來但覺此身逺醉後不知吾道窮瓊州雷州何許地古人今人同不同張漢瞻云意致磊落林億齡一首送友還山塵土無憂染素衣蕭條石徑接柴扉飄然又作抽簪計夢逐白鷗江上飛竒邁一首直禁詠懷南山松栢幽北山烟霧深遊子暮何之庭樹生秋隂歸雲度遥峰宿鳥横前林幽懷杳不極清風吹我襟孫愷似云韋栁遺韻金瑬一首寄友楊花落盡草萋萋楚客傷離思轉悽佳節一年寒食過亂山千疊子規啼虞翻去國身全老王粲登樓賦幾題相約天涯回白首昭陽江上夕陽低申欽一首寄友廣陵三月已飛花漢水孤帆落日斜新結茅茨分洞府欲隨麋鹿作生涯平波細雨催耕讀曲水游魚上釣义舉世盡從忙裏過似君行樂獨堪誇權韠一首清明淑氣催花信輕黄著栁絲人烟寒食後鳥語晚晴時老去還多事春來嬾賦詩京華十年夢惆悵只心知趙昱一首贈鑑湖主人十年長掩故山扉塵土東華幾染衣想得鑑湖春夜月子規應喚不如歸李孝則一首烏嶺秋風黄葉落紛紛主屹山髙半沒雲二十四橋嗚咽水一年三度客中聞栁永吉一首福泉寺落葉鳴廊夜雨懸佛燈明滅客無眠仙山一到傷春暮烏帽欺人二十年魚無迹一首逢雪馬上逢飛雪孤城欲閉時漸能消酒力渾欲凍吟髭落日無留景栖禽不定枝灞橋驢背興吾與故人期李嶸一首題僧軸流雲山口草萋萋夜逐香烟到水西醉後髙歌荅明月江花落盡子規啼金宗直一首佛國寺為訪招提境松間紫翠重青山半邊雨落日上方鐘語與居僧軟杯隨古意濃頽然一榻上相對鬢髼鬆李承召一首詠燕畫閣深深簾額低雙飛雙語復雙棲緑楊門巷春風晚青草池塘細雨迷趁蝶有時穿竹塢壘巢終日啄芹泥託身得所誰相侮養子年年羽翼齊鄭碏一首聞笛迢迢沙上人初疑雙白鷺忽聞横笛音寥亮江天暮朴文昌一首題郭山雲興舘畫屏萬頃滄波欲暮天将魚換酒栁橋邊客來問我興亡事笑指蘆花月一船李達一首病中對雨花時人病閉門深强折花枝對酒吟怊悵流光夢中過賞春無復少年心李植一首泊漢江春風急水下輕艭朝發驪陽暮漢江篙子熟眠雙櫓静青山無數過船忩朴瀰一首平壤大同館題壁髙句驪起漢鴻嘉宫殿遺墟草樹遮惆悵乙支文徳死國亡非為後庭花詩話書序賄肅慎之命孔安國傳云海東諸國駒驪扶餘馯貊之屬武王克商皆通道焉按駒驪主朱䝉漢元帝建昭二年始建國號姜克誠一首湖堂早起江日曉未生蒼茫十里霧但聞柔櫓聲不見舟行處鄭之升一首留别細草閒花水上亭緑楊如畫掩春城無人為唱陽闗曲惟有青山送我行姜渾一首贈妓雲鬟梳罷倚髙樓鐵笛横吹玉指柔萬里闗山一輪月數行清淚落伊州金浄一首旅懷江南殘夢晝厭厭愁逐年華日日添鶯燕不來春又去落花微雨下重簾鄭知常一首醉後桃花紅雨鳥喃喃繞屋青山間翠嵐一頂烏紗慵不整醉眠花塢夢江南李仁老一首題杏花鸜鵒圖欲雨未雨春隂垂杏花一枝復兩枝問誰領得春消息惟有鸜之與鵒之李子敏一首子敏未詳何官姚園客云萬厯庚戌仲秋值朝鮮貢使遇人贈髙麗紙扇上題有詩稱辛丑秋東岳李子敏作賀聖節詩九逵初日五雲覃虎拜彤庭百辟參黼黻星辰璇極北梯航玉帛越裳南河清適際千年一嵩壽齊呼萬嵗三遐壤小臣陪舞獸内尊偏倚主恩酣朝鮮主試官一首嘉靖七年朝鮮人遇風飄至南通州被拘于守禦所訊之乃其國主試官有詩詩白浪滔滔上接空布帆十幅不禁風此身若葬江魚腹萬里孤臣一夢中蓀谷集詩五首不詳其名渡清川江安州城外水如天立馬沙頭喚渡船帆帶晚烟依草岸鴈迷殘日下蘆田長塗旅客思歸計向老筋骸憶少年始信在家貧亦好近來雙鬢轉蕭然題清道李家壁南來數月計多違節序如流已授衣旅舎不堪黄葉落暮天遥望白雲飛沙梁鴈下寒江渚門巷烟深苦竹扉唯有同來野僧在病吟相對話西歸客懷此身那復計西東到處悠悠逐轉蓬同舎故人流落後異鄉新嵗亂離中歸鴻影度千峰雪殘角聲飛五夜風惆悵水雲闗外路漸看芳草思無窮贈樂師許憶鳳雙眉覆眼鬢蕭蕭曽捻棃園紫玉簫移向瑶臺彈一曲曲終垂淚說先朝悼亡妝奩蟲網鏡生塵門掩桃花寂寞春依舊小樓明月在不知誰是卷簾人梅月堂詩一首和鍾靈山居詩蛺蝶雙雙舞藥畦薔薇架架采登梯一叢枸杞花初徧五椏人葠葉已齊翠竹林中香麝睡紫荆枝上畫眉啼千峰昨夜疎疎雨不分南池漲入溪洛師浪客一首安定館北驛四月闗門路風沙氣慘悽河邊春鴈盡林外曉鶯啼去國魂長往思家意轉迷羸驂經左道今日向安西無名氏一首沈駙馬碧波亭貴主華亭入翠微碧牕朱栱有光輝春來波暖魚龍出夜久星疎烏鵲飛海上乘查時貫月江邊積石舊支機當筵勸酒先投轄不醉應知客不歸月山大君婷一首詩話婷詩一首見吳子魚朝鮮詩選近有人云應是朝鮮女子按說文廣韻均不載有婷字惟玉篇有之注徒寧切和色也樂府詩集漢辛延年羽林郎篇不意金吾子娉婷過我廬娉婷字並用始此江南弄和云陽春路娉婷出綺羅喬知之詩明珠十斛買娉婷杜甫詩不嫁惜娉婷劉長卿不知娉婷色回照今何似韓愈詩砧影伴娉婷白居易詩明妃風貌最娉婷李商隠詩娉婷小苑中羅虬詩大都相似更娉婷則唐人固相沿用之載考丁度集韻娗或作婷可補廣韻之闕采風集收婷詩婷上冠以月山大君字當是東國尊稱殆非民間女子也古寺㝷花春深古寺燕飛飛深院重門客到稀我正㝷花花盡落㝷花翻為惜花歸成氏一首竹枝辭瀼東瀼西春水長郎舟已去向瞿塘巴江峽裏啼猿苦不到三聲已斷腸俞汝舟妻一首别贈恨别逾三嵗衣裘獨禦冬秋風吹短鬢寒鏡入衰容旅夢風塵際離愁闗塞重徘徊思逺近流歎滿房櫳趙瑗妾李氏二首詩話瑗官學士承㫖死倭亂妾李自號玉峰主人詩如兩兩鸕鷀失舊磯銜魚飛入菰蒲去是亦其佳句也采蓮曲南湖采蓮女日日南湖歸盪槳嬌無力水濺越羅衣無心却回櫂貪看鴛鴦飛自適虚檐殘漏雨纎纎枕簟輕寒曉漸添花落後庭春睡美呢喃燕子要開簾許景樊五首景樊字蘭雪篈筠之妹適進士金成立後成立殉國難遂為女道士有集陳卧子云許氏學李氏而合作有盛唐之風外藩女子能爾可見本朝文教之逺詩話明閨秀詩類多偽作轉相附㑹久假不歸如今日相逢白司馬樽前重與訴琵琶吳中范昌朝題老伎卷也詩載皇明珠玉而謬云鐵氏二女寒氣逼人眠不得鐘聲催月下迴廊三泉王佐宫詞也詩載石倉詩選而假稱宫人媚蘭泉流不歸山羅文毅作而謂甄節婦詩誰言妾有夫髙侍郎作而謂章恭毅母他若忽聞天外玉簫聲寧獻王權之詠權妃即指為權貴妃作風吹金鎖夜聲多羅翰林璟之詠秋怨遂誣為王荘妃詞甚至析情字為小青弔青冢者過孤山而流連託聨句於薛濤刻濤集者綴卷尾而剞劂助談小說貽笑通人吾於許景樊之詩見其篇章句法宛然嘉靖七子之體裁未應風教之訖符合如是不能無贗鼎之疑也望仙謡王喬招我游期我崑崙墟朝登𤣥圃峰遥望紫雲車雲車何煌煌𤣥圃路茫茫倏忽凌天漢翻飛向扶桑扶桑幾千里風波路阻長吾欲舎此去佳期安可忘君心知何許賤妾徒悲傷次伯兄髙原望髙臺韻層臺一柱壓嵯峨西北浮雲入塞多鐵峽霸圖龍已去穆陵秋色鴈初過山迴大陸吞三郡水割平原納九河萬里登臨愁日暮醉憑青嶂獨悲歌次仲兄筠髙原望髙臺韻崔嵬雲棧接青霄峰勢侵天作漢標山脈北臨三水絶地形西壓兩河遥烟塵暮卷孤城出苜蓿秋深萬馬驕東望塞垣鼙鼓急幾時重起霍嫖姚效崔國輔妾有黄金釵嫁時為首飾今日贈君行千里長相憶雜詩精金明月珠贈君為雜佩不惜棄道旁莫結新人帶安南詩話安南曽為郡縣漸文治者深而其國人詩選家多置不録予從李文鳳越嶠集擇其詞旨馴雅者著於篇國王黎灝一首灝一名思誠天順四年國人所立卒私諡淳皇帝僭號聖宗送錢學士溥歸朝五嶺天髙瘴霧開詔書飛下越王臺萬年重紀黄龍瑞九譯争看白雉來曉日珠厓標柱在秋風銀漢使查回吾君若問交南事久已傾心仰上台黎景徽一首景徽文職大頭目僭左僕射奉贈錢學士紫殿承恩入夢頻歸鞭裊裊向天津赬袍色映千山曉玉節光回萬井春五嶺風輕金勒緩三湘月白錦帆新夜䦨宣室如前席為道交南共帝臣阮直一首直爵里未詳送錢學士歸朝曉日初開瘴霧空歸程馬首正秋風知音豈限珠厓北惜别那禁珥水東上國有人還獻納遐方無事賴帡幪他年兩地如相憶萬里懸情寄塞鴻黄清一首清僭吏曹侍郎送錢學士還朝公望端堪邁俊豪逺持使節効賢勞九霄日月瞻依近萬里江山興詠髙别酒頻斟情戀戀歸心莫遏水滔滔自從回首天南後幾度懷人正鬱陶黎念一首念大頭目送湛内翰還朝綸音讀罷紫泥封回首蓬萊第一峰望外交闗千里月夢中帝闕五更鐘星查迢遞歸程逺雲樹參差别思濃南浦吟成憑寄語滔滔江漢共朝宗阮澤民一首澤民爵里未詳送湛内翰還朝目送星軺萬里旋那堪惜别思淒然交闗此日分岐後南北春風共一天安南使臣一首題南康縣南野鼓報黄昏各泊船咿咿軋軋櫓聲連一雙鳬鴈滄江外幾箇人家楊栁邊紅日落殘鈎挂月白雲卷盡鏡磨天安南萬里朝天客暫借郵亭一夕眠占城貢使二首進貢初發占城行盡河橋栁色邊片帆髙挂逺朝天未行先識歸心早應是燕山有杜鵑江樓留别青嶂俯樓樓俯渡逺人送客此經過西風揚子江邊栁落葉不如離思多詩話近峰聞略載占城使臣寓蘇州之天王堂問葵花何名人紿之曰一丈花也即題詩曰花於木槿渾相似葉比芙蓉只一般五尺䦨干遮不住獨留一半與人看按此乃寳應陶成題李西涯舘中葵花之作日本嗐哩嘛哈或作荅黒麻一首詩話髙帝惡倭不恭示以欲征之意日本進表辭頗不遜命嗐哩嘛哈上表帝問其風俗荅五言詩既而絶其貢考日本疆域時拓地八道六十六州六百一十三郡八十二浦宜其不知漢大而云國比中原國也若其人多壽就國王論如神武天皇一百二十七嵗孝昭天皇一百十八嵗孝安天皇一百三十七嵗孝靈天皇一百十五嵗孝元天皇一百十七嵗開化天皇一百十五嵗崇仁天皇一百二十嵗垂仁天皇一百四十嵗景行天皇一百有六嵗成務天皇一百有七嵗神功天皇百嵗應神天皇仁徳天皇俱百有十嵗雄略天皇百有四嵗降年之永中土所希所云人同上古人言雖大而非夸矣惟是國俗無冠國王但著烏帽直而頂圓銳髙半尺以綃為之男女笠用蒲或竹或椙木謂為唐制度夫豈其然至若天皇之子娶於其族夫死妻立兄死妹立子死母立何禮之有明祖絶其貢使不亦宜乎荅大明皇帝問日本風俗國比中原國人同上古人衣冠唐制度禮樂漢君臣銀甕篘清酒金刀鱠紫鱗年年二三月桃李自陽春普福一首宣徳七年倭船入貢凡九艘其使普福迷失於樂縣沙嵩藤嶺獲解被獲歎懷來游上國看中原細嚼青松咽冷泉慈母在堂年八十孤兒為客路三千心依北闕浮雲外身在西山返照邊處處朱門花栁巷不知歸日是何年中心叟一首叟日本使臣弔郭璞墓遺音寂寂鎖龍門此日青囊竟不聞水厎有天行日月墓前無地拜兒孫秋風野寺施香飯夜月漁燈照斷魂我有誄歌招不返停船空見白鷗羣詩話葬師言禍福多本於景純之經然試與百人分謀之無一人同者所云龍穴砂水向背如枘鑿齟齬之不相入其說業已難擇加以日者配以年神方煞吉神祗百二十凶神倍之規避實難以是不克葬者多矣世傳景純墓在金山足過於詭竒沈啓南詩氣散風衝豈可居先生埋骨理何如日中數莫逃兵解世上人猶信葬書如叩晨鐘寐者可以發深省矣中心叟墓前無地拜兒孫一語亦足發笑詩載廬陵胡經用甫金山志志成於正徳辛巳文待詔徴仲序之無名氏一首春雪昨夜東風換北風釀成春雪滿長空棃花樹上白添白杏子枝頭紅不紅鶯問幾時能出谷燕愁何日得泥融寒氷鎖却秋千架路阻行人去不通釋天祥三首寄南珍上人居處僻心與石泉清道在從違俗身閒不用名空階松子落雨徑蘚花生怪得稀相見年來懶到城長安春日何事長安客春來思易迷樂游原上草無日不萋萋榆城聽角十年游子在天涯一夜秋風又憶家恨殺葉榆城上角曉來吹入小梅花釋機先二首送别天書召賈生匹馬出滇城白首相逢處青雲送别情山經巫峽盡水到楚江平好獻治安策殷勤荅聖明挽逯光古先生昨日來過我今朝去哭君那堪談笑際便作死生分曠達陶徴士蕭條鄭廣文猶憐埋骨處西北有孤雲明詩綜卷九十五
