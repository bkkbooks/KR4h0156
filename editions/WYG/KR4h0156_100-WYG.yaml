body:
  text: 明詩綜卷一百翰林院檢討朱彞尊編静志居詩話昔漢孝武立樂府采歌謡班孟堅謂代趙之謳秦楚之風皆感於哀樂縁事而發可以觀風俗知厚薄故郭茂倩編樂府詩集雜謡歌辭包括無遺余特仿其例摭采附於卷末惟夫童謡輿誦及田家雜占未甞師法古人出於天地自然之音世治之汙隆人材之邪正莫不一本好惡之公所謂詩可以觀者是已繹逐燕之旨知革除本自皇衷諷雨帝之言信奪門元非人事茍察於耳介葛盧之於牛亓師翁偉之於馬公冶長之於鳥猶将欣然遇之載諸篇籍矧無戾於春女之思秋士之悲者乎年來史局雖開汗青無日留此以俟撰五行志循吏傳者采擇焉劉侯歌永樂中山陽劉安知南宫縣勤於撫字境内旱蝗率吏民捕禱蝗亦頓絶是嵗鄰邑皆饑惟南宫大稔民歌曰侯宰南宫民和政通蝗不入境今之魯恭何鐵面永樂中仁和何澦官刑曹郎持法不避貴勢京師語曰毋縱誕避何鐵面京師語頴上李芳中永樂中進士任刑科給事中執法不撓忤權倖謫海鹽丞棄官居家宣宗甞顧問曰李芳何在近倖畏其剛直多沮之京師為之語曰永樂紀綱宣徳李芳京師語正統戊辰京師語云云是年安福彭時殿試賜第一甲第一名莫問知不知狀元是彭時京師童謡正統中京師羣兒連臂呼于塗曰正月裏狼來齩猪未一兒應曰未也循是至八月則應曰來矣來矣皆散走時方旱又有羣兒歌於塗云云既而有狼山之難雨帝雨帝城隍土地雨若再來還我土地京闈語景泰癸酉廬陵羅崇嶽舉順天鄉試第一以詭籍斥還後三年大學士陳循子瑛王文子倫入試皆不得舉有旨特賜舉人時人語曰榜有姓名還是學生榜無名氏京闈貢士翰林語茶陵李東陽等為翰林長而王九思等為檢討時人語云上有三老下有三討京都語成化中光州熊翀官兵部侍郎時馬闕為尚書而侍郎有左熊右熊京師語云兩熊一馬太平天下京師語𢎞治中鍾祥沈文華為刑部員外郎事多平反京師語云有事勿忙須問沈郎京都語麥公牢子崔公馬髙公銀子當塼瓦都下諺吏科官戸科飯刑科紙工科炭兵科皂𨽻禮科看安州語蘇州張寅仲明中正徳辛巳進士知安州浚牙家港築隄暇則與士子講學時孔天𦙍知祁州亦以才見重時人語曰有所疑問安祁莫憂竦有張孔京師語嘉靖五年天台起復知縣潘淵進嘉靖龍飛頌效蘇蕙織錦圖帝以其文縱横莫辨使開寫正文以進是時請建世室者有監生王淵進世廟頌擢上林監丞京師語曰兩淵口濶如斗笑殺張蘿峰引出一羣狗疫無鬼容城楊繼盛少時讀書僧寺時僧多病疫同舎生咸亡去繼盛為調藥餌僧以次愈時人異之語云疫無鬼以為不信視楊子都中歌嘉靖中土木繁興一時工曹驟増數員都中歌曰馬頭雙馬後方督工郎束鹿語濮州蘇祐補束鹿知縣邑多囚繋下車一日釋數百人明日革罷徭車三十兩又明日有詔召束鹿令邑人語曰三日官府百年父母翰林語京山李維楨在翰林博聞强記與新安許國齊稱同舘語云記不得問老許作不得問小李得山禽萬厯中合肥黄道月好挾少年岸幘衣半臂紫袷坐驄馬挾彈游西山時人從之語云得山禽從舎人燕人諺過了八達嶺征衣添一領北地諺駱駝見栁渴羌見酒冨林語華亭曹時中與兄泰隠冨林以詞翰自老時人語云冨林二曹一時人豪道士歌建文中京師有道士歌于塗云云莫逐燕逐燕起髙飛髙飛上帝畿况太守歌宣徳中况鍾知蘇州府稱治最秩滿去民叩闕留者八萬人吳人歌曰况太守民父母早歸來樂田叟興化謡蒲政四川舉人正統六年任揚州興化主簿寛恕亷靖民謡云蒲政打蒲鞭青布縁了邊九年三考滿不要一文錢江隂歌天順中昌黎周斌以御史論劾曹石謫知江隂縣士民愛戴之歌曰旱為災我公禱甘雨來水為患我公禱隂雲散淮上歌瀋陽范鏓中正徳丁丑進士歴官兩淮運使盡革夙弊遷四川參政以去商民立祠淮水上為之歌曰范來早商民飽范來遲商民饑興化民歌嘉興孫璽知揚州興化縣事有土豪徐恩入貲為千戸交結權貴横行鄉曲璽以法殺之民歌曰彼惡人兮虎翼而飛惡人既殺兮公瘠我肥嘉靖中童謡二首賣槍纓人上城茄頭下人走馬留都語扶溝劉自强嘉靖中官應天府尹㝷轉都察院右都御史進戸部尚書再改兵部居官峻法一尚書囑以事怒曰贓吏敢爾邪起奮拳仆其隸人留都為之語曰尚書贓輿臺僵矯矯劉公洵自强吳下語吳人皇甫沖兄弟四人並有盛名既而張鳳翼兄弟三人亦有名於時吳下語云前有四皇後有三張吳人語長洲文震孟性孝友居翰苑未踰年罷官家居吳人語曰求忠臣須孝子翳為誰文文起興化歌廬陵陸某知揚州興化縣事将入覲報政民歌之曰昔來何遲今去何速恵我弗終昭陽之陸涇縣歌嘉興髙承埏知涇縣将去民歌之曰眄公車來何暮計公程去何處公内召我何之急攀轅告上司上司揚言不可止入都門見天子如臯謡長山王㞳生中崇禎庚辰進士知揚州如臯縣事性愛畜蝶民有罪當笞者輸蝶得免羅致千百召客飲縱之以為樂邑人語曰隋堤螢火輟縣官放蝴蝶江南諺江南田家占雨諺曰甲申尤自可乙酉怕殺我按二語宋時即有之見范石湖詩注而江南至今傳之却成亡國之讖南京諺福藩稱制江南馬士英阮大鋮等用事一時倖進者衆南京為之語曰職方賤如狗都督滿街走南京童謡一匹馬走天下騎馬誰大耳兒詩話指士英阮大鋮也時又有對聨云闖賊無門匹馬横行天下元凶有耳一兀坐擾中原南京童謡楊栁青放風筝吳諺二首官粻辦便無飯南道如虎升官半府吳中諺六首有利無利但看二月十二花朝日晴則百果多實三月溝厎白莎草變成麥三月無雨麥乃有收六月不熱五穀不結秋孛鹿損萬斛立秋日不宜雷若要麥見三白冬至逢第三戌為臘臘前雪三次謂曰三白大宜菜麥除夜犬不吠新年無疫厲除夜宜静常州語江隂莫動手無錫莫開口江隂人拳勇無錫人善歌恵山謡恵山街一名綺塍街夾路古藤喬木謡云恵山街五里長踏花歸鞵厎香解州歌永樂中浮梁吳恵知解州民歌曰吳父母恩何溥昔憔悴今鼓舞山西謡正徳中歴城徐暹為山西副使時有巨冦號混天王劫掠郡縣暹以計平之民乃語曰不發一矢賊乃盡死不荷厥戈賊死實多吳公謡二首吳江吳山為山東副使獄無滯囚時有塞井復渫民為謡云云既而遷福建按察使聽訟明允民又謡云云彼泥者泉弗浚而復錫我則福鳳之棲其雛來儀民具是依諸城縣漢王山西南五里有卷簾荘雖嚴冬無霜降邑人諺云卷簾荘秋冬不下霜徳州諺徳州苦水鋪土人素狡諺云苦水鋪神仙過留筒布山東謡霑化李魯生日照李蕃天啓中交結奄宦以鬻爵為事青兖間謡云云後魏璫敗魯生蕃俱以太僕少卿擬徒若要起問二李通許諺通許婁良與同郡賈恪齊名兩人皆中正統進士邑人諺曰婁良賈恪氣如山嶽太康謡博興韓珝令太康多異政蝗不入境民謡曰欲蝗不復墮須是韓公過欲蝗不為災須是韓公來禹州歌上海潘恩知禹州州人語曰莫相仇避潘侯郭公讖嘉靖元年河南巡撫何天衢命百戸亓修月堤發一古冢塼上朱書云云塼空其中人以為琴几詩話崇禎中帝製於變時雍琴曲曽取此塼入禁郭公塼郭公墓郭公逢著亓百戸巡撫差爾修月隄臨時讓我三五歩慶陽軍中語洪武初張良臣復據晉陽以叛其兵精悍養子七人咸善戰軍中語曰不畏金牌張但畏七條鎗臨洮歌潞城劉昭宣徳中為臨洮尹多仁政民歌曰野有流民惟侯集之邑有田疇惟侯闢之古人謹獄惟侯哀之有此三恵孰不懷之塘下童謡台州太平縣塘下戴某與方谷真婚戴氏将敗童謡云云及洪武末戴氏竟籍沒惟二女出嫁存焉塘下戴好種菜菜開花好種茶茶結子好種柿柿蔕烏摘了大姑摘小姑羅太守歌桂陽羅以禮永樂中守紹興寛猛得宜遇雨𤾉不時往禱輒應民歌曰太守羅以禮祈晴得晴祈雨得雨二洪歌莆田洪楷從子珠後先知紹興府崇尚名教人歌之曰大洪小洪先後同風湯太守歌安岳湯紹恩為紹興守瀕海潮至渰沒田舎紹恩為築隄建閘以時蓄洩闢田數千畝越人歌之曰泰山巔髙於天長江水清見厎功名如山水萬古留青史越人語長清李僑嘉靖中知紹興府多恵政時知山隂縣事李某不得於民每出則以兩鐵索前導而僑必懸兩爐焚香越人語曰府香爐縣鐵索一為善一為惡平湖諺平湖俞瓛字廷貴有行誼熊卓知縣事引與計事行之民輒曰神明或干以私遂謝弗與通里人諺曰郭東俞生當春握氷嘉興語金溪洪範知嘉興縣事承知府楊繼宗之後亷静寡欲士民語云洪令楊守承前啓後童謡貍貍斑斑跳過南山南山北斗獵迴界口界口北面二十弓箭詩話此予童穉日偕閭巷小兒聨臂蹋足而歌者不詳何義亦未有驗饒州歌二首陶安知饒州當入覲民為之歌云云既而復命守州事載歌云云千里榛蕪侯來之初萬姓耕闢侯去之日湖水滺滺侯澤之流湖水有塞我思侯徳賈推官謡嶧縣賈訪𢎞治中為建昌推官大璫至廷辱郡守以下官訪獨與抗禮民謡云知府一堆泥同知一凷土若非賈推官壞了建昌府南豐歌通州馮堅洪武中為南豐典史一作南豐知縣海陽戴瑀政平訟理民懷其徳歌曰山市晴山鳥鳴商旅行農夫耕老瓦盆中冽酒盈呼嚻隳突不聞聲南豐歌建徳陳勉景泰中為南豐知縣百廢具舉民歌之云大尹陳政事新男耕女織歌陽春江西謡𢎞治中吳江王哲巡按江西有威名民為謡曰江西有一哲六月飛霜雪天下有十哲太平無休歇安仁語南海洗光正徳中知安仁縣能辨疑獄百姓語曰民無冤訟有洗燈籠訟無滯屈有洗三日九江語萬衣為南京刑部主事頻夢其父心動請急歸抵家九日父沒里人為之語曰萬孝子生知死建昌民謡晉江吳夢相為建昌府推官遷南京大理評事時人語曰吳公吳公行李皆空公道服人私情不通浮梁謡浮梁人吳十九善製磁器士大夫多與之游時人語云成窯太薄永窯厚天下馳名吳十九萬安上灘諺一灘髙一丈南安在天上萬載諺萬載翟昌甫家貧樂道好讀書春夏移書於佛塔秋冬樓居里人諺云云後以人才舉為郎春夏塔秋冬樓風吹四面揺昌甫獨不憂童謡蒲圻陳文禮字貴和洪武三年由貢生授監察御史有冤獄久不決童謡云云文禮悟曰罪人必康七也果如其言斗穀三升米說與陳文禮王捕虎歌清苑王哲為湖廣布政使亷正彦明人不敢干以私歌之曰王捕虎最執古囊無錢衣有補漢陽民歌廣州何澹字中美以天順中進士知漢陽府民歌之曰何太守築漢陂飢得食寒得衣陸青天謡嘉善陸垹知武昌府郡人謡曰陸青天勝明月青天無不青明月有時缺辰州苖民語不畏官軍但畏粻屯沈融谷云苖民負固恃有千萬山峒軍退則突出軍至則潛藏惟官軍糧多築長圍困之其所畏也辰州田家諺二首四月八日晴魚兒上髙坪十日雨連連髙山也是田詩話廣信府志亦載此語蜀人語安陽崔陞任四川參政與僉事曲銳並有威名蜀人語曰崔參曲僉屹如雪山崇慶諺崇慶俗尚浮屠萬輔居䘮獨遵家禮鄉人化之諺曰萬輔一呼䘮禮皆儒蜀中謡蜀冦黄中據支羅砦與牛欄坪相望里許萬山斗絶目為天城謡云打得支羅砦金珠滿船載打得牛欄坪換箇成都城播州語楊友與楊愛兄弟相仇兩州為之不寧土人語云骨肉臡醢參商播凱萬厯二十七年播酋叛勢甚張十月鄉人譚經歴恕避兵深巖忽聞石裂有文在石上云云巡撫郭子章鏤板以傳賊中明年賊果滅聚山巖人化血石壁壞諸蠻絶蜀諺􅗷澦冒頂黒石下井恵安語洪武中三河安景賢知恵安縣事民頌之曰安公莅止視民如子興化謡正徳中進士岳池馮馴守興化民謡曰馮太守來何遲胥吏瘠百姓肥閩中語布衣髙瀔傅汝舟從鄭善夫游學為詩閩人為之語曰髙垂股傅脫粟言齗齗中歌曲葉君歌隆慶中歸善葉春及知恵安縣民愛之如慈父歌之曰葉君為政惟飲吾水設施不煩五風十雨福建語㑹稽商為正萬厯初巡按福建與巡撫都御史龎尚鵬協心共事百廢具興福建語云恤我甘苦龎父商母閩中謡嘉興譚昌言為福建提學人有投私書者槩不發試竣題數行裹原書復之閩人語云來一封去兩封以為不信視郵筒吳公歌崇禎中新安吳彦芳為莆田令有恵政秩滿去新縣令催科嚴民乃思吳公歌曰陽春何去霰雪何來父邪母邪翳惟我懷武夷諺一曲一灣一灣一灘泉州語洛陽橋一望四里皆琨瑤莆田諺橘子黄醫師藏順徳謡二首嘉靖初餘姚金蕃知順徳縣初政尚嚴民謡云云比及朞豪强斂獄訟減民復謡云云朝鰓鰓毛厥施乎夕掝掝石厥畫乎勞乎勞乎盍燕以敖乎華蓋之屹屹不如尹之無泐碧鑑之粼粼不如尹之無津長我禾黍穀我士女吁嗟乎膏雨順徳謡徳清胡友信宰順徳邑多盜懼民輕法頗尚猛厲凡獲賊腊其鼻或投諸淵聞者震驚謡曰山有虎邑有胡無捋其鬚恵州歌福州鄭天佐為恵州通判善折獄民歌之曰縣遲延府一年但愬鄭青天訟無滯民不冤髙州歌開縣嚴琥同知髙州府時大饑琥捐俸以賑民歌曰治我嚴父生我慈母雷州歌永樂中天台黄敬知雷州府先是郡多囚繋敬至數日悉為剖决獄盡空民歌之曰黄公來遲使我無依今公莅政恵我無私瓊州民謡瓊州蠻黎岐習馳射自稱神弓萬厯十四年為官兵所敗請降民謡云弛神弓來歸降儋州諺儋俗事神有上帝㑹天妃㑹鄧天君㑹羊元帥㑹鑾輿五采迎神十百大饗于村中景泰天順間諺云栁英有銀兒子跳神洪全有金阿母賣鍼廣東諺飢食荔支飽食黄皮蛇珠千枚不及玫瑰潿蚌之胎有玫瑰文魮之腹有美玉文魮鳴美玉生多食馬蘭少食芥藍廣州諺七首爾有垣墻我有火秧嬰兒瘦探石鷇家有竹雞啼白蟻化作泥秋冬食麞春夏食羊朝為泡魚暮為蒿豬霜蟹雪螺味不在多石灣瓦勝天下粤諺韶州水急至險者為牯牛灘舟子語云行過牯牛五石灘寄書歸去報平安過得牯牛舟子白頭大廟峽歌清溪濛裏二驛名路多虎早眠宴起肇慶府謡二首西水自廣西來每嵗夏至後淫雨暴漲諺云水浸釣魚臺上下不得來釣魚臺峽中山名西水漫漫魚蟹滿盤瓊州諺二首瓊州以海水占年海水熱則荒諺曰海水熱穀不結海水凉禾登場海南多陽一木五香瓊州諺瓊州東界地瘠以羊骨壅田終無穫腴壤多在西故諺云東路㯽榔西路米粻猺人謡羅旁猺九星巖有石其厎空洞撞之淵淵作鼓聲每出劫人撃之以為號其謡云撞石鼓萬家為我虜粤西諺思播田揚兩廣岑黄言宣慰氏族之大也花瓦謡田州女土官瓦氏嘉靖十四年調之征倭至蘇州索有司捕蛇為軍中食敗倭於王江涇時人語云花瓦家能殺倭腊而啖之有如蛇華林謡江西華林洞賊反檄田州土官岑猛征之猛兵沿塗剽掠民皆徙村避之謡云華林賊來亦得土兵來死不測藤峽謡自藤峽徑府江三百餘里諸蠻互為死黨出刧商船得人則刳其腹投之江中峽人謡云盎有一斗米莫泝藤峽水囊有一百錢莫上府江船永通峽謡藤峽平後正徳間遺孽漸蔓峽南尤甚横江禦人莫可禁制都御史陳金以諸蠻所嗜魚鹽乃令商船度峽者以此委之道稍通金疏其事請名永通峽詔從之未幾諸蠻征索無厭稍不愜意輒掠殺之潯人謡云昔永通今求通求不得葬江中誰其作始噫陳公妖巫歌金陵初建滇南段寳遣其叔真自㑹川奉表歸款朝廷亦以書報之時有妖巫女歌云莫道君為山海主山海笑諧諧園中花謝千萬朶别有明主來永寧語雲南永寧蠻塞矢不刺非於宣徳四年糾合四川鹽井衛土官馬刺非殺永寧土知府各吉八合已命卜徹襲職矢不刺非復殺之永寧人語云土官數竒逢兩刺非曲靖歌成化中灌縣焦韶知曲靖府境産瑞禾民歌曰禾本二穂嘉穀滿田太守焦公仁徳及天楚雄歌先大父君籲府君諱大競吳江潘耒填諱知楚雄府政尚亷静甫半載丁内艱幾不能治装歸郡人歌曰清貧太守一世難百鳥有鳳鳳有鸞滇中諺山蠻不落葉地蠻湯自熱貴州謡鄰水楊純以監察御史按貴州任滿百姓乞留一年詔許之民乃謡曰鄰水楊但願年年巡貴陽貴州宣慰司居水西曰烏蠻為烏羅羅居慕役曰白蠻曰白羅羅諺云云言至死猶鬭也水西羅鬼斷頭掉尾貴州諺黄平鐵興隆雪苖人謡苖家讎九世休黔中諺三首天無三日晴地無三尺平四月八凍殺鴨九月重陽移火進房陳父歌印江陳表知廣元縣事與利州衛雜處軍强民弱表申明制度以服武弁民歌曰古來力役軍三民七陳父定之彼此畫一家用平康勞者獲息翰林諺翰林九年就熱去寒蘭江諺金家梁舊酒香明詩綜卷一百
