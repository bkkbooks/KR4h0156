body:
  text: 明詩綜巻二翰林院檢討朱彛尊編周定王橚六首王髙皇帝第五子洪武三年封吳十一年改封周洪熙年薨著元宫詞一巻靜志居詩話元宫詞百首宛平劉效祖序稱周恭王所撰固為繆矣列朝詩集作周憲王亦非也其自序云元起沙漠其宫庭事蹟無足觀者然要知一代之事以紀其實亦可備史氏之采擇焉永樂元年欽賜予家一老嫗年七十矣迺元后之乳姆女常居宮中知元舊事間嘗訪之備陳其事故予詩百篇皆元宫中實事亦有史未曽載外人不得而知者遺之後人以廣多聞焉末書永樂四年春二月朔日蘭雪軒製按序所云元宮詞當是定王作考定王以洪武十四年之國至洪熙元年薨序題永樂四年則為定王無疑矣元宫詞六首大安樓閣聳雲霄列坐三宫御早朝政是太平無事日九重深處奏簫韶玉京凉早是初秋銀漢斜分大火流吹徹洞簫天似水半鉤新月挂西樓背番蓮掌舞天魔二八嬌娃賽月娥本是河西參佛曲把來宫苑席前歌月宮小殿賞中秋玉宇銀蟾素色浮官裏猶思舊風俗鷓鴣長􅐟序梁州江南名伎號穿鍼貢入天家抵萬金莫向人前唱南曲内中都是北方音興聖宮中侍太皇十三初到捧鑪香如今白髪成衰老四十年如夢一場蜀獻王椿一首王髙皇帝第十一子洪武十一年封二十三年之國成都永樂末薨有獻園集詩話明開國諸王文學首稱蜀府孝陵恒以蜀秀才呼之惜獻園集罕傳於世王孫定王友垓有集十巻曽孫惠王申鑒有惠園集恵王孫成王讓栩有長春競辰集成王孫端王宣圻有端園集五葉皆有集著録亦盛事也送方希直先生還漢中岷山峩峩江水泱泱我疆我理俾我以康靡言匪衣靡善匪得閱士孔多我敬希直侍我經筵不倦以勤非徳不言非道不陳職思其歸義不可奪采采者芹伺教如渴爰秣其馬爰振其衣拜手稽首載辭而歸昔者之來春日遲遲維今之歸凉風淒淒悠悠我心念子良苦爰命詞臣飲餞江滸王道如砥旣歌且詠八月初吉抵于南鄭沔彼江漢亦合而流瞻彼岷峨鬱其相繆心之知矣臨别繾綣子如我思道豈云逺湘獻王柏一首王髙皇帝第十二子洪武十一年封之國荆州建文初或告王反王無以自明闔宫焚死諡曰戾成祖更諡曰獻朱睦㮮云王嗜學讀書開景𤣥閣以延士被服儒雅尤善道家言嘗自號紫虚子太和山尋張三丰故居張𤣥𤣥朝飲九渡之清流暮宿南巖之紫烟好山浩劫知㡬度不與景物同推遷我來不見徒悽然孤廬髙出古松頂第有老猿接臂相攀緣遼簡王植二首王髙王帝第十五子洪武十四年封二十六年之國遼東廣寧州永樂二年遷荆州二十二年薨有遺集詩話簡王遺集五巻曽孫恵王恩鑙所刋大率不經意之作所與酬和程通鍾洪範林源曹鐸吳鼎項允清朱􅪟胡俊王用才胡庭禮之徒咸無詩名宜其淮南自尊也暮春鞍馬辭京去維時巳暮春殘花留舞蝶飛絮逐行人樹暗啼黄鳥波澂躍紫鱗白雲晴冉冉瞻望重思親秋江楊栁渡頭烟漠漠峩眉山下水滺滺月明沙渚晚風急漁笛一聲江上秋寧獻王權三首王髙皇帝第十六子洪武二十四年封二十七年之國大寧永樂二年移南昌正統末薨有采芝吟詩話獻王助長陵靖難以善謀稱及徙封豫章頗多觖望晚乃折節讀書開雕祕笈囊雲廬山之巔鼓琴緱嶺之上其有淮南八公之思乎宫詞三首忽聞天外玉簫聲花下聽來獨自行三十六宮秋一色不知何處月偏明太液池中翻翠荷小娃學唱采蓮歌畫船不繫垂楊下盡日隨風漾碧波庭梧秋薄夜生寒誰把箜篌别調彈睡覺滿身花影亂池塘風定月團團漢庶人髙照一首庶人文皇帝第二子永樂二年封漢王十五年之國樂安州宣徳八年叛縶逍遥城死國除有擬古感興詩擬古自古寺人職司閽供灑掃秦漢始撓政國本亦枯槁唐初任猶輕髙貴在天寳淪胥宣懿間神器猶顛倒門生詆天子尊重壓元老社稷遂已墟羣閹那自保嗟哉太宗業家奴壞王道後世宜鑒之慮患防須早周憲王有燉二首王周定王長子髙皇帝孫洪熙元年襲封景泰三年薨有誠齋錄新録詩話憲園留心翰墨譜曲尢工中原絃索徃徃藉以為師李景文夢陽詩云齊唱憲王新樂府金梁橋外月如霜牛左史恒詩云唱徹憲王新樂府不知明月下樊樓是也其詩不事嘔心頗能合格梅花牡丹玉堂春一題動成百詠才思不窮誠宗藩之雋矣竹枝歌二首五溪春雨杜鵑時桂嶺西風八月期一帶湘山南北路請郎聴唱竹枝詞春風滿山花正開春衫女兒紅杏顋儂家盪槳過江去試問阿郎來不來楚荘王孟烷一首王昭王楨之子髙皇帝孫永樂二十二年襲封正統四年薨有勤有堂詩集九峯寺細路千盤迥髙峯九疊竒松隂深入寺泉脈逺通池雲鎻禪棲室巖鐫御製碑來游乗暇日林下盡幽期魯靖王肇煇二首王荒王檀之子髙皇帝孫永樂元年襲封成化二年薨有憑虛槀詩話魯藩别乘首載靖王詩但著集名詩有過甓社湖及游朝天宮登鍾山謁孝陵作知是王朝南京時所賦詩江樓秋望百尺危樓上憑髙極杳冥水雲連楚白島嶼入淮青潮起魚龍窟風生蒲蓼汀倚䦨凝竚久目斷是滄溟秋日江行策馬行行出郭遥平沙水落未生潮楓林兩岸經霜老紅葉無風落小橋秦康王志􅤎一首王隠王尚炳第三子愍王樉之孫髙皇帝曽孫也宣徳三年以富平王進封景泰六年薨有黙菴集送醫士凌漢章還苕術傳盧扁字鍾王厎事來遊便趣装熟路也知車載穏清時何用劒生鋩雞鳴圅谷三更月楓落吳江兩岸霜歸到苕溪尋舊侶畫船詩酒水雲鄉楚憲王季堄一首王荘王之子髙皇帝曽孫初封武陵王正統五年襲封八年薨有毓秀軒集詩話憲園夢筆符於文通述徳同乎靈運九原可作寧媿河間衡山衡山髙峩峩根盤㡬百里危峯插層霄巨岳奠南紀空中紫蓋峰有若芙蓉蕊欲泛洞庭舟瀟湘正秋水魯惠王泰堪一首王靖王嫡子髙皇帝曽孫成化三年襲封九年薨有悔齋槀春晴膏雨初收日載陽眼前景物富韶光碧池一夜水平岸紅杏數枝花出牆芳草不隨蓂莢換游絲欲共栁條長海棠庭院偏明媚莫遣東風又作狂魯莊王陽鑄三首王恵王嫡子髙皇帝𤣥孫成化十二年襲封嘉靖二年薨有尊徳堂稾詩話荘玉朱邸優游不忘恭敬情親棣萼於𢎞治癸亥聚兄弟于一堂王始倡七言近體二首于是鉅野恭定王陽鎣樂陵宣懿王陽錧鄒平恭懿王陽鎕東阿榮靖王陽鏢鎮國将軍陽銖陽鉞陽陽鋑並和之工繪為圖左長史郁珍右長史石磐紀善芮鎬紀其事陽銖為作序焉王有介山懐古作中一聫云古冢巳無雙鶴弔荒林猶為一蛇憐亦佳句也塞上逢故人久歴風霜鬢欲華故人相憶各天涯㡬年出塞常為客今日逢君似到家薄酒暫宜酬雪月敝衣堪歎染風沙明朝又恐河梁别愁聽江城奏暮笳秋日閒居地僻柴門靜不開明牕虚室絶塵埃應無酷吏催租到忽有白衣送酒來坐聽風聲敲翠竹吟㸔日影上蒼苔乘閒嵗月心無累客至須留泛酒杯江樓秋望江城秋暮葉初飛獨上髙樓望夕暉忽見一行沙鴈起西風遥送片帆歸唐成王彌鍗一首王荘王芝址庶長子定王桱曽孫髙皇帝𤣥孫也初封穎昌王𢎞治二年嗣爵嘉靖二年薨有甕天小稾詩話成王廣置精廬集國中俊秀子弟資給之俾肄業又闢蔬圃一區建養正書院泰陵頒五經子史賚之迨康陵游幸王作憂國詩八章以諷暇則聫句藏春之塢開講保和之堂又精於書法繪事皆入能品云久雨春雨同秋雨輕寒作峭寒鶯聲猶謇澀花片漸摧殘宿霧難開日層波正湧瀾韶華寧久戀轉眼惜春䦨唐恭王彌鉗一首王荘王第三子成王彌鍗之弟定王桱曽孫髙皇帝𤣥孫初封交城王正徳中薨諡恭靖後以子宇溫襲王改稱唐王定諡曰恭有謙光堂詩集詩話恭王下筆不能自休一韻每至百篇未免率易宮詞長門芳草緑茸茸輦路年來草漸封怪殺海棠花上月夜深偏照繡幃重瀋安王詮鉌一首王瀋莊王幼㙾次子簡王模曽孫髙皇帝𤣥孫也初封靈川王正徳四年薨諡榮􅐧後以孫憲王𦙍栘進封更諡安有凝齋稾李騰鵬云王所作如太羮𤣥酒不求濃麗而至味有餘令人嗜之不厭絶句更有新意春日有懷小圃辛夷漸發芽禁城殘栁欲飛花最憐九十春光去未遂還家只夢家秦簡王成泳八首王惠王公錫之子康王之孫髙皇帝來孫𢎞治元年以鎮安王襲封十一年薨有賔竹小鳴稾詩話王年十齡嫡母陳妃以唐詩敎之日記一篇嗣位後日賦一篇三十年靡間至于延致士大夫脫畧勢分撤鷹房以剏儒臣之館闢隙地以益書院之基善行匪一許伯誠過墓詩云河間明禮樂淮海好神仙則并留心服食之術矣旣薨紀善强晟挍刻其詩嘉靖初王孫定王惟焯表上之詔送史館楊白花楊白花隨風無定止飄然一去太無情飛度江南㡬千里可憐落水化浮萍浮萍無復隨風起宮中羙人連臂歌此情不斷如春水折楊栁靈州城下栁多被官軍竊猶餘拂地條更苦行人折今君赴玉關将何贈離别西城路西城路半是平田半墳墓平田漸少墳漸多酸風苦雨泣銅駝人生少年胡不樂世間那有蘇耽鶴感寓三首為善為君子君子喻于義為惡為小人小人喻于利所喻旣不同善惡豈相類義利自兩塗理欲所由異譬之食飲然而各有所嗜惡臭與馨香伊人自知味吁嗟義利門慎毋迷厥志仲尼初相魯魯人興謗辭子産聴鄭政鄭人亦毁之人心苦不同衆口生瑕疵賢聖且不免吾人莫嗟咨相君椒百斛領軍鞵一屋為利日孳孳于心苦無足貪夫出見客佩鑰聲相觸算緡極錙銖餬口損饘粥恨不馬重駒恨不牛兩犢家盈萬鎰金身兼九州牧憫彼心太勞一笑捧吾腹武功道中五原三畤隔西東此地人言是武功楊栁池塘科斗水杏花村店酒旗風農耕緑野春臺裏客在青山罨畫中日暮官程催去馬樹頭微雨正濛濛春游曲新栁迎游騎飛花趁酒甌年年三二月爛醉曲江頭肅靖王真淤二首王恭王貢錝之子髙皇帝來孫荘王楧𤣥孫成化中封世子嘉靖五年甍以子定王弼桄襲王追諡有星海集詩話宗正謀㙔稱靖王塞上曲㫖趣沈雄王龍標不能過未免譽失其實要其風格駸駸唐人塞上黄雲白草出關多颯颯風吹積石河少婦愁添閨裏思征人淚落隴頭歌歩虚詞瑶壇深處磬聲微羽客朝元午夜歸劒佩㡬回翔碧落天風吹冷六銖衣瀋憲王𦙍栘二首王惠王勛潪之子安王孫簡王來孫髙皇帝晜孫也自號南山道人嘉靖五年封靈川王九年懷王𦙍榿絶奉勅管理府事十年進封二十年薨有保和齋稾謝榛云王素嗜談禪詩亦有妙悟李騰鵬云王詩沉著痛快時出新語多得性情之正詩話憲王以好學聞嘗上書乞内府諸書永陵以五經四子書賜焉枕上詩云展轉殊無寐深秋感二毛城鴉催曉色庭樹起寒濤徃事意何拙浮生心自勞河間今巳矣寧不愧吾曹蓋以自勉云送汪内史南歸滄江逺渚暮烟收南望千山樹色秋明日别君漳水畔相思還上驛西樓秋鴈北來征鴈下寒塘水食沙眠足稻梁不寄行人一封信却囙何事到衡陽趙康王厚煜五首王文皇帝第三子趙簡王髙燧之來孫正徳十六年襲封嘉靖三十九年薨有居敬堂集穆文熙云康王詩雄渾迥出時作詩話崑山鄭若庸曵裾王門康王從若庸所見臨清謝榛竹枝詞命所幸琵琶妓賈扣度而歌之旣而榛過鄴偕若庸見王王宴之便殿酒行樂作王曰止命縆瑟以琵琶佐之曰此先生所製竹枝詞也譜其聲不識其人可乎命諸伎擁姬出拜榛謝曰此山人鄙俚之詞請更製竹枝以備房中之樂王曰幸甚榛力不勝酒醉卧山亭下王命姬以衽代薦承之以肱明日上新竹枝十四闋姬按而譜之元夕便殿奏伎酒闌送客即盛禮而歸賈乎榛邸王嘗與榛聨句百卉亭鄭謝之外若顧聖少仲春龍尤荘輩皆王客也平臺小山無此盛事擬秋夜長漫漫秋夜長唧唧寒螀吟白露下青草悠悠傷我心傷心耿不寐孤坐鳴素琴朱絃中斷絶轉軫悲餘音推琴歩微月仰見䨇飛禽緬懷牧犢子澘澘淚沾襟丰神宛如在悵望空梁隂戎宼聞說西羌種今秋復宼邊三軍憂戰伐百里絶人烟衰草依孤壘寒雲起暮天九重宵旰切何日下祁連七夕後作銀河昨夜渡牽牛玉露凉侵院院秋一葉芭蕉數聲雨人間何事不堪愁宮詞薄鬢斜鬟十五餘妝成猶未下庭除納凉記得君王作私把泥金小扇書聞砧瑶琴停響緑尊空何處寒砧擣月中最是今宵最愁絶碧梧隂下粉牆東益莊王厚􅂱四首王端王祐㯽之子憲宗之孫藩封建昌府嘉靖二十年襲封三十五年薨有勿齋集詠史詩詩話荘王留心理學序莫氏學業須知張氏理學類編陳氏道學傳趙氏學範以行又博覽經史撰勿齋臆説正譌糾謬不異儒生欎儀王孫藩獻志稱其聲色珠綺一無所好盖天下之賢王也集五巻弟崇仁王厚炫嗣封編輯以行分校者左長史張黙右長史李敉春鴈北上三湘路南辭七澤雲巳甘同出塞不忍更離羣永夜空中唳幽人枕上聞汀洲爭宿處昧旦起紛紛早秋庭樹初飛葉天髙爽氣澄檻花藏晚蝶簾竹聚秋蠅紅熟枝頭棗青浮水靣菱金風蘋末起頓喜失炎蒸秋熱節已過寒露秋陽尚逼人蒲葵仍在手荃葛未離身籬落黄花綻階除緑草勻憂時占月令休咎竟何囙新晴連旬滛雨降今喜見朝暾徑路泥猶滑池塘水尚渾輪蹄喧野市網罟曬漁村風埽殘雲歛青山復對門蜀成王讓栩五首王昭王賔瀚之子髙皇帝晜孫正徳五年襲封嘉靖二十六年薨有長春競辰集楊慎云成王懷古雜擬式遵溫柔敦原之旨詩話長春競辰集成都楊慎序之而升菴集不載宮詞一百雖題曰擬古然如翠華一去寂無蹤疑諷康陵而作只恐君王道院行疑諷永陵而作也玉階怨落日下西苑深宫風雨多定嫌蒼蘚滑玉輦不曽過早秋郊原正早秋露下蘆汀濕忽見一禽來只傍疎枝立擬古宮詞三首青春一去豈重來轉轂韶光日夜催三百六旬空悵望朱門經嵗不曽開紫禁鴉啼曙色明麗譙隠隠不聞聲各宮装束焚香候只恐君王道院行新觀玉歴識正初泰運三陽藹帝居御座今安圓閣子内中欲置女尚書瀋宣王恬烄二首王憲王次子髙皇帝仍孫自號西屏道人嘉靖三十一年襲封萬厯初薨有綠筠軒槀穆文熙云宣王音調超㧞綽有陳思之風各李騰鵬云王所作和平爾雅諸體擅其長詩話宣王逸思清才金枝之秀秋興池閣蕭條竹徑通閒來幽興檢詩筒未須絃管翻新曲自有琴尊對晚風斜日斷雲簾影外疎林落葉杵聲中悲秋莫話當年事且向遥天數塞鴻山行為訪林棲叟何妨石逕長白雲生谷口處處藥苖香瀋定王珵堯二首王宣王之子髙皇帝雲孫嘉靖三十七年封世子萬厯十二年襲封天啓元年薨有修業堂崇玉山房二稾穆文熙云王詩音韻悠揚若扣洪鐘餘響不絶李騰鵬云王諸作音節鏗鏘詞氣間適有韋栁風非富貴人所能道詩話定王師呂時臣猶沈易之師謝榛也所師髙下不同體製亦少遜擬古宮詞聞道收遼左中宮上夀卮隨班春殿裏消息未全知金縷麒麟服傳宣賜太師李騰鵬云足稱大雅秋宫怨月落湘簾錦瑟停西風髙下度流螢不知今夜長生殿誰㸔牽牛織女星鄭世子載堉二十五首昭皇帝第二子鄭靖王瞻埈歴四世為恭王厚焥嘉靖二十七年建言時政降為庻人發髙牆禁錮隆慶元年赦回復爵王恭王子著樂書補亡詩南陔有風吹彼苞棘厥景婆娑欲静弗得孝子事親當竭其力父母之恩昊天㒺極南陔有風吹彼桑梓慕我父母終身敬止朂哉伯仲以及娣姒恪爾晨昏絜爾甘旨景薄桑榆日亦云暮父母俱存兄弟無故雖有至樂寧不深慮一則以喜一則以懼右南陔三首嗟彼白華瑩然如玉君子立身必慎其獨無貽親辱嗟彼白華瑩然如琇君子立身必謹所守無貽親咎嗟彼白華瑩然如霜君子立身如圭如璋為親之光嗟彼白華瑩然如雪君子立身清清絜絜庶無玷􅆙嗟彼白華瑩然如氷君子立身戰戰兢兢庶無怨憎右白華五首彼華者黍彼實者稷相彼秋成時萬時億彼華者黍彼實者麥時和嵗豐囷盈倉積彼華者黍彼實者菽農夫之慶邦家之福彼華者黍彼實者麻君子愛民不驕不奢彼華者黍彼實者禾君子愛物不溢不過右華黍五首天運元亨萬物由庚王道正直蕩蕩平平寒暑以序雨𤾉以時百榖用成庶績咸熙草木蕃庶鳥獸咸若仰覩鳶飛俯窺魚躍習習景風甘雨其濛醴泉洩洩玉燭融融右由庚四首瞻彼崇丘積土成髙相彼大海積水成濤巻石積多其形嵯峩勺水積久勢若江河寶藏貨財靡所不足積善之家必有餘福鳥獸魚龍咸遂其性積善之家必有餘慶右崇丘四首肅肅令儀君子由之秩秩彛倫君子求之率性之道君子修之何謂彞倫父子有親君臣有義朋友有信兄愛弟敬夫和妻順君令臣恭父慈子孝夫妻相敬兄弟相好恵于朋友無徳不報維物有則維民秉彞好斯美徳由此令儀上和下睦皥皥熙熙右由儀四首詩話世子研精樂典按律審音察及銖黍歴辨劉歆何妥李照范鎮陳𤾉蔡元定之失近代若李文利李文察劉濓張敔皆駮其非所著樂書歴論宜采入國史迹其補亡詩六篇櫽括古訓比之夏侯湛束晳似為過之至於念嚴君之囚席藁門外因長幼之序讓國盟津尤非人所幾及光澤榮端王寵􅲾一首王遼惠王成鍊次子髙皇帝來孫成化二十三年封嘉靖二十五年薨有博文堂稾何喬逺云王積書萬巻世宗賜堂名曰博文登仲宣樓懷古憶昔登樓日天涯事轉違計依劉表得書授蔡邕稀南國方羇旅西京未解圍秦川空在眼公子乃忘歸衡陽安懿王寵淹一首王悼僖王恩鏏子髙皇帝來孫𢎞治六年襲封嘉靖十八年薨登仲宣樓懷古尋芳踐嘉約乘暇一登樓野樹連雲合清江繞郭流遺文鄴下重舊井峴山留洵羙開襟地無妨續勝遊永夀恭和王東欓一首王莊僖王誠淋子髙皇帝晜孫𢎞治十年襲封嘉靖十七年薨正徳己卯九日登説經臺隱隱樓臺雲外重一溪活水過仙宫上師巳化青牛老萬木驚秋墜晚風顧炎武曰是詩刻石草樓武岡保康王顯槐二首王楚端王榮㳦第三子昭王來孫髙皇帝晜孫也嘉靖十七年封有少鶴山人正續集詩話王詩平正無溢幅走狗烹走狗烹走狗烹蒯生識鑒通神明漢基甫創身即死當日假王何為爾相靣止封侯相背貴無極淮隂聞言兩耳逆婦人擅執生殺權猶豫自将身弃捐噫􅐵英彭尤可憐次鄒䘏部穎泉謝宴小園一雨足次第百花開江白孤舟去天青一鳥來林香時撲坐栁色競侵杯借問西鄰客懷人日㡬回徳平榮順王𦙍榳一首王瀋惠王勛潪之次子髙皇帝晜孫嘉靖三十七年封有集書樓稾李騰鵬云王所作沉著嚴整不尚綺靡自饒深致送焦明府之鳳翔馬首蠶叢路兹行亦壮游天青三峽曉雲碧萬山秋鷺浴盤渦水猿啼古驛樓君才非百里早晚夢刀州鎮康王恬焯一首王瀋憲王𦙍栘第五子髙皇帝仍孫嘉靖二十四年封有西巖漫稾穆文熙云王詩調髙意永自是盛唐風味謝榛云西巖題瞻逺樓詩江樓懸樹杪山色到牕中精㧞有骨同呂二人話别此㑹情何極明朝遽别筵霜清楓葉路秋老菊花天百越家鄰海三垂地近邊相思應有賦月定㡬回圓保定恵順王珵坦一首王瀋宣王次子髙皇帝雲孫嘉靖三十八年封有清苑山房集穆文熙云王詩格調髙古思致雋永當于貞元中求之李騰鵬云王善書法其詩音格響亮春日游柏谷寺曉霧危巖合烟蘿仄徑懸浮圖開佛日沙界接人天獨鶴衝雲起愁雲枕石眠逃禪如可醉莫負杖頭錢沁水昭定王恬烆一首瀋簡王第八子悼懷王佶煴封沁水王簡王來孫髙皇帝晜孫也嘉靖二十五年襲封四十年薨有遜學書院集春日閒述睡起情逾嬾烟蘿地自迷開尊惜遲暮片月挂松西沁水王珵堦一首王昭定王子髙皇帝仍孫隆慶元年襲封有滄海披沙集穆文熙云王詩丰神俊逸思致雅澹大歴前之調也李騰鵬云王所作爾雅典麗蓋荆金楚玉也彰法寺嶽勢何穹窿躋攀竟日至絶澗來巖椒沿洄轉幽邃其陽開招提不知㡬千嵗宫殿羅虚空俯視下無地樵子雲際行石罄風前墜境疑兜率天巖紀司空字日晏憺忘歸暫逺塵煩累安慶王恬爖二首王瀋憲王第七子髙皇帝仍孫自號西池道人嘉靖三十一年封有嘉慶集何喬逺云王于穆宗朝以孝敬旌李騰鵬云王詩和平爾雅巳入作者之門夏夜寄懷謝山人時客汾陽良夜孤清賞懷君倍黯然離居三嵗似明月㡬回圓紫塞雲邊樹青山雨後天相思寫不盡寂寞有氷絃聞砧何處砧聲急空閨入夜聞哀音流素月寒響徹秋雲夢斷盧龍逺天髙白鴈分誰能将妾意萬里報夫君慶成王慎鍾一首晉恭王棡第四子濟炫封慶成王諡荘恵王安穆王知熑之孫恭王之仍孫髙皇帝之雲孫也隆慶六年襲封有太霞稾穆文熙云王以賢孝稱其器質敦厚醇雅詩亦有體裁不失風人遺旨夏日登萬佛樓次朱使君韻天半岧嶤峻閣開自公多暇興悠哉憑虛㡬見空王在結夏誰招使者來貝葉迎風翻鹿苑香雲散雨落蜂臺倚闌欲和陽春曲慚愧登髙作賦才明詩綜巻二
