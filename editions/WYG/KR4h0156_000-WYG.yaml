body:
  text: 明詩綜總集類提要臣等謹案明詩綜一百巻國朝朱彞尊編彞尊有經義考已著録明之詩派始終三變洪武開國之初人心渾朴一洗元季之綺靡作者各抒所長無門户異同之見永樂以迄化治沿三楊臺閣之體務以舂容和雅歌詠太平其弊也冗沓膚廓萬喙一音形模徒具興象不存是以正徳嘉靖隆慶之間李夢陽何景明等崛起於前李攀龍王世貞等奮發於後以復古之説遞相唱和導天下無讀唐以後書天下嚮應文體一新七子之名遂竟奪長沙之壇坫漸久而摹擬剽竊百弊俱生厭故趨新别開蹊徑萬厯以後公安倡䜟詭之音竟陵標幽冷之趣么弦側調嘈囋爭鳴佻巧蕩乎人心哀思闗乎國運而明社亦於是乎屋矣大抵二百七十年中主盟者遞相盛衰偏祖者互相左右諸家選本亦遂皆堅持畛域各尊所聞至錢謙益列朝詩集出以記醜言偽之才濟以黨同伐異之見逞其恩怨顛倒是非黒白混淆無復公論彞尊因衆情之弗協乃編纂此書以糾其謬每人皆畧叙始末不横牽他事巧肆譏彈里貫之下各備載諸家評論而以所作靜志居詩話附於後雖隆萬以後所收未免稍繁然世逺者篇章易佚時近者部帙多存當亦隨所見聞不盡出於標榜其所評品亦頗持平於舊人私憎私愛之談往往多所匡正六七十年以來謙益之書巳澌滅無遺而彞尊此編獨為詩家所傳誦亦人心彞秉之公有不知其然而然者矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d207f118cd7a5d55df6d51e4cfd22a4847bf14f61f0ca7a355d715386c98ea66
