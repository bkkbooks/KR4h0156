body:
  text: 明詩綜卷八十四翰林院檢討朱彝尊編靜志居詩話婦人詩集始於顔竣殷淳爰有徐陵李康成玉臺之編蔡省風瑤池之詠代加甄綜韋縠才調集輯閨秀一卷宋元以降選家類不見遺明則酈琥之彤管遺編張之象之彤管新編田藝衡之詩女史劉之汾之翠樓集俞憲之淑秀集周履靖之宫閨詩選鄭琰之名媛彚編梅鼎祚之女士集靑泥蓮花記姚旅之露書潘之恒之亘史趙問竒之古今女史无名子池上客之名媛璣囊竹浦蘇氏之臙脂璣蘭陵鄒氏之紅蕉集江邦申之玉臺文菀方維儀之宫閨詩史沈宜脩之伊人思季嫺之閨秀集其文亦云富矣然靑黄雜揉真膺交錯近齊南王考功士禄悉從考正為然脂集發凡起例有要有倫而予斯編亦稍糾羣書之紕繆焉郭貞順一首貞順潮陽周伯玉妻明初師下嶺南指揮俞良輔征諸寨之未服者貞順從伯玉居溪頭寨作詩上之良輔覽詩大喜一寨得全上俞將軍將軍開國之武臣早附鳯翼攀龍鱗烟雲慘淡遍九野半夜捧出扶桑輪前年引兵下南粤眼底羣雄盡流血馬蹄帶得淮河冰灑向江南作晴雪潮陽僻在南海濱十載不斷干戈塵客星移處萬里外天子亦念遐方民將軍髙名邁千古五千健兒猛如虎輕裘緩轡踏地來不減襄陽晉羊祜此時特奉明主恩金印斗大龜龍文大開藩衛制方面期以忠義酬明君宣威布徳民大悅把菜一笠誰敢奪黄犢春耕萬隴雲氂龍夜卧千秋月去嵗壺陽戍守時下車愛民如愛兒壺山蒼蒼壺水碧父老至今歌詠之欲為將軍紀勲績天家自有如椽筆願屬壺民歌太平磨厓勒盡韓山石張紅橋一首紅橋閩縣人膳部林鴻外室遺林鴻一南一北似飄蓬妾意君心恨不同他日歸來也無益夜臺應少繫書鴻田娟娟一首娟娟工部郎木涇元經之室慰元經碧玉杯中琥珀光燈前把勸阮家郎不須苦憶人間世萬樹桃花即故鄉孟淑卿一首淑卿蘇州人訓導孟澄之女自號荆山居士徐昌榖云淑卿詩零落已多其傳者直欲與文姬羽仙輩争長顧𤣥言云荆山居士之論謂作詩貴脱凡化質閨人不可有鉛粉氣覽其詩果然魚𤣥機之亞也題畫嶺樹盤雲上溪迴路轉斜晩來烟靄合何處問山家陳懿徳一首懿徳長興人移居仁和南康知府陳敏政之女嫁同縣李昂景泰甲戌進士官至右副都御史顧𤣥言云夫人詩集頗富句如深院雪消芳草緑小園風過落梅多情致幽絶足為女郎之秀閩山道中行盡山蹊路渺茫幾家茅屋對斜陽引泉竹溜穿厨入墮粉松花遶舎香樵徑無人閒卧犢石田初雨漸分秧平生頗有山林癖欲向溪邊結草堂朱妙端四首妙端字仲嫻號靜菴海寧人尚寶卿朱祚女光澤教諭周濟妻有靜菴集顧𤣥言云静菴籬落見梅詩可憐不遇知音賞零落殘香對野人或譏其以所配非偶形諸吟詠予讀其鶴賦云何美人之見獲遂羈絡于軒墀䝉主人之過愛聊隠迹而棲遲斯可謂怨而不怒矣咏虞姬云貞魂化作原頭草不逐東風入漢郊何其詞義之烈烈也詩話静菴詩頗流麗于歸之後移家海鹽故淑秀集明詩粹明詩妙絶俱作海鹽人白紵詞西風蕭蕭天雨霜館娃宫深更漏長銀臺絳蠟何煌煌笙歌勸酒催華觴美人起舞雪滿堂清歌宛轉飛雕梁君王沉醉樂未央臺前月落天蒼蒼方維儀云雖乏新奇而句句鏗鏘客中偶成異鄉久為客風雨阻歸程兩岸數峯碧孤舟一羽輕篷牕殘燭在烟樹早鴉鳴坐待東方曙依稀見海城周青士云極似郭良曉行之作竹枝詞二首西子湖頭賣酒家春風搖曳酒旗斜行人沽酒唱歌去踏碎滿隄山杏花横塘秋老藕花殘兩兩吳姬蕩槳還驚起鴛鴦不成浴翩翩飛過白蘋灘馮銀一首銀字汝白瓊山人教諭源之女歸同邑唐繼祖有孝行詩話汝白讀顔子簞瓢陋巷舎書起而作曰吾雖居陋巷朝焉命僕以耕則有餘食矣暮焉督婢而織則有餘衣矣暇與子觀書則有餘樂矣吾其與顔氏之子同儔哉臨高王同知佐為志其墓稱其幾于知道云暮春緑暗紅稀春已深嬾聽杜宇喚歸音凋榮何限人間事獨倚篷牕數過禽鄒賽貞一首賽貞當塗人贈監察御史謙之女翰林編脩濮韶之母封孺人有士齋集潘景升云孺人詩文端嚴典雅惜幼之所習長之所從皆在苜蓿齋中未免涉寒酸氣詩話士齋女嫁費文忩公其詩甚庸都無林下風致中秋有懷銀漢無聲夜夜清良宵忽感宦游情東山遙望人千里想亦停杯對月明潘氏二首氏台州人山東副使潘應昌女貢士裘致中之妻自號碧天道人有碧天道人存稾水亭園亭當水中兩岸蘆花沒夜久人未眠碧水蕩秋月秋詞翻翻黄葉落西風月滿池亭秋夜空黄菊酒香人已醉白蘋江冷渡飛鴻茅氏一首氏太倉衛人陸震之母賣宅壁有蒼苔甑有塵家園一旦屬西鄰傷心畏見門前栁明日相㸔是路人顧𤣥言云寡婦賣宅之作志尚端嚴王素娥一首素娥號檗齋紹興山陰人歸部吏胡節節死不嫁渡錢塘風微月落早潮平江國新晴喜不勝試㸔小舟輕似葉載將山色過西陵顧𤣥言云思朗致新陸娟一首娟華亭人陸徳藴之女馬龍妻代父送人還新安津亭楊栁碧􅆴􅆴人立東風酒半酣萬㸃落花舟一葉載將春色到江南儲氏一首氏泰州人大學士瓘女嫁興化舉人成學雨後夭桃灼灼倚牕前春色繽紛帶紫烟昨夜雨聲來枕上惜花人醒不曾眠屈安人三首安人華陰人總督漕運右副都御史直之女嫁參議朝邑韓邦靖封安人有集詩話安人早慧十齡刺繡聞父訓諸子盡得其解㝷令賦詩悉合矱度其詩康徳涵序之登江樓登高樓兮見西風吹水之潺湲水東去以不回兮客思歸其何年送夫入覲君往燕山去棄妾雒水旁雒水向東流妾魂隨飛揚丈夫輕離别壯志在四方努力事明主肯為兒女傷君有雙親老垂白坐高堂晨昏妾定省喜懼君自量珍重復珍重丁寧須記將既為逺别去飲余手中觴莫辭手中觴為君整行裝陽關歌欲斷栁條絲更長述懐自注是嵗弟之燕妺歸商親在華下余居渭北淅淅北風起蕭蕭木葉稀寒花愁更發鴻雁獨南飛秋入商山裏天長渭水西思歸歸未得悵望淚沾衣馬間卿一首間卿字芷居上元人少卿陳沂繼室封安人有芷居集苦雨終日雨翻盆愁人欲斷魂嶺雲生屋角野水没籬根楊葉藏深徑棃花静掩門聲聲偏入耳寂寞自朝昏黄安人二首安人遂寧人黄簡肅珂之女修撰楊慎之繼室封安人王元美云夫人寄外之作用修答和皆不及也陳卧子云其調雖别自是成章字高寓公云夫人是詩才情殊勝特嫌韻重陽首句不如以湘字易之郎士元送李敖詩云莫信潮湘書不到年年秋雁過巴東亦有本也詩話美人娟娟隔秋水杜子美句也其雨怨朝陽阮嗣宗句也黄魯直寄蘇和仲詩用之曰美人美人隔秋水其雨其雨怨朝陽楊夫人復用魯直語寄用修正陸平原所云襲故彌新者寄夫雁飛曾不到衡陽錦字何由寄永昌三春花栁妾薄命六詔風烟君斷膓曰歸曰歸愁嵗暮其雨其雨怨朝陽相憐空有刀環約何日金雞下夜郎方維儀云不纖不庸格老氣逸寄升菴嬾把音書寄日邊别離經嵗又經年郎君自是無歸計何處青山不杜鵑李玉英一首玉英錦衣衛人詩話正徳中錦衣衛千户順天李雄西征陣沒遺孤五人子二曰承祖曰亞奴女三曰桂英曰玉英曰桃英諸子皆前妻所産惟亞奴後妻焦氏生焦欲圖親兒繼襲雄死令承祖往戰場㝷父骸骨覬其陷于非命而承祖竟抱骨以歸焦乃鴆死承祖支解而埋之又以桂英鬻豪家為婢玉英頗知典籍年十六伶仃窮迫作送春詩簾云云又作别燕詩云新巢泥滿舊巢欹泥滿疎欲掩遲愁對呢喃終一别畫堂依舊主人非焦指詩詞謂有外通等情俾舅焦榕執送錦衣衛誣以姦淫不孝擬凌遲嘉靖四年夏差太監審録罪囚凡有事枉人寃許行陳奏于是玉英具本託其妹桃英齎奏訟寃疏畧云臣年十二遇皇上嗣位遍選才人府尹以臣應選禮部憫臣孤弱未諳侍御發臣寧家臣年十六伶仃無倚是以濫形吟詠感諸身心寄諸筆札葢有不得已而為言者奈何母恩雖廣勿察臣衷但玩詩詞以為外通拿送錦衣衛本官誣臣姦淫不孝擬剮罪臣在獄日久有欺臣孤弱而興不良之心者臣撫膺大慟獄中莫不驚惶臣素不才鄰里何無糾舉乃以數句之詩㝷風捉影陷臣死罪臣之死固無憾十嵗之弟毒藥鴆死肢解埋棄果何罪乎臣母之罪臣不敢言凱風有詩臣當自責陛下俯察臣情將臣詩句付有司委勘有無淫姦實情推詳臣母之心盡在不言之表則臣亡父母之靈亦可慰于地下矣有旨命三法司㑹勘焦氏論斬玉英著錦衣衛選良才作配焉按玉英二詩本無闋涉而緹師乃坐以極刑由是推之寃獄難以悉數矣送春柴門寂寂鎖殘春滿地榆錢不療貧雲鬢霞裳伴泥土野花何似一愁人端淑卿一首淑卿當塗人教諭端廷弼女儒官芮儒之妻有緑牕詩稾章元禮云淑卿詩㫖醇而節和渢渢有致隋栁煬帝宫中栁凋零幾度秋蟬聲悲故國鶯語怨荒丘行殿基仍在空江水自流行人休折盡春日更生愁斗孃一首斗孃松江女子嫁姚生詩話斗孃送夫之詩見沈津吏隠録送夫逺逐風塵路遺書滿目愁思君不成寐河畔看牽牛沈潤卿云語意清雅毛鈺龍一首鈺龍麻城人雲南按察僉事鳯韶之女嫁少保劉天和孫守䝉夫死誓不踰閾鄉人稱曰文貞夫人詩話節婦奉姑樓居不廢吟咏年七十九目無見猶使甥輩讀之句如桃花暮雨烟中閣燕子春風月下樓詩句怕題新節序淚痕多染舊衣裳讀之哀動頑豔鏡様出秦宫製團團寳月迴虚空開物象心迹逺塵埃影覆香羅帕光生碧玉臺繡囊鴛鳥並珍重嫁時裁于太夫人劉氏一首氏榖城人嫁府同知于玭文定公慎行母也故城暮雲深鎖故城春緑樹蒼烟舊白蘋昔日高樓雙燕子定巢無處往來頻楊文儷三首文儷仁和人工部員外應獬女餘姚孫陞繼室封夫人詩附見家集詩話孫文恪初娶于韓後娶于楊諸子登進士榜者四人太保吏部尚書清簡公鑨文中禮部尚書鋌文和太僕卿錝文秉兵部尚書鑛文融皆楊夫人教之示文融詩云何待三遷教傳經有父兄葢謙辭也夫人精帖括斷決不爽相傳文融會試後録其文呈母夫人笑曰淡墨雖書第一未免齧筆似魚非文之絶品也或言夫人有髯年過百齡云秋日懷親玉露沾花濕金風入幕凉天連秋水碧山帶晩烟蒼撫景嗟時序懷親憶故鄉倚闌凝佇久心逐雁南翔采蓮女邪溪采蓮女日出蕩輕橈慣識溪中路歌聲入畫橋聞徴瓦氏兵至傳聞瓦氏勇超羣萬里徵來淨冦氛多少材官屯海畔策勲翻仗女將軍顧氏一首氏崑山人顧茂儉之妺皇甫子循之甥嫁孫僉事為婦何元朗云春日一詩可置玉臺新咏中春日春雨過春城春庭春草生春閨動春思春樹滿春鶯鄧氏一首氏眉山人訓導先健女適敘州户部郎金寛寄外鎮日多愁屢廢餐閉門獨坐遣應難庭前别我春猶在月下懷君春又殘萬㸃落花誰著眼一聲飛雁獨凭闌夢回湘簟無消息更啓前書仔細看王虞鳯一首虞鳯字儀卿候官人有罷繡吟年十七卒春閨濃陰栁色罩牕紗風送鑪烟一縷斜庭草黄昏隨意緑子規啼上木蘭花姜氏一首氏新建人廣西右布政使忻嘉靖乙丑進士女孫也嫁諸生丁立祺寄文學山居何必入山深居然似漢陰雨殘雲在竹野曠日平林負郭多幽事為農長道心芸牕開卷罷多是聽鳴琴桑貞白二首貞白號月牕嘉興人處士周履靖繼室有香奩詩草詩話周逸之處士作詩不暇持擇宜其閨人亦然然紙閣蘆簾倡予和女偕隠太平之時亦樂事已寄逺日暮登樓强自歌陌頭楊栁望中多思君書劒天涯客三月春光有幾何春日即事雨晴春暖百花香戲蝶游蜂各自忙也擬東郊􅂿青去門前流水又斜陽董少玉二首少玉麻城周𢎞禴繼室有集戚雲雁云少玉詩居然唐調王元美云少玉詩清潤婉秀往往發於情而止於義有不盡為閨閤所束者方維儀云夫人詩詞均有韻致憶别二首憶别河橋栁青青送馬蹄妾心與羌笛無日不遼西驛路花將發離亭栁漫垂凭闌無一事日日數歸期屠瑤瑟一首瑤瑟字湘靈鄞人禮部隆女年二十而夭子夜歌子夜夜轉長簾前月華吐只解歌調工誰識歌心苦沈七襄一首七襄宣城人修撰懋學女嫁屠隆子自君之出矣自君之出矣孤月鑒虚牖思君如飛花隨風不回首袁彤芳一首彤芳字履貞吳縣人參政年女自稱廣寒仙客九日玉露泣秋草金風凋晚蕖白衣三徑少黄菊一籬疎病減登高興愁無寄逺書遙知二三子相向正愁余王鳯嫻一首鳯嫻松江華亭人解元獻吉之姊知宜春縣張本嘉萬厯乙未進士之妻有焚餘草空閨壁網蛛絲鏡網塵花鈿委地不知春傷心怕見呢喃燕猶向雕梁覓主人陸卿子五首卿子長洲人尚寳卿師道之女處士趙宦光之妻夫婦偕隠寒山有雲卧閣考槃𤣥芝諸集相逢行白馬驕青雲金鞭拂紅霧相逢不問名各自東西路擬陶閒居寡世用性本忘華簪淥水盈方塘清風來茂林弱魴戲漣漪野鳥鳴好音日夕時雨來白雲瀰高岑庭草滌餘滋原野藹飛霖開顔散遥念濁酒聊自斟陳卧子云不促薄擬李白古風重陰翳白日陽和轉淒薄霰雪何紛揉草木盡零落長風終夜厲棲鳥將焉託游子敝貂裘居人羨藜藿所以商山翁高舉往巖壑贈毗陵安美人去年花發毗陵道美人何處拾瑤草今年草緑姑蘇臺美人此時花下來風吹羅袂香不定流波蕩漾光徘徊不逐行雲作飛雨夢裏鉛華學神女坐久烟霞拂袂生回眸愁向空中舉水逺山長不見君空聞樹上黄鸝語山居即事披榛越宿莽背郭隠花蹊月静妖狐泣松深怪鳥啼秋山雲照户春澗水穿堤飛作千㝷瀑家家引灌畦徐媛一首媛字小淑長洲人范副使允臨之妻有絡緯吟桃園客云小淑詩文與陸卿子齊名然徐以綺麗勝才情稍遜于陸别曹孃木落西風萬壑幽忍將離思為君留碧雞關外凄凉月偏照蠻雲夜夜秋文氏一首氏邠州三水人長沙通判在中之女嫁葛氏早寡守節力學有君子亭集詩話節婦為光禄太青之姊寡居作九騷以見志九騷者一曰感往昔二曰懐湘江三曰望洽陽四曰矢柏舟五曰愀離幃六曰傷落花七曰臨雲歎八曰待月愁九曰撫玉鏡其辭有云覩扶光之如箭兮哀嵗月其難追拾朱英而太息兮時不再來悲朱顔其易改兮唯寸心之不衰辭義俱雅有古人之則悼懷青青山上松年華不可考灼灼園中花顔色不常好五月鳴蜩至八月蝴蝶老感物有盛衰豈忍歸腐草薄少君一首少君太倉州人秀才沈承妻哭夫水次鱗居接葦蕭賣魚争米晩來囂河梁日落行人少猶望君歸過板橋姚氏一首氏嘉興人自號青峨居士秀水范應宫之妻有玉鴛閣遺稾詩話青峨居士詩屠緯真賞其清華流利陳仲醇尤稱之謂肝腸如雪能吟栁絮之詞志節凌霜直擬木蘭之操筆牀茶竈不巾櫛閉戸潛夫寳軸牙籤少鬚髯下帷董子及其卒稾砧哭之慟刋其遺詩及已哀悼倡隨之作傳之鄉里焉竹枝詞卓女家臨錦水濱酒旗斜挂樹頭新當壚不獨燒春美便汲寒漿也醉人范壼貞一首壼貞字淑英一字蓉裳吳縣人嫁吳氏有胡繩集烟雨樓圖烟嵐無限雨中情逺近樓臺一望平吳苑草荒麋鹿走越江春盡鷓鴣鳴長堤栁樹迷春渚白水菰茭繞郡城最是晩來新月下萬家燈火隔湖明明詩綜卷八十四
