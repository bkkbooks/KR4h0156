body:
  text: 明詩綜卷九十翰林院檢討朱彞尊編徳祥二十五首徳祥字麟洲號止菴錢塘人洪武中住持徑山有桐嶼詩集静志居詩話止菴詩原出東野意主崛竒而能斂才就格足與楚石季潭巾缾麈拂鼎立桑門蒲菴以下要非其敵姚恭靖祥老草書歌云祥師只今為巨擘上與閒素爭巑岏錢塘山水甲天下秀氣毓子為靈檀十年不出筆成冢中山老兔愁難安晴軒小試烏玉玦雙龍隨手掀波瀾昨將一紙逺寄我天孫機錦千花攢願師勿置鐵門限從他需索來熱官縉紳相與歎莫及便欲奪去加巾冠然則止菴之草書更妙絶時人矣車碌碌車碌碌上山遲下山速前車行後車促後車不管前車覆前車已覆無奈何後車碌碌何其多芍藥春去若亡國寸紅不可容一朝兩朝雨三夕五夕風萬物不一色無以全其功芍藥是何本落在夏庭中月夕看梅梅花夜開香滿溪溪上月出風凄凄開門出溪看花去落花流水無東西枝間月落且歸去明日看花還杖藜送僧東游坐罷南山夏東游思浩然與雲秋别寺同月夜行船一路鐘聲裏千峰落木前西來有祖意不在普通年九月八日旅中夜懐秋逕花爭發寒燈客自傷别家將一歳明日又重陽鄉俗誰同與詩情老未忘凉風舊池沼蕭瑟芰荷香旅寓九月尚絺衣故鄉胡不歸塞鴻聲一到江樹葉都飛路晚逢僧少門寒過客稀自慚蘧伯玉又是一年非晏起宿雨何由歇春眠不肯醒燕來猶舊户花落自空庭引水平魚沼燒香繞硯屏齋中無别事閒寫幾翻經秋塘獨歩秋塘上其如客思何蟬聲送風葉鳥影度凉波草店三家酒菱船一道歌不堪回首處楊柳夕陽多小築日渉東園上余將卜此居草生橋斷處花落燕來初避俗何求僻容身不願餘堂成三畝地秖有一車書剪燭風處揺金蛹煙時閃墨鴉寸心終不昧雙淚欲横斜漸過分詩刻虚開報喜花剪聲初落指滿席散春霞聼雨有懐灑樹聲兼雪捎簷力借風每來寒夜後多在客愁中草意閒門共燈情白髮同之人天一角的的似髙鴻夜歸寄東田隱士觸熱嫌㝷訪閉門如路窮手持東野集思與何人同候雨坐櫩樹聼蟬得晚風因之過林叟歸歩月明中新秋有懐得秋才一日秋意已紛紛凉覺水邉早聲先樹裏聞髙僧在西嶺短䇿不離雲我欲㝷行跡恐驚鸞鶴羣題海雲寺香刹住中流初疑地若浮路從沙際入帆到樹邉收清磬敲漁夜新書報橘秋洞庭西在望欲去更遲留題鎮海樓斯樓屢易名一上一傷情白屋多為戍青山半作城雨中春樹出風裏晚潮生亦有歸鴉早閒啼四五聲登富春永安寺栗葉邨前石子溪青山一掩路渾迷也知谷裏多􅆐鳥未信雲中有犬雞滿耳只聞諸澗響回頭方覺衆峰低平生傾想今朝到願結茅茨在寺西與姪自京還横塘故居桑麻田在水邨中千里歸來共阿戎春水野航天上下石橋林木岸西東階除㸃火兒童喜兄弟開門語笑同二載客塵如夢事明朝溪上看飛鴻過湖州平生只想住湖州僻性迂情可自由一片水聲中倚杖幾重山色裏行舟東林書卷貧猶買西塞綸竿老未收緩得歸程過寒食杏花村雨聼鳴鳩喜友過新居柴門不向小溪開西阜山多稱不才柱杖前村新雨後故人東郭買舟來山瓢逺慰何多幸竹逕相逢第一迴從此熟來溪上路莫教行迹有莓苔古懐思㝷海底人為乞珊瑚樹持栽此庭前顔色長不故答香光居士山北山南住雞聲隔一峰新詩忽寄到猶勝一相逢許起宗見過雨氣來山北茶香過竹西芙蓉花發處明日約扶藜横塘寺桫羅園裏好僧坊兵火年來事可傷白髮老人知舊跡繞塘樓子十三房題明辯之畫春江聼雨圖歸來雙鬢各蕭然見畫猶能記昔年風雨一船曽泊處借人燈火草堂前題網魚圖溪頭三月雨昏昏落盡桃花水正渾網得魚多滿家喜賣時應不到城門妙聲十二首妙聲字九臯吳縣人居常熟慧日寺洪武初被召蒞天下僧教有東臯録雨宻雲起崇朝飛雨灑髙閣蕭瑟傍松檐逶迤帶煙郭坐來池水深吟罷林花落已知禾黍秋不奈衣裳薄送沈行恕挾䇿事行邁言往五湖濵隂風結山岳落葉滿河津之子忽已逺我懐将焉陳志士惜白日行客念蕭晨况兹艱難際奪我心所親中情茍不移在逺猶比鄰毋為離别苦庶以道自珍水仙詠百草秋盡死孤花麗巖阿芳心太皎潔嵗事成蹉跎㣲月歩遥夜輕風生素波懐人豈無意路逺欲如何題髙尚書九江暑雨圖尚書畫山山巃嵸九江秀色開森聳况當五月暑雨交雲氣滃勃川光動五峰削出青如蓮緑樹仿彿聞吟猿猶瞻謝眺青山宅不見米家書畫船何人出門面山立頭上烏紗翠痕濕誰喚山東李謫仙來觀瀑布三千尺於今戈㦸亂如麻使我披圖一永嗟欲買沃洲歸共隱江山如此屬誰家新墳行南山崔嵬青入雲將軍取山新作墳方春迫民就工役路上白日無行人西家舊墳雙石馬一日驅來華表下東家翁仲今尚存一朝移來在墓門葬期日薄云最吉雞鳴而作夜不息新墳已成舊墳毁舊鬼銜寃新鬼喜新墳舊墳無了期南山崔嵬終不移題商徳符山水左山畫山延祐初山如何其佳有餘飛泉髙挂白蝃蝀竒峰爛發青芙蕖直疑齊東華不注又似塞北醫無閭嗟哉好手不復得藏弆貴比英瓊琚題焦元尚山水淮陽先生愛畫山下筆萬里須㬰間既開金刹依寥廓亦有緑樹臨潺湲竹間鳥啼春雨歇洞口花落晴雲閒知君髙志在丘壑著我溪橋相往還游石湖近聞移居湖水頭蘭若下瞰滄波流獼猴夜偷錫杖去鷗鳥日傍䦨干浮揚州月照五湖白洞庭木落三山秋相望只隔半江水安得贈之雙佩鈎苦雨懐東臯草堂寄如仲愚四月滛雨寒凄迷邊軍夜歸聞鼓鼙大麥漂流小麥黒富家歎息貧家啼書囊留滯北山北草堂故在西枝西焚香掃地蚤閉户莫遣袈裟沾燕泥發金陵大船浮江江水清中流蕩槳鴐鵝鳴楚雲無情自西去吳山不斷來相迎坐依北斗近人白卧見河漢當空横舟中有客且勿語聼我竹枝歌月明東臯雜興三髙祠西湖水東浦口水與長橋通人言此中可避世來結茅齋如巳公題畫目極江南有所思餘不風雨落花時錢郎應恨春歸盡獨倚東風寫折枝至仁二首至仁字行中自稱熙怡叟番陽人元末住紹興崇報寺洪武初主虎丘寺有澹居稾詩話澹居稾為饒州路總管府判官皇甫琮廷玉所編僧克新序之嘗撰楚石行狀有云浙水東西被召者十有六人余與西齋𤦺公夢堂噩公與焉則詩雖刋行於至正中而實登明初之法席者也吳越兩山亭為尹本中縣尹賦蕭然大夫新作亭吳山越山相對青天目雲霞耀西浙石帆風雨來東溟王覇英雄何足數句踐夫差兩抔土喜君亂後蘇蒼生白晝彈琴如單父送厚元載遊㑹稽江上楊花落孤帆度逺汀潮連滄海白山擁㑹稽青内史籠鵝帖仙人放鶴亭登臨有新製毋惜寄林扃元瀞二首元瀞字天鏡一云字天覺號樸隱㑹稽人自稱㑹稽山樵洪武中召至南京乞歸主靈隱寺羅禍謫戍陜西有樸園集重九二首舊日重陽節唯㝷麯米春忽經時到眼但覺老随人白髮雖多難黄花不厭貧登髙本無意蹤跡媿紅塵故舊俱淪䘮人情轉寂寥馳驅逢九日牢落是今朝把菊難為醉囊茰興自消江鄉獨無頼風雨暗蕭蕭清濋一首清濋字蘭江天台人居天界寺晚主松江東禪寺有望雲集西湖曉行海角曈曨日欲生山南山北淡煙横春風吹斷沙禽夢人在緑楊堤上行􅄎洽一首􅄎洽字南洲山隂人上天竺僧洪武中為僧録司右講經歴左善世㝷以讓道衍居右遭讒左遷右覺義乆之復右善世有雨軒集潘次耕云遜國之事因洽公之繋獄而疑其開剃猶曰君子可欺以其方也因從亡致身諸録而行程嵗月一一以虚者實之難罔以非其道矣詩話遜國之事國史太略野史過詳終成疑案程濟梁田玉等未必有其人史仲彬官翰林未必有其事與其惑於從亡致身諸録無寕信鄭端簡今言所述矣題山深草堂次王適齋韻聞說平夷堡髙居絶徼山牽蘿秋補屋伐竹曉開闗欵塞烽煙静歸田士卒閒都門回首處頻喜寄書還普莊一首普莊字敬中仙居人洪武中被召入天界寺歸住徑山示寂於撫州詩話莊公自號呆菴作歌云呆菴呆道人不識世間秋與春無榮無辱無疎親讚亦不喜罵不嗔雖以自訟其矜詡也多矣追和歸源老祖山謡長林悉凋落刮地霜風吹道人不出山終年無所知一心既空寂萬法將焉依海門明月上冷照枯松枝至道一首至道字物外臨海人住無錫之嵩山寺洪武中被召㝷乞還有夢室集流翠亭道人性沉静置屋層巒間四檐山溜瀉萬壑松濤翾清秋爽氣集落日衆鳥還過客坐來乆寂寥誰叩闗如蘭三首如蘭字古春富陽人住持天竺寺永樂初召挍鐫經律論三藏有支離集詩話古春與夢觀同游東維子之門東維子有送二上人歸三竺序其略云余在富春得山中兩生曰蘭曰仁授之以春秋兵興潛於釋然皆用世之才夢觀為孝陵尊禮古春晚出嘗識于忠肅於彌月時亦别古崖之流也琴清為胡若思教諭作微飈灑練衣空庭夜寥泬凉葉生露華澄江上新月沖􅁭澹無營孤桐絃白雪天秋萬籟鳴霜清百泉咽冥鴻度湘雲威鳳出丹穴至音聼者稀幽思自超越悵然一長吟烏啼漏聲徹殊别峰習静卷疾雷破山嶽大風揚波濤百川相蕩潏萬竅争怒號道人聞自性六窗鎖猿猱喧寂兩忘念月出中林髙曉發東風卷雨曉雲收兩岸雞聲送客舟柔櫓不驚沙上雁殘燈猶照驛邊樓天連野水浮空闊斗轉銀河拂地流遥望吳城何處是青山數㸃落長洲懐讓一首懐讓字不虚天童寺僧㝷竹隱寺聞鐘識寺遥小徑縁雲入日暮下山歸秋衣不知濕善學一首善學號古庭吳人出家大覺寺元末主崑山薦福明初居光福以寺僧輸賦違期徙贑州行至馬當山示疾而卒有詩集毛子晉云古庭長於五言如雲起猿聲斷松髙鶴夢危人疑天上坐鷗訝鏡中飛垣倒夜奔鹿草深秋聚蛇殿空容鳥入樹老引藤纒令元遺山見之應解頤也宿晚村眺望前村近桑麻路欲迷過田衣拂水緣徑屧沾泥逺嶠寒煙合空林夕照低村翁留我宿也解說禪栖自恢二首自恢字復初一作元南昌人洪武初住廬山偶成金沙溪上柳條齊白鳥羣飛落照低十里荷花紅勝錦好山多在畫橋西題唐子華畫山水江雲如雪樹髙低竹裏人家傍水西滿地松隂春雨過好山青佀若耶溪無愠一首無愠字恕中號空室臨海人出家徑山主明州之靈巖再主台州之瑞巖忽謝事入松巖日本來聘被召至闕下以老病辭留天界寺㝷還鄞之翠山松巖襍言山中十日九日雨樹頭青子落不住白犬㝷蹤入草間驚起竹雞飛上樹智圓一首智圓字鑑中錢塘人住寳幢寺送僧還四明逺移瓶錫秣陵城又逐秋風過四明白石清泉㝷舊約碧雲紅樹動離情路從朱雀橋邊去舟自丹陽郭裏行惆悵客中頻送客更堪疎栁暮蟬聲大本一首大本字宅衡㑹稽僧徑山書記送徐行正人材之京鴻鴈來時澤國秋西風潮落大江頭蒹葭楊柳東西岸楓葉蘆花逺近洲鐘阜煙霞千嶂出蓬萊宫闕五雲浮丈夫勲業青冥上莫為鄉思易動愁大圭一首大圭字恒白晉江人泉州開元寺僧有夢觀集詩話恒白語法侣云不讀東魯書不知西來意此逃墨歸儒之言也嘗題山居云山色宜茅屋松風滿飰盂湖中泛月云偶臨湖坐得嘉樹欲傍花行無小船均饒風致夏日同許氏兄弟遊龜山山有大石下有歐陽詹讀書遺址閒情素乖俗樂彼中林居林居未云果幽賞意有餘出郭多青山佳木亦扶疎並游得良友方駕從所如翠㣲薄炎景蘿風汎凉裾雲逕歩窈窕石門入清虚少留席豐草緑縟綿以舒叢柯翳鳴鳥石澗清游魚形神一蕭散疲勩亦已袪路縁龜巖東遂即歐陽廬懐賢仰髙躅撫蹟驚廢墟願留石中室畢誦人間書兹焉恐遲暮眷眷空躊躇浄圭一首浄圭住磧里游仙詩縹緲仙山五色雲玉真飛佩度氤氲不應名字題仙籍猶著唐家舊賜裾徳珉二首徳珉字伯貞號石窗洪熙間虎丘寺僧後居徑山秋懐江潭葉落鴈初飛又見凉風到客衣日下浮雲迷北望天涯孤棹滯東歸驚看秋草流年換夢憶青山故舊稀明日一竿滄海去白鷗應笑未忘機晚泊東湖有懐姚醉雲水晚雲隂思渺茫若為孤棹泊横塘夢回明月人何逺愁對殘燈夜更長别渚沙寒移宿鴈疎林葉響墮㣲霜明朝有約新豐道載酒重過舊草堂善啟一首善啟字東白號曉菴長洲人主蘇州永定寺㝷主松江延慶寺授僧綱司副都綱預修永樂大典有江行唱和詩集詩話曉菴早負詩名錢唐瞿宗吉賦牡丹詩師與對壘用一韻賦百首獨菴南洲交器重之嘗被召纂修永樂大典書成告歸與上竺完公敬修北禪瑾公如珪白蓮車公指南舟中倡和有江行詩一卷王汝玉序之按大典共二萬二千九百卷疑編纂之不昜而敬修詩云昔出當嚴冬兹還及春暖盖不過數月事爾考當日賜鈔者二千一百六十九人則因編纂者多宜成書之速矣十四日歸舟分韻江黒饒煙嵐咫尺景難了臨發棹還停復恐天未曉怳然隂翳開日出雲漢表旋吳地匪遥辭闕境云杳客愁忽若遺吟緒自縈繞坐乆望東南斜陽獨歸鳥大冋二首大冋字妙止㑹稽人鄞縣延慶寺僧預修永樂大典詩話妙止詩格未髙然已脫蔬笥氣懐友谷風凄巳厲習習吹我襟㣲煙襲芳樹細雨沾髙林雖有一尊酒對此誰共酙迢遥故人逺矧隔瑶華音安得駕黄鵠往論古與今緬懐思方續白日苦西沉江邨夕照圖江村水國幽雲樹半含秋落日曬漁網凉風吹客舟香秔黄早刈碩果熟先收官稅供輸外民歌樂未休懐瑾一首懐瑾字如珪蘇州北禪寺僧又住嘉定保寧寺為僧綱司都綱預修永樂大典江行分韻南徐百里近邦畿水滿春江一棹歸回首金焦在何許落霞紅處白鷗飛浄倫二首浄倫字大巍昆明人正統中出家天順間叅善學於浮山晚住錫五臺示寂於京師顯通寺有竹室集詩話竹室不以詩名往往饒中晚唐風韻五言如松皮山舍小石子野溪彎雨苔迷石徑山氣冷龕燈七言如晴疊青山芳沼上冷懸紅日畫樓西半竿落日孤城逺千里分沙一水流到岸舟横流水曲㝷溪路入落花藤樹頭落子銜松䑕崖畔飛霜呌竹雞原上燒痕初過雨隄邊新栁未拖泥黄茅恰好三間屋赤米看収數畝田亦可入李和父𢎞秀集也次喬武庫縉金山勝覽韻妙髙臺上昔年遊想徧山中景物幽出洞白雲含海曙映窗晴雪湛江流好音常聽樹頭鳥相對不飛沙際鷗西望金陵千古意蔥蔥佳氣帝王州古佛巖蒼松蟠古巖洞門鎖幽谷但逢掃葉僧不見銜花鹿𤣥穆一首𤣥穆淮陽僧題焦山寺獅子峰前放晚叅直登絶頂縱幽探帆檣逺近迷蒼靄樓閣髙低鎖翠嵐水色倒􅇽天上下山形雄壓地東南焦先去後巖扉古樹老碧桃春正酣詩話天順中鎮江同知府事常山張春命焦山寺僧𢎞慧輯寺中題詠止存宗泐二首及此詩寳明三首寳明號月舟吳人治平寺僧楊君謙云月舟詩能逺塵字亦清媚貧而好客客至則罄資飲之次沈陶菴題石田有竹莊韻東林煙月舊松蘿無復君來對酒歌千葉芭蕉萬竿竹相思一夜雨聲多游山舟中作舟過横塘酒再沽行厨烹出四腮鱸好山都在西南上一路推篷看畫圖戲題拆了鞦韆院宇空絲絲楊柳自春風薔薇不為人拘束却過鄰家屋上紅恩䥓一首恩䥓字古田號友雲成化間蘇州嘉定護國寺僧有集送張逸人楝子花開香雨晴乍逢還别若為情不知流水將人意送過南沙第幾程明秀十首明秀字雪江自號石門子海鹽人祝髪天寧寺晚居錢塘勝果山有雪江集釋冬谿云石門秀禪師以詩名海上游心騖精力追唐雅鄭少谷孫太白諸名流多所稱許詩話王伯安謫龍場驛丞雪江送以詩云蠻煙瘦馬經山驛瘴雨寒雞夢早朝一時傳誦之斯未為警䇿特以清越勝耳觀其遺集三卷流轉跌宕不失清江靈一之遺音臨終偈云一夜小牀前燈花雨中結我欲照浮生一笑浮生滅亦彼法中所謂解脫者田叟贈朱可麓早起飯牛犢落花春水渾雨中青箬笠溪上白雲村食力古莘野全生今鹿門不知城府外何處有桃源汎舟至桐口路轉青村合山連赤岸斜夕陽飛燕子茆屋落桐花晚墅聞孤笛輕舟閣淺沙前峰望不逺林暝欲棲鴉送陳墨山還吳淞兼柬胡秋田五茸城外月不見十年餘顧我曽遊地因君得寄書津亭然夜火江市鱠鱸魚若見秋田叟還勞問起居日暮西閣日將夕川原生暮煙逺林歸倦鳥枯葉抱寒蟬野岸漁罾外秋風戍壘前故人應念我定有尺書傳楚江秋曉次石田翁韻山川揺落露華晞野寺鳴鐘破曙暉千里人烟江郭静數聲漁笛水禽飛寒催刀尺風霜早日逺闗河信息稀叢菊又開身在客長沙誰念未成衣懐孫太白山人堦前黄葉堆欲滿湖上白雲閒自來千里秋風悲斷鴈兩峰寒日憶登臺未能明月同移棹想見黄花獨舉杯吟遍長松千萬樹南屏落日寺門開勝果山中懐朱陳二翁西閣暮鐘雲氣隂南山秋色故宫深半巖落日照江雨萬里長風吹桂林喜見燈花頻入夢病憐物色獨闗心青天兩夜負明月黄葉思君祗自吟雨中柬金近山春雨黯黯芳事微經旬獨掩西巖扉花枝欲動寒仍勒燕子初來濕不飛嵗月豈知愁換鬢江山徒有泪沾衣病夫起坐正憶汝混世随聲同是非訪夏雲山雲山老翁住南村抱病十日不出門留客細傾若下酒遣懐閒弄膝前孫深林四月筍成竹古屋百年槐露根鄉曲别來無限意白頭相對意忘言西巖夏日窑盤春雨中筍味殊勝肉數日不窺園南風吹作竹普㤗三首普㤗字魯山陜西人住京師興隆寺有棲閒集何仲黙云魯山曠懐磊落善談世務不獨能演其教其詩亦皆自得詩話魯山初見賞於楊君謙復見稱於李獻吉詩名籍甚然卑卑無甚髙調秋晴幾日豆花雨兹晨方見晴寒蟬依樹響秋蘚上階生山脫雲尤翠池􅇽日更明西風催萬户都作搗衣聲寄楊君謙都下聞歸鴈江東憶故人髙山千里夢芳草十年春吟苦先催老心安却耐貧吳門他日過書院許誰鄰足獻吉秋風南北路相别寺門前之句身世本如寄去留俱灑然秋風南北路相别寺門前永瑛二首永瑛字含章號石林海鹽天寧寺僧有石林集釋冬谿云石林禪餘景與意㑹朗吟自若其詩意到詞發類多率爾而幽沖暇豫自足陶寫蓋適其適而不適人之適者山居志感嘉蔬植我園好鳥巢我樹樹枯鳥驚棲園荒蔬委路寒氣肅山林新芳颯然故物理有固然於何起欣惡秋浦白露下蒹葭秋汀尚有花數峰迴晚色一鴈落寒沙菰熟供炊具鱸肥上釣槎月明吹笛去隔水是漁家丈湛四首文湛字秋江海鹽天寧寺僧有蘆葦亭稾詩話秋江詩亦清徹可云筆非秋而垂露嘗輯江海羣英集行世者也送王景仙碧梧秋晚葉皆稀何事行人又逺違落日天涯千里别西風江上片帆歸山城月出聞猿嘯候館霜清見鴈飛此後定知難㑹面想思惟有淚沾衣江上江頭落日明江上西風起嵗嵗芙蓉花開落秋江水緑楊紫燕圖紫燕雙雙掠水濵緑楊嫋嫋不勝春朱門華屋知多少認得誰家是主人題畫渡口漁家對碧峰柴門半掩落花風釣船日暮不歸去只在江南細雨中明詩綜卷九十
