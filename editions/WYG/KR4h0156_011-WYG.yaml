body:
  text: 明詩綜巻十一翰林院檢討朱彞尊編余堯臣一首堯臣字唐卿永嘉人元末自㑹稽入吳明初謫濠放還授新鄭丞有菜薖集靜志居詩話髙季迪春日懷十友詩於余司馬堯臣云列戟衛嚴闗應無休沐暇夜飲余左司宅云燈鎻月窺闌角警霜委砌荅余左司沈别駕元夕㑹飲城南詩云故人念我有二子省内郎官府中佐徐幼文菜薖詩題為永嘉余唐卿左司賦然則左司之稱本於越鎮将版授而司馬之銜疑唐卿曾仕於淮張也秀野軒濕翠浮草芽空青㪚木杪輕舟理横塘歸人渡清曉棲鴉返故巢潛鱗濯新藻倒景澹斜暉廻飇蕩晴昊衡門夜不扃燕坐事幽討落葉秋自飄殘花春嬾埽我欲往從之稅駕苦未早揮手謝孤雲去去沒蒼徼王行三首行字止仲長洲人洪武初為郡庠經師藍玉延教其子連坐誅有半軒楮園二集徐子元云行詩清雅苐不及髙楊詩話止仲好談兵游都門人或尼之笑曰虎穴中好休息也旣就涼國西塾數以兵法說涼國涼國卒用是敗平居於十友中最契道衍贈之序曰上人非若他人事佛奉師碌碌作沙門者今天下亂已極且必治治然後出於時以發其所藴其上人之志與當世之人安知終無與上人同其志者盍姑有所待也誦其言亦傾危之士乎至墓銘舉例一書足為學文者津筏詩非所長也題趙元臨髙房山鍾觀圖北苑貌山水見墨不見筆繼者惟巨然筆從墨間出南宫實遊戲父子並超軼髙侯生古燕下筆蛻凡骨沄沄水墨中探破造化窟嘗圖得鍾觀景象照雲日長松映飛泉霞采互飄歘今朝見玆畫臨寫意無失慘憺入窈冥稜嶒隔岑蔚髙堂時一舒六月氣蕭瑟平生丘壑性塵坌欣已拂因之興我懐山中斸苓亦趙吳興淵明像幷書歸去來辭後更畵竹石虛館坐清曉髙秋零露時佳菊秀可餐墨葩含晩滋芳馨發孤思寫此歸來辭餘興猶未已寒玉生疎枝孰謂公子懐不與幽人期撫巻三歎息繫年非義熙房山寒江孤島圖千山萬山重復重畫力筆力鬬竒雄青紅蒼翠滿縑素缺處淺碧分遥峰歴觀畫史毎如是意謂此法由來同昨嘗凌秋溯揚子一舸縹緲乗長風洪波吞天杳無際出沒但有孤輪紅乃知山水有佳處到此始覺塵埃空當時海岳應飽見落墨便自超凡庸不將層疊競工巧遂使氣象齊鴻濛平生愛畫惟愛此苦恨妙法無能攻九州之表有人物意象獨數房山翁玆圖咫尺便千里小米大米追髙蹤愛之歌詠乃常理濡翰自媿言非工詩成忽復三歎息矯首長望青冥鴻宋克一首克字仲温吳人明初徵為侍書出為鳳翔府同知詩話仲温任俠自喜挾彈走馬學握竒陣法張氏據呉欲致不得闔門却埽工草𨽻書祝京兆評其書法天授而髙侍郎為作南宫生傳盛譽其詩侍郎又有酬宋軍諮見寄詩云少為鬬雞兒鮮裘奮春明走馬出飛彈撇捩誇身輕氣服諸俠徒不倚父與兄落花錦坊南美人理妝迎酒酣迸五木脫帽呼輸贏及壯家已破狂㳺恥無成遂尋鬼谷師從之學言兵業成事燕將逺戍三闢營竒勛竟難圖迴臨石頭城覽時識禍機不因憶蓴羮飄然别戎府震澤還東征恥求薦辟書傲然揖公卿知音竟為誰四海嗟惸惸又荅仲温見寄詩云念昔文翰場弱蹤繼清塵鳴絃東閣夜飛蓋西園晨誦之可得其行㮣矣惜其詩集罕傳也秋日懐兄弟相别㡬多時相思淚滿衣家貧經難久世亂得書稀作史余誠拙從軍事亦非鄉心秋塞鴈盡日向南飛吕敏一首敏字志學無錫人元末為道士洪武初官無錫縣學教諭有無礙居士集書雲林畫林亭逺岫憶過梁谿宅于今二十年賦詩清閟閣試茗惠山泉夜雨牽離夢春雲黯逺天鄉情與離思看畫共茫然陳則一首則字文度崑山人洪武六年以秀才舉任應天府治中俄進戸部侍郎謫大同府同知遷知府題雲林畫落花愁殺未歸人亂後思家夢更頻縱有溪頭茆屋在也應芳草閉深春孫蕡二十首蕡字仲衍南海人洪武中授工部織染局使出為虹縣主簿選入為翰林典籍復外補平原主簿罷歸尋除蘇州府經歴謫遼東坐黨禍死有西菴集黄才伯云仲衍詩初若不經意而氣象雄渾興喻深致駸駸乎魏晉之風徐子元云嶺南五先生惟仲衍清圓流麗如明珠走盤不能自定彦舉雄俊豐麗殆敵手也王元美云孫仲衍如豪冨兒郎入少年場輕脫自好歐楨伯云明興五嶺以南五先生起軼視吳中四傑古李時逺云仲衍豪邁瑋麗足追作者其七言體不讓唐人葉處元云先生五七言古風雖唐人不能逺過枇曹潔躬云仲衍善言風景於廣州則云丹荔杷火齊山素馨茉莉天香國於羅浮則云紫極房櫳倚日開蕊珠樓閣中天起於雲南則云蠻官見客花布襖邨婦背鹽青竹籃於武昌則云武昌城頭黄鶴樓飛檐逺映鸚鵡洲漢陽樹白煙景濕行人如鷗沙際立使未至其地者誦之亦當神往若酒徒㪚落黄金空獨卧茆檐夜深雨松花酒熟人不歸瑶草東風幾回碧風韻不減唐人他如荒蘿遶屋秋夜凉山鬼吹燈冷光濕興闌移席傍寒梅雙眼如貓對花碧亦不失為韓冬郎語也詩話自蕡以下世所稱南園五先生也仲衍才調傑出四人五古逺師漢魏近體亦不失唐音歌行尤琳琅可誦微嫌緐縟耳集句亦工若秋水為神玉為骨芙蓉如面柳如睂遶籬野菜飛黄蝶糝徑楊花鋪白氊去日漸多來日少别時容易見時難三湘愁鬢逢秋色牛壁殘燈照病容野草怕霜霜怕日月光如水水如天鶴羣長遶三珠樹花氣渾如百和香可稱巧合繼之者如桂嶺瘴來雲似墨蜀江風澹水如羅風塵荏苒音書絶人物蕭條市井空歸目倂隨回鴈盡離魂潛逐杜䳌飛長疑好事皆虚事道是無情却有情緑水青山雖似舊紅顔白髪遞相催此廬陵李楨昌祺所集也如眼前好惡那能定夢裏輸贏總不真東澗水流西澗水錦江春似曲江春雲收雨㪚知何䖏燕語鶯啼亦可傷千里關山千里夢一畨風雨一畨啼惨慘悽悽仍滴滴霏霏拂拂又迢迢此瓊州丘濬仲深所集也如文章宇宙千年事江漢風流萬古情老去詩篇渾漫興晩來幽獨轉傷神欲知世掌絲綸美故肯信吾兼吏隠名縱飲欲謀良夜醉殊方又喜人來乗舟取醉非難事送客逢春可自由登第往年同座主抱琴何處覓知音疎檐看織蠨蛸網逺信閒封豆蔲花四海交游更聚㪚十年京洛共風塵漫説簡書催物役猶將談笑出風塵未央樹色春中見茂苑鶯聲雨後新自歎馬卿常帶病也知光禄最能詩春浮玉藻寒波落水滴銅龍晝漏長佳節毎從愁裏過逺書忽向病中開江淹采筆空題恨荀令香爐可待熏小院迴廊春寂寂北湖南埭水漫漫敢于世上明開眼莫怪先生嬾折腰苦節難違天子命夢歸偏動故鄉情舉世盡從愁裏老暮年初信夢中忙酒酣嬾舞誰相拽客至從嗔不出迎緩帶輕裘成昨夢濁醪麄飯任吾年古來賢逹知多少舊日人民果是非新結草廬招隱逸便應黄髪老漁樵合歡却笑千年事奉使虚隨八月查復有樓臺衘暮景但將懐抱醉春風故國山川皆夢寐昔年親友半彫零此長沙李東陽賔之所集也如病身最覺風露早離夢杳如闗塞長此休寕程敏政克勤所集也如一卧滄江驚嵗晚千家山郭静朝暉嗜酒何妨陶靖節能詩重見謝𤣥暉此吳江周用行之所集也如坐看蕉葉題詩句醉折花枝當酒籌閶闔廻臨黄道正樓臺直與紫微連東風已緑瀛洲草閣道廻看上苑花五夜漏聲催曉箭千門曙色鎻寒梅雲生紫殿幡花濕月射珠先貝闕寒深院沉沉人悄悄春風澹澹影悠悠笙歌縹緲虚空裏臺榭參差煙霧中小院廻廊春寂寂前峰後嶺碧濛濛離岸游魚逢浪返出林幽鳥向人飛雲開日月臨青瑣花擁絃歌咽画樓晴雲滿户團傾葢瀑水能侵階濺舞衣此錢塘沈行道道所集也如念我書數字至似君須向古人求此上海陸深子淵所集也如卿月夜臨仙掌動御煙曾見衮龍浮風煙迸起思鄉夢霄漢長懸捧日心病眼較來猶斷酒新詩改罷自長吟江清露白芙蓉死雲㪚天髙秋月明蘄竹水翻臺榭濕桐花風軟管絃清胡蝶夢中家萬里鳳皇聲裏住三年愁將玉笛傳遺恨暗擲金錢卜逺人路遶寒山人獨去江涵秋影鴈初飛陶令久辭彭澤縣山翁長醉習家池虚心願比郎官筆感興平吟才子詩漠漠稻花資旅食輕輕栁絮㸃人衣老妻畫紙為棊局童子開軒埽落花細水浮花歸别澗西風落葉掩重門鳥啼深樹斸靈藥馬飲春泉蹋淺沙日落逺波驚宿鴈月明芳戍起啼鴉共歡天意同人意多説明年是稔年倦客閉門三日兩野橋流水一犂煙侯門不把馮驩劒客路空攜范蠡圖暮雨自歸山悄悄髙樓獨上思依依閒尋古寺消晴日却聽疎鐘憶翠微日暮酒醒人已逺鳥啼花落水空流清風未許重攜手好月那堪獨上樓魚躍鏡中將緑破鳥還天外帶青來過橋樹葉邨邊合隔岸柴門竹裏開碎心雨夜重檐溜滑足春融一徑泥此廣州張績所集也如故里春光榮畫錦上林晴日絢朝衣莫言海上渾無地應是壺中别有家紅樹枝頭聞犬吠寒山影裏見人家溪邉瑶草含朝露天上珠簾巻曙霞鳥啼雲竇仙巗静樹入天台石路新臺上鳳簫秦弄玉鏡中珠翠李夫人閒愁却恐驚巢燕往事應須問塞鴻楊柳亭臺凝晚翠芙蓉簾幕扇秋紅醉依華屋春多麗貴想豪家月最明天上吹笙王子晉雲邊度曲許飛瓊淚殘秋雨遺塵韤腸㫁春風為玉簫蝶粉亂翻迎笑臉柳絲輕舞學纖腰恍疑瓊島翻成夢只是長安不見人别酒不須花厎勸淚痕時傍枕函流看花誰與同攜手好月那堪獨上樓望㫁鴛鴻猶未見可憐蜂蝶却先知石窗花落春歸䖏山店燈殘夢到時好夢肯隨胡蝶去離魂暗逐杜䳌飛三春景色佳期誤半夜雨聲前計非遶砌寒風號絡緯閉門疎雨落梧桐狂客漫歌金縷曲佳人猶舞越羅衣紅樹暗蔵殷浩宅青山空遶仲宣樓那堪往事空牢落誰共芳樽話唱酬此姑孰夏宏仲寛所集也如山横故國三年别江至潯陽九派分兩岸蘆花飛曉雪幾家松火隔秋雲迢迢霽野雲隂合淅淅疎簾雨氣通風月無情人暗換江山有待我重來九重霄漢天將近萬轉雲山路更賖武帝祠前雲欲㪚胡公陂上日初低此安成王佩所集也如碧落有情空悵望春山無伴獨相求山中習靜觀朝槿洞口經春長薜蘿啼鳥歇時山寂寂寒鴉飛盡水悠悠人生有酒須當醉世上浮名好是閒嶺樹重遮千里目故人那惜一行書此海鹽朱朴元素所集也如柴扉茆屋無人問㫁岸寒流到厎清歸鳥各尋芳樹去寒潮唯帶夕陽還花開花謝常如此船去船來自不停流水白雲常自在晚山秋樹獨徘徊茶煙漁火遥如畫江水雲山杳莫窮此金華童琥廷瑞所集也如萬里悲秋長作客一官羈絆實藏身此崑山才鵬時舉所集也如鱸魚正美不歸去瘦馬獨吟眞可哀梁間燕子聞長歎樓上花枝笑獨眠勸君更盡一杯酒與爾同消萬古愁此蜀中安磐公石所集也如霜彫碧樹作錦樹色過㯶亭又草亭諸葛大名垂宇宙元戎小隊出郊坰殘花爛漫開何益妙舞逶迤夜未休鍾鼎山林各天性風流儒雅亦吾師已聞童子騎青竹喚取佳人舞繡筵休怪兒童延俗客不勞鐘鼓報新晴病軀動覓藜牀坐嬾性從來水竹居庾信羅含皆有宅李陵蘇武是吾師煙緜碧草萋萋長雨裛紅蕖冉冉香萬里相逢貪握手百年多病獨登臺此香山黄佐才伯所集也如歸信幾畨勞逺夢愁心一倍長離憂自願勤勞甘百戰莫將成敗論三分此戴天錫維夀所集也如長疑好事皆虚事莫遣佳期竟後期素奈忽開西子面芙蓉不及羙人妝徒勞掩淚傷紅粉但惜流塵暗洞房此劉芳節聖逹所集也如世態炎凉隨節序人情翻覆似波瀾笛怨栁營烟漠漠馬嘶山店雨濛濛緑樹碧檐相掩映游絲舞蝶共徘徊人世㡬回傷往事愁心一倍長離憂浮生已悟莊生夢末路虚彈貢禹冠敗葉殘蟬連漢苑古烟髙木隔棉州五千里外三年客一寸心中萬斛愁返照入江翻石壁疎松隔水奏笙簧鳥下緑蕪秦苑夕雲凝碧樹渚宫秋此莆田陳言于庭所集也如念我能書數字至悲君已是十年流新添水檻供垂釣許坐層軒數㪚愁此廣州黎民表惟敬所集也如衰草夕陽江上路漁歌樵唱水邊邨一樽春釀蒲萄緑滿甕秋香竹葉青僧歸黄葉林邉寺人候夕陽江上舟某所集也如顧我老非題柱客凡今誰是出羣雄因知貧病人須棄不露文章世已驚逐客雖皆萬里去雄豪復遣五陵知獨當省署開文苑未有涓埃荅聖朝天子亦應厭奔走諸公何以荅昇平深山大澤龍蛇逺古木蒼藤日月昏此闗中南師仲子興所集也如天下何曽有山水老夫不出長蓬蒿此南海陳子壯秋濤所集也如朝雲暮雨連天暗野草閒花滿地愁蘭亭舊路雖曽識子夜新歌遂不傳自歎馬卿長帶病何曾宋玉解招魂追思往事咨嗟久始覺空門氣味長瑶臺絳節游俱遍粉壁紅妝畫不成碧落有情應悵望白雲何䖏更相期鶯憐勝事啼空巷蟬曵殘聲過别枝大抵好花終易落爭教紅粉不成灰天長地久有時盡物在人亡無見期疎檐看織蠨蛸網古木惟多鳥雀聲去日已多來日少他生未卜此生休珊瑚枕上千行淚白玉壺中一片氷不堪紅葉青苔地早是傷春夢雨天更恨香魂不相遇眞成薄命久尋思碧莎裳下攜詩草楊栁洲邉載酒船春蠶到死絲方盡古柏重生枝亦乾此秀水沈徳符景倩所集也如孤櫂夷猶期獨往崇山瘴癘不堪聞漫說簡書催物役可堪風景促流年津樓故市生荒草落日深山哭杜鵑幸與野人俱散誕不嫌門徑是漁樵此萊陽姜埰如農所集也如早春重引江湖興嬾性從來水竹居千樹桃花萬年藥半池秋水一房山側身天地更懐古獨立蒼茫自詠詩天下何曽有山水人間豈不是神仙王侯第宅皆新主冨貴榮華能㡬時閉户著書多嵗月揮毫落紙如雲烟莫愁前路無知己幾處蠻家是主人漢家城闕如天上武帝旌旗在眼中此嘉興周篔青士所集也如芳草有情能下淚野花無語自生愁關門令尹誰相識江上漁翁未易名一曲正愁江上笛十年如見夢中花世人不識東方朔谷口空稱鄭子眞獨在異鄉為異客自憐長病與長貧那知白髪偏能長莫遣黄金漫作堆為客馬卿真寂寞依劉王粲本凄凉坐中醉客延醒客鏡裏今年老去年樹影悠悠花悄悄江蘺漠漠荇田田中郎有女誰堪託伯道無兒最可憐仙人有待乗黄鶴壯士徒令感白虹啼鳥歇時山寂寂寒鴉飛盡水悠悠羞將短髪還吹帽共踏清歌又舉尊江上暮鴻遥送影湖南春草但相思蒼山迢遞成千里明月何曽是兩鄉千里雲山何䖏好十年書劒總堪憐波生野水鴈初落風静寒塘花正開獨坐黄昏誰是伴毎逢佳節倍思親共說陳琳工奏記焉知李廣不封侯水浮花片知仙路草帶泥痕過鹿羣晚景莫追窗外驥銷憂已辨酒中蛇此蘭谿胡山天岫所集也予叔父芾園先生亦雅好集句客至觴行恒舉數聨坐客服其工緻予所記憶者如細推物理須行樂髙視乾坤又可愁庾信羅含皆有宅伏波横海舊登壇蕭何只解追韓信賈誼何須弔屈平料得也應憐宋玉不知何處弔湘君能將忙事成閒事不薄今人愛古人豈有白衣來剥啄便應黄髪老漁樵閣中帝子今何在河上仙翁去不回謝朓詩篇韓信鉞老萊衣服戴顒家笑拈霜管題詩句閒句春風倒酒缾野廟向江春寂寂殘燈無燄影幢幢滕王髙閣臨江渚漢主離宫接露臺壺觴須就陶彭澤勲業終歸馬伏波皆極自然陸務觀所云火龍黼黻手非補綴百家衣者比也擬古三首岐路一尊酒送君今逺行交持未及竟絲管激哀聲冉冉嵗華暮悠悠雲氣征馳車戒往路惻惻傷我情我情黙已傷歡愛不可忘昔為春花妍今為秋草芳秋草芳有時夫君見無期獨宿坐長夜淚落如綆縻白日儻回照孤懐君所知華月㪚髙樹列曜何參差流光射結綺思婦慘中闈良人渉逺道感歎夜何其清聲發妙曲宛轉有餘哀妙曲固可聽餘哀知為誰春至桃李妍嵗暮華色衰居然獨處廊顧影久徘徊離離谷中樹燦燦春華芳枝葉何盛茂忽然隨風揚流光有彫換物理安可常擾擾路傍子哀歌使我傷杪秋天氣肅白露結嚴霜攬衣不能寐起視夜何長明月出東壁衆星羅縱横嵗暮鶗鴂鳴百草青自黄逺道者誰子驅車登太行太行鬱嵯峩天路無津梁興言念同志涕下霑我裳寄琪林黄道士雨絶天景佳前榮樹光緑遥憐採芝侣逺在春山曲琴歌久己㫁酒賦何由續有約今夕同開樽埽茆屋湖州樂湖州溪水穿城郭傍水人家起樓閣春風垂柳緑軒窗細雨飛花濕簾幕四月五月南風來當門處處芰荷開吳姬畫舫小於斛蕩槳出城沿月回菰蒲浪深迷白紵有時隔花聞笑語鯉魚風起燕飛斜菱歌聲入鴛鴦渚白雲山白雲山下春光早少年冶游風景好載酒秦陀避暑宫蹋青劉鋹呼鑾道木棉花落鷓鴣啼朝漢臺前日未西歌罷美人簪茉莉飲䦨穉子唱銅鞮緐華往似東流水昔時少年今老矣荔子楊梅㡬度紅柴門寂寂秋風裏送何都閫濟南省親至京還廣伊昔闗河事征戰君家嚴君擁方面君拜元戎領大藩虎旗耀日光於電北山之北南河南鯨波虎壘相巉巗轅門上日開將閫白馬朱纓銀作銜軍中呼盧日向午錦筵置酒夜擊鼔龍潭降卒解西歌翁源女兒學東語有時俘賊珠海頭海門六月如九秋牙旗揮天虎豹怒霹靂迸火魚龍愁銀漢淋漓洗穹昊嚴親入覲承恩早角巾還第誰最髙君與君家兄弟好朅來寜親東入齊歸舟一繫蔣林西鶯花爛漫春如海歌舞流連醉似泥蟾溪髙彬故部曲開宴斗門橋下屋宣州棃子鵝兒黄吳姬指纖白如玉酒酣耳熱悲故鄉孫蕡在座情更傷關河北去五千里目斷南天如許長秦淮水生風似雨十幅蒲帆醉中舉龍灣江口辭故人小孤洲北失前侣知君第宅遶西湖門對羅浮列畫圖梅花白白想猶昨盧橘青青今有無三郎今年三十㡬平生與蕡最知已明嵗春還若寄書玉堂華館西清裏往平原别髙彬銀壺緑酒霑春宴環佩朝回奉天殿平生不作兒女悲獨向髙彬淚如霰髙彬昔年桑梓雄好賢乃有古人風東林詩社靜來結北海酒樽長不空朅來弓劒已蕭索短髪如絲猶好客塞上葡萄火齊紅宣州棃子鵝兒白沈緜不獨重相知文采今還勝昔時小樓焚香毎讀易淨几把筆常題詩今晨我作平原别髙彬不意情欲絶芙蓉香冷不堪贈楊柳枝黄未宜折龍灣江口石城頭一幅蒲帆萬里秋暮雲紅樹儻相憶應有音書慰别愁次歸州歸州城門半天裏白雲晩向城下起市㕓架屋依巗巒婦女提罌汲江水巴山雪消江水長城中夜聞灘瀨響客船樹杪鈎石稜漁父雲端曬罾網家家蕪田山下犂倒枯大樹燒作坭居人養犬獲山鹿穉子縛柴圈野雞楚王臺髙對赤甲四時猛氣長䬃䬃柁工鳴板避漩渦櫓聲揺上黄牛峽發忠州顚風翻山雲黑黑星河無光江翕翕揺船夜半發忠州漩深浪緊船欲立宣公祠下灘嘈嘈船頭著水低復髙石稜割裂箕斗影山鬼出雜魚龍號亦知風水莽回互王事有程那得顧誰歌太白蜀道難和我靈均逺遊賦下瞿塘我從前月來西州錦官城下十日留回船正值九九節巫山巫峽風颼颼人言灎澦大於馬瞿塘此時不可下公家王事有程期敢憚微軀作人鮓人鮓甕頭翻白波怒流觸石為漩渦柁工敲板助船客破浪一撇如飛梭灘聲櫓聲歴亂聒緊揺手滑櫓易脫沿洄劃轉如漩風半側船頭水花沒船頭半沒船尾髙水花作雨飛鬢毛爭牽百丈上崖谷舟子快捷如猨猱攏船把酒聊自勞因笑輕生博奇好吟詩未解追謫仙天遣經行蜀中道巴東東下想安流便指歸州向峽州船到岳陽應漸穏洞庭霜降水如油題蘇名逺畫竹圖蘇郎寫竹如寫帖珊瑚為枝篆籀葉寒梢不及三尺長逺勢直與青冥接青冥不辨西與東雲光竹色俱空濛飛亷排山振鸑鷟霹靂迸火驚蛟龍竒搜不獨竹色老竹傍有石仍更好想其落筆當酒酣人間屏幛愁絶倒近時吳興趙子昂最能寫竹窮青蒼蘇郎晩出繼芳躅湖海二妙相輝光十年不到瀟湘浦環佩空懐玉簫女相期共泛書畫船濃墨凄迷埽煙雨送翰林典籍張敏行之官西上燉煌城下沙如雪燉煌城頭無六月關西勁卒築防秋捷書夜半飛龍樓九重下詔徵貔虎推轂上將開都府黄旗巻日大軍行旄頭化石夜有聲燉煌迢迢五千里十月即渡黄河水上將翩翩才且雄平戎不數貳師功叱咤猶在輪臺北匹馬已入渠黎國左較偏禆晚射鵰倚鞍醉索單于朝西山黒風吹墮瓦霜角吹秋一作嗚嗚塞垣下太平今見逺宣威君往從戎㡬日歸幕下文儒兼解武詞林從此有光輝周青士云嘉州遺韻武昌别魯侍儀舍人文濬嘖嘖復嘖嘖人生交契眞罕得我居翰苑君儀曹㡬載相聞不相識君名早已播南衢出入金門早奏書不謂同乗建業水還來共食武昌魚武昌魚肥春酒好竟日流連得傾倒黄鶴樓頭葉亂飛金沙洲上秋將老狂歌謔浪清致同看君更有古人風才如關西楊伯起氣一作性似城東陳孟公相親未㡬還分手可憐新知樂未久君隨征鴈入巴陵我挂雲帆泝州口歸期去去各悽然今夕星河共一作各一天秋晩還期來促膝與君同賦逺游篇冬至冬至至日日初長久客客懐懐故鄉梅蕊惟愁雪爛漫柳條又是春相將嬾朝違世真自笑憶逺寄書人未央海門關外暮雲合應有南還征鴈翔秋風秋風淅淅吹江亭汴河之柳猶青青黄姑東渡㑹七夕白帝西來朝百靈初開琪樹已云落逺别客愁今未醒欲寫鄉書寄南鴈故園萬里天冥冥懐四川草堂煙樹入青霄漢殿荒臺秀黍苗宇宙大一作詩名今尚在風雲霸氣未全銷寒星夜落支機石錦水春明駟馬橋花柳舊游今㡬載西風蓬鬢影蕭蕭龍江夜泊蔣山山頭秋月明龍江江上暮潮生行人乂是金陵客卧聽西風鼔角聲寄王彦舉緑楊隂下玉驄嘶絲絡銀缾帶酒攜夢入南園聽夜雨不知身在蔣陵西出蜀白帝秋髙木葉黄蜀中長是雨浪浪瞿塘水落漩渦小一路看山到岳陽王佐五首佐字彦舉家本河東元末侍父官南雄遂占籍南海洪武初徵至京師授給事中有聽雨軒瀛洲二集黄才伯云彦舉才思雄渾體裁甚工律趙懷璨云彦舉古風歌行伯仲髙岑詩絶句方駕虞揭詩話彦舉與孫仲衍結社南園開抗風軒以延嶺表名士及為給事孝陵賜宋學士黄馬帝為作歌命詞臣和彦舉有臣騎黄馬當赤心之句賜鈔一錠然其詩逺不及仲衍而當時之論云構辭敏捷王不如孫句意沈著孫不如王不可謂定評也唐仙方伎圖開元天子承平日錦繡山河壯京室金殿璇題表集賢玉屏粉繪圖無逸䕫龍接武居阿衡萬方旭日當文明衡山仙人一作老仙何所有亦復通籍承恩榮縞衣黄一作白髪酡顔老自說時來致身早綵篋初開玉仗分白騾突出銀鞍小榻前製號賜通𤣥始信人間别有天樓船未遣蕊珠賜嵗籥俄更天寳年九齡歸卧曲江上牛郎又入中書相花雨香飄蘭若鐘柳雲春拂一作樸金雞帳萬㡬日少樂事多棃園法譜聲相和鬬雞舞馬看不足不獨仙人呈白騾仙人豈是呈仙伎畫者傳之有深意延秋門外羽書飛却駕青騾向西避青騾劒閣雨淋鈴長路一作一段閒愁尚不勝不道畫圖今若此碧雲芳樹滿昭陵醉夢軒為錢公鉉賦東吳髙士索賦醉夢詩我亦醉夢無醒時問君醉夢縁何事君言不解其中意但知痛飲復髙眠即此悠悠是生計乾坤偃仰如蘧廬心寓鴻荒太古初人皆掉舌譚臧否君方黙坐糟丘底人皆明目辨妍媸君獨黑甜渾不知君不見汨羅江邉人獨醒捐軀徒博千載名人生適意此為樂何須苦覓揚州鶴竹葉杯中閱四時蘆花被厎舒雙脚錢公錢公真吾師平生此意君得之我生落魄惟貪飲百事無聞只酣寢生死真同力士鐺榮枯付與邯鄲枕行行無何有之鄉麒麟作脯瓊為漿借得仙人笙與鶴三清八極同翺翔憶舍弟彦常庭草秋仍緑江風晩漸稀年光随水去功業與心違逺海猶傳箭殊方未授衣翩翩南去鴈故作一行飛書所見感舊小小銀箏壓坐偏曽將古調寄新絃芙蓉緑水秋將老鸚鵡金籠語可憐兩鬢秋霜明鏡裏十年春夢夜燈前湖山隱約人何在空負當年罨畫船美人紅葉圖謝家夫人詠柳絮黄陵女兒歌竹枝誰信長門秋色澹西風黄葉斷腸詞黄哲十首哲字庸之番禺人明初用薦拜翰林待制侍太子讀書尋兼翰林典籖出知東阿縣升東平府通判尋坐法死有雪蓬集詩話嶺南無雪惟楊孚宅僅一見之杜子美詩所云南雪不到地也庸之度嶺而北倚篷聽雪詫曰天下奇音莫是過矣歸構一軒名聽雪篷鄉里遂稱為雪篷先生其五言詩源本六代七言亦具體品當在仲衍之下彦舉之上自君之出矣自君之出矣無處託鱗音思君如晝燭淚盡不明心過梁昭明太子墓帝子降南浦飄颻蒼桂隂神飇廻震闕𤣥跡閟坤岑鳳陵輝璞藴龍沼媚珠沈文藻絢華黻芳芬揚素襟遺編軼正雅曠代馳徽音玉馬風雲變金鳬歳月深霜蘭秋被坂煙蘿夕翳林采蘋思永薦捐玦遂幽尋靈脩忽爾逝嵗晏勞予心遼東鶴馭逺緱嶺鸞笙吟𦕈眇因懐昔營營徒慨今瑶華竟衰歇惆悵雍門琴黄才伯云混選詩中不可甲乙東平謁堯祠初政禮羣秩晨趨鄆隂郭稽古詢道源放勲久徂落齋宫委華梲黼扆銷丹堊庭榛雊雉升裳蘚宗彛剥惟馨思可薦廢墜予猶怍緬言垂衣時東狩玆方岳儀像儼欽明聲容被緜邈茆茨遵曩儉階蓂傳舊􅃋遺澤紛在斯今皇仰先覺亦播康衢謡紹爾雍熙樂秋夜雜興呈涂典籖穎璿杓運西宇華月麗中楹坐知流序易遥夜秋風生銀漢呈霄景金堂含夕清柔條棲湛露嘉蕙茁幽莖撫迹遂成感如何君逺征相思雲陽浦岧嶤限玉京寸心渺何極揺蕩如懸旌舟次靈洲􅇋廣雄飛使回不至湛露晨未晞秋華被原隰征塗夙已戒承命履遐邑桂水寒悠悠揚帆望不及川鱗想同泳羈羽尚云戢維楫乖素期臨流重於邑睠然桀溺耦詎灑楊朱泣惆悵芳菲情日暮空佇立與伯貞彧華二友㑹二妙聮英標睠言顧榛莽良晤諧宿心𤣥談慰幽愴江蘼澹新緑谷鶯聞逺響感此離索情浩蕩烟霞想夷白抗浮雲臨清延素賞何因繼芳躅一丘同偃仰餞區伯寛領歸善邑教横塘􅇋秋色芳蕖䬃已變渺渺波上舟忽如翔風燕琴觴激幽思籩豆徒有踐所念同襟者飄颻各鄉縣章縫協沖素况復斯文彦此邦多奇勝名山蔚葱倩暄壑棲雲霞寒松閱霜霰爾行問津處沮溺因可見贈劉仁仲昆季還浙東沈憂自多緒復此送歸人昨夜淮南雨不知芳樹春朅來持别酒相與慰兹晨日暮行艫渺東南瀰越津扶溪春望溪頭望春春色深美人不見勞予心緑波渺渺向南浦罨畫樓臺芳樹隂天涯滿目丹青障春日春花兩揺􅃞翡翠蘭苕不可思鴛鴦桂樹長相望相望相思雲路遥金塘流水亂春潮採菱風急桂舟晩疑是當年揚子橋橋邊楊柳青青好惆悵春心被花惱浦口廻船欲訪君相思一夜蘼蕪老㳺洪範池與劉文正洞門斜日照金潭千尺藤蘿挂石龕騎馬獨來髙處望滿山松柏似江南李徳五首徳字仲修畨禺人洪武中用薦授雒陽長史遷濟南府經歴調西安改漢陽教諭陞義寜知縣有易菴集詩話長史好效長吉孫仲衍戲之曰子誠混元皇帝孫也然其詩實與長吉相逺送友囬真定君自邯鄲來復向邯鄲去邯鄲月色好夜照江南樹太行多峻坂中有羊腸路往來不憚煩知君為親故棲雲菴石室凝紫煙空洞懸石乳隂崖含風泉終日灑飛雨臨流結精舍六月不知暑道人養清虛適與髙僧䖏垢淨俱已忘孰為舍與取諸幻旣逺離白雲日相與何當謝時人來作塵外侣種麻種麻滿東園種花亦盈畞麻生但芃芃花發映戸牖容華能㡬時零落他人手豈如為絺綌與君同永久向來灼灼姿于今復何有立秋日登漢陽朝宗樓懐鄉中諸友湖山興不淺而我亦淹留得罪縁微禄懐君屬早秋澹雲鄉樹逺孤月旅情幽借問衡陽鴈何時到廣州金陵逢趙汪中十年長契闊萬里各分飛岐路風煙杳江湖消息稀加餐俱努力訪舊各霑衣春草無勞緑王孫自不歸趙介二首介字伯貞番禺人屢薦亂免坐累逮至京道南昌卒于舟中後以子純貴贈監察御史有臨清集陳廷器云臨清出入漢魏盛唐諸大家閫奥而尤究心三百篇之旨以故所作出乎情性止乎禮義讀之有闗世教非若世之絢采色調聲響者所能及也詩話伯貞絶意仕進植雙松於庭榜曰臨清蓋以淵明自擬也屢往還西樵山中有索題詩者去不顧其集雖不傳然名在五先生之列乃刋詩者去伯貞而冠汪忠勤於巻首可為失笑也聽雨池草不成夢春眠聽雨聲吳蠶朝食葉漢馬夕歸營花徑紅應滿溪橋緑漸平南園多酒伴有約候新晴瑶池宴罷瑶池暮雨紅碧桃花落㡬番風重來八駿無消息擬逐青鸞入漢宫林鴻十六首鴻字子羽福清人洪武初以薦授將樂訓導久之拜禮部員外與髙棅陳亮等同時稱閩中十子有膳部稾劉子髙云子羽詩已窺陳拾遺之奥大有唐開元之風李賔之云子羽詩專學唐人極力摹擬不但字面句法幷其題亦效之開巻驟視宛如舊本然細味之求其流出肺腑卓然有力者指不能一再屈也矣徐子元云子羽師法盛唐唐臨晉帖殆逼真惜惟得其貌耳愈穆敬甫云員外自負良髙晩與浦舍人結社詣妙境兩人皆詩家俊豪也唐胡元瑞云林員外諸體皆工五言律尤勝置錢劉間不復辨别七言如珠林霽雪明山殿玉澗飛流帶苑牆氣色髙華風骨遒爽鳶顧𤣥言云林員外才情藻麗如游魚潛水翔薄天髙下各適情性栁蔣仲舒云子羽命才充裕標格華秀雖以隄宫花之句得名他作實多勝者轅李舒章云子羽如出林新鶻羽翮初成呵宋文云明初閩中詩人子羽為冠王弇州為小乗要亦是作家詩話閩中十子子羽稱巨擘焉而循行矩歩無鷹揚虎視之姿此猶翡翠蘭苕方塘曲渚非不美觀未足與量江海之大感秋撫劒中夜起氣候何淒清天髙白露下北斗當前楹嗷嗷雙飛鴻随陽亦宵征微禽爾何知寒暑嬰其情始知玩物化中復念吾生三十志有立一經尚無成緬懐古哲人信與大運幷道在無終始時來暫衰榮感歎不能寐延首東方明飲酒儒生好竒古出口談唐虞儻生羲皇前所談乃何如古人旣已死古道存遺書一語不能踐萬巻徒空虛我願但飲酒不復知有餘君看醉鄉人乃在天地初金雞巗僧室逺公青蓮宇百尺構雲闕一徑入松蘿山泉濯苔髪石房彈玉琴清響在林樾夜來滄海寒夢遶波上月微吟白雲篇髙興了未輟未能悟聲聞安得離言説沈山子云頗似王龍標遊芙蓉峯宻竹不知路渡溪微有蹤懸知石上約定向松間逢物􅇋變黄鳥菖蒲花蒙茸相望不可即裊裊霜天鐘經東山别墅别墅在東山經過感疇昔縱横醉時墨猶在池上石林氣颯以凉山容澹將夕緬懐攜手人念念不能釋精巖寺香刹象天界名僧辭世氛一峯獨凌削衆壑相氤氲作禮向金仙宴林投鶴羣山犬銜人衣却走避腥葷於時春向暮林亭藹餘曛蒼然草木氣盡濕西江雲登閣見千里眇懐滄海濆山鐘忽播蕩應此悟音聞送吳士顯吳生跌宕人脫略當世事欲識平生心悠悠江海是布衣何飄飄孤劒千里至斗酒未及歡㸔雲起歸思長風吹古城寒日下秋水分手從此辭車塵望中起齋中曉起颺颺城鴉㪚鼕鼕戍鼓絶空庭寂無人衣上有殘月爽氣山前來吾襟抱氷雪秋夜憶周模傾蓋一分手沈思長在襟况兹離居夕復此秋城砧露下葉初落草根蟲又吟雖云感物候終念曠幽尋劒水東南流故人千里心無因達尺素夢遶青楓林江閣秋雲圖山容初歛夕雲氣已歸壑何以㪚沖襟孤琴坐江閣美人期不來天寒楓葉落賦得獨樹邊淮送人之京君不見秦淮水流東到海淮邉獨樹如車蓋九月微霜赤葉乾枯枝颯颯鳴天籟枝上啼鴉㪚曙煙枝頭殘照咽寒蟬離人留飲停車騎俠客相逢挂馬鞭南國髙僧從此去駐錫雨花臺下路一飯淮邊洗盋時六時晏坐祗園樹野鶴孤雲任往還禪心不道别離難山中亦有長松樹待爾青青共嵗寒經綺岫故宫行人曉飯青山裏驅馬蒼茫經洛水昔聞綺岫盛繁華不謂荒凉今若此憶昔行宫初構時梯巖架壑相逶迤美人桂殿夜㸔月公子柘弓朝射麋翠華一去金門鎻露電飛螢山葉墮往事吹殘牧笛風危基半入樵人火今古消沈能㡬回春風依舊野花開君王巡狩不復見禾黍空山鳥雀哀巫峽啼猨歌送丘少府歸四明巫山巫峽連三巴猨啼三聲客思家停舟聽之聲未了却過青枝猶裊裊野人乍來錦官城清秋滿峽啼猨聲黄牛灘下怨楓落白帝祠前哀月明商聲清冽羽聲亂倏忽東崖復西澗久客聞之淚欲乾壯夫聽此魂亦斷故人歸卧越山雲憶得啼猨歌送君扁舟獨宿剡溪夜叫月三聲誰共聞送髙郎中使北漢使臨邊日天驕已請和看花辭紫陌犯雪渡交河水草留行帳雲沙想玉珂誰知清漠北婁敬䇿居多鍾廣漢元絶似郎士元留别蔡秀才原别離無逺近暫去亦傷神正是千山雪誰悲獨往人江空螺女夜花暗冶城春不見同游侣酣歌淚滿巾憶龍門髙逸人浮亭露飲玉樽空千里心期此夕同海路想經春草緑越吟愁對夜燈紅他山花發鶯啼後别墅春歸積雨中聖代祗今無隠逸不應多病卧孤蓬陳亮二首亮字景明福州長樂人明初累詔不出有儲玉齋集李時逺云亮詩沖澹有陶韋風夜泊古崎寒山夜蒼蒼清猨數聲響風生蘆葦鳴水落洲渚廣月落知潮來時聞人蕩槳秋暮懐劉宗魯海國别來久長懐瓊樹枝閒齋坐幽獨悵望秋風時自非物外人邈焉難與期空傷緑華歇坐惜白日馳對酒更愁予勞歌空爾思唐泰一首泰字亨仲福州閩縣人洪武甲戌進士授行人終陜西副使有善鳴集江上書懐寄周大林大昔年曽共醉蘭舟明月閒情憶舊遊獨客荒邨空向暮異鄕多病畏逢秋殘煙野戌聞寒笛落日楓林見驛樓為報别來憔悴甚漫因尊酒一消憂鄭定一首定字孟宣福州閩縣人陳友定辟為記室友定敗浮海亡交廣間久之還居長樂洪武中徵授延平訓導歴齊府紀善終國子助教有澹齋集伏波祠懐古荒祠衰草已凄然猶有居人話昔年銅鼓苔生秋雨後石牆花落夕陽邊竹書早著平蠻策沙井空餘飲馬泉詞客經過休感慨雲臺麟閣總寒煙王襃一首襃字中美閩縣人洪武癸酉舉人官至王府紀善有養靜集題秋林泉石圖髙林頗深邃逺洲亦縈紆風景亦何異中有隱者廬陽崖落日明隂磵浮雲虚耕野見秋火扣舷聞夜漁朅來塵網中機務日相拘念茲膏肓疾媿彼泉石圖抱拙謝簪黻養素宜琴書俯仰天宇寛所樂恒有餘髙棅八首棅字彦恢仕籍名廷禮長樂人永樂初以布衣召入翰林為待詔久之陞典籍卒於官有木天清氣嘯臺二集林尚黙云詩始漢魏至唐極盛宋失之理趣元滯於學識而不知由悟以入自襄城楊士𢎞始編唐音然知者尚鮮先生選唐詩品彚議者服其精博平生賦詠流傳海内又能書工画時稱三絶𤣥俞汝成云漫士意興俱佳而歌行尤勝顧言云翰籍才識博達惜文多意少且乏新興至擬古諸作頗擅雕蟲往往有青於藍者李時逺云廷禮深得唐人風致頗李舒章云廷禮如製錦善手有尺度詩話廷禮擬唐如薛稷鍾紹京之雙鉤終下真蹟一等五古若長空一飛鴈落日千里至夜色不映水微風忽吹裳銜杯雙樹間百里見海色飛雨一峰來微雲度疎竹不失唐人遺韻九月八日郭南山亭宴集分得下字海國霜氣凉秋聲落遥野乾坤肅以清收納屬多暇出郭尋幽期同人命軒駕載酒入翠微憑髙憩層榭蒼山横黄雲大江天同瀉飛雨霞際晴夕陽鴈邊下江山滿陳迹今古成代謝髙興殊未平臨風獨悲咤同羣公餞鄭五秀才至鼔山寺分題贈别賦得臨滄亭屴崱海上秀中峰開禪宫飛亭挂空翠直上臨方蓬溟漲在几席天光映簾櫳目極萬里外但見青濛濛曙色從東來晃然霛境空登臨豈不偉别意歎無窮賦得羅浮霜月懐二逸人海國梅始白飛霜動鳴鐘寒空一片月挂在羅浮峰夜色不映水清光與之同百里皆瑶華千林閟幽風蕭條巖際葉嘹唳雲邊鴻逺客起遥念滄波思千重夢廻明鏡没寂歴聞幽蛩題邑生陳溢鍾山草堂鍾山抱藍田水木含清氣愛爾靜者居草堂在山翠簾櫳映竹開几席侵花置野客載酒過山僧抱琴至陶然接歡賞邈爾成幽契月出天海空雲生石門閉岱溪樵唱来沙頭松聲細佳趣足淹留逺心更迢逓維時屬休明巖穴無遺棄終南登絶境北山裂荷衣予亦問山靈斯人果忘世賦得燈前細雨贈别鄭浮丘野館昏色來明燈靜深塢故人惜暌違共此尊前雨寒影明逺心夜深帶離苦飄蕭初拂席颯沓仍近户重靄溼餘芳宿雲暗平楚明發送君行淒淒滿南浦水竹居清溪入雲木隱處林塘深微月到流水泠泠竹間琴虛聲起遥聽天影澂逺心余亦鸞鶴侣將期此投簪酬林一和閒齋見懐之作東山遥夜鴈歸聲兩地相思舊感生芳草白雲無那别春風黄鳥若為情雙溪日下鷗波靜獨樹原頭獵火明誰道離居成寂寞好文地主久知名擬蘇許公頲侍宴安樂公主新宅應制飛構雲邊帝子家宸遊天上駐仙車玉杯春醉平陽館銀漢秋行博望查萬樹芳花迎日吐千條弱柳向風斜皇情愛物懽無極能使羣心戀翠華蔣仲舒云運斤成風信堪膾炙胡元瑞云諸詩殊有唐風國初襲元此調罕覩王偁七首偁字孟揚其先東阿人從父翰宦流寓閩中洪武庚午舉人永樂初用薦授國史院檢討命參英國公張輔軍事坐黨下獄死有虛舟集解大紳云孟揚詩欲凌駕盛唐柱徐子元云孟揚凌駕漢唐見推解子東南天焉用洪達顧𤣥言云孟揚典雅清拔綽有天寶俊聲敬蔣仲舒云虛舟詩句從新鑄材自故來穆甫云王詩從容典麗得風人體裁者矯曹能始云孟揚詩本李白矯不罷詩話孟揚才名與解大紳相伍其獲罪亦同然詩格華整逺勝學士聞當日有明詩選本惜無從見之車遥遥車輪何遥遥西上長安道不見車上人空悲道傍草君行日已逺恩愛難自保憂來當何如一夕夢顚倒豈無中山酒一浣我懐抱但恐三春華顔色不再好車聲何鄰鄰風吹馬蹄塵願随馬蹄塵飛逐君車輪短歌行東風吹花墮錦筵緑楊揺蕩青樓煙主人自為鸜鵒舞小伎更奏鴛鴦絃當杯入手君未醉落日已在西山巔短歌一曲心茫然請看明鏡髙堂上何須白髪悲芳年入西山訪張隱士兩崖噴飛瀑結屋煙蘿裏山人不冠屨客至同隠几獨鶴海上歸孤雲澗中起淨埽白石牀風來墮松子㴩州五管推名郡雙江接上游人家蠻霧曉山雨瘴煙秋逺客誰青眼殊方易白頭今宵南極外分野望牽牛楊秀才幽居楊子幽居處閒窗面逺空水喧明鏡裏雲落畫屏中巻幔留山月揮絃送晩鴻何人問竒字載酒野橋東宿巴陵聞笛玉笛飄殘月下聲空江秋入思冥冥怪來楊柳移關塞可是梅花落洞庭半夜旅魂隨調切誰家少婦倚樓聽曉來更覓龍吟處一㸃君山水面清左江錄似友人左江江水日潺潺鳥語莎裳住百蠻莫道天涯應在此交州更隔萬重山王恭十九首恭字安中自稱皆山樵者閩縣人永樂初以儒士薦起待詔翰林與脩大典授翰林典籍投牒歸有白雲樵唱鳳臺清嘯草澤狂歌顧𤣥言云安中思多悽怨託喻頗深林穆敬甫云王詩工而有調乃潛心風雅者衡者云皆山善得中唐之韻如渭水寒流秦塞晩灞陵殘雨漢原秋他鄉見月長為客别路逢霜半在船鳥外明河秋一葉天涯凉月夜千峯雲歸獨樹天邊小雪罷孤峰烏外青驛館夜殘明􅇋火市樓霜曉度寒砧㯶櫚葉上驚新雨砧杵聲中憶故園㡬處移家驚落葉十年歸夢在孤舟家臨故苑長洲樹鐘度寒山半夜船帆飛楚水舟中飯夢繞淮山樹裏行均有大歴十子遺音詩話袁景文以白燕詩得名然如月明湘水初無影雪滿梁園尚未歸翻不若琴川時大本之珠簾十二中間卷玉剪一雙髙下飛也顧光逺以白鴈詩得名然如錦瑟夜調氷作柱玉闗曉度雪侵衣亦不若王安中之夜雨蘆花㸔不定夕陽楓樹見初飛也安中整練不及子羽而風華跌宕多縹緲之音固似勝之去婦詞刺促何刺促東家迎昬西家哭哭聲休使東家聞東家車馬方如雲滿堂笑語看珠翠夾道風傳蘭麝熏浮雲上天花落樹君心一失無回悟明知遣妾何所歸飲淚行尋出門路青銅鏡面無光采妾心尚在容華改東家新婦傾城姿似妾從前初嫁時舟次鐔津木落川氣凉鴻飛水容夕微燈射逺沙夜榜鄰幽石月色棲處寒霜花坐來白遥見九華峰蒼蒼但蘿薜初秋同叔􅌢彦時遊崇山蘭若習靜厭紛擾幽尋給孤園翛然香林下似得桃花源一鳥落天鏡千花秀禪門紛吾道機淺謬接甘露言月色隱秋思荷香清夜魂終希偶緇錫永矣超塵喧雞公壟荒岡古墓雞壟邉蔓草離離生野煙狐貍養子隠荆棘烏鳶作巢銜紙錢石麟薶沈土花溼月下精靈語還泣此墳未必無子孫浮榮一去不復存誰家新冢髙數尺又買西家墳上石感懐不彈貢禹冠不結蕭朱綬㡬處移家任轉蓬半生失路惟耽酒兔園挾策竟徒然欲逐長沮學種田秋風僅有相如壁舊物空餘子敬氊異鄉淪落無朋友論交昨日今何有誤將偃蹇對時人豈謂新知不忠厚萬事蕭然一布衣白頭夢想故山薇抱琴欲奏猗蘭曲目送雲天斷鴈飛聞笛歌送人之塞上横笛對離亭扁舟越江口月下何人最斷腸天涯怨别驚楊柳此夜愁心獨對君明朝悵别又離羣單于城上吹羌管知爾相思不忍聞題扇山蒼蒼兮白雲谷窅窅兮夕氛鴻髙飛兮逺逝蟬薄暮兮空聞泛木蘭兮容與隱薜茘兮氤氳紛吾老兮旣拙誓相從兮夫君書江山别意圖送羽人還神樂觀羽人何處去歸事玉宸君飛珮花間别横簫鶴上聞過關閩樹㫁挂席楚江分想到齋宫夕圓丘候五雲江樓聞笛纖月挂風林晴樓覆夕隂誰家吹鳳管永夜作龍吟楊柳邊頭恨梅花笛裏心天明漢江上惟見水雲深寄滄洲狂客三年憔悴得君憐君上青雲益惘然客裏思鄉何日到天涯見月㡬回圓未期嵗晩同攜手預恐新正對别筵貧賤獨慙無可贈臨岐空憶繞朝鞭鷓鴣緑樹殘春暗雙飛錦翼齊長沙有遷客莫向雨中啼題水墨小景白鷗門外孤艇黄葉山中一瓢惆悵青雲舊侣相思不到漁樵詠秋風青蘋江上響蕭蕭吹得林間萬葉飄何處淒凉最關别數株殘柳灞陵橋邨居草徑茆扉帶軟沙隔林雞犬幾人家青山盡日垂簾坐落盡椶櫚一樹花春鴈春風一夜到衡陽楚水燕山萬里長莫怪春來便歸去江南雖好是他鄉去馬百戰沙場老此身長楸宫草㡬回春只今棄擲寒郊路猶自悲鳴戀主人山樓對酒樓前積水映蒼苔巻幔孤雲落酒杯更盡一樽秋雨外故山曽有幾人回月下聞箏愁心不見薛瓊瓊何處銀箏半夜聲腸斷十三絃上月一絃一柱總關情二馬圖紫騮嘶逐玉花驄曽是沙場百戰功今日奚官重剪拂落花芳草灞陵東黄𤣥一首𤣥字𤣥之􅇋官人官泉州訓導詩話林子羽倡風雅於八閩從之游者頗衆而獨矜許二𤣥為入室弟子其贈𤣥之詩云予也夙穎悟十五始知文冥心三十年㝷源頗知津探奇始有得服膺如獲珍逝將覺後生庶以酬先民青衿二十徒逹者惟黄𤣥持此欲有授二𤣥乃其人然二子詩太荏弱句續字湊不能成家似非孟揚漫士皆山之伍南皮李氏稱二子詩託興悠逺殊不爾也河上立春故國㡬時别殊鄉今早春青陽開霽雪殘日送歸人漸與雲霄隔空驚歳月新不堪零落處愁淚滿衣巾周𤣥一首𤣥字微之閩縣人以文學徵為禮部郎中有宜秋集題青城圖青城辭家仙路遥秋後白雲還見招商山老人不歸去巗徑松扉長寂寥明詩綜巻十一
