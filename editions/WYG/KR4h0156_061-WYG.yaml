body:
  text: 明詩綜卷六十一翰林院檢討朱彞尊編區大相四十八首大相字用孺髙明人萬厯己丑進士改庶吉士授檢討厯贊善中允有海目先生集静志居詩話海目持律既嚴鑄詞必鍊其五言近體上自初唐四傑下至大厯十子無所不仿亦無所不合嶺南山川之秀鍾此國琛非特白金水銀丹砂石英已也又云海目五言律詩如純鈎初出拂鐘無聲切玉如泥又如鐃吹平江秋空清響顧近人選詩罝而不録予特為表出取之稍溢焉定朝鮮皇赫怒命東征千翼舉七萃行渡緑江援王京鼇足斷海波平扶桑拂暘谷升旭日中仰大明一解戮羣倭定朝鮮武功振文徳宣櫜弓矢戢戈鋌藩服固王㑹全祥瑞降諸福駢祝聖夀萬斯年二觧青樓曲新鶯囀畫堂新燕集雕梁栁葉裁睂出桃花學面妝珠簾映日卷錦袖隨風揚大道連平樂髙樓接建章容華艷陽月夫壻侍中郎挾瑟調鸚鵡將簫待鳯皇朝回欲有問軒騎滿東方淮浦吟淹泊清淮浦悵望丹水涯狂風吹我舟不得早還家一解征夫念閨人非為顔色好游子戀故鄉非闗萬里道二解月夜花下小酌和友人碧空散微雲孤月照逺客以君衣上光鑒我花間席傾壺逐夜凉隔林望歸翮槭槭葉墮階淒淒風入隙清光正娛人徘徊戀終夕紀朝鮮事萬厯戊戌九月自有東師六七載廟堂嵗嵗議封貢近者羣公幸主戰折將隳軍竟何用海闊芻糧不易渡五鍾一石勞傳送横征頗慮空杼軸轉輸未免妨耕種去年小挫由忌功今年大衂縁輕縦執事顔行屢見逆天王威命何曽共封既無成戰失利公私之積咸哀痛更無一人能畫䇿徒有諸僚成聚訟要荒交侵古來有更於中國何輕重當時止合問曲直按兵境上不為動朝廷制馭自有道豈在勞民與動衆奈何誤聴小人計日以和好自愚弄從此兵端㝷嵗月豈知海内為虚空財傾左藏不足惜民傷萬命能無慟近聞有議留屯戍老成億度或屢中充國金城上方略李牧鴈門費邊供年來喪敗咎北軍弓馬雖嫺備騎従吳越少年習水戰檣檝輕利過飛鞚儻能訓練三萬人坐見驊騮受羈控腐儒何敢與肉食聊以短章代微諷繞朝勿謂秦無䇿中興尚看甫作頌過韶石玉輦南巡日従天降九韶仍聞舞百獸真想格三苖風雨仙靈集雲霞絳節朝有時盤石上天籟暮蕭蕭别汪和叔之塞上花前各盡觴游子賦河梁我望南枝返君同北雁翔笳聲咽隴底海色愁漁陽未共酬恩去相思塞草長夏日同諸客泛舟青溪二首錦席人須醉仙舟客共登年華各自惜意氣轉相矜瓶水沉朱李溪花覆紫菱莫誇姑射雪吾有玉壺氷卷幔千花暝回舟一水遥芳情瑶瑟怨别曲鳳笙調桂苑通仙閣蘭房接畫橋倚歌待明月長笛不須邀金陵城南宴逸客東山至佳人南國多袖飛金谷舞梁繞石城歌妝閣宜春入花蹊愛晚過留懽方待月無遽動鳴珂入羅滂水井邑新安集閭閻雜漢猺火耕春伐木山獵夜歸樵潮響蠻溪合林光瘴峒消直須勤撫字慎勿困徴徭曲江值雪急雪孤城下同雲萬里長客情猶故國春色漸他鄉冷氣開炎嶠流光艷早陽紛紛何所擬諸謝有歌章客中九日細雨黄花節秋風竹葉杯異鄉誰送酒何處更登臺木落江雲暮天寒塞鴈来惟憐三徑在歸去翦蒿莱早春長安道上雙闕麗朝霞千門競嵗華苑雲微帶雪宫栁半藏鴉結駟過平樂揚鞭赴狹斜春風纔幾日先發上林花九日偕館中諸友集天寜寺帝京重九日朋舊共開尊地逺城西寺臺髙薊北門雲光移塔影山勢斷河源忽覩南征鴈令余思故園家人初至京置酒亭中對雪作庭霰今朝集家筵此日開不知燕地雪猶訝故園梅玉袖承花出珠簾卷絮迴瑤華雖可贈留賞上春来送胡孟弢之沅江豫章人時疏論邊事浮湘明日事江畔暮行吟易動騷人怨難為國士心秋風吹芷岸落日滿楓林知有還家夢潯陽九𣲖深送薛行人持詔南楚便歸嶺外邊事勞行役秋冬兩戒輈方回遼左使復作楚南游雪樹江闗驛雲帆海國樓仍聞下詔日父老共銷憂送張僕卿還桂林還朝能幾日去國逼殘年别路春前酒離亭雪後天衡陽隨雁去湘浦問歸船未是投閒日東山卧莫堅登來青軒層軒翠微裏宸翰此髙題仰見星辰列平看雲霧低路盤陵樹北山擁帝城西萬乘来遊地應無七聖迷癸巳九日同焦太史攜酒興徳寺後池臺杖屨侵霜葉壺觴就徑花髙風疎薜荔薄霧隠蒹葭山遶層城暮橋通小苑斜正逢邊鴈下西北有塵沙寄梁兵憲天津碣石横燕甸天津控海門梯航萬國㑹貔虎五營屯逺浪含夷島長沙接塞垣人傳新節制清嘯似劉琨昌平道中山家未夕昏半已掩柴門車馬争塗疾牛羊下坂喧春陰入陵樹雨色過湖村誰道相如病猶堪守漢園朝陵遇雨言避崤陵雨翻行大壑雲微風清樹氣積潤洗山文銀海春波闊龍池細澗分九陵松柏路香靄日氤氲供事長陵二首文皇鼎成後此地𦵏衣冠日月神宫閟山河帝寢安塞雲疑扈蹕闗塞想回鑾寂寞犂庭事深知創業難弓劍思軒后山川㑹禹陵翠旗何日返龍馭幾時升寢殿行春草幽宮寂夜燈萬年闗路北神武至今稱游宗謙老年出塞壯之嗟君垂老日䇿馬薊門東易酒顔猶壯燕歌氣尚雄敝裘經積雪頽鬢逐秋蓬寄謝行間客無輕塞上翁送何儀部稚孝謫桂林長沙非不逺南去更蕭森謫宦楚山盡獨行湘水深鄉書同鴈少官舎共猨吟今夕懐人夢隨君到桂林出錢塘門覽古作駐馬錢塘路逢人説勝遊湖光吳苑晩山色宋陵秋巖桂宻連寺渚花髙映樓傷心六橋月不照汴河洲晚霽玉峽驛望玉笥山峽束江流窄山欹堞影低玉梁沉宿霧金澗落晴霓水鳥窺魚下林猨摘果啼靈峰不可到矯首問丹梯謁張文獻祠一代孤忠在千秋大雅存詩才推正始相業憶開元曝日陳金鑑䝉塵想劍門更吟羽扇賦搖奪不堪論秋日還山村邊黄葉路溪上白雲岑草屋山家淺松門野寺深羣魚依宻藻獨鶴返髙林若問還山事多應負此心浮丘洞中宴洞府游仙入樓臺望氣通焚香來桂女行酒命芝童鶴舞春池月鶯啼碧樹風何當倚長袖共挹浮丘公晩發三水溯北江行客纔經宿離愁已不堪郵亭數長短江路背西南里樹春烟斷山城夕照含何時已行役歸結桂松菴於曲江逢髙正甫奉使南還相逢一杯酒與子暫綢繆以我北来信附君南下舟鄉心滄海上客淚曲江頭為問乘槎使何時到廣州東林寺昔讀髙僧傳兼懐逸士蹤停車虎溪水對面香爐峰舊殿丹青落荒池蔓草茸我来松下坐日暮但聞鐘送混成子夫子冨道術世人無不聞徒聞不能用長嘯空青雲丹簏烟霞記玉鈐龍虎文西山有鸞鶴應共爾為羣秋鴈秋風度玉塞候鴈發金微纔共邊塵起還同闗葉飛排雲聲漸衆帶月影全稀徙倚東南望江皋何處歸中秋望月簡董𤣥宰太史月滿層城上秋分御苑中玉樓寒自迥珠箔照還空望美今宵隔含情幾處同此時折桂客或在明光宫夜坐夜坐不覺久庭烏棲復啼燈前下黄葉井上鳴莎雞漏静風聲細帷空月影低城南有思婦幽夢越遼西寒日霜林無一葉寒日復多風碩果猶存否危巢本易空誅求三戸盡杼軸萬方同白石南山曲悲歌夜未終大科峰是西樵絶頂登髙四望開絶頂出瑤臺逺岫一方缺長江數道来雲間下鸞鶴天上埽莓苔髙揖烟霞外三山何處哉厓門弔古遺恨前朝事吾来問水濵乾坤存一旅社稷有三臣慘澹勤王志間闗䕶主身至今厓畔石風雨洗凝塵京師苦雨作入夏多霪雨經秋未肯晴直須憂地陷無計補天傾方割傷民瘼其咨軫帝情古来堯命禹天地乃平成潘子明光禄解官南歸故人官不達久欲賦閒居忽見秋風起翻然思舊廬寜貪數升醖定憶四腮魚前路多歸興江天鴻鴈初南行感懐聞道貂璫輩由来為埽除先朝停鎮守舊日典方輿貢採山川竭徴輸井邑虚明明皇祖訓宫府意何如端溪雜詠夕陽下前山山光落溪水欵乃時一聞只在山光裏望七星巖仙山對城郭纍纍七星石中有太古文世人了不識鄭明選四十六首明選字侯升歸安人萬厯己丑進士除安仁知縣擢南京刑科給事中有鳴缶集朱平􅇽云先生詩不施鉛粉不事雕鐫一稟於雅澹然成趣詩話先生五言近體全學髙達夫七言近體全學杜子美語不求工而句鎚字鍊卓然名家是時汪伯玉劉子威馮元成屠緯真輩類守其殻而遺其神明其在西吳徐子與吳峻伯皆然先生之詩遂無人賞激者感懐黄虞世已逺大道漸陵遲十室八九空姦邪乃猖狓法令日以繁盜賊日以滋宣尼相魯國道路不拾遺君子正其本禮義將自治莫以鞭與轡能使疲馬馳莫以刑與戮能使風俗移長吏茍有闕三尺將安施短歌行示徐秀才正公嚴従事稚荆九月豆葉黄十月菊花槀朔風一何寒清霜凋百草時物頓如此人生亦以老憂日常苦多歡日常苦少攬鏡令人悲朱顔非昔好過東阿山寄鄒大東阿之山石散亂大者如席小如彈大石如席尚可行小石縦横馬流汗青馬𤣥黄白馬飢長鞭策馬馬更遲行人日短心欲碎山石紛紛無盡時故人昔共山中路犯雪蒙霜凡幾度君今哭父且南留我獨朝天仍北去東阿山頭首重迴東阿山外使人哀𤣥雲不飛日氣薄蕭蕭草白三歸臺與楊二叔純許子南昌去王孫嵊縣遊舊交如雨散春水滿城流不見江邊閣徒懐雪裏舟故鄉惟汝在莫惜屢相求雪不止復作大路倉橋口貧家霅水灣寒雲常滿郭春雪不離山夾雨琤琤下隨風款款還逡巡小僮僕擁袖出柴闗初冬數日風纔罷初冬水始氷門寒朝嬾出山近午還登宻竹藏斑雉枯松下黒鷹千村穡事早生計稍堪憑暫移山居春晩營蠶事移居郭外村白花低覆水翠竹逺侵門拂几開殘帙攜鉏理廢園鄰人儻相訪薄與酌清尊恭閲天壇圓丘圓殿外清晝日況沉玉陛春沙煖瑤壇古樹深太微瞻帝座大享見王心想像鈞天曲輕風落妙音十五夜冩懐明月孤懸夜空齋獨坐人地平連海嶽天闊散星辰禄米悲親沒柴門憶弟貧吾生無限事况感百年身野望懐王時立朱大復驛外晴江白洲前夏木青過橋風細細立馬水泠泠岸栁鳴鴝鵒汀花卧鶺鴒歌成也自愛難得故人聴邳州晩泊日落留侯廟春深吕布城殘花晴抱蝶細栁暗啼鶯漸集河船宻遙生野燒明客愁無可慰膝上一經横客至萬里清秋水孤城薄暮雷故人江上至凉氣雨中来吳粤分離久風塵老病催猶餘十年釀今日為君開傷春野漲村村水山城日日風雨深荒縣裏春盡訟庭中朋輩他鄉異鸎花往嵗同牀頭十年酒未有一尊空官舎晩酌百里山圍縣雙江水對門日斜初解帶秋爽一開樽家逺思親舊官貧任子孫醉看青竹浄纖月照黄昏過汶上縣汶上齊封近蒙山魯望尊寒城初出縣落木更逢村氷黒經旬合沙黄萬里昏茫茫人獨去日暮欲銷魂陽穀夜步清夜一孤客寒燈强半時露垂陽穀樹月傍太山祠魯酒沽長薄燕歌聴自悲茅堂卧不穏散步獨遲遲鄚州即事滿目皆湖水家家傍水居地貧村少米氷闊市無魚樹入天雄小雲飄涿鹿虚風塵半萬里消息故鄉疎春日愁生寺古山門静春深野日遲晴沙浮宿麥小徑舞游絲西蜀軍書急東倭廟算疑禁中應獨歎難得外臣知燕子磯宴羅諫議投老登臨健平生故舊來共騎沙苑馬一泛竹林杯雪暗山雲重江喧石壁開吏人歸亦嬾閒看暮潮回望鍾山鍾山望不極終日紫氤氲宿雪雙峰出春沙八水分龍蟠思霸主鶴怨想徴君縹緲園陵外松楸起白雲遊獻花巖融公昔悟道留此獻花巖野寺人初識山花鳥舊銜洞門無日月石縫有松杉東北清江闊㣲茫萬里帆金川門志感靖難興師日天戈向此門乘輿何處去宫闕到今存衮冕新君盛旌旗叔父尊當時漢官屬幾輩泣皇孫拜方孝孺先生墓隔世祠初建荒山冡僅存薦蘋惟我輩收骨豈兒孫祗覺丹心苦寜辭赤族冤精靈江月裏長到孝陵園朝天宫登白鶴樓紫府深通逕丹梯半入雲樓飛三百尺門鎖五千文郭外吳山盡牕中楚樹分游仙今夜夢親謁武夷君送何比部告滿之京貰酒石城門送君花外村曉風飛海燕春水上河豚滿秩稱能吏趨朝報至尊萬方堪涕淚别後向誰論清明日上孝陵夏后藏書穴軒皇鑄鼎湖人間留石獸地下想金鳬谷暗春泉響松髙曉月孤江山滿目在萬古見黄圖閲城萬雉金墉壯三江玉浦通天迴青嶂外日轉碧雲東古木盤秦水春花簇漢宫偏安四十帝未有聖朝雄燕子磯即事突兀磯頭寺蒼茫野水村凍雲垂日氣斷石落潮㾗法曲新翻譜香醪屢換樽山僧遥指㸃風信有江豚病中憶新種竹示家童南牆新種竹今有幾竿存移石容抽筍通渠好灌根病中思拄杖健日想開樽但放髙人㸔来時莫掩門通上人見訪夜坐市罷寒溪静城昏夜霧交髙僧扶竹杖落日到蓬茅風栗開丹殻霜橙破紫苞清談對支遁明月度松梢幽趣但見滄洲趣清溪對竹扉牕陰懸薜茘水色受薔薇邨鴨迎船浴山蟲冐雨飛田家蠶已老日暮翦桑歸恭聞冊立皇太子喜而賦詩少海初流潤前星已麗空九重元獨斷四皓本非功鶴馭丹霄上龍樓紫禁東君王有金鑒早晩賜春宮峴山宴陳太常七月峴山天氣涼風亭乍雨湖茫茫輕舟出浪若飛瓦巨石滿岡如聚羊斗酒未覺主人薄髙歌正宜秋日長窪樽遺蹟至今在不見昔賢空斷腸宿濟寧南關潘中丞具舟見送兼留夜酌濟州城外風氣涼汶泗之水東流長孤州白鳥背人發十月黄花滿店香中丞為我具舟楫薄暮遣吏延壺觴明朝逺道一回首太白樓髙烟樹蒼上渡即事上渡人家生午烟青絲絡馬寺門前纖纖杜若風香細翦翦椶櫚日影圓疊嶺遙來彭澤鴈晴江爭落信州船村中父老知農候拄杖南疇課種田經黄葉嶺黄葉嶺邊黄葉飛江風蕭颯吹我衣清秋塞北斷鴻去落日馬上行人歸百年回首已衰白萬事傷心今是非一望長安一惆悵無人知道寸心違至日今日何日日初長所思何思思建康朝天鳴玉已往事對水看雲仍故鄉萬里淒風埽落木中宵陰壑生清霜可憐物色嵗云晏白首髙歌空斷腸中夜枕上口號東溪先生雪半顛樽中酒盡挑燈眠誰家月下尚鳴杵隔水夜深頻喚船清時幸許著棄物薄産聊足供殘年明朝料理登臨事去看青山瀑布泉春日嚴稚荆邀游蘇灣桃花李花二月時反接兩手登山遲一湖春水泛漁艇終日野禽啼竹枝石嶺張筵坐無次邨童喜客行相隨不見前朝蘇學士風流千載使人思上永陵肇聖清河水興王自郢都三為代邸讓一握漢家符社稷承堯服乾坤定禹謨神功九葉盛大禮百王殊紫氣真人散丹砂術士誣石扉藏玉虎銀海浴金鳬二女悲湘水羣臣望鼎湖地環滄海闊山擁薊門紆王氣真蔥鬱精靈歘有無中官供寢薦七萃䕶雄圖願錫皇孫福長聞萬嵗呼獻縣懷古漢代賢王子風流獻縣存遺書千載散雅樂幾人論墓道松楸古祠堂俎豆尊故宮迷草色殘碣鎖苔痕鴈鶩浮河水風沙暗郭門行行一回首烟月度黄昏寄朱比部二十韻未補馮唐署能陳晁錯書氣髙憂國日名重罷官餘北闕承新譴南山返故廬直詞元忼慨時論共咨且請劒心徒憤埋輪事已虚何人招隠士未老賦閒居落日菰城卧秋天震澤漁逺遊常有興多病近何如以我叨青瑣分曹傍石渠恩深䝉茹納才薄負吹嘘廊廟多旁午閭閻異古初聖謨殊奥窔小智獨躊䠧昧死思劉向偷生謝史魚妻孥霑雨露嵗月費居諸託宦身何用遊仙夢久疎初心今已矣晩計欲歸與彭澤教栽栁於陵學灌蔬清齋心不染導氣髮常梳廏馬雖思主山猨恐怨予如君終奮發不作楚三閭寄祝諫議尚憶陪青瑣相隨寓白門馬蹄偕出入鷺序接晨昏諫疏分封署文章共討論晩㝷桃葉渡春酌謝公墩李杜名虚竝雷陳義久敦風塵身汨汨霜露疾惽惽二豎心難惻三彭口莫捫乞骸元我志歸骨乃君恩伏枕安時命居家玩子孫小童舂藥杵故舊捧匏樽野意頻栽樹山歌日扣盆鶯啼藏竹塢犬吠出花村守拙心無用逃名道豈尊老人應世棄王事獨君存畫省兼羣職銅章領六垣别離經嵗月書信隔寒温天地堪搔首江湖屢斷魂中官仍虎視西賊且鯨吞内府招桑孔前星望綺園舜琴須解愠堯鼓為求言巖穴已枯槁雲霄常奮翻批鱗終不怒張瞻莫辭煩氣激憂丹扆詞危叫紫閽回天諒有力拭目在丘樊早行雞鳴客下牀出門天未曙山黒不見人但聞馬蹄去新江營對雨漠漠江雲生江天雨如霧東望白鷺洲蒼茫不知處憶吳興衢州霜橘紫金苞玉液瓊漿不用調此物逺来三百里香風散滿駱駝橋王士騏三首士騏字冏伯太倉州人尚書世貞子萬厯壬午鄉試第一己丑進士由禮部主事調吏部員外郎坐妖書獄削籍有醉花菴詩選詩話冏伯醉花菴詩不拾過庭片語贈别東風吹栁栁成絲細雨釀花花滿枝可惜春光正駘蕩相逢恰是别離時送顧太史使朝鮮徹天火樹照邊陲軟繡肩輿坐自移到日定知春麥秀請看箕子廟前碑明妃怨秋來無事不消魂幾度貂裘換淚痕却憶天家全盛事少年公主嫁烏孫歸子慕十九首子慕字季思崑山人萬厯辛夘舉人崇禎初追贈翰林待詔有陶菴集沈山子云古今效陶而肖者王韋之外不得不推季思詩話季思善病再試南宮歸而屛跡田里所居陶菴插槿為牆縛茅為屋小如蝸殻瓠子養疴其中迭相往還講學者無錫髙攀龍存之嘉善呉志逺子往主客從容晏坐黙識凝然不語一有所得輒怡悅相告存之稱其有絶人之慧絶人之識絶人之趣又言季思出諸口者不漫作無味語筆諸書者不漫作無味辭措諸躬者不漫作無味事即其睂宇顰笑足以洗濯一世塵垢傾倒可云至矣季思雖病猶授生徒友人勸其輟講報之書云生徒固無累於我豈惟無累且以為樂清畫飯餘滄江日落或童或冠油油與偕共坐槐陰閒譚啜茗臨江藉草以觀雲物風帆往來於目農歌不輟於耳亦可謂至樂矣君子謂其樂天知命焉季思卒時年四十有四崇禎下詔特贈翰林待詔其詩學陶而得其神髓韋蘇州後鮮有其倫誦之令人増陋巷簞瓢之樂丙申六月過呉子往荻秋菴蕭瑟湖上廬六月如清秋涼雨過柴門緑楊風颼颼水濱一穉子洋洋何所求終日無一魚持竿釣不休問之向我笑使我心忘憂嵗暮别諸生惻惻不可道臨岐但依依常恐語言多貌勝中情微感兹寒色厲北風吹爾衣嵗暮室家好各各念爾歸羣居雖云樂人情理難違所患不同心不患相見稀尼父重久要如醴久已非勗哉儀先民雅道庶可幾感悟人人惜富貴富貴諒難私居位食其食抱關有攸司若懷凍餒憂不如農桑宜平心任公道天下能者為人事當前昏事後更相嗤三十五年前厯厯皆可思以此徵後來何勞復多疑願言謝將迎履坦希前知館城北妻孥昔居城我淹江上廬妻孥來江上我去城北居城北何所事二生喜從余既愛童子真且得人事疎長夏北牕竹風吹几上書坐看牆外帆樹中去徐徐中情茍無繫觸物皆有餘今茲對佳節秋風秋月初香稻感我鼻歸食江上魚小女解思父一見當何如歸江上去年冬盡歸室家尚完好兒女曝簷隈牆頭日杲杲今年冬盡歸離憂不可道中饋闃無人虛堂塵不埽一兒依外家兩女歸兄嫂奚獨天運乖謀生亦草草人世骨肉縁尚爾不可保而况一切營何足攖懷抱久矣吾行迷回車苦不早城北初夏三見草木榮棲棲猶未旋偶與城市逺因耽此地偏獨館背清池一無俗事牽晨興課書罷日午蛙聲喧出門見新秧㣲緑映逺田久晴初得雨穉子亦欣然田父説嵗占今兹定有年物情既如此予樂復何言庚子正月吳子往見過同訪髙存之於漆湖令節思故人流光懼蹉跎心在隰桑篇三復當如何忽聞叩門聲良友逺見過攜吾訪同志詰朝鼓輕艖情殷無遥路信宿踰闗河依然漆湖上春山渺晴波主人愉愉如兼以風日和風和卷簾坐開樽鳥来歌忘飲飲更適不覺芳顔酡階前山茶花落英何其多暮春梅陰䕃西牕實繇枝葉低小鳥時来鳴向我如棲棲一鳥鳴未已一鳥隨和之鳥聲處處起髙下聲參差日出聞鳥聲不覺日已西池塘小雨過夕陽鷓鴣啼元徳秀吾愛元徳秀天然真澹姿榮進非所好聊仕亦不辭於彼紛華中連袂歌于蒍一日駕柴車欲去亦不疑惟盡名利心長得情性怡飲酒彈鳴琴睂宇若見之悠悠千載下寤寐勞相思雜詩日出羣動作智計千萬端用此徒為勞不用不自安所繇在有身坐令思慮殫所以古賢達與物同一觀俛仰任所之宇宙何其寛冬日病樓新構小屋天寒小屋宜潔靜兼新築短簷近低牕意親足我欲牕邊兩木榻編秧煖於褥西榻朝食暄東榻晡時燠暄燠既互轉盤旋與相逐藥物難長供日惟飽饘粥壬寅正月西邨築室成經始逼嵗除春肇室云考結構稱心為彌拙亦彌好邨樹既羅列溪流復縈抱北牖移修篁南圃藝藥草室中圖與書閒暇可探討農人理耰耡念此嵗供早顧我長負疴不耕慚亦飽寄姚孟長道同不用結氣同不用求神在未交先彼此潛相投感君嘐嘐志髙廣正無儔慷慨燈前言奚止情綢繆男子患無志有志良難酬懷居易隨俗安樂生煩憂可憐早春役烟雨維揚舟不知何所牽行止不自由殷勤孟秋約期屆無淹留泛湖離居久相思乍見人情喜各從逺方來相知若伊始晴空泛秋湖天際水瀰瀰中流將焉如東西非所擬微風送輕舟颯入蘆叢裏村家插新標有酒清且旨漁人近前問銀魚初出水美物應佳節及時在我爾滌盞欣對酌髙情詎能已言旋發清歌夕陽下西涘童冠樂何如㸃也千秋起辛丑夏日閒居閒居不勝娛何妨抱微疾長以無事心當彼攝生術白日一何長臨牕坐捫蝨飯餘弄清琴卧起展殘帙孤雲御微風翩翩獨髙出對客嘿然對客坐竟坐無一語亦欲通殷勤尋思了無取好言不關情諒非君所與坦懷兩相忘何害吾與汝移居冉冉嵗云暮寒風動林於言辭東邨宅去適西邨廬豈無舊巢戀歡與吾仲俱西邨况不逺相去一里餘回瞻竹樹間炊烟出前厨吾病四十衰厭厭日不如憂患易反本戚戚念友于安得我叔氏亦復來此居遙望城中山引領空嗟吁閒居寄沈伯和博士時伯和將之京應貢舉蹇劣仍負疴分定無越想柴門槿葉疎卧看人來往江南寒信遲十月氣和朗一夜好雨過階前菜甲長念我逺行人中心悵養養盤餐有餘滋髙駕何時往北地曉征夜半寒雞不忍聴主人炊熟夢初醒出門不復知南北馬上持鞭數七星張民表二首民表字林宗一字武仲中牟人萬厯辛夘舉人有原圃塞菴詩集詩話冦圍大梁汴人死守不降有獻䇿髙巡撫名衡者曰賊營附大堤決河灌之盡為魚鼈矣周王募民壘羊馬城髙厚如岸援兵掘朱家砦口賊黨覺之移營髙岸多儲大航巨筏反決馬家口以灌城河驟決聲震百里排城北門入穿東南門出流入渦水渦怱髙二丈士民溺死數十萬林宗負其先祠木主登筏鄰人求登者衆林宗不忍移筏就之筏且沈乃移筏登屋水大至而沒久之門人周侍郎元亮為刋其遺集僅存百一爾存者悉非其稱意之作可惜也夫飲酒示唐肯堂飲酒非吾好逢君强共斟已聞譚世變悔不入山深猛士功宜録書生職豈任東南民力竭爭忍索黄金閶門見别者代為吳歌一船往東撥一船往西開兩船不相顧都看姑蘇臺明詩綜卷六十一
