body:
  text: 明詩綜巻三十七翰林院檢討朱彞尊編朱應登三十三首應登字升之寳應人𢎞治已未進士除南京戸部主事遷知延平府以副使提學陜西調雲南尋陞布政司右㕘政有凌谿集李獻吉云凌谿飫醇探臠噴英摛華樹聲萟林時華玉元瑞昌國號江東三才凌谿乃與竝奮競騁吳楚之間顧華玉云升之才華彪發泉涌每當人落筆一埽千言㫄觀者往往奪氣其詩上準風雅下采沈宋磅礴藴藉鬱興一代之體伯康徳涵云凌谿清新俊逸有國風之材許誠云先生訓諸生云文者言之精也詩者言之華也精則寓文於質故先體格而後組飾華則縁情製詞故首興致而尚婉約漢魏詩雅而邃六朝詩豔而縟辭隨世異情由衷發吾於唐取其温厚焉乃知見定於中言發諸外篇有所本辭有所禆信乎必傳也已王元美云朱升之如桓宣武似劉司空無所不恨陳顧𤣥言云大㕘情過其才亦時出新語卧子云升之有詩名而合作殊少靜志居詩話李何竝興李目空諸子自三秦而外得其門者葢寡心慕手追凌谿一人而已其口占絶句云文章康李傳新體驅逐唐儒駕馬遷葢其文亦宗北地者祝希哲贈詩云大韶張宮懸九變盡美善陳魯南詩云摛毫揚美詞肆意逐髙雲李獻吉詩云疏越發潛響爛若湍錦舒徐昌穀詩云神飇清管發逸興白雲俱其為名流所賞如此雨雪曲行道廣且深霏雪何飄颺晨風無終極烈烈吹我裳長氷斷四澤灝景瀰八荒遥曭達周原廓哉無何鄉迫觀古巖側磧路如羊腸獵人攜犬至窮獸走彷徨僕饑委道陬馬疲不能行戍旗動髙隧云是甸子岡超驤媿局步躑躅徒自傷擬陸機招隠脩塗苦躑躅曲澗聊盤桓盤桓將安之所樂在淵泉清泠足朝盥幽眇窮夕觀雲構蔽層木翠幄引芳蘭玉鯉罥輕罟銀縷落素盤忽枉良朋儔誠款慰夙歡富貴豈不欲時命非可干稅駕從所適兹焉以永歎野中作細細朝雨零纎纎麥苖長丁夫荷鉏出所至成偃仰林喧羣意動山空百泉響佳境偶獨逢無人共幽賞贈别黄子和舉世昧所欽見客隨諧嬉良朋久寂寥十載惟君知把袂執素手懽悰不自持人事忽生變與君長别離膏車岐路側欲發更遲疑虚名夏厨蠅短景朝華枝兩心各相許脈脈無一詞濁泥媿清塵何以備驅馳盟言願有終白首以為期贈劉元瑞守紹興朝出承明廬駕言還故鄉當門結旌斾觀者倍生光故人欣再見眷眷意難忘舉觴承湛露頌徳詠羔羊周官十二牧職貢各殊疆持子夙夜心坐致黎庶康深衷豈念此但感别日長相彼水中鳬羽翼同翺翔風波一失所望望徒心傷夢大復何子京華一云别瞥若紛飛翼遥遥南中道念子無消息嵗徂寒暑變日落風雨黑詎知萬里魂能達君子側篇章煩見示觸目見古色瀏瀏清瀨鳴擢擢朱絃直指摘發雋語要我以終極大質多渾成至寳去雕飾晤語忽復竟驚起謝良徳音徽猶若聞轉盼已難即悵悵牽垂帷仰睇梁月色何由託歸鴻附此長相憶酬方思道以詩帙見寄方子還山中兩度寄詩帙憐予方在疚報答百不一故人枉相存所恨越阡術江南十月交山中稼應畢天寒脆榆栁霜重熟棗栗理甕得舊醅攀厓割新蜜既可歡親顔亦堪恱家室吾翁嗟已晚念此重有失尚幸老母康麤以慰蓬蓽人生歸有道貧賤匪所恤作詩謝同懐商風振瑶瑟函谷關歌朝出洛陽城暮投函關道函關日落行人稀滿目黄雲暗秋草此地古來西屬秦崩城敗壁猶嶙峋牛車冉冉行不盡更愁怪石摧車輪關門老子去已逺吾生學道嗟何晚紫氣猶經舊路迷青牛不見當時返只今豺虎正縱横羽檄星馳大㸃兵徼巡司𨽻督責苦關下居民旦夕驚疎林漸指新安麓夜火人歸茅店宿雞鳴客起四散分令人忽憶孟甞君過分水嶺有懐同志前嵗南過分水關十月天晴花滿山今年西度分水嶺九秋積雪浮寒影天時南北有常運人事蹉跎發深省中原日夕狼虎多遊子出門行荷戈魯儒摳衣蹈白刃汴京灑血腥黄河東橋作郡夷門裏南原卧家猶未起石亭抱璞隠城市鳬塘買田歸霅水有懐幽咄真自知海内論心竟誰是春日淮南黄栗留丁丁伐木聲相求此時誰遣不歸去梁令還家尚黑頭北風行昨日南風揚今朝北風急南風吹山山不移北風吹海海欲立軒轅臺前燭龍晦紇干山頭凍雀泣行人戢足不敢行我獨何為向原隰田父停歌向我笑笑我投簪滯鄉邑然桂作薪炊玉粒空囊無錢太羞澀我云蓼蟲之性甘習苦亦聞龍蛇嵗晚當深蟄行藏得失本天道古來賢哲何嗟及君不見北風雨雪洛陽城袁安卧内無人入對雪對雪饒幽思清吟酒半醺撲簾寒未起灑葉細先聞風急仍含雨天低欲墮雲晚看庭篠色漸喜白紛紛孝宗皇帝挽辭絰杖生新感朝儀改舊觀喪經仍漢制顧命續周官萬國函香拜諸王畫像看蒼天髙不極贊徳自知難哀谷亭二首聞道團營將前茅未進師居民坐塗炭揮淚望旌旗栁色烽煙外鳩聲榖雨時移家若飄梗誰暇問東菑齊魯何多盜冬春未解圍元戎休按轡黎庶待宣威戍久軍芻竭城寒士氣微猶聞安撫使先已獻俘歸觀楚人插秧插禾憐楚俗田畛緑層層共道臨芒種那能避鬱蒸歌詞人互答音節鼓相譍但使民多粒寧憂穀價騰渡淮二首楚岸崩沙仄淮流積潦深沙明疑雪霽潦迥似秋隂舟楫煩相待炎蒸喜不侵重憐行宦地獨感濟時心水外長天盡煙中逺嶼銜即看乗泱漭已若釋憂讒波撼青楓樹涼輕白紵衫舟人不愁思滿引夕陽帆贈蔣子雲别懐無近逺送子即凄然文采東都守明時萬里遷江舟迴夕浪汀草暗春煙却望來時路長安在日邊園居即事首夏衡門裏清波四望通古槐垂密䕃細草結幽叢庭灑黄梅雨簾鈎紫燕風林堂多發興興至復誰同雨後晚眺小雨經檐盡殘陽隱樹低迎曛花氣合向夕野容迷寳刹流雲外金塘去鳥西吾生江海意隨分此卑棲癸未書警物態傷吾意流離滿道傍雨鳩頻逐婦風鴈忽分行自分惟溝壑何人且廟廊舊時阡陌在虛望返耕桑檐雨中嵗仕三巳晚耕天一涯僻居寡儔侶開戸對桑麻檐雨隨風亂溪流逐岸斜時時值野叟爭度坐鷗沙舟至臨清大風晦冥聞過客言谷亭盜賊之勢甚劇感而賦此聞說王師北出燕山東羣盜故依然沙城風起塵如霧澤國春隂水作煙過客盡傳烽火警行人愁度谷亭船平原太守今誰是慷慨多慙石二千登王孫亭望華嶽華嶽遥瞻勢已雄河流入望更無窮羣山總出三峰下衆水同歸九曲中絶塞衣冠通上國行人車馬入新豐漢家陵邑依然在擬賦西都恐未工秋興彍騎憑陵八月風羽書朝暮九華宮金吾宿衛臨關外宣府遊兵集禁中燕塞河山天下險泰陵恩徳衆心同誰能補衮供臣職莫遣宵衣損聖躬滄浪江千尋鐵鎖貫長橋積翠浮天萬壑遥人向中流看砥柱路從平地入岧嶤未論文教開荒服已見蕃王款聖朝鳥語花明迎使節滄浪江上瘴全消滕王閣和韻樓為名髙轉被憎詩人翻怯後來登嘉賔勝日難兼得廢址遺文託再興慷慨尚懐投筆吏寂寥私念校書丞留題擬附三王後媿乏袁州刺史能騰陽元夕殊方節序漫相親又見春燈照眼新秦苑煙花三輔夢梁州風俗隔年身千門宛轉迎華月九陌逶迤起暗塵淮海路迷何處所孤城深鎖獨愁人登岳陽樓岳陽樓前看洞庭三江水多愁杳冥殘陽欲盡孤鳥沒君山之樹何青青題詩直防鬼神泣吹笛恐有蛟龍聽先采香蘭招屈子徐歌瑶瑟報湘靈田中雜吟髙田低田湖水浮南垞北垞粱稻秋明沙日入有棲鴈獨樹風寒無繫舟白草直隨平野盡滄波真帶暝煙流時艱漸老雙蓬鬢嵗杪空餘一敝裘大駕東巡野語聞說天王西狩頻翠華今日又東巡泰山重被登封頌梁父親承羽獵塵曉日霏煙開帳殿朔風寒雨暗楓宸江都十月花零落莫遣龍舟望幸新湘中雜興二首湘渚草深鵯鵊鳴湘江水清多芷蘅月明伊軋中流槳疑是湘娥鼓瑟聲春草千里碧沈沈蒼梧雲昏湘水深此中自古行人怨鷓鴣雙啼斑竹林顧璘二十首璘字華玉先世吳縣人徙南京𢎞治丙辰進士知廣平縣徵入為南京吏部主事遷知開封府降知全州起知台州府累遷至浙江左布政使擢右副都御史巡撫江西乞終養忤旨勒致仕再起巡撫湖廣顯陵工竣加工部尚書還朝改南京刑部尚書有息園浮湘憑几山中歸田諸集袁永之云𢎞治間獻吉昌穀仲黙相與表裏以鳴國家之盛華玉頡頏其間塤吹篪應莫敢軒輊他如希哲之宏博伯虎之竒俊繼之之古淡升之之精工太初之清曠履吉之麗逸𤣥敬之沖泊伯時之醇鬯欽佩之雋質叔鳴之新警咸號名家竝稱國手陳羽伯云華玉抽毫敷藻前無古人古文徵仲云華玉丈不事險刻而鑄辭發藻必人是師詩尤雋永雖矩矱唐人而劖除陳爛時出竒峭樂府歌詞亦不失漢魏風格頡頏獻吉仲黙升之昌榖間不知孰為髙孰為下也云王元美云顧華玉如春原盡花蘼不少又華玉才華在朱鄭之上特以其調少下耳風穆敬甫云顧公吳中才子有知人鑒為當時雅主盟詩亦竒古不俗顧𤣥言云司冦體裁變創工於發端斐然盛明之羽翼也黄徳甫云顧詩發源清淺沿流徘徊忽有所觸一振其響清映林樾頓洗俗聽如髙林忽在下衣襟有雲霧倒景猶照人平地黯將暮可謂舂容雅韻乂江横羣水合野闊萬峰開描寫江山超於凡想陳卧子云華玉才情警麗但風格未髙選俞右吉云華玉詩如金塘緬演積芳木春華有餘所乏秋氣詩話華玉與劉元瑞徐昌穀號江東三才又與陳魯南王欽佩稱金陵三俊當李獻吉何仲黙詩名未盛時藉其𢎞奬而王穉欽顔惟喬輩皆其所賞識闢息園於居室之後鑿池壘石築載酒亭於西隅延接名士討論詩古文辭張讌輒以筝琶佐觴有小樂工楊彬善曲每詫於客曰此蔣南泠詩所云消得楊郎一曲歌者是也既負海内重望遇時貴人或傲然不為意而山林寂寞之士虚已下之祝希哲著觀雲賦唐子畏著廣志賦華玉恒對客誦之及嚴惟中招飲既坐嫌其酒冷惟中令易熱酒華玉又嫌太熱指顧揮霍目無主人甞至浙訪孫太初幅巾道衣放舟西湖上一夕見有舟泊斷橋下一僧一鶴一童子煮茶華玉笑曰此必太初也移舟就之遂定交焉入楚試童子得江陵張叔大竒之入謁脫所束犀帶與之曰子他年所綰不止是留此見老夫非虚譽爾穉欽既失志日與狎客鬭雞走狗華玉欲見之穉欽不肯往乃以計恐狎客乗其出游疾趨而前穉欽亟走匿為狎客夾持之强留之具賔主禮葢其求友之勤如是所撰國寳新編録獻吉以下一十五人各系以贊其交也廣而擇之也峻矣題龍巖額有賦蒼厓積鐵古中空若天開不知寒泉水潺湲自何來石田莽重疊上有仙人臺淋漓濕元氣玉黍長蓓蕾青春始來游桃花映樽罍主人邀痛飲酣歌日西頽獨揮菁茅帚書破巖上苔巨靈拍掌笑大劫俱揚灰吾意在山水短長安計哉南巖雷神祠雷神棲何所巖洞深杳冥幽林蔽日影寒澗餘龍腥經年尚留雪當午仍見星石竒出變相境勝通神靈譎怪山海事流傳信前經度楓木嶺初謂山拂天飛鳥不可度逡巡躡危磴乃即我行路百折頻攀援十步九迴顧髙林忽在下衣襟有雲霧倒景猶照人平地黯將暮東北望故鄉江流莽傾注長風動萬里獨立難久竚東郊田園二首陶公歸桑里謝客營石門於世既無競努力事田園春還理荒穢良苖應時繁豈不念嵗豐天道難預論列槿藩草屋藝蔬備晨飱郊居漸成趣益厭城市喧菽水苟無闕萬事奚足言刈麥思時暘分苖望時雨彼蒼於農人遷就亦良苦好雨從東來原田白膴膴老穉荷蓑出緑縟紛可覩連嵗荒負租頗遭官長怒今幸占有年且願給公賦絮酒兼炙雞殷勤祝貓虎碧溪落落髙梧隂俯瞰寒流碧微雲過疎雨秋容澹無迹魚遊緑藻晴鳥下青蕪夕興至每垂綸歌罷還岸漁父兩三人時來共爭席辨蛤和涇川公漁海窮潏泬獵山歴㟏岈生人胡多勞養此六六牙聖哲著禮經細不遺螘蛙食黿一染指因以傾厥家末俗貴珍異載籍紛喧譁美哉爾石蛤奚免網與义修脛雪長荇腴中剖團𤓰烹以實下豆亦慰賔筵嘉南荒盛蟲族大者蛇與蟇瑣細及百種射影兼含沙食者苦漚泄傷者困瘡瘕例舉混美惡頗笑昌黎差幸䝉匕箸賞重以裦辭加河豚自此賤況復論魚鰕送陳魯南上陵松柏西陵路詞臣仗節來衣冠瞻漢寢弓劒拜軒臺細雨春山濕明星今殿開年年揮淚地不見長蒼苔簡陳宋卿頗怪陳無巳尋詩日閉門空庭疎繫馬細雨負清尊節序過梅萼春隂積蘚痕不嫌官舍冷燒燭對黄昏丙子元日於郡齋作四十韻南紀江潭逺東風節序移流年傷久客多病負明時稼穡功何補鶯花興匪宜嶺梅虚照眼江栁莫揺絲憶昔為郎日承親樂在兹都城依斗極畫省綴雲司禄米供調膳家園奉杖藜閒情潘岳賦燕喜魯人詩棣萼連庭發槐隂拂地垂書編長枕籍酒斚亦淋漓契合多良友招邀慰所思聲華傾座重精白寸心知松檜寒逾勁驊騮老不羈已堪徵道義況更得師資西漢才方盛東周夢豈衰立談期化理傾倒絶猜疑中路罹多難専城試一麾梁陳髙賊壘河朔走征旗苦乏勤王略空懐報國私援枹臨矢石飲血撫鰥嫠僅免投豺虎方思伴鹿麋愚䝉仍觸法覆載本含慈斧鑕逃輕典丹青發朽姿恩波猶五馬竄地異三危水鏡開城觀星躔壓地支國風饒比興民俗重耕犂桃水居人樂華胥帝載熙頗容山簡醉未釋賈生悲信美非吾土浮名已後期形容麟閣逺羽翼鷃圖卑即事驚華髪無階叩赤墀大懽惟菽水野性一茅茨納履思投足談經得解頤文章關不朽氣格許誰追能事輸前列洪鈞貴自持陶鎔兼物類渾樸斷人為郁郁希游夏勞勞去管伊行藏俱自得筋力豈空疲細雨衣襟淨深山卧起遲時尋老漁父同釣楚江湄庚辰元日諸侯玉帛㑹長安天子旌旗下楚關共想元正趨紫殿翻勞邊將從金鞍滄江飲馬波先靜黄竹回鑾雪未乾北極巍巍天咫尺五雲長䕶鳳樓寒和英玉聞秋佳亭新移悵然作兼簡王禮部欽佩秋佳亭子臨秋水伐木新移向近陂小徑有時迷客入長楊無數遶檐垂即看野鵲春來喜莫怪羣鷗晚下疑寄語東鄰王禮部好攜樽酒數追隨寄張司馬九月六日憶湘山寺舊遊遥憶東山張太傅去年今日共離觴清江畫舫愁中别落月楓林夢裏長黄菊再逢非舊日白頭相見定何鄉題詩欲寄衡陽去目斷西風旅鴈行懊惱曲效齊梁體小時聞長沙說在天盡處人言見郎船已過長沙去歸自灌園陽望湘山口占十日别湘山見如故人面何況石頭城是儂舊鄉縣雨中溪行雜詩二首十日溪中舟格格響溪石孤篷過鳴雨忽失沙上脊日暮爭渡喧天隂野風急孤客來何遲蕭蕭荷鉏立移疾二首山頭雨晴泉入池黒牽牛花開滿籬閉門三日簿書歇恰直逺人來賦詩秋至一月暑仍酷西風忽振庭梧飛白雨連山雲匝地滿城兒女覓秋衣埽階竹髙巖短竹餘一尺纎葉裊裊青鸞毛空山無人月華冷西風滿地秋蕭騷陳沂四首沂字魯南其先鄞縣人徙家南京正徳丁丑進士改庶吉士授編修進侍講出為江西㕘議歴山東㕘政轉行太僕寺卿有遂初齋拘虚館二集顧華玉云石亭詩人謂其類東坡亦自號曰小坡中嵗乃宗盛唐陳羽伯云魯南藻性天成尤多賦詠文采照映一時𤣥穆敬甫云太僕詩宏博精深當屬大家顧言云石亭與華玉欽佩竝稱讀其詩怳乎臨蓬山而俯瞰閬苑深逺鬱然李時逺云魯南古體埒漢魏長篇似太白近體在開元之間詩話魯南詩亦勻整第乏警䇿葢心懲北地勦襲之非而限於力也山寺出郭少人事更居林壑間僕因隨主嬾僧反愛吾閒碧草生滿地白雲常在山城中㑹相問未卜幾時還夏日雜興野寺清涼舊有名空廊還傍石頭城侵階竹䕃差差轉入座荷香細細生西府山前車輦路南唐宮裏轆轤聲氷漿玉盌傳瓜處想像君臣萬古情送石太宰代祀泰山闕里上卿膺顯命元祀向東方喬嶽瞻青岱生民有素王邁邦齊一作周望秩過魯式一作漢趨蹌埽地如躬陟樞衣儼帝將諸峰求禪土數仞入宮牆仰止巖巖外周旋翼翼㫄俯窺宜小壤密造豈升堂峻極神應降惟馨道益光往哉公不忝簡在事非常媿乏崧髙詠風雩代詠章寄顧全州曲渚一作浦湘雲暮叢一作幽篁楚雨秋愁心寄鴻鴈煩爾過衡州王韋三首韋字欽佩上元人𢎞治乙丑進士選庶吉士授南吏部主事改兵部遷禮部郎中陞河南提學副使終南太僕少卿有南原集顧華玉云少卿論詩専尚才情其言曰唐風既成詩自為格不與雅頌同趨漢魏變於雅頌唐體沿於國風今以雅文為近詩未甞不流於宋也故其詩婉麗多致雋味難窮或者謂為纎弱豈知所操之殊向哉陳羽伯云欽佩詩有晚唐温李之風佩如小兒女簪花學作軟麗王元美云王欽李時逺云太僕詩婉曲濃鮮頗類温李詩話欽佩詩其源出於温八叉比之義山不合也其最著者閣試春隂之作篇中起來小歩傍闌階花霧襲衣寒氣重李賔之批其巻云二語如有神助遂登上選相傳欽佩為秀才時夢中曽聞人誦之此與錢仲文湘靈鼓瑟事相類儲靜夫又賞其朱樓十二畫沈沈畫棟泥融燕初乳之句亡友王介人則謂苔花蒼潤上簾櫳濛濛經雨還未雨二語尤貼切予意要不若空庭簾巻晝亦暝隔牆惟見桃花明狀春隂更工也欽佩以疫終見顧東橋集列朝詩稱其以母喪毁瘠卒葢攷之未詳云懐師友幽薊多北風塵埃旦暮起嚴冬十二月積雪更千里落落髙樹擁靡靡勁草死中庭獨彷徨念我同懐子遥遥涉𤣥氷單車渡易水嵗暮人閉關何為逺遊此春草帶雨和煙未可名春風處處不勝情於今南浦知多少都向王孫去後生栁枝詞渭水西來萬里遥行人歸去水迢迢垂楊不繫離情住只送飛花過渭橋田汝􅲸二首汝􅲸字深甫祥符人𢎞治中舉人官兵部司務有莘野集俞汝成云莘野専尚氣骨不作卑弱語席上贈推官還太平萬國朝天罷孤城返斾行清秋看過鴈落葉下髙城海岫臨淮出江雲入楚平定知先攬轡早晚望澄清秋興西苑迢迢隔絳河遥瞻禁籞渺煙波天臨偏甸開仙仗日下髙城一作平蕪散玉珂宮漏漫從三殿報爐煙别向九霄多龍池㑹有承恩處誰唱清平第一歌左國璣四首國璣字舜齊祥符人𢎞治中舉人有南郭集黄清甫云左詩敏捷率意所向情景横生昔有下筆成章之科斯其人矣但長於用才短於用思進而求之恐其易盡陳李時逺云中川空同内弟得之琢磨為深卧子云左君跌宕亦未成家詩話田左竝稱詩皆麤鄙信魯衛也郭桐岡樓宴集華圃倚崇墉飛觀凌白日招尋偶同游登陟遂閒逸逍遥覽芳蒨結構轉幽密亭深碧篠茂荷挺丹泉溢虚曠周逺阡岧嶤促危膝迴飇灑窗牖明詠散縹帙慕往歎暌離俯來繼前述憂傷感蜉蝣局促悲蟋蟀勿為逝波歎且共賞瑶瑟寒夜吟贈吳江主人昬鐘夜半華月髙霜氣入室風蕭騷主人下簾執明燭玉壺瀉出香蒲萄氷河赤鯉價重萬洞庭黄柑初破苞解我吳鈎佩著我赤霜袍當杯更發鷓鴣調意氣落魄無辭勞白日營營苦多務喫飯梳頭日云暮不來清夜與爾遭枉使黄金滿籯庫當年平樂宴賔客十千五千更不顧如花少女勸酒歌醉沒西山月華素吳江主人逸興清寒夜與爾相逢迎紅爐暖炙熏燄重不怕河氷凍萬層野堂餞陳子之南都我從夷門來送君金陵去野館離筵春晝晴楊花茫茫幾千樹風吹亂撲金尊飛行人且解碧羅衣鳴箏送酒勸君醉明日出門知者希贈趙將軍老將揺征斾提兵出漢家幾年閒豹略萬里鎮龍沙驛路村村雨邊城處處花幕南無戰馬終日醉聞笳孫一元十七首一元字太初不知何許人或曰安化王孫也自號太白山人甞西入華南入衡東登岳又南入吳就昬於吳興施氏與劉麟吳珫陸崑龍霓稱苕溪五隠有太白山人漫稾顧華玉云太初於詩備極苦心所乏天才耳之李獻吉云山人有超軼才詩亦多憤激悲壯音鄭繼之云太白詩悲壯竒崛感激奮發而卒澤以沖和太劉元瑞云太初於詩非唐以前則不顧又云初詩主氣格有刮劘胃腎之功豪殷近夫云山人詩傳寫萬物前無古人凡可喜可愕可悲可嗔一以發之於詩豪縱恣肆時出蹊徑如王元美云孫太初如雪夜偏師間道入蔡又鳴蜩伏蚓聲振月露體滯泥壤始王敬美云𢎞正以前風氣未開振騷創雅實李何菰蘆中起而相角者一孫山人而已山人詩可稱具體未見其止也謫穆敬甫云太初詩神采秀發不染色相假與仙竝起一時當互有長短張顧𤣥言云山人五言得孟襄陽幽處七言得曲江曠處黄清甫云孫詩語不循俗務在幽致寄託丘壑指顧煙霞宛然有逸士風而内懐髙度頗自標舉陳卧子云山人詭跡塵外清放自居故有俊調而鮮深思終近淺俗詩話太初家本秦人不受空同圈束其詩亦不盡本唐音觀其與杭東卿論詩作則知瓣香所向乃屬涪翁故有勃興黄九窮妙處空自知之語劉元瑞墓表謂詩非唐以前則不顧未為太初知已方山人太古讀其所寄詩云碧雲行空月皎皎春風滿地花斑斑庶幾近之自君之出矣二首自君之出矣冷煖何所依不能見君面但見篋中衣自君之出矣生死那寸知不能保君身但保襁中兒訪樵者逺尋山中樵不識山中路隔林伐木聲遥憶林深處不晤竟空歸日墮西陵樹秋夜同紫峽逸士雪江老僧輩十人宿南屏山中誦逋仙夕寒山翠重秋淨鳥行髙分韻賦詩予得夕字荒煙散不收殘山帶遥碧林鴉晚依依草雉時嗝嗝斜光明不定居人掩荆柵朅來喜盍簪林下喜幽賾厓屋燈火青野蕨旋新摘豈無伏虎禪亦有飛鳬客愛此小崑丘人世白雲隔願當抱竒幽炯言永終夕陶淵明淵明豪傑人出處亦有道昔讀荆軻詩仿彿見懐抱晉室漸陵夷一官非所好劉裕乃何人天意亦草草歸來卧潯陽甲子紀年號酒乃寓真情菊也見孤操贈别王與時方伯海中三花樹石上五粒松與子今有約相候尋其蹤褰衣白雲杪時戲蒼精龍手把古苔篇還訪崑崙峰峰頂嚥𤣥露長令有好容回首謝塵世莫教生秋蓬漁父野水平於席中流風力微江花迎日淨沙鳥背帆飛黄帽為漁父青錢買釣磯只今鷗社裏投老願無違晚霽晚來雨初霽煙火隔林微一徑牛羊入孤村桑柘稀長天下逺水積霧帶巖扉月黒聞人語溪南種樹歸失鶴只在秋江上孤蹤何所之花間扶杖處竹外聽泉時野客來𤣥圃山僧寄紫芝此時還憶汝伴我夜吟詩西爽亭㑹别周㕘政楊顧二㕘議對酒山亭上清秋思更豪輕鷗動江色片雨帶林皋興逐王司馬詩當何水曹分攜聊一笑日暮上漁舠鄭繼之地官久不過湖上奉簡怪爾狂吟客不過湖水濵寧遭官長罵莫得野人嗔雲外烏藤杖水邊白鷺巾相看只自好空送月華新飲惠憲副北屏别墅對酒清溪上聞歌杳靄間竹光酣晚日雲影動秋山好鳥移時下名園盡日閒主人愛瀟散野客不知還宿歸雲菴沙晴竹碧鷗出飛野花候予開石扉暮雲巻雨日初落木葉滿山風乍稀酒杯入夜意自好篝燈向人寒相依窮幽覽勝乃吾事坐愛名山忘獨歸草堂溪上髙秋雲木涼地偏人事不相妨開門江日流書幌背水秋花照草堂塹北買田時未就舍南種竹已成行幽居自擬王官谷藥裹書籖引興長雜詠夕陽沒中流舟子不停櫓風來未滿帆望斷桃花浦山中來往不逢人家在山深處獨鶴忽飛來風動月中樹春日書事欲晴未晴雲日黄美人不來心獨傷漫倚東風數春事桃花棃花飛過牆鄭善夫二十二首善夫字繼之閩縣人𢎞治乙丑進士除戸部主事改禮部以諫南巡杖闕下尋乞歸用薦起南京刑部改吏部郎中有少谷山人集顧華玉云繼之氣秀巖谷雖才韻勿充而古言精思霞映天表也徐子元云少谷師杜殊乏懽悰宛然一生愁楊用修云太初少谷兩家詩亦多雜宋人而鑒者莫悟穆敬甫云鄭詩風骨稜然不深不俗如王元美云鄭繼之如氷稜石骨質勁不華又天寳父老談喪亂事皆實際時時感慨王敬美云閩人家能呫嗶而不甚工詩國初林鴻髙棅唐泰輩皆稱能詩號十才子然出張徐下逺甚無論季迪其後氣骨崚崚差堪旗鼓中原者僅一鄭善夫耳其詩雖多摸杜猶是邊徐薛王之亞具俞汝成云少谷才調有餘婉麗不足然竒氣在雄思鬱然顧𤣥言云驗封賦才英邁往往有新語仿黄清甫云繼之才故沈鬱去杜為近過為摹幾喪其真夀陵之步亦可稱工奚必邯鄲也擊謝在杭云鄭繼之一洗鉛華力追大雅然棓百家獨宗少陵呻吟枯寂之語多而風人比興之義絶譬之時無春而遽秋人未少而先老才情未肆氣格變衰樂事未陳聲淚俱下此在少陵為之已非得意之筆況效顰學步者哉陳卧子云繼之雅質故補叙之言獨長詩話繼之在𢎞正間不襲李何餘論别開生面好盤硬語往往氣過其辭雖源出杜陵實有類山谷者集中感時之作可觀可怨頗不猶人其論詩五言云大哉杜少陵苦心良在斯末流但呌噪古意漫莫知鳳鳥空中鳴衆禽反見嗤葢有獨立不遷之槩焉當時孫鄭竝稱孫非鄭㪣朱鄭竝稱朱亦非鄭匹也短歌行驅一作跨馬出郭門馬疾不俟鞭長跽叩一作挽君馬聽我歌一言涼風戒芳樹白露棲寒蟬君子有所思逺遊及幽燕在家人所愛去家人所憐朝饔不及餐豈得戀膝前下有黄口兒上有滄浪天今時方清亷盡室難逺遷獨行多辛苦加餐以延年曹潔躬云竒矯無前初離京邑留别諸同志驅車遵城闉振䇿率廣路仰盼孤雲征俯見波流泝感念平生歡豈以杯酒故羣居不自察一作覺相失増怨慕川河引舟楫陵陸曠煙霧重覯難可尋努力敷襟素發越州生無冠組分碌碌守迍邅越南十二月盡室復逺遷故國眇天末扁舟薄言旋閩中地氣暖可免絲與緜舊業雖荒蕪尚有一頃田他鄉困寒饑胡為重留連且聞江海熟巳不憂荒年此州固信美旅寓豈其然盤餐未易遘薪水亦費錢雖得山水玩顧非貧士便素癖厭人事況乃居市㕓毅然舍此去飄颻御風煙夜泊桐江雲朝登富春山行復經武夷髙招控鶴仙沆瀣亦可飽安能逐鴟鳶跼跼禹跡裏衷情向誰宣聞道聞道今天子身封鎮國公家初營上谷臣得賀離宮鐵劵傳何急將軍氣盡雄郊牛凡五卜車駕想河東鍾廣漢云甚哉汲黯之戇也即事赤縣山河在黄沙道路長祗憂蕃部落不著舜衣裳寳轂猶深入金矟慮轉傷前車未為逺神武有英皇早秋龍門舟中艓子小於葉早秋江上行風波千古撼天地幾時平病骨憐滄海凡才恥聖明不眠聞短吹故國亦飄零送陳生赴韶州戎幕月下棲烏樹天邊過鴈羣生涯隨逆旋幽獨倍憐君百粤兹多難今時未尚文南遊得蠻府愁殺郝㕘軍送蘇侍御從仁使蜀驄馬今何去𤣥冥嵗已殘風雲行劒閣鉦鼓動松潘事在西戎部功虧舊將壇懐柔亦邊略要識聖恩寛讀太初潯陽歌青春寄我潯陽曲長路思君鸚鵡洲此日江湖須逺志浮雲西北有髙樓嵇康竟少神仙分尚子仍牽兒女憂居洛何曾定蹤跡終南渭水入鄉愁登御校場下望故宮萬峰雲木鬱蒼蒼故壘仍存閱武場南渡關河雙眼盡中原風物百憂傍尚傳草莽開黄屋想見龍蛇遶御牀往事只今俱灑淚兩階干羽意何長勝果寺秋懐山寺行逢紅槿花江南風物望中賖棘雲蘿月同秋事鴻鴈鶖鶬亦嵗華多病茂陵仍去國長貧杜曲尚無家白袍黄帽從吾好歸去滄洲問釣槎卜居懐林待用司空卜居為愛龍山好薜茘隂連湖上村海日帆檣動書牖天風鵝鸛到柴門清時定許潛夫逺散地還知靜者尊聞道平生謝太傅東山卧席未教温秋日病懐南州木落晚一作嵗蕭蕭薊野風煙萬里遥病後客心惟藥物秋來人意滿雲霄平沙鴈帶三湘雨横浦帆歸八月潮揺落應悲楚公子不將舊業問一作付漁樵李忠定祠千秋祠廟對樵溪丞相回戈日向西江漢巳浮龍馬去風塵遺恨鷓鴣啼中原經略時何及北狩君臣路漸迷三疏留君有東澈人情天運苦難齊秋夜七月欲盡天氣清殘月未上江猶明流螢渡水不一㸃𤣥蟬咽秋無數聲獨客尚未送貧賤四方況是多甲兵立罷西風夜無寐吳歈嫋嫋感人情孤山寄太白山人為問山人孫太初交情嵗晚莫教疎孤山梅萼春相惱滿地松苓日自鉏江夏肯容禰處士茂陵初卧馬相如知君不廢苕溪釣書帛能無寄鯉魚嵗晏荅王時行越王臺下草堂隂萬夀橋東流水心天畔風雲新嵗晏霜前梅栁故園深黄巾亂後只茅屋白社歸來無橘林揺落最憐王水部近時生理戴朝簪子夜變歌我欲渡螺江螺女不可遇人知子夜來不知子夜去柴門涼月光不了照我芳桂叢白鳬如人長來往柴門東武夷櫂歌幔亭彩幄㑹仙靈紫霧濛濛薄大清奏罷人間可哀曲鳳笙龍管杳無聲櫂歌青螺江頭游子吟黄金臺上秋雲深風塵一别一萬里美人駕車傷我心游丹青閣懐許黄門啓衷風流不見許黄門文字丹青閣尚存最憐佳句車盤驛黄犢青山何處村明詩綜卷三十七
