body:
  text: 明詩綜卷六十六翰林院檢討朱彛尊編錢士升一首士升字抑之嘉善人萬厯丙辰賜進士第一累官太子太保文淵閣大學士靜志居詩話相君晚達爰立未乆旋遂初衣薦丁亂離故其詩多鬱思南園即事世情不到處獨寤寐歌時但有雲山入兼無樵牧知竹光虚牖白花氣雜林遲不覺斜陽下鄰家起晚炊劉榮嗣三首榮嗣字敬仲曲周人萬厯丙辰進士除戸部主事調吏部厯郎中累官至工部尚書總督河道有半舫集詩話尚書銜命治河時駱馬湖潰運道填淤乃創挽河之議起宿遷至徐州别鑿新河分黄水注其中以通漕運計二百餘里費金錢五十萬邳州上下悉河流故道濬之尺許皆沙掘之為河經宿沙落河坎復平迨引黄水入波流迅急衝沙而下往往成淤明年漕艘至駱馬河潰流適平運丁惟願入泇不願由新河尚書雖躬督之諭以軍法間有入新河者舟輒膠於是南給事中曹景參上疏特糾落職提問下獄論辟獄未解而卒朝野之論以尚書河渠之任本非所長皆誤信門客之說用違其才為可痛惜其後駱馬湖復潰舟行新河人頗稱便焉至其詩格卑卑未能逺與古人方駕白石莊萬都尉園作仙圃宜秋色相將戀夕曛松青新濯雨槐古舊侵雲竹牖池光合山樓石翠分鳳簫遺韻在擬向月中聞題畫二首老去登臨怯杖藤好山不上最髙層疎松㡬樹斜陽裏閒看巖前埽葉僧灌木隂隂溪水斜溪頭鷗鷺浴晴沙春潮退後風生急魚網船梢挂落花彭汝楠一首汝楠字伯棟莆田人萬厯丙辰進士除㑹稽知縣入為禮科給事中累官兵部左侍郎贈尚書讀黄維章辯疏有感聞道欃槍未掩芒驚聞龍戰又𤣥黄赤睂豈遂移炎漢白馬還宜鑒李唐君子獨為洵足恥黨人不與亦何妨聖明自是如天宥黽勉同心定我王潘曽紘二首曽紘字昭度烏程人萬厯丙辰進士歴官僉都御史廵撫南贑崇禎中提兵入衛卒於軍有芳蓀館遺槀大柳驛守嵗古驛逢梅發荒邨帶柳斜雪明難入夜山霽易蒸霞碧篆消燈暈黄沙拂劒花男兒應有氣可復負年華金陵感遇花發垂垂歸興濃便教歸去若為容日邊潮合迷前浦雨後煙開出數峰楊栁暗彫江岸笛松楸靜落寺樓鐘閭閻三月音書斷夢入燕闗第㡬重申紹芳一首紹芳字維烈長洲人萬厯丙辰進士初任應天府學教授遷南京國子助教升禮部主事歴郎中調吏部出為山東按察副使累官戸部右侍郎送張玉笥中丞進擢總河𤣥圭初錫自宸衷四載勤勞特借公開府夙推真使相導河新命少司空舳艫風引桃花浪海甸雲興瓠子宫何獨甘棠思召伯轉輸專倚酇侯功方大任一首大任字玉成一字逢吉桐城人萬厯丙辰進士除元城知縣擢廣西道御史天啓末魏璫營生壙僭侈踰制特疏糾之削籍崇禎初補官升僉都御史巡山海闗㝷以副都御史撫順天有霞起樓詩草詠懷束髪慕竒癖讀書萬卷餘㳺思緬邈塲削跡棼華塗舉世爭㨗徑欣然笑其愚禀氣固已然改轍將焉如孔生恥溝壑原子安桑樞素志亮有託斯人豈盡迂掩耳謝時賢一心抱區區張瑋一首瑋字韋玉武進人萬厯己未進士除户部主事歴兵部郎中出為廣東僉事仕至都察院協理院事左副都御史卒諡清惠有如此齋集黙思仲先約過詹所茶山園以事不偕小詩代訊一徑寒雲似練開茶煙起處小車來獨憐久病閒雙屐不踏孤山十畞苔萬燝一首燝字闇夫新建人萬厯丙辰進士除刑部主事調工部厯屯田郎中首劾魏忠賢廷杖流血死贈太常少卿追諡忠貞詩話天啓中忤魏璫慘死者先後一十七人萬公首受其禍公初任營繕主事轉屯田郎先管寳源局而陵工其職掌也因内官監廢銅不發疏言其姦謂忠賢珠玉盈笥金銀滿屋何欲不遂顧此廢爛銅器無足入其目而必一手握定者其設心以為不若是無以操天下之利權既操天下之利權不難攬天下之政權臣有以窺其微矣疏入矯旨於午門杖一百奄人數十輩􅑣擁牽衣捽髪而前杖後伏小璫於闕下掊擊錐刺踰四日而殞李忠毅上言曰燝死矣未報國恩先填溝壑六尺之孤繞膝八旬之母倚閭旅櫬無歸㳺魂戀闕臣僚飲泣道路咨嗟然共知非出於陞下之心也臣不暇為燝寃為陞下寃損好生之徳負殺諫臣之名豈所以作忠勸士哉夫人臣緘口以待遷厚利也危言以招戮實禍也身死而天下悲其忠虚名也舎保身家榮妻子之計博此虚名饑不可食寒不可衣將焉用之况乎傷殘父母之遺體以從龍比於九京人非僕隸法非訊囚罪至死刑命非草芥廷杖之舉殊失士心直俟公論明而䘏死録孤嗟何及矣被旨以瀆擾詰責葢自公死忠賢知外廷之無奈彼何由是鈎黨之獄興而縉紳之禍烈矣登黄鶴樓我欲乘黄鶴飄然物外遊檻前懷古淚且為禰衡收魏大中二首大中字孔時嘉善人萬厯丙辰進士授行人歴官吏科都給事中死奄禍贈太嘗寺卿諡忠節有藏宻齋集詩話忠節骨鯁之臣然頗留心風雅里人王屋布衣能詩公見其賦秋蘭作為之擊節值文㑹公曰孰為賦秋蘭者起而復揖之布衣感公之知公被逮日徒步送之境外揮淚而别良鄉縣彰義門西路桑乾古渡分長覊乘傳馬不斷出闗軍沙白迷荒戍城黄壓暮雲車牛徵到骨募派底紛紛息㳺一夜秋聲萬木寒乾坤何處足彈冠時名盡向黄金起世事都堪白眼看已自故人嗟落魄更誰同病問加餐風塵伏枕衡門穏行路於今轉覺難陳熙昌一首熙昌字逢時南海人萬厯丙辰進士除平湖知縣擢吏科給事中東湖雜詩乍浦瀛壖曲遥連蘆瀝場迎船桑葉白繫纜菜花黄塔影開初地鐘聲落上方孤城非鐵甕先事慎隄防詩話乍浦孤城如彈丸倭寇入犯之衝經國者不置重兵於其地綢繆牖户之謂何陳公作宰在太平之日先有隠憂矣予嘗過其地登湯山山舊有塔寺僧持疏募重建予亟語縣令已之葢洋船望見塔易指㸃入口之路不可不深慮也李泰禎一首泰禎字道子海鹽人萬厯丙辰進士除龍巖知縣調漳浦選授福建道御史巡按雲南有逺人樓詩集睡鴨緑萍埽罷栁梢齊疎雨斜陽思轉迷此際池塘眠正穏風花吹夢過橋西曹守勲一首守勲字熙載新蔡人萬厯丙辰進士知曹縣考授浙江道御史出為陜西按察僉事歴陜西副使題韓淮隂釣臺城隂片石俯淮流想象王孫此釣遊若問將臺何處所未央宫殿總荒丘李應昇一首應昇字仲達江隂人萬厯丙辰進士除南康推官擢福建道御史死奄禍贈太僕寺卿諡忠毅有落落齋集詩話王紹徽撰東林㸃將録阮大鋮名亦與焉大鋮初與李忠毅魏忠節相善及忠節補吏垣大鋮疑忠節有意逐之遂結傅櫆黨於魏監忠毅猶憶舊交貽之書云昔正叔子瞻一生樹敵到底同鐫黨籍之名若使蔡確之徒欲分收一人以去二君子必不願也可和可爭必不受小人之攀援斯君子之品乃見而大鋮既投璫幕者已絶於諸君子矣及忠毅被逮於檻車賦詩云細數知交在逍遥各一方魏齊方聛聣阮籍亦猖狂形影悲相弔音書夢已荒古人不可作搔首問蒼蒼抑何其忠厚之深也魏齊指常熟魏浣初阮籍則指大鋮其後居南京諸生顧杲等一百四十人草檄討之既而附馬士英得志導之重翻三案誅鉏正人僉士之反覆真同鬼蜮雖有詠懷堂詩吾不屑録之也已哭季弟憶爾迎還櫂悲歌分外深逐臣生死日歸老弟兄心慷慨歌聲發飛揚酒力任呼盧狂竟夕清夢到而今黄尊素一首尊素字真長餘姚人萬厯丙辰進士除寧國推官擢山東道御史削籍被逮死詔獄贈太僕寺卿追諡忠端有集楊維斗云先生慷慨孤直詩篇激而不傷詩話忠端以考選入都時門户紛爭多以挺擊紅丸移宫三案占人向背客問公以三案如何決擇公曰光宗棄羣臣乆今上御極亦非一日三案皆往事恐朝廷所急不在此客無以難也又曰上未登極之先移宫為是御極之後安選侍為是二者祗爭先後不分是非斯皆持平之論惟公之立朝不亢不阿專事補救令楊魏二公從之禍豈若是其酷乎崇禎初死奄禍諸臣止諡及髙楊魏周四公論者多咎姚文毅之過刻公與萬左袁顧繆李及三周公乆而易名諡法守禮執義曰端君子以為宜文文肅作神道碑銘云於惟黄公憂來無方惕號同志戒其用剛葢得其實也春日早行抗旌經古道暝色未全分漸隠林間月微生海際雲輕隂開積翠細草落青芬誰破曈曈曉鳴禽客底聞黄承昊四首承昊字履素秀水人萬厯丙辰進士除大理寺評事選吏科給事中歴刑戸工三科左右給事出為河南按察副使加參政轉福建按察使有闇齋吟稾陳仲醇云闇齋詩髙華而不傷氣幽微而不損神流便而不降格李君實云闇齋風華婉麗詩品在開元大厯間閒居夜雨二首夜半瀟瀟竹輕寒枕上侵明朝無别事風雨不闗心多少閒花草朝朝抱甕忙園丁今夜睡晏起亦何妨過長溝見蜀山湖荷花沿堤二十里有作雲山渺渺水滺滺香滿長堤物外秋只少若邪溪上女乘潮一弄采蓮舟塞上曲鄉月多情伴我來沙場相對不勝哀明朝生死知何處且解征袍醉一回袁中道五首中道字小修公安人萬厯丙辰進士授徽州府教授遷國子博士升南京禮部主事歴郎中有珂雪齋集詩話小修才遜中郎而過於伯氏述别為丘長孺哀哀一孤鴻飛急向東邁傷哉金石交三載乃相㑹相㑹能㡬何一見不復雙子尚滯西陵我遂往鑾江鑾江不忍别復有攝山行攝山不忍别逐子至冶城冶城不忍别十日淹江頭飲子清泠酒卧子木蘭舟酸心一夜風舉目三千路别矣可奈何含淚入城去郢中送春曲總以堂堂去何容緩緩歸隔溪鶯對語掠水燕雙飛野草香沾屐修篁翠濕衣山花一樹好㳺女摘來稀九日登中郎沙市宅上三層樓滿眼傷心處誰能上此樓林煙迷蜀道㠶影識吳舟硯北人何在江南草又秋茱萸空到手欲插淚先流七夕同彭長卿中郎清談閒送可憐宵竹户斜通宛轉橋白水青林秋澹澹好風凉月夜蕭蕭貧來野客傷時序老去詩人怨寂寥驚鳥不鳴更漏靜如聞銀浦弄輕潮投贈太保蹇令公三朝元老帝長城胸貯雄邊百萬兵太尉領軍陪漢相上公分陜䕶周京卿雲不散投戈色夜雨猶聞洗甲聲白袷青編無一事蕭然還是舊書生彭汝諧二首汝諧字原樂吳縣人萬厯丙辰進士有蔚菴逸草㳺桃源澗碧澗山隈轉鳴泉樹杪懸桑麻緣屋字雞犬隔人煙客避中峰雨僧安一宿禪桃花今又放相問世何年從鄧尉山中還至虎山橋坐月平林漠漠烟光齊花氣霏霏醉欲迷欵乃湖中小舟小蒼黄日下西山西寒鴉飛盡渚涯闊白苧歌殘月影低露冷霑衣萬籟靜吚啞邨落催晨雞沈徳符八首徳符字虎臣一字景倩秀水人萬厯戊午舉人有清權堂集陸叔度云先生詩發端必密疊韻不匱不踐王李之迹亦不操王李之戈前無津筏之求後無瑕玷之慮葢風人之流與朱雲子云虎臣大家然有流宕之句詩雖不必拘拘漢魏盛唐而醖藉之與淺俗渾雅之與觕鄙不可不辨也詩話孝廉生稟異質日讀一寸書所撰萬厯野獲編事有左證論無偏黨明代野史未有過焉者其詩寧取公安竟陵欲盡反歴下瑯琊之弊故多豔字側辭雪颯星碎未免病於才多也秋暮咏懷百嵗電泡爾疇不慕長年究意命制之修短非我權玉局出從地玉棺墮自天大丹紫汞鍊神鼎白石煎尅日飛舉人不乆歸重泉信哉服食誤以藥求神仙人日挑菜傳人日山邨樸未知雪深添酒劵風横緩燈期歳事因貧略春光遇閏遲梅園縱深閉宜賞寂寥時送李元白都運之揚州度支聖世借前籌誰似江淮地望優宰相杜悰充轉運司徒王導領揚州軍需西北勞臣勩民力東南國士憂餫饋古來功第一進賢何待鄂千秋苦雨物候違朝爽山容失夕佳陽烏三舎避黑蜧百靈差故恣商羊横先收魃鬼埋屋頽無可漏牆壞不須排廢沼平多日新堤潰少厓衢髙猶嚙屐巷溢或通􅑉暫步擔􅀢遍徒行沒骭皆居如潛島嶼出似泛河淮耳欲生禾穎塵難屑麥䕸浸畦浮菜甲墮坎沒松釵是垤俱鳴鸛無㘭不産蛙飲泉偏沃蚓升壁但資蝸穴牖呼鄰酒乘橇覓市鮭炊艱憎淅米薪濕喜枯荄圖史濡難展屏奩潤易揩迂行甘躑躅愁坐廢詼俳䕶築宵加版存扉晝墐柴其魚興浩歎乃粒軫孤懷議禮應雩禜祈晴儻祀祡何時扇障日利屣上長街邗城新曲明月可憐宵曽聴教玉簫佳名二十四第一擣衣橋天啓宫詞一首二廣雙甄陣脚牢御營日麗戰雲髙封章臺瑣俱休進萬枽臨戎正内操自注唐以左右神策軍為二廣嵗除舊例幸椒房中尉今宵别上觴角觝互呈宫漏短便陳庭燎御明堂顧錫疇一首錫疇字九疇崑山人萬厯已未進士改庻吉士授檢討天啓中削籍崇禎初以原官起用屢遷至禮部左侍郎升尚書有握日草詩話建文四年事蹟革除之後文獻俱不足徴相傳長陵用王景議𦵏以天子之禮然鍾山之麓一坏安在祀典無聞則其説妄也其曰𦵏之西山既不封不樹矣安得又表曰天下大師之塔要其説更妄也自𢎞治中禮部主事楊循吉首請追諡建文君隆慶初東莞布衣譚清海請復革除年號告之髙廟而追上建文君諡萬厯中通政使沈子木國子司業王祖嫡禮部尚書范謙給事中楊天民御史牛應元先後進言得㫖存其年號崇禎中繼以給事中張國維禮部侍郎呂維祺給事中沈𦙍培駙馬都尉鞏永固而褒䘏之典乆而未舉迨顧公典禮容臺始定議建文君諡曰嗣天章道誠懿淵恭覲文揚武克仁篤孝讓皇帝廟號惠宗馬后曰孝愍温仁貞哲睿肅荘烈襄天弼聖讓皇后㝷追贈死節諸臣予諡贈太師者文學博士方孝儒魏國公徐輝祖贈太保者兵部尚書鐵鉉禮部尚書陳迪刑部尚書暴昭御史大夫練子寧贈太子太保者禮部侍中黄觀户部侍郎卓敬副都御史茅大方贈刑部尚書者大理少卿胡閏贈詹事者衡府紀善周是修贈禮部侍郎者翰林修撰王叔英贈副都御史者浙江按察使王良贈太常卿者刑科給事中黄鉞贈太僕卿者御史髙翔曽鳳韶蘇州知府姚善贈太僕少卿者知沛縣事顔伯瑋贈大理少卿者谷府長史劉璟贈翰林待詔者金川門卒龔翊及伯瑋子有為贈禮部員外郎者濟陽儒學教諭王省贈平陽伯者都指揮翟能贈含山伯者都指揮朱鑑贈指揮使者燕山衛卒儲福諡文正者方孝儒諡文貞者黄觀諡文忠者王叔英諡忠襄者鐵鉉諡忠烈者陳迪胡閏景清諡忠貞者練子寧卓敬徐輝祖諡忠毅者曽鳳韶王良諡忠獻者黄鉞諡忠惠者姚善顔伯瑋諡忠愍者茅大方髙翔諡忠義者儲福諡貞毅者周是修諡貞烈者王省諡剛烈者暴昭諡剛節者劉璟諡襄烈者瞿能諡壯烈者朱鑑諡安節者龔翊諡孝節者顔有為以上公論交孚此外得諡者又五十二人曰節愍齊泰黄子澄張昺盧原質葉福也曰介愍胡子昭也曰忠愍俞逢辰也曰直愍宋徵也曰肅愍周璿也曰貞愍鄒瑾譚翼石撰陳思賢也曰穆愍陳彦回林嘉猷也曰襄愍王度也曰果愍邊昇葛誠也曰翼愍金有聲也曰莊愍樊士信張彦方也曰忠莊王彬也曰惠莊向朴也曰貞莊鄭華也曰毅節林英也曰莊節周季瑜也曰惠節鄭恕也曰義節唐子清也曰忠節陳性善也曰忠介程本立也曰莊介韓永也曰忠毅髙巍也曰清毅郭任也曰毅直戴彛魏冕巨敬也曰端直程通也曰貞直杜竒也曰忠貞侯奉也曰貞勤謝昇也曰貞確徐子權也曰貞達盧迥也曰貞穆林右也曰貞定甘霖丁志方也曰剛烈連楹也曰端果龔泰也曰莊景陳繼之也曰果義黄謙也曰文忠陳忠也其中不無濫及葢不能不惑於野史之紀述然如梁田玉史仲彬輩不與則不可謂顧公無卓識也首陳其説者萬公元吉惟是吾鄊髙太常遜志䘏典闕焉後之君子覈其實而損益之可矣顧公致仕歸晩入閩道出温州為悍帥所殺詩罕流傳録其一絶句西湖臨安宋故都荷花仍十里際曉湖光平鵁鶄鳴不已侯恪二首恪字若樸商丘人萬厯丙辰中㑹試已未殿試進士出身改庶吉士授檢討削籍崇禎初起右中允歴諭徳庶子出為南國子祭酒有遂園詩集詩話侯公以史官秉南董之筆為逆奄所惡晩又忤烏程移留都洵古之遺直也詩以大雅自命嘗言詩自三百篇後存亡者三漢魏存矣六朝亡也唐存矣五代宋元亡也國朝正嘉存矣今又亡也其持論深惡新體伸北地信陽而抑嘉靖七子尤痛詆公安竟陵流派云感時和張叔載傷心日日賦登樓聴爾哀歌續四愁欲向風塵歸故里不堪戎馬暗神州金錢歳入渾難計鎻鑰朝傳尚有求辛苦先朝張相國于今零落楚江秋送陳集生使南海鳳闕春深柳乍齊王孫臺畔草萋萋看君絳節天南去驛路晴花送馬蹄丁乾學一首乾學字天行宛平人萬厯己未進士改庶吉士除檢討天啓中落職有擁膝齋集送劉太史使朝鮮漢殿遥齎詔一函香爐特許換朝衫天邊築館迎龍節海上吹鐃遁􅣜帆問俗朱蒙時已改探竒𤾉谷日應銜歸來撰得殊方志天外河流海外巖陳萬言四首萬言字居一秀水人萬厯巳未進士改庶吉士有銒園集出門出門澹無營閒步郭北隅四野一何曠仰見秋雲徂微風動蕭林殘暉息逺墟忽然霞氣新散綺照輕裾髙歌以忘憂薄言返故廬苦雨四月霪􅀢降五月不可遏祝融正司方雨師乃攘奪晴雲乍卷舒倏忽變隂靄飛瀑寫層簷散絲起跳沫殷殷雷轟車爍爍電排闥欹枕不成寐但聞鄰語聒晨起問農事何以曳屨鞨呼童渡郊西為我鼓雙􅀈推篷瞰四野洪水勢方割蛟龍成一氣桑海莽空濶田平疇盡淪橧巢倚木末門吏追逋錢入室尚呼喝枵腹不能對相向蹙眉頞此意隔九閽圖繪難具達安得沉石犀永使洪濤閼逢萌祠炎精熄中葉閏位爭美新黄龍徳有悔賢哲甘沉淪感兹三綱絶大義疇能伸鴻飛貴先時冥冥謝弋人解冠挂東都盡室逐海濵同時景明哲亦有梅子真寧為吳門卒恥作秃髪臣二子不可作誰其嗣清塵長夏憩澹止園辭家謝塵慮結意在巖壑登髙畏炎蒸園林寄幽託澄湖逼遥岑仁智均所樂入徑參茂松環洲雜芳若灌木挺喬榦疎篁解新籜中有百尺樓凭虚䕃寥廓青山四壁垂雲氣屢迴薄朝汲葛翁水夕放支公鶴披􅁭步湖湄飄風散花萼逃暑蕩蘭枻迎凉啓羅箔清宵寥無人倚石縱䃲礴歸偃北牕隅三五映籬落覽化得沉冥感遇任離索物理本如此俯仰亦何怍吳麟瑞二首麟瑞字思王海鹽人萬厯巳未進士除常州推官徵授南京禮部主事轉吏部進郎中升湖廣參政歴江西副使按察使右布政使以僉都御史撫偏沅有哀鴻秋蟀諸集除夕歳盡愁無盡殘鐘客思微一官滄海逺萬里白登圍越鳥栖初定燕雲信轉稀枕戈空待曉無術報宵衣長安春興塵封官栁眼猶迷黄鳥吞聲不肯啼二月羽書淹塞草十年馬足負香泥長纓有策終難請短札多愁未易題忽憶孤山此時節亂堆雪片斷橋西𤣥黙一首黙字㑹一靜海人萬厯己未進士除懷慶推官擢吏科給事中歴户科都給事升太常少卿以都御史巡撫河南泥溝驛寒雲漠漠月初彎邨舎無人户早闗十二樓中愁積雪不知人在賀蘭山李吳滋一首吳滋字如穀呉縣人萬厯已未進士知崇安徳清龍溪三縣遷南刑部主事歴郎中出知寳慶武昌二府升湖廣按察副使有鳳棲閣詩集送曹安祖假歸陶然共事白雲司㡬度追隨笑語時年齒偶成一日長禪心同對十門師每分陽羡驚雷筴迭和青谿􅂿雪詩君去冷曹方是冷閒居賦就寄無遲髙道素九首道素初名斗光字明水一字如晦更字𤣥期嘉興人萬厯已未進士除工部主事歴郎中以督造桂府殿傾論死有景𤣥堂詩集陳元孝云屯田詩俊逸朗徹五顧茂倫云先生律清真舂雅詩話水部才思兼人不以格律自拘古今詩皆超詣五律尤為長城當桂藩分建奉命將作南方卑濕薄櫨甫新大璫亟事丹堊水部力爭不得既而雷震柱傾吏議周内遂罹顯戮聞者寃之兖州道中寄内黄沙蔽天氣白日無晶光寒雲何蕭條四野青茫茫驚飇激車輪我馬亦𤣥黄憶昔出門去臨别重傍徨九月無裳衣五月無糗糧酸辛各自愛努力願相望悠悠二千里安得到汝旁中宵不能寐輾轉心憂傷臨淮秋夜鳴橈伐鼔􅃞回波美酒千鍾開櫂歌秦箏甫停越謳發落日微風雙翠蛾芳年易盡瑶華晚白日朱顔愁不返横笛他鄉未忍聞空齋獨坐成長歎秋日寄沈無回凉風起庭際簾幕迥秋隂一葉空階落孤燈獨坐深芙蓉思逺道蟋蟀動愁吟誰念閒居客能傷遲暮心鍾廣漢云似髙子業雪夜渡鎮江江水寒猶激方舟夜未央驚濤沉鐵甕急雪下丹陽獨坐親孤燭商歌送羽觴白門遥在望葭菼鬱蒼蒼鍾廣漢云似徐昌穀過清流闗設險何年事登臨四望賖天門閒虎豹地軸轉龍蛇王氣枌榆社風煙博浪沙棄繻闗下客懷古一長嗟鍾廣漢云似蔣子雲阻雨彭城驛寄懷李九疑禮部乍失河隂樹難分淮泗山寒煙原上白秋葉雨中斑鄉夢深宵斷琴聲永日閒遥憐和歌客相憶渺江闗鍾廣漢云似邊庭實湘江旅懐北渚初凉夕蕭條兩岸風煙波連漢口雲樹出湘中碧草王孫路黄陵帝子宫此時愁欲絶不待暮潮東鍾廣漢云似何仲黙衡嶽半山亭逺望五嶺宗南嶽羣峰冠祝融路從山半合亭對海門空岣嶁豐碑蝕瀟湘極浦通泠風如可御吾欲問鴻濛鍾廣漢云似王稚欽題真空寺壁真空寺後雙松樹曽見先皇駐蹕初三讓豈宜臨便殿百年猶共識遺墟離筵慣聽悲歌續佛火偏存浩劫餘髙坐道人無恙在願聞第一義何如馬任逺一首任逺字毅仲永年人萬厯已未進士除知葉縣歴官户部員外郎抵蘇州酒醒夢斷旅帆孤逺岸晴波戲浴鳬橋過横塘聞犬吠緑楊影裏是姑蘇徐伯徵一首伯徵字孺臺海寧人萬厯巳未進士除南陽推官㝷改教授升工部主事歴郎中出知揚州府有資敬堂詩集孤山為訪幽人跡乗兹暇日遊墓門無塑鶴山寺失安榴徑愛煙霞夕屛開水墨秋要知白太傅到此也勾留葉憲祖一首憲祖字美度餘姚人萬厯已未進士除新㑹知縣考選左遷大理評事轉工部主事坐建魏璫祠不肯督工削籍崇禎初起南京刑部郎中出為湖廣按察副使歴官廣西按察使江行杳靄中流二水分人傳此地弔湘君南天漸隠巴陵樹西塞猶飛夢澤雲傍晩魚龍常涌沫隔江鳬雁自呼羣年來已覺風波慣枕上漁榔處處聞陸懷玉一首懷玉字石含平湖人萬厯巳未進士授工部主事歴員外郎中出知鎮江府遷湖廣按察副使轉參政山東按察使福建右布政使也園種藥雲根已十年小園獨寤思悠然豈無幽徑通韋曲亦有連山象輞川半砌苔衣清似水一池花石小于錢歸來便是西疇長晩稻秋香滿社田明詩綜卷六十六
