body:
  text: 明詩綜巻十四翰林院檢討朱彛尊編管訥三十六首訥字時敏松江華亭人洪武中徵拜楚府紀善陞左長史乞致仕王請命於朝留居本國禄之終身有秋香百詠蚓竅還鄉紀行等集丁鶴年云時敏詩氣象雄渾襟懐曠逹用事親切措辭醇雅黄文獻公謂文章莫難乎詩詩莫難於近體時敏體嚴整間出新語亦復清俊非文獻所云難者與又云五七言律至晚唐氣漸衰靡不可為法惟絶句詩至晚唐尤為精緻宋人不得其門而入元人惟龍麟洲范清江虞青城得其三昧餘或偶得之而不純時敏絶句俱有法度豈非常私淑于三公故耶又云時敏詠物詩形容精宻非筆頭有五色花者不能乎胡粹中云長史古製近體舂容乎意度鏗訇節奏追琢乎文章其言麗以則其思深以逺其義葩而正溫柔敦厚不迫不竭方諸古人亦未多讓吳孟勤云長史樂府五言有漢魏體律詩源出於盛唐如碧海冲融天光萬頃汪洋莫窺其涯涘楊仲舉云長史文章務以理勝尤長於詩並廖鳴吾云長史詩清新幽柔可與袁景文駕静志居詩話昔人名集徃徃自謙若殷文圭曰鏤氷張舜民曰畫墁晁補之曰雞肋林敏修曰無思葛立方曰歸愚薛季宣曰浪語樓鑰曰攻媿王與鈞曰藍縷王翰曰敝帚洪希文曰軒渠未易悉數明初猶然劉基朱同皆曰覆瓿髙啓曰缶鳴董紀曰西郊笑端華㓜武曰黄楊周是脩曰芻蕘黄槐曰省愆雷貫李馨皆曰知非羅泰曰覺非王文静曰蝇聲管訥曰蚓竅是也管師事亷夫集經鶴年論定舂容疏越豈出景文之下而說詩家入選寥寥卧子舒章生長五茸知有袁而不知有管竟置不録徑寸之珠詎可遺哉聽松樓為國學林敬伯賦凉飈度中林長松發清響震蕩出巖巒蕭騷納天壤初疑繁絃作復訝驚濤上倐爾若崩奔悠然亦平廣大音本無聲至理奚有象復動陽始生姤静隂已徃逹人居髙明㑹兹適真飬心静聽轉聰虚屏神逾爽豈彼㕓市間啾啾局塵坱好招陶隠居山中一清賞和陸伴讀闓過梅根江行惬素懐遐覽匪游冶開篷望九華隠隠白雲下素波明逺川青天入平野烟樹澹欲無風泉斷還瀉因知渼陂舟差勝習池馬斯游樂未央我輩胡為者丁鶴年云詞嚴意新和吳教授晚泊大信阻風樓船遡流上髙帆阻長風大江浩無際一氣何鴻濛囬望天門山峩峩相長雄洪濤走其下屹立西與東不有浮海歎豈無濟川功大鵬度寥廓斥鷃守卑叢物理固有定世事徒匆匆張燈啟華筵一笑杯酒中曉起真館曉晴初官清逺塵俗怡然對簡編庶矣㤀榮辱遥峰擁歸雲髙城澹微旭落盡冬青花江南雨新足寫懐朝回憇公館殘陽坐来暝疎雨過髙林華泉出東嶺流光晨復晡朱顔豈吾永故園歸何時悠悠發深省二隠圗溪上放舟廻山中負薪暇一笑偶相逢於焉遂清話寜知有秦晉况復論王覇回首總忘機青山夕陽下從征古州蠻廻塗紀驛王程不敢緩四日下辰陽古木將軍廟春波使者航城依山勢險江納雨聲長莫上觀瀾閣傷心在異鄉右怡溶曹公兵敗處今識在嘉魚赤壁三分後烏林百戰餘橋浮春渡闊舟泊夜江虚千古英雄事悲凉太史書右石頭口桃花江上驛春水賣新魚滿尺銀堪比千鱗錦不如因歌悲客裏毎食感王餘江海親朋少誰傳一紙書右魚山銅爵妓銅爵髙臺上西陵古墓邊君恩徒自重妾貌竟誰憐羞掩歌時扇愁登舞後筵惟餘漳浦月三五夜空圓答友雨中見寄雨聲連曉夕牢落閉幽扉屋漏頻移榻江寒更覓衣野烏飢自下水鳥濕還飛爾亦忘機日終同理釣磯郊居移家雖偪側只此足幽居茅屋三間小春田十畞餘人来論稼穡自學把犂鉏東舍催租急烹雞酌小胥姚氏野春堂野外茅堂不掩扉堂前風日㪚晴霏棃花門巷清明近春水池塘燕子飛毎約隣翁同社飲更從田畯勸農歸明朝我亦尋春去小試東風白苧衣答吳髙士見寄青鞵布韈木棉裘合是山中隠者流舉世可無劉越石薦賢誰是吕婆樓秋風泖蟹年年上春水沙鷗日日浮好為攜琴并載酒三髙祠下放扁舟送瀘州判官孫彦博新除貳守向瀘川西上長江萬里船行李莫辭為客逺判花政喜得君賢官鹽嵗汲千家井火米時収五月田緩帶從容有佳興寄詩細寫薛濤牋寒食三月東風大放顛今年為客倍凄然杏花時莭偏聽雨寒食人家不禁煙千里故鄉愁共逺一春白日夢相牽天涯草色青青處祗憶千山墓下田對雪半年南國不雨落一夕北風吹雪来城中米價政爾貴江上梅花空自開騎驢朝士曉未出射虎將軍夜不廻寒齋獨坐更愁絶飢烏下啄青莓苔題陸二闔墨梅青禽枝上月如霜夢覺羅浮欲斷腸却憶故園池館裏看花一月不燒香墨窗為越人趙撝謙賦女媧立極斷鼇足羲畫之先無刻木始觀鳥跡製文字夜鬼哭天天雨粟篆隸變化生八分行草復作何紛紛六書古制既茫昧載籍况遭秦火焚後之作者不可數形聲寥寥眇千古更論得法神妙間自信臨池心獨苦君居於越文獻邦家藏金石書滿窗磨穿青州老未已萬斛巨鼎疇能扛吳興宗人已物故浙河東西誰獨歩君今有志繼絶學砥柱中流見孤注剡溪百畨氷雪光𤣥霞一斗松煤香滿堂賔客看揮灑風雨颯颯龍鸞翔我嗟塗鴉手如棘屢欲從君問竒畫君還許我載酒来我捧千鍾勞君筆稼村贈鄉人孫原璘我家三里汀前住茅堂政近桃花渚學經不明欲歸耕佃得官田廿餘畆有書盡賣買農具甘作東屯種田父侯彊既足把犂鉏餉婦猶能載筐筥田中蟊稗日自除牆下蠶桑春可取秋風禾黍既登場冬日雞豚復盈圃全家衣食幸餘饒老穉那知有辛苦東鄰撃鼓送農官西舎烹羊祀田祖且喜征科一事無况是豐年好官府縣吏催租不下鄉半夜無人打門户官糧輸足私債無一村帖然如按堵自信於焉老此身豈謂年来繫簮組汩汩黄塵没馬頭白水青山竟虚負羨君學稼如老農久抱長材隠家墅奉親菽水喜平安教子書詩識今古我今不蠶亦不耕素餐厚禄知何補幾時上疏乞東歸白頭相尋願為侣與爾擊壤歌堯年五日一風十日雨仝將軍歌仝將軍壮且武前年去年殺兩虎受賜黄金百兩歸釃酒椎牛宴同伍意氣驕矜不可當自謂千人何足數今年搏虎東城下虎亦憑陵肆其怒一抉将軍雙目睛可憐竟作荒郊土嗚呼勇不可恃利不可取汝不侮渠渠敢侮汝不見東海之濵釣魚父白頭龍鍾八十五桃花歌次韻答季翔春来㸔花須及早莫待韶光去如埽年年花發看應遲幾多狼籍被風吹今年無風亦無雨千樹桃花紅爛吐香塵繡轂動游人流水瓊筵出歌女天氣豔陽三月時倚䦨吹徹玉參差百壺送酒莫停飲祗恐落花辭故枝落花飄盡春無迹著意留春花可惜花開花落一畨春與君莫作傷春客㑹須日日醉花前不放閒愁到酒邊有花可看酒可飲但願以此終殘年鷹雞行白日中庭忽風過鷹攫雞雛半空墮誰家失之無處尋家奴拾得如拳大毛血淋漓殊可傷性命幸脱飢鷹腸山妻叮嚀勤餧飤愛䕶真如孤鳳皇錦毛漸長雙冠聳可愛花隂鬬時勇我雖老饞不爾烹留取年年作雛種春江捕魚圖𤣥真坊中老孫子老去今年不知幾緑簑短短僅遮身自小求魚足生理魚倉蟹舍小蓬門一帶編籬住江涘昨夜青山得雨多門前三尺桃花水大家漁具都上船水面紛然若浮蟻小兒捩舵立船梢老婦供炊在篷底大䋲屬網絶中流東船纔下西船起須㬰兩船相向開来往風波疾如駛前船得魚先上城後船回篙刺沙觜此賔此主尚杯盤樵青已卧蘆花裏醒者尚釣醉者眠東去西来隨所止不欠官家魚稅錢榮辱從来不干己我家江南山水間煙樹參差絶相似作客天涯未得歸一見此圗心獨喜俸錢幾時當買山小築茅堂三泖尾白頭方是謝官時也學漁家從此始少小少小從行伍而今作飲徒博錢尋劇孟買劒問風胡結伴軍中戲嗔人醉後扶黄金三萬鎰誓娶陸家姑獨坐獨坐茅堂上長吟不下牀亂書堆几席疎雨過陂塘野燕衝簾入江花渡水香應須存晚計次第學耕桑寄淞上友人憶昔都門把臂時殷勤索我送行詩客邊頼爾能相慰别後令人有所思芳草暮雲愁忽忽落花春雨鬢絲絲東歸艇子如堪買定擬尋君澱水湄題王秉正雲林清隠青林白谷水雲鄉隠者深居一草堂百道松泉當戸落四時花雨入簾香門前車馬紅塵逺座上琴書白日長滿目故家風景在不須重畫輞川莊題伴讀董時貢所藏山水公館多清暇林泉惬所探人家如谷口風景似江南斷徑荒深蘚崩厓老巨楠鯨波通海去鳥道與雲參江艇維晨渚巖扉掩暮嵐雨田收赤黍霜圃摘黄柑未築清風屋先尋白石菴醉来休荷鍤老去願投簮許我閒身在從渠俗慮耽偶然忘世累聊謝望雲慚墨蘭青草三閭亭下蒼梧二女祠前欲采幽芳寄逺月明秋水涓涓送馬駿赴京黄鶴磯頭上驛船柁樓撾鼓下晴川客行二月棃花後人别東風燕子前贈别草色青青漢水新異鄉聽雨怕逢春客懐最是今年惡頻向東風送故人題畫柴門春盡動鷗波樹色山光雨後多老去無官長自在醉眠江閣聽漁歌吳農四時歌三首家有田廬泖水東門前九朶翠芙蓉鄰翁報我田官至明日花朝候勸農浜北浜南雨一犂隂隂桑柘鵓鳩啼木龍閒挂茅簷下百畆青秧已插齊種得紅芒與白秈五風十雨似堯年髙田無旱低田潦多辦今年賽社錢林温一首温字伯恭永嘉人官長史與弟常俱以詩名有栗齋集盤山道中盤山嶺頭春雨多天台鴈蕩雲相摩鷓鴣啼入竹林去我行不得君奈何貝翺二首翺字季翔崇徳人助教瓊之子洪武中官楚府紀善有平澹集詩話紀善集以平淡名故管長史寄詩云花竹臨窗筆硯清初秋一雨便凉生錦嚢平澹詩千首近日新編幾巻成詩如夕陽山好樓中見春水船齊樹杪行信乎平澹矣所云山者葢指殳史二山擬古妾有緑綺琴中含鳳皇音不弹黄鵠操試作白頭吟河中錦鴛鴦比翼相因依落花隨飄風各自東西飛物情有不同貞心以為保春葩折秋霜容華豈嘗好芙蓉出緑水見别汚池中白璧薦泥塗乃與瓦礫同妾有五色絲為君製衣裳朝朝勤拂拭夜夜為薫香将心置君腹知君不相忘吳門㑹故人樓文淵憶曾相識自兒童二載雲間席硯同深院鈔書桐葉雨曲䦨聨句藕花風當時壯氣凌諸子今日衰顔對兩翁髙卧田園真自樂宦遊媿我尚西東張璧一首璧字景辰陳留人徙華亭洪武初鄉舉除潞城知縣終蜀府典寳詩話陳留張樞夢辰徙家華亭城東門築室曰讀書莊陶南村贈詩云幅巾短杖林和靖斗酒長篇李謫仙又云冩書竹簡拈鮮碧臨帖箋藤寫硬黄或勸之仕不應日與弟子􅊰春秋人目之曰林泉民貝廷琚為作傳其弟景辰亦能詩有過嘉禾詩云梭頭艇子輕于葉雪色沙鷗白似鵞可入畫也横溪扁舟東来歌扣舷四顧雲水心茫然蛟龍欲唾光作霧星斗滿身如在天打鼓買魚江雨歇看山濯足溪風顛解衣典取酒一石醉伴忘機鷗鳥眠浦源六首源字長源無錫人洪武中晉王府引禮舍人有浦舍人集沈山子云舍人詩如舞草從風偏反有致詩話長源居九龍山中築聴松軒凌彦翀為作記其後舟經淮河溺死故王逹善祭以文云長源之文豓若天葩云何不幸竟墮泥沙詩雖與子羽同調然才不逮林當與二𤣥伯仲句如聽鷄曉闕疎星白走馬春郊細柳黄細雨疎燈聞落葉斷雲髙樹見明河雨中黄葉孤村路湖上青山逺寺鐘三月春隂垂細雨幾家寒食起新煙春潮渡口停官舫夜雨山頭見驛燈衣上暮寒吳苑雨馬頭秋色晉陵山潮生漁浦罾看下雨過鄰家竹許鉏官路暝煙迷驛舍郡城寒火出更樓青山馬尾彎弓見畫角城頭帶月吹暮雨燈明湖上塔秋風砧響郭西家杏花寒食春江店榕葉薫風瘴海船今夜風傳何處笛他鄉月照故園衣寒㕔掩雪晨衙㪚暮郭連山夜燒明均有風韻非僅雲邊樹裏一聨而已亦善畫山水竹石學倪雲林程原道詩所云雲林弟子浦長源也結交行敵國不在逺舟中乃可見炎涼不在時交情乃可知昔作通家好齊言永相保一富有一貧便成行路人相逢不相識薄夫堪嘆息我不願傾北海尊亦不願書翟公門但願同心二三子百年無改共生死送賈文學入京春城送别已斜陽花發官亭酒正香逺騎青山江上路新鶯細柳禁中牆疎星北闕趨朝早澹月南宫聽漏長誰謂賈生年景少獨能陳䇿輔君王悼潘處士先生愛酒不憂貧賣藥城隅㡬度春夜雨忽銷丹竈火秋風偏拂繐帷塵空山送𦵏多遺老片石題名有故人我欲持觴酹丘上野煙芳草謾傷神留别甘露行師秋山松柏正􅆴􅆴遊子登臨酒半酣今夜阿師雖對面明朝江北望江南送友人孤舟春别萬花西雲淡山清水滿溪料得客愁何處是緑隂官舍聽鶯啼懐湖南周包二山人毎懐周益能歌詠况復包撝善講論夢繞南湖春草碧夕陽微雨掩柴門陸闓一首闓字伯陽揚州興化人楚府伴讀江上暮雨荻蘆沙上風竹樹山頭霧疎雨忽新凉惆悵川光暮遥遥孤帆征渺渺滄江渡停櫂問漁人長干㡬程路桂衡一首衡字孟平仁和人洪武中錢塘儒學訓導遷山東建文庚辰授谷府奉祀題蕭翼賺蘭亭圖使星東犯斗牛来猿鳥忘機豈見猜莫笑老僧藏不得昭陵玉匣有時開詩話復州裂本蘭亭巻首有錢聖舉畫蕭翼賺書圗陶南村謂鴈行定武宋理宗賜賈平章一百十七本此其一也舊藏吾鄉郁氏杜環一首環字叔循廬陵人晉王府録事題畫毎愛江山趣停杯看畫頻千峰青不斷萬里碧無垠雲樹參差晚鷗波浩蕩春扁舟何處客飄泊正愁人張紳二首紳字仲紳一字士行濟南人仕明為浙江布政使徐子元云方伯詞格清健管見一斑知其為豹詩話方伯工大小篆精於賞鍳法書名畫多所品題撰法書通釋一巻自稱雲門山樵亦稱雲門遺老齊東自周公謹而後復有此人其詩不藉雕琢琅然可誦如湖中玩月詩地與樓臺相上下天隨星斗共浮沉亦佳句也題畫髙樹漏疎雨滴瀝下銀塘美人捲簾坐寳鴨添生香風吹緑荷葉露出雙鴛鴦送人赴安慶幕僚舒州城在大江邊我昔過之曾繫船年豐米榖上街賤日落魚蝦入市鮮山起正當官舍北潮来直到驛樓前知君此去紅蓮幕民訟無多但晝眠陳約一首約字博文嘉興人洪武中官大理寺卿出為山西布政使與弟絅繹緝竝有詩名錦屏赤城多竒峰錦屏亦殊勝不知何仙人遺蹟在幽徑松霏灑石牀竹雪墮風磴徘徊對巖花忽送一聲磬董紀一首紀字良史以字行更字述夫上海人洪武初官江西按察僉事有西郊笑端集張汝弼云良史詩率漫若弗冀有傳者詩話述夫元之耆舊其詩頼善卿編之大雅集中題海屋云過橋雲磬天台寺泊岸風帆日本船亦不為率漫也短歌行山鳥日日喚提壺勸君酒盡須更沽莫計囊中錢有無人生百嵗幾時好大是愁多懽樂少朝見花開暮落花昨日朱顔今日老為君起舞為君歌少年不樂奈老何謝肅一首肅字原功上虞人舉明經厯官福建按察僉事有宻菴集詩話原功謁貢禮部玩齋於吳山仰髙亭進曰先生之門亦有瑰偉倜儻㧞出之士乎時貢奉詔漕閩廣粟當泛舟大海貢語曰子能從吾游乎對曰丈夫觸蛟龍犯風濤如行衽席上爾遂同載至海昌屬海上多警因留居州北執經問難凡一詩之出一文之就折𠂻論議必當於理乃已既而貢沒於寓舍原功經紀其䘮刋其遺集及出按漳泉坐事被逮孝陵御文華殿親鞫肅大呼曰文華非考掠之地陛下非問刑之官請下法司乃下獄獄吏以布嚢壓死夙與唐處敬齋名號㑹稽二肅其詩雖不及處敬亦磊落不凡馬陵行客行忽不樂停車馬陵間上有悲風古樹之蕭瑟下有哀壑流水之崢潺隂深壊道餘古雪孱顔兩壁堆積鐵石面苔封勁箭㾗草頭露滴将軍血青熒燐火黄昏明呼號木魅啼山精應羞刎頸償斷足此氣千載真難平西流沂水東滄海勝負孫龎兩安在為提寳劒舞尊前落日雲霞射光采藍智七首智字明之崇安人明初應薦授廣西按察僉事有藍澗集詩話二藍出處不同藍山藍澗二集選家悞有參錯今依明初雕本刋正客建上將歸山中留别鎦典籖入山願逺遊出山願早歸羈懐苦無悰芳序倐已非瀰瀰江海流紛紛花絮飛清霜變𤣥髪游塵化緇衣艱危迹易乖少壯心轉違雲鴻毎獨往梁燕當疇依野樹滯殘雨荒臺淡斜暉浩歌緑水曲空拂黄金徽書懐寄示小兒澤昔我南澗来遂謀西園居瀟瀟桑柘隂下有比屋廬交枝囀黄鳥澄波躍文魚花香入戸牖草色連階除衡門閉白日髙詠古人書目送逺山雲心遊天地初貧賤固可樂富貴将焉如河池縣連峰入河池路險猺人村喬木盡參天白日為之昏上有髙石崖下有清水源蕭蕭篁竹叢落日聞哀猿職當觀民風載驅隰與原俯念逺人苦来宣天子恩撫此風景異懐哉惟故園雨黯黯雲垂野瀟瀟雨滿林晩山歸鳥盡秋草閉門深落葉蕭條樹空城繼續砧煩憂兼獨立誰識此時心曉發来賔縣宧遊同逆旅侵曉逐征途候一作空館殘燈小長江落月孤鄰雞催去馬城柝起棲烏物色兼人事悤悤嵗欲徂出雲藤驛又出雲藤驛扁舟更向東地蒸秋有瘴江濶夜多風旅夢驚啼狖鄉心託斷鴻天涯看月色不與故園同雨中同孟原僉憲登嘉魚亭髙閣流鶯外荒城駐馬前江寒三月雨春老百蠻天折柳悲横笛飛花落釣船乾坤總羈旅把酒意茫然王佑二首佑字子啟沂弟洪武三年舉教官擢監察御史出為廣西按察僉事改知崇慶州有長江萬里稾陳一徳云子啟壁立千仞不負所學雖頼蕭氏刻集以傳而其得意者無幾梁用之云子啟先生以教官舉與永豐丁堅子節同邑劉榖原實等一十八人俱同日俱拜御史所為詩沉雄雅淡質而不俚華而不媚詩話王氏二妙子啟詩逺遜子與其擢御史也事在洪武三年五月二十一日中書吏部奉㫖選天下教官入覲奉天門適太史奏文星見帝親擢十八人俱為監察御史次日詣武樓下賜袍帶二十五日之任臺官傳命賜燕集中有紀恩詩七首其東胡僉事子祺詩云聖主親除十八人與君同郡最情親寄秦郎中文剛詩云奉天門下共恩榮十八人中第二名寄趙合州䕫馬緜州真詩云人生良㑹不可常聖恩同擢那能㤀是文剛也䕫也真也皆在十八人之列矣而實録載與選者十九人吉水胡子祺桐廬魏潜王納河西李顔永豐丁節永嘉許宏士萬安夏瓉樂清李時可衛輝陳士舉龍泉劉榖蕭暉合肥夏起瑞安馬漢分宜劉沂平陽孔希普永新歐陽子韶泰和王子啟安福歐陽楚廬陵胡伯清而無文剛䓁三人姓名恐國史所書未若子啟詩集之得其實也又海桑陳氏書王僉事事蹟第云以僉事除崇慶知州已而得投閒歸鄉而集中有獄中述懐三首其一云有枉不能直呼天天不聞厥初正田賦思以上報君豈其被蛇虺紏結情紛紛嫌疑既先入真偽無由分其二云沃壌袤千里曾無水旱憂亂来地無主官賦籍未收下車日經理比屋皆子仇太倉得稊来憲綱增罪尤吾豈厚歛者仰天思悠悠其三云蜀州古險塞其俗凶且强有司坐罷愞譬以羊将狼紀綱稍自振螫毒不可當我徒剛易折衆以凶為良誦其詩可得獲罪之由矣葢子啟政尚嚴厲其在廣西時尋适為按察使胡子祺曰古刑新國用輕典子啟曰蠻方素昧君臣父子之分黷倫傷化不及此明禮法以示勸懲後将難制适從其議其牧重慶征科未免過嚴因而坐累迹近重歛此陳氏諱而不言也次梧州蒼梧平逺水如苔日出官船盪槳開五筦江從南海去九疑山􅘳道周来乗槎蜑戸縁流住輸粟猺民出峒回聖代分巡方遣使咨詢敢憚徧蓬莱荆南舟中寄華容孫景賢故人不見十年餘聞就華容早卜居湖上屢停千里櫂嶺南不寄一行書别来毎恨知心少老去翻令㑹面疎題句荆南煩去客早春問訊向茅廬彭正徳一首正徳字伯仁溧陽人明初以薦官福建亷訪使西州即事一雨洗空碧江城獨倚樓山銜殘照没水挟斷雲流燈影深村夜鐘聲古寺秋西州舊逰地薄宦此淹留程國儒三首國儒字邦民歙人徙居徳興至正進士授餘姚州判官攝紹興録事洪武初知南昌府被逮暴卒有雪厓集越城謡越州城城何髙四十五里之周遭窪地填為基坡垞鑿成濠白晝鞭笞夜擊坨石民之骨灰民膏越城雖髙越民勞越民勞勞未已我田未耕乂科米忙忙築城歸種禾又恐無米供官科禾苖未青得秋雨城吏打門夜如虎為言雨後新城摧要我荷鍤城上来城泥不乾不敢回又恐夜半聞驚雷城頭一雨城一動越民登髙向天慟民心似與雨有讐天意實謂城無用當年當年天下平天下無賊越無城乃知在徳不在兵信州糧謡信州糧糧何艱十鍾一石萬里間朝發錢王隄暮過嚴陵灘柁尾白浪如銀山朝渡蘭溪州暮宿龍丘灣峻如牽車上鬼闗督吏馳檄夜傳箭布帆無風河水乾去年糧船未及岸今年又運八百萬只知彼地荒不知浙東天亦旱只知彼地饑不知役戸家無飯家無飯儂莫愁願化鐵騎為耕牛願銷鋒鏑為鉏耰戰場闢作畎與溝壮士荷甲歸田疇風雨時調禾黍秋禾黍秋飯不足浙東又移何郡粟次欒秉徳韻傷心世事淚澘澘已付餘生作等閒羝乳尚能持漢節鷄鳴那得出秦闗黄花時候多新酒緑樹門庭是故山日夜思親頭盡白何人為賦大刀環金絅一首絅字子尚嘉興人元季舉鄉試洪武初知蘓州府以上書請減賦額賜死詩話子尚在元季雅負詩名家有詠軒周致堯為賦詩其守蘓州也以百姓苦官民田賦不齊里胥因縁為姦乃上疏請減賦額觸髙皇帝怒賜死王文恪姑蘓志柳太守嘉興志具書其事考洪武中蘓守三十人左謫者吳懋坐事去者何異張亨被逮者王暄丁士梅湯徳石海王繹陳彦昌張冠黄彦端坐贓黥面者王文而子尚與魏杞山皆坐法死當日領郡者亦不易矣王彦强破屋風雨圗讀書幽澗濵茅屋走風雨窗疎木葉鳴月暗燭花吐隠憂不可寫俛仰慕前古美人何由招娟娟隔秋浦馬琬一首琬字文璧江寜人洪武初仕為撫州知府有灌園集詩話文璧以畫名詩亦清脱西湖竹枝湖頭女兒二十多春山兩㸃明秋波自從湖上送郎去至今不唱江南歌盧熊一首熊字公武崑山人元季吳縣教授洪武初授中書舍人出知兖州府坐累死遊銅井山行春入銅山披榛訪苔碣展席具琴尊譚詩愒林樾溪柳漸生荑谷鶯未調舌文漪細含風小梅清映雪眷彼素心人寒香不堪折馬治一首治字孝常宜興人初為沙門洪武初知内丘縣終建昌知府有荆南倡和海漁集張公祠張公古仙伯不樂雲間遊騎驢穴山腹古洞開清秋空青凝丹室積翠結石樓玉女跪而化銀漿冷不流芝田水精鹽華屋珊瑚鈎神界杳莫測鬼工信難侔勢輕壺公壺量狭禹九州繞出具區底仰見崑崙丘烟然一束藴吾欲窮其幽甘瑾瑾字彦初臨川人明初嚴州府同知一云官翰林侍制張仲舉云彦初詩如美女簮花初工於律矛㦸森然望之可畏徐子元云彦顧𤣥言云二守詩頗清僻如一瓢風外樹雙屐雨中山錦衾成獨旦羅扇覺先秋亦是髙唱詩話明初臨川詩𣲖專學唐人者掲孟同甘彦初也尚有張可立甘克敬惜其詩不多見題何梅閣山居迹不到城市逢人無厚顔一瓢風外樹雙屐雨中山流水春喧碓歸雲暮掩闗憂時心未已祗益鬢毛斑題張氏竹園别業避難疎狂客長貧少定居采芝空有曲種樹豈無書擬製東山屐看馳下澤車肯容疎嬾迹来與狎漁樵贈人戍襄陽漢水荒城外頻年汗馬場舟車通饋餉部曲雜耕桑幕府文書下烽樓警邏長山公有愛将日醉習池旁梅溪宿徐橘隠者寓舎别後寄謝不見故人乆吟愁入鬢絲試呼村舍釀細論草堂詩夜雨西窗燭春風别墅棋滄洲如有約嵗晩共襟期讀文丞相傳萬里氷天泣楚冠南雲歸計路漫漫尚圗一旅興王易不念孤兒立國難樓櫓海門西日暗劒歌江介朔風寒九原負痛遺編在朔雪殘燈掩淚看水南晩眺山風蕭蕭羣木落寒日黯黯孤雲低江雲欲雨復不雨野鳥將棲還未棲歸人入夜望烟火行子傷秋聞鼓鼙水南山川繞城市正好買地躬耕犂社日楓樹林邊雨脚斜兒童祈賽競諠譁雞豚上戊家家酒鶯燕東風處處花野逕歸時扶醉客叢祠祭罷集神鴉瀕湖生意傷多潦預祝汙邪載滿車寄懐可立旅泊他鄉有嵗年南塘水竹卜居偏得錢日閉君平肆載酒秋尋賀監船葭葦近通門底巷荆榛遥帶郭西田東歸亦有蓴鱸興矯首滄浪若箇邊西師中興實藉羣公力反正終歸萬姓心霧雨銅標蠻徼闊山河鐵劵漢恩深明珠翡翠殊方入天馬蒲萄逺使臨北極即瞻佳麗氣南雲足聽凱歌音雨中書懐南窗坐掩讀殘書落盡棃花雨㸃疎短夢或因中酒後輕寒已過禁煙餘芹香墮几初歸燕泉脉通池欲上魚搔首故人懐别乆欲慿尺素問何如張著一首著字則明永嘉人元季游學至吳遂居常熟洪武三年領鄉薦知膚施縣遷臨江府同知秋興故園東望海西頭幽事長懐九月秋竹几山明渾見畫糟牀酒熟不知愁霜寒秔稲肥黄雀水浄芙蓉映白鷗隨分耕魚聊自適無端垂老向延州蕭翀一首翀字鵬舉泰和人蘓州府同知詩話鵬舉為劉子髙弟子編其師集以傳者也詩格卑卑不如其師逺甚宿平陸村昔年曾此宿今日是重遊兵後人煙少村中草樹稠霧開螢照夜月霽鴈鳴秋明發前途去逢人問鎮州包聖一首聖字師聖江隂人岳州府同知和韻荅陳漢章風塵滿眼宦情微卜築從今與世違棊局未収山月上爐煙將斷洞雲歸謀生厎用千金産送老惟甘一布衣肯共野人㤀爾汝来朝騎馬到荆扉白笵一首笵字以中紹興山隂人洪武中黄州府同知薊州西来山盡處始見薊州城地擁三門峻天廻一面平人煙多戍卒市語雜番聲回首松亭道秋風幾日程周矩一首矩字仲方吉水人洪武中官中牟知縣遷台州府同知謫戍廬陵用薦為廬陵訓導題宋徽宗雙燕江南簾幕重重雨艮岳湖山處處花兩地舊巢傾覆盡西風萬里入誰家練髙一首髙字伯上新淦人洪武中知起居注以直言忤旨出為廣徳州同知厯臨汀鎮安二府通判王子充云伯上詩温厚而豐麗大江以西能繼范徳機虞伯生掲曼碩而起者送趙将軍崆峒一劔倚秋隂誰識将軍百戰心老去功名餘白髪閒来歌舞㪚黄金呼鷹大澤風竿勁射虎南山雪羽深敲缺唾壺銀燭短時人不解隴頭吟陳汝言九首汝言字惟允吳縣人明初官濟南經厯坐法死有秋水軒稾嚴蓀友云惟允精於山水詩如秋水濃於酒山雲白似衣詩中亦有畫也詩話吳縣二陳居船場巷並有隽才俱善詩工畫山水又皆多鬚故有大髯小髯之目張氏據吳日惟寅隠居不出惟允為參軍頗親信用事南濠都少卿譚纂載洪武初王叔明為泰安知州㕔事後有樓三間正對泰山叔明寫為圗張絹素於壁毎興至輒一舉筆凡三年而圖成時惟允為濟南經厯一日胥㑹值大雪叔明欲改雪景惟允曰如傅色何沉思良久曰得之矣為小弓夹粉筆張滿彈之粉落絹上儼然飛舞之勢相顧以為神竒叔明就題其上曰岱宗宻雪圗因以贈惟允云後惟允坐法當死臨刑猶從容作畫畫畢乃就戮張司丞来儀紀以詩云若人悟懸觧委蛇順天刑慷慨赴東市一日為千齡李公悲上蔡陸子喟華亭識機若不豫逹生良可經朱絃亦易絶仄景不可停從容灑芳翰炳煥若丹青好藝永傳世精魄長歸冥披圖懐平素涕淚緣襟零說者以兵解之法推之謂之畫解宻雪圗陳氏世寳之松江張學使廷采往觀坐卧其下兩日徐武功尤愛之後以三十千歸吾鄉姚雲東未幾火作此圗遂付煨燼悕矣予嘗見惟允山水真蹟積墨清潤與叔明不相上下冝當日兩人相契之深也古詩皇風去已逺王覇不復論空遺聖經在學者誰能尊物情何溷濁干戈相并吞禮樂既不作安使風俗淳撫几三歎息哀哉吾道淪蘭蘭生深山中馥馥吐幽香偶為世人賞移之置髙堂雨露失天時根株離本鄉雖承愛䕶力長飬非其方冬寒霜雪零緑葉恐彫傷何如在林壑時至還自芳軍中與劉公宣分韻得夜字日暝川路遥江寒木葉下鳴笳發洲渚偃斾泊清夜肅肅南鴈翔耿耿銀河㵼委身服戎事行役豈云暇孰不感所懐當知嵗時謝舟過錢塘有感錢塘江上水悠悠落日扁舟送客愁雲氣欲含千嶂雨潮聲逺帶大江流征帆且復停洲渚晩飯應須上柁樓見說西湖載歌舞春風不似舊時遊送黄尚書之江西驛路花如霧春江水似苔尚書今日去從者幾時回解纜聽潮落張帆趁曉開相思南浦上明月滿蘓臺題靈巖寺靈巖之山山木稠山僧結菴居上頭蒼松風裏作龍吼白雲窗前如水流憑䦨始悲人世廹舉目更感江山秋千年覇業俱陳跡落日寒煙生客愁送謝從義知杭州分韻岳王墳荒墳秋樹影蕭蕭只有孤僧伴寂寥二帝游魂歸不得百年枯骨恨難消山空永夜愁寒雨江濶悲風起暮潮若到錢塘逢故老傷心切莫問前朝雜詠空庭清晝永花落見春暮誰念未歸人草色江南路歸来春城踏踏馬蹄輕醉裏歸来鼓二更月滿青樓人不寐政將新曲按銀筝陳輔一首輔字里未詳仕為推官詩附見滎陽外史集出郊雨歇山晴鶯亂飛水清沙暖日暉暉竹籬縁路酒帘出野樹漲隂梅子肥千里鄉心隨夢逺一春樂事與人違年華過眼慙無補零落青衫尚未歸王䝉三首䝉字叔明吳興人自稱黄鶴山樵元末官理問洪武初為泰安知州詩話倪元鎮詩畫最自矜重不輕許人獨題叔明畫云筆精墨妙王右軍澄懐卧游宗少文叔明絶力能扛鼎五百年来無此君其誠服若此髙青丘云叔明為趙文敏外孫而其畫法自立門戸别具一種姿態與文敏無一筆相似其筆格不下文敏宜矣葢文敏書畫詩皆尚工緻而叔明意在活脫所冩溪山林木或有柯無葉畫家謂之不了樹惟詩亦然往往不費推敲而有自然之致乃知善得師者不在循行規矩也閒適緑楊堪繫五湖舟袖拂東風上小樓晴樹逺浮青嶂出春江曉帶白雲流古今我愛陶元亮鄉里人稱馬少游不負平生一杯酒相逢花下醉時休過姑蘓山圍平野緑煙中江葦蕭蕭兩岸風誰種闔閭城外柳年年飛絮入吳宫陳惟允荆溪圗太湖西畔樹離離故國溪山入夢思遼鶴未歸人世換嵗時誰祭斬蛟祠劉秩一首秩字伯序豐城人洪武中知崇明州有秋南集李時逺云伯序古體髙古近體秀麗詩話伯序詩亦整鍊如芙蓉隔浦聽秋雨楊柳長亭看晚潮沙浦寒霜肥紫蟹野園秋雨熟黄𤓰棟花落盡風飄樹魚子生時水滿田林下一篷冬聽雪樓中半榻日看山亦琅然可誦也雞鳴曲馬初嘶鷄初鳴夜待旦晝兼程昨日晚出長安城今日早望橋山行東西相去四百里明日山北還晨征不縁薄宦苦相縈何得如此勞吾生君不見路無窮人易老離家不如在家好吾家萬里在江南回首天涯歸不早吳植一首植字子立嚴州人以處士徴授藤州知州寄張國録孟兼昔别意何長重来嵗華改沉憂誰與娛懐人邈江海褰衣渉汀洲秋風被蘭茝日夕零露繁芳馨為誰采嘉㑹諒難并良辰詎容待思君如明月夜夜望光彩史遷三首遷字良臣金壇人洪武中用辟召除蒲城知縣遷知忻州復知亷州漫興二首貧居村塢長無事誰復能過野老家只有春風太情重小桃深巷也開花瀼東煙樹杜陵家百尺深潭似浣花布袖龍鍾笻竹杖也勝裘馬在天涯暮春緑隂窗下春草碧無數柳花吹近牀一雙蝴蝶總無頼飛到小䦨還過牆張率一首率字孟循廣信人吳元年徴知嘉定州有張嘉定集荅周檢校衡茅晚計卜溪南水石幽期得縱探詩社往来青玉案仙經借送紫泥函漁村過雨行秋霽龍洞開雲坐晚嵐種樹書成嗟已老煩君多致洞庭柑吳文泰五首文泰字文度吳縣人洪武中涿州同知有愚菴集詩話文度與同郡丁遜敏學專事苦吟甞閉户共為詩人見其終日突無煙往視之瞪目相對忘其未食也評者謂其詩僻蹇似孟郊今觀其集頗淺易似不煩冥索乃爾有懐義興崔同仁日嫋嫋兮凉風山中人兮何所蘿軒兮夜月薜牆兮秋雨丹桂發兮巖阿荷花落兮江渚我思君兮不来望南山兮延竚楚江清曉圖曨曨曙光啟湛湛楓江白河漢縱復横分明見秋色天空爽氣清露濕千峰碧微茫雲夢渚迢遞潯陽宅五柳髙且踈凉風正蕭瑟孤鶴横江来扁舟正攜客送何子方還吳中兼簡一二同志城頭烏啼朝日黄城門送客歸故鄉邊風吹沙道路長南登鴈門踰太行顧我垂老不得將蕭颯短髪垂秋霜為君此别淚沾裳歸心逺逐浮雲翔吳山崢嶸牛斗旁五湖浩蕩煙波蒼故園桑梓連崇岡萬里愁思何茫茫君家田園亦不荒歸来此樂殊未央兒女懽笑羅酒漿逺行辛苦憂俱忘故人若逢滕與梁為言思君愁斷腸勸君莫辭酒滿觴来宵見月遥相望送人之巴蜀煙波迢遞古荆州君去應為萬里遊倚櫂遥看湘浦月聽猿初泊渚宫秋雲開巫峽千峰出路轉巴江一字流若見東風楊柳色便乗春水泛歸舟酬陳孟敷見寄南浦蘼蕪生緑煙憶從分袂是何年歸来還對山中月老去惟耕隴上田幾樹蟬聲凉雨後一川霞采夕陽邊思君東望堪乗興潮落晴江好放船鄭潛一首潛字彦昭歙人元季泉州路總管洪武初以故官起除授寳應縣主簿遷潞州同知有白沙稾樗菴集程以文云彦昭詩駸駸乎格髙律熟而入於精者𤣥石行為貢尚書賦尚書階前有𤣥石流落江湖舊曾識當時重者惜餘貲今日移来乃神力初看尚爾混泥沙熟視灑然供拂拭黒雲風斷涌峨睂紫氣霞開見靈壁終朝静坐無磷緇扣之則應聲相隨梅花㸃㸃上烏几柳絮緜緜縈硯池湘沙驚落孤鴈鶩東海躍出生蛟螭千年誰鑿渾沌竅半夜誤擊珊瑚枝人生遇合還如是尚書感慨親留記姱容麗質豈髙人錯節盤根知利器坡仙空作仇池夢愚翁信遂移山志為公歌此𤣥石行颯颯霜風度寒翠朱模一首模字子範休寜人元季六安州判官洪武三年為賊所害有白沙行稾張伯雨云朱子範詩有虞掲遺響送張總管赴鄱陽近聞使節向鄱陽已報前軍到武昌好過黄州問蘓仲曾遊赤壁訪周郎一時人物皆陳迹三國英雄此戰場舉酒煩君酹江月匡廬秋色晚蒼蒼梅頥二首頥字昌年永嘉人以明經薦除都昌主簿遷䕫州判官夏日松下桃笙酒半醒石根流水碧泠泠片雲將雨窗前過分得新凉入研屏秋日黄葉蕭蕭獨掩闗屏風小幅盡江山酒醒夢入湘雲去不管秋聲在樹間烏斯道七首斯道字繼善慈谿人明初以薦起知石龍縣調永新以疾去官有秋吟稿春草齋集張惟静云繼善詩興寄髙逺瀟灑出塵一埽元人過巧之弊詩話繼善與兄本良性善並著才名鄉人目性善為春風先生繼善為春草先生宋學士濓稱其文云俊潔如明月珠洶湧如春江濤楊布政子器稱其詩云踈秀若雨後春山綺麗若雲中翠巘矜許至矣戴叔能贈詩云逹士不羈世投身向寛閒又云不有同心人誰其慰枯槁知非營營名利者也句如四顧無人一烏空中鳴江水豈吾限可以相往還朝陽煦游鯈晴嵐送飛翼寂焉千載事傷此百年身落日近崦嵫於何從逺道鶴鳴子不和徒然有哀音具饒清氣其言曰詩之作非得夫天地之精氣者不能也信然哉馬食粟馬食粟一閑二百匹一食一百斛去年大旱人苦飢草根食盡食木皮官司徴粟喂官馬馬何貴重人何微人心不敢怨只願官馬肥官馬肥走若飛江南江北正格鬬將軍殺賊要馬騎題寒林逺岫圗游子念故山嵗晏不得歸出門見林薄日暮煙火微關河渺千里猨狖聲正悲况爾霜雪繁鳥道不可躋陽春固伊邇奈此寒無衣衣寒何足嘆所憂美人違邀友人胡舜咨姚晉道劉庸道北郊夜坐美人集江郊員月湛秋夕天濶星宿繁地迥雞犬寂供具雖不􅎋各取意所適抽辭託卮匜燕坐更几席既盡遐邇懐復有新故益涼風激庭柯澄波照林石零露不作寒層霄愈凝碧緬思江海内軒葢相馳激酬酢過為懽反道諒匪得澤畔上征天無風逺游槖無金種蘭蘭不芳行吟向江潯漁父曠達者庶幾知我心鶴鳴子不和徒然有哀音踟蹰當奈何湘水清且深陳卧子云古拙過西山訪章願學鍾聲伯二隠者兼與同遊諸公分韻得深字冬雨乆不作氷霜謝窮隂予因積遐思於焉事追尋西山數君子幽居託雲林岡巒負城郭在樂不在深旨酒罄良覿嘉言諧素心巖花照紋楸松風墮鳴琴詎謂兵革餘得以疏煩襟人生易彫謝何時續斯今離别奚足歎願言懐徳音雜言荆棘開好花娟娟耀芳春羅生及周道未嘗罹斧斤斧斤或相加芒刺反傷人朔雪貸其死后土固其根人力媿孱弱天地胡不仁崇岡有松柏日夕摧為薪次韻酬范運中讀書窗前煙草深三年獨守荒山隂出門駕輿輿脫輻閉戸燒鉛鉛不金唾壺擊出慷慨意青燈照見平生心故人苦道不相見寄詩復欲招我吟馮伯初一首伯初字正始嘉興人洪武初官府同知崔貞姑廟貞姑遺廟練塘坳古瓦漂零補白茅影帳有煙香細細明妝剰粉玉磽磽連村未輟雞豚社獨樹長懸鶴鶴巢右族博陵銷歇盡尚餘彤史一題鈔詩話郡丞予妻馮孺人逺祖也馮氏族譜載其詩三十餘首予少日僅録其一今予外弟金瀠無後譜不復可得矣貞姑廟在練浦塘一螺青東南廟外有橋土人以貞姑為土榖祠春秋社祭府志失載陳處士靈茂詩雲衣金粉蝕煙帳蕙蘭銷亦過廟下作也有好事者補張堯同百詠則廟其一乎陳伯康一首伯康字仲進長樂人江山知縣有南雅集寄郕縣喻知縣寄語郕州長何時過洛中相看兩舍許不得一尊同客思瞻秋月鄉書遲早鴻覃懐臨别處毎憾太悤悤莘野一首野字叔耕歸安人洪武初由本縣儒學訓導遷棗强知縣致仕後改麗波巡檢卒官有環洲集春日登城有感憑髙獨立午風輕望入平湖眼更明白鳥影邊陽羨樹青山堆外闔閭城樓臺霽色千家日楊柳春深幾處鶯滿眼故人零落盡野花芳草不勝情林子森一首子森温州平陽人舉秀才為臨洮府經厯鎮逺道中行盡荒林晚未休鷓鴣聲斷碧山秋逢人數問前程路九十長亭是貴州俞貞木二首貞木初名楨以字行更字有立吳縣人洪武初以薦知樂昌縣改都昌一云南安府南康縣有集詩話明府有雕本集二冊予嘗見之於里中王山人翃書齋山人頗稱其詩而今訪之藏書家遂不復得又有日録亦無存當日若金侍郎問陳檢討繼皆其弟子也題王孟端山水喬木靄春霽野水浸平沙山脊浮雲合巖腰細路斜攜琴向江寺沽酒到漁家歸去幽居晚山童埽落花題趙仲穆畫馬房星方墮墨池中飛出蒲梢八尺龍想像開元張太僕朝回騎過午門東王澤五首澤字叔潤天台人僑居山隂洪武中官華亭縣丞有青霞集徐子元云青霞天厨之珍自然適口詩話叔潤詩音聲嘹亮亦是作家寄友人我本東海人家住東海頭自從丱角時便向西州遊邇来西遊十九載夜夜思歸夢東海此身厭逐戎馬間落魄惟存壯心在今年始欲向東還便將歸老天台山相隨仙人飬雞犬笑弄緑水桃花間况聞溪上桃已熟仙女嬋娟面如玉春風綰髻雙緑鬢舞腰解按山薌曲去年羣仙遥見招謂予自是王子喬山中何嘗識酒禁日日爛醉吹璚簫昨日纔經四明道故人相見驚絶倒間闗萬死得生還顔色還同舊時好忽聞天吳落海隅到海要拾明月珠大風三日撼天黒海底吹折紅珊瑚洪濤如山老蛟怒白日江皋塞煙霧仙山咫尺不得歸目送冥冥塞鴻去櫂舟惆悵却西回側望仙山心欲摧空懐帝子芙蓉闕遥望中天兩玉臺愁来昏昏枕書睡呼酒狂歌不成醉丈夫出處真可憐往往長遭不如意作詩為謝丹霞仙金堂石室無清縁有心未罷歸来約更待秋風海月圓姑蘓感事天星夜落水犀軍又見吳宫走鹿羣睥睨金湯徒自固愴惶玉石竟俱焚將軍只合田横死國士寜無豫讓存風雨明年寒食節麥盂誰上太妃徽宗畫缾中桂花玉色官缾出内家天香誰貯月中花六宫只愛新凉好不道金風巻翠華小游仙中山千日酒初醒却愛𤣥都夜景清起坐天門吹玉笛月中珠樹起秋聲竹宫青鳥阿母瑶池信不通茂陵松柏起秋風野垣春雨叢篁緑青鳥猶来認故宫程煜一首煜字彦明揚州人寳坻縣丞題明皇並笛圗華清宴罷巻霓裳重立東風並海棠鳳琯莫吹新製曲有人乗月倚東牆陳𤣥一首𤣥字闕二字東莞人洪武辛亥進士官縣丞資福寺聽經猨去已多時梧竹風標入夢思暗粉尚留多寳墖長廊空見捨田碑石池雨過添新水老柏年深換舊枝聞道靈源髙閣上至今人誦小山詩吳斌二首斌字蘊中休寜人洪武中用薦授平陽縣主簿有蘊玉山房集量田謡朝量水田雪暮量山田月青山白水人如雲朝暮量田幾時歇尺田寸地須盡量絲毫增入毋㽞藏時𤾉時雨欣時康我民欲報心未央年年增賦輸太倉安得長風天外起吹倒崑崙填海水更出桑田千萬里醉歌行登髙取醉㪚我愁倒卧城南百尺之酒樓出門但知行路苦醉鄉可以逍遥遊君不能遺身天地上玉京乂不能營名將相專金城徒將緑髪染春雪風塵羈紲終無成不如且飲一壺酒酒盡愁消更何有汪禹乂云章短氣長學太白神似太白戴奎一首奎字文祥台州人洪武中齊河縣主簿有介軒集秋夜有懐欲憑詩句寄秋風吟到宵分蜜炬終月色如銀庭樹冷一絲和露墮青蟲詩話風定小軒無落葉青蟲相對吐秋絲秦淮海句也文祥移入夜景可謂青出於藍葉子竒子竒字世傑龍泉人用薦主巴陵簿詩話世傑坐事繫獄於獄中撰草木子又有餘録紀元季明初事頗詳可資國史采擇詩特餘技耳岳陽晚興二首洞庭萬頃秋月君山一㸃晚煙安得幅巾無事酒船吹笛江天暮雨漁村春暝曉霜楓葉秋酣人世花開花落山光湖北湖南金慎一首慎字子肅嘉興人洪武初貢士官典史柿林新居喜得移家秀水濵此邦風物舊相親為農乆已知農事近市還能逺市塵鵝㪚墨池迎洗硯鷗當漁屋看垂綸蔬畦藥圃終吾老未必溪花解笑人詩話柿林今之新城鎮也去嘉興府治西北三十里而近城夲作塍宋曽魯公嘗監秀州新塍酒稅金尉一詩格調雖卑然微官能詩足以見當年一時文教之盛薛敬一首敬字原理鄞縣人洪武初舉茂才授龍泉稅大使厯國子監博士有江天集與范宣之何約之重游隠學寺薄言山寺去兩度出東郊湖草添新漲山禽改舊巢煙霞野衲客鹿豕故人交鐘磬雲深處来聽幾度敲任原一首原字本初休寜人明初以捍禦功授顯武將軍雄鋒翼管萬戸有集詩話夲初雖厯戎行實為環谷東山談經弟子其詩互刋唐仲實白雲集中今從燉煌程氏新安文獻志定為任作見鄉人程大少年䇿馬辭鄉邑落魄天涯幾秋色鳳池昨遇故鄉人不道姓名應不識布衣拂却長安塵相㸔感歎念情親青春作客無逺近白髪從軍多苦辛以兹失路誰相顧我向東流子南去歸夢不離滄海雲邊愁逺挂青楓樹楓樹叢林隔海天百年聚㪚一茫然簮纓故舊應誰在萍梗江湖祗自憐臨岐執袂須傾倒明朝乂别闗山道心隨征鴈向斜陽愁對離憂醉芳草贈同舟從軍林生青天無盡碧波長百尺雲帆挂夕陽海路音書何處寄西風吹鴈不成行明詩綜巻十四
