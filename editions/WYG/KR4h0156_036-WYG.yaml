body:
  text: 明詩綜卷三十六翰林院檢討朱彞尊編徐禎卿五十首禎卿字昌穀一字昌國吳縣人𢎞治乙丑進士除大理寺左寺副降國子監博士有迪功集又有歎歎焦桐鸚鵡花間野興自慙等集李獻吉云昌穀諸詩温雅以發情微婉以諷事爽暢以達其氣比興以測其義蒼古以蓄其詞擬義以一其格悲鳴以泄其不平參伍以錯其變即有蹊徑厥儷鮮已顧華玉云昌穀專門詩學究訂體裁上探騷雅下括髙岑融㑹折衷備兹文質取充棟之草刪存百一至今海内奉如圭璧所謂雖多亦奚以為也獻吉乃云守而未化故蹊徑存焉豈其然歟又云𢎞治間詩學始盛獻吉仲黙昌穀各有所長李氣雄何才逸徐情深皆準則古文鍛琢成體鄭繼之云昌穀年二十外厭薄吳聲一變遂與漢魏盛唐作者馳騁上下今之世絶無而僅有者也年三十選平生所為文曰迪功集今行於洛陽者獻吉多為更定失昌穀真葢獻吉雖與同調其丰神氣魄自有不相能者矣之文徵仲云昌穀古體合作近體非所好而為輒工皇甫子浚云李何矯一時之弊為中興之冠而不能不泥其跡故仲氏子安於詩獨取迪功皇甫子安云徐君繼軌二晉標冠一代又云㑹諸氏之長以追六代迪功其庶幾乎皇甫子循云𢎞徳之間李何諸子追述大雅取裁風人一時藝林作者響臻同好景附咸足馳騁海内而徐君亦髙步江左獨綜菁英莫可瑕纇非其佳穢自得去取過嚴乎雪王元美云徐昌穀如白雲自流山泉泠然殘在地掩映新月又如飛天仙人偶游下界不染塵俗又云昌穀如六翮搏風三危吸露快爽種種不可名狀又云昌穀少即摛詞文匠齊梁詩沿晚季迨見獻吉始大悔改其樂府選體歌行絶句咀六朝之精音采唐初之妙則天才髙朗英英獨照律體微乖整栗亦浩然太白之遺昌穀之於詩也黄鵠之於鳥瓊瑶之於石松桂之於木也又云昌穀自選迪功集咸自精美無復可憾其五集係少年時語舞陽絳灌貴後向人稱其屠狗吹簫為佳事寧不泚顙又云絶塵行空吾推昌穀然不能諱其輕又云呉中如徐昌穀詩祝希哲書沈啓南畫足稱三絶王敬美云詩有必不能廢者雖衆體未備而獨擅一家之長如孟浩然洮洮易盡止以五言雋永千載並稱王孟我明其徐昌穀髙子業乎二君詩大不同而皆巧於用短徐能以髙韻勝有蟬蛻軒舉之風髙能以深情勝有秋閨怨婦之態更千百年李何尚有廢興二君必無絶響歐楨伯云博士洗盡蕪辭天然妙麗金源人詩清廟瑟三歎齋房芝九莖庶幾似之項子長云昌國華而不靡質而不俚深而不晦壯而不怒約而精騁而中節宜其崛起江南雄視中土顧𤣥言云迪功豪縱英裁格髙調雅馳騁漢唐之間婉而有味渾而有迹獨悲夫長轡既驟窮途忽蹶顧未盡肆力耳心黄清甫云迪功取模古調用鑄今詞工逾嘔妙幾换骨力振東吳之靡爭長北郡之雄雖巻帙寂寥而篇章簡鍊至降格為律用思尤深開元以下難與為儔恨其早殞未究厥志士胡元瑞云𢎞正間詩流特衆然皆近逐李何選升之近夫獻吉派也華玉君采望之仲鶡仲黙派也昌穀雖服膺獻吉然絶自名家遂成鼎足獻吉譏其大而未化蹊徑存焉何元朗謂獻吉詩比之昌穀蹊徑尤甚王長公謂昌穀所未至者大也非化也世以何王為篤論西王伯穀云𢎞正間詩流輩出李君赤幟於關徐子白眉於東海李資𢎞亮徐學精深長才絶力則徐不逮李古色清聲則李不逮徐臨草昧之頃難少李君今全盛之時當多徐子穆敬甫云徐詩如皋蘭猗靡脩竹嬋娟足稱雅致宜與李何方駕蔣仲舒云昌穀詩韻本淸華調復古秀雖何李亡易也足傅伯俊云先生奪赤幟於北地信陽之間鼎而居其詩憲章三百律襲漢魏濯祓六朝蹈詣天寳外集多穉年綺語尚沿吳習猥以名重槩傳而不知瑕瑜不類也其陳卧子云迪功有詩無多乃與二雄鼎足觀談藝皆深造之言宜其短章片語無不連城也又云昌穀似與仲黙同源然仲黙俊逸昌穀矜貴又自有殊宋轅文云昌穀如秋夜銀河爛爛垂地又云何李刻意少陵迪功獨宗太白神到之作自成一家不若嘉靖七子同派也鞭李舒章云迪功神致俊爽如天廏飛龍不加䇿自然駛邁用寡用虚獨有所長王貽上云明𢎞治間李何崛起中州吳有昌穀為之羽翼相與力追古作一變宣正以來流易之習明音之盛遂與開元大厯同風家周青士云李何専主學杜昌穀兼師盛唐諸此後薛君采蔣子雲王穉欽髙子業華子潛皇甫昆弟皆清婉成音各極其致雖非昌穀流派而風調實自昌穀啓之麗沈山子云吳中詩派自髙季迪倡之風華整克兼唐宋元人之長其後劉昌謨輩漸流入姚冶吳源博王濟之返之於理遂類宋詩沈啓南能以澹宕出之尤為拔俗顧陳海士選明詩竟遺之以其調近於宋也昌穀既見獻吉悔其少作然所操仍是吳音第洗除少日浮豔字句歸於六代三唐而已未甞北學於獻吉獻吉譏其蹊徑未化職此故歟靜志居詩話迪功少學六朝其所著五集類靡靡之音及見北地初猶崛强賦詩云我雖甘為李左車身未交鋒心未服顧予多見不知量此項未肯下頗牧既而心傾意寫營壘旌旗忽焉一變是時李何並陳未決雌雄迪功精銳無多能以偏師取勝遂成鼎足其詩不専學太白而髣髴近之七言勝於五言絶句尤勝諸體興慶池頭送君南下等作雖龍標太白復生何多讓焉又云人所應有盡有人所應無盡無大復是也人所應有盡有人所應無不必盡無空同是也人所應有不盡有人所應無盡無迪功是也三雄真鼎足哉又云樊少南與康徳涵論詩而曰初唐詩如春園草木雜生未放之花含蓄渾厚生意勃勃盛唐則淘洗鉏治條理可觀生意稍薄矣近日名家冠絶海内自許古人之上或失之觕者稜角峭厲而乏温柔敦厚之旨或失之易者流麗光澤而少含蓄渾成之趣所以然者孜孜於杜未甞引而上之也陳約之為髙子業作序而曰子美有振古之才故雜陳漢晉之辭而出入正變初唐襲隋梁之後是以風神初振而縟靡未刋今無其才而習其變則其聲觕厲而畔規不得其神而舉其辭則其聲闡緩而無當彼我異觀豈不更相笑邪繹兩公之言若與北地信陽均未愜意然則李何至嘉靖初聲燄漸歇作者已有違言惟昌穀莫有訾之者麟洲稱李何有廢興徐髙必無絶響其知言之選乎雜謡二首夫為虜妻為囚少婦出門走道逢耶孃不敢收東市街西市街黄符下使者來狗觫觫雞鳴飛上屋風吹門前草肅肅陳卧子云此紀正徳五年八月之變壊我民居田樹子桐與檟桐檟何青青素車不得下李舒章云謡語極蒼茫鷂雀行白鷂捉黄雀斜盤下九天豈知南山側復有虞人弦一發中雙翼忽斃青雲端行人皆撫掌仰視落飛翰弓矢懸馬頭少年坐雕鞍持歸咸陽市百鳥爭聚觀美酒白玉缸肉腊黄金槃樂哉今日宴四座俱萬年黄清甫云鷂雀一篇足以上抗西京下視子建殆千載之希聲也白紵歌二首三星爍爍花滿堂素腕盈盈出洞房垂羅映縠耀明妝皦若雲中開月光流情盼君君莫忘停歌節舞進玉觴願君安坐夜未央旨酒千壺列東廂美人如花嬌北堂髙歌合舞聖世昌願得歡娛永未央脂車秣馬且踟蹰百年之㑹忽須㬰東流之水西飛烏今我不樂何為乎詩話樂府宜以不求似似之讀此益見滄溟坼疈古人之非古意空為郢中客不見郢中吟美人髙堂上自奏山水音帝子葬何處瀟湘雲正深寂寥誰共賞江上獨傷心宋轅文云清婉有古風倡家詠效何遜簾櫳秋未晚花霧夕偏佳暗牖通新燭虚堂響落釵淅淅鳥棲樹明明月墮懐相思不可見蘭生故繞階鍾廣漢云此昌穀少作置之玉臺集中其誰能辨舟懐詩話舟懐以下三詩絶似青丘生天曠多樹林日赤溪路永我行一何勞窈窕坼川嶺湍流好石鬬沙礫與舟鯁行行指前棲望望不得逞火雲漸曖滅蟬鳴空山靜奄忽青松間了了挂員景一與幽賞遇遂使煩慮屏先書謝廬僧為埽香爐頂留别都城諸同志對酒忽不樂悵然懐别離别離結中勞眷彼長路岐苒苒郊河樹曖曖關門祠佇望瀟湘水先與秋風期鴻鴈雲中來噭噭使人悲懐哉爾方集恨矣予當辭吳江橋亭遊眺郡右多麗山湖南富鮮水溶溶蒼樹浮漭漭白煙起中土屹裒城重波泛人市出郭接修梁垂穹貫遥沚上有臨流溝髙風衍清祀百匯引虚明諸州拆表裏隠約雲中檣紛紜隰間耔宵澄月色闊風逺漁歌靡空睇眇不極瑶胷盪餘滓悟彼扁舟人傷此塵代子送熊士選侍御壯士樂長征門前邊馬鳴春風三月栁吹暗大同城蘆溝橋下東流水故人一樽情未已遥天飛盡隴頭雲唯見居庸暮山紫羨君鞍馬速流星予亦孤帆下洞庭塞北荆南心萬里佩刀長揖向都亭寄顧華玉去嵗君為薊門客燕山雪暗秦雲白馬上相逢脫紫貂朝回沽酒城南陌燕山此日雪紛紛祗見秦雲不見君胡天白鴈南飛盡千里相思那得聞朱子蓉云源本太白去嵗何時君别妾一篇而不覺其摹擬之迹可謂善學古人青門歌送吳郎吳郎醉嗜長安酒落魄自言為客久走馬頻看上苑花回鞭幾折青門栁青門曈曈魚鑰開乳燕游絲相逐來栁下雕鞍留别袂花間酒琖覆蒼苔浮雲去去辭城闕芳草連天那可歇野店春風聽早鶯關河曉樹懸新月千里淮流雙畫橈廣陵驛前逢暮潮落日歸帆揚子渡青山家對伯通橋吾家流水原非隔宛轉胥臺通巷陌草長難尋仲蔚居林深不辨陶潛宅清溪屋下可垂綸復有蓴羮足獻親君歸儻食氷絲膾為念羇棲塞北人陳卧子云似勝李頎贈王淵之十月狂風吹白雪長安城中地欲裂朱門酒壚紅炙天空裏璚花旋消滅由來都國盛繁華青雲絡繹滿仙車浪說黄金賜寒士爭言白璧謁侯家驕矜意氣遥相羨片善朝推䝉夕薦待詔虚沈金馬門傳宣直上麒麟殿王郎濩落爾何求千里乗驢被黒裘空論作賦稱才子未肯低眉事貴游知君不得逢楊意終媿明時老督郵譚舟石云調亦平平氣却深穏觀伯虎寄贈子容洞庭山圖因求作廬山障子丹巒氤氲拂空起素練平鋪洞庭水迴溪笑指毛公家忘却滄溟幾千里我隔廬峰夢紫煙甞騎白鹿上青天煩君貌出仙人掌西寄長安向日邊彭蠡茫茫彭蠡口隠隠鄱陽岑地湧三辰動江連九派深揚舲武昌客興發豫章吟不見垂綸叟煙波空我心陸氷脩云襄陽遺韻在武昌作洞庭木葉下瀟湘秋思生髙齋今夜雨獨卧武昌城重以桑梓念淒其江漢情不知天外鴈何事樂南征李舒章云八句竟不可斷登支硎山樓谷寺憐幽密兹棲表麗觀煙雲連壑動竹樹入門寒獨往迷前徑憑髙遲所歡時聞有清磬遥出暮林端送友人還吳陽月隨陽鴈遥從塞上來北人江北望不見隴頭梅坐下楊朱淚吟為莊舄哀聊傳數行札千里送君回王于一云不失唐人風格嘉禾道中檇李城何在蕭條草樹存未醒吳苑酒已動越鄉魂問水來天目看桑過石門愁聞鶺鴒語寧聽楚山猿俞右言云道吾鄉風景者多矣方萬里出戸即乗船徐昌穀看桑過石門語似淺而實深月故園今夜月迢遞向人明只自懸清漢那知隔鳳城氣兼風露發光逼曙鳥驚何事江山外能催白髪生朱子蓉云此詩却學杜秋日懐李郎中及邊熊二子秋興因髙賦雄才憶省郎山川思不極雲樹莽蒼蒼對酒知時變看花感别長如何霜後鴈猶未達瀟湘逢蠻使語五嶺馳蠻使三秋達薊京北來江草盡南眺瘴雲平鄉夢清猨隔邊心旅鴈驚辛勤萬里札懐笥未宜輕送許補之還丹徒憐君揮手去匹馬向南天旅病青山外鄉心落日懸燕關變積雪淮栁動新煙驛路重雲裏相思易隔年陳卧子云五六新挺送廬陵楊二尹何卑執㦸謝京華却愛河陽縣裏花不為逺師招白社擬從勾令覓丹砂青天挂席浮明月螺水迴舟勝若邪莫學南昌隠君子離羣獨拂五雲車贈别獻吉爾放金雞别帝鄉何如李白在潯陽日暮經過燕市客解裘同醉酒壚傍徘徊桂樹涼飇發仰視明河秋夜長此去梁園逢雨雪知予遥度赤城梁王元美云得崔沈琢句法陳卧子云果為神到之作送盛斯徵赴長沙昔愁越嶲千峰仄轉入巴渝萬里賖豈料聖恩憐賈誼猶煩佐郡出長沙蠻中瘴逺三湘水江畔春逢十月花遥聽岳陽樓上笛可能回首憶京華寄杭東卿西湖十月煙水平梅花參差千樹明越王城畔氣應早林逋宅邊江更清驛使章臺空寄别霜天玉笛暗霑纓故人若有揚州興為聽春鴻白雪聲送耿晦之守湖州逺下吳江向霅川髙秋風物倍澄鮮鵁鶄菰葉翠相亂錦石游鱗清可憐郵渚撾頻津吏鼓漁歌唱近使君船吳興峴山足勝事漢水襄陽空昔賢鳳鳴亭鳳鳥期不來瑶華幾銷歇唯有山中人吹簫弄明月香圃露華散平林月明在寥廓時有天風來冷然桂花落古意我有木蘭舟欲作三湘客不愁湘水深但畏湘中石内中偶述朱筥殊方貢黄旗使者回内園春未到青筍渡江來答獻吉花發平章宅鶯啼省樹春殷勤花鳥意愁殺獨遊人大道曲長安樓閣互相望戸戸珠簾十二行緑水過橋通酒市春風繫馬有垂楊羽林少年行寳馬平馳過夕隂飛丸遥墮掌中金不知富貴縁何事偏動青樓瞥見心擬古宮詞興慶池頭漏未闌棃園弟子曲將殘花前更進涼州伎無那西宮月色寒春思渺渺春江空落暉行人相顧欲霑衣楚王宮外千條栁不遣飛花送客歸湘中曲湘州草深鶗鴂鳴湘江水清多杜蘅月明伊軋中流槳好似湘娥鼓瑟聲送蕭少府矯矯雙鳬塞隴分武夷殘雪半春雲玉洞只愁仙隠去洛陽花下不逢君送顧馬湖孔昭二首巴東明月巴西歌兩岸梅花羌笛多一曲停橈雙淚落猨聲三峽若為過錦水由來勝若邪蘭橈三月泛桃花巴兒見客能歌曲蜀女明妝笑浣紗安南歌送沈使君烏蠻灘上煙水聲伏波廟前秋月明夜半津人挽舟上夷歌偏動望鄉情陳卧子云渾成送蕭若思送君南下巴渝深予亦迢迢湘水隂前路不知何地别千山萬壑暮猨吟宗子相云直是供奉龍標風調將發夏口鸚鵡洲邊生暮煙旅人南望思依然盡道巴陵湖水闊秋風莫渡漢陽川望行人二首秋原迷望草芊芊幾樹荒鴉落照前驛使回時曽寄語西風早晚渡秦川緑蕪平野暮天低逺色蒼蒼路不迷昨日鄰家歸後信行人只隔灞陵西弔徐姬詩并序金陵有徐姬者善屬詩早死余甞聞其句云楊花厚處春隂薄清冷不勝單裌衣頗愛其有婉思以詩弔之繞廊吟罷楊花句欲覓楊花樹已空日暮街頭春雪散杜鵑無力泣春風楚中春思遵義門前暮栁斜武當城裏欲棲鴉行人獨立宮牆外又見空園落杏花濟上作兩年為客逢秋節千里孤舟濟水傍忽見黄花倍惆悵故園明日又重陽邊貢二十六首貢字廷實歴城人𢎞治丙辰進士授太常博士擢戸科給事中遷太常寺丞出知衛輝府改荆州陞湖廣一云山西一云河南提學副使召拜南京太常少卿遷太僕改太常卿提督四夷館進南京戸部尚書有華泉集朱中立云華泉之作雖不逮李何然平淡和粹孝廟以前海嶽之才無其倫比逸袁永之云李何徐邊世稱四傑李雄健何秀徐精融邊朴實故並有盛名輝映當代四公殆藝苑之精英也邊稍不逮秖堪鼓吹三家耳湛元明云華泉嫻於才書必如晉文必如韓詩必如杜以此收聲於時何元朗云世人推何李為當代第一予謂空同關中人氣稍過勁未免失之怒張大復俊節亮語出於天性亦自難到但工於句言而乏意外之趣獨邊華泉興象飄逸而語亦清圓故當共推此人王元美云邊廷實如洛陽名園處處綺卉而不必稱姚魏又如五陵裘馬千金少年項子長云𢎞治四傑其才各有所長李天才雄健徐陶冶精融何藻思透逸邊朴實有餘而華采不足胡元瑞云𢎞正並推邊徐何李每怪邊品第懸逺胡得此稱及讀獻吉送昌榖詩是時少年誰最文太常邊丞何舍人仲黙贈君采亦有十年流落失邊李之句則李何於邊正自不淺予細閱當時諸家若仲鶡徳涵敬夫子衡詩皆非所長華玉升之繼之士選輩或調正格卑或格髙調僻獨邊視諸人差為諧合不得不爾又云邊顧朱鄭之流派流甚正聲調未舒歌行絶句時得佳篇古風近體殊少合作鄭敬甫云邊司徒詩清婉流暢朗朗有致産黄清甫云邊詩詞旨凄婉調亦入雅歴下之無以過之越在太常蜚聲藝苑時獻吉主盟羣英為輔君其一也俞汝成云華泉調逸情真氣舒音亮不假深求自得風人遺韻尤陳卧子云廷實粗率未除然時見精詣五言稱長城宋轅文云尚書才情甚富故能於沈穏處見其流麗陸氷修云廷實篇法亦整但格律未遒當與華玉子衡伯仲譬諸才傑獻吉淮隂侯也仲黙鄼侯也昌國留侯也邊顧朱鄭樊酈絳灌之徒也世乃躋邊三家稱為四傑生乃與噲等伍三君有遺憾矣詩話華泉諸體不及三家獨五言絶句擅場昔宋吳江令張達明與客論詩其言曰詩莫難於絶句尤莫難於五言欲其章短而意長辭約而理盡華泉庶足當之大復贈詩云陽春誠獨步清廟徒三歎以絶句論邊亦無媿於三家也贈友春陽初獻嵗芳樹日以青送逺及近郊何由申我情我情方鬱紆君駕不可停瞻彼飛鴻翼聫翩共遐征奕奕雲中河爛爛川上星中原渺難遂佇立以屏營分韻再送文熙夜久河漢横春堂别燈黯風凄鳥初動露重花猶斂明發不在兹重關為誰掩答石峰見懐之作斗柄當西南河漢東北傾零零露華白皛皛天宇晴微風度廣隂熠燿時復明卉木日已黄秋氣日已清念子理素瑟苦調多離聲嗷嗷失侶鴈泛泛隨波萍㑹合固有期此日難為情次韻贈李子行之如陳迢迢阻歡宴戚戚傷離居離居結中懐鬱鬱慘不舒若人美無度貞抱沖以虚朝為同朝客夕暮隔林墟林墟積秋霖流潦不可除四野晦蒼蒼行行安所如驅馬臨大道瞻顧空踟蹰運夫謡送方文玉督運運船戸來何暮江上旱風多春濤不可渡裏河有閘外有灘斷篙折纜腰環環夜妨鼠日妨漏糧冊分明算升斗官家但恨倉廪貧不知淮南人食人官家但知征戍苦力盡誰憐運船戸運船戸爾勿哀司農使者天邊來送馬欹湖赴湖南提學征馬帶落日出門君已遥層城不隔夢夜夜盧溝橋盧溝橋邊車簇簇故人却在城南宿誰令相見轉多情翻恨遲行不如速江漢風煙遲早春關山雨雪暗邊塵臨岐莫動殊方感余亦東西南北人題豐内翰愛鳬樓春鳬呼其侶拍拍戲芳渚一鳬忽驚人羣鳬共髙舉回翔集城下㸃㸃散如雨愛鳬主人今幾秋夕陽空上望髙樓憑闌獨送千里目平沙莽莽寒煙緑張夏道中遇雨短歌示同行希尹諸子南山北山雨如注寒風䬃䬃吹山樹中河水發行子愁褰裳欲渡且復休黑霧蒼雲蔽村舍咫尺誰能辨牛馬嗟哉出門百里行路難我今胡為在中野出郭將訪希準郡伯懼暮而返却寄駕言江口出却至水西還逺道空回首重門欲上關斷雲低白鴈斜日近青山欲採瑶華贈仙舟不可攀和答胡可泉郡伯籍籍胡安慶新聲滿舊都詎知金馬客翻領玉麟符退食還經史登樓即畫圖昔賢憂樂地元只在江湖送都𤣥敬驅馬别君處秋隂當暮生林柯無靜葉江鴈有歸聲緑水閶門道青山建業城未能同理櫂延佇獨含情次獻吉留别韻初春郊甸積雪滿客子出門岐路長征車杳杳去不息關栁青青殊未央却望秦山懐故道即歸梁苑亦他鄉十年京洛交游地日夕風煙思渺茫留别貞菴隂隂汀樹起秋煙冉冉溪花接暮天歸鳥獨衝淮甸雨離人新上汶陽船病餘藥物求芝术老去心情託簡編他日㑹傳招隠賦緘封應寫渡江年送劉約中之金陵君到石城邊應看石城樹樹杪百尺臺是儂行樂處蔣仲舒云詞直截而意婉曲贈别甯子白日就長道清秋凌大河非關燕趙别相送一悲歌西園二首朝看長白山暮看長白山山色有朝暮吾心常自閒庭際何所有有萱復有芋自聞秋雨聲不種芭蕉樹王元美云芭蕉豈可言樹芋豈庭中佳物且獨無雨聲乎俱屬未妥若作自憐秋雨滴不復種芭蕉或作自聞秋雨聲不愛芭蕉色覺意尤深婉詩話杜牧之詩一夜不眠孤客耳主人窗外有芭蕉呂居仁詩如何今夜雨只是滴芭蕉張安國詞㸃㸃不離楊栁外聲聲只在芭蕉裏無名子詞窗外芭蕉窗裏人分明葉上心頭滴古之愁夜雨者多以蕉葉為辭髙荷大芋非所憎也元美誚廷實芭蕉不可言樹然維摩詰經云是身如芭蕉樹而不堅固是芭蕉未始不可名樹元美之言過矣雜詩月色沙上澹山雲天際浮春江萬里闊獨見一漁舟題畫二首鳥啼青石岡日照紅泥坂杳杳雲外鐘山僧獨歸晚近浦寒潮落平沙返照紅不嫌歸路晚家在板橋東迎鑾曲四首金陵自古帝王都碧石清江一畫圖列聖百年虛想像鑾輿曽到此間無自采民風問老農微行不遣近官從那知天子關天象到處雲成五色龍弓如滿月向江開箭插寒潮巻浪迴水上黿鼉莫深避我皇元為射蛟來潮落江門煙水秋雲帆月下過揚州兩京馳道三千里夾岸垂楊接御溝栁塘雜興御溝東畔栁成林一水盈盈十里隂白馬青衫橋上客春來多少故園心山行即事陵薯青青生午煙山渠㶁㶁響春泉白頭宮監松陵下閒說英皇北狩年康海五首海字徳涵武功人𢎞治壬戌賜進士第一授翰林修撰尋以救李夢陽坐逆瑾黨落職為民有對山集張孟獨云對山詩以興致為先格髙詞俊足以凌駕古人羽翼騷雅張文邦云對山既𢎞詩規又開文運時仲黙獻吉敬夫號海内三才而公尤獨步王元美云康徳涵如靖康中宰相非不處貴恇擾粗率無大處分王敬美云對山五七言詩間多率意之作直攄胸臆或韻至便押不必盡麗典則不穆敬甫云徳涵詩有極佳者乃為友人置而録遂有長吉之恨子俞汝成云對山文勝於詩陳卧云對山粗率殊無足觀詩話徳涵坐援獻吉遂挂清議歸田之後耽心詞曲其小令云真箇是不精不細醜行藏怪不得沒頭沒腦受災殃從今後花底朝朝醉人間事事㤀剛方徯落了膺和滂荒唐周旋了藉與康論者原其心而悲之沒時家無長物腰鼓多至三百副㽞心風雅之日少宜其所就止此爾滸西别業同承裕升之作還耕愜初願揖世返空林雖非志士理已獲靜者心嘉賔青雲客枉駕忽相臨攜酒共斟酌張絃揚妙音義厚情自叶道合契滋深漪漪湋川水幽幽南山岑相值不相樂奈此逝者侵觀禾我來彭麓下坐愛青山色雨過忽新涼蒼煙望無極秋禾行欲成豈畏驕陽逼壠畝緑如屯原隰少螟螣同欣有年樂詎知天子力對客絲竹憐吾嬾尊罍待汝來片雲霄漢沒叢菊小籬開積雨難相過當歌莫謾迴請看秋草色黄滿建章臺鹿苑懐太微鹿苑何王殿明時尚賜秦芳林春礙日幽草晝眠麏畎畝餘生計乾坤信此身西京誰欲賦韋曲有詞人四月十九日宴東侍御園亭醉中走筆燕家小妓石榴裙笑酌酴酥把似君玉面未能花底出瑶箏先向月中聞王九思五首九思字敬夫鄠縣人𢎞治丙辰進士選庶吉士授檢討調吏部主事陞郎中坐劉瑾黨降夀州同知尋勒致仕有渼陂集續集李伯華云渼陂因懐陳致寄景道情出入風雅騷選之間振迅開元天寳之上王元美云敬夫如漢武求仙欲根正染時復遇之終非實境太樸不雕之風俞汝成云渼陂礧磈廓落有穆敬夫云敬夫工於小詞而詩亦不落元宋體頗謂兼才惜乎遊春一記自逺風雅也顧𤣥言云敬夫才雋思逸銳於綺麗譬之湖外碧草海東紅雲流彩奪目詩話康王並以樂府擅長而詩鮮合作王差勝康樂府亦爾對酒憶康五林棲鮮儔侶芳醑聊獨親繁香媚晴一作旭景嘉賔及兹辰習習谷風發萋萋卉木春黄鳥鳴枝間翩翩求其羣對此豈不樂念彼同心人室逺心徒勞追趨靡所因安得驂雲霓頃刻馳見君聞盜賊且至登夀州南城樓野望兼示避盜諸君子極目川原外無言自愴神雲山晴見楚煙樹逺浮秦平地干戈滿臨風羽檄頻西飛羨歸鳥隨意過城闉滸西莊春日行樂詞金馬當朝彦銀魚隔嵗焚髙棲丹鳳麓閒卧碧山雲湘瑟春風度秦箏月夜聞太平無一事只合醉朝醺亳州出門二月已三月騎馬陳州來亳州暮雨桃花此客館春風燕子誰家樓簿書堆案不相放太守下堂仍苦留浮名羈絆有如此媿爾沙邊雙白鷗周青士云頽唐有致十四夜月與李二獻吉飲萬戸秋風碪杵哀殊鄉今夕故人來竹間涼露蕭蕭下樓上浮煙細細迴地僻柴門無過客家貧樽酒有餘醅疎簾碧簟須同醉明月青天為爾開王廷相十九首廷相字子衡儀封人𢎞治壬戌進士選庶吉士改兵科給事中以言事謫判亳州拜監察御史巡按陜西為鎮守廖鑾誣奏下獄再謫贑榆縣丞稍遷寧國同知歴四川按察使拜副都御史巡撫四川入為兵部侍郎都察院右都御史進兵部尚書提督團營仍掌院事加太子太保卒謚肅敏有家藏内臺二集薛君采云先生詩豪氣太露其工者較之古人不啻過之威王元美云王子衡如外國人投唐武將坐禪儀解悟中不免露抗浪本色𤣥穆敬甫云王詩如飛亷煽吹白羽失涼孔顧言云司馬學古才辨特嫻古體如闕里檜泰嶽秦松蒼秀挺鬱樂黄清甫云浚川詩貴達意不避險直多擬古府欲返真樸未見其工君采出其門下所謂青出於藍也宋陳卧子云子衡詩有沈鬱之思壯麗之色轅文云子衡莊雅有法長於五言若近體則元美所云武人坐禪者是也詩話浚川敭歴之暇銳意詩文非徒扶大雅之輪抑且抉羣經之奥而又見善如不及其序空同子詩稱其掩蔽前賢命令當世秦漢以來寡見其儔然空同名成之後目空四海觀送昌榖之湖湘詩述一代人文之盛有云是時少年誰最文太常邊丞何舍人三子而外並不及浚川隻字也鄭繼之未甞謀面乃有句云海内談詩王子衡春風坐遍魯諸生宜浚川見之有知已之感於繼之身後賦少谷子歌焚其稾於燕望閩再拜歌云彼時才傑游帝傍信陽之何棠陵方大梁翩翩李川甫吏部薛生尤擅長於空同亦未齒及不無憾焉矣他日作遣興十首其一云昔吟吳下徐昌穀幻出斯文百代先其二云逸氣誰當鄭善夫其三云康子文章迥絶塵其五云大復天才冠兩都其六云後來誰擅六朝竒君采分明别綴詞其七云散逸長年何粹夫獨於空同則云疏越朱絃大雅沈始知清廟有遺音峽江迫阨湍瀾出可是空同太劇心殆有微辭焉信乎恩怨之難㤀也浚川詩格諸體稍觕惟五言絶句頗有摩詰風致下亦不失為裴十秀才崔五員外蘄民謡四首有芃者艾生我土七年之病得者愈五内失調邪作主當貴耽慾乃自取艾縱有靈將奚補我欲言之上官怒龜帬生毛緑的的大如錢貴如璧養來盆中水凝碧細人之玩有何益白花蛇誰教爾能辟風邪上司索爾急於火州中大夫却逼我殺爾種類絶白花不生禍胎滅龍鬚作席光電電暑眠不及蘄陽簟涼如水滑如藤一簟幾工能織成官府取之只一聲有價無價誰敢爭赭袍將軍歌萬夀山前擂大鼓赭袍將軍號威武三邊健兒猛如虎左提戈右跨弩外庭言之赭袍怒牙旗閃閃軍門開紫茸罩甲如雲排大同來宣府來九日安陵同蔡成之發舟亢帆安陵浦泛舸清川潯渚枉倦迴沿厓傾詫﨑嶔寒原變淒􅇋浮靄散層隂落日隠叢薄孤霞冐平林雖同佳人娛屢興游子吟曠達獲自古維縶慚在今緬懐籬下菊結念丘中琴川塗渺無緒風波浩難任秋日巴中旅行巴東秋氣早行客已悽悽江險深三峽雲寒暗五溪中原無鴈至異國足猿啼况近烏蠻塞連年尚鼓鼙旅思野雲蕭蕭逐我迴西從閬苑東蓬萊偶傳靈藥足自寳持示世人番見猜不知黄鵠幾時到縱有素書誰與開旅食淹留斷消息故園風雨空池臺春草謡塘上艸離離照妾春羅衣待君君不來滿庭螢火飛秦川雜興古陵在蒿下啼烏在蒿上陵中人不聞行客自惆悵初見白髪日日風塵色勞勞簿領身不知清鏡裏已作二毛人蔣仲舒云愾歎愁絶漢上歌宜城出美醖載入習家池山公去已久醉殺襄陽兒宮怨夜輦昭陽月春筵上苑花不成供奉日枉自學琵琶宗子相云如泣如訴閬中歌天闊浮煙迥沙平落照低春江同在眼只覺異巴西漫興一琴几上閒數竹窗外碧簾戸闃無人春風自吹入巴人竹枝楊花作雪草連天郎下荆吳又一年江上浣紗郎不見問郎錯問下江船泊嘉善縣千峰萬峰廣徳路晝行夜行湖州艭七十五橋今過盡畫船明日入松江宣州歌河瀝溪頭伐鼓行五湖渡口櫂歌聲怪來畫舸如飛去一百八灘春水生金陵歌山到金陵龍虎分大江環抱日生雲千年宮闕存遺事猶有都人說建文明詩綜巻三十六
