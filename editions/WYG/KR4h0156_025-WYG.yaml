body:
  text: 明詩綜巻二十五翰林院檢討朱􅂜尊編楊翥二首翥字仲舉呉縣人少與兄戍武昌為鄉校師仁宗驛召授翰林編修厯修撰遷郕府長史景㤗初擢禮部左侍郎尋進尚書有晞顔先生集陳闕闕云先生詩若太􅅅𤣥酒不待薑桂鹽梅而至味自存黄岡阻雪積雨既淫溢飛雪何漫漫經旬苦不止行子多悲酸悲酸亦何事匪為饑與寒倚門累晨暮定省違承顔欲行阻泥塗欲濟愁驚湍凍木號江介飢烏噪林端向風長太息恨不生羽翰出門不自遂誠哉行路難秋懐肅肅凉吹發唧唧寒蛩吟春夏不自豫況乃秋氣臨時序忽流邁感此百憂尋人生誠須臾華髪易為侵立名亦素志為善實所欽塵事日紛擾進修力不任愁懐難自遣徙倚髙梧隂靜志居詩話晞顔集借之琴川毛氏有人為施鉛評云宜亟焚毁勿暴其短於後世可也未免太過楊公長者當存其言以予所錄二首亦自成章范澄一首澄字國清寳應人景泰庚午舉人送别酒盡津鼓喧風生浦帆亂山迴不見君夕陽在沙岸柯潛一首潛字孟時莆田人景泰辛未賜進士第一授翰林修撰厯右春坊右中允洗馬遷尚寳少卿陞詹事府少詹事兼翰林學士有竹巖集詩話漢有金馬石渠蘭臺東觀宋有總明陳有德教周則虎門麟趾北齊則仁壽文林唐則麗正集仙開元中始定為翰林院其署與他公廨不同中有徘徊精舍四面歩廊畫壁花塼假山叢竹侈金鑾之宻記建學士之新樓汴宋玉堂尤加藻飾洎乎南渡雖屬偏安而省舍一新濯纓之泉滌硯之澗芸香之亭汗青之軒以及蓬巒松坡蘭畦芝館藥洞菊徑橘洲鶴砌儲圗史輸墨於中故論者以詞臣為神仙之職也明初舊院有修竹林學士黄宗豫寄東里詩云一别詞垣數月餘娟娟修竹近何如北京既建院設玉河橋西堂後有井劉文安所鑿也亭二間凡八楹柯學士所築也井在左亭在右至今入翰苑者以劉井柯亭為佳話而堂後柏二株亦學士所植李長沙選館受業於柯後李教習庶常以學士柏為題汪吉士俊有一日百囘行樹厎之句李悵然有感衍為長歌云我行樹隂日千匝雨葉風技自蕭颯惟有諸生識我情旁人不解空嘲狎我見先生種樹年我身尚短樹及肩枝蟠江山地可縮手斡造化天無權瓊臺翠閣何森爽院栁庭花敢爭長芘䕃長留六月隂盤迴直與孤雲上材堪五鳳難為用根列九泉終不枉零落青袍㡬故人琤琮玉珮空遺響當時院長文安公柯亭劉井相西東百年遺愛豈獨此此樹欲比人中龍柏猶如此我何似巳媿斑白非兒童名収榱桷有先後夀比金石無終窮下堂再拜想顔色仰面正拂長髥風於是倡和成巻以貽學士之子使藏焉盖學士汲引後進孜孜如不及二百年來樹猶勿翦勿拜至今想其文采風流僕嘗思文獻可徵而詞林掌故闕焉不講在道中禁日㑹粹玉堂舊事自唐宋迄明撰瀛洲古錄一編弟子長洲陸肯堂請事開雕謂刋成凡入院者必給一本庶知以古人自期斯文不幸陸生云亡至今藏之篋衍恐終歸覆醬可歎惜也游囊山寺下馬松闗外行行過虎溪鍾鳴知寺近雲暝覺天低斷澗流泉澀平岡古木齊何當一作時謝塵鞅此地卜幽棲王㒜一首㒜字廷貴武進人景泰辛未賜進士第三授翰林編修遷侍講厯春坊右庶子改南京翰林學士陞國子監祭酒擢南吏部右侍郎召為户部左侍郎陞南吏部尚書卒贈太子太保諡文肅有思軒稾李時逺云宗伯為詩清雅間出悲壯之音宿沛縣泗亭驛維舟當泗水凉雨洗炎蒸砧杵孤城月漁舟别浦燈客愁秋更甚鄉夢逺難憑千古龍飛地令人感廢興楊守陳三首守陳字維新鄞縣人景泰辛未進士改庶吉士除翰林編修厯侍講洗馬遷學士擢吏部右侍郎兼詹事府丞卒贈禮部尚書諡文毅有晉菴桂坊鏡川東觀金坡銓部諸集李賓之云文毅詩博采深詣典則溫厚成一家言而愛君憂國感事寓物得諸三百篇者深詩話文懿難經伉伉不屑拾淳熙諸儒遺唾而詩格深穩在唐宋之間其史館感懐詩云在古左右史言動悉分書由漢至國初有官注起居不知自何嵗史職曠成虚有故始闢舘編纂亦紛如新人叙陳迹寜免闊且疎乂云崔杼弑其主直筆遭刑誅二弟相繼死南史猶特書古人守一職往往思捐軀可憐今世士利害論錙銖蓋公留心史學嘗草疏言國史有三大闕事未舉一靖難後不記建文君朝政及方黄死事諸臣一景帝巳復位號實錄猶附書稱郕戾王一章疏留中者不獲登實錄宜宣付史館惜乎疏雖草而未及上也晚語徐少詹云平昔才無半斗而勤作文飲僅數合而喜與客讌行不能里許而好游蓋雅人之習尚然矣游虎丘出城纔數里巳到白雲間但見門臨水那知寺有山鍾鳴僧出定林動鶴飛還石磴行行遍花宫盡啓闗贈周廷參張邵齡二知巳客牕情思渺無涯麥隴蔬畦浥露華白屋三間連野寺青苔一徑入鄰家晴煙亂繞庭中樹夜雨微沾户外花此地幽偏可乗興馬蹄來去豈嫌賒春城遊宴詩蝤蛑石首和椒橙新筍香甘帶肉烹非是老饕偏愛此十年不歠故鄉􅃵童軒一首軒字士昂鄱陽人以天官學入欽天監家於南京中景泰辛未進士以吏科給事中撫川冦謫知壽昌縣久之以太常少卿掌欽天監以右副都御史總制松江厯陞吏部尚書致仕有清風亭稾枕肱集周吉父云尚書九日詩云黄菊酒香人病後白蘋風冷雁來初草堂夜雨生科斗花逕春風呌栗留均佳句也憶金陵金陵佳麗地風景想依然城闕金湯固江山罨畫連晚風樓上笛春水渡頭船惆悵曽游地而今又㡬年王越九首越字世昌濬縣人景泰辛未進士天順中以御史超拜右副都御史廵撫大同進太子太保兵部尚書論出塞功封威寜伯佩征西前將軍印尋加少保兼太子太傅卒贈太傅諡襄敏有雲山老嬾集李賓之云王公歌詩雄邁跌宕若不屑意而竒偉不羣崔子鍾云王公詩明易通暢不事艱刻然氣象雄偉才思煥發王鳳竹云王公摛辭掞藻品格直逼盛唐其忠君愛國之心懇惻流溢良由賦才之竒渾然天成不假匠鑿李時逺云威寜才思之美倚馬萬言往往皆出新意使加以深沉之思豈一時操觚者所能及李舒章云威寜才思敏捷奈其太率不脫兜牟之氣言周青士云威寜詩不雕不琢而符采奕然五如一杯今夕酒十載異鄉人客裏有歸夢眼前無故人石橋平似掌茅屋小於船豆蔓穿籬過苔錢上樹生飛來沙上鷺銜出水中魚夜吟山月小春夢海天遙七言如四面好山朝日觀一溪流水落天門雲間雞犬迎游客雨後兒童埽落花一路草香都是藥滿林樹老盡生苔閒身未老休扶杖短髪無多不受簪風向眼中吹出淚霜於髯上凍成冰愁人正似井中坐好客忽從天上來金縷且聽新樂府鐡衣休話舊軍功亭前春雨一林竹溪上秋風兩岸蘆路隔三千餘里逺月經二十四廻圎百年人得㡬時健一嵗月無今夜明自笑年來長送客不知身是未歸人鵲遺巢去鳩先入蛛曵絲來蝶倒懸山下夕陽芳草路橋邊流水落花村當時只學魯男子今日不如阿大夫莫笑買牛新學稼也曽騎馬舊巡邊不求工而未嘗不工也詩話威寜功紀旂常盟申帶礪立功已足不朽而於詩沾沾自喜長篇奔放如快馬不受羈紲未免有銜蹶之虞雖意在取法盛唐然往往流入擊壤一派其送周宗太詩云可憐相見未能久無那匆匆又分手臨岐把袂且談詩何用尋常一杯酒古詩起於列國前孔子刪為三百篇發乎情性止禮義所以音律皆自然後來風雅不復作獨有離騷味堪嚼秦漢巳下雖頗淳巳食古人之糟粨盛唐取諸杜少陵西晉取諸陶淵明少陵忠義所感激淵明渾然而天成五代之詩無足齒宋人之詩理而巳抑揚辭氣欠從容遂失溫柔敦厚㫖元人之詩學晚唐巧者自巧狂者狂大音元氣日凋喪詩道至此㡬云亡又近體論詩云雕肝斲肺漫勞神語不求竒意自新爾雅本無難識字離騷還有獨醒人蓋自道其所得也中秋對月用孟浩然韻明月下空庭清光寒不濕褰簾坐來久忽見飛螢入空懐寂無聊何處砧聲急對酒不成唫起向西風立榆陵送武靖侯趙公還京古人一日别常懐千里思況在天之涯而與君相離風寒嵗云暮夜永雞鳴遲悠悠行路難苦樂心自知人生如浮雲聚散安可期君歸日以逺我歸當何時豈不念鄉國顧此王事縻霜月滿孤城照見遊子悲遊金龍池雲深池水寒流出青山口雲水復何心鷗鷺自相友時維秋氣凉佳節近重九侵曉解征鞍徘徊日將酉厯覽古遺蹤因之問村叟叟云吾不知世逺人亡久文獻不足徵請看池上柳遥遥數百年今亦半枯朽人生能㡬何少壯忽老醜往事無足論且盡杯中酒見彗野雉雊於鼎桑榖生於朝聖王務修德災患乃自消彗星見東方垂象何昭昭天心愛人君君心胡可驕反身當自責弭此天上妖轉禍以為祥一念之所招金雀花侯門愛金雀金雀顔色好化作枝上花凌春獨開早冶遊亭館多芳容等閒老東風一飄零不及澗邊草初度今年四十八去年四十七明年四十九五十爭㡬日逆數六十來光隂彈指疾七十從古稀八十安可必所以百嵗人千萬不見一嗟哉宦海中悠悠良自恤題蠲上人畫好山萬仞髙插空羣峰竝列青芙蓉大者突兀如盤龍小者箕踞如蹲熊峰頭短樹亂如草凌霄獨立蒼蒼松一重流水一重竹竹邊盡是山僧屋上方下界知㡬重銀杏紅椒滿空谷山中屋貯山中雲山中雲卧山中人山中之人出山去畫裏看山秋復春蜀中送項斯誠同年囘京白髪慈親七十餘不知消息近何如老來賴我供湯藥别後憑誰奉板輿旅館夜長頻有夢故鄉路逺久無書君歸正向門前過為報平安莫倚閭鴈塔慈恩古塔一閒登瘞鶴銘亡問寺僧舊壁遍題唐進士逺烟多見漢原陵感懐巳寄無窮事縱目還須最上層不省風鈴縁厎語只今誰是佛圗澄馬文升一首文升字負圗鈞州人景泰辛未進士累官少師兼太子太師吏部尚書贈太傅再贈左柱國太師諡端肅有集游桃源洞桃花源接武陵溪咫尺仙家路易迷指點秦人舊蹤跡蕭蕭方竹斷橋西姚旭一首旭字景𤾉桐城人景泰辛未進士授刑科給事中天順間以言事謫判鄭州仕至雲南參政有菊潭集管叔城管城廢址草茫茫屈指曽經百戰場但有鴟鴞鳴夜雨不堪車馬送斜陽山含秋色迷孤舘樹引荒雲覆女牆試上層樓頻悵望鎬京離黍總堪傷沈珒一首珒字公貴平湖人景泰辛未進士山東道御史有橋門漫稾柏臺新稾詩話公貴少與兄公禮齊名公禮名琮中正統壬戌進士仕至廣州守兄弟居父母喪廬墓下六年不肉食先後哀毁卒詔旌其宅曰孝行之門公禮詩有石窗漫稾予少日曽見之記有䆉稏香生秋雨後桔橰聲斷夕陽前雨餘竹外僧歸寺日出松顛鶴下巢山花帶雨落成片野鳥見人飛作羣之句今其集不復再覩矣錄公貴詩附識於此題漁隠故居名落人間二十年一溪漁隠自悠然晚風楊柳堤邊笛秋雨蘆花渡口船沽酒肯邀漁父醉枕蓑時伴野鷗眠只今回首成陳迹贏得人稱似輞川李應禎一首應禎名甡以字行更字貞伯長洲人景泰癸酉舉人授中書舍人仕至南京太僕寺少卿有李氏遺集李時逺云少卿詩朗秀沖間巳造中唐佳境詩話少卿入太學中官牛玉請為塾師固拒之在中書日應制冩佛經進曰臣聞為天下國家有九經不聞有佛經也不受命可謂婞直矣歸田後與呉原博史明古張子静輩賦詩聮句其寄友詩云别墅圍棊常載酒晴湖泛月不張帆風流可想也東禪寺松杉滿院風豆莢一籬緑不聞車馬喧時有髙人宿徐溥一首溥字時用宜興人景泰甲戌賜進士第二累官少師兼太子太師吏部尚書華蓋殿大學士卒贈太師諡文靖有謙齋文錄朱懋忠云文靖詩清潤和平足以鳴國家之盛詩話文靖詩不求工然如鳥跡平沙晚花香小徑春但使客長醉何妨酒屢賒綽有風致歸樂堂十年游上國此日賦歸歟倦却風塵路來尋水竹居山行春載酒門掩晝攤書薄暮投林鳥相看意自如何喬新四首喬新字廷秀一云字天笛江西廣昌人冢宰文淵子景泰甲戌進士授南禮部主事改刑部厯員外郎中陞福建按察副使改河南擢都察院右僉都御史廵撫山西召為刑部左侍郎進尚書卒贈太子少傅諡文肅有椒丘集秋懐白露悴百草𤣥蟬寂無聲庭柯歛新翠日夕寒螿鳴感此時序易披衣坐前榮仰視天宇間銀河隔雙星一葦亮可航相望未合并𤣥運亦多阻矧兹塵俗情援琴鼓别鶴感我淚交零登岳陽樓雲牕月牖俯清流滿目山川快壯遊誰向江湖懐北闕謾誇樓閣冠南州朱絃夜鼓湘靈瑟錦纜春廻楚客舟欲起靈均歌九辨灃蘭沅芷徧芳洲擬唐宫詞花貌宫娃老掖庭承恩元不在傾城披香殿上開春讌閒看羣姬弄化生過故相第門掩西風晝不開􅢤蝛滿壁粉牆頽庭前乳犬休驚吠無復懐金暮夜來謝省一首省字世修黄巖人景泰甲戌進士南京兵部員外郎出知寳慶府山行杖屨躋攀到九華不知何處是仙家髙蹤一去無消息惟有碧桃春自花李裕一首裕字資徳豐城人景泰甲戌進士授監察御史陞山東按察使轉陜西左布政召入為順天府尹尋陞右都御史未㡬調南京轉工部尚書改吏部有餘力稾東藩倡和詩渡楊子江曉經楊子渡畫舸一帆輕潮湧金山寺雲連鐵甕城江豚吹浪白海日照林明坐聽鍾聲發悠然物外情張寜十一首寜字靜之海鹽人景泰甲戌進士官禮科給事中兩使朝鮮轉都給事中出知汀州府有方洲集徐子元云方洲髙雅清俊得唐調無王元美云張靖之如小櫂急流一瞬而過復雅觀恩蔣仲舒云靖之既離𤨏闥旋就乞身追念舊愴然興涕歌詩本於才敏終鮮沉思大槩一時之雄終難百世之業葉顧𤣥言云方洲縱調騁情頗稱作者句如林經霜盡河冰近午開殷璠所稱意新理愜斯得之矣詩話黄門賦才㨗敏不費沉思兩使朝鮮水館星郵留題殆遍陪臣朴元亨以刑曹判司為館伴詩篇酬和殊不相下及偕登太平館樓黄門成七言長律六十韻元亨誦至溪流殘白春前雪栁折新黄夜半風之句乃閣筆曰不能屬和矣使旋為大臣所忌出守汀州與岳文肅同日拜命致仕歸而築方洲草堂於海澨疊石為山上有峰曰蒼玉曰拄頰曰小飛来巖曰宿雨曰滴露洞曰歸雲坡曰蘭雪岫曰茶烟嶠曰咏月􅈨曰卓筆泉曰洗研池曰映山皆劖於石而通目之曰一笑山家居三十年歌詩画筆與雲東逸史齊稱暮年無子有二婢子曰寒香晚翠剪髪自誓不下樓者四十年有司以聞詔旌為雙節釋明秀詩云交剪雲鬟報主恩鏡臺花落洗頭盆同心誓死方洲上霜月寥寥夜照門一時和者甚衆黄門嘗過杭州潑墨寫目送飛鴻手揮五絃圗縱横潦草侍婢笑之題詩云閒尋敗筆作圗画小鬟立侍笑欲倒山頭頽似土灰堆樹根亂若蓬蒿草所云小鬟殆即寒香晚翠乎重游金粟寺有作溪廻通小艇山峻露層臺林葉經霜盡河冰近午開閒雲僧出定舊雨客重來擾擾浮生路經過定幾囘感事羽書昨夜報居庸百萬雄師下九重天子垂衣臨大漠羣臣端笏扈元戎禁中巳乏囘天諌閫外誰成闢地功千古澶淵扶日轂令人長憶冦萊公莫愁樂金雀玉搔頭生來字莫愁自從歡去後不出石城游南浦停雲不見同心人相思渺雲樹記得别離時却在飛雲處林良花鳥竹樹晚淒淒天寒相傍棲春風疎雨歇飛上畫樓啼園梅盛開暖透孤根雪乍消冰花萬㸃綴寒條尋幽欲寄山中客忘却西湖有斷橋後浦漁歌欸乃新聲度逺汀烟消日出樹冥冥年來悟得滄浪意長近西堂竹下聽題畫查靄昬黄夜泊船鷓鴣聲裏雨如烟秋風不見平安信夢斷湘江又十年竹鶴老人畫水烟山靄樹冥冥船在丹青畫裏行好是苕溪二三月南邊雨落北邊晴蘋花館宿水停烟綠近牆繞門葭菼共蒼蒼寒香欲薦無人采月落空庭夜有霜寄余驛丞南薫亭館晚相延屈指星霜又十年不是重來渾忘却黄昬舟過驛門前彭華一首華字彦實安福人景泰甲戌進士改庶吉士累官禮部尚書入直内閣以宫保尚書致仕卒諡文思有集明妃曲抱得琵琶不忍彈風沙獵獵雪漫漫曉來馬上寒如許信是將軍出塞難丘濬五首濬字仲深瓊山人景泰甲戌進士選庶吉士授翰林編修厯侍講學士陞禮部侍郎進尚書加太子太保入直文淵閣尋加少保户部尚書武英殿大學士卒贈太傅諡文莊有瓊臺㑹稾李賔之云公之學於詩固有所不屑專而實專門者所不逮程克勤云公詩如仙翁劍客隨口所出皆足驚人雖雅俗正變體裁不一而格律精嚴不失矩度黄才伯云先生信口為詩語皆警㧞詩話文莊於詩不事鍜鍊而矩度自合其與友人論詩絶句云吐語操持不用奇風行水上繭抽絲眼前景物口頭語便是詩家絶妙辭其言未嘗不是第恐學者因之流於率易墮入定山一派不可也擬古依依重依依不忍生别離别離巳可悲況值秋風時栁衰不堪折情苦不堪說願妾為小星君身化明月明月貼天飛小星恒相隨月出星隨出月歸星亦歸莫學秋胡妻相逢不相識生者固可慚死者亦何益送廣東夏亷憲當宁念逺氓塗炭日以極詔簡在廷臣往司風紀職僉曰御史某秉徳剛且直屬耳按左右風聲甚煇赫兵政既以舉吏弊亦以革謡言聞逺近公論推第一無如斯人可拜手答明勅天子曰俞哉起授三品秩天語重丁寜綸命光舄奕百僚無間言相見咸唶唶而我嶺南人慶幸倍千百預為鄉人喜從此得蘇息特恩許乗傳陛辭行有日走也官禁近早有半面識中心久有懐臨分忍緘黙聊為陳本末幸與垂采擇惟兹東廣地冨麗自古昔秦初巳内附漢後亦廣斥東西數千里十郡六十邑衛所錯其間小大五十七憶昔全盛時承平久寜謐家家有蓋藏人人各安適土著少流徙世業足資給士族尚詩禮農家務耕織先期輸賦稅俛首供力役民不受箠楚兵不識鋒鏑行旅不齎糧逺出不待吉昬夜絶剽竊歉嵗無行乞況復天氣暄地利多所獲三冬著苧衣五月収新稙山畬少汙萊水田自潮汐舟游泛滄茫火種燒屴崱曉包趁墟飯晴著登山屐海錯冨蚌蜆家烹剰豚文木生山林珍貨來蕃舶荔奴然火樹橘柚垂金實閭右食素封田圃盛嘉植愛身寜破産終訟羞曲筆遐邇總安恬公私舉豐殖逮及廿年來長吏恣胸臆厚利動其中甘言誘其側欺彼民柔愚藐兹地遐僻遂決禮義防大肆搏噬力把臂褫其衣抉口奪之食溪壑填不滿氣燄撲難熄上下相師承前後遞沿襲豈云無鷹鸇方自為蟊螣天門逺萬里無地訴冤抑致令仁厚性化作兇險質弄兵潢池中延息茍旦夕外邪尋即除中虛遂成疾蠢兹洞中猺窺伺乗閒隙始惟掠近地稍稍出復匿迹彼素脆愞頓異戎與貊制伏本非艱而我狃安逸武胄恥言兵文吏諱申賊縱虎出林薄延鬼入居宅路有横草虞闗無一夫搤長驅捲村落乗夜盜城壁豈彼智有餘乃我法不立嵗嵗轉猖披邊境遭轥轢脅從日漸多兇徒日増益居民就流散人烟渺蕭瑟巳身不自䘏何暇問家室田蕪乏犢耕井渫無人汲萬家春草青一望秋原赤禾麻種殆絶雞犬聲亦寂昬雨燐火青凉月死骨白内地幸茍免因之困供億相扇咸弗靖濡沫聊戢戢方今堯舜朝大臣總臯稷萬國俱時雍一方獨艱阨九重赫然怒遣將擣其天道信好還王師本無敵鼎魚姑假喘穴蟻難藏迹行當見埽平星穢永蕩滌却愁火然岡罔辨玉與石嗟爾嶺徼人罹此殊可惜賈父來每晚謝令去不亟由來非一朝往者何嗟及幸兹天日開光景方昭熠草木回生意山川増秀色福星離紫垣甘雨隨丹軾指日下湞江持節鎮南國先聲一以聞父老懽以泣迎拜古道旁應以手加額願言明使君代天布仁徳為我招殘魂為我肉枯骼為我作保障為我剪荆棘為我開㗋吻為我插羽翼醫我眼前瘡除我腹中我寒衣以裘我饑食以粒生者受我廛死者與我椑一夫或失所孰非使君責使君今巳行行行去須急齊民正倒懸異類尚反仄如病望醫師如旱望雨澤寄聲報吾人此公古難得瘴海行將清貪泉不能惑佇看凋弊區復作全盛域鍾廣漢云長篇銳氣不衰村行萬里勞行役驅車趁晚晴鴉邊殘照逺雨外斷虹明山徑髙低路村舂逺近聲隔林人語寂一犬吠相迎中秋有感客裏逢秋景思鄉倍愴神依然今夜月不見去年人秋思水落淺灘石出霜冷疎林葉丹天外數聲過鴈人在髙樓倚䦨伍方一首方字公矩嘉興人景泰甲戌進士知武岡州謫戍栁州有柳菴集詩話公詎與張靖之丘仲深同年成進士三人莫逆時有倡酬靜之詩云丘仲深伍公矩元是長安看花侣乂云江東雲渭北樹仲深不來公矩去望斷斜陽舊㳺處仲深亦有送公矩之栁州詩云平生故人伍公矩少年學文今學武興來㧞劍為我舞顧儂豈是噲等伍末云呉山髙兮粤水長南歸若見張給事引杯燒燭歌我送行章可謂篤同譜之義矣栁菴集予少日於金明僧舍見之凡四冊曽覽一過今購之不復可得僅從㰎李英華集錄其一絶雖不見好存其人可也畫竹花㸃湘雲墮碧川翠梢零落帶秋煙歸篷記得曽看處殘月黄陵古廟前杜庠一首庠字公序長洲人景泰甲戌進士除知攸縣罷歸有楚游稾江浙歌風集詩話公序從張節之游同學者藐之節之贈詩云炳蔚虎豹文卓犖珊瑚枝學子因改視焉嘗過赤壁題詩張汝弼竒之一時呼為杜赤壁仕既不逹汗漫湖海間自稱西湖醉老莓牆椒壁過輙留題然不經意其可存者寡也寄呉中諸友故園東望路綿綿一别何期竟隔年客思半消春酒後鄉心都在夜燈前杏花村店西山雨楊栁河橋上苑煙欲語平安歸未得自嗟身為薄名牽彭澤一首澤攸縣人景泰丙子舉人春日雜興春隂庭館晝生寒落葉游絲濕作團年少風流今減盡牡丹開遍不凭䦨桑瑾一首瑾字廷贊常熟人景泰丙子舉人處州府通判横瀝口泊舟浦外炊烟起柁牙岸頭茅屋是農家一冬苦雨全無麥二月春晴未見花野渡至今濡馬足江潮久不露鷗沙閒隨漁父談占候怕見朝霞愛暮霞黄瑜二首瑜字廷美香山人景泰丙子舉人長樂知縣有雙槐詩集井㠗宋端宗御舟至此白雁過江南破更無一尺土可坐自閩入廣隨波流塵沙暗天天亦愁黄蘆苦竹風颼颼鷓鴣雨中啼不休上有深井山下有仙女㠗黑雲巻波白浩浩漁舟不到御舟到鱷魚揚蛟尾掉蒼天蒼天誰與告詩話是詩依南海歐奏孚所藏錄本與廣東通志所載不同城西劉王故院江水東流西日斜劉郎綦跡尚天涯昌華苑外裙腰草玉液池邊鼓吹蛙隔隴牛羊聞牧笛遥林烟火見漁家當年翠輦宸遊地留與東風長稻花陳贄二首贄字惟成餘姚人以薦官儒學訓導入為翰林待詔陞廣東參議遷太常少卿有䝉菴集黄太沖云惟成從鄉先生宋公傳張臺民得其詩法評者謂古詩逼陶栁近體駸駸乎盛唐晚發五溪巴川移短櫂正值暮秋天客路猨聲裏鄉山雁影邊蒹葭連晚渚䆉稏滿秋田風物雖堪戀其如歸思牽蠻中蠻溪雨過葉皆流落日猩猩啼樹頭髙竹亂藤茅屋小不知村落屬何州劉英二首英字邦彦錢塘人景泰中郡邑交辟以母老辭有賓山集蕉雪稾竹東小稾湖山詠錄程克勤云邦彦孝友似黄山谷髙蹈似魏清逸曠逹似楊鐵崖其詩精妥流鬯兼備衆體寳峰樓看沈啓南畫因懐畫中詩人存沒尋僧重上寳峰樓撫景興懐不自由東海傷心諸老散西湖回首十年游摩挲舊畫題新句慙愧青山對白頭空負棃花一尊酒無人共載木蘭舟載酒過湖寒食清明次第來紫袍紅蕚裹池臺東風似與人商略最好花枝最後開聶大年五首大年字壽卿臨川人用薦為仁和訓導陞教諭景泰初徵入翰林卒有冷齋集俞汝成云夀卿詩尚襲元調詩話聶大年掌教武林揭對聮示諸生云文章髙似翰林院法度嚴於按察司以是見忤逹官九年不調泰和王行儉掌銓衡以詩寄戴文進索画自叙十年始成大年題其後云公愛文進之画十年而不忘也使公以十年不忘之心待天下之賢天下豈復有遺才哉語稍聞於王而王不介意也天順初被徴入史局病中以詩别行儉曰鏡中白髪難饒我湖上青山欲待誰千里故人分槖少百年公論蓋棺遲行儉得詩泣下曰大年欲吾銘其墓耳明日而大年卒行儉為作墓志曰吾以大年之才必能自振故久不擬薦而乃止一校官邪大年諸體平熟惟絶句小詩差有韻致比於劉泰士亨陸昂元偁馬洪浩瀾王澄天碧諸子似勝之題畫瓜翠實離離引蔓秋西風凉露滿林丘東門尚有閒田地千載無人說故侯題彦顒畫中小景水禽沙鳥自相呼逺近雲山半有無一葉扁舟兩三客載將烟雨過西湖題許上舍家梅花西湖曽繫木蘭橈湖上殘雲雪未消報道南枝春信早移船更近叚家橋夏日次侃禪師韻髙亭暑夜景相和凉月絺衣挂薜蘿楊栁風輕湖面闊不知何處藕花多題仲昭竹舍人老作鄖陽守尚愛揮毫寫竹枝絶似檥舟湘水上鷓鴣啼斷雨來時陳延齡二首延齡初名壽字昌年嘉興人景泰中郡掾吏有玉崖子集題畫二首洞庭微雨曉生波一櫂雲山客裏過綠遍蘼蕪歸未得東風閒唱竹枝歌楊花如雪正殘春新水茫茫浸緑蘋桃葉桃根何處是東風愁殺渡江人劉溥七首溥字原博長洲人宣徳初授惠民局副使後調太醫院吏目有草忩集王元美云景泰中稱詩稾者十才子而劉溥湯𦙍勣為之首侮蔣中舒云溥詩如淮隂少年武健自足時欲人使少加揖遜亦一時名流詩話劉原博湯公讓盛有詩名原博於除夕為劉主事廷美作終南進士行廷美懸之堂上次日賀正客至爭裂門籍紙傅寫廷美笑曰此乃耗紙鬼也嘗語客云不讀二萬巻詩看溥詩不得而公譲守宫詩出一時驚歎以為有神今觀之殊堪作惡時無英雄遂有十才子之目然就諸子而論原博特多忠悱之言於彼法中差勝劉宗器贈詩云心事一於詩激發何慨慷靜中聊自怡鬱抑賴舒暢短章既從容長篇亦跌宕府藏出珍竒鈞天奏空曠正如巨陂中魚龍交蕩漾有時為我歌三歎而一唱未免矜譽過其實矣古意美女出齊州容華世無雙修睂結輕緑麗目曼騰光鮮紈被玉體明月綴兩璫巧笑發春華氣若秋蘭芳窈窕髙樓居宛在大道傍媒氏致千金琴瑟諧髙張既製合歡被復製合歡牀德義茍無虧恩愛永不忘雜詩仲秋凉氣肅白露下庭柯芳蘭委輕飇桂樹行復華俛仰時節至生意迭以嘉理運本自然無為徒咨嗟人生貴有道冨貴安足誇膏火一朝盡撫膺其奈何晚過揚州長安懸落照短擢尚孤征衰柳愁邊斷殘霞雨外明人喧揚子渡鐘動廣陵城漸去鄉闗逺凄然倍旅情使回過獨石邊城二月暗塵沙吹遍東風不見花天逺玉京旋日騎水通銀漢繫星槎雲中路出髙山險上谷雲連獨石斜正是旅愁消未得夕陽樓外又鳴笳江上别相逢蘭渚潮長相送烟江日斜只說儂家易識門前一樹棃花題畫寄徐州陸九臯二首别後重來未有期且憑圖畫寄相思秋風黄葉茅亭上猶記逢君是此時目極天涯酒半醒楓林斜帶逺山青故人家在秋雲外百歩洪邊水繞亭湯𦙍勣二首𦙍勣字公讓東甌襄武王曽孫授錦衣百户轉千户景泰中命通問上皇歸進指揮僉事成化初以叅將守延綏戰沒有東谷集王元美云湯公讓劉原博如淮隂少年斗健作噉人狀詩話徐元玉言於裕陵曰湯𦙍勣酒風漢耳鄒克明嘲以詩云湯家公子善夸詡好似蚍蜉撼大樹文章光燄萬古長却說杜陵無好句當時公論蓋未盡輸心也程克勤為作傳稱其詩豪邁奇崛名家退避豈其然乎然使不辱命死於疆場則誠豪傑之士矣游仙月照參差海上峰飈輪度處滅行蹤𤣥㝠宫裏通宵宴傳得新方解豢一作擾龍巨俠獵火茫茫照四山青衣小隊射生還貂裘㡬㸃輕盈雪月照城門未上鐶蘇平四首平字秉衡海寜人舉賢良方正不就有雪溪漁唱陳廷器云二蘇㫖趣髙逺聲律和暢昭乎治世之音李時逺云平詩温柔敦厚自是可人詩話鄭谷鷓鴣崔珏鴛鴦謝逸蝴蝶袁凱白燕皆以一詩目之終身至蘇秉衡以繡鞵得名風斯下矣即其南陌􅂿青春有跡西廂立月夜無聲二語乃本於瞿宗吉少時香奩之作所云燕尾㸃波微有韻鳳頭踏月悄無聲也以吞剝而得虚譽忸怩巳甚而秉衡妄為大言謂宋一代今體詩僅王禹玉元夕一律彷彿唐人髙青丘詩二千首近體止呉女誦經一首可取爾當日鄒御史克明作三夸詩以秉衡為首其次楊公讓其次劉原博克明名在十子之列在同調亦不免嘲笑之他可知矣雜詩彼美南國姝婉孌貞且良丹霞製為珮明月懸為璫白玉蓄光采幽蘭含芬芳見者咸歎息不殊古姬姜世無蹇脩氏玉帛誰為將黙黙處重闈何曽下中堂容顔豈不好攬鏡徒悲傷但恐芙蓉花零落隨秋霜寄金粟王公子中夜百憂集攬衣起傍徨明月揚素輝列宿互低昂耿耿河漢流肅肅鴻雁翔念我同心人渺渺天一方昔為雙游魚今為孤飛凰援琴不成曲展轉憂思長豈無蕙蘭花為君掇其芳道逺莫致之中懐徒自傷塞上曲戰馬聞笳鼓横行出塞門隴雲凝陣黑殺氣入邊昏決策平沙漠捐生報國恩猶慙漢公主萬里嫁烏孫班媫妤一自辭同輦深宫草又生甘隨紈扇棄猶記玉階行明月愁中影流鶯夢裏聲笙歌前殿夜教妾若為情蘇正一首正字秉貞平弟有雲壑集江南旅情天涯為客久生計日蕭條旅思一作況頻看月鄉心獨聽潮春歸江上早家在夢中遥無限相思意東風白下橋蘇直一首直字秉忠平弟有蘭畹集詩話秉衡兄弟三荆同株無分髙下送人東歸東風官路栁依依目送鄉園賦式微晚渡雨晴孤櫂發春江潮落逺人歸夢囘野戍遥聞角家近滄洲獨掩扉惆悵天涯同是客臨岐那忍又相違蔣主孝一首主孝字務本儀眞人徙句容有樵林摘稾無題鳳輦春游繡嶺宫閒庭小雨落殘紅貞元朝士知誰在一曲琵琶月正中蔣主忠一首主忠字存恕主孝弟有集芙蓉清露下林塘波光淨如洗中有弄珠人盈盈隔秋水沈愚十一首愚字通理崑山人自號崆峒生有篔籟呉歈二集詩話景泰十子才多下中通理特為翹楚同輩極其引重劉原博題其集云清如玉樹含秋霜麗如五色雲錦張琅然天外度靈響一曲一奏春風香蘇秉衡贈詩云玉山才子東呉英丰姿皎皎冰壺清胷中磊塊含元精騷壇少年推獨歩天仙鬼仙何足數又云多君祗今英妙年巳有新詩滿人口俊逸還凌鮑謝前清新肯落盧王後王善甫贈詩云玉山沈郎更潚灑芙蓉秋水涵冰姿摩挲石壁寫新句毫端墨汁光淋漓䖍州黄進士閏詩云多情才子惜春華樂府新聲對客誇朱雀橋邊舊游路東風開遍小桃花誦之可想見其人矣余初見吴歈集錄其三詩近東田學士示以先世手抄篔籟集私印尚存増益八首詩諸體皆清穏而絶句尤矯矯軼羣在劉白之間題畫二首云汀蒲短短栁􅆴􅆴三月桃花水滿潭攜酒抱琴同一醉人生只合住江南山邊臺榭水邊樓秋月春花足勝游平厎畫船如屋裏人生只合住蘇州通理兄弟四人愚魯質訥魯字誠學以學官弟子入塲屋望見諸生蓬頭赤脚歎曰待士如此士可知矣遂走出不復與試以文筆自娱嘗作劉過傳西楊見而擊節曰如此人當以翰苑處之或勸其入都往謁不屑也訥字文敏中正統壬戌進士仕至福州按察副使卒于官仲季皆能詩所著集不傳學士誠學之雲孫也與予同年入翰林述其家世本末如是閶門栁枝詞二首小蠻能唱白家詞笑把纖腰鬬柳枝愁絶樽前春未老風流太守髩成絲枝枝揺翠綰香車占斷春風日未斜記得臯橋舊游處緑烟深鎻泰孃家舊游即事冶城東畔舊亭臺寂寂朱扉映竹開一樹碧桃都落盡去年蝴蝶却飛來寄淮南江南相望路迢迢風滿闗河雁影飄最好鳳凰臺上月共誰攜酒聽吹簫過桃葉渡江花含笑欲爭春江水籠烟栁色新商女停舟唱桃葉東風愁殺渡江人石頭城谷口青鞵踏軟沙橋頭艇子載琵琶春風何處尋芳好盧女門前㡬樹花金陵九日京華風物近佳辰黄菊秋香漉酒巾欲上鳳臺同一醉客邊誰是故鄉人閶門夜泊絲絲楊栁拂官河烟際樓臺隔岸多此夜闔閭城下泊滿船明月聽呉歌旅次送晏振之西風孤櫂楚江濱烟水殘陽照白蘋厎事送君情轉切只緣身是未歸人旅次石城水落寒江露淺沙斷隄烟柳集昏鴉樽前冷笑陶彭澤三逕秋香負菊花陳宫懐古景陽宫井積浮埃三閣遺基半綠苔惆悵後庭花落盡黑頭江令獨歸來鄒亮一首亮字克明長洲人用薦授吏部司務遷南京監察御史有鳴珂漱芳二集詩話克明受知於周文襄用況守伯律薦授官嘗撰詩宗韻海未就而卒自稱梅崖亦曰藻菴居士病中自撰志銘謂脩短有數遺墓在長洲縣金鵝鄉志中不及劉湯諸子姓名非其所矜式也長信宫妙舞方承寵愁懐獨感傷金輿門外度紈扇篋中藏别殿生秋月空階落晚霜凉飈如有意渾不到昭陽王淮二首淮字柏原慈溪人有大塊稾詩話伯原淹博號行袐書詩殊淺率寄吴廷圭雁呌新霜九月時客邊節物倍淒其風吹敗葉藤纒屋雨濕疎花豆壓籬八跪蟹肥村店酒一行鷺促野橋詩待君流水柴門下共醉殘陽倒接䍦秋夜書懐破窗燈火黯淒淒一榻空齋抱影棲愁斷關河千里雁夢回風雨五更雞田荒故國蒼苔遍路接長亭碧草迷歎息此身縁底事十年蹤跡苦東西王貞慶一首貞慶字維善一字善甫定逺人駙馬都尉永春侯寜之子有茗艼集詩話善甫懐慶公主所出生於侯門而能脫去紈綺之習築别業於聚寳山中闢一軒繞以桂樹因自號金粟主人能書善飲酒名其詩曰茗艼集羊城陳廷器序之送沈崆峒歸玉峰客従東呉來暫向金華住看遍京華春更憶東呉去秦淮橋頭烟栁青執手臨岐别恨生扁舟後夜知何處月色江聲無限情明詩綜巻二十五
