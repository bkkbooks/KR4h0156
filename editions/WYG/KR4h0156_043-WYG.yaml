body:
  text: 明詩綜卷四十三翰林院檢討朱彞尊編文徴明十五首徴明初名璧以字行更字徴仲長洲人以歲貢入京用薦授翰林待詔卒私諡貞憲先生有甫田集顧華玉云徴仲七言詩愜當飄逸唐風宋語兩相融化自是一機軸也又云文璧蔡羽徐楨卿邢參藻詞成章雅論合則雖方古作者未能卓然而碩學茂才固今之雋傑矣王元美云文徴仲如仕女淡妝維摩坐語又如小閣疎窗位置都雅而眼境易窮又云先生詩傳情而發娟秀妍雅出入柳桞州白香山蘓端明諸公間俞汝成云徴仲詩似晩唐參以元調穆敬甫云徴仲書法髙一代詩亦秀雅可傳顧𤣥言云待詔詩從實境中出特調稍纎弱耳陳卧子云衡山詩尚平實韻致却勝静志居詩話先生人品第一書畫詩次之胥臺袁氏十懷詩其一云内翰小子師卓行古人傑辭金抗幼齡解組修晩節丹青紛雲烟篇翰爛虹蜺瑚璉世所珍昭代表三絶可謂片言中倫矣先生嘗語何孔目元朗云我少年學詩從陸放翁入故格調卑弱不若諸君皆唐音也然則文之佳惡先生得失自知豈與左虛子輩妄自夸詡者比哉今甫田集詩十五卷集外流傳者尚多蓋先生作書最勤兼畫必留題予嘗見所寫朱竹即以朱書題詩其上惜無好事者廣搜為續集也曩從父維木公治别業於碧漪坊北池荷岸柳有軒三楹懸先生手書於壁即池上一詩少時諷誦至今猶未遺忘因附録之視集中所載尢出塵􅅽之表拾遺珠於滄海天下之寳當與天下共之矣早起露坐炎宵不能寐起坐褰絺幃緐星麗中天明河連曙暉凉風不滿鬢落月猶在衣中庭草木稠宿露朝未晞人生亦旦暮急景無停機撫時懷美人欲徃情依依暑寒互推遷安得願無違秋日同杜允勝湯子重遊東禪寺次子重韻人事無停機曦暉正流耀及兹東城遊駕言謝紛要杪秋霽景澄寒原入髙眺静躁本無媒憂欣自人召蘼蘼霜蘤明歴歴幽禽調獨行心已怡况也偕二妙燕談析𤣥㫖悲吟發孤竅一語何足稽後期真未料微風西北來泠然雜清嘯追和錢舜舉山居圖翠深山帶屋緑净水通門泉石情還重丘園道自尊種莎添野色留竹䕶籬根樂事惟心㑹休逢俗子論飲酒晩得酒中趣三杯時暢然難忘是花下何物勝尊前世事有千變人生誰百年唯應騎馬客輸我甕頭眠何元朗云雅致絶似白太傅雪後寒日晶晶曉溜聲中庭快雪一宵晴牆西老樹太骨立窗裏幽人殊眼明想見漁蓑無限好怪來詩思不勝清江南殘臘相將盡㑹看門前春水生新秋江城秋色净堪憐翠桞鳴蜩鎻斷烟南國新凉歌白苧西湖夜雨落紅蓮美人寂寞空愁暮華髮彫零不待年莫去倚闌添悵望夕陽多在小樓前春日遊支硎天平諸山麥隴風微燕子斜雨晴雲日麗江沙遥尋支遁烟中寺初見天平道上花過眼溪山勞應接方春草樹發光華夕陽半嶺歸輿急慚媿城中自有家夏日同次明履仁治平寺納凉竹根雨過石苔斑鐘梵蕭然晝掩關坐愛微凉生碧殿忽看飛雨失青山雲分暝色來天外風卷湖聲落樹間最是晩晴堪眺詠夕陽横抹蓼花灣滄浪池上楊桞陰陰十畆塘昔人曾此詠滄浪春風依舊吹芳杜陳迹無多半夕陽積雨經時荒渚斷跳魚一聚晩波凉渺然詩思江湖近便欲相攜上野航致仕出京言懷白髮蕭疎老祕書倦遊零落病相如三年漫索長安米一日歸乗下澤車坐對西山朝氣爽夢回東壁夜窗虛玉蘭堂下秋風早翠竹黄花不負余夜坐殘月耿猶在流螢忽自飛一聲何處鶴露下欲霑衣春日懷子重履約履仁湖上花枝煖欲然寺前楊桞緑生烟憑君莫信春光早寳積山頭有杜鵑題畫二首新霜㸃筆意蕭蕭不盡秋光鴈影遥雙島欲浮天拍水夕陽人在虎山橋江頭春水綠灣灣江上春山擁翠鬟老我輸他茅屋底無愁終日對江山池上單鳩喚雨䨇鳩晴池上桞花縱復横好風忽卷讀書幔及君到時春水生蔡羽三首羽字九逵吳縣人以太學生赴選授南京翰林孔目有林屋南館二集王元美云蔡九逵如灌莽中薔薇汀際小鳥時復嫣然一覽而已逵穆敬甫云蔡詩沖雅不俗顧𤣥言云蔡九之整秀黄勉之之典麗王履吉之華蔚顧行之之顥約陸子淵之清潤彭孔嘉之精彩可得並駕李時遠云九逵薄少陵為不足法可謂蚍蜉撼樹詩話杜詩韓筆百世之師也人其可自絶乎孔目於詩文髙自標許以少陵不足言所著者建安西京韓桞不足言所撰者先秦兩漢今其集具在篇無妍辭句無警策此猶淮南帝前自稱寡人夜郎天末不知漢大妄人也已其自序云古之言者必有得有所得而不言與無所得而言均非也其言誠是矣第不知何者為孔目所得雖有詩賦八百餘首文二百首恒河之沙鈎金安在而或者曲為解嘲其誰信諸思田園南方樹藝早嘉蔬當及時王官鑿氷罷忽起田園思東郊織臺笠西郭編茅茨田家不辛苦衣食當待誰曵裾京華塵徒然惰四支秋泉我愛秋泉清况傍巖花滴魚遊日光中倒見潭上壁引奏後即事金水荷花接綺軒石渠銀鑰掌中閽西崑學士封麻晩斜日猶開左闕門湯珍四首珍字子重長洲人以歲貢生除崇德縣丞遷唐府奉祀不赴致仕歸有小隱堂詩草王元美云湯子重如鄉三老入城威儀舉舉終少華冶態而王敬美云子重詩清雅怡和與文徴仲同調駸駸時欲度之詩話子重十試不利晩就一官其之崇德時文徴仲作澹著色山水圖送之景甚蕭逺知其人定拔俗讀浪淘沙詞直詣劉賔客神境非五岳九逵所能及也觀雨作温風鬱蒸溽浮陰昏混茫始迷青嶂色繼隱朱陽光霏霏灑甘澍浥浥潤下方竹添新籜翠草起枯荄黄熈然厚土内生意咸舒張憂時切經旱喜坐開山堂鑒彼造化機推遷自有常燥餘必反濕炎及乃回凉君子蹈恒運小人乖禮坊貪夫鮮終克静俟多徜徉秋日遲文衡山先生不至肅肅振飄風霏霏灑芳澍遲客向南軒徘徊倚庭樹俶裝戒星來傾曦未云赴集本有得非為物牽無乃返中路鳥鳴不相求反已每自顧四句我思鬱以煩孰克探其故沉憂抱孤景中結豈外慕申訊吐清謡殷勤待良晤浪淘沙二首淮河一道達清河如此風波可奈何東岸沙崩西岸長南船來較北船多灩澦瞿塘險未平衝沙惡浪總堪驚相逢盡説公無渡蜀道何曽斷客行蔡靈三首靈字夢晉吳縣人詩話孟晉狂生遊枝指生之門其畫山水足亞伯虎對酒一詩可稱絶唱臨終詩云垂死尚思𤣥墓麓滿山寒雪一林松如聆雍門之琴頑豔亦為淚下春暮送友三月正當三十日一壺一榼一孤身馬蹄亂踏楊花去半送行人半送春對酒隱隱江城玉漏催勸君須盡掌中杯髙樓明月清歌夜知是人生第幾回題唐子畏畫卷黄茅渚頭熨斗柄唐子好竒曾屢遊太湖烟景此絶勝還許吾輩閒人收凌震二首震字時東烏程人正德中貢生黔陽儒學訓導有練溪集鄭茞畦云練溪詩清婉可誦出宿悠悠出門來戚戚念家室三里一回頭五里淚霑臆託身百年中何必遠行役上攀猨鳥道下俯鮫人宅性命不足憐仕宦亦何益卓哉有陶公千載為我則倦鳥思舊林翩然返其翮捉蝨我先老妻眠解衣置熏籠老妻為捉蝨略與捕賊同明燈集女隸獲多者論功先之以縁督次則殺縫中㫄蒐與奧討指殪兼牙攻聲言具湯沐㑹使巢穴空我聞雖不語慙恧無地容彼貴寢狐貂彼富錦繡蒙旬更月必換日夕沉水烘何縁有胎媒使汝得濳踪乃我衣垢敝遂為汝所宫澣濯既不時煬竈亦何功再思也不然肉甘汝攸從昔有嵇叔夜矯矯其猶龍又有王景略古所謂英雄伊豈乏冨貴汝視如寒窮侵肌咂膚理戢戢攢銛鋒爬搔未始歇捫撮當王公吾何為汝諱不汝饑餒供陳鐸一首鐸字大聲下邳人睢寧伯文之曾孫世襲指揮家南京有秋碧軒香月亭詩集卞華伯云大聲詩用意和平不務雕刻深入虞楊范掲之閫奥而漸登盛唐作者之階梯宿牛首寺到寺萬縁歇蕭然宿峰頂蒼蒼野色新漠漠秋烟暝天風在林末空翠散復整支郎繙經處松子落古鼎微凉入虛檐老鶴飲淺井相期話三生夜坐石根冷疎竹何蕭蕭雲房亂燈影徐霖二首霖字子仁吳人徙南京補諸生坐事削籍武宗南狩召見欲官之固辭賜飛魚服扈從還京後歸里有麗藻堂稾周吉父云子仁詩才篆法丹青樂府俱稱能品詩話髯仙多能藝事書畫之外工塡南北曲文徴仲贈詩云樂府新傳桃葉句彩毫徧寫薛濤箋所築快園康陵南巡兩幸其居有晩静閣宸幸堂浴龍池及扈蹕入都每夜宿御榻前與帝同卧起永陵之初威武近幸多逮治坐罪惟子仁脱然亦滑稽之雄也舟中雜詠二首緑樹坐黄鸝青秧㸃白鷺睡起倚船窗知是江南路今夜河西宿無眠但數更竝船何處客吹笛到天明謝承舉一首承舉初名璿字文卿既更名改字子象上元人有野全子集顧華玉云近時李西涯主清婉陳白沙主沉雅莊定山主渾雄竝尚理致金陵有二才子謝子象徐子仁凌踔詞苑徐得其婉謝得其雄然徐之學西涯與謝之學白沙定山皆虎賁之似中郎耳驚陳羽伯云野全詩如奔流掣電時一人吳歌秦淮女郎歌柘枝隔岸吳兒調鳯絲聲聲互荅緑楊裏正是離人腸斷時金鑾十二首鑾字在衡隴西人僑居南京有徙倚軒稾俞汝成云山人詩多逺思别於常調詩話白門詩家有金琮元玉金丹赤侯金大車子冇金大輿子坤金鋹竹溪均著詩集諸金之中吾必以在衡為巨擘焉其五七言近體風情朗潤譬諸斛角靈犀近之遊塵盡辟矣至若明月照人千里共涼風吹靣五更多尤為警策立秋日呈一二知已久雨銷長夏凉風生早秋野航如市集江水入城流迂闊從人笑艱難豈自謀違時况多病寂寞戀交遊登滄州城渤海髙人去仙臺古蹟存風沙吹不斷天地與同昏野水添新渌空烟集暮村故園桑柘裏悵望一銷魂哭湯沂東開府赤手揮戈日丹心報主時不曾辭力盡那復計身危夜雨藏兵峽秋風墮淚碑惟餘舊戎馬汗血至今垂子房山報主元非漢封侯豈為留早求滄海士晩伴赤松遊故國山猶在黄河水自流王孫歸去好春草徧芳洲北河道中叢臺北向通燕谷曲渚西流繞薊門歸鳥亂啼原上樹夕陽多照水邉村因悲俗吏趨三輔曾有新詩寄陸渾歲歲别來春又暮幾回芳草怨王孫重過歌臺追憶髯仙竹谿二徐老山公曾醉習家池潦倒當年舊接㒿再過已驚非故主相逢元不是新知屏花帶雨春還麗水檻臨風晩更宜幾度壚頭覓嵇阮紫蕭攜向月中吹除夕還憶去年辭白下却憐今夕在黄州空江積雪添雙鬢細雨疎燈共一樓世難久􅂸魚鴈絶家貧常為稻粱謀歸來故舊多凋喪愁對東風感壯遊送友人南還錦堂歌出酒初陳銀燭燒殘月半輪青海共驚千萬里白頭相對兩三人伊州折桞傷遲暮江縣逢梅入小春去住關心各無那西風滿道起秋塵感燕故園門巷近烏衣但見花開燕子飛一自天涯與相别可憐春盡未知歸綠楊庭院傳聲杳芳草池頭顧影稀何處脩梁更堪寄日斜江上倍依依九日喜河上宼平奉簡二三知已聞道官兵下泗州五河羣盜已全收可憐白首重生日却喜黄花正及秋多病不妨連夜飲故人還為幾時留西風莫趁歸心急吹落清江數㸃鷗春城曲雨餘芳草逺萋萋春暖遊人信馬蹄日暮畫樓歸去晩落花香裏路東西寄吳厚丘黄金散作買花資白首誰能戀故知同作孟嘗門下客西風吹鬢獨歸時邢參一首參字麗文吳人有處士集詩話麗文狷者平生不事干謁苦志讀書除夜有海估以百金乞墓文峻拒之抱膝擁衣饑以待旦其介如是明初髙侍郎季廸有北郭十友麗文亦有東莊十友吳爟次明文徴明徴仲吳奕嗣業蔡羽九逵錢同愛孔周陳淳道復湯珍子重王守履約王寵履仁張靈孟晉故其詩云昔賢重北郭吾輩重東荘胥㑹誠難得同盟詎敢忘麗文遺集罕傳予從金處士侃借得手鈔本録竹枝一首錢氏列朝詩神鬼門載桃花仕女詩八絶竹枝三首在焉其二則山桃花開紅更紅西湖荷葉緑盈盈皆麗文集中詩所云紹興上舍葛棠夜飲圖中美人歌詩百絶侑觴乃好事者為之不足信也竹枝詞家住東吳白石磯門前春水浣羅衣朝來繫著木蘭櫂閒看鴛鴦作隊一作對飛王寵三首寵字履仁更字履吉吳縣人以諸生貢入太學有雅宜集顧華玉云履吉詩刻尚風骨擺脱輕靡既正體裁復滅蹊徑五言沉鬱類曹植鮑昭七言跌宕類杜甫岑參近體與盛唐諸家相雄長袁永之云王履吉綺辭壯思滔滔不休其詩初宗李既宗杜去輕麗而就沉著尚鋪綴而略陶鎔王元美云王履吉如鄉少年久遊都㑹風流詳雅而不盡脱本來靣目又似揚州大宴雖鮭珍水陸而時有宿味穆敬甫云履吉詩如雨後芙蕖綽約有致可俞汝成云履吉情孚義悉句秀字工在吳中稱作者氣何元朗云王雅宜詩清警絶倫無一㸃塵俗真天上謫仙人也所欠者沉著耳中道而夭未見其止惜哉詩話履吉亦中材爾諸公惜其早亡譽之未免過實聽琵琶紫塞傳龍撥崑丘學鳯鳴春風吹白雪總是斷腸聲司馬千行淚明妃萬里情當杯愁未已天末海雲生一作横辛巳書事居庸碣石控關門玉几由來北極尊閣道逶迤經海岱天河隱見出崑崙斗閒遂識三階列日下從知九軌奔奠鼎卜郊非細事萬年圭鬯保文孫虎丘送許仲貽旗亭卮酒送君還去鳥流雲信宿閒日暮銷魂此回别望君重上虎丘山沈翰卿一首翰卿字子羽江隂人儒學生有石灣集懷施武陵子羽天子觀射臨澤宫三矢中鵠欽英風鹿鳴嘉賔慨未逢髙篇重許合大雅置之建安七子中詩話子羽詩尚穩帖如此語雖未工取其立格疎硬張詩一首詩字子言本姓李宛平人有崑崙山人集王元美云張子言如甘州石斗色澤如玉膚理麤漫詩話岳氏今雨瑶華以崑崙山人詩壓卷然詩實不工方棠陵誚之曰君詩雖佳第情實如無山稱山無水賦水非歡而暢不威而哀是已是亦切中其病送吕思抑募兵遼東六郡募竒兵三韓列漢營甲光開絶塞海氣動髙旌楊桞闗山月梅花雨雪情引弓十萬衆不敢復横行鄭作四首作字宜述歙縣人自號方山子徃來梁宋間李夢陽流寓汴中招致門下有方山子詩選汪禹又云宜述詩大㮣悲壯氣王仲房云宜述家本商賈讀書苦吟為人負任俠故其詩雄渾跌宕有風骨詩話宜述遊汴際空同詩名未大盛時北靣稱弟子以是空同深愛之何大復所云老鄭空同客也其詩經空同選擇序而傳之且為作方山精舍記又贈詩云近時好事最者誰徽州鄭生差愛我今觀其詩頗俊利逺勝五岳山人聞鴈秋日江南去春風塞北歸祗愁羅網密敢戀稻粱肥獨徃寒天逺髙飛舊侣稀游人夜不寐感爾涙霑衣登髙萬里登髙望烽烟接汴州愁生一作添飛鳥外心逐一作亂大江流弟妺今何在干戈卒未休前行塗路阻踪跡且淹留客中聞四弟消息昨遇梁園使孤城舍弟居干戈長在目烽火不通書汝計猶長鋏吾心已敝廬兩鄉千里隔相望各霑裾除夕除夕愁難破還家夢轉頻十年江海客孤館别離人殘漏聽還盡寒燈坐愈親梅花滿南國誰寄一枝春程誥十一首誥字自邑歙人有霞城集李獻吉云程生詩神境融㑹足以散置名家助王仲房云自邑足迹半天下其詩得山川之為多體裁既全篇章過冨珠以沙迷反滋識者之憾詩話自邑好為汗漫之遊山川郡邑凡所經歴必紀以詩氣格專學空同第才情稍鈍色澤未鮮五言庶稱具體秋陟靈金之巔由范坑過舍頭至靈陽憇方氏山館入山恨不深采芳思凌緬戒嚴事初程憑虛瞰前峴氣逼日始熾光滿露猶泫奔峭既厓陟盤曲亦磴轉步迅險易踰憇頻䕃難選俯眄巢枝禽仰聆吠風犬想像巖居人于焉傲軒冕瑶華若堪把白雲况在眼撫物興彌敦觀化理誰遣試語同懷人朅來此棲衍遊齊山城市意弗適烟霞夙所尚逍遥越崇堤徙倚對層嶂峽存巨人跡亭紀使君創洞入身暫屈厓陟首屢仰雲竇凝不開石門屹相向寄隱固我慚集仙竟誰當寄隱集仙巖洞名也尋覓悵遺跡歴覽訝殊狀來頻心有得興至情益放留連暮未返引領月欲上自秀山深入陟巘自我客秋浦秀山亦屢入顧兹竒勝多恨未徧探歴今晨興忽動捫葛履危岌石拂既久坐厓倚亦暫立香氣暗忽度碧光深可挹行迷儔侣遥喜溢僕御及飄飄驚風來陳陳吹雨急蠟屐早已著蘿衣不妨濕登吳山蘿磴凌晨上松門倚杖逾風烟攬吳越表裏見江湖水逺雲俱白峰髙日已晡賞心延縱目邂逅此山隅登北固山松林度幽僻蘿磴轉孱顔眺望堪千里東南有此山江流包楚徼地勢控吳關萬古登臨意風檣不暫閒白沙逢余子陳却送之金陵新詩滿行槖相見未遑論趁月浮江舸乗潮入郭門聽歌桃葉渡問酒杏花村羡爾遥乗興無由共舉樽峽夕楚塞連三峽巴雲暗五溪鄉心春鴈過客淚夜猨啼百丈縁流險雙厓壓樹低孤城丹巘麓江白露凄凄夜泊乾灘寄肇之江㢠月娟娟蘆花渚路連暝沙團宿鷺風樹曳驚蟬廟祭傳儺鼓津喧索渡錢愁心付漢水遥寄秣陵天市汊驛下阻風江干日色黄北風怒不已君看上水船一日三百里琵琶亭殘照亭皋夕秋風旅鴈飛琵琶千載恨淚滿逐臣衣洛下逢汪子明我行西入秦驅車洛陽陌相逢故鄉親况是東歸客髙瀔一首瀔字宗吕􅇋官人有霞居子集詩話少谷居鼇峰北從之遊者九人郷䣊目為十才子少谷詩所云一時賢士俱傾蓋滿地萍蹤笑舉杯是也九人者髙二十二宗吕居首傅二木虛次之餘有林九王七施二其名不得而詳矣宗吕家最貧少谷稱真事母至孝事兄至悌又稱其甘貧守節安安然人無知者蓋髙傅為鄭門弟子之冠少谷於傳盛誇其文於髙則美其行云岳陽樓巴陵城上岳陽樓樓外長江日夜流殘雨數聲衡岳曉暮霞孤鴈洞庭秋仙人夜奏沙邊笛估客春移樹杪舟十二危欄閒極目滿汀楊桞不勝愁傅汝舟三首汝舟字木虛一名丹號丁戊山人一曰磊老候官人有前丘生行已外篇鄭繼之云生詩淵致蕭散多發之性情其道江湖林壑神仙隱逸直臻其要妙上下魏晉抗聲于武德天寳之問大厯而還不論也王道思云汝舟才知文采足以得意仕進獨舍去而不好其舍之盡至於郷井屋廬不復可居而妻子不足畜也舉一世之榮利無足好而區區吟詠之工不能忘亦其才知所斂不可終藏而見之於此也少王元美云傅汝舟如言法華作風語凡多聖俞汝成云汝舟詭怪聱牙難於諷詠尢徐興公云汝舟詩雖師鄭吏部而天然之趣勝如雖貧一榻能髙卧縱老名山恣逺尋異書自得作者意長劍不借時人看此等句吏部當為却步矣詩話前丘生詩刻意學少谷子故多崛竒語句如楚樹懸猨直衡雲帶鴈斜宿雲長抱殿遊鶴不歸松野客逢迎少山僧出入尊白為溟海浪青盡島夷山地濕菰蒲氣風生鸛鶴毛皆鎚錬而出不肯猶人生弟汝楫有句云種桃求漢核食棗想齊花頗饒韻致汝楫字木剡亦有詩名時號二傅或是鼇峰九人之一乎宿山心永樂朝登三仰峰夕宿山心菴久入名山遊蹊徑頗盡諳始知九曲外復有南山南森邃更險豁深篁倚烟嵐沙田稻翼翼巖桂花毿毿疎籬隔鷄犬朽樹藏蜂蠶嘗傳武陵原㫄有捕魚潭伐木不到逺却留松與楠雲光卸秋屨回首望石龕經旬四攀眺偃息此日堪澗芹食轉美草榻卧正酣枕中有鴻寳何必問周聃未至白墖投宿新坪農舍雲洞更何許新坪又一村前林露微月半嶺聞驚猨野老不避人篝燈候茅屋始笑行路難百里已三宿月下月明坐空山不覺石苔冷猨嘯揺藤蘿亂我松桂影傅汝楫一首汝楫字木剡汝舟之弟有卧芝集過石田草堂哭之頻年我理吳航至幾度相逢笑口開沙雨江風今日淚歲寒愁絶是重來石麟一首麟字永也桐城人詩話永也白果歌載龍眠風雅未免冗長予為芟汰存之其曽祖英字内含正統閒居郭圵古塘享年一百有三生七子二十三孫有同庚友許澹初魏谿叟年九十時棄家學道不知所之内含百歲之日賦詩憶之云庚申共守人何在甲午同生獨詠詩樹即内含所植也白果樹歌先人卜築闢榛蕪手種白果樹兩株愛他離離祗結實曾無花謝花開日兩株樹各七分枝樹下人家亦七支聞昔蓂莢葉象十二月南海一風草一節由來草木知先幾人中之幾知者稀錢元善一首元善號存菴桐城人刑部尚書如京子以廕官都督府經歴終魯府長史春日感懷春風三月景依然弱桞遊絲觸處牽家逺隔年無信到官閒鎭日枕書眠林鳩逐婦晴還雨沙燕將雛去復旋遥憶故園春更好江樓背郭看鉏田程佳一首佳字令甫休寧人獨坐空館寂無人摵摵鳴木葉乍疑風雨聲忽見當窗月陳璽一首璽字德符閩縣人有守魯集斑鳩香禽自何處共立枝頭語喚起曉耕人西疇足春雨徐定夫一首定夫字士安海鹽人有蛩吟稾夜坐懷石林茶谷二上人林秋萬籟集木葉下髙岑佳人渺何許月明空此心夜久河漢没凉風飄衣襟徘徊寂無語幽意託孤琴引領西巖下俄聞鐘磬音戚韶五首韶字龍囦松江華亭人有集孫貞父云龍淵詩如燕趙竒士矯伉自信又云龍淵詩竒崛自喜終少藴藉詩話龍淵逺宗楊陸近學莊陳嘗遍和谷音古詩七律頗饒跌宕之趣孫少保毅齋合王鶴坡張一桂集題曰三詩翁鏤板傳之三君皆珠涇鎭人也初夏即事緑隂清館午風凉花落晴溝水亦香市擔鰕魚從曉賣鄰家櫻筍及時嘗筐盛雜絸繰絲急場撲飛蛾打麥忙寒食過來芒種近穀芽今似韭芽長買舟兩兒扶醉采芙蓉驚喜扁舟落手中到處溪山堪出入此身天地任西東出門便覺輕千里伸脚還能睡一翁昨與河神澆福酒三江吹斷石尤風自注家有奥堂和陳簡齋清明日虛名何苦要人知五十稱翁較未遲造物於人固多忌清明今日可無詩百年臣子麤安日八口妻孥向老時筋力漸衰雙眼涩一生正坐讀書癡春日江上江晴燕子故飛飛江上春帆何處歸南浦久懷芹菜美北山初獻蕨苖肥心驚醉語常多悔事到中年漸覺非明日舞雩須一徃二三童子試春衣髙閣對坐有懷鶴坡静裏身閒不欲眠寺西髙閣寄超然滄波萬頃來天際白鳥雙飛去雨邉洗竹祠前依水檻賣魚倉口就瀧船王程消息三千里惆悵鶯花又一年傅起巖一首起巖初名洪字晉卿既更名字夢求無錫人有正峰集京師書事次舒國裳殿撰京國烟花重盧溝雪樹消宫陳開帟幄仙仗下簫韶御酒蒲萄緑官庖芍藥調天顔多喜色報捷在今朝鈕仲玉三首仲玉字貞父吳江人有五浮山人集豐存禮云鳬溪格律謹嚴神氣飄逸不為鈎棘之語與俞羡長云孫太初一代詩豪罕有所許可獨吾鄉鈕貞父善時相唱和而林若撫云五浮山人詩根本性情纒緜悠𣺌秀骨獨存朱長孺云浮溪隱於醫其詩出入魏晉三唐衆體咸備愛金孝章云鳬溪詩鬱紆深婉雖處草莽有忠之思詩話鳬溪漫稾豐存禮序之而世罕傳近其裔孫刋五浮山人集迹其當時恒與孫太初黄勉之酬和詩亦頗類太初非勉之可及崔二丈園亭芳園甫營葺修竹稍隂翳村徑入沙平柴門俯江閉惠風蕩炎氛微雨續新霽好鳥時相鳴疎花還自媚于焉一徜徉頗愜幽人意寧違官府期且與鄰翁醉返照返照吞江色歸雲護石田半含吳地曲不盡越山偏萬木迴元氣羣鴉接暝烟飄然陸魯望随意汛湖船微隂雲氣微含雨江村小作隂烟中雙鳥没天際一龍吟落日傷春事扁舟繫客心放歌巖木動隨意酒杯深徐充一首充字子擴江隂人有鐡硯齋集題扇緑樹隂中款竹扉幾家臨水狎漁磯日長門徑無車馬燕子楊花自在飛趙金金字淮獻烏程人布衣正德中詔徴不起有浮休集詩話徴士居南潯著書闤闠閒入其門者有如深壑恒坐小艇出入五湖陶然自酌南坦箬溪二尚書結峴山㑹造廬請入社不應也年六十營繭室斂平生齒牙爪髮之已脱者洗滌而囊盛之以為殉葬之具賦全歸詩三章其一云憶昔髫年時嘗記齒初齔歴歴真牙生蔬食藉以進邇來筋骨衰齒牙揺且振朝夕學種之種之惟自愼餘齡已七十疎豁落殆盡萬物有消長死生當委順其二云十指之爪乃筋之餘搔彼白首藉爾爬梳一彈指頃歲月其駛時或蜕之式用藏只嗟嗟此爪我心不違他日觀化亦從而歸其三云朝梳暮梳白髮滿首一朝秃盡眞成老醜藏諸囊中括之無咎天地一毫惟我所有人言白髮公道不負我將全歸其顔何厚又自為生祭文輓詩自是不復出年八十九而卒其詩不蹈時習取境故超過菱湖去去餘不路遨遊一問津村孤船作市地絶水為鄰菱澫官租足魚鰕野饌新衆山遥映帶相對碧嶙峋郊居自愛閒居卜近郊獨將心迹寄衡茅桃花水泛魚吹浪芹草泥香燕補巢雜植桑麻供國税細分杞菊入山肴平生方外誰為友冷澹雲霞信可交陳鑑二首鑑字用明海鹽人有勾谿集錢㓜卿云山人詩鮮芳幽舊劌琢性靈絶無浮音滯響西村諸社友見訪雨夜分得微字門外泥深草路微滿江風雨暗斜暉春潮正急不可渡有酒相邀且莫歸屋帽田衣留竹桁茶烟藥火共柴扉重招更有荼䕷帖爛醉花前願豈違種菜曉日園頭抱甕頻滿衣寒氣露華勻老夫一箸非容易為語人間食肉人徐繗三首繗字紹卿吳縣人有在笥集黄清父云徐君掞藻最早享年最永其詩貴華采尚標致經營用思愈入愈深㸃綴既成更務清朗吟諷再三真賞自得皇甫子循云山人以詩名者張子言孫太初皆遊大人以成名君獨不自造請阨窮已甚而志猶暢適其篇什格髙調古意新句秀㫖逺而辭縟聲諧而氣宕謂不出於孫張之右邪劉子威云蘓有兩徐生昌穀氣俊而疏紹卿思新而緩譬諸樂或舒以促或緐以殺各以一成詩話紹卿學詩於蔡孔目而標格矜爽所謂弟子不必不如師謁伍相祠湖口風色霽繫纜登雲厓廻阡度修壟肅穆趨神祠翠柏蔭壇宇碧草生階墀英賢去千載靈氣儼生時暉暉燭影耀靄靄香烟滋入郢志亮畢棲越心空疲不忘嗣主諫恐負先君知朝承鐲鏤賜暮見東門師空江日夜流忠烈何時隳至今姑胥臺空傷麋鹿馳聞黄子得之下第十上空垂槖三春祗弊裘説難心獨苦塗逺暮何投聞鴈書頻繫看花涙暗流誰憐一生恨頭白在皇州甲子除夕宿魚卿館旅跡元無定衰情此更加飄零逢歲夜惆悵宿君家醽􅕌春生緑風霏雪度花故園今夕意悽斷若天涯姜𤣥二首𤣥字𤣥仲吳江布衣有集詩話布衣沉思韻語具襄陽孟六之體所欠筋骨暮秋集白陽山人五湖田舍倚檻開湖色鈎簾見浦沙晩田惟種秫春浦亦宜𤓰落帽松風近浮觴竹日斜坐來忘出處幽意愛陶家牧童烟中草深黄犢肥百舌繞身原上飛斜陽幾處吹蘆笛頭戴衣裳渡水歸黄嘉仁一首嘉仁餘姚人有半山遺稾田家烟含暝色入村場一畝平田隔草堂急雨初收新水滿蕅花香雜稻花香馬駢二首騈字共甫江都諸生詩話共甫為知泉州府事岱之子與兄駙次甫共騆用甫並有詩名駙著紫泉集二十卷今失傳甫撰有春秋探微十四卷吾鄉曹侍郎有其書而揚州新舊志均未之載也詩頗去陳言曉行明河欲西垂樹杪大星落隱隱逺烟消霜天一聲角村獵隴斷沙痕淺山空月色孤歸來夜將午射得紫䫇狐張金四首金字子堅江都人儒士題丁道士小房一徑晩來雨千巖秋正深潭空魚出藻果熟鳥窺林絶壑蒼烟斷廻廊敗葉侵此中堪辟穀人世信銷沉雨中泊太倉太倉城河潮水生石橋西下官鼓鳴客子思家孤夢逺舟人刺船雙櫓輕横風倒海浪作勢急雨過山雲不行暫時繫纜小港口城門擊柝聞初更寓嶽祠尋常不到山前路洞口閒雲盡日封時有聽經童子至不知身是石潭龍泊金閶金閶門下燈火明吳姬水調歌入城曲終夜静不知處凉月滿船春水生吳䕫一首䕫字舜南髙郵州人諸生山居即事颯颯樹頭風山犬吠不已呼童啓柴扉明月照谿水蔡圻一首圻字子封江都人儒士雨後即事亂流東下晩霞生破屋西邉落日明卷盡墨雲山雨歇出門扶杖看天晴陳瀛一首瀛字古厓海鹽人國子監生選授宛平主簿石林山房輕風落樹散林烟海日三竿正熟眠傍午起來花落盡不知雷雨過山田顧文淵一首文淵字静卿仁和諸生有滄江集晩發錢唐潮平小櫂發錢唐俄傾帆飛過冨陽兩岸好山看不盡數聲漁笛起滄浪楊學禮一首學禮號東濵上海諸生春興菖蒲枸杞滿庭栽書閣垂簾半掩開蛺蝶不嫌春色澹隔牆飛去又飛來陳籥三首籥字德音閩縣人有竹居集送辰翁還閩飄零同楚越此别各風烟後㑹知何日相思動隔年孤燈雙淚盡萬里一帆懸誰見家園好椒花勝裏傳寄訊春風轉憶别衡廬淮水茫茫老客居却被故園兒女笑至今猶作未歸書除夕感懷椒觴兩見客中傳簫鼓喧喧暗自憐總使明朝得歸去今朝還説是明年朱應辰一首應辰字拱之一字振之寳應人應登弟貢士東湖曲曲岸香風起汀洲采白蘋鴛鴦浮緑水偷眼蕩舟人陳宇二首宇字時清寧德人有五真集宜春舟次客塗寂寞晩風寒舟次宜春近石灘苦竹叢深山鷓雨令人却憶鄭都官園居無事栽扉盡日閒嬾情幽興每相關却嫌新筍都成竹遮過門前一半山嚴時泰一首時泰餘姚人官福建鹽運司同知有牢盆集詩話山陰陳起侯撰浙士登科考於𢎞治辛酉載湖廣中式一人嚴時泰注云辛未三甲按辛未登第者乃江夏人晩以右副都御史巡撫四川陞工部右侍郎致仕楊用修贈詩所云昻昻嚴夫子矯矯人中龍長才抱經濟大雅含舂容叩之清廟縆朱瑟縣之東序鏗金鏞者是其人也若餘姚嚴時泰祗官福建鹽運同知故其詩名牢盆集集中有云憶我東南來於時歲方晏又云暮叩西禪寺又云頗為微官縛皆在閩中所賦然則用修贈時别是一人黄棃洲徴君輯姚江逸詩誤運同即侍郎未免為起俟所惑矣出城尋山雅負山澤情平明出遊衍﨑嶇既經丘峻絶還陟巘征衫清露濡垂蘿或相罥縈紆度林涇草樹益蔥蒨古洞闃無人聊以憇吾倦幽鳥遺好音起覓不可見含情倚嘉樹日暮增繾綣憶我東南來於時歲方晏春徂忽已夏逝景迅流電不樂復如何嗟爾𤣥髮變王瀛一首瀛字元溟㑹稽人有西湖冶興韜光菴吟邊喜與故人登老樹無枝石有稜坐久江潮聽漸近寒山髙出白雲層明詩綜卷四十三
