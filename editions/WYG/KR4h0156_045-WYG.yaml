目燭地思奔騰四蹄䠥􅍷毛髪竦瘦脊硉兀排鋒稜崩雷掣電望風吼青兕辟易元羆走嗇夫股栗不敢前壯士變色將無狃奚奴綠髯深眼睛㦸手魋髻垂胡纓須臾鞚引藁街下俯首帖耳猶長鳴刲羊屠狗恣所欲豐芻肥胾日不足英雄束縛亦如此豢養恩深敢辭辱始知丹青貌不同彷彿山海圗經中上林已開射熊館天子賜見長楊宮虎賁如雲兵衛列彊弩短刀防噬囓詔謂圉人破檻車玉階舞蹈龍顔恱我聞異物不可馴袒裼擾之如有神水衡寳鏹勅頒賜不惜金錢懐逺人嗚呼明王慎徳卑逺略珍禽竒獸須教却周征白狼荒服叛漢閉玉門歌頌作先朝故事傳敬皇魯迭欵塞曽來王當時謝却仰明聖萬古史册生輝光今皇端拱勤内治夷徳無厭惟嗜利何當破械縱山林厚賞金繒絶來使送陳少參魯南之江西金章荷聖恩辭出大明門驛路雲千里都亭酒一尊康郎城邉春水發滕王閣上懸新月輕帆直下疾於飛幾日看山徧吳越揚雄白首薦公車曽作詞臣侍石渠直道自甘終放棄髙才誰肻借吹嘘藩叅四品官不薄豫章猶勝長沙惡簿書錢糓亦何勞十載功名至方岳春來彭蠡雁難聞江草江花杳暮雲南歸正及鱸魚美直北相思不見君送陸子元遊泰嶽有客手珮蒼精龍告我逺遊豋岱宗岱宗根蟠九百里絶頂上有秦時封金泥玉笥秘難見古文竒字誰能辨日觀遥看碣石津雲峰正對蓬萊殿海中鰲身應天黑三山湧出神仙宅貝闕参差結蜃樓珠宫掩暎藏蛟室君登泰嶽觀滄海九州四瀆皆安在堂上遺音想絲竹壁間經傳尋魚亥丈夫所志在蓬桑焉能局促籠中藏看君一劒行萬里五嶽之遊自兹始大駕視牲南郊大路調仙馭朱旗列禁城帝牛三月繫田燭九衢明日並龍旒出山將綵旄迎横汾卑漢詠禋祀秉皇情人日齋居雪霽瑞雪逢人日堯年感物華水從銀漢落山繞玉闗斜帳殿披晴靄郊宫閟綵霞今朝禁城望無樹不飛花蒼梧作氣候南荒異蒼梧濕更饒山雲晴忽雨江霧夜連朝病與炎俱劇愁隨瘴不消故鄉那可望桂嶺已迢迢憶横塘别業一卧文園病終朝念故山敢希宣室召秪望玉門還橘想千頭足桑思十畝閒如何五斗米猶是滯南蠻謁栁祠羅池非昔日栁廟亦荒頽秋草重門閉寒花獨樹開文章真命世今古孰憐才猿鶴如相訴松風晚更哀謁劉賢良祠髙樹臨流水空庭澹夕陽萬言翻下第三黜竟投荒事業存青史英靈儼白楊古來稱屈者不獨一賢良自栁至平樂書所見鬰白方言似潯梧瘴􅂔賖蚺蛇晴掛樹射蜮晝含沙屋覆湘君竹山紅蜀帝花夷堅收未盡博物待張華招鶴獨鶴忽飛去冥冥滄海東離哉翻羽翼幸矣脫樊籠影憶空庭月聲鄰别院風凌霄自有志吾豈學支公送陳徳夫使魯帝曰封同姓皇華送使臣河山藏漢誓寳玉展周親殿說靈光古經傳孔壁新余生好文獻一為訪先民送何給事善充守衡州衡陽楚上流太守古諸侯五馬横金去三湘露冕遊猿聼巫峽夜雁數洞庭秋今日辭青瑣還將諫草留秋興仙仗行宫舊内居花間往往駐鸞輿徒聞漢帝横汾曲不見長卿諫獵書天子射蛟開水殿奚官牧馬遍郊墟蒹葭苜蓿秋無限悵望燕雲萬里餘登匡廬山苕岧廬嶽近天都萬丈丹梯鳥道孤樹裏泉聲飛瀑布空中煙霧起香爐峰形下瞰蓮花嶺江勢遥吞彭蠡湖白鹿仙巖何處是却看五老在虚無采香涇新莊誅茅閶闔城之西路轉采香涇上隄濃隂榆栁綠當户秀色芙蕖紅滿谿力田輸稅半栽秫鑿沼養魚兼灌畦每媿長公髙隠志杜門從此可幽棲張摯字長公西蘆辭君家滬瀆城城西蘆子渡蘆子何蒼蒼秋風吹白露范言四首言字孔嘉秀水人嘉靖丙戌進士授蒲圻知縣改保定儒學教授歴國子監丞陞大理府同知有菁陽集四音存稾湯義仍云菁陽質有其文孤秀清贍陳仲醇云菁陽詩文深往獨至最合古法詩話菁山先生不畏强禦為國子監丞時嚴世蕃著紅袴入上舍先生夏楚撻之分宜次日造門謝未幾而大理丞命下矣嘉靖初吾鄉稱詩必以先生為巨孹屠諭徳漸山長歌云菁山先生真崛竒文章垂世光陸離懸黎結綠世莫識陽春白雪和者稀是時漸山詩名籍甚願入室稱弟子焉駕出北郊清蹕辭南陸元宫禮北郊周廬屬霜㦸行吹雜金一作風鐃齋祓陳周幣明禋薦楚茅還聞天樂在縹緲下雲旓别華鴻山翰撰細雨花邊路閒亭竹外扉地偏亭榭古春老燕鶯稀栁色侵歌扇藤梢拂舞衣新愁忽髙㑹知爾逺懐歸鶴樓别意吹笛髙樓月色新不知江上有離人栁條欲折可憐暮梅花即開何處春孤舟泛泛剡溪雪落日迢迢揚子津天涯我亦索居久為汝長歌一愴神曉發吳江垂虹橋邉曙色㣲三髙祠下露華晞畫船打鼓出城去秋水滿江鴻雁飛趙時春二首時春字景仁平涼人嘉靖丙戌進士選庻吉士改兵部主事以建言下獄尋補翰林編修又以上疏放歸㑹邊警起領民兵自副使超拜右僉都御史巡撫山西有浚谷集李伯華云浚谷詩有秦聲詩話景仁慨當以慷如擊唾壺不必中節送陶虞卿赴神機叅將宋殿三衙帥唐環十六軍官聨叅斗柄旌斾儼星文羽衛迎黄道龍光覲紫雲時時仙仗入清蹕早應聞留滯留滯滄洲已浹旬鶡冠終日滿風塵浮雲何事來還往嵗月無情秋復春海甸中宵來驛使天涯盡處未歸人不堪對酒翻惆悵翠篠黄花幾度新王慎中十七首慎中字道恩晋江人嘉靖丙戌進士除户部主事改禮部復改吏部歴貟外郎中謫常州通判稍遷南户部主事轉禮部貟外陞山東提學僉事歴江西叅議河南參政有玩芳堂摘稿遵巖家居集王元美云王道思如驚弋宿鳥撲刺遒迅殊媿幽閒之狀詩話劉淵材憾曽子固不能詩余嘗見宋人所輯唐宋八家詩韻則子固與焉不得謂非詩家矣評明人詩者不及王道思然道思五古文理精宻足以嗣響顔謝而論者輒言文勝于詩非知音識曲者也遊西山良辰戾首夏肅軫遊西山山形何崒嵂洲渚互相緜奔湍既下赴危峰亦上干谽谺石洞窈迤邐飛梁懸朱葩晞陽谷翠羽䕃隂戀閟室象霞搆疎甍慿風騫抗宇凌層基列楹俯流泉好鳥揚幽音弱蕖濯清漣豈惟耽逺遊因兹達大觀拾乳歷窱䆗擷芳陵巑岏渟渟出磵淙靄靄冒隴煙水碧間清藻靈飈茁瑶菅履險神彌豁入幽情更延隠巖懐子真蹈海期仲連遺形九州外棲迹萬象顛崇深惟素秉神理迷真詮遊心迓沖漠斯道庻不諼山行鴟夷泛左蠡康樂慕東甌屐泯無續蹤舟沈誰溯流至人與物化曲士局時謀疑冰哂夏蟲將隨汗漫遊蜿蟺既沿澗﨑嶇復經丘振袂陟危巘觧纓濯澄洲石滑時藉蘭巖蹇或搴樛文芝榮華巔秀穎蔽平疇綠葉藂成帟漱泉戛如璆霏霏雲出岫浙浙飈扶輈㫖酒盈瑶巵臨風自獻酬身已塵象超心與灝氣游緬懐羽化客髙舉不可留精揺生乃勞欲淺道則修簪紱為鞿紲撫已竟誰尤秋祀先師恭述維馨歆嵗事有侐恭明神豐功報宜重孔祀典攸敦明明天子命宣哲協欽文咨惟百工長曰予克宅臣攝事昭我將奏假具惟寅庻僚既濟濟多士亦振振肆佾表殷薦大烹羞明禋格思儼無斁仰止儀自遵大哉聖人徳展爲帝者賔十二夜月與張子同玩感述髙旻蕩浮翳仲冬淑氣清良夜何未央憩坐臨前楹舒景揚雲端皓魄委廣庭灝英鮮瑶席華彩鑒雕櫺稍稍風露重微㣲河漢明眷兹泰宇寛展席諧芳朋撫景遺俗迫即事寡氛嬰豈惟袪煩積亦以湛心靈戒盈君子徳和光達士情葆曜貞有孚養晦善自名普光寺睡起羣動各有營蹙蹙不得息嗟哉尺蠖徒煩蹇牽物役豈謂塵中姿還寄雲外跡古刹絶浮氛法堂鮮来客首夏澹新凉偃卧不知夕覺來盼髙峰近逺各異色草揺席下芳筠散尊中碧鳥語無俗音泉漱皆洌泎俯仰惬幽賞去矣從所適登金山口絶巔地紀控西界靈山亘北甸足弱歩屢憇崖峭石猶踐枝樛乃能援葛脆不可挽當其意象開豈復慮髙蹇瞻峰皆峛崺陟磵數迴緬稍覺天地寛即看雲煙變石竇芝自榮林罅雪尚泫興闊無近尋豋髙有逺見周圻矗五雲易水通一線微茫燕趙區歴歴皆可辨長嘯發靈籟倦坐席苔蘚氛垢茍不嬰沉慮斯可遣異典南郊工就冬至前四日上親勤玉輅習郊禮於壇上威儀卒度周折咸中小臣從觀其美作異典芝壇斂浮景休氣郁昭清晨旭流翠葆泰風颺華旌飛龍麗重霄蕤綏在天庭式禮紆皇歩篤恭軫聖情几几磩承舄亭亭雲耀紘秉離臨日鑒乗乾健天行升崇儼帝對納陛惕陵兢周折並圓方興俛以屏營萬舞羅皋帗廣樂敶咸莖度以哲罔忒文用道自𢎞卒事秩無諐百辟具維刑亹亹不顯徳千載揚徽稱章邱縣校士六月十七夜月有作因示諸屬日入羣動息予亦遂休兹稍喜喧濁屏徙歩臨前墀仰見明月出忽與心賞期湛曠神俱王虛明意自宜况逢時雨霽宿潤含華滋品物各懐榮因得静中窺始悟元寂理寧為躁競知亦有盈尊酒屢進不一持非此莫與同真賞豈因之遊大明湖晚至北極廟豋覽春城足遐觀攜手復嘉客欲極髙深趣停橈理輕策林木飛鳥還蒼茫煙景夕返照射巖丹遥空帶水碧山色晦彌明人聲喧更寂燈火起閭閻漁樵散原澤當歌浩思盈對酒沉憂釋不知驩娛滯天表生皓魄遊白鹿洞素嬰丘壑情况秉英賢想寤寐懸宿心遊盤得兹賞重隂始晦䝉杲杲旋開朗攬勝㨿巉巖探竒歴榛莽境閒百慮空意惬二儀廣野色浄衣巾秋容成物象菊含露下英泉作山中響柔葉稍朝零剛條非夏長景光易流徙今古同俯仰躊躇悵囬軫何時還獨往六合亭亭宇憑虚空結搆出妙境攀援藉葛藟毫末凌光景豁達四天通夷猶雙目騁雲生當正襟風起吹方領泉脈散千峰湖波澄萬頃煙霏自開斂魚鳥各翔泳即事天機深忘言外物屏始知世上日不比山中永遊麻姑山雲出本無心擇棲多竒巘類予慕真勝渉趣不知逺初縁碧澗行幾傍丹崖轉林追去虎蹤磴躡飛猿踐泉流遞淺深巖谷變隂顯歕瀑遇留憩石牀時仰偃桂芳洞裏秋霞映山中晚探異尋前期入幽忘後反神遊力不悁理惬情俱遣天路如可梯欲以微官免餘干道中寄懐江午坡僉憲湖水日夜綠輕舟隨泝沿肅肅賔鴻羽命侣悲楚天征人正盈抱坐使憂思牽所思何為者我友阻良縁昔望闊音容幾經芳嵗捐緘素詞難極馳情間山川今來接靣目曽不須臾間四體為人役從事嗟獨賢倉卒執杯酒沾脣不下咽新篇何由覿妙理未及詮宿懐如糾結待子觧其纒乍見翻違去持此竟莫宣侯民部静溪招遊甘棠湖陪憲使管復齋諸公積雨夏隂生瀰漫湖水遍悔為一室拘幸奉方舟宴逺嶼微出江雜芷正盈甸沿流始泝洄逗浦更游衍樹色逐橈迴波容隨望變放情魚鳥閒景昃不知晏一杯已可歡况以偶時彦洪方洲養疾山中惠訪草堂因而留館裊裊桂樹枝凉風日將變生色難久留華光苦流轉夫君如不來胡以慰偃蹇今夕良何夕悠然適我願片雲本在山出岫亦游衍吾園雖蕪沒物意皆疎逺以兹城郭深豈必山林善開軒散煩促慿檻息歩踐新飈起草頭白月浮池面蕭閒秋正初徙倚夜方半君自所好殊疵吝何足眷訪空同先生故宅久欲求遺草今來訪故廬北窗存卧席東壁有藏書墨沼春苔長琴臺夜月虛年年桂花發人擬子雲居過寧庻人故陽春宫邪陌轉城闉重門曲水濵人談亡國地花發舊宫春珮冷空梁月歌銷積棟塵堪悲當日事議讞帝家親李元陽一首元陽字仁甫大理人嘉靖丙戌進士選庻吉士除户部主事擢江西道御史出知荆州府致仕冬夜漫漫冬夜長熒熒孤燭光山人自無寐况棲修竹房修竹夜淅瀝蕭灑吟寒螿朗月照户庭鳴泉歸故塘别葉棄寒風餘芳委嚴霜東辟正中昏振衣起徬徨徬徨豈有他望道吁升堂悠悠嵗云暮遐哉猶面牆寸隂與彈指久近不可量千古在須臾安得不悲傷何穉孝云此詩有蘧伯玉及時勉學之意非流連光景者明詩綜卷四十五
