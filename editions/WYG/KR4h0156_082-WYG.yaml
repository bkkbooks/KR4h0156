body:
  text: 明詩綜卷八十二翰林院檢討朱彛尊編郭愛一首愛字善理鳯陽人宣宗聞其才召至京病卒贈國嬪顧𤣥言云貴嬪事見淑秀集其自哀古體源出蔡文姬得性情之正京邸病革自哀脩短有數兮不足較也生而如夢兮死則覺也先吾親而歸兮獨慚予之不孝也心悽悽而不能已兮是則可悼也司綵王氏一首南海人宣徳中女官顧𤣥言云司綵宫詞道麗亦椒庭之艷發者静志居詩話宫官之設見于周官見于戴記漢魏置貴嬪夫人貴人此仿周官之三夫人也淑妃淑媛淑儀修華修容修儀媫妤容華充華此仿周官之九嬪也北史后妃傳有正華令則修訓曜儀明淑芳華敬婉昭華光正昭寧貞範𢎞徽和徳𢎞猷茂光明信静訓懼徳廣訓暉範敬訓芳猷婉華明範艷儀暉則敬信此仿周官之二十七世婦也穆光茂徳貞懿曜光貞凝光範令儀内範穆閨婉徳明婉豔婉妙範暉章敬茂静肅瓊章穆華慎儀妙儀明懿崇明麗則婉儀彭媛修閒修静𢎞慎豔光漪容徽淑秀儀芳婉貞慎明豔真穆修範肅容茂儀英淑𢎞豔正信凝婉英範懐慎修媛良則瑶章訓成潤儀寜訓淑懿柔則穆儀修禮昭慎貞媛肅閨敬順柔華昭順敬寕明訓𢎞儀崇敬修敬承閒昭容麗儀間華思柔媛光懐徳良媛淑猗茂範良信豔華徽娥肅儀妙則此仿周官之八十一御女也唐宋以來參合損益不廢其名明初定設六局曰尚宫尚儀尚服尚食尚寢尚㓛掌以宫正總六局之事凡出納文籍皆印署之付内史監牒移于外局有四司尚宫之屬有司紀司言司簿司闈尚儀之屬有司籍司樂司賔司贊尚服之屬有司寳司儀司仗司飾尚食之屬有司饌司醖司藥司供尚寢之屬有司設司輿司苑司燈尚功之屬有司製司珍司綵司計司綵掌儲藏段疋者也官設于洪武五年王氏家南海河南村永樂二年選入宫命與權妃同輦辭曰妾嫠婦也安敢充下陳哉帝重之許歸嗚呼開創之主宫中府中設司分職各有典司后正位乎内夫人嬪御交賛隂教居有保阿之訓動有環珮之響内無出閫之言㩲無私溺之授法至善矣其後宫官罷設奄寺乃得横行王振汪直劉瑾惡已貫盈至魏忠賢攬政昵一客氏深宫更無為懿安皇后助者雖存女秀才女史官空名恒罸提鈴警夜而宫官大抵皆為奄寺之菜户矣外而稅礦内而批紅監軍則養冦賊至則開門胎禍之烈一至於此使女官舊章不廢禕衣䄖翟絳紗貂蟬雍雍肅肅何遽稱九千嵗于大璫之前乎宫詞璚花移入大明宫一樹凝一作旑旎濃香倚一作韻晚風贏得君王留步輦玉簫吹徹月明中詩話元制嵗責髙麗貢羙女故張光弼輦下曲云宫衣新尚髙麗様方領過腰半臂裁連夜内家争借㸔為曽著過御前來楊亷夫元宫詞亦云北幸和林幄殿寛句麗女侍媫妤官君王自賦昭君曲勅賜琵琶馬上弹明初相沿未改此孝陵有碽妃長陵有權妃也權為髙麗光祿鄉永均之女善吹簫宫中争效之寕獻王詩云宫漏已沉參倒影美人猶自學吹簫王司綵亦云贏得君王留步輦玉簫嘹喨月明中皆為權貴妃作沈瓊蓮七首瓊蓮字瑩中烏程人𢎞治初選入掖庭官女學士詩話魏有女侍中晉有女尚書迄于唐宋若華姊妹五人皆善屬文昭義節度使李抱貞表薦于朝徳宗召入宫試詩賦兼問經史大義深加歎賞不以宫妾遇之呼為女學士貞元後宫中記注若華掌之繼而若昭若憲代司其籍烏程女子沈瑩中初入掖庭泰陵試以守宫論發題云甚矣秦之無道也宫豈必守哉泰陵大悦擢居第一給事禁中授女學士吴興人至今呼為女閣老瑩中在大内暇飼白鸚鵡教之誦尚書無逸篇此宜載之管彤者也寄兄疎明星斗夜䦨珊玉貌花容列女官風遞一作度鳯皇天樂近雪殘一作晴鳷鵲曉樓寒昭儀引駕臨丹扆尚寢熏鑪爇紫檀肅肅六宫懸象魏春風前殿想鳴鑾送弟溥試春官少小離家侍禁闈人間天上兩依稀朝迎鳯輦趨青瑣夕捧鸞書入紫微銀燭燒殘空有夢玉釵敲斷未成歸年年望汝登金籍同補山龍上衮衣宫詞五首翠絲蟠䄂紫羅襦偷把黄金小帶輸中使傳宣光祿宴内家學士出新除青霧濛濛罩碧牕青燈的的燦銀釭内人何處教吹管驚起庭前鶴一雙豆蔻花封小字緘寄聲千里落雲帆一春從不㝷芳去髙疊香羅舊賜衫天子龍樓瞥見妝芙蓉團殿試羅裳水風凉好朝西坐専把書經教小王明牕棐几浄爐熏閒閲仙書小篆文晝永簾垂春寂寂碧桃花映石榴裙范氏一首清江人一云新凎梈孫女早寡選入禁中偶題畫寄意髙后見之封為夫人遣還鄉詩話明初識字婦女得舉女秀才入尚功局萬載縣志載縣民敖用敬妻易淵碧洪武二十六年舉女秀才以疾還鄉又中都左衛千户陳泰妻龍玉英孀居亦舉女秀才洪熙元年封大樂賢母范氏殆其選也題老嫗騎牛吹笛圗玉環賜死馬鬼坡出塞昭君怨更多爭似阿㜑牛背穏笛中吹出太平歌曹靜照六首靜照字月士宛平人泰昌元年選良家女入宫李自成犯闕隨内監劉至南京開剃為尼宫詞六首到面東風只自知燕花牌子手中持椒房領得金龍紙勅寫先皇御製詩一樹寒花冒雪開幽香寂寂映樓臺女官爭簇傳呼近知是鸞宫選侍來寳妝雲髻軃金衣嬌小丰姿傍玉扉新入未諳宫禁事低頭先拜段純妃口勅傳宣幸玉熙樂工先候九龍池裝成傀儡新番獻盡日開簾㸔水嬉閲遍司農水旱書君王減膳復齋居御廚阿監新承旨明日羮湯不進魚儉徳慈恩上古稀他方織錦盡停機赭黄御服重經澣内直才人著布衣詩話諸詩見紅蕉集其云㤗昌元年選良家入宫按慶陵在位祇一月實錄所載禮儀房長隨董國用將宫女趙永祿等八口發其親戚領去於時魏給事應嘉疏言怨女出宫古來盛徳之事自穆廟至先帝兩朝凡五十餘年矣其間侍從宫人空閒無職何啻千萬數人情垂老倍思其鄉即此一事不必問有例無例慨然獨斷施行則仁慈無極言雖未見行然不聞有選良家女子之事當再考之故老野史宋蕙湘一首蕙湘南京宫女年十四遭掠題汲縣壁風動江空鼖鼓催降旗飃颭鳯城開將軍戰死君王繫薄命紅顔馬上來明詩綜卷八十二
