body:
  text: 明詩綜巻三十三翰林院檢討朱彛尊編周用十首用字行之吳江人𢎞治壬戌進士除行人授南給事中陞廣東左参議遷浙江按察副使改山東歴福建按察使河南右布政使以副都御史撫南贑召還理院事陞吏部侍郎尋遷南京右都御史進工部尚書改刑部復召入為左都御史秩滿加太子少保轉吏部尚書卒贈太子太保諡恭肅有白川集王道思云白川俊才博學横行制作之林王伯榖云公詩渾而雅清而質靜志居詩話白川十齡能畫長師石田翁得其指授詩則别裁風格取法杜陵集中詩云畫品仍游藝詩家特擅名丹青乃餘事金石自希聲散地方盤礴諸公孰老成輞川稱二絶早晚慰平生葢以摩詰自喻也余甞見公畫龍戲浪穿山蜿蜒升降百年絹素雲霧猶濕至寫平坡放犢亦不減史道碩厲歸真乃知公藝事兼能不惟以經濟文章重也清都惟昔游清都眷兹固難忘此日復何日真宰垂謙光合沓來天人羽儀紛成行被髪乘麒麟赤脚踏鳳皇層霄何嵬嵬瓊宫互相望六丁啓九關稽首朝紫皇紫皇顧之笑置我玉座旁當筵舉北斗為我酌酒漿一酌好顔色再酌生樂康羲和鞭白日回車息扶桑夜半聞天雞九州但茫茫思古古人不可見要見古人心羲皇日已逺河嶽徒髙深焉知千載後無人復思今為君歌所思清風激商音恥菴子車古有訓人不可無恥悠悠下千載聞者乃興起清風濯厚顔伊人欲何俟西山伯夷薇東海魯連水願言謝賢逹毋獨為君子謝趙宗伯恵米蔬一行作法吏俛首事案牘凡百慎期㑹惴惴憂覆餗朝廷務寛大幸不蒙顯戮奪俸十二月一千九百斛平生愧素飽逺謀鄙食肉薄罰分所甘入市求脫粟同年松雪翁早嵗辭厚禄有田西湖濵耕穫任僮僕豈惟充倉箱亦以給賔族使者持書來顔色照牆屋傾奩流白脂粒粒如選玉病夫笑開顔一月噉糜粥漑釜汲新泉為報午炊熟推枕加一餐屬厭捫我腹勿藥信有喜便可謝休沐尚懐緇衣詩為公且三復耕雲桐丘先生笑開口問我湖田不知畞一巻神農百榖經今日居然落我手農夫十耦牛十角公家什一我什九大田之稼嵗十千與公嵗嵗為春酒聞詔哀痛開新詔孤臣海上還塵沙新肉骨涕淚舊江山罪薄神明後生餘齒髪間君㤙知莫報益厚野人顔厓山二首天王海上難為國猶恨祥興似景炎千里有心求馬骨六宫無力挽龍髯已聞南劒仍開府何事前軍早解嚴欲把椒漿酹坏土厓山風急雨纎纎何人决䇿幸揚州可是諸公為國謀但肯十年甞越膽不妨九世復齊讎中原肉骨餘孤子諸将功勲待列侯聞說舊時南渡後有人進講魯春秋吳太常諸公九日前一日登清凉寺次韻清秋何處廻髙眼山寺遥臨江水濵滿地黄花聊避俗誰家白酒未嘗新可憐明日是九日為問閒人能㡬人且與山靈修故事已傳西北静風塵秋思黯黯湘雲斷九嶷娟娟山月照峨眉西風楊栁渾揺落莫向江亭賦别離魯鐸三首鐸字振之景陵人𢎞治壬戌進士改庻吉士以編修使安南累官南國子監祭酒贈禮部侍郎諡文恪有蓮北使交東廂諸集李本寧云先生思深而不苦骨勁而不厲情婉而不蕩事核而不僻氣平而不餒山林廊廟各適其體詩話文恪以清徳稱恒曰人嘗齩得菜根則百事可作君子以為名言歸田日築已有園于宅東賦之曰其蔬則有芥苩葵莧蘆菔菠菘芥苗嶺表山藥土中春間剪韭秋髙折蔥豆多豇扁𤓰備西東瓠較五石為劣芋譬蹲鴟狀同蘇子瞻所云我與何曽同一飽不知何苦食雞豚也又曰安予分之所遇兮求予心之所好茍沒世其有稱兮奚外身而有校又曰人生信亦有涯兮嗟世事之莫盡徃者幸于免咎兮來者可諉于余分逹生之言猶恐修名之不立庶異乎莊老之指矣古塔灘古塔灘注山窪飛湍屈曲如奔蛇中流惡石故激怒跳珠濺雪紛交加鏘鏘爭走萬甲士刺刺倒露千狼牙官舟一葉百夫挽安危秪與毫釐差我時攀巖過絶壁四顧莫非猨所家倦來坐石却俯㸔握拳吐舌生咨嗟九龍山史好竒甚哦詩但道山水佳更嗔來日舎舟去磨崖不及親䥴撾鳬洲即事見說𤓰堪摘閒過洲上來小船風打去半日未能回莊居漫興田間事事雖畢村裏家家未閒惟有東湖隠者但從屋後㸔山徐問五首問字用中武進人𢎞治壬戌進士除廣平推官召為刑部主事轉郎中出知登州府調臨江遷長蘆鹽運使歴廣東左布政以右副都御史廵撫貴州拜兵部侍郎改禮部進戸部尚書諡荘裕有養齋集山堂萃稾俞汝成云尚書詩不刻鏤以為工然辭㫖平正足以諷人詩話尚書五律清髙深穏歌行如山雞野鶴自啼舞赤日照耀神仙宫懸厓石壁置臺觀凌虛下瞰馮夷宫寒潮涌日下孤島潮回響聒晨昬鐘頗具謫仙風骨和孫太守朝望登毗盧閣與客登層樓鈎簾瞰幽壑秋色動遥林千厓自空廓俯視清川流或見沙鳥落凉飇拂襟袂閒雲漾飛閣書臺藤蘚荒伊人久云邈餘香有叢桂三齅風前萼歳暮海濵嵗云暮草木尚莽蒼𤣥枵隠化機羣蟄寂餘響誰云果不食有復繼兹徃充然天地心生息在反掌况乃青陽交和風遍穹壤陽徳嘉再亨吾亦觀吾養重關靜喧囂性定道心長百年日斯征撫事集遐想惟當務崇徳不媿兹俯仰夜發蕭灘驛小臨官道沙長帶水城山於雲處没星過渡邉明𤨏𤨏非初志營營嘅此生北堂凝望逺秋日萬重情卧病竟日還欹枕秋風動客歌青山愁處逺白髪病來多生計只書巻故園空薜蘿時時問雙鯉欲寄洞庭波早發煙渚雨色江頭樹青􅃄夾路長逺村廻寂寞白鳥去㣲茫楚客歸何日春江正可航因思雲嶠句心折不成章何瑭三首塘字粹夫懷慶衛人𢎞治壬戌進士改庶吉士授編修轉修撰謫開州同知稍遷東昌府同知陞山西提學副使改松江擢南太常寺少卿署翰林院事歴工部右侍郎改戸部復改禮部陞南京右都御史贈工部尚書諡文定有柏齋集詩話文定講學兼明禮儀樂律其撰許魯齋祠堂碑稱魯齋以躬行為急而不徒事乎語言文字之間道以致用為先而不徒極乎性命之奥且言近世之士有志乎聖賢之道必留心性命至于修齊治平之方義利取舎之分多忽而不省夫性與天道夫子罕言而四教之施必以文行忠信則其先者可知已持論甚篤實詩特其餘事然如九日和韻從肺腑中流出此等作無論字句之工不工也和郭杏東九日韻重陽細讀黄花句懐抱因君一暫開杜甫當年長作客陶濳此日定䘖杯殊方久廢登髙興青眼誰憐濟世才北望親闈腸欲斷塞鴻頻到少書來題淮浦巻長淮之水東南流羙人家在淮上頭滄波碧石有深趣朝史暮經無外求東風側耳聽黄鳥夜月巻簾招白鷗畫圖一見擬相訪何處元龍百尺樓李時一首時字宗易任邱人𢎞治壬戌進士累官少傅兼太子太師吏部尚書華葢殿大學士贈太傅諡文康有薇花堂集夏日偶書卜居地愛城西僻野水春來自作渠戸繞山光堪對酒園收柿葉好供書青林雨過煙蘿濕碧沼雲生石竇虛長者不聞門外駕小庭新草手閒除葉相一首相字良臣江都人𢎞治壬戌進士歴官刑部侍郎贈右都御史史江皋約游芙蓉荘阻雨細雨芙蓉徑衝泥客到稀橋分平野闊江入曲池㣲花怯寒輕堕鶯愁濕不飛髙雲掩片月容易送春歸林茂逹一首茂逹字孚可莆田人𢎞治壬戌進士官至大理寺卿有翠庭集讀淮隂侯傳帶礪盟寒霸業空将壇寂寞幾西風中原草樹薶秦鹿雲夢旌旗出漢宫人代古今雙淚眼王侯天地一樊籠赤松始識神仙侣圯下無慙黄石公王尚絅二首尚絅字錦夫郟縣人𢎞治壬戌進士授兵部主事改吏部歴員外郎中出為山西左參政調四川引疾歸補陜西遷浙江右布政使有蒼谷集李時逺云蒼谷詩嚴整可觀詩話蒼谷結仲黙為姻婭訂獻吉徳涵子衡庭實粹夫諸君為衿契然其詩如入邪徑狹巷未逹周行較之升堂入室之彦尚逺馬伯循序之止許其能取友可謂善于立言然其身後鄉里私諡曰貞孝文子則文采風流雖不及諸君而孝行有足尚者獻吉贈詩云宏詞振宛洛一一中音吕未免阿所好也土門蒼蒼土門口日出逢樵叟問爾何事來山中苦無酒蒋仲舒云五絶如此一氣者勝送白徳明之太原十載髙名專百里舊遊山水入新詩雲中樓閣開王屋春水田疇繞晋祠陳霆三首霆字聲伯徳清人𢎞治壬戌進士刑科給事中正徳初謫判六安州歴山西提學僉事有水南集墨布袍游提刑抗節不仕墨布袍粗且黑心中事背中墨宋時遺黎元版籍寒暑晴雨寧暫釋直教葢棺覆我首領纒我骨死不在閩廣生茍依木石安能易彼章與黻俛首躬身福州伯銀簪詞沈回奴死節爺孃養我身從小不出戸銀簪雖掠鬢荆釵未成婦蘆港深深孰來此擾擾紅巾照溪水無門别逃避有計深拜跽奴願從将軍奴尚真處子辰良日吉禮所重野合私從世應鄙紅巾不疑身免辱愛生者衆愛死獨銀簪不刺股銀簪不錐目咽喉三寸氣出入此氣一斷難再續君不見元運衰海宇析人男子官柱國抱持馬足慌拜賊頭上朝簪長一尺潭水清洪春春死節儂本村田居無城又無郭賊多孰備禦賊少亦驅掠阿爺到新市說有官軍駐官軍快殺賊殺賊賊當懼從爺提攜行忍死事遷寓一朝賊四合兵将走不顧東鄰金帛盡西舎娥嬢去獨存儂身走無及道旁空屋爺教入兔靣始藏伏猨臂巳持執驅至岸拉上船回思死清水勝活汚瀆閒仙人潭深莫比一生事一口水詩話水南博洽著聞留心風教詩不茍作予録其三篇稍加刪汰墨布袍者宋咸淳進士福建提刑徳清游汶魯望所服元初以遺老薦授福州總管固辭不就題袍背云前宋遺民今為百姓雖雨晴寒暑未嘗解脫卒𦵏果山銀簪詞者徳清女子沈回奴際元末兵亂匿蘆港中賊獲之求合從容語曰我閨女也必擇日具禮乃可賊信之攜至營是夜拔頭上簪刺㗋死潭水清者歸安女洪春春元至正十八年兵亂父引之避居新市賊至匿空舎中賊入將逼之女投水死三事國史失載因具詮之孫偉二首偉字朝望清江人𢎞治壬戌進士官至鶴慶知府有鷺沙集俞汝成云鷺沙詩有自得之趣而濟以精鍜信其可傳詩話鷺沙詩格蒼老所惜未醇句如花邊釣艇閒依岸葉底潛鱗不避人三日泥穿東郭履六年人住楚江城屠蘇又醉王正月童子不嫌吾舊廬澗底山泉攜甕出籬邊春雨課兒鉏大江水漲孤城小逺道天寒一鴈稀夜久星河在檐宇天寒鴻雁叫滄洲屋邉晴雨閒禽識徑裏風泉老竹當具饒骨力喜雨應吳大參山下荒畬勢若焚山人望雨戴爐熏夜深初見月離畢曉起忽傳江發雲造化驅雷從地出蛟龍卷海上天分甌汚擬遂明農願敢作爭桑惱使君留酌彭敬之清江一月風兼雨那復過從問所親久别那堪經亂日相逢還阻㸔花晨且将决戰東湖略細語躬耕南畞人邂逅歸舟莫催急水􅃄猶殢岸頭津俞泰一首泰字國昌無錫人𢎞治壬戌進士歴官山東參政有芳洲漫興集題扇寄邉華泉木葉迎風下孤亭傍水開何時尋舊約載酒過江來范嵩一首嵩字邦秀甌寧人𢎞治壬戌進士累官南京工部右侍郎有衢村集過太平府有感滿汀芳草夕陽斜長恨春時不在家昨夜月明鄉夢醒杜鵑啼上杜鵑花徐泰三首泰字子元海鹽人𢎞治甲子舉人授桐城教諭改蓬州學正遷知光澤縣有玉池稾賣婦謡東家賣婦江南去西家賣婦江南去肝腸寸斷兩不知涕淚并作河流注哭聲震天天地悲道傍觀者各淚垂人生不幸遭此時他家食却五嵗親生兒西陵峽歌兩山夾江如壁立千尋萬尋青鐵色江流如龍山罅來動地雷聲喧白日山髙不見飛鳥過舉頭青天一尺多蒼藤古樹翳滿目沿厓亂石其奈磊磈巉巖何嗚呼峽中之險險莫比昔甞聞之今信矣商人重利却輕生吾獨何為亦來此黄陵廟下不可游空舲塌洞尤堪憂十前九却過一險百夫力盡顛厓頭垂堂逺游古所戒靜言思之心膽駴中流欲歌行路難哀猨又起寒􅃄外枝江道中水落枝江道風髙嵗暮天挂帆煙雨裏惆悵入川船顧鼎臣一首鼎臣字九和崑山人𢎞治乙丑賜進士第一累官少保兼太子太保禮部尚書武英殿大學士贈太保諡文康有未齋集憫雨丁丑夏六月災變良有由不雨土膏竭萬木焦林丘一雨浹旬朔日夜乃不休七月日五六氣侯如髙秋雨意轉蕩潏勢欲漂燕幽街市潢潦集淺深可方舟汩没閭閻失縱横盆盎浮薪炭且莫購安辦米與麰哀哉彼窮民衣食恃耕疇黍稷方垂花俄頃沉淵湫所存復幾何公私尚誅求老羸力不克輾轉壑與溝妻孥互牽抱蓬垢同繋囚且忍頃刻活未暇來日謀救死及扶傷哭聲動城陬雞犬寂不聞但聞叫鵂鶹此變未可輕廣闊被數州大都尚若斯僻壤焉能留少壮羅鉏犂行復事戈矛細民本蟣蝨反靣成虎彪徃事足懲創弭變期交修我時卧邸舍霑濡到衾裯起坐念蒼生汍瀾涕難收願水洩尾閭上通天河流河邉有天孫來夕㑹牽牛肯以下界苦愬與上帝不天聽或在兹蒼生其有瘳謝丕一首丕字以中餘姚人太傅遷子出嗣叔選𢎞治乙丑賜進士第三除編修忤劉瑾削籍嘉靖初起充日講累官吏部左侍郎行藥歸徙倚亭欄外何人共此杯春風知我意吹送小舟回湛若水二首若水字元明増城人𢎞治乙丑進士改庶吉士授編修歴侍讀陞南國子祭酒禮部侍郎進尚書改兵部諡文莊有甘泉集顧𤣥言云先生詩醖藉逸秀得唐人古澹處詩話文以載道詩以言志不詭于道勿納于邪可也談理學者必借詩為證道之言若禪家之拈頌說偈者然吾不得其解也司馬遷曰古詩三千餘篇孔子刪取三百五篇皆絃歌以合韶武之音則匪獨關雎鹿鳴文王清廟也凡鄭衛之詩皆合於韶武者也屈子之離騷至欲詒髙辛之鳳皇留有虞之二姚捐玦于湘君湘夫人之下女其為無禮甚矣然志出乎正覽者謂其爭光日月杜子之詩篇至比母后于褒妲而顯斥其明眸皓齒目椒房之戚為麗人而形容及意態肌膚其亦不孫甚矣然志出乎正論者謂其一飯不忘君是說詩者亦觀其志之所存而已不必盡出于道徳之言也元豐而後理學風雅截然為二大約多祖擊壤言情之作置之勿道如傍花隨栁何害于道程伯淳恐人之議之也緊接曰時人不識予心樂醉擁如花何害于情黄才伯恐人之議之也亟注曰欲盡理還之喻古之所謂發乎情止乎禮義者今之所謂發乎情必戾乎理學者也甘泉論詩推崇定山白沙以定山為精金千鍊謂詩法如是學者亦必出于是吾誠不得其解也贈劉都閫樓船簫鼓動秋清劔氣寒光下紫冥想得將軍經略暇時時騎馬㸔潮生送鄭汝髙尹黟縣黟縣縣前江可憐青山四塞上通天長官公暇鳴琴坐不管桃花開縣前顧應祥一首應祥字惟賢長興人𢎞治乙丑進士累官南京刑部尚書贈太子少保有崇雅堂集詩話尚書仕不廢學含經約史維日孜孜其在滇藩刋草廬呉氏尚書纂言萬里遺書鄭端簡以序文商𣙜手蹟予及見之端簡為塗乙數語并疏大旨于簡端本今藏予家集中詩不無蕪累王元羙許其似白太傅亦㣲辭也海㓂髙皇啓天運龍飛當九五萬國盡來王惟詔絶倭虜惡其性狡猾外服心跋扈所以備之嚴兵防遍斥鹵後雖容入貢來徃亦有數奈何海濵氓趨利者􅑣午自決中夏防勾引島夷部偵知我虚實公然肆侵侮攻城殺官吏燎原損稌黍剽掠辱閨闈屠僇及乳哺結巢據險要呼類益屯聚承平紈綺習詎識干戈苦聞風輒先奔墮塹等盲瞽去年檇李敗惨極不忍覩浮骸滿溝渠行不通商旅堂堂㑹城中三司列文武長驅且深入無人敢撑拄坐令北關外一炬成焦土脅從半吾民如以翼加虎元帥乃書生市兒充行伍縱有百萬家竟不能彀弩見說賊兵來城門已先杜十室九逃竄止遺甑與釜算緡科兵田招兵沿門戸東南財賦區中病在肺腑天子怒按劍新命改督府彼倭干天憲凶殘久自沮㑹見一埽平四方盡安堵崔銑一首銑字子鍾安陽人𢎞治乙丑進士累官南京禮部右侍郎贈尚書有洹詞穆敬甫云文敏著洹詞人知工文而不知工詩近體豪雋竒古足與李何方駕詩話洹詞不載詩篇其見録于選家亦少予得公手蹟寄張子醇方伯者有上陵下陵諸作録秋風一首存豹半斑若云與李何方駕則未見其全不敢臆定也秋風秋風何蕭蕭夜夜動林莽除畹本種蘭奈此艾蒿長陸深五首深字子淵上海人𢎞治乙丑進士改庶吉士授翰林院編修遷國子司業進祭酒謫延平府同知陞山西提學副使改浙江歴江西參政四川布政使召為光祿卿改太常卿兼侍讀學士陞詹事府詹事卒贈禮部右侍郎諡文裕有儼山集費子和云陸公詩歌雅而荘婉而諷左遷以後略無感時憤俗之意觀其發教巖詩云去留俱有適吏隠欲中分此其心豈常有怨尤耶王元羙云陸子淵如入貲官作文語雅歩雖自有餘未脫本來靣目多陳卧子云子淵氣尚清拔學非深造輕淺之調詩話儼山詩其原出于大厯十子平衍帖妥如設伊蒲之饌方丈當前雖逺羶腥終鮮滋味至其折衷經史練習典章其所紀載可資國史采擇昔朱晦翁譏葉正則知古而不知今陳同甫知今而不知古惟許吕伯恭克兼之儼山亦可無愧伯恭矣若夫正書似顔尚書行書似李北海莫雲卿之論謂風力實出趙吳興之上自董尚書墨蹟盛行而儼山遂為所掩然尚書論書法推為正宗世有張懐瓘估直未必定取董而遺陸也武鄉山中晚行落日下西崦餘光在髙樹水流青山中人行白雲處歸塗絶句日落山煙紫林深暝色寒殷勤問前路今夜宿新安春日雜興緑楊如綫草如茵紫竹肩輿白㲲巾不是為春禁不得老來心緒最憐春中嵗中嵗山林頗有情栁條花萼㺯春晴日長無事江門外獨立斜陽㸔水生留别所知世間好事一百一春日麗辰三月三此地故人還故國他時江北望江南張邦竒八首邦竒字常甫鄞縣人𢎞治乙丑進士累官南京兵部尚書贈太子太保諡文定有集感遇我昔見媺人婉戀容色好貽我瓊玉鈎願言佩終老我來旣已晚羙人逝不返薄帷明月夜使我心悽惋芳蘭何萎蕤采之将遺誰感彼媺人贈銜恩空淚垂迎春閉門終日坐不知天地春鴻鈞一以動百物相鮮新憶昨凋落時梅李各有仁如今發生氣亦復資絪縕逹人均四海愚者分比鄰嗟予二三友歡㑹當及辰我有一尊酒可以陶吾真送張君用之鶴慶燕臺一尊酒送爾滇南行風塵萬餘里極目難為情故人倐已散落日𤣥蟬鳴曽無别離色可以觀平生送王宜學編修謫官三河驛若華照四海靄靄凝浮隂揮之不可得憂心日欽欽嶺南多嘉樹隆冬見青林去去逺垢氛聊以澄煩襟緑衣無怨言白華多苦心願子崇明徳永言終令音遊方廣寺簡嚴太史勝㑹臻名流竒探極幽藪但覔方廣真不問厓蹊陡越險倩松喬躋危病賁黝巘絶疑天低阬深詫坤厚隂風潑地寒清溪挂厓吼燕石晴復飛虯藤凍還走羣峰角低昻亂石相牝牡獲勝古所歡行疲君莫咎君㸔廢寺中釜塵僧骨朽朱張獨何人智勇名斯久祝融峯危峰踰萬仞衆峰不敢並到此得大觀超然稱心境捫星或低頭望日不引領分明見員儀怳忽凌倒景時月當坤隂霜林肅而静我欲回陽春叩此祝融頂鷹逐鷺圖我觀羣鳥中除却蒼鷹盡凡羽君不見黄金眸白玉距凌空一下急於雨鷺鷥何不早竄伏到此驚奔向何許憶昔在林皋翻飛矜羽毛羽毛雖好不中用憑君識取真英豪送王石沙侍御按閩金門冠葢下晴曛一騎青驄萬里雲明到閩山正秋色玉簫吹向武夷君徐縉三首縉字子容吳縣人𢎞治乙丑進士歴官吏部左侍郎兼翰林侍講學士諡文敏有集詩話文敏與獻吉仲黙昌糓俱深攬環結綬之好詩雖平衍較王錦夫孟望之似勝送徐昌榖使湖南二首鴻鴈惜離羣噭噭鳴不已如何平生親奄忽去千里懷哉可奈何王事有端委城南走相送意逐東流水駕言度前岡迤邐歴河涘道路阻且長嚴程自兹始贈子以瓊瑶酬我一端綺昔與子北征嚴霜拂貂裘今子遽行邁春水浮蘭舟永懷㑹晤好重此離别愁出門望千里楊栁倐已抽想見歳月積回首瀟湘秋遥窺九疑山近賦黄鶴樓嗟哉滯一方安能從子游感遇朝旦别燕京景落憩吳船揚舲發潞渚伐鼓信洄沿芳蘭已衰歇歸鳥紛飛旋䬃䬃風揚沙皚皚氷塞川黄雲結四野白霧縈三邉顧瞻望城闕參差御飛軒撫化心愴惻覽物淚潺湲行行指舊山稅駕從所便周廣一首廣字充之崑山人𢎞治乙丑進士以監察御史劾錢寧貶懷逺驛丞移知建昌再謫竹寨驛丞寧誅復官仕至南京刑部右侍郎贈右都御史有玉巖集遺辰州張尹江口風逾急孤舟日已西多情江上月相送過辰溪黄鞏七首鞏字伯固莆田人𢎞治乙丑進士官大理寺丞天啓初追贈少卿諡忠裕有後峰集林雨可云先生詩直而多思澹而自然山中吟春山澹無姿春雲濕將雨隔林有人家知是雲深處雲深山徑㣲欲徃疑無路不如山中人只在山中住襄陽即事斷岸移沙觜江城倚漢濵山光餘照日花艶近逢春勝地登臨遍東風感慨新不知耆舊傳更有姓龎人冬日書懐獨立蒼茫裏悠悠一轉逢風塵連嵗儉湖海又塗窮野曠飛鳶急沙寒落鴈空思君何處所斜日下簾櫳謁潁考叔墓封人千載後坏土覆孤墳天下誰無母如公亦愛君黄泉歌大隧白谷翳寒雲曠世予心感西風日又曛閔子祠青山環故冢古木䕶朱闌師友諸科景親闈一子寒里名今不改廟貌久猶完茅土雖封費終非季氏官偶成三十功名四十歸山林已自落塵機罪當萬里投荒服恩許終身作布衣雨宿風餐歸路棘東封西祝諫書稀扁舟不道江湖逺回首燕雲是帝畿芋園發舟西風又作扁舟客沽酒沙頭對夕暉岸轉青山背人去江空獨鳥向人飛十年塵迹今衰鬢九月嚴霜尚裌衣望極紫宸天萬里未容回首戀柴扉孟洋三首洋字望之信陽人𢎞治乙丑進士除行人選為御史坐論張桂詔下獄謫桂林教授遷知汶上縣再遷嘉興府同知陞湖廣僉事引疾歸旋起山東僉事進參議轉陜西參政拜僉都御史廵撫寧夏改理河道終南京大理寺卿有有涯集杜子材云望之標格氣骨頗有矩矱然王元羙云孟望之如貧措大置酒寒酸澹泊不置腥羶同穆敬甫云孟詩逸氣超羣横不可制與仲黙生一區足稱二羙顧𤣥言云大理調雅詞綺髙響竒絶仿彿天台石梁羅浮水簾不黄清甫云洋詩善叙事長歌宛轉相屬而意竭但少遒耳詩話左孝亷舜齊獻吉外弟也孟大理望之仲黙外弟也左詩近膚孟詩太淺比于郎伯邈若雲淵贈朱生與子别離時乃在灕水陽灕水東西流徃櫂無回檣還顧桂山隈城闕鬱相望修衢帶廣陌車馬如雲翔子居貧士里散帙空盈牀嵗久塗路仄思心阻且長一朝時運㑹奮飛游帝鄉戢翼復南旋問我來建康驚喜如夢寐顔色各已蒼衷情未云極話言詎能詳行行度湘川采掇多蘭芳無以遐逺故聊寄莫相忘九日次邉青厓太常韻落帽憐髙興銜杯意轉哀葉辭霜後樹人上雨中臺為客悲秋盡思鄉見鴈來百年幾佳節又負菊花開荅髙大和侍御寄書舟過衡陽鴈已疎經年那得故人書一封忽漫來何處千里殷勤問謫居海上青驄遥羡汝湘南芳草正愁予清秋直北朝星斗回首雲山萬疊餘殷雲霄七首雲霄字近夫夀張人𢎞治乙丑進士授靖江知縣調青田陞南京工科給事中有瀛洲芝田二集朱中立云石川詩得初唐體裁海嶽之竒氣也王元羙云殷近夫如越兵縱横江淮間終不成霸度穆敬夫云殷君與太白山人多倡和宜其風似之俞汝成云石川氣逸才雄思竒語勁騷壇一勁敵也逺顧𤣥言云給事菁藻時髦才情遒麗李時云近夫豪雄逸宕不羈之才詩話近夫如傳寫手欲開生面而神采未工然風格自存終不作鋪眉苦眼求似感遇孤鳥失其林日暮鳴且飛風枝棲未定摇揺將安歸中洲有芳草慘澹少光輝舟楫蕩流波根株苦無依悲此逺征人三代故鄉違萬里長塗間安知身是非東海有釣綸西山可采薇悠悠迷方子誰能識其幾長店大風揚塵沙白日昏林丘前塗浩莫辨聊此停吾舟崇岡蹲狐狸髙樹鳴鶹我欲驅之去惜哉無弓矛鸞虞嗟已矣此輩今何求夜登定山朝泛桐江水夜躡定山石延蘿踞虎豹嘘波動潮汐俯闞馮夷宫疑入羽人宅林静江有聲雲昏㟁無迹懐哉坐哀聽戚矣闕逺覿風勢依峰峻月色連江白飛鴻鳴逺浦潛蛟舞深澤飄飄千里舟脈脈獨遊客乘桴嗟有志棲巖悲失䇿薄宦竟何有幽期誰與適覺迷道有獲含欲情無逆眷言詠白駒聊以慰今夕宿江隂得太初書侵晨發毘陵薄暮及江隂積雪明髙原歸鳥喧前林孤舟風雨夕大江雲霧深遥遥越鄉感脈脈游子心羙人隔江浦寤語安可尋情至物有合離析領瑶音愛賞欣自古慕羣悲獨吟寄言狂歌客一尊待吾斟虎丘寺落日青山外浮雲滄海邉江山皆勝迹樓閣自人天碧草生公塔丹厓陸羽泉平生獨徃志欲老翠㣲顛杜楊劉三君子擕酒過官舎次杜韻縣齋㣲雨過蒼苔越客芳尊向晚開池畔好風驅暑去松間明月逐人來三年戎馬身無定千里鄉書鴈未回痛飲狂歌聊復爾不堪愁病兩相催漫興二月澄江春水深北孤山頭雲隂隂北孤山頭雲作雨我欲渡江愁我心倪宗正二首宗正字本端餘姚人𢎞治乙丑進士選庶吉士出知太倉州入副武選諫南廵受杖知南雄府有小野集題網魚圖白白江波紅尾魚蒲花初發栁花疎江洲日暮忘歸去江魚上網不知數風雨欲來猶不來篛笠且挂磯頭樹為顧新山題畫用思道韻久住水東溪欲徃水西去一夜春草生溪路無尋處孫泰一首泰字時寅歸安人𢎞治乙丑進士官刑部郎出知成都府改兖州有龍溪藏稾詩話龍溪守兖日康陵南廵中涓苛索供億力請以身充役時同里蒋公瑶守揚州衛民甚扈從貴人相誡謂湖州人難犯及龍溪卒檢視篋中僅圖書數巻衣數襲而已蔣公㢘節略同今兩家子姓式㣲已甚信夫亷吏不可為也西江道中九月菰蒲色尚清芙蓉深淺漾沙汀一行新鴈從天落我欲圖歸作畫屏索承學一首承學字遜夫邳州人𢎞治乙丑進士戸部郎中有桐岡集西樓晚眺在家無事不勞生暫倚危樓㸔夕晴雲裏樹含山外寺渡頭人語水邊城荒村茅屋秋砧早野店漁家晚炊明吟罷新詩還自和西風吹落塞鴻聲安磐一首磐字公石嘉定州人𢎞治乙丑進士改庻吉士授兵科給事中進都給事中議大禮被笞免官萬歴初追贈太常少卿有頤山集詩話公石集句最工惜所著頤山集詩話罕傳楊用修述其論詩之旨云唐之名家自立機軸譬猶羣花各有丰韻乃或翦綵以像生或繪畫而傍引終非真也又云論詩如品花木牡丹芍藥下逮苦楝刺桐皆有天然一種風韻今之學杜者紙牡丹芍藥爾其説足以解頤題畫百里同雲雪滿篷冥冥那復計西東輕舟不畏邪溪水朝定南風暮北風張寛二首寛字徳宏太倉州人𢎞治乙丑進士廣東按察僉事周復俊云張公不以詩名而標韻自逺大駕南郊行殿彤雲合晴郊綵仗攢鑪烟香細細羽扇影團團禮樂從周典威儀盛漢官帝壇風露肅轉慮聖躬寒早朝曉日含青陸疎鐘散紫煙聞雞頻視夜騎馬獨朝天馳道千官肅梯航萬國先御爐香不斷長繞翠華邉周宣一首宣字彦通莆田人𢎞治乙丑進士除常徳推官擢監察御史廵按山西諫南廵不死後出為山西提學副使遷廣東按察使坐事免有秋齋集聚書樓樓外長河練帶斜河頭水氣欲蒸霞誰家艇子捕魚過衝落小桃一樹花林文纘一首文纘字徳緒候官人𢎞治乙丑進士歴官湖廣布政司參議有潄芳集再入計冒寒發江郭隨衆述所軄驅車䇿駑馬夙夜不遑息行山歴峻阪遡川履深澤昔來楓葉青今徃霜林赤郡縣本舊游轉盼非疇昔新知多遷除故吏半更易惆悵時物移銅符猶未釋服役職所任詎歎如蓬跡耿懷抱微誠天顔期再覿田登二首登字有年長安人𢎞治乙丑進士河南參政有偶山集明妃曲明妃逺嫁靜邉塵一曲琵琶萬里身惆悵西風千古恨封侯談笑是何人巴東峡晚泊孤舟春水生逺灘雙櫂片帆輕消魂一覺鄉心夢卧聽四山風雨聲方獻夫一首獻夫初名獻科字叔賢南海人𢎞治乙丑進士改庶吉士累官少保兼太子太保吏部尚書武英殿大學士贈太保諡文襄有西樵遺稾閒居和杜子羙韻問徑隨春草支筇入午雲歸來陶靖節多病沈休文花氣單衣稱松隂小簟分悠然天地别白日絶塵紛嚴嵩十六首嵩字惟中分宜人𢎞治乙丑進士改庶吉士授編修累官禮部尚書少師武英殿大學士有鈐山堂集張文邦云少師詩中典則其聲鬰律而不恌其出恬澹而有餘足以經緯風雅仲王子衡云介谿詩思沖邃閒逺在孟襄陽伯之間唐虞佐云崆峒子評介谿詩曰淡石潭翁評介谿詩曰逹逹者其辭和淡者其辭平和平之音其于古作者庶㡬矣劉介夫云鈐山集詩宣志理情和聲昭則渢渢乎魏晉遺音崔子鍾云惟中詩清婉而綺不浮其質孫鷺沙云鈐山格致髙古韻度深逺屬辭景中游情言外無近時膚脆之習而氣機員轉精采華妙徃徃自見于繩法之外胷楊用修云介谿春容大篇寒瘦輕俗不入其次皇甫子循云少師詩逹而和澹而平明潤而婉潔𤣥穆敬甫云嚴詩清竒固聲律家所不廢顧言云相君多秀句大率多類錢劉贍陳卧子云嚴相氣骨清峭應制諸篇頗為雅特束濕寡自然之致爾詩話𢎞治乙丑殿試泰陵焚香祝天願得良輔不意是㮄乃有分宜吁可怪也然分宜通籍即見知于獻吉仲黙旋請假還里讀書鈐山者七年獻吉逺訪之山中作鈐山堂歌以贈于時子衡華玉廷實子鍾允寧應徳輩交相引譽又走使萬里索用修㸃定其詩可稱好事矣其與友人贈荅詩云自非肉食相藏拙安所宜又云故園多所歡薄宦何為者贈相士顔生云本無蔡澤輕肥念不向唐生更問年一似恬澹自持無意榮利者迨爰立之後驕縱貪黷忿懥慆滛失其本心終以致敗暮年自序詩集云晚登政塗百責身萃回憶舊業如弁髦然觸口縱筆率爾應酬不能求工亦不暇求工也對應德亦云少于詩務鍜鍊組織求合古調今則率吾意而為之耳分宜能知暮年詩格之壞而不自知立身之敗裂有萬倍於詩者生日詩猶云晚節氷霜恒自保昧心之言將誰欺乎而應德翻謂不煩繩削而合若湛元明一序讀之尤令人張目不意講學者貢諛乃若是王元羙樂府變云孔雀雖有毒不能掩文章殆平情之論乎贈友北風吹層波髙帆疾於馬矯首望雲山日夕到鄉舎親友慰逺歸春杯正堪把故園多所歡薄宦何為者阻雨不得登蟠龍溪上風雨來䬃䬃篁竹亂油雲翳層峰對靣隔霄漢鳥道紆百盤龍門在天半佳期恨緬邈寒望増淒斷下馬憩林居一顧屢長歎自無飛仙術安得凌絶觀常甫憲副欽之翰檢與予先後登嶽欽之獨值雨同賦祠謁朝景暉峰登雲物變今朝山中客零雨罷平聲登踐林深厓路窄幽賞不可遍磴滑危難歩谷暗近莫辨兹山號靈幻頃刻殊隠見叨余上晴巒萬状悉輸獻愧乏摛毫賦琢句被厓蘚君侯擅風騷胸中富溪巘佳辭出天巧不復勞洗鍊巖巒閟輝彩草樹迷蔥蒨豈被山靈妒或遭造物譴並覯欣兹竒獨徃惜已殿期君嗣芒屐言保筋力健金山寺擁金山古江流碧海深千年此形勝詞客㡬登臨波浪浮香閣魚龍聽梵音晨風渡舟楫真有濟川心西陵觀月萬古秋天月西陵午夜㸔影流蒼柏罅光滿碧雲端節序逢揺落山河對欝盤憑髙瞻玉宇正憶鳳樓寒冬閏和李宫諭歳閏移隂律寒深值晚冬市飇連九陌樓雪俯千墉宫醖閒能醉鄉書病嬾封虛慙殿門籍寂寞卧髙舂崔子謝病還懐寄相送出郊寺獨歸愁郭門春城渉逺道朝雨戀芳樽幽夢時或到素心誰共論若為經濟略歸卧水雲村過彭城十月彭城水臨觀勢渺漫客帆牽樹杪日夕畏風湍汴泗流爭長魚龍卧未安無人守茅屋寂寞傍江干發宜春風雨枉諸公出餞别後懷寄出郭衆峰暝蕭蕭風樹鳴嶺危攀磴上橋斷渉溪行四牡勤王事三湘問楚程郡齋山霧裏回望渺層城盧溪謁周元公祠古鎮無監稅髙賢有奉祠位卑名德重世逺士民思風月盧溪迥衣冠宋代遺停驂肅瞻拜敢惜去程遲石期驛逢李明府清苦東安令心期得共論官㸔銅綬貴貧惜布袍溫野樹依巒嶂春江對驛門天涯一擕手風雨送離樽謁孝陵社稷戎衣定梯航玉帛朝睹河功戴禹瞻廟祀宗堯石馬嘶空翠金燈照寂寥遥㸔鍾阜上御氣滿層霄同徐郡侯登浚渠亭渠在郡城西唐刺史李将順所鑿民賴其利目為李渠久湮徐浚之築亭其上傍有龍祠徐侯亭子李侯渠水石新呈宿莽餘秋淨野田聞鸛語雲深仙洞隠龍居驅馳暫駐三湘節登賦初陪五馬車此日佳遊習池共他年故事峴山如山塘山塘深且廣邐迤抱山麓隔浦見人家依依桑柘緑出仰山鐘聲在山間客子出山去細雨濕春衣新寒入髙樹送顧使君華玉赴全州吳客孤帆楚水涯碧雲千里度長沙湘山獨夜㸔明月莫聽猨聲便憶家明詩綜巻三十三
