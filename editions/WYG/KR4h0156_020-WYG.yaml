body:
  text: 明詩綜卷二十翰林院檢討朱􅂜尊編曽棨八首棨字子啓吉安永豐人永樂甲申賜進士第一授翰林修撰歴侍講侍讀學士左春坊大學士進詹事府少詹事卒贈禮部左侍郎諡襄敏有巢睫集楊東里云子啓迅筆千言不費思索而理致文采皆到雖沉思者有所不及又云子啓詩如園林得春羣芳奮發錦繡爛然狀冩之工極其天趣他人不足彼嘗有餘王行儉云曽公詩詞雄放清麗出入盛唐諸大家永徐子元云曽詩如天馬行空不可控御袁之云曽公浩若懸河所乏嚴潔雜王元美云曽子啓如封節度募兵東征鮮華沓精騎殊少項子長云子啓天才雄麗所乏者謹嚴精潔耳穆敬甫云曽詩冨於才情湧㵼如泉在永樂中可稱獨步顧𤣥言云少詹才長七古該博逸蕩惟以健捷為工頗以緐靡為累蔣春甫云少詹詞鋒豔發若青萍倚天韻語清華如紅蕖透水又如金羈玉勒㣲有蹄齧之恨静志居詩話子啓下筆不休不事推敲偶合繩墨五言如斷雲京口樹殘月廣陵鐘暝色迎官舫春寒到客衣雨從江北少山到宿州多殘燭明官舫疎鐘出郡樓寒潮𤓰步月殘雨秣陵舟七言如雲中鸞鳯扶雕輦水底魚龍識翠華草綠野塘多是水雨晴沙路不成泥平鋪碧甃連馳道倒㵼銀河入苑牆均不失唐人風格吕梁洪洪流昔懐襄區域信茫昧斯民靡寧居嬰此昬墊害吕梁塞衝波滔天勢横潰怒霆鬭鏗訇飛瀑㵼澎湃神哉夏先后敷理乘四載沛然導東注下與百川會造化有設險惟此乃其最扁舟泝奔流涉歴今巳再水師身手捷徑渡良足快􅃡懐胼胝勞遺跡逺猶在偉兹疏鑿功萬世終永賴題王孟端墨竹送人南歸十年官舍長安陌欲種篔簹愁地窄軒前有此八九竿蒼然一片瀟湘色九龍山人思不羣胷襟灑落如此君筆端颯颯起風雨紙上漠漠生烟雲幾回看竹稱奇絶為寫琅玕照冰雪縱横屈鐵金錯刀滿堂便覺秋蕭騷周郎愛竹癖於我興至時尋竹邊坐我生疎嬾無所爲但與江海同襟期喜君愛竹有如此便以此圖持贈之丹楓白水江南路歸帆直向湖中度慎莫提攜過葛陂恐化羣龍上天去駕發臨城雞鳴寒漏徹車駕發臨城殘月千山曙浮沙一路平雲光隨鳳輦露氣濕霓旌馬上頻回首猶看燎火明茌平地旱空多井林疎逺見樓平山通縣界漯水入河流過客詢張鎬鄉人説馬周北來多古蹟惜未得淹留涿鹿道中逺樹孤城出高原四望遥山從平地起雪到暮春消細草承雕輦垂楊拂御橋愁連易水上風色正蕭蕭徳州幔城初解向朝暾霜冷重裘曉未温小邑有城皆壘土荒原無徑可通村郵亭過客頻詢路茆屋遷民久下屯此去景陽州不逺建牙鳴鼓是營門别弟憲副鼎莫向尊前唱渭城老來離别最傷情江南渺渺孤舟夢嶺外迢迢萬里程驄馬曉嘶霜氣肅鱷魚夜徙海潮平到時應及春初候先報京華白髮兄夾溝東風吹暖栁絲柔十里青山繞夾溝馬上逢人相借問計程兩驛到徐州周述三首述字崇述吉水人永樂甲申賜進士第二授翰林編修進諭徳陞左庶子有東墅集詩話唐人讌集賦詩毎推一人擅塲如昇平公主席上李端擅塲送王晙鎮幽朔韓翃擅塲劉相廵江淮錢起擅塲他未暇悉數永樂中命翰林賦白象則胡庶子廣第一賦神龜則王贊善汝玉第一午門觀燈則陳員外宗第一然員外觀燈之作比之周庶子陳祭酒似猶遜之實非擅塲也玩秀軒華軒臨清流秀色堪攬結霞彩相蕩漾波光互明滅花飛渡頭春帆落洲上月縱觀心目超静對形神悦應共滄浪人濯纓笑予拙賜觀燈詩今夕逢元夕歡聲遍九垓星臨銀漢動月傍碧空來紫禁千花繞金門五夜開聖情同宴賞玉漏不須催寄楊顯道先生我憶楊夫子風流似昔人素琴長對月白髪不憂貧彭澤陶元亮稽山賀季真相思欲相見烟樹幾回春周孟簡一首孟簡字孟簡吉水人永樂甲申賜進士第三官詹事府丞出為襄府左長史有竹磵集丙午除夕為客逢今夕寧親憶去年一尊終不醉孤館自無眠家在雲山外身依日月邊何堪雙鬢改又值歲華遷李時勉七首時勉名懋以字行江西安福人永樂甲申進士選庶吉士授刑部主事進侍讀改御史官終國子祭酒卒諡文毅改諡忠文有古亷集詩話忠文古之遺直不以詩名而扶風數篇雖未逺擬秋胡要非拙手可辦予嘗獲公致湯都閫手書楷法遒勁乃知書亦能品也古詩為扶風竇滔妻作七首深閨有思婦慘悽亦何為容華不自惜獨理流黄機言將成匹帛多裁游子衣衣新忽變故恩愛從此衰以兹殷勤意翻作長恨辭蘭茝被幽畹桃李媚春陽新㛰結綢繆鞶衿散芬芳弃置父母歡婉娩君子傍白日麗朝彩朗月澄夜光矢心以相顧願為鴛與鴦西墅起高臺迢遞憑雲岑中有嬌豔女當窗弄清音音容蕩以肆居然變同心魚目奪明月讒口鑠黄金不見冀中饁惻愴扊扅吟高車擁旌斾輝映漢江曲冨貴一朝異窈窕辭别屋言笑落日遲浩歌湘水綠山川不可踰安得遥相逐佳麗誠足珍凉薄難見録滔滔江漢流到海不復返千里得所歸中復厭婉娩在昔枉綏授駕言不辭逺誰知三周御却道羊腸坂芬芳空自持白日忽以晚昧旦不能寐攬衣起中堂織縑與織素誰復知短長咫尺組幽思迴還遂成章緘之戒僮御欲以寄逺方宛轉達苦志敢期昔所伉别久意恒親覽辭念愈結巾車適千里倐忽已超越鳴琴諧古調恩愛感離闊夙心諒所負慙歎對明月睠言固終始皓首以相悦陳敬宗二首敬宗字光世慈溪人永樂甲申進士選庶吉士授刑部主事改翰林侍讀轉南京國子司業陞祭酒卒贈禮部右侍郎諡文定有澹然居士集陳卧子云文定詩典質和平盛世之風詩話祭酒清徳與李忠文並重號南陳北李詩特雍容温粹洵稱盛丗之音元夕賜觀燈詩劍佩清宵近峰巒翠閣重花明金殿月香度玉樓風拜舞諸蕃集歡娛萬國同遥聞歌吹發五色度雲中白蓮太液澄波濯素容玉衣垂影水晶宫月明無處尋顔色只信香飄十里風王英七首英字時彦金谿人永樂甲申進士選庶吉士歴翰林修撰侍講再扈駕北征累官南京禮部尚書卒諡文安改文忠有泉坡集蔣春甫云尚書詩雄壯宏大氣象自好詩話西王宻切謹嚴句無浮響如别路斜陽京口樹他鄉明月洞庭船挽得琱弓射飛虎賜將宫錦繡盤螭舊館空餘秦地月古壇猶似漢宫秋皆琅然清圓可誦也自勵團團匣中鏡皎皎流素光鑒物無遁形妍媸安得藏經時若昬翳㳺塵漫飛揚顧此三歎息胡為失其常拂拭去瑕垢精采復煌煌衆汚不可染持已貴自臧恒當慎夙夕惕然以自防哀義士周益詩步出崇明城遥望城南里天寒飢鳥啼日暮北風起綠楊何蕭蕭衰草生故壘傍有三尺墳𦵏此千載士昔時從戎馬一身赴邊鄙但全手足愛百戰何足畏崎嶇越闗山辛苦乃云逝傷哉有斯人薄俗誠所愧遺風何凜然聞者皆墮淚贈伍子正還巘山舊隱積翠羣峰出盤雲古洞深澗花春帶雨山木晚澄隂猨鶴多年别江湖萬里心還攜謝安妓歸去一登臨秋初有懐呈曾侍講彭修撰二公律應清商動凉生大火流梧飄金井露雁度玉門秋爽氣消殘暑砧聲報逺愁佳期七夕近乘月却登樓榆林直宿有懐邵菴學士對月之作榆林春夜漏聲遲獨憶奎章對月時翠袖清歌看駐輦彩箋紅燭坐題詩連雲尚有青山在夾路應多綠栁垂北望窮荒凋落盡昔年文物倍増悲舟過盂城畫船撾鼓過盂城兩岸桃花春水平今夜湖中好風景直須看到月三更淮安别回御史逺别悠悠鄉夢頻逢君况是異鄉春可憐湖畔青青柳又折長條别故人王直十六首直字行儉泰和人永樂甲申進士選庶吉士歴翰林修撰侍讀進學士擢吏部尚書加太子太保進少傅兼太子太師卒贈太保諡文端有抑菴集李原徳云抑菴詩文清緻追古作者辭錢原博云王公含咀英華出入經史文典雅超邁今古年沈景倩云王文端以庶常為文皇所眷不數召入内閣書機宻文字授修撰駕幸北京太子監國與黄淮楊士奇三人輔導儼然宰相職矣帝再幸北京公扈從進侍讀仁宗朝為侍讀學士又以庶子兼侍讀學士宣宗時進少詹事兼侍讀學士英宗即位充實録總裁尋進禮部左侍郎兼翰林院學士正統六年禮部闕人始命出部治事自此以後雖拜吏部尚書加保傅不復兼學士矣公墓志本傳中云公自言西楊不欲我同事内閣出我理部事據此則公在内閣凡歴五朝為東里所擠始出理部事其初固閣臣也而海鹽鄭氏豐城雷氏太倉王氏紀述宰輔更不及此公何邪鍾廣漢云東王諸體斐然徽徽溢目詩話東王不得爰立西楊之力也觀其撰東楊文集序云直之去翰林惟公深惜之而反為忌者所病夫士之進退出處有命焉非人力所能勝奚以病為哉又題東里翰墨卷云楊氏與王氏世有連予竊祿翰林從先生者三十七年教益多矣予之事先生負恃親愛於凡所當言者盡言不諱則有之非理而誶語則奚敢後予去翰林或謂出先生意蓋言語以為階豈旁觀側聽者固能知其情邪而予實不自知也繹其辭雖隱而情事躍如矣特其人長者故為東里作傳止揚其善已君子哉若人乎其論詩有云詩者志之所發也方其動於中而形於言雖各有自然之機然非取法於前人而欲從容中度不失其正亦難矣覽集中詩未遽出西楊下顧元美元瑞諸公品隲詩家甚廣獨不及焉何與騶虞詩有靈者獸是曰騶虞環滁之山以潛以居其靈維何莫之與匹既𤣥其文而白其質猊首虎軀尾參其身一日千里孰知其神振振仁厚不踐生草彼物之生亦不以飽維天生之亦自天成聖明之世為祥為禎維今天子道徳純至肫肫皇仁逺邇一視昭事上帝曰敬曰誠孚於下民皆樂其生皇天惟親兆民胥悦神祗效靈騶虞乃出石固之山榮光燭天百獸從之其行蹮蹮彤軒文檻帖然自致翼以祥飇獻于天子天開日晶慶雲垂英百僚歡趨騶虞在廷騶虞在廷實為大瑞龍馬神龜乃同其類昔在太宗文徳武功騶虞之來頌聲渢渢維今天子祖武是繼騶虞復來以昭盛治穆穆聖明天眷滋彰萬世之隆萬世之光小臣作詩以歌盛美播之韶鈞垂示無巳豔歌行翩翩春歸雁秋至復來翔如何逺逰子兄弟各異方山川何迢迢參辰夜相望寒風日以厲零露結為霜空林静無人但見明月光徘徊不能寐徙倚臨中堂睠彼南飛翼故鄉安可忘吳城山阻風雨泊舟吳城山勝覽斯為最登臨記曩昔正與匡廬對兹晨一寓目烟雨森晝晦莫辨咫尺間安知天地外㣲茫彭蠡澤洶湧百川匯長風翻洪濤歘見蛟鼉背夙聞垂堂戒行止焉敢昧發儀眞道中登岸延覽憶前行曽侍讀王修撰舟行苦邅迴登岸曠心目天清浮雲卷野秀新雨足澶漫衆流會杳靄羣山綠風暄花意亂日暖鶯聲續却憶同心人無由踵前躅題山水贈楊熙節郭純永嘉人善畫自疇昔興來展豪素滿眼絢金碧永樂年中獨擅塲拜官得在内作坊時時承詔恣點染九重出入生輝光洪熙改元初進位閤門使常言酒後妙入神傾倒壺觴不知醉供御之外頗自珍一筆豈肯輕與人忽持此幅來贈我令我坐憶江南春江南何處最奇勝錢塘西湖誰與竝諸山逺近翠若圍豔杏夭桃色相映橋上行人駿馬過橋邊桂楫揚清波岳王祠下喬木老林逋宅前芳草多春光如此佳可賞逺道迢迢心養養朝回看畫悄無言夜雨寒窓神獨往山陽義士真好奇平生脱略誰得羈昨日到京師秋風露華白訪我小瀛洲暫作神仙客飄然復往不可留拂衣欲向東南遊題詩卷畫贈爾去相思定倚新城樓題夏珪風雪江村圖江天漫漫雲氣黑江風蕭蕭雪花白荒村古道人跡稀惆悵津頭逺行客黄蘆低折沙草平遥望不見長安城蹇驢凌兢縮如蝟鞭驅還欲西南征四山溟濛日應晚辛苦羸僮未遑飯深林歸鳥棲巳定茅屋人家去猶逺吁嗟乎夏珪之筆凌范寛滿堂凛凛生晝寒卷簾看罷重歎息歲晏高歌行路難題周永新所畫山水括蒼周永新作畫有奇趣京師為我寫此圖仿彿鄉園昔游處我家舊住西昌城西昌山水天下清金華武姥最奇絶連峰疊巘高峥嶸仙宫梵刹在其上寶殿珍樓屹相向白象青猊不見過翠鸞綵鳯猶聞唱逶迤岡阜瞰滄洲下有長溪萬古流越王臺荒莎草合龍君廟冷松篁幽平沙漠漠行人小巖藹林霏没歸鳥石潭魚艇自夷猶茅屋人家更深杳我昔捫蘿上紫岑振衣獨立清煩襟天台㣲茫𤣥圃闊蒼梧縹緲瀟湘深山中仙子顔色好坐閲年華後天老便擬相攜賦逺游萬壑千峰拾瑶草塵事羈留竟獨歸别來幾度見春暉逢人尚説彫胡飯當暑猶懐薜荔衣只今容髪半衰朽事業文章復何有况聞荆棘長芝田側望天涯謾搔首高堂看畫増慨慷如此好景非尋常君恩未報心尚在何時乞身歸故鄉顧進士所藏畫虎趙亷畫虎名天下好事求之不論價披圖忽然見此物坐卧雖殊貌閒暇岡頭樹綠風氣凉下有流水聲浪浪蕭條古路絶行迹但見藜藿如人長深山麋鹿可充腹莫向田家取黄犢禍機一發戕爾軀豈若安常一生足秋江獨釣圖蒹葭淅瀝秋雨霜明月照水天蒼茫扁舟静夜泝空闊驚起沙邊鷗鷺行釣車不用置在傍此心寧羨鯉與魴扣舷獨往歌滄浪歌聲激烈増慨慷山中之人遥相望謝庭循自畫秋景洞庭八月秋風早楊栁蒹葭漸應老栁下茅堂逺市廛寂寞間門對幽島居人無事不出門林深地僻如荒村門前道上車馬絶過雨蒼茫空蘚痕江清水落沙石出水底渾疑見鮫室鷺鷥鸂􅈃皆有情啑喋喧呼亂晴日我家故業連滄洲贑水文溪遶舍流圖中景物渾相似見之令我増離憂君今善畫得供御下筆縱横有神助何時為埽寰瀛圖一葉凌波向南去帝京篇贈鍾中書子勤曙闕霜一作嚴鐘啓宵衣玉一作促漏催雲移宫扇静一作徹風引御香來劍履羣公侍簪裾萬國陪小臣瞻盛美稽首頌康哉雪大雪下龍墀蓬萊曙色移一作促曙輝光通九華殿花滿萬年枝賦擬梁園作歌憐郢曲詞西山臨魏闕相對玉參差月下對酒萬里浮雲盡孤城畫角殘月從今夜滿人在異鄉看隱隱闗山逺凄凄風露寒客愁難為減應賴酒杯寛景陵挽歌靈馭陪仁考仙遊侍太宗珠丘連翠殿玉匣閟𤣥宫海宇攀號切天庭陟降同遥知六龍駕長度五雲中得兄行敏書知在臨清將北上嶺外三年别天涯萬里迴書從今日到船向幾時開落日闗山逺清秋鴻雁來重陽看漸近同醉菊花杯雨野迥雲容黑汀長雨氣寒春隨花片減愁向酒杯寛亂水通流急孤舟逆上難白鷗渾自得來往任風湍章敞二首敞字尚文會稽人永樂甲申進士改庶吉士授刑部主事歴員外郎中改吏部擢南京禮部右侍郎有質菴集詩話侍郎兩使南交却金不受以清徳聞其詩不費雕鎪間合榘度鄉山圖為魏仲房題連山際東溟層巒儼天設陽林耀青葩隂厓餘積雪原田莽迢遞烟霞互明滅時菊萎舊裳蒼苔閟行轍雲谷杳難尋澗芳那可掇懐故念易盈覽物意彌結㳺目愜心賞幽期􅃡乖缺一為莊舄吟浩歌徒激烈長安雪夜歸興半生歲月老幽燕鏡裏蒼顔豈似前曽道休官身便樂夢書封事乞歸田周忱二首忱字恂如廬陵人永樂甲申進士改庶吉士授刑部主事轉越府右長史超拜工部右侍郎廵撫江南陞户部尚書改工部卒諡文襄有雙崖集王行儉云公詩文出入唐宋諸大家詩話進士改庶常相傳自永樂甲申始是科命解學士縉選得二十八人以應列宿文襄自陳年少乞讀中秘書時人謂之挨宿云攷洪武乙丑有楊靖徐孟昭郭資皆以庶吉士稱大誥亦載庶吉士廖孟瞻以受賕誅則又在乙丑之前矣至戊辰年解縉亦為中書庶吉士益信不始於永樂初也其後文襄鎮撫江南凡二十二年以經濟名世詩非所長然性好儲書其藏室詩云羣經既並蓄百氏無弃捐所至毎充棟來往勞車船嗜學如此宜其吟諷亦未逺遜二十八人也故彭惠安贊云學博而邃沛乎有客二十八宿誰能右公徐州過桓山宋司馬桓魋之墓愚哉宋司馬仲尼安可輕欲害其如何不知天所生此山昔𦵏骨廢穴尚留名宿土消飯含飄風散精靈日中狐集夜半鴟鴞鳴當其始建時久逺勞經營荷鍤萬夫集石椁三年成詎知百世下牧豎來縱横君看孔林樹千古猶青青尋天台李道士齋瑶草迷行徑丹臺近赤城山川遥在望雞犬不聞聲谷静松花落橋横澗水鳴雲間雙鶴下欵聽紫鸞笙李昌祺二十七首昌祺名禎以字行廬陵人永樂甲申進士選庶吉士擢禮部郎中出為廣西左布政改河南有容膝軒草運甓漫稾李時勉云李公詩有典則温厚者有流麗痛快者有舂容浩瀚者雅陳徳遵云公於詩本之以理充之以氣故其淡清麗宏偉新奇無所不備不必逺較于古就今而論千百之中不過數輩而巳鄭徳新云先生詩清新冨麗音調爽澈隱然有一唱三歎之音作蔣仲舒云方伯詩亦清新要非手詩話方伯務謝朝華力啓夕秀取材結體頗與段柯古相似題山水小景野外少人躅值此佳日遲偶與二三友游觀賦新詩青松藹緐䕃碧草含華滋逍遥恣言笑童穉亦娱嬉濟濟炫春服悠悠詠清沂兹歡恐難再興盡以為期湖山佳趣卷宦㳺愜深好乃在名勝區山水自足適况兹職文儒横經有餘閒逍遥出通衢春服各已成遂與童冠俱徘徊恣言笑登陟忘飢劬晴鳶戾層空弱藻翻文魚至理與景會天機獨吾娛悠悠仰川上眷眷懐舞雩詠歌返黌舍高興誰能踰徐道士安處軒塵氛既屏絶氣宇亦澄鮮心恬境逾寂慮遣情自捐結宇依層巖開軒俯重淵遥林含宿雨古樹帶秋烟落花晚成積歸鳥夕知還習静泯衆累守默息萬緣清虛固其性聲利豈所便智黜道乃得朴返眞斯全將隨鳯鸞侣以引龜鶴年經浯溪讀元結大唐中興頌平生念浯溪鐫鑱有遺跡揚舲沂湘水登臨蹔來即穹崖倚層雲奇險自天闢漫叟詞既嚴顔公筆無敵鬼神屢呵護風雨長洗滌忠槩儼尚存氷銜猶可識端容斂襟讀感慨重心戚誰畫靈武謀大物取何亟唏嗟中興業諒重君子惜逡巡解舟去回顧三歎息蝻冢七月月生魄蝻出溱洧疆始焉學躍跳倐忽羽翅長所過赭郊坰矧復遺稻粱坐令飫飽腹立化飢餒腸督民殄斯類晨夕紛遑遑隳突羨壟畝炬火明山岡燎焚弱質儘撲擊㣲骸僵卒夫載朽胔絡繹持筥筐穿穴掩腥穢作冢官道傍罪浮彼破鏡雖死安能償蝮蛇實揺處巳疾傳醫方蜜蜂誠小物亦解奉其王畜蠶必吐縷世賴充衣裳畏蚊恐噆體幬幕席與牀青蠅奚足憎赤蠆應可防編竹蟻知報勤誦螢聚光致雨蜥蜴驗起痺全蝎良原性殊善惡稼穡咸無傷獨兹口吻酷黍稷爭先戕乾坤動物夥去爾庸何妨吾將告真宰投畀魑魅鄉昆蟲永無作歲歲歌豐穰觀啓母石夙負山水癖苦乏幽討緣幸兹崧與少秀色當眼前公餘陟峻岡忽覩石一卷特立四無鄰觚稜不相聮云是啓母身化在郊墟壖呼之乃擘裂啓出仍完全幻語本荒唐昉見淮南篇遐想覆載間滄桑屢更遷安知運代移墜彼千仭巔厥理誠可推賢達固釋然矢詩正妖譌昧者庶或悛後世有豪傑為我焚其篇端午日㳺少林寺少林聳岧嶤有路達蔥嶺半生懐勝槩老乃踐真境緇流逺見迓偏袒仍露頂升高縱遐觀頗覺癡緣屏蒲風翻卷帙艾色侵衣領掇蔬僧具供飲騎童汲井自拈清淨香作禮爇古鼎超超昔神師順寂同溟涬而於片石上留此不滅影竺夏雖異轍皆貴能猛省寒巖許分坐禪定畢餘景送楊郎中催馬草還京大梁據中土自昔風氣旺北邙殊蜿蜒太室極雄壯黄河貫其間浩浩恣奔放四野開平衍桑柘綠相鄉丁男事耕耨姑婦治絲纊菽麥盈倉庾醑醴溢盆盎近歲頗凶屯旱暵觖農望念兹飢餒餘十室九鰥曠長貧負租税逺役困夫匠督芻實賴公區畫咸適當深體堯舜心推仁憫彫喪叱咤尚弗忍矧肯施鞭杖愧余謭劣才旬宣乏善狀竭力奉寛條庶減疲癃恙贈别陳時艱冀君徹卿相擬古吾觀日與月乃是隂陽精彼升此攸降循環有常經萬方仰臨照元良則其明離纒遂晦蝕惟辟修徳刑𤣥象雖􅃡邈人當思戒懲夏末偶尋洞惠道院曉起凉月淡絺衣坐肩輿灑然塵慮豁遂即道者廬蕭條殿廊存亭軒化荒墟山門憩樵農蘚砌鹿豕趨雷傾有墮瓦樹伐無遺株仙家尚消沉况乃俗士居蓬萊屢清淺此事諒弗虛吾聞至人言一氣運化樞莫窺機纖㣲孰外定數拘通由饑亡命載以賄喪軀榮華豈久在役智悲羣愚丙寅初度作余生如穉松由寸望百尺既承雨露滋亦受霜雪積蹉跎踰七十勤苦曾備歷誤䝉明聖知謬忝中外職顧已慚菲薄於時乏裨益處盈虧必隨履泰否斯即至理諒在兹昧者固弗識叩閽乞殘骸休退恩旨錫遂令犬馬軀獲返田野跡長揖畫省僚重負從此釋今辰届初度㕑傳仍岑寂傍人競嗤笑窮約猶曩昔妻孥頗愧赧而我固悦懌平生守儒素晚節敢變易回思永樂初歲月類梭擲同年四百餘多巳在鬼域存者纔十輩猶被利名役迂疎獨何幸林下得偃息遺榮遂安閒養静忘跛躄游鱗泳清波羈鳥斂倦翼貧非吾所憂病豈吾所戚過吳門次薩天錫韻七澤三江通甫里楊栁芙蓉照湖水閶門過去是盤門半掩珠簾畫樓裏蘼蕪生遍鴛鴦沙東風落盡棠棃花館娃香徑走麋鹿清夜鬼燈明絳紗三高祠下東流續真孃墓上風吹竹西施去後屧廊傾歲歲春深燒痕綠高道士所畫山水伊誰丹青擅能事畫出羣山與山似樹杪如聞雪瀑泉林間疑有雲門寺杖藜橋上知何人抱琴可望不可親高師指點笑相語我昨圖成殊逼真題周參政所藏山水小景天壤有異境描摹付良工佳山與秀水幻置軒窗中村村陌陌皆勝處花竹園林饒雅趣過鳥疑飛却不飛行人欲去何曽去松坡竹塢疊更重雪瀑倒濕青芙蓉岡巒島洞盡在眼樵牧耕釣俱可容九曲溪流漾清泚荒渡斜陽見舟尾石上吟翁鎮日留欄前眺客今年倚我觀風物似杭州樹木雲霞分外幽豈必西湖有竒勝展圖高興亦悠悠題秋塘􅜇鴒圖秋風淅瀝秋塘淨菰米沉波荷折柄翻藻魚跳水氣腥采菱人散歌聲定蓮莖嫋嫋綴枯房上有雍渠立晚凉翠盖裂殘渾改色紅衣落盡尚餘香圖中頗得周詩義未論工拙先觀意不寫和鳴寫急難人間誰獨無兄弟嗟我龍鍾命弗齊今年同氣委黄泥白頭徒重鴒原感展卷他鄉忍淚題留魯山縣黎庶凋殘甚惟餘朴儉風名因元子重地本魯王封撫䘏無賢令流移有惰農誰將于蔿曲歌向五雲中新野即景村暗濛濛雨流渾淺淺溪菊花長帶濕豆莢半沾泥野逈居民少林昬去路迷自投新野界蒿草與人齊周原幽居山色蛾眉秀江流燕尾分亂蟬吟落日獨鶴引歸雲黄葉溪邊樹青帘雨外村興來留客坐隨意倒芳尊早發小孤山遇風湖盡江逾濶舟窮路若迷垂楊春寂寂芳草雨凄凄漩水黿鼉窟平沙雁鶩堤風波隨地有何處可幽棲送陳生歸吉水赤岸清砧兼落葉總是别離情去路千程逺歸舟一葉輕秋雲連樹暗寒日映川明亦有滄浪興何時共濯纓送周秀才游長沙迢遞長沙道蕭條晏歲遊亂山黄葉寺孤櫂白蘋洲夕鳥衝船過寒波背郭流毋論卑濕地賈傅昔曾留送戴教授北行别路三春雨行舟五兩風花香隨路減栁色上衣濃共是青雲客先成白髪翁離情如逝水萬折亦朝東新安謡三首新安野老髪垂肩説著先朝淚泫然洪武初年真少事幾曽輕到縣衙前垂老頻逢歲薄收秋租多欠賣耕牛縣官不暇憐飢餒喚拽官車上陜州當夫當匠子孫亡田地荒蕪户有糧昨日迤西蕃使過盡驅婦女趕牛羊宜陽道中綠隂重疊鳥間闗野棗花香宿雨殘天遣浮雲都捲盡教人一路看青山嵩縣遇端午老大偏多故里心一逢佳節一沾襟誰知此日菖蒲酒又在山城獨自斟胡謐一首謐字廷慎鄞縣人永樂甲申進士歴官山東參政秋思逺客尋常歎索居秋來懐抱意何如高城月白砧聲急古戍霜清木葉疎塞馬正肥秋苜蓿江蓴空憶舊鱸魚故人迢遞天南北不寄相思尺素書嚴貞一首貞字頤正嘉興人永樂甲申進士知景陵縣詩話頤正詩僅存栁州城樓一首浙音彚編謂官至雲南右布政使攷雲南舊志布政使題名記有嚴貞係寜波奉化人乃永樂戊戌進士别是一人也和栁子厚登栁州城樓獨上層樓望海天異鄉愁思正茫然溪雲暝帶桄榔雨野日晴銷薜荔烟百粤湖山通絶徼半江菰米熟秋田舊㳺别後多零落目斷滄波祗自憐明詩綜巻二十
