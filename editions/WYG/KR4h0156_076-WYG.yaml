body:
  text: 明詩綜卷七十六翰林院檢討朱彛尊編黄端伯五首端伯字元公建昌新城人崇禎戊辰進士除寧波推官改杭州厯禮部郎中南京既下死于市有瑤光閣集靜志居詩話元公近體瀏亮雖注意逃禪都無蔬笋之氣絶命辭云欲識分身處刀山是道場靈運可以作佛矣從軍行二首萬里長城北蕭條白草荒風沙吹不去秋色正茫茫日冷行空壘天低壓戰場别来一回首何處是家鄉遼落蕭闗外隂風萬馬肥至今勞北顧何敢念東歸列戍傳金柝寒沙卧鐵衣戰場春不到白雪作花飛山隂道中夙昔流觴地回溪曲曲盤遙憐沙月迥漸覺海天寛暮色横烟暝春隂閣雨寒自耽泉石趣無夢到長安建徳道中青天霜氣迥匹馬立平沙逺道風千里寒城月萬家亂山盤徑險深樹引堤斜夙昔悲秋意偏於作客賖夜泊龍湖登仙居閣閣夜鳴風迅江天度月寒石林幽獨到沙路暝相看倒樹斜懸壁驚濤急下灘長懐仙境勝便欲棄儒官徐汧一首汧字九一長洲人崇禎戊辰進士改庶吉士授檢討厯贊善諭徳庶子升少詹事家居投水死三月十九日珍饌精鏐賜講筵每逢令節主恩偏十章書未陳金鑑九逝魂猶戀細旃社稷風雲誰奏曲園陵霜露已經年龍髯回睇橋山逺玉匣珠襦不忍傳顧咸建一首咸建字漢石崑山人崇禎癸未進士除錢塘知縣死于官詠落葉杖策滄江思不禁乍逢搖落一驚心迎風野鳥當枝坐泣雨寒蛩抱葉吟掃徑空餘千樹曉巻簾獨對萬峰隂幽居一夜聽蕭瑟片片隨流不到林陸培一首培字鯤庭仁和人崇禎庚辰進士除行人家居死難詩話大行風概自持卒蹈桐隖之節曩與陳公朱明以文社不相能大行既就義陳公亦赴越江以死曰吾生何面目見鯤庭於地下今兩公竝祀忠烈祠絶命詩誰謂朝廷一命輕行人使節本皇明春秋官叙諸侯上周禮班從司馬名雍國尚慙收采石荆胥無計泣秦兵蕩隂徒有湔衣血烈帝孤臣恨未平祁彪佳一首彪佳字幼文紹興山隂人天啓壬戌進士除興化府推官選授福建道御史巡按蘓松改南京畿道以大理寺丞轉巡撫應天都御史謝病歸乙酉閏月自投寓園池中死詩話祁公美風采夫人商亦有令儀閨門唱隨鄉黨有金童玉女之目其司理莆陽也慮閩人語近侏􅍣預遣人潛往買二麁婢詢其鄉音及升㕔事胥史多操土語侮公公佯不知浹旬後按籍遍召在官人至一一聲其罪衆驚以為神迨入為臺諫即進封事略云凡文武内外大小諸臣必使之安其位而後各盡其心邇来六卿九列之長詰責時聞引罪日見因而周章急遽救過不遑竊恐當事諸臣悚於嚴㫖冀以迎合揣摩善保名位臣所慮於大臣者此也人材中下參半藉上感發其忠義鼔舞以功名今司道有司或欽案之累由人或錢榖之輸未足降級住俸什居二三必至苟且支吾急功赴名之心不勝其掩罪匿瑕之念臣所慮於羣臣者此也陛下聞鼓鼙而思將帥之臣儻得真英雄即推轂設壇夫豈為過一或奬拔之術未盡則冒濫之竇將萌臣所慮於武臣者此也陛下深懲惰窳特遣内臣撫按之事多令監視正恐同罪同功反使互䝉互蔽開水火之端其患顯啓交結之漸其患深臣所慮於内臣者此也其言切中思陵時弊故其後亡國卒由此數端云公甞治别業於寓山極林壑之勝乙酉閏月六日坐園中題其案曰圖功為其難潔身為其易吾為其易者聊存潔身志含笑入九泉浩然留天地又書曰已治棺寄蕺山戒珠寺可取以斂我是夜兄子鴻孫侍側夜分不寐公第曰君子之愛人也以徳逮鴻孫倦隠几步至放生碣下投水昩旦猶整巾帶立水中子理孫班孫葬之園旁舍池館為寺塑公像于堂至今存焉豐莊為愛農家樂莊居築圃場秧鍼霑雨足稻子過風香北郭依桑樹東皋接藕塘主人多種秫春酒足壺觴劉宗周二首宗周字啓東紹興山隂人萬厯辛丑進士授行人遷禮部主事厯光禄寺丞尚寳少卿太僕少卿引疾歸㝷補右通政削籍起順天府尹再引疾歸起工部左侍郎以左都御史掌都察院事乙酉六月不食死有蕺山詩集詩話先生家居恒服紫花布衣士大夫爭效之布為長價呉江趙士諤知㑹稽縣事甞問先生疾造榻前出而歎曰豈意今日得覩管幼安萬厯丁巳京察議及先生士諤時為考功郎爭曰劉大行之清修人所不堪此士諤之所親見者乃止吾鄉吳太常磊齋於天啓壬戌登第之前夢一隠者誦文信國山河破碎風漂絮身世浮沈雨打萍之句問其姓名曰劉宗周也太常不省念臺先生以儀曹郎知貢舉相見驚訝其後交契靡間甲申之變太常死之逾年先生里居絶粒旬有四日而終遺詩云信國不可為偷生豈能乆予甞造先生廬堂不過十笏京兆干旌尚存思陵曾賜勅云蔬食菜羮三月不知肉味敝車羸馬廿年猶是書生先生當之信可無怍出通州用友人韻策蹇何所之遭時亦云厄一步一回首四郊營壘迫大道宜如矢青天萬古闢從此遂已而身後令人惜酬别長安故人弱栁千章鎻鳯樓春風送客不勝愁杜門重憶十年病束髪誰先天下憂銷鑠壯心吾自老傍徨歧路子何求却教空谷傳驪唱落日浮雲滿帝州温璜一首璜初名以介字于石烏程人崇禎癸未進士除徽州府推官乙酉六月死于官有貞石堂集詩話温公少孤母陸孺人鞠之破屋一間無帷帳姑沈病且死同坐卧一板箱種火煨粥以為食教其子讀書姑卒孺人哀毁如子天啓七年公請于有司聞于朝詔旌其節孝又一十八年而公成進士年六十矣司李徽州聞國難恒引佩刀嘆曰此身當付汝及城破先殺其女寳徳次殺妻茅妻女皆延頸就死乃自刎公初名以介注名復社第一集不以兄在相位見擯于清流後禱夢於于忠肅祠夢忠肅語之云子不當名以介宜更曰璜遂更焉陸孺人著有家訓行於世寄友靈隠峰前手暫攜千章新緑子規啼眼邊流水春重到别後停雲思幾迷俯聽露珠傳㸃畫驚聞藥裹急刀圭殷勤簡付遺方法茹澹安縁緩杖藜左懋第一首懋第字仲及莱陽人崇禎辛未進士除澄城知縣選授户科給事中厯刑禮兵三科升太常少卿巡撫都御史以兵部右侍郎兼都御史督師河北充通問使不屈誅詩話左公將北行貽書姜給事埰大略謂國遭大故二東不聞有㫁頭穴胸以報故君者彼鄒魯仁義之稱安在懋第此行是懋第死日也既入燕卒以閏月十九日死于市新城王尚書士禎池北偶談云公母徐海寧儒家女甲申京城陷從子懋泰載以歸行至白溝河仰天歎曰嗚呼此張叔夜絶吭處也呼懋泰前責以不能死國且曰吾婦人身受國恩不能草間偷活寄語懋第勉之勿以我為念言訖而死葢出都不食已數日矣是母是子前史亦不多見道上歸鴻昨夜過紅葉見秋深念我籬邊菊思君石上琴舍車眺水色倚樹聽風音舊業荒東海悠悠此際心徐石麒十五首石麒字寳摩青浦籍嘉興人天啓壬戌進士除工部主事削籍崇禎初起補南禮部㝷改吏部升南尚寳卿應天府丞厯吏部尚書有可經堂集詩話冢宰歸田之日築堂于郡榜曰可經人不解其故及乙酉城被圍公度必不能守步自東門入城破自經于堂始信公之就義立志已乆葢與昔賢止水之意脗合焉公古今詩俱新警不作規撫蹈襲之語鍾嶸詩品以落花依草喻丘遲公實似之贈同鄉朱六符予本同圃蒿飄在天一端咫尺枌與梓邈若霄漢間翔鳥憩前林猛虎戀故山傷兹逺遊客中夜積悲歎忽遇故鄉友驚喜相盤桓把臂問舊事耆舊半摧殘憂根長愁條淚下如奔湍樽酒非不㫖安能起沈歡幸君到故園為我傳平安憩古墓作郊游無名山荒丘且踏屣古木既叢叢豐草亦靡靡隔葉隠幽禽清音啼不已石馬被文韉翁仲夾而侍不能驅牛羊朝暮齧其址此中陳死人井椁安足恃所以楊王孫裸身無乃是送錢車駕左遷歸里依依鍾山雲坦坦石城道驅車出龍闗送我昔所好舟子且停橈聽我歌草草巧仕有别材置身青雲表夫子天下士紉佩祗蘭藻忽失上官意飛章注下考粲粲當塗子片言由意造散宜策獻姝季路曾請禱柰何堅弗應深文任顛倒平生乆要者棄置迹如埽豈曰無蹇修洵美非吾寳長嘯歸去来形容豈枯槁君家錫山下門徑鬱蘿蔦雲乳發冽泉雪花散香稻潔白養髙堂此樂詎可討臨别重躊躇申言豁懐抱謝劉太史湛陸惠詩予曾過大梁臨風懐伊摰秉耒耕莘疇遽抱唐虞志一民不時雍内溝發深思此道乆已陳夫子願躬試文行動至尊頭龍親簡置既窮太乙竒復發鴻寳祕早晚宜相麻天下乃得治麒也啙窳人所受盈其器承乏白雲省爰書失聖意投荒分所宜而況僅播棄譬如纍碁者纍髙勢自墜烽火滿近郊逐臣正遷次感君懐芍藥題扇以相遺奄然蓬蒿人儼若佩華璲此情何可酬此念何可寘頓令松柏心白首欲自刺臨鏡攬鏡照病顔不知鏡裏誰似鬼有微息似人無雙頤似客貌何似是我何其羸展轉不能視掩鏡還自悲頭顱今如此百年寧所期安仁三十二𤣥鬢已成絲而況三十三於潘更長之江南多早衰昔人已如茲假令彭與籛臨殁等殤兒夭夀何足異尻輪惟所宜昔人有明訓樂天復奚疑苦寒行在句曲道上天寒敝絮僵如鐵車輪乍轉車聲咽厯過千山萬山雲時飄三㸃五㸃雪皮膚蝟縮毛髪張蹇驢蹄滑愁道長暮烟一㸃青句曲鞭梢遙指此中宿明月行懐王大基生今年月是去年月去年人作今年别去年對月兩相將今年對月腸㫁絶腸㫁絶兮起傍徨中宵重露如凝霜緑錢盈階時草芳縈予懐兮不能忘丈夫骯髒寧有淚已覺􅉡􅉡沾衣裳嵗如馳兮不我與望美人兮天一方仰天歌兮夜將旦明月黯黯兮沈垂楊曉發新州江抱新州碧沙仍舊日黄難期晴雨色莫辨水雲光逆旅便風俗征人漸老蒼平生我任達乆矣破行藏次團江下馬團風滸烏林舊戰場楚弓沙月白吳壘戍雲黄鑑影涵天逺襟流束地長江聲疑有恨如欲訴興亡黄州晚泊赤壁雲初暝烏林日漸紅波搖兩岸火人語隔江風夢鶴捎天路然犀逼水宫天寒游子意清夜月明中望匡廬突兀此何處匡君廬亘天黛浮五老壁青入九江船慧逺林中寺康王谷口泉苻生今已老誰與買山錢過安慶百戰舒州地英雄乆寂寥潯陽懸暮色滄海落歸潮楚竹然魚子汀蘆宿鴈寮金陵行且近不㫁瑞烟飄池口有懐黄鶴池邊鶴金雞石上雞乘雲千載去落月幾回啼不見仙人蹟空傳過客題蕭條暮江上腸㫁楚天低次蕪湖倚櫂鳩茲邑山光雜水氛估檣蟠郭逺市語隔江聞烟氣凝為霧歌風散入雲古来佳麗地無日不紛紛夜發靜海抵直沽禾黍髙低弄夕曛檣燈零亂破黄昏樹蒸夜氣三分雨帆裹秋烟一葉雲靜海金鉦鳴古戍直沽牙閫駐新軍援遼已竭東南力何日辰韓報䇿勲張翃一首翃字叔韓秀水縣學生城破整巾襴南向正席坐兵以刃臨之罵不已遂遇害鶴夢百禽正嘈雜此鶴獨孤眠奮翮豈無俟藏神亦偶然庭中人寂寂松下月娟娟知入寥天去緱山何處邊項嘉謨一首嘉謨字向彤一字君禹秀水人有讀選堂詞賦集譚梁生云向彤阮仲容謝幼輿一流詩篇都雅簡勝詩話向彤投筆逺游渡河出塞㝷入閩登武夷曹能始録其詩入十二代詩選乙酉閏六月城破束平生所著詩賦于懐投天星湖死子翼妾張從焉向彤墨林之孫賦性儻蕩不覉中嵗産落嵗辛已年飢糧絶從父以五斗米貽之妾張為執爨知向彤不甘澹泊以二升米易乾魚進飯向彤怒曰乾魚豈可下箸耶復以米三升易炙雞乃飯予家與向彤鄰竈婦述之以為笑謂是帬屐子弟栗果少年而視死如歸可敬也已晚次薌溪人家逺見女牆頭客到城邊盡繋舟薄暮寒蟬聲未歇心隨楊栁送殘秋錢應金三首應金字而介一字仙上嘉興縣學生城破走村居游兵掠郊野見其髮未開剃遂見殺有古處堂集詩話而介雅以詩詞名而今存者無幾屺閣贈周幼文謖謖山上松磊磊澗中石託根非不深所貴在貞白白華志養親陟屺怨行役懐古徒悠悠瞻母時脈脈綺疏闢南楹抗言恣墳索曲鍼不受磁腐草不受珀氷霜嵗云晏至理在琴冊沈甫受蝶花居秋色詩沈郎八詠世爭誇草色庭中不讓花秋氣逼人清入夢夢騎蝴蝶到君家邘溝烟荒月淡古邘溝淮水遙連江水流六代繁華餘腐草至今螢火照揚州侯峒曾二首峒曾字豫瞻蘇州嘉定人天啓乙丑進士除南兵部主事調吏部厯郎中出為江西提學副使轉廣東右參政調嘉湖道升順天府丞厯左通政使乙酉秋縣城破赴水死詩話萊陽宋公繼登備兵嘉湖夜有白猿竊其衣冠服之攂鼔升㕔事時海寧袁秀才株留公幕中猿入卧室披其帷秀才大懼公命𨽻卒環守而猿之往来如故也予童子曰偕諸昆弟行精嚴寺街人爭聚觀謂猿方坐鐘樓啖果予審視獨未之覩其後納言至止猿乃潛蹤又常熟時敏知海寧縣事夜草爰書有女子侍側磨墨問從何来曰鬼也敏既擢給事中代之者候官林垐鬼自是不復至侯公林令俱忠臣以此知邪不勝正理有然者晚行餘杭山中解鞍一散步羣峰亂將夕浮嵐羃遙青喬柯拂深碧須㬰落霞散銀紫紛狼籍㝷蹊得絶澗驚潨互歕射有如翠蛟舞飛下三千尺一步一回顧已覺耳目易此景宜急追一失難再獲送表弟楊維斗解元上公車赴隴徴書有曠恩仍偕計吏謁金門時危漸覺科名薄道在還知禮樂尊老子甲兵今孰仗嗣宗臧否不輕論氷霜嵗晚孤征夜襆被應知手綫温侯𤣥演二首𤣥演字幾道通政峒曾子雜詩道喪向千載百家日浸淫如彼鍠磬歇逐響遺其音元宰何微茫悠悠費追㝷世皆尚彫飾未敢明此心微言㑹將絶太息空撫襟和新栁詞秦淮雪濘緩春晴十里烟隄緑未明早是酒旗歌板地隔江風浪巻蕪城侯𤣥潔二首𤣥潔字雲俱亦通政峒曾子癸未九日寓崑山肺病經三月秋深寄古祠近山寒更早多雨菊翻遲漸減文章樂能忘寇盜悲今朝無客至令節有誰知示智舍天王十五年来事孤客三千里外人望闕尚留年少哭哀時偏見異鄉春坐愁南郡征輸日行過江黄戰伐塵直北大荒空草木春風生事又黄巾黄淳耀十二首淳耀初名金耀字藴生蘇州嘉定人崇禎癸未進士乙酉家居城破自縊有陶菴詩集詩話陶菴精於書義融㑹九經諸史審擇而出之當崇禎之季方以駢麗相尚不知者以為陳言予叔父芾園先生獨賞心擊節盡以其稾授予讀之乆之而漸有稱焉者如雅頌得所樂有堂上堂下之分又孔子未甞刪詩伯鯀未甞誅死皆至當之論乃邇来選家以其未盡合乎朱子之集注章句痛加塗抹是何異於下士之聞道乎詩亦堅厚無懦響由不惑於楚人之咻然也和陶飲酒朝光入山樓棲烏已驚喧攬裘暴新陽暖氣無頗偏仰視天宇清得我檐前山山中出岫雲變滅何時還我心正惆悵黙與風鈴言和癸夘嵗始春舊榖滿場圃知子良非貧糟牀注春醪酬汝四體勤開軒一笑粲莫適為主人荈牙花乳香鱠縷銀絲新咄嗟行酒炙童僕皆欣欣中原有格鬭行子勞問津不能濟時代甘與農圃鄰逝辭謝景夷来就劉遺民和乙巳嵗三月西崦有佳花首春烟霧積良游阻塵鞅耿耿懐在昔野寺流晨鐘雲林矯風翮湖山光皎鏡千里如不隔之子天機深平吟謝形役一持金石韻如與清賞易幽悰方悁劬況復暫離析寄言山中人參取庭前柏和歸田園居家無環堵宫所至思買山何異俟河清人夀期千年安得如古人采山復臨淵敬受十賚文賚以北阪田巖棲髙百層老屋餘三間湖江流東西竹木榮後前中央置講堂文史浩如烟歌風復蹈雅樂志忘華顛此意恐蹉跎飛光去閒閒畫餅不可食詼諧聊復然和擬古三首亭亭采桑女清光映城隅羅衣出纎手皎若春荑舒芳風何飄颻薄暮歸重廬行子皆歎息願言與之俱空簾隔星漢白露委蘼蕪淵意不可道蹇修定何如步上姑胥臺悲風来大荒古墳何嶣嶢下有黄金堂寳衣化寒灰月露浩茫茫前朝割據時復作繁華場侯王及厮役聚斂歸北邙感此拔劍舞青山為低昂秉燭方視夜歘忽明東方我非好名人亦起羊公傷弱年見承平自謂長如兹一從更事来世已非前時雕虎横井陘黄流混澠淄杖劍出門去行行復狐疑路逢季主儔問彼龜策辭龜策不我告黽勉自研思仁義心所安皇天吾不欺瀉水置平地東西任所之撫琴操猗蘭亂之以佹詩野人二首野人嘆息年嵗惡池中掘井井底涸飛蝗引子来蔽天辛苦將身事田作朝廷加派時時有哭訴官司但搖手歸逢吏胥狹路邊軟裘快馬行索錢野人嘆息朝無人朝中朋黨如魚鱗十官召對九官黙篋中腰下皆黄銀不知何人理隂陽頻年日食四海荒我欲上書詆朝士又恐人呼妄男子虞山喫虎肉作猛虎入山山氣惡腥風倒射巖石落兩三村甿不識虎謂是旄牛未生角扼虎之吭擥虎尾虎驚不及施牙觜東海無煩赤刀制南山已報白額死老夫覉旅春盤空短衣匹馬行山中坐分羮臛飽欲死拔劍四顧吾何功邨甿邨甿莫倉卒儒􅃣為爾頻衝髮人間真有猛於虎勸爾拔身辭虎窟次韻酬别張子石百丈牽江一線平勞君客裏念歸程即看去住誰能料可是分離莫漫輕白鳥背飛星子驛朱旗遙颭石頭城船牕日把詩篇坐香草含風處處生張貞白有離世之志作别廬舍詩見示予反其意留之𤓰廬小結在塘坳城市翛然即逺郊谷為愚公寧避辱亭因揚子不辭嘲鳴螿秋盡猶縁砌舞燕春深亦認巢莫愛雲松棲絶壁山中依舊要誅茅龔用圓一首用圓字智淵蘓州嘉定人天啓辛酉舉人嘉興儒學教諭侯雍瞻云先生司鐸嘉禾先伯兄方應備兵之命俾攝郡司馬事冦盜屏息迨聞南都不守挂􅃣歸里城破兄弟赴水家人入城蹤跡之於大栁樹下有二尸相抱持其一肘間懐印則先生兄弟也邈哉先生千古為烈矣顧端木云疁城既破龔博士智淵與兄用廣弟用厚猶子元韶元朋元增及閨閣殉節者五人先生苦心學殖篇章頗富惜散佚不傳湖上遇同年朱子暇一見相攜話舊遊湖光汎汎㫁橋頭寒烟迷却西泠路還向當壚問酒樓馬元調一首元調字巽父上海儒學生僑居嘉定人稱簡堂先生從師遊棲霞寺吾昔遊棲霞同人催北渡未識山中僧那辨山下路巖澗迷東西欲記恒恐誤先生理舊遊小子愜所慕黄毓祺二首毓祺字介子江隂學生有大愚老人遺集畫竹引贈朱白民長風從天来吹我魂飛飛飛飛上謁天帝扉天帝問我何所欲不願為人願為竹帝笑黄生無乃太癡竹有何好而爾願之我不願截為竿大魚小魚慘不歡我不願截為杖化龍君山之湖上我不願截為簫鳯兮鳯兮不可招我亦不願娥皇女英哀哀攀我泣重瞳馭遙叫不得朱白民朱白民願伊為我一寫真貌我形似兼精神所以願為竹不願復為人不寐憶元兄南行暗風吹雨夜蕭森布被繩牀冷不禁老别匪徒三日惡淡交奚止十年深案頭飢鼠縱横出階下寒蛩㫁續吟遙憶孤舟蘆荻岸有誰同我此時心夏允彛二首允彜字彛仲號瑗公嘉善籍松江華亭人崇禎丁丑進士除長樂知縣以吏部行取補考功主事旋歸里乙酉南京下自投池水死詩話幾社六子瑗公以經義見長詩非専尚然其撰長樂志境有孝子節婦必賦詩以旌之集中樂府未甞不合古人也野史述瑗公授命在乙酉五月第集有練川五哀詩按練川城潰乃是年七月五日瑗公尚存則止水之投當是松江失守之日爾襄陽踏銅鞮辛苦襄陽女織縑還織素縑成身上衣素作風帆布黄進士淳耀哀詩黄子不偶生大雅寡諧俗羽儀乍髙翥結綬匪所欲黄雲暗蒼梧北風號大陸烽火滿吳闗下邑勢彌蹙緬彼二三子登陴自躑躅城郢既已乖號秦又誰告處死良獨難苟生何能淑吁嗟烈士心伯仲互相勗威鳯既在羅恥與凡禽逐未知没者悲但見存者辱存没兩茫茫思君不可贖眭明永一首明永字嵩年丹陽人崇禎壬午舉人選授華亭儒學教諭乙酉八月三日松江城破自經不死投泮水被執不屈見殺有世經堂稾臨江觀古意即今懐闕樓煬帝飛樓届紫霄檻拍長江接海潮三千殿脚南巡汴百萬舟師東下遼晉陽戈甲從天起仁夀宫中泉作醴檻外楊花依舊飛千里桑田隔江水顧咸受一首咸受字幼疏崑山人天啓甲子舉人縣城破死于難落葉天半淒清鴈字斜箇人無賴小牕紗三分秋色三分雨半似霜容半似花忽送離愁迷曲徑暗隨幽夢度平沙無情最是堪腸㫁不為蕭條惜物華梁于涘一首于涘字飲光江都人崇禎癸未進士除萬安知縣陣没竹西亭茱萸灣水渙渙上有孤亭峙髙岸而今冷落荒烟㫁遊人不来蒼䑕竄問竹西人不辨惟有隴上舊耕夫五十年前説曾見麻三衡二首三衡字孟璿宣城人選貢生屯師姑山兵潰被執死于市詩話孟璿注名復社遽賦無衣陳安未克生還狼瞫已得死所詩如落日照荒野亡猿懐故林魂銷分劍日心折覆巢時草閣新寒入江邨落雁多一身去鄉土雙淚滿滄洲吳兒望嵗唯呼雨楚客憂生盡憶家夢回塞北雙流淚家在淮南獨倚樓萬山茅屋白雲滿十里句溪紅葉飛殊自超超朗朗贈錢聖月不寐成搔首蕭然獨寤歌霜天砧響急庭樹雨聲多酒力三更緩愁心萬緒過錢郎戀明主獻賦意如何春興三月新雨歇春流始到門叢筠連晝暝新燕掠波翻山靜鹿無跡林香風滿園中原多轉戰幾處欲招魂沈夀嶤一首夀嶤字景山宣城縣學生死于難即事幽棲如乆客日暮起啼烏橘實寒猶在梅花凍欲無聞鐘山寺逺聽雪夜燈孤賴有牀頭酒長吟可不沽王養正一首養正字聖功泗州人崇禎戊辰進士除海鹽知縣以憂歸補秀水謫河南按察司簡較升襄陽推官入為刑部主事厯員外郎出知南康府遷江西按察副使建昌既下縶至武昌遇害有漫吟等集對菊仙人授錦囊中有百年草本是駐顔丹人間不知寳胡甲桂一首甲桂字秋卿崑山人崇禎已卯副榜除南昌通判遷永州同知以道梗未赴改廣信城破被執不屈幽之别所自經死夜泊常山淙淙灘響上舟遲到面山容未即移更喜月明迎短櫂呉吟細聼隔船詞祝淵二首淵字開美海寧人崇禎癸酉舉人有月隠先生遺稾詩話崇禎壬午先生伏闕申救劉公宗周時未識劉公也及公罷歸始著録稱弟子附舟南還已而緹騎逮入詔獄寇逼京師有詔赦出比城陷太常卿呉公麟徴殉之先生視含殮䕶其喪歸塗遇呉吉士爾壎㫁一指寄其家先生為攜歸留都既下先生葬其母尋自經死㑹劉公絶粒公弟子王毓蓍自投栁橋下遺書于公謂慎無為王炎午所笑師弟之死葢不出三旬也西湖月夜二首落月鱗鱗水面浮露華濃滴桂叢秋不知何處鳴柔櫓驚起一雙雪色鷗佛火漁燈漸寂寥推篷起坐已中宵夜来極浦灘聲急知入西泠第幾橋李待問一首待問字存我松江華亭人崇禎癸未進士乙酉八月保松江城中流矢死卧子招飲卧龍山蓬萊閣故人留牘少酒坐亦從容俯視湖一曲不知花幾重澄煙天鏡水哀壑禹陵松身在蓬萊閣千巖第一峰明詩綜卷七十六
