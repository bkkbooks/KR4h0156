body:
  text: 明詩綜卷五十九翰林院檢討朱彞尊編朱國祚五十八首先公字兆隆號養淳秀水人以太醫院籍補順天府學生萬厯壬午中鄉試明年癸未賜進士第一人除翰林院修撰知起居注己丑充㑹試同考官辛卯典試江西歴司經局洗馬遷諭徳丁酉典試應天進右庶子戊戌以禮部右侍郎兼翰林院侍讀學士攝禮部尚書事壬寅轉吏部右侍郎引疾歸光宗即位起南京禮部尚書是年命入東閣加太子太保進文淵閣壬戌主㑹試㝷以户部尚書兼武英殿大學士加少傅回籍卒贈太傅諡文恪有介石齋集曹潔躬云吾鄉鉅公若吕文懿項襄毅屠康僖朱文恪俱研心風雅而不與作者爭名文恪詩尤婉秀軒軒霞舉一無俗塵望而知其品之清也出朱朗詣云先大父文懿公嘗過秀水文恪不迎既升堂先公意不懌詢之則文恪袍帶留質庫方令人取之歎息不置其清介如是詩亦非肉食人語正如氷荷在壑冷香襲人之陸麗京云易稱知幾詩詠明哲朱文恪足當聞利瑪竇進異物公曰此輩小智足以惑人將來必有助之更厯法者景陵詩派初行公覽之驚曰安得此亡國之音吾不忍見之也知幾其神乎三俞右吉云太傅清而能容質而有大體忠著朝無事不可為後世法即以詩論自抒性情不事沿襲諸體俱合不失正始之音鍾廣漢云文恪處門户紛爭之日中立不倚人所難能建儲事公私疏七十上其劾鄭國泰云本朝外戚不與政事册立非國泰所宜言可云犯顔强誎不畏彊禦矣而吳人有先撥志始一編没而不書則以公名不列東林之籍也尚得謂公非公是乎公與福清同年入翰苑同典試南畿晚嵗同心輔政聞福清初告歸中塗絶不㑹客獨過公譚讌三日然後行公贈詩有拙免書鈎黨衰猶話典墳公蓋自安於无咎无譽矣公初不以詩名而同時浙右諸公未有過焉者繆天自云定陵中嵗吾鄉朱文恪公葉與臨朐馮文敏同被命入閣將宣麻矣沈閣老蛟門以宻揭止之遂以少宰歸田箯車栗杖偕同里郁伯承游天台雁蕩諸山吟詠不輟其詩率寫胸臆未嘗摹仿前人惜其集未刋行為鄉曲一老儒塗竄朱墨混淆難辨失其真矣雩禱篇朱鳥協上序蒼龍啓佳辰我后隆祀禮羣生潔明禋紺筵羅彩旞瑶圖吐文茵雲歌逐清漢鳳管徹蒼旻蘭羞既云薦精誠亦已伸靈液以時敘而康億兆人同葉給諫過鐵柱觀有序南昌鐵柱觀相傳為晉旌陽令許遜鎻蛟處按唐李白詩云浪動灌嬰井潯陽江上風豫章城灌嬰所築疑此即灌嬰井也萬厯辛卯九月予與葉給事典江西鄉試畢偕游是觀覽其遺跡證以李詩給事然予言爰賦詩十二韻以紀其事微瀾逺通江水黑照無影誰鎻㦸尾蛟繚以千丈綆神州八柱外於此得塹穽地户闢趙尊真靈位陶景人言母支祁神禹昔鉗頸要當去民患不在逺方屏凍鐵斷繡花終古但嚴冷九派潯陽流有時風力猛潮生浪亦動疑是灌嬰井比於渴馬厓術可驗穅䵃我言殊怪牒給事默心領請誦白也詩可以發深省九日飲涵虛閣和葉進卿作傑閣峙層霄來游屏鬱怏晴臨山靄逼逺見宫雲敞天氣日以清江光一何爽候雁鳴汎汎寒潮長登髙循令序勝引屬吾黨甄藻協夙心爨桐得新賞絲餻乍出榼細菊且浮醠席移鳥遷樹坐久月承幌一唱白雪音滋我丹霞想蘇州送君輿姪赴試北上駕言勞舟發送爾出金閶游子將何之行行入帝鄉帝鄉日已近佳氣逾蒼蒼俯視碧水流仰看浮雲翔情隨水偕逺意逐雲俱長重寶抱璠璵殊材堪棟梁努力獻文賦佇聽聲名揚天台道中同郁伯承賦游目覽層峯攜手攀髙嶺舉步若登天畏塗復顧影喬柯聳白雲深壑陷丹井落日猶半規山色已先暝但愁寒虎嘷不嫌老鶴警忽聞下方鐘頓使千慮屏安得百丈厓縋以兩修綆天台人言天台髙四萬八千丈中有瀑布泉飛流衆山響多少采藥人石梁不得上我思斸壽藤削作過頭杖拄上最髙峰雲中一拊掌俞右吉云王獻之能為一筆書陸探微能為一筆畫郭恕先能為一筆風筝圖此詩雖五十言一氣融貫即謂之一筆也可石鼓歌橋門左右獵碣十形如古礎相排連窪中或與虀臼似抱質可敵瑶琨堅傳聞書自太史籀比於大篆尤瑰姸其辭典奥儷二雅仿彿吉日車攻篇周京遺製衆所信疑義莫定文成宣紛綸雖滋翟鄭議審視終異秦斤權下逮宇文豈能爾薺堂所見毋乃偏嗚呼神物不易覩三代舊跡稀流傳巫咸告辭熊相詛裕陵寶惜今棄捐比干銘折衞州壤穆滿書徙壇山巔㑹稽窆石字茫昧岣嶁祕跡文糾纒掎摭非乏好竒士千捜萬索無真詮詎若石鼓離復合陳倉入汴還留燕氊包席裹槖駝背塵蒙露濯爪牛涎置諸太學始皇慶于今又歴二百年深檐五丈宻蓋護不受長雨闌風顛我來摩挲輒終日證以郭薛施潘箋凝思斵桐來自蜀叩之定有聲淵淵文殘非因硬黄搨劃缺反撼鈎金填長廊無人起題壁回視落景棠棃懸少年行長安少年意氣豪雕鞍寶騎金錯刀呼盧百萬等土壤報讎一死輕鴻毛自言生為游俠子願輸肝膽酬知已此時未遇平原君且學鬬雞都市裏朝游紫陌黄金隄暮宿瓊樓桃李蹊探九直向杜陵北挾彈頻過渭水西一聞邊警還投袂轉戰前收漠南地介子身封萬户侯嫖姚家賜千金第瑣里行海外大九州一稃一粟島嶼浮是何瑣里國治厯知春秋髹槃驗一綫鍼將子午求曾未識中夏帆從何處收虬鬚鶻眼䫜其面海舶初來寄江甸巧將製器媚中涓自鳴鐘獻黄金殿吾思厯象由羲和縱有嵗差良不多豈容小邦定正朔倒置列宿成愆訛古來明王異物恒不貴逺人留之甚無謂況乎天官有禁祕不傳母俾此輩紊我靈臺篇雪夜來千里雪曉起徧長安轉覺西山近宜從上苑看河氷難渡馬野艇盡投竿最苦東征士關門擊柝寒經寧庶人廢苑和葉給諫韻吳濞何知反劉安但自尊魚鹽時不利雞犬爾焉存俘已儒臣獲軍猶鎮國屯白頭遺父老尚説獻王孫瀛洲亭新池奪玉燕山石疏泉太液流采桑傳自李鑿井舊聞劉謂李文正劉文安也浴鳥牽萍起纖鱗撥荇游相看無限意落日且淹留杜門杜門甘寂寞無事獨登臺白日旦復旦浮雲開未開幾聞鳩化眼孰藉鴆為媒只合還山夢輕帆一舸回同周公瑕屠緯真俞羡長石湖玩月分賦得天字今夜清秋月江橋一串懸樹深潛滴露水濶不分天滿載官㕑酒聽彈商女絃薄寒風漸𦂳主客未迴船初夏過沈純甫穆湖村舍逐臣歸嶺外近住穆湖村油菜齊抽甲珠藤不露根漉湯貓竹筍下酒鴨餛飩滿篋新詩卷曾無諫草存新昌石佛寺石佛何年寺空山麗相存一音不可説兩足此為尊雲起長迷路厓傾自作門箯輿下坡暝回首月明村雨夜黯黯浮雲色蕭蕭急雨聲人難今夜睡天慮此時傾茅屋牀牀漏菱池曲曲平愁心如曷旦不避暗風鳴葉進卿出都訪予里第話舊三日臨行景徳寺餞别三首自我辭京闕公今亦避賢一舟旋泛宅萬事且歸田西日雲仍蔽東溟海未填無由慰朝野把酒强陶然燒尾偕通籍揚眉共校文由來真臭味相逐比龍雲拙免書鈎黨衰猶話典墳相留三日醉離袂忍輕分景徳前朝寺經過路舊諳到門三貝墖負郭一龍潭别思花重驛離筵酒半酣平泉新草木須滿道山南金銘寺訪秋潭上人不逺金銘寺支公舊法堂鴟夷范蠡宅桯史岳珂坊過雨花盈砌抽梢竹覆牆由來方外社主客意都忘湖上峯頭寶所墖湖上水仙王芳草年年緑風荷岸岸香靸鞵􅂸細雨對酒易斜陽不計重門逺𤓰皮上小航繇桐廬經釣臺下作藥草仙人録星文釣客槎祠開髙下屋江溜淺深沙緑樹緜蠻鳥丹崖躑躅花誰歌竹如意懷古一長嗟萬壽寺貝葉三車少華鍾萬石餘聲仍到長樂地合置精廬瀟灑人王界莊嚴學士書秋來霜落後流響更何如聞蟬燕臺歇雨薦涼颸吹送蟬聲滿御墀清影不教塵外見長吟先入禁中知上林氣暖枝堪託仙掌秋髙露復滋撫罷五絃聽漸逺空庭疎樹午陰垂西山謁景皇帝陵戾園悽斷白楊風黄瓦今看天壽同北狩豈無通問使南城專賞奪門功若教守土盟城下安得蒙塵返域中多少諫臣司耳目昌言翻賴校官忠追復景皇帝諡號由荆門州儒學訓導髙瑶上疏言之恭謁孝陵同葉進卿賦夾道山松間石楠遥瞻暖翠鎖浮嵐靈龜玉殿十飛九孝陵開穴時中有玉龜十其九飛去一存享殿馴鹿銀牌寸有三鍾山鹿千百為羣有懸銀牌者髙帝時所畜牌約三寸第少豐碑撰方練陵無建文年碑悔多姦黨示胡藍胡惟庸藍玉之獄髙皇暴其罪有昭示姦黨録文皇帝後以目建文諸臣五雲縱護昌平嶺佳氣須知兆自南孝陵感革除事同葉進卿作四年萬事革除休遜國遺蹤何處求事去金川門不閉心驚王殿火初收空餘靈谷松千樹誰見文孫土一丘未必西南到天末魂歸終傍孝陵遊徐五修招游九峯三泖之勝晩過斜塘賦此月落風微何處鐘斜塘岸岸柳惺忪疎星數㸃布棊局宿鳥一羣衝釣􅞤潮水漸生黄歇浦野花齊放陸機茸故人擬贈丹砂訣商榷栖山第幾重天台道中落月林梢一鵲飛赤城霞已照征衣水清幾曾鵝鴨閙屋小也有松筠圍白葛花香眠鹿起胡麻飯熟行人稀當年劉阮本俗物到此何心苦憶歸自北雁蕩踰南雁蕩觀龍湫瀑布作靈域岧嶤隠不知中藏七十二峯竒披衣正在烟深處到面初無雨歇時謝客未曾經蠟屐貫休已後少題詩洞天只恨流傳晚莫覩蟲書鳥篆碑謁定陵有感述乞歸自放潞河船息偃江湖二十年往事句臚成夢寐重來弓劒莫攀縁要知孝為慈闈盡誰道恩從貴戚偏猶記南宫封事入聽言終似轉圜然自註國柞因請册立東宫劾及鄭國泰先帝不之罪終如所請恭謁慶陵作二首講幄頻趨鶴籞深重來就日慘棠陰十年始受東朝册一月真傾下土心視榷盡收中使節披沙罷採丱人金最愁日厯書難既龍去烏號涕不禁枚卜纔宣三殿麻深宫遽晏五雲車翠微色映長陵樹金粟堆開景帝窪北去重關遮鳥道西來一水抱龍沙白浮村下園官近未夏雕盤已薦𤓰頒厯恭紀閶門開曉日玉律下雲邊一紀逢羲馭千秋卜漢年靈臺占氣早上苑得春偏瑞靄含蓂莢懽呼雜管絃三辰傳夏令萬國戴堯天欲進昇平頌慚無白雪篇太學釋奠同郭美命行分獻禮畢周覽橋門石鼓歸途成二十韻上丁遲日麗咸秩辟雍先釋奠周官禮安歌魯國絃質明期敢後分獻典宜䖍宿鳥初離樹殘星尚在天百夫趨陛㦸萬舞列宫懸次第陳犧象從容執豆籩班居元老次位近素王偏十子升堂舊千春配享焉循階登降數薦帛節文全小大從于邁東西互折旋黄流纔灌地朱燎已生烟畢奏咸和曲徐收廣殿筵更衣辭鷺序散胙得羊肩坦步橋門外偕行獵碣邊形模度科臼嵗月昧成宣已免風霜剥無愁鐘簴遷四詩雖絓漏終古自流傳坐久趖松日歸來並杏韉協恭良不易同調最相憐好琢燕山石題名廟學壖西勾橋口占東雉村邊水西溝橋下流濯纓人不至處處浴沙鷗裂帛湖上作水淨一匹練山圍六扇屏春風纔幾日藥甲已先青即景秋風靡靡吹舟入蘆花裏相呼隔岸人聲墮半江水逢破瓢道人吳少君山人愛一瓢時時負肩背貽我巨勝花來自白羊隊東魯道上作汶水又一曲龜山知幾重從今氷上渡應少赤狐蹤東朝侍直二首殿庭香靄接雲平一道爐函夾陛行肅肅講臣齊鵠立金蓮影裏喚先生東華疎雨淨雰埃奪玉階平埽碧苔猶恐侍臣侵履濕宣從殿側左邊來晚過天寧寺郭外秋山百里晴日斜深院晚凉生十三層墖半扉影一鳥不來風鐸鳴題白雲觀一言止殺古人難多少逋臣藉爾安辛苦捐軀文信國得歸也擬著黄冠夜泊淨業寺僧樓佛火漾空潭李廣橋低積水含一夜朔風喧樹杪薊門飛雨遍城南西山湖上芍藥闌邊花氣收鸕鷀谷口斷雲浮倦游愛説江鄉事先試西湖一葉舟卧佛寺人傳蘭若春三月花比青彌陀院多惆悵芳時來獨後但聞風葉響桫羅碧雲寺銀牓髙懸寶地賖游人只愛寺前花不知賈舶徵求盡舊鬼年年哭潞沙秋入香山寺山半松門度石梁流泉決決響僧廊置身著色屏風裏棃葉新紅柿子黄洪光寺石門幾曲轉丹梯圓殿僧同怖鴿棲指㸃游人下山路酒旗風颭夕陽西夜宿鮑家寺青豆房低結構牢長松静夜卷秋濤分明一枕谿亭雨睡起不知山月髙中峯晩望中官丙舍即花宫松柏林前梵磬風試上精廬髙處望樓臺金碧夕陽中摩訶菴觀杏花作摩訶菴外袖吟鞭繁杏春開十里田曾與村翁舊相識看花不費酒家錢吳巨手云元時杏花齊化門外最繁東嶽廟石臺羣公賦詩張讌傳為盛事葛邏祿易之詩云上東門外杏花開千樹紅雲遶石臺最憶奎章虞閣老白頭騎馬看花来至明城東花事衰郊西漸盛萬厯後摩訶菴杏花多至千株吾鄉朱太傅養淳詩云云承平之日翰苑風流後先一致也祕魔厓祕魔厓仄蘚文斑千載盧師去不還遺有澄潭二龍子日斜歸處雨連山山牆圍作化人城榆栁隂濃信客行始信精廬風日好秋深猶緑壯丹坪劉應秋一首應秋字士和吉水人萬厯癸未賜進士第三授編修遷南京國子司業㝷以右春坊右中允管司業事充日講官升洗馬歴諭徳庶子以國子監祭酒致仕贈禮部侍郎諡文節有劉大司成集鄒爾曕云公詩文雍容舒徐出入韓歐間詩話文節儒臣非有言責而上書請東朝冠昏劾首輔彈中樞可謂古之遺直已其言有云近代論相多取諸詞林詞林雍容雅度一切齷齪猥瑣曽不關其慮博而習于故靜而徹于幾能以事外之身策事成敗則惟詞林勝矣寥寥數言其占地步不淺詩非所務無戾雅音送林仰晉謫茶陵夕郎抗疏出金扉萬里衡陽一雁飛世路何年遷客少聖朝今日諫書稀黄陵雨暗連青草嶽麓雲深濕翠微千載汨羅人不見寂寥心事更誰依葉向髙四首向髙字進卿福清人萬厯癸未進士選庶吉士授編修歴官坊局南吏部侍郎召為禮部尚書入直東閣以少傅予告再召為少師兼太子太師吏部尚書中極殿大學士卒贈太師諡文忠有蒼霞草詩話東林諸子奉福清為倫魁沙汰江河和調水火海内服其公忠歸田之日藴藉風流銜左相之窪尊賭東山之棊墅詩品在山林􅄗閣之間諸體皆具渡江即事無嗟風土異已自邈關河村舍人煙少旗亭酒幔多春寒芳草歇天濶斷鴻過長路方兹始微名奈若何送林客部南歸幾年共逐帝京塵此日那堪别恨新畫省風流傳諫草黄扉事業媿絲綸故園載酒宜清晝客路聽鶯屬暮春君到里門應北望長安猶有未歸人出關别江仲魚心知惆悵對離觴一望郵亭十里長自與江郎黯然别馬頭春草是他鄉題趙子昻明妃出塞圖三千粉黛泣長門嫁得單于亦主恩貌取紅顔無限恨集賢學士宋王孫周應賔一首應賔字嘉甫鄞縣人萬厯癸未進士改庶吉士除編修累官禮部尚書掌詹事加太子太保回籍卒諡文穆有月湖草去婦詞故人昨日新新人明日故同是機中人何必問縑素岳元聲一首元聲字之初嘉興人萬厯癸未進士除旌徳知縣改大名府教授轉國子監博士進監丞升工部主事厯員外郎中疏論首輔奪情落職起南京光祿少卿轉太常少卿再轉南太僕卿遷南兵部右侍郎進左侍郎有潛初子集詩話侍郎立朝侃侃不阿里居有不平事弗避嫌怨力排衆議以歸於正所謂鄉先生沒而可祭於社者集中韻語罕存寄弟一律曽以題扇者盖本岑嘉州嬌歌急管雜清絲之作後驂鸞録暨公集均失載殆不知者嫌其失黏而删去之也寄仲弟慶逺守爾律梅花花信春應早楊柳柳州種定曾天邊白雨愁卑濕瘴後黄茅苦鬱蒸秋風小鳥供行饌暗壑修蛇挂古藤驂鸞續録聞初就可似吳船范致能申用懋一首用懋字敬中長洲人萬厯癸未進士除刑部主事改補兵部歴員外郎中遷太僕少卿再遷南京太常卿以右副都御史巡撫順天進尚書薊門歸輿山河百二擁宸居亭障三千衞直廬要害直須勤版築軍屯好在理耰耡時議開復灤東漕河東巡直據𤣥莵塞北望頻傳白羽書自媿酬恩猶未得空留車馬賦歸與姜應麟一首應麟字子文慈谿人萬厯癸未進士改庶吉士授户科給事中以建言謫廣昌典史遷餘干知縣補龍溪起太僕少卿贈太常卿秋懷廿年投老此山丘倚杖閒看水獨流萬樹秋聲連斷峽一天凉雨過層樓因題楓葉開詩卷為訪蘆花上釣舟日靜衡門無剝啄忘機惟得伴沙鷗鄒徳溥一首徳溥字汝光安福人萬厯癸未進士改庶吉士授編修歴中允洗馬卒于家以講官諭祭有雪山草匍匐吟雨霽聞蟬西山一望隔簾櫳柳暗花明御苑東斷續蟬聲聽不盡夕陽人立小亭中王荁一首荁字季孺慈溪人萬厯癸未進士改庶吉士授編修題青牛出關圖柱下藏名久知希未足論知榮翻守辱體物必歸根一望真人氣應占大道存若為關令尹乞得五千言徐應聘一首應聘字伯衡崑山人萬厯癸未進士改庶吉士授檢討歴大僕少卿瀛洲亭對雨秘閣清宵近蘭泉曲沼開宿烟生暮雨新水長秋苔地向蓬萊接波分太液來憑軒多爽氣疑在白雲隈于若瀛九首若瀛字子步濟寧衞人萬厯癸未進士除户部主事歴官右僉都御史巡撫陜西贈右副都御史有弗告堂集葉進卿云文若詩泠然超詣不襲世人片語而情景婉至跡象可㝷厯王則之云文若近體清曠秀倩出入開元大之間焦弱侯云念東詩不激而高不刻而工雋永藏於温醇纖穠寓之雅澹所稱治世之音非邪詩話念東詩格未超然不屑作輭熟語宿唐洞寺野寺大道㫄短垣倚雲嶠舍策叩禪關平蕪恣延眺暝色還荒徑明滅寒原燒篝燈坐幽室皎月來相照未税塵鞅勞已窺靜者妙夜半風鳴條不減蘇門嘯晚投清江浦淮水吞江浦孤帆晚復開樹移沙岸轉波逆海潮迴人語迎村雜漁燈拂櫂來繫舟猶未穩寒漏已頻催髙郵湖髙郵初挂席波起蕩湖村逺水浮天白孤城過雨昏柳條依岸斷鷗鳥向人翻破屋稀烟火滔滔銷客魂再過清凉寺再入清凉寺髙臺覽舊都金陵猶王氣石壁自雄圖宻樹依城合澄江入雨無六朝人事改瞻眺獨踟蹰雨宿潼關明燈虛館淒清夜細雨蕭蕭亂客腸秋入關門悲鼓角年來驛路老星霜家臨濟水菰蘆白壠接南山黍穀黄千里故園愁阻絶夢還京國亦他鄉時寄家京邸寄隠閣春興小閣逶迤近水渠蕭條不讓野人居惟將藥裹供多病不為花飛憶敝廬懶散江邊清夢穏交游天上故人疎亦知衰晚甘淪棄世事浮雲任卷舒舟中雜興兩岸山相似舟移曲不妨回看京口盡落照下丹陽清泉寺滿谷西風椒葉稀穿林片片凍雲飛荒原車馬應無數閒殺山僧坐翠微金陵春晴雲曉壓石城孤江樹江煙淡欲無南雪未消靈谷寺東風先綠莫愁湖徐學聚一首學聚字敬輿蘭谿人萬厯癸未進士除浮梁知縣調吉水擢禮科給事中出為山東提學副使歴福建布政使㝷以右僉都御史巡撫福建贈副都御史阮霞嶼云敬輿詩文自出機軸為藝林推尚詩話𢎞正以前實録儲秘館薦紳罕得寓目此祝希哲九朝野記徐昌穀翦勝紀聞等書多齊東野人之語自華亭在政府抄有副本弇州見之故史料始得其實敬輿國朝典彚一編亦從實録采摭者也詩亦尚聲格惜所傳不多夜宿日觀峯禪房岱宗面面削芙蓉時有卿雲出漢封杖屨中天干象緯風烟下界起蛟龍河流舊繞滄溟逺練影斜懸紫翠重夜半石牀天籟發夢中錯認景陽鐘來三聘二首三聘字任卿蕭山人萬厯癸未進士除黄梅知縣調合肥入為兵部主事歴官江西右布政使有祠部南舟豫章蜀游東游南華等稾于念東云任卿詩格律嚴整而一種恬淡之氣不減陶家風致豫章夜雨一月餘寒在髙齋聽雨眠夜愁牽往事春夢入芳年才拙官何補家貧俸未捐遥憐鏡湖水重負杏花天解悶春風吹暖百花新院麴香浮竹葉春今日酒􅂸今日醉一年花老一年人浩歌聊借鶯為管醉卧何妨草作茵髙興未闌天欲暮攜壺帶月問西鄰何出光一首出光字兆文扶溝人萬厯癸未進士除曲沃知縣擢貴州道御史外轉太原知府京察謫寧州判官遷知樂陵完縣次獲鹿簡井陘顧兵憲孤城萬古控幽燕喬木殘碑不記年路入井陘分趙晉天開畿甸擁山川土門故傍封龍窟石邑猶存白鹿泉西北議和非上策使君此地好籌邊王時濟一首時濟字道甫稷山人萬厯癸未進士除户部主事歴郎中終衞輝知府登髙丘清林人跡稀我来何所翫坐看嶺上雲天風莫吹斷虞淳熙一首淳熙字澹然錢塘人萬厯癸未進士授兵部職方主事遷主客員外郎改稽勲郎罷去有徳園集景泰窪合沓衆山轉鴻溝界危岡貞松心不移偃盖覆神堂欲蜕龍為魚千古以慨慷土木骨縱横魂来闗塞長君王奠鼇足太史筮苞桑宗廟救倫喪朱火寒有光迎駕誼何篤覆轍戒難忘豈無延陵心重為亡國傷宫門一以奪羨門竟迷方碧瓦易黄屋蓬顆西山傍杜宇啼舊痕織鳥集野棠坤維幸勿絶一窪得新藏雲表扶九宫何必厰隂房碧血障邊塵芊芊白草芳迢遥西湖畔少保墓道荒君臣祀一體千里同白楊髙睇歌大招涕泗灑衣裳茅國縉一首國縉字薦卿歸安人萬厯癸未進士除章丘知縣入為廣東道御史謫知浙川遷南工部主事歴郎中有菽園詩草過白門酬拙之贈别孤帆渺渺指江汀飛盡楊花柳尚青此去不堪頻北望愁邊風雨滿新亭莊履朋一首履朋字中益晉江人萬厯癸未進士官户部主事别林尉桑梓勤吾念憑君破寂寥自今花下吏日折道傍腰象郡風煙隔龍城瘴氣消行春聊佐令亦足採歌謡張壽朋三首壽朋字沖和號西江南城人萬厯癸未進士除刑部主事謫泰安州同知終廬州府通判有深息窩集狂歌夷門老侯生刎頸送公子此義豈不髙感人安用死毛薛亦風流諷言何婉美信陵賴相成歸國見終始身隠世隨棄無復關人理悲哉豪俠流大道所不齒西湖憩胡氏亭中庭遥相望斗室更臨水云有賣藥人十年身已死柴扉苦長扃我到為之啓鳥跡半幽牕蛛絲横斷几花殘沒階前竹亂生屋裏村婦持帚來埽除亦堪喜破簷補荻簾新火燒楓子可以坐老狂開尊炙枯鯉夕陽何處歸大醉且閒止翠屏房江漁釣罷無市野寺殘僧似村鉏圃須留行路愛山莫掩柴門湯顯祖九首顯祖字義仍臨川人萬厯癸未進士除南太常博士遷南禮部主事謫徐聞典史量移知遂昌縣有玉茗堂集詩話義仍填詞妙絶一時語雖斬新源實出於關馬鄭白其牡丹亭曲本尤極情摯人或勸之講學笑答曰諸公所講者性僕所言者情也世或相傳云刺曇陽子而作然太倉相君寔先令家樂演之且云吾老年人近頗為此曲惆悵假令人言可信相君雖盛徳有容必不反演之於家也當日婁江女子俞二孃酷嗜其詞斷腸而死故義仍作詩哀之云畫燭揺金閣真珠泣繡牕如何傷此曲偏只在婁江又七夕答友詩云玉茗堂開春翠屏新詞傳唱牡丹亭傷心拍遍無人㑹自掐檀痕教小伶其後又續成紫簫殘本身後為仲子開逺焚棄詩終牽率非其所長宿浴日亭因出小浪望海為郎傍星紀江湖常久居倏忽過南海片帆挂扶胥隠隠岸門青杳杳天池虛培塿澹凌歴氣脈流紆徐潮迴小洲渚龍鱗勒溝渠於中藏小舟其外懸日車雲影蒼梧來咸池相卷舒孟冬猶星河淡月沾人裾陰陽盪揮霍精色隠踟蹰濯足章丘餘沐髪扶桑初濤輝臨侑盤若木鮮芙蕖西顧連崦嵫東眺極扶餘小浪亦莞爾大波始愁予㠗舶自吞吐樓櫓成烟墟飛金出熒火明珠落鯨魚吾生非賈胡萬里握靈糈晻靄羅浮外傳聞仙所廬玉樹如冬青瑶芝若栟櫚陽鳥不日浴晝夜更扶輿丹穴亦不炎好風常相嘘白水月之津一飲饑渴除徐問汝仙尉去此將焉如達奚司空立南海王廟門外司空暹羅人面手黑如漆華風一來覲登觀稍游逸戲向扶胥口樹兩波羅宻欲表身後竒願此得成實樹畢顧歸舟冥然忽相失虎門亦不逺決撇去何疾身家隔胡漢孤生長此畢猶復盼舟影左手翳西日嗔胷帶中裂㗅嚨氣噴溢立死不肯僵目如望家室塑手一何似光景時時出墟人遞香火陰風吹崒嵂上有南海王長此波臣秩幽情自相附遊魂知幾驛至今波羅樹依依兩蒙宻波聲林影外簷廊暝蕭瑟麗水風雨下船棘口有懷石城雙水門落日逺江介春潮風雨飛暮寒洲渚帶流雲蒼翠裏緒風簫鼓外分披悟曾裂合沓迷新届宿霧緬餘丘生洲隠遥派地脈有虧成物色故明昧曲折神易傷幽清境難㑹江花莞流放岸草悽行邁不見林中人自撫孤琴對送楊安入太原軍星使三河外春王二月初風雲臨上黨花鳥入昭餘關近笳聲急川遥騎影虛世途君自見長嘯欲何如偶成雁影金河盡梅花玉管催江南望春色獨上鳯皇臺浪石灘潮濕湞陽暮風鳴浪石寒鸕鷀飛不起横過釣絲灘恩平中火海氣層雲盡山烟逺燒浮孤臣隨早晩一飯是恩州覲回宿龍潭是嵗春連雪烟花思不堪雨中雙燕子今夕是江南臨江樓聞越舸且别悵然亂帆秋影半江樓燕語滄凉傍客舟便去揚州且明日故鄉今夜有人留姚思仁一首思仁字善長秀水人萬厯癸未進士除行人選江西道御史巡按山東河南升通政司參議大理少卿應天府尹入為通政使轉工部右侍郎歴尚書太子太傅有菉竹堂遺槀詩話肅皇帝信薊州人李昇嵩縣人刁騰之言分遣中貴崔閔主事沈應乾千户仝爵李鋐至其地相視銀礦是時遼東衞軍姜賢亦奏開盖州歸州之礦遂以賢為礦長至萬厯間陳開礦之利者紛紛於是中貴四出海内騷然姚公為巡按仿鄭俠流民圖撰開采圖説進呈力請罪役不聽既而開礦者爭相仇殺羣盜蠭起畿甸則齊本數李庸史籍周言張世才石賓河南則張住朱世安趙仲保蘭一枝王西安山西則張守清郭貴三張盡忠許廷珍寧夏則楊戩本欲利國而國幾危矣公嘗注律以律文簡而易晦乃用小字釋其下本朝頒行大清律實依公所注本也公居鄉孳孳為善年九十一考終余幼時猶及見之嘉祥曾子祠新祠結構澗之阿問俗年來向此過大勇萬人吾往矣傳心一貫道靡他狸迴殘夢遺琴失𤓰種先疇舊跡訛自是聖朝崇典祀每聞金石奏安歌盛萬年一首萬年字恭伯秀水人萬厯癸未進士除刑部主事歴工部郎中出為福建按察副使歴廣東貴州江西按察使遷雲南布政使未任卒有拙政編附詩詩話盛公浮湛藩屏敭歴有年當其司臬羊城值倭人入冦躬擐介冑乗城擊破之於錦囊所嘗以一人攝五監司事案無留牘其還家詩云三黜已甘投嶺外一帆今喜到江鄉所居梅湖饒有魚稻之利築場納稼專以寶嗇訓子孫先疇至今未有改云右江謡昭江灩灩連邕管千厓赭碧清霜滿竹雞格格啼榕林修蛇毒霧愁浸淫鳥言卉服繡項渠荒茅叢箐山頭居時平莫負􅓁簩弩夜雨叢祠賽銅鼓殷都一首都字無美蘇州嘉定人萬厯癸未進士除􅊂陵知州入為兵部員外歴郎中調南刑部京察去官離薋園蘭生在深谷寧畏惡草滋受性偶不同托根從所宜夙齡負耿介中路遭嶮巇棄置纓與緌歸來㝷故蹊南山荒豆田東陵没𤓰畦躑躅不自得為園且栖遲上有蘐草堂下有春草池光風旦夕至引觴以為怡蘭者自為蘭薋者自為薋達觀詎離俗全生甘息機寄言謝人徒殊調勿見疑詩話無美藉甚詩名而遺集罕傳離薋園一篇為王元美作也園在州治鸚哥橋東有山有池亭曰壺隠曰晞髪軒曰鷃適室曰碧浪曰小憩後池曰芙蓉沼元美嘗自為作記明詩綜卷五十九
