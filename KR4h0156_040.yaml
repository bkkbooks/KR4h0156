body:
  text: 明詩綜卷四十翰林院檢討朱彞尊編唐臯一首臯字守之歙縣人正徳甲戌賜進士第一授修撰進侍講學士明妃曲黄金不買畫圖中從此春花閉漢宮到得君王識傾國無人主議罷和戎蔡昂一首昂字衡仲山陽人正徳甲戌賜進士第三除翰林編修累官禮部左侍郎贈尚書有頤貞堂稾送朱伯仁任四川行都司斷事白帝秋風動烏蠻夕照含憐君游宦處地極勢西南殊俗聊相問軍謀亦共參雄飛方自此休說鬢䰐鬖霍韜一首韜字渭先南海人正徳甲戌進士累官太子少保禮部尚書兼翰林院學士贈太子太保諡文敏有渭厓文集贈方棠陵用陶飲酒韻張弓射飛鳥巧者猶能得君子履周道豈為多岐惑義命良獨安行止順通塞逺之垂萬世近之範一國珍重君此行時哉惟語黙劉儲秀一首儲秀字士竒咸寧人正徳甲戌進士繇刑部主事累遷湖廣按察使歴戸部侍郎仕至兵部尚書送龍長史之武昌荆衡山漠漠江漢水湯湯送汝從兹去何時到武昌楚筵堪設醴漢署憶含香北上多鴻鴈音書好寄將簡霄二首霄字騰芳新喻人正徳甲戌進士歴官南京兵部右侍郎有蓉溪集過雪垻番寨雪垻傍流沙風煙幾十家蓬頭男􅂒菁編髪婦耕畬皮甲張藤盾毛衣綴線麻也知天子使羅拜接江涯潞河舟中作潞水經年别風塵又覺非岸蘆迎櫂舞檣燕掠人飛澤國魚梁竭江城候吏稀人煙沙草外一縷起斜暉陸杰一首杰字元望平湖人正徳甲戌進士授兵部主事諫南巡廷杖後遷陜西按察副使終工部侍郎有集客舍行役殊無已其如嵗晏何宦情因拙澹鄉夢入秋多月巷千砧發霜天一雁過吾廬今夜好可惜掩松蘿吳鎧二首鎧字文濟陽穀人正徳甲戌進士授行人擢監察御史升福建按察副使歴陜西㕘政雲南按察使終僉都御史書營平侯祠壁白草連天逺黄雲出塞平霜笳吹漢月寒笛弄秦聲北海猶傳箭西戎未息兵屯田當宁意寧惜度金城涼州聞道涼州戍連年去未回健兒多戰死彍騎至今来白骨紛無數黄雲慘不開龍城秋夜月羌笛不勝哀林大輅二首大輅字以乗莆田人正徳甲戌進士以工部員外郎諫南巡予杖繫獄謫判夷陵州嘉靖初起江西按察僉事歴副都御史巡撫湖南自劾歸有愧瘖集林茂貞云二山詩在仕途者忠憤激烈無依阿取容之態在林居者沖適雅淡無憤時嫉世之心要皆出於性靈非騷人墨客風雲月露之作也王應時云二山詩典麗雋逺冞入堂奥云謝山子云林詩樸厚可比蔡忠惠林雨可二山詩鍛鍊而不傷自然靜志居詩話二山與南泠最相契詩亦近之第稍遜耳品當在李川父孟望之之間弔馬伏波祠野渡維江舸荒祠薦澗芹魚龍喧永晝日月照迷津阻絶征蠻路艱危報主身只今嗟薏苡臨弔幾傷神蔣子雲都水定居西長安門外南泠三載賦閒居春日長安近卜廬苑樹飛煙分客榻禁鐘浮月散朝車揚雄天禄多竒字方朔金門有諫書相望西橋應不逺莫教風雨往来疎林炫四首炫字貞孚閩縣人尚書庭㭿子正徳甲戌進士歴官通政司㕘議有榕江集傷歌行楚人不識鳳謂是五色雞魯人不識麟謂是麕而蹄天時茍不值賢聖終見嗤爰居避海風享祀將奚為寄言明哲士樂命安蓬閨有感用杜韻將帥承新渥軍儲惜去年似聞千里霧猶蔽九重天貴戚爭開府烽煙近到邊玉關何日閉遺恨自張騫十四夜月今夜揚州月清光已勝前遥升滄海外先到客亭邊雲度同飄忽風来一灑然細瞻金粟影猶少半分圓次韻贈朱青岡太守郊行聞得農人語鶯花未足憐夕陽牛背笛春雨郭東田政簡官如水時豐俗自便村村鳴社鼓歡喜說今年孫存一首存字性甫滁州人正徳甲戌進士歴官河南左布政使有豐山集劉都幕泉亭濫泉沸山巔氿泉迸山足一鷺飲東泉飛向西泉浴周在四首在字善卿太倉州人正徳甲戌進士除知寳坻縣擢陜西道御史歴官浙江右㕘政有燕京逮事録行臺紀興詩話善卿獨攄胸臆不事規橅正如繁音迭奏忽聆于蒍于曲縱無妙理具足清機悼陳司李保定推官被姦民誣奏死于獄灼灼木槿花楚楚蜉蝣羽朝陽耀容華日夕不知處人生非金石誰能不銷腐昨日同舍人今朝成糞土死者已無知生者徒自苦獨坐掩圜扉哀哀淚如雨秋夕感懐月轉虚簷向夜闌孤臣不寐望回鑾重門擊柝聲何急半壁殘燈影亦寒梁獄久淹書未上齊廷難遇瑟休彈凌風欲借仙槎去天上銀河水定乾初下詔獄作薄宦叨民牧窮囚與冦鄰撫監有官民之分官監稍潔予獨下民監與强盜重囚雜處不辭羅法網直恐玷儒紳縲絏嗟何罪遭逢慨不辰鄒陽書未上賈傅䇿誰陳日有泥塗辱旁無骨肉親吟鬚經鎖斷鞭血汚衣新野薤晨充饌乾蘆夜作茵亂蠅沾食穢毒蝎螫膚辛厄似樊籠鳥危如涸轍鱗經旬忘盥櫛長日足悲呻竊共人愁語徒勞吏怒嗔獨行良踽踽羣吠尚狺狺薄力誅求困虚情鍛鍊真株連殊未已文致竟無因理直終何補錢多信有神虎翻令傅翼象莫顧焚身禍已延吾黨寃猶念此民病亡俱老弱瘦死半飢貧地下多新鬼天涯少故人禁嚴消息絶家逺夢魂頻自笑心如鐵相看淚滿巾尚祈欽恤詔指日下楓宸閨怨江南二月試羅衣春盡燕山雪尚飛應是子規啼不到故鄉雖好不思歸桑溥一首溥字伯雨濮州人正徳甲戌進士歴官按察使榆林道中迢遞榆關道西風卷客旌寒沙迷古塞落日下孤城水險遮蕃騎山髙列漢營君王方偃武邊將莫言兵顧可久一首可久字與新無錫人正徳甲戌進士歴官廣東按察副使有洞陽集秋懐異域滄溟上孤城斥鹵中經過稀漢使託處雜黎戎最苦黄茒瘴兼愁鐵颶風集本作日逺天何際雲荒秋不窮誰能忍羇旅轉泊逐飄蓬李濓九首濓字川父祥符人正徳甲戌進士授沔陽知州遷寧波府同知終山西按察僉事有嵩渚集廖鳴吾云川父詞藻俊拔迥出塵表有俞汝成云川父詩率意走筆不事鍛鍊古朴風詩話嵩渚集凡百卷最稱繁富然不甚剪裁其持論以明初吳中四傑為歸求其神似未免類桓宣武之擬劉太尉也游呂公洞窈窕呂公洞逶迤玉泉側澗流緬松門石梁亘雲壁始入日匿影徐轉天漏白靈窟度縈迴細徑縁欹仄杖邊霏漸分衣上霰微積紫芝敷異芬瑶草弄明色窮猨倒窺人仙鼠飛避客遥遥薜蘿隂嫋嫋蒼翠夕金膏欣可餐石髓恨難識意愜諸妄遺神超萬縁釋伊予事沈冥夙負山水癖曩聞呂仙名兹覽修真跡丹爐滅灰燼石牀有苔蝕一遊洞庭波千載杳消息珪組知爾忘煙霞恣所適私哂名利心䠥􅍷竟何益雪竇寺妙髙臺吾聞妙髙臺海涌金芙蓉上有萬古苔虎豹留其蹤日月挂天柱煙霞韜石峰所嗟異僧去寂寞青山鐘含珠林佛有舍利珠瘞之海東石夜来九龍爭風雨拔林柏六丁紛呵䕶寳物安所宅至今月黒時光騰幾千尺石竇石竇海眼通乳泉四時洩仰睇杳而深誰剜翠屏裂青噀千峰雲白含萬年雪膏砂原異竅鳥䑕或同穴桃花坑髙僧飛錫地錦石名桃花吾非勾漏令乃此逢丹砂雲中吠仙犬洞底流胡麻定有逃秦者人煙隔暮霞太原中秋紫塞中秋月青天萬里情他鄉一尊酒獨對太原城水霧戎戎合隂蟲故故鳴雁門諸戍苦莫遣照邊營春興碧草城南路不分野人詩思正紛紜聊隨謝客㝷幽壑何必桓譚識古人春日苦躭新秫酒洞天思謁大茅君東風吹起花如霰腸斷梁臺日暮雲秋懐瀟湘楓落鱖魚肥楚客懐歸未得歸頻憶鳳城詢北使尚聞龍舸駐南畿驚心關塞旌旗動旅食江湖諫疏稀本乏涓埃禆郡國擬將生事付漁磯良鄉道中沙雁衝車起洲鶯隔岸聞暮看霞氣近疑是漢宮雲蔣山卿九首山卿字子雲儀真人正徳甲戌進士授工部主事諫南巡廷杖謫南京前府都事歴刑部郎中出知河南府改潯州再改南寧升廣西㕘政有南泠集顧華玉云子雲詩天才溢發可歌可感使將来者見之則凡餖飣其字雕刻其文艱深其思抝曲其體不發于情而并氣格音節亡之者皆可怛然省矣俞汝成云南泠達生有容徳詩似其人咀王元美云蔣子雲如白蠟糖看似甘美不堪嚼顧𤣥言云㕘政才華朗邁五言學杜恨乏竒語詩話子雲詩如水精淨域盡埽游塵微嫌境太淺爾子三人孝常孝若孝彧皆能詩吳山遥入戸江水近通渠孝常句也鴈度三更月烏栖獨樹霜孝若句也夕陽新雨後明月落潮時孝彧句也雖未出羣亦自濟濟門有萬里客門有萬里客駕言發京都問客京都来世事比何如公車待詔士北闕新上書崢嶸片言合恩寵一朝殊升君白玉堂上君黄金塗賜與出内藏宅第夾皇居華榱鏤璧璫文牕結綺疏珠履竝侍從紫衣備走趨髙門平旦開飛葢已填衢官爵入掌握才俊待吹嘘顧盼遺光彩俯仰生榮枯貴盛豈不羨尊幸古来無天運相代謝日月有盈虚時命茍未逢進取何所圖執㦸疲揚雄文園病相如今君守寂寞辛苦徒嗟吁陳緯度云此篇葢為蘿峰而作雜感吾聞青海外赤水西流沙神人生鳥翼蓬首亂如麻出入乗兩龍左右臂雙蛇中有不死藥竒麗更紛葩琅玕墜珠英玕琪散瑶華雙雙交相并文文自交加我願從之游萬里跡非賖但恐非人類夀命其奈何夏日田園即事二首沈沈夜来雨泱泱川上平田家趁時作驅牛急晨耕遥遥阡陌間肅肅老少并札札耒與耜吚吚桔槔聲紆迴野水入綿延禾稼盈劬苦事一時倏忽見秋成四體雖云疲所貴惟此生此生各有分胡乃不自營寥寥千載下寧知沮溺情東菑耘事畢老翁自閒閒鼓腹何所知徘徊墟落間斜日上髙原一望江南山搴林玩柔荑涉澗弄潺湲欣然適其適日黒始来還了無一可說呼兒掩柴關燕歌行清霜落木寒蕭森白日既匿光景沈關山迢迢絶信音目極千里傷人心念君他鄉久滯淫長夜展轉憂難任空閨寂寞愁錦衾涕零如雨不可禁泠泠纎指彈鳴琴張弦促柱發哀吟月明洞戸流清隂涼風飄颻吹我衿起看樹上雙棲禽雄鳴雌飛守故林我何㷀㷀獨至今漷縣晚行漠漠平沙闊荒荒白日低朔雲孤鴈度昏樹亂鴉棲戍鼓聽猶隔村煙望欲迷關山有戎馬憐爾尚征西八月十五夜懐京中舊遊今夕那無月他鄉獨上樓兵戈添白髪幕府滯清秋對酒傷前事尋詩數舊遊呼童把官燭漏盡不能休送林以乗赴任江西僉憲并序正徳已夘上將南巡予與以乗孟循同上疏忤㫖下獄且被責貶而孟循死矣今上即位召還京方忻㑹晤而以乗有兹擢感舊叙别愴然興懐凡二十六韻先帝昔巡幸小臣同上書事危攀折檻情切止乗輿未得陳丹悃空令伏玉除天心那可問皇怒竟何如氛霧昏霾久雷霆震擊餘傷魂逮囹圄鞭血濺衣裾半刺猶憐爾孤遊孰起予聫翩嗟去國蕭索苦離居聖哲臨宸極清明開太虚王綱重照洗姦孽盡誅鉏紫詔恩初降蒼生憤始攄逐臣皆見召舊故復相於禁闥還通籍官曹竝直廬感時唯涕淚歎逝重欷歔從宦心俱嬾求名術本疎祗應旅進退敢望獨吹嘘翻怪無鳴鶴堪憐似戲狙十年才易組六月便驅車去作長途别行將大暑袪涼雲停碧樹渌水汎紅蕖南國秋風早西江白露初霜威迎獬廌月冷改蟾蜍世路多欹側斯文有卷舒身須混涇渭譽欲等璠璵霄漢看鷹隼江湖覓鯉魚與君生死分分手一躊躇南巡歌萬乗回鑾出楚關遥聞鳳吹百花間聖心不為閒遊豫千里河山一月還薛蕙四十四首蕙字君采亳州人正徳甲戌進士授刑部主事改吏部歴貟外郎中以議大禮下詔獄㝷復職未幾罷歸屢薦不出有西原集徐子元云君采俊麗康樂殆不是過詞王子正云西原窮探載籍采擷英華程古摛超入魏晉晚乃刋落繁華潛心性命造詣深邃自得實多今之人但知為詩人已耳風文徵仲云西原先生詩温雅麗密有王孟之樂府歌詞追躅漢魏時何大復李空同文章重天下摛詞發藻凌轢漢晉朝野翕然尚之先生雖稍後出而聲華望實略相曹耦子唐應徳云薛詩從瞿老書来得虚靜語李西云西原尚則元風聿袪末習潄羣籍之芳潤擷百氏之英旉一時詞囿邈焉寡儔王元美云薛君采如宋人葉玉幾奪天巧又如倩女臨池疎花獨笑穆敬甫云薛公理學著稱詩亦有致顧𤣥言云考功詩譬之馬飾金羈連翩躞蹀穏步康莊了無跼蹐之跡黄清甫云薛詩吐辭秀潤布意密緻而調合作者名篇實多其咏懐則取法於嗣宗雜詩則準的於景陽游仙則規摹於景純雖不逼似庶幾太康之音人蔣仲舒云薛詩如刻錦雲霞疊石島嶼欲以巧而擬自然未及大觀能無激賞閒作沖澹若落花游絲情致可喜稍更骨氣便復無儔矣陳仲醇云薛公詩一毫塵垢不入筆端由其胷中曠達無染故也陳卧子云君采詩如貴主初降雲軿鸞輅縣珠編貝自然莊麗令沈山子云君采詩泓崢蕭瑟如鼓丘中之琴人神往鍾廣漢云君采五言兼大小謝之長五律綜初盛唐之妙長句則效李頎長律則宗子美絶句小詩亦多妙諧詩話薛公南巡諍吏大禮正人條達詞華淵源理學古詩自河梁以暨六朝近體自神龍以迄五季靡不句追字琢心摹手追斂北地之菁英具信陽之雅藻兼迪功之精詣卓然名家又云君采年十二能詩王子衡謫判亳州賞之曰可繼何李故其詩云束髪從師王浚川文章衣鉢幸相傳爾時評我李何似白首摧頽只自憐其與用修論詩云近日作者摹擬蹈襲致有拆洗少陵生吞子美之謔求近性情無若古調直以沿流討源自許晩年究心講學於詩不師擊壤尤人所難君子行君子思危懼不終日衆人居安沒齒自逸君子思退如迫于淵衆人思進如逐于田損益之變何其相反茍非明智孰能及逺人知其終莫知其始吉凶之萌鮮不由已上天無私何怨何親福不擇家禍不索人道有險易事有從違嗚呼小子慎爾所之善哉行来日大難痛心疾首今日為樂莫懲其後大難如何昊天不嘉吉凶有時人莫之知鹿之游斯在彼中野庖人調和將以為脯翩翩白龍好是魚服豫且射之載中其目少康出畋不復其舍戎王朝卧迺縛尊下式戒在斯式備在終匪戒匪備害于其躬天命戾止匪夙則莫勉爾在位無俾天怒效阮公詠懐七首翔鶤赴長飇翩翩戾髙冥舉翮覆白日伏頸雲間鳴顧謝野田雀黽勉營此生與子各殊塗無用相譏評飄風振𤣥幕若木零朱華六龍匿西山濛汜揚其波翩翩市中子於心太回衺不見顦顇色但聞慷慨歌卑危誠未逺禍亂豈在多人人恤其私安能尚顧他已矣勿重陳嗟予可奈何朝登古臺上遥望大河隂朱明来自南隆暑倏已臨丹霞曜陽景渥露霑𤣥林炎風振曽柯鳴蟬響哀音四時代終始變化迭相㝷盛長固殊昔遲暮方在今感物切悲情愾歎傷我心生才良不幸處世誠獨難揚蛾興妒階懐璧賈罪端靈均既見放韓非亦自殘奉身失所從慷慨使我歎天上何所有上有九重臺日月闢房牖河漢界兩階白虎夾路隅青龍啾啾啼五嶽當束脯四海充一杯衣裳被雲氣左右結雙蜺彗星垂為帶北斗束為觿舉足歴顥蒼往往不復迷朝集扶桑東夕降若木西守道遺榮利趨物喪其真詘伸難竝觀髙尚良可倫不見𤣥廬子精神已無存煌煌口中珠含此誰為珍富貴焉足求甘我賤與貧朝游東海上親見安期生袖攜麻姑書揖予上天行忽忽從之去一舉陵太清白榆何歴歴桂樹亦青青朱爵七十二鼓翼相和鳴玉女顧我笑執手戲紫庭萬嵗同娛樂天地長齊并游仙精衛填東海㷀㷀累形軀哲人匡宇宙天命不可須聞有山林士棄世以自娛願言從之游齋潔練羽書丹池可止渴晨餐咀雲珠度紀諒非難去去勿躊躇贈孟望之二首昔余與君子未見心相知邂逅在今辰果若平生時願得結歡好贈子以新詩含意未及申行行復何之念當從此去傍徨出郊畿行人倦往塗終言與我違倉卒執手間歎息空相持媿無晨風翼送子起翻飛踟蹰郊野外白日匿西山行人去有期安得久周旋請為游子吟與子結纒緜憂来動人心惻愴不能言言念平生友意氣非徒然行役不足辭貧賤非所憐君其篤明信慰我心惓惓田中築舍修治樹藝莊生卧濠梁范子去海隅行止信難侔逺跡要不殊伊予慕棲遁脫冠歸里閭卜宅近郊坰葺宇就田廬南榮面崇岡北牖背幽墟雖非山水地取樂自有餘築牖仍先趾穿池即故渠林木盡舊行圃畦皆曩區寡欲罕所營衆美亦云俱爵禄無常位貧賤亦安居豈惟畏淹留得以免憂虞懽此平生情永言焉可渝丙子十月二十八日初發鄉邑述征有作旅宦忝從事卧疴輟歸田俛仰似昨日荏苒踰三年末路謝貞素積習慚寅縁整駕别鄉邑薄言重徂遷瞻途背梁宋振䇿指幽燕昔往遺維縶今来就糾纒豈伊行役歎畏此平生諐嬰世迫物累撫化懐冥筌齊契百年内髙揖千載前慮存跡匪虧意愜道仍全斯言俟明哲因歌遂成篇月夜坐憶明月三五時流光千里外虚館風冷冷寒墀霜靄靄不見南樓客徒憶西園葢懽酒無盈觴憂襟有餘帶沈吟靜夜思緬邈佳人㑹陳卧子云俊雅詠燭客醉北堂上花生夜戸中色亂歌梁月影弄舞衣風珠簾照不隔羅幌映疑空願得陪長讌相看曲未終雜詩二首植草㑹成蔓種木當為株休咎豈虚生景響不相踰呂生釣竒貨蘇子挾隂符六國假相印萬戸割名都一朝計不售倉卒䝉罪辜狙詐適自困傾巧定焉如生時諒非榮既沒辱有餘達人安貧賤貴欲弭禍樞玉以采自斲丹以澤自銷髙才耀當時荼毒竟相招傅子感飛蛾張公喻鷦鷯思患豈不微履險果焉逃嗟哉世路間覆轍常所遭千金憚垂堂胥靡易登髙願隨方外士杖䇿歸蓬蒿舟中看雨微照下亭皋輕雲翳川曲一望春波上蕭條煙雨緑餘花飄近渚衆鳥喧深竹借問同行子何處停舟宿日暮日暮坐東軒直望西山曲白雲藹藹至雨我牕前竹兹晨憚隆暑披衣廢朝沐徙倚乗夕涼清風散炎燠大象斡流行變化一何速日新諒無取年長祗多辱古人善補過嗟爾當自勗北征地闊塵沙外天寒霜露中燕雲常少日朔氣自兼風夢斷南樓鳥愁隨北向鴻淹留憶攀桂辛苦歎飄蓬九日同何仲黙出郊九日登髙㑹同人載酒来寒城一以眺秋色正堪哀零雨晨初霽浮雲午未開南飛有鴻鴈為爾立徘徊答王允升省中對雨見憶之作康樂愁霖唱平原苦雨詩故人歌此曲贈我慰相思薜茘垂青閣芙蓉汎緑池今朝一樽酒最恨不同持送毛敬父之廬州北峽吞淮口東陵控海隅霍山分岳鎮肥水混濡須從事之官逺觀風問俗殊廬江多小吏應候府中趨七月十五夜對月嫋嫋涼風夕紛紛零露時秋来看明月風露已如斯况對西園酌兼懐康樂詩山中有桂樹今夜足相思六月八日西闕遇雨窈窕西清内參差水殿連歸雲向平樂飛雨集甘泉明月裁班女迴風唱麗娟龍池初望幸来往木蘭船重游蕭氏園别此真如昨重游換物華粉滋曾倚竹紅淺舊看花沙阪縈林曲山籬逐水斜城南咫尺路未覺往来賖負郭負郭茅堂小臨溪竹圃斜山樽移野客魚網曬鄰家荒徑封殘雪疎籬透晚霞預思春到日著處種桃花𤣥明宮後圃石山出郭仙城近探幽福地遥珠林行窈窕錦石上岧嶤雲裏仙人酒山中玉女簫蓬莱去何許東望海邊潮村居寂寞村居僻荒蕪草徑深飛蓬来曠野啄木響空林薄落聊凝望清江正苦吟此生甘落魄自笑果何心送周子賢按貴州萬里牂柯路炎洲百粤南懸梯穿鳥道流沫下龍潭赤坂黿鼉出𤣥厓日月含虹霓蒸海氣煙霧灑春嵐飛􅚦縁篁竹垂猨墮石楠橘花香細細藤刺緑毿毿嶺外青驄馭臺中白筆簪秦冠髙鐵柱漢節照金函行邁應多暇登臨素所耽江山吟謝客物色助清談送逺都無緒憂時且不堪安危廷諍地遲子促朝㕘送劉遵教赴河南僉事兼河北兵備暫輟臺中妙兼分閫外名兩河開幕府萬里作長城卻縠真堪帥穰苴本善兵追奔立表待傳檄據鞍成盜賊空三輔煙塵掃北平閭閻無夜警部曲有春耕風勁吹龍角雲輕抱翠旌遥瞻猛將氣偏逐使君行寄崔内翰病起身仍健秋来興不孤心情那可減肺氣欲全蘇蟻穴依牀席蛛絲織畫圖褰帷窺物色倚杖理荒蕪撥悶憑詩卷忘形付酒壺昔賢遺軌躅餘力誓馳驅良史傳經術髙才繼典謨赤鯨凌海水翠鳳上天衢仙籍通羣帝文星近六符馬遷慙實録劉向謝醇儒𤣥覽来神契冥捜入奥區蓬莱披琬琰太乙下虚無顧我惟書肆知君類說郛憲章崇闕里辭賦陋鴻都東魯宮牆閟西京戸牖殊百家流汎濫六藝混泥塗未覩崩頽振深思筆削扶飛騰愁失墜衰颯迫號呼落落親朋逺悠悠嵗月徂提攜如有分終願託微軀送楊石齋社稷功成後山林避寵年遭逢誰可竝出處獨超然反側當前日經綸邁昔賢殷憂興聖主至治格皇天凶豎同摧朽蒼生盡解懸廟謨隨指顧臣節見周旋智勇千夫敵勲勞百辟先賞仍虚裂土名已重凌煙握璽慚周勃揮金笑魯連急流嫌盛滿介石慕貞堅許國心恒切還鄉興偶牽留侯初相漢樂毅晚辭燕異渥絲綸數髙風進退全草亭黄閣詔花簇錦江船水檻星橋側茅堂雪嶺邊雲霞深緑野卉木富平泉事業存鐘鼎儀型照簡編累朝瞻翊戴四海憶陶甄白首歸休記青春送别筵衣冠望行色端不異登仙寒食對雨遣悶一百五日春已深閉門風雨晝隂隂乍飛燕子濕無那欲折桃花嬌不禁歸去久淹滄海興愁来端擬白頭吟天涯節序堪愁思一作厭見繁華節更遣蕭條斷客心贈繼之長安城中不可留風塵日日使人愁上書解綬我將去拔劒出門君且休五岳登臨幾兩屐三江来往一扁舟東西南北好行樂與爾相隨萬里遊孫氏沱西别業巴陵西来沱水深水邊樓閣長一作自隂隂黿鼉夜出洞庭岸虎豹晝啼雲夢林鼓枻乍逢漁父笑搴舟時聽越人吟卜居何日從公去擬向桃花處處㝷一作避地欲從何地隠買山須就此山岑流觴渠流觴泛激水手攬跳波濕恰怪杯行遲風吹忽相及雲洞洞門雙玉扇隔岫窺雲霧裊裊三石梁苔滑不敢度折楊栁三月盧龍塞沙中雪未乾朝来折楊栁春色憶長安涼州詞隴西西去抵涼州邊塞蕭條處處愁青草不生青海曲黒雲常聚黒山頭皇帝行幸南京歌燕姬玉袖抱箜篌馬上常隨翠輦游春来照影秦淮水愛殺江南雲母舟雪緑水初冰百子池飛花正滿萬年枝君王夜醉瑶臺雪侍女冬歌白苧詞春日漫興二月黄鸝滿樹飛歌㗋宛轉世間稀謝公雖有東山妓不及儂家金縷衣顧􅛁三首􅛁字英玉上元人璘之弟正徳甲戌進士除南京工部主事改兵部歴郎中謫知許州遷温州府同知升山東按察僉事終河南按察副使有寒松齋存稾詩話英玉為東橋從弟東橋詩有落魄吾家蘇季子風流南郡小馮君葢謫牧許州時所寄也東橋闢息園以延賔客載酒促膝諸亭朋簪滿座伎樂雜陳而英玉居隔一牆臨街小樓曰寒松齋者坐卧其上訓童子以自給所謂名教之外别有風猷者邪再游石門洞蒼然括東山百里縈青碧石門忽中斷窈窕開仙宅遥窺日月深却轉煙霧隔中天屹樓居星斗挂几席芳巖眩綺繡叢巘圍蒼壁山鬼不避人驚猨嘯窺客披榛上孤亭竒觀壯心魄穹崖倚天懸瀑水半空射髙流横雜佩直下垂疋帛分作四山喧散為千頃澤初冬天未寒晨曦映嵐赫重来意彌眷獨往任所適信美愜心期胡為老行役終然脫塵網髙舉凌風翮游西山宿廣智寺待月本来游客意欲與月明期碧海深何許清光望轉遲草香聞露墜林暗見星垂幸對尊中酒殷勤坐不辭夀州題壁去郡今千里還家尚幾程春風楊栁色相送石頭城劉天民五首天民字希尹歴城人正徳甲戌進士除戸部主事諫南巡受笞闕下改吏部諫大禮又受笞歴文選郎中調知夀州累遷河南按察副使改四川以計典罷有函山先生集詩話函山諫草兩陳再笞闕下其調知夀州也故事京官外謫出都時以眼紗自蔽過部門選人擁其馬不得前函山擲紗于地曰吾無媿於官俾汝輩見吾面目可耳蔡鶴江送以詩云元祐黨人滄海外貞元朝士曉星前王耕原送以詩云君不見盤中紫脂蟹疇昔横行今安在又不見坐上虎皮裀當年負嵎思殺人世間反覆那可數鄙夫何事用心苦葢以刺讒人也晚又以計吏罷憤懣不平恒逃于詞曲有云把俺這沒嫂嫂的陳平也串下一個招李中麓毎稱之漳河雲寒不離水騰作漳河霧葭菼稅嚴霜蒼茫未能渡斥鹵際廣野望之迴積素憶昔趙魏時兵馬日馳騖公子納遊俠結轍滿皇路佐國無定謀中原徒指顧享費壯士金招延詞客賦豪華坐銷爍曽如草頭露坐食三千人化為萬年墓哀哉丘中墟遺蹤遍狐兔巴田巴田不成井逐壟細開塍灌水分山溜燒畬去野艿三時勤不輟八口飽方能寄謝當塗子民心未有恒謝豹謝豹豈人化哀鳴自可憐無端啼永夜不為客孤眠悄悄風歸樹娟娟月在天訴深情轉劇血盡眼將穿渭南道中用韻答黄汝厓方伯隴水秦關道路均春風花栁著行新烏巾斜日久折角白酒誰家堪入脣晚嵗始醒蝴蝶夢故園今返鹿麋身天涯尺牘勞相問猶是漁磯舊友人宮詞黄花細雨掩金鋪罷却鍼工一事無才報成雙又分去人間博戲等樗蒲鍾梁一首梁字彦材海鹽人正徳甲戌進士授刑部主事進郎中諫南巡杖闕下㝷出知濟南府乞歸用薦補南昌知府有西皋集感事師老寒潮上民勞烈火中是誰司國計何以慰宸聰憤世多才子平戎少令公杞人憂不細掩袂向東風林春澤二首春澤字徳敷候官人正徳甲戌進士授戸部主事遷貟外謫寧州同知歴吉安通判肇慶同知召為南京刑部郎中出知程番府有人瑞翁集詩話百年上夀世曰徒然然或有過之者吾録滕安卿詩既援崑山周大賔新昌呂翁粗舉其本末矣候官林太守徳敷百嵗有司為建人瑞坊榮之集中喜𤣥孫生詩云傳家二十有三世老我百年仍四春葢即於是年卒萬厯癸未嵗也徳敷子應亮戸部右侍郎孫如楚工部右侍郎次潞河作朝發都城闉夕宿潞河舟雁落沙渚淨霜降菰蒲秋天寒節物換河漢曉夜流回望郭隗臺黄金不可求廢興已陳迹懐古心悠悠中秋清源公署萬里秋光旅夜清空庭倚杖轉傷情月明偏照干戈地風冷唯聞鼓角聲東海魚龍俱寂寞南枝烏鵲尚飄零天衣欲把思無力愁絶長安北斗城陳九川一首九川字惟濬别字竹亭又號明水臨川人正徳甲戌進士授太常博士坐諫南巡削籍世祖即位復官遷儀制司貟外轉主客郎中下詔獄謫戍鎮海衛尋放還有明水先生集詩話明水釋褐忽曰漆雕開謂吾斯之未能信吾可自信與遂上疏請告歸謁陽明講學及官博士與舒修撰梓溪夏貟外東洲萬主事五溪共諫南巡一時有四君子之目既司主客為羣小所憎重獲罪可謂信道之篤而九死不悔者也詩非所長亦小有韻致題桃源圖偶攜鄉里入山川一隔塵寰幾百年世上祗言秦網密桃源也有不租田戴欽一首欽字時亮栁州人正徳甲戌進士官刑部郎中有鹿原集同諸公寺中對雪入寺金沙淨開林素雪飛風含珠閣動花傍藥闌輝酒伴能相覔春筵賞不違仙郎有髙唱轉覺和人稀張治道四首治道字孟獨一字時濟長安人正徳甲戌進士授長垣知縣遷刑部主事有太微前後集王子衡云孟獨詩凌駕古今長篇如天馬行空壯王元美云張孟獨如罵陣兵瞋目揎袖果勢往李時逺云孟獨七言優於五言一時關中諸公當出其下與薛君采夜話入夜杯仍把論交淚暗揮醉憐山一作城月上愁對海雲飛江漢三年阻風塵萬事非故鄉南北逺猶恨不同歸聞雁何事天南雁春来又北飛為憂霜雪苦轉見羽毛稀江漢愁余阻瀟湘笑汝違雲霄蹤跡異空有淚沾衣白鷺沙頭白鷺鷥飛向青山閣日暮行人稀還向沙頭落清明日草沒尚書履花迷御史驄長安佳麗處偏在曲江東明詩綜卷四十
