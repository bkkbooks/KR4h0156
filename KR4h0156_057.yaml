body:
  text: 明詩綜卷五十七翰林院檢討朱彞尊編李應徴三十首應徵初名衷毅字伯逺嘉興人萬厯癸酉舉人選授臨安教諭升南國子博士有青蓮館澄逺堂偶寄軒藿園寄苕薊易河梁兩都汗漫遊諸集皇甫子循云伯逺肆力風雅律詩時似少陵而風骨師心太白彭子殷云伯逺詩頓挫激昻跌宕飛舞若鞭赤虬轡蒼螭而上下彩虹碧落之間鄧逺遊云伯逺意取師心法必摹古其于諸體無所不工亦靡所不合設黃貞父云伯逺詩雄沉俊爽如驃騎之師不刁斗而肅然不可犯于鍾漢廣云先生早察孝廉以才望自髙既艱一第老就四門博士其詩取材開寶匠法𢎞正是時七子之習變為呌呶公安之𣲖漸已淫永先生激彼頽波力返正始閎麗悲壯卓然成家靜志居詩話弇州標外榜前後五子而外廣為四十子若似乎此無遺賢矣説詩者遇隆萬朝士或置不觀直以公安景陵繼七子之派不知隆慶諸臣已力挽呌囂之習歸于平淡而定陵初年人皆修辭琢句出入風雅之林若吾鄉李先生伯逺若下鄭先生允升吳中歸先生季思嶺南區先生用孺尤卓然名家而閩中徐惟和謝在杭曹能始均不為楚咻所奪未見萬厯初之不及嘉靖季也學者取諸家詩誦之庶幾論世有權衡矣吳門逢袁履善先生却贈涼風起蘋末落日開中園寒蟬聲嘒嘒飛鳥何翻翻顧逢雲間叟而同江上言我昔與君别逺涉長水原今日復見君乃在吳閶門閶門鬱雲興流焱激飛軒攜手登兹樓時以散憂煩明月皎夜光有酒盈我尊開尊飲君酒寸心聊復論丈夫重意氣迹逺道自存何必齊年齒然後情誼敦願將結佩贈愧無雙瑜璠八月十四夜赴沈中丞純甫約與范倩東生泛月之苕上頽照忽已匿間夜增離情涼風扇薄帷白露塗中庭詠彼蟋蟀唱眷言懷友朋佳期及三五圓景將漸生素書忽見招方舟鶩前汀薄煙斂層霄皎月雲間升驚鵲既飛繞來鴻亦哀鳴流輝照衣裳坐見秋江澄爽氣蕩瀾澳沖魄涵虛明屬林方候滿委照知戒盈且勿論居諸杯酒聊共傾芳洲思紉蘭極浦聞采菱不寐望所歡悠然見菰城良覿在明發庶以慰深盟寄御史大夫沈公純甫誰謂芝桂芳指作葹與蕕誰謂西施妍而不如宿瘤姬公避流言孔父蒙麛裘鳳德故不衰仁物竟奚尤睿鏡有餘照慈杼無妄投亮懷百鍊操繞指非所謀勿以入室故競彼戈與矛讒口任呶呶鎮之以休休泰山摩蒼天不辭垤與丘滄海百谷王涓勺鮮棄流桃李故不私藥籠亦見收交親誼所敦申言副咨諏題清音閣贈朱君采君采天下彥乘時奮遼廓身雖在軒冕志不忘巖壑朝謝桓氏驄暮羅翟公雀結樓臨青苕憺焉守玄漠一水既當户衆山亦羅郭俯瞰激清泠仰熙矚崖崿曠然招逺風蕭疏振林薄並入山水間情境兩寂莫緑尊時時開清言復間作心期契鴻冥世變付龍蠖達人操其權神理或可託秋夜歸自苕水泛月鶯脰湖寄沈子勺朝辭若下城暮驅笠澤艑景物忽已改川原亦邈緬娛目惟清暉百里同一眄月出梅堰髙水落松陵淺曲渚屢縈紆環洲遡回轉淡淡波生煙遙遙雲沒峴楓林霜欲丹蒹葭露初泫境會心自恬神曠理逾顯同懷寄秋水離念得所遣述感旭日不照地慘黯東南隅陰風西北來遂與浮雲俱昏曉不復辨晦冥忽須臾雷霆擊髙空雨雹集階除皇澤亮已竭天威寧所須戾霄無逸飛逝淵寡潛魚貂璫搆禍患豺虎當路衢宇宙雖云遙吾駕將安如武夷吟為叔平姪賦浙水猶未渡閩山安可越夜夢武夷君幔亭弄秋月顧余莞爾笑相攜叩丹闕薜荔飄衣裾芙蓉墮冠髮吹愁落空際步虛任超忽陡覺聞天雞明星髙兀兀九曲杳然失對汝清興發安能涉世網生死遞淪沒何當乘飛霞揮手謝仙骨舟過松陵沈子勺邀同顧别駕王半刺諸公宴集作兼呈長公伯英扁舟遡廣澤蒹葭浩蒼蒼芙蓉被江隄間以秋蘭芳恍如覿容儀曄曄舒其光美人忽見招沗竊登斯堂余遊伯仲間常恐不得當匪云託肺腑所恃道誼長市交若春華改葉隨秋霜茍能抱微衷乖離亦何傷所以一水間落穆如相忘豈謂山澤臞無意偕巖廊迹逺心不遐斯意兩不妨樂哉此良會周親情所康肴來俱異味酒至無返觴新聲奏逸響妙伎呈中央主人詞壇雄樂府兼擅場曲誤必屢顧按節知宫商此中有妙理奚必非文章世多混真膺誰别否與臧吾將託優孟抵掌以徜徉雜詩二首所居雖㕓市其後即我園三周水繞之水流何潺湲灌木既羅户密篠亦當軒境近心獨逺悠然忘世喧夜枕鳴溪漁曉窗聞鳥言病不廢杯酒時時亦開尊適意不在醉聊託餘生存人生歡日少戚戚恆多悲每憂此身沒身後無所遺所以百年中役役無已時生時不行樂死復安所知墳墓且不保智愚豈所期及此有盡軀壺觴聊自持秋雨日以深秋草日以滋嚴霜倏將至不樂欲何為長水雨中送董君謨還四明溪雲壓林林氣黑長河黯淡無顔色大艑驅來笠澤風一片歸帆雨中濕送君此去歸舊山東湖之水流潺湲四明崇峯二百八一一峯尖如黛鬟董生瀟灑磊落之才亦如此對之可以開神顔我歌四明送君酒何惜相逢暫攜手便應喚汝董糟丘酒池之中可拍浮盡掃爾我坎坷抑塞之窮愁丈夫意氣自有主為蛇為龍何足數無錢但須典鷫鸘有酒便能賦鸚鵡少年得意多揶揄却笑乃公爾何苦仰天大呌白日徂腐鼠那可驚鵷雛男兒世間何事不可作但不能以此七尺為侏儒功名富貴可以赤手博摧眉俯首胡為乎世人聞之皆掩耳董生之前可語此酒闌歌罷君發船我亦還家渡長水歷陽聖祖開基日淮南即舊邦六龍飛采石萬馬渡橫江豪傑爭挑戰轅門已受降雲山凝望處髣佛見旌􅓚項王廟落日陰陵道悲風百戰原當年意氣盡四面楚歌喧子弟軍誰在春秋廟獨存江亭艤船處悽惻不堪論橫江日落海雲超蒼茫倚棹看橫江不可渡秋水正漫漫夾岸青山出孤飛白鷺寒當歌有明月對酒莫辭乾江行與蘇生别葭菼正蒼蒼緣流水一方平沙連極浦斜日上危檣坐惜故人别因悲江路長行行秣陵近回首各他鄉人日峴山遣興人日人為客春風春可憐煙波浮宅逺丘壑寄情偏柏葉烏程酒椒盤下若鯿如從習池飲醉卧峴山前正月十六夜畢孟侯至春草忽已緑春潮寒到門喜從新雨後得共故人言小婦調中饋殘燈續上元庭梅未搖落還擬數開尊送沈嘉則之天台訪道士秋水看疑合秋聲聽不分此時四明客去謁三茅君洞壑深藏日峯巒盡入雲蒼茫煙樹裏笙隺幾回聞廣陵送張孟竒乾坤同作客千里任飄蓬況復離亭别蕭條落照中濤聲揚子北寒色海門東去去煙波外無為歎路窮送萬和甫歸里亦知非逺别還復念孤征行色江天樹歸帆水國程北風吹斷雁九月豫章城到日深愁汝凄其倦客情聞王師東援朝鮮材官十萬欲平倭司馬何如漢伏波殺氣曉連玄免郡將軍夜渡白狼河還須直破伊岐島莫使虛傳枤杜歌禮樂東藩箕子國王師急為洗干戈釡山紀事西來邊警日倉皇東望烽煙漲海黃持節不煩蘇屬國和戎誤聽漢中行遂令綸綍虛丹鳳翻引旌旗指玉狼莫道朝鮮猶未靖急將本算慎朝堂送康元龍還閩時歸自海上書生尊俎笑談兵幕府還聞倒屣迎九塞昔曾驅馬度五湖今許放舟行海天雲樹無諸國客館鶯花檇李城莫道倦遊歸計拙春風應念倚門情重送萬和甫還江西去嵗今年兩度回寸心遙指白雲隈城頭擊鼓天未曙江口候潮船正開望望美人南國逺凄凄孤雁朔風哀明朝此地看山色愁絶還登百尺臺春懷衡門過雨淨疏簾愁對春江淚共添萬户耰鋤連海岱三苗戈甲遍巴黔和戎自詫長城險御馬誰知朽索纖祀國憂懷殊不細起看林月步虛簷舟中眺雪俯仰迷江甸東南凍未蘇扁舟下逺水積雪斷寒蕪朔氣連滄海窮陰混太湖瀟瀟兼霰密脈脈受風扶大地遙浮越低空近壓吳山川紛莽蒼雲木半虛無雁路才分影鷗沙秪辨呼戢鱗潛素鯉側目逗飢烏色借齊宫並音操郢曲孤披來朝練淨映處夜珠枯不用裁梁賦偏宜入剡圖乍驚容鬢似却怪嵗華徂臘漸回杓斗春先到酒壚乾坤原浩蕩泥滓暫﨑嶇自笑寒暄態誰燃造化爐聖朝陽德在白日麗髙衢浪口渡柳風吹浪花溪雲淡無色偶此爭渡人日夕未遑息煙霞洞古洞鴉路深杳渺不知處忽見煙雲來疑從此中去館娃宫不嗟亡國餘而憐竒豔絶翻得捧心人吳宫名未滅十八夜宿煙雨樓初見月雨氣連朝夕湖雲濕未收今宵看月色始覺過中秋姚舜牧一首舜牧字虞佐烏程人萬厯癸酉舉人廣昌知縣有承菴詩集詩話承菴以厚德聞鄉里事難悉書研究六經各有疑問詩不專工然頗自喜自君之出矣自君之出矣妾守深閨裏花落委泥中誓不隨流水林章十七首章先名春元字初文福清人萬厯癸酉舉於鄉有林孝廉集謝在杭云孝廉桀驁不羈才情楚楚信自可人曹能始云初文才士不欲以庸孝廉是處好為人排難解紛乃以無心獲罪謝司冦出之縲絏之中適遼海有警纍上書進竒策願身列戎行鍊甲兵備緩急為嫉者所繩觸憲而死詩如客情如春草無處不堪生無家逢寺好多病見僧親曉煙常帶雨夜月忽啼禽千山風雨裏一任子規啼皆絶酸楚文周元亮云初才情悽惋少年行君不見長安俠少年酒底髙歌花砥眠鬬雞走馬千金散何曾盜箇官家錢一朝忽報邊烽起從軍不待别妻子但言割地與和親不愁戰死愁羞死春日送别春風自多思奈與客情違楊栁頻催别蘼蕪不送歸千山獨上馬一曲兩沾衣回首河橋道迢迢看落暉吐漿臺弔淮南王英公孤祠千載後不是漢人開劉項俱天意韓彭只將才九江殘水過六國故山回惟有啼鴉在黃昏下此臺舟中别張仲豫昨日淮陽客今朝江上還離亭一杯酒去棹萬重山雲樹故人意風塵遊子顔未知攜手處莫惜暫追攀暮春登燕子磯懷古揚子江南燕子磯楊花燕子一時飛六朝人物空流水兩晉山川盡落暉草色逺迷爪步去潮聲暗打石頭歸倚闌天際春三月惆悵東風動客衣陳漢陽同年招飲晴川閣應城田功甫孝廉適攜酒至余於功甫為初識而别漢陽則十年矣時當七夕書以記之木葉西風漢渚波髙樓徙倚晚涼多十年易作人間别七夕難為客裏過陳子榻前堪對酒田郎座上好彈歌孤城漏下雙星見牛女娟娟正渡河鄖城見黃序賓使君雲雨交情此日偏與君相見可澘然豈無太守二千石那有故人三十年冠為王陽彈不沗袍因范叔脫堪憐舊時一片灤城月何似今宵漢水前潛山送友還閩草草相逢楚澤西紅亭緑酒又分攜人生砥事憐雞肋客路長教怨馬蹄舒子州前柳葉暗越王城外荔枝齊十年歸夢如流水一夜隨君下建溪送别相送到江干凄其風又雨淚下沾君衣看君不能語夜度恨這關楚水東邊别路多秋風夜半動離歌迢迢恨這關前月獨照行人過汴河河水二首河水灣灣繞大隄隄邊楊柳一時齊可憐折盡青青色長送行人出水西河水漫漫日夕流流將清恨到青州不知郎在青州不妾在河西西盡頭豔曲百花臺上百花開妬柳驕桃一處栽惟有東風情最好桃邊吹過柳邊來憶仲姬逢時把酒對紅顔親為拈花插翠鬟今日登髙人萬里教伊獨上望夫山春日春城柳色入東華莫惜驊騮過酒家記得去年江上别風吹二十四橋花渡江不趂東風不待潮渡江十里九停橈不知今夜秦淮水送到揚州第幾橋元旦千官春珮擁朝班萬國歡聲動聖顔獨有縲臣無祝處隔牆遙拜孝陵山孫繼皋六首繼皋字以德無錫人萬厯甲戌賜進士第一歷官吏部左侍郎有柏潭集山中山中無棟宇小屋但誅茅境僻人煙少林深虎迹交暗泉通石竇炎日避松梢寂寞元吾事披襟誦解嘲立秋日病伏枕仍今夕開軒乍已秋髙梧片葉落大火一星流楚户砧初動齊紈扇欲收因思故園鱠強起賦登樓彗十月彗星見一旬光丈餘銀河不用掃天意欲何如避殿君王詔登臺太史書杞人憂國淚占夜幾踟蹰送周計部餉邊大漠平連薊北天向來前箸急籌邊將軍已佩通侯印使者仍輸太府錢幾處鼓鼙間落日何年烽火避甘泉君行會有匡時略試問金城塞下田丙子春夢得一聨足成一絶落日船頭浪春風江上山家園幾千里却向夢中還芙蓉湖芙蓉湖邊楊柳斜家家啼鳥村村花水面歌兒搖畫舫陌頭遊女渡香車余孟麟一首孟麟字伯祥江寧人萬厯甲戌賜進士第二歷官南京國子監祭酒有幼峯學士集多病多病門常掩深秋葉盡飛自憐初學廢遂覺故人稀鑷白心虛壯還丹計實非不堪風露色猶著芰荷衣孫礦二首礦字文融餘姚人萬厯甲戌進士歷官太子太保南京兵部尚書有居業編詩話月峯勤學過於士安慧業不如靈運觀其論詩有云韓退之於詩本無所解宋人目為大家直是勢利他爾是何言與尸佼所云松柏之鼠不知堂密之有美樅者也雨漠漠雲籠閣霏霏雨拂簷彈琴絃半緩收扇墨多黏古礎方花潤髙枝墜果甜此心無俗慮屋漏亦何嫌舟行天陰村徑黑渾迷舊時路忽逢岸上燈照見橋邊樹趙南星八首南星字拱極髙邑人萬厯甲戌進士除汝寧推官入為户部主事改吏部歷員外郎中謫平定州判官起太常寺卿尋升工部侍郎拜都察院左都御史進吏部尚書謫戍代州卒諡忠毅有趙忠毅公集姚孟長云夢白詩淋漓沉痛讀之如聞易水擊築之音雜詩騎馬出城門攬轡登髙岡秋風凋百草原野何荒涼離獸縱橫馳飢鳥鳴且翔四望多古墳蕭蕭蔭白楊結根連枯骨落葉滿墓傍泉室永寂寞無復白日光今古更相悲奄忽若朝霜髑髏樂南面無乃非其常修名苦不立死亦何足傷宿雨宿雨苦不開四望垂雲黑塗潦浩縱橫阡陌不可識客子駕言邁行行還自惻薄暮路轉修人馬同倦極髙空絶飛鳥況我無羽翼逺壑來悲風草木慘無色念彼白駒詩喟焉長歎息聞陳荆山方伯病免解組亦常言斯人何其果才見北來鴻俄聞南下舸故人俱還山酒錢誰寄我嗟彼四海人何限不舉火拯物豈不懷仕路方坎坷同心眇天末難鼓山陰柁酌我犀角杯遙思澆磊砢余曾寄荆山犀杯壬子仲春與梁升吉徐新周汪景從吳昌期及其子貞復遊泲上取水烹茶命侣遊南郊乃至泲之干春風淡未放薄衣尚微寒水落出平沙中為新月灣抽蒲此偶坐西睇太行山淺流開明鏡綺波生其間童子負茶鼎烹之瑩心顔自有泲水來勝事良絶難俗人既無韻雅人未必間我輩幸免俗世務不相關濁河衆魚噞夙志非投竿庚戌立夏日旱氣翻涼冷司方改祝融家家田望雨日日土兼風轉壑非能盜開倉未濟窮已知天意久不肯遽年豐燕子漸見年來燕子稀香泥何處戀忘歸竹亭草閣簾虛卷樹杪雲邊影乍飛社日屢看時節爽舊巢忍與主人違蕭條景物殊疇昔歎息林中事亦非寄艾卿懸瓠城頭坐日斜目隨鴻雁極天涯祁連風卷沙如霧瀚海春飛雪作花擊築可憐燕市月鑿空虛擬漢臣槎已拚萬死投荒塞豈望金雞更憶家寄象先兵部長安嵗晚雪霜頻林下應知忘故人此日音書那不寄銀魚冬筍未嘗新李三才六首三才字道夫臨潼人萬厯甲戌進士除户部主事歷員外郎中謫東昌推官升南禮部主事轉郎中出為山東按察僉事歷河南參議副使調山西入為大理少卿擢右僉都御史督漕運拜户部尚書有雙鶴軒鷦鷯軒二集秋夜宿直十載猶郎署蹉跎愧少年涼風回樹杪白露下庭前漏度三更雨燈殘五夜煙由來飛動意回首欲茫然送許郎中轉餉薊密諸鎮重鎮經行逺清秋離别難議和兼漢策轉餉命秦官朔雁驚風下邊雲入夜寒都亭尊酒罷落葉滿征鞍送薑仲文之徐州轉餉君之楚為郎我滯燕一尊悲逺道並馬憶朝天雲失西山樹江迷大澤煙相思若汴水日夜咽君前送馬心易被謫南還風雨金陵暮蕭然逐客舟酬恩空一劎去國正三秋岸濶清風逺江深落照愁五湖知有興只此又何求送諸博士夀賢量移過里兼懷顧叔時兄弟秦關西望壯心驚風雪梁園送汝行漢帝有恩前賈席書生何計請終纓金繒嵗月方挑釁宵旰朝廷已論兵若到江南逢二顧安危萬里想同情謝杰二首杰字漢甫長樂人萬厯甲戌進士除行人厯官户部尚書有北窗吟稿煌煌京洛行煌煌京洛維帝之鄉地交陸海人雜五方物態千狀靡可籌量炙手可熱死灰或揚清商回換六月飛霜翟公門第雀羅倏張衛青傔僕夕拜侯王黃金作埒白玉為堂東鄰施戟北里鳴璫鄠杜惡少邯鄲名倡徵歌百萬縱博千場時不可再樂不可常悠悠南陌纍纍北邙東望上蔡西望咸陽黃犬既斃狡兔亦僵有德以昌無德以亡周公之訓凛如探湯死馬行月月橋門進草束千束萬束猶不足朝朝死馬出橋門五匹十匹紛相屬馬草日進馬日飢馬飢日死人日肥圉人圉人焉用爾輩為草人上草將錢買屠夫領馬作肉賣賣馬肉輸圉人馬死何能值幾緡有時草人轉向圉人買得死馬草明朝又進橋門道吕坤三首坤字叔蕳寧陵人萬厯甲戌進士知襄垣大同二縣為吏部主事歷員外郎中出參政山東按察山西轉陜西右布政以右僉都御史巡撫山東升刑部侍郎有去偽齋集雜詩二首野水漸我車掀之出于淖夫豈避危途行險終違道萬事有當然禍福安足保君子守其轍無論遲與早孔孟恆固窮儀秦毋乃躁所得非所欲寧以落魄老土偶象為人終復化為土物化還吾初此身了無苦自豫落蓐時覺飢寒痛楚不幸漸有知六氣滋外侮逆境不須論快事奚豫補勞勞空百年孰注南宫簿别意留妾一身在憐君萬里行夜來雙泪盡不忍到長亭徐元春一首元春字正夫松江華亭人萬厯甲戌進士歷官太僕寺卿靈谷寺訪月泉禪師山郭尋僧出行行黃葉邊石泉秋聽急江月坐來圓興豁長昏夜門開不住天時聞鐘磬發獨立萬峯前楊四知一首四知字元述祥符人萬厯甲戌進士除行人擢陜西道御史歷大理寺少卿髙玄殿髙玄宫殿五雲橫先帝祈靈禮太清鳳輦不來鐘鼓靜月明童子自吹笙邢侗四首侗字子願臨邑人萬厯甲戌進士除南宫知縣徴授監察御史出為湖廣參議升陜西行太僕少卿有來禽館集史紹卿云先生能文能詩能書能畫蕞會諸長擅絶兼品詩話子願雖有詩名為書法所掩其言曰詩盛于嘉隆七子以為盡詞人之變矣然效趨者髙趾促柱者急張往往不病而呻吟匪樂而強笑江河日下七子之盛七子之衰也蓋深中時流之弊特其自撰不見脫穎耳竹馬歌為濟南太守檇李沈公作使君五馬馬五色兒童竹馬馬以百朝朝遲公阡與陌胡為不夙來令我父兄頭漸白起居宗伯尊師于公七上書移疾三經月改弦臣心霜露切帝命起居駢去住違今日遲回易長年獨餘秋夕夢常繞汶陽田走筆戲贈萬伯修使君五花番馬鷫鸘裘夜獵歸來興未休教唱西涼新樂府一時霜月遍幽州古意再寄于田零落鈿蟬出漢宫闌干雙淚背春風君王總署回心院再畫蛾眉恐未工周𢎞禴一首𢎞禴字元孚麻城人萬厯甲戌進士除户部主事謫無為州同知升順天通判復謫代州判官遷處州府推官轉南兵部主事歷尚寶司丞進少卿三黜為澄海典史有澄海集乙酉貶代州壬辰貶澄海俱旅宿髙碑店風塵何處問銜杯南海浮槎更可哀古道垂楊應笑客逐臣何事又重來遊朴三首朴字太初福寧州人萬厯甲戌進士除成都推官入為大理評事官至湖廣右布政使有藏山集行役驅馬上髙山山髙欲近天及到山巔上更有山在前髙山豈有盡客行良可憐木綿菴凄凄木綿菴賈相此裂腹矯矯鄭虎臣手代天行戮戮死頗快人所恨死不速元凶僅就誅宋社亦已屋蒼生尚含憤未得食其肉一夫恣胸臆九有被荼毒生竊片時歡死作千世辱寄語當路兒此是前車覆崇寧縣却酒崇寧清酒如鬱金主人長跪留客斟客行欲飲迫程限不飲傷此主人心春風爛熳遍山壑把酒澆花殊不惡客還有酒應留連只恐山花已零落范淶一首淶字原易休寧人萬厯甲戌進士除城南知縣入為刑部主事厯官左布政使有水堂吟浣花溪百花潭接浣花溪饒笑堂開傍水西新綻夭桃帶微雨輕飛栁絮半沾泥尋芳力倦年非壯懷古愁多日欲低回首白雲家萬里深林偏喜杜鵑啼沈璟二首璟字伯英吳江人萬厯甲戌進士官光祿寺丞擬古答澤民客從逺方來遺我一紈扇上有秋風詞讀之淚如霰颯颯懷袖間悠悠異鄉縣會面詎有期涼燠代更變莫以新相知棄捐故與賤酬澤民見懷之作何來雙鯉漢江頭江水西南萬里流髙枕青山家負郭開襟白日賦登樓洞庭葉下孤雲晚夢澤寒深五月秋珍重芳蘭堪作珮湘臯搖落不須求陶允宜六首允宜字懋中會稽人萬厯甲戌進士除刑部主事官止黃州府同知有鏡心堂集蘄簟簟出蘄州世所無五月六月繩牀鋪恍坐水閣眠冰壺皇都炎熱逾江湖貴臣催簟如催租民情誰語州大夫蘄艾七年之病三年艾起死回生人所賴芃芃白葉功為最麒麟山上王城在索取其中却其外出入頗煩閽者怪何時斷種出野菜火病箠痕兩無害蘄蛇花蛇方頂尾甲指捕者刲腹投之水自脫腹胃淨如洗大如竹箭長尺咫能却風攣化食痞方其出穴疾如駛偶遭毒吻人立死我節食飲慎眠起諸邪不侵病良已蘄龜千年龜小象圍棋其甲翠緑毛毰毸置之盆水生漣漪蚊蠅逺避塵自離壁頭牀足兒曹嬉不飲不食長如斯求之艱難誰得之麻城鵝麻城鵝品光州右餌以膏粱兼菉豆肉色紅鮮滋味厚取之為鮓進元后近年黃州失耕耨一鵝之肥幾人瘦黃陂葛楚人種葛不種麻男採女績爭紛拿黃陂所織尤精嘉光潔勻細眼不斜皎如白苧輕如紗進之內宫傳相誇雲綃霧縠無光華價值減少尺幅加織者十家逃九家支大綸一首大綸字心易嘉善人萬厯甲戌進士由南昌府學教授升泉州府推官謫江西布政司理問遷知奉新縣有華蘋集信州公署玉露楓林旅雁寒緑蕉分影入雕闌自憐兩度來江右不是間官即冷官韓子祁一首子祁字心堯平湖人萬厯丙子順天鄉試中式除德安推官補贑州歷蘇州府同知有醯雞集煙雨樓層樓百尺點空濛柬指蓬壺一葦通春雨自添湖上碧晚煙輕抹浪頭紅萬家煙火浮天外午夜星辰落鏡中醉坐漁磯還獨酌却將鴛渚作鼇宫龎一德一首一德字與虔南海人知府嵩子萬厯丙子舉人嘉魚知縣教授揚州有雙瀑堂稿山家入山亦已深居人一何稀百里三四家茅茨枕山陂爨斫山木葉餉食道邊藜斜日羣行汲漏下未得歸籬門麂眼疏所憂虎與羆居人已偃卧何由知客悲明詩綜卷五十七
