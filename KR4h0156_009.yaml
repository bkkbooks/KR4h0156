body:
  text: 明詩綜巻九翰林院檢討朱彞尊編髙啓一百三十八首啓字季迪長洲人洪武初召修元史授翰林院國史編修官擢戸部侍郎放還尋坐法死有鳳臺吹臺江館青丘南樓槎軒姑蘇雜詠等集自選為缶鳴集景泰中呉人徐庸彚為大全集王子充云季迪詩雋逸清麗如秋空飛隼盤旋百折招之不下又如碧水芙蕖不假雕飾翛然塵外横謝𤣥懿云季迪之詩縁情隨事因物賦形縱百出開闔變化其體製雅醇則冠裳委蛇佩玉而長裾也其思致清逺則秋空素鶴迴翔欲下而輕雲霽月之連娟也其文采縟麗如春花翹英蜀錦新濯其才氣俊逸如泰華秋隼之孤鶱崐崙八駿追風躡電而馳也呉原博云季迪雄不敢當子美髙不敢望晉魏然能變其格調足以髣髴韓柳王岑劉欽謨云季迪詩多激烈慷慨雄偉竒古浩乎如大川之決防也鏘乎如洞庭之張樂也儵乎如幽壑之舞蛟也李賓之云國初稱髙陽張徐季迪才力聲調過三人逺甚百餘年來亦未見卓然有以過之者季陳約之云洪武初沿襲元體頗存纖詞時則迪為之冠徐子元云季迪岱峰雄秀瀚海渾涵海内詩宗豈惟呉下美楊用修云季迪一變元風首開大雅王元云季迪如射鵰兒伉健急利往往命中又如燕姬靚妝巧笑便辟王敬美云季迪才情有餘使生𢎞正李何之間絶塵破的未知鹿死誰手楊張徐故是草昧之雄勝國餘業不中與髙作僕穆敬甫云髙詩竒拔爽朗可並唐之燕許特胡元瑞云國初稱髙楊張徐季迪風華穎邁過諸人同時若劉誠意之清新汪忠勤之開爽袁海叟之峭拔皆自成一家足相羽翼劉崧貝瓊林鴻孫蕡抑其次也又云髙太史格調體裁不甚逾勝國而才具瀾翻風骨穎利則逺過元人昭代初雅堪禘禰之顧𤣥言云髙侍郎始變元季之體首倡明初音發端沈鬱入趣幽逺得風人激刺微旨足以嗣響盛唐髙李時逺云季迪詩穠麗而無粉澤清新而復古優入盛唐何无咎云季迪矩矱全唐獨運胸臆近體不無中晚纖弱之調尚沿元季餘風陳臥子云季迪詩如渥洼生駒神駿可愛特未合和鸞之度耳轅李舒章云季迪如春池黃鳥游目可念宋文云季迪妙有才情翩翩矯逸明初詩人允宜首推繆天自云季迪詩自古樂府文選玉䑓金樓諸體下至李杜王孟髙岑錢郎劉白韋柳韓張以及蘇黃范陸虞揭靡所不合此之謂大家誦青丘子歌其自負亦不淺矣静志居詩話侍郎跌宕風華鳯觀虎視造邦巨擘所不待言而何仲黙别推袁景文第一試合諸體觀之袁自非髙敵也世傳侍郎賈禍因題宫女圖其詩云女奴扶醉踏蒼苔明月西園侍宴回小犬隔花空吠影夜深宫禁有誰來孝陵猜忌情或有之然集中又有題畫犬詩云獨兒初長尾茸茸行響金鈴細草中莫向瑤階吠人影羊車半夜出深宫此則不類明初掖庭事二詩或是刺庚申君而作好事者因之傅㑹也行路難君不見盤中鯉暫失風濤登俎几君不見枝上蜩纔出糞壤凌雲霄推移變化詎可測勿謂明日同今朝出乗髙車入大馬半是當年徒步者悠悠行路莫相欺為雌為雄未可知少年行下直平明出禁門笑提博局伴王孫寶刀不敢將輸卻明日沙場欲報恩悲歌征塗嶮巇人乏馬飢富老不如貧少美游不如惡歸浮雲隨風零落四野仰天悲歌泣數行下李時逺云不數漢魏阿那瓌牛羊草漫野大帳天山下十萬控弦兒聞箛齊上馬呉明卿云伉健野田行白楊樹下誰家墳火燒野草碑無文路傍尚臥雙石馬行人指是故將軍當時發卒開隂宅千里送𦵏城東陌子孫今去野人來髙處牧羊低種麥平生意氣安在哉棘叢暮雨棠棃開百年富貴何足恃雍門之琴良可哀秋風引嗟爾秋風胡為來哉奏商律兮瑟颯而悲哀叩喬柯而隕葉埽廣路以清埃入班姬之永巷過襄王之髙臺瑶琴自鳴羅幃齊開馬蕭蕭而嘶起鴻噭噭以翔迴使崩雲駭浪震蕩於白日兮忽欲去而徘徊客有懷鄉失職而對此者恨盈襟而難裁但欲變天地之揺落不知感節序之摧頽秋風生歸去來鍾廣漢云善學太白秋江曲送顧使君秋江月滿秋潮大江上行人待潮過别離休說渡江難半日順風船穩坐楚江茫茫葭菼平使君來時雄雉鳴子弟從軍隔江去幾家猶住夕陽城水田雖荒飯常足芡米夜舂二十斛誰道繁華不及前戸無征稅官無獄渡江渡江君莫留江北樂似江南秋鑿渠謡鑿渠深一十尋鑿渠廣八十丈鑿渠未苦莫嗟吁黄河曾開千丈餘君不見賈尚書城虎詞候潮門開啼早鴉有虎忽入居人家母兒畏竄雞犬伏排籬突戸誰能遮獰風動樹初哮吼驚起東營捉生手怒拔長戈試一舂目光落地倀魂走南山藜藿深冥冥白日横行誰敢攖何為離窟來城市牙爪雖全不能恃君不見壯士遭急縛失路窮時亦如此春江行春江南北疑無岸緑草緑波連不斷一女紅妝出浣紗恰如鏡裏見桃花裌衣猶冷過寒食雲度春隂半江黑浦口風多潮正深輕舟搖蕩愁人心鷓鴣暮啼歸路逺飛絮茫茫楚王苑廢宅行鳴珂坊裏將軍第列㦸齊收朱戸閉里媪逢人說舊時有廬被奪廣園池今年沒入官為主散盡堂中義宅兒廚煙久斷無粱肉羣鼠飢來入鄰屋官封未與别人居日日閒苔雨添緑曲閣深沈接後房畫屛生色暗無光尋常不敢偷窺處守卒時來拾墜璫春風多少奇花樹又有豪家移得去牧牛詞爾牛角彎環我牛尾秃速共拈短笛與長鞭南隴東岡去相逐日斜草逺牛行遲牛勞牛飢惟我知牛上唱歌牛下坐夜歸還向牛邊臥長年牧牛百不憂但恐輸租賣我牛養蠶詞東家西家罷來往晴日深忩風雨響二眠蠶起食葉多陌頭桑樹空枝柯新婦守箔女執筐頭髮不梳一月忙三姑祭後今年好滿簇如雲繭成早簷前繅車急作絲又是夏稅相催時憶逺曲揚子津頭風色起郎帆一開三百里江橋水柵多酒壚女兒解歌山鷓鴣武昌西上巴陵道聞郎處處經過好櫻桃熟時郎不歸客中誰為縫春衣陌頭空問琵琶卜欲歸不歸在郎足郎心重利輕風波在家日少行路多妾今能使烏頭白不能使郎休作客里巫行里人有病不飲藥神君一來疫鬼卻走迎老巫夜降神白羊赤鯉縱橫陳男女殷勤案前拜家貧無殽神勿怪老巫擊鼓舞且歌紙錢索索隂風多巫言汝壽當止此神念汝䖍賖汝死送神上馬巫出門家人登屋啼招魂陸冰修云如此章法入之張王樂府幾不能辨主客行主人楚歌客楚舞落日黃雲鴈聲苦笑拂腰間寶劒光美人滿堂色如土大兒北海人中竒小兒能讀曹娥碑相逢且莫歎貧賤但願有酒無别離君不見平原墓上生秋草國士無窮道㫄老新弦曲舊弦解新弦張冰絲牽愁六尺長寛急頻從指邊聽金鴈參差移不定新弦響髙調易促不如舊弦彈已熟憐新厭舊妾恨深為君試奏白頭吟他日愁如舊弦棄泣向羅裙帶頭繫竹枝歌楓林樹樹有猨啼若箇聽來不慘悽今夜郎舟宿何處巴東不在定巴西照田蠶詞東村西村作除夕髙炬千竿照田赤老人笑祝小兒歌願得宜蠶又宜麥明星影亂棲烏驚火光辟寒春己生夜深然罷歸白屋共說豐年真可卜擬古二首美人一相見遺我白玉環上有雙雕龍游戲在雲間持此感深意佩結無時閒玉以比貞潔環以明不絶雲龍永相從誰能使離别黄鳥鳴春陽流芳滿西園攀條日已暮悵惋不能言禦寒必重裘涉道須雙轅離居非君子何以解憂煩煩憂日己積佳期日已失思君如蓬萊可望不可即區區儻見察憔悴甘自畢寓感六首美女生貧家光豔人未識遠聘入楚宫揚蛾欲傾國朝游瓊臺上夕侍金輿側奉歡擬千齡秋風失顔色銜恩歸永巷貞意徒寂黙髙髙天上星墮作水底石人事盡如斯推移歎何極志士徇功業貪夫詫輕肥亦有逃羣子矯矯與時違彼此更共笑不知誰是非達人體自然出處兩忘機浮雲游天表舒巻有餘輝攬轡登太行遥望洛北州崤函正西峙黃河復東流百城無遺堵雲煙莽相繆朝作冠蓋場暮為狐兔丘昔人爭此地干戈迭相讎當其得意時連陌擁鳴騶百年奄忽盡魂魄空來游曷見采芝叟冥棲無所求裋褐乗蓽輅狐裘駕文車西門與北宫窮達一何殊彼達矜己智此窮愧身愚東郭發至言兩惑各以袪厚薄有定命巧拙果誰歟歸臥掩蓬室道存何所吁頽陽在川上𤣥蟬夕鳴悲嫋嫋風起波翻翻葉辭枝曠望天宇内泬寥此何時朱火已盈謝清商届其期覽鏡忽自嗟緑鬢生素絲萬物有榮悴造化豈吾私南山多浮雲北山有髙樹因風暫來依風回復飛去兄弟滿四海幾人此相遇握手交百懽分襟滋千慮蹤跡不可常無為嗟去住始發南門晚行道中嵗暮寒亦行征人有常期辭我家鄉樂適彼道路危酒闌别賓親驅車出郊歧我馬力未痡已越山與陂回頭望髙城落日雲樹滋遭亂既少安謀生復多飢塗逢往來人孰不為此馳逺遊亦吾志去矣何勞悲早過蕭山歴白鶴柯亭諸郵客起何太早村荒絶雞鳴況時江雨晦不得見啓明凌兢度髙關山空縣無城隔林聞人呼已有先我行側身避徑滑聚足防厓傾衣寒復多風聒聒逺水聲千峰霧中過不識狀與名嵐開見前郵始覺歴數程越禽啼楓篁冷日傍午晴煙生沙墟寂葉落澗寺清登臨亦可恱但恨時未平聞長槍兵至出越城夜投龕山列藩遏戎亂駐鉞實此州如何殺大將王師自相讎我來亂始定城郭氣尚愁又聞有鄰兵倉卒豈敢留促還出西門天寒絶行輈古戍暗雨雪旌旗暮悠悠野屋閉不守澤田棄誰收居人且奔逃遊子安得休逶迤蒼山去泱漭𤣥雲浮人虎爭夜行風榛嘯巖幽我徒戒相親一失未易求飢食谷口栗寒燒澗中槱神迷路多迂再宿達海陬雖嘗登頓勞幸免迫辱憂聖尼畏於匡嗟我敢有尤但慙去越早不遂名山游夜抵江上候船至曉始行夜辭西陵館霜谷叫猨歇津卒未具舟天險不可越漁商雜候渡寒立沙上月蒼煙隱遥汀益覺潮漲濶開橈散驚鳬海色曙初發曨曨前山來稍稍後嶺沒中流聞鼓角隔岸見城闕客路得奇觀臨風悶俱豁登鳳凰山尋故宫遺跡茲山勢將飛宫殿壓其上江潮正東來朝夕似奔嚮當時結構意欲敵汴都壯我來百年後紫氣愁不王烏啼壁門空落葉滿陰障風悲度遺樂樹古羅嚴仗行人悼降王故老怨姦相蒼天何悠悠未得問興喪世運今復衰凄涼一回望宿湯氏江樓夜起觀潮舟師夜驚呼隔浦亂燈集潮聲若萬騎怒奪海門入初來聽猶逺忽過睇無及震揺髙山動噴灑明月溼霜風助翻江蛟龍苦難蟄應知陰陽氣來往此呼吸登樓覺神壯憑險方迥立何處望靈旗煙中去波急過奉口戰場路迴荒山開如出古塞門驚沙四邊起寒日慘欲昏上有飢鳶聲下有枯蓬根白骨横馬前貴賤寧復論不知將軍誰此地昔戰奔我欲問路人前行盡空村登髙望廢壘鬼結愁雲屯當時十萬師覆沒能幾存應有獨老翁來此哭子孫年來未休兵彊弱事幷吞功名竟誰成殺人遍乾坤愧無拯亂術佇立空傷魂舟次敢山阻風累日登近岸荒岡僧舍髙岸鳴枯桑湖陰北風厲寒濤洶我前幾日不得濟孤舟恐漂蕩石根暮牢繫憂來厭閒卧近寺聊獨詣雀飢殘林空人倦危磴細年荒無居僧樹死石門閉神傷卻欲返微霰灑征袂窮冬已崢嶸故國尚迢遞仰看浮雲馳東路阻歸計長歎復何言吾生信多滯過峽石硤石頗奇壯長河出連山絶壁兩岸開行舟過其間髙處誰解登隂藤裊難攀㫄垂雨痕古仰露天光慳不知真宰意隨地設險艱一夫據蜀閣二世憑秦闗賴此非要區爭奪得少閒徘徊佇望久日暮飛雲還登海昌城樓望海百川浩皆東元氣流不息混茫自太古於此見容德積隂漲𤣥濤萬里失空色鴻鵠去不窮魚龍變莫測朝登茲樓望動蕩豁胸臆始知滄溟大外絡九州域日出水底宫煙生島中國寛疑浸天爛怒欲吹地窄常時烈風興海若不受職長堤此宵潰頻勞負薪塞況今艱危際民苦在墊溺有地不可居澒洞風塵黑安得擊水游圖南附鵬翼秋懷四首明月出逺林流輝鑒牀幃促促草下蟲催我索故衣起歎秋夜長欲取鳴琴揮掩抑不成弄中心復乖違有懷難自宣勿謂知音稀涼風動幽幔髙堂夜空虛明燈無與語聊讀古人書古人亦何人使我不得如棄巻輒還臥終宵自欷歔朝遊荒岡陲暮行空潭側我非楚大夫何有憔悴色良辰思逺馳周道廣且直我馬力不前回駕仰偃息踟躕阻脩竹日夕睇西北苟安非予志所懼時未識弭櫂望江涘日落青楓林驚波駛且廣蕩漾浮雲隂靡靡皋蘭衰嗈嗈渚鴻吟顧此凜節謝憂來忽傷心宋子悲已多潘生歎彌深自古有此愁誰云獨吾今出郊抵東屯三首故鄉一區田自我先人遺賴此養吾懶不耕坐待炊霜露被寒野屬當斂穫時年來徵薄入稅駕宿東陂今年雖未豐亦足療我飢萬鍾知難稱保此復何辭喌喌雞登場秋稼恨狼籍疎榆䕃門巷景暗燈火夕田家雖作苦於世寡憂戚況當收穫景斗酒復可適所以沮溺徒躬耕不辭劇坐久體不適卷書出柴闗臨流偶西望正見秦餘山野淨寒木疎川長暝禽還此中忽有得怡然散襟顔遂同樵牧歸歌笑落日間顧榮廟有序晉侍中顧彦先有墓幷祠在長洲之東久而廢為淫祀縣令周君復之為賦是詩軍司吳國秀神機夙超朗弱冠遊洛師已䝉南金賞崎嶇諸王幕沈湎務遵養中罹廣陵艱計服匪誠枉風雲一揮扇義旅臻同響事成恥言勲飄然理歸鞅晉社始東遷羣賢悉收奬道謁真感㑹矯翼丹霄上德聞一代稱跡泯千齡往時屯乏良佐英謨益堪想墳祠託荒郊蕭條竝榛莽蕘童侵雨隧淫巫闖塵幌大夫過停轅式瞻為含愴衣冠復故貌筵几陳新享寡劣忝鄉人因歌表遐仰李舒章云似謝康樂答張山人憲聽君辛苦詞感我艱難情百年自有為安用文章名雞鳴海光動車馬塵滿城相逢無新舊言合意自傾奉觴置君前長歌發哀聲時平苟未得飲此全其生澄景閣夜宴王孫喜留宴開閣望明河是夕月微暈涼風池上多棲禽翻暗叢駭魚動圓波清景厭絲竹雅詠答髙歌尊酌願勿間良宵易蹉跎預憂别在旦車馬層城阿九日無酒步至西汀閒晀髙天無游氛秋氣自激肅離居時節變霜降未授服蕭條野田間晨步聊逺矚悠悠寒川駛靡靡晴巒矗菊叢有清香木葉無故緑親朋去我逺登髙且連躅孤懷誰知音惆悵臨水曲名酒不可尋歸來掩茅屋贈談鬼谷數瞽師金松隱我聞鬼谷子乃是古仙真避世青谿中不汙戰國塵著書十三章當年授儀秦二子不善用竟皆殺其身瞽師得異傳相去逾千春不為縱横說談數妙入神往年客南都蓬門集朱輪下簾論𤣥理驚動金陵人歸來隱虞山繞廬樹松筠誰言目無覩内照靈光新緬思大化根生此下土民起滅千萬塗孰能究其因或愚騁結駟或賢被懸鶉命也可奈何天道誰疎親世事昧守常毋使徒紛綸始遷西齋乍懸南樓榻始布西齋筵西齋非吾廬幽淨亦可憐風牖竹裊裊露庭菊鮮鮮圖史左右陳永日坐一氊婉孌數童子哦誦當我前為爾竟寂寂低回欲窮年讀書將何爲乃與始志愆進無適時材退乏負郭田我生非匏𤓰謀食有道焉苟得隨羣趨顧此不稍賢飲餘解衣臥毋嘲腹便便題陳生畫前村夕陽明後嶺秋嵐積葉落露山村潮來沒江石遥遥射鴈子慘慘聽猨客何事下征帆西陵渡頭驛青丘道中霖雨江暴溢奔流絶津涯茫茫野田白何由見春華居人久已亡流萍滿其家昔我過此土極目桑與麻故道不可尋舟行但蒹葭嵗凶豈宜客四顧空長嗟秋風秋風屋外來落葉紛吾傍不出門幾日我樹如此黃但覺成懶性焉知逝頽光朝餐止一盂夕臥惟一牀仲尼欲行道轍跡環四方而我何為者不與世相忘大水吾鄉水為國自昔稱漏天今年尤苦霖冒此上下田老農愁相告無有二十年東江入門流比屋如敗船夜臥牀屢移晨炊釜常懸涼風吹蒲稗羣鵝鳴我前茫茫失川塗出行竟回邅斯民欲昏墊天意豈不憐隂陽致乖沴孰能究其然嵗饑尚勿憂黽勉當食鮮毛公壇欲觀漢壇符東上縹緲峰葛花墜寒露夕飲清心胸月出太湖水鶴鳴空磵松真境久寂寥蒼苔悶靈蹤嘗聞緑毛叟變化猶神龍世人豈得見偶許樵夫逢攀險力易疲探𤣥志難從歸去白雲外空聞仙觀鐘吳桓王墓朝出南郭門髙墳鬱蒼蒼借問葬者誰乃是長沙王黃腸豈不錮盜發取所藏金環出世間封樹無輝光緬想衰炎際當塗逞姦強英雄失所據虎視誰敢當王初奮穉孤英風凜飛霜談笑定江東賢豪歘來翔少假須臾年足見霸道昌何爲困仇奴輕獵不自防天意豈佑魏遽使斯人亡因觀感往事喟焉令人傷虎丘次清逺道士詩韻神仙不可羈乗螭躡雲漢豈將避嬴劉荒山事窮竄何年東觀海一至此峰翫悠悠清詩傳窅窅遺跡漫我來繼登臨長嘯幘初岸既秋煙蘿踈欲雨風竹亂夜深空潭黑月吐石壁半龍驚汲僧來鳥喜游客散閣掩林下夕鐘鳴巖中旦勝賞誰能窮今古付篇翰飛騰子何之汩沒余可歎安得契真期超然豁靈贊贈張主簿離離平阜禾纂纂橫林棗客行愛樂土秋晚華亭道停燭春紡遲鳴榜潭魚早借問何能然年來縣官好龍門龍門何崢嶸此地表奇蹟山分兩岸青天豁一罅白知非禹功鑿想是鬼手劈長為風雨關開闔自朝夕深合未吐雲對峙不崩石日光寒易傾苔色隂更積只宜過此内便與人境隔始窺已幽深漸入尤險窄暗中把危藤蜿蜒欲驚魄僧留看古刻敲火照絶壁晚聞松竹號洶若波浪激不知神魚飛到此誰㸃額天池靈峰可度難昔聞枕中書天池在其巔每出青芙蕖湛如玉女盆雲影含夕虚人靜時飲鹿水寒不生魚我來屬始春石壁煙霞舒灩灩月出後泠泠雪消餘再汎知神清一酌欣慮除何當逐流花遂造仙人居劒池干將欲飛出巖石裂蒼礦中間得深泉探測費脩綆一穴海通源雙崖樹交影山中多居僧終嵗不飲井殺氣凜猶在棲禽夜頻警月來照潭空雲起嘘壁冷蒼龍已化去遺我清絶境聽轉轆轤聲時來試新茗練瀆吳越水為國行師利舟戰夫差開此河艅艎試新練十萬凌潮兒材比佽飛健鼓櫂激風濤揚舲逐雷電當時意氣盈謂已無勾踐鷗避去沙洲龍愁閉淵殿恃彊非伯圖儵忽市朝變臺上失嬌姿泉間掩殘面至今西山月恨浸秋一片猶有網魚人時時得沈箭松江亭泊舟登危亭江風墮輕幘空明入逺眺天水如不隔日落震澤浦潮來松陵驛緜緜洲漵平莽莽葭菼積凭闌不敢唾下有龍窟宅帆歸雲外秋鳥下煙中夕欲炊菰米飯待月出海白喚起弄珠君閒吟第三笛南峰寺樵歸衆山昏天峰尚餘景欲投石門宿更度西南嶺逺聞雲間鐘蘿逕入寺永懸燈照靜室一禮支公影鳥鳴澗壑空泉響窗戶冷對此問山僧何如沃州境楞伽寺夕陽西下嶂返照東湖水來尋古寺遊楓葉秋幾里叩門山猨驚維馬林鳥起鐘聲出煙去半落漁舟裏楞伽義未曉塵累方自恥欲打塔銘碑從僧乞山紙支遁菴閒登待月嶺逺叩棲雲闗石室閉千載髙僧猶未還殘燈黄葉下古座青苔間不見跏趺影鶴鳴空此山弔幽獨君君本何代人姓名復為誰何年棄人間長眠此山陲荆榛鬱䝉蘢孤墳上無碑游魂久未化哽咽還能詩人沒乃歸滅憂樂豈復知君何獨煩寃猶有親愛思一死衆所同已矣焉足悲陳辭為相弔此理君當推剡原九曲二首欲知溪流長百轉來越嶠舟行安能極嵐路入斜照清景不足娛昔人豈辭詔石硯久難磨空林閉遺廟入江水稍決霜降未可涉頻聞往來人出門即舟楫前飛驚鷺逺下飲垂猱倢何處問興公風吹赤棠葉早過南湖湖黑月未出蒹葭露淒淒榜人識浦漵不畏荒煙迷殘夢詎可續舟揺櫓聲齊開篷望天邊斗柄插水低津遥未見樹村近纔聞雞自嗟逺遊人中宵走東西不如沙頭鴈宛頸猶安棲春日言懷芳樹何靡靡鳴禽亦喈喈時物豈不好人事誠多乖憂來臥閒房語笑孰與偕天道諒不昧薄願終當諧惟應守貞靜有酒陶中懷題畫鷹得嘯字髙風動古壁竦立見蒼鷂軒然欲飛揚嗟此粉墨妙秋筋束老骨天寒勢逾矯腦枯草中兔氣盡櫪上驃健鶻雖百餘凡材豈同調乾坤正肅殺怒氣號萬竅大野開平蕪悲臺落殘照荒城有妖狐夜作猛虎嘯為君試一擊壯士慙勇剽安能飽拳肉側翅隨年少哭王隅車行一輪摧鳥奮一翼傷人生失輔友誰當共提將相逢豈無人不獲如子良朝遊羣彦林夕棄萬鬼鄉春風吹南原百草萋以長呼君不歸魂割我欲斷腸豈不悟生滅情至諒難忘送程校理遊江上風亭裊離菅草緑江水暮送此南浦人孤帆雨中渡别觴足自緩前驛花滿路春叢戀山鶯晚絮迷汀鷺我今獨愁居芳月誰與度佇立望遥波相思積烟霧李舒章云娟秀至蓮村昔愛茲里幽誓將構蓬廬孰云墮世網重到十載餘喪亂喜獨完煙火靄舊墟柴門在深巷落日榆柳疎鄰翁念契濶攜筐饋雙魚苦問客何事顔色與昔殊焉知涉艱難多戚長少娛貧賤非所恥中情在閒居願翁勿相誚終當遂吾初移家江上别城東故居人情戀故鄉誰樂逺為客我行豈得已實為喪亂迫淒淒顧丘隴悄悄别親戚不去畏憂虞欲去念離隔雖有妻子從我恨終不釋出門未忍發惆悵至日夕我昔我昔在家日有樂不自知及茲出門遊始復思往時貧賤為客難寢食不獲宜異鄉寡儔侣童僕相擁持天性本至慵強使賦載馳發言恐有忤蹈足慮近危人生貴安逸壯遊亦奚為何當謝斯役歸守東岡陂京師嘗吳秔新秔粲如玉逺漕來中吳初嘗愛精鑿想出官田租我本東皋民少年習耕鉏霜天萬穗熟恣啄從飢烏日暮刈穫歸妻孥共懽呼茆屋夜舂急風雨江村孤晨炊滿家香薦以出網鱸如今幸䝉恩遨遊在南都門前半區田别來想已蕪長年盜寸廩補報一事無投匕忽歎息飽食慙農夫送周四孝廉後酒醒夜聞鴈聲别時酒忽醒客去唯空舍風雪鴈聲來寒生石城夜遥憶渡江船正泊楓林下唐昭宗賜錢武肅王鐵劵歌妖兒初下含元殿天子仍居少陽院諸藩從此擁連城朝貢皆停事攻戰岐王一去梁王來長安宫闕生蒿萊天目山前異人出金戈雙舉風煙開羅平惡鳥啼初起犀弩三千射潮水歸來父老拜旌旗釃酒搥牛宴鄉里擊裘駿馬驕春風錦袍玉帶真英雄詔書特賜誓終始黄金鏤字旌殊功虎符龍節彤弓矢後嗣猶令赦三死盡言恩寵冠當時天府丹書未逾此摩挲舊物四百年古色滿面凝蒼煙天祐宰相署名在尋文再讀心茫然古來保族須忠節受此幾人還覆滅王家勲業至今傳不在區區一方鐵人生富貴知幾時泰山作礪徒相期行人曾過表忠觀風雨斷蘚薶殘碑送王太守遷雲間男屠豬羊女釃酒共禱神祠留太守太守今年遷大州除書已下誰能畱兩州相去無百里失君應愁得君喜安得如君數十人一時盡福東南民劉松年畫樵青刺篙勝接槳船頭分流水聲響青山渺渺波漾漾白鷗飛過時一兩載書百卷酒十壺日斜出游女兒湖鄰舟買得巨口鱸醉拍銅斗歌嗚嗚此樂除卻江南無送葉卿東還聞君辭家今幾年布衣線斷芒鞵穿江湖夢迴燈火夜聽雨毎憶山中田兵戈忽斷故鄉路雖有兩足歸無縁上書願雪父兄恥畫地聚米籌山川居然無成困逆旅白日但看孤雲眠時人不容禰生傲坐客豈信毛公賢黄金已盡酒徒散壯士反為兒女憐飢吟倚壁氣未餒有似病鶻棲荒煙卻欲南遊探禹穴僕夫整駕雞鳴前波濤翻江畏飢鰐霧雨連海愁飛鳶相逢誰肯問憔悴山水自為窮人姸乾坤無家去何止飄泊不異迴風船區區願君自愛惜今古遇合無非天亂離貧賤何足歎王孫亦在道路邊我今豈少四方志讀書坐破牀頭氊恩讎兩無欲誰報送子空歌寶劒篇煑石山房為金華山人賦山人不飯秔稻香笑指白石為餱糧金華之石猶可食原是舊牧初平羊荆榛拾歸夜深煑自言久服能輕舉但令隨處有雲根不問青天旱無雨我生無力耕西疇硯田欲枯抱飢憂便當從君學此術絶勝乞米監河侯夜發錢清錢清渡頭船夜開黃茆苦竹聞猨哀客官釃酒水神廟風雨滿江潮正來蒸飯炊魚坐篷底不覺舟行兩山裏櫂歌早過越王城東方未白啼鴉起獨遊雲巖寺寄周砥城西諸山非不竒我遊獨與茲山宜紅櫻春開山後寺白水夏滿山前陂幽居況與山不逺鐘鼓每到空齋帷雨餘煙中落日下曳杖往讀頭陀碑兩岸蒼蒼日色古枇杷樹髙隂滿池殿燈欲昏上羣鼠塔鈴已靜蹲孤鴟興來即遊興盡返迎送豈要山僧知困窮喪亂豈無感正賴此境忘吾悲嗟君何為乃自苦破鞵短策塵中馳挂帆能來亦未晚浦口三日南風吹贈李外史仙人飄飄若雲風來去儵忽誰能窮豈惟上界足官府往往亦在塵埃中我欲尋真向五嶽亂後舊路迷榛蓬天雞未鳴夜谷暗海鶴已去秋壇空丹崖碧澗瑶草歇洞府一閟無由通陌頭驚逢李道士自說柱史為吾翁傍人相傳解起死袖裏有丹如日紅我聞安期古策士親見楚漢爭雌雄終然濁世不肯住渡海竟去先飛鴻𤣥洲東望纔咫尺彩霞幻作金銀宫何當共赴食棗約三花醉折春濛濛迴看城郭煙霧杳大笑下士真沙蟲聽教坊舊妓郭芳卿弟子陳氏歌時至正已􅕀嵗作文皇在御昇平日上苑宸遊駕頻出仗中樂部五千人能唱新聲誰第一燕國佳人號順時姿容歌舞總能奇中官奉旨時宣喚立馬門前催畫睂建章宫裏長生殿芍藥初開勅張宴龍笙奏罷鳳弦停共聽嬌喉一鶯囀遏雲妙響發朱脣不讓開元許永新繡陛花驚飄豔雪文梁風動委芳塵翰林才子山東李每進新詞䝉上喜當筵按罷謝天恩捧賜纒頭蜀都綺晚出銀臺酒未消侯家主第強相邀寶釵珠袖尊前賞占斷春風夜復朝回頭樂事浮雲改瘞玉薶香今幾載世間遺譜竟誰傳弟子猶憐一人在曽記霓裳學得成朝元隊裏藝初呈九天聲落干人聽丹鳳樓前月正明狹斜貴客迴車馬不信芳名在師下風塵一且禁城荒誰是花前聽歌者從此飄零出教坊逺辭京國客殊方閉門春盡無人問白髮青裙不理妝相逢為把雙蛾蹙水調梁州歌續續江南年少未曽聞原是當時供奉曲朝使今年海上歸繁華休說亂來非棃園散盡宫槐落天子愁多内宴稀始知懽樂生憂患恨殺韓休老無諫傷心不見昔人歌汾水秋風有飛鴈此日西園把一卮感時懷舊盡成悲含情欲為秋孃賦愧我才非杜牧之方隱君山園吳興城南山水勝竹樹參差萬家映幽深誰似隱君園車馬不來雞犬靜兩溪迴通柳港曲一峰立對柴門正東西别墅憐更好孤櫂往來隨晚興總令種菜不種桃新製長鑱木為柄家童頗解候天時鄰叟還能論地性交交林路翳復開活活野泉流不定清晨聞鳥欣獨往濃緑潑晴畦色淨老葉垂根孤蚓號殘英綴梗羣蠭競乍縈新蔓喜籬長欲迸晚芽嫌土硬此時采擷自足飽肯為食肝煩縣令古來名園悉可數金谷辟疆誇獨盛鑿石圓開弄月池買花深作行春徑愛妾宵陪秉燭宴狎朋晝接流觴詠長年懽樂豈知極回首芳菲屬他姓只今誰解問遺蹤斷甓摧垣無一剰乃知厚業要德守那得衰榮但言命君能勤儉遺子孫應有佳名書郡乘憶昨行寄吳中諸故人憶昨接交豪俠客意氣相傾無促戚十年離亂如不知日費黄金出游劇狐裘䝉茸欺北風霹靂應手鳴雕弓桓王墓下沙草白髣髴地似遼城東馬行雪中四蹄熱流影欲追飛隼滅歸來笑學曹景宗新擊黄獐飲其血皋橋泰孃雙翠蛾喚來尊前為我歌白日欲沒奈愁何迴潭水緑春始波此中夜游樂更多月出東山白雲裏照見船中笛聲起驚鷗飛過片片輕有似梅花落江水天峰最髙明日登手接飛鳥攀危藤龍門路黑不可上松風吹滅巖中燈衆客欲歸我不能更度前嶺縁崚嶒遠攜茗器下相候喜有白首楞伽僧館娃離宫已為寺香徑無人欲愁思醉題髙壁墨如鴉一半攲斜不成字夫差城南天下稀狂遊累日忘卻歸座中爭起勸我酒但道飲此無相違自從飄零各江海故舊如今幾人在荒煙落日野烏啼寂寞青山顔亦改須知少年樂事偏當飲豈得言無錢陳臥子云跌宕淋漓李舒章云神似太白洞庭山朝登西巖望太湖青天在水飛雲孤洞庭縹緲兩峰出正似碧海浮方壺嘗聞此山古靈壤蛇虎絶跡懽樵夫濤聲半夜恐魂夢石氣五月寒肌膚居人髣髴武陵客戶種橘柚收為租髙風欲起沙鳥避明月未出霜猨呼中有林屋仙所都銀房石室開金鋪羅浮峨嵋互通達别有路往非人塗靈威丈人亦仙子深入探得函中符𤣥衣使者不暇惜欲使出拯蒼生蘇後來好事多繼往石壁篆刻猶堪摹千年玉鼠化蝙蝠下撲炬火如飛烏𤣥關拒閉誰復到似怪衣上腥塵汚勿言神仙事怳惚靈蹟具在良非誣我生擾擾胡為乎坐見白髮生頭顱久欲尋真未能去局束世故縁妻孥何當臨湖借漁艇拍浪徑渡先雙鳬獨攀幽險不用扶身佩五嶽真形圖夜登天臺埽落葉自取薪水供丹爐此身願作仙家奴不知仙人肯許無答余新鄭前年吳門初解兵君别故國當西行有司臨門暮驅發道路風雨啼孩嬰倉皇不敢送出郭執手暫立懷憂驚我時雖幸脫鋒鏑亂後生事無堪營移家江上託他主閒園借得親鉏耕春朝起沐日照屋野卉雜發鳴鸝鶊思君萬里不可見對此涕淚如盆傾有壺當軒忍自酌有句在卷邀誰評走投北郭問消息一客為我言分明君初隨例詣闕下有㫖謫徙鍾離城齎無囊金從無僕棄家獨去何惸惸長淮黏天趣前渡牙眼怖客浮鼉鯨到州鞠躬謁太守脫去官籍儕編氓城荒無屋寓來客旋乞廢地誅蓬荆異鄉何人恤同患喜有楊子兼徐卿日髙破竈煙未起閉戶不絶哦詩聲去年聖恩念逐客特賜拂拭加朝纓勅君赴汴聽銓擢路算舊驛猶千程沙河無雨夏雲熱茆葦夾岸多蚊蟁舟中感癘得下瀉刃攪腸腹聞咿嚶荒塗無藥相救療伏枕兩旬幾殞生終藉神明佑吉士疾勢漸脫身強輕一官署作新鄭簿捧檄已去詢田更我雖歴歴聽客語虚實未察憂難平初春天子下明詔欲纂前史羅儒英菲才亦辱使者召辭謝不得來南京日斜出局訪君舍草滿陋巷春泥晴入門小女識父友延拜學訴艱難情且云父意念家逺新遣兩卒來相迎須臾出君寄我札上有秀句如瑰瓊自陳前事頗一一與客舊說無虧盈讀終呼卒問彼土卒言幾年經戰爭河山蕭條縣雖小民少姦詐多淳誠春秋古稱鄶子國溱洧水活魴魚赬雌兔咻咻草間走雄雉角角桑顛鳴谷深稀逢種田者時有射戶棲山棚霜天赤棗收幾斛剥食可當江南秔官來撫民務無事鞭挂壁上無敲搒寒廳吏散獨坐嘯逺對嵩少當檐楹聞之離抱頓舒豁如汲清露醒朝酲便因卒還寄君語此邑小鮮聊試烹幸逢昌朝勿自棄願更努力修嘉名吾皇親手擁髙篲灑埽六合氛塵清海中篚筐已入貢隴外戶版初來呈大開明堂議禮樂學士濟濟登蓬瀛太廟冬烝薦朱瑟千畞春耤垂青紘用材不肯略疎賤銖寸盡上天官衡況君磊落抱奇器不異一鶚秋空横豈容久屈簿領下天道始塞終當亨文章期君歸黼黻借問報政何時成京師苦寒北風忽發浮雲昏積隂慘慘愁乾坤龍蛇蟄泥獸入穴怪石凍裂生皴痕臨滄觀下飛雪滿横江渡口驚濤奔空山萬木盡立死未覺陽氣回深根茆檐老父坐無褐舉首但望開朝暾苦寒如此豈宜客嗟我嵗晚飄羇魂尋常在舍信可樂牀頭每有松醪存山中炭賤地爐煖兒女環坐忘卑尊鳥飛亦斷況來友十日不敢開衡門朅來京師每晨出強逐車馬朝天閽歸時顔色黯如土破屋暝作飢鳶蹲陌頭酒價雖苦貴一斗三百誰能論急呼取醉徑髙臥布被絮薄終難温卻思健兒戍西北千里積雪連崑崙河冰踏碎馬蹄熱夜斫堅壘收羌渾書生只解弄口頰無力可報朝廷恩不如早上乞身疏一蓑歸釣江南村張中丞廟延秋門上烏啼霜羯兒曉登天子牀江頭老臣淚暗滴萬乗西去闗山長公卿相率作降虜草間拜泣如羣羊當時不識顔平原豈復知有張睢陽孤城落日百戰後瘦馬食尾人裹瘡男兒竟為忠義死碧血滿地嗟誰藏賀蘭不斬上方劒英雄有恨何時忘千年海上見祠廟古苔叢木秋風荒摩挲畫壁塵網裏勇氣奕奕虬髥張巫歌大招客酹酒忠魂或能來故鄉青丘子歌青丘子臞而清本是五雲閣下之仙卿何年降謫在世間向人不道姓與名躡屩厭逺遊荷鉏懶躬耕有劒任羞澀有書任縱横不肯折腰為五斗米不肯掉舌下七十城但好覓詩句自吟自酬賡田間曳杖復帶索㫄人不識笑且輕謂是魯迂儒楚狂生青丘子聞之不介意吟聲出吻咿咿不絶鳴朝吟忘其飢暮吟散不平當其苦吟時兀兀如被酲頭髮不解櫛家事不及營兒啼不知憐客至不果迎不憂回也空不慕猗氏盈不慚被寛褐不羨垂華纓不問龍虎苦戰鬭不管烏兔忙奔傾向水際獨坐林中獨行斲元氣搜元精造化萬物難隱情冥茫八極遊心兵坐令無象作有聲微如破懸蝨壯若屠長鯨清同汲沆瀣險比排崢嶸靄靄晴雲披軋軋凍草萌髙攀天根探月窟犀照牛渚萬怪呈妙意俄同鬼神會佳景每與江山爭星虹助光氣煙露滋華英聽音諧韶樂咀味得太羮世間無物為我娛自出金石相轟鏗江邊茆屋風雨晴閉門睡足詩初成叩壺自髙歌不顧俗耳驚欲呼君山老父攜諸仙所弄之長笛和我此歌吹月明但愁歘忽波浪起鳥獸駭叫山揺崩天帝聞之怒下遣白鶴迎不容在世作狡獪復結飛佩還瑶京周青士云磊落嶔崟極其生動登陽山絶頂我登此山巔不知此山髙但覺羣山總在下坐撫其頂同兒曹又見太湖動我前洶涌三十萬頃煙波濤長風吹人度層嶂不用仙翁赤城杖峰迴秋礙海鶻飛日出夜聽天雞唱中有一泉長不枯乃是蜿蜒神物之所都老藤陰森洞府黑樹上不敢畱棲烏常年禱雨車來此投金符靈旗風轉白日晦馬鬛一滴霑三吳巖巒蒼蒼境多異樵子尋常不曽至探幽歴險未得歸忽聽鐘來澗西寺此時望青冥脫略塵世情白雲冉冉足下起如欲載我昇天行古來名賢總何有只有此山長不朽欲呼明月海上來照把長生一瓢酒浮丘醉枕肱洪崖笑開口秋風吹落浩歌聲地上行人盡回首吳中逢王才隨朝京使赴燕南歸江南草長蝴蝶飛白馬新自燕山歸燕山歸不堪說易水寒風薊門雪朝邸空隨使者車禁閽不受書生謁一杯勸君歌莫哀歸時應過黄金臺不見荒基秋來土花紫伯圖已歇昭王死千載無人延國士戎王追彘圖前騎脫兔奔後騎驚鴻急火燒秋草獵場空一彘窮追勢難及大小當戸左右賢衆中得雋知誰先君不見天策將真天子馳一馬殪四豕南園君不見平樂館古城何處寒雲滿君不見奉誠園荒臺無蹤秋草繁白日沈山水歸海寒暑頻催陵谷改皇天大運有推移富貴於人豈常在請看當年廣陵王雙旌六纛何輝光幸逢中國久多故一家割據誇雄強園中懽遊恐遲暮美人能歌客能賦車馬春風日日來楊花吹滿城南路疉石為山引泉為池辟疆舊園何足奇經營三十年欲令子孫永保之不知回首今幾時繁華掃地無復遺門掩愁鴟嘯風雨種菜老翁來作主空餘怪石臥池邊欲問興亡不能語春已去人不來一樹兩樹桃花開射堂踘圃俱青苔何須雍門琴但令對此便可哀人生不飲何為哉人生不飲何為哉夜聞謝太史誦李杜詩前歌蜀道難後歌偪窄行商聲激烈出破屋林鳥夜起鄰人驚我愁寂寞正欲眠聽此起坐心茫然髙歌隔舍與相和雙淚並落青燈前李供奉杜拾遺當時流落俱堪悲嚴公欲殺力士怒白首江海長憂飢二子髙才且如此君今與我將何為贈金華隱者我聞名山洞府三十六一一靈蹤紀真籙金華秀出向東南逺勝陽明與句曲樓臺縹緲開煙霞天帝賜與神仙家靈源有路不可入但見幾片流出雲中花子房之師赤松子三千年前亦居此飛行恍惚誰解尋漫說至今猶不死松花酒熟何處遊瑶草自緑春巖幽羣羊臥地散如石老鹿耕田馴似牛聞有隱君子乃是學仙者自從入山中不曾到山下世人莫知其姓名以山呼之不敢輕樵夫忽見苦未識只疑便是黄初平嗟我胡為在塵網逺望髙峰若天壤茯苓夜煑儻許餐鐵杖來敲石門響題黄大癡天池石壁圖黃大癡滑稽玩世人不知疑似阿母㫄再謫偷桃兒平生好飲復好畫醉後灑墨秋淋漓嘗為弟子李少翁貌得華山絶頂之天池乃知别有縮地術坐移勝景來書帷身騎黃鵠去來逺縞素飄落流塵緇潁川公子欣得之手持示我請賦詩我聞此中可度難玉枕祕記傳自青牛師池生碧蓮花千葉光陸離服食可騰化遊空駕雲螭奈何靈蹟久閟藏荒竹滿野啼猩貍尋真羽客不肯一相顧卻借釋子營茅茨我昔來遊早春時雪殘衆壑銷寒姿磴滑不敢騎馬上青鞵自策桃笻枝上有煙蘿披拂之翠壁下有沙石蕩漾之清漪晴天倒影落明鏡正似玉女曉沐髙鬟垂飲猨忽下藤裊裊浴鶴乍立風澌澌匡廬有池我未到未省與此誰當奇掃石坐其涯沿洄引流卮醉來自照影俯笑知為誰落梅撲香滿接䍦暮出東澗鐘鳴遲歸來城郭中復受塵土欺十年勝賞難再得恍若清夢一斷無由追朝來觀此圖惻愴使我悲當時同遊已少在我今未老形先疲人生擾擾嗟何為不達但為髙人嗤漢南已老司馬樹峴首已仆羊公碑唯應學道悟真訣不與陵谷同遷移仙巖洞府孰最好東有地肺西峨嵋髙厓鐵鎖不可攀援以逕上仰望白雲樓觀空峩巍此山易上何乃遺便與猨鶴秋相期欲借太乙舟夜臥浩蕩隨風吹洞簫呼起千古月照我白髮涼絲絲傾玉醪薦瑶芝招君來遊慎勿辭無為漫對圖畫日夕遥相思媯蜼子歌為友王常宗作蓋其號也媯蜼子乃是軒轅之裔虞鰥之孫混沌既死一萬年獨抱太樸存竊伏在草野冥心究皇墳早逢三光五嶽之氣乍分裂天狼下地䑛血流渾渾鹿走秦中原蛇鬬鄭國門俎豆棄草莽干戈歘崩奔媯蜼子便欲東游渡弱水沐髮滄海朝陽盆又欲西行泝河漢踰崑崙山橫川阻兩地俱不可以往兮歸來掩戶臥旦昏蒔黍一區注醪一樽妻給井臼兒牧雞豚不詰曲以媚俗不偃蹇而凌尊作為古文詞言髙氣醇温手提數寸管欲發義理根上探孔孟心下弔屈賈魂其質耀金石其芳吐蘭蓀叩虚答有響斲險成無痕陸珍雜水怪變狀弗可論幾年兀兀不肯出坐待真主應運九五開乾坤鶴書自天來幽隱初見拔使者逺造廬雞鳴起膏轄與纂金匱編尚書為給劄姦魂泣幽冢下恐遭誅殺書成一代進紫宸鸞旗羽衛夾陛陳閤門導謁稱小臣麻衣不脫拜聖人捧函近前殿龍顔喜回春勅賚内帑之金與綺段其文織作銀麒麟䝉恩乞還家以奉白髮親戴古弁垂長紳自號山澤之臞民媯蜼子幸際明良時無為寂黙坐老東海湄青丘有客鈍且癡與汝欲結同襟期左鼓清瑟右吹篪作歌共祝天子壽五風十雨萬國赤子同熙熙登金陵雨花臺望大江大江來從萬山中山勢盡與江流東鍾山如龍獨西上欲破巨浪乗長風江山相雄不相讓形勝爭誇天下壯秦皇空此瘞黄金佳氣蔥蔥至今王我懷鬱塞何由開酒酣走上城南臺坐覺蒼茫萬古意逺自荒煙落日之中來石頭城下濤聲怒武騎千羣誰敢渡黄旗入洛竟何祥鐵鎖横江未為固前三國後六朝草生宫闕何蕭蕭英雄來時務割據幾度戰血流寒潮我今幸逢聖人起南國禍亂初平事休息從今四海永為家不用長江限南北白下送錢判官岳白門有垂楊復有春酒香此地逢君誰乃是錢少陽相逢既沽白門酒相送還攀白門柳不向公車更上書卻趨官署初垂綬日落淮水頭送君去悠悠梁王苑裏花飛盡明日相思過汴州題滕用衡所藏山水圖滕君興在煙霞間逺遊十年今始還畫圖示我有層嶂竟似何處之名山君言我初適東越酒船横渡鏡湖月醉詠謫仙天姥吟海光欲曙清猨歇瑶草春已生便入金華行道逢牧羊兒疑是黃初平從此西遊楚江水大帆如雲挂空裏柁樓釃酒喚長風一日看山一千里不聞東林鐘但見香爐峰波迷洞庭濶樹隔瀟湘重白沙翠壁經過好就中幾度曽幽討麻姑壇上掃落花堯女祠前薦芳藻晚客湖南逢鴈回登臨長上楚王臺天從朱鳥峰頭轉江自黃牛峽外來蒐奇歴險今應倦黙坐舊遊空數遍時向明窗看此圖好山一一皆重見我聞君言自歎嗟身如處女愁離家閉門讀書無半車髀肉漸生空鬢華牀前塵土蔽雙屐何不踏之踐苔石幸逢盛世道路平五嶽尋真皆可適便當往抱緑綺彈松風行盡萬壑千巖中仙書探得金匱空歸來誇君重相逢握手一笑吳門東過胡博士郊居胡善筮頭白蘭陵客幽居共一村老來吟力退貧去告身存夕吹鳴棃葉秋泉注稻根時因來問筮獨叩樹間門送張司勲赴寶慶同知乍出司勲幕還乗别駕車按圗猶漢地輸布盡蠻家山熱蛇懸樹江晴鶴浴沙郡樓回首處北斗近京華贈鄰友同居一塢中只隔水西東林近書燈露溪迴酒舫通放鳬長合隊移竹每分叢只恐君徵起難期作兩翁江上寄王校書行寥落舊懽違江邊獨掩扉鄰家聞暮笛客舍試春衣宿鳥歸山亂行人渡水稀相思比花絮斜日繞城飛送謝恭涼風起江海萬樹盡秋聲揺落豈堪别躊躇空復情帆過京口渡砧響石頭城為客歸宜早髙堂白髮生晚登南岡望都邑宫闕落日登髙望帝畿龍蟠山下見龍飛雲霄雙闕開黄道煙樹三宫接翠微沙苑馬閒秋獵罷天街車鬭晚朝歸明朝欲獻昇平頌還逐仙班入瑣闈送沈左司從汪參政分省陜西汪由御史中丞出重臣分陜去臺端賓從威儀盡漢官四塞河山歸版籍百年父老見衣冠函關月落聽雞度華岳雲開立馬看知爾西行定回首如今江左是長安清明呈館中諸公新煙著柳禁垣斜杏酪分香俗共誇白下有山皆繞郭清明無客不思家卞侯墓上迷芳草盧女門前映落花喜得故人同待詔擬沽春酒醉京華春來客愁擬向春來減春到愁翻倍舊時走馬已無年少樂聽鶯空有故園思日光皛皛濃熏草風力颺颺緩墮絲霹靂溝南酒家路共誰來往問花枝謁甫里祠衣冠寂寞半塵絲想見江湖獨臥時遁跡虛煩明主詔感懷猶賦散人詩釣船魚去雲迷浦鬬鴨闌空草滿池芳藻一杯誰為奠鼓聲只到水神祠遷城南新居辛苦中年未有廬東西長寄一囊書未能避俗還依俗堪信移居更索居葉滿鄰園煙羃羃竹連僧舍雨疎疎何須許伯長安第此屋翛然已有餘逢倪徵士數千里外久相違十八灘頭偶獨歸自說病來辭幕府只因愁絶念庭闈吳歌重把還鄉酒蠻布猶穿過嶺衣話盡三年遊歴事滿庭風雨送斜暉西塢空山啄木聲敲鏗花落水流縱復横松風吹壁鶴翎墮梅雨過溪魚子生尚有人家機杼逺更無塵土衣裳輕斜陽已沒月未出樵子歸時吾獨行送錢塘守繁華莫歎異昇平到郡初煩露冕行幕下吏書催署字湖中妓舫歇歌聲潮來兩渡皆侵岸日落諸山半入城休沐南屛煩一到松間尋我舊題名寄海昌李使君海上波濤夜不驚使君雖老尚能兵荒煙白鹵家家竈落日黄岡處處營人雜島夷爭小市潮隨山雨入孤城明朝硤石山頭路我欲停車聽頌聲次韻金文學送弟往海上小陸賢如大陸賢亂離為客最堪憐横金海上知虚席打鼓津頭看發船麥氣曉晴田雉鬬蘹香春暖野鵝眠明朝夢斷生芳草風雨孤舟過練川西寺晚歸逺寺别僧歸隨鐘出煙嶺犬吠竹林間斜陽見人影陶祕書廣陵送别圖暮雨潮生𤓰步春山樹繞蕪城惆悵離舟欲發江南煙寺鐘聲聞舊教坊人歌渭城歌罷獨凄然不及新聲世共憐今日岐王賓客盡江南誰識李龜年秋柳欲挽長條已不堪都門無復舊毿毿此時愁殺桓司馬暮雨秋風滿漢南秋夜同周著作宿婁浦小廨寒依竹浦雲酒闌相對說離羣一聲新鴈誰先聽今夜江南我共君春思愁兼楊柳一絲絲客舍江南暮雨時自入春來才思減杏花開過不題詩入郭過南湖望報恩浮圖雨過春陂柳浪香布帆歸緩怕斜陽漁人為指江城近一塔船頭看漸長山中春曉聽鳥聲子規啼罷百舌鳴東窗臥聽無數聲山空人靜響更切月落杏花天未明逢吳秀才復送歸江上江上停舟問客蹤亂前相别亂餘逢暫時握手還分手暮雨南陵水寺鐘吳宫芙蓉水殿屧廊東白苧秋來不耐風教得君王長夜醉月明歌舞在舟中詩話季迪楚宫詞云細腰無限空相妒不覺瑶姬夢裏逢秦宫詞云掖庭無用恩難報願上蓬萊采藥船魏宫詞云至尊莫信陳王賦那得人間有洛神思非不深第傷於巧不若吳宫之近雅也雨中登天界西閣青山樓閣楚江東自在蒼茫晚色中故國自遥難望見不關春樹雨溟濛送葛省郎東歸金陵女兒踏春陽金陵客子正思鄉一杯況復送君去目斷飛花江水長宿蟾公房一禽不鳴深樹煙明月下照髙僧禪獨開西閣詠清夜秋河欲墮山蒼然雨中過山春雲晻靄澗奔渾風雨行人過一村不似山家深竹裏乳鳩啼午未開門吳王井曽聞鑑影照宫娃玉手牽絲帶露華今日空山僧自汲一缾寒供佛前花消夏灣涼生白苧水浮空湖上曽開避暑宫清簟疎簾人去後漁舟占盡柳隂風明詩綜卷九
