body:
  text: 明詩綜卷三十二翰林院檢討朱彛尊編許讚一首讚字廷美靈寶人𢎞治丙辰進士纍官少傅兼太子太傅吏部尚書文淵閣大學士贈少師諡文簡有松皋集感遇主人凌晨起灑掃坐當楹屋東有茂樹其上鴟梟鳴主人心所惡倣徨巡簷行亟命伐此樹庶幾逺惡聲僕言梟可射樹伐難再榮毋以小失大事當論重輕劉麟一首麟字元瑞本安仁人先世以武功襲南京廣洋衛副千戶遂家焉中𢎞治丙辰進士除刑部主事歷員外郎中出知紹興府削籍徙居湖州起知西安府擢雲南按察使謝病歸尋起太僕寺卿遷副都御史巡撫直隸復引疾再起大理寺卿改刑部右侍郎升工部尚書卒諡清惠有南坦老人集王元美云元瑞詩如癡女兒能織鴛鴦自謂藝絶改繡鳳皇更無此鳥可以發笑靜志居詩話尚書由二千石登三九之列數棄官以去好為山水之遊流寓長興之南坦自號坦上翁與孫山人一元龍僉事霓及苕中名士吳珫施侃等結詩酒社號苕溪五隱年八十餘被褐坐小舟赴峴山會人不知為巨公也嘗請浚川預作墓銘可云逹天知命者矣顧華玉贈詩云琴鶴居何定蓴鱸味獨偏王履吉寄詩云鸞鶴諧真賞瑶華贈逺人孫太初詩云閉門句好杳殘後搗藥聲髙月上初其風流可想見也南坦讀書臺盡洗侵輿竹來聽轉壑泉萬花齊映谷五栁欲飛綿弱子將迎婦鄰翁許借錢讀書臺下雨種玉比藍田陶諧一首諸字世和會稽人𢎞治丙辰進士纍官兵部左侍郎贈尚書諡莊敏有南川漫遊稿詩話南川詩未知津數與空同酬唱吾服其膽晚宿峽石迢遞羣山合逶迤一徑通半村無夕照空谷自天風轍亂㟏岈上年衰道路中客懷增闃寂新月翳疏桐劉玉十二首玉字咸栗萬安人𢎞治丙辰進士除知輝縣入為御史歷南京左僉都御史董江防後至刑部左侍郎有執齋集楊用修云公古詩歌行妥帖排奡入古作者之室五七律雖唐人何多讓焉詩話康陵南巡將臨靳文僖喪詞臣撰祭文均不稱旨御製文云朕居東宫先生為傅朕登大寶先生為輔朕今南遊先生巳矣嗚呼哀哉當時代言之臣咸斂手歎息嘉靖中王新建沒執齋侍郎作祭文云嗚呼公之才拔乎其萃嗚呼公之學出乎其類嗚呼公之功疇克似之嗚呼公之夀竟止于斯亦可謂言簡而意盡矣執齋當宸濠之變正理江防馳檄師中與喬莊簡犄角克固疆圉其功有足録者詩頗娟秀絶塵比于莊簡似過之夜坐暝色閟琴書開軒對明月微雨卷薄雲疏星粲成列孤蹤棲鳥定羣響蟲聲歇緬懷塵外人髙枕宵鐘徹祕獄牆隙風來無蹤翻書卷衣袂使我燈焰閃爍如青蟲嗟風伯來何從清明明庶成化工乾坤大噫土囊小胡為牆隙如吹筒嗟嗟風伯省厥躬百舌百舌鳥何佻巧啼遍上林音裊裊雌鳩喚雨雄鳩晴鷓鴣欲住鵑欲行一鳥一舌尚難定爾有百舌能無爭人生言出慮禍入一言之失駟不及三寸舌在中禍機唶爾百舌無是非志怪紀嵗丁丙戌夏四月草六靖浪之民家黃牸身孕犢一項而二首各具口耳目五月十四日丙申金壇農婦生怪人頭方四角靣青而六眼髙額凹鼻獠牙鳥喙如山精手足一節具一爪墮地鬼叫連三聲歘然起走擊乃斃創見此怪吁可驚七月望仍丙申日異牛又産南陽邑二首相同項亦分心肺雖分身尾一聞之嗟嗟稽占書無乃世降生形殊反身修德天可格祥桑枯死安無虞石鍾山歌石鍾山何髙哉雙巖競秀江之隈初疑端人秉笏立朝署又疑靜女把鏡臨妝臺長江萬里如奔馬彭蠡淵泓匯其下乾坤陶冶質本虛波濤撞擊聲非假春風浩蕩秋月明蛟龍鼓舞鯨鼉鳴或如巨鏞震東序或如棧劇和琴笙水石相搏豈人力石鍾千古留佳名山僧叩石誇竒絶南音含胡北清越山川靈異石偶同至理寧容三寸舌我來訪古將誰從酈元李渤東坡翁枕流洗耳了無得倚闌目送雙飛鴻忽憶髙皇此停蹕龍旗一掃羣凶畢鐘乎鐘乎爾善鳴為豫汛掃磨崖石聞甘肅有警寄榕溪公驛吏傳邉報羌人犯肅州極知兵士苦誰解聖明憂調集晨分竈供輸夜唱籌早期青海靖定逺舊封侯寄咸肅兄江頭日日候歸船南北東西路幾千旅館夢回常徹夜故園書去動經年愁連郢樹雲初合思入湘潭月又員莫道少年堪久别髙堂華鬢亦蕭然越王臺章澻江流去不回江邉今有越王臺年深往事憑誰問春盡野花空自開落日每隨孤鳥沒好風時送片帆來登臨却喜青山在猶勝阿房化劫灰顔瓌墓顔公沛令廬陵人也建文末死社稷安危隻手支綱常輕重此心知未驅玄武門前騎巳拔丹陽鎮上旗千古夷齊真義士百年忠孝有佳兒荒墳偏灑行人淚泗水東流無盡時蓮花澱平堤一望盡湖光橋北橋南路短長漁父水中圍曲箔行人氷上引拖牀送行日日都門送别離道傍楊栁巳無枝西飛白日東流水不放行人住少時懷歸鑑湖之水清且漣中有二頃桑麻田故人有約不歸去老却黃花又一年黃衷三首衷字子和南海人𢎞治丙辰進士歷官兵部右侍郎有矩洲集鍾仲實云矩洲歷官所至皆有題咏晚年謝事丘皋寄興不倦其詩整而俊婉而有則宏博而不肆詩話矩洲詩無根核興到筆酣間與曩篇暗合若野練晴飛孤嶼白木棉春試小枝紅白酒河橋花底社黃螺沙市蛋家兒處處短垣圍牡蠣家家生計種扶留鳥際忽開衡嶽寺林端恰下灌江船桐木歸來津口渡楊花飛過驛南樓狀南中風景歷歷在目益陽紀事潭州楚南郡獷黠俗易敝伊昔炎宋時控禦恆署帥惟我神聖朝綏靖亦數世去年五百洞椎牛立赤幟居氓棄業走行旅盡心悸俄聞益陽菁倡亂渠首二敢叛假息恩遂揭怒車臂豈緣科率煩厥咎在長吏我時移鎮來集議詢根蒂米聚山川形陳列犄角勢團夫里抽壯甲長家舉義風霆驅號令狼兕各殲殪鷙猛安可常覆轍戒前事慎爾血氣軀毋使腰首棄萬縣川東十數州此地事征榷鹺販浮大航蠻賨日交錯算緡及銖釐刺穎倒囊橐追惟作法誰主者及倅幕先王御盛世賦稅且云薄未造計舟車諒非明哲作刀錐將盡爭何以救民瘼厲禁如可除商旅永和樂雨自從人日雨漠漠浹旬連漸緑磯頭草仍迷夏口船雷聲喧浦近農事憫時先楊栁東門色春寒幾度眠湯沐一首沐字新之江隂人𢎞治丙辰進士除崇德知縣入為御史纍官大理寺卿有廷尉集秋日寫懷黃菊秋來已滿籬青山于我久相期孤燈對酒不成醉逺道逢秋更覺悲祗恐病侵垂老日不妨貧過未官時沅湘欲趂東歸棹竹杖芒鞋任所之陳霽一首霽字子宇吳縣人𢎞治丙辰進士改庶吉士授編修忤劉瑾勒致仕瑾誅復館職歷國子監祭酒有玉堂成均歸田諸稿燬于火僅存葦川集藏于家詩話祭酒古之遺直為史官時靣責劉瑾謂古者刑不上大夫大廷非行杖之所且言劉公健謝公遷皆顧命大臣君無故一旦去之恐非所以保貴富之道瑾對以廷杖正統年有之公曰此姦邪王振所為爾瑾爭曰王振死士木之難忠臣非姦邪公作色曰此賊幾覆社稷何忠之有瑾曰編修借王振罵我邪銜之欲置公死地以丁母憂僅免其後又劾江彬幾為彬所陷歸田淡退尤人所難詩草被焚從其裔孫録手稿一首過楊二郊居白石芳郊路清溪舊竹扉橋通湖水近樹入隴雲微蘋葉漂波冷鱸魚上釣肥村醪沽不逺落景未言歸熊卓三首卓字士選豐城人𢎞治丙辰進士授平湖知縣徴拜監察御史有熊御史選王元美云熊士選如寒蟬乍鳴疏林早秋非不清楚恨乏他致唐顧玄言云侍御才華警拔一句一字酷尚初巳得王楊風采特少深致清穆敬甫云熊詩如西子解顔萬夫婉孌黃甫云卓詩所存最少不過四十篇出自北地所刪殆無遺珠矣而不足以振然其短調楚楚亦自清發詩話張光世集為康德涵所定熊士選詩為李獻吉所刪兩君俱有才名不應牽率若是疑所汰者金而所存者沙矣送王衍之還陜和廷實韻擾擾郊門道沙寒驛路微煙花行客晚京洛故人稀野岫孤雲沒春山獨鳥歸秦川隱關塞一望一沾衣出居庸沙上望行人日暮愁心絶江南四時春邉地五月雪送客城南楊栁河橋外春風倒玉壺離情不可道江路滿蘼蕪趙鶴二首鶴字叔鳴江都人𢎞治丙辰進士歷官山東提學副使有具區集顧華玉云叔鳴詩恥凡語于古愛謝靈運于唐愛孟郊于元愛劉因嘗曰此道不宜淺淺則庸冗下矣其登泰山金焦諸篇言言自作更不隨人真凌駕千古膽也詩話李獻吉登岱詩日抱扶桑躍天橫碣石來宗子相稱之謂有芥視岱宗斗量滄海之致若叔明山壓星辰從下看海浮天地自東回亦警句也登岱一上遙岑萬丈蒼天風應為襲衣裳雞鳴往往看初日人語時時到下方雲暗鐘聲連海樹春浮花氣入山堂扶藜不淺登遊興祗怪輿丁喚客忙蓬萊閣觀海蓬萊髙閣晚涼開倦客乘涼坐未回不住鳥聲衝雨過有時龍起帶潮來愁雲尚識田橫島仙月還虛漢武臺回首夕陽瀛海上一尊懷古獨徘徊汪循一首循字進之休寧人𢎞治丙辰進士官順天府通判有仁峯文集老去老去心還競春來花又新未應行樂地偏愜少年人戴銑二首銑字寶之婺源人𢎞治丙辰進士官南給事中以論劉瑾削籍贈光祿少卿武城晚眺野曠蒼煙合城昏白日斜羃隄千樹栁負郭萬人家小舫明漁火髙樓隱暮笳寂寥江上立羇思滿天涯經古鄚州城勢尚蜿蜒風光異昔年民垣官舍瓦兔穴戰場田古樹無秋色殘碑有暮煙興衰亦常理臨眺却淒然朱諫八首諫字君佐永嘉人𢎞治丙辰進士歷官贑州知府調吉安謝病歸有蕩南集俞汝成云君佐詩多自得之趣不規規于聲調格律詩話蕩南近體足自名家清明日泊揚子江楊栁夾江青東風潮正平雲間旋蜃市沙際聽鼉更萬水俱東逝孤舟更北征不知時序改今日是清明入清河栁葉初凝緑桃花正滿林河流移故道海色變層隂午夜一帆月征人萬里心風沙吹欲老短髮不勝簪寓江心寺孤嶼清秋夜星河萬里查江山如有約雲水暫為家白髮隨鷗鳥輕舟采石華秋風動歸思淅瀝響蒹葭冬日奚蘭室老友見訪喜而有作江村寒月客來稀坐對梅花半掩扉燈火最憐清夜話溪山偏愛舊人歸酒樽欲盡還堪瀉世路無情巳息機相見不須悲白髮山林鍾鼎總成非章孝夫鴈麓山莊隂隂竹樹繞山根石徑雲深蕩北村無數落花浮水靣盡隨鷗鳥到柴門鈎簾靜對千峰月種藥新開五畞園長日南窗事髙卧謾將風景説桃源瑶川新漲同魏海南泛舟草暖風和二月天江南蝦菜不論錢前溪昨夜添新漲一葉中流范蠡船夜坐金爐火盡不聞香銀燭無光春夜長想見落花千萬朵盡隨風雨下池塘寄曽良用幾度南樓坐夕曛十年消息隔江雲歸來又向江頭别只見梅花不見君黃相一首相字弼甫莆田人𢎞治丙辰進士有一溪集槿樹花歌日出花始開日沒花巳落明日花開笑落花不知向暮還如昨人間勢利自有時田竇相傾徒爾為獨不見東陵瓜逹人守法奚咨嗟子如不我信聽歌槿樹花唐錦一首錦字士絅上海人𢎞治丙辰進士除知東明縣入為兵科給事中歷江西提學副使有龍江集近山卜得幽居傍翠屏澗泉偏愛枕邉聽曉來嵐氣衝簾入濕透牀頭相鶴經唐寅九首寅字伯虎一字子畏吳縣人𢎞治戊午舉南京鄉試第一坐事下獄放歸有六如居士集顧華玉云伯虎棄落之餘益任放誕殉節體物託興歌謡罔避俳文務諧里耳雖作者不尚其辭君子可以觀其度矣性祝希哲云子畏詩初喜穠麗臨仿白氏務逹情佳者多與古合袁永之云子畏築室桃花塢中讀書灌園家無儋石而客常滿坐風流文采照映江左謂人生貴適志何用劌心鏤骨以空言自苦故其著述多不經深思語殊俚淺王元美云唐伯虎如乞兒唱蓮花落其少時亦復玉樓金埒詩話六如淪落明時恆賣畫為活故其詩云領解皇都第一名猖披歸卧舊茅衡立錐莫笑無餘地萬里江山筆下生又云青衫白髮老癡頑筆硯生涯苦食艱湖上水田人不要誰來買我畫中山誦之悽然足以悲矣然于畫頗自矜貴不茍作而詩則縱筆疾書都不經意以此任逹幾于遊戲此袁永之輯其集僅存少年之作實末足以盡其長余於集外從畫卷録其留題絶句八首饒有風致未至如乞兒唱蓮花落也驄馬驅悠悠驄馬驅道阻嵗云晚豈無同袍士念子不能飯木落辭故枝去家日以逺鳴雞戒前塗夕暝猶䇿蹇筋力巳非舊淚下不可卷題雲山煙樹圖雲山煙樹靄蒼茫漁唱菱歌互短長燈火一村雞犬靜越來溪北近橫塘贈感慈鄒先生畫騎驢八月下藍關借宿南州白塔灣壁上殘燈千里夢月中飛葉四更山呈何先生畫青雲閣榭泉聲隔黃葉關河鴈影來别有詩人好懷抱西風雙鬢一登臺曉起圖獨立茅門懶拄筇鬢絲涼拂豆花風曙鴉無數盤旋處緑樹枝頭一線紅野寺野寺空林落照低微鐘煙樹使人迷逢僧只道山門近不覺穿雲又過溪雪景重重樓閣凍雲連煙樹蒼茫帶瀑泉一夜空山千丈雪草玄人在玉壺天墨菊故園三徑吐幽叢一夜玄霜墮碧空多少天涯未歸客借人籬落看秋風題畫日長深閉竹廬眠席下猶餘紙裹錢檢點雞棲牢縛草夜來有虎飲山泉劉龍一首龍字舜卿襄垣人𢎞治已未賜進士第三纍官南京吏部尚書贈太子太保諡文安有紫巖集送謝同年邦用之湖廣僉憲曲江花底記同遊十五年來鬢欲秋楚國旌旄新寵渥謝家人物舊風流君山雨霽簪螺髻漢水春深漲鴨頭樽酒巳空山巳夕微茫煙樹隔仙舟林廷㭿一首廷㭿字利瞻閩縣人𢎞治已未進士歷官太子太保工部尚書贈少保諡康􅐧有小泉稿江南曲鳥鳴花樹繁春滿江南道不見花下人但坐原頭草蔣瑶一首瑶字粹卿歸安人𢎞治巳未進士由御史出知荆揚二府纍官工部尚書加太子少保卒諡恭靖詩話康陵南巡近侍希帝意旨欲刷民間女子恭靖公知揚州府事語江彬等曰揚州女子少多受聘不便奪之無已則知府一女在得旨斯進耳乃罷時山隂汪清憲先生知泗州中使傳旨令進美人善歌吹者先生奏言泗州婦人荒陋無可應敕臣向民間訪桑婦儻納之宫中俾受蠶事庶于治化有禆事亦得寢二公強直頗相類而康陵未嘗震怒亦足見帝德之寬大矣相傳駕旋時恭靖為彬等繫于舟中三日不食驅今送駕所騎馬受奪止攜一被墊驢背夜則寢焉抵臨清徒跣行岸上康陵遙望見之曰是蔣知府邪可速遣還方得免維揚人感之入髓春秋尸祝至今恭靖以宫保尚書豫告林居者二十年入峴山社詩不多作惟秋社一律僅存丙午秋社和我齋半溪聨句韻湖上間居繫逺心羣公蘭楫幾回臨衣冠聚處多鄉里存沒筵前換古今野寺浮橋煙樹暝斷碑斜日蘚苔侵從教津鼓催歸數且倚窪樽亭柱吟孫緒一首緒字誠甫故城人𢎞治已未進士歷官太僕寺卿有沙溪集李時逺云沙溪瀛洲才子所作清新典麗足以名世詩話沙溪無用間談足資國史之采擇詩不見佳居庸關官舍一徑中開萬里橫居民無地問農耕霜催木葉晚山赤雨溜石苔秋水清沙鳥逺從天外度寒蛩苦愛夜深鳴峯巒徙倚休回首何處孤雲是故城王守仁十首守仁幼名雲生字伯安餘姚人𢎞治己未進士授刑部主事改兵部坐救戴銑忤劉瑾杖闕下謫貴州龍場驛丞旋復南京刑部主事改吏部歷員外郎中遷南太僕少卿轉鴻臚寺卿拜左僉都御史巡撫南贑升右副都御史論平宸濠功擢南兵部尚書封新建伯卒贈侯諡文成從祀孔子廟庭有陽明先生集王元美云伯安詩少年有意求工而為才所使不能深造而衷于法晚年歸于道學尚為少年意象所牽不能渾融而出于自然自負若兩得而吾以為幾于兩墮也又云王伯安如長爪梵志彼法中錚錚動人穆敬甫云王公功業學術振耀千古固不必論其詩而詩亦秀拔不可掩其殆兼舉哉又云王詩如披雲對月清輝自流優顧玄言云先生經國大手博學通逹詩非所然有幽思逸致陳卧子云文成才情振拔少年頗擅風雅自講學後多作學究語遂不堪多録詩話新建勳業氣節文章皆可甲世特多講學一事讒言惟興彛尊少聞先君子之言矣心齊顔子之學也良知不動心孟子之學也大學思復戴鄭之舊定論冀息鵝鹿之爭仁智之見各殊楊墨之歸斯受其後流而為禪者門弟子之過也今就先生之詩觀之其過濂溪祠云瞻依多少髙山意曽向圖中識面真讀易詩云乃知先天翁畫畫有至教題武彛壁云溪流九曲初諳路精舍千年始及門示程畢二子云紫陽山下多豪俊應有吟風弄月人則先生何嘗立意樹幟張弧與洛閩諸儒異乎乃訾訾之口以先生學術未純并先生大節疑焉皎皎素絲欲染為緇彼譖人者亦太甚矣山石山石猶有理山木猶有枝人生非木石别久寧無思愁來步前庭仰視行雲馳行雲隨長風飄飄去何之行雲有時定遊子無還期有生豈不苦逝者長若斯已矣復何事商山行采芝諸生人生多離别佳會難再遇如何百里來三宿便辭去有琴不肯彈有酒不肯御逺陟見深情寧豫有弗顧洞雲還自棲溪月誰同步不念南寺時寒江雪將暮不記西園日桃花夾川路相去倐幾月秋風落髙樹富貴猶塵沙浮名亦飛絮嗟我二三子吾道有真趣胡不攜書來茆堂好同住寄友用韻懷人坐深夜帷燈曖幽光耿耿積煩緒忽忽如有忘玄景逝不處朱炎化微涼相彼谷中葛重隂殞衰黃感此客遊久經年未還鄉伊人不在目絲竹徒滿堂雲深雁書杳夢短關塞長情好矢無斁願言覬終償惠我金石編徽音激宫商馳輝不可即式爾增豫傷馨香襲肝膂聊用中心藏别湛甘泉行子朝欲發驅車不得留驅車下長坂顧見城東樓逺别情已慘况此艱難秋分手訣河梁涕下不可收車行望漸杳飛埃越層丘遲回岐路側孰知我心憂古道古道當長坂肩輿入暮天蒼茫聞驛鼓冷落見炊煙凍燭寒無焰泥爐濕未然正思江檻外間却釣魚船興隆衛書壁山城髙下見樓臺野戍參差暮角催貴竹路從峰頂入夜郎人自日邉來鶯花夾道驚春老雉堞連雲向晚開尺素屢題還屢擲衡南那有鴈飛回元夕去年今日卧燕臺銅鼓中宵殷地雷月傍苑樓燈彩淡風傳閣道馬蹄回炎荒萬里頻回首羌笛三更謾自哀尚憶先朝多樂事孝皇曽為兩宫開龍潭夜坐何處花香入夜清石林茅屋隔溪聲幽人月出每孤往棲鳥山空時一鳴草露不辭芒屨濕松風偏與葛衣輕臨流欲寫猗蘭意江北江南無限情寄浮峰詩社晚涼庭院坐新秋微月初生月滿樓千里故人誰命駕百年多病有孤舟風霜草木驚時態砧杵關河動逺愁飲水曲肱吾自樂茅堂今在越溪頭山中示諸生桃源在何處西峯最深處不用問漁人沿溪踏花去周倫一首倫字伯明崑明人𢎞治己未進士纍官刑部尚書贈太子少傅諡康僖有集雨霽登馬鞍山春暮日始霽尋幽憩山牀洞壑石衣冷幡幢松雨香悠然倚雲閣極目塵沙場張琦七首琦字君玉鄞縣人𢎞治己未進士除南大理評事歷寺正升興化知府歷福建左參政致仕有白齋竹里館二集王元美云張君玉如夜蛙鳴露自極聲致然不脫淤泥中李杲堂云先生詩吐咀山川驅使雲鳥草木與一時詞人絶不同詩話白齋于李何詩教盛時别出機杼敷以宋人為師句如人到闕年一過客吾當十日九揮毫千村土犬月照雨半夜江魚潮入田天上星辰離舊次夢中山水作真遊離歌對酒無三疊殘暑先秋退一分十里長亭留短樹滿天晴日落黃沙濕螢焰竹火依火疲馬出郊山復山路入林低潮裹樹山行月黑虎窺人殘年滯雪開新嵗五日敲氷過一州古剎今僧相見少新篁舊竹長來齊水邉地冷苔生髮山外民貧竹有花入之誠齋安晚集中猶上駟也弇州方之夜蛙鳴露説者以為過而白齋出郭詩云一部新詩一部蛙則作者先以自喻矣遊長山偶偕羣從遊騎馬秋山冷笑語應谷聲揚鞭亂江影入山尚未深而有山棲境紅子落長藤蒼苔覆眢井短棘刺我衣朔風吹我領飢腹覔蕨根健步出松頂樵人四五家炊煙忽生暝問樵何處山云是丹霞嶺黽勉越崇岡豁然見髙景飛鳥蕩胸至浮雲暗生脛陟髙原自平可以發深省黃昏步溪上見煙月可愛明月在天煙在溪煙中看月無光輝沙禽熟眠潮未響野火歷亂船初歸天邉楊栁誰家樹煙月相含不知數此時幽景記不真莫是江南夢歸路次夜又步溪上月夜不減昨夜好秋霽家家夜飯早蔓青芋子白酒香土門竹舍黃花老農談悠悠靜可聽皆説官家今太平斗斛上倉不過槩差船點馬無兼丁翁哺弱孫婦抱子依依相對桑麻裏我願明月常此光不照離愁照歡喜秋晚登君山十年兩醉君山酒山下民風似昔年青帕茜裙耰麥女銀鱸紫蟹入村船霜焦葉破猶藏寺江浦沙髙未作田病骨登臨尚強健坐聽湘瑟㺯湘煙梨園教曲圖梨花千樹雨初收上苑春風吹未休新製樂章音調澀敕教依舊唱伊州合和驛南望彌望皆白土當時戰血有餘腥白土經年草不青留得遺民幾家在夕陽村裏掘蕪菁溪家紫絮茅花飛入門淺溪幽響出籬根溪家老婦間無事落日呼歸白鼻豚都穆一首穆字元敬吳縣人𢎞治己未進士授工部主事歷禮部郎中乞休加太僕少卿致仕有南濠詩略顧華玉云少卿文簡古有法詩雖故爾沖泊竟非俗韻胡孝思云元敬詩宗陶孟詩話祝希哲九朝野紀徐昌榖剪勝野聞往往紀載非實惟都少卿南濠文跋西使記金薤琳琅聽雨紀談事必稽核蓋篤學之士也相傳吳中有娶婦者夜大風雨滅燭遍乞火無應者衆皆曰南濠都少卿家當有讀書燈在叩其門果得火齋居乏食笑曰天壤間當不令都生餒死先民風節如是詩無足録存豹一斑吳江竹枝詞雙櫓船無比輕耳邉惟聽踏車聲龍王堂下風波惡誰似儂心耐得驚張鳳翔一首鳳翔字光世洵陽人𢎞治己未進士除戶部主事移病歸卒年三十有伎陵集詩話伎陵集洵無足録蒙叟誚獻吉黨護作傳然其集本獻吉評點初不假借不以為近俳即以為太實或譏其篇章雖多事重意復或評其藴蓄有餘變化未至惟卷未數篇云流動工緻所謂吾見其進也是無異師之視弟子若其文有擬彭澤士夫送陶潛解任歸序詆之曰此篇疑未覩歸去來辭而作則侮人太甚矣蒙叟黨護之論殊不其然宫詞社燕花梢翠尾分玉樓斜度語朝曛卷簾忽趁東風入誤落芹泥濕鳳裙謝廷柱六首廷柱字邦用長樂人𢎞治己未進士除大理評事歷官湖廣按察僉事有雙湖集詩話邦用詩如犀塵在握淨掃遊塵水亭夜坐今夜月上遲前夜月上早有月景固佳誰識無月好天髙衆星明涼意在庭草風輕螢照樹夜定魚在藻毛髮動蕭爽塵襟滌煩懆時序倐將代浮生嗟易老北鴈今已南遊子在逺道昨夢江田村石林淨如掃獨坐望海亭把酒看雙島茶園市伍家候大巡微風散輕隂日色在雲裏出郭天氣佳遊衍心自喜肩輿歷青原瀰瀰見溪水農家住林藪前山若屏几因話田與桑欣然憶鄉里九月六日早發新化出郭問前路度溪望千峰曉雨送薄寒碧嶂回秋容人言秋思悲我愛山色濃歸興儻如此宦情渾已慵故園黃菊花正及茱萸鍾佳節不負人江海愧浮蹤過彭澤縣挂帆過匡廬檥舟向江縣彭澤舊知名淵明今不見巖松露沾蓋堤栁風拂靣雖非當時物過客生愛戀公如素玉姿不以緇涅變又如瑶臺鶴凡鳥亦知羡我欲賦弔詞清詩公所擅我欲酹一觴薄酒不堪薦漲澤曉乘舟秋濤夜馳傳區區葵藿心瑣瑣芹曝善因公懷昨非歸里今得便夜泊石門斜陽皂林驛暗月石門橋雨暴桑難葉煙村栁未條客懷空耿耿春事竟寥寥今夜舟中夢閩山翠欲漂宿永峰不果踰十里改宿桐林數程過百里天色已黃昏客問溪頭館農歸樹裏村雞豚各籬落煙火幾柴門乘夜求安枕桐林更上原明詩綜卷三十二
