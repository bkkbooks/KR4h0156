body:
  text: 明詩綜卷四十四翰林院檢討朱彞尊編姚淶一首淶字維東慈谿人嘉靖癸未賜進士第一歴官翰林院侍講學士有明山存稾静志居詩話文徴仲待詔翰林相傳為學士及楊方城所窘昌言於衆曰吾衙門非畫院乃容畵匠處此何元朗叢説述之而曰二人只㑹中状元更無餘物衡山長在天地間今世豈更有道著姚淶楊維聰者邪聞者以為快心之論然學士嘗與孫太初薛君采髙子業相唱和且聞山東李中麓冨於藏書特遣其子就學即㣲仲去官日躬送至張家灣賦十詩送别比之巍巍嵩華至其贈行序略云自唐承隋敝設科第以籠天下士爵禄予奪足以低昻其人於是天下風靡士無可稱之節者幾八百餘年然猶幸而有獨行之士時出其間以抗於世而天下之人亦罔不髙之求之唐則元魯山於宋得孫明復二子豈有髙第顯位為可誇哉徒以其矯世不湼之操好古自信之志足以風勵天下而一時名流皆樂為之稱譽焉耳今之世如二子者誠難其人吾於衡山先生竊以二子比之而衡山之所造則又有出於二子之所未純者先生明經術以為根本采詩賦以為英華秉道誼以為壇宇立風節以為藩垣蓋嘗聞之却吏民之賻以崇孝也麾寧藩之聘以保忠也絶猗頓之遊以勵廉也謝金張之饋以敦介也不懾於台鼎之議以遂其剛毅也不慁於輶軒之招以植其堅貞也此數者足以當君子之風而先生未始以為異也聲震江表流聞於天子之庭先生亦烏得而逃哉曩者先生之貢於春官也朝廷録其賢㧞而官之翰苑儒者共指以為榮而先生不色喜官僅三載年僅五十餘先生遽以南歸為念吾每謬言留之而先生持益堅三疏乞歸竟得請以去先生其有悟於達人之指邪嗟夫先生嘗試於郷矣有司以失先生為恥而先生之名益髙嘗官於朝矣銓曹以不能留先生為恨而先生之節益重榮出於科目之外貴加乎爵禄之上罻羅之所不能取縶維之所不能縻樊籠之所不能收彈射之所不能驚翩然髙翔如鳯皇之過疏圃飲湍瀨回䝉汜下視泰山之䲭啄腐䑕以相嚇者何不侔之甚也傳所謂難進而昜退昜禄而難畜者其先生之徒與自大道既漓好惡立於一鄉而不可達於天下之廣毁譽徇於一時而不可合於萬世之公故吾之論先生直以魯山明復為喻而使世之觀先生者不當以三吳之士求之也繹其詞傾倒為何如者而謂學士有是言邪金華吳少君詩説謊定推何太史然則元朗乃好為誑語者世之論者信何氏之説遂不録學士詩未免偏於聽矣秋夜偶成新凉沁苧衣楚客悲遲暮林葉墮寒颸皐禽警清露銀河没半空秋影在髙樹何處洞簫聲吹徧江南路徐階十三首階字子升松江華亭人嘉靖癸未賜進士第三授翰林編修抗疏論孔子廟制斥為延平府推官稍遷浙江江西提學副使入為司經局洗馬歴升禮部尚書入直無逸殿尋入東閣辦事累官少師吏部尚書建極殿大學士卒贈太師諡文貞有少湖集陳卧子云徐公經世之才其詩不專臺閣詩話先祖妣徐安人為文貞公曾孫余少日登世經堂覩永陵手勅羅列梁棟間蓋得君久而不衰罕有過焉者當日袁懋中於西内撰青詞湛元明為鈐山作詩序貽笑士林而公不露所長讀少湖文集有醇無疵非諸公所易幾矣感興烈風振黄塵長夜何颼颼浮雲東南來各有雨雪謀美人金玉姿㷀㷀倚髙樓寳玦雙明珠欲致道阻修嚴霜瘁百草荏苒歲已遒寒暑互代謝日月無停輈至理諒斯存耿耿生百憂冥冥雙飛鴻可望不可求贈傳神蕭鴻臚蕭君七年别來自江西湄以彼絶妙手寫我羸頑肌揮毫捷風雨初不經意為須臾兩徐生竝出當前楣兒童走相問何以更有兹我笑不為言視久竊自悲容顔醜如此已見猶惡之旁觀盡才俊何由使愉怡請君為潤色稍就娬媚姿君怒不復譍我亦慚無辭誓終抱此醜亟訂漁樵期送考功朋石楊君赴留都昔人賤榮達今人慕通顯所履非有殊中得異深淺欣戚縁感生塵幻非實踐望賖情日悲理㑹境俱遣子年二十强才器重瑚璉春明去不顧此意昔所鮮因之内自媿孱鈍玷華選㑹當理歸楫長嘯謝軒冕送司封仲芳楊子赴留都哲人重道義朝貴不足縻丈夫志四方逺適非所悲如何與子别悵悵不忍辭古道日淪替羣䛕紛追隨子獨諒迂僻經訓相劘規去住忽以異麗澤安所資頽波無停流靈耀亦西馳感此重念子何以慰爾知至理不外得吾心實吾師願言勵操存千里同襟期送沈進士子善尹鄱陽治民如烹鮮此語傳自昔邇來才俊士古訓恥誦習譁然煩其令藉口興與革遂令田野間奔走廢耕織朝廷念元元置吏務安輯豈意更勞擾肥身重民瘠沈生起巍科探討遍六籍况復有家教兹義諒能識鄱陽號樂土近稍異徃日撫摩還冨厚夙夜在努力髙才如騏騮千里初發迹康莊與曲徑慎哉審所適送趙甥赴衛輝幕汝母予之姊六年長於予予昔生十齡夜燭誦詩書汝母執女紅竟夕與予俱兹事四十年想像昨日如頭顱各已白相望天一隅每懷骨肉情中宵起嗟吁春來獲見汝差足慰煩紆汝今幸有官汝母當怡愉汝本故家子書香襲巾裾予衰媿忝竊早晩賦歸歟汝宜兩念此奉法保民譽禄養儻能久庻報生汝劬舅甥共休戚贈言不以䛕朂哉萬里程夙夜慎所趨送王國完東歸春色千門桞歸航兩月塗歲更鄉夢切客去草堂孤㑹合期猶阻翻飛意不無瑁湖煩問訊松菊恐荒蕪送曹一坡判長州衡嶽已無鴈辰陽吁可知未愁㑹面阻豫計得書遲屯戍煩兵力流亡苦歲饑若為宣帝澤逺慰故人期𤓰洲風雨不克渡江未遂歸來願空驚歲月奔布帆三日雨茅屋數家村山氣遥連海江聲近到門無縁得飛渡東望欲消魂送顧起元甥壻之京病中愁送客况復是殘年雨雪三更夢江湖萬里船天垂龍塞没星接鳯城懸到得燕山路應書數字傳廣信阻雨有懷子明弟山國夜多雨冥冥氣不分石田寒貯水松逕濕蒸雲灑密愁仍見聲微醒故聞西堂何處見知共惜離羣分水關峻嶺開閩服重關限楚氛星隨分野異地漸燠凉分人語聽難辨山名得未聞所嗟南逝水不似北歸雲横溪為彭允禎賦横溪東去水迢迢虛閣重簷共寂寥山外夕陽低度鳥雨餘春渚暗通潮寒空落葉書聲静秋草孤帆客夢遥欲徙西湖湖上石為君乗月更吹簫潘恩四首恩字子仁上海人嘉靖癸未進士累官南京工部尚書改都察院左都御史卒贈太子少保諡恭定有笠江集張惟静云子仁詩型範自然體裁各適已深入作者堂奥徐伯臣云笠江詩祖盛唐充然自得大王元美云公詩根柢鄴中間及開元厯詩話先大母徐安人為恭定公女孫所出予七齡時塾師課以屬對不協安人述舊事謂公六歲能調四聲因以公所訂詩韻輯要授予自是知别四聲矣公詩凡風雅什樂府五言雜體靡不擬又與髙子業田叔禾相酬和知其用力深而取友之善也塘上行緑蒲生中池其葉何蒙茸與君締昬媾焉知鮮有終三月楊柳花飛泊隨春風入沼化為萍吁嗟無定蹤衝波一相激葉葉自西東我心元不移君情忍中絶妾生禽不如鴛鸞故成列妾生草不如絲蘿可髙揭妾生木不如連理枝糾結越鳥豈北翥吳江不西旋妾生一以棄苦相誠可憐恨無奮飛翼委志畢君前從庾嶺北歸至萬安縣舟中作嗟余謬時網作吏入西粤飽歴五嶺雲四見梅花發草樹冬常青嵐霧晝不歇徇禄歎迷方留滯慚英達駕言適京師歸途嶺初越忽驚險阻盡俯視原隰闊白沙綴疎星碧水澹華月乗流耳目新破浪精神豁鷗鳥㑹我衷飛鳴恣怡悦雖牽行役悲吾躬庶可閱當陽晩行山行日有程中路速修軫牛羊夕下來嶺日忽以盡石滑露華零木號風力𦂳野燒漸已微疎星忽而隱倦翮怯途遥迷方憐步窘僕御慘不歡勞生况多疢撫時百慮煎于役良足憫惜哉紱冕牽久負沮溺哂湖上西湖如練風日清西山屏障更分明上方金碧自相映下界鼓鐘時一鳴槐柳青溪張席罷菰蒲白水放舟行此時政切東南想怪爾浮雲空北征鄭曉一首曉字窒甫海鹽人嘉靖癸未進士累官南京吏部尚書尋以右都御史協理戎政改刑部尚書卒贈太子少保諡端簡有集詩話端簡公家法甚嚴遺訓子孫倡優不許入門違者以不孝論屏諸宗譜之外築别業於城東北隅穿池中央四面種蔬藥賔客至者燕於池上百可亭亭陰有牡丹數本嘗與夫人玩花豚一蹄魚一尾鷄子四枚酒三行而已嗣先妣孺人為公來孫予嘗讀書其地芋魁芥孫豆棚𤓰堰恍若深村今已屬之他姓矣公鋭意經史學韻語不多作然曾刋鳴唐萬選絶句以行非不留心風雅也彭城彭城天下險萬里接河源落石東南斷飛濤日夜喧江淮連絶島齊魯入平原寄語當關者征求無太繁張時徹七首時徹字唯静鄞縣人嘉靖癸未進士授兵部主事改禮部出為江西提學副使歴福建參政雲南按察使山東右布政使河南左布政使以僉都御史撫四川再撫江西遷南京刑部侍郎改兵部進尚書有芝園集楊用修云芝園匠意鑄云唯詞色具體備江于順静立格漢魏取材六朝而音節變調出入開寳之間情屬景生神在象外陳卧子云司馬樂府頗有造構近體宛倩麗逸如層臺佚女意帯雲霞詩話芝園樂府不規摹古人較之濟南覺勝五律頗近初唐七律潦倒麄疎無譏焉已彭彭者車五章彭彭者車于彼河洲有美丹漆不以飾輈彼君子兮使我心憂一彭彭者車于彼河側矯矯騏馵不以服軛彼君子兮使我心惻二爾之弦矣衆維韋矣爾之石矣衆維脂矣匪爾圖之狂維衆之迷矣三矢之既釋不可及也錦之既張不可卷也我生有定終不可轉也四修爾疆畎藝爾黍稷保艾爾生夙夜無斁如彼見龍時哉斯匿五秋胡行衆鳥有匹胥遨以遊摯而有别實惟雎鳩彼誰者子矯矯卿侯突而好我中心孔羞卿有婦兮妾有夫恱彼姝兮曾雎鳩之不如兮一解倉庚喈喈春日載陽執我懿筐采彼柔桑彼誰者子車馬龍驤含情流睇黄金是將獸有穴兮鳥有林卿有金兮不如我有心兮二解明明日月照臨下土女子有行畏彼多露誰彼者子繡衣朱輅美也可悦不念其故山有木兮水有魚子不信兮孰可與同居兮三解北征雜詠二首養鳥莫養鸞萟蔴莫萟蘭芳香難為用過美多憂患田甲賤死灰白日摧氷山時運有來去禍福無定端周道蕩如砥朱門競彈冠咳唾生風波誅奪在一言日月不常盈人生豈得安栖栖巖穴士無為恥泥蟠羲和無停軌寒暑更相易歲暮誰不歸獨為逺行客荆榛當路衢烏鳶翔我側疾風吹沙塵白日忽以匿筋骨既憔悴感此增怵惕悠悠赴壑鱗戢戢歸林翼物性有如此行役不遑息閶闔不可攀閬風不可即果腹適莽蒼浩蕩將安極長安道月曉一作曙動開長樂風清一作鶯啼遶建章龍媒馳道出鳯吹彩旌揚繡陌生朱霧銅溝映緑楊渭橋春水漲日日浴鴛鴦齋居紫闕風雲迥彤庭日月臨明禋昭代典肅戒小臣心雨露春偏渥星河夜不沉長安千萬里應獻太平吟閭閻曲穀熟不到釡絲成不上身莫道江南樂江南愁殺人歐陽德一首德字崇一泰和人嘉靖癸未進士累官禮部尚書贈太子少保諡文莊有南野集送胡九峰改太常少卿北上丹楓江上路送爾倍沉吟南北如相避誰從話此心漸鴻遵月渚倦鳥怯雲岑孤負溪山約臨風撫素琴馬坤一首坤字順卿揚州通州人嘉靖癸未進士累官工部尚書有石渚集苦雨南國春來不肯晴陰雲接地暗山城翻風何事鸛一作鶴䨇下喚雨忽聞鳩一鳴處處蠶饑吳地妾牀牀屋漏杜陵生鶯花三月空無頼獨掩柴門對短檠朱廷立一首廷立字子禮通山人嘉靖癸未進士除知諸暨縣入為監察御史升南太僕少卿終禮部右侍郎有兩厓集杜宇愁烟積雨過芳辰乍喜濃隂緑樹新杜宇多情啼不歇山中可有未歸人吳鵬五首鵬字萬里秀水人嘉靖癸未進士累官吏部尚書加太子太保有飛鴻亭集詩話尚書居里門不自韜晦以是鄉人皆惡之㑹有詔許佃浮屠廢寺為民居公子繼輸直於官請佃楞嚴寺隙地且酬僧徒以白金四百兩因葺野樂園蓋與勢佔者稍有别矣園有堂曰先瀛前為圃曰閒閒曰猗猗曰忘機曰都春門曰吾如所堂後有樓曰雲日樓前亭二曰潄芳曰臨賦小沼環之左右齋各一曰悟真曰守虛園成尚書自為作記告誡其子謂宫室勿崇土田勿闢與馬勿飾服御勿奢饔餼勿珍執業勿懈交遊勿濫鄉鄰勿競施予勿吝辭受勿茍觀其出言也善方諸席寵滅義以惡終者亦有間也尚書詩文頗條暢特少警策當在徐沛拯民之饑截漕糧數萬發之而後請命又敗永城賊師詔於五河膽略亦有過人者比於吳之陸完差可恕爾潞河發舟解纜催笳鼓青春萬里行烟籠堤柳密水泛野鳬輕獨立思王事無才補聖明此心懷魏闕悵悵櫂歌聲永平道中疎雨未滑道秋風隨使軺磴危頻下馬溪斷不逢橋板屋居何陋蒲蠻習更驕暝投孤舘宿寂寞聽鄰簫夫椒山夫椒山前孤草亭天風䬃䬃秋冥冥客來獨鶴忽飛去七十二峰湖上青舟行雜詠二首山花瑣細蔟郵亭小艇漁歸水氣腥一路東風嘶去馬土牆斜颭酒旗青驛亭素壁上苔痕亭下奔流净不渾慣是秋河愁汎濫漁家偏占白鷗村屠大山二首大山字國望鄞縣人嘉靖癸未進士累官兵部左侍郎巡撫應天與倭戰失利被逮繫獄既而釋歸有集屠長卿云公歸田後與里中故人縱飲酒酣援筆作歌了不求工而徃徃神來非詞人嘔心所得雜詠古道有蒺藜行者戒經過新徑富桃李過客肩相摩古道日以微新徑日以多江河逝悠悠歎息將如何聞道聞道黄河套年來勢不同驚塵昏陜右邏騎薄遼東五月金符動三軍鐵馬雄何當清絶域再見幕南空李仁一首仁字元夫東阿人嘉靖癸未進士累官右副都御史有吾西遺稾朱中立云吾西清婉和粹有中唐餘韻茂欽至得德兆起居不見黄生久天涯怨索居椒蘭懷楚客氷雪斷江魚白日登山屐青春負郭廬虞卿能發憤㑹見早成書李宗樞一首宗樞字子西冨平人嘉靖癸未進士除諸城知縣徴拜監察御史出為河南僉事歴僉都御史撫河南度居庸關峻壁含雲迥飛湍接澗迴虛聞三峽險疑是五丁開荒樹分天宇驚沙暗戍臺祗慚持節度豈是棄繻來劉隅一首隅字叔正東阿人嘉靖癸未進士授福建道御史出為四川按察僉事坐謫稍遷永平知府升河南副使進按察使以右僉都御史巡撫保定終右副都御史有範東集朱正立云範東意氣安閒辭㫖沉快有杜陵遺意過宿州憶昔乗軺過霜飛楚甸清十年頻去國此日重含情浦樹浮烟逺河流入海平山川望不極春草徧王程一作伴孤征李舜臣二首舜臣字懋欽一字夢虞樂安人嘉靖癸未㑹試第一由户部主事改吏部歴考功員外郎出為江西提學僉事改南國子司業轉尚寳卿久之召為太僕卿有愚谷集孔汝錫云愚谷詩優柔涵泳粹然一出於正詩話李獻吉有九子詩李伯華仿之亦作九子詩以懋欽為首次以劉子素又次羅逹夫餘則吕山甫熊叔仁唐應德趙景仁王道思潘子抑也子抑名髙太原人王恭襄瓊女壻中嘉靖壬辰進士以翰林編修建言罷官伯華詩所云貴人懷私憤假公得一逞也又詩云潘君氣最豪權貴等鴻毛身廢談邉務家貧賣寳刀又云有書過千卷有田不一頃亦一負竒之士所著春谷集不傳李伯華輯明雋僅録其一詩而已近見晉人編仕國人文竟不及其姓氏惜夫初度友人過飲乍喜髙軒過還驚短鬢催相看俱老大相慰是歸來濁酒家能釀黄花手自栽今宵踏明月莫惜醉中回徐錦衣西園暖日紅芳樹晴烟碧小溪春風二三月定有好禽啼陸銓五首銓字選之鄞縣人嘉靖癸未進士除刑部主事諫大禮廷杖遷兵部員外轉禮部郎中為張孚敬所忌出為福建按察副使歴廣西按察使廣東布政使有石谿集詩話石谿論詩專以性情為主嘗曰宋人不能為唐唐人不能為漢魏時為之也其偶似者宋之似唐唐之似漢魏爾故諸體不沿時習五言如鳥白雲中樹山青雨後峰亂帆争入浦羸馬怯過橋越竹成遊轎吳蠶吐釣絲七言如山田雨足秋仍熟石室風髙夏以寒絶壁有松人不到深林無主鳥相忘沙頭水急潮初落山腹烟多雨未收野樹巢空驚鶴去淺沙船動覺潮來輕便度嶺雙肩轎小巧穿橋獨櫓舟一别動經千里闊百年消得幾回忙皆非陳言也至若獄中次季舉之韻云聖怒不妨為孝子狂言豈敢託忠臣庶幾哉忠厚之遺矣民謡毁我十家廬構爾一郵亭奪我十家産築爾一佳城官長尚為役我曲何時直本是太平民今願逐逋客撥悶修塗密春雨新水浮磽田灘聲起林杪浦色迷逺天溯遊違水性力挽苦不前歸情逐飛鳥度日長如年前村靄雲樹望久生夕烟來船翼䨇櫓疾若矢發弦勞逸迥倍蓰遲速殊相懸事以乗機昜力因失勢捐引觸悟至理何獨舟行然湘湖與陳見吾同遊陳侯慷慨作賦才置酒攜我湘湖隈湘湖去縣十二里津吏伐鼓㕑船開須㬰山曠湖風發船頭噴浪聲如雷酒酣日落鳬鷖亂振衣倚櫂登荒臺人言夫差昔困越直待烏啄行成迴至今山脚號排馬天風颯颯吹枯荄十年轉盼似昨日敗軍勝將同灰埃陳侯陳侯歸去來登舟長嘯且銜杯眼前功名亦吳越吳越于我何有哉再和宣明館陽明先生韻五色晴江雨後痕亂峰雲氣月華渾邊陲萬里還通驛盛世深山亦有村興至欲穿雙屐去愁來只對一燈昏夜郎詩思知多少恐有當年遷客魂清明清明日薄晝陰陰籬外新秧短似鍼縛草象人田畔立借他風力逐飛禽顧夢圭五首夢圭字武祥崑山人嘉靖癸未進士累官江西右布政使有疣贅集詩話武祥清約自居有同寒素當參議粤藩賦詩云夏月行部至雷州思製一葛且復休冬月行部至㢘州思製一裘且復休故衣雖穿尚可補秋毫擾民民亦苦胡威之清何以過此吕仲木擷梅花贈之曰武祥如此花矣聞者以為美譚擬古雝雝雲中鴈八月徂南方念彼北風來怛焉懷稻粱九月氣已淒十月繁氷霜生成一作來毛羽單髙飛不成行君門有鐘鼓聽之徒自傷漷縣行入城半里無人語枯木寒鴉幾茅宇蕭蕭酒肆誰當壚武清西來斷行旅縣令老羸猶出迎頭上烏紗半塵土問之不答攢雙眉但訴公私苦復苦雨雹飛蝗兩傷稼春來况遭連月雨縣城之西多草場中官放馬來旁午中官占田動阡陌不出官租地無主縣中里甲死誅求請看荒墳遍村塢珠池歎幷序廉州平江青鸞楊梅池雷州樂民池産珠地也先朝率十五六年或十年一採始得美珠上供邇者三年再採珠已竭矣所得皆碎小藩臬有司竝受詰責不知此物生息甚難取之太頻安得圓美每採費舟筏兵夫以萬計頑悍之民因縁為盜今雷㢘凋敝已極採取不止將有他虞余承乏攝此事儻議復採當疏聞聖明必不以無益害有益也漢家嬪嬙無麗飾南海逍遥養泉客昭陽新寵鬭新妝照乗之珠苦難得孟嘗美政龔黄班今人反怨珠來還璽書三年兩頒降驪龍赤蚌皆愁顔徃時中官涖合浦巧徴横索如豺虎中官去後璽書來誰訴邊陲無限苦野老村童不著褌四山戎馬夜紛紛竹房無瓦缾無粟猶折山花迓使君感事畫㦸門前車馬稀東市灑血沾朝衣中台轉盼無光輝華亭唳鶴聲哽咽月中空喚行人歸謁康陵早霧籠山暝新松匝殿稠三邊餘武烈八駿想神遊花蕚皇情逺衣冠歲事修傷心大官酒猶得獻千秋髙叔嗣二十二首叔嗣字子業祥符人嘉靖癸未進士授工部主事改吏部歴員外郎中出為山西参政終湖廣按察使有蘇門集廖鳴吾云詩人之有事於楚者若邉廷實之冲澹徐昌穀之超逸李川父之脱灑髙子業之奔放咸足被之廣奏登之升歌洋洋乎其盈耳也哉陳約之云子業謝絶品流因心師古每有屬綴佇興而就寧復罷閣不為淺易徃徃直舉胸臆刮抉浮華存之隱冥獨妙閒曠有蘇州之冲澹兼曲江之沉雅體王孟之清適具髙岑之悲壯詞質而腴興近而逺洋洋乎斯可謂之詩也已華蔡子木云蘇門詩在我朝當屬第一李伯云何李雖是大家去唐却逺蘇門雖云小就去唐却近蔡白石王巖潭以為國朝第一其言雖過要之不可盡非也葉王元美云髙子業如髙山鼓琴沉思忽徃木盡脱石氣自青又如衛司馬言愁憔悴婉篤令人心折又云髙子業空谷之幽蘭崇庭之鼎彞也又云刻羽雕葉舍陳而新吾推子業然不能諱其促獨王敬美云詩有必不能廢者雖衆體未備而擅一家之長如孟浩然洮洮易盡止以五言雋永千載竝稱王孟我明其徐昌穀髙子業乎二君詩有不同而皆巧於用短徐以髙韻勝有蟬蜕軒舉之風髙以深情勝有秋罔愁婦之態更千百年李何有時廢興二君必無絶響業呉明卿云獻吉仲黙竝策上駟而馳中原子雖驂駕第緩轡後至耳劉仞叔云蘇門思悟入𤣥詩在晉魏初唐之間顧𤣥言云參政詩若磊磊喬松凌風迥秀響振巖谷工胡元瑞云髙子業視李何後出而其五言之不欲作今人一字在唐不減張曲江韋蘇州矣又云𢎞正五言律自李何外如薛君采之瀟灑温醇髙子業之精深華妙置之唐人毫無媿色然二君俱不能為七律髙蓋氣意局所限薛由工力未加黄清甫云髙詩綽有見不假縁飾吐言成章誦之若落落直致而乗中自豐腴馬仲良云羊孚有言資清以化氣以霏遇象能鮮即潔成輝四語可畫一子業也范介孺云子業多粼漣之致惜未竟其詣陳卧子云子業沉婉雋永多獨至之言讀之如食諫果味不驟得又云子業詞存清曠意成淒楚疎李舒章云子業衣如林清罄聴者振詩話嘉靖初後生英俊稍稍厭棄李何子業以吏部郎謝病歸時獻吉留開封辭必摹古子業自序讀書園稾謂本非所長而雖力摹之度必取調於衆其立意固殊讀其詩如食哀家棃止渴雖爽而不伐性如以水精鹽進酒雖薄亦能醉人李中麓六十子詩於子業有云蘓門能入室何李只升堂其傾倒也如此古謌荆和當路泣良璞為誰明茫然大楚國白日失兼城燕石十襲重魚目一笑輕古來共感歎今予益吞聲再調考功作引疾三上書微願不克諧徙官復在兹心迹一何乖軒裳日待旦閶闔凌雲排入屬金馬籍出與羣龍偕積賤詎有基履榮誠無階但惜平生節逾久浸沉埋既妨來者塗誰明去矣懷鳥迷思故林水落存舊涯唯當尋素業歸卧守荆柴益藩潢南云委婉非俗客能道秋情凉風吹庭樹蕭然已暮秋歲運空云徃客行胡久留良時每易失微志果難求餘光儻可積但空成山丘病起偶題空齋晨起坐歡遊罷不適微雨東方來隂靄倏終夕久卧不知春茫然怨行役故園芳草色惆悵今如積雨中簡子仁員外積雨曠朝暮層城苦沉沉端居誰與言抱此懷人心一為軒冕拘遂使名跡侵長媿𤣥豹姿隱霧南山岑君通微妙理佇想開塵襟簡袁永之獄中本同江海人俱為軒冕誤子抱無妄憂余有多言懼昔來始青陽今此已白露豈乏速進階苟得非余慕罪至欲何言直以愚慵故衆女競中閨獨退反成怒追誦古時人蒙冤誰能愬皇心肯照微與子齊歸路元日同谷子延賦雄都盛賔客車馬爭馳騖芳辰啟初年宴飲多所務不知灌園身何為迷方誤郊館抗空壑山扉啟峻路良朋平生歡就我今朝步城因竝舍登徑為穿林度微隂原上明片日雲中霧青霞照深池白雪停幽樹共貪歲欲新不厭日旋莫農田方在兹君豈數能顧益王潢南云造語精綺叙懷生長夷門郭徃來莘野路家貧無良謀躬耕有逺慕始窮伯王略遂覽生民故曰余本空疎當年恣髙步慶彼鳴鶴期忝此飛龍顧亦知敝帚材早享千金誤日月不我留撫心慙徃素益王潢南云辭意俱古移樹道上春園就蕪穢雜樹生蒙密不知雨露功長養何多術婆娑使人憐斬伐終余恤乗時聊徙植于以託吾室交生兩相當列映直如一轉令門巷新遂放鷄豚出修修原上風團團村邉日紛吾本蹇劣兼爾抱憂疾敢學成都桑而謀荆州橘願及垂隂成初志儻此畢歸次南關驛祗役忽于今徑塗宛如昨秣馬息荒林振車越重壑歲暮滯還期客心悵不樂曰予本沉冥遭時乃濩落化海異微禽蟠泥豈尺蠖方因遷斥餘始遂歸來諾逝將入雲峰滅迹從所託送别徳兆武選放歸燕郊秋已甚木葉亂紛紛失路還為客他鄉獨送君罷歸時共惜棄置古常聞莫作空山卧令人望白雲春夕同李考功道舊下馬春庭夕明燈夜雨深人多新歲感日有故園心磨滅名題柱淒涼賦賣金十年同省舊誰念各如今賦得嶧山碑送李東升明府秦皇千載後嶧嶺尚遺碑斷石青山路孤城滄海湄蕭條餘霸氣磨滅想雄辭君到鳴琴暇應多弔古思得張子家書晩日照餘晴荒亭暗復明歸雲度深樹飛雨過髙城蹇劣慚當代棲遲笑此生空持一書札長歎故人情雨後有懷子延驟雨新秋晩微晴墟落間悠然抱藜杖率爾倚柴關空壑纔容水流雲故滿山遥知城市裏應羡此身閒西園再酬谷子延茅屋還相見冬郊那可聞荒城連凍浦落照與寒雲逺樹行時倚歸塗到處分留君終日語猶自日思君武城漕河逢張使君憶考功舊寮岸坼留餘照舟行稱晩風歸心千里倦行役一時同置酒滄波上停橈緑樹中思君如河水何日不朝東送别蕭司勲柴門夜語罷惆悵出前林曉日孤村映秋風落木深别來生白髮歸去換愁心還復茅檐下朝朝鳥雀吟井陘道中曉霜塗屋重寒日出林微改轍辭邉徼登車望帝畿深山藏驛道巨壑斷村扉欲問前征侣迷津何處歸晩趨忻口雲峰聊極目立馬獨愁心豈直關山逺其如雨雪深笳聲先入夜邊氣迥生隂疇昔長征意蹉跎力不禁沁州張源舖去國三年意還家此日心天寒客路永日暮衆山深沙塞人偏老風霜馬不禁如何更萬里投跡楚江隂送管平田先生頒封秦府歸省五等周分國三王漢世家日聞敦帝族時見遣皇華剪土仍鶉首疏邦自犬牙秦關通使節灞水渡征車過邑恩難屢登堂禮更嘉何如北山客行役動長嗟葉份一首份字原學婺源人嘉靖癸未進士歴官山東提學副使有蓮峰集汪禹乂云原學詩平妥中有逸思夜泊壽春驛萬里愁行客孤槎自使星人烟昏晩渡漁火亂風汀桐柏長淮水松杉古驛亭誰家吹短笛淒斷不堪聽周易一首易字時伯蕪湖人嘉靖癸未進士歴官提學副使有赤山集春眺兼簡楊石巖野曠春猶淺山明雪正殘楚雲棲樹濕淮雨過江寒酒醒頻看劒愁深獨倚䦨客從天上至猶道未回鑾陸冕二首冕字宗周崑山人嘉靖癸未進士除禮部主事歴官陜西按察副使周子籲云宗周律已廉介詩雅健清古西夏曲二首秦關百二古稱雄寧夏山河襟帶同天險皇圖元自固從前失策自和戎校獵河西日未曛摐金伐鼓動風雲還軍飲馬長城窟野馬黄羊各百羣韋商臣一首商臣字希尹長興人嘉靖癸未進士除大理評事疏救議禮諸臣廷杖謫靖江縣丞累遷四川參議有南苕集詩話南苕世為㢘吏時以比胡威父子歸田後與蔣恭靖瑶劉清惠麟孫僉事濟蔡同知玘唐主事樞陳參政良謨顧尚書應祥吳太僕龍朱太守懷幹張通政寰施知州佑李知縣丙吳副使麟參政龍一十五人結峴山逸老之社雖饎㸑不給而春秋必赴能不改其樂云父厚字原載中成化丁未進士仕至黄州同知有翠屏詩集不傳霅峰者名雲鳯烏程人官刑部主事蓋續入逸老社者秋社和朱霅峰韻近圃青千疊遙山碧四圍舟從天際至觴向雨中飛殘暑蒲葵扇新凉薜荔衣更憐天欲霽返照弄餘暉鄔紳一首紳字佩之丹徒人嘉靖癸未進士有中憲集寄汪水部淵之憶昔河梁别春華委芳樹流光何迅速朱夏忽云暮園林莎鷄鳴檐隙疎螢度向晩輟簿書中庭浥微露搔首重踟躕無亦以君故使者舒城來多君眷南顧遺我以先春開我以尺素殷勤報秋期江皋諧夙晤我欲徃問之蒼波渺烟霧悵望寂無言鳴琴寫情愫陳褎一首褎字邦進寧徳人嘉靖癸未進士有騮山集燈花倦矣經年客歸與萬里家逺書期不至空自卜燈花馮世雍一首世雍字子和江夏人嘉靖癸未進士歴官徽州知府有三石稾赴滇南煙莊道中碧嶂千峰合黄茅一徑開馬從危石度人自亂山來暝樹靑溪濕寒雲白鴈哀漫停湘浦駕遙望漢江臺劉汝松一首汝松字貞吾歴城人嘉靖癸未進士歴官知府送李進士之京春風吹岐路朝日照髙城青陽既駘蕩林薄亦芬榮之子去安適迢迢入承明皇居一何麗雙闕凌太清白馬振長緌丹陛羅羣英匪才慚寡用髙歩羡芳聲盛年志四海豈徒夸令名朱淛四首淛字必東莆田人嘉靖癸未進士授湖廣道御史建言廷杖放歸有天馬山房遺稾林雨可云損巖下筆清健一種疎宕之氣足以移人性情詩話興國太后將至禮部議由東安門入覆議由大明中門入張璁曰雖天子必有母也焉可由旁門入乎於是從大明中門入在永陵意中惟知有興國太后而已嘉靖三年值慈夀皇太后誕辰有㫖命婦免朝賀損巖上言興國太后朝賀既已舉行慈夀誕辰乃聞報罷事體相類禮數頓殊臣切念武宗上賔蒼生無主當時為孝廟後者惟慈夀所欲立爾手提神器親授吾皇孝宗在天之靈所以望陛下之事母后者何如天下臣民之心所以望陛下之事母后者何如今乃旬月之間一舉一罷彼此相較形迹太分何以慰孝宗在天之靈副天下臣民之望疏入永陵震怒匪蔣文定力救不能生矣同時疏諍者馬侍御明衡也二公可謂格君心之非者損巖詩無俗韻誦之想見其人歲暮山中種梅山逕邊下有牛羊道童豎恣攀翻糾纒昜枯槁殷勤謝鄰翁愛此寒花好放牧須前山前山足豐草飲黄石友人黄正可晩青亭和師山題壁漫影落名山歲月累云周如何咫尺地兹亭今始遊小草冐庭户寒花明牆陬摵摵髙樹聲蕭然似林丘西風天欲暮雨意鳴靈鳩主人有好懷開尊更獻酬相與各賦詩談笑銷百憂愛此同遊人俱維静者流盍簪誠足樂萬事吾何求贈豐山陳于廷我愛豐山無俗韻時時來徃小齋中野情自比天隨子詩句多師陸放翁環堵蕭然無一物才名早已動諸公長吟盡日不知厭興入冥冥海上峰草堂前芙蓉正吐口占清霜一夜老蒹葭牆角芙蓉漸著花猶憶昔年江上看西風吹夢客思家盧襄一首襄字師陳吳縣人嘉靖癸未進士官職方郎中有五塢山房稾一谿一道縈村曲何年有此谿微風生細浪過雨失平堤漁溆舟相續仙源路不迷幽棲我亦戀夢繞石湖西狄沖七首沖字仲虛溧陽人嘉靖癸未進士歴官南京工部郎中有春谿集陳山父云春谿思致雋爽體裁各軌其度音調亦遒詩話春谿歴仕不達晩乃為郎故其詩云官銜四轉轉萬里垂老始博尚書郎其詩清澈類楊夢山特全篇合作者少臨淮思淮之水兮清且瀏思若人兮情夷猶遡予舟兮夕逝願從之兮靡由淮之水兮淸且駛思若人兮不能已抱多病兮焉投隔淮湍兮千里淮之水兮洋洋睠我情兮難忘永悠悠兮冬夕輾轉反側兮未央悲莫悲兮生别離我思君兮君不知臨北風兮隕涕屬孤雲兮南馳東寺竹林鳥已春聲林竹尚寒影豈無竹外花愛此晩色静褰蘿拂苔石透手弄清冷飛䑕迭相竄驚鱗時一逞慙非海上翁動物見猶警自銅仁至八盤岧嶤度修坂窈窕穿林木野燒楓半枯隂厓草全緑獸鋌或衝人鳥嚶如度曲羣猨不畏人聯臂下江浴人言此道險欣籍吾方足肩輿吟且眺一一得所欲月出江上峰夜上峰頭宿何似長安塗飛埃眯人目徳州道中逺道嗟難到舟行觸凍流山城寒擊柝客夢夜封侯岸鳥棲還警村狵吠不休篙人真楚産助力發蠻謳谿上原樹明殘日谿風埽斷雲衆山圍野竝一水向田分魚戲推萍轉樵歌隔嶼聞隱居逢此地無事歎離羣冒雨入白鹿樹杪雨來風有聲肩輿且竝樹邉行路傍鳥去葛花落水面魚遊蓮葉生山接流雲多變態澗添行潦亦争鳴此來老子興不淺巾折衣霑踏草坪喜晴東郊奄奄雨意足南郭浮浮雲脚收鸕鷀刷翎水北岸蜘蛛添網門西樓虹垂古澗青紅氣日射蒼波紺碧流曾苦妨農何事喜桔槔閒卧夕陽洲柯維騏維騏字竒純莆田人嘉靖癸未進士官南京户部主事有藝餘集謝山子云先生閉户五十年放意著述自成一家詩以積學勝人不易託詩話宋遼金元四史惟金史差善其餘潦草牽率豈金匱石室之所宜儲希齋撰新編㑹宋遼金三史為一以宋為正統遼金附焉升瀛國公益衛二王于帝紀以存統正亡國諸叛臣之名以明倫列道學於循史之前以尊儒歴二十載而成書可謂有志之士矣其詩文曰藝餘者編宋史之暇作也先是揭陽王昂撰宋史補台州王洙撰宋元史質皆略焉不詳至柯氏而體稍備其後臨川湯顯祖義仍祥符王維儉損仲吉水劉同升孝則咸有事改修湯劉稾尚未定損仲宋史記沉於汴水余從吳興潘氏鈔得僅存然三史取材紀傳則曽鞏王偁杜大圭彭百川葉隆禮宇文懋昭編年則李燾楊仲良陳均陳桱禮樂則聶崇義歐陽脩司馬光陳祥道陳𤾉陸佃鄭居中張暐職官則孫逢吉陳騤徐自明輿地則樂史王存歐陽忞税安禮王象之祝穆潘自牧著録則王堯臣晁公武鄭樵趙希弁陳振孫類事則徐夢萃孟元老李心傳葉紹翁吕中馬端臨趙秉善劉祁述文則趙汝愚吕祖謙諸書具在以予淺學亦曾過讀其他宋金元人文集約存六百家郡縣山水志以及野史説部又不下五百家及今改修文獻尚猶可徴予嘗欲據諸書考其是非同異後定一書惜乎老矣未能也别黄道卿繁霜肅野草廻飇振城樹胡為子逺行值兹歳云暮我屨不出門為子臨岐路子驂亦暫停豈不以我故我如蒿下鳥子如雲中鷺動息各有宜安得長㑹晤㑹晤不須期努力慰所慕宏路驛雨歇江天净山迴驛路遲客愁新歳減風物故鄉宜花事餘梅蕊樵歌綴竹枝祗慙司馬病深負好文時豐坊一首坊字存禮鄞縣人嘉靖癸未進士除禮部主事以吏議免官家居坐法竄吳中改名道生字人翁有南禺集張惟静云存禮質稟靈竒才彰卓詭論事則談鋒横出摛詞則藻撰立成士林擬之鳯毛藝苑方之逸駟然而性不諧俗行或盭中片語合意輙出肺肝相啗睚眦蒙嗔即援戈矛相刺亦或譽嫫母為嬋娟斥蘭荃為薋菉㫄若無人罕所顧忌知者以為激詭不知者以為窮竒也由是雌黄間作轉相詆諆出有争席之夫居無式閭之敬鶉衣繿縷濕突不炊僮奴絶粒而逋亡賔客過門而不入顑頷窮獨以終其身不亦悲夫王元美云豐道生如沙苑馬駑駿相半恣情馳騁中多敗蹶詩話南禺釋褐後從其父學士熙諫大禮受杖闕下人方謂學士有子矣逮父卒戍所乃言非父本意忽走京師上書請追崇興獻王宜稱宗入太廟永陵用其言而不録其人也歸益狂誕恃才傲物作偽欺人撰子貢詩傳申培詩説魯詩世學古書世學石經大學竄易經文别裁異議一時若㤗和郭氏京山李氏澄海唐氏多惑之而不知本邪説也芝園一序可當聲罪檄而憐才美意寔寓其中此等人第作犬豕相遇可耳詩不必存録而論列之期以祛後人之惑也十月十一日作去國已逾紀𤣥節及兹臨修軌忽電逝壯懷終陸沉淒淒寒露結慽慽悲風吟芳草委遙澤驚鳥翔空林朝飛尚蠅羽夕寐惟蟲音馳情有斷簡卒歲無重衾餘悰奚足道雲海勞予心明詩綜卷四十四
