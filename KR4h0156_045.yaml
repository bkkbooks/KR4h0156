body:
  text: 明詩綜卷四十五翰林院檢討朱彞尊編龔用卿二首用卿字鳴治懷安人嘉靖丙戍賜進士第一除修撰歷諭德終南京國子監祭酒有雲岡集武夷第五曲謁紫陽精舍九曲清溪流此地適居半上有丹屏圍下有緑波渙嘉木雜異草神工留竒觀山川泄幽靈晦明定昏旦茂囿小可耕淺渠清可灌我來謁紫陽維舟楊栁岸懷賢式居廬訪舊窮考按釣遊本夙心歷覽騁披玩元理固豫會奈此浮名絆行當息塵網永作青山伴冬日飲九山貟外怡薰樓開軒對南山蒼翠日在眼山色佳有餘引領意無限煙霏起暮容浮雲自舒卷時見登山人歷歷諒非逺層樓具盤餐主人興不淺清歌繞畫梁冥心栖絶巘元理儻豫會幽懷從此遣蘇祐二首祐字允吉一字舜澤濮州人嘉靖丙戍進士除吳縣知縣再知束鹿徴授監察御史出為江西提學副使遷山西參政升大理少卿以僉都御史撫保定以副都御史撫山西入為刑部侍郎尋以兵部左侍郎總督宣大進兵部尚書削籍尋復官有榖原詩集朱中立云榖原所作格不髙而氣逸調不古而情真遺穆敬甫云公意興甚髙得句不苦自是盛唐韻于無垢云蘇公詩遒麗典雅卓然名家橫陳卧子云司馬詩沉雄雅練邊塞之篇不愧槊七律格律精嚴聲調清亮咄咄逸羣而上聞警榆塞傳刁斗經年未罷兵遂令青海箭復度白登城四野空多壘三軍孰請纓轅門有頗牧萬一早留情豫歸入倒馬關作南風吹雨傍關來關上千峯畫角哀老去尚憐金甲在生還重見玉門開鵾絃謾引思歸調虎節空慚上將才聖主恩深何以報車前部曲重徘徊張鏊一首鏊字濟甫南昌人嘉靖丙戍進士改庶吉士纍官南京兵部尚書有遷鶯館集訪趙元戎築塞走馬黃龍府觀兵細栁營連山邊雨合平野陳雲橫松漠懸秦壁燕支動漢旌猶憐趙充國辛苦築金城陸垹五首垹字秀卿嘉善人嘉靖丙戍進士纍官右僉都御史巡撫河南有簣山集李元實云簣山詩文發乎中情根之理道無髙論無詭詞淡然如菽粟之味可嗜而不可厭陸子餘云簣山言志為詩罔非真響處華腴而不詡當阻厄而不挫敘逸豫而不淫宣伊鬱而不激靜志居詩話嘉靖初吾鄉詩人漸山而外有菁山簣山漸山集選家恆多采録兩公詩或見遺譬諸圖繪漸山丹青兩公水墨鑒賞者好有不同非畫品有髙下爾感述行人牽牛去乃謂邑之人無妄固有疾勿藥戒諄諄所以君子徒兢兢慎厥身明期無人非幽欲無鬼嗔不虞譽方恥求全毁非真浮雲翳白日白日豈終淪築隄謡彼田髙我田低髙田積土河成蹊低田年年催築隄築堤復取田中泥去年大水百榖傷髙田得熟低田荒今年土龍雨莫禱髙鄉之田為茂草宿三義口雲樹蒼茫合鄉關道路賒近船呼伴侣隔岸有人家草短煙橫野江寒月浸沙家人應念我今夜宿三義郡廨似野齋青林依郡宅渾似野人居幸此無公事間來展道書蟬聲聞逺樹草色上前除莫笑耽元寂功名意本疏弋陽道中石子船頭磊磊溪聲枕上潺潺人行上瀨下瀨夢隔千山萬山張子立一首子立字原禮黃縣人嘉靖丙戍進士除行人擢湖廣道御史歷官右僉都御史巡撫延綏謫戍寧武關龍沙北望接三關十萬旌干虎豹間隘地風煙臨晉水連營烽火動燕山行邊將帥勞推轂勝算朝廷重轉圜黠冦早聞驅馬去將軍新自射熊還吕希周二首希周字師旦崇德人嘉靖丙戍進士歷官通政司使有東匯詩集詩話東匯於詩亦沾沾自喜其集不甚傳由其子請論定於陸武惠也同里曹秋嶽侍郎博徴文獻集明三百年名公卿手書墨迹裝潢成册多至七百家東滙雜詩在焉比集中所載者較勝亟録之侍郎殁後古林書畫散作雲煙曩之過眼者不復再覩矣可惜哉雜詩人生如萍藻泛泛浮江河東西逐流風南北信逝波波逝一以散風回復來過暖翠唼鳬鴨遙青逼蒲荷託身一水中漂轉諒靡他深谷忽為陵天運其如何枯瘁同百草無復黃白華植根本無定浮榮安足多萍鄉次趙都諫漸齋晚憩萍鄉館繁隂度短牆鳥栖人亦倦山僻雨初荒新月憐遊子涼雲夢草堂好風三百里吹我上瀟湘華察十一首察字子潛無錫人嘉靖丙戍進士選庶吉士改户部主事歷兵部郎中再改翰林修撰遷侍讀學士掌南院有巖居稿黃才伯云鴻山詩追蹤陶杜卓然大雅王僅初云學士詩一意沖淡調出天成語皆心得表王道思云子潛詩灑然自立於塵壒情纍之意象之超越音韻之凄清不受垢氛而獨契溟涬王元美云華子潛如磐石疏林清溪短棹雖在秋冬之際不廢楓橘窈龔鳴治云韓子云和平之音淡薄愁思之音渺鴻山操和平之音而得窈渺之趣可謂兼才云宗子相云學士詩雅淡有靖節風蔣仲舒學士刋洗浮靡獨秀本色誠陶韋之妙境也惜才具稍乏短於七言袁魯望云先生詩根乎性真妙乎言理沖粹清英不可境象云李本寧云學士五言有陶韋之致鄭平子鴻山幽情秀句不減王孟舒陳卧子云子潛清儉似茅茨下人李章云子潛如坐禪空山微聞鐘磬詩話學士豐於資纎纖務嗇晝夜持籌不知吟咏性情何由超詣乃爾遊善卷碧仙巖落日下空門齋鐘出林莽偶兹叩精廬再宿翠微上舊遊不知處但見松杉長巖虛露氣清坐覺心魂爽月白山窗髙夜靜風泉響遂令寤寐中超然脫塵網雲壑永棲遲願言稅歸鞅夏日山中述懷晚來慕恬曠適意在罷官取涼喬林下晝日恆不冠白雲滿前峰曳杖行獨看有時遇鄰叟烹茶共邀歡山田固云薄嵗入亦自寬達人貴知足吾生永相安僅初移家湖上有作和韻贈之城邑豈不美生事在田廬移家就所安正當長夏初壟上刈舊麥園中灌新蔬寧恤四體勤將期方寸舒入門謝鄰里幸託仁者居湖光近林牖水月淡清虛因適魚鳥性遂於塵迹疏開軒聊種竹閉户兼著書豈羡衣食饒但喜嵗月儲達人能固窮朝夕恆晏如願言日相過多聞時起豫五月望夜與諸君山中再酌和僅初韻仲夏苦晝永薰風起將夕圓景海上來照此山中客坐令微暑消兼使衆纍釋興至時命觴露下復移席因耽水竹居遂同魚鳥迹盤遊豈忘返玩物聊取適臺空人影疏夜靜潭氣白參差樹杪峰歷歷辨咫尺超然悟真境萬物一虛寂晚至湖上和僅初韻山中讀書罷來憩澄湖濵緑隂暗溪路草堂靜無塵平生滄洲意煙波夢垂綸石梁度落景花渚藏餘春間情狎魚鳥悠然適吾真雲天淡晴霽空水明衣巾未遂乘桴願徒懷江海人宿玉陽山房和僅初韻返照明溪梁深松晦夕景岩卧符夙期雲隂石牀冷因投物外心遂入清虛境天寒木葉疏月落山房靜然燈獨不寐秋宵一何永明發從此辭白雲鎖蒼嶺秋日觀稼樓曉望日出天氣清山中悵幽獨登髙一眺望風物凄以肅流水映郊扉炊煙散林屋秋原一何曠薄隂翳叢竹時聞鳥雀喧因念禾黍熟悠悠沮溺心千載猶在目秋晚過英姪園居野曠秋氣髙丹楓映茆屋農家各欣欣門外山田熟相邀具雞黍悠然入深竹風物日蕭疏但見籬畔菊賞心愜所期勝事良已足落景照湖光孤亭暝巖麓寄蔣子雲我家大江南君家大江北平生㺯篇章白首不相識曩聞大雅音因窺作者閾一從罷官歸壟上親稼穡口誦南華經意象欣自得有時江月來照見天地色神交入夢寐道逺安可即雁去為寄書殷勤問眠食秋日施子羽姚山人見過掃徑秋色佳衡門遲來客山厨薦園蔬戀賞淹日夕荒臺蔭叢桂徙倚對巖壁夜靜人意間潭空月華白信宿愜所期去住欣自適養生慕彭聃學道窺莊易願言保微尚嵗晚成三益僅初以詩見寄次韻答贈地僻畏風雨入春長掩扉一從還山後又見梨花飛世事多貝錦故人猶布衣瑶琴勿輕奏山水知音稀屠應埈七首應埈字文升平湖人嘉靖丙戍進士選庶吉士改刑部主事調禮部歷貟外郎中仍改翰林修撰升侍讀進春坊右諭德有蘭暉堂集俞汝成云漸山詩明爽俊偉卧穆敬甫云屠詩深重不浮得唐人應制體陳子云屠公典麗流暢亦足名家如李舒章云文升風姿間麗玉樹風前是户庭佳物詩話諭德取材六代具體初唐爛若春葩將以秋實是衆作之有滋味者贈袁子永之戍湖州弱齡事篇翰與子諧所歡同芳握蘭茝偶德璵與璠彈冠入鼎門振衣陟華軒皇心茍豫顧白首諒無愆風波起中道行路一何難子行戍故越豫留滯幽燕孤雲易流邁獨波不成瀾艱危各異勢繾綣何由宣贈子别鵠操報我以孤鸞贈內良時飭徒御豫當逺行遊上堂戀慈親入室語好逑王臣奉時役不得顧晨羞攜手再三歎出門悵悠悠室中四五雛眷眷何能留逺期在終歲忽往增離憂離憂安可任迢遙隔辰參蓰蓰雙鯉魚一浮而一沉楚橘不北徙越禽有南音贈子明明鏡可以鑒我心馬上贈武舉生金寶有序金寶以嵗庚辰舉武試時學士石公珤為考官今草年餘矣猶以敝衣走風塵中兵憲陳君令護豫行豫憫之為賦長句翩翩飛騎突且雄槖垂七尺髙麗弓向豫長跪馳素封來自天津陳長公感君來緘重君使汝才且雄者誰子云是熊峰門下士緋衣已隨塵土緇壯心尚逐風雲起長公好士輕黃金求才不憚幽與深幕下立談收劇孟坐中飛檄佇陳琳白髮自知無長物清商猶自有哀音我聞其言感且歎古來相士輕貧賤驊騮豈少伯樂無世上紛紛寧足羡曽冰皚皚黃河枯䇿勳報恩真丈夫插貂橫玉盈上都封侯之骨汝有無贈汝腰間金僕姑贈同年謝子儒致仕歸蜀子真棲谷口潘嶽賦間居長揖辭明主為農返故廬雪消巴嶺出天入錦江虛莫待揚雄老潛夫早著書趙武庫元實移居賦得堂字髙士便疏曠居臨御苑傍開尊秋月滿列樹夏雲涼水鏡搖朱户風琴奏石房登樓新有賦王粲謝升堂漫興南風吹晝沙霧黃逺在燕臺思故鄉火雲炎日暑三伏江檻野亭天一方即愁蠅聲惱饒睡况有客子來相妨行歌抵暮遲明月柏林露葉鱗鱗光鏡光閣雨鏡光閣在帝城邊遙控西山奠北川忽有風雲來絶塞坐看雷雨下諸天微茫野色俱堪畫漭沆中流好放船東下林塘更幽絶江南秋望此依然王格一首格字汝化京山人嘉靖丙戍進士選庶吉士出知永新縣升刑部主事調户部歷貟外郎中出為河南僉事會南巡行宫火逮獄削籍久之授太僕寺少卿有少泉集顧華玉云少泉取材于選效法于唐諸體皆工詩話少泉矢口信筆不費推敲合作者寡并非洞庭漁人之比南風自此繼夢澤而代興者鮮矣燈夜曲千金一刻此芳春况復天邊月色新曲巷小橋隨意去明燈何處不留人陸粲八首粲字子餘一字浚明長洲人嘉靖丙戍進士選庶吉士改授工科給事中坐劾張桂謫都勻驛丞遷永新知縣有貞山稿顧元言云給事與屠文升袁永之王汝化同時入館並有盛名亦李唐四傑之流詩話嘉靖間元老類皆延攬賔客雖貴溪分宜亦然惟張桂專與文士為讐丙戍庶常一筆畫掃貞山又多論劾困抑終身然晚極田廬文酒之樂菽園著述傳誦藝林比之二柄臣孰得孰失耶擔夫謡擔夫來擔夫來爾何為者軍當差朝廷養軍為殺賊遣作擔夫誰愛惜自從少小被編差垂老奔走何曽息祗今丁壯逃亡盡數十殘兵渾瘦黑可憐風雨霜雪時凍餓龍鍾強驅逼手摶麥屑淘水餐頭面垢膩懸蟣蝨髙山大嶺坡百盤衣破肩穿足無力三步回頭五步愁密箐深林多虎迹歸來息足未下坡郵亭又報官貟過朝亦官員過暮亦官貟過貴州都來手掌地焉用官貟如許多太平不肯恤戰士一旦緩急將奈何噫吁􅐵一旦緩急將奈何贈别王直夫二首商飈激疏牖蟋蟀鳴墻隂志士恆感秋况乃違所欽之子役王事逺適閩江潯攬衣起追送渺彼川塗深少小從子遊方軌馳文林時去志願違素髮忽滿簪撫景慨今昔惻愴情難任願言顧離索惠我瓊瑶音威鳳天際翔潛虬澤中蟠嚴子時閉肆貢公乃彈冠顯晦豈必同各以性所安子行樹逺績奮身青雲端鄙人棲蓬藿蹇拙聊自完丈