金氣深蕭瑟叩虚牝梧楸半離披朱華日就隕風急度離鴻氣嚴感飛隼皎月正舒遲羲輪漸縮窘砧聲動四鄰薄寒侵席筍清景誠足嘉惜此嵗遒盡況復愴松楸欲賦思歸引鍾庚陽一首庚陽字長卿秀水人隆慶戊辰進士除太平推官入為大理評事遷工部主事厯貟外郎中出知鎮江府謫知廣徳州終刑部貟外有焚餘集劉在南直指遷郴州余亦謫守廣徳同發潞河投贈繡衣使者下蘭臺愁説雙旌潞水開自是聖恩寛逐客却從謫宦見仙才山過衡嶽孤帆轉路入瀟湘鴈影回余亦南行賦歸去秋風天末幸追陪唐邦佐二首邦佐字惟良蘭谿人隆慶戊辰進士知泰和如皋儀真三縣入為刑部主事謫兩淮運司判官轉贑州府通判遷知光州有比部集感興蟠曲惡木根不植太山岡婀娜孤生竹抽梢淇水旁佳人好脩飾被服素羅裳感兹帛鴈㑹得充君子房絲蘿引長蔓琴瑟淨髙張合懽在令徳容色豈足揚塞下曲曽隨驃騎度渾河雨雪天山夜負戈莫謂歸家貧到骨黄沙白骨不歸多張元忭一首元忭字子藎紹興山隂人隆慶辛未賜進士第一厯官左諭徳兼侍讀有不二齋稾杜轄巖訪吳公度杜轄巖中人曲江舊同席未折彭澤腰早著東山屐栖心老氏書結廬武夷側晴峰萬㸃青雲溪幾條白𤣥關夾長松丹房架危壁巖頭露可餐巖下芝可摘猿鶴時為羣車馬杳難即我本丘壑人聊作金門客煙霞夙同好出處偶殊迹諦觀聲利場何似神仙宅四十已無聞百年亦瞬息徒然赤松子巢居鍊形魄明發出閩嶺題詩訂泉石鄧以讚一首以讚字汝徳新建人隆慶辛未賜進士第三厯官吏部右侍郎贈禮部尚書諡文潔有佚稾思歸星河雲氣淡茰菊露華清宦況慵兼病鄉愁斷又生入秋偏逺夢逐日計歸程南鴈空中唳能禁此夜情郭子章二首子章字相奎泰和人隆慶辛未進士厯官都御史巡撫貴州進兵部尚書有閩艸留艸蜀艸浙艸晉艸楚艸黔艸等集詩話青螺敭厯外臺而著書不輟詩嫌合格者少然勝於輭熟者多紀夢西南欃槍明占在川之播何哉井厎鼃不知有漢大黔中久愉恬崇朝忽摧挫聚黨嘯綦江一倡乃百和城市走豻豺平原起堀堁天子赫斯怒命將出右个猥予在田間未許支離卧馳驅竹王疆迅速等轉磨夜夢壯繆侯車騎儼相過倒屣延之入席分賔主坐論賊無足虞粃糠易揚簸巢幕暫偷安積薪以待莝及余入八番次第宻捜邏衝風籜乍卷利匕粉同挫豈専帷幄謀一一神所佐從此半壁天蠻僰始退愞剙祠敬事侯擊牲進香穤誰為報侯功銘詩我所作舟中三春滯水濆魚鳥狎成羣江濁流新雨山晴歛薄雲村舂幽澗急岸艸夕陽薰何處城頭角偏令倦客聞劉克正一首克正字懋一從化人隆慶辛未進士改庶吉士授檢討春雪乍覺輕寒薄太空凍雲舞絮一宵同㸃成簾幕渾成雨飛入園林不待風萬里江山春寂寞九重宮闕玉玲瓏仙郎天下聞髙調一曲誰能和郢中郭子直一首子直字舜舉崇徳人隆慶辛未進士除行人厯官福建按察副使采菱曲采菱復采菱采采日已暮貪看馬上郎迷却花間渡侯堯封二首堯封字欽之蘇州嘉定人隆慶辛未進士授刑部主事改四川道御史厯官福建㕘政有鐵菴遺稾第一禪林自是禪栖第一林萬松迴合白雲深逺看麋鹿不知數欲問禪居何處㝷中天日月遞朝暮下界山河自古今暫憇便疑塵世隔幾人曽此一投簪劉虞䕫一首虞䕫字直卿髙平人隆慶辛未進士改庶吉士厯官太常寺少卿兼侍讀學士掌翰林院事苦熱行燕山虚傳千丈雪昔乃苦寒今苦熱苦寒尚可禦苦熱安所逃寒有重裘奥室足自庇熱雖袒裼心煩勞炎風吹埃沸四野火雲布空日如赭長安衮衮車馬塵驅馳道路何為者吾思仙人乃在閬風岑水晶宫闕琪樹林安得從之御風吟攬子之袖開我襟念此已足清人心吁嗟炎蒸三伏無嵗無發狂大呌胡為乎周光鎬二首光鎬字國雍一字耿西朝陽人隆慶辛未進士除寧波推官陞南户部主事改吏部厯郎中出知順慶府陞四川副使轉㕘政遷陜西按察使擢僉都御史撫寧夏入為大理寺卿有明農山堂彚艸大梁道上眺望中原路逶迤入大梁風塵馳朔騎節序改青陽衛水浮煙黒沙河落日黄愁来看短鋏猶帶薊門霜秋懐靈關秋色白榆多九月霜風黒水河天外鴈鴻嗟阻滯籬邊松菊怨蹉跎南来卭塞無烽燧西去臨洮走槖駞此日三秦憂不細禁中親詔出亷頗吳中行一首中行字子道武進人隆慶辛未進士改庶吉士授編修以建言廷杖為民㝷起用遷右中允厯洗馬管司業事進侍讀有復菴集詩話江陵奪情事在萬厯五年七月迨十月之朔彗星見大内火於是既望三日吳公疏上次日趙檢討用賢疏上又次日艾貟外穆沈主事思孝疏上江陵怒不可止而諸公均受杖矣方杖時鄒進士元標疏復上一時士氣持正若是許文穆以庶子充日講官為吳趙二公餞鐫玉杯一銘曰斑斑者何卞生淚英英者何藺生氣追之琢之永成器以贈吳公犀杯一銘曰文羊一角其理沈黝不惜剖心寧辭碎首黄流在中為君子夀以贈趙公玉杯今不見犀者為吾鄉何少卿㽔音所得余甞飲此作歌賦得露凝仙掌絳闕秋容靜金莖露氣長夜深方湛湛日出轉瀼瀼共喜仙人掌能渟玉女漿願持方聖澤沾灑徧遐荒史鈳一首鈳字汝和餘姚人隆慶辛未進士改庶吉士授編修春晴春光二月滿皇州半逐桃花入水流何事王孫歸未得東郊芳艸自含愁丁元復一首元復字見心長洲人隆慶辛未進士除知陽信縣擢山西道御史厯浙江布政司㕘議有片玉齋存稾早春過趙凡夫池館幽栖何所定選勝得支硎檻厎泉鳴玉天邊石作屏江梅依磵戸谷鳥浴清泠千丈原頭瀑宜添一艸亭鄭邦福邦福字洪疇上饒人隆慶辛未進士厯官南京太僕寺卿有采真遊稾牛場坡俯身牛場坡仰面臘笳嶺白雞山名帶雨翔老鴉關名入雲猛如穿螺竅中復躋蝸角頂行地雖數舍計天不盈頃從来汗漫遊覯兹殊絶景那知陟宦階巖嶮極無影吳中立二首中立字公度浦城人隆慶辛未進士授禮部主事歸籍起尚寳司丞有吳音浪吟楚歌鳳兮鳳孔操麟乎麟空為世所瑞胡不全其真三山有若木百嵗無故人去覔逍遥子清湘采白蘋舟行白下江天澹秋色斜日照孤篷漁艇沿門繫蒹葭到處通鳥飛帆影外人在鏡湖中始覺煙波叟浮家趣不窮薛夢雷二首夢雷字汝奮福清人隆慶辛未進士厯官雲南按察使有彩雲集發三山倦遊萬里欲投閒未斷塵縁更出關七十二程重屈指夢魂何處不三山夜次弋陽風塵何事只棲棲楚水茫茫去鳥低落日漸看人影盡平沙如雪弋陽谿熊敦朴一首敦朴字茂初内江人隆慶辛未進士改庶吉士厯官貴州布政司㕘議有謫居稾得趙汝師太史書章臺猶旅食珍重故人書自是飄零久非關記憶疎野花紅更發官栁緑仍舒浩蕩乾坤意吾生總不如馮時可七首時可字敏卿松江華亭人隆慶辛未進士除刑部主事改兵部厯貟外郎中出為貴州提學副使再補四川提學副使調廣西湖廣㕘政有北征西征金閶石湖巖棲雨航等集陳卧子云吾鄉元成可方吳門劉子威詩話元成詩極為後來詩人所詆就全集而觀甫田彌望稂莠汙莱獨五古一體尚有遺秉滯穗可供捃拾以比劉子威翻覺勝之齋居雜述二首兔狡能營窟鳩拙亦居巢兕虎入帝苑麒麟走空郊玉石貌難分金錫質易淆三黜不必愚九遷豈必豪屈伸由好惡人生在所遭鴻也費歌噫雄也費解嘲何如與化遊小大並逍遥白龍下清淵漁者射其目白龜使清江卜者刳其腹元君違神夢上帝惡魚服風波一失所雲雨迷牽復芳艸化為芻苦菜葅為蓄世事如轉蓬人情多反覆冉冉百年中愁居何能淑戊戌歸田雜感二首箕斗不共垣有采相為光蘭蕙不共根有氣相為芳奈何同居者各自生肺腸一笑亦見疑片語含鍼鋩不能相慰勞安望相頡頏長林知天風大埜知天霜人生不相知何用接杯觴北風何其涼霜霰相與期薄暮侵衆卉芳鮮漸已辭𤣥髪不堪秋忽覺變青絲翩翩飛蓬征愴愴遊子思浮雲一出山安知其所之故交皆已貴故心誰為持酌水置金罍為辨澠與淄送張孝豐浮雲不可駐遊子不能留驚飇逐駭駟嵗月去何遒禦寒安得裘濟河安得舟客處無與懽寧不思故丘常山道中遇雨東山詠零雨感彼歸途事今兹賦愁霖行役我伊始􅀢􅀢業不堪滂沱末由止嶃嶃山彌髙油油雲未已我車淖方掀我僕顛莫起蜎蜎蠋蒸桑肅肅鴇集枳苦哉逺征人重山復重水建陽道中趨程苦行遲遇景苦行速清晨發建陽重霧若雲簇載馳且一舍始能豁我目清溪映明沙茂樹間修竹千山開且合煙翠爭相逐飛梁若垂虹去艇如遊鶩竟日抵甌寧應接難更僕人逺意如何良遊偏恨獨方揚一首揚字思善歙人隆慶辛未進士厯官杭州知府有初菴稾金山虚閣疑無地琳宮别有天江空萬籟發僧定一燈懸七澤吞吳楚孤峰自嵗年乗風興不淺髙眺已冷然劉伯淵一首伯淵字靜之號念庭慈谿人隆慶辛未進士除泰興知縣遷工部主事厯貟外郎中出為江西按察副使以病致仕歸年百餘嵗卒有灌息亭集詩話念庭於隆慶五年釋褐萬厯十六年即引疾歸其八十初度自嘲詩云謂我歸田早假令不早有何好幾人欲歸不得歸黄犬東門添懊惱謂合彈冠出陶令折腰八十日投閒已道宜休三揣分真成不堪七及百嵗思陵遣御史梁雲搆存問念庭猶健步迎於門外謝恩畢騰觚飛爵了無倦容崇禎十一年事也吳興有顯者家居以厚幣乞言介夀念庭笑曰七十上夀毋乃太早乎浙東西相傳以為佳話云園居松際茅簷隔小橋水濵穿圃亦通潮得閒獨坐翻書卷有客相過慰寂寥方竹嵗深裁作杖大壺霜落剖為瓢年豐飽喫青精飯莫問仙山路近遥吳丕顯一首丕顯字希文松江華亭人隆慶丁夘舉人承天府通判有四留軒集詩話希文奕葉青門一官散吏㢘能著聞相傳初補學官弟子製青苧為襴衫衫授兄子太僕炯以及孫曽家有青苧亭至今存焉襴衫之製諸生服之洪武二十四年三易其式而後定用玉色絹布為之寛袖皂緣繫縧垂襦其後漸易以藍罕用布者矣題襟江樓纜解春江曉帆懸碧樹秋開窗千里月近檻一江流草色迎芳渡歌聲逐去舟十年湖海夢猶自媿沙鷗鄭學淳一首學醇廣州順徳人隆慶丁夘舉人選授知縣有勾漏艸園居藥裹供垂老幽棲性獨偏毎㝷髙士傳無復逺遊篇柔櫓村煙外寒江夕照前沙鷗我與汝相對可忘年梁岳一首岳廣州順徳人隆慶庚午舉人官知州暮春燕京懐歸長安春盡落花多越客思歸意若何節序幾從愁裏變家園頻向夢中過西京形勝雄三輔北鴈音書隔九河燕市酒罏堪取醉莫將留滯起悲歌明詩綜卷五十六
