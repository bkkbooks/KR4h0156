body:
  text: 明詩綜卷五十六翰林院檢討朱彞尊編羅萬化一首萬化字一甫㑹稽人隆慶戊辰賜進士第一厯官禮部尚書贈太子少保諡文懿有世澤編靜志居詩話唐宋科目繁多至明而始終所重惟甲第志科名盛事者首述吉水莆陽而於越山隂自諸文懿大綬而後榜五發邑人居其三焉傳聞三公俱同席硯之友不可謂非盛事已擬此日不再得落景無返輪奔星少回光緑髪不戀人轉眼化為蒼所以志士心努力及方剛恒恐嵗遲暮蘭蕙不得芳膏火還自煎山木亦自戕我謀一以乖終身失其臧大道本希聲至人貴含章豈其魚目珍而登君子堂登髙豈無梯濟深豈無航愚者貴速至聖人寳其常虚牖展素書古人未云亡無為守躊躇徒貽過時傷趙志皋二首志皋字汝邁蘭谿人隆慶戊辰賜進士第三厯官建極殿大學士贈太傅諡文懿有瀔陽詩集早發錢塘曉霧兼天白秋風一葦輕湖吞漁浦闊沙湧固陵平隔座吳山逺揚帆越嶠迎蒼茫思無限天外忽鐘聲贈太僕何石川丈人三徑傍城隈不厭鄰翁日日来雙鶴竹間迎客舞一尊池上為誰開采芝合共商山老作賦仍多洛社才自笑登樓倦懐土暮天回首重徘徊王家屏六首家屏字忠伯大同山隂人隆慶戊辰進士厯官禮部尚書文淵閣大學士贈少保諡文端有復宿山房集詩話宋制祖宗翰墨儲藏於玉堂之署觀陳騤中興館閣前後録道君墨跡俱存此康譽之得題年年花鳥無窮恨盡在蒼梧夕照中之句也迨元而奎章宣文之閣舊典不改明則藏之大内詞臣末由覩矣萬厯九年帝御文華殿宣召入直史臣五人文端居首其餘修撰則沈公𢡟孝張公元忭編修則劉公元震鄧公以讚也既進見示以景陵御筆𤣥兔圖圜以淡墨作滿月胎上有桂枝垂枝下藉輭草兔居其中並臻妙境諭諸臣題詩於軸并得用私印識之閱三日詩成進御自首輔張文忠外凡三十有五人當日諷諫優游不事促迫綵花銀葉賜予便蕃自永宣以来詞林盛事遇此罕矣長陵四馬詩世傳為江陵作今從館課集本正之文端立朝侃侃不阿因一諫官力爭去位風節固不可及詩亦雍容和雅不失正始之音恭題文皇帝四駿圖龍駒鄭村壩大戰胸著一箭都指揮丑丑拔箭天馬徕翼飛龍蹄削玉耳垂筒碧月懸雙頬明星貫兩瞳文皇將士盡羆虎復有龍駒助神武流矢當胸戰不休汗溝血㸃桃花雨壩上摧鋒䇿一功策勲何必減元戎君不見虎士標題麟閣裏龍駒亦入畫圖中赤兔白溝河大戰胸著一箭都指揮亞失帖木拔箭雷鍧鍧北軍来赤兔走黄雲開􅑷身超夾澗䇿足絶浮埃白溝原頭振鼙鼓貫陣穿營猛如虎穆王八駿詎為竒昭陵六馬應難數百戰間關未解鞍箭瘢還向畫圖看只今四海昇平日誰識當年締造難棗騮小河大戰著兩箭胸一箭後右曲池一箭安順侯脫火赤拔箭紫騮馬金駱月朝刷燕晡秣越俶儻精權竒超驤走滅沒當年萬馬盡騰空就中紫騮尤最雄戰罷不知身著箭飛来秖覺足生風北風獵獵吹原野長河氷澌血流赭誰言百萬倒戈中猶有彎弧射鈎者黄馬靈璧縣大戰後右曲池著一箭指揮雞兒拔箭軒后興應龍翔駕天駟乗飛黄迴頭看紫鷰顧影失超光君王神武古来少萬里煙塵一劒掃馬蹄蹴處山為摧何論陳暉與平保揚鞭渡淮淮水清金陵父老壺漿迎從此華陽休駿足山河重整泰階平初入翰林自述生平未知學世路方多岐古人已不作古道猶可追願言對青簡澹慮澄𤣥思宇宙皆吾事一念安可欺譬彼機中素皎潔防其緇譬彼山下石孤貞堅自持文章乃末技富貴非吾期出入感榮遘朝夕承師資逺心在霄漢努力酬明時朱賡一首賡字少欽紹興山隂人隆慶戊辰進士厯官少保兼太子太保吏部尚書文華殿大學士贈太保加贈太傅諡文懿有集薊門行彍騎窺青海天兵出薊門白草邊城暗黄沙塞月昏悲笳風外哽咽咽不堪聞于慎行六首慎行字可逺更字無垢東阿人隆慶戊辰進士選庶吉士授編修厯修撰侍講左諭徳侍讀學士陞禮部侍郎改吏部拜禮部尚書入直東閣卒贈太子太保諡文定有榖城山房集詩話東阿格律和平當正聲㣲茫之時能為是調即以詩髙選亦堪作相晉陽男子行隆慶己巳太原丈夫化為女子歌以識之太原有男子壯烈世所無身長九尺餘白晳好眉鬚自負良家子募作材官徒腰中轆轤劒横擊當路衢并州惡少年見之伏且趨一朝覽青鏡侘傺空堂隅三日不出戸忽然見彼姝綽綽芙蓉顔盈盈玉雪膚蛾眉姢且長髙髻墮馬梳脫我金鎖甲繫我繡羅襦掛我白貂帽珥我明月珠委心懐嬿婉不惜健兒軀昔為雲中鵠今為水上鳬昔者一何厲常關十石弧今者何柔曼巧笑傾城都仰視浮雲馳變化不須㬰茫茫窺元運𤣥黄無乃渝世人但云好不必稱丈夫過雨五月不知暑虚空颯似秋殘虹挂溪水片雨過城樓逺樹斜陽駐深山夕翠流晚涼思枕簟絶愛北窗幽秦淮秋月秦淮岸江聲轉畫橋市樓臨綺陌商女駐蘭橈雲裏青絲騎花間碧玉簫不知桃葉水流恨幾時消送朱養淳太史冊封周藩蓬莱闕下五雲飛桐葉封函出帝畿漢苑花香隨使節河橋栁色上征衣天臨玉署恩偏渥星近銀河夜更輝試向天津橋上望銅街無處不芳菲送張洪陽學士請告南旋長河南下水曽波吳楚青山枕上過行到潯陽江口望應憐秋色故園多少年行錦帶珠袍緑臂韝相逢盡說富平侯南山夜獵春城晚繫馬新豐舊酒樓陳于陛一首于陛字元忠南充人隆慶戊辰進士厯官太子太保禮部尚書文淵閣大學士贈少保諡文憲有萬卷樓稾宣廟御筆馬寳繪傳神駿權竒尺素收蹄攢雙碧玉文散五花虬赤汗當沾臆黄金為絡頭天閑今萬匹何必按圖求張位一首位字名誠南昌人隆慶戊辰進士改庶吉士授編修遷司業以糾江陵奪情謫徐州同知後累官少保兼太子太保吏部尚書武英殿大學士諡文端有叢桂山房彚稾詩話文端以持正忤江陵詩頗有憂危之語其詠射鵠云方寸能幾何當此亂鏃投冇感其言之也既罷相於東湖杏花村建閒雲樓吟眺自娛晚探青原之勝汎舟螺川野服箯車登覽竟日老僧不識為宰相題詩懐鄒魯瞻門人胡廷宴守吉安從寺壁見詩始知之是亦佳話七夕塞月催砧急天風襲袂深星河良夜色牛女隔年心莎逕流螢度花隂促織吟平生江海意荏苒二毛侵裴應章一首應章字元闇清流人隆慶戊辰進士厯官南京吏部尚書贈太子少保諡恭靖有嬾雲集豐嶺即事倚仗危峰上煙霞嶂幾重逶迤盤古道絶勝引仙蹤露滴晴天雨雲低半嶺松蓬壺何處是天際一聲鐘范謙一首謙字含虚豐城人隆慶戊辰進士厯官禮部尚書贈太子少保諡文恪有雙柏堂集初入翰林自述聖人啓元運應龍協昌期萬物快先覩而我逢兹時抱䇿獻天門鴻漸修羽儀木夭肆宏敞玉軸陳參差石渠發中秘虎觀探幽竒淵源接師友得失隨箴規分隂期共兢古道還力追願言謝紛華兼以息驅馳但令微忠效無求虚譽垂庶幾大造化於以酬毫釐坐見乾坤泰我亦贊無為習孔教一首孔教字時甫廬陵人隆慶戊辰進士選庶吉士厯官南京吏部右侍郎將進酒將進酒客莫辭玉交杯金屈巵主人勸客揖且讓客言我飲本無量有如法宮置酒監在前史在後此時徑醉不及一斗州閭之㑹六博投壺男女雜坐盱眙歡呼爾時醉可兩壺日暮酒闌合尊促席履舄交錯杯盤狼藉羅𥜗襟解微聞薌澤當此時也能飲一石欷戲乎酒極則亂樂極則悲萬事盡然髙陽之徒安足為書有豐刑亦有酒誥舌出禍入君子所悼主人休矣職思其居三爵不又言毋我渝田一儁一首一儁字徳萬大田人隆慶戊辰進士厯官禮部左侍郎有鍾台遺稾遲鄭郎不至幽齋淨朝塵崇館紛晝靄涼葉隂已深疎花落猶在美人来不来搔首空相待渺渺望河干青山出雲外韓世能一首世能字存良長洲人隆慶戊辰進士改庶吉士除編修厯修撰侍講右諭徳陞國子祭酒南京禮部侍郎召入兼侍讀學士有雲東草送友人南還垂栁千條拂御溝上林春色鳳池頭如何張翰多歸興不待秋風已倦遊沈思孝四首思孝字純父嘉興人隆慶戊辰進士累官都察院右都御史兼兵部侍郎贈太子少保有行成郊居西征陸沈諸稾溪山堂吾美堂等集詩話先生封事尤觸江陵之怒杖畢即加鐐鏁復下獄三日始僉解發戍既抵嶺南巡撫欲殺之以媚政府遽以尺符召之行至恩平先生䄂七首示縣令曰巡撫必欲殺我我當與俱斃不然伏尸軍府中令天下士大夫皆知巡撫所殺也縣令宻以告巡撫得不死蔡副使文範作壯哉行送之其歸也胡元瑞贈詩云荳蔲花前千里夢桄榔樹下十年人先生頗好賞鑒書畫言者遂劾其以千金市王右軍真蹟一卷南箕貝錦可以意成也詩入瑯琊四十子之列晚交姚叟士粦未免間作嗸牙語喻邦相同喻羨長至集恕醉軒白雲邀上客黄葉繞貧居缸面沽来酒槎頭釣得魚山川連越絶雞犬數秦餘一日千秋意相看老不疎思家長卧鳳城隈鄉心日夜催小人猶有母明主漫憐才木葉千山雨江湖八月雷倚閭秋欲盡底事不歸来清寧兩宮灾臣督諸軍入救上使小黄門賜以肴四合酥與果稱是中有鳯仙橘小紅梨佳甚乃藿食者所未嘗敬賦此以紀之春盤分尚食天語遣黄門橘豈維揚貢棃堪大谷論股肱悲未及口腹媿知恩獨荷焦頭賞能無負至尊出都門天髙落葉繁匹馬上東門固寵寧臣節完名是主恩青雲雙闕迥緑野幾家存滿篋匡時草攜歸覆酒尊賈三近一首三近字徳修嶧縣人隆慶戊辰進士選庶吉士改授吏科給事中轉戸科都給事中遷太常少卿改督四夷館厯大理左右少卿南北光禄寺卿以右僉都御史撫保定入為大理寺卿轉兵部右侍郎有東掖漫稾于無垢云石葵歌詩清爽疎宕咳唾立成冬日登嶽遊目髙寒處羣山擁岱宗登封迷漢艸徙倚有秦松萬壑煙嵐合諸天紫翠重肩輿明月下上界已聞鐘邵陛一首陛字世忠餘姚人隆慶戊辰進士改庶吉士歴官刑部左侍郎過拜將臺懐古千載遺蹤表故臺殘雲縹緲夕陽開三川佳麗興王地百戰勲名大將才此日江山空草木當年壁壘半蒿莱登臨不盡英雄恨風急寒沙過鴈哀沈懋孝一首懋孝字幼真平湖人隆慶戊辰進士改庶吉士厯南京國子司業謫兩淮鹽運司判官起河南巡撫未任有淇林雅詠詩話晴峰樂府句摹篇倣不脫厯下窠臼餘體斐然能於同中見異北固登望北固樓前一笛風碧雲飛䕶建康宮江南二月多芳草春在濛濛細雨中朱孟震四首孟震字秉器新淦人隆慶戊辰進士除南京刑部主事厯郎中出知重慶府陞河南按察副使累官通政使以右副都御史巡撫山西有郁木生全集任少海云使君詩閎鬯瀟灑了無塵俗氣陳于韶云秉器才情婉附流調鬯發若孤桐朗玉自冇天律明張助甫云秉器詩爾雅深厚縁情達理吳卿云秉器負用世才以餘力為詩諸體錯陳意匠所極才亦副之陳玉叔云秉器詩本於才體氣髙妙詩話秉器津津以詩家自許其在南曹結清溪社一時名士聲應氣求所緝楮談續談餘談述先喆之舊聞綜同人之麗句可謂好事也已和答正甫幽意苦不愜清歡良未期如何汾水上忽枉故人詩芳草王孫路朱華帝子池相思隔年嵗河漢正髙垂哭孔汝錫先生墓殘嵗龍蛇逼新阡雉兔過露隨朝槿盡風入暮蟬多坐失千鐘酒情傷九辯歌夜臺無白日一慟欲如何春日金沙寺訪羅孝亷元我春水金沙是舊遊春風黄鳥況相求馬蹄一逕穿雲入花氣千林帶雨浮詞客雄文巴蜀檄故人清興剡溪舟草堂蹤跡今猶昔好為狂夫十日留謁張桓侯廟英姿颯爽氣雄哉恍惚晴霄風雨来一代君臣元伯仲千秋祠廟倚崔嵬乾坤已限三分業熊虎空懐上將才正是雲安春月夜杜鵑啼徹不勝哀龔勉一首勉字子勤無錫人隆慶戊辰