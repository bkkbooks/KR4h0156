body:
  text: 明詩綜卷二十四翰林院檢討朱彝尊編馬愈一首愈字性和臨朐人宣德丁未賜進士第一仕至禮部右侍郎兼侍講學士有淡軒集題髙漫士雲山圗白雲縹眇亂山深最喜幽居傍翠岑茅屋幾家松栝繞石梯五丈薜蘿侵門前流水通南浦村外長橋接北林有客抱琴何處至祗知來共歲寒心蕭鎡二首鎡字孟勤泰和人宣德丁未進士纍官太子少師户部尚書兼翰林院學士有尚約集靜志居詩話蕭鵬舉學詩於劉槎翁當日宋景濓烏繼善劉仲修交稱之宫師鵬舉之子家法不墜樂隱為尹克俊賦行愛溪中水坐愛溪上山冨貴非所願蓬門晝常關清風天外來入我窗牖間豈無一尊酒可以銷憂顔葉落驚秋徂鳥啼知春還既忘是與非寧復虞險艱雅志同如此髙蹤安可攀題九鷺圗宣德年間邊景昭彩色翎毛稱獨步近時林良用水墨落筆往往皆天趣鴛鴦鳬鴈清溪流寒鴉古木長林幽間來得意即揮灑一掃萬里江南秋此圗九鷺真竒絶散立清煙乍明滅日長坐久看轉親飄來點點青天雪翺翔霄漢殊不驚欲下未下渾有情濳蹤獨趁水邊食延頸忽向蘆中鳴吁嗟林生精藝有如此座客見之誰不喜洞庭湘渚在眼前暝色慘淡涼飇起方今聖主覃恩波四海山澤無虞羅悠悠羣鷺各自適雖有鷹鸇奈爾何林文一首文字恆簡莆田人宣德庚戌賜進士第三纍官太常寺少卿兼翰林院學士贈禮部右侍郎諡襄敏有淡軒集謝山子云公詩多韻外之致與絅齋相去不逺秋景水巳澄秋色峰看淡落暉鴈投寒渚下漁逐暮潮歸古寺初鳴磬孤城半掩扉行人從喚渡舟子去如飛方熙一首熙字孟明莆田人宣德庚戌進士改庶吉士出為潮州府通判古别離愁心不自聊撫我孤桐琴絲桐感人意絃急無好音拂衣起歎息逍遙獨行吟逺望别離處江空煙水深徐有貞二首有貞初名珵字元玉吳縣人宣德癸丑進士選庶吉士授編修厯春坊諭德擢僉都御史天順初用奪門功拜華蓋殿大學士兵部尚書封武功伯未幾下獄戍金齒尋赦還卒有武功集詩話武功羽林之作源出右丞羽林子二首珠袍年少子名冠羽林中獨佩流星劔雙懸明月弓陪遊向何處還入華清宫羽箭插腰間騂弓臂上彎自從來日馭長得侍天顔借問歸何晚長楊射獵還李賢一首賢字原德鄧州人宣德癸丑進士授吏部主事歷郎中擢兵部右侍郎改戶部旋改吏部進尚書入直文淵閣終少保兼太子太保華蓋殿大學士卒贈太師諡文逹有古穰正續集詩話內閣紅芍藥一本宣宗移自南大內植焉代宗增植二本左純白右深紅七年未花裕陵復辟徐武功有貞許襄敏彬薛文清瑄李文逹賢同時入為學士中一本恰開四花其一久而不落既而三人皆去惟文逹獨留明年春萌芽左二右三中一本甚多而彭文憲時吕文懿原林敏文劉文安定之倪文僖謙錢文通溥李侍郎紹黃講學諫同升學士凡八人文逹因約花時共賞夏四月開八花是日講學不至明日復開一花僉謂講學當之文逹乃主賞花會賦詩者四十人裒成一集蓋自宣德八年本院有文淵閣賞雪詩未有若是會之盛者至正德中大學士梁儲楊一清猶有詩倡和嘉靖初長洲陸粲為庶吉士賦詩云此花初種自宣皇百曲雕闌七實妝玉堂學士看花早賦成藝閣留詩草度其時遺種尚存其後不可問矣城上烏城上烏啼月將落城外秋風起寥廓烏聲啼罷露華晞曙色蒼涼照長薄都門車馬集如雲離筵勸酒何殷勤酒闌人去棹歌發明日烏啼何處聞吳髙一首髙字尚志歸善人宣德癸丑進士除刑部主事厯員外郎遷福建參政黃洞山惠陽十萬家采薪皆此處荷葉蓋頭歸知是前山雨薑洪一首洪字啓洪樂安人宣德癸丑進士改庶吉士厯修撰有松岡集題畫碧山髙樹雨初晴風動懸蘿雜鳥聲簾幕晝垂茅屋靜幽人何處斸黃精王誼六首誼字內敬紹興山隂人宣德初待詔翰林預修國史以子佑貴封工部右侍郎詩話內敬兄弟皆能逺師太白一時之希聲也古意獻玉無良媒漂淪寡歡豫壯齡巳非昔馳暉日西騖嘉木無榮柯修條亦成故一感式微吟吁嗟在中路關山别意蓮葉未青時沙頭話别離舟行期早發日晏未曽移遲回一何久念我平生友莫問去程遙且盡杯中酒君今住何處萬里長城路路逺人迹稀黃雲黯朝暮隴阪厯欹傾雙輪不暫停時聞嗚咽水流作斷腸聲驅車無少息又度長蘆北八月鴈南飛天山草俱白橫笛在髙樓關山月裏愁離人聽此曲白盡少年頭魏楚白云學供奉長干詞得其形似九日稽山懷古山水自如昨古人今復誰雲煙謝家墅松柏禹陵祠聖代身全老秋天景易悲毋將搖落意相對菊花枝班媫妤玉簟夜涼新秋蛾暗裏顰如何天上月獨照掌中人宗子相云幽思無限春思山映簾櫳水映窗浣紗人在苧蘿江年年三月梨花雨門掩東風燕子雙畫梅揚州詩閣掩芳塵萬蕚千葩冷照春十里珠簾一聲笛東風腸斷倚樓人王懌三首懌字內恱紹興山隂人誼之弟正統初官溧水知縣江南意郎居橫江口妾住橫江上生小慣風波蓮舟喜搖蕩蕩舟蓮花灣花紅照人顔舉頭見郎來低頭隱花間花疏不成隱相見還相哂都緣愁思深留連夕陽盡前浦伴將稀那能不相違含情明月下各自棹歌歸班媫妤自失傾城寵花顔落舊紅霜飛金屋冷月照錦帷空侍寢昭陽日休辭玉輦同當知長信妾團扇泣秋風周青士云似劉方平段七娘度曲千金賤凝妝一面紅聲迷銅雀妓豔奪館娃僮白雪飄朱閣香塵散綺櫳淚湔司馬袖腸斷使君驄秋水涵曈潤春山入黛濃弄簫驚紫鳳拂軫怨離鴻鏡展金鸞月叉橫玉燕風謝娘收鈿匣嬴女掩香筒石竹篸芳髻芙蓉隱繡幪燈然珠樹側人醉錦蓮中粲粲星輝户微微露洗空幾年憐宋玉今夕遇韓馮密意蜂攢蕊芳心蝶戀藂春箋封豆䓻羅帶綰芎藭步障重拋錦門鋪疉綴銅曲闌裝翡翠髙榭噪花蟲鶯睡煙濛柳烏棲月浸桐銀觥休鑿落瓊箭起丁東客散歌屏冷香昏睡閣融日髙春夢覺嬌纈散花緵陵麗京云全首非金荃亦非香奩頗似李長吉惱公之作劉經一首經泰和人宣德中新鄭儒學訓導鳳皇臺崇臺洧水濵昔有鳳皇集朝陽不復鳴荒基徒屹立漠漠飛塵紅萋萋豐草碧鳳兮去不回使我空歎息周旋一首旋字中規永嘉人正統丙辰賜進士第一授翰林修撰進侍講兼左春坊左庶子有畏菴集霜林晚節圗朔風何蕭蕭嚴霜亦浩浩維此嵗載隂羣芳盡枯稿懿彼松柏心堅貞長自保春風桃李花春雨蘼蕪草紛紛競顔色第逞一時好劉定之一首定之字主靜永新人正統丙辰賜進士第三人成化初以太常少卿兼侍讀學士直內閣進侍郎卒諡文安有呆齋集李賓之云劉文安不喜為詩縱其學力往往有出語竒崛用事精當者文安公石云呆齋以淵博之學英敏之才發為章名蓋一時獨於韻語若未解者然義山家居禾川湄義山日對面悵未得登臨此心徒健羡今春雪中來半塗足巳倦顧視萬坡陀茫然莫可辨巖蘿冒飛霙林葉響急霰俯若赴井汲仰疑登塔旋竒觀豈神助寒苦亦吾願日暮抵山麓小溪亂石濺僕夫指龍湫時或出雷電信宿留山間隂晴巳千變仁里固有鄰誅茅從所便嗟我四方人安得長眷戀沈淳一首淳字惟厚嘉興人正統丙辰進士官吏部貟外郎有拙菴集間居天上抽簪萬里回秋風黃菊滿籬開翟公不復為廷尉姑負賔朋日往來劉珏三首珏字廷美長洲人正統戊午舉人除刑部主事厯官山西按察僉事有完菴集王濟之云完菴詩能以眼前語道胸中事有唐人風朱仙鎮嶽王祠郾北師還事巳休憑誰重報靖康讐洛中故國非周土江左新亭半楚囚和議自遺千載辱蠟書空送兩宫愁傷心多少英雄淚付與漳河日夜流泊舟垂虹橋貰酒烹鱸敵暮寒垂虹橋上倚闌干行人笑指詩翁懶不到城中訪縣官梅嵗寒相見在天涯玉色珠光帶露華笑殺玄都狂道士種桃何不種梅花戴璉一首璉南海人正統戊午舉人官訓導以子縉貴贈工部尚書送梁瑾赴春闈江亭日落鷓鴣啼酒盡沙頭惜解攜離思不堪成去住宦情無那易東西清秋野戍聞寒角殘月山城聽曉雞明日思君還北望暮雲煙樹晚悽悽張和三首和字節之崑山人正統巳未進士授南京刑部主事進員外郎升浙江提學副使有篠菴集顧玄言云節之寓目成韻風采蘊藉送劉文羽入京臨岐一杯酒為君歌逺遊人生如浮萍聚散焉能謀落日照大江長風吹行舟江花與江水離恨同悠悠過桐君山霧斷山疑合川回路忽分秋聲兩岸葉曉色萬峰雲旅鴈衝帆度寒蟬隔水聞嚴陵遺迹在我欲問桐君送龔進士文彥雪後關河見鴈稀感時傷别思依依吳門煙月期同醉天路雲山又獨歸官驛暮帆隨雨落江城寒鳥背人飛京華此去誰先逹惆悵丘園只布衣祝皓一首皓字惟清長洲人正統巳未進士授南京刑科給事中升山西左參議轉右參政夜宿無錫辭家無百里離思巳紛紛旅泊今宵始鄉音此地分汀沙籠宿霧星月挂疏雲回首寒山寺鍾聲杳不聞成始終一首始終字敬之無錫人正統巳未進士河南道御史出為湖廣按察僉事有蓬菴觀光紀行等集山家竹籬茅屋似儂家細路緣江盡白沙落日叩門山客至鷓鴣啼上石楠花倪謙一首謙字克讓錢塘人徙上元正統巳未賜進士第三人纍官南京禮部尚書贈太子少保諡文僖有玉堂南宫上谷歸田等稿題白鹿仙人圗百尺松隂石磴重千年白鹿澗邊逢仙人月底吹簫去知向緱山第幾峯吕原十首原字逢原秀水人正統壬戌賜進士第二除翰林編修厯右春坊大學士轉通政司右參議仍入為翰林院學士以母喪歸卒贈禮部右侍郎諡文懿有介菴集李原德云公端謹篤實士也詩有典則音律渾厚無纖巧靡麗之態詩話文懿不以詩名所為古風引伸曲喻不求工而自然精切此有德者之言也古風十首天運無停機造物有消息雪見睍曰消日逢中乃昃飄風固須臾暴雨亦頃刻溝潦寧常盈江河無久溢枯楊華暫生朽壤茵虛植繁英易憔悴病葉早狼籍浮雲能幾時初月豈終夕細推皆自然逹觀又奚惑慨彼聲利徒擾擾竟何益泰終否斯受賁盡剝乃續日中漸西移月盈竟東朒平久鮮無陂往久靡不復樂極悲自來進鋭退恆速安弗持則危滿不損乃覆髙位多疾顛厚味每藏毒至盛當遭衰苦寒必生燠萬事無不然禍福相倚伏通犀為角戕文豹緣皮剝蚌懷珠致剖麝含香被搏翠因羽美殘龜以甲靈灼鸚鵡慧入籠雕鶻鷙受縛鐸以聲自毁膏以明自爍的張弓矢中林茂斧斤斫直木取易摧甘井汲先涸忠直志常蹇聰明命多薄行髙毁或來事修謗或作取禍因天才君子當自度薰蕕不同藏冰炭不同器枘鑿每齟齬蘭艾常嫌忌燕禽肯戀吳越馬匪思冀水投石難入矛遇盾弗利道異不相謀事殊不相為學古而居今落落與時背隂陽匪齊盛日月弗並明五行難俱旺四時豈同更一淵不兩蛟一池無二鯨鷙鳥少雙集猛獸稀羣行秦暴楚乃弱吳強越乃爭鄰薄君必厚都大國始傾左長右斯短首重尾即輕兩雄肯俱立兩貴弗相能讒進衆賢退正消羣枉升四凶如不去元凱何由登保身在明哲吾嗟古人情木從繩則正薪受斧乃析輕重平以衡長短度於尺規矩制方員繩墨司曲直浣布須賴灰攻玉必資石金就礪方利火被水斯熄凡物有相制用之在人識湛露晞於陽冰雪消以日咻出衆楚人齊傅窘無術爇彼滿車薪杯水救奚恤一君子獨愛百小人羣嫉不敵有如斯勢力固難必泮林集飛鶚食椹懷好音惡人謹齋沐承祀亦居歆瓦石變和玉鉛鐡成南金化惡以為美君子當存心愛敬舍吾親德禮悖所事少者或陵長賤者或妨貴骨肉情巳疏而篤朋友義妾媵欺令妻螟蛉剿同氣闒茸列尊顯聖賢皆退避讒諛志得伸方正多遺棄盜跖稱守亷伯夷號貪利不肖謂為賢不才謂為智用人積薪然居髙乃後至足上首顧下冠屨易其位曲鈎榮侯封直絃斃路次黃老先六經大道俱掃地狼莠正繁滋芳蘭亦憔悴本末既舛逆事理斯倒置君子安其常勿為時軒輕懷人置頃筐卷耳采不盈爵祿靡入心飯牛有肥牲左規右執矩方貟豈並成目明非兩視耳聰非兩聽心專使二用智者亦鮮能姚夔一首夔字大章桐廬人正統壬戌進士纍官禮部尚書調吏部加太子少保卒贈少保諡文敏有䖃矗堆稿詩話文敏久領容臺修明禮樂其於先賢祀典聞必舉行因錢長沙澍之請而建祠賈誼之井因章布政繪之疏而樹碑比干之祠因商學士輅之章追封董仲舒等伯爵因左吏部贊之奏而修護李泰伯之塋他若為金華四先生及劉因立祠皆有禆名教自公沒而程敏政建議於前張孚敬順之於後舉凡戴聖劉向鄭衆賈逵何休馬融服虔鄭玄盧植王肅王弼杜預范寧等一十三人從祀孔子之廡者皆罷之真天資刻薄人所為也文敏過忠州弔陸宣公墓賦詩云一讀遺文數行淚拜瞻松柏不勝悲因而訪李吉甫白居易胡旦諸公皆謫此地問有祠否土人為言故有今廢乃檢行囊廩米一石倡之屬州守廣文修舉作詩以勉其成焉可以愧程張諸老也巳下峽瞿塘天下險巫峽勢相連夾岸千尋辟中流一罅天山空無獸迹江逼少人煙唯聽鼕鼕鼓朝牽百丈船韓雍一首雍字永熙吳縣人正統壬戌進士纍官總督兩廣軍務右都御史卒贈襄毅有集江行懷天全侗軒諸老西江北塞嶺南壖奔走風塵三十年勇退未能心巳倦專征才歇夢猶懸自緣衰體纒多病敢向明時話獨賢苦憶鄉園諸大老西風先泛五湖船項忠二首忠字藎臣嘉興人正統壬戌進士授刑部主事厯員外郎中升廣東按察副使改山東遷陜西按察使升右副都御史進左都御史刑部尚書改兵部卒贈太子太保諡襄毅有藏史居集詩話襄毅以功業顯詩文罕傳其里居日結檇李耆英之會月一集於僧房道院中同會者雲南布政司參議金禮敬之四川按察司僉事梅江文淵福建按察司僉事戴祜元吉漳州知府薑諒用真武岡知州伍方公矩碭山知縣包鼐汝和通判楊彥和教授陳蒙福主之者公也會始於𢎞治戊午春所賦詩文文淵彚為一集府學教授新淦蕭子鵬序之比於香山洛社云出清逺峽野望行盡溪中路蒼茫見逺天歸猿啼一作平林開曉日飛鳥入寒煙緑樹江頭驛黃茅郭外田孤懷無限思望斷白雲邊題宋徽宗畫碧桃鸜鵒五國城邊掩淚時汴梁宫闕巳無遺爭如鸜鵒知春色獨占東風第一枝商輅一首輅字𢎞載淳安人正統乙丑賜進士第一纍官少保兼太子少保吏部尚書謹身殿大學士贈太傅諡文毅有素菴集李德恢云太傅詩寫性情雍容雅淡有陶韋風題春景山水愛此佳山水春來景更妍四郊青嶂合孤岫白雲連地迥輪蹄絶峰危石磴懸小橋臨曲澗逹浦接平田鬱鬱林間寺潺潺竹下泉桑麻凝暮藹榆柳繞晴川寶殿凌千尺茅堂敞數椽僧歸西嶺月漁鈞北溪煙倒浸沈波塔間橫古渡船樓髙平見日松老不知年鳥度浮嵐外鷗飛落照邊吟笻芳草徑酒斾杏花天隔岸聞鶯語開軒待鶴旋砌苔深染黛林籟細鳴絃有路通仙境無塵逺市廛家山在圗畫觸目思飄然葉盛四首盛字與中崑山人正統乙丑進士授兵科給事中出為山西右參政纍官吏部左侍郎卒諡文莊有涇東稿詩話文莊中外揚厯不遑寧居而見一異書雖殘編蠧簡必依格繕寫儲藏之目為卷止二萬餘然竒祕者多亞於册府二百年來子姓蕃衍瓜分豆剖難以復聚今披菉竹堂書目譬諸商盤泗鼎要非近代物惜不可得而覩矣詩特餘事選家恆置不録近其裔孫始重鋟刻行之然有德必有言後之學者所當諷誦也題畫緑樹青山漾碧流畫中風景似揚州隔江明滅漁人火出岸髙低估客舟去燕來鴻千古事間花野草一春愁不知誰在紅塵外獨向蕃釐觀裏遊重送徐汝陽繡衣驄馬珊瑚鞭看君文采何翩翩河梁話别未三月天府論功今六年近郭好山碧於玉邊淮逺樹青堆煙歸塗有懷須寄我莫惜便鴻雲錦箋和尚原和尚原頭日未西肩輿來此重攀躋可憐宋主功垂就不道金人計巳迷往事巳隨深谷變青山還與白雲齊道傍草樹凄風起疑是將軍鐵馬嘶曲子驛戎衣脫却下蕭關坐對環泉半日間未是老來筋力倦馬蹄歸自賀蘭山史敏一首敏字德敏淮安衛人一云定海人正統乙丑進士厯官河南右參政嶽武穆祠鄂國英風萬古存當時一死不堪論難將片石補天缺空恨浮雲蔽日昏南渡自安新割據中原誰復舊乾坤至今人過朱仙廟便對斜陽拭淚痕劉昌二首昌字欽謨吳縣人正統乙丑進士授南京工部主事厯員外轉工部郎中出為河南提學副使遷廣東參政有胥臺鳳臺金臺嵩臺越臺諸稿詩話欽謨無題五首不脫元人舊染而世顧稱之昔晉人之譏劉輿也謂輿猶膩近則汙人若欽謨及瞿宗吉楊君謙張君玉之艷詩其不汙人也僅矣春眺端居秉髙志道與黃綺謀耿耿千歲懷安能一朝酬青陽肇嘉節羲馭逝不留樹木發華滋緑葉揚芳柔上有鳴春鳥嚶嚶求匹儔踟蹰不能寐攬衣起行遊況復有良朋分若金石投攜手出西郭眷言山水幽祓除激清波眺彼陟髙丘西北臨廣路巍巍列飛樓誰人為燕會交親結綢繆光景忽西馳娛樂殊未休豈不念合并欲邁路阻修顧望勿復道回身駕輕舟折彼蕙蘭花聊以忘我憂繆天自云是篇特能絶去肥膩八月三日直內閣楊少保延話率口呈此翠玉樓臺映碧虛上皇曽此駐鑾輿當時侍一作官從皆能事只説相如有諌書卞榮三首榮字華伯江陰人正統乙丑進士官户部郎中有蘭堂集丘念先云蘭堂集詩幾二千篇獨無五言古而五言近體亦少蓋非其所長云林良雙鴈圗為王學士廷貴兄廷彥賦林君善畫天下無海注墨汁傾金壺金門承詔屢揮灑餘子碌碌非吾徒既不畫丹鳳棲碧梧又不畫文鴛依緑蒲特作槐堂雙鴈圗涼風颯颯吹黃蘆一鴈俯啄秋江菰一鴈翹首如相呼乘軒恥隨衛懿鶴化舄懶逐王喬鳬吾知林君有深意此圗將以比兄弟槐堂兄弟今二難同德同心本同氣芳名豈但動一時勝事終當傳百世丹青我巳重林君手足誰能似王氏宣王有道美鴻鴈周公多才賦常棣顧豫淺薄敢題詩三月紫荆花砥醉寄隱者曽訪巖棲處金鵝石榻前歌君紫芝曲和我白雲篇火宿燒丹竈煙生種玉田林泉無限好三聘未幡然歸來吟日落春申港雲歸巫子門沙洲半江水楊栁數家村陳獻章二十八首獻章字公甫新會人正統丁卯舉人用薦授翰林檢討卒諡文恭從祀孔廟有白沙集李賓之云白沙詩極有聲韻有風致但世人未之擇耳造林待用云先生詩涵養粹完脫落清灑獨超物牢籠之外而寓言寄興於風煙水月之間蓋有舞雩陋巷之風焉楊用修云白沙詩五言沖淡有靖節遺意然賞識者少徒見其七言近體效簡齋康節之渣滓至於筋斗樣子打乖箇裏如禪家呵佛罵祖之語殆是傳燈録偈子非詩也王元美云公甫詩不入法文不入體又不入題而其妙處有超出法與體及題之外者看俞汝成云白沙詩從擊壤中來當另作一家要之藝林不可無者詩話成化間白沙詩與定山齊稱號陳莊體然白沙雖宗擊壤源出柴桑其言曰論詩當論性情論性情先論風韻無風韻則無詩矣故所作猶未墮惡道非定山比也其云百鍊不如莊定山蓋謙辭爾贈陳秉常逺色霽初景清風振遙林子來入我室弄我花間琴正聲一何長幽思亦巳深願留一千載贈子瑶池音藤蓑新蓑藤葉青舊蓑藤葉白新故理則然胡為浪欣戚扁舟西浦口坐望南山石東風吹新蓑浩蕩滄溟黑須臾月東上萬里天一碧安得同心人婆娑共今夕拉馬玄真看山宫府治簿書倥偬多苦辛文士弄筆硯著述勞心神而我獨無事隱几忘昏晨南山轉蒼翠可望亦可親歲暮如勿往枉是最間人近來飲酒者惟我與子真能移栁間舫同泛江門津紫菊吟寄林時嘉嚴霜百卉枯三徑挺秋菊緑葉明紫英微風遞寒馥懷哉種花人杳在江一曲遺我盎中金南窗伴幽獨時無續騷手憔悴誰當録且脫頭上巾茅柴今可漉秋興西風振庭木虛堂夜蕭蕭攬衣步明月歸鴈雙飄颻天地豈豫獨知音不可招冥心析有合悵望空雲霄有懷世卿時雨日夕來郊原藹新緑白雲被重崖下映寒塘曲情結竹上言魂銷井邊躅三年隔瀟湘書至不可讀題新村書齋壁茅棟依巖靜柴門斫竹通桑榆巷南北煙火埭西東一徑漁樵入孤村井臼同鄰家得美酒吹笛月明中晚步水國秋先至江村晚更幽泥筌收郭索山網落軥輈涼入社門樹隂連渡口舟獨憐經略地吾得放歌遊龍溪寄馬元真我家久住龍溪上説著龍溪便有情荔子不將梨鬬美沙螺羞與蟹爭衡江村婦女蕉衫窄市巷兒郎木屐輕漫與詩多誰和我樽前忙殺馬先生重約馬默齋外海看山春風擬進赤泥洲曽約看山共此遊落蕊忽過三月半先生能復一來不不堪老我癡猶在且喜嬌兒病巳瘳想得渡頭楊栁樹清隂間弄釣魚舟種樹早雨山泥滑屐牙瘦藤扶路入雲斜東原緑映西原白一徑松連兩徑花寒夜試看殘月挂東風須著短牆遮江門亦是東門地我獨胡為不種瓜訪客舟中船頭載春酒船尾閣春沙恰到溪窮處山山枳殼花九日霜前淡淡花瓢內深深酒今日陶淵明廬山作重九贈張叔亨侍御天下原無事勞勞我有心相攜沙上語山月二更深贈釣伴短短蔞蒿淺淺灣夕陽倒影對南山大船鼓枻唱歌去小艇得魚吹笛還歇馬大徑山數家煙火隔林塘一樹寒花晚自香黃葉冡頭聊歇馬鷓鴣聲裏近斜陽東軒獨坐桃花寂寞梨花開山中薄酒三五杯村西有客可人意風雨今朝期不來社中社屋新成燕子來山丹未落野棠開三三兩兩兒童戲弄水扳花日幾回梅花沙籠寒月樹籠煙香徹龍溪水底天斜隔竹林窺未得更尋西路上漁船桃花雲鎖千峯午未開桃花流水更天台劉郎莫記歸時路只許劉郎一度來栁渡頭答鄉友溪南溪北荔支垂五月荷花乍放時忽有酒船邀半路三杯不記主人誰大田看山春泥沒屐大田潮溪北初經獨木橋千丈峰頭望東海三山恰對杖頭瓢留薑仁夫雲去雲來等是浮獨憑髙閣看江流南風莫送東歸客更共江門一日遊彈子磯候默齋不至軍人打鼓泊官船黑霧濛濛水下灘隔岸相呼不相見竹籠牽火上桅竿南雄讀羅一峰記書院文丘墳何處草離離千里湖西夢覺時落日小池橋上路催人下馬讀殘碑鄒吏目書至有作落花遙對石城春半篋殘書一病身茶筅粟瓶供客盡不妨人笑長官貧落花落花半落流水香鳴鳩互鳴春日長美人别我隔江浦欲來不來空斷腸古耶道中有懷翠煙浮隴麥初齊社樹青青獨鳥啼何處相思不相見木棉花下水門西方謨一首謨字昌言歸安人正統丁卯舉人由翰林院孔目擢檢討遊春黃鳥嚶嚶啼水東栁絲千尺繫春風清溪小舫載歌舞滿郭好花紛白紅有酒莫辭今日醉何人却是百年翁請看十畝王孫宅芳草凄迷夕照中嶽正一首正字季方漷縣人正統戊辰賜進士第三天順初以左贊善兼修撰直文淵閣降欽州同知謫戍肅州成化初復官未幾出為興化知府卒諡文肅有類博稿李賓之云蒙泉詩亦雅健脫俗詩話季方謂作詩既要平仄又要對偶安得許多工夫頗以吟詠為苦而天眷之作亦復成章營建紀成詩自序矢眷美營建也天眷皇明誕命髙祖俯建萬方定都江滸如龍斯蟠如虎斯踞以朝以會以享以祀逖矣厥謨欽于世世一天眷皇明亦啓文祖為厥孫謀聿又胥宇碣石之西太行之東有嚴厥宫四海是同二維帝即祚夙夜顧諟神既受職民亦綏止乃繼乃述乃經乃營戢此土工為萬國宗三有赫朝堂有翼廟廷瑣瑣公府總總偕興士方耕矣女方筬矣曽是不驚奏功成矣四匪臣之功伊民之力匪民之力維帝之則帝曰匪豫文祖之德天相文祖爛其營室五劉珝一首珝字叔溫夀光人正統戊辰進士纍官太子太保户部尚書兼謹身殿大學士卒贈太保諡文和有古直先生集徐時用云公書法飄逸行草尤長詩文清新流麗無矯飾語能李賔之云公於詩興之所到筆不閣而無毫髮點綴呻吟之病詩話文和詩率意塗寫不事翦裁亦間有合格處其送龍溪潘榮宗用詩云同年喜有九尚書九尚書者睂州萬文康安循吉歷城尹恭簡旻同仁博野劉文穆吉祐之華亭張莊懿鎣尚文三原王端毅恕宗貫莆田陳康懿俊士英其二則潘與劉皆正統十三年同榜也宗用仕為南户部尚書八人皆有易名之典惟潘闕焉白頭鳥殘蓼枯荷八月秋枝間獨立更遲留憐渠本是無情物何事而今也白頭汪回顯一首回顯字汝光祁門人正統戊辰進士除户部主事出知惠州府聞猿使蜀三年未得歸青山樓閣倚斜暉猿聲久聽渾間事却笑巴人淚滿衣鄭文康一首文康字時乂崑山人正統戊辰進士不仕有平橋集詩話平橋集文勝於詩嘗從徐立齋閣老借含經堂所藏本讀之愛其簡質有類石守道尹師魯諸公詩亦藴藉寄海上韓杲行盡清溪到水涯好山環繞故人家寥寥一犬柴門外只隔橋東幾樹花倪敬一首敬字汝敬無錫人正統戊辰進士官監察御史有月樓集題畫溪雲靄靄樹團團溪上幽亭六月寒日暮看山人巳去水禽飛上石闌干詩話宋毛珝吾竹題蘇子美滄浪亭詩云日暮客歸園館閉鷺鷥飛上石綦盤侍御題畫作頗與相類然知非蹈襲不妨並垂也夏寅一首寅字正夫松江華亭人正統戊辰進士除南京吏部主事厯郎中升江西提學副使參政浙江遷山東右布政使有史詠紀行集李賓之云東南士大夫每不喜夏詩謂有頭巾氣也非王元美云夏正夫如鄉里老人衣錦見逹官不嚴麗但寒鄙可厭詩話正夫名亞欽謨方劉似勝宋家後葉如東晉南渡虔州更可哀母后撤簾行在所相臣開府濟時才虎頭城向江心起龍脈泉從地下來人代興亡今又古春風回首鬱孤臺周鼎六首鼎字伯器嘉善人正統中官沭陽典史有桐村欵舫齋土苴集都元敬云先生以文名浙西土苴集二卷詩不止是然不期驚人而人自驚不期去陳言而陳言自無不去宋人惟山谷老人不隨人後説者稱其能出新意若先生詩可傳巳利陸秀卿云先生雖文士而學務實用如議水鑿鑿不迂故金榮襄公薦之謂可居館閣乃卒不遇姑託文以自見依隱玩世多鏗鏘幼眇之音其志亦可悲矣俞右吉云伯器文勝於詩詩話桐村開濟之略戎幕宣勞顧一尉白頭又遭薏苡之謗哀哉斯人實命不淑同時杜州牧庠貽詩云功名巳覺邯鄲夢衰老猶耕谷口田汪縣令貴詩云白首九旬還向學黃梁一夢總成虛吕太常常詩云斯文籍籍歸輿論何物區區戀抱關沈處士周詩云山縣軍書前吏迹墓堂文字老生涯吳江史處士鑑詩云行誼故絶人文章復名世碑版照南州煌煌自無替集中詩題有未死作云在塗嗟未歸行槖日巳貧正如風中絮未肯沒車塵嘲鴈云何地不虞網此身非故鄉誦之使人心惻詩不見佳第恥拾人遺唾亦有志之士明古實師事之勸農二月二日天作雨縣官府官齊出城白頭父老花間迎亦有牧兒先馬行牛亦不避馬不驚饁者自饁耕者耕東村西村鼓笛聲願得守令枉柴荆田家年來解留客新婦炊粳姑磨麥送黃給事使滿刺國封王逺國來王日深恩册拜時璽書中禁出天語使臣知路指諸蕃近山行四牡遲故人青瑣夢無限五雲思江行萬里雲濤上孤帆一羽輕霜清天宇闊沙白海潮平山寺欲浮動鄰舟偶合并瓊花尚無恙回首廣陵城湯隂旌忠廟墓木南枝説武林北來祠宇又湯隂鵑啼故國春何在馬躙中原日巳深未死姦諛誰請劒至今忠義尚霑襟千秋此地歸英魄風雨靈旗儼若臨林和靖先生墓一丘千古獨巋然只少梅花抱墓田結就巢居猶昨日塑來鶴立自何年淡煙流水斜陽外芳草新亭古岸邊欲去徘徊城月上裏湖猶有未歸船冬夜寶篆沈煙白銀屏焰燭紅不知窗外雪撩亂撥春蟲王清一首清字一寧合肥人世襲濟寧衛指揮升廣東都指揮死於寇難有建櫜集塞上感懷西風關外雪初晴懷古思鄉百感生玉帳枕戈人萬里鐵衣傳箭夜三更夢回絶域烏桓地戰罷空山敇勒營烽火微茫天路逺月中鴻雁起秋聲郭登十二首登字元登武定侯英諸孫景泰初官都督僉事守大同以功封定襄伯英廟復辟謫戍甘肅成化初復爵卒贈侯諡忠武有聯珠集李賓之云國朝武臣能詩者莫過郭定襄詩話定襄力捍牧圉功存社稷聮珠一集繼父兄掉鞅詩壇西涯以為明初武臣之冠即其山王楸樹諸篇力巳排奡至詠梟之作直兼張王韓杜之長豈惟武臣一時臺閣諸公孰出其右錫山俞汝成乃謂可式後之為勳衛者是瞽者之言也題蔣廷暉小景我家南山中柴門别經久不知今春來新添幾株柳清江間釣竹鷗鷺還來否對此忽相思長歌獨搔首自公安至雲南辰沅道中謁山王祠山王廟在山深處烏鴉亂啼烏桕樹神威猙獰怖殺人朱吻長牙睂倒豎紅綃抹頭袍袖結手挼黃蛇啖其舌短碑不題神姓名蕪詞漫書唐嵗月隂風颯颯吹靈旗夜聞甲馬空中嘶老巫開門馬無迹但見狐鳴鬼嘯鵂鶹啼山前居民種禾黍嵗嵗求晴復求雨神靈不靈誰得知老巫分明作神語往來行人多再拜爐中無香畏神怪唱歌打鼓燒紙錢蒼鵝白羊朝暮賽還把殘餘拋野草神喜歡欣烏亦飽老巫丁寧客無慮萬水千山放心去楸子樹并序去嵗于蒙太監家移栽此樹當就結實繁衍今年春令巳深草木皆萌蘖而獨此枯瘁略無生意土俗相傳以為栽樹當嵗著花特餘氣耳來嵗則否必三年而後如故豫甚信之偶數日伏枕不出今晨就庭事啓窗則花巳爛熳比他樹尤盛見者咸以為異豫亦歡然以喜因賦長句并識意云窗前新栽楸子樹去嵗移自東君家根深土凍重莫致挽以兩犍載一車方經旬日即蓓蕾秋深結子如丹砂人言此特餘氣耳來嵗未必能芬葩我初聞之稍驚怪重以土俗相傳誇今年春風巳撩亂千株萬卉皆萌芽南山青翠逺可見獨有此樹猶枯杈我徵前言苦不樂行憐坐惜恆咨嗟連朝病困閉門卧夢寐猶憶花如何今晨勿藥強起坐眊焉兩瞳如隔紗推窗一見笑絶倒蔥蔥滿樹開成霞冰綃素錦誰翦刻小紅輕翠相交加日光照耀春欲醉翩翩蜂蝶爭紛拿賔朋來觀繞百匝共疑造化理則那花枝爛熳色更好詖辭輕易可信邪豈非陽春有深意憐我老憊來天涯浮生過半身計拙有足不及蚿憐蛇故教相伴慰岑寂豈敢與物爭豪奢六年羈鰥入僧定但未落髮披袈青裙小鬟别來久淚眼垢膩首不珈巳聞桂蠧化胡蝶忍聽鸚鵡呼琵琶花雖可愛不忍折無人插向兩髻丫鈎簾靜坐獨清賞天明起看到日斜知音未遇寡歡趣有酒不飲惟烹茶前年官司催入貢六千里路豈不遐移根天苑比瓊樹有用未必過桑麻物生遭遇即珍貴便應壓盡諸般花我慙不如花命好謫官五載辭金華住迥邊城氣蕭索旦暮戚戚聞蘆笳自憐淺薄不足忌羣兒何以喙競呀方圓鑿枘苦難入冠非薦角強觸邪古人明哲有深戒省愆痛欲掩户撾窮荒雖覺雙眼淨聒耳厭聽公私蛙再歌南風終不競天驕吹脣魯婦髽羌兒雜遝近邊鄙意態詭異聲嚻譁隂霾接旬不成澤嘊嘊恆欲噬我豭麒麟獅子逺將至爾曹慎勿相邀遮馹騎東來蹙山倒黃口學語聲咿啞羣公羅拜但垂手踐踏不啻蟲與蝦人逃馬死金滿篋一擲何足挂齒牙我雖無位百憂集終夜感歎心如瘥草年蹤迹半天下把鏡自照兩鬢髿老懷食蔗如食蠟豈但無味仍饒渣行路難行古如此道多豺狼水鱷鯊紛紛兒女競聲利左蠻右觸方爭蝸金雞何日解羈去一竿歸釣吳江槎箕山潁水迹長往漁蓑樵擔肩相摩間看得意鼠如虎怕説病聰蟻間犘黃雞紫蟹且慰意背癢正得麻姑爬羞將口腹纍州里未能不食如匏瓜猶勝夷齊待薇蕨園收芋栗兼梨樝老農追隨種禾黍偶耕林下時燒畬心淳語直意真率肝膽相照無疵瘕瑶臺璇室豈不好囁嚅較此猶爭些囊中黃金尚餘幾壺乾酒盡還當賖頽然一醉玉山倒世間萬事皆由他梟南山萬古雪六月地上冰崢嶸況當嚴冬氣尤冽萬物僵立不識死與生陽烏戢其羽顔色慘淡無光晶朝朝畏寒不敢出欲挽海水添長更氊裘蒙茸縮如蝟風沙斷盡行人行老烏平時最饒舌攢毛縮頸飢無聲鴟梟獨何形無乃金鐵鑄使成白日在何處每到夜黑來飛鳴有時呼嘯聲愈厲召號怪鬼徵邪精鳳皇凍欲死志意無由平梟凶不可治怒癭空膨脝南村孀婦貧且苦夫死未葬兒東征伏雌五離初解殼畏寒就暖聲咿嚶土房穿漏窗户破梟竟突入雞啼驚雛死腦盡裂雌僝不能爭孀時睡䒐䒏欲起視夜無油燈乞鄰把火照昏黑梟止未去勢欲相欺陵口吻尚流血兩目光睖䁬孀髮竪股栗返走撲地魂飛騰有夫攘臂挾弓矢弗斬此梟何以懲入門無所見但聞狐鳴鬼嘯寒氣颯如凝冰孀悲呼天涕垂膺卵此惡物當誰憎戟手詬社公愧汝威稜稜雖云土木偶想亦欽名稱人皆祀汝作土主安然坐視反不如梟能社公顔忸怩渥若朝霞蒸據案呼吏兵卑官亦靈承廟食于此方乃被婦詬吾奚勝便須封皂囊騎雲款天庭叩階瀝血天其矜不以梟磔死吾道何由宏天門九重髙且邃守以夜義威贔屭摳衣趨蹌肅鳴佩以手奉扃心顫悸大閽倚棖方假寐瞪目視之訶且詈汝官何曹直蟲臂清都森嚴可輕易社公前致辭大閽巳知意鼎鐺尚有耳投鼠須忌器梟為天驕子美惡各以類羽中豈無靈與瑞不及梟姿工嫵媚乘昏伺暗察幽隱附耳連睂方倚比汝不知忌諱胡不膠脣結舌亦足以自異彼喙若呀非汝利社公頓首前此言得無愆天道本至公如何有憎憐茍不較曲直何由辨媸妍以彼醜惡形乃竊造化權常聞上古時宰物無頗偏禍淫與福善今豈不其然地行蒼生何啻千萬億煩冤疾痛孰不號旻天渾沌茍未鑿何用呼吸百里晝夜東西旋大閽笑絶倒以掌拍其肩小儒強解事未悟磨兜堅汝胡不聞天地同一物不過一十二萬九千六百年氣機消長豈常好清淳澆濁各各隨時遷天人不同道此理可忘言語既復歎悔丁寧極密勿妄宣社公涕漣如俯首但長吁載拜謝不敏攬轡回其車錫鑾風泠泠墜地不須臾亟往告彼孀夜降桑林巫梟雖不勝誅誰敢訐其辜朋儕相搆煽勢與天為徒母腦尚忍啄何有于朱朱素餐抱深愧豫亦思乘桴嗟爾門單户弱形羇孤從今慎勿與梟敵但須夜夜牢護雞巢雛西屯女西屯女兒年十八六幅紅裙腳不襪面上脂鉛隨手抹百合山丹滿頭插見客含羞嬌不語走入柴門掩門處隔牆却問官何來阿爺便歸官且住解鞍繫馬堂前樹我向厨中泡茶去保定塗中偶成白壁何從摘舊瑕才開羅網向天涯寒窗兒女燈前淚客路風霜夢裏家豈有鴆人羊叔子可憐憂國賈長沙獨醒空和騷人詠滿耳斜陽噪晚鴉甘州即事黑河如帶向西來河上邊城自漢開山近四時常見雪地寒終歲不聞雷犛牛互市畨氓出宛馬臨關漢使回東望玉京將萬里雲霄何處是蓬萊客中春晚逺塞書難寄空庭花自開舊巢雙燕子今嵗不曽來春日遊山偶成林下扶藤杖溪邊整葛巾春風莫相妒不是折花人口號寄涇州守李宏渡了黃河又黑河春風秋月五年過涇陽太守如相問更比來時白髮多客中相見倍相親白酒黃雞莫笑貧君住淮南我淮北如何不是故鄉人甘州甘州城西黑水流甘州城北黃雲愁玉關人老貂裘敝苦憶平生馬少遊集本題作送嶽季方還京前云登髙樓望明月明月秋來幾圓缺多情只照綺羅筵莫照天涯逺行客天涯行客離鄉久見月思鄉搔白首年年長自送行人折盡邊城路傍栁東望秦川一鴈飛可憐同住不同歸身留塞北空彈鋏夢繞江南未拂衣君歸復喜登臺閣風裁稜稜尚如昨但令四海歌升平我在甘州貧亦樂下文云云明詩綜卷二十四
