body:
  text: 明詩綜巻八翰林院檢討朱彞尊編徐一䕫二首一䕫字大章天台人徙嘉興元末建寧教授洪武初召修禮書終杭州府學教授有始豐類槀靜志居詩話實録洪武二年八月詔儒臣纂修禮書徴儒士徐一䕫梁寅劉于周子諒胡行簡劉宗弼董彞蔡深滕公琰至京時曽魯以元史方成奏留之同纂修三年九月書成賜名大明集禮通五十巻授曾魯徐一䕫周子諒董彜以官梁寅等六人以疾賜還鄉里宗景濓撰楊亷夫墓志云國朝天下大定詔遺逸之士纂禮樂書君被命至京師僅百日而肺疾作乃還卒年七十五洪武庚戌夏五月也而梁孟敬贈徐大章序則云吳元年丁未歲以詔徴至都大章亦見徴是時置三局一律局二禮局三誥局余備員禮局而大章撰誥文同居官寺者半歲云云若是則禮局律局同時分設而大章孟敬俱於吳元年即被徴矣實録又載吳元年八月徴江西儒士劉于等至官欲官之俱以老病辭各賜帛遣還則劉于亦以吳元年即被徴矣且劉宗弼者承直之字承直吳元年十月官國子司業不應於洪武二年又同遺逸之士並徴也又中書省定律令亦係吳元年十月事至十二月律令成命頒行之則律局可輟不煩二年猶與禮局並存也此皆事之大可疑者相傳亷夫賦老客婦詞進御其辭云老客婦行年七十又一九按是歲己酉亷夫七十有四爾何必增益其齒以誑孝陵邪殆好事者為之又攷當日同修禮書尚有魯淵道原實録削而不書者以道原書未成時先卒也梁孟敬有輓詩載石門集大章遺槀罕傳余於京師見之今刑部尚書新城王先生貽上所凡四冊比余家藏者倍之然驗其目無詩猶未是足本也至正己亥兵後明年八月之望同守繆公招同諸彦集南湖即席分韻得久字青丘緩殛殪黑飈撼九有海走翻蛟宫山移若螘阜雖愛赤城霞歕瀑當窗牖棄擲不敢顧欲卧豈得久里處擇其仁於焉得林藪衍原饒秔秫詩書足朋友何期復中兵難作在丁酉東西競奔竄顧尾不救首幸云全此軀長疑是夢否還見湖上月兼之對名酒狂奴故態萌㗲然開笑口郁伯承云僧雪廬資聖寺記至正十八年八月嘉興兵變而大章詩云難作在丁酉是丁戊巳三年郡皆被兵也故髙士敏詩亦云前年奔山壑去年匿檣舵辛丑秋七月曹廣文招同諸子憩西郭景徳寺分韻得半字野曠天逾豁川平路疑斷不知何朝寺突兀古河岸潭薶白氣沒林宻翠霏亂勝地固清凉火流七月半合并洵難得通塞奚足算廣文厭官舍亦此事蕭散風櫺爵屢行蘿磴席頻換但覺清歗發寧顧白日旰吾欲紀兹游埽塵勞弱翰梁寅二十四首寅字孟敬新喻人元末辟集慶路儒學訓導洪武初徴修禮書書成以老疾辭歸有石門集詩話孟敬入禮局雖不為好爵所縻然石門集中賦南歸則云煌煌乎大明之盛典兮搜巖穴而旁徴承賜金之渥恩兮荷鍚服之殊榮寄子岷詩云赫赫皇明文治肇興惟俊良是詢惟隠淪是徵嗟余罷老亦承詔以行東武吟云隋珠耀明月和璧誇縣藜及時不自獻明君焉得知寓館咏懐云聖君優老無窮感京城元夕云萬里昇平感聖朝洪武元年正月四日㳟覩龍飛歡忭而作詩云赫赫大明逄盛代載歌周雅贊皇文感恩頌徳之辭不一而足方之抱翁似有有間矣故序於通籍者之列歸醴溪久厭都市喧俛思山巖靜歸飲醴溪泉怡我淳樸性神峰雜樹擁石門翠厓並蘿懸晨露巘秀夕霞映映褰裾蔭雲松脫屣恱風磴悠然遯客心疊出野人詠方期谷口耕毋誚終南逕和楊逸人桃林遷居之作心絶忘塵囂時清樂巖築愛此桃華林葺之杜衡屋葛籬延芳藟石梁照淺渌風翔雙白鳥雨卧一黄犢東皋雜婦子中野見樵牧賦詩雲霞隖攜壺錦繡谷從君以優游於焉謝羈束題西山程氏南窗獨居南窗靜秋木連翠岑鳴琴衆葉下把酒孤猨吟寧負朱紱願莫乖白雲心羡彼歸田叟髙風留至今為臨川章則常題山水圖山擁衡廬青水含瀟湘碧兩厓蟠蛟樹千歲蹲虎石遥遥遡川舟泛泛騎驢客憑髙者何人閒看楚雲白題印土寺罷釣軒曲池照林隖百尺懸蘿隂開軒坐垂釣水清如我心小魚易傷生大魚或淵沈投竿為之惻於此悔悟深名區縻好爵都市爭黄金但戀鈎餌馨豈知憂患侵濯足南澗流振衣北山岑旣羞結網罟何必漑釡鬵物生免相賊嗜欲常自禁嘉此古人意託之金石音擬古六首獨處衡門下慨然思九州我馬苦疲怯山川多阻修豐草被長坂麋鹿或羣遊蔚彼嘉樹陰鳴禽自相求彼物各有適而我何寡儔日月䨇車輪恒恐不少留願與二三友朝夕論王猷毋為自局促窮廬悲白頭芙蓉在江浦亭亭豔清波雖云出淤泥麗質良可嘉褰裳渉枉渚凌風折芳花願言贈君子翫之比瑶華於時茍不惜顦顇當奈何江海處卑下百川皆赴之山木鬱蕭森上竦無緐枝王侯稱孤寡惟恐嬰菑危謙虚受衆益天道盈必虧周公下白屋吐哺情孜孜孫子相南楚禄豐心愈卑奈何閭閻子往往多矜持昔嘗好名山五嶽期遍歴思見松與喬再拜問仙液微生累妻孥常為飢凍役歎此血肉軀何以生羽翼諒非金石同服食竟何益不如安我常百年順所適雲門輟清響鄭衛音方揚錦衣受垢汚不如綀布良軒軒青雲士鳴玉升廟堂名髙受讒毁寵盛罹愆殃美女惡女仇偏聼姦以萌衆口能鑠金况乃忘周防所以君子心惟用徳自將行行九折坂戒哉銜橜傷我有太古琴千年妙音續七絃何泠泠聼之非促遬一彈文王操再彈宣父曲聖人宛見之何由躡其躅大道日以淪澆詭馳衆欲孰思障頽波九州反淳俗䕫龍為股肱巢許遯巖谷窮通各有志於我奚不足歸息二首歸息蒙嶺陽聊比嵩少岑樂此林藪趣遂忘江海心沿澗搴芳藟入谷聼幽禽流泉響松下潺湲非俗音猗蘭被徑畹香氣襲衣襟頽景忽西匿浮雲夕以陰睠彼羣飛鳥翩翩投北林春陽旣和煦時雨亦霑濡原野緑已遍土潤含膏腴兵戈幸少戢良農日墾鉏戴勝鳴桑林題鴂亦交呼嗟我理編簡四體忘勤劬羔裘媿逍遥梁鵜恥安居素餐古所誚偶耕良我徒簡伯英伯筠見訪雨留信宿谿谷雲晝合東林微雨來二友歘俱至一見紓中懷埽我茅茨室為君緗帙開上言風雅醇下言豔歌諧何以相淹留清醑不盈杯何以為逺贈媿無瓊與瑰煦風失堅氷谿水流湝湝歸鴻正翱翔浮鷖散參差告我遽言旋定省恒懼乖懿此孝友心令徳善自培願為王國士無媿北山萊題番昜蔡淵仲黙齋獨坐衆囂寂靈淵虚以澄樸拙固吾性佻巧非吾能言辭戒放逸脣頰思緘縢吉與躁殊趣仁以訥見稱呐呐譽何損呶呶時所憎恐玷懷白圭來讒忌青蠅無妄天之佑主靜道斯凝曾閔庶可慕予賜在所懲萬言不如黙誠哉宜服膺林下客尋林下居逕幽不待埽疎篁延柔蔓殘果落深草禽言人莫知虎跡僮驚報何事嬰余懷甕牖悟天道篢谷作老樹山橋畫瀟灑興來濯足蒼藤下雲邉厓石危欲落雨後泉流急如瀉客過松林貪翠陰農分稻苖散青把桃源風土良可樂何恨龍鍾在田野對雨飛雨山棚爽緐雲竹巷迷翠藤低拂石黄葉澹霑泥樹杪盤飢鶻牆根泣露雞園夫桔橰廢流水滿青畦贈西山僧髙僧自喜巖下住長見白雲飛復廻半山風吹松子落千歲石作蓮花開鳥下林堂待分食龍遊溪水遇浮杯吳山楚山聊暫行還把楞伽歸去來天寧寺和曽得之兼呈彭聲之及雪印經年不到天寧寺却喜春濃叩竹扃二水共明洲外碧千峰如削雨餘青謾勞山茗時時煮自笑齋中日日聼垂白飽聞髙世論巖棲空媿老窮經初夏樹暗雲更深鳥啼春巳去多謝桃源人能留漁父住為王仲義題雪梅小橋東郭先生履曲逕西湖處士家向暖早看花似雪冐寒更愛雪如花和何彦正春耕二首見説春耕溪水頭賦詩猶憶玉京遊莫誇塞北千蹄馬寧買江南十角牛竹間樵逕行應熟花外漁舟望欲迷處處稻畦分落照荷鍫人去水禽啼劉承直一首承直字宗弼以字行贛州人元進士明初與修禮書官國子博士升司業出為浙江按察司僉事王子充云劉君工選體出入鮑謝之間秋日東林宴坐髙秋坐虚館颯然神慮清廻飈颺疎雨瀟灑集前楹始欣塵壒遠稍覺微凉生簷鐸遞相答林蟬時一鳴物情各有適吾生豈無營周子諒二首子諒名愷以字行廬陵人與修禮書授工部虞衡司主事劉仲修云子諒之文豐而不汎乎辭約而能達其意其詩清新婉麗舂容幽逺讀子書作學館坐無事故書聊復翫披文旣薈蕞尋義亦泮涣趨前後己逸顧舊新輒竄萬言雖畢陳一理竟未貫往往巻未終心目已潰亂易書詩春秋辭簡義亦焕奈何百家書纍纍疊几案緜延比葛藟根逺益纒絆雕刳出葩卉綴緝呈組纂推以合身心宜若霄壤判吾欲盡其文掇取歸爐炭往者予弗及來者予何憚作詩示朋曹無乃駭童丱贈别郭元達黄鵠乗天風飄飄忽髙翔飛飛巢林鳥刷羽情内傷豈無凌霄志六翮不得長念子平生意相送以傍徨勿言易為别明發各一方悲來解佩劔為子復進觴且為游子歌歌詞何慨慷疾風吹征颿旭日在衣裳自古有離别各言慎行藏林弼三首弼字元凱初名唐臣龍谿人仕元為漳州路知事戊申内附以儒士登春官修禮樂書除禮部主事歴登州知府有梅雪齋稾龍州三首峒丁峒婦皆髙髻白紵裁衫青布裙客至柴門共深揖一時男女竟誰分近水刺桐知驛舍倚山毛竹即人家趁墟野婦沽甜酒候客溪童進辣茶白沙青石小溪清魚入疎罾艇子輕漫説南荒風景異此時真似剡中行張翨二首翨或作翼字翔南建徳人徙居嘉興元至正乙己舉于鄉薦主角東書院山長不就吳元年徴入禮局告歸有梓宇集沈客子云翔南歸自禮局郡庠延訓諸生家近宣公祠庭有巨梓集以是名詩話洪武修禮書吾鄉與者三人徐一䕫大章陳世昌彦博及翨也翨所居有巨梓一䕫為作記楊廉夫亦有題咏故翨作楊哀辭有云志梓寓榮衮襃兮又靳昌乎聲詩梓宇集不傳朱翰輯檇李英華取其詩壓巻賦得韭溪春水送張别駕春風吹花澄海門韭溪雨足浮春雲碧漪分流入流去石闌倒壓玻瓈紋使君青驄駐溪側檛鼓官船送行色片帆直泝五湖風水晶宫中夜吹笛西湖竹枝詞南髙北髙峰頂齊錢唐江水隔湖西不得潮頭到湖口郎船今夜泊西溪詩話辛丑夏留湖上昭慶僧舍時錢陸燦曹潔躬周元亮施尚白諸先生先後來游杭人有持元西湖竹枝請錢先生甲乙者先生謂曰和者雖多要不若老鐵次日羣公泛舟於湖曹先生引杯曰鐵厓原倡之外誰為擅場各舉一詩不當者罰周先生舉陸仁良貴作云山下有湖湖有灣山上有山郎未還記得解儂金絡索繫郎腰下玉連環施先生舉張簡仲簡作云鴛鴦胡蝶盡雙飛楊栁青青郎未歸第六橋邉寒食雨催郎白苧作春衣南昌王猷定于一舉嚴恭景安作云湖中女兒不解愁三五蕩槳百花洲貪看花間雙蛺蝶不知飛上玉搔頭吳袁于今令昭舉强珇彦栗作云湖上女兒學琵琶滿頭都插閙妝花自從彈得陽關曲只在湖船不在家武進鄒秪謨訏士舉申屠衡仲權作云白苧衫兒雙髻丫望湖樓子是儂家紅船撐入栁陰去買得雙頭茉莉花錢唐胡介彦逺舉徐夢吉徳符作云雷峰巷口晚凉天相唤相呼出采蓮莫為采蓮忘却藕月明風定好廻船蕭山張杉南士舉繆侃叔正作云初三月子似彎弓照見花開月月紅月裏蟾蜍花上蝶憐渠不到斷橋東山陰祁班孫奕喜舉釋文信道元作云湖西日脚欲沒山湖東月出牙梳彎南北兩峰船上看恰似阿儂雙髻鬟錢唐諸九鼎駿男舉馬琬文璧作云湖頭女兒二十多春山兩㸃明秋波自舉從湖上送郎去至今不唱江南歌予曰諸公所皆當然未若吳興沈性自誠之作也其詞云儂住西湖日日愁郎船只在東江頭憑誰移得湖山去湖水江波一處流不獨寄託悠逺且合竹枝縹緲之音曹先生曰然於是諸公皆飲予亦浮一大白囬思舊事四十年矣録翔南詩其旨與沈作略同又吳世顯彦章詞云湖中日日坐船窗水面鯉魚長一雙好寄尺書問郎信惱人湖水不通江意亦相合然俱未及沈之俊逸也劉儼一首儼字敬思錢唐人元末隱居西湖明初徴入修禮樂書授廣東市舶司令有樗隠集詩話敬思為管長史訥之師其卒也管哭以詩云痛哭劉夫子如今隔九泉家聲俱溢耳才望孰齊肩百氏遭漁獵羣經費討研薦章何懇懇束帛竟戔戔東壁星辰表西清雨露邉班陪黄閣老名厠玉堂仙禮樂皆新製方輿有續編宣麻應内命行李忽南遷漢節衝蠻雨黎歌入瘴煙客庖魚米賤商舶象犀聫省檄官将調郵書訃遽傳哲人其逝矣小子獨淒然踵接才雖劣心喪禮自專不知雙眼淚何日罷潺湲丁鶴年極稱之舟中漫興青天縹緲吹雲衣碧水顚倒插翠微三家五家村舍出一㸃雨㸃沙鷗飛栁絲裊裊拂過艇苔花斑斑生釣磯風塵不到是樂土莫怪往來城府稀魯淵四首淵字道原淳安人至正辛卯進士江浙儒學提舉洪武初徴修禮樂書詔授江西按察司僉事以病辭有魯道原詩集詩話道原為沈原昭之師嘗與楊亷夫張光弼挍文貢院其題入貢圖詩云九州文軌車書混萬里梯航玉帛齊感懷詩云越裳翡翠供輸少遼海雲航漕運通盖猶及見元盛時者其後幾死於宼極其顚沛晚宿新岑詩云杜鶻山外家千里姑惡聲中淚兩行誦之亦可悲矣題馬文璧秋山圖為盧仲章賦野館空山裏林泉象外幽淡雲初霽雨紅葉早驚秋路轉山藏屋橋危岸倚舟直疑人境異便欲問丹丘越中避難適周橋喪亂今如此漂零豈偶然有身長作客無地可歸田兵火淒凉夜風塵黯澹天故人知愛客同櫂鑑湖船長安市夜泊長安市鄉鄰崇徳州驛亭無駐馬堰水有行舟壞道薶荆棘陰房聚髑髏淒凉兵火地人物總荒丘重九白鴈南飛天欲霜蕭蕭風雨又重陽己知建徳非吾土還憶幷州是故鄉蓬鬢轉添今日白菊花猶似去年黄登髙莫上龍山路極目中原草木荒劉永之二十一首永之字仲修清江人明初徴士有山陰集梁孟敬云仲修遣詞發詠追金琢璧鉅篇短章榘度悉合敖子發云山陰翁詩諸體皆工而七言絶句尤佳不徒深入簡齋門戸亦可與晚唐諸賢白戰於變風境上而莫之雌䧺者簡一溪云先生詩詞格調精工諸體備至渢渢乎風雅之遺詩話仲修應聘入都以耳疾辭其秣陵述懐詩云話䝉曲臺名秉筆從諸公則亦徴入禮局之一人矣宋景濂以辭章翰墨雙絶稱之贈詩云多少薦紳求識面江南文價為君低觀集中與梁孟敬論春秋書謂胡氏之春秋非經之本㫖自為一書可爾使聖人者若後世之法吏深文而巧詆蔑乎寛厚之意此其失非細故也其識出環谷東山諸君之上其詩務去陳言取材新穎五言如青年杜書曰白髪漢郎官澗水穿林去山雲帶雨回雨微簷溜緩風急鴈聲稀野燒兼風起邉烽共月升春明三壽草雪映九英梅蟹舍能留客漁舟不畏風鹿盧花下轉萵苣雨中鉏白鶴窺殘奕青童埽落花路危楓葉斷石險桂根懸鹿柵成山壘漁梁阻澗泉七言如過橋栁暗烏争樹當户花開燕入簷近瀑飛雲經樹濕穿花流水過橋香朱絃鏤管書苔紙銀簟秋衾夢橘湖古硯自磨銅雀瓦坐氊還疊罽賓揄石泉落處寒兼雨楓葉來冷帯霜杜若烟生螺子港桃花水暖象牙津千峰靜對芙蓉幕三峽遥連螮蝀橋竹嶼暝煙浮翠黛石田秋雨潤銀沙沙田紫蔗家家熟野徑丹楓處處飛井厎龍飛山客見峰頭鹿過野人知白雲當户心同靜亂竹侵階手自刪何其似姚少監鄭都官也秋懷凉飈振庭樹浮雲結重陰中情忽不樂拂几彈鳴琴泠泠多苦調零淚霑衣衿逺懷東都士登彼北邙岑悵然望京洛五噫發哀吟悠悠千載下誰識古人心登烟雲臺同西峰諸友分韻得跨字振䇿履崔嵬飛歩凌雲榭俛觀飛鳥翔逺見平江瀉彈棊古桂陰酌酒長松下谷響嘯哀猨林香過山麝祈靈醉巫覡尋真望仙駕翠蚪金節導青鸞羽衣跨訪驛馬精舍能上人不遇識其從孫蕭生進修夜坐誦詩次日書此識别留柬能公晨起忽不樂驅騎髙原行四山多嵐氣日照孤峰明亭午際江渡烟艇浮沙汀登岸迷所適岐路方縱横忽憶驛馬寺久慕能公名詢塗向烟霧阡陌互紓縈漸入石路窄松蘿藹冥冥龍象雖寂莫廊廡猶崢嶸道人赴齋出鍾梵杳無聲欵戸識之子開室出相迎宴坐畢餘景空花聞夕馨山尊瀉芳醑秋蔬摘霜莖性昧空寂㫖心樂儒雅清夜止西窗宿風條中夕鳴病客旣多感聞此心骨驚明當舍之去沿流到江城方從湖海游暫逺林壑情山門蔭寒沼中涵苔蘚青法源庶無竭歸日濯塵纓過安慶精舍淮壖古重鎮龍舒實雄冠顯顯青陽公銜命兹屏翰文能宣皇風武能折兇悍仁能撫士卒知能輯流散孤城抗千里一身當敵萬運否絀壯圖時屯負英算城亾遂捐軀仗節死國難忠義凛霜日聲名炳星漢我來當夏杪延覽遂興歎俯仰成古今興亡猶在眼疲人稍歸郭買舍臨江岸午風舟舫集夜霽燈火亂精靈或來往廟食儼容觀生為烈士尊死為姦臣憚吟詩臺千載汚靑簡同傅商翁何彦正舟中有懷辛好禮韻沙際水痕交細草蒙茸長春江下連鴈夜雨同孤舫佳期違宿諾歡笑懷前賞餘燼落寒燈臥聞漁板響劉宗海為余作清江春雨碧嶂秋嵐二圖賦此贈之劉君早年善山水得意往往圖樵漁西昌城西一相見忽然贈我雙畫圖圖中似是清江曲春雨蒼茫汀樹緑烟中髣髴辨飛㠶水際依微見茅屋漁郎繫船江石上一夜磯頭水新長孤村日暮烟火微渡口歸人暝猶往碧嶂層巒翠轉竒嵐光秀色含朝暉風林落葉灑青壁雲壑流泉生翠微我昔結廬此山裏每愛秋嵐淨如洗經年奔走厭風塵偶看新圖心獨喜憑君添我小綸巾明當歸埽山中雲他日君來一相訪松根為子開柴門題金華余仲揚山水人言吳中山水好坐思絶境那能到金華山人懷故山時拂氷紈寫幽島贈君此圖更絶竒妙墨精思奪天造陂陀重阜隱喬木掩仰遥汀帶文藻石嶠雲生暮色微海門潮落秋風早賀監居臨鑑湖曲子猷宅近山陰道清清落日櫂船回照水新袍影顚倒髙情千古慕前哲世俗紛華豈堪保經年烽火遍江南萬壑千峰迹如埽畸人奔走厭塵濁試觀圖畫開懷抱思傍幽林結茅屋柴門低映寒藤老放鶴前山戴笠歸獨抱長鑱拾瑶草題古木幽篁圗近者天下寫竹枝息齋子昂最竒特金釵折股錐畵沙直以髙情寄豪墨後來小李用家法更覺縱横脱羈勒御榻屏風或詔寫流落人間豈多得我家真蹟兼數公錦囊玉軸複壁中舊宅荒凉經戰伐故物都隨烟燼空此圖尋丈小李作位置頗殊標格同半身古樹色蒼潤篔簹因依相澹濃長林無人秋氣入蜿蜿蛇蛟起幽蟄蠨蛸垂絲晝陰靜老鶴刷翎昬雨集黄陵廟前湘水深捐玦江臯思俯拾浮槎尋源遡空闊析旌低度𤣥雲濕何郎兄弟最好竒愛此不減珊瑚枝幽居正在蘭峰下亦有喬木當窗扉共展長圖幽興發六月凉颸生葛衣還君珍襲增歎息他日重看覓舊題陳君心吾以黄鼠筆見貽此筆唯京師多用之江南罕得也氷鼠金毫鋭霜筠翠管長攜來南郡逺制出北州良内史來禽帖黄門急就章秋林多柿葉揮灑興難忘送吳徳基赴興化令春江望不極芳草緑江潯千里長沙道孤㠶去客心縣城依水國吏語帯蠻音到日應無事華亭自鼓琴經湖口縣古縣開湖口髙檣集岸隈山從廬阜起江向武昌來近水皆楊栁荒城半草萊客心元自速更遣曉風催為髙安何思恭題方壺所畫山水古象山中白晝閒紫烟樓觀鳯笙寒試分玊井三秋露戲寫方壺九疊山老樹糢糊常帶雨茅茨瀟灑鎮臨湍知君隱處渾如此持向荷峰錦水看題畵鷹猶記鳴鞘出霸陵新豐市北醉呼鷹於今豪氣都消盡閒看新圗剔鴈燈題扇烏絲細寫蠶頭篆白紵新裁燕尾衫雨過西軒苔色淨澗中雲影似江帆題竹洞裏仙人白兔公手持玉笛向秋風彩雲低度天如水吹作龍吟三月中題扇金鳯洲頭倒玉壺銅塘浦口送飛艫他時若記分攜處花滿春城聞鷓鴣寄西峰道士二首百尺飛樓接太清萬年枝上月華明鹿車入谷無人見應是仙人衛叔卿石室虚明隔紫烟靈文中閟白瑶鐫丹書隱字誰能識歲月應題建武年北澗夏日酒傾蘭勺石泉香衣剪荷盤露氣凉誰料十年江海興閉門疎雨對横塘夜宴定矦宅醉中口號刻羽堂中畫獨明将軍夜醉水西營青樓小婦新承寵彈得凉州第一聲為彭子𢎞漁釣圗彭郎磯畔小茅堂露滿秋林木葉黄石渚水生魚欲上一江風雨夜鳴榔孫作四首作字大雅以字行一字次知江陰人洪武癸丑召修日厯書成除翰林編修以老病乞外授太平府儒學教授入為國子助教遷司業有滄螺集李武曽云胥元季之人咸襲抱遺老人詩派東家子獨以蘇黄為師洵特立之士也詩話編纂日厯洪武六年九月事也先是徐大章報王子充書曰近世論史者莫切於日厯日厯者史之根柢也其法以事繫日以日繫月以月繫時以時繫年猶有春秋之遺記事之法無踰此也宋重史事日厯之修必諸司關白如詔誥政令則三省必録兵機邉事則樞庭必報百官之拜罷刑賞之與奪臺諫之論列給舍之繳駮經筵之論答臣僚之轉對侍從之直前故事中外之囊封匭奏下至錢榖甲兵獄訟造作凡有關政體者必隨日以録歲終監修宰相㸃檢修撰官日所録事有失職者罰之其慎重若此日厯不失則後日會要之修取於此他年實録之修取於此百年之後紀志列傳取於此此宋氏之史所以可據也元則制度文為務從簡便不置日厯不置起居注獨中書置時政科以一文學掾掌之以事赴史館及一帝崩則國史院據所付以修實録若順帝三十六年事旣無實録又無參稽之書惟憑采訪以足成之竊恐其事未必覈其言未必馴其首尾未必貫也其論實自大章發之修日厯老七人孫大雅與焉大雅自號東家子以文見知於牛士良宋景濓為作東家子傳謂他人之文束於理則辭不暢肆於辭則理不直惟公洞矚千古之上折之則理勝闢之則辭嚴動有據依皆非臆説其推許至矣詩絶去元季之習好盤硬語有云蘇子落筆崩海江豫州吐句敵山岳湯湯濤瀾絶厓岸㟧㟧木石森劔槊二子低昂久不下藪澤遂包貙與鱷至今雜還呼從賓誰敢崛强二子角吾尤愛豫章撫巻氣先愕磨牙咋舌熊豹面以手捫膺就束縛士如此老固可佳不信後來無繼作盖欲力追涪翁宜詩之不肯猶人也大堤曲君騎白馬來我騎青驄去背面不相識兩馬驕嘶住客中秋夜故園應露白凉夜又秋分月皎空山靜天清一鴈聞感時愁獨在排悶酒初醺豆子南山熟何年得自耘石菖蒲曉露飛初濕春苖剪又生靜憐千葉瘦幽喜一峰横鬱鬱明人眼青青異物情安期如可待吾亦埽黄精送杜孝廉往句容江東勝地壓西浙句曲山傳天下稀林間風生一虎過石上月明雙鶴歸我擬華陽裁白帢君如萊子奉斑衣日長縣幕娛親地小轎疎櫺入翠微錢宰二十四首宰字子予一字伯均㑹稽人元進士明初以明經徴修禮樂書授國子助教乞歸召較書翰林加博士致仕有臨安集徐子元云博士詩如霜曉鯨音自然洪亮黄才伯云博士病近代新聲太繁刻意古調擬漢魏而下諸作補其未馴者詞林稱之詩話博士吳越武肅王十四世孫孝陵命撰帝王廟樂章稱㫖每進見輒賜坐侍食嘗賦早朝絶句云四鼓鼕鼕起著衣午門朝見尚嫌遲何時得遂田園樂睡到人間飯熟時明日文華讌畢帝諭曰昨日好詩朕曷嘗嫌汝何不改作憂字又曰朕今放汝去好放心熟睡矣乃遣還二十七年詔徴同揭軌等二十六人定正尚書蔡氏傳命開局翰林院賜綺繒衣被入朝班侍衛之首賜飲酒樓還里年九十六乃卒二十四人者黄觀景清在其中實録特刪去盖永樂中以名在姦黨故也博士詩波瀾老成諸體悉稱韓宜可唐愚士皆師之擬古七首出門萬里别行行逺防邉相望各天末北斗日夜躔四運秋復春不見君子還燕車北其轍越馬南其轅目逺心愈近悵然徒懸懸黄雲暗關塞路險不見天式微夫如何日月忽已遷願言崇明徳無為終棄捐髙臺何巍巍參差與雲平玉繩臨雙闕長河流無聲上有羽衣人逍遥吹玉笙清響涵明月飛珮何泠泠借問弄者誰疑是董雙成曲終再三歎感慨有餘情所悲同門友局促趨世榮願將秋水劒為之解塵纓笑呼雙黄鵠與子俱逺征涉海采琅玕紅者珊瑚枝明珠盈懷袖將以遺所思海濶不得返所寶莫致之爛其納我室抱璞將何為靑靑梧桐樹託根在髙岡與子新合歡翕如鳯與皇鳯皇鳴鏘鏘合歡期世昌歡情一何短離思一何長嗟彼籬下菊含英揚其芳晨霜秉貞節寧隨秋草黄終當采而佩歲晏夫何傷河東有織女皎皎雲為章手弄機上絲日夕更七襄織成五色文欲製君子裳莫言隔秋水可以駕飛梁睆彼牽牛星終日不服箱故人萬里别海水日夜深南風海上來遺我雙南金不見故人面乃見故人心鑄作黄金徽置之白玉琴彈為别鶴操間以懷湘吟曲終聼者稀矯首望知音庭樹日已黄白髪日已短候蟲鳴前除秋霜蕙花晚歲月如奔駒六轡不可挽泛舟渉方瀛方瀛水清淺安期邈難求吾櫂亦已返花開醉復斟黍熟飢自飯逌然樂悟生瑶島諒不逺分題賦載酒亭送友人之四川大江發巴蜀岷峨蔚嶕嶤子雲性佚蕩逸氣相扶揺灑翰騁雄辭凌雲何飄飄終焉歛其華組麗不足驕覃思著𤣥文斟酌倣繇爻閎言極幽微緜絡天地交豈無好事者載酒與遊遨胡為事黄門投閣竟蕭條龍蛇不知藏蝘蜓亦見嘲天獨昌其文炳如日星昭子行登斯亭英爽或可招謂我欲問竒峽水阻且遥題雪獵圖健兒善騎射出獵古戰場白雪日夜飛蕭蕭朔風凉黄草蔽沙磧馬肥弓力强小隊出漢南十騎如龍驤前驅逐猛虎後騎接飛獐翻身激羽箭疊中兩羚羊𤣥熊何前却猛氣亦跳梁南行顧長㦸北走脱飛鎗聫鑣愈奮捷性命不得將自謂足馳騁意氣何揚揚寧思漢廷將英勇際武皇去年出雲中置郡定朔方今年戰髙闕夜圍右賢王小勇何足矜萬里開邉疆兵退後作朔風號枯枝長夜何漫漫微月出復沒零露凄以溥露漙不足悲嚴霜為之寒飢烏下叢薄猛虎鳴其間鬼燈照虚舘落葉何珊珊蕭蕭逺征人載歌行路難我心增慘戚豈不思東還欲濟川無梁中道多阻艱弱子病且死老妻方憂患明將登前塗念我衣裳單斧氷汲澗水采薪事朝餐慨彼下泉詩悠然起長歎泛舟新湖塘次王敬初韻二首清賞各有適何異同登攀君舟泊西隩我車上東山林光變宿雨溪響洄晴瀾春深飛花歇日入好鳥還佳景欣所得毋令清興殘俯看縱壑魚仰見培風翰物理固有待努力當希顔胡為念窮達戚戚天壤間湖水日已緑理櫂不可緩雜花當晝翻逺樹出雲短沙明宿雨霽風急游絲斷悠悠歡賞深歴歴佳趣滿酒盡客愁生歌殘離思遠世路方險巇窮居正蕭散出處諒何心夕陽起樵管早春寄鄉中友人故園花發春又來碧桃半拆棠棃開流鶯踏花酒落杯花飛落酒相縈廻酒酣起舞落日晚應念長安人未回江上舟幾時發拍手醉唱歸去來笑摘花枝簪白髪雲中兩烈婦珠展鎮雲中縱游兵掠鄉鄙張思孝妻華氏偕子婦劉罵賊死之作雲中兩烈婦雲中兩烈婦風節何雄哉婦姑誓同死軍馬倐已來姑言我死命所遭爾方年少不得逃欲自經不得索欲自刎不得刀少婦潛致詞不用刀與索兒當激賊怒婦姑頭共斫姑如湛盧劒罵賊獵獵生剛風婦如黄間弩蹶張放弦氣愈雄厲聲奮激膺賊鋒萬古雙烈誇雲中題趙仲庸鏡湖圗為洽上人作趙侯胷中有泉石白髪垂顛人不識丹靑不寫四十年一見洽師雙眼碧當年王宰浪得名十日五日勞經營天機到時一揮灑白雲顛倒秋波明秋波在屋下白雲在屋上香鑪秦望天東南蒼巒翠巘森相向三山落日烟水賖秋風舊宅今荷花斷垣蒼石無路入至今人説放翁家放翁家𣺌何處阿師出家不歸去不惜千金買畫圖笑倚清江看雲樹長江霽雪圗昔年壯游下江漢霽雪千峰排兩岸今年看畵憶舊游萬里江山入清翫岷峨岡脊來蜿蜒青城一峰髙插天東馳衡山走千里匡盧五老下與石城北固遥相連氷巒雪壑互起伏照見日華破初旭神光混茫元氣浮奮如巨鼇簸坤軸爛如秋空雲浩如滄海濤又如瑶臺銀闕天上頭皎皎白月空秋毫囬光下照中流水風吹河漢銀雲起中流空闊不勝寒一洗丹碧秋漫漫山川歴歴真偉觀來往十年游未半不如雲瀛樓上來倚䦨一日看遍江南山題俞景山畫山水帳老大索居江上樓廿年不出懷舊遊叩門下樓出迎客但見絶壑風颼颼岱宗日觀山上頭日出未出蒼烟浮嵩髙插天太華碧蛾睂靑城翠欲流匡廬老泉挂白石蒼梧水落湘江秋懸厓倚天萬山立翔鸞舞鳯蟠蒼虯幽岑逺樹互出沒白雲不散松風收松根老樵列四五招我共入靑林幽平生游歴走不遍千里萬里窮遐搜如何一日墮我前空翠雜沓來雙眸舉頭問客何因入此境廼是手持畵圗來滄州俞君作畫時雅有山林癖朝登秦望山萬壑千巖淨横臆暮上香爐峰海色秋清上遥碧歸來放筆倣董源筆底丹青浩無迹海桑一别三千年山月江風耿相憶仰觀巖上泉俯看松下石故人不見空畫圗十幅雲烟巻還客梧桐樹梧桐樹一葉墮秋風一葉委秋露明年二月新葉生還在今年葉飛處漢宫飛燕近承恩零落班姬不如故君不見梧桐樹分題賦鏡湖送張用中鏡湖白波木葉稀凉風蕭蕭入客衣季真賜宅已無主太白酒船空櫂歸野色驚秋鴻鴈下水聲吹雨鯉魚飛此時張翰吳中去雲鎻稽山失翠微題趙仲穆秋山圖人家水檻接山窗好在江南山水邦兩岸雲林皆落日一天島鴈共秋江屋頭數遍青巒九松下吟成白石雙野服何人正蕭散泊船歸醉酒盈缸題畵菜今日荷鉏倦嘉蔬沒四坦客來春酒緑風雨夜開園春深即景露梢黄鳥啄來禽蛀葉青蟲絡樹陰又是緑階春雨歇滿庭芳草落花深題秦淮送别圖緑酒斟來且莫斟酒闌歌罷去駸駸别懐恰似秦淮水流到長江緑更深題林處士觀梅圗放鶴仙人不可招斷河殘月夜聞簫别來欲問春消息花落西泠第二橋揭軌五首軌字孟同臨川人洪武初以明經舉除清河主簿升知縣謝歸教授生徒召定書傳㑹選沈山子云孟同詩以唐人為圭臬斤斤不爽方之髙漫士差優河北氷泮放舟歸江南奉寄楊南宫曉來銅雀東風起春氷凌亂漳河水郎官驚起解歸舟一日風㠶可千里侵晨鼓柁發臨清薄暮乗流下濟寧南宫先生先我去花時想達𤓰洲步尋君何處抽風帆杏花烟雨春江南春陰棃花門巷泥活活楊栁窗戸緑陰陰軒車不來又幾日風雨相思勞寸心舒州紅稻宜晚飯采石碧酒供滿斟故人何可久不見我有新詩思共吟過燕都故宫八月金輿度玉關芙蓉零落後庭閒西宫無復羊車過南苑猶疑鳯吹還承露金盤留海上廣寒瓊戸鎻人間翠華此日知何在黄葉蕭蕭萬歳山晚歸苑外金波映水天歸驄蹀躞暮江邉鳯皇臺閣初含雨燕子人家又禁烟詩寫桃花歌扇厎酒攜楊柳舞樓前請看秋雨臙脂井好酒春風玳瑁筵宴南市樓詔出金錢送酒壚綺樓勝㑹集文儒江頭魚藻新開宴苑外鶯花又賜酺趙女酒翻歌扇濕燕姬香襲舞裙紆繡筵莫道知音少司馬能琴絶代無姜明叔云國初於金陵聚寳門外建輕烟澹粉梅妍栁翠十四樓以聚四方賓客觀揭孟同詩可知國初搢紳宴集皆用官妓與唐宋不異後始有禁耳詩話永樂中蜀人晏振之金陵春夕詩云花月春江十四樓十四樓者來賓重譯清江石城鶴鳴醉仙樂民集賢謳歌鼓腹輕烟淡粉梅妍栁翠也姜明叔蓉塘詩話謂皆在聚寶門外然中旣以清江石城為名必不皆在聚寶門矣周吉父撰金陵𤨏事謂有十六樓在城内者曰南市曰北市在聚寶門外之西者曰來賓在聚寶門之東者曰重譯在瓦屑壩者曰集賢曰樂民在西關中街北者曰鳴鶴在西關中街南者曰醉仙在西關南街者曰輕烟曰淡粉在西關北街者曰栁翠曰梅研在石城門外者曰石城曰謳歌在清凉門外者曰清江曰鼓腹所載特詳楊用修藝林伐山遺南市北市陳魯南金陵世紀遺清江石城因曲就十四樓之目而誤也相傳定正蔡傳書成宴編纂諸臣於醉仙樓上然揭孟同詩云詔出金錢送酒壚綺樓髙㑹集文儒題曰宴南市樓則非醉仙明矣實録洪武二十七年八月庚寅新建京都酒樓成先是上以海内太平思欲與民偕樂乃命工部作十樓於江東諸門之外令民設酒肆以接四方賓旅旣又増作五樓至是皆成賜百官鈔宴於醉仙樓九月癸丑定正蔡傳書成賜諸儒宴及鈔俾馳驛還是則編纂諸儒先與百官並賜宴者醉仙樓也繼以書成賜宴者南市樓也盖酒樓本十六其一北市樓建後被焚此實録止言增建五樓也當日諸樓皆有官妓不獨輕淡粉梅梅妍栁翠為然故李公泰叔通集句詩於北市則云極目亂紅妝於集賢則云妙舞向春風於清江則云時囀遏雲聲於鼓腹則云舞破日初斜於石城則云翠袖拂塵埃於來賓則云烟花象外幽於鶴鳴則云白日移歌袖而孟同詩寫桃花歌扇底扇底酒攜楊栁舞樓前又云龍虎關河環錦繡鳯皇樓閣麗烟花又云趙女酒翻歌扇濕燕姫香襲舞裙紆追憶氶平都㑹之盛君臣相遇之隆亦一叚佳話也童冀四首冀字中州金華人洪武丙辰被徴修書後為湖州府學教授調北平坐罪卒有和陶集姚廣孝云中州才力老成問學淹貫二十年來奔走南北雖涉厯世故樂天知命有合於靖節之志趣其和詩如繭抽泉決略不見其艱窘矧有牽强者邪庚子歲五月中從都還阻風于規林我昔少年日無事幸休居佩弦戒性緩每師董安于迨兹桑榆景始悟失東隅屢將孱弱軀觸目風波塗嚴令朔風急夜截髙郵湖豈不幸利涉為計良已疎古人誡垂堂况我疾病餘前塗諒多險欲悔將焉如水車行零陵水車風作輪縁江夜響盤空雲輪盤團團徑三丈水聲却在風輪上大江日夜東北流髙岸低坼開深溝輪盤引水入溝去分送髙田種禾黍盤盤自轉不用人年年祗用修車輪往年比屋搜軍伍全家載下西凉府十家無有三家存水車卧地多作薪荒田無人復愁旱極目黄茅接長坂年來兒長成丁夫旋開荒田納官租官租不闕足家食家家復藉水田力一車之力食十家十家不憚勤修車但願人長在家車在軸不憂禾黍秋不熟罱泥行朝罱泥暮罱泥河水澆田河岸低吳中有田多鹵斥河水髙於田數尺雨淋浪拍岸善崩嵗嵗罱泥增岸塍載泥船小水易入船頭踏人船尾立吳兒使竹勝使篙竹筐漉泥如濁醪此身便作淘河鳥河水終多泥漸少君不聞越上之田髙於城連車引水千尺坑車聲軋軋夜達明田間濁水無時盈吳田苦澇越苦旱越水常枯吳水滿嗟乎世間至平惟水猶不平請君不用觀世情贈丹崖隱者吾聞零陵東有丹崖山青天削出青孱頑丹梯百丈不可得仙人煉藥巢其間丹成仙去已千載至今草木餘清寒我今弔古訪陳迹石磴側足難躋攀上有撑雲拄日之喬松下有懸厓噴壑之驚湍幽林野鳥作人語陰澗或有蛟龍蟠何人結屋倚蒼翠抱琴林下聼潺湲乃是丹厓仙人老孫子少年早脱名利關祗今五十如處子雙鬢鴉墨顔渥丹門前種秫釀春酒屋後藝菽供朝餐留我石上煮清茗松花落地雲斑斑我家金華五十里失身作客天南端徴書昨夜趣歸興葉舟徑下湘江灘𢎞文館深難置足神武門髙宜掛冠山中草屋幸無恙拂衣歸共浮雲間明年花開儻相憶把酒相望興長歎趙撝謙一首撝謙名謙一名古則餘姚人洪武初徴修正韻出為中都國子監典簿罷歸尋以薦召為瓊山教諭卒於官有考古餘事黄太冲云先生詩有考古餘事千篇未曽傳世詩話明祖正韻一書出自獨斷天子考文諸臣敢不敬應撝謙於六書四聲最精焉肯盡棄其學而順帝之則其見黜也必因不苟附和而然不在年少也旣歸築考古臺述聲音文字通書成賦詩云文字聲音歎久訛十年辛苦事研磨誰云沈約知音甚未許揚雄識字多魚魯從今堪辨析鼎􅕔由昔費摩挲總憐朋舊微鍾子歸卧雲山看薛蘿當知臺名考古心非正韻為今矣古風次倪安道韻荒哉周穆王八駿窮萬里朝發崑崙巔夕飲瑶池水空歌白雲謠千載汙人耳三復祈招詩感歎不能已明詩綜巻八
