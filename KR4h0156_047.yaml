body:
  text: 明詩綜卷四十七翰林院檢討朱彞尊編孫陞二首陞字志髙餘姚人嘉靖乙未賜進士第二授翰林編修歴右春坊右中允國子祭酒陞禮部侍郎改吏部復改禮部旋又復吏部進南京禮部尚書卒贈太子少保諡文恪有集穆敬甫云孫詩爾雅足稱上乗送龍氏客子欲何之蒼梧古南粤相望萬里餘征鴻杳天末杪秋霜露零寒飈迅城闕睠兹發深慨而况當乖别采蘭以贈君所願芳未歇送陳氏之留都結交不在早要在心所當伊人則古昔晤蹔情何長云胡倐行游告言之建康驅車薊北門鼓枻潞河陽川原悠以邈使我戚中腸自戚還自慰暌離庸詎傷黄鵠摩青霄逺舉固其常去矣勿復道恒徳期不忘趙貞吉一首貞吉字孟静内江人嘉靖乙未進士選庻吉士累官禮部尚書入直文淵閣加太子太保卒贈少保諡文肅有集金陵送取經僧囘蜀洗鉢長干寺鳴榔一葦灣經收唐藏譯歌學楚狂還草綠金沙島雲開石鏡山慈航偏易渡豈若世途艱林廷機一首廷機字利仁閩縣人嘉靖乙未進士改庻吉士除檢討遷國子司業出為南祭酒遷太常寺卿陞工部侍郎改禮部進工部尚書復改禮部贈太子太保諡文僖有世翰堂稾王元美云利仁如太湖中頑石非不具體無乃癡重九日琅琊山宴集此日琅琊亦勝遊眼中風物足清幽青山似識重來客白髪能禁幾度秋萬事無如行處樂一尊還爲故人留豋臨况復逢佳節㑹取黄花插滿頭何維柏一首維柏字喬仲南海人嘉靖乙未進士改庻吉士授監察御史坐劾嚴嵩廷杖累官南京禮部尚書諡端恪有天山草堂存稾顔應雷云先生詩沖澹雍雅趣味天然静志居詩話端恪詩多雜講學語合格者希其乞休作云樂事尚饒新嵗月勝游不改舊雲山侍其父與鄉人為九老㑹亦佳話也夜坐虚亭靣芳沼凉月散遥林坐觀羣動息惟聞蟋蟀吟物性各自適兹理㑹予心虚明生夜景微風開我襟整衣起巡簷鳴我花間琴緬懐千載下希聆疏越音髙梧發孤籟妙契天機深對此不能寐待旦夙所歆尹臺二首臺字崇基永新人嘉靖乙未進士選庻吉士授編修歴修撰諭徳侍講遷南國子祭酒調北祭酒改少詹事兼侍讀學士陞南吏部侍郎進南禮部尚書有洞山集送西吳張太史使江藩京國論交幾過從郊筵惜别奈殘冬衝寒裘馬今朝發獻歲鶯花若處逢桐葉剪圭周建爵菁茅立社漢分封歸将錦節停鄉邑玉笥髙開紫霧重光山逢劉唐巖副使十年芳草惜離羣海上朱旛隠暮雲何意歸舟停楚澤萬山黄葉獨逢君康太和三首太和字原中莆田人嘉靖乙未進士改庻吉士累官南京工部尚書有礪峰集人日南國逢人日相傳卜嵗華隂晴曽不定時序轉堪嗟地僻將舒栁山寒未放花草堂詩欲寄羇思正無涯端午書懐入夜潮聲急平明江霧開感時人競渡弔古獨豋臺野樹疑分合沙鷗任去來乾坤堪一笑駛景白駒催仲秋國學陪祀吾道宫牆在清秋雨露多禮分三獻肅樂奏九成和夜静傳金柝庭虚聼玉珂歸途燈火逺星斗耿天河張舜臣一首舜臣章邱人嘉靖乙未進士累官户部尚書都察院左都御史卒贈太子少保雲中曲黄雲塞北起秋風宣府居庸羽檄同天子臨朝親遣帥戰袍賜出大明宫孫植一首植字斯立平湖人嘉靖乙未進士除南京刑部主事累官刑部尚書諡簡肅詩話簡肅家誡頗嚴諸子析箸後命每夕各出盤蔬榼酒共飲飲必分題賦詩其意以為兄弟日親則妻妾之言不得而間盖亦具苦心矣公之先名固者元處士有詩名聼雪齋集嘉隆間曽鏤板惜也今其子姓莫有儲藏者霜降陵祀夜行夜静鐘聲徹山深古柏寒囘風吹落葉絶壑響鳴湍候騎林間出懸燈嶺外看神遊列聖逺弓劍五雲端張瀚五首瀚字子文仁和人嘉靖乙未進士累官太子少保吏部尚書贈太子太保諡恭懿有奚囊蠧餘雜詩二首王胥習格熊黄公善厭虎血氣一時衰終為黠獸苦安身貴明哲鷙猛奚足數魯縞本非堅猶能敵强弩知雄守其雌深藏是良賈復蜟生枯株脫殻爲元蟬本與稿壤俱一朝憑化遷吐納月露中櫛沐風雨前微形竊伏匿何意聲日宣螳蜋枉見撲禀質非甘鮮初夏入濟我昔駕征航芳華媚初景淺綠曳垂楊輕紅發朱杏忽焉幾千里始渉齊魯境春風度去陌夏雲薄前嶺花落樹隂繁鶯鳴晝逾永戀土厭薄遊懐人復心耿天闕五雲中蓬窗日延頸歸鶴篇皎皎雲間鶴不受氛塵侵幽人一以贈馴爲階下禽春風舞翩翩秋月唳清音經年託儔侣欲别意難任念非夙所隨還歸嘉樹隂客既眷故鄉鳥亦適故林去矣物無累懐哉誼已深願比雲霄翼常同萬里心出塞涇原北望塞門秋漠漠沙塵暗戍樓羽檄不來氊帳逺前軍夜獵海西頭馬森一首森字孔養懐安人嘉靖乙未進士累官太子少保兵部尚書諡恭敏有鍾陽集分水闗出闗閩土盡征路楚山迎曉霧連空暗炎天過雨清人來千樹杪鳥雜百泉聲每憾箯輿闊難從石罅行靳學顔二首學顔字子愚濟寧人嘉靖乙未進士除南陽推官累遷吉安知府歴左布政使入爲光祿太僕卿以副都御史撫山西轉工部侍郎改吏部有兩城集朱中立云子愚詩宗初唐雄渾老健卓然成家出塞大漠羽書傳君王勑視邊徵兵動河朔伐鼓下祁連鐵騎金沙冷雕弓寳月懸由來重恩紀不爲勒燕然即事片片輕鷗淥水涯隔溪楊栁是誰家主人有酒不招客可惜滿林紅杏花陳堯一首堯字敬甫南直𨽻通州人嘉靖乙未進士歴官刑部左侍郎有梧岡詩集夏日後樂園雜興吏隠容疎放園居况寂寥䕶花編架宻種豆引泉遥閱世思緘口逢人恥折腰無能煉丹鼎華髪日蕭蕭康朗一首朗字用晦惠安人嘉靖乙未進士歴官右副都御史巡撫貴州昌平道中塵俗每相拘日夕不遑息暫輟簿書勞山間事行役驅車出北郊晴煙委園陌松梢露漸稀草際霜已白初與市塵違忽見山如積明月含半峰流水時滴瀝良似故山中眷言素所適游子未能歸懐哉安可獲許穀八首穀字仲貽上元人嘉靖乙未進士除户部主事改禮部轉吏部郎中遷南太常少卿謫浙江運副起爲江西提學僉事陞南尚寳卿有外臺武林省中歸田諸稾穆敬甫云許公家建業自能爲六朝語詩話石城詩頗近大厯十子新秋飲秋澗宅分韻得我字輕飈送驕陽嘉節屆流火故人敞層軒芳筵列瓜果野老纔豋堂良朋漸盈坐展卷道古今泯迹忘爾我赤日既西暱凉月生樹左髙天飛白雲歴亂不成朶遷席向廣庭縱横樂皆可既醉乃言旋竟忘白幘墮揮毫贈同心志合㑹終妥母然逐輕肥令人笑委瑣畫鹿行古來寫鹿誰最賢耶律以後皆無傳吾鄉近推快園叟毫端物態俱天然快園野叟氣豪蕩此圖全得山林象疑從靈囿翻然來走入君家錦堂上元圃平開藥草生靈泉倒瀉溪流清溪邉跂跂似求侶草畔甡甡如有聲野叟風流不可見綵筆貽君足珍玩霜毫豈羨芙蓉園銅牌未數宜春苑憐君自是全生者百年意興惟原野世路逃名不受羈雲厓結伴寧相捨予本江南一散人悔将書劍誤風塵披圖便欲捐簪珮共採苹蒿樂性真偶成新作魚鹽吏遥辭龍虎都乾坤無棄物江漢有潛夫短笠三山雨扁舟八月鱸兹懐何日遂把酒意踟蹰夏日過西宗别院退食尚書省聨鑣大士林地開仙梵境客逺市塵心石竹下空翠山雷生晝隂朅来幽賞意一寄白雲岑送馬抑之冊封魯藩惇族開新典貤封輟從官使星過即墨廐馬出長安日躍扶桑樹芝生泰嶽壇勝游多賦草揮贈故人看過徳州樓船御北風渺渺過齊東種秫生涯薄誅茅結構同日沈平野上人語近村中水面看牛斗星槎似可通雪吳山冬盡雪初飛極浦彤雲合翠微越女臺邊猶黯淡蘇公隄上已芳菲他鄉酒盞愁仍把虚室琴書浄可依所願普天歌樂歲故園休問幾時歸豋五雲山名山髙擁五雲層危磴重重躡屐登西望諸天應咫尺東來疊嶂總丘陵海門遥指三山樹梵殿常懸七寳燈便掃蒼苔題短句乾坤髙覽記吾曽王維楨二首維楨字允寧華州人嘉靖乙未進士選庻吉士授檢討歴修撰諭徳陞南京國子祭酒以省母歸值地震陷死有槐野存笥集孫志髙云槐野詩宗少陵多深沈之思務引於繩墨必結構中度而後出之不王元美云王允寧如馬服子陳師自作竒正得兵法又如項王嘔嘔未了忽發喑嗚陵穆敬甫云王詩負氣不泄沈鬰有調大是少之遺不俞汝成云槐野詩磊塊瀺灂雖非純雅之辭失雄渾之氣胡元瑞云嘉靖時為杜者王允寧孫仲可為六朝者黄勉之張愈光允寧于文矯健勉之於學博洽皆勝其詩若李舒章云允寧意氣觕可若云學杜尚未有毫分詩話王允寧孫仲可皆學杜而不得其門允寧自詡七律然尤懦鈍五言有句無篇如千里秋江水孤舟月夜吟髙林風葉下逺渚薄雲低花樹迷官路濤聲入縣門山無雲斷䖏塔有雁來時三疉尊前酒雙旌畫裏身暮雲迷逺岫春棹響空江天險分秦塞神謀度漢兵尚泠然可誦也允寧死於地震謗者謂獲罪華山之神攷同時死者尚有楊尚書守禮楊都御史邦竒馬光祿卿理李伯華詩所云平生三老友一夜委泥沙也諸公豈皆獲罪於神者邪事在嘉靖二十四年十二月十二日夜蒲州震尤甚山隂僖順王聰㴻亦薨又輔國将軍四人承國将軍一人鎮國中尉十七人輔國中尉三人庻人五人縣主郡君淑人各一人夫人四人齊厭死伯華詩又云四方多變異詎止平陽哀户曹倐降火渭流却逆洄山崩兼泉湧彗見復風霾犬育在雞卵蛇出由人懐雨豆血淋漓妖鳥羽毰毸虎産於猪腹人生自鼈胎李樹忽結𤓰多而更且魁夜見火城出蓮從上釜開妖孽如此天心可知而西苑君臣方以丹鼎青詞相尚祗見白龜白鹿頌瑞應者紛紛真可長太息也伯華詩太觕鄙以其紀事特詳故附録以資史局述五行志者孝烈皇后挽歌範内留芳訓扶天有駿功仙游知跨鳳聖念為當熊玉珮虚無裏蒼雲悵望中宜春花照眼淚灑舊時叢詩話宫婢楊金英欲斃世宗于熟寝以繩束帝喉未絶有張金蓮走告皇后往救獲甦此嘉靖壬寅年事也訊得同謀者楊玉香邢翠蓮姚淑翠楊翠英闗梅秀劉妙蓮陳菊花王秀蘭徐秋花鄧金香張春景黄玉蓮凡一十三人悉磔之于市王祭酒維楨孝烈方皇后輓歌仙游知跨鳯聖念為當熊蓋指此也熱院深風不度火鑠井猶温林宻翻包暑蚊多故趁昏何方無五月明發問孤村蓮洞凉如許茶瓜與客論駱文盛二首文盛字質甫武康人嘉靖乙未進士選庶吉士授編修有兩谿集蔡子木云兩谿詩沖澹爾雅出孟貞曜之上孫志髙云質甫詩婉切沖雅似唐人聲調讀延生集適俗韻自少愛山情頗多邇來南山下卜築當巖阿檻外倚修竹牆頭纒女蘿藹藹叢桂隂鬰鬰喬松柯清泉日夕流好鳥鳴相和展書坐磐石書中意如何延齡與養性要在蠲煩苛長生豈敢慕庻以痊沈痾左順門值雨曉漏趨朝候殷雷送雨時殿雲低拂檻檐溜急通池自訝沾衣速何妨退食遲宫鶯春罷囀應濕上林枝王立道一首立道字懋中無錫人嘉靖乙未進士選庻吉士授編修有具茨集送沈夷齋飛來雲中雁十五自成行如何同心友各往天一方憶與君相見桃李熈春陽胡然忽離跡飛蓬卷秋霜天時有代謝人事安可常不見参與辰出沒遥相望雖有盈尊酒何能解中腸劉繪二首繪字子素一字少質光州人嘉靖乙未進士授行人選户科給事中轉刑科右給事中出知重慶府有嵩陽春詠皇甫子循云先生經術文章可謂兼之若騷賦詩歌則固北海餘聲宣城寄興非所專好也詩話潘恭定試士中州得子素卷曰此河岳英靈也子素既釋褐給事省中偕同官夀貴溪貴溪手玉盌行酒子素揮之次日疏其十罪不報明年六月朔日食晝晦永陵大恐問天官主何占子素請去言以塞天怒言遂去位子素亦出守及言再相嗾南省論罷其大指謂飲酒酣歌自稱豪侠當場蹴踘旁若無人廣聚生徒而要譽多張讌㑹以慆淫既歸田講范白之術取負郭水田疏為大壑種魚萬頭牧馬山荘得良駒六十匹又責僮往来徐揚貨布及鹽課入息以給賓客其答楊用修書云人情有所寄則有所忘寄而意不縱則忘之不逺惟忘之逺而後我無所貪無所貪而後能適盖亦自道也與熊叔仁論文云仙釋二氏非聖之書吾既不從其道却借彼之言以資吾文所謂文者将何所爲乎為文而雜以二氏語此唐宋間雜學之弊也昌黎不道二氏語與二氏言必舉六經之言告之子厚謂某秀才文多引荘列頗奪正氣論亦凛凜至與二氏言便盛稱其教而雜諸戒律毗尼之說却不自覺蘇氏記大悲勝相諸作至為偈語準楞嚴法華大不宜也其持論甚正詩非所長比于伯華稍事剪裁曉望終南終南亦何有白雲長英英層峰亘西來巍然臨咸京中有太一洞窈窕清籟生鬰鬰古柏竦闗闗春鳥鳴紅泉石乳溜金竈丹光縈經年鮮人跡翠竇懸空青我欲往從之坎壈不能行緇塵滿周道蹢躅傷我情何能奮飛去翛然學長生送吳祥雲赴趙總戎幕天門昨夜耀龍文大将横戈正立勲上谷不傳青海箭漁陽新練水犀軍金笳夜嘯樓前月赤幟朝翻陣外雲逺客莫辭千里去滿堂珠履盡迎君薛應旂一首應旂字仲常武進人嘉靖乙未進士除慈溪知縣轉南吏部主事歴浙江提學副使改陜西有方山集詩話方山以帖括擅長既負時名遂專著述所續通鑑孤陋寡聞如王偁李燾楊仲良徐夢莘劉時舉彭百川李心傳葉紹翁陳均徐自明諸家之書多未寓目并遼金二史亦削而不書惟道學宗派特詳爾憲章録一編似未覩實録而成者若浙江通志簡畧太甚俾後之欲知前事者漫無考稽文獻不足徴是誰之過與昔劉仲原父謂可惜歐九不讀書覽方山遺編頗同此恨詩其餘藝不必論也贈朱子价美人淮南來貽我瓊瑶篇扣之作哀玉引被清商絃怱復渡江去揚帆凌紫煙臨風愴然别佇立還自憐况當三五夕皓月生嬋娟盈盈媚河漢對影成留連豈無新相知故舊情獨牽折葵製團扇置子懐袖間采蘭結芳佩繫子衣帶邊如彼逺行邁勿爲中路捐陳鳳四首鳳字羽伯號玉泉上元人嘉靖乙未進士累官陕西参議有清華堂擇存王元美云陳羽伯如東市倡慕青樓價微傅粉澤絶工顰笑始至郡予本澹蕩人十年滯空谷偶逢純熙運釋擔荷甄録浮沉金馬門日飽太倉粟恭承紫宸詔持法佐明牧此邦古帝丘在昔號淳樸所嗟末世僞浮雲恣反覆秋荼網何宻棘林夜多哭折獄媿惟良受命如集木雖乏淑問資尚希士師躅願同于公仁無取髙門福庻獄惟庻慎仰禆刑措俗嘉禽庭可巢幽圄草生綠矢心及兹辰詠言聊自告贈别孫子請告還山丈夫各有志所志在千秋臨岐送將歸觧贈雙吳鈎子有髙世才行矣善自謀盛年易就衰去日安可留努力萬里途及時須好修肯戀京洛塵以貽静者羞行經李膺墓炎精黯無光吹嘘賴君子三君世所宗吾愛司𨽻氏大厦業将傾一木支未巳昊天不祚漢人亡國隨圯偶兹行役餘幸覩豐碑峙荆榛莽交道荒丘竟誰是龍門徒想像仙舟渺云逝石麟既埋沒原隰自虧蔽我懐若而人九原嗟莫起驅車行灑泣落日照寒水再送環浦憲使攬轡喜重臨臺端遂盍簪離亭忽此别客思一何深雨雪燕山道江湖魏闕心知君多古調三歎憶遺音周天佐一首天佐字宇弼晉江人嘉靖乙未進士除户部主事上疏救楊爵廷杖卒萬厯中追贈光祿寺少卿天啓初追諡忠愍有績山存稾過田家五月過田父刈麥方暮歸徵租公府吏督責詣荆扉舍擔具雞黍向吏語依依非敢後官稅去秋穡事微晚場穫無糓婦織不上機此月幸有麥欲救眼前飢送吏行出門歎息淚滿衣千村多飽吏不見一農肥牛恒二首恒武功人嘉靖乙未進士仕至周藩左長史周藩宫詞二首蕭蕭修竹映池寒分汲銀缾灌牡丹報道花朝開内宴競持金剪繞朱闌夜來行樂鴈池頭侍女分行秉燭遊唱徹憲王新樂府不知明月下樊樓陳元珂一首元珂字仲聲閩清人嘉靖乙未進士有雙山集新構一笑亭于烏石山隂漫述曽聞劉隨州英采特髙妙觧印無與言見山始一笑伊余慙古人拂衣幸同調結屋傍山隂開軒面層嶠庭草惬幽懐巖雲増逺眺况有同心人銜杯縱吟嘯翠篠逗曉風薜蘿收夕照散地有餘歡閉門忘津要悠悠百年身此意知誰肖張天麟一首天麟深州人嘉靖乙未進士旌徳道中小邑無郵吏農人半甲兵石樓横斷岸草徑入荒城聞道甘泉駕将臨細栁營風塵何日静洗眼看昇平吳瓊三首瓊字邦珍婺源人嘉靖乙未進士送方際明之金陵津亭楊栁色話别思如何爾向金陵去應聼玉樹歌石城寒雨散牛首暮雲多好獻匡時䇿無須念薜蘿旅邸除夕老至謀仍拙天寒酒易消冰霜愁裏過鄉國夢中遥一歲秪今夜百年能幾宵病懐堪自適無復歎蕭條歲暮書事海上猶多壘江東未息兵如何觀察使遽報武功成寒沍凝春令隂霾蔽日明不堪黄浦路雞犬寂無聲施峻三首峻字平叔歸安人嘉靖乙未進士除南京刑部主事歴郎中出知青州府有漣川集王元美云施平叔如小邑民築室器物觕完裁徐伯臣云平叔詩隨時上下而格調渾厚體平實固一代之良茅順甫云施青州詩音響興寄與荆川相上下詩話平叔以七律自詡閭黨交稱焉然殊不見好諸體過修邊幅未免氣餒顧箬溪序之謂唐以後詩音調格律相尚鍛鍊益工其氣益弱毋乃㣲辭也乎撒秧謡東阡有田三十畆秧糓已撒十五斗去年薄收難接新種得早稻方救貧相傳今年晩更好十分秪宜一分早東鄰西舍皆晚禾我種早稻知如何郊扉青入秧田雨黄連麥坂雲郊扉聊騁望世事不須聞竹外鳩雙語花前鶴自羣溪邊來縣尉載酒勸農耘寄王屋張山人元超隠隠茅堂鎖白雲萬峰飛瀑静中聞徵君只在東西崦碧樹叢深路不分郭萬程一首萬程字子長閩清人嘉靖乙未進士刑部主事有雲橋集仗劒仗劍遊薊門蹉跎歲華晏中懐日鬱紆結髪從遊宦一謝鹿豕羣誤䝉犬馬豢宫殿生洊雷浮雲在清漢徒有憂天心無從隕首諫退而礙禄養進則涉誹訕悔作章句儒書空徒浩歎忠義本區區焉敢私憂患耿耿平生心何由愬親串茅瓚一首瓚字邦獻錢塘人嘉靖戊戍賜進士第一累官太子賔客吏部左侍郎兼翰林院學士有見滄先生集寄王冉山清商凉氣肅白露瘁庭柯美人去極浦一夕秋風多言念燕婉情攜手南山阿為樂苦不周良游忽蹉跎瞻彼松柏枝引蔓附女蘿而我同心侶悵别情如何袁煒一首煒字懋中慈溪人嘉靖戊戌賜進士第三授翰林編修歴侍講學士禮部右侍郎進尚書召入直改户部加少傅兼太子太傅建極殿大學士卒贈少師諡文榮有元峰集王元馭云公詩華富温宻無棘塞詭衆之詞詩話永陵自壬寅宮婢之變即移寓西苑萬夀宮不復居大内先是嘉靖二年四月太監崔文等於欽安殿修設齋供請駕拜奏青詞此金籙青詞之萌芽也其後齋醮日盛一時詞臣以青詞受寵眷者甚衆而㝡稱旨者莫若袁文榮煒董尚書份如世所傳醮壇對聨云洛水元龜初獻瑞陽數九隂數九九九八十一數數原于道道通元始天尊一誠有感岐山威鳳兩呈祥雄聲六雌聲六六六三十六聲聲聞于天天生嘉靖皇帝萬夀無疆此則文榮所撰也時禁中有貓微青色惟雙眉瑩潔名曰霜睂善伺帝意帝甚憐愛之貓死命以金棺𦵏萬歲山薦以齋醮文榮撰詞有化獅為龍語因題碑曰虬龍冢云王秀才逢年上文榮書曰閣下以時文發甲科以青詞位輔相安知世有所謂古文者哉快意之言然未免直而無禮矣初夏宴崔太常道院出郭㝷元圃黄鸝懐好音瑶壇羣木秀清磬碧雲深綠酒傾燕市微風動越吟歸來蹋明月萬户漏沉沉翁大立三首大立字儒叅餘姚人嘉靖戊戍進士累官南京兵部尚書吳謳三首蠢兹田中氓輸稅入城府上逢官長嗔下遭卒胥侮但保微軀完寧論錢如土官輸曽幾何羨餘反無數錙銖茍未償猶然禁囹圄待得還鄉閭敝廬無完堵舊徴未云已府帖重徵新昨朝銀花布今日金花銀侵晨趨城府薄暮徧鄉鄰一身應重役重役無寧晨父母生我時胡不百我身殘軀被箠楚苦切難具陳寧爲乞市子莫作當官人鄉民不出鄉何曽識京輔官家督輓輸僉丁作温户給文督儲臺豋數度支部盈虧日較籌未敢捐區釜中途忽遘患漂没河淮滸經年未能償逢人涕如雨人憐征戌勞誰憐輓輸苦陳紹儒一首紹儒字師孔南海人嘉靖戊戌進士累官南京工部尚書有司空集送吳中丞悟齋巡江青霄繡斧出郊行春水樓船壓浪平聖朝王㑹自江左才子風流今舊京城隅黄栁色轉變湖上碧桃花欲明正好芳辰無那别勞勞亭畔不勝情喻時一首時字中甫光州人嘉靖戊戌進士累官南京户部右侍郎有吳臯海上老人二集安如山云吳臯詩格律宏雅思出象外僻李時逺云海上老人詩思苦澀好用事及佛書多斧鑿痕村舍塵斷蒼波繞村遥碧嶂臨晴沙隨豕跡風葉送禽音誰笑兔園册獨憐鷗社吟四時真賞在幽事動闗心章煥三首煥字懋實吳縣人嘉靖戊戌進士除禮部主事歴吏部考功郎中轉南京太僕少卿進光祿卿以右僉都御史撫治鄖陽改河南巡撫尋以右副都御史總督漕運改督南京糧儲坐誣逮繫遣戌自稱羅浮山人有陽華漫稾醉翁亭漫題醉翁昔醉醉翁亭翁醉還看翁自醒我來亭中翁已去釀泉之水空泠泠相邀明月坐白石舉首青天横翠屏眼前有酒不能酌相逢一笑花冥冥聞冦至吳門焚刼豋樓作江上黄塵惨不開吳門不見使人哀虚聞青海無傳箭始信昆池有刼灰忝竊自慚稱吏隠故園何日賦歸來傷心野哭千家處愁倚滁南百尺臺南巖宫三十六巖何者竒南巖巖壑多幽姿飛空欲作翔鸞舞跨澗真看渇虎垂樹杪迴欄時隠見雲中棧閣故参差歸旌欲問來時路洞口雲深已不知萬虞愷二首虞愷字懋卿南昌人嘉靖戊戌進士除無錫知縣徵爲南兵科給事中累遷山東参議福建副使貴州叅政福建右布政使山西左布政使擢南京都察院右副都御史入為刑部侍郎有楓潭詩鈔山中曉行攬衣中夜起秣馬早鳴鞭殘月不照地明星猶在天出門頻問曉歴澗暗聞泉翳翳東林外山雲雜隴煙烏江廟入闗事已定豈在割鴻溝霸業一朝盡烏江萬古流周怡一首怡字順之寧國太平人嘉靖戊戌進士除順徳府推官擢吏科給事中以言事受杖繫獄乆得釋隆慶初起遷太常少卿及卒鄉人私諡莊簡先生天啟初追諡恭節有訥齋集詩話訥齋封事因翟嚴二輔臣市恩修怨而發疏中有云陛下日事禱祀而四方之水旱灾傷未能消也嵗開納銀之例而府庫未能充也嵗頒蠲租之令而百姓未能足也時下選將練士之命而邉境未能寧也深觸永陵之怒廷杖之下錦衣獄踰年乃釋既而與楊爵劉魁仍逮繫所著訥齋集大半獄中與爵等倡和作也知二弟至用韻慰之歲晚吾長滯秋深爾逺來鶺鴒飛已急鴻雁去還哀伯氏喜猶在爾懐强自開可憐風雨夜須酌觧愁杯王健七首健字偉純永嘉人嘉靖戊戌進士歴官光禄少卿有鶴泉集過馮公嶺飄飄谷雲飛泠泠澗水流水雲亦何心旦夕使我愁憶昔離鄉縣迨今逾二秋形容日以變光景去不留墨翟非咸英楚王惡卞璆主恩不時遇志士徒包羞井渫豈不食受福明王求攘袖啓箧笥攬取雙吳鉤贈江臯陳子日月互代謝火旻忽西馳荃蘭秘幽谷芬馨誰復知矯矯江臯彦文彩未彰施鳳凰棲庭梧鵬鳥運天池機哉不可度神物固有時君其抱明志終始以自持上陵玉帛來天府衣冠去國門萬年周典禮七葉漢陵園月擁元宫迥星依紫極尊翠華如在上瞻切五雲屯送友良晨餞我友長鋏歸去來請歌青玉案贈别黄金臺一鳥日邊下片帆天際開知君意不適行矣首重囘别建安尹陳石陽王粲忽不樂陳琳將逺行三秋離别思十載結交情日下飛鳬影雲中去雁聲有懐他夜月夢繞建安城懺閣阻雨危崖側轉路千重懺閣豋臨坐午鐘可是潭龍来聼法半山香雨忽濛濛題湖南處士卷湖南結屋水雲間十里平湖抱岸還日落沙明開玉鏡芙蓉倒浸郭公山張秉壼一首秉壼字國鎮莆田人嘉靖戊戌進士歴官太僕少卿過楊文敏公塋豐樂橋前擁紫雲路人指視太師墳不為子姓干恩澤力與鄉邦寢運軍國有三楊翊社稷門無一字表元勲髙賢去矣餘封土落葉蕭蕭日近曛温新三首新字伯明洛陽人嘉靖戊戌進士官主事有大谷集宿靈寳驛館桃林在山城木葉秋我行聊駐馬訪古憶歸牛風浪黄河近塵沙白日愁鄰家好明月今夕自髙樓白溝河先世武功所在感而賦焉朝行清苑市暮渡白溝河此地煙塵渺先人戰伐多野猶存大樹世已罷横戈渉水思鴻烈臨風發慨歌野菊重陽不見鄉園菊野徑折來尤可憐為客正當嶺海外逢花偏憶酒杯前荒英斷葉愁相把落日飛雲恨轉牽兩歲佳辰俱自負幾回欲賦不成篇沈鍊二首鍊字純甫一字子剛㑹稽人嘉靖戊戌進士除溧陽知縣調茌平再知清豐入為錦衣衛經歴坐劾嚴嵩廷杖謫田保安州尋為嵩所陷僇于邊隆慶初贈光祿寺少卿諡忠愍有鳴劒集王元美云青霞詩甚竒麗而不能盡削其牢騷憤激之氣故往往多楚聲陳卧子云青霞快男子詩亦俊爽寄諸生楊子中碧栁青莎怨暮春沙明水白更傷神姢姢夜月當樓静冉冉飛花入座頻海畔音書常阻絶山城瘦馬苦逡巡坐憐物色多惆悵欲覔芳洲彩句新答陳鳴野社友十年赤縣頻為吏一疏中朝便落官勞寄音書如夢寐細籌世路轉艱難馬蹄最識邊沙苦鴈影猶驚塞月寒詞客幸能憐旅况玉門應為賦生還茅坤一首坤字順甫歸安人嘉靖戊戌進士除青陽知縣以憂歸補丹徒知縣徴授禮部主事改吏部左遷廣平通判陞南京兵部主事出為廣西按察僉事歴副使有白華樓玉芝山房耄年諸稾詩話世傳唐宋八大家之目係鹿門茅氏所定非也臨海朱伯賢定之於前矣彼云六家者合三蘇為一耳今文抄夲大約出于王道思唐應徳所甄録茅氏饒於貲遂開雕以行即其評語稱闗忠義為闗夀亭不亦剌謬甚與文既卑卑詩亦庸鈍觀其酬酢多醫卜星相之流知非意所存也春日蹋雪彭城道中春日獨傷春事稀馬蹄又向雪中歸數家煙火望欲斷幾樹飢禽寒不飛有客尋詩穿谷口無人載酒欵林扉看山不覺日已暮千里雲霏生薜衣莫如忠一首如忠字子良松江華亭人嘉靖戊戌進士除南京工部主事改禮部擢貴州提學副使投劾歸補湖廣副使歴河南参政陕西按察使浙江布政使有崇蘭館集陸與吉云中江抒寫性情諧合風雅五七言近體可以上方王孟抗行岑劉卧過成山云方伯詩縁情體物敷腴雋永陳子云方伯名徳羽儀詩頗朴易送王汝修楊翼少二給諫募兵河南山東皇明盛文軌武偃不復張雲中一失險彍騎遂縱横甘泉照烽火穹廬薄城隍豋陴半市傭格虎驅羣羊養兵百年來國恩竟誰償天子赫震怒徴發無留良王生按臨淄楊子涖大梁千金募勇士桓桓奮鷹揚丈夫四方志狥國在邊疆無專職青瑣搤腕談慨慷喬世寧九首世寧字景叔耀州人嘉靖戊戌進士繇南京刑部郎中遷四川按察僉事歴湖廣提學副使河南参政終四川按察使有丘隅集王元美云喬景叔如清泉放溜新月掛樹然此景殊少不耐縱觀宋蔣仲舒云景叔趣本爾雅調亦清和規模沈時沿李白敓孫山甫云三石子詩不作唐以後語盡洗剽繁陋之習一裁於造化性情之真傳也必逺詩話何仲黙視學秦中景叔親受詩法譚必移日故其詩整而不浮可與許少華肩並餘蔑有過焉者燕歌行西日不再中東流無迴波人生如夢寐少壯能幾何朝馳長安道暮送歸山阿胡不置酒髙堂鼓瑟日以歌君王萬歲罷干戈霍家衛家相經過千金駿馬換吳娥今者不樂來日無多黄金白髪奈君何鴻鴈行鴻雁何聨翩聫翩西北翔西北曠何許逝將之塞疆我有一書札緘之金玉箱將以遺所思道路阻且長因風託羽翼為爾立徬徨去時春草青歸當秋草黄草黄歲将晚毛羽恐摧傷願言愛毛羽邊塞多風霜長安道長安道直以迂環五城開九衢外羅天市拱皇居中懸日月耀金樞朱輪驄馬如流水長安道上禁馳驅誰家少年侠邪徒豪雄去天尺五餘白日殺人當路衢司𨽻過不問况乃執金吾人言輦轂之下朝犯法暮伏誅吁嗟此徒天日無霍家奴衛家奴竹杖歎我病常持一竹杖出門入門全爾仗病愈却之曽幾時不復念爾能扶持我心視汝無好惡秪縁衰健情亦移何况世情雲雨變妍媸翻覆須臾見寳劍棄擲康瓠留得時即貴失時賤新人入門故人出秋風那復悲紈扇鳥盡弓藏自古然竹杖竹杖何足歎入塞沙海烽塵息将軍奏凱旋九邊傳露布一夜到甘泉天子開麟閣都人望馬鞭定知金市裏甲第在今年秋夜今夜燕城館忽驚霜露侵寒砧薄暮急落葉下庭深為客仍多病悲秋正苦吟誰家明月下吹笛更闗心春鴈春風纔幾日江鴈已春聲闗路何時返鄉愁爲爾生望窮遥漢影不盡倚樓情却憶金河北人同出塞行聞河西警報上郡連烽火河湟更羽書一時傳警報中夜獨躊躇歲苦兵戈擾身憐老病餘名山猶未卜何䖏可閒居馬湖豋覽四海車書日干旄萬里揚牂牁今作郡魑魅舊為鄉江自金沙出山連玉嶠長歲時常霧雨草樹只青蒼舟楫通吳楚楩楠足棟梁千秋賔上國一統見今皇到此真殊域憑髙覧大荒嵐光生澗壑雲氣滿衣裳西徼仍多難當闗詎可忘天王今有道舞羽為邊防徐楚一首楚字世望淳安人嘉靖戊戌進士除工部主事歴官四川左叅政有吾谿集築圃垂老學為圃乗秋課築場編筠聊覆屋疉石更圍墻蔓草芟宜盡嘉蔬刈可嘗親朋時一過漫說午橋莊沈啟口山二首啟口山字子由吳江人嘉靖戊戌進士歴官湖廣按察副使有西臺越吟楚吟家居雞窠諸稾過越王祠湘湖雲樹杪翼翼表崇祠殿古巖煙合苔深石磴危霸圖昭越絶教訓首西施尚想烏鳶曲君臣别淚滋黔陽舟中黔陽春草碧雲齊萬疉青山萬曲溪久客不禁鄉土思半檣殘月子規啼王問八首問字子裕無錫人嘉靖戊戌進士除户部主事歴郎中遷廣東按察僉事以父老請歸及卒門人私諡曰文静先生有仲山詩選祗役稾原筮齋集崇文館稾王敬美云子裕詩翛然清逺吸穆敬甫云仲山如姑射仙人露飡霞都無塵壒之氣詩話仲山兼擅畫書詩畫多游戲詩不起草五言平衍者多歌行稍覺頓挫近體亦嫌率易越縑宣紙流徧人間披覽手書或與集中詩有異由其才多下筆不能自休字句轉易皆於俄頃也贈友人秋風吹衡宇絡緯已宵吟忽忽歲將暮誰不念所欽合并嗟難久㑹合喜自今良辰且為樂胡不日鼔琴白駒一朝去金玉懐爾音交義永不薄悠哉君子心贈别沈少坡寅長白門栁花覆大堤東風吹來逐馬蹄征車迢迢君觧攜故人猶在鍾陵西鍾陵江頭落日低爲君執鞭花下迷憶君路傍春草齊到處交交黄鳥啼采蓮曲貽施子羽子羽爲海鹽丞不得志將告歸采蓮湖上故有是贈采蓮歸常日暮西江極望平所思在遥浦月滿蘭房未有期風急湘川不得渡長干女兒不觧愁羅裙結束盪蓮舟始逐輕鷗過别浦還隨飛鶩向中洲中洲别渚常相見向晚江風各分散獨惜流光歎落花芳菲易盡心先斷築城謡常熟縣作築城入荒草白沙無煙莽浩浩築城上髙山崩崖錯崿青冥間我生不辰可奈何昔日防邊今備倭馮馮一杵復一杵丁夫如雲汗如雨星火出門露下歸野田苖稀黄雀飛今年縣官復徴稅城下相逢只垂淚官軍來白鶴鋪前沙日黄湖渚草長倭走藏柘林舊賊驕不去新舶正發南風狂寳帶橋西蛟起舞白石山邊逐虓虎湖南六郡多旌旗賊勢西來疾風雨城頭戍鼓聲如雷十城九城門不開刲羊宰牛具宿酒日夜秪望官軍來團兵行銷鑱钁鑄刀兵佃家丁男縣有名客兵貪悍不可制糾集鄉勇團結營寧知縣官不愛惜疾首相看畏占籍奔命疲勞期㑹繁執㦸操場有飢色星火軍符到里門結束戎裝蚤出村將軍令嚴人命賤一身那論亡與存保正同盟衛鄉里何期逺戍吳淞水極目沙壖白骨堆向来盡是良家子田家行田家場圃築過畦大兒當家小兒嬉刈稻上場隠茆屋黄日下檐雞啄粟人言畝收八斛餘官廩私租未及輸樂歲家家猶自苦今日江南不如古贈之山之山家太倉州為園種竹歌咏自怡海冦至避居金陵與予月夜歩栁隄想念疇昔悽然傷懐城柝聲悲夜未央江雲初散水風凉看君已是無家客猶是逢人說故鄉何御六首御字範之福清人嘉靖戊戍進士歴官浙江鹽運使有白湖集别何子北風吹征襦與子重契闊仰盼雙禽翔握手不能發一似野中蓬一似弦上筈朝望在河梁河水鳴活活夕思隔河梁浮雲起天末悠悠生别塗慎矣無飢渇觀碧雲寺坐石泉邊酌酒侵晨發廣源到寺日亭午囘見山下居頗異闤中土樹底禽闗闗巖間鹿麌麌鐘鳴出紺林香藹薄珠宇薜茘當髙垣蘼蕪雜修楚入門釋襟裾衆僧相導武軒軒望虛堂歴歴轉迴廡石泉山下行流杯坐中取渟渟静心源皎皎鑑神府即此慰遐情何戀珪與組青龍橋南遇山人汪旦沼湖行欲竟前望青龍橋茅茨鬰煙火稍已鄰紛囂故人歘相值雅見塵外標長揖立道左眷言相招邀山居當甕麓轉岐路非遥松膏堪繼夜菰米足供朝畦蔬滴露薤林果炊新蕉慷慨珍來意宛戀停予鑣野風吹秋水征馬鳴蕭蕭願留竟莫克投贈媿瓊瑶鄭林二君就北園僻郡稍無事而多載酒臨雨消秋後瘴雲薄竹間隂紀㑹賔朋寡看年鬢髪侵惟君數來往聊慰望鄉心自東粤歸口號嬾慢時將棄逢迎世所稱歸與從漢水去矣學於陵鶴唳聞青野猿吟出紫藤君看山谷士未必盡無能過慶原野燒萋萋尚雨痕半山斜日近黄昏驛亭阻絶來時路煙火蕭條戰後村倦鳥驚人移浦樹寒潮帶月上江門長年書劍催行色肉食慙孤報主恩俞憲一首憲字汝成無錫人嘉靖戊戌進士歴官湖廣按察使有遼海金陵蓬萊轂下外臺去楚當奕諸集詩語汝成手輯盛明百家詩足稱好事而甄綜未當舍彼蘭蕙反存菉葹卷首題識都不成文趙陵鋪岸谷遷移不可憑空餘春樹曉煙凝年年芳草王孫路走馬何人問趙陵陸師道一首師道字子傳長洲人嘉靖戊戌進士官至尚寳司少卿晚過治平寺修竹藏精舍香林遶化城窗中九峯秀門外五湖平綠樹凉雲合丹楓夕照明秪縁山太静易得感秋聲明詩綜卷四十七
