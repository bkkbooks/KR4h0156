body:
  text: 明詩綜卷三十八翰林院檢討朱彞尊編呂柟一首柟字仲木髙陵人正德戊辰賜進士第一纍官南京禮部右侍郎贈尚書諡文簡有涇野集天津天津城外水浮天海口東來萬里煙遙見帆檣雲外落却疑日月鏡中懸鶴巢不避波濤險蜃閣常依島嶼連愧是乘槎銀漢客幾回吟望斗牛邊景㿩二首㿩字伯時儀真人僑居南京正德戊辰賜進士第二仕至南京春坊中允掌國子司業事有前溪集顧華玉云中允詩主盛唐蕭散遺俗詞鋒沛發靡不中的陳羽伯云公詩瀟灑直寫性情無論唐宋雲歐楨伯云伯時文法兩漢詩主盛唐與蔣子趙叔鳴朱升之號江北四子靜志居詩話前溪集久遂失傳從盧子明廣陵詩選録得二首其與陳玉泉論詩云辭取達意若惟以摹擬為工尺尺寸寸按古人之迹務求肖似何以達吾意乎蓋亦矯北地之弊者懷水部蔣子雲棊局經旬隔壺觴勝引稀蕭條憐我輩鄰比有漁磯雲竹晴還雨風花落更飛相期過山館小坐可忘歸送陳戶部南使使節乘春色家園喜便過草堂寒雨細江堰晚雲多緑栁臨岐折青驪傍酒歌仍聞赴吳會勝事更如何王崇慶二首崇慶字德徵開州人正德戊辰進士纍官戶部尚書贈太子少保有端溪先生集送馬守之澤州寂寞山城裏春風未有花野塘新水細茅店酒旗斜故國音書斷長安道路賖何時共知已傾倒酌流霞舟次德州逺浦漁舟小寒天柿葉稀歸心正愁絶一鴈夕陽飛唐龍七首龍字虞佐蘭溪人正德戊辰進士纍官太子太保吏部尚書卒贈少保諡文襄有漁石集王元美云唐虞佐如苦行頭陀終少玄解顧穆敬甫云唐公詩若甲胄明光赫然耀日玄言云文襄風度瓌爽頗臻古雅藩陳卧子云漁石五言本之少陵已陟籬漸窺堂奧詩話文襄揚歷中外宦轍所至必有留題其詩長於五律句如鶯花邊地少風雨暮春多雲氣雨中白山光鳥外青斷湟春水淺亂石曉山稠赤峽青冥外飛泉急雨中星臨河影動風入鼓聲髙野水流漁市山雲進郭門雪埋青兕呌霞引白駕飛細雨孤帆落疏燈兩岸明巖林遺魯殿畎畝變秦川野鹿避人走山禽向我啼凍雲投浦宿倦鳥逐風回百里郵程逺三更候吏稀殘棊榕葉暑嫩醑菊花天巖置戍樓直峰懸鳥道斜客身病亦起短髮落還梳竹外青藜杖風前細葛巾移松邀老圃失鶴問前村均有風致送李拱元歸田春月白如雪春山青如銅楊栁未堪折歸客何匆匆三徑命巾車五湖漾孤篷從兹謝塵鞅陶然隱者風廣結桑麻交逺尋麋鹿蹤洪淵縱文魴遙漢短冥鴻嗤彼風塵子胡乃長書空雨懷二首細細風前斷疏疏葉上聞亭臺隱山霧城郭入溪雲轉益鄉愁亂還憐世事紛早秋身似雁天外獨思羣萬樹秋雲裏孤山細雨時江泥沾落絮花霧困遊絲懷抱為誰好親朋已久辭東溪讀書處一水護青帷冬至天涯長至日燈下逺遊人薄祿家猶賴休官話未真嵗時愁不住形影自相親幸有梅花發寒香可結鄰赦書坪渡渭渭北津多栁荒荒野色連十家橋外市雙櫓峽中船氷響潛魚聽沙明過鳥憐蹉跎歸色晚風雪又殘年成縣馬融絳帳臺太守傳經地幨輿趁月行栗亭秋雨歇魚峽夜川明竹外雙旌出沙邊一吏迎荒臺迷絳帳失學愧諸生送蔣石菴赴湖南細雨移尊日溪亭送客時風塵千里别宇宙幾人知雪夜山隂興春天渭北思老來鄉社裏杖屨更追隨毛伯溫三首伯溫字汝厲吉水人正德戊辰進士除紹興府推官徵拜河南道御史歷按福建河南湖廣升大理寺丞擢都察院右僉都御史巡撫寧夏山西順天回理院事升右副都御史工部尚書改兵部從駕南征加太子太保天啓初追諡襄懋有東塘集詩話東堂數與夏公謹李獻吉方思道相酬和故其詩頗具風格鹽池驛留别張僉憲共事未半載何當别匆匆對酒不能言沙磧驚寒風逖矣西夏區邊儲恆不充霜早嵗常歉役繁民多窮四時勞守􅕤終日事臨戎衣單腹不飽目擊心以恫多君計慮周每與愚議同正當期展布方念蘇疲癃慚余但謀始仗君還圖終愍此邊塞苦慎勿隳前功夜泊富陽秋夜江風急樓船水月明汀洲散漁火煙樹隱山城雁逐星河沒蟲依草岸鳴鄉心愁欲絶何處搗衣聲鄰霄臺和丁近齋殊方久客情能遣髙閣同登意忽開遏日髙帆過西峽霾雲古樹壓南臺沙村近帶農田出海岸遙看湘舶來醉下虛亭尋古迹斷碑危碣半莓苔周金一首金字子庚南京右衛籍武進人正德戊辰進士纍官太子少保南京戶部尚書贈太子太保諡襄敏有上谷漁洋二稿九日中山道中憶故園諸君子攬轡川原秋日晴嶽蓮髙並海雲生天涯佳節愁中過塵世歸心夢裏驚懷李街頭船傍屋通吳門下水連城登臨忽憶當時事落帽風流何限情潘鑑一首鑑字希古婺源人正德戊辰進士纍官兵部尚書兼右副都御史提督兩廣贈太子太保諡襄毅有古泉集餞家兄希仁寒雁呌汀洲歸程不可留聊攜季路榼相送仲宣樓嵗晚荆門樹風微漢水舟鄉心吾欲折行役幾時休奉謝中丞北湖公以丹砂見寄郢雪催殘臘荆雲繫病身雁過南嶽近書枉北湖頻梅福非凡吏桃源别有春丹砂開寶訣攜我出風塵陳達甫云後半有逸趣寇天敘一首天敘字子惇榆次人正德戊辰進士除南大理評事進左寺副遷寧波知府歷應天府丞以都察院右僉都御史巡撫宣府改撫治鄖陽再改巡撫甘肅入為刑部右侍郎以憂歸補兵部右侍郎有塗水集題畫十月梅花開已多蹇驢衝雪野橋過亦知金紫趨朝貴奈此當前清興何歐陽鐸一首鐸字崇道泰和人正德戊辰進士厯官吏部右侍郎贈工部尚書諡恭簡有恭簡公遺集次萍鄉明發宣風館秋隂得氣饒雲昏山欲斷泥濘路偏遙近縣峰頭塔橫江屋底橋舊時銅漏刻強半土中焦王應鵬四首應鵬字天宇鄞縣人正德戊辰進士纍官右副都御史協理院事有定齋集李杲堂云先生詩渾涵髙脫即置諸開元之際可謂大家其視學畿內告誡諸生以為學先立志不得輕議正人長者自絶於名教文章無徒仿摹字句其中索然致貽學術之禍一何深中後來學者之病痛切其言之也和淵明雜詩二首神京四千里遙途今已逼楊栁何蕭蕭秋風吹長陌雲深塞草黃露重秋江白仰視天宇寬俯覺微軀窄對景斯悵神當秋頻作客忽憶四明山山中有舊宅藹藹王朝士謀國如苞桑良穀非不多焉用存秕粳愾昔宣尼子栖栖亦絶糧鼎烹不足致時運有隂陽義命儻如此飢來非所傷白雲思故都皎月明東方安得夙心人共此今夜觴次瓜州有述鑾輿將出狩邏騎已先征淮北三年水江西六月兵已應經睿覽未許括蒼生直北天王地星河永夜橫曉發淮口春江歷歷水悠悠一夜東風五兩收花信不知何地早鄉書猶憶故園秋年來國是誰能定病起詩懷祗自愁昨日六飛巡幸後已將寬法遍南州韓邦竒三首邦竒字汝節朝邑人正德戊辰進士歷官浙江僉事轉山西參議擢僉都御史撫山西入為兵部侍郎進南京兵部尚書以地震陷死贈太子少保諡恭簡有苑洛先生集送唐中丞撫蜀聖主憂全蜀中丞出上台蠶叢橫地出熊軾倚天開節鉞分封陛風霜動柏臺莫辭前路險後命已相催再過褫亭野戍淒淒畫角山城處處寒砧最是秋風羇客不堪暮雨鄉心韓邦靖六首邦靖字汝慶邦竒之弟時號二韓正德戊辰進士除工部貟外乾清宮災應詔陳言繫錦衣獄奪官為民起山西左參議有五泉集王敬甫云五泉古歌詞浸淫初唐間逼漢魏七言絶句詩類少陵顧玄言云參議詩遒暢時有新語詩話五泉心慕手追乃在大復比於西原南泠不足方之孟有涯李嵩渚似勝一籌晚坐遙峰羅夕日髙原藹秋隂天風自何來吹我芳樹林寒蟬發哀調蟋蟀嗣其音嵗月日以暮霜露日以深相思不自遣無乃勞君心持君一杯酒聊以開鬱沈聞雁鳴雁蕭蕭下寒燈故故明角聲傳細雨雲色度髙城兄弟無書信乾坤有甲兵秋風歸未得見爾不勝情寄楊侍御師文逐客地雖僻故人情不疏已勞千里駕復覩數行書别思梅花後春風蕙草初江亭一杯酒何日話相於中秋同何仲默望月令節他鄉酒關山獨夜情看花秋露下望月海雲生碧漢通查近朱樓隔水明南飛有烏鵲作意向人鳴聖駕西巡歌渥窪龍馬屬天間沙苑牛羊入大官八府三邊俱望幸九重十月未回鑾谷太監出軍歌五千精鋭下良鄉雲裏旌旗鬬日光諸將不知中使貴夜來馬上别君王方鵬十一首鵬字時舉崑山人正德戊辰進士歷南京武選郎擢山西提學副使以疾辭用薦徵拜春坊庶子遷太常卿有矯亭集周子籲云太常詩尚典雅不事雕琢詩話矯亭古詩效陶近體學白頗饒自得之趣其自題小像云此像何人斯吳淞方矯亭頗記前身事生可六七齡一疾遽夭死天地為晦冥蒼頭抱我哭諸婦慟拊膺其家乃城居面北髙簷楹臨街列屠沽隂風助哀聲思之宛如胙語及輒涕零性靈想不寐還復得此生乃知記憶前身事匪獨鮑井羊環也感寓二首昔從京師歸賀客來滿屋家人紛治具牽羊就屠戮斯須立階除羊忽跪而伏亟命舍之去何忍見觳觫君子充是心當使萬物育如何一命士分符作民牧誅求入膏髓鞭撻爛肌肉置之囹圄中死者十五六安得如此羊食飽卧林麓縣尉謹修職屢受上官笞同僚狡而貪臺章交薦之泣與妻子謀歸去寧寒飢夷跖既莫辨守此復何為知足吟三首人見白髮悲我見白髮喜多少賢達人不見白髮死髙才李長吉有道文中子行年未三十相與歸蒿里吾生已倍之對鏡宜莞爾昔解晉皋組出處頗合宜不幸賤姓名誤為當道知有詔落致仕再起職論思人皆為我榮我心獨不怡終然野鹿性不能受銜羈蹤迹日以逺音問日以稀當道赫然怒奮筆逐去之人皆為我惜我心樂不支豈惟全晚節亦以釋羣疑地下見先子庶幾無愧辭山谷忤時宰運貶至宜州僧舍不容居置之南戍樓無奈風雨寒一疾竟勿瘳旁無期功親棺殮誰與謀豫今老牖下骨肉聚牀頭但見眼前樂不知身後憂康哉復康哉地下從黔婁紀異壬辰孟夏月既望夜入酉東鄰李氏子年可十八九門外聞作聲蓬蓬似鼓缶開門出視之四鬼捽其首踰牆更越樹勢若風雷吼捽至野廟中亂被老拳毆父母競號呼蹤迹竟無有親鄰各燃炬訪覓遍林藪夜半忽自歸狀貌殊獰醜其身長丈餘見者駭而走入門還復短瞪目但搖手母妻環問故稍語即閉口青紫色浮面縲絏痕映肘僵卧三日蘇不能記誰某此理終莫詰語怪戒魯叟西洲和時鳴韻水雲深處卜幽栖不減夔州舊瀼西寒雨渡頭孤艇沒夕陽江上逺山低養馴白鴨當門浴種就黃蘆與屋齊未識東山歌舞地祗將尊酒對山妻留都將歸先呈未齋羞將白髮戀京華已辦歸􅋔路不賖旋買雞豚投里社敢驅鵝鴨惱鄰家春風枕上聞啼鳥秋水溪頭看泛槎莫道山翁無一事借書沽酒亦生涯生日招逺林勞勞六十又三年半在愁邊半客邊假我餘生還對酒與人多忤合歸田花前卧疾妨春事枕上敲詩失夜眠此日江村期一醉淺沙深竹繫吳船丙申新正試筆和舍弟韻七十行年祗欠三清時無補自知慙輕寒枕上慵朝起細雨尊前劇夜談春意熙熙人自樂病懷黯黯我何堪賣花聲在東風外紅白江梅共一擔偶作靜掩荆扉送夕曛幾株殘菊散幽芬一燈影射青綾被雙杵聲催白練裙老去間思多舊事客來清話半新聞酒錢藥價粗能備莫怪先生懶賣文方鳳一首鳳字時鳴鵬弟同榜進士官監察御史有改亭集周子籲云時鳴負氣不肯詭隨於時肆志自適詩亦豪俊間居自入春來日日間柴門無客晝長關枕書榻傍階前樹對酒窗開屋後山葉暗新枝花盡落泥添故壘燕初還近來識得全生術不放愁催兩鬢斑邵鋭一首鋭字思抑仁和人正德戊辰進士歷官太僕寺卿贈右副都御史諡康僖有端峰存稿答程以道見寄之作兼簡徐用先近得遼陽信含情仔細看念君同患難垂老各平安野望餘沙漠邊愁重苦寒尺書艱往復惟有勸加餐孫璽一首璽字朝信平湖人正德戊辰進士官至山西按察僉事以子植貴贈刑部尚書有峰溪集關索嶺萬里雲南路三年始得歸野梅渾破萼官栁半垂絲嶺峻盤空險城尖疊石危邊疆據形勝天畔控諸尼程啓充一首啓充字以道嘉定州人正德戊辰進士任監察御史贈光祿寺少卿塞下曲黑龍江上水雲腥女直連兵下大寧五國城頭秋月白至今哀怨海東青戴冠七首冠字仲鶡信陽人一云吉水人正德戊辰進士授戶部主事以建言貶廣東烏石驛丞起戶部貟外出知延平府改蘇州終山東提學副使有邃谷集俞汝成云仲鶡聲調宏邁話意徑拔慷慨激昂有古國士風穆敬甫云戴詩如丹崖緑水淡然有味詩話仲鶡與仲默同鄉里詩亦同調謂之具體可爾或言其五言律勝於仲默豈篤論乎曉發村雞喔喔啼取火照行李隔籬謝主人出門渡溪水仰觀羅浮嶺白雲猶未起立春日舟中題作客尚無地他鄉空復春舟中兒女大天末嵗時新樂事喧殊俗窮愁縛逺人椒盤懷故里腸斷白頭親南夏不作炎州客那知宇宙偏日車淹北戶火樹爍南天氣溽乘宵雨雲蒸挾暮煙波斯夸白㲲出入不曽捐寄王德徵登州王子十年别封書萬里來乾坤知汝在涕淚向誰開海國青春隔天隅白髮催相思一搔首獨上越王臺人日遊石磜人日尋春到新隈新年物色太相催風吹燕子家家入暖逼桃花樹樹開久住山林殊自適頻來洞客更無猜黃柑白酒能消渴盡日松間坐不回雨晴出左掖北闕春雲散曉扉西山雪日弄晴暉雨聲恨不連三日松樹須教過十圍嵗逺玉螭書未有晝長金馬詔全稀侍臣欲老惟疏放自歎從容退食歸贈甘惠州四百雲峯面面開使君花砥放衙回人生豈必二千石只看羅浮也合來陸震一首震字汝亨蘭溪人正德戊辰進士以車駕貟外郎抗疏劾江彬逮繫三杖而死嘉靖初贈太常寺少卿詩話太常力批龍鱗九死不悔裹尸之後晝晦如夜海子水溢玉河七鐵柱齊折天變豈不足畏耶詩存無多録四十字一字一碧血也朝房待罪驥尾思千里葵心託萬言一身曽許國九死敢忘恩梅福冠猶在朱雲檻不存空庭對明月古道照乾坤祝鑾二首鑾字鳴和當塗人正德戊辰進士以祠部郎諫南巡廷杖仕至廣東布政使有篁溪集感興公輸構大厦一人操引繩羣工雖不同各各奏其能用人不求備負荷隨所勝所以無棄材百堵由兹興或者太區别聞之為撫膺仙源仙源何處來無乃自天上不然瀑布泉那得千萬丈方豪六首豪字思道開化人正德戊辰進士除崑山知縣升刑部主事諫南巡杖闕下起湖廣僉事進副使有棠陵集顧玄言云方詩多出少陵蹊徑深陸次友云棠陵與孫鄭襟契最其才雖敏不及二子逺矣尋王粲樓故址仙子乘雲去不還空餘詞賦落人間髙樓試問今何處故老相傳是此山極目平原空悵望側身塵界欲飛攀漳沮秋淨征鴻下越客悲吟鬢已斑遊桃花寺聽説桃花寺遊人興不禁桃花今不見流水尚堪尋看月看月月轉明幽人寂無語山空秋夜長松露濕如雨滄江吟白髮滄江酒一尊丹楓赤壁自成村沙鷗汀雁真吾侶垂老何曽識縣門題畫亂山兩岸一江橫煙樹濛濛雨乍晴釣艇自來還自去江風不動水禽鳴鴛鴦湖鴛鴦湖邊落日明荷花十里棹歌聲丈人自折碧筒飲醉看秦塘海月生馬録二首録字君卿信陽衛籍紹興山隂人正德戊辰進士授固安知縣擢監察御史有百愚集霸州城行霸州城外水繞牆霸州城頭戍卒強四門髙樓接煙霧縈回十里多垂楊去年豺虎滿天地此城南北皆戰場至今落日照白骨血霑野草猶淋浪當時别縣人皆走此城之人苦相守五馬使君身姓王募招壯士犒牛酒遂令萬夫同一心彎弓罵賊不絶口固安與霸為鄰縣此事分明眼中見乃知設險可守邦區區省費非民便永清遇雨作白日永清雨移時不肯休風前當檻落河漢近城流牛馬誰堪辨蛟龍恐亦愁西歸途路失何處問孤舟張綸一首綸字理之錦衣衛人正德戊辰進士官按察使僉事嘉靖初以議大禮謫戍雲南錦衣獄中重門扃夜月鈴柝轉深更客夢秋能作扉燈曉尚明君臣今古義兒女嵗時情起把青銅對愁憐白髮生胡纘宗二首纘宗字孝思一字世甫鞏昌人一云山西文水人正德戊辰進士特授翰林檢討外補嘉定州判移守潼川遷南戶部郎中改吏部出知安慶府調蘇州升山東參政改淅江歷河南布政使以右副都御史巡撫山東改理河道乘輿幸楚纘宗作詩記事為戶部主事王聫所訐逮下獄尋放歸有鳥鼠山人集袁永之云先生詩出入漢魏其視昌黎少陵若弗屑者而亦未始不合也謳王元美云胡孝思如嬌兒郎愛吳音興到即不必合板蔣仲舒云中丞天質穎敏亦一關中之雋第命意淺率不足多傳詩話孝思詩未入格顧沾沾自喜到處留題當永陵南巡作詩紀事有云穆王八駿空飛電湘竹英皇淚不磨用事殊不倫乃刻之於石致騰讒者之口其得免死幸也謝山人榛贈詩云白首全生逢聖主青山何意見騷人時孝思年將八十矣杖創呻吟猶占韻以謝其意氣有不可及者然詩實牽率晉江王道思序之稱其宏深精毅盛歸美於秦風毋亦嗜秦人之炙者與擬古二首驚喜君王至西華夜啓扉後車三十乘載得美人歸詩話康陵西幸恱樂戶劉良女遂載以歸貯之騰禧殿號曰夫人及南巡日帝期以中途召之夫人脫簪豫帝以示信帝騎過盧溝亡之大索不得也行至臨清念夫人召之以不見簪不往帝不得已兼程抵潞河載夫人偕南寺觀幡幢列鎮國公號復繫以名夫人每得並書嘉靖初納南京給事中王紀之言俾盡撤去然夫人在途常諫帝遊獵非専以色固寵者鳥鼠山人是詩直書其事亦取禍之萌也上馬入黃城嫖姚典禁兵猶言恩寵薄下馬坐團營丁奉二首奉字獻之常熟人正德戊辰進士除行人歷南京吏部驗封司郎中有南湖留稿詩話南湖詩不事鍛鍊興酣落筆往往暗合曩篇句如白蘋風外水紅葉雨中山徑轉花間月山飛樹杪泉夜橋喧客棹曉碓起鄰燈菜甲今朝雨蒲香隔岸風人當紅樹坐船觸白蘋行白髮生秋日黃花惜暮年山寒松子落籬暝豆花深俱有風韻即嘔心撚髭者為之不過爾耳擬古白日墜西山明朝出東海天地無終期萬物豈能待繁花重露零髙岸深谷匯昨見朱顔酡今看霜鬢改泛舟登蓬瀛蓬瀛果誰逮寄尤少卿宗暘張翰歸時計亦疏秋風寂寞始登途不思五月清江上已有鰉魚勝玉鱸曽璵一首璵字東玉瀘州人正德戊辰進士由戶部郎出知建昌府有少岷存稿詩話王新建定寧庶人之亂吉安守伍公文定固稱首功同時贑州則當塗邢珣袁州則武邑徐璉臨江則臨海戴德孺饒州則晉江林城廣信則閩周朝佐撫州則鄞陳槐建昌則少岷也其師至雖有後先實同力共濟少岷有收復南康功而不見録纂修地志者皆沒其實故表出之詩雖未名家亦清脫無塵氣南洲歌南洲春早江蘺生南洲日長沙鳥鳴郎君莫向北湖去不似南洲煙水平錢琦二首琦字公良海鹽人正德戊辰進士授盱眙知縣歷南京刑部郎中出知臨江府調思南有東畬集顧玄言云臨江詩沖秀彌暢人彭子殷云公良詩舂容馴雅每入唐庭奧登獻花巖獻花巖畔寺遊子數登臨花發年年好巖深處處隂風前收落果坐久換鳴禽世路何多事看山偶會心過滁州江北滁南數日程蕭蕭落木送秋聲夕陽滿地鳥飛絶人在亂山堆裏行凌楷一首楷字端甫揚州通州人正德戊辰進士官缺部郎中髙郵孟城勞悵望煙樹一浮洲地濕人多病林寒葉易秋人家留鳥迹國稅獨漁舟夜月珠光在多應照客愁駱用卿一首用卿字原忠餘姚人正德戊辰進士官兵部貟外郎題韓信廟逐鹿中原漢力微登壇頓蹙楚軍威足當躡後猶分土心未猜時尚解衣畢竟封侯符蒯徹幾曽握手到陳豨英魂漫灑荒山淚秋草長陵久落暉李獻吉云此題淮隂廟絶倡也徐愛一首愛字曰仁餘姚人正德戊辰進士除知祁州歷官兵部郎中有橫山集黃太沖云文成之學得日仁而門人益親日仁之亡文成有祝豫之慟其詩力未深而不落凡俗紀遊壁磴臨絶壑兼乘欲疲馬屢盤羊腸出還驚虎頷下逼險悔初進稍縱覬復假如何窮探心阻困每未舍無端覓憂虞中止固由我回思競利人何殊履危者陸伸一首伸字安甫太倉人正德戊辰進士官大理評事河間道中荒田殘雪啄飢鴉握粟謀炊野店家辛苦莫辭行路逺冷風三日下牛車田惟祜二首惟祜字裕夫蕭山人正德戊辰進士有滄螺集詩話裕夫領解浙闈時名蔚起今則知者寡矣詩如王謝子弟雖未陶鑄毋論風流文采裙屐亦自不同龍遊至衢州龍遊至衢州景不殊蘭溪山少灘瀨多沙石成長隄溪流時衝決兩岸無平蹊湍急舟行速水淺石可攜野曠少人煙地瘠艱鉏犂泊舟無村市遇夜隨停棲幸無狂客驚惟聞山鳥啼船定水汩汩篷疏風淒淒寤寐夢不成候曉無鳴雞惆悵盼家山遙遙望中迷晚登城樓懷友江城天暝夕陽微拍拍輕鷗逐浪飛水郭煙光迷野屋海天風色上征衣倚樓長笛家何在出浦扁舟人未歸愁絶知心成兩地目隨征雁思依依黃卿一首卿字時庸益都人正德戊辰進士歷官江西布政使有編茗集三關書事曽聞甲戌邊聲急白首追談足愴神子女牛羊充塞窟旌笳駝馬暗風塵山埋戰骨雲長慘野哭驚沙草不春舊日僨軍今甲第大廷持法是何人童寬一首寬字栗卿蘭溪人正德戊辰進士監察御史改調平陽推官雨花臺阿師何術隕天花臺迥登臨望眼賖百里晴山圍帝宅六朝芳草入僧家層層樹色寒煙合歷歷車聲古道斜鐵鎖銷沈龍戰後落潮處處咽江沙明詩綜卷三十八
