body:
  text: 明詩綜卷十翰林院檢討朱彞尊編楊基四十九首基字孟載其先蜀人居於吳為饒介客吳平安置臨濠復徙河南既而放歸起知滎陽縣謫鍾離用薦為江西行省幕官坐罪落職居句曲山中久之起奉使湖南廣右召還授兵部員外郎出為山西按察副使進按察使尋被讒奪職供役卒於工所有睂菴集徐子元云孟載天機雲錦自然美麗獨時出纖巧不及髙之沖雅之王元美云孟載如西湖栁枝綽約近人情至語風雅掃地江東之云睂菴詩穠麗纖蔚大有唐人風味劉顧玄言云亷訪才長逸蕩興多雋永方之錢雖未逮元白斯有餘莊陳卧子云孟載如吳中少年輕俊可愛所乏雅李舒章云孟載如玉袖臨春翩翩自喜舊王介人云孟載詞勝於詩其詠春草云六朝恨斜陽裏南浦新愁細雨中亦不失為佳句也故靜志居詩話吳中四傑孟載猶未洗元人之習鐵崖亟稱之王元美卮言謂孟載七律尚短栁如新折後已殘梅似半開時類浣溪沙詞中語豫謂不特此也如芳草漸于歌館密落花偏向舞筵多細栁已黃千萬縷小桃初白兩三花布榖雨晴宜種藥葡萄水暖欲生芹雨頡風頑枝外蝶柳遮花映樹頭鶯花有砥忙衝蝶過鳥能多慧學鶯啼且自細聽鶯宛宛莫教深惜燕息匆春色自來皆夢裏人生何必在尊前燕子緑蕪三月雨杏花春水一羣鵝江柳淨無餘葉在渚蓮池有一花開花裏小樓雙燕入柳邊深巷一鶯啼江浦荷花雙鷺雨驛亭楊栁一蟬風山頂雪惟朝北在水邉春已自東來一路詩從愁裏得二分春向客中過春水染衣鸚鵡緑江花落酒杜鵑紅髙樹緑隂千嶂濕野棠疏雨一籬香立近晚風迷蛺蝶坐臨秋水映芙蓉羅幕有香鶯夢暖綺窗無月鴈聲寒睂暈淺顰橫曉緑臉消殘纈膩春紅小雨送花青見萼輕雷催笋碧抽尖蠶屋柘煙朝焙繭鵲爐沉火熏茶試填入浣溪沙皆絶妙好辭也然其五言古詩足與季迪方駕集亦張企翺所編吾鄉項氏天籟閣藏有孟載手録睂菴集六卷中闕七言絶句以勘張本亦無大異感懷六首蝮蛇冬未蟄靡草寒更生陽光泄為電地雷忽有聲上天號令乖致此災異並不然多殺傷兵氣之所成漢庭免三公毋乃非政刑願言調玉燭仰見三階平一女不得織三人欲無衣一夫不暇耕八口皆啼飢飢寒迫于身誰能不為非西伯善養老仁人為已歸霜寒草木落禽鳥相背飛民心亦何求在於得所依此理勿暫失君子慎其微鵲巢知避嵗終為鳩所居巧者勞不足拙者安有餘溪翁夜結網山人朝煮魚隆準入關中不讀半卷書當時微張韓乃與勝廣俱大拙乃至巧巧者復何如驊騮日千里亦在御者功向無造父能乃與凡馬同韓彭覂駕材驅策遇沛公增本渥窪兒意不與項通豈獨知馬難所貴御馬工駕御苟失宜鮮不敗乃翁蕭蕭帳下騅千駟何足雄鞲鷹斂六翮棲息如鷦鷯秋風颯然至聳目思凌霄英雄在承平白首為漁樵匪無搏擊能不與狐兔遭長星亘東南壯士試寶刀落落丈夫志悠悠兒女曹東鄰夜從軍西鄰曉上官一為死别愁一為知已歡歡者承新恩拂拭頭上冠愁者囑妻孥結束跨下鞍悲歡何不同一危復一安黃塵障東華平地生波瀾朝榮夕賜死轉盼異暑寒寄語承恩人莫歎從軍難送謝雪坡防禦出郭團練朝催築城夫暮點團結兵民民皆動搖一日十數驚所賴官長賢撫勞得衆情防禦出郊來父老拜且迎垂髫及戴白羅列車下聽官家百萬師自足與寇爭汝自守汝鄉汝自保汝生間暇茍不虞倉卒恐見傾我當徼汝勞薄爾賦稅征父老共感激闐然動歡聲旌旗洎甲矛五色稍鮮明豈惟備抄掠大敵固可嬰問君何能然子弟衛父兄平川雨初收馬嘶鼓鼟鼟相送不同往極目秋鷹橫送陳資深歸廣丈夫輕别離投老欲入廣奈何干戈際萬里涉沆漭兹城頗阜庶有女供奉養世亂得粗安胡勞問鄉䣊君言苦無家一夕魂九往鄉書昨日至捧讀屢泚顙四喪寄淺土未得掩諸壙雖云敝廬在誰復修祀享感兹歸意迫無力猶勉強齒髮固已衰尚足嬰擾攘敢忘鄉土情偷安戀兹壤吾聞重感激惜别復加賞天寒霜露繁摵摵枯葉響水宿愼蛟螭山行避魍魎田園雖荒蕪果實羅栗橡鄰居喜均還相邀具醅盎酒薄不得醉且復歌慨慷人生還鄉樂無物堪比仿喜極繼以悲歡戚同反掌翻思蘇臺月照女夜績紡此時父子情兩地同惚恍安得混車書妻孥共羅幌茲事竟難期淚眼一悽愴我家嘉陵江蹤迹久飄蕩亦欲問前塗逡巡覓西瀼登靈巖和韻周左丞伯溫饒大參介之單艫集羣英席窄坐每盍煙橫半掩寺木落全見塔斜流出渠分曲徑轉溪合村妝妍醜並野話悲笑雜童操吳音聞僧作梵偈答霜苔滑難躋露棘手易拉磴紆蟻緑樹扉敞蝸啓闔娛賔列五豆禮佛過三匝晴崖暝憂雨秋洞寒疑臘窗攀盜果猿簷入避鸇鴿掬池萍沾袖憩石蘚汚袖琴忘荒臺弄屧響回廊踏值險慮思筇得竒即傾榼感深怒鬚磔愁極衰鬢颯華年倏川駛雅量浩海納嘯歌激欷歔雄辨肆交沓禪寂虛無量道祖清靜蓋吅嚻蝸觸蠻變幻雀化蛤狂遊類飲酎薄宦避嚼蠟終當謝塵鞅掃屋分坐榻贈别龔行義楚龔風雲姿璞素玉不瑑隻身躡雙屐十載食破研麻衣閲冬春睥睨狐貉賤胸中何所蓄經史子集傳酒酣文思涌強弩機發箭清真謝鉛鍤越女巧笑倩紆盤珠九曲精粹金百鍊粲如星森羅勇若軍後殿吾黨多英雄氣索皮肉戰西風忽歸來塵土吹滿面從容問所歷搖首不復辨但云秋水清吳松淨如練方同華表鶴遽作幕上燕去住何太輕弗得絆以線君材非樗櫟名字已交薦淵泉暫蠖屈霧雨終豹變賢逹坎坷多豪傑窮乏先嗟豫書中蠧髀消兩目眩朝騎瘦馬出夕飽藜與莧志慙點爾狂質匪由也唁猥遭周秦厄不識舜禹襌因君動遐想翅塌足若罥螺卮白磁罌聊為江渚餞回首芙蓉花紛紛落紅片與陳時敏别近别會有期逺别易慘悽一人失意行衆賔顔色低相顧各無語握手立大堤白沙飛輕煙赤草漫路蹊竈戶八九家皮肉瘦且黧再拜謁官長鵠立無所齎孤廳如荒郵壁落新補泥日沒官吏散角角野雉啼歸來對寒燈兒女相孩提雖云去鄉國喜不聞鼓鼙官卑職易稱牛刀用割雞回首華亭鶴月白露淒淒季迪病目醫令止酒因作此勸之病目須飲酒飲酒調微疴氣血鬱不舒賴此酒力和所以雷公方製藥用酒多活血必酒洗散鬱須酒磨製藥既用酒飲酒良匪他酒可引經絡酒能驅病魔病目不飲酒此蓋醫者訛李白好痛飲不聞目有痤子夏與丘明不為飲酒過飲酒既無害不飲如俗何清晨呼東家買置數斗醝爛醉瞑目坐滿面春風酡陶然物我忘夢見孔與軻此藥豈不佳而乃止酒那我今勸君飲君意無媕婀庸醫或見責請示睂菴歌贈毛生丈夫遇知已勝如得美官棲棲無聊中握手意便歡古來豪傑人所就非一端狂言與危行初若不可干從容兩陳間一語九廟安狐貉不外飾而足禦大寒嗟嗟隴西李願識荆州韓長洲春縠波流暖雲花光艷緑薲津頭洗紅女蝴蝶上羅裙羅裙秋水上明璫搖白槳飛下雙鴛鴦溘溘潮水響滄浪波入苑緑泱泱縠文融暖光東風吹白浪照見赤龍堂龍堂負貝闕隂火春波熱鮫人賣髯綃夜夜唱明月發南浦開船别西山迤邐向南浦帆輕去自速初不用篙櫓蒼蒼煙中樹槖槖響斤斧一女沙上汲衆漁洲畔語我行嵗云晏况復逺儔侶回首北歸鴻翩翩下寒渚過小孤大孤俯如盤小孤儼而立羣山如從使左右相拱揖孤根屹撑拄萬竅爭噴吸瀏瀏隂風旋慘慘元氣濕江流亘其下震怒莫敢汲洑為盤渦深馳作奔馬急躋攀或失手一駛不可及我來值秋晚木落衆鳥集勿爨夜船犀鮫人抱珠泣望南嶽我從匡廬來但覺諸山低嵯峩望衡嶽雲霄與之齊下有赤蛇蟄上有朱雀棲仰瞻祝融拔俯揖紫蓋迷五嶺皆培塿三江為涔蹄巍然南服尊嵩霍相提攜封秩崇君稱諸神咸朝隮丹書篆寶册萬古封金泥百王重祀典赤繅藉玉圭自非精靈通牲帛勞焚齎豫方向逺道無由陟層梯蒼蒼煙霞中喔喔聞天雞緬思昌黎伯恭默開雲霓靈貺自昭格誠敬良可稽斯人久云沒感念徒含悽發衡州五日白一髮十日皺一膚人生氷雪容終作鞾紋粗今朝清鏡中已與昨日殊不憂鬚睂蒼但恐皮肉枯肉枯亦常理所念非壯圖有親恩最深撫養勞勤劬憐我幼失怙愛我如掌珠斯恩未及報不敢忘須臾書來得凶問哀頓空號呼衣衾與棺斂弗得親走趨家山在萬里那能返故都樹頭啞啞啼愧殺反哺烏有子初學言行步要母扶已解索梨栗未知識之無重在託宗祀豈暇問賢愚弟妹皆飄零逺在天一隅仲氏久無信夢中時友于艱難斥鹵濵何以保微軀計工當已還毋乃東歸吳童僕各分飛僅有赤腳奴竛竮苦肺疾終夜聲嗚嗚憐渠亦解事翦伐供樵蘇異鄉骨肉逺賴此相支吾嗟我客梁楚隻身亦﨑嶇白晝畏豺虎夜防貍與狐所賴筋力強竄伏幸無虞今年覺衰倦自怯行逺塗東風洞庭波落日青草湖魚龍來欺人煙濤慘糢糊茲晨過衡陽霽景差可娛桃花白練帶春水緑菰蒲感此顔色妍暫使憂心蘇萬事信有命撫膺長歎吁湘江道中思常宗暮江散微雨風定波自碧一鷺立不飛雙鴻遞相直餘煙菱女唱新月漁郎笛此處忽懷人相思杳何極逺浦歸帆輕帆挂春風倒影湘江緑天低浦漵逺歸向誰家宿遙指落花西黃陵廟前屋洞庭秋月湘水秋更清湘月秋更白光輝一相蕩水月不辨色何處洞簫聲巴陵夜歸客湘女湘水既瀰瀰湘山亦峩峩空明影上下但覺魚鳥多我方駐輕橈聽彼湘女歌湘女佩幽蘭徐行拂青莎春風吹衣裾芳香動微波淑質自妍麗不待綺與羅真修慎所適窈窕山之阿盈盈青樓婦日暮將如何清溪漁隱清溪秋來水如練厯厯魚蝦皆可見緑蓑酒醒鴈初飛風急蘆花吹滿面溪南一帶是青山逢著垂楊便可灣謾道白鷗間似我漁舟更比白鷗間聞蟬睂菴四十未聞道偶於世事無所好尋常惟看東家竹屈指十年今不到微軀之外無長物寒暑一裘兼一帽妻孥屢欲升斗絶不獨無煙亦無竈身輕自笑可駕鶴眼明豈止堪窺豹人情世故看爛熟皎不如汚恭勝傲有瑕可指未為辱無善足稱方入妙此意于今覺更深靜倚南風聽蟬噪廢宅行弓刀挂牆旗拂瓦行人過門須下馬日暮將軍縱酒歸白棒橫街人亂打朱門一閉春草積官印斜封泥涴壁守卒收蝦屋後池鄰翁曬麥階前石簾幕當年盡綺羅網絲顚倒腐螢多杏梁風雨丹青濕時有野鳩來做窠樓臺易成還易廢前年猶是桑麻地聞鄰船吹笛江空月寒露華白何人船頭夜吹笛參差楚調轉吳音定是江南逺行客江南萬里不歸家笛裏分明説鬢華已分折殘堤上柳莫教吹落隴頭花長江萬里圖我家岷山更西住正見岷江發源處三巴春霽雪初消百折千回向東去江水東流萬里長人今漂泊尚他鄉煙波草色時牽恨風雨猿聲欲斷腸秋霽雜賦三首劉表知先主懷王識沛公未聞收夏口先已入關中今古車書異興衰厯數同方驚雞作鳯當信騖非鴻今日長洲苑秋風列羽旗不圖新約法復見舊威儀鼓舞兒童樂歌謡父老悲煙埃方衮衮禾黍正離離晚樹霜猶碧秋花雨未黃戎衣輕繡錦旅食尚糟粳驛路千山隔河流一葦航毋憂兵不戰已定法三章雨雨急愁雲黑窗虛愛竹青石泉流細細山鳥去冥冥醉裏傾荷葉飢來煮茯苓不知劉道士何用換鵝經偶題身懶交遊絶時危感慨新清江催短鬢芳草怨歸人花落縱橫雨鶯啼淡蕩春欲搖舟楫去波浪沒平津送王仲容之上海薄宦依東海孤城隔戍煙花疏寒食後人逺暮帆前深巷編蒲履斜岡種木棉毋煩厭荒寂微祿有畬田寄海鹽楊寨官海嶼通村險邉城出敵遙旗燈秋塞雨鈴柝夜溝潮士飽爭投石農間數舞簫毋令廢收穫髙隴有枯苖夏夜有懷重露澄秋色輕風生夜涼碧看湖草亂紅愛渚蓮香有弟徒相憶何人不異鄉悲笳在城上雙淚落衣裳贈翟好問笑爾山城隱柴門對縣衙酒資千畞苧生計一園瓜雨步荷巾濕風吟席帽斜時時扶短杖看竹到東家長沙雜詠湘人愛樓居斜枕湘江起樓下倚闌人簪花照春水夢緑軒夢裏緑隂幽草畫中春水人家何處江南風景鶯啼小雨飛花吳中行樂詞單羅小扇夾紗衣冠子梳頭插翠薇知是范家園裏醉無人不戴杏花歸紅緑蕉二仕女圖兩樹紅蕉隔禁扉曉涼攜伴試羅衣金鈴小犬迎人吠應怪秋來出院稀故山春日千花萬萼委塵埃只有荼䕷獨自開應是鄰家更零落過牆蝴蝶又飛來遇史克敬詢故園克敬自長洲來因詢吳中風景大異往昔賦此以寓鄉里之思三年身不到姑蘇見説城邊栁半枯縱有蕭蕭幾株在也應啼殺樹頭烏贈京妓宜時秀欲唱清歌却掩襟晚風亭子落花深坐中年少休輕聽此曲先皇有賜金到江西省看花次韻生色屛風一面開輕羅團扇合歡裁深深院落青青柳縱是無花也看來鯉魚山阻風天甚寒雨皆成霰江南天氣大無憑草色煙光暖欲蒸向晚鯉魚風乍急盡吹小雨作春氷望武昌二首吹面風來杜若香離離煙柳拂鷗長人家鸚鵡洲邊住一向開門對漢陽春風吹雨濕衣裾緑水紅妝畫不如却是漢陽川上女過江來買武昌魚祁陽道中疏煙小雨濕流光愁得楊花不暇狂半晌春晴便飄蕩綴人簾幕上人牀張羽二十三首羽字來儀以字行更字附鳳潯陽人從父宦遊江浙兵阻不得歸遂居吳興元末授安定書院山長明初徵起廷對稱旨擢太常司丞兼翰林院同掌文淵閣事以事竄嶺外未半道召還抵京知不免自投龍江死有靜居集張企翺云國初以髙楊張徐比唐之四傑故老言不惟文才之似而其攸終亦不相逺睂菴盈川令終如一太史之斃同乎賔王北郭雖不溺海僅全首領而非首丘先生投龍江又與照鄰無異噫亦異矣王元美云張來儀徐幼文如鄉士女有質有情而乏體度程孟陽云靜居五言古詩學杜學韋各有神理非苟然者歌行材力馳騁音節諧暢不襲宋元格調律詩清員渾脫不事雕繢全是唐音頡頏髙楊未知前後或謂張徐不及髙楊此耳食之論也詩話來儀五古微嫌鬱轖近體亦非所長至於歌行雄放駸駸欲度季迪前固當含超幼文跨躡孟載春初遊載山雲羅橫四海田野無遺英尚賴二三子共怡山水情煦煦新陽動寥寥天宇清昔人稱四美茲晨遂成並前登髙丘阻遙睇澄湖明憑林招逺風松檜自成聲俯仰天地間微軀良不輕安能自羈束坐使衆纍縈處賤足為貴抱素詎非榮逍遙解神慮庶以適吾生春山瑞靄圖鶯啼山雨歇前川緑正繁人家在深樹雞犬晝無喧淡淡流水意依依田父言謾鼓木蘭楫往溯桃花源即此堪結廬可以傲華軒立秋日早泛舟入郭連霖啓秋期金氣晨已兆溪雲合餘隂水霞相照耀登艫泛涼飈乘流駕奔峭回波蕩塵襟青山列逺眺蒲菼迷森沉菱荷爭窅窕沙明衆女浣潭淨孤禽嘯端居積百憂暫出窺衆妙好爵豈不懷衛生乃其要寄謝滄海人如豫可同調擬過園隱阻雨在逺每傷離在近還成隔飛雨渺無涯佳期悵難得人寒市井空天晚江潮白知君掩閣卧終朝遲來客金川門兩山夾滄江拍浮若無根利石侔劒戟風濤相吐吞維天設巨險為今國東門試將一卒守堅若萬馬屯吾來犯清曉天空霜露繁列宿森在列北斗峭可援江光合海氣溟涬神攸存俯視不敢唾中有蛟龍蟠浮屠者誰子髙居凌風幡下見渡口人擾擾蜂蟻喧愧彼超世士去去將何言李辰山云是詩作於洪武甲寅未三十載而燕師從此入矣讀之可勝浩歎清口豁達兩河口前與黃河通髙岸忽斗折清淮匯其中甘羅城在南韓信城在東一為秦人英一為漢家雄人生有不死所貴在立功方其未遇時鹿鹿何異同時命苟未會丈夫有固窮舍舟登髙防嵗暮百草空坡陀隴畝間一二老弱翁遺迹不可問但見荒榛叢行行重回首目斷雙飛鴻余將軍篆書榻本歌即忠襄公闕也余將軍守舒州舒州之城大如礪長江西來繞城流賊船如雲壓城破將軍提劒城頭坐劒未動虜已奔鯨鯢蔽江江為渾孤軍六年二百戰王師不來城自存無兵猶足戰無食安可支豈無愛妾與愛馬殺之不解壯士飢力盡矢竭將奚為倉皇齚舌罵不已義士千人同日死祗今還有盡忠池碧血清泠化為水將軍持節東州時作此篆書形崛竒妙墨已隨神物化好事當時臨得之雖非其真意獨在垂金屈玉蟠蛟螭我拜重是忠臣迹秦相雖古其人非鳴呼將軍此書配者誰請君摹取浯溪石上中興碑畫雲山歌我昔曾遊廬嶽頂欲上青天凌倒景山中白雲如白衣片片飛落春風影雲晶晶兮花冥冥萬壑盡送洪濤聲恍然坐我滄海上金銀樓觀空中明上清真人笑迎客夜然桂枝煮白石手持鳳管叫雲開虎咆龍吟山月白明發邀我升東峰導以絳節雙青童天雞先鳴海出日赤氣照耀金芙蓉屛風九疊花茸茸霧閣雲窗千萬重胡不置我丘壑中一朝垂翅投樊籠空留萬片雲挂在清溪千丈之寒松愁來弄翰北窗裏貌得雲山偶相似遂令殘夢逐秋風一夜孤飛渡江水夢亦不可到圖亦不可傳不如早賦歸來篇山之人兮待我還安能齷齪塵土間坐令白雲摧絶無所歸青山笑我凋朱顔米南宫雲山歌古之畫法不復見六朝人物留遺譜後來山水出新意二李三王差可覩洪谷之後有關荆營丘渾雄獨造古華原處士志竒崛餘子紛紛何足數郭熙平逺疑有神北苑爛漫皆天真畫院宣和衆史集俗筆姿媚非吾倫豈知南宫迥不羣一掃千古丹青塵神間筆簡意自足窈窕青山行白雲黃侯黃侯安得此元氣淋漓猶滿紙晴窗拂拭對髙秋恍忽神遊華山裏生兮畫癖奈此何為子試作雲山歌珍藏什襲子須記世間名畫今無多李遵道墨竹歌墨竹昉自何人始輞川石刻今餘幾後來蕭恱稍出羣香山侍郎獨稱美洋州太守善寫真長帽先生差可擬江南謾作金錯刀枝葉離蓰何足齒北方作者誇淡遊房山繼之妙莫比吳興公子最擅名同時亦數薊丘李薊丘有嗣能傳家筆勢翩翩此其是一筆玉立無因依風露淋漓猶滿紙想當塗灑發幽興靜對山僧北窗裏江湖無人老成盡百藝荒涼今已矣展圖三歎墨君堂秋聲滿座悲風起唐子華雲山歌前朝畫品誰第一房山尚書趙公子二公何以能絶倫丘壑乃自胸中起由來書畫總心畫政自不在丹青裏當時豈無劉與商屛障紛紜何足齒唐侯本是霅川秀愛畫仿佛董與李長松平逺早已工更上歙州看山水歸來却師郭咸寧參以房山勢莫比始知絶藝老更成庸夫俗輩那知此此圖三尺誰為贈雲氣蒼茫石塊磊牛羊未歸樵子出戶牖寥落蒼崖底寫成不題嵗月字要是頭白居鄉里乾坤浩蕩江海空後人未續前人死為君題詩三歎息世上好手今餘幾烏乎尚書公子不復見得見唐侯斯可矣畫山水行題趙待制仲穆所畫江浦歸帆秋林瀟灑二圖沈才幹所藏也古來名畫傳父子唐有二李蜀兩黃吳興公子冠當代雍也繼之早擅場宋祖子孫盡龍種毛骨固是非尋常珊瑚寶玦久零落空有妙藝傳文章至元天子親召見徒步便賜中書郎奏圖每得天顔喜盛以金匱白玉堂遂令世人爭貴重門戶雜遝如堵牆雍初騰踔晚一蹶五陵豪氣無時忘吳姬越娥坐相擁始肯落筆揮縑緗五日十日一水石屛障仿佛生輝光君家雙圖何所得私印乃出牟陵陽一圖汗漫秋水闊鴈鴻排序投瀟湘山僧悄尋孤寺逺客子喜甚髙帆張一圖嵂兀衆峰出疏林葉赤天雨霜消搖巾舄者誰氏可是商顔之綺黃風塵澒洞二十載玉軸錦題多散亡圖書祗應天上有人間那得千金藏從來好事多成癖雲煙過眼如毫芒君不見王家桓家勢盡時復牆走輬不得將何如城南佳山水千巖萬壑摩青蒼與君對此飲美酒雖無南宫北苑庸何傷米元暉雲山圖前代幾人畫山水逸品只數南宫米海嶽樓前北固山頃刻雲煙生滿紙古云丘壑起心胸恍忽似與神靈通素壁髙懸卧清晝耳邊恍若聞松風怪砥青山起毫末森沉緑樹臨溪活仙人道士疑可招芝草琅玕俯堪掇千里能移方寸間天機揮灑過荆關如今畫史空無數對此髙蹤詎敢攀倪元鎮畫竹沈御史所藏雲林之子有仙骨平生好潔如好色紛紛濁士等沙蟲嗚呼瓚也何由得憶昔常登清閟堂鵲尾爐爇龍涎香紹京妙墨僧繇畫示我不啻千明璫人間萬事如飛電洗玉池空人不見季子城東土一抔何人為著黔婁傳繡衣使者騎青驄曽聽竹枝湘水東歸來見此若夢寐巴陵洞庭生眼中江湖豪翰今零落君得此圖良勿薄愧我題詩憶故人黃鶴題詩下寥廓錢舜舉溪岸圖憶昔至元全盛日天子詔下徵遺逸吳興八俊皆竒才秀邸王孫稱第一一朝玉馬去朝周諸子聲名總輝赫豈知錢郎節獨苦老作畫師頭雪白江南沒骨傳者希錢也得法誇精竒晴窗點染弄顔色得錢沽酒不復疑今人祗知重花鳥豈識此圖奪天巧玄雲抱石雷雨垂蒼山夾水龍蛇繞岸側溪回共杳冥蒲稗深沉映魚鳥漁舟乍隨逺煙散客子競渡澄江曉自云布置師北苑只恐庸工未深了卷餘更有魏公題字擬鍾王差未老鄭侯得之恐神授使我一見喜絶倒雙溪流水清何極城外南山空黛色文章翰墨何代無二子儔能躡其迹為君題詩三歎息於乎古人難再得胡廷暉畫畫師我識吳興胡身長八尺蒼髯須目光至老炯不枯藻繪萬象窮錙銖大兒十嵗能操觚小兒五嵗能含朱得錢但供酒家需時復縱博為歡娛魏公家藏摘爪圖妙筆奚翅千明珠胡一見之神頓蘇以指畫肚潛臨摹落筆便與前人俱祝融撑空閣道孤朝雲暮雨相縈紆中天碧瓦仙人廬下有桃源風景殊雞犬似是先秦餘潯陽野客山澤臞自從喪亂遭窮塗幸逢治世容微軀堯舜亦有巢由徒已辦小艇長鬚奴便欲往從漁父漁江湖此境何地無趙文敏公家藏小李將軍摘瓜圖歷代寶之常倩廷暉全補暉私記其筆意歸寫一幅質公公大驚賞謂其亂真由比名實俱進故詩及之青辨雲林圖前代何人畫山水長安關同營丘李華原特起范中立三子相望古莫比亦有北苑與河陽後來作者誰能當米家小虎出逸品力挽元氣歸蒼茫房山尚書初事米晚自名家稱絶美藝髙一代誰頡頏只數吳興趙公子當時弭節匡廬峰曽寫太平興國之神宫五峰却立疑爭雄臺殿突兀紛青紅中有雲氣隨遊龍我對此圖卧三日遂令竒氣生心胸亂來學士遭漂蕩文藝草草誰能工筆精墨妙心更苦那得再有前賢風於乎乾坤浩蕩江海闊使我執筆將安從莘叔耕畫梅雪軒自注叔耕名野世居湖州蓮花莊好畫誰如莘棗強墮馬折肱猶未忘何年寫此寒林趣精絶未數左手王屋裏何人坐吹笛似是南昌郡中客曲終朔雪忽飛來開門滿樹梅花白贈琴士有客夜半來山中橫琴坐石彈松風松風曲罷抱琴去落月一聲天外鴻聽老者理琵琶老來絃索久相違心事雖存指力微莫更重彈白翎雀如今座上北人稀取勝亭感舊細雨微消紫陌塵湖光冷落似無春朱門記得曽遊處楊柳青青不見人竒天目山雍長老天目之山青岧嶤道人縛屋青山椒白雲出山不歸去春風吹老黃精苖燕山春暮金水橋邊蜀鳥啼玉泉山下柳花飛江南江北三千里愁絶春歸客未歸徐賁二十七首賁字幼文其先蜀人徙居吳淮張開閫辟為屬避去之吳興隱蜀山中洪武初用薦授給事中改監察御史出按廣東改刑部主事升廣西參政遷河南左布政使尋下獄死有北郭集王元美云方伯體裁精密情喻幽深頗似錢郎客顧玄言云方伯詞采道麗風韻淒朗殆如楚叢蘭湘君芳杜每多惆悵詩話吕志學題幼文所畫山水圖謂肆筆道麗清潤而帶書法於詩亦然才氣方之髙楊張三君稍為未逮然詩法􅒂然森有紀律長篇險韻極其尉帖頗有類皮陸者張來儀先從吳移居戴山以詩招幼文云吳興好山水子我盍遷居繞郭羣峰列迥回波一鏡如蠶餘即宜稼樵罷亦堪漁結屋雲林下殘年共讀書幼文乃移居蜀山兩山蓋相望也猛虎行爾虎從何來據住三叉口昨日啖東家豬今日噬西家狗山中百獸不敢鳴白楊黃竹隂風生鄰家少年憑意氣彎弓挂箭巡山行夜深月黑候虎出明朝荒草餘白骨農父謡送顧明府由吳邑升常熟我家茅屋臨官道前種桑麻後梨棗年年力作不違時人有餘糧牛有草官長下車今五年老身不到州縣前鄉無吏胥門户靜家家盡稱官長賢大男入郭買田具始知官長移官去來時憶向官道迎今日去時須送行攀轅欲留留不止我民倉皇彼民喜殷勤再拜官道旁願飲三江一杯水柳短短送陳舜道柳短短春江滿蘭渚雪融香東風釀春暖山長水更遙浩蕩木蘭橈蘭橈向何處送君南昌去離愁落日煙中樹白蘋花送王汝器白蘋花緑蘼草南風吹碧波五月湘江道行人勸酒離緒多棹女棹郎歌棹歌黃鸝啼時風景好大堤日落奈君何君今去不可留山疊疊水悠悠八月十五夜飲王擴相川别業得動字風髙海雲收月出天宇空今日寒暑均適與諸君共歡深坐忘永契合飲易痛露螢寒不飛水鳥夜停哢山精各潛匿銀蟾忽飛動亭亭廣寒桂不知何年種我欲問嫦娥素鸞無由控佳節屢變更壯心久悾恫人生非仙骨有樂當自縱惜無桓伊笛為爾作三弄過荷葉浦粼粼水溶春淡淡煙銷午不見唱歌人空來荷葉浦無處寄相思停舟采芳杜尹明府吳越兩山亭長江接海門一水限吳越兩山鬱相對峰巒各羅列徑勢爭吐吞蒸嵐互出沒尹君好遊觀結亭山水窟闌干出層巔細路縈百折崩石絡垂蘿老樹著棲鶻平生登臨興盡為山水發不知嘗膽人此地幾征伐至今兩山雲來往似奔突嗟余客江海所厯多竒絶何當上斯亭長歌弔遺烈蒼筤軒小軒閟幽寂回闌碧筠護寒色晴梟池垂梢晚縈露隂凝訝煙積籟起知飇度瑟瑟含夕清蕭蕭淡秋素不有虛心人何由同嵗暮菜薖為永嘉余唐卿右司賦逺辭華蓋居來卜山隂宅乍到俗未諳久住地旋闢屋廬尚朴純楹桷謝雕飾髙營踞山跗深甃逗泉脈簷將狼尾苫門用鼠管織缺垣唯補蘿圮砌總蒙虉編籬限邇鄰封枿表殊埸本來是野性豈是耽地僻學圃欲擬樊為功敢侔稷寧惜勞外形自甘食餘力耕鉏限兒課灌溉當僕役破塊何畇畇陳器亦畟畟駕許俗士回屐向鄰翁借筐筥織湘材鍬鍤鑄棠液卓钁鷹觜利負蓑蝟毛磔俯仰疲桔槔沾灑漬襏襫循畦行策鑱偃林卧攲石鐮披欲芟丘刈削竟驅礫值阜即為坡遇凹就成洫堤崩防密葭竇隙拒亂棘地同農畞計區學井田畫長畛縱復橫曲渠廣還窄接流引餘清疏沼匯深碧架桁秋實垂籬落夏蔓羃雨露加膏腴糞土發磽瘠識種題裹藏辨類分行植蒔法常按譜候時即看厯蕨芽拳握紫薑檗拇駢赤兩合憐蘮蒘叢生愛銚芅初逬蟄雷新薹長春䔩雀辨萒葉峨馬帚茾莖直蔩繁微瓞綿瓠老枯瓣拆芍苖卷龍鬚藥幹擁牛膝黃獨雪晴收紫藄露晞摘隂階茂菧苨下田豐菲蒠卷輪木耳垂攢刺菱角射秋茄采更稀夜韭剪仍殖芝芳凝海瓊茭鬱點池墨枸杞香可醪竹熟堪臘石皮被柔藫土酥膾肥菂細蓴入饌鱸鮮蔞雜羮鯽荼苦檗與儔菘脆氷為敵菌櫨西蜀致苜蓿大宛得長縈荇帶流亂簇蔯絲繹芹效野人獻瓜為天子副決明才一方萵苣連數席璚縻慰渴心玉延起羸疾菌毒笑非喜芥辛泣詎戚盤根芽薶壤脫穎笋穿壁擷香憐雞蘇折甘嗜燕麥粟腐切方圭乳餅斫員璧孕子棕受刳贅聃石被馘兔目淘夏槐鹿角芼臘炙菁託諸葛呼巢以元修斥諸葛元修二菜名莧褒蔡守清薇怨周節逆邪蒿義所攘穢荽理堪啞薄利嘉拔葵省謗惡遺薏窮餐虀酸黃儉啖薤留白間情付田園生意仰膏澤莢齊翠疑剪甲坼緑訝擘掩冉煙際姿蔥蒨雨餘色始掇惜滓染載滌畏蟲螫新薦或在籩薄湘亦須鬲求久漸投醝致爽遽沃醷不煩僚友送敬向先聖釋對屠誇大嚼燕客欣小摘柈羞不過三甕菹當飫百未能著蔬經安敢踰食籍旨蓄足山厨素供過香積用兹卒嵗年庶得勤朝夕賔魏徐見厭厄陳顔自懌潔畚上恥汚造橋盜懷恤抱甕忿設機授書誚求益用侯君房徵嚴光事縱馬因致憂吞蛭遂亡謫萬錢栁復乞片金華還擲仕知吕姪妄居味鄭人識枕肱仲尼樂傷指范宣扼鼎臑固云嘉食單亦足適敷淡分所安堪味欲易極毋因口體纍遂使愆民德登戴山在湖州臨湖門外二十里平田渺空曠孤岡忽高峙新松蔭其巔白石繚其趾初登若嶄絶稍上乃如砥亭亭日晷側肅肅征鴻駛南招天目雲北覽具區水比來局羈絆遊遨喜茲始同心良可重歡言得佳士非惟外纍遺沉憂亦成委薄暮聊旋歸餘興會留此種菊蕭條齋舍前隙地頗髙爽茲焉倦耘鉏而乃成廢壤邇來學種竹始為驅草莽掩苒籬落間枝葉紛以長雖煩灌溉勤亦藉雨露養秋香固所恱晚節益可仰匪曰表隱名聊以備幽賞荆山荆山揭髙崖塗山聳橫崿長淮出兩間中斷見斧鑿於焉束洪流浪起石鬬角誰能為此功在昔大禹作至今遺廟存香火乃寂寞我來問邑人往事竟緬邈於時春正深草木尚荒落登臨欲開襟覩茲反不樂夀州舟行夜達曙路入硤石口平山帶孤城一塔起髙阜問知古夀春地經百戰後羣孽當倡亂受禍此為首彼時土産民十無一二有田野滿蒿萊無復識畎畞去程不可稽欲望敢遲久潁川客程不論逺所求在隂晦惡風滿川來雨勢晚逾倍船爭急流上寸進還尺退枯葭夾崩沙路轉數百匯颯颯孤篷飛琅琅萬珠碎篙師左右呼坐客默與對去心雖云迫前塗苦茫昧德星無後覩洗耳亦何在有懷仰髙風令人發深慨盤子城前登盤子城山隘勢欲迫路回土峭絶傍夾千仞壁石狀如矩斫巨細總方直無泉土脈死草木盡改色髙巔有堡障重門閉重棘隂慘行人險惡意叵易測信知狐鼠輩得在此中匿我生好壯觀努力更攀陟立久日將晡浮雲渺鄉國天井關峯回抱深壑下視天鑿井昔人建重關扼險備邊警鍵鑰久已絶垣石尚森整峨峨尼父祠門掩衆山靜曽聞此回轍無復過斯境詢知鄉老言此事古未省餘氓數家在破屋暮煙冷我行力稍疲景物不暇領且為投宿來驚風夜愁永渡沁陸行長苦渴今渡沁河水奔騰走百灘聲逺聞數里我來坐其涯肩擔欣暫弛不意山塢間偶得見清泚連朝塵沙目豁爾淨如洗雖云倦行力對此亦足喜南風吹青蒲白鷗忽飛起沁水縣一水隨山根宛轉流出迥灘聲繞縣門孤城數家靜風土殊可怪十人五生癭土屋響牛鐸壁滿殘日景行遲欲問宿連戶皆莫肯亭長獨見留半榻亦多幸呼童此晚炊糲飯穀帶穎野蔌不可得敢望肉與餅塗行乃至此儉素當自省太隂山巍巍太隂山崖壁拔嶄峭積水嵌層墟凜若太古造凍深草木堅僵立勢難撓髙寒橫障空陽景未嘗到鄰有羲和墓欲問莫可弔如何於此地獨不被臨照至今山中烏性莫識晴昊聊為志其事因之發長笑女媧墓空山兩髙冢媧皇此中葬焦土積層巘勢助殿閣壯大哉補天手功出千古上至今鍊餘石火氣夜猶放轟雷常祓護烈風日掀蕩隂林慘可畏怪木髙數丈百鳥飛繞枝欲止不敢向地靈氣所鍾祭禱土人仰經過謁祠下幸獲拜神像霍山霍山古北鎮勢尊出羣麓山深異風景春盡樹未緑居人苦多寒鑿土為住屋屋頂土元厚亦種麻與菽乃知此方民猶有上古俗我欲拜其廟日斜去程促窯煙斂暝色牛羊半歸牧征塗多嶮巘村館早尋宿兵後過睪亭山睪亭西去逺一過一淒然鴈宿蘆中月人歸草際煙漁家多近水戎壘半侵田尚喜餘民在停舟問昔年送曽伯滋赴西河將幕上將初分閫儒官解習兵風旗春獵野雪帳夜歸營洮水從岷下祈山入隴平知公能載筆草檄報邊聲送朱知事惆悵官亭酒如何送客頻尊前莫催别明日異鄉人送吕庸南雪色上征衣雲沙鴈自飛去家千萬里只解送人歸送别沈德虔江聲千里萬里客路長亭短亭後夜相思何處蘆花明月沙汀送張景則歸天台浙江東去有明山路逺天台鴈宕間我未得遊空悵望送君鄉里喜君還明詩綜卷十
