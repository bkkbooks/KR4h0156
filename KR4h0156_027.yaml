body:
  text: 明詩綜巻二十七翰林院檢討朱彜尊編吳與弼三首與弼字子傳臨川人天順初以薦徵至京拜左春坊左諭德辭不就有康齋集婁克貞云先生詩本乎情性原於義理發自得之藴靜志居詩話龜山之出由蔡氏未足為龜山玷也聘君薦自石亨與聘君何損焉獨是鶴書一至亟令弟子表迎恩之橋緑雲之山建皇華天使集慶之亭焚芰裂荷惟恐不速而又䟦石亨族譜自稱門下士則龜山義不屑出此也詩亦俗劣非惟不及白沙方之定山亦不逮牧轉岡仄磴陟崔嵬沉吟不知去塵襟一蕭散逸興迷雲樹梅殘誰氏花麥漲朝來雨樵牧東西來雜坐迭相語預期明日晴重作看山侣黄嵐坑連山桃李開晴光爛如許寜知明日花不有今宵雨宿湖頭野濶雲爭暝江空雨未休問程須策馬燈火宿湖頭蕭子鵬一首子鵬字宜沖新淦人以薦授嘉興府學敎授有雲丘子集梅文淵云郡博蕭先生從康齋吳聘君游歸結菴玉笥山麓與新喻胡希仁永豐羅應魁南昌張廷祥新㑹陳公甫諸君子皆友善𢎞治改元詔徵遺逸郡守汝寜戴瑶薦於朝三原王公恕禮遇甚厚除郡學敎授其詩文體製不一而本諸性命道徳之懿溫厚和平而豪邁跌宕寓焉論戴孟常云先生得康齋先生正傳而上下議則有一峰東白白沙諸公故其詩文不徒以琢切雕鏤為工造楊國祥云先生詩文皆自胸中流出其立意辭一根於理辭逹氣和雖動輒百言少有離於道者詩話雲丘先生聘君髙弟交於白沙東白一峰東海諸公亦與鏡川雲東相酬和詩專學擊壌體其秉鐸吾鄉也有自警并示士子詩云天下無棄物世間無棄人糞穢可滋禾木朽堪為薪牛弊製弓革蠶老吐絲綸吾人一自棄無物為比倫農桑墮其業終嵗遭饑貧工商廢其職貨食靡有因士焉失其學安得成厥身朱門産餓殍白屋回陽春萬事毁於逸百藝精於勤人能不自棄可以辭汙淪所宜揭諸座右又嵗晚寫懐云披殘霜鬢方驚老開到梅花又是春則不失為擊壤集中佳句也先生司敎時百廢具舉集有思樂堂記在朋倫堂後則太守黄懋所建也有尊經閣并夫子燕居記則太守佟時貴所修也有西麗橋記則知秀水縣韓旭請於御史吳而告成者也餘若楊文璧之迎碧軒梁徳輿之鶴臯梅文淵之冰雪堂戴孟常之環翠軒余敬之之松楸皆有記存集中顧栁琰趙瀛劉應鈳等修府志槩不采録因附識於此欲遊羅浮不果羅浮青壓海門東雲淨江樓入望通四百峰頭千樹雪夢魂飛渡月明中俞誥一首誥字汝欽嘉興人以父吏部侍郎山任官給事中出知南康府盼項文祥不至舟抵於陵夜泊相去不百里相思愁萬重於陵城下泊夢斷五更鐘李蕃一首蕃字文盛桐鄉人天順八年貢士官平樂府照磨周青士云篔先世居千金圩在殳山之麓清江貝先生避地之所先生子翺翔䎘皆有才名村民慕之多讀書自好天順中有李照磨蕃善詩鄉里至今傳桐花開到邑侯門之句餘若沈韶州榮希仁范貢士庸彦常陳吏目紀彦綱仲貢士剛叔堅董教諭序大倫皆圩産也當日諸君豈乏著作惜乎冺然無聞矣桐溪萬年禹鑿東連海百折清流曲抱村風浪不驚魚鳥靜桐花開到邑侯門張彞一首彞字天常海鹽人天順中以貢授晉州判官晉州述懐微官何事久殊方囘首田園業漸荒多病一年三乞老思歸十夢九還鄉椿隂巳散遼陽月雁影空分海國霜㡬度休衙獨凝睇夕陽西下路茫茫沈樾一首樾字元茂平湖人天順間布衣有樗軒稾懐方孔明梅風吹雨日綿綿綠漲陂塘巳拍天為念故人生計薄一篙春水種湖田羅頎二首頎字儀甫紹興山隂人從軍行二首悠悠陟山阿當暑草木焦溪獸苦炎熱獨行向我號南望建嶺巔嵬嵬一何髙赤日熾如焚岡阜自不毛持謝邦族間逺役無乃勞獨行越荒溪尸積溪流丹四郊何蕭條慘戚秋日寒囘顧望脩塗淒風集髙巒㧞劎起哀歌流涕傷朱顔悲哉城南詩古今同所歎錢洪一首洪字理平常熟人有竹深遺稾送徐守民歸浙之常山壯游湖海㡬經年老氣凌雲雪滿顛詩思巳成芳草夢歸心又上木蘭船長亭人折春前栁驛路梅開雪後天萬壑千巖舊形勝酒尊茶竈向誰邊陳鑾鑾字廷和湖州人題桃花鷓鴣瑶池三月正春酣淺緑深紅雨露含莫唱鷓鴣新樂府座中有客是江南鎦師邵三首師邵字師邵紹興山隂人績之子有半齋集五馬圗渥洼水中産龍馬房星之精自天下星奔電掣勢莫當豈比尋常駕轅者竹批峻耳鐵作蹄雄姿颯㳫精權竒日行三萬等厯塊未許八駿相追隨今觀此圗凡五匹畫史經營各臻極就中一匹是真龍異質殊形人莫識滄溟氣含雲霧凉蹴齧顧盼思騰驤神竒變化在頃刻素壁髙堂安可常趙魏公畫馬浚儀王孫善畫馬神妙不在江都下朝退從容白玉堂意匠經營自揮灑我觀此圗誠偉哉清光夾鏡雙瞳開古來騏驥不易得此匹乃是真龍媒尾如流星汗成血萬里飛騰宜電掣長風颯颯生四蹄百丈層冰蹴應裂雄姿眼底苦不多時無伯樂奈爾何駑駘伏櫪飽芻豆坐使神物成蹉跎君不見才髙往往困泥滓世上英雄亦如此萍乍因輕浪疊晴沙又見囘風擁釣槎莫怪狂蹤易漂泊前身不合是楊花陳寛二首寛字孟賢吳人檢討繼之子題燕穆之楚江秋曉圗五更人語覺潮生估客帆檣候曉行樹色未分雲夢澤雞聲巳動漢陽城天空畫角吹霜盡月落銀河入斗横欲問楚南千古事至今江水為誰清題先祖畫綠水園中舊蓽門清風喬木至今存千金遺墨人間得腸斷題詩到子孫陳完一首完字孟英寛弟有簡齋集錢塘懐古邊塵巻地北風遥泥馬南來駐六橋汴水故宫猶有月海門沙漵寂無潮銅駝夜泣霜華冷銀雁秋飛王氣銷五國城頭魂不返傷心誰賦楚辭招朱應祥一首應祥字岐鳳松江華亭人絶句江面微風鴻浪開鳥聲啼過釣魚臺暖雲欲送桃花雨一片隂從栁外來祝祺一首祺或作淇字汝淵海寕人以子萃貴封刑部主事旅中元日異鄉一夜換風烟屈指闗山路八千正是欲歸歸未得看人兒女拜新年趙廷玉一首廷玉字芝巖崇徳人以入粟補官有芝巖集金臺留别笑拂緇塵出帝畿一尊重與故人違青雲紫禁辭仙仗白鳥滄洲戀釣磯夜雨尚存三徑菊春風仍采故山薇舊游天上如相憶萬里闗河有雁飛賀麟一首麟字文徵嘉興人楊白花楊白花隨風飛青春漸老胡不歸化為浮萍將安依羙人聮臂歌未歇宫樹烏啼冷秋月張徳政一首德政字平子杭州人流寓南皮國子監生有餘生草送客旅食正蕭條況别知音者空抱流水琴獨立斜陽下姚翼二首翼字廷輔嘉興人有桂巖集春日與懐用和游鴛鴦湖鴛鴦湖上春波平鴛鴦飛入菰蒲鳴秀州女兒肌骨輕蘭舟蕩漾微風生何人打鴨鴛鴦驚春雲遶郭花冥冥夕陽落盡初月明誰家小閣聞調筝送人之京送客京華去江干落日斜百年雙短髩千里一浮槎栁色河橋雨鶯聲驛路花明朝相憶處雲樹渺天涯陸琦一首琦字公璐嘉善人有友蘭集梅花雪壓寒香凍未消江城歳晚轉蕭條冷雲漠漠知何處夢到西湖第六橋周漳一首漳莆田人號小溪官河橋主簿有夢草集寄弟瑩年來無處避征塵況復衰遲值暮春千里緑蕪江上路一簾疎雨夜深人白雲鄉國囘頭逺青草池塘入夢頻兩載分攜歸未得强將封鮓慰慈親蘇大一首大字景元休寜人嘗輯洪武以來詩為皇明正音詩話景元學于趙子常故冨春李玉昂贈詩云東山儒者師先生能繼續其所輯明詩正音度有可觀惜訪之不得也江樓晩眺懐朱孝常殊鄉歎行役登覽更淒其落日家千里故人天一涯渚烟漁父艇江樹水神祠逺道交游少憑誰慰所思朱彰一首彰字有常嘉興人暮秋偶成老去逢秋髩巳霜石田茅屋半荒凉商歌一曲人誰聽疎雨南山豆葉黄陳昌二首昌字頴昌平湖人有菊莊集沈客子云我郡自清江㢲隠後風雅衰落四陳三李之餘無聞焉至正統天順間而始盛一時如陳菊莊外嘉興有姚榖菴海鹽有張芳洲嘉善有周桐村皆卓然成家菊莊吾里先喆才思藻麗長於七言惜其集不傳題江湖勝覽圗馬卿子清而癯狂非狂迂非迂不愛養浮丘伯之黄鶴不愛釣任公子之巨魚年來只愛江湖居江湖風月足清興筆牀茶竈尋常俱船頭紅拂唱巴曲船尾黄帽歌吳歈歌吳歈唱巴曲妙舞清商間絲竹白日歡游殊未足復擬黄昏秉銀燭風帆催送寒山鐘直向垂虹橋下宿送呉素行之廣西廣州南望海冥冥百丈牽江㡬日程鯨浪打船風正惡蜃灰塗屋雨初晴蠻巫祭鬼憑雞卜島户編氓事象耕此去化成皆樂土尉佗不敢更言兵錢文一首文字章靖無錫人諸生試不遇遂隠居不出有鶴叟詩集新宅安穏茅柴屋數間起來開眼見南山千帆白日牆頭過一鳥青天樹杪還顧潤一首潤字廷尚崑山人送王景方歸杭州闔閭城外送歸航流水何如客思長巳遣停杯傾别酒還教攜手上河梁白蘋漁浦迷秋色紅樹官亭帶夕陽最是不堪凝望處青山無數隔錢塘盧儒二首儒字為巳崑山人中書舍人遺安堂為周文伯題二首鼴䑕飲河流鸒鳩槍枋榆適意巳云可多營徒為虚黄鵠起髙翔遨遊升天衢忽逢弋人繳墜翼難再舒退者止足全進者忘其軀衛生不求盈稍足遂愜意服厭成都錦飯舍山陽穄春熟収繭絲秋成斂禾穗田翁笑相語秫酒聊同㑹秉耒因時暇翰墨欣游藝多遺一籯金徒為子孫累鍾政一首政字里無攷揚州樹繞人家水繞城何郎去後若為情不知東閣梅花處一作盡二十四橋空月明陳景融景融字菊逸嘉興人答姚景升露冷催砧杵風髙急鼓鼙登樓囘首處目斷塞鴻西史傑二首傑字孟哲湖州人大河衛百户有韤線集竹石圗雨餘苔石淨無泥翠影參差夕照低記得推篷湘水曲滿林秋色鷓鴣啼蕪城别唐宗吉揚子橋頭漲淥波分攜無那故人何明朝相憶重囘首莫厭江雲嶺樹多魯道一首道淮安人送孟繼之歸梁州尊酒荆門客南征古道平雲連神女廟山繞夜郎城越嶲開荒服滇池隠斾旌相思日千里腸斷夜猨聲姚綸一肯綸字允言嘉興人修竹仕女瑶臺無信託青鸞一寸芳心思萬端莫向東風倚修竹能禁翠袖㡬多寒劉玒一首玒字公縝海鹽人有西林集秋望天迥黄雲斷林空古木疎遙憐漢庭使千里寄邊書滕鸞一首鸞字朝儀海鹽人有翠厓集秋日寫懐秋色靜柴扉山光鎻翠微紫牽江荇帶紅落渚蓮衣卧病無人問思家有夢歸相看沙上鳥去住兩忘機丘吉七首吉字大祐歸安人有順信齋集詩話瞿宗吉以香奩八題見賞於楊亷夫自是以後從而效之拾西崑之唾餘雜以鼓詞院曲之穢字誦之欲嘔吳人劉欽謨倡無題詩初不見好而一時和者紛紛衆推吳興丘大祐為最故沈啓南贈詩有西漢人材東閣外六朝詩句北牕中之句大祐無題五首中云只解詩中嘲阿輭寜知花厎活秦宫絳桃成子花無色銀燭燒心淚有㾗在彼法中差勝而全首未工他詩若楊栁一堤沽酒路木蘭雙楫載書船吳淞東去皆連海天目西来總是山斜日半林金翡翠青雲千尺玉浮圗白鴉谷口霜摧栗黄鶴樓前水到門簾外雨多龍洞漏屋頭松老鶴巢稀山家雲濕長垂箔水館風多不置牕醉筆題詩蕉葉遍夕陽催酒玉缾空青山無雪梅花後細雨生寒燕子前賀監酒船湖左右杜陵茒屋瀼西東消磨盆盎茅柴酒姑負烟霞榔栗條野寺夕陽銀杏葉水村凉雨石楠花松葉微風三竺路荷花細雨六橋船又題岳鄂王墓云南國有人論歲幣中原無日見官軍頗有思致大祐自號執柔道人賦才最敏同郡詩家如唐庠惟周唐廣惟勤張淵子靜沈祥彦庠皆奉之為師友故當時推許有吳興領袖之目也折楊柳牽馬綰青絲上馬折楊栁願作馬尾蠅逺近隨郎走擬古青青澗畔松緜緜谷中蘿悠悠逺道人珊珊雙玉珂道逺有返轂川逝無廻波游魚懐清淵逸鳥思髙柯昔慕蕭與嬴今作羲與和白駒不可駐朱顔尤易磨皎皎合歡扇文采鴛鴦羅隨君願終老其奈秋風何楊梅楊梅獨出吳興異龍井名髙味不同饞客㡬嘗山雨濕佳人一笑玉盤空羞看月下櫻桃色不數釵頭荔子紅更擬明年同采摘要將華髪待熏風初度日去嵗山城酒一尊今年無恙醉柴門不知有限生辰酒合得田家㡬瓦盆畫山水二首翠滴松梢雨乍収山光半為白雲留江邊可惜無人住閒却蘋花一岸秋樹樹秋風響澗阿夕陽収處暮霞多何人艇子苕谿上唱得吳儂子夜歌春夜香燼銅爐火不増一牀寒被卧春冰不知明月將人夢去落江樓第㡬層懐恱一首恱字用和嘉興人以納粟仕詩話用和輯士林詩黄徵君俞邰言有十巻予購之五十年始得之止上下二巻而巳詩家大率吴越之産所常唱和者其居在相湖之南曰栁莊亦曰栁溪故自號柳溪小隠又號相湖漁隠姚允言詩云風流絶勝輞川莊又云雨衣自織青蒲葉烟艇長維緑栁根蘓秉衡詩云簾巻夕陽吟對酒牕臨流水坐看鷗皆題其草堂作也别有東莊曰釣魚所曰觀蓮亭曰清風榻曰白雪窩曰載春舫曰耕雲堂曰栽桑圃曰采菱灘丘大祐賦八景詩贈焉又有北花園姚廷輔有懐氏北花園宴集詩復有水亭名雪艇大祐詩醉倚蘭干俯春水是也有齋名鐵松岑公琬詩移得徂徠一蓋青是也有軒名月波陳漢昭詩湖上華軒瞰碧瀾是也其自題鐵松齋詩云青衣開尊傾翠濤詩成落紙飛霜毫園亭詩酒之㑹極一時之盛而允言有送用和納粟之京作又有冠帶從容新帝澤之句則知當日以納粟入官蓋冨而好事者濮樂閒之流也今以相湖在望葭菼微茫舊迹不可復問矣開徑開徑深林裏莓苔緑到門山多雲壓樹溪曲水通村補屋交藤蔓疏渠破石根抱琴何處客過我共芳尊魏時敏一首時敏莆田人官無錫縣丞改桃源有竹溪詩稾寄周隺洲太守風雨越江邊郵亭對夜眠鄉心孤島逺客夢一燈懸訪舊懐他日論時記昔年離魂將别夢㡬度到臨川王仲煇一首仲煇字里未詳詩話仲煇詩題王孟端墨竹真蹟後自稱曰東軒有紫電清霜習武之餘二私記題王舍人墨竹我本山野人夙抱烟霞疾何處慣經行松篁與泉石晴牕偶看琅玕圗淋漓醉墨傾金壺崇岡怪石相髙下冷雨疎烟半有無數竿晴渭川日暖春風輕數竿老嶰谷千年霜雪飽數竿欹楚江歳晩寒風吹數竿側淇澳秋深雨蕭瑟千竿萬竿難盡名林巒仿彿清風生交枝直榦平安態勁節虚心君子情對此怡然樂清賞撫巻無言發遐想烟雨濛濛語鷓鴣詩懐長在湘江上朱翰二首翰字漢翔嘉興人有石田清嘯集湯新之云漢翔以教書為業以養其母事母孝交朋友信性情得其正故發而為詩多温厚和平渾然天成而無雕琢藻繪之跡廷徐孟時云漢翔詩句法音響咸似乎唐胡俊云朱君隠居鄉校一志於詩嚴潔雅澹無凡近追琢氣味是亦善鳴者也詩話漢翔詩太圎熟不脫兎園冊子然留心風雅輯郡人詩為檇李英華鄉黨典型藉以不墜其功不可泯也題畫南游匡廬山不知㡬萬丈盤囘直至香爐峰五老髙髙儼相向初疑三山屹立東海中又疑青天削出金芙蓉世人蹤跡不到處物色匪與人間同天梯石磴無窮極一片寒凝古苔色千歳桃花别様紅四時瑶草非常碧就中有逕深復深白雲洞口猿哀吟一聲長嘯白日晩神仙渺漠無由尋須臾下來心目爽便欲移家擬重上東風囘首塵茫茫明月滿天勞夢想送楊少府貶栁州洞庭秋色對衡山一路猿聲夕照間湘浦舟行何日到羅池人去㡬年還烟村土屋連孤壘嶺樹松牌界百蠻自古中朝通使節莫因流落歎衰顔周瑾一首瑾字汝成秀水人朱翰弟子南湖即事湖水空明靜不波蕩舟人逺夕陽多秋來無限相思意欲采芙蓉奈晩何朱存理二首存理字性父長洲人有野航漁歌鶴岑集楊君謙云性父居吳葑門之外左圗右書一吟一咏或應親友之求或寫胸臆之見率皆簡淡髙古有味有法不落穠麗枯澀之境其詩未嘗自匿恒亦流布人間而知之者蓋鮮何元朗云野航葑門老儒在荻扁王氏教書與主人晚酌罷主人入内適月上野航得句云萬事不如杯在手一年㡬見月當頭喜劇發狂大呌扣扉呼主人起詠此二句主人亦大擊節取酒更酌明日更請呉中善詩者賞之大為張具徵戲樂留連者數日吳中舊事其風流致足樂也詩話性父晚年募刻巳詩疏曰嘔心少日巳無錦囊之才流淚終年空有碧雲之歎髪白因其搜索雌黄費我推敲抹去若干存來十一欲望収拾在後子孫莫若流傳先自朋友其情甚為可憫祝希哲贈詩云書抄滿篋皆親手詩草隨身半在舟沈啓南題稾云雖止百篇諸體備不拘一律大方諧惜乎其稾罕傳矣支硎山再餞文交木太守崇嶺逹深邃芳漪激寒泉言尋支公蹤閲厯成千年鶴飛逺青冥有亭尚巋然草木屬孟夏山水尤清妍祖餞此云再廣林啓長筵泛吳江一帆風便到吳江江上飛來白鳥雙舟子飯時吾夢覺起看新月坐篷牕倪光一首光字應奎鄞縣人有味易詩集李杲堂云先生感土木之變學孫吳書講劔術既久無所合乃更學易學者稱為味易先生古詩效初唐音格流麗近體不減王右丞句如路栁官橋晚山花野店春平林藏宿霧疎雨帶春潮真不亞盛唐也詩話相傳味易能前知游京師於楊文懿邸中有中使突至先生見一雀自庭樹集于地巳還集樹即謂使曰頃來得非因失馬邪六日當復使大驚文懿質之對曰雀踴躍物也去樹而集於地舍所依也還集樹復其所矣初集自北而南水數六故曰六日當復又問馬色曰以水克火當黄而近于黒中使曰然客有問婦將産者傘忽裂其人失色先生曰傘忽裂則小人見君得子矣其學蓋本於邵氏觀梅數詩特娟秀不襲擊壤惡派宿清村地闊江流險天空山勢髙望鄉雙淚落為客一身勞斜日飛沙鳥西風動野蒿一舟依岸宿深竹夜騷騷燕遺民三首遺民字逸德自號雲谷老人蒲圻人累以賢良徵髙卧不起詩話遺民詩頗蒼老惜遺集無存僅從通志總志中錄得三首而巳感興二首寥落湖山曲憑誰話起居出門惟水石相見但樵漁酒熟還堪漉園荒欲自鉏久深泉石想早晚賦歸與泉谷煙花淨林塘暑氣清幽花籬落見好鳥竹間鳴禾黍皆豐稔桑麻自長成還聞茅屋底燈火讀書聲九日細雨柴門靜青山客路長黄花應笑我無酒過重陽繆天自云語不在深悠然自逺章珍一首珍字文重鄞縣人李杲堂云文重以布衣宿望為里中五經師不媿真隠無題溪橋春水生新蒲緑堪把茅屋掩松雲斜陽鳥飛下陳􅜶一首􅜶江隂人以善楷書舉厯官按察僉事題湖州慈感寺過溪纔百步橋轉入禪闗髙閣斜臨水平林逺見山波光隨鳥度秋色共雲閒深愜幽人趣遲留忘却還黎擴二首擴字大量臨川人以薦授貴池訓導升蘓州府學教授西壩草堂為廬陵宋内翰賦聞說西谿上春風小院開野蠶成繭盡江燕引離廻竹裏圍棊局荷香沁酒杯晚凉疎雨過隨意歩蒼苔送人還盱江新凉生白苧游子倍悽然客思秋砧外鄉心旅鴈前西風千里道斜月五更船亦有還家夢隨君到汝川張淵一首淵字子靜歸安人有鴻墩集詩話子靜孝子也母失明朝夕䑛之父好飲醉或罵詈則握髯請解長跪移時里黨稱之晚游四方與沈啓南史明古僧月舟最善湖州勞太守鉞府志其手筆也其居在雙林之鴻墩故詩集以是名題白石翁畫虞山古檜圗虞山老檜三株青斗壇半掩招揺星道人丹成化鶴去三檜夭矯飛龍形是誰手植經千載曽見昭明讀書在㡬廻天上葬神仙不獨人間變桑海古人今人繞樹行古今人去樹長生乃知勁氣合元化不與凡木爭枯榮長洲老石好異者百里攜杯游樹下浩嗟天下有樹此樹無我去此樹何人圗三日經營雙眼力滿空蒼翠移真跡鶴骨蚪筋左紐文雷裂霜皴古秋色日暮袖歸歸不得滿山風雨山靈惜居然贈與卧雲人長嘯寒風生石壁於乎石君詩画天下知此筆尤為天下竒勸君風雷當掩戸恐化蛟龍擘空去程文杰一首文杰字思周休寜人有湖山吟稾行路吟有酒且莫斟聽我行路吟風霜滿面塵滿襟古皆然匪獨今我勸君君毋怒今人行是古人路古人一去豈再來笑殺今人不回顧朝行吟山沉沉虎狼闗隘龍窟深暮行吟木隂隂江南鷓鴣無好音行人莫道行路好多少行人路中老詹貴一首貴字存中休寜人有竹南集商婦吟莫作商人婦商人慣别離門前竹王廟日日卜歸期莫藏一首藏字用行士林詩選作恒海鹽人有素軒佩觿二集閨怨雲母屏空怯曉寒懶臨青鏡舞孤鸞滿庭風雨無情思開到棃花不耐看莫遯一首遯字用嘉藏弟登六和塔浮圗百尺倚天開落日珠林鳥雀哀王氣巳銷龍戰後山形猶似鳳飛來茫茫雲海迷蓬島渺渺江湖接釣臺回首西湖倍惆悵南朝陵墓盡蒿萊陳金一首金字用礪海鹽人博野知縣寒食書懐江上客居三十年每逢寒食一凄然青山笑人不歸去白髪滿頭徒自憐茅簷㡬處插楊栁棃花半開聞杜鵑身世﨑嶇杜陵老夕陽風浪洞庭船劉泰二首泰字士亨錢塘人有菊莊晚香二集湖上暮歸小􅐒䭾醉踏殘花柔緑隂中一逕斜日暮歸來問童子春衣當酒在誰家小景雲溪一帶淨無沙門對青山是我家㡬日不來亭子坐東風開過紫藤花王寛一首寛字敬敷東陽人龍南教諭有建南稾解任歸書草萍驛三月草萍驛風花㸃客衣春山啼杜宇也道不如歸舒鑑一首鑑字孔昭自號東海釣叟紹興人有恪齋集寄雲城知巳琵琶洲畔白雲城紅樹千行隔短亭塵迹自悲衣欲化故交誰復眼長青江空木落雁初度院小燈殘酒半醒終夕相思不相見碧山寒月照疎櫺羅養䝉一首養䝉吉水人感興勲業飄零梅子真江山誰與訪遺塵艱難獨不悲前事慷慨徒勞憶故人太乙圗書元在漢東周禾黍半歸秦晴天玉笥秋風上欲薦蘋花淚滿巾李宗一首宗字德紹江隂人有雪窗家藏集望亭驛和唐李從一韻迢迢野草接青蘋一望淒然淚滿巾㡬處樓臺荒舊業五湖風月屬何人寒烟半鎻江村晩野鳥空啼驛樹春惆悵亂離前代事不堪寥落總成塵施鈞一首鈞字則天紹興人謝太傅祠晉室將傾不易支先生出處繫安危山間紅袖從游日天下蒼生望起時風暖松亭春載酒月明花墅夜圍棊轉頭樂事無尋處空拂青苔讀古碑時用章一首用章常熟人逺囘吳中挂席看山興不孤西風吹我近姑蘇城髙暗壓要離墓水闊遥連范蠡湖野店喚沽雙酘酒漁舟爭賣四腮鱸故鄉咫尺明朝到十載離愁一旦無喻省一首省字伯唯南昌人常州府同知送友人梅花殘雪照晴川立馬郵亭思惘然媿我飄蓬仍薄宦與君分手正殘年一樽行色沙頭酒千里鄉心月下船垂老莫言歸計拙綠編研北是良田張鎬一首鎬寜波人為李景陽題便面髙樹落凉隂幽溪漾晴碧山雨夜來多苔痕上磯石陳㷆一首㷆字惟大一作文厚閩縣人有棲雲集攬秀樓何年構此山之東八牕相對山花紅桐山居士老解飲何當置我新樓中顧寜一首寜字季康鳳陽人自號夢鶴生入山雜言杖藜入山中悠然澹忘歸白雲靄前途行行穿翠微林幽鳥聲寂地僻人跡稀惟時嵗云暮黄葉紛以飛石罅寒泉鳴草根朝露晞撫景自怡恱暫忘塵世機石壁挂我巾松風吹我衣將期二三子於焉歌采薇李達一首逹字兼善自號竹圃道人青田人過臨江府故人别後思何堪獨倚河亭酒半酣自笑不如雙燕子春風先我到江南吳敏二首敏字思德號柚莊吳縣人洸河洸河水落秋風早菱葉蕭疎菱角老河邊漁船如缺𤓰白頭夫婦團圞好往來賣魚兼賣菱官府近無漁課徵夕陽醉卧風吹罾沽頭牐浮葦生根上陡厓牛羊原隰有人家繰車聲響南風裏棗樹青青落白花王昇一首昇字廷禮號玉澗生長洲人讀曲歌朝憶復暮憶展轉無消息芙蓉顛倒生蓮子中心側杜嗣昌一首嗣昌字繼文號勉齋吳縣人詩話正統中吳郡徐庸用理取永樂以後詩編為湖海耆英集一十二巻大約吳人居其什九其發凡云斯集之作間取亡友杜繼文姑蘇集中者而合成之今繼文姓名吳中罕有知者無論其遺書也長洲馬公素輓詞云寄我詩為遺世物養親錢作葬身資包山蔡昇景東輓詞云半世才名一丘土六經事業九重泉蓋亦篤學之士詩雖不見好錄以存其人題畫秋風嫋嫋露團團朱箔銀樓鎻夜寒一曲鳳簫明月裏玉人何處倚䦨干徐章一首章字徳彰號省軒吳縣人貧居薄田日巳荒舊業日巳替困䝉三十年良由寡生計人非無交游貧賤易相棄周周與蛩蛩飢渴尚相濟所以簞瓢人傲焉不狎世處之茍能安其樂有真意曹侃一首侃字仲雍號竹齋烏程人詩話仲雍詩集罕傳其詩有摹張來儀青弁山居圗贈鳳林嚴十七蓋永宣間善山水竹石者也予聞之鄭芷畦云北宋有曹孝子清嘗代父重辟刑於金陵涌白沫尸泝流還家至今專祠頖宫其子孫散居苕東之西陽村族最蕃多務農桑罕通文墨湖海耆英集云仲雍苕東人豈其苗裔邪同時有曹謙字鳴吉亦能詩寫竹贈戴山黄方伯昔游湘浦泊蘭橈萬玉森森宿雨消記得推篷凉夜永月明一曲紫鸞簫任道一首字里未詳畫菜露芽烟甲曙光寒紫翠漙香濕未乾記得花時曽病酒玉人纖手薦春盤明詩綜卷二十七
