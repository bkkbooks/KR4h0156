body:
  text: 明詩綜巻三十五翰林院檢討朱彝尊編何景明七十八首景明字仲黙信陽人𢎞治壬戌進士授中書舎人轉吏部員外出為陜西提學副使有大復山人集顧華玉云仲黙咳吐珠璣人倫之俊移康徳涵云漢魏以降訖于開寳世代旣音節斯異修詞之士能無惡厥趨斯已優矣復能引而上之不沉流俗若仲黙者豈非鮮哉王子衡云仲黙侵風匹雅欱騷儷選遐追漢魏俯視六朝温醇典雅丰容色澤靡不備舉規治古調無所不極淡崔子鍾云空同方雅簡黙稍餙亷稜仲黙恬溫孫不露才羙李之雄厚何之逸健宜學者尊為宗匠詩孟望之云是時闗中李獻吉濟南邉廷實以文雄視都邑何君徃造語合乃力變之古自是操觚之士徃徃趨風漢魏矣徐子容云仲黙昌榖咸懐雋才與獻吉相頡頏而二子秀潤清藻㣲乏雄渾朝楊用修云仲黙枕籍杜詩不觀餘家其于六初唐未數數然也與予及薛君采言及六朝初唐始恍然自失然終不若其效杜諸作也黄勉之云大復詩所謂使集者宣敬皇帝哀詔時作也家集者劉瑾柄國謝病還鄉時作也京集者直内閣制勅時作也如喬景叔云國初詩尚襲元習宣正以來駸駸宋矣先生與諸君子一變而為漢魏盛唐起千載之衰屹然一代山斗與樊少南云國朝詩文至𢎞治間極矣先生首北地李子一變之古詩擬曹劉賦賞屈宋天下翕然從風盛矣哉千載一時也唐虞佐云仲黙詩探冥抉竒増華潄潤軋晋魏而上之一唱三歎有餘音焉任少海云仲黙詩如黄鐘在縣金石發作伶坊供奉之官莫不按宫商謹節奏其横放處如項羽提三尺劒出江東不必斬将搴旗而登壇嘯咤千人皆廢斤徐子元云大復上追漢魏下薄初唐大匠揮羣工歛手蔡子木云明興百六十年詩文迄無定體自先生崛起汝南與獻吉發憤詞林超覽古始乃排斥羣疑歸之大雅何其雄也人穆敬甫云何詩清淑典麗鑑然瑩然真得風温柔敦厚之旨栁李伯華云大復詩宗李杜文仿班馬字兼顔或與邉華泉李空同稱為海内三才或與崔後渠稱為中州二俊或與關中諸公并呉下徐廸功稱爲𢎞徳七子王元羙云仲黙如朝霞㸃水芙渠試風又如西施毛嬙無論才藝却扇一顧粉黛無色又云仲黙才秀于李氏而不能如其大又云義取師心功期舎筏以故有弱調而無累句詩體翩翩俱在雁行又云李源風何源雅風故長變以明志耳覩其深沉莽宕激昂鼓壮喑嗚㦧悽忽正而竒正若嶽崎竒若海颶則李子哉是故少孫其緣情即象觸物比類靡所不遂壁坐璣馳文霞淪漪緒飇揺曵春花徐發驟而如淺復而彌深疑無隃何子而上者夫百鳥集于詞林而二子雄飛或羊角而横舉或順飇而肆翔其九萬里同也又云鳴鸞佩瓊萬象咳唾吾推仲黙然不能諱其孱汪伯玉云何李兩家遞為桓文鼓旗鼓號天下獻吉非規矩弗由先生則務底于化于時主典則者張獻吉主神解者附先生要諸至言各有所當顧其相直若繩墨而相濟若和羮即言逆耳而心莫逆耳視者勿察也性黄清甫云大復詩因意著詞就詞成篇故情沖逸興象閒雅曩與李公共驟詞場並崇雅道李則氣勢為勝公則風度為優彭子殷云仲黙朗音亮節惜年勿遐羙而未至今也㧞觕豪之獻吉壓于其上天下其誰信之屠緯真云空同雖極力摹古天才故髙不没雄渾之氣大復雖不盡摹古法度故才都無纎豔之習此其所以並傳也顧𤣥言云李何二學憲氣象𢎞濶詞采精確力挽頽風復増古雅遴材兩漢嗣響三唐如航琛越海輦賮踰嶠琳闕珠房輝燦朗映各成一家繼而海内翕然景從爲明音中興之盛實二公之倡也二公古體並出楚騷詞漢樂府而憲章少陵者近體猶酷擬杜李古勝何如屯雲出峽驚風涌湍波瀾變幻層彩疊出何近勝李如石門寒瀑劒閣朝霞空中聲色髙逺難攀薛君采云俊逸終憐何大復麤豪不解李空同則何似勝李邪者胡元瑞云古今才人蚤慧者多寡大成大成不必蚤慧兼斯二者獨魏陳思次則唐王子安明則何仲黙二子風華神秀絶自相當然子安尚沿六代綺靡仲黙一埽千秋茅塞其識與功不可同日語也又云今人因獻吉祖襲杜意輒假仲黙舎笩之說動以雞口牛後為辭此未覩何集者就仲黙言古詩全法漢魏歌行短篇法杜長篇法王楊四子五七言律法杜之宏麗而兼王岑髙李之神秀卒自成一家冠冤當代所謂門戸堂奥不過如此古人影子之說以獻吉多用杜成句故有此規自是樂石非欲其盡棄根源别安面目也又云李以骨力勝何以神韻超學何不至不失雕龍學李不成終類晝虎江進之云何大復詩何甞規規摹古然已逼古人陳卧子云仲黙姿制嬴秀神氣和朗發徽音吐芳訊令人有形穢之恥昔人稱王恭濯濯似春月栁又評禇書為瑶臺嬋娟庶㡬近之詩云有羙一人清揚婉子迨将仿彿焉矣為曹潔躬云唐之士人稱輞川為詩天子浣花詩宰相王諸體精緻毫髮無憾若是乎盡善盡羙也杜硬語盤空頽唐潦倒若似乎未盡善也而王聲價反讓杜數等問之解人㑹于心不能言其故也𢎞正間李何並起始而相應旣而相規李扛鼎拔山千夫盡廢何霜葭玉樹照曜一時右何者羙其醇而寡疵少李者指其生呑活剥不知李正藉短以擊長而何即長反見短明鏡無塵不若月中有物雖稱勍敵然終遜李一籌姚仙期云誦大復詩如聽雲中奏曲但覺洋洋盈耳孫豹人云大復五言句琢字鍊長歌滔滔洪逺又復清爽絶倫五律全法右丞清和雅正七律自少陵以外無所不擬絶句獨不摹盛唐秀峻莫比要之驟而如淺復而彌深兩言其定評矣沈山子云大復楚謡漢風魏製晉造靡所不有静志居詩話𢎞正間作者倡復古學同調六七人李何實為之長李以秀朗推何何以偉麗目李其後互相牴牾何誚李揺鞞振鐸李誚何摶沙弄泥譬之針砭不中腧穴徒嘵嘵耳兩君皆負才傲物何稍和易以是人多附之薛君采詩云俊逸終憐何大復麤豪不解李空同自此詩出而抑李申何者日漸多矣短歌行冉冉秋序肅肅霜露蓄我旨酒召我親故鳥歡同林水歡同源矧我同鄉胡能弗敦耀靈西藏明燈在室更長夜良可以繼日園有藝菊庭有樹蘭秋芳是恱春榮曷觀髙陵可升海水可測出門異路安知南北生年㡬何去者日多子不我樂聽我短歌陳卧子云弱于曹公壮于子桓塘上行蒲生寒塘流日與浮萍儔風波揺其根飄轉似客遊客遊在萬里日夕望故州鶗鴂鳴嵗暮蟪蛄知凛秋暑退厭絺綌寒至思重裘佳人不與處圎魄忽四周房櫳淒鳴玉紈素誰為收白雲如車蓋冉冉東北浮安得雲中鴈尺帛寄離愁陳卧子云婉麗清發不在建安下梁甫吟君不見泰山髙髙梁甫在其半古來封壇禪地無宫館厓崩壁坼鐵鎻斷秦碑漢碣何人㸔自從生人開九州九十六帝行權謀虎豹啖食龍蛇憂朝翻暮覆作雲雨立談坐笑生戈矛君不見田疆論功爭二桃齊門三丘薶野蒿又不見魯連辭賞輕千金却秦救趙何雄豪眼前無人辨曲直身後聲名更何益拂袖空憐蹈海心䕶車枉負排山力梁生五噫歌莫哀東絶梁甫觀蓬莱千年雲開錦繡壁五色日抱金銀臺瀛洲方丈列仙占文成五利何能驗徐生入島竟不回博士儒生盡坑塹我吟梁甫君振衣世路﨑嶇多是非琅玕芝草海岱曲釣竿拄杖從今歸沈道初云豪放不在太白下采蓮曲急歌太短緩歌長清風夕回素雲翔雙鳬飛起向横塘荷花不言空斷腸明月宛轉流西方月中白露霑衣裳紅顔青鬢安能常萬嵗為樂莫相忘獨漉篇獨漉獨漉驅車折軸不畏折軸但畏車覆芃芃者蕕生彼中衢雖有蘭蕙當門則鉏同行竊金相顧道左我實不知彼則畏我食荼知苦食梅知酸狐裘之敝可以禦寒有虎斑斑伏于林下我欲射虎愧無勁弩肅彼北風渡彼中流豈不懐歸與子同舟宗子相云絶似古逸詩白紵歌手中色絲舊所治青紅碧緑當自知衆中不語心向誰感君厚恩私念之東流之水不西馳泰山在前不可移紅顔白首奚足辭行路難二首牀有織綺箧有織素請君視綺還視素憐新不如莫棄故樽中有酒盤有餐聽我為歌行路難衆中歡樂多志氣豈知他人不得意白日有時不照地安得保君常不棄陳卧子云結句無嫌質直樂府本色也天河熒熒西北轉織女牽牛不相見由來天上亦别離何怪人間有悲怨世情磷薄惡衰賤駕車騎馬有人羡少年不得君愛惜紅顔勝人亦何益吳明卿云悽惋俠客行朝入主人門暮入主人門思殺主仇謝主恩主人張燈夜開宴千金為夀百金餞秋堂露下月出髙起視廏中有駿馬匣中有寳刀佩刀躍馬門前路投主黄金去不顧車遥遥二首寒雞喔喔知夜半鄰翁舂粱婦炊飯僕夫聞雞趣車起欲明未明行十里火輪飛出扶桑霞羲和騎龍鞭日車君看日亦無閒時我車安得常在家車遥遥望望行塵滅但聞上車語不得下車别秋江詞煙渺渺碧波逺白露晞翠莎晚泛緑漪蒹葭淺羙人立一作泣江中流暮雨帆檣江上舟夕陽簾櫳江上樓舟中采蓮紅蕅香樓前踏翠芳草愁芳草愁西風起芙蓉花落秋水江白如練月如洗醉下烟波千萬里陳卧子云輕秀之詞不傷古質所以大雅雙燕篇雙燕何翩翾飛去仍徊翔依依止畫閣繾綣鳴東廂昔來屆陽節今去易寒凉祗恐秋風髙海路多煙霜雙飛入君戸雙棲在君梁被蒙君仁恵彈射不相妨養雛毛羽成送雛還故鄉雖無黄雀報嵗願巢君堂種麻篇種麻冀滿丘種葵冀滿園孤生易憔悴獨立多憂患當行思故旅當食思故歡先機失所豫臨事多嗟歎升蕭艾乃至鉏桂致傷蘭物理有相附疇能識其端斷金俟同志抱玉難自宣結交良匪易君當圖未然陳卧子云陳思君子之遺易水行寒風夕吹易水波漸離擊筑荆卿歌白衣灑淚當祖路日落登車去不顧秦王殿上開地圖舞陽色沮那敢呼手持匕首摘銅柱事已不成空罵倨噫嗟嗟燕丹寡謀當滅身光也自刎何足云惜哉枉殺樊將軍莫羅燕羅雀莫羅燕燕飛在髙殿殿髙且深誰得見主人垂幕髙殿中燕来徘徊不敢通楊花落燕出啄童子張羅逐黄雀黄雀入羅燕入幕明月篇有序僕始讀杜子七言詩歌愛其陳事切實布辭沉著鄙心竊效之以為長篇聖於子羙矣旣而讀漢魏以来歌詩以唐初四子者之所為而反復之則知漢魏固承三百篇之後流風猶可徴焉而四子者雖工富麗去古逺甚至其音節徃徃可歌乃知子羙辭固沉著而調失流轉雖成一家語實則詩歌之變體也夫詩本性情之發者也其切而易見者莫如夫婦之間是以三百篇首乎雎鳩六義首乎風而漢魏作者義關君臣朋友辭必託諸夫婦以宣鬱而逹情焉其旨逺矣由是觀之子羙之詩博渉世故出於夫婦者常少致兼雅頌而風人之義或缺此其調反在四子之下與暇日為此篇意調若髣髴四子而才質猥弱思致庸陋故摛詞蕪紊無復統飭姑録之以俟審音者裁割焉陳卧子云此序深得風人之旨長安月離離出海嶠遥見層城隠半輪漸看阿閣銜初照㶑灩黄金波團圞白玉盤青天流影披紅蕊白露含輝汎紫蘭紫蘭紅蕊西風起九衢夾道秋如水錦幌髙褰香霧濃𤨏闈斜映輕霞舉霧沉霞落天宇開萬戸千門月明裏月明皎皎陌東西柏寢岧嶤望不迷侯家臺榭光先滿戚里笙歌影乍低濯濯芙蓉生玉沼娟娟楊栁覆金隄鳳皇樓上吹簫女蟋蟀堂中織錦妻别有深宫閉深院年年嵗嵗愁相見金屋螢流長信階綺櫳燕入昭陽殿趙女通宵侍御牀班姬此夕悲團扇秋來明月照金微榆黄沙白路逶迤征夫塞上行憐影少婦窗前想畫眉上林鴻雁書中恨北地關山笛裏悲書中笛裏空相憶㡬見盈虧淚霑臆紅閨貌減落春華玉門腸斷逢秋色春華秋色遞如流東家怨女上妆樓流蘓帳巻初安鏡翡翠簾開自上鉤河邉織女期七夕天上嫦娥奈九秋七夕風濤還可渡九秋霜露迥生愁九秋七夕須㬰易盛年一去真堪惜可憐揚彩入羅幃可憐流素凝瑶席未作當壚賣酒人難邀隔坐援琴客客心對此歎蹉跎烏鵲南飛可奈何江頭商婦移船待湖上佳人挾瑟歌此時憑䦨垂玉箸此時滅燭歛青蛾玉箸青蛾苦緘怨緘怨含情不能吐麗色春妍桃李蹊遲輝晚媚菖蒲浦與君相思在二八與君相期在三五空持夜被貼鴛鴦空持暖玉擎鸚鵡青衫泣掩琵琶絃銀屏忍對箜􅔃語箜篌再彈月已㣲穿廊入闥靄斜暉歸心日逺大刀折極目天涯破鏡飛沈道初云精神韻調駸駸軼少陵而方駕王盧詩話初唐四子體今人棄之若土苴矣然其音節宛轉從六朝樂府中來初學者正不可不知也仲黙明月篇擬議頗工未墮惡道子羙詩云王楊盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬里流其論詩之指若此然則初唐亦豈可盡廢乎送張子我視人之疚如哉我躬勿曰行弗動勿曰言弗用勿曰我寡憚彼有衆顧文玉云章法自楹杖二銘來清平令清平縣之令不識何為者庭前長野桑庭後長山檟猛虎上我城青狨啼我舎昨日出城去騎馬到部下部民道遮之持刀殺其馬入門顧妻子所居無完瓦秋風吹樹木白日落原野永夜空城中哀哀淚如瀉平越清晨發平越霧暗山益密僕夫各相戒路逺恐迷失薄午游氣清參差衆峰出雞鳴溪谷中始見厓上日雲葉分杳冥髙原被華實秋風起叢林興感乃非一悠悠逺行邁歴險難具述城南婦行城南有寡婦見客泣數行自言良家女少小藏閨房青春嬌素手白日照紅妝父母偏見憐嫁我不出鄉前年彌魯亂腥穢入我堂弟兄各戰死親戚俱陳亡嗟哉華艶質忍恥罹兇强憂愁雲鬢變辛苦朱顔傷昨聞故夫在消息通兩方百金贖我身三年歸舊疆歸來門巷異人少蓬蒿長轉盼夫亦死兒女空在㫄薄田無耕犢寒臘無完裳人生固有命妾獨遭此殃况復官軍至燒焚廬井荒主將貪賄賂百死不一償朝廷自有法出師亦有名妾身何足道無乃乖天常泊雲陽江頭玩月扁舟泊沙岸皓月出翠嶺開牕鑒清輝照我孤燭冷髙林散疎光逺渚接餘景縱横銀漢廻三五玉繩耿弦望㡬更易客行尚殊境佳期邈山嶽端坐令人省沈山子云詩品在大小謝之間五平五仄體秋原何蕭蕭耳目去襍茸枯荷猶穿塘苦瓠尚抱隴寒風吹空林落日照古冡徘徊觀陳蹤露下髪忽竦孫豹人云風雅互作襍體並生五平五仄亦具體也此詩不見平仄之迹乃運思之神更有七平七仄如吐舌萬里唾四海七變入臼米出甲離袿飛髾垂纎羅梨花梅花參差開是也七夕逝節忽不處佳夕復我臨神飇汎光蕙渥露霑華林𬗟彼牛女㑹兹端竟難諶形影㦧相望胡由接徽音飄颻翠龍駕髣髴青瑶簪長河坐移轉素波歛西沉靈彩歘以晦游雲起層隂同歡戀膠漆異處悲辰參翹思慕逺匹感此涕流衿陳卧子云微詞雅奏不減恵連十三夜對月閒居愛明月良節復與俱金魄麗秋闉皓彩揚雲衢澄空斂霜煙清飇蕩中區徘徊廣庭内改席臨方除顧景怵衷慮興心念居諸天道遞消長戒之在須㬰懷謙可久安盛滿豈恒居孰云質靡盈所貴光不渝十四夜同清溪子對月林塘枉佳客待月欣舉觴今夕勝昨夕已見生東方離離絳霄側冉冉素雲揚踰時灝氣徹縣耀天中央仰視渺難即忽覺在我㫄清池含㣲波左右浥流光月行固當望人㑹何能常與子各鄉域邂逅臨此堂良時不屢值明月安可忘醉歌荅永夕和我窈窕章十六夜月日夕城烟斂列宿出復多開軒望明月展席流素波員輝雖少虧猶能遍天涯單居一作翫不為樂念逺徒咨嗟羙人越崇京髙樓結綺霞浮雲暮長征何由覩光華迅飇萬里至霜霧日以加坐憂桂枝歇委落同泥沙清輝苟相照豈慮天路遐十七夜月更深月復明揚秀青雲端浮飇倐以寂長川静波瀾徘徊廣除下白露棲崇蘭仰見城西樓廻光照文軒樓中織綺女延頸獨哀歎哀歎未終已素河横西山逝魄不長望玉貌寧久妍君毋吝光恵使我芳嵗䦨擣衣凉飇吹閨闥夕露淒錦衾言念無衣客嵗暮方寒侵皓腕約長袖雅歩餙鳴金寒機裂霜素繁杵叩清砧哀音縁雲發斷響隨風沉顧影惜流月仰盼悲横參路長魂屢徂夜久力不任君子萬里身賤妾萬里心燈前擇妙匹運思一何深裁以金剪刀縫以素絲鍼願為合歡帶得傍君衣襟陳卧子云蕙心蘭質綺羅如在元羙所謂却扇一顧時也擬古詩名都有髙樓上入青雲端修城延曲隅阿閣交重䦨佳人理清曲當戸横朱絃揚音采霞裏令顔誰不觀賔客㑹四座絲竹哀且繁日中車馬至薄暮皆來還聽曲各言好知音良獨難淒淒仲秋日百卉腓以殘凉風入階樹零露摧庭蘭明月皎東壁昆蟲鳴草間孤鴻暮安適哀音揚雲端眷言平生友振翮起一作蕩孤鶱遺我若逝波望子如髙山託忱在終始蓄久諒逾宣寸心不可移磐石誰謂堅人生百年内胡為形所役登髙覽九原但見松與柏徘徊故里閭念我平生戚斗酒相存問度阡復逾陌上堂展殷勤華燈永今夕何必傾庶羞濁沽聊與適朱顔難可常鬚髪㑹當白徧觀四海人誰為不死客良時弗為歡衰暮歎何益死者長不作生者長不息日月更相送萬古安所極素絲有蒼黄岐路多南北在家常相問出門安可測落木歸本根飛鳥戢羽翼客游在萬里終當還故域繁霜降秋夜膏火寒無光淒風舉帷幄素月流中房客行在殊境一作君子事行役獨處誰與將仰視天上星羅列皆成行牛女獨何辜㷀㷀守河梁嗟無臨風翼欲去不得翔引領長太息涕泗徒霑裳贈王文熙行子夜中起月沒星尚爛天明出城去暮薄長河岸草際人獨歸煙中鳥初散解纜忽以遥川光夕凌亂津市打魚歌大船峩峩繫江岸鮎魴鱍鱍收百萬小船取速不取多徃來抛網如擲梭野人無船住水滸織竹為梁數如罟夜來水長没沙背津市家家有魚賣江邉酒樓燕估客割鬐斫鱠不論百楚姬玉手揮雙刀雪花錯落金盤髙鄰家思婦清晨起買得蘭江一雙鯉簁簁紅尾三尺長操刀具案不忍傷呼童放鯉撇波去寄我素書向郎處陳卧子云調古詞俊偏橋行城頭日出一丈五偏橋長官來擊鼓山南野苖聚如雨三尺竹箭七尺弩朝出射人夜射虎男解蠻歌女解舞殺血祈年暗乞蠱沙蒸水毒草根苦上山下山那敢􅩹蠢爾苖民爾毋侮虞庭兩階列干羽寄李空同黄河臘月氷十丈縱有鯉魚那得上楚天鴻鴈避霜雪未得逢春難北向康王城邊沙草曛梁王臺上多暮雲野人嵗晚誰相對桐柏山中空憶君陳卧子云盛唐官倉行長棘周袤三丈垣髙門鐵鎻緘兩關黄䰅碧衫下厫吏白板朱書十行字帳前喧呼朝不休剪旌分隊聽唱籌富家得粟堆如丘大車檻檻服兩牛鄉間餓夫立牆下稍欲近前遭吏罵吳偉江山圖歌吳偉老死不可見人間畫史空嗟羡吾觀此巻江山圖飄然意象臨虚無想當濡毫拂絹素酒酣落筆神骨露萬里青天動海岳空堂白日流雲霧洲傾岸側波嶺銜島嶼倒影翻源潭江邉萬舸一時發中流䬃䬃開風帆崩濤湧浪勢難久漁子舟人各回首去鴈遥知七澤中落花誤認三江口烟峯蒼茫貌二叟靣髪衣冠頗麤醜石林沙草恣㸃染舒巻滄洲在吾手憶昨𢎞治間偉藝實絶倫供奉曽逢萬乘主招邀數過諸侯門京師豪貴競迎致失意徃徃遭訶嗔由來能事負性氣轗軻貧賤終其身嗚呼吳生不復得剰水殘山轉悽惻此巻流傳天地間我即見汝真顔色吳偉飛泉畫圗歌長安獨過田子舎留我一翫飛泉畫絶壁如聞風雨來晴天安得蛟龍挂吳生跌宕得畫理潦草落筆皆可喜飛泉却出沓嶂間山即真山水真水客堂六月生晝寒耳中髣髴髙江灘源潭窈窕不可測波浪洶湧多竒觀泉邉二老顔色異偶坐似是荘與恵萬里誰論到海心百年詎識臨淵意偉哉田子今儒宗文標南指匡廬峰不須對此更惆悵㑹觀瀑布青天上杉風松日隔縹緲雲瀧雪灨何雄壮我常夢徃神空向豈無吳生好手筆為我寫寄廬山障吳明卿云氣韻生動畫中山水人物歴歴知覩畫魚大魚昻藏若人立衝波跋浪風江急㫄觀二鯉各有神倐忽波濤隨出入中堂鬐鬛動杳冥坐久始識為丹青青天萬里拂絹素筆力咫尺開滄溟禹門天池雲霧裏白晝雷霆行地底何人有力移置此酒酣相視一改容只愁化作三蛟龍楊用修云雄竒排宕直踞少陵之壘可奪獻吉之幟子昻畫馬歌學士宋王孫畫馬皆龍姿曽寫飛黄出天廏尚留雲影落瑶池池頭馬官錦鞾袴緩鞚長牽時拂顧萬里精神開絹素百年馬鬛生風霧吁嗟内乗無人識想見奔騰過都國翠仗朱軒數徃來金羈玉勒増顔色只今天子罷南征乂聞東廵遼海城安得四馬忽然生登臺一顧千金輕天上長隨八駿行鄭平子云仲黙畫馬二篇比之杜陵雄偉少遜而逸宕有餘畫馬行畫馬如畫龍縱横變化當無窮吾觀月山子落筆窺神工曽向天閑貌十萬十萬意態無一同此馬傳來㡬百年古絹猶開沙漠風樹裏河流新過雨簇簇草芽寒刺水圉人雙牽臨水邉草色離離亂雲綺令人疑到渥洼㫄波底風雷鬬龍子細看不是白鼻騧恐是當朝獅子花紫燕纎離各惆悵其餘努劣何足誇憶昔愛馬不惜千金貨君王勤政樓頭坐奚奴黄衫雙繡鞾廐中騎出樓前過紅帕初籠汗血香玉鞭輕拂桃花破吁嗟玩物竟何益遺跡徒使丹青播只今烽大西北來沙場未聞千里才千里才固有時回頭為問御者誰君不見古人養馬如養士一飽能酬千里志今人養馬如養豚廏下常摧蒺藜刺古之良馬何代無可笑今人空按圖詩話仲黙題畫諸篇源出少陵匪徒貌似神亦似之辰溪縣早發辰溪渡清川喜泛舟山城欹粉堞江驛映朱樓雨驟沙頽岸天寒水露洲蠻音聞漸異迢遞動鄉愁峽中自昔偏安地于今息戰侵江穿巫峽隘山鑿鬼門深濁浪魚龍黑寒天日月隂夜猨啼不盡淒斷故鄉心月片月中秋近輝光一歳無天清驚塞鴈夜冷落楓烏不寐知宵永無言對影孤更深何處沒萬里墮江湖殿試宿禮部和馬張二光禄喬直閣諸公東閣春朝晚南宫夜宿深鎻闈猶月色開閤更松隂地迥神仙接天低象緯臨諸君清廟作三歎有餘音蒋春甫云下字虚實俱鍊懐沈子沈生南國去别我獨悽然落日清江樹歸人何處船十年安陸舎數口太湖田想到鄉園日生涯亦可憐沈山子云極似襄陽十四夜水際浮雲起孤城日暮隂萬山秋葉下獨坐一燈深白露蒹葭落西風蟋蟀吟關山今夜月横笛有哀音送曹端卿謫尋甸逐客滇南郡雲天此路長髙秋行萬里落日淚千行作賦投湘水題書寄夜郎殊方氣候異去矣慎風霜陳卧子云似髙常侍九日夜過劉以正别士竒重陽愁獨酌深夜喜相過萬里惟秦客三杯亦楚歌霜笳沈海月風鴈起滹沱醉别黄花去能忘白玉珂送彭總制之西川蜀道青天上岷山赤日西九重連授鉞萬里動征鼙開府松杉静懸軍玉壘低知公安蜀計諸葛大名齊楊用修云森嚴荘重得五清先生客澧州消息悵然有懐憔悴東都士吾師更可嗟三年為逐客萬里未還家暮阻巴山雪春行楚岸花江湖無路覔流涕望天涯詩話五清先生内江人南京禮部右侍郎贈尚時書諡文肅劉公瑞也字曰徳符山東按察僉事斆之子中𢎞治丙辰進士正徳丁丑以按察副使提督浙江學政明年六月廣購經史子集發十一府儒學公貯備覽每冊隸書于序尾鈐以關防今各府俱散佚人間予每每見之惟湖州府學尚多存者予家所抄施宿張淏㑹稽二志乃其所儲本也又甞于峴山建三賢祠以祀唐刺史顔公眞卿宋知州事蘇公軾王公十朋則己卯年事也留心風教若此可謂克盡其軄儻學使者悉如公所爲士風吏治何難丕變予以為三賢祠在宜作栗主并祀公斯則賢有司之責矣公有五清先生集十八巻又外臺集六巻訪之未獲故附識於此關門虎衛關門迥龍沙塞曲深風雲時有氣日月晝長隂中使西來訊千官北望心天塞漢宫闕翠葢憶春臨吳明卿云氣骨清蒼宣陳卧子云似武皇在府時作觀兵二首將帥俱分閫朝廷再剖符選徒皆虎士戰馬盡龍駒直指黄河外長驅碧海隅感恩須此輩萬一為捐軀組練回天地戈鋋白日揺王師一奮怒宼賦可潛消使過傳金節軍行奏玉簫人言漢家将今是霍嫖姚登堅山寺西峰插天起絶頂寺門開雲裏一僧住山中無客來落花平講席積草偏香臺我欲聞清梵焚香坐不回武關北轉趨劉壩西盤出武關微茫一線路廻合萬重山天地㡬龍戰風雲惟鳥還關門鎻溪水日夜送潺湲中秋無月月賞今年罷髙樓獨客愁關山中夜笛江漢故鄉舟暗雨捎檐入秋螢度檻流應知雲霧上天柱有人遊昭烈廟漂泊依劉計間關入蜀身中原無社稷亂世有君臣峽路元通楚岷江不向秦空山一祠宇寂寞翠華春黄清甫云匪直僩詞亦存名教艶曲御溝連上苑大道接平沙紫陌三千騎青樓十萬家城中楊栁樹風起暮飛花武昌聞邊報傳聞彍騎近長安北伐朝廷已命官路繞居庸烽火暗城髙山海戍樓寒一時邊將當關少六月王師出塞難先帝恩深能養士請纓誰為繋樓蘭姚仙期云孝宗御煖閣語輔臣劉健云臨陣以軍法從事所擬太重恐邊將起輕殺之漸此亦恩深能養士之一也溪上溪上茅齋不掩扉西風初罷芰荷衣月寒沙栁蕭蕭落天晚江鴻肅肅飛野客行吟水邉立家人沽酒夜深歸相逢醉語休辭數城外黄花漸覺稀答雷長史十載寒氊鄭畫師風流文采更堪思朱門鼓瑟官仍逹青殿揮毫出每遲百里風烟還薄暮孤城雨雪已多時極知嵗晚傷心切起傍官梅自詠詩聞河南宼檄書近報河南寇楚塞梁關轉戰空豈有兵車能逺救即愁道路阻難通江淮城塹西南險嵩洛山川天地中今日至尊憂不細㡬時諸将捷音同西海子寺下烟波春不開苑中風浪隠樓臺泉源細繞西山出雲氣深從北極來萬里乘查觀日月十年登閣望蓬莱黄塵碧水須㬰事莫使魚龍夜夜哀吳明卿云雄渾遒逸陳卧子云意景皆摹少陵小閣初開崔郭田三君子至本買堂齋為客居敢扳冠葢枉吾廬清風坐下髙人榻深夜門停長者車竹下凉蟾輝几杖花間螢火静琴書黄門翰苑俱鄰近濁酒盤餐意不疎穆敬甫云風致如月出石渠芙蓉散華送雷長史彤管先朝隨帝子白頭今日奉王孫漢庭亦羡相如羙楚客重㸔賈傅尊花下圖書開玉殿日髙琴瑟在朱門十年亭閣淮西宴腸斷梁王雪夜樽陳卧子云潦倒遲暮寫得可念得獻吉江西書近得潯陽江上書遥思李白更愁予天邉魑魅窺人過日暮黿鼉傍客居鼓柁襄江應未得買田陽羡定何如他年淮水能相訪桐柏山中共結廬送施聘之侍御海甸春風攬轡情燕關驄馬去還鳴繡衣霄漢花間出錦纜江湖樹裏行近日西臺多諫草少年南國有詩名别絃更憶風流調愁聽東城二月鶯宗子相云綺語逸韻恍對王謝風流鰣魚五月鰣魚已至燕荔支盧橘未應先賜鮮偏及中璫第薦熟誰開寢廟筵白日風塵馳驛騎炎天氷雪䕶江船銀鱗細骨堪憐汝玉箸金盤敢望傳送衛推官之武昌少年佐郡楚城居十郡風流盡不如此去且隨彭蠡鴈何須不食武昌魚仙人樓閣春雲裏賈客帆檣落照餘大别山前江漢水畫簾終日對清虚穆敬甫云風度若鯉躍晴波鳥鳴春谷獨立獨立對花隂冥冥望河渚只見沙上烟不見烟中雨盩厔清明日獨樹桃花自發髙樓燕子誰家可惜年年春色催人白髪天涯江南思燈下雨鳴秋舫浦口潮廻暮鐘何處相思不見江南開徧芙蓉送韓汝慶還關中華岳雲臺萬里情髙秋落日眺秦城黄河一線通滄海身在仙人掌上行秋日雜興二首野亭千橘未全黄青柿紅梨盡待霜南鄰老翁種橡栗已見兒童收滿牀紫蔓青藤各一叢野人籬落管西風郊扉逺絶誰能到秋日蟲鳴豆葉中明詩綜巻三十五
