body:
  text: 明詩綜卷九十二翰林院檢討朱彞尊編靜志居詩話女冠盛于唐楊太真以開元二十三年既册為夀王妃尋度為女道士敕曰夀王瑁妃楊氏素以端懿作嬪藩國雖居榮貴每事精修屬太后忌辰永懷追福以兹求度雅志難違用敦𢎞道之風特遂由衷之請唐會要公主度為女道士者一十四人金仙玉真萬安楚國華陽漢陽潯陽平恩邵陽永嘉永安義寧義昌安康下而宫人入道朝士輒為賦詩花間尊前詞客無不倚聲填女冠子小令蓋風尚則爾然自李冶魚玄機外女冠之能詩者寡由宋以降益復寥寥元有宫人玉金蓮晚為道士提點昭應宫卒贈淵靜元素真人袁桷為之草制此僅事也至於象教東流比丘比丘尼當一時俱集矣而尼至晉建興中始有之莊嚴寺僧寶唱撰比丘尼傳以洛陽竹林寺尼淨撿稱首焉宋有妙總為蘇魏公頌孫又溫州淨居妙道禪師係黃公裳女並有法語見傳燈録明正統中有吕姑諫阻裕陵北征復辟後為建順天保明寺都人目為皇姑寺者是巳顧終明之世禪學頗盛而尼之著作無聞逮天啓崇禎之季始有付巾拂立禪林者因合女冠為一卷羅素月一首素月惠州羅浮山女道士梅花村麻姑仙窟鮑姑山鳳子翻飛逺嶠還玉女峰頭人冷笑杜蘭香去嫁人間吳靜婉一首靜婉金壇人蘇州木瀆女道士别思西􅛇雨未收東􅛇風又作留住緑蓑衣莫與篙師著行徹一首行徹字繼總衡州人劉善長之女嫁陳氏子而寡中嵗出家為僧通微弟子住嘉興福國禪院有語録詩話繼總偈語多近詩者如山居云野猿探果熟巢鳥入林深送人云晚食蕚絲滑秋衣薛荔輕落葉云秋聲千葉墜逺影一巢孤均有郊島風骨秋日懷母不見慈闈秋信來籬邊黃菊帶霜開為憐消息無人寄一日峰頭望幾回行剛一首行剛號祇園嘉興人處士胡日華女嫁諸生常公振未期而寡中嵗出家為僧通乘弟子住嘉興梅會里伏獅院有語録詩話石車乘禪師以如意付祇園此崇禎丁丑年事先伯祖母趙淑人嘗師事祇園疑義必質故余少日曽見之威儀醇朴母論空門行業即以節婦論亦宜存其片言以當鳳樓新誡也淑人崇禎間兩朝中宫周后語宫人云朝中命婦率籧篨戚施薄福之相維刑部朱侍郎妻莊嚴婉麗稱此象服爾孟夏關中詠百結鶉衣倒挂肩飢來喫飯倦時眠蒲團穩坐渾忘世一任塵中歲月遷神一一首神一初名淑吉字美南姓夏氏考功允彛女也歸侯洵二十而寡遂削髮為尼更今名改字荆隱有龍隱遺稿悼亡蕭蕭鑒玄夜幽室生微涼眷言念君子沉痛迫中腸音徽日以杳翰墨猶芬芳靈帷空蕭條齋奠真荒唐舉聲百憂集泣涕不成章詩話詩不期工一真摯足以傳矣明詩綜卷九十二
