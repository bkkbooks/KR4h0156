body:
  text: 明詩綜卷六十二翰林院檢討朱彞尊編朱燮元一首燮元字懋和紹興山隂人萬厯壬辰進士除大理評事纍官兵部尚書兼右都御史總督川湖雲貴加太師有恆嶽遺稿靜志居詩話太師儀表豐偉飲噉倍十餘人其蒞湖南川貴土司以壺漿乾肉迎車前相接於道公傾槃倒甕一無留餘衆皆驚歎曰此天人也相誡不敢出犯嵗既久威望著於西南比之蜀相諸葛云公詩不多作句如買得勞薪先煮酒不嫌疏鬢也簪花荒徼有誰憐白髮故園亦自有青山越人至今傳誦之馬嵬坡六龍回轡此重過遺恨秋墳掩襪羅南內蕭蕭風雨夜淒涼應比夀王多畢自嚴一首自嚴淄川人萬厯壬辰進士官户部尚書塗次詠桃花緑楊春樹蔭芳鄰中有夭桃别樣新馬上不煩頻指點好花應笑白頭人李騰芳一首騰芳字子實湘潭人萬厯壬辰進士官禮部尚書博望驛孤亭瞰虛空危闌翼石壁亭亭數株松雲端發深碧起視羣巒層溪光亂相射盤梯花倒看入閣煙相逼雨過萬瓦鳴燈殘四村夕疏星栁外明河漢看不隔去矣問津人空思泛查客劉一焜二首一焜字元丙南昌人萬厯壬辰進士除行人擢吏部主事厯郎中升太常少卿巡撫浙江清蹕清蹕歸何晚刋山紀漢功猶餘玄石碣竟墮鼎湖弓社稷三犂後園林百戰中如何膏血盡辛苦事來同寄題金山寺長江流日夜縹眇一峰殊落景疑飛動盤根定有無雲端清磬濕樹杪佛一作聖燈孤幾見登臨客扁舟下五湖張五典一首五典字和衷沁水人萬厯壬辰進士授行人遷戶部主事歷員外郎中出為山東參議纍遷大理卿加兵部尚書贈太子太保有海虹集送喬警我長路天涯外驅車背朔風三秋驚别鶴千里慕征鴻尊酒荒城外關山落照中前程行色晚裘馬自匆匆王愛一首愛字仁甫宛平人履厯注任丘人萬厯壬辰進士除潞安推官入為戶部主事歷員外郎中升陜西參政進右布政使有息機園存稿綿山道中昔賢棲隱地兩壁盡髙山入夏風應凛經春花未斑煙猶遺俗禁廟許妒人還平定州娘子關有妒女祠唐李諲作頌傳是介之推妹立馬看唐碣神林不可攀神林大樹腹中有郭令公碑禁樵采蘇茂相一首茂相字𢎞家晉江人萬厯壬辰進士除户部主事纍官户部左侍郎總督倉場尚書再加太子太傅改刑部尚書弔方正學先生寧海侯城里停車意愴然風雲蕭瑟氣天地革除年臣罪單辭定孫枝一葉傳龍山真突兀仿佛首陽巔李本緯一首本緯字君章錦衣衛籍曲沃人萬厯壬辰進士除鞏昌府推官仕至山東右布政使有灌蔬園集登張掖甘泉樓乍别酒泉郡來登張掖樓關雲排檻入塞水背城流夜湧陂塘月寒生草樹秋憑髙聽不盡羌管數聲愁石九奏一首九奏字伯成冀州人萬厯壬辰進士授大理評事厯寺副寺正出知萊州府以憂歸補兖州升開原兵備副使進右參政春郊三月長安花正飛長河隄畔栁依依獨憐芳草王孫路立盡東風不肯歸陳懿典一首懿典字孟常秀水人萬厯壬辰進士改庶吉士授編修厯少詹事有吏隱齋集李公巽招飲奈子花下淑景春城暮聮鑣韋曲來共尋金谷墅同泛竹林杯縞夜分穠李生香喻早梅不愁風雨至只恐暝鐘催吳士竒一首士竒字無竒歙縣人萬厯壬辰進士除知寧花縣調歸安升南京户部主事厯官陜西左布政使遷太常寺卿有緑滋館集詩話太常留心國史革成副書藏于家遺稿為江都汪楫存貯較諸野史頗純正第稍略耳詩特餘藝要非所長灧澦孤根夾浪擁江間百二層巒片石關急峽倒流三峽水髙灘下指榜頭山形同牛馬心逾怖舟近魚龍膽詎豩聽説風波前更惡來朝百丈費牽攀謝肇浙四十一首肇浙字在杭長樂人萬厯壬辰進士除湖州推官移東昌遷南京刑部主事調兵部轉工部郎中出為雲南參政升廣西按察使厯左布政使有小草堂集李本寧云在杭樂府豐約文質適得其中五古贍而不俳華而不靡七古音節鮮明氣勢沈鬱五七言律長律比耦精嚴絶句意在筆先韻在言外舂容警策短長合度大都率循古法而中有特造孤詣體無所不變變無所不盡今詩道向衰豫將以在杭為砥柱焉躅張幼于云在杭蓄藻于建安騰聲于慶厯希于少陵泛駕于長慶兼綜潘陸妙契陶韋其辭宛以麗其氣雄以健其攄思優以雋其援事典以則其振嚮和以平既美才情尤深寄興王屠緯真云謝君詩峭舊秀偉卓然名家伯玨云在杭詩寄興微而綴詞雅取調古而命意新秀若可餐沃其堪挹穆如溫如以雅以南陸無從云在杭詩沖融婉至深于性情詩話在杭格不聳髙而詩律極細其持論亦平如于鱗元美敬美子與伯玉皆所傾心漫興詩云徐陳里閈久相親鍾李湖湘非吾鄰丸泥久已封函谷怕見江東一片塵徐指孝廉維和山人興公陳謂文學汝大孝廉幼儒山人振狂是時景陵派已盛行而在杭能距之又云石倉衣鉢自韋陶吳越從風赤幟髙若問老夫成底事雪山銀海瀉秋濤此則在杭自任匪淺矣示湘潼二弟於戲小子各敬爾守無婦言是用沈湎于酒惟勤無斁惟慎無咎惟德惟厚可以長久往者不可追聊毖爾後於戲戒之天命不又發真州别諸子折板無安蹄風林少寧翼頽波既東徂熹光復西匿行子逐轉蓬朝旰不遑息擬垂邗江綸仍脂薊門軾仰送鴻雁翔俯攀楊栁色别緒如絲棼欲言涕沾臆早嵗負好修中道遭反側行止信盈虛風波安終極白璧委精光何當重拂拭揮手從此辭他鄉復異域贈君以孟勞持此長相憶雨霽寄陳隱君新晴動花氣鳥啼漳水春出門見芳草忽憶山中人種藥斸雲母煮石炊松薪甲子誰能識空山無四鄰寒夜感懷凜凜嵗云暮歸鴻浩南征客心渺天末役役哀吾生撫劍中夜起碧宇何淒清霜氣襲四野素月流前楹寒燈黯欲滅萬籟闃無聲欲奏思歸引淚與朱絲并調孤絃易絶山鬼徘徊鳴浮生無期别離恨何時平秋日邀龍君御同鍾伯敬林茂之賦詩君御將赴湟中營道寡髙操大音謝俗機誰云京洛塵而能緇素衣前蹤既云邈後會安可希斗酒自斟酌蟹螯秋正肥南陸有殘暑西山無留暉不知松際月已挂花間扉雜坐忘磬折緒談聞芬菲君今赴河湟戎馬生郊畿紅顔誰見賞青雲願多違舊歡意未浹新離淚仍揮余亦倦遊者因之歌式微桃丘嵗暮作衡門杜俗轄時與參术親三旬九梳髮不知昏與晨早來踐繁霜積霰紛成塵白日光慘淡氣色黯不伸始知玄律窮黍谷無回春嵗功忽云改勞生猶艱辛四鄰起寒杵惻惻傷我神天地固有盡年華安足云偕李元祉水部遊蜀山一水劃為山兩湖東西匯漕渠貫其中盈盈若衣帶西湖漸成陸東湖渺無屆千頃碧琉璃風雲互變態中流一卷石突起砥淜湃金鏡浮芙蓉銀盤捧螺黛荒祠久零落花幡皆破敗雞柵倚龜跌燕泥凝佛背開尊面南浦雲水淡相對魚艇散復集鳴榔出深瀨蒲荇交亂流帆檣繞天外濤驚山影搖波漾日光碎恍如金焦間疑在蓬壺內憑虛倏往還已隔人天界浮雲何時間勝遊與居會回首空煙波疏鐘隱林靄十六夜彭城對月辭家席未暖望舒倐已圓初隱層峰外俄挂髙城巔徘徊麗絳闕瀲灧搖紫淵逺望杳無極忽覺在我前流輝照綺席素波相澄鮮玉宇何淒清孤鴻唳中天寒江抱平楚離離含輕煙美人天一方皓魄私自憐但恐佳辰邁弦望自推遷胡為勞我心愁對江楓眠安平宋尚書禮祠文皇既定鼎上國勤灌輸汶流久湮絶負載勞牛車戴村一以壩分水開龍渠畚鍤不再舉天府盈倉儲誰建平成烈共城宋尚書挽彼澶漫流盈盈歸尾閭至今會通河俎豆紛庭除白英獲侑食流慶及餘胥劉尚書大夏祠引黃濟汶水譬彼借寇兵龍性不恆馴况乃與之爭百年罕成績閭殫吾山平忠宣纘禹緒四載勞經營上流既南絶猛勢隨東傾載下淇園竹永奠宣房名蛟鼉徙窟穴柔櫓多歡聲沉馬不可再寄言厪守成望點蒼山點蒼十九峰一一芙蓉青綿亘百餘里疑張雲母屏鳥道當太白鐵壁排髙冥白雲繞其腹玉帶橫萬釘一峰一溪流奔缷如建瓴散入市廛間家家鳴琮琤逺近注畛隰禾黍藉生成陰崖四五月積雪輝廣庭陽光照不及力與造化爭北麓産文石玉質聲瓏玲濃淡合畫圖蒼素何分明追琢豈天巧醖釀誠地靈馮河不可極乖龍猶潛腥林巒非一狀蘭若棼連甍相對不數武空翠盈窗櫺奇境趣自合絶域心所輕悠然獨長嘯忘此支離形送練中丞遺裔歸家有序自金川門之變練公子寧以御史大夫抗節死闕下闔門荼毒獨有侍媵抱匝歲子匿民間得免展轉入閩為人傭保六世孫綺者為新寧陳孝亷掌書記萬厯戊戌孝亷計偕入浙有江右楊生應祥同舟先一夕生夢練公持刺謁已心異之比入孝亷船見書記侍側雅晳不羣指問何姓答曰練生心動叩之曰得非吾里練中丞後乎綺不應而涕淚滿面生益疑駭窮詰之具得其狀亟以百金為贈孝亷不受遣綺綺不肯行曰以死殉國人臣之恆且九族赤矣歸將何為生益賢之歸家具白當事者以幣來聘授以衣巾俾奉公祠官為置田廬百畝一時聞者莫不歎息泣下以為天道有知云燕山日黑黃塵起金川門外鼓聲死長樂宫為瓦礫場殿庭流血成海水御史大夫練子寧手持三尺干雷霆覆巢自分無完卵一門百口歸冥冥事去人亡二百載蘆荻蕭蕭餘故壘長陵松柏已十圍孤臣遺骨今安在釣龍臺下水可楫新寧城東山嶻嶪灌園誰能識法章傭肆猶堪藏李燮一日天回地轉時千金購出練家兒若敖之鬼終不餒行路聞之皆歔欷我登鍾陵山遙望石頭城寧為孝孺死不作陳瑛生為君慷慨終一曲悲風颯颯江波緑少年行鎖甲帶明犀輕裝出御隄銀牀調舞馬金距鬭鳴雞酒向新豐醉花從杜曲迷春寒何處宿楊栁玉樓西折楊栁青樓大道傍垂栁復垂楊白馬黃金勒春風何處郎柔支縈素腕香絮裛啼妝看盡年年别曲終空斷腸丙申書事羽檄飛千里天災及兩宫君王聞罪已社稷付談空海汛乘春急山田望嵗空孤舟有婺矛牙婦灑淚五湖東谷里谷里三家市仍為暴雨淹逢人無漢語入饌有池鹽溪釣青鱗小村沽白釀甜亂峰相對晚空翠滿茅簷十月吳江舟中晚望年年改嵗長為客無奈愁心付酒缸寒鴈背風歸越渚孤帆帶雨下吳江黃知霜後柑三寸白起沙邊鷺一雙日落洞庭天似水青山無數入雲窗送孫子長之滸墅度支使者𣙜吳關飽看姑蘇郭外山稅減任教商舶過吏稀長對戟門間灣中銷夏留僧住橋上行春載鶴還西望吳興衣帶水舊時玉筍已成班安平署中述懷五十六韻丘壑元吾好風塵力未勝謾言金馬隱翻作土牛乘賜履三河逺封章六郡承幸無官長罵時有簿書仍地重飛艘集曹間老吏能抱河城似玦臨水署為氷北極通幽薊南流控魯滕穆陵齊地壯淮甸楚天澄畚鍤冬還舉粳稌歲屢騰郵籤妨午夢官舫促晨興面目隨人改文章避世稱寧知貧是病轉覺愛為憎旅食愁新况離羣憶舊朋彈棊時映竹開卷夜挑燈方外忘年友山中結夏僧露華紅擘荔氷水緑翻菱逐電青絲騎排雲白角鷹燕姬春釀壓趙女晚妝凝寶帶鳴條脫銀牀織毾㲪夢回香灺篆歌闋月藏稜玉笛吹橫塞雕弧走射堋鄰多窺宋玉酒或送王𢎞仗劒經吳苑觀濤過廣陵名山皆蠟屐絶壑獨擔簦象闕通瑤極燕山應玉繩雲衢隨地望天路得階升蜩鷽飛將奮駑駘價亦增詞猶慙色絹宴已預紅綾捧日心常繫從雲氣倍蒸詎知鵷鷺侣便隔鹿麋層綬忝郎官貴茵均刺史憑分符行郡國簉羽後農丞未學操刀割彌深捧玉兢雲霄霜翮徑象緯綵毫凌但欲深懷瑾何知逺避矰風雲變蒼狗天地亂青蠅萋菲終安用蹉跎亦自應積薪甘似汲投杼更疑曽舉世羞駢指何人問折肱沙蟲吹未了塞馬失何曽白眼終難變紅顔轉自矜擬拋雞肋去勉就鶴書徵冀北千金駿圖南六月鵬寒流河漭漾秋色岱崚嶒北郭竽長濫東山屐再登無勞沈璧馬祗惜費金繒楗恐薪垂盡沙防岸善崩桃花無怒浪瓠子有荒塍樓迥隨雲度亭虛任月升榜師聲欸乃雉子髮鬅鬙蟻穴容周辨龍門愧李膺全身看奕局守口固緘滕宿鳥知驚彈傷魚已逺罾鴻心元矯矯蟲羽故䎖䎖趨舍寧無定升沉固不恆長歌聊自適休弔􅗄溪藤春怨長信多春草愁中次第生君王行不到漸與玉階平秋怨明月憐團扇西風怯綺羅低垂雲母帳不忍見銀河早行山中驅車入雲煙連山齊雪色怪禽作鬼啼枯樹如人立宿吳山寄長安舊人春時相送出燕都秋到江南一字無半夜寒燈數行淚滿天風雨下西湖錢唐逢康元龍黃梅細雨暗江關我入西吳君欲還馬上相逢須盡醉明朝知隔幾重山聞鐘寄曽人倩十年去國夢滄浪夜夜鐘聲似上陽謾憶長安驅馬伴東華門外月如霜鼓山采茶曲雨前初出半巖香十萬人家未敢嘗一自尚方停進貢年年先納縣官堂重過分水關一水中分兩不回關頭原是望鄉臺不知客淚能多少二十年中五度來雨中度北峽關溪流屈曲路巉巉細雨斜風轉不堪惟有馬頭雲霧裏青山一片似江南廬江道中見風沙四野黃塵欲暮天行人駐馬淚澘然自從歸去江南路不見風沙已一年入齊界楚山淮水苦風煙才到滕陽又一天溝外短牆牆外栁一條官路直如弦渡汶河霜飛月落野雞啼霧鎖長林水拍堤夾岸人家寒未起孤舟已過汶河西田真墓汶河如帶日西斜禾黍荒村四五家惟有田真墳畔樹春風猶發紫荆花淮上重送永奉輕黃桞色緑煙含欲折行人自不堪兩岸梨花寒食雨孤舟今夜泊淮南夢作白鶴屏寒月影稀水精簾卷篆煙微生憎柳絮如蝴蝶撩亂春愁處處飛春日遡汶河作東風殘雪繫蘭橈滿目山川對寂寥記得門前春水滿美人蕉壓赤闌橋舟滯安山百丈方舟一線泉待風待閘兩留連客程莫笑蹉跎甚拙宦何如上水船葛陽道中雜詩二首雨中新水漲平沙芳草連天鳥道斜隔水松門人不閉斷橋流水紫藤花烏桕成林稻滿畦新篘白酒配黃雞老農醉卧無人喚日落子規頭上啼醴陵萍鄉西上萬山低路入湘南近五溪日暮東風吹雨急連天芳草遮鴣啼桃源道中春風籬落酒旗間流水桃花映碧山寄語漁郎莫深去洞中未必勝人間平壩愁雲三月風滿溪一日一程西更西鬼門關外無相識頭白老鴉朝暮啼沈朝煥二首朝煥字伯含仁和人萬厯壬辰進士除工部主事調兵部歷員外郎中謫靖州知州升南京刑部郎中出為四川按察僉事終福建參政有泊如齋集陶周望云伯含詩情務已出格由古造材富故詞博而工神完故氣和而暢王伯穀云伯含詩才不為法所縳思不為調所泥龍君御云伯含使君守靖詩多溫厚爾雅不露牢騷悱惻不平之氣不曹能始云伯含詩體罔不該而才足以達意斤斤師古法而不與古背馳立秋夜不寐雨深催病葉不獨井梧飛侯到蟲先覺燈寒燼漸微感時難穩卧未老漸知非枕上驚秋信明朝換客衣禁馬可笑東司馬官無一馬騎自遵臺長約却任吏人嗤捷足已無路卑棲何處枝不如歸抱犢隨意隴頭宜鄧原嶽一首原嶽字汝髙閩縣人萬厯壬辰進士除戶部主事歷員外郎中出為雲南提學僉事終湖廣按察副使有西樓存稿儀真道中見桃花盛開感而賦之逼側何逼側行盡江南又江北二月桃花爛漫開燦若朝霞㺯春色今年苦雨花較遲江北不如江南時但願春風隨轉轂到處花開迎馬足王樂善三首樂善字存初霸州人萬厯壬辰進士除行人改吏部主事有鷃適軒詩稿扣角集五渠晚渡野潦浮平楚扁舟續馬蹄揚鈴風漸緊落日望全迷林暝漁燈出天空雁陳低叩舷歸意懶情興屬幽棲春宫曲輦路春深細草連妝成空坐百花前昭陽昨夜誰承寵聞道金錢賜董賢秋宫曲一從金殿鎖娉婷春鳥秋蛩祗自聽惆悵無心還乞巧潛來花下拜雙星袁宏道二十四首宏道字無學宗道之弟萬厯壬辰進士除吳縣知縣改京府學官國子博士遷禮部郎調吏部移病卒于家有錦帆解脫瀟碧堂瓶花齋華嵩遊草破研齋廣陵桃源敝篋等集弟小修云錦帆解脫意在破人執縛間有率意遊戲之語或快爽之極浮而不沉情景太真近而不逺要出自性靈足以蕩滌塵坌學者不察效顰學語其究為俚俗為纖巧為莽蕩鳥焉三寫弊有必至非中郎之本旨也中陳卧子云石公才情本自流麗薄李舒章云郎淺俗繆天自云公安之罪于堯陵然啓竟陵者公安也王沈山子云近見有人論詩派之壞動以何李李並舉以愚觀之王可非何李似難輕議袁中郎詩云草昧推何李爾雅良足師則中郎亦不專非何李矣詩話傳有言琴瑟既敝必取而更張之詩文亦然不容不變也隆萬間王李之遺派充塞公安昆弟起而非之以為唐自有古詩不必選體中晚皆有詩不必初盛歐蘇陳黃各有詩不必唐人唐時色澤鮮妍如旦晚脫筆硯者今詩才脫筆硯已是陳言豈非流自性靈與出自剽擬所從來異乎一時聞者渙然神悟若良藥之解散而況疴之去體也乃不善學者取其集中俳諧調笑之語如西湖云一日湖上行一日湖上坐一日湖上住一日湖上卧偶見白髮云無端見白髮欲哭翻成笑自喜笑中意一笑又一跳嚴陵釣臺云人言漢梅福君之妻父也此本滑稽之談類入於狂言不自以為詩者乃錫山華聞修選明詩從而擊賞歎絶是何異棄蘇合之香取蛣蜣之轉耶豫於中郎盡汰其鄙俚之作存其稍用意者對之可以刮目矣橫塘渡橫塘渡郎西來妾東去感郎千金顧妾家住紅橋朱門十字路認取辛夷花莫過楊柳樹折楊柳豔陽二三月楊柳枝參差每逢雙燕子憶得别君時憶得别君時遺君珊瑚枕君行佳麗地何人薦君寢妾薄命落花去故條尚有根可依婦人失夫心含情欲告誰燈光不到明寵極心還變只此雙蛾睂供得幾回盼看多自成故未必真衰老譬彼後開花不若初生草哀殤弱腕繫金鈴青絲綰偏髻胸前兩繡囊猶作長命字欠爾三斗乳償汝一升淚稚魂半尺餘荒荒投旅次我嘗靜坐思生死同一例子既先我行即是鬼先輩如彼排場人尊卑乃相遞一去與一來孰知非天戲潞河舟中和小修别詩次韻小艇煙江雨長堤柿葉霜一洲魚子市千樹木奴鄉客去尋空谷書來話酉陽繁華銷枕上家近吕仙堂集平山堂用平山字為韻偕遊者方子兩謝生也大業空遺事披圖咫尺間斜橋興廢水淡墨有無山野老耕香澤妖狐學黛鬟荒亭猶故井馬上挈泉還揚州曉泊薄霧隨風盡寒霜對酒銷芋魁騰曉市蟹子落歸潮往事瓊花觀新溝揚子橋雖然冨羅綺未必似前朝送洪子崖之歸化縣小邑無官長登臨費履綦方言從事譯山景𨽻人知廨舍巢鸚鵡鄉田貢荔枝嵐光侵簿牘長日但圍綦夏日泛舟泛泛鵁鶄近深深雀鸛聞空潭不受暑野竹半捎雲公子收行蓋佳人曬舞裙垂楊亂荇藻日色冷紛紛登髙有懷秋菊開誰對寒郊望更新乾坤東逝水車馬北來塵屈指悲時事停杯憶逺人汀花與岸草何處不傷神江上白霧迷荒楚青流帶逺空沙平晴獻雪樹老夜屯風曠野眠飢兕孤洲落晚鴻布帆如屋裏何處有城中學齋留梅子馬踏盡髙槐影青蟲落酒巾袖懷三月草衣浣一年塵夢裏聽朝事杯中覔聖人貧厨非大祭未有肉留賔别小修瓜洲雲色蔽天昏腸斷金山寺裏猿狎客也須同海鳥過江切莫食河豚幕中有主當持牘雪裏無錢且典褌畫戟如林髙丈五不知何處是朱門託龍君超覔仙源隱居詩以寄之雲石村中且卜廬憑君為買一峰餘全栽芝菊為疆界盡寫雲嵐入劵書門對仙童澆藥地巷通毛女浣花渠間中準擬天台去好伴劉晨間屋居送鄒金吾遊白下時寓武昌將軍此日驟征輪楓葉蕭蕭漢水濵我已銷魂千里外那堪重别故鄉人西風馬度離亭柳落日衣吹客舍塵莫向勞勞亭上望秋江容易得沾巾辛卯元日滿城佳氣鬱玄霄海日如規上海潮率土再興𢎞治朔百年三倍穆宗朝柳含初緑風前舞梅帶殘香雪裏飄笑我疏愚非董子太平猶頌不鳴條感事湘山晴色逺微微盡日江頭獨醉歸不見兩關傳露布尚聞三殿未垂衣邊愁自古無中下朝論于今有是非日暮平沙秋草亂一雙白鳥避人飛歸來歸來兄弟對門居石浦河邊小結廬可比維摩方丈地不妨揚子一牀書蔬園有處皆添甲花雨無多亦溜渠野服科頭常聚首阮家禮法向來疏擬宮詞玉殿蓮籌夜未央內人傳旨出昭陽朝來剛赴西宮約莫遣經筵進講章江上桃花春水滿江頭獨擁佳人翡翠樓誰抱琵琶江口上聲聲彈出小梁州經下邳諸儒坑盡一身餘始覺秦家網目疏枉把六經灰火砥橋邊猶有未燒書羅隱南齋中小集憶舊珠樓曲曲貯仙娃一帶風窗十里紗記得中和門外路女牆東去是伊家桃花流水引華陽巾子碧縧環紫府簾前舊押班阿母筵頭爭一擲醉中輸却小蓬山宿朱仙鎮祠前簫鼓賽如雲立石爭劖弔古文一等英雄含恨死幾時論定曲將軍江盈科一首盈科字進之常德桃源人萬厯壬辰進士除長洲知縣擢吏部主事歷官四川提學僉事有雪濤閣集袁中郎云進之詩才俊逸爽朗務為新切但有矯枉之過詩話進之與袁中郎同官吳下其詩頗近公安派持論亦以七子為非特變而不成方者中郎謂其矯枉之過所謂笑他人之未工忘已事之已拙文人通病大抵然矣讀張魏公傳有感曲壯愍事子聖焉能蓋父凶曲端冤與嶽飛同何人為立將軍廟也把烏金鑄魏公詩話徐秀才善敬可一日語豫曰周公謹小人哉張魏公朱子所父事何可毁也豫曰公謹三代直道之遺也宋之南渡將帥有人可以戰可以守自寄閫外之權于浚喪師動數十萬元氣重傷譬諸孱夫不能復起矣浚於李綱趙鼎輩則劾之於汪伯彥秦檜等則薦之尚得云好惡之公乎至曲端之誅與檜之殺嶽飛何以異而讀史者務曲筆以文致端有可死之罪不過因浚有子講學浚死徽國公為之作狀天下後世遂信而不疑爾中郎朱仙鎮詩已極悲惋不若進之一詩露膽張目洎詩家之南董也已唐之屏一首之屏字君公松江華亭人萬厯壬辰進士除常山知縣詩話君公之官常山鄉䣊贈以馬力却之曰常山斗大縣官便自裝飾茍至三槐九棘更難踵事增華既而中讒罷歸養親不復出登金山一柱東南表地靈芙蓉萬古插清泠江淮潮色無邊白楚蜀山光不斷青鯨吸風雷波自撼龍過樓殿雨猶腥枕流無限滄洲意極目何妨我獨醒學官上公車遷南京國子監博士歸里陳薦夫二首薦夫名邦藻以字行更字幼孺閩縣人萬厯甲午舉于鄉有水明樓集海口城晚望蒹葭藹藹樹蒼蒼平楚間看益渺茫驛路繞山多落木孤城臨水易斜陽潮回近浦寒生雨鴈度遙天夜帶霜暫息征鞍瀛海上煙波千里斷人腸竹枝詞荷葉田田栁色垂三船五船多女兒與郎暗約花間去不唱竹枝知是誰明詩綜卷六十二
