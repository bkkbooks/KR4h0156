body:
  text: 明詩綜卷六十九翰林院檢討朱彛尊編林世璧二首世璧字天瑞閩縣人有彤雲集靜志居詩話天瑞為龔祭酒用卿女壻嘗從婦翁遊鼓山分韻賦詩時天瑞已醉詩成題壁有眼中滄海小衣上白雲多之句坐客皆歎以為不及徐惟和詩云間尋老衲叩禪堂墨迹淋漓滿上方一自題詩人去後白雲滄海兩茫茫蓋為天瑞作也覽彤雲集終卷才雖敏而調實庸月玉露晴初墜天河迥欲流誰憐今夜月還似去年秋影逐寒雲起光緣暮杵留關山千萬里偏照漢家樓早冬寄懷懶慢陶元亮經年獨掩扉不知秋色改但見菊花稀落葉階前度寒禽樹上歸停雲那可賦徒爾壯心飛汪禮約禮約字長文更字士垓鄞人太學生采藥行贈族子銘孺朝出斸苓暮采薇白日忽落蒼煙飛荷鍤歸來倚深竹落花清露香人衣我家阿咸頗解事提籠逺自江城至肘後三千禁架方囊中數卷軒轅記眼前孺子總紛紛少年提領爭如君何當共爾尋仙去采藥天台卧白雲寄懷朝雲不散暮雲流溪上茆堂水竹幽忽見斜陽滿髙樹亂蟬風葉似深秋東漢一首漢字希節華州人無題嫁來依舅姑不省堂前路自君去桐廬夢熟橫江渡姚和鼎一首和鼎字長公長洲人懷胡孝亷謁選偃蹇慚豫拙飛騰羡爾行春風燕市酒夜雨闔閭城吏隱懷方朔貧居笑馬卿相思有尺素愁殺雁歸聲許賓一首賓字觀父休寧人入新安界十日疲行役雲山接大鄣馬啼知故道人語别殊方遏雨防沙溜臨溪問石梁羅含家已近蘭草遍池塘胡一桂一首一桂字百藥鄞人吳興九里石塘即事路出桑陰盡澄湖野望賖菱歌依岸柳舟影入蘆花煙起迷村白雲移見日斜異鄉風景在羈客倍思家汪廷訥一首廷訥字無如休寧人有環翠堂集詩話無如耽情詩賦兼愛填詞結環翠亭酒宴琴歌與湯義仍王伯榖諸人遊興酣聨句嘗集唐人詩云狎烏無機任往來一川晴色鏡中開竹間駐馬題詩去松下殘棊送客回緑樹碧簷相掩映落花飛蝶共徘徊物情多與間相稱莫惜芳時醉酒杯製百家衣可云無縫者已夏日池上水靜追涼便林繁得暑遲采蓮木蘭棹佐酒竹枝詞藻緑魚遊處蘋香鳥下時不須逺歸去新月已如眉邵正魁三首正魁字長孺休寧人國子監生有梁園燕臺二集白雲湖泛舟堤畔連青草湖中多白雲扁舟一以泛之子得同羣卷幔雨初歇看山日欲曛芙蓉未堪把心已愛清芬過仲開江上居以我不如意憐君江上村有田能種黍好客足開尊山色青當户潮痕白到門涼生五柳樹晤語謝塵喧觀太學石鼓十鼓千秋石橋門列儼然功應昭羽獵世得紀成宣想像于岐日寧論入洛年法書存斷畫大雅在殘篇色起雲霞絢光爭日月懸依櫺星自聚照水璧猶聨呵護諸生重臨摹博士專長同夔樂典豈羡漢經傳後作知難及他山可罷鐫子雲徒曉事白首獻甘泉朱應龍一首應龍字舜夔一字近臣鄞人有東籬樂府詩話東籬與沈明臣葉太叔盧澐齊名號明州四傑乘月飲海上大醉溺死其短歌行云皎皎月明駕言宵征唯君之故不遑自寧説者以為近於讖也懊儂歌白舫張青帆載儂歡子去風生柳樹間飄揚落何處盛以約一首以約字孟將一字彥修國子監生喜雨好雨終朝遍蓬門野興繁憫農勞苦日植杖桔橰園急棹衝萍葉深池浸竹根怪來雙屐健散步上南原張三極一首三極臨清人雨後過王明府公署豈謂金門客能兼大隱名庭空歌鳥下吏散酒人迎緑水新添砌青山半入城還將江上楫聊為采真行汪元英四首元英字大吕休寧人有栩栩軒稿感述鷦鷯巢一枝鼴鼠飲滿腹林深河且廣曷不逞所欲柱下有遺言所貴知止足疏氏二大夫解組辭榮祿今此富貴人其欲何逐逐焉知欹器水一滿定傾覆商山秋日對雨懷永叔仲升秋雨何曽歇秋深倍寂寥折荷偏淅淅落木更蕭蕭雲黑多迷徑溪寒半斷橋商山苦幽阻綺甪竟難招有客有客沉冥久何心自解嘲病遭毛頴役貧絶孔方交歲月甘含蓼丘園任繫匏不如將子燕華屋託新巢秋日歸自溪上清溪一曲石橋橫十里籃輿溪上行水邊沙明看不足西風兩岸盡秋聲汪元范九首元范字明生休寧人有借研齋草得吳胙虞書宿昔與君别乃在江之陽玄陰蔽光景草木日萎黃牀下蟋蟀鳴野外鴻鴈翔居肆休百工我獨違故鄉跋涉千里塗空念川無梁有鳥東南飛毛羽何輝光口銜尺素書戢翼向我旁感君懷好音今我心難忘開緘再三歎意快神自揚離居無幾時所惜道悠長此身非雙鳬安能日頡頏張恭父畫柳行近代何人能畫柳東吳張生稱國手沈周陸治不復作藝苑聲名生獨有是時燕京風日妍生也拈筆當窗前墨花片片落縑素千樹萬樹含春煙柔條窣地揚輕縷密葉隱天帶疏雨耳畔疑聞黃鳥聲宛然坐我江潭滸對君此畫融心神頓令價比連城珍不須更寫河橋色落日蒼茫愁殺人泊丹陽晚次丹陽道舟停赤岸林雲容垂嶺薄秋氣入江深落葉隨寒雨棲烏噪暮陰風帆無定泊行子若為心自慎陽抵申州塗中作冉冉悲徂景棲棲怯問津雲蒸秋變熟野晦晝飛塵壤俗遙同楚川塗漸入申迷方知計拙幽意竟誰陳感事呈劉恩徵宫殿災尋弭珍竒斂益頻采珠疲百粵織罽困三秦貢入天威霽繇興國命貧聖心元淡泊蠱媚自宵人同楊邠州仲啓登太王城墉堞基猶在臺隍客自過斷雲低阻嶺峻峽束涇河氷納陵陰少民居土穴多遺風勤稼穡千載感豳歌宿南峰向晚躋雲嶽峰巔特室荒袖堪揮北斗夢得謁西皇石馬嘶中夜山燈見上方鈞天聽未畢海日出扶桑寄邢子願三十韻自作西京客深嗟阻舊遊涼風生逺道景色入清秋董澤蒲先脆樊川菊正稠潦收鶬警露霜落鴈環洲積氣坰邊合寒煙木末流夷猶頻出郭蕭瑟一登樓轉切懷人思寧銷去國憂眼穿臨渭汭神越繞齊州憶過坊城畔尋君泲水頭授餐存繾綣下榻愧淹留蓬徑要真隱瓜畦學故侯避喧欹皂帽抗世擁羊裘側目羣公忌修容衆女讎扶搖矜鷃雀馳騁棄驊騮貝錦徒虛織華簪信久抽雄心輸寸翰矯志傲崇丘苑囿晴偏媚文章老更優􅀈成荆國寶興狎㟙湖鷗漫擬歸同趣翻憐抱别愁栖栖應去魯碌碌似依劉旅服凋黂緼行􅋔斷蒯緱關門繻用棄幸舍轄隨投促席傾宵雨聨牀聽曉籌素交欣再接新好競相求阮氏才皆俊岑家燕屢修未辭渼陂敻直愛竹林幽卒嵗慚多纍餘生實寡謀襟期良有待會面渺無由契託他山石情懸剡曲舟尺書題字滅欲致定沉浮詢李惟寅太保已就通侯第新辭上將壇不知門下士若箇是任安程可中三首可中字仲權休寧人有汊上集董次元云仲權詩肖題已爾不挨别門蹊徑寫情已爾不共古人生活上陳伯璣云仲權詩駸駸出百穀景升之送章元禮吏部左遷羅定謫籍名猶借君恩轉覺饒朱陵南紀盡丹闕北辰遙安置憑荒裔明良願聖朝桄榔林樹外僕馬影蕭蕭上谷鈴閣西頭馬埒平紫騮牽過赤繁纓翻身誰中金錢的嘶入垂楊一片聲除夕太原府鴈門南渡路千盤殘厯猶從馬上看白髮醉搔燈影下錦筝搊殺不成歡葉太叔三首太叔字鄭朗晚更名亭立改字介子鄞人有思煙集藏山稿沈嘉則云鄭朗詩醖釀初盛唐諸家而歸宿杜陵李杲堂云鄭朗氣格髙淡轉造自然詩話葉君嘉則弟子别裁詩派行路難行路莫登髙山中多猛虎行路莫乘舟水邊多伏弩我是行路人惟知行路苦小築性本耽篇籍尤憐誦絶交先生號東郭小築近西郊花霧侵衣袂茶煙亞竹梢坐行都自適好鳥語咬咬曉晴一月未曽乾一日雨聲昨夜喜初回髙霞結海晨光滿錦樹依山秋色開鳩厭舊巢將婦去鷗憐新水引雛來清羸衰疾何時起獨抱漁竿坐石苔吳紹竒四首紹竒字淑甫桐城人有撫松集螢忽向籬邊繞還從井畔飛雨昏光不滅露重影猶微伴讀來書舍窺眠入翠幃黃花秋老後未識汝何歸浦口水市千門列江村萬井通馬嘶流水外人語夕陽中雪浪髙吹樹蒲帆軟趁風故鄉天際逺雙目送飛鴻編籬負郭幽居僻編籬接短牆種瓜看蔓引栽菊待花黃犬吠驚殘月雞栖趁夕陽貧家隨分事世外得清狂同友人飲秦淮酒樓秦淮水漲鱭魚肥滿店楊花作絮飛日暮西闌無箇事渡頭間數畫船歸嵇元夫二首元夫字長卿歸安人有白鶴園集詩話長卿父編修世臣嘉靖辛丑分校禮闈髙文襄出其門長卿少年簡傲獲罪嘉興某推官坐死文襄營救獲免招入都執其手語朝士曰此天下才也及文襄去位乘牛車出國門次日始有馳傳後命長卿之詩蓋紀其實也一時傳誦謂陽關三疊河滿一聲無此淒楚比還里團甚嵗暮大雪李給事樂語家人曰此時嵇公子必大困因載酒熾炭棹舟從之見嵇方坐涯次酌水相與劇飲而别苕中傳為佳話云立秋日盧溝送新鄭少師相公單車去國路悠悠緑樹鳴蟬又早秋燕市傷心供帳薄鳯城回首暮雲浮徒聞後騎宣乘傳不見羣公疏請留三載布衣門下客送君垂淚過盧溝刈稻夜歸西莊刈稻夜半歸明月皎皎當柴扉櫓聲隔岸人語近斗柄插江霜氣微木葉蕭蕭覆林屋蘆花茫茫藏釣磯兒童村南酒家去野夫獨立風吹衣吳璜一首璜字汝震鄞人曉發金壇出黃堰有懷箕仲田叔山縣侵晨發舟行何處村宛然新水竹疑是舊柴門急雨來江口飛泉出樹根無由尋二仲幽思共誰論黃好信一首好信字仲孚揚州興化人有默齋詩集春鴈萬里湖南鴈春來又北飛亦知鄉土異不戀稻梁肥絶塞心先到長河影漸稀玉門關外客應待問征衣公鼒二首鼒字缺蒙陰人侍郎鼐弟有小東園詩集都城元宵曲二首躞蹀驊騮氣正驕垂鞭嘶過玉河橋不知明月誰家怨腸斷樓中弄玉簫內園湯火漫相勻種得紅梅放早春莫向樽前吹玉笛朝來愁殺賞花人李桂一首桂字缺番禹布衣江上鯉魚風起荻花秋露壓蒹葭水不流何處津亭夜吹笛白雲明月總關愁盛鳴世六首鳴世字太古鳯陽人國子監生有谷中集詩話太古五言圓潤貼妥其源出於郎士元沈水部官署江水流何急歸心却似之已傷為客久轉恨别君時斷鴈迷寒渚吟猿挂冷枝生涯兼物色何處不堪悲贈隱者只在髙霞外無人識去蹤伴猿栖一室放鶴下孤峰丹竈雲中火青天夜半鐘平生長往意相望不相從送柯孝廉之巴東兼呈黃廣文去問巴江水荆門更向西挂帆秋葉落上峽夜猿啼舊侣傷飄泊新歡惜解攜湘潭憔悴地已恐旅魂迷七月八日潞河舟中别長安諸子天漢龍初返星橋鵲乍分隔河收片雨宿浦有殘雲復作孤舟别兼悲一葉聞相看此時恨不獨在離羣宿麻河積雨湖田沒居人生事微白魚休市早烏鬼載船歸月黑村舂盡林深岸火稀緯蕭眠不定中夜賦無衣題嶽陽酒家巴陵壓酒洞庭春楚女當壚勸客頻莫上髙樓望湖水煙波二月已愁人傅梅二首梅字元鼎邢臺人有簡翁詩集園居晝勞夕得適幽軒成小憩峰色落空青池光起浮翠須臾暝色深繁星看欲墜新月下疏篁微風動簷際樂此坐忘言悠悠更忘寐沔池有懷會盟壇下沔池流草色連天蔽故丘隴月只看懸太白秦雲不解到幽州汪應宿一首應宿字南仲歙縣人送王祠部僉憲貴陽地入三苖盡山過蜀道難飛泉晴亦雨毒霧晝猶寒方竹迷秦徑氊裘拜漢官西南民力竭君好慰凋殘應臬一首臬字仲鵠鄞人縣學生有楚遊烏溪詩草烏溪寄我江湖流浪身烏溪山水故清真春田雨足騎秧馬秋隴禽多縛草人睡起竹窗書一卷坐來莎石酒三巡願如在巷顔夫子到處簞瓢不厭貧李宗城一首宗城字汝藩盱眙人送臧晉叔國博還吳興宦自潘安拙才應宋玉偏還家千嶂雨挂席五湖煙以我多愁日逢君失意年江干一尊酒寧不倍淒然陳鳴陽一首鳴陽字缺南海人參政萬言子閨情露冷凌波步不前流螢相撲自年年妾身未似齊紈扇不待秋來已棄捐林國光一首國光字廷錫閩人金陵尋舍弟聞先三日往蕪湖悵然賦此春江雨漲緑平堤岸柳青青拂水齊日暮相思不相見鶺鴒飛過野塘西王之鼎一首之鼎字象玄江陰儒學生贈友人卜居髙士移家處來尋路不迷雞鳴深巷裏門掩斷橋西招隱仍栽桂看山獨杖藜平生厭塵事今日遂幽棲何璧一首璧字玉長福清人詩話玉長任俠見知於黃陂張濤張後開府遼東將疏薦以布衣拜大將會罷鎮乃止濤卒入楚哭之遂以病死亦矜竒之士也寄友詩云士到出山誰不賤術惟遊世最難工足當阮生之泣矣西湖尋曹能始垂楊漠漠荇田田何處春風十四絃放鶴僧歸三竺雨聽鶯人過六橋煙詩尋蘿薜誰邊寺酒載桃花第幾船遊子天涯魂易斷非關春樹有啼鵑汪樞二首樞字伯機鄞人有存俟篇詩話伯機世祿之家不樂仕進治别業曰泡園賦園居詩六十首閩人徐興公極稱之懊憹曲千金買妾身一旦逺行邁大艑如屋寬底事不相載早秋刈穫述懷杲杲朝日升垂垂水田熟喌喌呼白雞決決飲黃犢稍稍溽暑收瀼瀼露華沃庭户絶追呼春秋足魚菽卒嵗計所餘修我牆與屋男悅女欣欣杯炙勞僮僕躬耕一丘田飽食詎非福戴景明一首景明字晉仲休寧人有團雲詩集深秋山居莓蘚深層岫松杉漾北淙清宵唯鶴唳盡日少人逢倚檻三秋老攤書萬事慵夜分魚烏靜明月半東峰沈瑞徵三首瑞徵字靈繹海寧學生有慧居遺集尢展成云先生詩清麗有則中多激楚之音詩話先生五言如落木悲秋氣浮雲起夕陰雁聲春半少寒色雨中多野犬迎人吠流鶯隔樹聞雪鷗輕片片煙樹逺冥冥竹翠侵衣濕峰陰入户涼髙者近大歷十子下亦不失為四皇甫也惜年未四十而沒遺詩一卷孫翰林編修珩刋行之杪秋同諸君遊石井山絶巘攀躋外蒼茫秋色殘雲山千里出煙樹萬家攢石轉奔濤壯天空落日寒扶桑一矯首海氣正漫漫錢清夜行秋漲乘流好孤村夜泊稀漁榔過橋逺螢火傍舟微堤沒聞爭渡涼生欲授衣夢歸懷土切山水願多違侯維垣一首維垣字師之儀真人國子監生九日送友入九華秋空削出青蓮花時吐白雲含紫霞九月九日九華去此中可以鍊丹砂江禹奠六首禹奠字其永休寧人僑居吳縣國子監生有玄芝館詩集王伯榖云山林臺閣各有體裁其永作山林詩却無寒儉語張伯起云其永詩有軒爽之致詩話其永與王伯榖共肄業於留都而詩名未振然其五言清切如秋雨半沉閣夕陽已在山落葉半庭月啼烏滿屋霜寺出寒煙外山沉細雨中雨洗松根石雲開屋後山山影隨帆轉溪聲挾雨飛久有青山志因歌白露詩頗類鵝池生夜坐七松齋中懷睦州嚴徵君茅齋結翠屛獨坐酒初醒殘月半窗白孤燈四壁青篋中換鵝帖几上種魚經遙望投竿處寒雲隱客星嚴陵城下背郭千村合中流一剎孤輕陰閣秋雨殘照落平蕪入市魚蝦少歸舟雁鶩呼客囊任羞澀解珮問當壚被放偶占放歸吾懶甚二月寄僧居無日不飲酒有時還著書泉飛茶臼冷雲動竹窗虛徑僻少塵迹青苔久未除東倉信宿翠微上翛然絶世氛喬林含曉日清磬落層雲海色當窗見泉聲入夜聞半生塵土夢俱向此中分九日登山東籬菊蕊半含黃酒伴何須定故鄉寄語柴桑陶處士百年風物幾重陽村居即事寄天都李使君日照雲林宿雨休一灣溪水入江流野人家住清溪上坐對寒山兩岸秋周良寅一首良寅字缺閩人夜泊始興江口繫纜荒山下挑燈細雨前客心共流水搖蕩不成眠蔣世模一首世模字叔範江陰人江行晴沙漾漾見飛鳬隔浦帆檣乍有無身在江南望江北接天秋水浸菰蒲段黼一首黼字黃甫曹州人有抱璞集西郊十里平原地青山繞碧林寒開煙雨色天逺鴈鴻心落葉還蕭索浮雲自古今不妨乘暇日載酒數登臨劉權一首權字叔度休寧人有劉叔度詩集讀宋史六龍奔走竟何依粵海舟航事已非􅍆取灑陵無麥飯不教行酒著青衣身沉魚腹靈均死血染鵑聲望帝歸愁向崖山瞻王氣寒濤終古蕩斜暉姚旅一首旅初名鼎梅字園客莆田人詩話園客放浪湖海綴拾舊聞露書一編頗存軼事其評隲一時詩家逺比敖器之近續王元美山家水盡重重客路山開處處人家粉壁斜銜落照朱簾半卷桃花魏之璜一首之璜字考叔上元人訊程孺文不得巢湖信時詢渡口居繞籬河路曲背郭草堂虛林靜風驚犬溪喧晚聚漁主人遊未倦間殺半牀書汪功胄二首功胄字介夫休寧人有介夫存稿詩話介夫大吕之子善詩而天存稿二卷大半學李長吉春日間居韶景當春半間居覽物華緑分當户竹紅過隔牆花樵牧依林近溪山帶郭斜間身甘自放吟卧寄煙霞樵舍煙火隱茅茨數家傍山麓林深不見人丁丁聞伐木金鎰一首鎰字用衡鄞人有桂莊稿贈同谷山人太白之陽有同谷同谷之中白雲宿美人結廬谷口居朝朝暮暮雲相逐我來問君君不言雲裏長鑱種黃獨王授一首授字豫豫江陰人送常熟李瑞卿柳暗花明春雨天鵓鳩聲裏一歸船相逢已是十年别為問人生幾十年黃習逺一首習逺字伯傳吳縣人有蕭蕭齋稿寄朱宸卿與君同里閈只隔數家居無日不相見有時還寄書開尊呼共飲得句問何如自作長干客别來三月餘髙文祺一首文祺字壽承廣信人自君之出矣自君之出矣不種相思樹思君如春草多在無人處吳邦達一首邦達字非聞休寧縣學生江樓送别把袂層樓上虛窗四望平柳煙村外市花雨驛邊城東去潮千里南歸客幾程當歸愁欲别津樹重含情潘鏞一首鏞字聲逺江陰人寄懷孤燈一點照書龕離思沉沉睡正酣無那角聲吹落月夢魂飛不到江南張儲一首儲字明用新建諸生聞鴈孤鴈來何處殘聲靜夜飄江空音淰淰雲重影蕭蕭慣向風前急偏從聽處遙秦川織錦婦掩淚憶征遼周應辰一首應辰字斗文鄞縣學生有緑莊詩采詩話緑莊遊鄒南臯之門南臯問曰使周生為仲尼弟子將誰學對曰某小人願學樊須聞者以為善於説辭閩人林古度序其詩稱其色古而骨堅古詩行行重行行夕陽在崦嵫暮鳥有倦翼寒木無榮枝少壯不逢年垂老誰見知朱純元一首純元字二芑溧陽人東溪港十二街頭迹已賖草堂低占白鷗沙武陵此去無多路瀼水西來第幾家野岸緑蕪飛燕子汀洲紅雨落桃花滄浪不洗塵埃耳只許漁郎泊釣槎吳宗儒二首宗儒字次魯休寧人有巢雲集遊黃山九月秋氣髙抗策恣遊眺天都陟崔嵬洞門入窈窕緩行憩松根徙倚臨霞嶠探竒壑轉深攬勝景逾妙山蹊縈以紓石壁陡而峭瀑布挂晴川懸崖回夕照地與仙境俱凌厲討佳要孫阮豫非倫於焉學長嘯春夜錢塘江行小艇發江干入夜東風起帶雨挂輕帆西行三百里劉時中一首時中字伯庸休寧縣學生有客有客問煙蘿山家在何處笑指碧溪頭遙遙踏花去虞伯龍一首伯龍字公普鄞人有擔簦集舟中寥落明州客孤懷寄短篷江豚偏狎浪舟子但呼風歸夢隨流水鄉書問去鴻不知今夜月千里可相同沈木一首木字子喬嘉興人萬厯間縣學生有近竹稿詩話子喬自號靜得逸人夜起一詩具臻佳境夜起暑夜不成寐起步中庭中殘月忽墮水明河猶在空籬根滴清露樹杪生微風坐愛新涼好先秋有候蟲傅邦柱一首邦柱字石卿金華人雜詠鸚鵡多巧慧交交調好音翻飛嘉樹杪毛羽殊衆禽一旦遭罿罻萬里辭故岑彩絲紲紺趾雕籠照翠襟徘徊當簾幕聰慧增苦心鸒斯微以陋提提蓬蒿陰鄧秉貞一首秉貞字豫坦宜興人有禹笑齋詩安隱集嚴子陵釣壇經過百世見清風爭羡羊裘一老翁不有雲臺諸將力釣壇亦在戰爭中徐電發云自有雲臺爭比釣臺髙之句作此題者陳陳相因得子坦一詩稍開生面孫元孚一首元孚字缺休寧人有滄洲草草市夜泊違家才一舍露宿尚河洲暝霧連汀白寒雲壓水流灘聲鳴野碓燈影隔鄰舟入夜霜風急凄清動客愁吳鶴一首鶴字缺烏程人望潤卿弟仲月辭家日臨岐接汝書相傳及春暮應得返衡廬衣逐客程換花隨驛路疏來帆遙數盡不見愴何如王壑一首壑字巽父金壇人有旅言南安道中疊疊青山曲曲溪湍流活活雨淒淒孤舟日暮南來客恨殺鷓鴣相向啼戎玠二首玠字孟常鄞縣學生有蜀遊草晚霽與客登浩然樓眺錢塘江晴色開村樹危樓俯大江潮聲翻絶岸帆影落虛窗水與遙天合人同夕鳥雙茫茫百端集形影若為降泊巴東昔行指川北今始詣巴東山縣無重郭江天有斷虹亂峰雲欲暝官渡火初紅剪燭供清話蕭蕭暮雨中趙雲蒸一首雲蒸字龍伯太倉人國子監生有世藝齋稿北上飛沙如雪晝茫茫始覺長安道路長遙憶小樓臨水曲八窗風日正虛涼顧孟林一首孟林字山甫吳縣人寄陸纂父日日看山色知君在此中秖因一水隔難以尺書通白乳思林屋青霞記石公儻然乘興去相見對秋風丁雲鵬一首雲鵬字南羽休寧人有丁南羽集詩話南羽工畫其寫神王羅漢骨氣竒偉不減大小尉遲詩特具體而已舟次尤溪客程迷水國山靄護城闉嵗涉三冬暮花先十月春魚鹽通海販橘柚落園珍故舊頻勞慰荒塗未厭貧方于魯二首于魯初名大滶後以字行改字建元歙布衣有佳日樓詩集梅季豹云建元詩有唐風盡屠緯真云建元尊函叟而詩不稟函叟詩話古人製墨率用松煙漢取諸扶風晉取諸廬山唐則易州上黨自李超徙歙張谷徙黟皆世其業其後耿仁遂髙慶和戴彥衡吳滋胡智率多歙人明則羅文龍少華邵克已格之程大約君房輩咸以製墨稱而于魯所製最夥上自符璽圭璧下至雜珮凡三百八十五式刋成圖譜曽上呈乙覽所造雲箋匪止成都十樣嘗以百花香露和墨自作長歌世但目為墨工然汪伯玉曽招之入豐干社送張山人歸越雉子斑斑麥正齊黃梅四月雨淒淒新安江上攜尊酒送爾看山到浙西璞石席上作十年不慣出家門千里來逢故舊存正值江干春未晚蔞蒿荻笋煮河豚向杰二首杰號培竹慈溪人題畫雨過回塘水亂流汕魚人去棹孤舟荻花楓葉寒江外獨鶴一聲霜滿樓寄羽士幾欲尋真未得間白雲堆裏望玄關煩君多養雪色鹿借我來時騎看山明詩綜卷六十九
