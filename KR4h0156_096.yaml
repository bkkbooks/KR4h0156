body:
  text: 明詩綜卷九十六翰林院檢討朱彛尊編潯州士女相思曲二首妹相思不作風流待幾時只見風吹花落地不見風吹花上枝王貽上云雖侏􅍣之音與樂府子夜讀曲相近妹相思蜘蛛結網恨無絲花不年年長在樹娘不年年伴女兒靜志居詩話此曲載吳洪粵風續九是潯州士女所歌廣東歌堂詞道别三首采蓮去時江水深采蓮歸時江樹隂中間日出西邊雨記得有情人在心嵗晚天寒郎不回厨中煙冷雪成堆竹篙燒火成長炭炭到天明半作灰老龍山下有狂風老龍山上月朦朧檳榔勸郎郎不醉姑負奴脣一點紅翰林館課原心亭詩鬱鬱松樹枝肅肅冬日隂孤亭𢎞且敞乃在鳳池潯鳳池超人寰萬籟無一音暫息塵中轍因鮮俗慮侵端坐邈宇宙掩帙忘古今頓令羣動袪見此方寸心金門足大隱豈必謝纓簪白頭間話感述詩話是篇不知誰氏所作或有感於焦黃中張懋修輩乎御史大夫湯御史大夫周兩人皆酷吏寸心操戈矛蔽賢者無後其語蓋有由如何安世禹顯爵封通侯有子騂且角乃産自犂牛思之復思之天道亦有私單縣老父漢河懷古漢河在單縣源出汴水下流通沛以漢髙還沛曽陟此故名王氣豐沛間濬源自單父風雲昔飛揚萬乘歷兹土冨貴歸故鄉意本重瞳羽誰知錦衣行在漢不在楚粉墨春秋非仲藏宋溫日觀蒲萄錢塘江潮三日斷翠華遙遙六宫散茫茫黑霧覆崖山二龍無聲泣天畔衣冠南渡靖康年忍見旄頭明夜半冬青雪冷子規啼尚有遺民溫日觀閥閲姓名知是誰有身但向浮屠竄酒酣獨抱支離叟罵賊猶存目光爛依稀八法素師傳蒲萄餘技留篇翰馬乳曽無塞上塵蝦鬚尚似江南岸涼雲不共荔支殘景風難並櫻桃薦莫道驪珠顆顆圓萇𢎞碧血光零亂三百餘年歎息同何人對此非河漢借問苦心愛者誰我友張君獨悲歎神物一去何繇還觸目皆非氣凋換吁嗟張君且勿歎墨花會見虹霓燦涼州美酒共天家大叫忠魂歌復旦瀟湘集洞庭秋月纖雲不動金波浮冷光萬里開清秋青山一髮渺無際天影落鏡星河流中流無人萬籟寂夜深往往魚龍出何人長笛在扁舟水逺天長露華白渭臺漁父喜艾純卿至何日離青海春過北斗城亟須談間闊深足慰交情雨雪辭關塞風塵送客程投荒君最苦早有二毛生潼川碑題石鏡寺州志成化三年蜀僧繼圓於草莽中得碑刻此詩昔日朱輪守經過釋子家柱間留墨迹泉下隔年華雲去空雕檻風來卷白沙江山誰似畫每到動吁嗟天目遊人宿重雲菴煙蘿一徑通宴坐白雲中樹影晴浮水秋聲半在空疏鐘山際月髙枕竹邊風竟夕渾無寐清談對逺公藕花社僧嘉興白蓮寺僧有藕花社詩集不知其名山居滄海歸來日貪看麋鹿羣忩虛含逺嶂屋破補重雲夕鳥吟邊過春蔬雨後分不須憐閴寂清梵隔山聞玉華山樵不知何許人洪武初寓東陽之東山披麻戴笠散步間吟于山水間終不肯言姓氏或云陳友諒客友諒亡遁迹至此遺詩百篇孫石臺揚序之名玉華遺稿和韻答玉山呂誠中窮塗往往白頭新誰謂綈袍念故人此日不須辭舊雨空山聊自度殘春艱難作客仍多病生死無家任此身二十年來相憶處幾回月夕與風晨野亭老父桐城劉燾成化間與友人同赴省應選貢塗中風雨驟至因解裝暫憩野亭共賦送春詩忽一老父衣蓑荷笠至聞吟詩亦請筆硯頃刻詩成云云怨風怨雨總皆非風雨不來春亦歸蜀魄啼殘花影瘦吳蠶喫盡柘隂稀枝頭緑軟梅初熟口角黃乾燕學飛我亦欲歸歸未得擔頭猶挂舊蓑衣萊山樵者濬縣眺望河流逺徙大伾存極目中原野色昏禾黍油油迷故國羝羊逐逐過前村黃花冷笑三秋客紅葉初飛十畝園賴有淹留同調在芒芒禹迹試重論明詩鼓吹題金陵沙士清樂清軒竹裏行厨竹外門宛然風景似山村石闌栁暗藏新雨詩壁苔荒沒舊痕林下鳥鳴花自落溪頭鹿過水偏渾晚來半掩東軒下一枕梨雲鎖夢魂戴斗夜談書玉田行館老去年華暗自驚殊方節序倍關情蕭條旅館孤燈宿迢遞歸塗白髮生海甸星河分嵗色山樓鼓角動春聲栁盤柏徑誰相識悵望鄉原北斗橫丹川李時逺云丹川不知何許人曽官給舍轉御史集不書撰人無前後序棧道早行效白香山體連雲石磴曉蒼蒼天險分明百二強萬里西南通鳥道雙旌上下轉羊腸一溝流水一溝竹幾樹垂楊幾樹桑登覽不知行役倦半生詩債却粗償雲谷樵夫書大道寺壁西華雲臺去路長投間翻為看山忙十年有夢尋中嶽四月披雲過太行清世誰能便吏隱幽栖吾獨愛僧房昨來不寐焚香坐讀盡楞嚴夜未央黃州志赤壁寫懷武昌東下次江皋赤壁磯頭艤畫橈廢壘煙消荒舍合橫江鶴去碧天遙岸邊漁父疑殘炬水砥龍吟憶洞簫往事千年增感慨荻花楓葉晚蕭蕭昌平州志仙人洞石洞窅且深花落無人掃仙翁去不還何處尋瑤草虎谷虎谷名金山客行初未識日午山下過人面一作衣黃金色銀山銀山本在北萬丈青雲梯曉見居庸雪銀山忽在西龍泉瀰瀰山下泉瀠洄白如玉清以濯吾纓濁以濯吾足安濟橋石梁跨飛虹水清魚可數莫謂非通津亦有江南估長安可遊記題西山清涼寺壁山僧汲空潭驚起二龍子百里雲冥濛三日雨不止青鞋踏雪志題西山水盡頭雙流決決鳴石根失其一棄粳於此中應從玉泉出南靖老人題壁青青千里草隱隱獨家村日暮客投宿山深虎守門吳下人詩僕夫不識路踟蹰道傍久寒風吹衣襟落日看馬首屠生一首蕭山諸生屠姓失其名居近西子祠題詩於壁是年學使者夢一婦人謂曰吾西施也生未入五湖而蕭山屠生輒妄言其為吾斥之既按部詢生生大驚誦其詩歎曰詩固佳然已失實乃令生詣祠謝已為文以祀之題西子祠壁紅粉溪邊石年年漾落花五湖煙水濶何處浣春紗南潯祗園寺詩贈老僧清溪通笠澤地以水為鄉竹青三日雨僧白一頭霜張叟叟嘉興人不知名秋思江上芙蓉開江上芙蓉謝開謝總秋風江流無日夜盱眙女郎題壁短袖籠春去低鬟明月中逢人惟有淚不敢説遼東正德中朝士上長沙相公才名直一作少與斗山齊伴食一作三考中書日又一作已西回首湘江春草緑鷓鴣啼罷子規啼石淙集附録題邠州郵亭壁太宰西征秉將權三秦豪傑滿軍前中筵笑指金貂客盡是當年舊執鞭永壽監軍莊郵亭題壁金符玉節催征騎赤日炎天渡大江塞上清風連瀚海六騾驚見舊旌􅓚荆先生不知何許人客濟寧人有持白團扇撲蠅為血所漬因繪為紅葉題詩云云人遂目之為荆紅葉題紅葉新霜楓葉醉殷紅記得題詩出後宫繞遍御溝尋不見被風吹入月輪中黃州志武磯山寂寞武磯山上樹蕭條邏阜水中天垂楊不管人間事猶自青青兩岸邊廣西舊志題義寧華嚴寺跨鶴歸來不計年洞中流水緑依然紫簫吹徹無人見萬里西風月滿天殊勝寺道人嘉靖初平望鎮殊勝寺有一道人來遊題其壁云云後倭人至鎮寺首焚毁題壁我自蓬萊跨鶴回山僧不遇意徘徊時人莫解菩提寺三十年餘化作灰福教寺僧嘉靖初魏國公侵武進縣福教寺田僧乃棄去後過寺題詩云云殘山剩水一荒基古寺煙籠白塔低燕子不知身是客秋風還戀舊巢泥黃圖雜志直沽棹歌三首天妃廟對直沽開津鼓連船栁下催釃酒未終舟子報舵樓黃葉早飛來雲帆十幅下津門日落潮平不見痕葦淀茫茫何路泊一燈明處有漁村蘼蕪楊栁緑依依檣燕檣烏立又飛賺得南人歸思緩白魚紫蟹四時肥漷縣志白河漁舟溶溶漾漾白河流點點輕鷗上水浮遙望孤燈明滅處葦花斷岸一漁舟浦城志南浦南浦春流漲緑波溶溶漾漾浴鷗多銷魂尚計江淹賦碧草青苔送别何資江石刻書石溪亭桃花依舊放山青曲几焚香對畫屏記得當年春雨後燕泥時汚石溪亭洞庭老人卓彥恭月夜泊洞庭有老人蕩小舟過之歌詩云云見小草齋詩話歌八十滄浪一老翁蘆花江上水連空世間多少乘除事良夜月明收釣筒玉堂逐客題西禪寺詩隔江人唱浪淘沙月上梧桐影未斜客到潯陽談往事青衫無淚濕琵琶耳園公君山山色湖光日漸曛誰將玉珮弔湘君天風一夜連湖起吹落蒼梧萬里雲花鏡雋聲踏燈詞髻挽烏蠻試晚妝衫裁白㲲學霓裳私邀女伴門前立不避燈光避月光盤江逋客題分水關一道泉分兩道泉層層松栝翠參天鷓鴣聲裏山無數合向誰家草閣眠碧岡道人堯渡秋水初平露石磯堯城渡口栁依依無端隔岸漁歌起白鳥一雙撲鹿飛不出戶庭録題陳山壁啓窗日日對青山山色青青不改顔我問青山何日老青山問我幾時間陳墅里人江隂陳墅里有郭姓者失其名題詩於壁春日偶題細細冥𡨕濕燕泥楝花香暖鵓鳩啼籬邊笋迸無多日恰與茅簷一丈齊電白老兵一首題城樓畫角吹來嵗月深譙樓無古亦無今不如歸我龍山去萬竹青青何處尋靈谷寺壁上詩九日風雨蕭蕭戶未開忽聞鄰叟負薪回自言今嵗登髙便曽上鍾山絶頂來鍾山野老一首風香閣風香髙閣倚層崖一老扶笻下蘚階獵火夜來驚鹿過松根拾得舊銀牌髙百戶百戶嘉興人遺其名閩歸簡吳巨手半牀書卷剩山河如此歸來可奈何便欲與君同一醉梅花不比舊時多湘中女子繫左臂詩生來誰惜未簪笄身沒狂瀾命不齊河伯有靈憐薄命東流直繞洞庭西王仰止云湘中女子名氏不傳第知為湘江人其沉江也逆流至湖南水濵顔色如生左臂纒素帕十絶句閩人林古度跋之明詩綜卷九十六
