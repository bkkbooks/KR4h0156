body:
  text: 明詩綜卷九十八翰林院檢討朱彛尊編静志居詩話明制南北都各立教坊司北有東西二院南有十四樓其後南都舊院極盛成𢎞間院中色藝優者結二三十姓為手帕姊妹每月節以春檠巧具殽核相鬬名為盒子㑹沈啓南曽為作圖係以長句然青樓之題詠無聞也隆萬以來治游漸盛浙有沈水部某託名氷華梅史以北京東西院妓郝筠等四十人配作葉子牌金沙曹編修大章立蓮臺新㑹以南曲妓王賽玉等一十四人比諸進士榜一時詞客各狎所知假手作詩詞曲子以長其聲價於是北里鮮有不作韻語者其偽真無由而辨識矣姑從諸家選本綴録成卷趙麗華二首麗華字如燕小字寳英南院妓自稱昭陽殿中人詩話如燕父銳以善歌樂府供奉康陵如燕年十三録籍教坊能綴小詞被入絃索予甞得其書畫扇楷法絶佳後題云乙卯中秋同西池徴君質山學士集海濵天香書屋書此竟聞任兵憲在陸涇壩禦倭大捷奏凱回戈亦快事也沈嘉則為作傳有云趙雖平康美人使具鬚眉當不在劇孟朱家下今即其題扇數語豪宕可知賦别一詩亦手書便面者荅人寄吳牋感君寄吳牋牋上雙飛鵲但效鵲雙飛不效吳牋薄席上賦别妾舟西發君舟東頃刻天生兩處風此去雲山天際渺寸心千里附冥鴻朔朝霞一首朝霞金陵妓送人秋風江上送君舟落葉江楓總别愁解纜不知人去逺凭䦨猶倚夕陽樓姜舜玊一首舜玉自號竹雪居士南京舊院妓花源逢顧何二使君作仙源凡幾曲夾岸桃花開忽漫逢劉阮殷勤勸酒杯徐翩翩一首翩翩字飛卿一字驚鴻南院妓有集詩話翩翩年十六時名未起學琴不能操縵學曲不能按板因舎而學詩謝少連於衆中見之此陳王所云翩若驚鴻者也由是人咸以驚鴻目之有妹亭亭字若鴻亦慧黠翩翩晚嫁江隂郁生郁卒還秣陵翩翩為尼居蓮子營小菴以老江隂送顧太學一日發江口五日下長洲可惜送君淚不隨江水流趙彩姬四首彩姬字今燕南院妓冒伯麐云較書容與温文清言楚楚徐孃老去枇杷花下閉門居風流猶可想也詩話今燕張幼于所狎名冠北里時曲中有劉董羅葛段趙何蔣王楊馬褚先後齊名所稱十二釵也晚居琵琶巷口冶游少年號曰閉門趙四其才技頗勝諸人暮春江上送别一片潮聲下石頭江亭送客使人愁可憐垂栁絲千尺不為春江綰去舟憶故居栁絮春泥玉壘封珠簾深鎖暮烟濃分明記得雙棲處夢繞青樓十二重送幼于還吳門花前雙淚濕衣裾把酒江亭落照餘此去吳門霜月滿逢人好寄洞庭書寄陳八玉英時留姑蘇何處簫聲獨上樓傷心桃葉水空流一從南國春歸後無復佳人字莫愁馬守真一首守真字湘蘭一字𤣥兒又字月嬌金陵妓有集詩話湘蘭貌本中人而放誕風流善伺人意性復豪俠恒揮金以贈少年感吳人王伯穀解墨郎之阨欲委身焉伯穀不可萬厯甲辰秋伯穀年七十湘蘭買樓船載小鬟十五造飛絮園置酒為壽晨夕歌舞流連者累月亦勝引也伯穀序其詩大略云秣陵佳麗之地青樓狹邪之間桃葉題情栁絲牽恨胡天胡帝為雨為雲有美一人風流絶代問姓則千金燕市之駿託名則九畹湘江之英輕錢刀若土壤翠袖朱家重然諾如丘山紅妆季布爾其搦琉璃之管字字風雲擘玉葉之牋言言月露翻庭花之舊曲按子夜之新聲奚特錦江薛濤標書記之目金昌杜韋惱刺史之腸而已哉曲中傳為佳話自君之出矣自君之出矣不共舉瓊卮酒是消愁物能消幾箇時姚園客云誦之令人酸楚朱無瑕一首無瑕字泰玉金陵妓有繡佛齋集秋閨曲芙蓉露冷月微微小苑風清鴻鴈飛聞道玉門千萬里秋來何處寄寒衣孫瑤華一首瑤華字靈光金陵妓歸新安汪景純有逺山樓稾次韻汪仲嘉戲代蘇姬寄吳郎之作由來歡愛說新知空結同心不自持山上蘼蕪寧再遇西陵松柏詎相期羅襦明月君休繋紈扇秋風妾不辭極目自憐春欲盡流鶯飛處草離離崔重文一首重文字媚兒一字嫣然南院妓别黄𤣥龍楓落鴉翻秋水明長橋獨樹古今情㝷常歌板銀罌地從此傷離不忍行鄭如英一首如英字無美桃葉妓詩話無美以韶豔聞曲中呼為妥十二妥其小名也詩筆流便但不暇持擇耳雨中賦别執手難分處前車問板橋愁隨風雨長魂為别離消客路雲兼樹妝樓暮又朝心旌誰復定幽夢任揺揺景翩翩二首翩翩字三昧一作驚鴻建昌妓嫁丁長發丁為人誣訟于官景竟自經有散花吟詩話王伯穀題散花吟云閩中有女最能詩寄我一部散花詞雖然未見天女面快語堪當食荔支翩翩家本盱江時游建安故伯榖誤以為閩中女子也時又有沙飄飄新都謝少連撰季漢書成其友醵金賀之布席齊王孫第四方之士㑹者百人選六院麗人侑酒飄飄為冠評者比之揚州蕃禧觀瓊花末有兩樹云襄陽蹋銅蹄駿馬蹋銅蹄金羈豔隴西郎能重意氣妾豈向人啼與蘇生話十日平原飲三秋江上船一經揺落後明月幾回圓薛素素一首素素小字潤孃嘉興妓有異才數嫁皆不終有南游草詩話薛五較書有十能詩書琴奕簫而馳馬走索射彈尤絶技也予見其手寫水墨大士甚工董尚書未第日授書禾中見而愛之為作小楷心經兼題以䟦至山水蘭竹下筆迅掃無不意態入神聞在京師挾彈走馬能以兩彈丸先後發使後彈撃前彈碎于空中又置一彈于地以左手持弓向後以後手從背上反引其弓以撃地下之彈百不失一甞置彈于小婢額上彈去而婢不知江都陸無從歌云酒酣請為挾彈戲結束單衫聊一試微纒紅袖袒半鞲側度雲鬟引雙臂侍兒拈丸著髲端回身中之丸並墜言遲更疾却應手欲發未停偏有致范夫人贈詩云重開别院貯文君寳絡千金換翠裙非雨非雲香滿路前身應是薛靈芸㝷為李征蠻所嬖又甞侍沈孝亷景倩巾􅌨其畫象傳入蠻峒酉陽彭宣慰深慕之費金錢無算致之不得也春日過茅山參差臺殿閟靈蹤句曲茅君次第逢洞口鶴窺曽過客日中人上最髙峰華陽澗水桃千樹舊舘壇碑闕幾重遥望金沙何處是浮圖千尺罩烏龍張回一首回字淵如一字觀若金陵妓送别賦得帆影勞勞亭上别無計共君歸一葉隨風去孤帆挾浪飛目窮河鳥盡望斷浦雲非後夜相思處傷心隔翠微羽孺一首孺字素蘭一字静和常熟人生不識姓善音律推律得羽聲遂以為氏後為人所殺有詩集栁草閣疎林迥簷前繞緑楊章臺憐御苑灞岸惜他鄉繋馬青春晚藏烏子夜長玉闗頻折贈離思斷人腸周文一首文字綺生嘉興妓沈宛君云綺生初出平康終歸匪匹鬱志而死遺藁甚多不傳良可惜也詩話綺生善小詩沈純父林居端午召客呼之侑酒不至次日始來問其故曰昨偶席上賦詩未就耳純父曰爾能詩試即景以五月六日為題綺生朗吟云酒剰蒲觴冷門懸艾虎新坐客咸撃節由是詩名大起縉紳若髙𤣥期李君實皆與酬和綺生甞有句云掃眉才子多相忌未敢人前說較書葢自傷也近見鄉先達所選詩謂為松陵一元氏負之而趨悒鬱而死所云一元氏者除名㑹元沈同和志學也予於乙酉冬猶及見之酒間談論援今證古娓娓不休亦未至以五七言讀詞回環迄不能句第於帖括則全不解耳詠懷幾㸃愁人淚不許秋風吹吹到長江裏江流無盡期呼文如一首文如小字祖江夏營妓與丘謙之綢繆和荅有遥集編詠庭中安石榴呈丘生安石孤根託謝庭合歡枝上日青青懸知雨露深如許結子明朝似小星王微六首微字修微揚州妓皈心禪寂自號草衣道人初歸歸安茅元儀晚歸華亭許譽卿皆不終有期山草樾舘詩集重過雨花臺望江有感春姿静東岑雲影結遥粲坐卧髙臺空不知翠微半落花自古今啼鳥變昏旦撫化良易遷即事聊成玩况乃晴江開渌波正拍岸有人以斷腸草寄怨予偶見戲反之木名有連理草名有宜男花有枝並蒂禽有翼鶼鶼西方鳥共命東海魚比目輕鸞千二百鴛鴦三十六相思為唐殿合歡是漢宫雀屏開甲乙龍劒匣雌雄之子賦斷腸稱物作苦語聊拈佳耦名其他未遑舉夾山漾别陳仲醇夾山寒水落木葉下紛紛斜日已難别扁舟况送君瑶華一以折零落不堪聞為我題紈扇新詩寄白雲仙家竹枝詞幽蹤誰識女郎身銀浦前頭好問津朝罷玉宸無一事壇邊願作埽花人憶江南寒沙日午霧猶含蕭瑟風光三月三撲地栁花新燕子不由人不憶江南湖上早起中流何處聽雞鳴只看船忩烟霧生剛到五更翻睡去急披衣起已天明蔡彬一首彬字清卿江都妓贈别傷情不奈出宜春遥見離亭倍愴神昨夜樓頭好明月今宵分照逺行人郝婉然一首婉然字蕊珠京師珠市妓有調鸚集鳳皇臺雨過荒臺春草長浮雲暗處是斜陽杏花零落知多少黄蝶翻飛野菜香李貞儷一首貞儷字澹如桃葉妓有韻芳集月夜有懷不見風前舊令君滿庭霜月白於雲仙居只隔清谿曲此夜鐘聲應共聞茹瓊一首瓊錢塘妓許歸金華唐生生負約嘔血卒元夕湖南湖北雪初消畫鼓春幡總寂寥不是鄰家燈火近那知今夕又元宵楊宛四首宛字宛叔金陵妓有鍾山獻正續集茅止生云宛叔歸余年纔十六能讀書工小楷其於詩游戲渉略若不經意然無枯澀之色鮮潤流利鍾廣漢云止生之嬖宛叔類燕人之惑易安得時以蘭湯浴之詩話止生得宛叔深賞其詩序必稱内子既以譴荷戈則自詡有詩人以為戍婦兼有句云家傳傲骨為迂叟帝賚詞人作細君可云愛惜之至顧宛叔恒思背之秋懷詩云獨自支頤獨自愁深情欲語又還羞從來薄命應如此敢比鴛鴦到白頭棘心已露矣止生亡後思倚國戚田𢎞遇以其賄遷不期𢎞遇苐以衆人畜之㝷俾其授琴書於季女甲申冦變宛叔攜田氏女至金陵匿山村中盜突入其室欲汙田氏女女不從宛叔從旁力衛之遂同遇害詩如江清風定候山碧雁來天亦稱佳句其行楷特工能於瘦硬中逞姿媚洵逸品也種桐静居無寄懷種桐廣除内桐髙盈丈餘風露相吸逮本以遲鳳棲鳳棲不可再我聞古良士往往思其外預愁斲為琴知音復誰在哭侍兒湘雲湘水千年在相雲去不回牀頭鍼線帖此後更誰開春日有感翠館紅樓白石橋髙花低栁自飄颻畫䦨幾處無人到多少春光暗裏銷次止生七夕見懷韻遥遥望斷白蘋洲惟見銀河一派流那得閒情還乞巧夢魂㝷遍木蘭舟顧娟娟一首娟娟嘉興妓詩話娟娟居蘇小小墓東北短小穠粹妙歌舞雙鞾柔弱胡旋燈前觀者靡不歎絶間作小詩以書法不工偶對人口占而已崇禎末年卒贈别南國相思子西番篤耨香留君充雜佩休賭紫羅囊明詩綜卷九十八
