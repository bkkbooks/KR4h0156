body:
  text: 明詩綜巻五翰林院檢討朱彞尊編劉崧五十首崧字子髙泰和人明初以人材舉授兵部職方司郎中遷北平按察司副使坐事輸作京師尋放還徵拜禮部侍郎署吏部尚書請老許之復召為國子司業有槎翁集宋景濓云子髙天賦迢逸之才加以稽古之力雕肝琢膂宵吟夕詠而又得師友之資江山之助五美云備詩於是乎大昌陵厲頓迅鼓行無前緩急豊約隱顯出沒皆中繩尺﨑劉仲修云子髙日課一詩多至千餘篇遭亂嶇轉側二十餘年不為少折既貴澹然如布衣北平去家五千里惟一僮侍側巳復遣還晡時吏退獨處一室據几吟詠夜分不休其年愈老思愈壯詩愈工時豫章萬白大梁辛敬襄城楊士𢎞秣陵周湞鄭大同皆以歌詩自雄子髙與之馳騁上下名聲相埒王元美云劉子髙如雨中素馨雖復嫣然不作寒梅老樹風骨劉胡元瑞云國初吳詩派昉髙季迪越詩派昉伯温閩詩派昉林子羽嶺南詩派昉孫仲衍江右詩派昉劉子髙五家才力咸足雄據一方先驅當代第格不甚髙體不甚大耳氣顧文玉云子髙虚澹不墮習静志居詩話子髙句鎪字琢頗具苦心惜其體弱局於方程不能展拓於唐近大厯十子於宋類永嘉四靈於元最肖薩天錫東方行東方閃閃啼早鴉美人愁眠隔窓紗桐華樹下人來往銀牀轆轤夢中響姑蘇曲姑蘇城頭烏夜啼姑蘇臺上風淒淒芙蓉露冷秋香死美人夜泣雙蛾低銅龍咽寒更漏促手撥繁絃轉紅玉鴛鴦飛去屧廊空猶唱吳宫舊時曲過南圳訪友同王子與羅子理分韻得滿字連阜衍平皐深林閟虛館揚襟暢遐思散帙延清款溪蓴花羃羃田黍實纂纂逕迴阡彌永水落澗初滿載欣秋稼登矧愜人事罕欲往悲曠塗言歸理修疃嵗暮南歸留别蕭翀旅寐不能旦披衣坐牀帷屋角曉色動鳥鳴己多時起坐出庭際雲物正華滋殘雪未盡消羣山鬱叅差即此念故園焉得不懐思矧属嵗運周返駕固其宜理䇿望前路揖君從此辭窮檐有穉子但訝歸來遲辛丑正月二十二日述志經年掩扉卧迹與城市遥誰為拔茹計乃以仕見招本昧平生素敢勞中道要公檄臨我門戒命在夕朝九江今雄州邁往方迢迢有母誰與居念之中心焦起揖謝來客我何希市朝澹然一室内宴坐風寥寥游三華山龍門兩山負一水下迴繞蒼峽忽中開飛橋出林杪盤盤石磴引羃羃松林窅危闌正西挂層閣復東繚樹暗盡含雲花明忽聞鳥懸厓傍架棧鑿石潛通突早聞三仙人棲化迹巳杳常疑雲月上顔色覿清皎丹井舊時深朝真亂來少荒壇翳霜蒹虚館閟叢篠凝神觀衆妙屏迹謝羣擾懐賢嘅重憩振翼思逺矯佳境能娱人何因致清醥早行霧中過田家失道我行煙霧中不復辨原陸幽幽聞雞犬隱隱見松竹田家迷逺近阪路有﨑曲已覺瞻望勞誰云往來熟舍弟往三垇嶺尋觶子日夕未歸坐候林下西林己雞棲北澗復蟲響沈沈四山暝寥寥一星上時危劇鍾情期逝勞紆想悵立此溪陰欲休未能往江干草居江干愜幽屏草扉亦常闗晩塗㫁歸人虚市見寒山林木變冬候繁緑忽己殷鳴鳥相因依孤雲時去還唐虞既云逺慨此時獨艱四體豈不勤我髮日己斑遨遊千載上偃仰一室間樂詠古人書庶幾無靦顔和答蕭國録八月十一夜對月有懐之作林塘澹清華庭宇豁虛朗露井波澄輝風林葉交響髙言倡令徳孤吟振遐想亭亭江上月肅肅雲鴈往美人浩前期令節延逺望池魚既堪綸㫖酒亦可釀永懐契天游庶以㑹心賞宇宙本達觀如何較銖兩題秋江待渡圖為蕭學士賦小航衝風岸將及行人下馬沙頭立水濶雲深野渡間天寒日暮歸心急人生行役安可休到江路盡還通舟誰能裹足山中老不識風波一日愁題余仲揚畫山水圖為余自安賦金華仙人余仲揚筆墨蕭疎開老蒼昨看新圖湖上宅烟霧白日生髙堂層峰上蟠石皜皜絶島下瞰江茫茫長松並立各千丈間以灌木相低昂松下上人坐碧草秋影忽落衣巾涼囊琴未發絃未奏已覺流水聲洋洋赤城霞氣通鴈蕩巫峽雨色來瀟湘誰能千里坐致此欲往久歎河無梁風塵漲天蔽吳楚六年悵望神惨傷𤣥猨苦啼巖北樹白鴈不到江南鄉赭山焚林絶人迹如此山水非尋常此圖本為自安寫亦感同姓悲殊方幽軒素壁泉聲動對此令我心為狂何由捫蘿逐麋鹿振衣直上雲中岡登臨一寫漂泊恨長嘯清風生八荒題溪山春曉圖寄贈蕭翀土山戴石石角傾偃樹雜出如幢旌青天㣲茫曉色動雨氣合沓千峰晴野橋西邊有村路之子鳴鞘踏雲去重巖花發似聞香隔水鶯啼不知處東南連年飛戰塵如此山水何清新石田到處長荆棘豈有荷耒春耕人我昨西遊登武姥手抉雲霞望仙府把酒忽逢東海生醉卧溪南紫蘿雨紫蘿陰陰覆巖扉十日尋幽行未歸雲峰流泉半空落六月飛雪霑人衣拂衣歸隱知何日却對畫圖心若失不聞流水渡溪還時見浮雲向山出懐哉桃花修竹林江海秋髙煙霧深豈無耕釣在田野誰識悠悠沮溺心寄曽郁文短歌澄江水向東流流向東昌江上頭我有故人在江上十年不見増煩憂白沙水聲寒活活黄巖雲氣凝清秋豈無沙棠枻吳女謳可載酒同遨遊狂風吹山波浪惡使我不得回輕舟翩翩雲中雙飛燕銜書寄我頻留戀書中展轉道深情但恨相思不相見春燕飛來秋復歸報書不遣壯心違碧蘭紫蕙何由采即恐蕭條霜露稀題曽郁文所藏山水小景隔溪望見林間屋沙漵陰陰俯羣木溪流合處一橋孤春雨來時萬山緑江南此景真可憐米家筆意誰能傳却憶故廬珠浦上短籬長繫釣魚船題山水畫軸瀑布雙垂下屏風九疊張波光混彭蠡山勢似潯陽松塢棲茅屋楓林帶石梁扁舟如可具吾意在滄浪張氏溪亭雜興二首草閣經秋静柴扉近水開霜林收橘柚風磴坐莓苔釣艇寒初放樵歌晩獨回城南車馬地欲往更徘徊寒霧依山斂晴沙與岸頽林塘無路入忩户有時開野客鈔書去鄰翁送酒來幽期在蘿薜莫遣暮鐘催題陽靈洞仙宇何年闢靈泉盡日聞石門通别殿木棧倚髙雲鸞鳳時來下獼猴近作羣春風城郭暮煙霧正紛紛題彭氏背郭茅堂圖日薄金華嶺雲深白石塘茅茨元背郭水竹自成鄉圖畫看逾好登臨興不忘門前雙杏樹葉葉是秋霜過龍灣五王閣訪友人不遇野橋秋水落江閣暝煙微白日又欲午髙人猶未歸青林依石墖虛館浄柴扉坐久思題字翻憐柿葉稀再懐伯兄子中時有同客興國者從間道先歸兄以道阻後期不果貧賤輕離别艱危昧死生獨違同里伴仍阻異鄉程愛想深山憩愁聞間道行幾時秋樹下慰此淚縦横玉華山翠巘千峰合丹厓一逕通樓臺上雲氣草木動天風野曠行人外江平落鴈中傷心俯城郭煙雨正溟濛題李志謙書含温家亭子三江口坐對東風兔子寮錦石白沙寒厯厯碧雲紅樹晩蕭蕭簾虛易覺天光切衣潤常疑霧氣飄賴有石門支遁在題詩長日出溪橋舟次樵墩憶故人鄭同夫浦口維舟日欲晡栁村桑塢帶縈紆獨尋古道黄埃滿忽憶故人秋興孤螺蚌儘供溪女拾雞豚偏稱野人呼西山隔水清如玉誰與題詩送酒壺奉同曠伯逵周叔用徐仲孺登秋屏閣是日聞淮郡有警風沙黯然賦呈萬徳躬孫伯虞諸君子古刹蕭條隱石根荒城髙下帶沙墩㫁雲南鴈日初出曠野北風天正昏羽檄屢傳淮甸急龍艘猶滯海門屯湖山不盡登臨興回首鄉園獨愴魂入城江水依然抱石磯獨行空感舊游非晩山當户日初落秋草滿城人未歸田鼠引羣穿井出山雞求食傍簷飛向來車馬東門路忽憶朋游淚滿衣漫興山下碧溪渾欲平溪邊春事總闗情定巢新燕忽雙過隔水雛鶯時一鳴凍入秧畦愁近雪光涵風浦愛新晴南園草緑無人到應是滿林春筍生客情清明己過寒雨稀客情物色共依微庭前幽草忽如積江上落花渾欲飛風雲慘澹隨長㦸塵土蕭條上短衣雲亭江上麥田熟昨夜月明還夢歸將歸南平發舟戯賊梅演山前聞鴈來珠湖渡口放船回晚雲出嶺作疎雨秋水滿江生緑苔故里風煙頻入夢中年世事獨興哀飄摇莫戀詩千首㫁送深慿酒一杯秋日承廬陵曲山蕭夀春過林居臨别賦贈秋露滿園桑葉飛逺煩江上問柴扉青山古道獨行晚白髮故人相見稀細雨髙原禾黍熟斜陽疎樹橘橙肥殘年甚欲留君住何事驪駒只賦歸早春燕城懐古二首金水河枯禁苑荒東風吹雨入宫牆樹頭槐子乾未落沙際草芽青已黄北口晚陰猶有雪薊門春早漸無霜城樓隱映山如㦸笳鼓蕭蕭送夕陽宫樓粉暗女垣欹禁苑塵飛輦路移花外㫁橋支贔屭草間壊壁綴罘罳酒坊當户懸荷葉兵壘縁渠挿栁枝不見當年歌舞地空餘松柏鎖荒祠陶皮石室自注即今北巖古陶皮二仙修鍊之所天将雨則巖竇有泉出焉禱者嘗以為候舊名觀音巖今正之北巖極谽谺三面環絶壁聞有山雨來石泉先暗滴峭壁蘭巖石下陰陰猗蘭緑如翦花發人不知秋香入苔蘚題李唐牧牛圖二首天寒放牛遲野曠風獵獵獨來長林下吹火燒山葉日夕山氣昏獨歸愁路逺猶戀草青青遲回下長阪江上沙觜微波漾緑蘋山頭落日駐紅輪依稀燈火楓林鼓岸上人家賽水神步月乘涼步月過西鄰草露霏㣲濕葛巾一逕竹陰無犬吠飛螢來往暗隨人八月十一日自水南渡江道金華過北巖訪蕭鵬舉是日雲陰掩冉不見日色道中賦絶句八月棠棃露葉紅荒陂古水湛青銅秋風依舊巖前路髙下寒山落日中正月十九日金魚洲下放船開華石潭邊看雨來愛殺南天雙白鷺青山盡處却飛回題枯木竹石二首木葉欲脫天雨霜竹枝乍低風巳涼三湘落日流波白行子繫船思故鄉平沙竹樹晚毶毶楚客維舟近峽南忽憶微雲將雨過滿林秋色照江潭題超上人墨菊露香秋色淺深中青蕊黄花自一叢最憶南園微雨過短籬扶杖看西風蒼石峽中見道人菴居隔水山花盛開蒼石峽中花藥欄舊時草屋傍巖安道人去後松橋㫁縦有花開隔水看題三岡寺石橋流水帶人家紫殿春陰閣岸沙啼鳥數聲山雨歇門前落盡白桐花寒夜馬齕枯荄寒夜長風如箭鏃射陰房不知門外三更雪誤起開門看月光送别叔銘出順承門送客出城秋巳涼太行南上楚天長順承門外斜陽裏蕎麥花開似故鄉望漢獻王陵單家橋下雪横氷草樹連雲掠凍鷹漢業己荒河水在行人遥指獻王陵髙唐州道中北風吹沙官道長兩旁楊柳間榆桑何時走馬重來此要看清陰六月涼周湞三首湞字伯寧江寧人明初任饒州長史陞湖廣都事旋擢刑部尚書降惠州經厯周吉父云伯寧望九華詩云巖囬氣如燌峰去勢猶引佳句也始發建業登龍江山祠感懐有作去國思舊遊尋山發幽眺遥凌天門石恍對臨海嶠神闗列雄鎮危堞抱遺廟秋陰散氛翳炎景扇餘燎天水逺自空雲霞近争耀客行始多感世事紛難料同俗豈素懐趨時固殊調既為達士恥復被逐臣誚行矣庶無欺忠信將可劭舟中望九華山貞履無素期勞生憶恒窘誰云戒戎路曽是返初隱水宿淹長晷山行阻修畛縹緲對雄標巑岏發竒藴巖回氣如燌峰去勢猶引刻削冠青蓮雕鏤矗丹筍嵁霞上斑剥石乳下碖碅山鬼從文貍淵靈閟𤣥蜃睠言志藜藿未遂采芝菌即事情巳悲懐賢迹俱湣潛吳媿梅福去汶羞閔損人徳險未夷天道明可準皐蘭豈徒歇巖桂芳未隕嵗暮山中人寤歌一作結言候歸軫賽小姑廟育秀凌華嵩標竒奠淮楚陽闢啟神闗陰沈開水府林林聚商舳淵淵聞戍鼔陳瑟㑹安歌傳芭紛代舞椒漿既芬潔桂櫂方容與日暮懐歸情含涕望修渚黄肅五首肅字子邕江西新城人元季官禮部主事自北平來見命仍故官陞侍郎己降郎中復陞工部侍郎任尚書未幾出參政廣西坐黨禍死有醉夢豪王子充云子邕詩簡易平質一本漢魏絶去近代聲律之習詩話尚書匣鏡一篇當是懐故主逺在沙漠而作其云夫子新好合不能思故家則刺同時佐命之臣也短歌行來日苦少去日苦多人生不滿百痛當奈何不如沽美酒與君長笑歌峻坂無停車急川無停波人生不滿百當復奈何來日苦少去日苦多詠懐三首少壯好游覽不知中道憂方兹懐故土眷此成淹留員闕蔽朝暉𤣥雲陰以浮徘徊當永夕嬿婉將焉逑棲鳥翔不息鳴蟲亦啾啾人生無定止卒嵗何能休流水日夜流厚土何不盈人生自不己四運迭相承達士識物化昧者徒營營蕩蕩晨風來悠悠天宇清㑹當撥塵務聊復從吾生追呼心所歡置酒坐中庭忘言勿復辨觴盡還復傾匣鏡三十年塵暗不復治停餐且不寐所思知為誰蕩子不復返眇在天一涯綻衣終當組道逺何能持明明天邊月三五入中閨念與子歡愛不得同光輝寤言相與共既覺將何依客中書懐竹裏山雞啼未休江南二月景如秋半簾花雨寒侵袂一片江雲晚傍樓亂世青春如過夢少年華髮忽盈頭故園動是經年别滿眼干戈添客愁牛諒三首諒字士良東平人流寓吳興以秀才舉除翰林典簿使安南還擢工部員外郎厯禮部尚書降主事尋復任免有尚友齋集郁伯承云弇州别集以公從主事為尚書收入超遷之例予檢科試考有掌巻官工部員外郎牛諒又宋學士慶成宴詩序有工部侍郎牛諒是由員外侍郎而至尚書亦循序而遷也公優於文學嘗與唐應奉肅有丁未九月聮句盖國初才士部鄭芷畦云實録洪武七年十二月癸丑罷禮尚書牛諒官諒初為禮部尚書以怠職降為本部主事未幾復為尚書至是又以不任職罷是諒為工部員外侍郎皆在洪武七年禮部尚書之前弇州别集謂公從主事為尚書收入超遷之例似與實録及科試考慶成宴詩序不合詩話尚書流寓吳興時過檇李與鮑恂仲孚丘民克莊張翼翔南王綸昌言聞人麟彦昭曹睿新民徐一䕫大章尤存以仁及吕安坦來志道周棐常真釋智寛等集郭西景徳寺擕酒賦詩其在南京則與唐肅處敬林公慶孟善陳世昌彦博徐一䕫大章張翼翔南朱升允升㑹飲聮句及同張以寧志道使安南志道賦長句以贈有云更喜清詩慰遲暮盖當日風雅之林毎屈一指不徒以功名顯也乂在元時中甲午大魁亦見志道詩句西郭憩景徳寺分韻靈湫閟白龍古殿敞金粟僧歸林下定雲傍巖端宿伊余陪勝引於此避炎酷息陰悟道性習静外榮辱坐石飛清觴每歎白日速别去將何如留詩滿青竹紅梅隴頭人未來江南春幾許惆悵玉簫聲吹落臙脂雨畫梅棃花雲底路參差折得春風玉一枝南雪未消江月曉欲從何處寄相思朱夢炎一首夢炎字仲雅進賢人元進士入明為國子博士遷翰林修撰出為浙江按察司經厯轉山西行省員外郎入為禮部員外郎擢本部侍郎陞尚書錢塘西湖萬户煙消一鏡空水光山色畫圖中青樓燕子家家雨錦浪桃花岸岸風櫂轉舞衣凝暮紫簾開歌扇露春紅蘇公堤上垂楊栁尚想重來試玉驄楊訓文二首訓文字克明潼川人元淮海書院山長遇亂居江都明初徵為起居注兩遷左司郎中丙午年自太常卿知湖州移知汀州厯禮部尚書改戸部出為河南行省叅知政事卒詩話元詩華者易流於穢貫酸齋輩是也清者毎失之弱薩天錫等是也明初若劉子髙蘇平仲楊克明其源皆出於天鍚質羸之恨諸公不免贈友與子分攜後星霜二十年重逢驚老大惜别更留連花落春江雨鵑啼緑樹煙幽懐浩難寫愁墮酒尊前寄石仲文故人别後復如何不寄新詩到薜蘿賈誼書成何日上張衡愁比向時多江城木落霜連地澤國天寒水不波重約明年秋八月紫薇花底共鳴珂滕毅三首毅字仲𢎞鎮江人以儒士徵授起居注擢吏部尚書出叅政江西詩話尚書詩不多傳亦具風骨秋興二詩仿彿宋文恪過故宫之作柹歸即楚王臺舊基為新城春風䕫子國落日楚王臺江遶西陵下雲從上峽來壯遊今已遂幽思獨難裁闗塞猶戎馬吟邊首重回次韻黄秀才秋興二首西風如水灑絺衣無數南來候鴈飛朔漠地寒收王氣岷峨秋盡斂餘暉三泉忽報金棺𦵏萬國同瞻玉璽歸相見不須談往事百年耆舊眼中稀虎戰龍争二十秋江波日夜自東流道旁無語王孫泣天際含嚬帝子愁苜蓿風煙空壁壘蒹葭霜露滿汀洲古來維有西山月永夜依依照白頭錢用壬一首用壬字成夫廣徳人元翰林國史院編修出為江浙行省左右司員外郎既而參平章張士信軍事於淮安陞參政歸附後授按察副使厯禮部尚書洪武元年十二月告老賜居湖州題米敷文煙巒曉景江上亂峰生暮煙隔江遥望水雲連西風戰艦今無數不見米家書畫船李質一首質字文彬徳慶人元未以府掾聚兵二萬保障封川等四郡者十五年全城歸附授中書㫁事遷大都督府洪武五年任刑部尚書出為浙江叅政終靖江王相有樵雲集玉臺驛亭子春去臺空迹巳陳危亭傑出澗之濵清溪繞屋可濯足好鳥隔江如喚人明月委波金瀲灩青山帶雪玉嶙峋桃花流水非人世或有漁郎來問津吳雲一首雲字友雲宜興人洪武初授𢎞文館校書郎厯刑部尚書參政湖廣奉詔招諭雲南死之詩話尚書送李民瞻一律體格極似髙季迪送沈左司詩而聲色不同未免近於土木形骸矣録之以諗知言之君子送李民瞻侍郎宣諭陜西侍郎將命出金鑾道路傳呼逺近歡闗内官曹迎使節秦中父老識衣冠雲開太華三峰秀水遶黄河九曲寒寄語渭川千畝竹西風還觧報平安張籌一首籌字惟中無錫人以薦授翰林應奉洪武八年任禮部尚書降員外郎徐子元云惟中剛健之氣未能全融而金石鏘然足洗俗樂之耳朱中舍恵麓秋晴圖湖上羣山卧九龍泉頭一客坐雙松定知别去還相憶夢入秋雲第幾重吳琳一首琳字朝錫黄岡人召為博士厯浙江按察僉事入充起居注洪武三年吏部尚書出知黄州以老致仕開化道中重岡狹路倦登臨喜見溪流華步深楊栁樹邊舟小小海棠花上雨沈沈一春王事過三月千里家書繫寸心無補盛時縻好爵不才端合老雲林嚴震直二首震直初名子敏字震直因御稱其字乃互易焉烏程人明初由糧長授河南布政司參議累官工部尚書致仕永樂初召令宣諭山西卒於澤州有遣興集朱平涵云嚴公遇建文帝吞金事見吾學編名卿績紀二書世所尊信無有易者然文皇入京在壬午六月而嚴公之卒即在是年九月是時但知建文帝焚死後數年漸有傳在西南徼者於是使胡尚書訪張邋遢鄭太監賞賜西域此時嚴公捐館已久矣今其子孫據二書請於所司立祠立碑不知前後迥不相及也詩話尚書由運糧萬石長舉為布政司叅議未之官留署通政司事厯工部尚書洪武三十一年春致仕建文元年己夘復以年老辭不與事帝念其任事久留住京師考遣興集中有讌集賜第之葵心堂詩乃是年三月十五日事分韻者為董學士倫茹尚書瑺髙太常遜志任尚書亨泰程都御史本立李尚書至剛鄭庶子濟黄侍郎福張尚書紞髙經厯徳𤾉凡十有一人太常詩云偉哉尚書公致政鳴珂里賜第最幽敞逈出京塵裏庶子詩云尚書遂休致賜第居京洛侍郎詩云司空居廟堂憂國鬢如絲挂冠神武門賜第留京師厯厯可證而續藏書謂尚書歸老在里長陵以兩馬夾袋舁至京致身錄又稱靖難兵起時督餉山東皆妄也載攷文皇帝實錄壬午七月二十三日詔云朕居藩邸凡百姓艱苦靡不知之數年來兵興北方之民疲勞尤甚朕所以舉義者為宗社生民計今宗社既安而北方之民未安朕夙夜不安乃命前工部尚書嚴震直户部致仕尚書王鈍應天府尹薛正言等分往山西山東陜西等布政司巡視民瘼何弊當革何利當建速具奏來尚書受詔往山西是秋九月十一日病卒於澤州公廨合之忠誠伯茹瑺所撰嚴公神道碑無異初不聞奉長陵宻詔往雲南訪建文帝也吾學編遜國表忠紀等書不知何所據信吞金為實列尚書為後死忠臣之首萬厯十九年巡按御史黄鍾疏請建祠榜曰旌忠列在祀典越數十年其裔孫祗字文昭作祠祀辨大指謂吾祖功業炳燿史冊何藉吞金一死以罔天下後世黄公欲顯吾祖適足以誣吾祖也噫文昭不欲誣其祖可謂賢子孫矣棲霞真境棲霞有真境逺在桂林間春風洞中瑶草緑桃花滿樹春斑斑羣峰拔地幾千尺上有樓臺耀金碧興來直欲一登臨王事有程留不得永州舟中瀟湘二水㑹零陵灘響惟聞浪作聲兩岸青山明月夜畫船行過永州城朱同一首同字大同休寜人自號紫陽山樵洪武中以人材舉為東宫官進禮部侍郎尋被誣得罪有覆瓿集題畫紫陌紅塵沒馬頭人來人去幾時休誰家有酒身無事長對青山不下樓丘民一首民字克莊揚州人徙居嘉興洪武初為松江學官後至禮部侍郎送友人至杭又隨南鴈度錢唐不道他鄉是故鄉江上秋風蓴菜美山中春雨石田荒杜陵老去寜忘蜀江總歸來不是梁欲采芙蓉贈君去錦雲零落倍淒涼秦約四首約字文仲鹽城人徙居崑山仕元為崇徳教授洪武初召拜禮部侍郎以親老辭歸再徵為溧陽教諭有樵海集江之水寄楊鐵厓江之水流瀰瀰蕩漾雙鳬舟涉江采蘭芷蘭芷青青露如洗下有一雙魴與鯉美人美人胡不來相思日暮江風起雜興元冬十月交蟋蟀近我牀傷彼苕之華含英委清霜丈夫四方志千金戒垂堂壯日不奮迅老矣徒慨慷紀夢簡陳簡討二首宫車轆轆過神皐五色雲中望赭袍野膳不嫌涼餅滑小奴花下翦春蒿查夏重云是詩似指庚申君北狩時事吳蠶入繭染春紅繅盡柔絲未論功若得君王迴一顧不辭白髮上陽宫韓宜可一首宜可字伯時㑹稽人洪武初徵拜御史出為山西布政謫雲南後起為左副都御史詩話伯時見滄海遺珠句如松迷鶴徑渾無路花暗簫聲不見人青天有月來今夜白髮無家度幾秋芳草東風沙上馬青山遲日栁邉鶯均有思致五華山圖五華之山山上頭府視東海如浮漚豈無四萬八千丈亦有五城十二樓翠蕖影落中天曉玉柱光含大地秋何日相從陪杖屨西風林外一長謳蘇伯衡三首伯衡字平仲金華人明初仕為國子學正擢翰林院編修宋濓以翰林承㫖致仕薦以自代召至固辭賜文綺遣歸起教授處州以表箋忤㫖坐罪卒于獄有平仲集劉伯溫云平仲詩文辭達而義粹識不凡而意不詭盖明於理而昌於氣也藿徐子元云平仲豐腴太牢之味與藜自别詩話元時進賀表文觸忌諱者凡一百六十七字著之典章使人不犯其法良善逮明孝陵恩威不測毎因文字少不當意輒罪其臣若蘇平仲徐大章輩是也當日有事圜丘惡祝册有予我字將譴撰文者桂正字彦良言於帝曰予小子履湯用于郊我將我享武歌于廟以古率今未足深譴帝怒乃釋可謂善於悟主矣惜未有為平仲調觧者竟瘦死於獄悲夫一百六十七字者極盡歸化亡播晏徂哀奄昧駕遐仙死病苦沒泯滅凶禍傾頽毁偃仆壞破晦刑傷孤墜隳服布孝短夭折災困危亂暴虐昏迷愚老邁改替敗廢寢殺絶忌憂切患衰囚枉棄䘮戾空陷厄艱忽除埽擯缺落典憲法奔崩摧殄隕墓槁出祭奠饗享鬼狂藏怪漸愁夢幻弊疾遷塵亢䝉隔離去辭追考板蕩荒古迍師剥革暌違尸叛散慘怨尅反逆害戕殘偏枯眇靈幽沈埋挽升退換移暗了休罷覆弔㫁收誅厭諱恤罪辜愆土别逝泉陵此延祐元年十一月取定擬至三年八月寛其禁矣其字様雖難悉避然亦玉堂視草者所宜知也送陳思可主簿赴進賢任一别十五年倏忽若昏旦相逢京城中幸脫戎馬亂宦遊我何成鬢髮子已換留連一尊酒寂寞四門館翦燭聽寒雨話舊過夜半居然消百憂莞爾成一粲維子才且賢文采甚煥爛起從有道徵國光方縱觀謂宜寘館閣鴻猷藉宣贊如何奉明命鈎考親吏案黎庶乃邦本疾痛資抑按要將逺猶敷可以小邑翫心懷簡書畏跡逐萍梗散席挂遇順風潮生失逺岸昨夕簪云盍今朝袂還判後㑹復何時臨岐重嗟歎周伯寜春晴江岫圖尚書襟懐絶瀟灑揮毫往往凌董馬平生一筆頗自珍數尺新圖為君寫齊山遥接吳山青碧波萬頃孤帆征東風緑遍汀洲草總是岐亭離别情一向江南一江北離情浩蕩嗟何極正如江上之碧波縱有并刀那翦得當時己足令心愁如今況復隔羅浮掩圖却上髙臺望但見逺海連天流暮歸朝出誰與侣蜃霧蠻煙結悽楚木棉花落鸚鵡飛苦竹叢深鷓鴣語絶句落葉滿衡門蕭蕭風雨夕一燈溪上明何處獨歸客唐肅六首肅字處敬㑹稽人元末官嘉興儒學正洪武初召修禮樂書擢應奉翰林文字兼國史院編修以疾失朝罷歸里謫佃濠卒有丹崖集戴叔能云處敬詩文澹而華質而麗直而不倨簡而不嗇翰蘇平仲云應奉律詩步驟盛唐顧𤣥言云林思頗清僻詩話處敬文極為危太樸宋景濓戴叔能申屠子迪所許詩與謝僉事原功齊名稱㑹稽二肅其為學正也盡挈其家居檇李徐幼文送以詩云路出三江外程淹一日間髙季迪詩云舟重全家去詩多一路題處敬亦有留别詩存丹崖集中當元之季浙西嵗有詩社而濮市濮仲温豐於貲集一時名士為聚桂文㑹以巻赴者五百人請楊亷夫評其優劣於是紀風土者目為樂郊及楊完者亂州無完郛然繆同知思恭徳謙猶招羣彦集南湖與㑹分韻者一十有四人越二年曹教授睿新民復集諸公於景徳寺亦一十有四人是時聞人麟彦昭葉廣居居仲金絅子尚潘著澤民劉堪子輿咸有詩名吳鎮仲圭居魏塘貝瓊廷琚居千金圩鮑恂仲孚居郡城之西溪郁遵子路居商陳村四方避地者温州陳秀民庶子居竹鄰巷閩人卓成大器之居甓川江陰孫作大雅居南湖崑山顧徳輝仲瑛居合溪天台徐一䕫大章居白苧里㑹稽江漢朝宗居濮院桐廬姚桐夀樂年居海鹽之峨溪而河南髙遜志士敏東平牛諒士良江都丘民克莊錢唐陳世昌彦博建徳張翨翔南皆來僑居四明周棐以陸宣公書院山長留居棃林日以文酒唱酬詩成輒鏤板鑱壁聞者傳為勝事今也流風遺俗未有存者録處敬詩因附及之欲尋舊蹟不勝海桑岸谷之感也銅井迎送龍辭二首伐鼓兮吹簫迎我龍兮山椒龍之都兮何所泉淵淵兮石為戸叩龍車兮乞靈龍不出兮我心若酲我心若酲兮龍寜勿聆我叩龍兮龍䘏風旋波兮龍出龍之出兮福予變旱熯兮為澍龍為澍兮我弗饑返山椒兮雲旗風泠然兮龍歸題張孟兼所注謝翺西臺慟哭記後有序謝翺字皐羽文丞相館客丞相既薨皐羽哭之於子陵釣臺作慟哭記今金華張子為之觧云宫中六更初罷鼔藍田洗玉沈厓浦廬陵忠肝一斗血去作燕然山下土桐江水落秋日頽有客歌上嚴光臺石根敲㫁鐵如意萬里北魂招不來西風又涸灤河水故老寥寥知有㡬珍重睢陽季葉孫箋簡能裨兩朝史過清流闗呈同行者闗在滁州即宋太祖以周師擒南唐將皇甫暉姚鳳之地前月與君南入闗五更月出山霧寒行人畏露復畏虎十十五五同躋攀今日與君仍北去赤日黄塵汗如雨息肩共憩石浮圖欲喚天風便髙舉當時宋祖百萬兵擒暉戮鳳闗險平百年戰爭幾人守空餘蔓草啼鼯鼪闗南遥遥白雲逺闗北茫茫盡平坂回頭野燒起荒田驅車度闗愁日晚題趙仲庸所畫滚塵馬匹馬滚塵誰所寫天水王孫最文雅王孫系宋不系唐那識唐人與唐馬左輔白沙白于雪四十萬頭名各别廐中此馬帝常騎一色紫霞名叱撥奚官似𨽻王毛仲左手執刷右持鞚沙平草暖不被鞍芻豆飽來筋力縦翻身倒豎踣鐵蹄霧尾風騣凶鬯匕亂不齊元是滇池赤龍種猶思躍浪涌春泥太平無事征戰少青絲絡頭可終老不似交河赴敵時夜蹴層冰僵欲倒抵𤓰洲春雨春潮撼客懐舟中十日九陰霾江名天塹元通蜀地入𤓰洲始接淮我笑銀杯能羽化君看寶劍或塵薶明朝又過揚州去無復瓊花舊觀牌韓守益一首守益字仲修石首人明初以儒士攝教宜都擢廣西按察僉事入為河南道御史改春坊中允有樗壽稾詩話中允無詩名七言如幽禽曉聚岸花動錦鯉春肥溪水溫椰葉雨晴鸚鵡語木棉風暖鷓鴣飛隔簾花影散棠棣何處鳥聲啼栗留具有風致過九江夷險休渝節勤勞莫問家暮船維栁樹春水泛桃花廬阜依霄漢江州對渚沙多情白司馬曽此賦琵琶申屠衡一首衡字仲權大梁人徙居長洲洪武三年徵至京草諭蜀文稱㫖授翰林院修撰謫徙濠有叩角集宫詞青瑣春閒漏㸃稀博山香暖翠煙㣲隔簾誰撼金鈴響知是花間燕子歸江漢一首漢字朝宗㑹稽人徙居嘉興洪武初以文學徵仕翰林院編修題破窓風雨圖若有人兮青雲衣佩玉玦兮光陸離爰處兮爰居左琴劍兮右圖書輕富貴兮浮雲保厥美兮天真山房兮寥落天㝠㝠兮雲漠漠雨瀟瀟兮風夜作心耿耿兮不寐紛遑遑兮求索彼薄夫兮貪婪惟聲色兮是耽文繡兮膏粱蓀何為兮懐慙秋蘭兮可紉吾所思兮古人寒檠兮雲案甘與君兮相親趙俶一首俶字本初紹興人元鄉貢進士明初官翰林待制續蘭亭㑹補參軍孔盛詩暄風播曠宇欣懐託陽春盥袚寄幽暢虚襟遺世塵擷芳遵丘阿接杯沿澗濱詠歸何逍遥遐哉仰斯人詩話詩不見佳取其有晉人遺韻桂彦良一首彦良名徳稱以字行慈溪人洪武初待詔公車以白衣賜宴除太子正字尋為晉府右傅改長史追贈編修諡敬裕烏繼善云先生詩文在鄉里曰清節集在京師曰清溪集春和詠言為王傳時曰山西集為長史時曰拄笏集還鄉後曰老拙集又有和陶詩中都紀行皆不在集中其字句雖刻削㸃綴自令人稱道不己詩話長史以徳望重韻語非其所長然如巴園五月收丹橘丙穴三春饌白魚亦小有風致吳江史明古為作傳稱孝陵嘗咏科斗云池上看科斗分明古篆文命長史續之應聲曰惟因蔵水厎秦火不能焚可稱敏絶和陶我生雖阨窮牆屋亦茍完集芳被荷衣隠居思鶡冠素無怨懟心安有憂戚顔明月照溪堂清風隠柴闗螺杯偶獨酌焦尾時一彈悠悠五噫歌逺懐梁伯鸞庭前種梧竹清秋共髙寒王鏞一首鏞嘉興人洪武庚戌舉人翰林院編修詩話予年十七避兵練浦嵗己丑雈苻四起乃移家梅㑹里里在大彭嘉㑹二都之間市名王店或曰石晉時鎮遏使逵居此故名或曰宋尚書居正之宅或曰元學士㫤家於是或曰元學正綸也傳聞各異己亥十月訪蒋布衣之翹於射襄城蔣語余曰子知王店之所由名乎洪武中孝亷鏞及弟鈞之所居也因出所輯檇李詩乘則二王詩俱在焉并出二王合刋詩稾舊本共一冊燈下讀未竟客至轟飲而罷甲辰四月再過之不值又數年而蔣逝無子遺書盡失可歎也後見水竹居詩一巻中載二王題咏各一首因亟録之水竹居者處士朱克恭之宅距語兒鄉東六十里地曰澄林當時郡人馬盛為記貝瓊為志題詩者二王而外有金天藻陳麟陳熊陳振孫詢熊詩云到門碧色帶初雨滿地緑陰遮暮天振詩云玉簫吹徹天如水釣艇歸來月滿村鈞詩云候門童子低於鶴留客軒忩小似船熊為清江弟子見清江游殳山記詢府志有二人一分宜丞一汀州知府餘皆不得而詳矣梅㑹一作梅滙水曰梅溪鏞詩所云吾家舊在梅溪上是也梁孟敬石門集有題嘉興王氏梅花莊詩未審即是二王所居否因録鏞詩附志於此水竹居為朱克恭賦碧水澄潭自作洲琅玕多種屋東頭旋燒新筍安茶竈時斫嘉魚踞釣舟客至罷邀明月飲人間何必五湖遊吾家舊在梅溪上遥憶清風度早秋劉紹五首紹字子憲後以字行建昌新城人明音類選作吉安人洪武中官翰林應奉詩載元音遺響詩話子憲與盱江胡布子申張達季充為郡人張烈光啟胡福元澤類編其詩號元音遺響度其初三人皆不仕于明者而府志載紹於洪武中官翰林應奉文字後以國子助教致仕則不得謂之元音矣登道山亭五言遺響不録考子申詩序云僕與子憲為世姻家曩俱客閩師不克所志斯盖客閩時作子申又為紹作山居十詠其三曰仙臺山則在新城縣西南三十里而元澤編子憲詩題曰黎川劉紹然則紹非吉安人審矣秋懐三首緬俗結紆軫易初吾弗為臨流采香薄日與佳人期舉世厭芳草薰蕕以同施撫襟悵予懐䇿駕臨海涯聞有魯連子千金棄如遺髙情儻可起攜手斯與歸大化日旋運曦娥去悠悠俛仰宇宙間身命誰能留迷復眚在巳不耕寧有秋雞鳴起為善思與大徳禱朝露竟幾何悵然日増憂陰陽鼓槖籥日月如轉丸窅窅神化運誰能測其端春𤾉美萬物秋露淒以寒乘時變榮悴天道終可言邯鄲訪古慕英俠壯游過邯鄲連山飛翠來馬首如揚瀾貰酒呼美人浩歌弔平原憶昔致多士儲才濟時艱賔筵粲珠璣簫鼓清夜䦨蹇我匪脫頴懐賢邈難攀干戈浩縱横長路方漫漫感激詎有巳登車摧肺肝登道山亭名藩跨炎服崇阜極幽爽亭臺納元氣磅礴俯深廣我來屬初霽心與孤雲往蕭颯海樹秋如聞暮潮響摩挲石闌古揮霍霄漢上大有本空虛河山一溟漲淒涼乘槎意迢逓紫霞想濁世誰復然臨風黙惆悵林公慶一首公松江新舊府志失書公字慶字孟善處州人明初官翰林出為松江知府詩話孟善守松江𦵏三髙士子于山東麓見魏文靖集而顧東江作府志官籍民閥皆闕焉不詳後來者更不足責矣長沙岳麓道林何處是郡人遥指水西邨儒官佛寺俱無迹竹樹如麻暮雨昏明詩綜巻五
