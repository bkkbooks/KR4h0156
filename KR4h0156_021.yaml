body:
  text: 明詩綜卷二十一翰林院檢討朱彞尊編魏驥一首驥字仲房蕭山人永樂乙酉舉人由松江訓導纍官南京禮部尚書致仕卒年九十有八諡文靖有南齋前後集鄭窒甫云公性好吟詠矢口適情不求雕飾自然雋永靜志居詩話文靖仕宦四十年官階二品年近百齡可稱嚮用五福其文極醇雅詩雖非專長亦頗藴藉秋興秋高風露涼明月滿庭户輾轉不能眠起縱階前步美人天一方何時遂良晤相思惄中腸坐覺年華暮柯暹一首暹字啓暉一字用晦池州建德人永樂乙酉年十七領鄉薦明年預修大典尋選入翰林知機宜文字進玄詩授戶科給事中坐言事出知永新吉水二縣歷官雲南按察使有東岡集劉上靜云東岡詩文奇崛出人意表清瑩無滓云吳與儉云用晦詩思深沉而幽永宋爾章東岡詩清淡古雅得意處追蹤盛唐九日次黃學士韻客塗逢九日景物為誰賒此地己無酒故園空有花翠微亭下路采石驛邊槎未卜重過日臨風獨歎嗟林真一首真字汝實號木菴莆田人遷居閩縣中永樂乙酉舉人以薦選庶吉士侍書經筵出知慈溪江寧宜興三縣粵王臺屠龍人去幾時歸空有高臺對夕暉回首舊時歌舞地年年春草鷓鴣飛林環一首環字崇璧莆田人永樂丙戌賜進士第一授翰林修撰升侍講有絅齋集詩話侍講未第之先縱酒自放雖在玉堂詩無臺閣氣題林泉清致春山佳氣多白雲滿芳樹幽徑絶塵蹤落花映深戶微雨灑林落東風長蘭步之子招不來滄洲日將暮陳全五首全字果之長樂人永樂丙戌賜進士第二授翰林編修歷侍講署院事有蒙菴集詩話果之五言專法韋栁夢遊匡廬山夢寐遊匡廬晞髮五老峰長天散氛翳削出金芙蓉林谷轉深邃溪回路彌通澄江波淡淡霽日花濛濛隂澗長瑶草陽崖明藥叢樓臺霄漢上雞犬煙蘿中杳渺逢羽人相期躡仙蹤覺來玉堂迥仿佛聞疏鐘丹梯如可接共汝巢雲松送陳廷器歸長樂置酒新亭上親賓儼成行蘭肴雜肥鮮綺席羅瓊漿顧兹繾綣情樂飲各盡觴中筵忽不懌援琴撫清商絲桐易為感離思擾中腸驪歌首前塗僕御促行裝故鄉渺何許路繞川原長願為晨風翼送子東南翔送叔韜兄歸長樂攜手出都門悵然千里心悠悠河橋上送子歸故林川原翳衆緑灌木澄幽隂滄波渺離思黃鳥鳴好音吾家南山下白雲淡遙岑别來幾何時歲月忽巳深誓將從君歸焉能辭華簮遙持一書札因之南飛禽挽蘇伯厚先生寒暑有代謝節序忽蹉蛇夫子乘運化悽愴將奈何生存簪組榮死歿歸山阿向來歡娛人零落亦已多西日不返照逝川無停波戃忽魂若存感慨成悲歌送人尹江右窮冬正蕭索離思苦匆匆風雨孤帆别琴尊幾日同雪晴淮水急雲盡楚天空花縣絃歌暇題詩寄塞鴻謝瑾一首瑾字庭蘭鄞人永樂丙戌進士除刑部員外郎歷郎中出知平陽府遷廣西按察使有蝸濡集李杲堂云蝸濡集於腐題爛句中時作驚人語黃陵廟黃陵帝子昔嬪虞絃斷南薰凰影孤紅盡淚痕傳翠竹青來魂氣隔蒼梧秋風衡嶽沉鴻鴈暮雨湘江怨鷓鴣明月三千年後夜九疑雲冷夢應無曹閶一首閶字冀成江夏人一云黃巖人永樂丙戌進士官監察御史詩話侍御楚産登科録可考而謝方石采其詩入赤城集中期東里一篇情致纒綿髣佛謝監南樓風調期楊士奇不至羈旅無友生何以慰懷思有客筮適我芳辰以為期深叢鳥雀喧窮巷牛羊歸相候清路傍冠佩來何遲我肴既云具我酒亦巳持雖無德與女寫心良在兹子寧不我即佇望增戲欷仰觀列宿行羡此明月輝令德衆所慕彼留知為誰諒無好賢誠空負緇衣詩尹鳯岐一首鳯岐字邦祥吉水人永樂丙戌進士官翰林侍講送兄廣東參政應奎價人藩閫寄旬宣五嶺南行逺著鞭曉日紅亭留别酒秋風黃葉下瀧船青連橄欖千家雨黃觸桄榔萬井煙珍重平生清節在不妨引滿酌貪泉苗衷一首衷字秉彞定逺人永樂辛卯賜進士第二纍官兵部侍郎兼翰林院學士入直內閣進尚書贈少傅諡文康楊思敬東郭草亭宴集芳春倐云暮暇日鳴玉鞘羣公夙有約駕言適東郊冷卿逺相迎會此文字交開筵俯亭沼次第陳觴肴疏花粲簷前好鳥鳴樹梢眷兹百物遂樂飲恣歌嘲詩話鴻臚卿大興楊思敬築草亭於東郭自正統丙辰始歲會文學名流極觴詠之樂自後遂為都城飲餞之地西王尚書詩所云栁隂嘶過馬花塢駐行車者也其後又於崇文門外十里許據渾河之支流有地二十頃以二頃為南園鑿塹環之繚以重垣中植桃杏諸果雜蒔花卉池種芰荷菱芡退朝邀諸巨公燕集其地則東王尚書有序紀之錢習禮一首習禮名幹以字行吉水人永樂辛卯進士選庶吉士除簡討歷侍讀學士升禮部右侍郎卒諡文肅有應制集詞垣續稿歸田稿詩話王元美以錢文肅六典文衡為明盛事考文肅永樂甲辰業為會試同考官宣德丁未再入會埸分考而正統丙辰己未兩次殿試皆充讀卷官辛酉復為順天主考是主文衡者十次矣其詩雖非作家然亦無塵坌氣新橋和余簡討韻初月生遙甸長流遵枉渚方舟泝長河宵分及前侣維梢戒孤征懸燈照清語秋衾夢不成隕籜紛如雨林衡一首衡字宗器閩縣人永樂辛卯進士御史賦得江村片雨外送沈空同片雨江村外霏霏暗去程輕一作細沾芳一作行李草濕逺入斷煙輕歸鳥愁邊沒離情别後生不堪凝望處迢遞失關城熊槩二首槩字元節吉水人永樂辛卯進士榜姓胡除御史出為廣西按察使調廣東宣德初擢大理卿巡撫兩浙及蘇松諸郡升南京都察院右都御史召掌院事兼署刑部事卒於官有芝山居士集雨後江行早出餘杭郭微茫曉色開畫船江上别緑樹水邊回酒為離人勸詩因細雨催故人凋謝久惆悵不勝哀塗中述懷簡張憲副用中李布政昌祺北闕黃門客南宫粉署郎新詩凌鮑謝妙翰繼鍾王儤直趨青瑣讎書向玉堂遭逢懷聖主眷顧倚儲皇超擢之南越旬宣共一方分符來上苑持節去遐荒匹馬炎蒸路雙旌瘴癘鄉豺狼應遁迹恩澤巳宣揚桂嶺開秦塞蒼梧拓漢疆野人疏制度蠻俗少冠裳曉白溪多霧冬青樹不霜四時榕葉暗五月荔支香交誼憐君篤鄉情愧我涼别離寧有恨會合豈能忘傾蓋酬知己分簮祗自傷明朝故園雨回首思茫茫杜桓一首桓字宗表金華人永樂辛卯進士官趙府紀善有艮菴集北山草堂和韻厭彼塵俗喧愛此清幽景雨餘山色佳日落松隂冷不見草堂人白雲三萬頃馬鐸鐸字彥聲長樂人永樂壬辰賜進士第一除翰林修撰有玉巖集送徐主事孟晞回澄江京華二月栁垂絲送子南行惜别離陌上看山愁對酒風前握手倦吟詩雲連鐵甕人煙迥月滿丹陽客棹遲粉署嚴程應待汝莫因鄉國緩來期林志一首志字尚默閩縣人永樂壬辰賜進士第二除翰林編修歷侍讀有蔀齋集菊莊别業依南山投間忽成趣白露朝欲晞黃花滿籬戶餐英慨前修采之恐遲暮苦無三徑資眷此歸來賦鄭閻一首閻字公望閩縣人永樂壬辰進士授安陸州學正改無為州終廣信府學教授有抑齋集懷林鴻寒月照古樹朔風吹城樓如何咫尺居致我千里愁俯景暫自遣浩歌誰為酬思君若逝水朝暮長悠悠陳鎰一首鎰字有戒吳縣人永樂壬辰進士官至榮祿大夫太子太保都察院左都御史諡僖敏有介菴集詩話僖敏開濟之才韻語非其所務湯尚書潛菴稱其文有組舞磬控之樂顧遺集罕傳豫從其裔孫彥瑜所見之録詩一首懷慶道中風捲塵沙驛路迷人家逺近樹高低如何河北風光别春半猶無一鳥啼陳循六首循字德遵泰和人永樂乙未賜進士第一除翰林修撰纍官戶部尚書少保兼太子太傅華蓋殿大學士英廟復辟戍鐵嶺尋放還有芳洲集詩話裕陵復辟吳人盛誇徐元玉社稷之功然奪門二字豈可示天下後世李文達之言當矣豫嘗見少保訟寃疏手稿具陳元玉之讒斯亦纂國史者所當知也少保詩絶意規摹饒越石清剛之氣開平灤河河北開平府云是前朝故上都萬瓦當年供避暑孤城此日事防胡龍岡夜照烏桓月鳯輦時巡敇勒區何處登臨最愁絶李陵臺上望平蕪客寓懷來有詔自行在達京師候謄黃不至有感往時載筆侍清班玉帳頻先覲聖顔一自病中離闕下頓分天上與人間近聞頒詔先歸國久候謄黃未出關咫尺日畿誰報喜西風目斷白雲間野望二首逺違車駕踰三月久抱衾裯滯一州南郭幽居嗟影獨西風落日使人愁天空絶塞飛鴻度草滿平原獵騎遊何似桑乾南下水萬山深處出盧溝欲就邦人詢往事百年耆舊己無存猿啼暮雨佛山寺鶴怨秋風香水園萬仭倚天瓊岫小一泓迸石玉泉溫溫水在懷來西北三十里太平自是多耕牧禾黍牛羊日滿村鷗閣縣城南靣開高閣正俯清江對翠微名勝尚憐如往日登臨常想到科暉閣中諸老仍何在水上羣鷗只自飛茅屋龍洲終遜此何年重許叩林扉東軒半畝溪山舊卜居往來塵迹自應疏春風門巷花開後曉閣軒窗日上初頻理琴尊留上客間攜燈火讀遺書時平隱逸皆徵用丹詔行看下玉除高穀一首穀字克用揚州興化人永樂乙未進士纍官少傅兼太子太傅工部尚書謹身殿大學士贈太保諡文義送倪廷用致政歸嘉興青雲遺宦轍白首賦歸田舊著宫袍卸新裁野服便草堂留月色花徑隔塵緣陶令門前栁春來好繫船牟倫一首倫字秉常宜賓人永樂乙未進士任監察御史以諫謫甘肅留别京師諸友行行策馬去皇畿落木高原獨鳥飛天上故人青眼在蜀中諸弟素書稀秋風故隴雲連棧夜月清笳霜滿衣白髮蕭蕭身萬里不知别後竟何依鄭珞一首珞字希玉侯官人永樂乙未進士選庶吉士改授刑部主事出知寧波府有訥菴雞肋二集送高時旭還閩祖帳連芳草征帆挂夕曛鄉心閩海月客夢楚江雲候館雞聲早平沙雁影分懸知霄漢上早晚薦雄文陳輝一首輝字伯煒閩縣人永樂乙未進士任貴州按察司僉事升廣西副使有琴邊清唱旅次武林期叔剛修撰不至寓宇閟幽寂羈懷轉凄其况兹梅雨候值此麥風時間登溪上樓悵望吳天涯長風卷潮來倐忽銀屋移潮水尚有信我行豈無期緬懷同心人惻然起遐思周敘一首敘字功敘吉水人永樂戊戌進士改庶吉士授編修歷修撰侍讀升南侍講學士有石溪集送袁欽誠少壯辭家去從師千里逰雨深廬嶽樹天接漢江流夜誦分漁火朝吟倚客舟遙知重會日春滿帝王州金誠一首誠字誠之番禺人永樂戊戌進士授工部主事改刑部有集江行一作王佐一作董良史今從韓辿粵音江水悠悠江路長孤鴻啼月有一作帶微霜十年蹤迹渾無定莫更逢人問故鄉蔣仲舒云可仿唐人渡桑乾之作黃閏一首閏字期餘信豐人永樂戊戌進士有竹居集擬唐人長安春望一作空福謝復古詩南山晴望鬱嵯峨上苑春遊玉輦過天抱帝城雙闕迥日臨仙仗五雲多鶯聲盡入新豐樹栁色遙聞太液波漢主離宫三十六樓臺處處起笙歌宗子相云全是盛唐風調晏鐸一首鐸字振之冨順人永樂戊戌進士改庶吉士授福建道御史以言事謁上高典史有青雲集李時逺云振之詩溫柔典麗自是作家詩話振之采明初詩為鳴盛集惜未之見花月金陵十四樓之句盛傳於時或云在宣德十才子之列今其詩存者甚少格調平平僅與海寧三蘇伯仲按俞憲登科考名在永樂十六年李騏榜三甲第三十五人何出光蘭臺法鑒録稱是永樂十三年進士十五年由庶吉士授福建道御史巡按兩京畿山東以建言謫上高典史吾鄉沈孝亷德符野獲編謂是永樂二十二年庶吉士傳聞異辭當以登科考為正也黃才伯撰翰林記謂永樂甲辰科庶吉士不可考題名止書四人其一方復乃壬辰進士王道方懋德甲辰登科録並無其人弇州别集載六人野獲編云其實二十人然六人之外所增益者如劉濬張觀乃壬辰榜周安乃乙未榜沈善李敬木訥曽泉盧璟及鐸乃戊戌榜萬碩王璉乃辛丑榜初疑孝亷偶誤及閲劉文安所撰劉實傳稱實從周學士功敘學書經用以舉進士時宣宗皇帝方隆儒術合前科丁未是科庚戌後科癸丑進士共選得二十八人比列宿數以先朝選士亦嘗若是也然則合先後數科同選庶吉士實始於永樂間矣孝亷熟精掌故日讀一寸書考證極詳是非亦不謬惜其書未刋行於世九峰山行曲徑沿流上下蒼苔白石磷磷落日惟聞啼鳥空山更少行人劉鉉一首鉉字宗器長洲人永樂初以善書徵入翰林中庚子舉人授中書舍人升兵部主事擢翰林侍講纍官少詹事卒贈禮部左侍郎諡文恭有假菴集李原德云劉公詩古淡舂容自有餘味往吳原博云文恭著作不以險怪為工往於和平簡淡之中寓溫純典雅之意其文徵仲云公為詩一字不安更數月必改定矜慎若此送杜亞卿赴南京一尊傾罷雨瀟瀟客思離情總未消草載禁林同侍講五更青瑣共趨朝西風鴻鴈南歸急落日雲煙北望遙此際送君無限意蕭疏楊栁玉河橋曽鶴齡一首鶴齡字延年泰和人永樂辛丑賜進士第一歷官南京翰林院侍講學士有松臞集羅知州之交趾分韻得北字惆悵杯酒間踟蹰衢路側邇别情所難况君逺行客行客適何許南交乃絶域山川阻且修匹馬獨登陟丈夫四海志萬里猶咫尺苦辛諒不辭所思在明德俯視川從東仰睇星拱北還朝會有期側佇聽消息薛瑄二十一首瑄字德溫河津人永樂辛丑進士除御史歷大理少卿纍進禮部左侍郎兼文淵閣大學士卒諡文清從祀孔廟有河汾集蔣仲舒云文清以理學名其詩則非宋調詩話文清讀書録專以宋儒為師其詩有云吾意六籍外尚多古人書一朝秦焰烈焚蕩無遺餘掇拾煨燼者補綴誠區區訛關固巳多盡信寧非愚獨有羣聖心昭哉難翳如多謝宋諸老萬世開迷塗宜於詩亦宗擊壤矣而集中五言醇雅有陶孟韋栁之風豫嘗謂宋之晦菴明之敬軒其詩皆不墮宋人理趣未見有礙於講學又何苦而必師擊壤派也擬古二首孤桐生龍門檿絲出東國相合為素琴不離君子側清彈何悠揚遺音為發越中涵千古心養彼至人德云胡變新聲哇淫日淪惑舉俗逐時好誰能稱在昔萬事亦復然不獨琴與瑟庭竹生涼飇明月從東上候蟲草根鳴夜靜聲愈響逍遙步階除悠然起遐想三皇五帝時淳朴竟焉往王風降黍離禮樂委榛莽反覆千載間雜霸迭相長是非垂不泯勝負在俯仰令人意難平撥置聊自廣古詩二首水火非無功焦溺亦由此君子得其操小人迷所止四海豈不遙發軔良自邇薰風愜民心黃竹蕩人耳善惡反手間胡不慎其始七百卜公旦萬世期咸嬴豈不同所願天道有虧盈岐山麟鳯集函谷虎豹爭趨舍乃如此大運焉得并蓬萊舟始泛博浪車己驚遂使三秦士不獨驪山坑巳矣勿復言九宇皆炎精秋日雜詠二首庭樹生秋風微涼入衾枕久客得無思逺意復誰諗道腴足充餐天和可當飲以兹撥離憂僻好安所稟大義自古來旋覆吾巳審翻翻高荷葉秋雨生微涼豈不懷逺道撫時坐空堂何以為我歡簡䇿多遺芳古人不可作古道不可忘兹理將無墜欲語墮渺茫安得忘言子相與傾一觴答趙彬美人生南國艷色世所稀明眸一回顧草木生光輝我行重嗟惜便欲攜同歸贈以青玉案貢之黃金扉如何久契闊此念將無違雜詠古劍匪新器古瑟匪新音雖無適俗態知巳在所尋充子佩服美感子淡泊心藴櫝固有待無悶良可欽遊習家池谷口一徑入蒼山四邊開中有習池水水碧無纖埃泉源初噴薄交流遂瀠洄飛鳥鏡中度行雲天外來微風一蕩拂林影久徘徊寒光空心性俯玩何悠哉愛此不能去載歌寫中懷遊君山寺為愛湖中山遂尋山下路取徑彌幽遐涉澗亦回互石磴足莓苔青林雜煙霧前行如有窮嵐嶺乍分布招提壓重湖千里周一顧孤峰四無垠形氣自依附山僧復導我窈窕更徐步疏籬野蔓懸老圃寒泉注徑轉山房深重與絶境遇白雲簷外生清風竹間度庭花雜無名歲晏色猶故澄心得妙觀忘言契良晤愛此林壑清遂薄塵俗務重來待何時尚子畢嫁娶渡雙溪雙溪始合流崖渚遂經復洄潭一鏡平秋影空寒緑野渡得孤航山家帶喬木適意方自兹前呵戒童僕撫景重悠然誰能和斯曲東平行臺有竹翳於惡木荒草命僕芟治嘉植乃遂詩以紀之生平若愛竹義若君子交兹軒忽見之俄頃漆在膠振衣步其下周覽增鬱陶惡木一何多蔓草一何饒翳此破苔筍撓彼凌雲梢命僕恣翦伐得辭斤斧勞除惡貴絶本藴崇及溝壕荒穢既了了涼風亦蕭蕭修莖遂生植嘉蔭愜遊遨作詩紀顛末庶為同心謡穆陵關危哉穆陵關高出衆山頂地勢愈覺寬天宇相回迥林木何蕭森首夏風色冷山樓試一登眺覽恣遐騁沂岱環西隂淮海接南嶺齊州走北川扶桑控東影道里會一門山川挈要領緬思千古前豪伯互吞并齊履空復然秦蠶已侵境干戈被長巒生民困魚鼎於今天道旋四裔守安靜山行晝悠然水宿夜無警顧我觀風人符節得屢秉作詩紀兹行傳與山將永瀘川古意三蜀古名郡瀘川古名州我來值殘暑偶此數日留新秋忽改節涼風漸颼飀逍遙散前除仰視天宇周征鳥去不息白雲亦悠悠佳人渺何許重林蔽層丘秋日復西邁大江自東流良辰不我與古道曠莫酬願聞瑶華音行矣旋吾輈褒斜道中褒斜一何長深谷自迤邐雲木青無邊羣峰各峻峙鳥道緣崖顛危棧架江涘冥冥叫子規決決響溪水纍日山峽中陟降亦勞只自我入蜀門今逾一年矣既乏督辨能兼負素餐恥而况鬢髮蒼胡寧不知止上章乞解綬詔許感不已雖云此谷險且遂北歸喜過徐州去年春正月南泛彭城舟今歲值秋暮北上遡長流蹤迹信往復景物愜觀遊風寒堤栁落波減岸石稠白見高城堞蒼出逺山丘何處戲馬臺仿佛燕子樓化遷無停軌事往不可求陳迹竟泯泯虛名但悠悠覽今亦懷昔發聲遂成謳苦雨涼風颯颯雨聲急出門跬步苦沾濕山城拂地雲霧深河渚交流潢潦溢田夫野婦坐歎息園中有棗不可食况復離離禾黍垂及時不得收地力一年百事望秋成秋成奈此淫雨積誰哉為我誅雲師宛見青天行白日久雨遣懷秋來常苦雨風氣早生寒小鳥投林急高鴻下食難奔流淹古道密霧隱前山試誦停雲句中懷獨未寬武陵曉泛今朝風日好來泛武陵溪碧水寒依岸蒼林逺護堤沙光搖野馬人語散鳬鷖二月桃花發還應處處迷黔陽山中景好寧知是異邦竹籬茅舍枕蒼江吏情更有山林趣緑樹門前畫戟雙竹枝歌錦官城東多水樓蜀姬酒濃消客愁醉來忘却家山道勸君莫作錦城遊于謙十三首謙字廷益錢塘人永樂辛丑進士除山西道御史擢行在兵部右侍郎罷為大理寺少卿景陵踐阼拜兵部尚書加少保英宗復辟棄市成化中贈太傅諡肅愍後改諡忠肅有集陸子淵云于公有社稷功其詩亦足冠冕時輩道夏時正云詩文多至千篇皆填撫餘間車馬塗寄興之作及秉邦政不復經心所見僅一二爾語皆自胸次流出思親戀闕憂人及物眷眷不忘溢於言表詩話少保社稷之臣其詩特多秀句如風來疏牖銀燈暗月轉高城玉漏遲紫塞北連沙漠去黃河西繞郡城流野花偏向愁中發池草多從夢裏生千里逢人俱是客十年持節未還家鳥飛不過巖頭石人渴難尋澗底泉風約暗雲難作雨渠分流水不成河炕頭炙炭燒黃鼠馬上彎弓射白狼天外青山圍故國雨中黃葉下空潭皆意態自然不煩雕琢其論詩曰詩豈易言哉發於心形於歌詠盡乎人情物變非深於理而適於趣則未易工也觀其持論造詣深矣自歎我生四十餘己作十年客百歲能幾何少壯難再得今朝太行南明日太行北風雪敝貂裘塵沙暗金勒寒暑互侵凌凋我好顔色齒牙漸搖脫鬚髮日以白位重才不充况此遲暮迫早賦歸去來庶免清議責暑月將自太行巡汴三晉衝寒到中州冒暑回山川元不改節候自相催緑樹連天暗丹葵向日開太行雲縹眇搔首意徘徊遊春滿路香塵起尋春思欲迷樹晴鶯出谷溪暖燕銜泥玉勒嘶芳草青樓瞰大堤風光無限好都在畫橋西春日大風感懷逺塞足風沙春深不見花層氷猶度馬弱栁未藏鴉易醉愁邊酒頻歸夢裏家憑闌一搔首心緒亂如麻除夕夜坐感懷秉燭焚香坐不眠夜長難到五更天懷人此際隔千里為客明朝是十年逺道風霜今老矣故園梅栁想依然椒盤獻歲知誰共獨把深杯對影傳秋風蕭蕭入夜動清商披拂園林草木黃快意掃除天下熱何人吹送枕邊涼荻花楓葉愁江渚蓴菜鱸魚憶故鄉萬里碧天雲散盡衝開征鴈不成行偶題倦鳥投林處斜陽在樹枝薄雲收未盡山雨乍晴時春夜長風送華月照我庭前樹宿鳥忽驚飛雙雙背人去平陽道中楊栁隂濃水鳥啼豆花初放麥苗齊相逢盡道今年好四月平陽米價低上太行西風落日草斑斑雲薄秋容鳥獨還兩鬢霜華千里客馬蹄又上太行山夏日憶西湖風景湧金門外栁如煙西子湖頭水拍天玉腕羅裙雙蕩槳鴛鴦飛近采蓮船暮春客塗即景雨中紅綻桃千樹風外青搖栁萬條借問春光誰管領一雙蝴蝶過溪橋擬吳儂曲憶郎直憶到如今誰料恩深戀亦深刻木為雞啼不得元來有口却無心劉球一首球字求樂更字廷振安福人永樂辛丑進士授禮部主事改翰林侍講以忤王振矯旨下獄死景泰初贈翰林學士諡忠愍有兩溪集李時逺云忠愍金舂玉映如月璸天犀人共寶之山居水抱孤村逺山通一徑斜不知深樹裏還住幾人家陳叔剛一首叔剛名棖以字行閩縣人永樂辛丑進士官翰林修撰遷侍讀有絅齋集錢原博云侍讀詩沖和贍麗諸體各極其妙松坂亭亭萬松林别構僅容膝席隂無冬春簾翠自朝夕主人愛松風靜聽意自適清吟到夜分明月在巾舄是非曠不聞煙霞已成癖我有小山謡期君謝間逸黃鶴遊青冥汗漫不可即萬節一首節字資中安福人永樂辛丑進士除知榮昌縣入為御史遷廣西按察副使有雪坡集漁村夕照獨槳村西漁艇重門樹底人家夕照平蕪逺近小橋流水橫斜張楷三首楷字式之慈溪人永樂甲辰進士授江西道御史出為陜西僉事轉副使擢都察院右僉都御史有和唐集徐子元云式之和唐所謂服堯之服惜其自作殊不疾意蔣仲舒云中丞遍和唐詩可謂捧心效顰究其才致亦一時之彥也詩話中丞和唐不獨律詩踵韻而已至歌行古風并上句亦和之同時餘姚陳贄維誠亦然登黃鶴者必賡崔皓之章宴滕王者必仿子安之體人雖至愚不愚於此矣其在閩提督軍務除夕作詩云亂離何處覓屠蘇濁酒三杯也勝無又云除夜不須燒爆竹四山烽火照人紅為言者所劾而罷此殆非和韻詩宜其中禍後舍和韻不復作也漢宫曲日暮上簾鈎春花壓翠樓忽聞宣召急羅帕掩箜篌江南曲忽得三巴信郎歸未有期只言風浪險不是薄情兒江南春滿川啼鳥怨殘紅水郭春園栁絮風春雨一番江水濶草痕將緑到吳中明詩綜卷二十一
