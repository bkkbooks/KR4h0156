body:
  text: 明詩綜卷七十八翰林院檢討朱彛尊編楊廷樞二首廷樞字維斗吳縣人崇禎庚午鄉試第一有古柏軒詩集徐孝若云維斗吾黨之李元禮房伯武也見義當前突怒無畏近讀其遺詩人之云亡遂成千古之憾悲夫靜志居詩話先生倡應社於吳中評隲五經文字張溥天如朱隗雲子主易楊彛子常顧夢麟麟士主詩周銓簡臣周鍾介生主春秋張采受先王啓榮惠常主禮記而先生與嘉善錢旃彥林主書後與復社幾社合領解之後聲譽日重門下著録者二千人詩雖遊好然如吉光孔翠片羽皆足為珍且勝於服習竟陵派者多矣晚嵗巖居忽罹維縶其舟中遺書云廷樞幼讀聖賢之書長懷忠孝之志為孝亷者一十五載生世間者五十三年作士林鄉黨之規模肩綱常名教之重任惜時命之不猶未登朝而食祿值中原之有難遂蒙禍以捐生其年則丁亥之嵗其月則孟夏之中方隱遁於山阿忽陷身於羅網時遭其變命付于天雖突如其來如亦已知之久矣生平所學至此方覺快然千古為昭到砥終為不沒但因報國無能懷志未展終是人臣未竟之事尚孤纍朝所受之恩留此血衣以俟異日舟中矢志不能盡言末書四月二十八日復系以十絶句文多不録訛聞世塗繒繳多結廬在窮谷神悴嗟樊雉心危怯庖鹿耳目異驚喜早暮更禍福先憂纍親朋失色觀奴僕共傷衰德鳳應賦知命鵩且當飲醇酒勿向詹尹卜舟中野岸官橋路已蕪寒江暮雨客舟孤煙中帆影時開落霧裡山光半有無宿鳥驚心猶未下哀猿引臂自相呼淒其古渡黃昏候一點漁燈起荻蘆劉曙二首曙字公旦别字稚圭長洲人崇禎癸未進士除南昌知縣未赴居父憂坐事械至江寧死于市有節必居稿乙酉八月十四夜匿影農家夢楊維斗作襆被短簷下月華靜窺帳子來入我夢顔色耿相向為别亦已久不問别來狀互言白髮新慷慨復悽愴分袂還踟蹰欹枕轉惆悵緬思定交日總角氣方壯文酒多寄懷圭璧有微尚中原今陸沈吾道未淪喪亂離憶朋儔雞鳴不能忘乃知君與友一氣相摩蕩浩歌絶命辭與子共酬唱所敦在宿昔存沒總依傍相期泰華顛千秋訊無恙烹悟泉因懷王克仲相依謀已定相望意仍違清夢勞明月孤吟繞翠微分泉甘苦共脫帽往來稀漸欲尋山徑秋風一款扉顧咸正五首咸正字端木崑山人崇禎癸酉舉人除延安推官後死于難詩話端木文康曾孫與弟咸建咸受子天逵天遴父子兄弟五人後先授命可謂不愧相門此外江陵有孫同敞别山嘉善有子柄仲馭而家叔祖成都府同知大定君永均與烈風中徑草比節使後之作史者仿新唐書宰相世系撰表亦足以生色矣登華山倚杖髙臺萬里秋山川元氣共沈浮金神法象三千界玉女明妝十二樓井鉞參旗皆北拱濁河清渭盡東流愁看殺氣關中滿獨立南峰最上頭落葉亭皋秋色乍淒其葉葉枝枝悵别離靜院翻風人倦後小窗敲雨夢驚時飄零漢殿哀蟬曲憔悴陳宫玉樹詩却恐尊前歌舞罷故園楊栁又依依沈山子云落葉詩題顧氏昆友並作而端木尉貼尤為擅場上方巖層層白雲堆石屋架其上鳥雀靜不喧半空人語響糊猻愁人心險于山平地覆車馬猢猻亦何愁愁爾登山者新製藍布袍口號鐵甲縱橫日綈袍寂寞時難將故鄉淚低向袖邊垂夏完淳十一首完淳字存古松江華亭人考功郎允彛子有玉樊集南冠草鍾廣漢云陳大樽選明詩存古年才十餘爾而宋轅文援其論詩以作序此時已許其作後進領袖矣逮十五從軍十七授命磨盾草檄不異老生宿儒信異稟也詩話存古南陽知二江夏無雙束髮從軍死為毅魄其大哀一賦足敵蘭成昔終童未聞善賦汪踦不見能文方之古人殆難其匹仿古月出西南樓流光入幽室盈盈十五女綽約好顔色素手響金徽一彈三太息激楚變清商悲惋難自抑本以待逺人所遇非疇昔薰風蕩羅綺卧懷行旅客夢中迷逺道疇能辨南北飛禽習習還疑是君行迹征雲無歸期倣徨淚盈臆秋懷五首祝融避炎陸金天肅秋駕玄蟬響髙樹鶗鴂鳴深榭豐草承露零朱華冒風謝蟋蟀變東榮素河轉西野自愧蒲栁姿奄忽從物化久視多所悲疇能竟長夜涼風何瑟瑟吹我遊子顔厯厯江上林流蟬鳴其間浮雲西南征一去何時還駕舟淩洪波杖策窮崇山君子不遑息小人豫以間感激在溝壑敢念徒旅艱中夜起百憂勞人獨長歎秋色從西來風物自淒緊金飇辭炎暉玉露戒商軫鶗鴂薄暮鳴幽蘭望秋隕零落在一時榮華若朝菌髙從巢父棲下與壺公飲靜觀百嵗間無名以為準耿耿秋夜光雲中覩靈匹漢隂無報章河陽有棄軛霧裙結雲環瓊珮何厯厯佳期匪綺節妙會乃涼夕微露鮮玉枝輕飇動雕翼餘光歘欲馳流景逝已迫黃姑九秋期婺女三光隔仿佛靈駕回參差空夜織愁人不能寐羅帳含月光涼風吹芙蕖習習生金塘絡緯鳴參差瓊露凝玄霜柔條日以徑瑤草不復芳盛衰各有時憂來浩無方玄髮忽改白使我身世忘魏禹平云存古秋懷諸作非謝非韓遊衍自得精衛惠風蕩芳樹有鳥鳴中林尾長羽翼短銜石隨浮沈崇山日以髙滄海日以深既無凌風姿延頸振哀音辛苦徒自力慷慨誰為心惜哉志不申道逺固難任滔滔東逝波勞勞成古今楊栁怨東風初度春江曲大隄花草參差緑昨宵煙雨盡傷心今日鶯花空滿目有客扁舟迥自傷一江春色半垂楊始知啼鳥皆牽恨不是征人亦斷腸秋夜感懷登樓迷北望沙草沒寒汀月涌長江白雲連大海青征鴻非故國橫笛起新亭無限悲歌意茫茫帝子靈送杜于皇歸郢分手金陵道相逢倍黯然鶯啼楊栁岸人在木蘭船客路三千里征衣十二年計程歸夏口眀月兩回圓寶帶橋連天芳草青極浦獨揚舲歸鴈舟前落愁人夢裏聽花光迷曉霧波影亂春星欲訪靈威穴孤帆入洞庭葉尚髙一首尚髙字而立樂清人溫州府學生詩話而立兵後佯狂幅巾大袖行於市太守見而執之賦詩云云釋之不問丁亥二月上丁攜水一杯采芹一束乘太守未釋奠哭於孔子之庭曰吾師乎吾師乎縱泰山之已頽曾林放之不如乎太守至怒繫之獄逮五月四日語獄卒曰詰朝屈大夫沈湘之日吾其死夫俾具湯沐至明自經而立詩無存市上所賦特遊戲耳然亦孟棨計有功輩所當録者上太守北風袖大惹寒涼惱亂溫州刺史腸何似蜉蝣易生死得全楚楚好衣裳林垐一首垐字子野候官人崇禎癸未進士除海寧知縣家居死事有恥齋集為鄢德都畫竹所南之蘭無土恥齋之竹無根想見百千年後熒熒紙上血痕瞿式耜一首式耜字起田常熟人萬厯丙辰進士以右僉都御史巡撫廣西死于難有寄傲集遊虞帝祠次金道隱韻祠宇蕭疏迥絶塵孤峰隨意著間人窺雲應傍巢松鶴破浪終同入釜鱗茶碗酒鐺全部史風篙月槳一江春豫與子暇道隱扁舟泛月而歸却憐嶺嶠曾無恙便託荒巖老此身陸氷修云向隅之語誦之淒入肝脾吳鍾巒一首鍾巒字巒稚武進人崇禎甲戌進士除長興知縣謫紹興府照磨升桂林推官大庾道中亂離何地度年華老至仍憐去路賖共指此心猶似水相逢多説已無家關山寂寞行人少雲樹蒼黃落日斜逆旅挑燈愁獨寐夢思應繞赤城霞李向中一首向中字豹韋號立齋鍾祥人崇禎庚辰進士除長興知縣調秀水升車駕主事未任補職方舟山下被執不屈死題旅舍雲外平林東郡天邉落日西峰悲涼此夕何夕燈火黃昏店中周世臣一首世臣字穎侯宜興人崇禎庚辰進士除漢川知縣以建言革職補永平府簡較升興化推官遊仙詩圜丘列竒樹北海生神芝翡翠曜瓊圃潛鱗戲瑤池飛泉供潄齒白石為療飢姮娥降洪響宓妃頷其頤隨煙上三島飄風凌九疑持此傲下士投簪來逺期余鵾翔一首鵾翔字唱若號誕北辰溪人天啓乙丑進士除金溪知縣調遂溪入為户部主事厯員外郎以布政參議守徽寧道轉山東遷浙江按察副使調山東聞劉念臺先生被放皇威方震虩忠愛此時心抗疏回天苦憂時去國深雲從歸路暗日為逐臣隂慘淡春明水秋蟬寂未吟萬曰吉五首曰吉字允康黃岡人崇禎庚辰進士崑山知縣有東有堂詩四集塔影園半壁依青嶂千峰落翠微草堂氷雪路山鬼薜蘿衣斷塔仍棲鴿荒岡亦採薇中原方格鬭坐卧掩柴扉寒食東郊朝日靜北郭暮煙遲燕不巢新幕花猶戀故枝懶投分肉社羞逐鬭雞兒屏絶人間事綿田弔子推送吾無上人返廬山萬里秋聲急青楓古渡平潯陽潮自落楚岸月孤眀破衲飢寒去芒鞋雨雪行爐峰遙在望惠逺定相迎哭艾千子膚髮臣無恙朝廷事已非斯文將墜地先死亦知機遺業驚殊域孤魂戀舊畿酸風吹劍水丹旐暮雲飛謝客甪里先生小築居蕭然衾枕半牀書閉門覔句江湖外濯足招魂雨雪餘卯酒動思千日醉辰瓜準擬一犁鉏五陵公子多裘馬同學何人問草廬朱日升一首日升字君旭淮安山陽人崇禎癸未進士弔宋叟天髙木落起憂思秋士悲歌正此時何處靈均尋舊迹臨風三歎薦江籬李之椿一首之椿字大生如皋人天啓壬戌進士除行人遷吏部主事厯官尚寶司卿有指樹園集朱雲子云徂徠五律工秀起句尤用意如春曉淨江天青山入畫船家家楊栁靑車馬不曾停真不減唐人風致虎丘弔五人墓亂賦兒孫擁安危呼吸爭五人能就死衆正始俱生矯逆原非詔拳凶不為名忠魂今尚在時映夕霞眀項禹揆一首禹揆字子毗秀水縣學生與李之椿同遇害和定齋陳子閉關聞道牆東客翛然避竹隂泥封清濁酒箋輟短長吟沮溺耕焉耦求羊徑轉深看君同臭味可許獨幽尋眭本一首本字允立丹陽人明永子縣學生坐事死有務菴集和袁景文白燕詩瑤海春深舊壘非水雲漠漠望依稀雪中曳縷飄紅去月上窺簾傅粉歸莫以處堂怡玉羽豈將巢幕語烏衣故宫别殿今何向冷落梨花影共飛張煌言二首煌言字玄箸鄞人崇禎壬午舉人詩話文信國至燕元世祖命具供帳如上賓既戮於柴市臨朝歎曰文丞相好男子不肯為吾用殺之誠可惜也興朝之主待亡國之臣其恕若是聞公就執制府趙清獻公待之以禮慰勸再三卒以不屈含笑受刑殮而葬之雷峰之右至今有包麥飯而祭者清獻之寬仁足以頌矣樅陽謠二首八尺風帆百丈牽樅陽湖裏去如煙江南米價秋來長喜殺桐艚賣稻船沿湖下網蕩湖船網內纎鱗錦樣鮮燈火湖光兒女笑魚秧種得不須田黃周星二首周星字九煙上元人育於湘潭周氏中崇禎庚辰進士除户部主事疏請復姓晚居湖州有芻狗齋集詩話九煙晚變名曰黃人字曰略似又號圃菴又曰汰沃主人又曰笑蒼道人布衣素冠寒暑不易人有一言不合輒嫚罵嘗賦詩云髙山流水詩千軸明月清風酒一船借問阿誰堪作伴美人才子與神仙年七十忽感愴于懷仰天嘆曰嘻而今不可以死乎自撰墓志作解脫吟十二章與妻孥訣取酒縱飲盡一斗大醉自沈于水時五月五日也又仁和陳叟繼新居於禾晚節納石子懷中赴龍淵寺門潭中死均不失為申徒狄徐衍一流天台勝迹天台路移情入窅冥亂泉秋後寺絶壁古時亭槲葉岸多濕蓮花峰更青白雲吾語汝且向石梁停秋日與杜子過髙座寺登雨花臺被髮何時下大荒河山舉目共淒涼客來古寺談秋雨天為幽人駐夕陽去國屈原終婞直無家李白只徉狂百年多少憑髙淚每到西風灑幾行錢栴一首栴字彥林嘉善人崇禎癸酉中順天鄉試以薦除職方主事進郎中坐事死於市有白門集俞右吉云彥林貴公子性好結客復社未舉之先吳有應社彥林實倡之平生與卧子交最深卒同其禍仲子不識女壻夏存古咸有神童之目存古年十七慷慨就死與婦翁白首同歸尤世所難也詩話吾鄉科第之盛數嘉善錢氏撫軍相國二房聨華接武相國有仲馭撫軍有彥林後先以死勤事賢子弟固自難得七夕獄中作對泣南冠度綺宵江鄉千里客愁遙雙星若識人間事也定淒然罷鵲橋徐爾穀一首爾穀字似之嘉興人國子監生坐事被逮死白門有畫水草堂詩稿贈顔先生萋萋芳草望中迷落盡棠梨水拍隄誰向扁舟憐别客白雲相送板橋西明詩綜卷七十八
