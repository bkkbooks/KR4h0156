body:
  text: 明詩綜卷八十翰林院檢討朱彝尊編張鹿徵四首鹿徵字瑶星後更名怡亦作遺應天人都督可大子以府學生承廕歴錦衣衛正千户甲申陷賊不屈受刑潔身歸隠居攝山不出自號白雲道者有古鏡菴詩内外集靜忘居詩話山人生時囿中鹿亦産子因名鹿徴而以瑶星為字崇禎間曾仕錦衣故其六十初度詩云當年執㦸侍明光親見彤雲捧玉皇也山居鈔書頗多著述甚富予所見者僅玉光劒氣集謏聞正續筆數種而已曩造其山居見案頭有手抄宋李張炎叔夏詩集一卷今其遺書不可復問詩亦流傳者寡矣友人移居居市厭市嚻入山苦山僻非山非市間卜兹五畝宅到門水一灣眠沙鶴一隻遥望鐘阜巔雲霞幻朝夕乍見雨脚沉忽焉晴絮襞主人如㝠鴻髙舉不可弋丘壑盪心胸花竹恣夷懌何時載酒過為君理雙屐送萬年少歸淮陽握手與子别勸子進一觴風日何黯澹道路阻且長舉世矜中行無復狷與狂達人志寥廓世事等粃糠濯足臨溪水散髪晞朝陽溪水日東流歸彼百谷王朝陽隠豐蔀昏曀鮮晶光擾擾棼絲中誰為振其綱慨彼北風詩虚邪徒自傷雜詩淺水平沙路淪漣繞一邨夢回天地老亂後友朋存芳草生幽澗新鶯語小園看山廣武後久不望中原送葉榮木入閩野鶴孤蹤道士顔層林千里入閩闗不知烏石峯頭路可似江南雨後山薛暨一首暨鄞縣人縣學生有面牆小稾夏日水閣虚凉枕簟清榴花栀子覆牕明緑隂滿地日卓午卧聽鵹黄啼一聲陸璉璉字茂璩吳縣人兩中武科甲申後削髪居蓮子峯下自號了縁道人有楓江遺稾題徐元歎落木菴栖巖有精舎窈窕挂藤蘿天與幽人占山偏落木多連峰當户立一澗遶門過近有離騷作非因學楚歌張紀一首紀字齊方崑山人振德子承廕錦衣衛所千户挂冠歸有槩菴集江邨春望春風爛漫遶天涯曳杖江邨攬物華身在故鄉仍是客心從安處即為家貧來生計號寒鳥病後居諸赴壑蛇更得幾年還健在青門常種邵平𤓰吳璵一首璵字于庭休寧人國子監生荅閨人寄懷東風妝閣厰檐牙春鎖重扉樹樹花自是王孫歸未得漫隨芳草到天涯龔賢一首賢字半千上元人百苦百苦不一樂中宵夢忽清有家長作客到老尚謀生牆月背人下野風空自鳴明朝渡江水前路未休兵楊焯二首焯字俊三吳縣人秣陵雜詠二首形勝瞻天闕飄零問故宫金笳淮水北玉露蔣陵東百戰黄圖盡重來紫氣空西京耆舊在辛苦說闗中西望窮牛渚中流雙闕分征帆江外斷鼔角夜深聞地擁龍山雪天連鵠塞雲開平飛渡處寂寞百年勲戴冠一首冠字峩仲一名易字南枝紹興山陰人有釣臺詩集詩話峩仲髙人與徐孝亷昭法結物外之契嘗賦釣臺詩累百首託以見志裒而成集覽之未免牽率友人續示集外詩四首録其一焉釣臺懷古已分垂綸老此生山田是處可躬耕逺攜仙女全家隠深悔羊裘大澤行一夜星辰凌帝座九重貴賤見交情請看七里瀧中水未到錢塘徹厎清張穆一首穆字穆之東莞布衣有鐵橋山人稾酬客吾本羅浮鶴孤飛東海東寧隨南翥鳥不逐北來鴻坐愛千年樹髙逾五尺童乗軒亦何苦隨意水雲中温良一首良字叔子一字散宜烏程縣學生有大愚詩稾冬日游景谷塞原林壑静獨往暮雲生嶺雪兼山逺河冰激石鳴修篁翻鳥影古寺報鐘聲塵壒無由到臨流罷濯纓汪中柱一首中柱字為石歙縣人杭州府學生有光霽軒集唐栖夜泊停橈繫淺岸寄迹似飄萍稻黍平疇熟魚鰕晩市腥殘烟籠古樹逺火映迴盍旦爾何意勞人枕上聴紀映鍾一首映鍾字伯紫上元人城邊路城邊路歌舞處十年變為墓十年犂為田十年成淺渡曽傳燦二首傳燦字青黎寧都人有止山集淮隂釣臺漢高櫟釡羮劉毅子鵞炙古人恩與仇遂乃在飲食至今漂母祠朱甍耀霜日夜坐古樹揺寒風空牀對羇旅夜坐寂無人孤燈竄蒼䑕陳祚明二首祚明字嗣倩仁和人有稽留山人集北征雜詩秦郵湖曲路夜半獨行舟月出光于水蟲鳴響似秋荻蘆明逺岸城闕漾中流更照篷牕裏蕭蕭映白頭送劉石生歸秦中送爾難為别迢迢惜逺征君言不得意匹馬返西京冰雪辭燕市烟花入渭城計程逢改嵗千里客裝輕陸嘉淑四首嘉淑字冰修海寧人有辛齋遺稾詩話冰修崇情逺跡髙酣長謠文采風流溢于賓座晚雖藏身人海而青蓮在泥心終不染中秋長記中秋月當年坐夜闌祗今雙鬢影畏向一輪看節序驚心換光輝到面寒清尊不堪把哀樂本無端登縹緲峯樹杪輕輿去復留百盤初盡午烟收岡巒委地低全見墟市浮空翠欲流輕浪受風揺别島斷雲兼雨失前洲山根處處堪垂釣何日滄浪具一舟姑蘇懷古二首離離春草射臺迷苦酒城荒舊築低一夜虎丘山下雨萬株楊柳緑初齊戰殘江郭楚公旗野笛吹過短簿祠山上有城人不識蛇牀花滿舊時基韓純玉十一首純玉字子蘧歸安人修撰敬少子有蘧廬詩集詩話中吳韓君望西吳韓子蘧皆輯明一代之詩君望曰詩存子蘧曰詩兼惜其書均未布通都二子先後奄逝其家人故友不復肯出恐終歸覆醬而已雜感二首穠矣棠棣華開當芳春時緐霜將洊至何為發髙枝霜飛一何早花開一何好但恐忘憂萱化作斷腸草蓼蟲及桂蠧甘苦各自安賦性固有在分定不可干我珮雖言雜豈充椒與蘭游黄龍洞望太湖登山水始白映水山更青山水相照曜萬象無遁形遥天覆笠澤逺岫浮洞庭羣峰七十二散布如漂萍遊雲變湖影長風吹漻泠中多萬斛舟揚颿無時停東流趨瀚渤北望窺支硎直欲傲廣漢豈止欺濁涇崖端冠危石崔巍復瓏􅌑混沌不自惜穿鑿疑五丁險怪駭神鬼鬱積生雷霆深淵開絶頂習坎類井陘井收原勿幕天闕終未扃神龍在其下屈伏猶蝘蜓潛雖勿當用時或肯效靈春秋䖍祀典歆享惟德馨遺黎苦旱魃好雨亦既零吾來恣憑眺徙倚觀翠屏漁歌和樵唱風磴連雲汀時見莓苔際古人曾勒銘撫掌笑伯益失載山海經題張鐵橋畫馬鐵橋年已七十五醉裏蹁蹮抜劒舞餘勇猶令筆墨飛迅掃驊騮力如虎維縶蕭蕭古白楊四蹄卓立明秋霜昻然顧盼氣深穏風鬉霧鬛非㝷常用之疆場一敵萬如何閒置荒坰畔壯心烈士悲暮年永日披圖發長歎䑕晝遊嗟爾穿墉物晝遊安所之見人空有禮出穴竟無疑五技未曾有兩端宜自持漫漫失長夜此去亦堪危春日過金陵䇿馬丹陽道行人白下來山青龍虎地草緑鳳皇臺舊苑花仍發新亭客自哀蒼茫風景異懷抱幾時開菱湖晚泊望望武陵城扁舟兩日程遥峰天際沒孤月霧中生澤國長多盜荒邨亦駐兵昇平何日事把酒壯心驚楚歸嵗暮江行雜詠二首久泊忽開艐鄰舟欸乃同沙明千里雪帆借半江風皖口之京口呉宫望楚宫溯洄㝷往跡泯滅亂流中一舸乗流下臨風望玉臺逺帆如不動近筏忽浮來水過潯陽急山從建德開長江天作塹此際重徘徊寓興國寺作擔簦栖古寺倚杖識殘碑栢樹傳神禹桃花祀息媯㝷幽歸路晚望逺下山遲浩浩長江水東流到幾時自注興國寺古栢相傳大禹手植息夫人廟在桃花洞稱桃花夫人起戧江中順流而下逆風使帆也江舟强于邁風水力相爭潦尾循環見波心曲折行持盈看往復濟險任縱横閱世從吾術危塗處處平楊炤二首炤字明逺先世清江人移家長洲補縣學生有懷古堂詩選顧與治云明逺詩一往超詣出人意表詩話明逺詩評者比之雪山醍醐吾嫌其太滑長蕩春汎春心不自抑率意為歡賞既洽㝷山興復生涉江想恰當風日佳悠然進蘭槳緑楊映垂垂黄鸝鳴兩兩此時盡一尊浩歌激清響遙望秦餘山開懷對西爽斜陽半邨户逺岸挂漁網逶迤出前浦蒼蒼月初上戲詠顔子陋巷居安貧固為好萬一受命長簞瓢至於老此時白髮翁非肉則不飽百年常飢劬無乃太枯稾安夏二首夏字大已無錫人有九龍山樵詩雜興日日雙扉掩經旬罷整冠夕陽僧寺逺秋雨女蘿寒有竹深藏屋無花強倚䦨新來縁病嬾不上釣魚灘初秋寄友年年秋水碧連天望斷楓江釣雪船彭澤柳絲疎野岸邵平𤓰蔓冷湖田謀生計拙重憐病排悶詩多或廢眠牢落故人空入夢豈徒雙鬢轉蕭然方授一首授字子留桐城縣學生有秦川草野外野外無拘束青鞵東復西山行慿一杖草宿慣雙谿滑想流匙飯甘餘入饌雞何時與兒子隨意得幽栖俞南史一首南史字無殊吳江人僧舍㝷武伯不值竹户蘿闗一徑深獨來惆悵對空林寒梅白徧春山曲只在花間不可㝷顧樵一首樵字樵水吳江人題吳儀部讀書處軒牕面水晝常開嶺樹千重入座來二月山城飛燕子銜泥先到讀書臺鄧森廣一首森廣字東之桐城人崇禎中貢生有杲園集巫山髙巫山峭石與天齊巫山峽裏白雲低行人莫向巫山路猿到巫山亦夜啼陸繁弨一首繁弨字儇胡一字拒石錢唐人晨步韜光道中示移暉上人苔徑凌晨步籬花帶露垂溪雲流不盡海日起何遲往事每多悔他生未可期不如歸白社杖履日相隨馮愷愈五首愷愈字濟仲一字道濟慈谿人元飇子有涉江録西江詠贈别方爾止豐山西距蜀山東廿載賓朋聚散中賸我孤遊㝷舊壘把君好句弔秋風雨侵水榭更籌澀涙逐歌筵蠟燼紅斗酒更要連日醉老年兄弟幾宵同舟中寄六弟家園花事總參差舊種新栽繫逺思木筆纔移成玉樹櫻桃小接是垂絲曾教隴鳥分明語未絡珠藤一兩枝憑仗六郎勤看取三三徑裏好題詩榕堂雜詩三首紅牌祖訓甚分明進講詞臣合講經白日雷霆臣萬死尚聞天語喚先生黄公道周平臺召對事片語誰傳人不死一時萬口沸都城嚴霜獄底黄詹事捧血淋漓冩孝經蘆花殘月幷蕭蕭曾囑金風玉體調華表夢中先得路歸魂只溯海門潮孫公碩膚没于海外葬蘆花洲上丁丑春公與計偕夢身卧狀元坊下南宫既㨗常歎其無徴及窆骨處乃國初張狀元墓道也公昔投子手札有金風方厲玉體善調之語謝晉一首晉字無可晚更名孔淵㑹稽儒學生贈余若水城南隠居宇内忽岑寂草木黯不芳獨有嵗寒姿勁節凌清霜平居慕栗里松菊猶未荒此生但飲酒笑傲同羲皇時㑹既已殊意計難可量遥遥北郭望淒風起白楊故知年夀永不若名行章哲人秉嘉德自使寵辱忘屈伸歸里道出處隨天常葛巾漉糟粕短櫂歌滄浪古人不可即日月長杳茫錢肅潤一首肅潤字礎日無錫人有十峯草堂集和徐㮤之九日雨阻堆山園居閒居今日易行路古人難舟楫江方永干戈枕不安逺烟千嶂合積雨一天寒此際逢重九茱萸未忍看陸世儀一首世儀字道威太倉州人有桴亭稾夜泊鹿城渡頭星月暗離思滿歸舟此夜聞風雨山城一片秋顧超五首超字子超吳縣人詩話韓髙士洽有明詩存選本其最心折者子超之長歌大約兼仿温飛卿李長吉而神明之惜其全稾求之不得吳徴士景果偶得鈔本録其五詩當崇禎之際吳俗談詩者多惑於楚人之咻以空疎蕭寂相尚若子超之出入經籍卓然羣雅之遺葑山亭鶴艇蕩鷗沙游人在空曲年年采香處露冷蘭苕緑憶昔風雨中髙牕幾回宿鄭駙馬冡南國織錦愁花草春如翦騕褭女蘿叢隂風落紅蘚非無十畝宫漸逐耕犂轉石馬嘶入潭金蠶不成繭夜半玉簫鳴焄蒿發淒泫東邨包山名勝聞九州可以卜居非一丘昔人競誇西蔡麗吾來獨愛東邨幽黎紅柰紫櫻桃赤雨後落花分五色腰䥥手甕鮮游民出入無非灌園客桃源去俗僅一塵孤花片水猶迷人此間髙峙浪千尺無怪從來少問津梅花二首香雪伶仃瘦莫支玉壺冰滿漏遲遲寒生紙帳春多夢影過銀屏風倒吹遥憶斷橋無月夜最憐蕭寺閉門時棃花白燕空惆悵前後相思兩不知凍碎玻瓈片片冰珍珠簾外雪層層飲教月落重開閣坐到星殘不用燈谷口去年曾送客嶺頭今日又逢僧江山無限留情處幾欲攜家竟未能鄭女冢自湔金粉割紅緜桃杏無顔五百年晉日尼師皈白佛唐家貴主事金仙春寒宿草猶迷蝶露濯空桑欲化蟬幾處禁烟人涕淚玉棺風雨但聞鵑詩話鄭駙馬冢在洞庭山駙馬生女示疾不嫁舎身為尼葬于山中釋寳唱比牛尼傳晉土比丘尼自洛陽竹林寺浄檢始唐㑹要睿宗第八女金仙公主入道蝶用韓馮事蟬用齊女事用古却似玉溪生蔡仲光三首仲光字大敬蕭山人涼州辭賀蘭千嶂朔風秋萬里黄河入塞流滿地悲笳邉月冷最傷情是古涼州排遍水調聞歌淚滿裾思君逺戍十年餘秋來無數南飛鴈不寄雲中一紙書送趙魯存北還蒼茫秋色滿江闗客子菰蘆鼓擢還河北諸君猶健否近聞半入太行山項聖謨一首聖謨字孔彰秀水人客虎丘中秋無月驚心吳楚客倐忽度中秋明月生何處微風倚寺樓孤吟淹北渚極目望西疇夜静風傳柝江皐動逺愁侯檠一首檠字武功嘉定人酬别徐季白滄江倚櫂且髙歌游子銜杯意若何亂後飄零親戚少天涯蹤跡别離多已悲楊柳愁中折况遇賓鴻客裏過握手相期須努力風塵十載莫蹉跎明詩綜卷八十
