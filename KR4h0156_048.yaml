body:
  text: 明詩綜卷四十八翰林院檢討朱彞尊編嚴訥一首訥字敏卿常熟人嘉靖辛丑進士改庶吉士授編修歷侍講學士禮部侍郎進尚書改吏部加太子太保兼武英殿大學士卒贈太保諡文靖有集對月良宵不可得清賞詎相違影落山精鏡光寒織女機林烏驚漠漠花露靜輝輝萬里邊城客防秋正未歸陸樹聲一首樹聲字與吉松江華亭人嘉靖辛丑會試第一改庶吉士授編修纍官禮部尚書卒贈太子太保諡文定有集靜志居詩話平泉在史館相嵩夀日同館皆更緋衣入賀公獨青袍立嵩目懾之不為意也其後定陵踐位即家拜禮部尚書江陵將援之入間授以意佯為不覺竟託疾歸江陵大愠比歸遂不復出天下髙之卒時年九十有八與魏文靖同洵人瑞也白鷺洲白鷺洲邊建業城幾經攀折栁條生行人莫漫輕離别聽唱陽關第四聲董份一首份字用均烏程人嘉靖辛丑進士纍官禮部尚書兼翰林院學士有泌園集送王侍御南還山木自有枝結交亦有因豈無他人故莫若心所親願得展婉孌攜手同清塵變故出須臾離别在兹晨如彼同枝葉一旦東西分子堇我食荼各自中苦辛含情各倉卒匪我言所申王崇古二首崇古字學甫蒲州人嘉靖辛丑進士除刑部主事纍官右僉都御史巡撫寧夏以兵部右侍郎兼僉都御史總督三邊以右都御史總督宣大加太子少保進兵部尚書召入協理戎政加少保卒贈太保諡襄毅有山堂彚稿李舒章云司馬意氣間整詩話襄毅詩格聳髙橫槊自喜然按之不無懦響别同鄉諸同年十載看花侣年來半去留江城憐我别霄漢羡君遊栁暗旗亭道花明禁苑樓征途從此始瞻望不勝愁登鐘山戌樓危樓髙結跨飛虹古塔崚嶒對梵宫北去關河連塞上西來風物自秦中洞門暗向前山轉石井深連幽澗通扼險應期追一范不堪搖落戍煙空方逢時一首逢時字兆行嘉魚人嘉靖辛丑進士纍官少保兼太子太保兵部尚書有大隱樓集李時逺云金湖古體擬曹陸近體上下常侍隨州且得之倚輿橫槊間尤稱絶俗穆敬甫云方公詩氣勢雄豪律法嚴整如嫖姚出塞萬馬橫嘶而部伍不亂過天津城頭初日亂啼鴉客子行歌上使槎蜃氣髙連蓬島近鴈行遙度薊門斜河聲過雨添新漲草色和煙翳淺沙聞道邊庭猶苦戰九關西望動悲笳吕時中一首時中字道夫清豐人嘉靖辛丑進士改庶吉士纍官户部右侍郎有潭西存稿穆敬甫云吕公七律在開元大厯間靈巖寺喜晴和吳學憲秋山雨過靜朝氛爽氣初開散鹿群倚杖欲攀峰頂樹披衣猶拂洞中雲青天塔影當巖落曉閣鐘聲别浦聞自是新晴堪逺眺擬窮丘壑到斜曛萬士和二首士和字思節宜興人嘉靖辛丑進士歷官禮部左侍郎卒諡文恭有萬文恭公摘稿薑廷善云履菴詩未嘗不工然非酷意求工者詩話履菴出荆川之門詩派從其師指授然荆川集中罕存酬和之作故履菴有姓名不挂更何論之句及督學貴陽以後詩另入一格荆川乃許之曰讓汝出頭蓋荆川初入館局詩學初唐晚年效邵堯夫謂其天機自動未免頽然自放矣履菴雖宗擊壤而習染未深觀其黔南諸作頗有似桞栁州者自炎方驛暮宿亦資孔逺道資人力扶持萬嶺中仗隨徒𨽻亂輿放僕夫空雲動嵐移黑霞收樹斂紅祗貪趨館宿未暇泣途窮烏撒道中地當髙處峰隨轉雲到窮時路更賒夏半火刀方布種晚來牛馬不歸家瘴煙寒鎖蠻村樹嵐霧晴迷客子槎干羽未能馴鬼國祗貪關市中鹽茶洪朝選一首朝選字舜臣同安人嘉靖辛丑進士歷官刑部右侍郎有芳洲集詩話舜臣強直自遂為勞堪羅織斃之獄中士林多為扼腕時王道思唐應德輩鋭意古文辭舜臣雖不與八才子之列而實聫鑣並驅道思與李中溪書云吾鄉洪芳洲先生文直得韓歐曽王家法吾輩駮雜視之有愧其傾倒至矣詩非擅長送黃明齋歸姑蘇往歲禪林居逢君同棲止豫抱子輿疾君洗巢父耳同賦招隱吟肯效彈冠喜嗟豫學不就冠帶束疲薾黽勉江東行意君雲霧裏胡為塵土間逢子亦在市髭髮半霜根垢衣露敝枲良久問口談始憶君名氏君有博古才五車在牙齒上精蒼頡書下綜姬公禮羲畫卦之初機經兵所起星書甘石文地志神禹紀探詣各窮源名狀何切理遂令侯貴間傳客播芳美頗似驚座陳還如使氣禰忽驚風露零頓使家園邇去來夲無心别離亦倐爾夫椒山窈深五湖水清泚請君具扁舟髙卧從此始何遷二首遷字懋益德安所人嘉靖辛丑進士纍官刑部侍郎有吉陽山房稿李時逺云先生素講理學詩亦沖淡典實送人守綏德戎馬猶嚴警旌旃復逺行龍沙知上將燕頷夲書生樹引秦川直山連晉水清因君思保障萬里見長城萬松菴青林千尺隂覆此山中閣月出不逢人門前松子落范惟一二首惟一字于中松江華亭人嘉靖辛丑進士歷官南京太僕寺卿有范太僕集莫子良云太僕詩質而不浮麗而有則送人之廣東郡幕春杪都門道清尊送客行一官趨郡幕萬里是王程瘴嶺排雲入蠻煙入市生回看鄉國樹黯黯正含情龍華廢寺鴈塔猶初地龍華半劫灰棟虛雲氣隱簷漏日光來馴鴿羣迎客香花亂點苔還憐杯渡者何日問津回雷賀一首賀字時雍豐城人嘉靖辛丑進士歷官右副都御史巡撫四川有雷中丞律選宿郢東驛策馬驅殘日開軒候晚風鳥回雲夢北花發石城東宦况重來減風光别後同幾畨經夙夜身世歎飄蓬謝東山一首東山字少安射洪人嘉靖辛丑進士歷官右副都御史巡撫山東有近譬軒詩抄黔中小稿次雲屏九日韻海門孤嶼湧中流千古龍祠在上頭記得雙旌蒼水使春風一舸下渝州林懋和一首懋和字維介閩縣人嘉靖辛丑進士歷官廣東左布政使有櫟寄集憩元福宫碧殿依青嶂丹臺入紫霞聊因駐征蓋復此訪仙家洞隱疑無路林凋尚有花山童陳石髓羽客進胡麻石上柯初爛壺中景未斜赤松如可見從爾學丹砂萬衣一首衣字章父潯陽人嘉靖辛丑進士歷官河南左布政使有草禺子集九日蒲圻張魏二省丈見邀年年客裏逢佳節今日登髙復異鄉二妙恰逢天上侣孤臺宛在水中央白衣似為幽人至黃菊能如故國香别後出關秋正杪年華旅思共凄涼王應鍾一首應鍾字懋復侯官人嘉靖辛丑進士歷官山東參政有缶音集題謝中皋卷林栖懷獨往人境迥遺羣一徑通樵路千山藹暮雲野禽當户囀澗水向田分偃息亭皋上元言不可聞龔秉德三首秉德字性之濮州人嘉靖辛丑進士歷官湖廣按察副使有三幻集朱中立云虹川詩和粹婉麗藻思駿發夏日齋居即事首夏物始和端居恣遊衍林木花已敷池荷葉未展布穀啼空桑流鶯下崇峴雨餘竹韻清日上巖光顯澄心扇自捐縱目簾初卷偶因謝簿書兼得理墳典叨籍力不任冒榮分非淺感兹華髮生滄洲若在眼神與元化並思將遺慮遣守道情自愜處順顔無靦升沈嗟倚伏明晦歎尋轉性夲戀煙蘿敢云輕軒冕曉發龍潭道中霓旌蕩煙靄星駕轉岧嶤水落龍潭淺山連雉堞遙林昏猶辨月江冷不聞潮漸覺鍾陵近凄涼憶六朝雨花臺眺望崇臺縹眇出雲孤春日憑虛覽壯圗江繞潯陽遙辨楚山連京口半吞吳秦淮風土憐今昔王謝豪華問有無回首長干傷往事六朝煙雨半蘼蕪鄭渭一首渭字應清閩縣人嘉靖辛丑進士榜姓孫官至河南按察副使有望川存稿舟次桐江釣臺乘舟入桐廬山水得佳憩伏岸倚灘隈連峰上雲際傍石試躋攀臨流喜容曳目隨魚鳥間心與漁樵契寂寞古釣臺青蒼逺虧蔽天晴靈境幽日暮長川逝邈矣羊裘人髙名誰與繼朱瑞登一首瑞登字禾仲海寧人嘉靖辛丑進士由桐城知縣選湖廣道御史歷按察副使有真逸先生集中秋對月林塘客萃止待月欣舉觴今夕勝昨夕已見生東方澄空斂煙霧彌覺清輝揚初猶樹枝杪俄頃天中央徘徊臨廣除白露霑我裳弦望信有度明晦何能常良時不屢值對此宜樂康毋容外物纍長近君子光李時行三首時行字少偕番禺人嘉靖辛丑進士除嘉興知縣徴授南京兵部主事有青霞集詩話少偕罷官歸里與梁公實黎維敬歐禎伯吳蘭皋結社稱南園後五先生其詩體格雖卑然亦清穩無呌囂之習别吳山人擴客中仍送客離思渺難任岐路一尊酒故人千里心歸雲衝落鴈寒角亂秋砧湖海風塵裏前期何處尋酬張符臺秋夜閣直見寄禁苑含香入髙秋復道平疏星移鳳闕明月上龍城夜半聞天語風前遲漏聲思君在霄漢清夢隔蓬瀛寄廣陵髙子通徐伯可憶昔逢君客帝京留連郎署十年情看花並醉長干里走馬同過白下城春入吳宮芳草色月明蕭寺暮鐘聲别來迢遞天南北一望江湖感慨生張習一首習字子翀寶應人嘉靖辛丑進士官郎中塞上密雲今重地遙望幾重山西入黃花鎮東連黑谷關邊臣常帶甲酋女不垂鬟慚負司農識蒸民食尚難瞿景淳一首景淳字師道常熟人嘉靖甲辰賜進士第二授翰林編修歷左諭德侍讀學士以太常寺卿領南國子祭酒事升南吏部右侍郎卒贈禮部尚書諡文懿有文懿公集秋懷秋夜不能寐起視臨軒墀明月入我懷幽恨不自持憶昨赴京洛正當月弦時月明幾圎缺我行無還期祗應清光同千里長相思吳桂芳一首桂芳字子實新建人嘉靖甲辰進士纍官工部尚書兼副都御史總理河道有師暇裒言東湖東湖行一曲十里栁煙齊逺嶼浮空碧長雲壓水低岸香聞社若沙淨浴鳬鷖更愛維舟處夕隂蓮葉西劉崙一首崙字山父無為州人嘉靖甲辰進士纍官大理寺少卿天津即事秋盡蒹葭白露晞片帆遙指朔鴻飛天橫絶塞孤雲逺水繞寒城落照微四海徵求方訴急九邊征戍未言歸天津橋上空回首封事誰當達禁闈趙釴三首釴字子舉桐城人嘉靖甲辰進士歷吏科都給事中升南京太僕少卿有無聞堂稿從軍行從軍有苦樂從軍良不惡官家選民兵我軍只守城民兵負戈戰我軍立觀變民兵骨如山將軍不汗顔但得我軍在城墮不稱敗我軍生死將軍命將軍護軍如護印將軍有時罪猶録行賞我軍恐不速莫歎身無衣居無屋但報寇入邊我軍有馬兼有粟如此從軍心亦足白龍潭白龍水底眠猶放雲光入有時化作人獨向峰頭立古藤洞古藤生洞口不遣遊人入酌酒坐藤隂飛泉忽相及胡安三首安字仁夫餘姚人嘉靖甲辰進士歷官苑馬寺卿有趨庭集黃太沖云樂山詩極多雋句無題春到春歸不旋軫緑隂稠處花開盡泥中何得粘飛絮牆頭忽見過新筍荒園落寞待我來小車久閣無人引獨倚南樓待月明平生懶作河陽尹閨意涼風動袖湖波起岸頭月影如秋水蓮房摘盡蓮葉低含啼轉向芳閨裏征鴈還從北地飛山川何處不瞻依應知薄幸思羅綺不著年年寄到衣固原栁色凋殘雨未收陽關西去更堪愁平川落照連秦苑古道吹煙覆驛樓刁斗風清初禁夜氊帷月冷盡防秋雲山最是凄涼地今夜邊關第一州汪一中一首一中字正叔歙縣人嘉靖甲辰進士繇工部郎中出為江西按察副使閩廣寇至戰死贈光祿寺卿諡忠愍有南華山房集汪禹又云正叔近體典雅雄渾有盛唐人矩度送吳舍人還楚百年心事獨依依千里思家願不違燕塞夕陽孤鴈度荆門秋雨一帆歸曲終江上人何處雲散荒臺夢已非莫向鍾山賦搖落朝廷獻納似君稀任環一首環字應乾長治人嘉靖甲辰進士歷官山東右參政贈光祿寺卿詩話倭人入犯任公大小數十戰功最多歸熙甫詩云江南列郡盡乘城藏穴何人肯出兵惟有使君躬擐甲劉家港口看潮生公軀瘦瘠倭人目曰瘦官人望而避之詩特其寄興然亦明淨和張石川野航之作蘆花汀畔獨移船一曲滄浪興杳然已付世情流水外遂令心事老江邊間憑魚浪傳書帖淨愛鷗沙占酒筵便與先生訂幽約乘槎直欲犯青天江珍一首珍字民璞歙縣人嘉靖甲辰進士除髙安知縣徴授禮部主事遷南京兵部郎中出知廣信府轉按察副使歷浙江恭政按察使雲南右布政使終貴州左布政使有華委堂集汪禹又云民璞五律溫厚典雅蓋枕籍唐人而有得者寄汪伯玊職方聞汝燕山信秋深已飭裝如何冰雪候猶未到江鄉舟楫關河阻兵戈道路長倚欄思不極雲樹渺蒼蒼徐文通一首文通字汝思永康人嘉靖甲辰進士歷官山東按察副使王元美云徐汝思如初調鷹見擊鷙故難獲鮮岱宗岱頂凌霄十八盤中原蕭瑟思漫漫振衣日觀三秋曙倚劒天門六月寒風雨黃河通瀚海星辰紫極近長安小臣願獻蓬萊頌閶闔髙懸謁帝難魏文焲一首文焲字德章侯官人嘉靖甲辰進士歷官四川參政備兵松潘有石室私抄逰武夷躡步上升真長揖紫霞客兹山多靈異想像銀臺闢瑶草吐金光慧泉注丹液仙翁挾茅龍棄世如遺迹回首謝所親尚留赤玉舄我欲往從之茫茫水雲白誤與軒冕期學道恐無益張才二首才字茂參西安衛人嘉靖甲辰進士歷官按察僉事王元美云張茂參如荒傖渡江揖讓簡略故是中原門第詩話元美評茂參詩比之荒傖渡江茂參之言曰自六義輟講而詩教寖衰五傳異觀而文體漸裂今昔殆不相及矣務艱者氣鬱而不信樂易者神渙而弗耀侈博者意纍而靡潔至或思不通圎而極貌摹倣識未周洽而委心剽敓支戾勿經蹖駮可厭篇帙雖富豈足稱哉其意亦似不滿於琅琊歷下二子度其集必有可觀而惜其罕傳里有姚叟浣曽問其鄉先達茂參何名先達不能答則其論詩之旨聞之者益鮮矣朝陵歌二首夲朝陵墓傍燕關殿閣參差霄漢間王氣千年朝北極雄圗萬里抱西山松門回首七陵遙春殿金燈鎖寂寥地迥忽看星斗動夜深疑有鬼神朝劉鳳一首鳳字子威長洲人嘉靖甲辰進士官至河南按察僉事有淡思太霞二集李于田云子威掘竒索隱抗心無前屠長卿云侍御思苦志勞力徑神王沉淵無底排雲直上陳卧子云子威意在獨造頗傷冗仄詩話子威局守于鱗唐無古詩一語歎為知言其詩襞積纂組節節俱斷俾讀者茫然如墮雲霧中吳趨土風清嘉不意出此鈍漢所著淡思太霞二集類一時顯名者序之盛相揚詡而吳市賣卜人袁孟逸每向人抉檛其字句鉤棘文義紕繆者以為姍笑子威聞而大怒訴之有司有司既撻之而數之曰若敢復姍笑劉侍御詩文耶伏地對曰民寧更受笞數十不能妄諛劉侍御也蓋革野之公論尚存勝于士大夫曲徇多矣懷友回思京洛日初及壯盛時極意但娛樂奄忽歲月馳亦知計不立才薄靡所施良無根株託飛蓬安可期自我與君居逺在天一涯出處道不同榮悴古有之反復念疇昔筋力亦已衰會面諒無由願寄一言辭久要貴能敦情義兩不疑朂哉崇明德式用慰我私朱曰藩五首曰藩字子價寶應人嘉靖甲辰進士除烏程知縣遷南京刑部主事改兵部轉禮部郎中出知九江府有山帶閣集王元美云朱子價如髙坐道人衩衣躡屐忽發村語詩話升之詩倣北地子價則法用修其在金陵懸用修畫像於寓齋焚以東官香薦以陽羡茶賦人日草堂之詩與唐李才江尊賈浪仙為佛事絶相類然其詩實與用修派逺由其牽絲西吳蓋心慕蔡白石故爾贈袁河內漢郡繇來重仍傳借寇行山從上黨斷河入大伾平訪古停千騎班春遍百城西征雲物美憑軾賦先成贈石城文選拜南太常我祖都江左鍾山萬古憑朱旗唐鹵簿白露漢園陵懷里心長往分曹事有恆清齋三五日贈子玉壺冰飲罷沙溪雨過漸通潮新漲朝來拍小橋九曲湖塘藏窈窕數株門栁伴逍遙時魚饌客烹蘆筍海鶴驚人起稻苖飲罷中庭不成寐夜間河漢正寥寥將入雲中作咫尺分邊地﨑嶇出漢關今宵看太白一上紇干山舟行渌水平如鏡芙蓉媚逺天時聞采菱曲唱近使君船陳皋謨一首皋謨字思贊江隂人嘉靖甲辰進士除知蒲州歷南京工部郎中有薄遊北遊南都諸稿環縣城逺眺靈武孤城霽色開感時還上最高臺山樓風急熊旗動關塞天連鳥道回經略久寒西夏膽安危深仗北門才殊方獨抱懷鄉思日暮愁聞晝角哀劉爾牧一首爾牧字長民一字成卿東平人嘉靖甲辰進士授户部主事歷郎中忤嚴世蕃廷杖削籍有堯麓集王元美云成卿質秀才俊尚未成家重陽前一日楚天愁絶九回腸漢水煙波動渺茫鴈盡北書無日到秋深南菊為誰芳江頭落葉催行路峴首浮雲蔽故鄉惆悵年來遲暮意明朝風色是重陽蔣孝一首孝字維忠武進人嘉靖甲辰進士官户部主事顧元言云户部才情綺麗頗任俠氣贈顧少參白下今才子華陽舊隱居早辭南省貴來著北山書邑有盧敖井山藏內史廬堂前曳珠履寧羡食無魚方九敘二首九敘字禹績錢塘人嘉靖甲辰進士有十洲集同諸子遊靈隱寺夜宿澗西房厭喧慕幽棲惜隂耽夕憩梵宇枕山阿層巒延逺睇水石互清華松篁紛蔽翳緣澗蔭芳椒依巖構禪砌嵐翠罨簷牙靈籟響雲際曖曖日將頽凄凄風且曀稍覺朝歡闌還因宵賞滯髙閣謝塵囂流泉澄夢寐况復偶羊何寧須狎支惠尚子欣逺遊嵇康慵作吏茍非賢達人詎知身似寄鳳山懷古宋朝宫闕鳳山隈輦路荒涼過客哀青史尚留南渡恨黃旗無復北庭回沙埋舊井琉璃碎蘚蝕殘碑翡翠開歎息百年行在所只今惟有梵王臺余文獻一首文獻字伯初德化人嘉靖甲辰進士有九崖集送聶子靜南還十年才返國何事復南歸歲月冰霜晚江湖鴻鴈稀青山還舊業落日上初衣去住乾坤裏無嗟與世違李汝蘭一首汝蘭咸寧人嘉靖甲辰進士溪上晚歸徑路草萋萋歸人咫尺迷水聲聞犬吠月色見雞棲露下沾衣濕星垂挂樹低今宵有風雨多在杜陵西彭謙一首謙字德光溧陽嘉靖甲辰進士有茭東稿早行畏塗兼歲暮假寐怯宵征髙栁霜前短殘星曉後明板橋人度影畫角戍傳聲野燒前山起羇心黯自驚張居正四首居正字叔大江陵人嘉靖丁未進士改庶吉士升編修歷春坊學士以禮部侍郎入內閣官至太師吏部尚書中極殿大學士卒諡文忠有太嶽集詩話江陵以奪情為清議所不容然能自任天下之重定陵沖年請大閲京營之士時掌中樞者山隂吳尚書兊也尚書繪圗藏之家豫曩從尚書孫錦衣使國輔處見之及戚武毅鎮薊大臣行邊簡閲士馬隨上功狀疏恩晉秩烽火不徹於甘泉者一十五年江陵之秉國成可謂安不忘危得制治保邦之要矣近靈夀傳尚書維鱗撰明史記乃與分宜合傳毋乃過歟于文定與邱尚書書云江陵以蓋世之功自豪固不肯甘為汙鄙而以傳世之業期其子又不使濫有交遊其平生顯為名髙而陰為厚實以法繩天下而間結以恩其深交密戚則有賂路人不敢也債帥巨卿則有賂小吏不敢也當其柄政舉朝爭頌其功而不敢言其過及其既敗舉朝爭索其罪而不敢言其功皆非其情實矣此足以當爰書聞有題詩于故宅者云恩怨盡時方論定封疆危日見才難二語足稱詩史矣恭勵聖學元后輔萬邦綏猷良不易若稽古哲王多聞乃建事堯舜帝者宗精一闡微義夏禹既祗德殷髙亦遜志成后務緝熙周詩咏小毖猗歟休烈光英聲播來嗣今皇體睿明沖齡纂神器爰當訪落初即敞金華祕書帷簡儒彥藝圃覃文思朝昃不遑暇寒暑靡暫離寰宇仰休明風雲慶遭際顧以謭陋質無能補天地願言崇聖功問學登純懿勿云天聰明無為事博識圗書足自娛兼之益神智勿云富春秋茂葉良可諉寸隂重逾璧居諸易流駛勿云履崇髙優遊保天位君心茍縱逸萬幾遂顛墜勿云當燕間可以快志意一暴而十寒細行終為纍戒彼鴻鵠心專精道乃致􅉏御必端良勿狎於匪類為山九仞崇成功虧一簣慎初惟克終終保無為治愚臣職司規敢以告中侍莊敬太子挽歌鶴馭凌霄漢龍樓鎖寂寥空悲仙路杳無復寢門朝綺季辭金輅浮丘侍玉霄惟餘鳳笙曲猶逐白雲飄舟泊漢江望黃鶴樓楓林霜葉淨江煙錦石遊魚清可憐賈客帆檣雲裏見仙人樓閣鏡中懸九秋查影橫清漢一笛梅花落逺天無限滄洲漁父意夜深髙詠獨鳴舷潛江憫潦水漲平堤沙岸回野田今見荻花開江濤挾雨秋仍壯塞鴈衝寒暮獨來歲晚風霜欹客枕夜深燈火傍漁臺悲時已有江南賦愁聼荒城畫角哀殷士儋三首士儋字正甫歷城人嘉靖丁未進士纍官少保兼太子太保禮部尚書武英殿大學士卒贈太保諡文通有金輿山房集王忠伯云先生登髙而賦餞别而歌體齊魯之雅馴兼燕趙之悲壯采吳越之婉麗以求勝于歷下婁水之間送劉希宏驛宰之髙郵迢遞淮南驛風煙隔椘波潮平漁火近日落客帆多逺樹生鄉思青山入棹歌春來見芳草知爾憶鳴珂送趙萬舉守淮安聞道淮隂郡輿圗屬上遊雲連江國曙地接海門秋特簡中朝彥遙分南顧憂青山迎列戟芳草待扁舟楚甸歌新牧琅琊識故侯津橋通晚泊膏壤課春疇樹色依官舍潮聲入驛樓知君富登覽吟興滿滄洲題畨馬圗玉塞無聲夜有霜槖駝五萬入漁陽平沙落日悲風起馬上橫捎四白狼楊巍二十一首巍字伯謙海豐人嘉靖丁未進士除武進知縣入為兵科給事中歷右都御史巡撫宣大陜西山西入為兵部侍郎升南京户部尚書召入改工部復改户部再改吏部加太子少保進太保贈太師有夢山集朱中立云夢山詩不事雕繪旨趣天成王貽上云先生五言直舉胸臆真淡雅素而格在其中陶韋嫡派儲王之鴈行又云先生詩蕭疏簡逺得淵明摩詰之真品當在蘇門之次西原之上發謝方山云先生擅場夲在五言其近體妙處源王孟接軌髙薛嘉隆塵坌之習曽未染其筆端故是間代清律染沈山子云夢山五律固是長城其全首矜鍊者不待言句如風雨樓蘭國關山李牧祠春風吹户牖芳草遍庭除薄地不盈頃草房才數間漁樵原舊業荷芰有初衣花憶春城發門連芳草多北窗風到處深樹鳥鳴時澗雪春仍積岩花夏始開家貧人卧穩橋斷客來稀杯外分平楚窗中到逺山霜笳連夕院野燒到經臺野燒驚沙鴈霜風落塞榆人垂燈下淚鬼哭雨中魂皆近自然豈四溟山人所能及詩話夢山與中麓滄溟同郡而其詩逺法右丞左司近取蘇門不蹈章邱粗鄙之音不墮歷下呌囂之習信豪傑之士也集不甚傳近新城王尚書德州謝郎中重為鏤板始行于世夢山自言不知詩補晉臬時學使者曹君紀山謂當以唐人為宗且辨其體格及歸田四明呂山人往來海上相與倡和共明此道云云吕山人者時臣中甫也紀山名汴江陵人嘉靖辛丑庶吉士仕至右副都御史巡撫雲南以夢山推許若是度其詩必有可觀惜無好事如王謝兩公刻之以傳也當嘉靖初北地信陽朝華已謝滄溟集盛唐人字句以為律一時宗之正猶隋苑剪綵成花淺碧深紅未嘗不眩人目然生意絶少此時讀夢山詩如水仙十囊江梅一萼嫣然薄冰殘雪之外有不愛惜者耶春日述懷曉齋春雨歇一鳥當窗鳴山雲入我座不知在邊城夙心本間曠偶無塵事縈手把楞伽讀忽已忘吾生軒冕是何物可以嬰其情君子貴得道誰能顧浮名醒後聞磬聲泠然響清磬我思良悠悠披衣一起坐明月懸髙樓遙遙目天宇空濶萬象收此時無人言獨與太虛遊河清不可俟天運倐已周冥心入無極真想在浮丘人生亦晝夜身外更何求漫翁詩子美稱漫郎次山號漫叟兩公皆偉人斯名傳不朽余夲疏濶士且與病為偶性惟率其真名不居其右雖嘗為文章不習韓與栁詩韻尚未諧况復辨好醜亦嘗涉世故世故良難剖軌事與掄材舛錯恆八九自信惟此心得失兩無有所幸遂歸來惟與鹿豕友耕也不知穫漁也不用笱富貴若浮雲詩書成敝帚於今年八十萬事空回首茫茫視天地未知誰長久仍欲惜豹文仍欲競雞口縱得千載名何如一杯酒歲月自盈虛吾生無譽咎從此稱漫翁可並古人否送黎樂溪轉甘肅太僕白嶺千山外黃河萬國西塞雲秋渺渺沙草日凄凄逺地愁離别邊城尚鼓鼙昔賢名未泯勳業爾能齊北棲口留别許參戎絶塞難為别離尊駐晚暉悲風嘶去馬落葉上征衣野燒臨河斷寒沙帶雪飛邊城人不到此後信應稀忭州雨夜世慮已難遣况當旅館秋寒城夜半雨故國夢中樓河漢幾時曙蛩螀增客愁鴈門明日路鼓角入邊州柏林寺别王計部寺即李晉王葬所園陵今作寺秋草向沙陀事歎千年往人憐兩度過山川明霽雪鐘磬帶煙蘿於此别知已尊前意更多壬申九日登覽曠亭憶舊兼喜谷司馬初還次前韻往事真如昨登髙復此間歲時人半老江海客初還暮鴈聲偏疾寒花色自斑不須多感慨東望有牛山秋日間居笑我起居處寥寥一竹牀長貧諳性命多病識行藏地與紅塵逺秋連白日涼山僧久不至木落井西堂送汪山人遊山海自是江湖客猶然變姓名妻孥貧不問書畫老逾精雲黯秦王島山髙孤竹城同誰登碣石醉看海濤生雨夜董信溪過訪卧病滄江上柴扉晝不開况兹風雨夕乃有故人來繞屋吟黃葉疏燈照緑苔平生丘壑意共盡掌中杯秋雨宿黑石嶺嶺險藤迷路山髙石作城片雲何處雨孤客此時情茅屋幾家住秋風半夜生旅魂愁已絶况聽鼓鼙聲早秋登龍門城樓指點雲州地真為漢北門八城臨大漠一路向中原晴日山川映秋田禾黍繁文莊經略處父老至今言經順聖川野曠行人斷風髙戍鼓鳴青山鄰絶漠白日閉孤城戎馬千年地江湖萬里情不堪征戰後極目一沾纓環縣早行羌狄平無日滄江未擬還燈前梳白髮馬上夢青山薄曙羣峰外殘星杳靄間雞鳴問何處已度古蕭關蕭關北作塞路山難斷天愁雲不開遙驚戌火起數見羽書來周室朔方郡唐家靈武臺客心正多感羌笛暮堪哀宿瓦雲驛蕭條來野館秋草正凄凄復此聞風雨兼之厭鼓鼙經年階樹老入夜怪禽啼獨坐生歸思田園渤海西沙澗驛逢劉參戎風塵滿目塞門間愧我書生鬢欲斑為問干戈何日定不知江海幾人還河聲暮繞沙邊驛雪色晴看天外山全仗將軍能破敵莫令匹馬近三關酬劉二府過嶺園老喜髙軒海上過開尊嶺圃對煙蘿才聞朔塞兵初罷豈料中原事漸多話到蒼生流涕淚愁臨岐路邈山河眼前君最強吾意國士寧論甲乙科春日南墅宴集南郭春偏好留人到夕陽風吹山鳥語花落酒杯香憶舊有感丁卯橋西憶舊遊緑楊髙映酒家樓故人莫訝凋零盡一别江南四十秋陸光祖一首光祖字與繩平湖人嘉靖丁未進士纍官吏部尚書贈太子太保諡莊簡金陵懷古宰木蕭蕭起暮風君王不復渡江東舞衣滿地生新草過客沿溪問舊宮垓下一朝騅不逝咸陽三月火徒紅英雄轉鬬無完策四靣悲歌入帳中林燫六首燫字貞恆閩縣人嘉靖丁未進士纍官南京禮部尚書贈太子少保諡文恪有對山集王伯穀云先生詩文爾雅若璞玉渾金無詞人藻繪刻鏤之習馬侍御宅偕同館諸丈宴集人生百年內奄忽浮雲馳隨風日萬里聚散難可期昔我同門友王事各乖離豈伊道路逺邈若天一涯三秋積晨暮耿耿懷相思何悟升斯堂復得一追隨豐殽列綺席美酒溢金巵相見各怡然獻酬吐芳辭蘭膏繼明晝良夜殊未疲鳥棲戀共林魚遊樂同池交誼古所敦久要諒不移今夕良宴會貽爾伐木詩舟發芋江别諸兄弟親友宦遊二十載幸始歸故鄉盤桓未及久戒徒復嚴裝豈不戀樂土王事有靡遑遲遲出郊郭回顧悽以傷秋風何飄飄吹我征衣裳兄弟送我行執手淚數行親戚送我行各攜壺與觴日暮客程促踟蹰猶路旁泛舟泝大江怨彼道里長落葉雖隨風繞樹自飄揚禽鳥失儔侣嗷嗷鳴回翔矧伊骨肉情離别天一方暫且赴簿領行當返耕桑努力各自愛引領遙相望工曹後園觀稼伊昔仕京華不忘畎畝志幸此南土遷公署有餘地後園懇為田蕪穢舊已治陽春倉庚鳴四野肇農事晨興戒農夫播種及時至薄言勸其勤簋飱餉數器實閔東作勞豈要西成利周行阡陌間嘉樹或時憩即目雖暫欣於心慨未遂伐檀刺素餐鵜梁譏竊位自顧魯鈍姿食浮久吾愧悠悠望故山懷古有深意寄謝沮溺羣髙蹤庶可企孝烈皇后挽歌鳳穴金宫祕龍章寶册宣曽將五色石能補九重天桂殿花空落松門月自懸惟餘歌懿德長續二南篇送二兄謫平樂二守暫會仍分手離魂黯欲銷如何適萬里况乃傍三苖中土風煙隔征途雪霰飄願將盤錯意持報聖明朝詠史朱雲折檻日賈誼上書年感激廷空爭飄零席始前白頭槐里令青簡汩羅篇直道元如此千秋世共憐王樵五首樵字明逸金壇人嘉靖丁未進士纍官南京右都御史贈太子少保諡恭簡有方麓集詩話方麓研心著書自言六經畢其四詩特遊藝然清婉軼倫當甔甀太函白榆淡思呌囂之會乃聞此雅韻實獲我心也短歌答趙江都金山見懷之作海門兮長風中流兮孤嶼懷美人兮何方覽大江兮東去香山寺曉色開層閣春天淨翠屏檻憑千樹緑門掩四山青逺寺分林見流泉夾路聽禪房人不到花竹晝冥冥除夕塵事俄消日他鄉亦作年功名慙鏡裏兒女且燈前望湖亭二首平疇門外春雨逺寺山西夕陽栁暗溪橋輦路水肥種稑江鄉孤村數家隱樹一曲清流抱山四月城中未有林端黃鳥關關宋儀望三首儀望字望之吉安永豐人嘉靖丁未進士歷官僉都御史巡撫應天進大理寺卿有陽山稿華陽館集初去吳門作營世無疾途筮仕獲下秩綰綬出明邦感懼情非一雖抱濟物情良缺經世術簿書日紛紜督賦無寧日覩兹民力艱焉忍事梏桎淳風古已頽文質相毁蝕慙無下堂化何由示師帥直道既已危降志還見嫉沉憂結衷腸能不慚三黜徵書來日下濫此樗朽質新恩詎云辭夙抱未及畢驅馬出郭門寒風正蕭瑟道傍凍餒人對我長歎息殷勤謝父老聊以微衷述自欒城趨柏鄉朝發欒子邑暮投柏人鄉驅車多所經指顧情內傷燕趙昔吞并四海如沸湯豪俊相馳騖一言決興亡故壘何蕭條云是古戰場俯仰今昔間沉痛結衷腸纍纍道傍冢誰辨愚與良燕昭既不存平原客久荒不見黃金臺樹木鬱蒼蒼息駕暮雲沉感歎彌難忘遊梅仙山白雲在深山山深轉空翠古木凌飛煙叢竹亦森邃梅公隱何時漢道昔云季當其抗言時鼎鑊寧足畏一斥眇何所去作南昌尉兹山信超曠盤鬱多佳氣幽棲亦何為豈不以我貴一朝變姓名挂冠從此去新舊相太息妻子不知處余亦骯髒人誤觸當時諱見幾苦不早撫已有深愧永願謝塵緣長往從我志胡杰一首杰字子文豐城人嘉靖丁未進士改庶吉士歷南京國子監祭酒升太常寺卿有劍西稿九日馬西田侍御宴具瞻樓亭閣嵬嵬俯一丘柏臺清宴復髙秋籬邊黃菊經時晚谷口青驄竟日留抱病有懷仍對酒自公多暇幾登樓臨風不用傷搖落歸路月明山更幽馬一龍二首一龍字員圗溧陽人嘉靖丁未進士改庶吉士歷官國子監司業有遊藝集湖上有懷湖上青山半入城湖中風景坐來清髙飛雙鶴與天近逺去孤舟隔水明為客故鄉秋鴈杳懷人落日莫雲平無端忽起思歸念相對尊前共一傾新豐夜泊新豐市上酒家邊夜泊沽來不用錢北風吹雨欲作雪客子到家將近年京國書傳千里外剡溪路入小村前深林舊有高人隱尋到梅花却繫船章適一首適字景南蘭溪人嘉靖丁未進士歷官禮科給事中塞下曲材官三十萬日夜出臨洮不見風塵息惟聞甲第髙盤雕依陳落獵馬向秋豪辛苦從征地黃沙蔽白蒿孫永思二首永思字性孝蒲州人嘉靖丁未進士除行人選授浙江道御史海珠寺宴同鄉李崔二鴻臚象設鄰鮫室江流達海門上方無陸路四壁有潮痕香霧籠珠樹飛花墮玉尊漁歌相聽處萍水不須論登鎮海樓用韻越王臺接五城樓島嶼連空起暮愁瘴海波濤浮日月炎天風雨自春秋亂帆歸晚聲相軋萬樹邊江葉盡流莫向危闌聼吹笛武陵離思在南州詩話二詩侍御巡按廣東時作蓋嘉靖丙辰年事楊繼盛二首繼盛字仲芳容城人嘉靖丁未進士除南京吏部主事入為兵部員外郎坐論馬市貶狄道典史稍遷知諸城縣升南京户部主事轉户部員外調兵部疏劾嚴嵩論死贈太常少卿諡忠愍有集皇甫子循云楊忠愍辭尚宏麗語罕怨誹江河一瀉乃徵其才光焰萬丈悉由于氣詩蔣仲舒云楊公慷慨赴死讀其想見其人沒世而後猶有生氣送徐子與讞獄江南寥落白雲司半虛看君此去更何如西曹月滿幽人榻南國星隨使者車塞雁不堪行斷夕秋風况是葉飛初秣陵故舊如相問為道疏狂病未除懷鶴峯東城因寄屋梁落月應懷我春草池塘更夢誰記得别時懸淚眼佯為笑語怕相思彭輅二首輅字子殷嘉興人嘉靖丁未進士除江西布政司照磨遷知新淦縣左遷應天儒學教授轉國子監博士升南京刑部主事有比部集焦弱侯云先生詩意髙簡沖融婉秀卓然名家是時七子出互相矜詡雖有名於時而辭調往往如出一人先生能為衆所不為不少貶以就俗宜其知者鮮矣詩話先生早慧于詩文不甚敦琢其持論取法中唐謂神在象外象在言外言在意外然率矢口肆筆而成頗類解大紳卞華伯一流昔人所以有才多之憾也良鄉道中昔去經衰栁今歸見早梅緇塵飛不盡白日黯難開短劍餘孤憤長歌動七哀年年薊門道空老洛陽才送祝學博之當塗姑熟城頭月常邀采石雲山齋看不厭聊以贈夫君詹萊一首萊字時殷常山人嘉靖丁未進士有招搖館集漁火絶浦漁燈暗空江月色多關山空有恨欵乃忽聞歌風靜星河沒天寒木葉波孤舟無住止獨酌奈愁何沈淮一首淮字澄伯仁和人嘉靖丁末進士有三洲集積雨不能出有懷湖上霞樓月榭欲生塵水上煙雲積幾旬滿地山花應笑我雨中春色屬他人甘茹一首茹字征父富順人嘉靖丁未進士歷官按察副使送成邑博江城秋色暮客子欲何之司馬浮湘日元王設醴時風吹猿峽冷霜落鴈峯遲欲識相思調君聽苦竹詞鄭東白一首東白字叔曉莆田人嘉靖丁未進士官至按察僉事釣舟空亭一葉下落日五湖秋白幘攜尊酒滄波坐釣舟鐘聲山外寺樹色水邊樓吾愛鴟夷子浮家汗漫遊周思兼三首思兼字叔夜松江華亭人嘉靖丁未進士除知平度州遷工部貟外郎有周叔夜集送李羅村大參河南憲長春風斗酒邵陵西新栁依依緑滿堤征馬不須催客去暮猿何事向人啼道經湘水花初發夢繞漳河路欲迷故舊那堪頻送别愁看芳草轉萋萋題畫逺渚蒹葭滿孤村風雨多明朝江上路誰載酒船過送林雙池故鄉故人今别離春風春草各天涯尊前相對唯今日去後相逢知幾時明詩綜卷四十八
