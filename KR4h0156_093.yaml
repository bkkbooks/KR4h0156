body:
  text: 明詩綜卷九十三翰林院檢討朱彞尊編靜志居詩話土司之目自古無之禹貢三百里蠻書旅獒周官職方氏記明堂位稱八蠻爾雅稱六蠻其種曰黎曰犵曰狑曰獠曰猺曰獞各有大姓為之雄長明制仿元舊典分設官吏立宣慰招討安撫長官四司初𨽻驗封後以其半𨽻武選嘉靖中申明舊典𨽻驗封者布政司領之𨽻武選者都指揮使領之文武相維羈縻有術雖間有不靖旋即削平濊澤霑濡久而漸知嚮學若黔之宋氏昆友滇之木氏祖孫各著詩文媲于風雅昔韋宗見秃髮傉檀歎曰竒才英器不必華夏明智敏識不必讀書九州之外五經之表復自有人録土司之詩明之聲教逺矣宋昻昻字從俯號省齋襲貴州宣慰使與弟昱有聨芳類稿謝少安云宋氏所領部下多漢人易馴服凡里甲在官及儒學弟子員皆其民也春毛大可云貴州蠻種不一有宋家蔡家相傳秋時楚子俘宋蔡二國人而放之南疆遂為蠻詩話洪邊宋家其先鎮州人逺祖景陽開寶間官節度使平定西蠻詔就大萬落樂開總管府俾鎮其地歷十有四世曰阿蠻仕元官至昭毅大將軍靖江路總管佩三珠金虎符階榮祿大夫平章政事柱國順元侯贈貴國公諡忠宣又三世曰欽洪武初內附授懷逺將軍世襲宣慰使按貴州苗民五十一部安氏領四十九部長曰頭目宋氏領十二部長曰馬頭昻昱兄弟俱能文昻詩有云采藥難尋蓬島路垂綸却憶鑑湖船疏砧殘月孤村夕衰草斜陽兩岸秋風靜洞庭髙浪逺月明揚子暮潮寒昱詩有云野戍清秋聞鼓角煙村日出露松杉數聲啼鳥憑欹枕滿地斜陽深閉門卧聽笙歌來别岸起看鷗鳥浴前汀塤篪迭奏風韻翩翩試掩姓氏誦之以雅以南莫辨其出于昧任侏離也送趙遜敏東歸琴鶴先生樂自然故山歸去白雲邊門前栁憶陶元亮洞口人迎葛稚川行色蒼茫林影外離情蕭索酒杯前欲知别後相思意疏栁寒梅鎖暮煙宋昱一首昱字如晦號宜菴昻之弟送汪公子還嘉禾城上棲烏下女牆城邊行客醉壺觴一尊風雨秋蕭颯千里關河路渺茫鄉夢已隨雲去逺離情空與日添長憑誰為報南湖逺早晚還來理釣航木公恕五首公恕字恕卿笮人先本麥氏洪武中歸附賜姓世襲麗江知府有雪山始音萬松吟卷詩話恕卿韶年讓爵隱於玉龍山南亭曰翠雪塢曰丹霞堂曰一鏡種桃藝竹環以山松又起迎仙之樓日以吟詠為事中年將兵却敵功在邊隅永陵有御書之褒於時貴竹二宋未之或先張禺山稱其朗潤清越李中溪謂其得樂府音節楊升菴許其體句俱新寫景入繪諸公之賞音若是江村江上層雲合村村結暮隂漁燈半明滅風雨葦花深病起臨曉新梳髮呼兒卷幔紗平生行樂慣病起即看花飲春會官家春會與民同土釀鵝竿節節通一匝蘆笙吹未斷踏歌起舞月明中春遊即事線狨緩拽紅氍膩叱撥頻嘶緑巷深踏栁穿花還未遍夕陽又抹樹頭金種栁雙楊初種幾經春始見長條已拂塵萬里緑隂堪作幛一枝不許贈行人木青一首青號松鶴又號長春公恕曽孫卒贈中憲大夫有玉水清音詩話松鶴詩不及曽祖而勝其子增增篇什雖倍然非卧子所云中土詩也移石草亭萬松深窈處獨構此茅廬斸地移新竹通泉溜小渠琴書常作侣木石與為居笑殺求名者磻溪一老漁明詩綜卷九十三
