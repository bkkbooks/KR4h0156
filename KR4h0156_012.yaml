body:
  text: 明詩綜卷十二翰林院檢討朱彞尊編陶宗儀四首宗儀字九成黃巖人少舉進士不中即棄去僦居松江至正間纍辭辟舉張氏開閫辟軍咨亦不就洪武六年舉人才至京以病固辭得放歸有滄浪棹歌南村集唐士絅云公以黍離麥秀之餘而有駿發蹈厲之氣撫羇窮淪落之景而無危苦憤激之辭足以見其所存矣髙二鮑云九成畫天台山圖自題云豫挈家避地雲間杜樹之北背負九峰皆平衍無竒每憶故山為作此圖所謂杜樹之北在松江府治東北十餘里即今泗涇南村草堂之址在焉又名小栗里倪元鎮王叔明俱為之寫圖豫皆見之靜志居詩話南村練習掌故元朝野舊事藉輟耕録以存其餘若草莽私乘遊志續編書史會要皆有禆史學入明自稱其居為小栗里雖好爵未縻然其集中詩如乙卯人日云天子居大室念民日孜孜上帝昭聖心報錫以雍熙紀行詩云弭棹中和橋僦舍千步廊報名謁鴻臚會朝簉鵷行國安四方靜君明六卿良聖德湛汪濊慶祚衍靈長入都門詩云虎踞龍蟠真聖主天開地設古神州早朝詩云黼坐正中天咫尺叩頭丹陛益凌兢聞皇太孫即位詩云先帝逍遙遊碧落神孫端拱坐明堂九重統握乾坤大萬國恩霑雨露香動植飛潛滋德色都俞吁咈慶明良老臣舞忭南村底笑對兒孫兩鬢蒼竊謂此等詩可以不作可以不作而作之宜録入明詩矣折楊栁送夏西疇謫居大梁折楊栁贈君别楊栁未折心已折丈夫落落志四方到此誰能不鳴咽江南九月天雨霜鴈聲墮地秋風長出門行行幾千里寒煙落日增離傷令嚴獨許擕家室藤笈編花載書帙可憐身上千金裘阿㜷手縫針線密吾聞中原百戰餘民物鮮少城邑虛君去結廬得幽勝便可小擬西疇居荆榛塞路猛虎伏髑髏如山寃鬼哭願言緩轡毋疾驅疾驅恐妨傷馬足折楊栁歌苦詞呼酒酌君君莫辭黃河之水東南馳人生會合還有時五里塘破屋三家市扁舟五里塘冷波浮落照飢雀聚枯桑氛祲乾坤戚兵戈道路長漂流無倚著何日定歸鄉題王筠菴水村垂楊舊種成籬落小徑初開近石矼夜雨漁舟添個個晴沙鷗鳥下雙雙夢魂不到鳴珂里卜築何須濯錦江沽酒鱠魚從野老髙歌招隱壓新腔次韻答楊廉夫移家正在小斜川新買黃牛學種田奏賦不騎沙苑馬懷歸長夢浙江船窗浮爽氣清山近書染涼隂緑樹員樂嵗未教瓶有粟全資芋栗應賔筵舒頔二首頔字道原績溪人元末台州學正明初禮聘以疾辭不出學者稱為貞素先生有華陽貞素齋集唐仲實云公之為詩盤桓蒼古不貴纎巧織紝之習詩話道原以貞素名齋雖絶意仕進然觀其集其如祀事詩三賢堂登源廟碑既孫其言未免降志矣其自傳云先生喜歌詠或古風長律取意而足不蹈襲不求竒務在理勝又自敘云當飢寒鬱悒不堪于懷發而為哀怨憤切之語關乎風教繫乎世事槩見乎辭可謂得失寸心知矣為苖民所苦一歌直寫胸臆絶少支辭第用韻太雜故置不録繅絲歎東家繅絲如蠟黃西家繅絲白如霜黃白絲出蠶口長短繅出婦手大姑停車愁解官小姑剝繭愁冬寒向來苦留二月賣去年索逋今未完手足皸瘃事亦小官府鞭笞何日了吏胥夜打門稚耋生煩惱君不見江南人家種麻如種田臘月忍凍衣無緶却過廬州換木棉雨黑雲壓天殷其雷白雨如注西南來於時我方髙枕卧池上菡萏花初開從渠雷昏與霧暗推起篷窗時一看頃刻隂霾盡掃除幸免衝隄及破岸天風不來如鏡平一輪明月海底生謝應芳九首應芳字子蘭武進人自號龜巢老人有龜巢集張志道云子蘭詩雅正純潔可與傅與礪相伯仲詩話龜巢集未鏤板豫得其手抄本一十八册大半酬應之作所居龜巢一在滆上一在橫山先後有記其略云千嵗之龜巢於蓮葉以葉為巢初不費經營之力也暇與田夫野老涉桑苧之園過桃李之蹊瓦盆濁醪歌舞酬酢若曵尾泥塗者然雖巢外之樂其樂亦因巢而得也又云豫所至以龜巢名室蓋不以棟宇為巢而以天地為巢也峻宇雕牆莫知其光蓽門圭竇莫知其陋誦其文可謂逹觀之士矣其上饒參政啓云辭親日下奉檄浙東紛紛服州縣之勞區區益升斗之祿望蓬萊于滄海棲枳棘于慈溪謝張雲門啓云鮎上竹竿往嵗之功名可笑龜巢蓮葉近年之身世如浮則嘗仕于元者也歸故里憶昔走避兵棄别鄉井去意將朝暮歸行行罷回顧安知踰一紀方踏去時路四郊皆蔓草白日暝如霧披榛訪閭里隔水拜丘墓傷哉鶺鴒原黃蒿走狐兔别墅破垣在郵亭乃新作鄰兒二三輩衡茅晝扃戶初若不相識熟視肖厥父坐久泣且言為我話親故什九死兵戈餘亡不知處其詞吐未終我淚已如注對食不能餐相期歸蟻聚吾將語吾兒賣書買農具歸耕滆上田此心庶無負逸菴詩為吳子明賦日髙三丈餘先生睡初起澱山小湖邉草亭修竹裏消搖漉酒巾傲兀燒香几放鶴上晴霄觀魚戲春水世事了不聞無勞洗吾耳河魨世言河魨魚大美有大毒彼美我不知彼毒聞已熟其子小若芥俄可大如菽雖有膳夫經務使血出漉烹熝一失飪禍至不轉矚西家昨留賔登盤偶欲速先聞笑啞啞後乃號咷哭良由流涎饞豈是鬼伯促或言直一死輕命重口腹溺愛多不明奚止此水族吾作河魨詩逢人敢忠告踏車婦吳田水深三尺許猶是去年秋暮雨勸農使者催春耕田甲頻撾水車鼓江村破屋能幾家家家婦姑俱踏車蓬飛兩鬢赤霜腳亦有兒女雙髻丫淞江太湖愁滿眼白汗霑衣足生繭車輪鹿鹿羊角轉水波翻翻龍舌卷春來十日九日晴不聞鵓鳩呼雨聲牛毛微颸土未濕辛苦又加三日程當家豈無夫與子打魚糴米去城市城中禁米難出關田上忍飢還戽水四郊未種圍田榖三邉催運官倉粟吳下詠懷近聞哀痛詔使者又江東兵革何時已車書四海同落梅春雨後芳草夕陽中欲作菟裘計桃源路不通贈慶别駕台州别駕不之官煙水孤村共嵗寒偶有濁醪留晚酌旋挑生菜簇春盤三年鄰里通家好四海兵戈行路難且喜門前金色栁東風堪作畫圗看伏日寄懷江浙髙掾史伏日常年苦炎熱今年伏日風雨涼官曹早出丞相府賔客髙會清暑堂垂楊繫馬緑隂淨畫舸采蓮紅粉香西子湖頭歌一曲前身合是水仙王雨中懷秦主簿東門之東西市西人家屋頭啼竹雞新年十日九風雨老子幾時能杖藜寄徑山恱堂長老每憶城南隱者家崑山石火徑山茶年年春晚重門閉卧聽階前落地花沈貞十首貞字元吉長興人元末隱居橫玉山之士林自號茶山老人明初不仕有茶山集詩話茶山老人敦蠱上履二之節從白雲遊始終不出方之楊廉夫輩呼來即來遣去便去者如論奕然更髙一品矣集五十卷惜不傳從陳編中搜得樂神曲一十三首不無冗長且多闕文因汰其六稍為刪易補綴頗覺竒古樂神曲樂神曲者擬楚辭九歌而作也吳人尚鬼祀必以巫覡迎送舞歌登獻其辭褻嫚禳災徼福不知其分滋黷甚矣故為此辭以明鬼神之理禱祀之意祛其荒淫之志焉保我之民兮邑此方崇其墉兮浚其隍民不驚兮志定眷靈修兮作民命隄楊兮結隂青青兮蔽林女牆堅兮有郛有郭繞洄灣兮濠歸于壑靈之來兮玄都揚旗旌兮若荼陳一豕兮兩羭載斟之兮百壺城兮隍兮吾永無虞右城隍嗟靈伯兮御清泠洗袢歊兮滌炎蒸駘蕩兮春初舶趠兮夏徂颼飀下兮木葉枯號空桑兮吹雪載塗靈之來兮憑女巫女巫兮屢舞簫兮伐鼓靈醉飽兮無怒蕭蕭來兮颯颯去右風伯佩芳蘭兮攬芬椒潔新服兮綴珠玿駕靈螭兮翔重霄要靈輅兮下迢迢我禾兮成役我田兮龜坼烈日兮驕陽利行水兮熱湯靈之徠兮天外下土乾兮霑一溉維靈布澤兮惠我無私嗟我民兮其敢斁思靈皇皇兮萃只舞僛僛以醉止福禳禳兮嵗復嵗只右雨師月維仲兮日維剛肅齋宫兮神所藏靈輝輝兮垂佩儼飛馭兮髙蓋降靈雨兮來斯左有翁兮右有妃悵嘉期兮難又羌永歎兮陳辭靈修修兮不語逝翩翩兮歸去右社公波震蕩兮具區既砥定兮奠神之居芙蓋兮菱車導翠黿兮文魚神之來兮孰俱後子皮兮前靈胥與神遊兮湖之滸衝風息兮極浦有倡兮妙舞有冽兮清酤神飽聿歸兮或返而顧灌吾田兮受神之祜右太湖神雄何為兮厲於鄉祀有時兮享有嘗赭白馬兮青蓋明而無兮晦而在屏方相兮去儺神巫進兮舞且歌雄欣欣兮逺逝不水旱兮不疵厲樂吾民兮世世右鄉厲兩旗兮分張舞輕風兮悠揚神之司兮我疆原田每每兮立我青秧不稂不莠兮無虸無蚄時雨兮時暘俾百榖兮登場維神兮降康報之兮肴蒸腯羊右青苖神桃花塢山行青絲玉壺當馬提山花笑壓銀鞍低冷霧衮衮襲瑶草暖風拂拂吹棠梨詩筆落紙興不淺醉眼傲人春自迷幽禽應笑客狂甚飛入落紅深處啼湖上逺水晴山湖上村栁花飛雪擁柴門魚吹浪沫翻萍葉鳥浴隄沙糝草根獨老一區揚子宅誰爭三里謝公墩清吟冷館無寥賴皓首空招楚客魂陳墓嶺陳墓憑髙興倍增酒闌扶力強來登山禽下啄薔薇子野鼠髙懸薜荔藤夜雨長廊蕭帝寺夕陽衰草漢家陵西風并入干戈眼猶憶髙臺舊晾鷹華幼武二首幼武字彥清無錫人有黃楊集俞有立云棲碧翁處患難流離未嘗廢吟詠老而愈工要其胸中不以窮通得喪易其志槩可見矣其詩一以工部為法句不苟造章不漫成務去其粗鄙而求其雅麗長篇舂容短吟潔淨有人所不及者詩話彥清以資雄于鄉陳子貞謂其愛詩甚篤而奪于多事題其集曰黃楊且云黃楊遇閏則厄彥清能不為閏所厄則干霄聳壑豫將承其餘隂之下矣其後宅燬于火始移吳郡繼遷海虞又居吳江瑣尾播遷吟詠不廢當明之初富家類多徙濠彥清獨以上中山王詩得免于禍幸矣詩頗淺易曲林睡起二絶特工選家多不録特表出之寄曲林湖上春風也太顛燈前愁殺泛湖船故人何處聽春雨應在江樓未得眠睡起梅子將黃杏子肥緑隂門巷客來稀南窗一枕睡初覺胡蝶滿園如雪飛貢恱五首恱初名性之字友初世家宣城之南湖人號南湖先生仕元為閩省理官明初隱居越之山隂卒門人私諡曰貞晦有南湖集李賔之云南湖詩清新可傳詩話貞晦詩滑而不澀縱而不控固是雲林玩齋家法若越王臺作風作鳴潮吹雨散山如走馬渡江來則警策也接曹孟圭曲江新漲黃梅雨雨裏客船江上來對酒肯辭今夕醉有懷能向幾人開歌傳皓齒香生席舞按纎腰月滿臺縱是金吾嚴禁夜也須容我更遲回畫馬天間牽出許奚官飲罷春流未解鞍記得曽陪仙仗立五雲深處隔花看畫蓮吳王宫殿水流香步屧廊深暑氣涼長日香風吹不斷藕花多處浴鴛鴦題畫桃花紅綻斷橋邉楊栁垂隂散緑煙記得少年曽取醉玉人扶上總宜船題菜西風吹動錦斕斑曉起窺園露未乾三日宿酲醒不得正思風味到辛盤張昱九首昱字光弼廬陵人遷杭元未行樞密院判官有張光弼集楊東里云先生詩氣宇閎壯節制老成而從容雅則稱其所傳詩話光弼策張士誠之必敗作詩刺之云一陳東風一陳寒芭蕉長過石闌干只消幾箇瞢騰醉看得春光到牡丹士誠招之不赴投以詩云山中棊局迷樵客溪上桃花誤釣船又云殘夢已隨舟楫逺五湖春水一鷗飛其居在西湖夀安坊今之花市也貧無以葺廬凌彥翀草募疏云昌黎寄玉川子首稱洛城破屋數間東坡題緑筠軒終比揚州纒腰十萬必能修我牆屋方可有此室廬一笑居士在江西生為斗南望詩名優于張籍生計劣于陶潛囊無一錢之留家徒四壁之立若非慷慨多助安得輪奐一新必欲取杜工部草堂資何時可辦儻葺得楊太尉槐市孰今嵗無憂諸賢圖之名教事也後孝陵徴之京深見溫接憫其老曰可間矣遣還因自號可間老人嘗于酒邉為瞿宗吉誦已作歌風臺詩云世間快意寧有此亭長還鄉作天子以界尺擊案淵淵作金石聲其詩派出西崑未免過于濃縟如萬斛春光金盞酒百年心事玉人筝燒殘蠟燭渾成淚折斷蓮莖却是絲暮雨欲來銀燭上春寒猶在酒尊空星河織女從離别海水蓬萊見淺清蛺蝶畫羅宫樣燭珊瑚小柱教坊筝自從玉樹成歌後曽見銅仙下淚來牡丹開後春無力燕子歸來事可憐分司御史心先醉多病相如渴又生月色夜留江叟笛花枝春覆市樓筝揚州城郭髙低樹瓜步帆檣上下風令楊大年見之定把臂恨晚也少年行看取木槿花朝榮夕已萎芳容有雕謝膩澤何所施夀命如可長仙人今何之髙堂有歌舞及此少年時上已日偕徐大章遊智果寺佳辰際上已屬此清明前春景已云晏風光猶未暄往尋智果寺竟得參寥泉雲物豈殊昔人世自更遷邈哉長公詠髙吟憶當年吾輩復登臨花界何因緣古佛儼香閣真詮積華軒境超萬念空道勝諸妄捐緬彼此會難徘徊未言旋申章續芳藻冀或來者傳白翎雀歌烏桓城下白翎雀雄鳴䳄隨求飲啄有時決起天上飛告訴生來毛羽弱西河伶人和尼齊能以絲聲代禽臆象牙指撥十三絃宛轉繁音哀且急女真處子舞進觴團衫鞶帶分兩旁玉纎羅袖柘枝體要與雀聲相頡頏朝彈暮彈白翎雀貴人聽之以為樂變化春光指顧間萬蕊千花動絃索只今蕭條河水邉宫庭毀盡沙依然傷哉不聞白翎雀但見落日生寒煙詩話陳雲喬云白翎雀生于烏桓朔漠之地雌雄和鳴自得其樂世皇因命伶人舒都隆製曲以名之曲成上曰何其未有哀怨衰婺之音乎時譜已傳矣故至今莫之改陶九成云白翎雀者教坊大曲也始甚雍容和緩終則急躁繁促殊無有餘不盡之意楊廉夫云白翎雀能制猛獸尤善擒鴐鵝廉夫有二詩詠之張思廉王子充張光弼皆有作第雲嶠言製曲者舒都隆而光弼獨云西河伶人和尼齊能以絲聲代禽臆微有不同惆悵三山夢斷綵雲空幾把長箋賦惱公畫閣小杯鸚鵡緑玉盤纎手荔支紅春衫汗裛薔薇露夜帳香回茉莉風惆悵近來江海上却將鞍馬學從戎繡毬花次兀顔廉使韻繡毬春晚欲生寒滿樹玲瓏雪未乾落遍楊花渾不覺飛來胡蝶忽成團叉頭懶戴應嫌重手裏間拋却好看天女夜涼乘月到羽車偷駐碧闌干感事雨過湖樓作晚寒此心時暫酒邉寬杞人惟恐青天墜精衛難期碧海乾鴻鴈信從天上過山河影在月中看洛陽橋上聞鵑處誰識當時獨倚闌如此江山清集同王仲玉陸進之吕世臣作吳越江山會此亭暮春風景晝冥冥長空孤鳥望中沒落日數峯煙外青不用登臨生感慨且憑談笑慰飄零古今何限英雄恨付與江湖醉客聽題揚州左史臣畫扇后土祠前路金鞍憶舊遊春風雙燕子渾似在揚州臨平湖船過臨平欲住難藕花紅白水雲間只應一霎溟濛雨不得分明看好山周砥二首砥字履道吳人寓居無錫與宜興馬治遊荆溪山水有荆南倡和集顧仲瑛云履道與倪雲林最相友善故其詩畫亦似之登西岡望龍池諸峰贈馬二山人登臨不陟險緩步情始暢振衣西岡頭矯首一長望朝陽匿光彩宿霧隱巖嶂回風過林莽草木皆震蕩山人地志熟指顧名所向窮歷吾豈能髙情倚疏放平生煙霞志配此丘壑尚思欲逃喧卑結茅計非曠緣知兵革後已恐淳朴喪蕭條采芝意臨流重惆悵春日空山寂寂行人稀岡頭落花如雨飛罷琴惆悵不能已故鄉寥落何當歸南去百粵羽書急北來三吳戎馬肥安得龍驤擁戰艦掃除俘寇揚軍威吳志淳一首志淳字主一以字行無為州人仕元為翰林待制濠泗兵起徙家豫章復徙鄞有環碧軒栁南漁隱二集詩話待制草隸著名詩亦雅正虞道園贈詩云揮毫妙得中郎法倚席長吟老杜詩為名流傾倒若此晚賦遣懷詩云為儒已入他州籍垂老頻收故國書誦之淒然增淪落之感小姑山長江數千里屹立一峯尊開闢由神禹朝宗自海門魚龍藏白晝星斗動黃昏祗有孤舟客歸心逐浪翻顧觀一首觀字利賔丹陽人仕元為星子縣尉遇亂流寓紹興劉彥昺云利賔詩可方秋露芙蓉頗王元美云觀送人詩重經白下橋頭路憶玄都觀裏花吳江詩鴻鴈一聲天接水蒹葭八月露為霜此等語參之貞元長慶亦無愧色詩話吳主一顧利賔入明未聞通籍然其詩編入劉仔肩明雅頌正音過吳淞江吳淞三萬六千頃震澤與之俱渺茫鴻雁一聲天接水蒹葭八月露為霜輕風漫颭漁郎笛落日偏驚估客航我亦年來倦遊歷解纓隨處濯滄浪髙明一首明字則誠瑞安人元至正進士為處州録事太祖聞其名召之以老疾辭還有柔克齋集詩話顧仲瑛輯元耆舊詩為玉山雅集中録髙則誠作稱其長才碩學為時名流可知則誠不専以詞曲擅美也世傳琵琶記為薄幸王四而作此殆不然陸務觀詩云斜陽古栁趙家莊負鼓盲翁正作場死後是非誰管得滿村聽説蔡中郎是南渡日已演作小説矣聞則誠填詞夜案燒雙燭填至喫粳一齣句云粳和米本一處飛雙燭花交為一洵異事也蔣仲舒堯山堂外紀謂撰琵琶記者乃髙拭其字則成别是一人按涵虛子曲譜有髙拭而無髙明蔣氏或有所據俟再考宿詵公房曉起偶成曉雨池上來微風動寒緑幽人睡初起開窗見修竹西山帶層雲隱隱出林木境寂塵自空慮淡趣常足獨坐無與言流泉下深谷徐􅷂二首􅷂字仲由淳安人洪武初徴秀才至藩省辭歸有巢松集詩話識曲者目荆劉拜殺為元四大家殺狗記則仲由所撰也其言曰吾詩文未足品藻惟傳竒詞曲不多讓古人蓋自知之審矣葉兒樂府滿庭芳云烏紗裹頭清霜籬落紅葉林丘淵明彭澤辭官後不事王侯愛的是青山舊友喜的是緑酒新篘相拖逗金尊在手爛醉菊花秋比于張小山馬東籬亦未多遜詩雖非所長然亦不俗除夕我家四兄弟雕零半不完存者惟二人况復髮盡斑亂離因析居破屋各數間薄田不周飢何以能當官我比兄更劣運蹇家多艱中年再鼓盆豈特貧且鰥落落羈芹宫空戴儒者冠池魚與樊鳥鱗鬛欲縱難邇來遂吾志腰腳俱兩間歸田理松竹手植青琅玕俯視庭下孫皎皎雙玉環坐膝挽我鬚眉目如春蘭焉知匪丘冢天道終好還晚年得細君所執供厨餐固無桃李姿端厚勝小蠻客來供酒脯聊足盡主歡雪消楊栁陂春動梅花山緑窗間香閣獸炭燒春盤何如飲長夜燭短夜未闌酒盡塤篪鳴慷慨出肺肝願言敘天倫相期永團欒四月十七日喜王德剛過訪故人去此久逺若天一涯雖曽入我夢未獲親見之胡為忽叩門使我倒接㒿初逢固知喜動問還可悲杳絶二十年人事想參差吾翁與若翁世世心相知今雖盡物化眼見孫與兒其如年運囏我輩逢亂離昔為少壯交今我窮誰依閭巷日蕭條十家九無炊向來車馬地零落如殘棊我守先人廬強以一木支門閭設雀羅親友過者稀焉知寂寞後君獨重來兹請君為我留為君具酒卮醖發春泥封盞洗青花瓷殺雞具肴脯作饌充晨飢劇談善戲謔亹亹俱忘疲酒盡更起謀情到不復疑君猶執謙退一飲三致辭人生無百嵗焉能長娛嬉浮雲無定蹤爝火無流輝黃河不西返白日長東馳與君兩萍水暫合仍相違但守金石心後會終可期姚璉二首璉字廷用又字叔器歙人元季為理問所知事明初與唐仲實同迎蹕于街口被顧問事見五倫書漁梁結屋石梁之上姚家莊隔溪指點山蒼蒼飛樓傑閣非我事翠竹老梅開此堂新豐雞犬歸未得韋曲桑麻如許長三間茅屋吾老矣擕兒擬拜龎公牀冬日野人曝背向牆隈時飲茅柴酒兩杯滿階落葉渾不掃拄杖去尋江上梅唐仲實一首仲實名桂芳以字行歙人元季南雄路學正明初攝紫陽書院山長有武夷小稿送湯生執中薄暮雲已收微寒雨還作居人念睽離戚戚意不樂何時竹屋眠共看燈花落塗幾一首幾字守約又字孟規宜黃人有塗子類稿詩話塗君于文髙自矜許集有弔余文賦云負豫才之宏異兮早卓倜而莫羣較錙銖于古人兮又何數乎今之人而又云芰荷不可以為衣兮女蘿不可以為帶則匪安于遁世者也嘗撰時事策十九篇上書孝陵自稱臣平生苦學見于文章時輩妄推謂當與漢唐諸文人略相先後使居館閣紀述聖君賢臣之事業足以載當世而垂無窮亦大言不怍矣然其文頗牽率鄉人鄒矩元方序之謂沉雄悲壯佚宕奔逸此欺罔之言也詩亦平平乏警策俗傳酒詩一卷或云是幾所作兵後述懷世亂遭漂泊塗窮轉寂寥每懷經濟業無補聖明朝嵗月戎機失風霜客恨銷故園春草緑隨意狎漁樵李勝原一首勝原字源澤當塗人明初保障鄉里立功有盤谷遺稿涇縣古木荒碑對縣門數家煙火自黃昏河流故繞山邉市驛路斜通郭外村煙雨園林梅結子春風籬落竹生孫愁看市井蕭條甚喪亂曽經幾戍屯黃樞二首樞字子運休寧人洪武初被徴以躄免鄉人稱為後圃先生有後圃存稿遊汝潛云先生詩溫厚平淡所以可傳吳子芳楓林牧隱露晞春草細林逺青楓長中有沮溺徒結廬先隴旁于焉可耕稼自牧牛與羊搢腰笛竹短插笠山花香犢飽夕言歸濯足澗月涼喟彼塵世人馬蹄終日忙橫眠緑草嫩肯羡金鞍光老農願卜鄰持鞭白雲鄉招手金華仙與爾相翺翔婺州竹枝詞桃花雨晴春水生東風去船如箭行鯉魚活煮蘭溪酒篷底醉睡江月明吕不用三首不用字則耕新昌人洪武初舉本學教諭以聾辭自號石鼓山聾有得月稿曽伯曼云則耕詩老邁放曠有傲世不羈之懷蓋山林草木之秀傑者腐王叔雨云則耕長篇短歌無一語塵題顧雲屋雲山圖我識東吳顧文學早嵗丹青動黃閣揮毫得意傲王侯霜刮虬髯靣如削一自塗窮悲濩落旅食南州夢非昨蛟龍為魚氣鬱勃散作春雲滿丘壑乾坤無地著茅茨寫向雲根亦竒作荒林日色曉蒼涼古木風聲晚蕭索首陽蕨根秋土深商嶺芝苖今寂寞看圖為問人何在晚交駐意歸猿鶴東山寺題樓壁白雲幾曽散却作一樓貯明月夜夜來無人敢擕去題送别圖何處瞻衡宇西江煙水村彭郎磯上月送汝到柴門沈夢麟五首夢麟字原昭歸安人元末武康尹入明以賢良徴不仕有花溪集詩話原昭元季隱于花溪劉伯溫曽相依溪上贈以詩云杜陵老去詩千首陶令歸來酒一樽及入明雖不受爵而校文閩浙者三同考會試者再故孝陵以老試官目之其分校閩闈在洪武丙子嵗當時同考官有劉子彥蔣文質劉季冶蘇鳳儀均有詩酬和今不能悉舉其名矣花溪在歸安縣治東南七十里土人名曰花城原昭田産頗饒其子孫坐事謫戍田亦沒官歸于誠意伯劉豸豸集中有花溪田舍詩云田間處處三楹屋門外家家半曲湖婦踏水車欹抱子兒撑漁艇笑驚鳬想見風景之足以移情矣原昭詩格清穩特少警拔句余中余中瀕海門望望斥鹵地居民多四散共享牢盆利昔人生厲階於此置官吏榷鹽限程期立策事鞭箠煙飛朱火騰海立銀濤沸漉沙鉛淚凝椎甓瓊英碎天髙嵗崢嶸草白北風厲玄雲間萬竈積雪照千里陸輸車軋軋水運舟尾尾雖云國課集民力已雕瘁蹇驢歷亭場攬轡察地里大江繞長淮殺氣寒贔屭增科苟不息禍亂恐未巳吾將叩閶闔悃悃訴微意狂言儻欺君薄命有如水野航一室淨無塵門通畫舫鄰若分鷗鷺席能受兩三人江水家家緑溪花岸岸春杜陵貪佛日隨意賦詩頻中秋夜泊黃河黃河滚滚浪翻盆百尺帆檣上下奔月色偏於今夜白河源不改舊時渾雷行西北通天極風送蛟龍入海門欲酹一觴歌九敘千秋萬嵗禹功存趙待制席上春城飛絮日顛狂簾幕風微燕子忙醉後不知羅袖薄牡丹花上月如霜發華家步華家步頭山作城溪中小船如奕行五更風雨到篷底八十二灘春水生滕克恭一首克恭字安卿祥符人仕元為集賢院直學士遇亂避地錢塘洪武初兩聘充本省考試官有謙齋稿李川父云先生詩律清婉頗有足觀詩話崑山周夀誼一百一十四嵗魏觀守蘇州舉為鄉飲賔新昌吕不用有叔祖百嵗作百嵗老人歌其辭曰吾家老人一百嵗盎盎晴簷曝鮐背自言生見宋餘黎元氏興亡身尚在大明洪武聖人作坐沐雨露又七載蓋兩人皆生于宋歷元及明尚存信人瑞矣然兩人初無文采表見斯猶草木之年爾若吾鄉鮑仲孚八十餘被徴以白衣充會試考官歸田久而後沒吳興沈原昭錢塘寓公滕安卿皆以元廢官屢典文衡原昭年九十安卿至百有餘嵗斯則儒林之盛事也寄李提舉錢塘經亂後應是減繁華逺信秋憑鴈鄉魂夜到家兩江罹戰伐四海廢桑麻何日重攜手春風汴水涯葉顒四首顒字景南金華人有樵雲獨唱顧俠君云景南自序所作詩以為薪桂老而雲山髙寒音調古而巖谷絶響故名其集曰樵雲獨唱長孫雍編次成帙曽孫戶部尚書淇重刻之廣東布政使安丘袁凱為之序漁父曲雨過暮雲收江空涼月出輕蓑獨釣翁一曲秋風笛宿鷺忽驚飛點破煙波碧秋懷次童中州韻長空好明月燦爛今夕晴萬里皆月色四顧無人聲徘徊下青松照我茅屋明我望長歎息悠然萬感生取杯挹清光和此松露傾咽之清肺腑快我平生情九日寄興黃菊香殘夜雨烏紗醉落秋風回首十年舊事亂雲流水西東月夜梅邉即事香裏寒雲滿溪月明津渡人迷夢入江南舊路夕陽流水橋西張庸九首庸字惟中慈溪人元季兵亂竊據者署為上虞山長不就明初聘不仕有全歸集烏繼善云處士律詩渾淪雄偉鏗鏘典麗不待論矣其歌行性所喜而尤用意者如長江萬里其靜也湛然一碧雲漢萬里參錯其內及其怒也波濤奮迅蛟龍魚鱉出入其中而莫之測馮損之云先生與寓公都事龍子髙編修馬易之少監揭汯正字桂彥良為倡和交風晨月夕意有所到一于詩發之詩話惟中髙遁世之節然與龍提學子髙桂正字彥良烏永新繼善諸君子先後往還酬和其送胡維舟金陵歌云金陵帝都天下壯萬國會同天浩蕩昔年聘我我曽遊曽上鳳皇臺上頭則明初亦嘗受聘幣而未通籍者殆昔人所云隱不違親貞不絶俗者邪桃花牛歌為桃源山人王敏功賦五陵年少五花馬兩耳生風汗流赭金絡絲韁白玉鞭鬬雞每過長楊下桃源山人桃花牛青蒲為韉繩作鞦不與年少爭風流來往桃源溪水頭桃源由來風景美桃花無數亂紅綺花飛片片點牛身幾度春風吹不起春風浩蕩日色和款款騎牛行且歌唐虞世逺知奈何笑指落日如流梭君不見中原戰爭時已久白骨相撑豺虎走五陵年少家何有流落江南衣露肘江南又復兵甲興天下紛紛何日寧我欲騎牛亦向桃源去只恐漁郎知住處殺犬謡君不見天媚蟇被蟇瞎人養虎被虎齧玉川作詩何激烈主人養犬忘施恩一朝難作身取滅當時得犬一尺髙身上褵褷覆金毛朝夕呼之餧飼勞一月不見大如獒金鈴懸項食人食家人睥睨那敢叱風吹簾影聞吠聲日轉花隂見行迹毛色才深親為剪舞裀容卧不教卷犬心有恃挾其曹舐鐺翻甕日驕蹇主家綺席羅髙堂豹胎熊掌雜羔羊厭犬之橫蹴犬去利主之食齧主吭壯士聞之氣憤結手揮金錘犬腦裂磔犬之肉祭犬血主人之讎始一雪嗚呼世降忠義銷不獨人間犬作妖項家有奴類如此試作王公殺犬謡賣驢買牛歌為胡維舟賦驢可以跨不可耕牛可以耕還可跨山人賣驢歸買牛買得牛來頗同價溪雨初收水繞門山人曉耕溪上雲土膏不覺秋成早香秫釀成新酒渾翻思養驢竟何益空將芻豆飽其食軀小蹄薄終無力有時跳梁蹶側石草深牛背穩於舟浩歌白石南山秋却笑哦詩灞橋上滿身風雪歸來休腰帶鈴腰帶鈴郵夫傳命風火生夜逢猛虎當前行銜入南山鈴有聲鈴有聲被虎食夜夜山邉候人隙十里嚴程時四刻後知來者還絡繹君不見官拾斷鈴重鑄鑼虎怕鑼聲將渡河行路難書所見昨朝殺虎潘家園今朝殺虎蘆浦團獵人羽箭銅牙弩連朝殺虎來送官送官歸去日將夕沙路紛紛皆虎迹四山哮吼刮腥風手驚弩墮那能射君不見一虎死百虎生行路難路難行癸丑嵗梅溪聞鵑杜鵑生子百鳥巢百鳥哺之成羽翼飢鷹反目不敢親百鳥亦自逃荆棘千年遺恨只自憐四野無營何處食空將憤氣結春愁勸人歸去成何益我家只在鄞江頭欲歸未歸汝知不有人正逐中原鹿無心更理梅溪舟汝身胡不自歸去錦官城裏多髙樹尾長翼短路復迷雨橫風狂春已暮且向庭前樹上棲莫向天津橋畔啼丙午嵗感懷中原無限好山河都付尊前感慨歌斗酒十千愁裏醉三春一半雨中過落花寂寞渾無數短髮飄蕭白更多苦欲山深延暮景憑誰一舉魯陽戈揚子江晚泊與同舟劉伯瑾諸公東鄞倦客家何許北固鐘聲暝却聞小汛候潮船已泊上弦看月鏡初分憑誰貰酒酬三益且自題詩詠五君謾憶南湖垂釣處磯頭新水緑生紋梅拄杖尋春路不賖小橋流水野人家千年老幹屈如鐵一夜東風都作花藍仁二十四首仁字靜之崇安人明初內附隨例徙濠尋放還有藍山集蔣師文云靜之昆仲切磨塤篪迭奏和平雅淡辭意融怡語不雕鎪氣無脂粉出乎性情之正而有太平之風惜其不列承明著作浮湛閭里傲睨林泉有逹士之襟懷無騷人之哀怨即屢更患難而心恆裕如要其所作皆治世之音也張雲松云靜之詩平居時優柔沖淡處患難則憤激而憂思交朋友則眷戀而情深針規而意篤不怒罵不諛諂不蹈襲以掠美不險怪以求竒麗則而不苟雋永而有餘深得詩史之遺意陳廷器云藍山詩力追盛唐規員矩方靡不合度者蔣仲舒云二藍勢力相敵已入作之室詩話二藍學文於武夷杜清碧學詩于四明任松卿其體格専法唐人間入中晚蓋十子之先閩中詩𣲖實其昆友倡之藍澗仕而藍山隱其戲題絶句云朝野文章自不同壤歌何敢敵黃鍾山林别有鈞天奏長在松風澗水中然其述懷詩云無才甘下位有識笑庸人又云何事漁磯棄空煩鵲印隨又有甲寅仲冬攝官詩題則靜之亦不終于山林者也集有蔣易張矩二序易字師文自號橘山真逸嘗選皇元風雅豫有其書矩字孟方自號雲松樵者靜之贈詩云文宗曽子固篆逼李陽冰惜其著作罕傳矣秋山懷友天寒草木疏落日照平野孤雲西北馳獨鳥東南下仰聆寒蟬悲俯見驚湍瀉物情自索寞秋色正瀟灑良朋久相違離思何由寫擬貧士二首蠨蛸網我戶蟋蟀號我壁被褐不掩脛采薇豈充食嵗有飢寒憂巷無車馬迹豈知曠逹觀不以貧病迫昔聞孔顔聖亦有陳蔡厄淡然忘世慮弦歌自朝夕蓬門有一士被褐恆苦飢朝飲南澗流暮食西山芝雖有二頃園蕪穢亦不治妻子共寂寞彈琴詠書詩荒林積雪深古屋炊煙遲髙卧自有適何必他人知宿田家望武夷山仙崖蓄靈異怪石盤空曲一水隔花村千峰入茅屋金芝暖逾秀瑶草寒更緑雲中武夷仙一一顔如玉白馬去不歸玄猿叫相逐昔陪丹丘侣酣歌紫霞谷雞鳴洞天曉落月在林木空瞻仙子髙舊夢那可續荒林激悲風日入對樵牧佇立望歸雲解衣田舍宿暮宿田家作木落天正寒山空日將暮荒林倦鳥歸亂水行人渡窮年滯草莽短褐被霜露晚宿依田家主人情亦故汲水泉滿澗燒竹煙在戶鐘殘溪上村月照階前樹濁酒初潑醅嘉蔬亦時具且慰飢渴懷况諳村野趣老翁八十餘有子沒征戍粳稻嵗莫收官司日加賦我願息兵戈海宇重農務愧乏經濟才徒然守章句正月十四日西山感興久曠山水遊今晨願無違松林收殘雨郊園淡朝暉憩澗弄清泚緣岡陟翠微池魚暖始遊巖花寒尚稀髙人坐空堂深竹對巖扉山中聞犬吠谷口見樵歸心賞適有契仙遊詎能希賴此一樽酒暫然息塵機古來朝市間榮華多是非所以首陽士白首尚采薇風雨不已川流渺漫感事敘懷簡我同志雲雷中夜興風雨逹清旦開門山木昏隱几波瀾亂鸛鵲下空庭蛟螭上髙岸舟航逺樹杪石壁中流半黍豆或漂流蓬蒿乃滋蔓北風不掃除南海盡瀰漫乃知兵戈氣鬱結久不散坤軸恐欹傾陽烏失光燦傷哉轉凄涼涉世正憂患微躬愧鳥雀何由塞天漢暮秋懷鄭居貞季秋霜露降草木日已衰暮登城門丘遙望滄海涯鳥鳲求其羣况在逺别離美人顔如玉夢寐恆見之飄蕭紫鳯毛照耀珊瑚枝海水不可越丹砂詎能期灎灎杯中酒泠泠桐上絲豈無一日歡念子來何時少壯難合并流光倐如馳悠悠逝川歎渺渺停雲思宿橘山田家懷蔣先生蒼峰落日微白鶴秋風逺客路入疏鐘田家背山阪孤煙桑柘寒歸鳥茅茨晚欲覔紫芝翁山深白雲滿西山暮歸涼葉墜微風秋山正蕭爽天寒獨鳥歸日夕百蟲響偶從桂樹招遂有桃源想石磴闃無人山猿自來往暮歸山中暮歸山已昏濯足月在澗衡門棲鵲定暗樹流螢亂妻孥候我至明燈共蔬飯佇立松桂涼疏星隔河漢題鄭德彰員外所藏髙彥敬畫楚江春曉圖旭日未出羣山昏蒼茫楚江多白雲芳洲無人采蘅杜落花飛絮春紛紛晴嵐滿戶漁家曉花枝髣佛聞啼鳥巫陽夢斷三峽空湘渚愁深九疑小風流文采髙尚書如此江山歸畫圖平湖煙靄水空闊隂壑松檜天糢糊左司郎官何處得髙堂紫翠生春色是中疑有五湖人一葉扁舟蕩空碧雲峰秋霽圖為方煥賦茅屋溪頭紅樹村石梁秋水清無痕枌榆過雨鳥鳴澗粳稻如雲山對門老翁日髙睡未起稚子讀書窗戶裏干戈如此賦斂煩雞犬晏然鄉曲喜山中酒熟黃花開仙人候我芙蓉臺雲林今夜好明月擬跨幔亭黃鶴來贈武夷魏士逹武夷山水天下無層巒疊嶂皆畫圖山川直疑渾沌鑿秦漢而下靈仙都中天積翠開宫殿石壁虹光夜如電鸞鳳常驂神姥遊猿猱共醉曽孫宴洞中别有升真天瓊林遺蛻如枯蟬露盤仙掌千年藥春水桃花九曲船萬松岡頭羽衣客更入三山采真訣神遊不計海天遙夢覺長懷海天白歸來髙隱萬年宫天香時降雙青童道參元始鴻濛外身寄虛空象緯中嗟豫久慕煙霞侣天遣空山作詩苦清歌曽繞幔亭雲凍筆空題草堂雨金丹擬就玉蟾分木葉西風鐵笛聞野老只知堯舜世樵夫或遇武夷君寄余復嬰道士清溪住扁舟久未回井垂霜後橘門掩雨前苔鳬舄長相候魚書杳不來虹橋他日宴又負紫霞杯石村除夕衰病身為纍窮愁嵗又除枕戈鄰境靜卜宅逺村居海舶追編戶山田責簿書應門兒不暇休問過庭踈寄張兼善故人卜隱依山寺野老遷居到石村濁酒近篘謀共醉新詩未穩許同論南風吹笋初成竹宿雨移松已引根肯向草堂尋杜甫百年地僻有柴門病起偶成春來春去總匆匆九十光隂卧病中緩步也愁平地險加餐不與去年同生憎野草侵階緑可惜殘花過眼空昨日鄰童偶相值不知何處一衰翁寄雲松雲松隱者巢居處上有屏山下藉溪花徑夕陽眠鹿豕釣磯春雨集鳬鷖十年種术春林逺萬卷藏書草屋低久欲相從叩羲畫負苓長往碧巖西梅村與雲壑會宿清泉白石趣難忘又得春前會草堂對酒先拚今夕醉題詩還倚少年狂山林寂寞形容老氷雪間關道路長共愛雞鳴聽山雨後期何處更連牀小樓對雪有懷西山道人西山白雪一丈深北風吹倒長松林千崖無人虎豹死中夜有客烏鳶吟髙樓此時最相憶弱水隔海知難尋凡身毛骨更蕭爽願借黃鶴棲雲岑雲壑寄惠黃楊木簪并詩黃楊為木至精堅寸幹三春長未全偶乞餘材簪短髮兼煩佳句寄衰年籜冠不用傍人正槲笠還宜覆頂圓慚愧病軀梳沐少髼鬆雙鬢日髙眠賦網巾白頭難掩雪霜蹤纎手穿成絡索同映帶暮年微矍鑠遮藏秋色久髼鬆牽絲祗訝蛛臨戶覽鏡翻愁鶴在籠便與黃花相見好不愁破帽落西風詩話網巾之制相傳明孝陵微行見之于神樂觀遂取其式頒行天下冠禮加此以為成人三百年未之改然題詠者寡獨藍靜之有三詩豫録其一焉其二詩謝劉蘭室見惠而作一云故人于我最相親分惠青絲作網巾鏡裏形容如束縛眼中綱目細條陳少遮白髮安垂老轉襯鳥紗障俗塵更與籜冠藜杖稱世間還有葛天民一云故人念我鬢毛疏結網裁巾寄敝廬白雪盈簪收已盡烏紗著紙畫難如門臨寒水頻看鏡籬掩秋蓬不用梳昨日客來應怪問衰容欲變少年餘題青山白雲圖茅屋何人共住石林似我曽遊白雲只在半嶺青山誰到上頭王沂八首沂字子與泰和人洪武初徵為諸王説書授福建鹽運司副使以老辭歸學者稱為竹亭先生後以孫直貴贈光祿大夫少傅兼太子太師吏部尚書與弟佑俱以詩名有竹亭遺稿烏繼善云子與四言詩春容嫻雅如陶淵明五言沖淡瑩潔如魏晉齊梁七言宫詞情景悠逺如王建七律歌行典麗鏗鏘莫非方軌盛唐諸君子之胡行簡云子與詩根于學問之功發乎性情正沖淡髙雅音韻鏗鏘卓然成家非世之琢句鍊字極意模仿者比彭聲之云先生五言迥出流輩瑩如冬氷清如秋露馥如春蘭潤如夏籜歌行有天驥之馳驟無寒蜩之悲鳴而律絶之佳者若秋水芙蓉映照初日清麗無塵東胡光大云子與詩舂容典則優入盛唐楊里云竹亭先生于詩古體用意魏晉以上近體不肯出中唐下梁用之云先生昆弟肆力于詩與大梁辛好禮楊伯謙上元周伯寧清江彭聲之豫章萬德躬倡詩學于東南觸景遇事凡可喜可愕可怒罵可太息者一寓于詩音調格律之嚴必合于典則所傳二妙集者門人蕭翬所收輯直十百中一二耳而鄒仲熙云先生之詩平淡簡逺如玄酒在尊自有至味非世俗夸靡相尚者可企及也詩話子與詩格清婉如水墨雲山絶勝調鉛殺粉題觀泉圖毖彼泉水其清瀏瀏既出于山亦經于丘原則有坎陸則有岐汪汪洋洋莫知所之奔壑西馳經天東注夫豈性然勢激而寓斂此涓滴至于尋丈隨波同流惟海是向彼觀泉者朋簪童琴洗耳其操濯纓其心鳴雨林臻霏雪崖至時不待人圖不盡意漆園蒙莊妙契淵默君子人與果行育德養正之功有漸無已朂爾後來是之取爾由竹壩望錦川桃李春色如畫有懷陳邑令涉淺上輿梁憑髙眺鄉縣灼灼桃李花層層逺皆見兵餘草根盡此地芳菲遍氣暄雉雙雊景淑鶯百囀邑里齒故繁絃歌俗丕變懷賢思如渴敷政速于傳孰是潘安仁而猶宓子賤九月十一日鄰寇逼境倉皇南渡感賦鄰邑舉烽燧長驅寇南平中宵始聞警挈家遂逺行倉皇具舟楫所志惟弟兄初營暫涉水將謂復還城歸塗逼煙焰戎馬亂縱橫父子兩隔絶慘哉生别情慈親力疾起負掖同遐征飢分路人食渴飲田婦羮兒童不遑息踽踽昧前程為謀苦不早臨難乃無營前事杳難測逢人空涕零存亡有至理瞬息且偷生望南屏山同吕仲鉉仲實作遊目南屏山逍遙稅塵鞅清溪亂流涉疊巘緣雲上輝輝瀑泉落隱隱天籟響荒塗理通塞虛室靜𢎞敞中有餐霞人長聆御風想不乘緱嶺鶴還顧漁郎舫芝草甘若飴雕胡大盈掌雖為頽齡駐亦忌流光往永懷山中遊觀化歷清賞壬寅紀異同劉以和賦壬寅仲春天雨雹南屏城中盡驚愕初從屋瓦亂崩騰散入階除更跳躍兒童不識挽衣盛兩兩相看恣相謔老年閲歷憂患餘却顧兒童淚雙落春秋咎徵不一書兹事班班宛如昨自從兵變十年來澒洞風塵亘沙漠奮當車轍小物為天理何嘗宥元惡竊聞李郭收兩京元氣依然萃光嶽旄頭夜夜燦中天風虎雲龍聖人作嗚呼風虎雲龍聖人作吾徒勿憂在溝壑過臨江訪彭聲之金鳳州邉路維舟重憶君江虛秋氣入沙淨曙光分斷鴈前汀起鳴鐘隔岸聞因過鑑池上詩思亂愁雲小莊道中客路千崖裏春風二月中虎蹄荒徑少鶯語故鄉同澗水縈回緑山花自在紅物華空滿眼去意只匆匆秋江送别圗題贈黃通守允中秋江木落楚天低目送歸船渡聶溪莫道浮雲千里隔君山只在洞庭西陳周一首周字仲昌閩縣人布衣隱居石潭以子叔剛貴封監察御史倚竹歌修竹兮青青中虛兮外直素節兮貞姿寒暑兮一色泠泠兮朝夕豫舍之兮焉適易恆二首恆字久成廬陵人徙家崑山洪武中應薦至京以老罷歸有陶情集莫士安云久成年逾八十有四而能吟詠太平娛樂晚節短句嶄絶長什沖融近體齊整不難步追先古周叔訓云久成五古優柔詳雅七古敦厚舂容近體清新美麗誠為治世之音詩話陶情一集邉幅太拘其示諸生詩云情婉味終涵雋永調髙語不在矜持其所尚然也晚泊揚子江口述懷落日雲山外孤舟野寺隂招魂悲楚些歌榜起吳音風色洲前定江痕雪後深頻呼秣陵酒聊慰白頭吟風雨憶瀼西故園十畞瞰林塘花竹隂隂覆小堂好友肯來惟一二老夫不出是尋常白魚寒鱠槎頭雪朱橘秋嘗屋角霜雨雨風風歸未得空勞飛夢繞滄浪逯昶一首昶字光古修武人有逯光古集詩話光古詩學晚唐句如潭淨開天境山昏著霧巾樹枝猿挂折花片鳥銜來僧舍竹松院人家瓜菜園雲來羣壑暗日下半川明秋色老棲樹夕陽明在山令賈島佛見之當亦點頭也舟下淮水伐鼓下淮津川光回暮色數峯雲外青一鳥沙上白悠悠水驛浮颭颭風帆側舟人有嚴程知我歸朝客韓奕八首奕字公望吳人有蒙齋集詩話明初吳中髙士三人一為長洲王賔仲光一為崑山王履安道其一則公望也三人皆隱于醫仲光詩多俚率安道遊華山作詩一百五十首然無足録者必以公望為巨擘焉秋齋林居近冬候雨晴天已冷露蛩啼夕隂風竹亂窗影衰來身自覺欲寡事斯屏偶此山中人清談坐宵永夜訪隱者家舍舟陟伊岸逺思一翛然幽人田中廬髙栁當門前微月照疏雨夜花靜涼天相見愜始願歡言殊未眠湖州道中百里溪流見底清苔花蘋葉雨新晴南潯賈客舟中市西塞人家水上耕岸轉青山紅樹近湖搖碧浪白鷗明棹歌誰唱彎彎月仿佛吳儂子夜聲春望次韻春城栁色幾家連厨舍多時似禁煙處處緑蕪生夜雨村村白水落平田花稀野圃東風外人逺江天去鴈邉盡日百花洲上路往來惟有一漁船寄江隂夏翁殘山剩水舊吳宫幾度相期杖屨同夜雨新晴桃葉渡春寒已過杏花風人生暮景方多暇春事濃時一半空邂逅逢人因問信酒船何日過湖東春思積雨柴門草色新一經白首又青春也知性癖難趨俗却喜身間不屬人冷食鄰家將禁火軟泥門巷不生塵髙懷誰肯同蕭散放棹煙江采白蘋雜興一巷西風落葉半窗斜日殘書年老怕逢人事天寒不出吾廬惜春漠漠晴光淡淡天山青水白景依然杜鵑啼處花如雨白髮傷春又一年王賔一首賓字仲光長洲人有姑蘇雜詠越來溪吳人舊地越人開岸上誰將栁樹栽春水緑波三二月畫船全是賽神回明詩綜卷十二
