body:
  text: 明詩綜卷五十一翰林院檢討朱彞尊編李攀龍十八首攀龍字于鱗歴城人嘉靖甲辰進士除刑部主事歴郎中岀知順德府升陜西提學副使轉參政終河南按察使與王世貞謝榛梁有譽宗臣徐中行吳國倫稱七才子有滄溟集朱中立云滄溟天才跌宕竒氣特出誠天閑之逸足藝塲之上匠也穆敬甫云于鱗搆思𤣥逺造語精深如蒼厓古壁周鼎商彛竒氣自不可掩如顧𤣥言云觀察七言律函思英發襞調豪邁八音鳳奏五色龍章開闔鏗鏘可稱絶美至五言似有不盡然者王元美云李于鱗如峨睂積雪閬風蒸霞髙華氣色罕見其比又如大商舶明珠異寳貴堪敵國下者亦是木難火齊又云七言律詩至仲黙而暢獻吉而大于鱗而髙竊王敬美云于鱗七律俊潔響亮海内爭事剽至使人厭七彭子殷云于鱗樂府思上薄漢魏而病於襲美律髙華絶響之中不免著迹屠緯真云元推尊于鱗誠過當時諸公揮毫或未免纎弱于鱗晚出蒼健驚人奈何不壓倒曹耦今若盡讀于鱗詩初則喜其雄俊多則厭其雷同若雜一首於衆作之中則陡覺矯壯而突出矣宜其為元美賞詫如此也摹王承父云詩衰於宋元北地起而復古一代擬之格此則創矣歴下一變鍛鍊淘洗脱凡腐而尚精麗然才情聲律未極變化故用豪句搆壯字自高或晦而雜疊複而致厭始多宗之後且避之也亭胡元瑞云獻吉學杜步趨形骸登善之摹蘭也于鱗擬古割裂飣餖懷仁之集聖教也必如獻吉歌行于鱗七律斯為雙鵰幷運各極摩天之勢又云于鱗七律高華傑起一代宗風而用字多同十篇而外不耐多讀又云仲黙為大家不足于鱗為名家有餘可李時逺云滄溟七律誠佳至于擬古雖無作也孫文融云于鱗詩自工但恨猶是中唐調玉何无咎云濟南以髙華嘹喨取勝非不金莖樹月鶴霜鐘第語過清空意少變化過段虎臣云嘉隆間王李等七子詩學盛唐不匡廓耳至于㴱沉之思雋永之味超脱之趣尚未入室心曹能始云于鱗古詩不作漢魏以後語然有學歩去之愈逺而無意者時或近之至其樂府自謂擬議以成變化而子無取馬焦弱侯云七子互相矜許雖有名於時而詞調往往如出一人陳文湛持云濟南七律接軫李頎可無慚色卧子云于鱗天骨既髙人工復盡如玉出藍田而復遇巧匠珠同隋侯而更耀螓首故遇瑕必剔有美必雙總其經營反側不輕染翰故能領袖羣倫五古規摹建安潘陸以後涉筆便少未免取境太狹七古原於李頎而雄整過之五律雜出盛唐諸家七律有王維之秀雅李頎之流麗而又加整練髙華固為千古絶調絶句調甚練而若出自然意必渾而每多可思照應頓挫俱有法度未易至也而姚仙期云于鱗擬古自黄澤白雲南山越人下幾欲一字一意不差毫髪比於胡寛之營新豐獨不思伯樂相天下馬若滅若没若忘若失自有其天機耶王貽上云滄溟弇州皆萬人敵惟蹊徑稍多古調寖失是以不逮𢎞正作者静志居詩話于鱗樂府止規字句而遺其神明是何異安漢公之金縢大誥文中子之續經乎惟相和短章稍有足録者五言學步蘇李曹劉如浮雲從何來焉知非故鄉來者自為今去者自為昔差具神理然新警者寡矣七言五律絶句要非作家惟七律人所共推心慕手追者王維李頎也合而觀之句重字複氣斷續而神􅏠離亦非絶品元美比之峨睂天半雪至謂文許先秦上詩卑正始還譽過其實于鱗乃居之不疑據白雪樓髙自位置此時章丘李伯華架揷萬卷書海豐楊伯謙吟精五言體是宜降心相從乃敢大言謂微吾竟長夜豈非妄人又自詡與元美狎主齊盟目四溟以櫜鞬鞭弭左右四溟豈心服乎紫騮馬歌二首出入渭城中少年獨妍雅不知是阿誰但識紫騮馬問客復何為昨日發東平袖中出短書心知自劉生懊儂歌長江得春風使帆如使馬朝發牛渚磯暮宿白門下黄督誰能見歌舞不自愛陽春少年雙淚落知是他鄉人古意秋風西北起吹我游子裳浮雲從何來安知非故鄉蕭蕭代馬鳴翩翩下枯桑暮色入中原飛蓬轉戰塲往路不可懷行役自悲傷送趙户部出守淮陽仙郎起草漢明光幾載軍儲事朔方五馬新為淮海郡三臺舊署度支章行車麥秀隨春雨卧閣花深對夕陽時憶上林詞賦客鴻書遙下楚雲長送皇甫别駕往開州銜杯昨日夏雲過愁向燕山送玉珂吳下詩名諸弟少天涯宦迹左遷多人家夜雨黎陽樹客渡秋風瓠子河自有吕䖍刀可贈開州别駕豈蹉跎同元美與子相公實分賦懷太山得鐘字柬順甫域内名山有岱宗側身東望一相從河流曉挂天門樹海色秋髙日觀峰金篋何人探漢䇿白雲千載䕶秦封向來信宿藤蘿外杖底西風萬壑鐘陸氷修云起二語嫌太淺弱懷子相薊門秋杪送仙槎此日開尊感歲華卧病山中生桂樹懷人江上落梅花春來鴻鴈書千里夜色樓臺雪萬家南粤東吳還獨往應憐薄宦滯天涯郡城樓送明卿徙倚髙樓問索居故人湖海意何如尊中十日平原酒袖裏三年薊北書大麓夏雲當檻出石門寒雨過城疎明朝逺道空相憶那得仍停使者車寄劉子成書札清秋問解攜郡齋吟眺楚雲低大夫持憲臨諸粤使者徴兵出五溪白日自流荒徼外青山不盡夜郎西於今萬里看銅柱何意中原厭鼓鼙平涼春色蕭條白日斜平涼西北見天涯唯餘青草王孫路不屬朱門帝子家宛馬如雲開漢苑秦兵二月走湖沙欲投萬里封侯筆媿我談經鬢有華重送山甫短髮蕭蕭日影孤清秋行色又皇都百錢杖底猶懸否片刺懷中好在無老去他鄉唯藥物愁來佳句滿江湖只言倒屣㝷常事不是燕山舊酒徒子與病起移書二美吳下羣賢爰修褉事踊躍勝遊遙為屬寄伏枕經春憶舊遊永和三日命扁舟一時藝苑人亡恙千載蘭亭事可求吳下山川何藴藉王家兄弟本風流獨憐搦管傳觴處有客中原自白頭上朱大司空河隄使者大司空兼領中丞節制同轉餉千年軍國壯朝宗萬里帝圖雄春流無恙桃花水秋色依然瓠子宫太史但裁溝洫志丈人何減漢臣風郡齋同元美賦得橋字山色秋停使者軺孤城何處不蕭條請看襄子宫前水依舊東流豫讓橋春日聞明卿之京為寄十載浮雲傍逐臣歸來不改漢宫春摩挲金馬宫門外誰識當年諫獵人贈梁伯龍太華峰頭玉女壇别時明月滿長安不知秋色今多少君到仙人掌上看王世貞四十二首世貞字元美太倉州人嘉靖丁未進士除刑部主事歴郎中出為山東副使以父難解官補大名兵備歴浙江參政山西按察使入為太僕寺卿以右副都御史撫鄖陽遷行大理寺卿歴應天府尹南京刑部侍郎改兵部進刑部尚書有弇州正續四部稾穆敬甫云元美才識雄俊氣韻沉鬱足稱大家汪伯玉云于鱗業專專故精而獨至元美才敏敏則洽而旁通其取材也若良冶之操爐錘五金三齊無不可型其運用也若孫呉之在軍門宫嬪市人無不可陳彭子殷云元美四部槀未免篇軼太富使人不能分去取逺王承父云弇州與歴下同名而異用博大僻汪洋磅礴無所不出入安究其底則死骨未寒非之者過於慕之者矣胡元瑞云弇州於古人詩靡所不有亦靡所不合詞與代變意逐題新譬之龍宫海藏萬怪惶惑弟敬美云吾兄境雖神詣學以年劭取材愈博演教彌神或鬼篆蛇文冥搜六合之外或牛溲馬勃近取咫尺之間雜觀則邈若無闗湊泊則天然一色大都字險者韻必妥韻竒者聲必調天壤之間若為預設此眞藝林之絶技也樂府一出必使于鱗匿響明卿竄影宏篇奥句故是苦心極力之言齊梁小調亦無敵手邇來述作大盛取材欲盡不覺時墮香山玉局趣中吳文仲云李何竝駕李雄視何而李不若何之沖而雅也王李齊驅王盛推李而李才不若王之博而大也蔣仲舒云元美曠古逸當今大雅二鳴四部千載一時藴藉則崑山良璧懐瑾握瑜聲華則震澤明珠連城照乗何无咎云弇州主大直欲體具百家包括今古汪洋萬里崩奔自恣而意貴冨贍詞多填實求其風雅相宣情境互暢較之唐人蓋有間矣運陳卧子云元美天思穎俊取材贍博師心獨而不累其法擬議衆芳而不掩其才讀之如入五都之市珠璣英瑶雖西域賈胡不能盡收然鱻蔬陳列亦足使販夫厭飫又云元美樂府不必盡合古人甚見才思宋子建云元美如西域化人手易山川海量珠玉體宋轅文云元美七言勝於五言近體勝於古合而觀之未能與濟南伯仲請以廸功之精鋭三千當其數萬詩話嘉靖七子中元美才氣十倍于鱗惟病在愛博筆削千兔詩裁兩牛自以為靡所不有方成大家一時詩流皆望其品題推崇過實諛言日至箴規不聞究之千篇一律安在其靡所不有也樂府變竒竒正正易陳為新逺非于鱗生吞活剥者比七律高華七絶典麗亦未遽出于鱗下當日名雖七子實則一雄其自述云野夫興就不復刪大海迴風吹紫瀾言雖大而非夸若于鱗自詡至云微吾竟長夜惑易之言亟當浴以蘭湯者也尚書樂揚翠眊曳金支馬駊騀車逶迤手將兩黄鉞大者誅二千石小者僇偏裨九卿班餞日崦嵫相君昵昵前致辭尚書行出師樂哉尚書奈樂何一解所過二千石喪魂魄日夜輦重稱軍食黄金如山莫譙詞纍女對對顰青蛾回鶻小隊桃葉歌中丞奉觴舞迴波樂哉尚書奈樂何二解大宛驄珊瑚鞭天吳繡蹙當胸盤麒麟玉刻稱腰圓珍怪百寶裝千船席卷三吳向青天九卿班迎晡不得前相君昵昵前致辭中官黄紙紛而馳尚書告班師樂哉尚書奈樂何三解朝賜尚書夕賜尚書尚書第中錦不如檀牀八角垂流蘇紫衣屛息騈街衢欲進不進足次且左右十二波斯胡平頭奴子貂襜褕醉著不下公侯車樂哉尚書奈樂何四解雲霾辭天雨洗白日詔收尚書下請室削之歸一官不得著昔來一何駛今歸一何疾念欲乘柴車病不得驅欲呼估客舟估客不肯相於婦女􅀈罵小兒拍手揶揄道逢九卿睥睨之謁辭相君相君新門十二重東流之水西飛鴻昔日父子今華戎樂哉尚書奈樂何五解江陵伎江陵伎人子掩袂作啼聲家家叉簾立送王上臺城一解王欲别太姬門前黄紙催出亦以徘徊入亦以徘徊二解王入臺城後不省作悲啼妝臺鉛粉驕别接冶遊兒三解朱門一家哭萬家得安宿一家亦不哭太姬方噉粥四解門外雙烏棲啞啞枝上啼官今當大赦不願赦王歸五解二十四皇孫譬如南隴樹一半枝撐天半不知爨處六解白蓮花白蓮花捧世尊左跪聖母右拜神君蓮花水浴金盆男女行照之女為后妃男侯王金貂羅紈耀兩行生當踏玉階死當坐天堂誰為遣汝來丘太師周太師郤立那顔東西授汝尺一錦牘赤白號帶兩頭垂但入上谷雲中得好兒郎因依精兵十萬騎一一銜枚後頭隨天運固難諶白發所謀私反接向市中號呼衆男女曷不救我為救我死者坐天堂生當踏玉階忽有一書生衆不識為誰書生從何來乃是闕下上書男子長流闗外醉卧闤闠間夜半縳致之桃李種山岡蓮花種湖陂刺舟摘蓮花郤折桃李枝東市標書生頭鼓曈曨使者輶千金賞萬戸侯道旁跌足涕被面中丞封御史轉承相閣中三日宴太保歌北山虎而翼南溟鯨而爪生世不諧錦衣帥作太保太保入朝門緹騎若雲屯進見中貴人人人若弟昆太保從東來一步一風雷行者䦨入室居者頷其頦太保賜顔色黄金立四壁一言忤太保中堂生荆棘緹騎走八方方方俱太保太保百億身所至倐如掃雞鳴甲舍開爭先衆公卿御史給事中不惜稱門生懽飲丞相邸刻臂為父子生非真骨肉子貴父不喜但呼太保名能止小兒啼鬼伯一何戇荷索便相催縣官為震動急敕治喪事少府出金錢東園給祕器後帥朱都督特遣䕶其家起冡像隂山贔屓揷雲霞弔客雖以繁不及賀者多可憐堂中哭不勝巷中歌袁江流鈐山岡當廬江小吏行湯湯袁江流嶻􅑖鈐山岡鈐山自言髙袁江自言長不知何星宿獨火或貪狼降生小家子為災復為祥瘦若鸛雀立步則鶴昻藏朱蛇戢其冠光彩爛縱横孔雀雖有毒不能掩文章十五齒邑校二十薦鄉書三十拜太史屹屹事編摩五十天官卿藻鏡在留都六十登亞輔少保秩三孤七十進師臣獨秉密勿謨八十加殊禮内殿敕肩輿任子左司空孽孫執金吾諸兒勝拜跪一一賜銀緋甲第連青雲冠蓋羅道途儤直不復下中禁起周廬涼堂及便房事事皆相宜文絲織隠囊細錦為牀帷尚方鑄精鏐胡盌杯苽籬雕盤盛玉膳黄票封大禧五尺鳳頭尖時時遣問遺黄絨團蟒紗織作自留司匹匹壓紗銀百兩頗有餘煎作百和香染為混元衣温涼四時藥手自劑刀圭日月報薄蝕朝賀當暑祁但卧不必出稱敕撰直詞御史噤莫聲緹騎勿何誰相公有密啟為復未開封九重不斯須媫妤貼當胷密詔下相公但稱嚴少師或字呼惟中縣官與相公兩心共一心相公别有心縣官不可㝷相公與司空兩心同一心司空别有心相公不得㝷昔逐諸城翟黄冠歸田里後詒貴溪夏朝衣向東市戈矛生謦欬虀粉成睚眦朝疏論相公箠榜夕以至寧忤縣官生不忤相公死相公猶自可司空立殺爾凌晨直門開九卿前白事不復問詔書但取相公旨相公前報言但當語兒子兒子大智慧能識天下體九卿不能答次且出門去不敢歸其曹共過城西邸司空令傳語偶醉未可起去者歸其曹留者當至未九卿面如土九卿足如枳為復且忍饑以次前白事司空有得色相公直廬喜司空稍囁嚅相公直廬恚不復問相公但取司空旨縣官有密詔急取相公對相公不能對急復呼兒子兒子大智慧能識天下體一疏天怒迴再疏天顔喜九邊十二鎮諸王三十國中外美達官大小員數百各各黄金鑄一一千金直南海明月珠于闐夜光玉猫精鴉鶻石酒黄祖􅴮琭紅紫青韎鞨大者如拳蕨薔薇古刺水伽南及阿速瑞腦眞龍涎十里為芬馥古法書名畫何止千百軸玉躞標金題煌煌照箱簏妖姬回鶻隊隊隊皆殊色銀牀金絲帳玉枕象牙席杏衫平頭奴絲縢雙蹴踘酒䦨呼不見濳入他房宿生埋馮子都爛煮秦宫肉生者百叢花殁者一叢棘近即龍牀底逺至隂山後凡我民膏脂無非相公有義兒數百人監司迨卿寺以至大節鎮侯家幷戚里逶迤洙泗步燦燦西京手老者相公兒少者司空子謂當操鈞柄天地俱長久御史上彈章天眼忽一開詔捕少司空究覈諸贓罪三木囊赭衣炎方禦魑魅金吾一孫戍餘者許歸侍意猶念相公續廪存晩計舳艫三十艘滿載金珠行相公船頭坐誰敢問譏征嘯傲郿塢間足誇冨家翁司空不之戍還復稱司空廣徴諸山材起第象紫宫募卒為家衛日夜聲洶洶從奴踏邑門子弟郡國雄不論有反狀訛言所流騰宗社萬不憂黔首或震驚御史再發之天威不為恒御史乗飛置捕司空至京司空辭相公再拜泣且絮今當長相别兒不負阿父相公心自言阿父寧負汝不識一丁字束髮辟三府月請尚書奉冠服亞汝父汝父身不保安能相救取重懇監刑容少入别諸姬歸者吾而配不歸而鬼妻諸姬心自言司空何大癡歸者吾而配不歸人人妻還撫諸兒郎阿爺生别離金銀空饒積髙與鈐山齊不得鑄爺身及身身始知兒郎心自言阿爺何太癡有金兒當使無金兒自支監刑兩指揮各攜鐵銀鐺程程視溲寖步步相扶將有酒强為歌無酒夜傍徨秋官爰書上頃刻飛騎傳一依叛臣法矺死大道邊有尸不得收縱施羣烏鳶家貲巨千萬少府司農錢上寶入尚方中寶發助邊不得稱相公没入優老田片瓦不蓋頭一絲不著肩諸孫呼踐更夕受亭長鞭僮奴半充戍餘者他州縣夜半一啟門諸姬鳥獸竄里中輕薄子媒妁在兩腕相公逼饑寒時一仰天歎我死不負國奈何坐兒叛傍人為大笑唶汝一何愚汝云不負國國負汝老奴誰令汝生兒誰令汝縱臾誰納庻僚賄誰朘諸邊儲誰僇直諫臣誰為開佞䛕誰仆國梁柱誰剪國爪牙土木求神仙誰獨稱先驅六十登亞輔少保秩三孤七十進師臣獨秉廊廟謨八十加殊禮内殿敕肩輿任子左司空孽孫執金吾諸兒勝拜跪一一賜銀緋甲第連青雲冠葢羅道途以此稱無負不如一婁豬食君圈中料為君充庖厨以此稱無負不如一羖䍽食君田中草為君禦霜雪以此稱無負不如鞲中鶻雖飽則掣去毛羽前嚙決以此稱無負不如鼠在厠雖有小損傷所共多汚穢相公寂無言次且復傍徨頰老不能赤淚老不盈眶生當長掩面何以見穹蒼死當長掩面何以見髙皇殮用六尺席殯用七尺棺黄腸安在哉珠𥜗久還官狐兔未稱尊一丘不得安為子能負父為臣能負君遺臭汚金石所得皆浮雲詩話長篇不費翦裁滔滔莽莽洵有大海迴瀾之勢題雖廬江小吏作要其節奏本於佛經偈言置酒行置酒髙堂上樂聲慘不發手抱三鵾絃檀槽如秋月此樂名為誰言是羌中出本以寫哀思云何虞賔客聽曲各稱好竟令沉懷鬱繁響赴流光悠悠逝倉卒末坐而楚衣一聽三歎息僊人篇結茅華山顛上有蒼鱗車僊者四五人要我偕所如遨遊天漢上經歴萬里餘人間所見星乃是千白榆玫瑰切庭階木難交綺疏不知何宫殿但怪非人居呀然珠簾起四角垂流蘇中坐太乙君夾侍青童姝飲我丹霞漿令我易肌膚碧藕錯朱桃玉饌芬且腴天樂不能名但用窮歡娛回首望故鄉妻孥不得俱坐此一念謫聊復在泥塗疆疇雖歴歴他姓治田廬欲返渺何用惻愴但含吁折楊柳行曷不爲男子不覩苧蘿村種蠡兩謀臣不能勝婦人一解齊謳走孔丘秦樂逐由余但施婦人巧賢聖亦不如二解絳灌及樊酈手扶漢天子匃奴北方來不如一公主三解東家有匹雛牝者亦司農西家婦女坐牀上男子拜伏堂下塵四解企喻歌二首男兒好横行横行身自樂那見摩天鷂結伴㝷鳥雀女子愛妝束妝束頭上釵男兒愛妝束妝束坐下騧折楊柳歌桃花二三月故愛東風吹阿母不嫁女忘取少年時歡聞歌感歡千金贈亦擬報千金數盡人間物無如儂寸心謁表忠祠有述聖皇肇貽厥元孫嗣䋲其武畧或不競文治所優為諸王擅國封分布若置棊稱詔行罰賞匠意創車旂是時上威令頗不出京師黄齊託肺腑力以身任之周叔旣逺竄齊谷復長羈北平有髭王屬尊功不卑望氣若龍虎養卒皆熊貔削地錯已愚奪國寧所宜謀泄漢使僇漁陽動征鼙横驅屬國兵席卷燕南垂廟謨大草草召使乳臭兒蝶血白溝河肉骨蔽陵坻盛侯頗能軍平保壯偏禆一此或一彼天心詎能知桓桓鐵尚書矯矯六出竒東昌不茅摩濟南湯其池有斐天台生密勿主所葵肆赦赦不行用間間不疑大廈旣將顛一木焉能支飛檝渡大江羣情遂乖離三輔擬勤王姚守已俘累朱邸獻重闗將相請密期舉宫為煨燼誰辨眞龍尸魏公元勲後不以密戚移甘作請室囚竟終首陽饑始禍復何言縱體任刲劙天台乃甚口五宗悉參夷鐵公氣猶勁慷慨了不悲自餘諸名俊卿尹暨曹司俱懷吠犬忠不識堯爲誰而彼景中丞趣朝獨逶迤荆卿術未講豫讓心空馳噀血噴北風捐脛付東馗如聞九原轍故主未可追長寢事已畢何煩論安危笑彼崩角者次第死胥靡拂鬱二百年身碎節不虧君王沛明詔彷彿異代思加恩録後人所在為致祠建康殉節地羣靈當格斯故主猶若敖焉能不攢睂侑食懿園席行當待來兹早起初月將曙輝亭亭澹空碧微星漸以隠存者猶歴歴𤣥蟬乍停號宿羽時鼔翼時至鐘未鳴山僧嬾成寂暑嬾一暑生百慵一慵百事簡偃息衡門下悠悠夢初轉亭午鳥倦啼槐隂自舒卷時有涼風來泠然忽稱善勿謂羲皇人此意知者鮮發自義興由東九抵湖汊一首揚舲出荆溪溪流浩無盡疇謂當蕭辰青山吐餘潤驚鱗發濳響振羽横遙瞬時見空翠來焉知余榜進喬木生午烟場禾表秋信茶叟攜筐歸行歌渺然近顧余若有適壺漿當為引明發從此辭中宵衣時振入林屋洞天不能竟有述林屋第九天中藏萬金庭北穿丈人峰西達峨睂陘垂滋結乳玉穿溜散空青㟏岈藏石門嶒􅗆吐神鉦是時秋始暮積潦尚澄盈雖負褰裳勇踝擊中不勝邇慚孺子託逺媿靈威生誓欲偕青童飇輪探窈冥千載靈文出聖治冀可徴贈梁公實謝病歸汝謀結室羅浮頂下飲仙人葛洪井桂樹宛宛山日深松花濛濛白雲冷我亦僅買蜻蜓舟歸與少年為薄游采蓮一曲杳然去得醉即卧青溪頭醉後勸客飲今日為客掛却頭上廌解我腰間魚簪纓縲紲不足道形骸土木終何如少年彈棊六博兼樗蒲一一將置前庭除與客遞起為歡娛客不見洛陽蘇生惡少年開口造化俱無權横六黄金五車裂總為城南二頃田客不見魏齊聲勢同山丘厠中死人斷君頭黥徒馬食相當下當時溺者秦應侯人生反覆難預期精靈一别千憂隨請看草木有榮悴榮者何恩怨者誰丈人不能齷齪權門取榮貴驅遣七尺供妻子又不能仰面看屋梁萬歳千秋亦如此濁涇清渭何能理先生一言客記取拍浮酒船吾足矣慰明卿再謫長短歌和李于鱗明堂堂成不見帝十二牧伯朝逡巡丞相肩輿入内殿揺筆一埽三千人王生束裝視黜籍乃見武昌吳國倫無官可謫左已久有地足徙恩仍新甘泉諸貴氣成雲吳也亦是甘泉臣小臣無狀業萬死尚許短檄隨風塵長沙坐中止鵩鳥魯東門外悲麒麟何方魑魅不撫掌何處猨猱不鼔脣李侯杜門十月矣唶女再黜奚其陳此時尺一馳南康府王揶揄目吳郎卷衣大笑出府舍一舸乗風上武昌匡廬五老宛相揖長江九派流飛觴歸來蕭條四壁立大婦誶罵小婦傷女等徒稱擅金石豈無宗徐李與王時從處士誇鸚鵡可捄文君典鷫鸘何物故人能見負却令妻子徇文章啼寒泣饑苦未已東馳西竄窮遐荒燕中炊米若炊玉公田種秫不種秔貢家車馬誰與買季子貂裘胡計藏解道人間富官職女豈不念頭上霜吳郎欲答答不得王生請為歌夙昔日者歳之丙辰前五星猶聞在奎壁片語髙呼白雪飛寸心肯讓青雲色吾宗少年强解事吳郎目懾遺其舄豈唯吳郎衆辟易但語吾曹少堅敵司空撾鼓盡裸袒武安行酒半膝席小兒僅呼楊德祖一錢可擬程不識儻問曹中理公事君其且看西山碧故知萬變同翻手風雨青天晝能吼遺舄少年坐上坐誰哉捧案前奔走世人榮辱强相制吾輩行藏終自取妻子寧須饒逺畧且用七尺餌其口即使女官更削盡豫章男子得活不女乏江陵千樹橘來共吳門千畦韭耕盡要離墓上雲洗眼看他竟何有夢中得語云百年那得更百年今日還須愛今日因戲成短歌化人宫中百事無道書一卷酒一壺枝頭黄鳥聽作曲西山白雲看作圖朝愛朝暾上東岫夕愛夕陽映東牖任他故人不通謁任他朝事不掛口偶然案頭餘酒杯偶然躡屩山僧來自斟自醉當自去禮豈設為我輩哉昨夜懵騰意超忽寢時得語醒時述百年那得更百年今日還須愛今日縱能拂衣歸故山農耕社劇亦不閒何如且㑹此中趣别有生涯天地間藏經閣西偏俯小罨畫溪紺宇藏經閣春雲罨畫溪隔花催小艇落日在招提彼岸如相引眞源自不迷老夫繙閲罷隨意步東西大行方皇后輓歌密雨椒塗浄傷雲鷖輅興深宫六衣卷導扇五華層僊馭何其杳神君不可憑還應從此日起觀望昭陵憶昔二首憶昔文王三出邊六龍飛雨浄烽烟天門直向隂山闢北斗翻從南極懸鐵馬春饑填瀚海金人秋祭失祁連只今何處無廉李野哭荒村幾歲年更憶南巡漢武皇樓船車馬鬱相望輕裘鄠杜張公子挾瑟邯鄲吕氏倡秋浄旌旗營細柳夜深烽火獵長楊孤城尚有遺弓淚不見當時折檻郎送瞿師道太史使大梁周府長安草色上鳴珂繁吹春調四牡歌太史授圭開赤社宗藩如帶指黄河天邊漢節蛟龍擾雪後梁園鴻鴈多上客知君頻授簡鄒枚詞賦未應過戚大將軍入帥禁旅枉駕草堂賦此贈别初聞小隊駐吳江忽漫花溪隠畫艭細柳尚虚金鎖甲前茅時緩碧油幢南中舊部思馳義塞上新城喜受降儻寫雲臺須第一如論國士總無雙履善比部歸自嶺右賦此問之聞君八月下牂牁銅柱天荒使者過桂嶺風來秋色早盤江木合瘴烟多蠻童夾道誇揶酒蜑女穿花出櫂歌向識子雲竒字擅近來詞賦更如何清明遇雨昨歳清明指冀方今朝寒食滯鄖陽兒曹上冡亦隨例客子思親偏斷腸四十九年年已去一百五日日初長毋論積雨斷新火縱得餘光非故鄉衛河河流曲曲轉十里還相喚那比下江船揚帆忽不見江口江口安檣處孤舟盡日停秋雲無限好只傍蔣山青教坊婦小拂乾紅袖新聲十四絃不知頭已白猶唱想夫憐道過一嶺曰米花邨其名頗雅因成一絶夾溪黄葉路三戸米花邨車馬須㬰事寒山日掩門正德宫詞二首窄衫盤鳳稱身裁玉靶雕弓月様開紅粉别依回鶻隊君王新自虎城來夜半毬燈出未央俄傳鞞鐸向平陽六宫處處秋如水不獨長門玉漏長西城宫詞二首兩角鵶青雙箸紅靈犀一㸃未曾通自縁身作延年藥憔悴春風雨露中梨園子弟鬢如霜十部龜兹九部荒妒殺女冠諸侍長大羅天上奏霓裳題文待詔畫孤峰逺揷白雲間秀竹長松相對閒聽得菱歌人欲近不知猶隔法華山避暑山園殘杯移傍水邊亭暑氣衝人忽自醒最喜樹頭風定後半池零雨半池星登蛾睂亭有懷回首江南黯澹雲蛾睂亭畔思紛紛何因却作姑溪水流到長江尚不分姑溪水流出長江自為一帶洞庭兩山竹枝詞二首橘緑橙黄香滿枝甕頭騶玉鱠魚絲山中歴日由來少知是江南九月時白雪繅成繭子緜黄雲剪就稻花天千家邨裏無開市三尺溪頭有繫船謝榛十四首榛字茂秦臨清人有四溟山人集朱中立云四溟詩法盛唐而氣格不逮雖王元美云謝茂秦如大官舊庖為小邑設宴事饌非竒而餖飣不茍又云排比聲偶為一時之最第興寄小薄變化差少敬彭子殷云茂秦諸體壯麗類大歴以上穆甫云茂秦志在學杜庻幾升堂游燕入晉二藁傳誦藝林至江南入洛等集若出二人手筆矣胡陳玉叔云山人窮極而思工思工而語至大元瑞云茂秦融和流暢自是中唐與諸公不同麟蔣仲舒云茂秦詩宗少陵窮體極變近時之鳳哉江進之云求眞詩於七子之中則謝茂秦者所謂人棄我取者也之陳卧子云茂秦沉練雄渾法度森然真節制師位在于鱗之下徐吳之上法宋轅文云茂秦五律似勝十諸名家然句法篇未免束縛神情不能出四字外此其所以不如也七律源出嘉州情景清切陳伯璣云山人説詩取初盛十二家幷李杜集中之最佳者録成一帙王李諸公俱用其法近人多以王李為口實幷謝集亦束之髙閣不復寓目間有誦法之者止知其聲格之髙而不知其意境之細予謂山人詩凡可想像摹擬者便佳以其用意委曲也五言古只平平寫寫懐不復好竒角勝律詩多有傷於迫促者詩話七子結社之初李王得名未盛稱詩選格多取定於四溟于鱗贈詩云謝榛吾黨彦咄嗟名士籍遂令清廟音乃在褐衣客於時子與公寔子相元美撰五子詩成首四溟而次以歴下既而布衣髙論不為同社所安歴下乃遺書絶交而曰豈其使一眇君子肆于二三兄弟之上必不然矣迹其隙未乃因明卿入社四溟喻以糞土由是布惡於衆元美别定五子遽削其名曰後五子則南昌余曰德德甫蒲坼魏裳順甫歙汪道昆伯玊銅梁張佳𦙍肖甫新蔡張九一助甫也曰廣五子則崑山俞允文仲蔚濬盧柟次楩濮陽李先芳伯承孝豐吳維嶽峻伯南海歐大任禎伯也曰續五子則陽曲王道行明甫東明石星拱辰從化黎民表維敬豫章朱多煃用晦常熟趙用賢汝師也曰末五子則用賢及京山李維禎本寧鄞屠隆緯眞南樂魏允中懋權蘭溪胡應麟元瑞也其後廣為四十子而四溟終不得與焉故四溟賦雜感詩有奈何君子交中道兩棄置之句亦可憫矣歴下有言眇君子雖耄而䋲墨猶存則亦未嘗深絶之特明時重資格於章服中雜以韋布終以為嫌爾四溟論詩云平順却難嶮巇易斤斤局守格律尺寸不踰有雋句而乏逺神有雄句而無生氣或謂威勝弇州之汗漫然弇州才大如曹孟徳放蕩無儀笑時頭没杯案不失為英雄四溟罄折雖工特公孫子陽之修餙邊幅僅堪作清水令耳送謝給事封蜀使星巴蜀外漢節夜郎西樹斷分金馬江清見石犀王孫重茅土天子錫桐圭異世懷張載應留劒閣題有感薄伐元中䇿論兵自古難漢唐頻拓地將帥幾登壇絶漠兼天盡交河蕩日寒不知大宛馬曾復到長安秋野地濶清霜滿林寒市葉稀野雲秋澹澹山日晩暉暉殺氣三河動邊聲一騎飛中原多猛士誰解晉陽圍暮秋即事十見黄花發孤樽思不勝闗河秋後雁風雨夜深燈留滯悲王粲交游憶李膺相隨少年子走馬獵韓陵初冬夜同李伯承過碧雲寺竝馬㝷名寺登髙藉短笻飛泉鳴古澗落月在寒松石路經千轉雲巖復幾重人間多夢寐誰聽上方鐘晩眺寒日下西陵漳河晩渡氷孤城歸獵騎雙樹隠禪燈野眺心何逺巖棲老未能翻憐戎馬日愁思坐相仍登榆林城憑髙望不極天外一鴻過衆嶺夕陽盡孤城寒色多蘆笳滿亭堠羽檄度闗河遥憶龍庭士嚴霜正荷戈暮秋簡徐别駕載卿南征秋轉劇不寐夜漫漫白髪艱虞盡滄洲去住難旌旗連野暗兵甲照江寒選將須㬰事誰能議築壇南巡歌南楚旌旗合黄塵走百官天王重巡幸民物識艱難馳道春風動行宫夜月寒萬年垂拱意歌頌入長安宿淇門驛懷孫方伯性甫王憲副廷贍江少參伯陽駐馬淇門夕堂空暑氣徂亂雲闗樹暝寒雨驛燈孤身計聊時序鄉心復道塗何當報知已秋雁滿江湖送謝武選少安犒師固原因還蜀㑹兄葬天書早下促星軺二月闗河凍欲消白首應憐班定逺黄金先賜霍嫖姚秦雲曉度三川水蜀道春通萬里橋一對郫筒腸欲斷鶺鴒原上草蕭蕭楊參軍次和歸自古北口淮南髙士落人間仗劍經秋未破顔自惜草𤣥淹歲月可堪垂白向邊闗天横落照明孤壘地擁寒沙接亂山長路誰能問行役夜來驅馬雪中還秋日懷弟生涯憐汝自樵蘇時序驚心尚道塗别後幾年兒女大望中千里弟兄孤秋天落木愁多少夜雨殘燈夢有無遥想故園揮涕淚况聞寒鴈下江湖擣衣曲秦闗昨寄一書歸百戰郎從劉武威見説平江收涕淚梧桐樹下擣征衣梁有譽九首有譽字公實廣州順德人嘉靖庚戌進士任刑部主事有蘭汀存藁王元美云梁公實如緑野山池繁雅匀適又如漢司𨽻衣冠令人驚美但非全盛儀物密胡元瑞云公實與諸子最早成律詩温厚縝但氣格微弱子曹能始云公實茂秦已入唐人之室詣陳卧云公實雋才意趣沉實若假以年所當不止此涓李舒章云公實如清泉出山涓駛溜恨未到江河耳詩話蘭汀學詩於泰泉又與鄉人結社號南園後五子所得於師友者深雖入王李之林習染未甚誦其古詩猶循選體五七律亦無叫囂之狀四溟而下庻幾此人度越徐吳奚啻十倍雜詩二首圓象無停晷四序迭相循曄曄春華敷歘忽委埃塵候蟲善審時鳴鳥常司晨如何建名士遲暮多苦辛衝波鮮安舟岐路恒摧輪順風響易逺却行難及人鐘鼎鐫峻功竹帛垂逸民静躁雖殊域德業終同倫慷慨感中情髙駕良可遵我行彼中野靡靡令心憂四顧莽無人但見林與丘髙臺多悲風滄海轉洪流走獸駭叢莽號鳥求匹儔顧兹震心魄欲去將何求古來賢達人髙視隘九州嗟哉愚蒙者睠戀區中謀雍門泣孟嘗牛山悲爽鳩闇彼代謝理莅物恒怨尤黄屋摩霄舉螣蛇乗霧遊斥鷃爾何陋枋榆徒啾啾知自有大小達觀德彌優秋懷夕霽凉氣發曲房藹餘清金風被蘭茝白露浩已盈密林謝陽彩叢薄隕芳榮迅商無緩調征鴻懷苦聲物候旣易感神理固難名漢隂甘灌園鹿門事躬耕金張逐丹轂王貢彯華纓由來事不同各以性自營伊予秉微尚恬曠諧夙情柱下明守雌漆園持達生緬懷昔人訓煩囂祗自驚送傅山人游羅浮仙山矗遐陬藴竒信靈造晻靄蹴重溟巍峩冠穹昊隂室引陽輝霧谷通霞島𤣥溜澤難枯炎林蕊還早故鼎無留丹煮石有遺老神境誰能躋𤣥蹤爾方討祕檢洞中㝷塵悰雲外埽陟霄搴若華憑厓掇朱草吹萬固不同得一以為好嗤彼蜉蝣士夸毗喪其寶何當榮茅龍吸景滌幽抱謁張丞相祠開元治平日英賢恣游衍夫君匡屯器憂國持先見詎慙伊吕科實冠東南彦朝直承明廬夕下金華殿楚臣傷江楓漢女悲團扇而君復何為含情賦海燕玉泉一以閉微微市朝變欃槍亘中天長蛇衂畿甸金根入蜀年空餘淚如霰我本慷慨士懷古歲方晏野烟羃歴起祠樹何蔥蒨搴杜寄芳情掇蘋羞野薦髙芬誰復嗣舊葉遙奔箭唯留千載名來哲同興羨黄司馬清泛軒達人慕恬寂開軒負西郭芊緜引蕙田逶迤通菌閣積芳集隆墀躭勝控遥壑蕊氣通幽洞湖光耿華薄青桐帶露疎翠羽衝花落蜃月鏡疎櫺鵬雲冠虚幕真筌一以契琴書聊爾託鶴性在烟霞鳳想存寥廓即此頤深棲陋彼郊居作瓜步眺望殘虹慘澹已黄昏江上烟波獨愴魂京口樹濃藏雨氣海門風急長潮痕西來暮色連三楚北望浮雲隔九閽正值旗亭須買醉憂時懷土不堪論夜宿清逺江口短櫂依依繫晩風壯懷離思浩無窮荒邨夜急菰蒲雨逺戍秋悲鼓角風白鴈影斜江樹暗青猨聲斷嶺雲空更堪處處征輸急深箐休論戰伐功秋夜雨中過黎氏山房瑶琴不復理空餘山水情棄置石牀上風來時一鳴宗臣十七首臣字子相揚州興化人嘉靖癸丑進士除刑部主事改吏部歴員外郎中出為福建參議遷提學副使有方城集王元美云宗子相如渥洼神駒日可千里未免齧決之累又如華山道士語語烟霞非人間事之穆敬甫云子相才情兼美造詣未竟使天假年當能逐鹿于鱗犄角元美麐江進之云子相詩句邁逸御風而行冒伯云子相詩自成一境界譬之洞天福地而外别有桃源武陵者陳卧子云子相意取秀逸不尚深思從此入亦流淺俗唐李舒章云子相天姿明佚好自跌宕玉山頽時有佳致然其得意處僅得大白之觕者頗宋轅文云子相調清𦂳氣力少薄詩話子相詩才娟秀本以太白為師跌宕自喜使其不遇王李充之不難與昌榖蘇門伯仲自入七子之社習氣日深取材日窘撰體日弱薜荔芙蓉蘼蕪楊栁百篇一律訖未成家而夭最可惋惜如對曹蜍李志有狐狸貒貉噉盡之憂然猶愈徐吳之木俑土偶也楊氏園亭餞别謝榛離思忽越超逍遥事行游散步過華池芙蓉夾芳流悲哉蟪蛄鳴淒切動我愁凝霜莽零落明月澹飛樓感此歳華暮耿耿生百憂居者不可去行者不可留去留兩不愜何以慰綢繆留别子培舍弟驅車上河梁顧瞻舊鄉國倉卒骨肉親彷徨動顔色子亦竟以南予亦竟以北本是雙飛鴻胡為乖羽翼送子從此歸涕下不能食子其從逺猷慰我長相憶寄人浮飇動廣野白日慘無色之子在萬里山川渺難極豺狼滿路衢况復荆與棘我欲往從之惜無晨風翼因風寄瑶華歲事日云夕去往尠懽悰撫膺長歎息歸歎薊門春盡雲隂隂倚杖出門愁暮禽千金裘馬只自好萬里江湖誰復㝷武陵一别桃花深欲歸不歸傷我心青楓未老楚月白吾將長嘯投吾簪沈上幽棲為沈二丈賦主人結屋楚江曲身披薜荔坐空谷青天雙眼望鴻鵠春風一夜開石門萬里蘼蕪散新緑登江門諸山山頭日白雲英英千峰倒揷千江明手把芙蓉步石壁蒼翠亂射猨鳥驚誰其雲外吹紫笙欲來不來空復情天風吹我佩蕭瑟怳疑身在崑崙行即事坐歎兵機失兼憂國計存干戈在淮海消息已乾坤授鉞曾諸將宵衣獨至尊定知哀痛詔早晩下江門長庚純一舜隆旣别憶之一别不自意茫然空復愁孤舟仍盜賊多病已春秋明月半江水故人何處樓風塵雙淚眼爲我寄滄洲江上聞明卿量移南康復得南康信匡廬遂爾狂詩仍官長罵名或簿書强暮雨湘潭近秋風楚塞長江流如可返爲我到潯陽寄陸子和江門一别又秋分何處風烟不憶君久客衣裳鶉自結舊遊尺素鴈為羣十年世路彫青鬢三歎斯人卧白雲羽翼南溟最相近未須重勒北山文題畫山徑度青波石門遲白日客到不披衣春風理瑶瑟聞鴈憶子培秋雨千峰散寒雲萬里開不知天際鴈幾日故園來郊行竝馬出春城揺鞭一相語楊栁遍前山應從何處去夜立秋風天外聲明月江中影幽人把桂枝露下衣裳冷江南曲客去悲江左書來滯隴西相思若春草無路不萋萋塞上歌送王侍郎赴薊鎮榆闗北望陣雲高五月天風吹戰袍共説總戎王相國十年身佩吕䖍刀寄盧少楩大伾山頭花滿烟春來竟日酒壚眠不知妻子闗何事乞取囊中賣賦錢徐中行二首中行字子與長興人嘉靖庚戌進士除刑部主事出知汀州府補汝寧用内計謫官稍遷瑞州判官擢山東僉事歴雲南參政福建按察使江西左右布政使有青蘿館集王元美云子與發情止性喻象比意左準右䋲靡所不合深胡元瑞云子與閎大雄整卓然名家惜少沉之致陳卧子云子與雖規摹古哲而手追心慕惟在濟南詩話子與在西曹與王李結社其贈李詩云寂寞漢魏後乃復挺斯人遂令同心者周旋若一身李答詩遽云既聞風雅音三歎文在兹元美亦以藹藹吉士目之且云子與性味如醍醐無處不入知其交始終無間也俞仲蔚稱子與喜為篤厚之行而不自盛滿聞其歴任藩臬俱清介有聲卒官至不能具歛而其存日人有所請力不足必勉應之曰奈何令人有慙色丁長孺西山日記述閩人董九華業丹青久居長興病亡不能歸櫬子與適上官入閩竟載其柩以行無所拘忌洵盛德也春暮將赴汝南廣川舟中寄懷京邑游好黄河多悲風白日廣川隂驚沙蔽天地方舟猶滯淫躑躅將安適曳履援鳴琴一為清商曲灌木俱悲吟知音一以隔離思故難任伊予歲寒契莫忘初别心瑶華儻可嗣引領伊川潯感舊自别燕臺白日徂華陽碣石總荒蕪獨留一片西山月猶照當年舊酒壚吳國倫四首國倫字明卿其先嘉興人徙居湖廣興國州嘉靖庚戌進士除中書舍人升兵科給事中左遷南康府推官調歸德歴知建寧邵武髙州三府遷貴州提學副使移河南參政有甔甀洞正續槀王元美云明卿不揚而企不抑而沉縱不至溢斂不鬰塞王敬美云明卿詩多實際語不落于鱗網中自可弟畜子與又云他人詩多於髙處失穏明卿詩多於穏處藏髙胡元瑞云于鱗近體用字多同明卿用句多同故一篇而外不耐多讀陳卧子云明卿雅練流逸情景相副詩話明卿在七子列最為睂壽元美即世之後與汪伯玉李本寧狎主齊盟三君皆不知詩王李既殁海内不敢違言劉子威馮元成屠緯真輩相與附和之甑甀太函大泌等集幾與四部争冨而由拳白榆等集尤而效之海内之為真詩者寡矣其題生壙旁亭柱云陶元亮自祭之文知生知死劉伯倫隨行之鍤且醉且醒不失為達生之語前溪歌迎歡東武亭送歡獨桑路安得大海水盡向前溪注使歡不得渡濟州南池瀑水侵階上危亭背郭開分荷移小艇取石坐深苔地迥秋隂合軒空野色來誰能共心賞懷古正徘徊雨夜挽舟上七里灘岸束灘聲咽沙兼石齒横豈縁貪利涉亦復滯王程山雨夜逾急野燈時一明客心雲霧裏懷古不勝情送姜太史節之使楚王天子分桐葉詞臣下柏梁共憐星是使况乃玉為堂江漢環宗國風雲䕶帝鄉居人思過沛太史復浮湘地險東南勝藩盟帶礪長晴山開絳節髙浪出牙檣六傅中原路雙鋒北斗傍緘書如有意歸鴈自衡陽明詩綜卷五十一
