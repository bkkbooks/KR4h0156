body:
  text: 明詩綜卷七十三翰林院檢討朱彞尊編周鑣一首鑣字仲馭金壇人崇禎戊辰進士南京禮部員外郎為阮大鋮所殺有十四哀詩孝子魏君學洢有鳥栖中林夜半巢忽覆兩羽既傾折遺雛寧復鷇嗟哉魏公子痛父無能救乞食向長安知交孰肯覯投書數千言聽之耳如褎世路已如斯呼天但搔首扶櫬江南歸墓旁日相守父存不敢先父沒不敢後含涕入下泉一死良無疚吕大器三首大器字先自遂寧人崇禎戊辰進士除行人歷兵部左侍郎甲申以吏部左侍郎回里有集詩話吕公驅馳南北盡瘁行間五言如野寺依巖立官衙傍水開孤燈寒殿壁落月映山城土瘠蟬吟屋林疏月上扉野狐衝馬立山鬼伺人驕精衛悲銜土鷓鴣啼滿山雲煙春尚在烽火畫相連淚盡銅駝棘歌殘玉樹花豈無丹闕戀終抱白雲思忠孝之誠溢於言表間居好山當面出旭日敞幽軒煨芋聊充飯烹泉不問源談玄藏史李學稼小人樊數得林間趣花開鳥亦言晚次江門世事何年定江臯且振衣樹紅橙子熟濤白鯉魚肥獨鳥衝煙去殘霞壓岸飛村醪無處得空對月光輝落索河有感百折波濤險一泓山澗清天髙雲黯淡巖老石峥嶸古洞都成穴諸峰盡築城版圖猶蜀界風土半秦聲杜宇啼方歇銅駝歎未傾旌幢連赤縣烽火到神京嫠婦徒存恤羣臣孰請纓傷豫才略淺深愧李西平姚思孝一首思孝字永言江都人崇禎戊辰進士改庶吉士授戶科給事中歷兵工二科謫江西布政司照磨稍遷南國子助教升南太僕寺丞轉光祿少卿再轉大理少卿康山康山一簣草萋萋無復豪華似滸西猶有揚州舊時月翠禽飛上玉梅啼葛徵竒三首徴竒字無竒海寧人崇禎戊辰進士除中書舍人選授湖廣道御史升太僕寺卿轉光祿卿有蕪園集詩話光祿樂志林園又得閨人唱和格雖未髙亦自超超拔俗晚眺隅園三月十日雨薄霧花濛濛小大澗壑鳴百道源相通潭魚躍新水園竹抽春叢禽鳥忽變聲乃知天氣融登髙一以眺澄覽衆慮空玄理羣所貴耳目恱且充於焉坐垂釣自擬滄浪翁武林留别吳梅里昨喜逢初地蘭釭夜雨紅故人相爾汝今日又西東楓落前山樹蘋開别墅風小忩涼月靜客夢與誰同題畫芙蓉秋來煙水多蘆葦渺難即愛此江上花日坐雙鸂鶒吳載鰲一首載鰲字大車晉江籍宜黃人崇禎戊辰進士除澄海知縣謫浙江按察使照磨升金華推官入為戶部主事歷員外郎中轉廣東按察副使改授翰林院侍講薑給諫以五羊石見貽賦謝文饒平泉莊有石自言好何如初平羊眠雲嚙瑤草李竒玉三首竒玉字元美嘉善人天啓壬戍會試中式崇禎戊辰進士選武學教授遷國子博士歷南京工部主事改兵部員外由郎中出知寧國府有雪園遺草潭柘寺讀書讀書潭柘嶺身在白雲裏開軒豁逺眸風瀑洗心耳古木挂青蛇云是二龍子下方鐘磬餘僧寮各棲止山童剔殘燈掃葉烹泉水闃然羣籟寂明月射忩几過京口蕭條書劍下關河芳草萋萋客裏過原上鶯花三月暮天涯愁病一身多海門帆影移青嶂山寺鐘聲到緑蘿入望自知鄉國近那堪斜日聽漁歌山居方花礎潤氣氤氲靜對薰爐柏子焚夜半雨聲新水漲枕邊流出一溪雲顔俊彥一首俊彥字開美桐鄉人崇禎戊辰進士授廣州推官被劾再補松江推官有仕隱集村居雜興病卧經旬滿面埃梅花落盡杏花開畫梁無數空巢在社雨蕭蕭燕不來龔士驤一首士驤字季良義烏人崇禎戊辰進士溧水知縣惜取惜取簷前葉休教落地輕夜忩留聽雨葉葉是秋聲萬壽祺二首壽祺字年少徐州人崇禎庚午舉人有隰西草堂集詩話年少多才多藝詩亦清逸無努目掀髯之狀憶錢大忽憶南徐道春風樓上年晚鶯移浦樹苦葉秀沙田驛路歸人少蛟門落照懸如何問津者五載滯江船入沛宫泗亭春盡樹婆娑漢帝宸遊不再過魂魄有時還至沛樓臺落日半臨河風吹大澤龍蛇近天入平沙鴈鶩多我亦逺隨黃綺去東山重唱采芝歌魏沖三首沖字道用常熟人崇禎庚午舉人有小碎集采蓮曲北渚采菱歸前溪采蓮去無端墮玉叉記在回舟處元日年年悲作客今日賦間居春草生新夢山花滿舊廬畏人書謝病示儉食從蔬問字吾何有無勞長者車春晚梅葉初齊梅子勻新榆稚栁暗通津春深莫惜餘花盡却喜黃鸝不露身陸坦二首坦字履長蘇州嘉定人崇禎庚午舉人銓授南豐知縣不赴隱居鄧尉山有庚除詩稿和姚修民簡寄世逐浮雲換身同落葉輕難忘百年恨誰殉一朝名去國懷公子憂時過賈生江臯無限淚日暮不勝情春夜雪春雨聲聲入夢闌暗忩風動曉燈殘濕雲壓竹鳥驚墮起看空階一片寒徐柏齡三首柏齡字節之嘉興人崇禎庚午舉人署永嘉儒學教諭詩話孝亷湖海播遷詩不由人自出杼軸春日風聲起松末窈若萬壑深誰謂市井喧遂無天地心可惜夭桃花不言萎空林明年縱復開顔色不如今壽寧逢艾千子白日黯無色城門掩半開故人何地别間道此時來鄉夢逺難寄官程近莫催江關庾開府詞賦不勝哀江心寺文信國祠孤嶼浮江面寒潮撼石根遙遙箕尾外何處可招魂吳太沖一首太沖字默置錢塘人崇禎辛未進士改庶吉士授檢討升右中允有息心窩詩集朱美之攜酒過緑隂叢裏放玫瑰石几相延坐碧苔百里雙瓶春酒釅一年幾個故人來厨丁細切溪頭筍稚子貪爭屋角梅信道朱遊能折鹿談經且喜得相陪薑埰八首埰字如農萊陽人崇禎辛未進士除密雲知縣改儀真入為禮部主事選授禮科給事中以言事廷杖削籍戍宣城有敬亭集黃九煙云先生詩發乎性情本乎忠孝名實交孚纒綿盡致志錢幼光云先生詩大抵取法于柴桑浣花其同其調不覺其同也詩話廷杖與東西厰錦衣衛鎮撫司獄用刑之酷前代未有自王振亂政鞭撻朝士大臣有枷項者逮成化中汪直用事廷杖臺省臣王濬李俊等五十六人正德間以諫南巡杖舒芬黃鞏等百三十人死者十一人嘉靖初以爭大禮哭左順門杖豐熙等百三十四人死者十七人此其最甚者矣萬厯六年論首輔張居正奪情杖趙用賢沈思孝鄒元標等五人後定陵頗厭建言諸臣疏多留中廷杖寢不用至天啓四年太監王體乾奉敕大審復開其端重笞戚臣李承恩以恱魏忠賢於是主事萬燝御史吳裕中相繼斃杖下而許顯純田爾耕輩煩刑以逞備極慘毒楊左諸君子之禍有不忍言者矣思陵即阼雪消見睍用獄稍平不意嘉魚熊公暨萊陽薑公論列柄臣時日輻輳逆鱗既觸天怒莫回拷掠之慘洵九死而一生者蓋至柄臣自裁而兩公之荷戈終未見釋薑公臨沒語其子安節實節曰敬亭吾戍所也戍者吾君所命吾未聞後命而君亡吾猶罪人也死必埋吾戍所乃葬宣城公晚嵗始為詩風格一本杜陵其自序云託哀鳴于異鳥感音節于候蟲可謂善於喻物者也秋懷仰視雲中鴈飛鳴何翩翩朔風自北來玉塞起塵煙昔聞漢武帝防秋守九邊拓疆猶未已奄忽下重泉哀哉重泉下玄狐陟其巔大江萬里長下有蛟龍淵回頭夜怒號聲怪震百川我欲往從之褰衣不得前願言長相憶中心淚漣漣和陶挽歌辭哭左侍郎仲及大風自北來寒木正蕭蕭多少舊墳墓不知在何郊獨君三尺土髙山共嶕嶢我來拜君墓手折白楊條所取非楊條答贈在今朝君死則已矣我生可奈何我豈貪生流母老強還家既為君作傳又為君挽歌生則託金蘭死當告山阿登使東歸城南薄田十八塍髙者桑柘低稌粳白日黃狐牆頭立既不殺之當與揖曽青藜云奡兀簡余寒鐵自我不見余秀才夏云徂矣秋風來我今一别秀才宅堂前堂後生蒿萊丈夫骯髒只如此誓欲破家去鄉里今日路傍一匹夫當時萬言干天子低頭俯眉心不辭養雞牧豕身應爾君今讀書停雲館仰天狂歌何衎衎有時野老扶杖過烹葵摘果酒先暖白公隄上波欲沒期君同看溪雲滿赴戍宣州衛垂死承恩譴天威咫尺間荷戈荒徼去收骨瘴江還衮職猶思補龍髯竟絶攀橋陵千滴淚獨在敬亭山鑾江雜詠老去人猶在春來客未旋側身天地外卜宅水雲邊月照歸栖鳥江喧出口船苦遭生意短白髮不相憐九日登越州稷山和弟垓萬木凋霜嶺千巖帶水村雲屯山郭靜潮過海門昏皂帽風堪落黃花酒正溫愁聞江徼外鳴鏑滿中原送林衡者還嘉善相知不在久岐路莫頻驚客舍由拳地鄉心夾漈城霜前孤鴈白雨後一湖明為報余生札平安問舊京周燦三首燦字光甫吳江人崇禎辛未進士知宣化會稽二縣選授浙江道御史有澤畔吟陳皇士云侍御詩彬彬有序大雅之音丹青引贈顧子山莫畫泰山松松樹已受秦皇封水莫畫黃河潦河流已非夏后道但作清溪竹樹灣添我垂釣於其間吁嗟乎男兒少壯隨朝彥豈料中年桑海變枉想丹青麟閣中他人為我開生面顧生顧生爾莫嗔傳神似爾畫逼真如何貌此尋常人韓蘄王碑西湖湖曲騎驢翁中興十將稱最雄道逢姦相但長揖斯人豈比張魏公鄂王英武庶其匹時危協力扶王室龍王廟前金鼓震遺恨書生黨兀术公之骨埋荒墳公之烈存碑文華堂鐵劵雖已失千載猶傳趙雄筆徐電發云辭不多而激昂流轉斯人豈比張魏公一語足慰蘄王於泉下鄰翁邀食五月桃戲作桃實纍纍也足豪主人笑指玉盤髙仙家一熟三千嵗五月先嘗遜我曹許豸一首豸字玉斧候官人崇禎辛未進士除戶部主事歷員外郎出為浙江按察僉事以參議提督學政有春及堂詩建州逢陳德輝已分别離久何期此地同西城山路近南浦野橋通信宿情何極他鄉嵗欲終維舟無限意相對有飛鴻送友之瓊州匹馬珠崖路須防瘴嶺雲蠻童青箬笠黎女緑蕉裙潮有東西候時占朔望分臨岐還把臂不敢説離羣春日送客春光初荏苒客路惜分攜露濕鶯花重風吹燕麥齊孤燈茅店裏殘月栁橋西别思千峰外猿聲不住啼黃坤五云玉斧五律聲調委婉趣味澄幽誦之如流水平橋佳趣自在張鳳翥一首鳳翥字儀明一字威赤宿松人崇禎辛未進士除嘉興知縣補仁壽升刑部主事歷湖廣按察副使詩話張公牽絲作宰以慈得民晚節禦侮危疆吮血裹瘡接戰而死忠勇不可及也詩又安雅絶無叫囂之氣武陵道中孤城臨古渡斜日一舟橫北渚離人目西風逺客程藤疏知樹冷棹響信江平不用分漁火前洲月已生于穎一首穎字長公金壇人崇禎辛未進士除工部主事歷員外郎出知西安府削籍尋復工部郎中知順德紹興二府升浙江按察副使分巡寧紹道新嵗次茂貽韻不覺流光度霜華入鬢邊難忘惟舊雨相對又新年學佛寧遺世為農敢問天椒花一相勸身世各悽然管正傳一首正傳字元心長洲人崇禎辛未進士除永新知縣調贑縣有積書巖詩草詩話元心詩思入微原本易林太玄當其意匠經營幾欲效修羅遁迹藕絲中然猶取材於古故方之徐元歎張草臣諸子較勝一籌西泠橋斷嶺寒煙落晚霞間聽漁鼓傍橋撾誰知湖上彎彎月又照錢塘蘇小家薛寀一首寀字諧孟武進人崇禎辛未進士選武學教授升國子助教轉南刑部主事歷郎中出知開封府晚為僧號米堆和尚金陵野曠風鳶捷江空石燕輕年年春草緑不忍上臺城成仲龍一首仲龍字為霖長垣人崇禎辛未進士除夏邑知縣調永城選授兵科給事中出為浙江按察僉事轉參議遷陜西參政歷布政使有東壁樓集除日立春除日今朝是蹉跎又一年嵗從燈下改春訝厯頭先柏酒愁無分柴門靜可憐半生成砥事兩鬢已皤然劉應迪一首應迪字簡在金溪人崇禎辛未進士閬中知縣曉起曉色漸熹微柝聲聽漸稀月潛銷客袂燈已失林扉竹外風翻冷花間露欲晞巢烏棲未穩先上女墻飛王厈二首厈字王屋蘭陽人崇禎辛未進士滋陽知縣有王王屋集詩話王屋嗜竒鞭驅險句觀其起釁宗藩自理一疏辭艱晦而不舒在納言難以封進乃以未將金幣自尤尤人得毋過與謫歸曉經中山長安日以逺古道風淒淒草濕蛩聲緩林深鵲起低殘兵親廢壘孤客度危蹊去國莫悲戀一枝不借栖病卧聞砧白露蒹葭老西風梨棗肥可憐人病卧翻羡鳥髙飛藥竈縈秋草藜牀帶落暉那堪砧杵急盡力搗寒衣陳宗之八首宗之字玉立長洲人崇禎癸酉舉人詩話啓禎間景陵流𣲖盛行於吳中雖有林若撫力持唐調然而捷敏未免率易玉立矜鍊獨操止始之音八門七堰六十坊可以獨步世化往聞漫翁言日月化豺虎斯語恐未然含疑不輕吐及乎遭世喪所遇駴聽覩中原延寇氛蕩析無寧宇菰蘆一方地荒疫亦愁苦天髙吏肆酷法密民罹罟人鬼須臾間牽率歸黃土安得山阿栖飲泉采芳杜緬懷盛年時邈若羲皇古漢道漢道昔云季四海沸羣雄賢士失綱維奔竄投西東管寧栖遼海田疇隱無終鄭玄與王粲各自獲所從如何盛明世栖栖泥淖中雨雪積荒塗渚田路不通寧無北門歎要自秉固窮疾耕寡樂郊仕宦乏竒功乾坤雖浩廣無隙置薄躬愴惻衡門下憂來溯悲風悔磽田不可耕濁水不可釣常思汗漫遊髙卧青山嶠此意更莫酬蹉跎失年少讀書近浮名趨俗失要妙幽幽寒溪側寂寂孤燈照故牀擁敝裘密雪陷爐銚兒飢每索錢愁來獨悲嘯登翁漢津氷臺朝卧采山堂暮登漁山閣漁采俱在山始信湖中樂閣盡有髙臺岧嶤出寥廓茫茫笠澤帆隱隱浮屠崿峰秀無匿覽波光恣開拓始冬似佳秋風日猶晶灼古樹儼當階黃葉深未落葛翁不可招丹竈安所託空餘泛宅遊未踐褰裳諾宿契必有期無怨猿與鶴遊金菴放棹非有期泛觀湖中山偶然入幽境遂叩髙峰關老袖出肅客蒼髯映丹顔同坐絶壁下始知身世間飯我青精香供我緑菊斑葑山觜已沒金菴徑可攀歸塗歷清溪荒寂幾灣環萬堆黃葉中清磬激潺湲月出每孤往又逐漁舟還病橘病橘含辛實淒然墮曉風本無雕飾分敢恨託根窮斷續隂依井低昂鳥啄蟲可憐氷雪後剩有一枝紅周青士云蒼老工緻感時花石綱看艮嶽移麝香裙冷護宫衣紅燈小隊湖遊夜知否襄陽六載圍寄衣曲前庭踏鞠後庭歌主將功髙意氣多不信沙場征戰苦年年搗練寄金河秋山即事宋朝自召种明逸漢室何知鄭子真今日徴君何草草馬蹄手板拜紅塵李天植五首天植字因仲平湖人崇禎癸酉舉人晚更名確字潛夫隱居龍湫山有蜃園山遊諸集陸次友云因仲髙蹈詩多激逸合乎清江碧嶂之音詠史秦皇制六合焚書築長城萬古以為罪孰為原其情典籍付煨燼大易道獨行豈識理數原尚留天地精紫塞亘萬里外內界則明春秋重此義兹尚存典刑後世經術儒𠞰説日以橫胡然南面尊不恥城下盟祖龍而有知其氣殊未平雪夜泊舟許墅朔雪沉宵柝江關卧未安窗虛得疏響舟重壓新寒梅落倡樓笛蘆垂釣子灘鄰航催曉發得共月華看遊青蓮寺香剎從來古春風客到稀溪光平入座竹色冷侵衣地僻鳥無語林深花自飛相過逢勝侣並坐話清機獻生賦謝鄰叟瓜蔬吾所愛分惠愧芳鄰不忍私佳種還期及令辰青囊珍重意白髮老成人生計憐余薄時來話苦辛山中訪宋爾垣風吹帆影過西城一片浮雲嶺上晴滿地落紅多不掃萬松臺畔讀書聲謝遴二首遴字彚先宜興人崇禎癸酉舉人有是亦樓存稿詩話孝亷晦迹衡門種菜一畦不入城府陳檢討其年寄懷詩云半畝牛宫繞菜田鉏畦汲水獨悠然芒鞋一輛千金直不踏城中二十年其詩頗效林逋魏野銅官山書齋坐卧深林裏窗開别一天山腰埋宿雨石面瀉流泉路盡雲猶觸村分樹尚連煙霞吾所戀只此可忘年河間道中猶復驅車去行蹤何處留閭閻移馬廄市井割鴻溝草濕王孫淚塵淹季子裘那堪鬼車鳥風雨夜啾啾陶汝鼐四首汝鼐字仲調一字燮友長沙人崇禎癸酉舉人有榮木堂集詩話先生壯嵗好遊自吳入越與先人訂僑札之分嘗留檇李度嵗晚際仳離出監軍事捍禦鄉邦著力暨章堵兩公盡瘁略同讀哀湖南賦悽戾過於蘭成詩雖未脫景陵之𣲖然覺爽氣殊倫京山道中探觀音巖尋磴掬水歷巖上下古木峭壁髙瀑競響舊有李本寧先生園今廢愾然有作層巖近大道其麓如深村僧包立樹下過橋知寺門庭前雙老幹一為娑羅根虛閣覆巖壁滿屋蛟螭痕飛流響石罅奮躍探其源涓涓出瀵尾色白河崑崙掬飲泉上下微覺分清溫巖阿受夕陽偶坐如朝暾戀賞勿忍去出溪松路昏惜哉平泉後亦不理兹園金正希招集練江醉宿清淨寺冬霜萬壑松江永日將夕畫舫泛容與川暝光愈白急風吹燭花谷響合歌拍小榼僧厨來蔬笋界方格語笑酒易傾如以桐叩石柱史如枯禪城市無一宅酒深思啜茗同作虎溪客貝葉啓禪書梅花落瑶席坐久聞妙香一榻隨所擇睡鄉鐘鼓鳴林烏翻旅翮吾亦步下山佛燈猶照壁嚴州道中曲江流不盡寒氣凛初嚴野泊分漁艇遙帆類酒簾枯河冬雨活濕壁凍雲黏不分多歸思蕭蕭與夢添哭亡弟鼒幼調孝友人皆見居家母最憐不留娛白髮非意及黃泉鳩杖難消噎驪珠易返淵老兄千斛淚不敢墮親前陸清源一首清源字嗣白平湖人崇禎甲戌進士除增城知縣擢雲南道御史巡按福建後為馬士英部將趙體元所殺答黃石齋先生問俗停車到海湄羽書詎敢計安危孤城吹笛思當日中夜聞雞豈異時北望烽煙勞夢逺東瞻林墅出山遲蒼生極目堪流涕何日綸巾一視師吳本泰二十一首本泰字美子一字藥師仁和人崇禎甲戌進士除行人選授吏部主事改南京禮部歷郎中有海粟堂集秋舫箋北遊西征東瞻南還嶽遊諸草周青士云吏部五古出入選唐竹枝宛轉猶存老鐵遺響詩話吏部當正聲微茫之日獨操大雅之音而揚扢風雅者或不及焉益信曲髙者和彌寡也帝京篇崇禎元年作夢想黃金臺來歌白石粲明明聖人出旭日天方旦廣殿飭梓材神霄聳輪奐薇垣格澤消芝蓋卿雲縵三吳罷機杼九廟秉圭瓚下國頌時雍至尊理宵旰宵旰懷殷憂邊籌寢弛玩軍需飛檄催水衡仰屋歎大姦已距脫羣疑未氷泮漸鴻雖可儀羔羊不聞讚名盛實則衰事倍功乃半因之敕幾康匪伊遊泮奐君既勤晝接臣當思日贊朝中去朋黨政府參謀斷網必挈其綱繩先理其亂求治毋太速防微勿滋蔓所期日月光幽遐理必貫朱近修云通篇沉著不浮靜海道中大風海人行海國謂應狎波濤波濤漭不見曠野天風號寒日淡無光動地卷白茅疑有鐵騎驅豗突鳴弓刀離羣慘孤鴻失木傷哀猱巾車紛欲裂簸蕩如輕舠四射中肌膚一寒欺復陶豈關造物意人事或偶遭方騖萬里輈寧憚險與勞任丘張氏園藍田先生授經處不識魚君陂幸識魚君令城隅敞臺榭水木相翳映謂豫此棲遲差可間眺聽是時秋氣深白露漸蘭徑瘦石裹苔斑寒花棲蝶暝女牆邏柝喧梵閣宵鐘應慮淡羣物輕時危百憂并皎皎明月枝驚烏棲不定茗窗靜披覽冥緬獨無竟昔賢曽授經履屐痕猶賸臨淮道中雪昨日春風暄僕夫俱喘汗今晨北風厲雪花卷行幔天時自回薄人意驚錯換况乃事徂征惻惻羈魂斷長淮望不極鍾離道方半踉蹌赴郵程渺瀰惑阡畔暝鴉寒不呼翻飛忽零亂車上氷滿髭車下泥沒骭紅燭映深簾寧知旅人歎陋巷井改邑不改井泠泠無古今原泉何方來或是泰山岑仰之既彌髙俯之亦彌深屢空其庶而淡然助齋心仲尼飯疏飲應與共酌斟禹稷憂飢溺易地同所任至味無異旨樂哉此中尋秋雨歎晨雞喔喔天未明潰垣忽作崩雷聲裳衣顛倒書帙亂蒼茫四顧心獨驚隂崖潭水深千尺飢蛟掉尾盤渦黑我欲拔劍往斬之出戶踟蹰三歎息賦得草徑入荒園匝地蘼蕪緑戎戎接短垣路迂隨鹿引村靜覺禽喧泫露沾芒屨頽陽卧瓦樽園丁渾解事野蓛具盤餐秋住湖口雨夜官城暗霜期候鴈呼瘦筇黃葉寺髙枕白雲湖嵗月傷羈客煙波狎釣徒醉吟楓落句秋思滿東吳冬日村居短景催年盡荒齋擁膝安甘蕉經雨敗叢菊抱霜乾閉戶腰肢健干人齒頰難得間能幾日杯勺此盤桓候舟浦口千檣集占風信宿遲長雲鴻沒影古壘樹無枝人語殊方雜客心孤月知湯湯濁河水利涉問舟師阿城逢秋野棗青未熟渚蓮紅欲銷涼風髠鵲頂新水長魚苖江上客星小亂餘兵氣驕秋來無别夢長畔鹿門樵由歙邑入海陽淺瀨無舟渡回溪有路通獨行過市上元只在山中薺麥搖晴緑林蕉逗晚紅清鐘隔巖寺留憩聽松風庚申中秋叢桂生隂雨氣涼少焉月出四山蒼于飛鵲繞樹三匝所謂人居水一方素澫紅菱秋饌美畫船烏榜怨歌長徘徊顧兔傷流景爭乞雲英玉杵霜任城將南還半舫先生餉酒走筆言謝李白樓前黃葉洲欲發不發仍淹留青氊近對許主簿白衣恰送王江州五侯掉頭那肯顧一杯入手百不憂讀公新詩飲公酒醉眠松石風颼颼寒食感事南朔城荒春到稀西山雪盡尚沾衣别來桃李三年夢老去兵戈萬事非行腳出家猶有纍低眉獻賦不如歸試看綿上神林近野㸑無煙空淚揮西湖竹枝詞五首西湖湖水碧琉璃西湖楊栁緑茸絲愛殺桃花紅片片却似西施好面皮繆天自云此用唐人回波樂辭不為粗也與郎暗約段橋西早起妝樓欲下梯宿雨半收晴不穩惱人最是鵓鳩啼薺麥青青三月三看看草色暗湖南忙催姊妹燒香去戴勝來時又養蠶放生池岸栁叢叢香閣鈴幡四面風輕薄少年乘醉過手提射鴨竹枝弓踏青湖上懶歸家更愛山行輦路賖妾上笨車郎跨蹇西溪十八里梅花春曉南來消息斷歸鴻江國迷春曉夢中斜帶參星杏花白依稀牆半宋家東凌世韶一首世韶字官球歙人崇禎甲戌進士除寧化知縣謫江西按察使簡較改興化府經歷升處州一作嚴州府推官入為戶部主事有汭沙集陳皇士云汭沙亷吏晚棄家隱黃山詩有清韻惠州西湖湖面寒光一鏡平露荷煙草入秋清白鷗浴罷各飛去遙見潮痕郭外生周之璵四首之璵字玉鳬長洲人崇禎甲戌進士除刑部主事歷禮部員外郎讀史感懷石羊埋棘漆燈冥一作熒短犢橫牽上廢亭金碗更從何處覔春深杜宇哭冬青詩話玉鳬讀史感懷六十首援古驗今不失國風小雅之旨漢皇恭儉百無營衡石投籖久勵精端為黼宸求治速翻教安石誤蒼生寶帶橫鞓建碧油居然鞦鞅閣東牛未聞奏捷傳淝水又見稱兵犯石頭參軍空自賦蕪城一嵗人間草一青隴首寒雲常漠漠風蒲依舊滿臨平劉侗二首侗字同人麻城人崇禎甲戌進士除吳縣知縣未任卒曹潔躬云同人以文體矜竒為學使置下等憤悶入太學連舉鄉會試留都亭日與于司直共輯帝京景物略文筆詭異蓋亦服習竟陵流𣲖者賽社祠春社典春衣秋社饜粱肉婦子且莫嘻場熟廪不熟遼陽方告警農助官家榖遼租十增三官租三增六里胥登門催斛半量一斛益以雀鼠耗完數恆不足賽社報年豐社神聽我祝但願邊患平強於倉儲蓄神保太息言遼平爾何福粻隨遼餉加不隨遼餉復播州幾月兵至今農噉粥久遊復至鄂得家信將别黃宗之出門未暑秋仍滯十度曽登送别舟久客畏聞家有信逢人俱道邑無收衣粻不恥因良友僮僕多言怨漫遊夜夜酒同鄉夢醒舍邊雞與渚邊鷗陳組綬一首組綬字伯玊武進人崇禎甲戌進士除兵部主事有伊菴稿舟泊清河有攜絃索過飲者客思紛河北商絃復漢南星光零夕霧村柝靜虛潭去國黃花九逢人白社三曽為記歌者不醉亦何堪朱芾煌五首芾煌字玉琉無為州人崇禎甲戌進士除餘姚知縣調樂安入為戶部主事謫補順天儒學教授稍遷國子監博士升車駕主事歷武選郎中有文嘻堂詩集宋牧仲云武選樂府學長吉間出文昌玉溪間古詩近體出入三唐要多自得能不牽於習尚武尤展成云武選詩思深而志逺徐電發云選紀事之作和而不流哀而不激七律尤稱擅場獨步文德橋畫樓髙閣不同登雀舫鵝笙亦自憎每日杖藜橋上立青青雨過看鍾陵北行江上阻風荻港黃雲壓水流風翻白浪打船頭長年莫道秋江冷楊栁堤南是酒樓示從行汪伶歌行作使得何戡尚與殷勤佐酒酣我有傷心千種恨鷓鴣切莫唱江南與客飲感舊檀板牙牌事事新小車花下自相親勸君莫惜花前醉舊醉花前今幾人雜吟賽社人稀古廟冬午煙晴裊酒旗風遊人不盡春遊興醉帽欹斜落日中王潢一首潢字元倬上元人崇禎丙子舉人有南陔集黃九煙云元倬詩沉雄渾鬱頓銼瀏離大都發源於騷雅徴材於漢魏歸根於杜陵薛諧孟云元倬忠孝之性溢於毫楮纒綿悽惻而未已篇願寧人云先生詩深以婉和而摯不失三百溫柔敦厚之旨雖方爾止云元倬格律森嚴用意深至憤時嫉俗而渾然不覺宿松風閣分韻得吟字靄靄嵗云暮風雨恆見侵小霽憩山閣蕭颯吹寒霖澗壑亂餘響鐘鼓沈清音蒼虯卧蜿蜒拏攫力不任羽觴亦以歇剪燭聞鳴琴默坐得冥會擁褐成孤吟須臾微霰集晨起雪在林樵徑斷人語四野號飢禽皎皎二三子貞白同松心炎暉諒可俟見晛消重隂徐之瑞七首之瑞字蘭生臨安人崇禎丙子舉人有橫秋堂稿詩話孝亷熟精文選五言古致紛敷近體故韓冬郎極其綺靡行路難太行北上雪刺天黃河西渡氷塞川狗屠擊築各已老咸陽逐客還遊燕烏丸夜破龍盧戍越鳥朝棲日南樹長槍大槊取通侯安用蓽門事章句雞鳴嶺披榛陟山椒輈摧馬盤桓歷險未云疲逶迤入雲端仰探巖谷逼俯視井邑殘千峰列逺戍兩崖壯重關垂蘿蔓幽壑怪松支危垣灌木鬱蕭槮哀風嘯叢萑乘墉或失恃務德誠所難蟋蟀在牀下我生詎遑安勞勞多苦辛惻惻起悲歎五十初度戲作一萬八千日歌翔烏夾日東方起蟪蛄大笑蜉蝣死聽我萬八千日歌請從握算軒轅始我生不逢唐與虞我死不返鴻濛初以凥為輪神為馬手抉灝氣還虛無虎頭燕頷玉關路墮地儒冠脫相誤將軍海外御樓船坐看蚩尤蔽妖霧漩題兩角開明堂左日右月魁中央豐霳屏翳伏不動弧矢一星猶射狼布衣憔悴夷門客瞋目操椎大梁陌少年躍馬氣凌雲怒血衝冠髮先白南修蛇北封狐魂乎歸來不可處上乘白霓遊天都洞房繚繞明華燭珠綴文軒網交緑娭光綿眇睇層波半醉雙鬟抱絲竹北斗挹漿醥且清玉妃起舞吹鸞笙百壺一榼焉足算小臣再拜觴千齡天門朝開詄蕩蕩劍佩雞鳴劇相向已看恨骨委蓬蒿安用黃金鑄形像二十四氣黃鐘吹三萬六千璇璣推元化回環貫金石丹宫玉齒生寒灰平生豪健屠龍手蹭蹬麒麟落牛後夢中滄海幾回更勸爾長星一杯酒春遊詞四首西山松柏翠成林十里橫塘水路深鸂鶒鴛鴦莫相妒荷花香處結同心檀槽低攏小鸞青金鴈斜飛玉手輕弟子三吳零落盡橋頭絃索最知名山頭擊鼓賽金錢檣上飛烏散舞筵長記迎神送神處石湖沙觜泊郎船龍膏千炬繞芝楹銀鑰初收玉漏輕夜冷不禁羅袖薄雙鬟炙火更吹笙巢鳴盛一首鳴盛字端明嘉興人崇禎丙子舉人有永思草堂集詩話孝亷肥遁深林絶迹城市時羣盜四起鏐鐵銀鏤之器無得留者於是繞屋種匏小大凡十餘種長如鶴頸纎若蜂腰杯杓之外室中所需器皿莫非匏者逺邇爭效之檇李匏樽不脛而走海內孝亷作長歌咏焉兹録五言一律剖心刮垢蓋自喻也題匏杯回也資瓢飲悠然見古風剖心香自發刮垢力須攻不識金銀器何知陶冶工尼丘疏水意樂亦在其中劉永錫二首永錫字欽爾魏縣人崇禎丙子舉人選長洲儒學教諭署崇明縣事庭無留獄有洹水遺詩詩話洹水至性之士兵後隱居相城有大吏強之仕袒裼疾視曰我中原男子年二十渡漳河登大伾躍馬鳴鞘兩河豪傑誰不知我奈何欲見辱邪取壁上所挂劒欲自剄門下士抱持之得解既而女妻相繼餓死子為盜所傷亦死久之洹水沒其弟子徐晟陳三島等經紀其喪葬之虎丘山塘揚子刺船歌白日墮兮野茫茫家千里兮來逺方壯士何時兮歸故鄉鼓枻歌遡彼中流兮采其荇矣思君與父兮有懷靡竟矣身為餓夫兮天所命矣中心殷殷兮涕斯迸矣明詩綜卷七十三
