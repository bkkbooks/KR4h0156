body:
  text: 明詩綜卷五十八翰林院檢討朱彞尊編沈懋學三首懋學字君典宣城人萬厯丁丑賜進士第一授翰林修撰追諡文節有郊居遺稿王元美云先生詩文不名一家縱橫捭闔往往出人意表靜志居詩話君典少任俠兼精技勇能上馬舞丈八矟嘗出塞縱觀飛狐花馬險塞突為彍騎追至幕南君典挾一矢命中其黨乃不敢追既登狀頭是年第二人即江陵相君子嗣修江陵方欲引以相助會奪情之舉君典貽書嗣修謂相君天子師表奈何棄綱常飽人以口實嗣修恧不能答也又貽書李尚書養河辭頗激切養河發書嘻笑而已君典乃與吳編修子道趙檢討汝師謀各上疏吳趙受杖去官而君典疏草為人所持不果進然江陵業恨其異已而海內皆服其風節矣君典四十而夭年壽不將命爾而王元美作墓表屠緯真作傳欲傅會曇陽子升真之確至以妖夢厚誣光明磊落之君典是豈愛人以德者邪次别曾直卿太史年來多病檢方書夢入雙溪把釣餘賈誼豈能收涕淚嵇康元自愧粗疏翻愁草色春將晚却笑桃花錦不如戀别可堪風雨夕江天搔首坐躊躇署中聞子規一片愁心託杜鵑望中隴樹斷蒼煙歸人只是歸難得白髮相催又隔年贈沈孟嘉訪開之湖上初陽臺上紫雲停何處璚簫入夜聽載酒看花歌白苧直教明月下西泠曾朝節一首朝節字直卿臨武人萬厯丁丑賜進士第三授編修歷侍講諭德進侍讀學士少詹事升南禮部右侍郎掌翰林院終禮部尚書諡文恪有紫園草方正學祠祠堂開木末宛在闕庭前縗絰舊君服離騷絶命篇已知心匪石肯汙筆如椽瓜蔓抄雖毒遺文百世傳馮琦七首琦字用韞臨朐人萬厯丁丑進士改庶吉士授編修歷侍講右諭德左庶子少詹事升吏部侍郎卒贈禮部尚書諡文敏有北海集陳卧子云宗伯經術之士其詩雖未𡨕搜亦能象合結交行呈楊公亮時公亮止酒寒不作堂上燕飢不作韝上鷹韝上威稜豈不峻一飽即掣非人情親極難為疏貴極難為賤長平未罷賓客去何必貴賤交情見君不見步兵厨君不見濬沖壚長安車馬夾道趨雲雨翻覆無時無君今不醉胡為乎送伯楨侍御之川中憲副間何濶逢諸葛行且止避御史御史今年三十幾豸繡翩翩帶金紫聖主真憂萬里外使君建節三巴裏刑天舞干亦自豪精衛填海空復勞黃河懸水三十仞呼風亂度難容舠嗟嗟王郎汝何往古來得失如反掌長安大路多摧輪況乃蜀道青冥上蜀道之難難於天不如歸問桑麻田振衣獨上三峯顛塵埃野馬何茫然君不見雁門菟郡伊與鹿南陽畫諾亦見逐世間萬事誰能卜汝為逺臣恩巳足邢太保破倭功成以大司馬管留鑰過家省覲太夫人雲霄漢闕頒新命豐鎬周京奠舊邦九列獨髙蒼玉佩六師爭擁碧油幢橫戈絶域春浮海擊楫中流夜渡江聖主憂先根本計留侯籌策況無雙恭陪聖駕步禱南郊紀盛龍武新軍罷勾陳御路開紅塵都不掃留待雨師來題萬玉山房本是瀟湘人最愛瀟湘竹何處丘中琴歷歷瀟湘曲題閼氏畫像紅妝一隊陰山下亂點酡酥醉朔野塞外爭傳娘子軍邊頭不牧烏孫馬送魏懋忠擊築髙歌興未孤暫分離恨作歡娛不知後夜相思夢得及今朝醉裏無余繼登三首繼登字世用號雲衢交河人萬厯丁丑進士改庶吉士授檢討纍官禮部尚書贈太子少保諡文恪有淡然軒集詩話文恪詩指陳時事鏗竒磊落卓然名家其在容臺值國儲未建災變頻仍雷擊太廟樹南都火太白經天秦晉齊皆地震西寧鐘不扣自鳴紹興地出血公俱直言無諱先公册封周藩公詩惟以旱熯為憂不失古人贈言之義聞公先是使周藩渡河舟膠柁折公告于神曰使臣縱有罪神敢震驚龍節亦有佚罰維神實圖利之禱畢而波恬若有翼舟以濟者斯亦異矣送朱太史養淳册封周藩昔豫祗行役驅車向中原中原飢饉餘氛祲日以煩白骨亂如麻黯然銷神魂朱門鬱蕭條哀哀諸王孫君今復持節翩翩過夷門不知周孑遺今有幾家存況今旱為虐五月黃塵昏知君負經濟雅志念黎元當其授簡時應為廢朝餐莫以董賈筆虛負鄒枚言願賡雲漢篇歸來達至尊送張伯任都諫閲邊開城古雍州漢家朝那地迢迢控諸畨可以斷右臂一從和議成關門久不閉無復念軍興祗聞增嵗幣壯士卧干戈邊城罷烽燧豈不息戰爭詎可銷兵器籓籬不復施豺狼日窺伺去年戎馬來三軍同日斃所過無雞豚哀哉肆吞噬天子頻西顧疆吏盡更置君從掖垣中叩閽數言事聚米悉邊情一一當上意藉爾青瑣賢出作行邊使周覽昔戰場白骨尚委棄四野無人煙那能不隕涕誓將廓垢氛何以壯軍勢君其賈餘勇時方待髙議好上金城略永垂秦川利甘學汲公戇寧顧漢庭忌得君借前籌庶同指掌易放歌余雲衢汝亦堂堂七尺軀二十脫穎薦鄉書三十挾策計吏俱玉堂金馬此何地容汝久玷承明廬從汝執經已三載天子不肯臨石渠吁嗟乎汝既無封侯骨拜相鬚謾言虎可繡龍可屠屠龍繡虎竟何益況汝冥頑一技無汝不見轅下駒一旦受君牧與芻為君萬里爭馳驅少府金錢等膏血太倉粟米煩徵輸念汝何功敢竊食十二年費官家儲去夏一病幾長徂汝今不去將安需衛河之滸茅可誅且營菟裘為汝居貴何須誇趙孟富何須羡陶朱從今且自脫樊笯三家市裏逡巡酒五畞園中觳觫車免使微名挂朝簿耕田鑿井歌唐虞鄒元標二首元標字爾瞻吉水人萬厯丁丑進士觀政日以建言謫戍召授吏科給事中復以言事降南刑部照磨升南兵部主事改吏部歷員外郎中罷起大理寺卿升刑部右侍郎終都察院左都御史贈太子太保吏部尚書諡忠介有存真集詩話先生晚總西臺入朝而躓御史前糾失儀先文恪公進言曰元標在先朝直言受杖至今餘痛未除也德陵意解此事實録不載附識於此簡羅公廓給諫老去交情重懷君意轉深草年青瑣客同賦白頭吟突兀千秋意蹉跎萬古心嚶嚶聞好鳥相喚出幽林送俞定所起大名久别相看慰所思送君空有淚臨岐黃沙白草無窮恨不獨尊前感别離楊起元一首起元歸善人萬厯丁丑進士官吏部侍郎送黃雲崖宿州掌教前月乘輶車經過睢陽驛慨然思古人入城訪遺迹西去二百里張許今廟食秉彞在人心誰不好懿德君今涉雎流傳經聚逢掖文藝何足云忠孝為標的國家根本地土風最當植丈夫萬世名勉之在一息嚴一鵬二首一鵬字汝化無錫人萬厯丁丑進士除行人以貴州道御史按廣西以浙江道御史按浙江以福建道御史按山東厯官刑部左侍郎贈尚書有二知軒詩稿詩話尚書達尊居三特賜存問賦詩雖不多調故清徹有長孫福孫最善易著易通義頗發先儒所未發惜未刋行其次中允繩孫也尚書稿流傳者寡從中允所抄得之吏隱齋懷孫龍涵分袂愁何恨開函喜不禁三年羈旅思千里故人心日落梁溪暮花殘魯地陰天台如有賦雙鯉莫浮沉清明日賈𢎞菴棲隱園社集春風吹拂柳絲斜佳節相攜感物華共有錦囊題白雪未須金管勸流霞人行磴道初如蟻日落湖帆盡載花散步踏芳歸任晚城南猶有未棲鴉馮夢禎十一首夢禎字開之秀水人萬厯丁丑進士改庶吉士除編修終南京國子祭酒有快雪堂集詩話馮公儒雅風流名髙三席歸田之後間娛情聲伎箏歌酒宴望者目為神仙中人詩亦不蹈時習五古能盤硬語尤見意匠經營同譜若沈君典屠緯真皆不及也結交篇有序余少時友周生彥雲嗣交賀生伯暗庚午癸酉余與彥雲相繼登鄉薦丁丑余以南宫舉首官翰林中遭廢棄壬辰出山赴南司業癸已擢掌南翰其明年甲午伯暗始舉于順天乙未成進士官行人而彥雲猶未釋公車功名之遲速變幻如此今年丁酉秋余為南祭酒幾二年所而彥雲自里中見訪時余苦痁方上乞骸之疏會有詔使臨則伯暗也我三人草年中離合不知凡幾忽有此晤喜不自勝遂成此篇憶年十五六眼空心膽粗三人笑相昵意氣凌萬夫轉蓬三十年飛沉不同塗賀子初牽紱周生尚公車劣余最先達典胄山水都撫疾新乞骸逐痁猶向隅明主有餘戀故人不我疏賀子忽持節周生未返廬三人共形影嘉會在須臾升沉豈有常離合難可拘努力崇德音皓首願無虛仲春湖上登覽與叔宗同賦春至嘉卉榮氣和長薄絢遵渚洽淪漣升隄媚蔥蒨逺近生態殊昏旦物候變髙下柳盡舒參差桃始炫鳴禽選秀木時女步芳甸朋儔或回睇舟陸諧所便勝情欣有託日夕遺深眷題東山許氏小樓為樓枕東山山翠常滿樓非徒自怡悅亦以娛朋儔璧月當綺窗白雲漾丹丘我來秋色晚不惜十年留南墉如可闢兼得狎海鷗若下夙昔眷幽溪于今凌漭漾引艇及朝暾瀠洄淹夕漲乍進離煩嚻少焉益蕭曠岸仄交濃陰林缺露青嶂瞻岫集遙姿睇漣延近狀改步款蘭疇陟憩紆回望地偏俗駕牢侣勝遊蹤暢朱羲不遽頽沉歡將無蕩五十篇四首有序昔人云五十之年忽焉以至悲始衰也今嵗丁酉八月草二日乃余五十懸弧之辰鑒止足之分傷流光之駛有懷家園思投簪笏乃賦斯篇五十忽焉至頽齡始自兹懸弧眷秋辰稱觴來故知余本靜者流夙好敦書詩散性在丘樊竊祿慙軒墀鐘鼓享魯郊海鳥終不怡鍾阜洵云美豈若還山茨山茨結林麓其陽面清池清池曲且廣髙楊夾路垂層樓貯圖史密室藏薑姬出門即湖山興到惟所之偶逢漁樵侶談謔忘歸期人生行樂耳須富貴何時富貴反多憂貧賤未足卑靈龜戀泥中雄雞憚為犧李斯具五刑牽犬一何悲陸機西入洛鶴唳聽無期無才足完身功髙迹轉危所以賢達人拂衣恆恐遲拂衣謝塵氛舊侣時相追披素詠新賞開帙渙所疑豈不戀圭組天爵無磷淄豈不戀子孫清白自可貽觀民計已極從道安足嗤申毫著斯文聊以適吾私餘不溪回舟寄訊章元禮吏部是日雪吏部才名舊瓊瑶昔見貽山川聞問隔日月鬢毛衰身退仍憂國家貧但賦詩回舟緣興盡風雪寄相思珠簾洞帝遣銀河垂虛簾蕩空淥我欲買娉婷問爾乞三斛無題琉璃硯匣鎮隨身彩筆揮來字字新他日長門如有恨千金詞賦不求人王士性一首士性字恆叔臨海人萬厯丁丑進士除知確山縣事擢禮科給事中終太僕寺少卿有五嶽遊草惡溪道上聞猿惡溪不可涉地險亦何心石觸雲根出灘回蜃窟深繁霜沙際白落月渡頭陰豈異巫陽峽清猿兩岸吟魏允貞一首允貞字懋忠號見泉南樂人萬厯丁丑進士除荆州推官選授山西道御史歷官右副都御史兵部右侍郎巡撫山西詩話見泉以直節聞相傳其子廣微甫登賢書來省其父見泉閉之廨中不許就禮部試曰此破犂犢也一得志必隳我家聲矣後果然詩近粗疏論者謂遜其弟懋權嶽陽樓洞庭天下水嶽陽天下樓誰為天下士飲酒樓上頭徐桂一首桂字茂吳長洲人居餘杭萬厯丁丑進士袁州推官有大滌山人詩集李本寧云茂吳咏物以六朝之才情具三唐之格調興馬仲良云自弇州殁而禹航徐茂吳先生代詩靡所弗工而詠物之章可稱名家詩話徐君詠物詩最繁富正如盈擔魔合羅僅供村市癡兒騃女把玩而已送義公結廬天台海上棲禪境披雲訪石橋一瓶依澗壑疏磬落山椒華頂經年雪松門半夜潮預愁支遁去誰與共逍遙張維新一首維新字憲周汝州人萬厯丁丑進士除冠縣知縣擢兵科給事中歷湖廣按察副使萬壽節早朝六位龍飛日千官虎拜年嵩呼聞漢殿華祝戴堯天綵仗清霜肅金爐紫霧連不才班侍從踧踖冕旒前陳泰來一首泰來字上交平湖人萬厯丁丑進士除順天府學教授遷國子監博士升禮部主事歷員外謫饒平典史泰昌即阼贈光祿少卿有員嶠集詩話員嶠年十八舉于鄉十九釋褐歸娶賜內府金花燈籠知平湖事劉抑亭贈以對聨云秋進士聨春進士大登科後小登科鄉里榮之而公以氣節自許居太學忤江陵因三王並封面質太倉于朝房又疏請建儲既因計典疏救孫鑨謫饒乎典史陛辭就道賦詩有直道不緣三黜改孤忠或受九重知卒時年三十有六耳謫歸日夢至一山羣仙咸集賦詩云涼風拂拂白雲收宦海年年幾日休翦紙作驢輕撥刺桃花洞口笑淹留相與樂甚旁一仙云汝乾凌子也後一年當再會于此覺而以乾凌子自號踰年而沒客中午日客裏端陽也自娛呼童沽酒泛菖蒲家園咫尺汀蘆外艾虎朱絲事事無顧紹芳五首紹芳字實甫太倉州人萬厯丁丑進士改庶吉士除檢討歷左春坊左贊善兼編修有寶菴集詩話實甫工於五律不露新穎矜鍊以出之頗有近於孟襄陽髙蘇門者同公亮敬承茂仁郊遊共道尋春好兼之出郭幽林塘三月暮休沐幾人遊樹樹陰初合溪溪淡不流從來耽野趣即此是滄洲即事小閣上干霄幽人野望遙淡雲清曉樹疏雨緑春苗天濶前朝寺風多隔浦橋心期竟何託鐘磬日蕭蕭喜陸彥先至常憶秋風裏離尊共黯然所期寧此日相見忽經年白眼時人過青山旅夢牽懸知有新語羞屬蒯緱篇山亭間居豈有避人意經秋長閉關蕭然松下户對此城中山得雨深林映隨雲倦鳥還漸諳丘壑理聊復養衰頑舟行即事願得三千里飛帆一夜還生憎衛河水十步九成灣沈自邠五首自邠字茂仁秀水人萬厯丁丑進士改庶吉士授檢討歷修撰有沈修撰詩集蔣馭閎云先生詩風格端麗意調諧適合乎風雅之正送徐洪陽侍講使荆送别青門外雙旌去路賒楚天髙擁傳江瀨隱浮槎赤社開王胙金莖憶帝家上林新賦就雲夢未應誇白下留别賀伯暗髙閣經旬别孤帆此日開風塵催作客花鳥負銜杯細雨白門樹浮雲江上臺相期不相見愁思轉難裁送髙藎卿少參驛騎花前發東風二月過漢家新節鉞秦地舊山河津樹關門合春雲渭水多西臺誰領袖咫尺望鳴珂謁關忠義張桓侯祠赤伏符難再三分志未伸江山千古恨祠廟百年新事業歸龍戰飛揚憶虎臣雄風今尚在灑淚向髙旻馬文莊公挽歌美諡殊恩錫東園祕器分濟時功尚在接武事仍聞丹旐飛燕雪清笳斷隴雲西州徒有恨曲罷淚紛紛朱維京一首維京字可大萬安人萬厯丁丑進士歷官光祿寺丞有光祿集度飛虹橋鯨海遙涵一水長清波深處石為梁平鋪碧甃連馳道到瀉銀河入苑牆晴緑乍添垂柳色春流時泛落花香微茫迥隔蓬萊島不放飛塵入建章沈九疇二首九疇字箕仲鄞縣人萬厯丁丑進士除刑部主事稍遷至郎中以按察副使提學江西歷官江西左布政使有曲轅居詩集詩話箕仲以詩名重鄉里人有持所作謁文恭者輒笑曰家弟安知文奚不就我族父嘉則以豐對樓詩屬余君房論定君房報書云吾於詩僅窺其籓未入其室此事終當屬君家箕仲於是嘉則詩經其刪敘及掌江西左轄有中使來司𣙜先檄諸長吏迎敕箕仲宣言曰敕諭中使非敕守土吏也例不當迎中使為氣沮一日中使移書自稱豫箕仲叱其使曰往惟髙皇帝起吳時曾稱豫若中貴人何敢爾中使大懼立造謝其直節自遂亦文恭所不如也善哉行今日樂兮來日可悲天回地遊人莫之知一解彼絃我歌會少離多明星可掇肅駕經過二解三十六輻輪輪相復但惜馬蹄不惜車軸三解雨中簡吳山人汝震時居鐵柱觀倚柱看黃鳥窺簷拂翠條吾衰春亦去汝病興還饒山色樓中雨江聲郭下潮何如平楚外煙柳赤闌橋楊德政二首德政字公亮鄞縣人萬厯丁丑進士改庶吉士除編修出為福建參議遷副使調廣西陜西提學歷山東參政福建按察使有夢鹿軒稿苑田觀穫南風吹城闕西苑鳴桑鳩帝畞雨露偏田畯職亦修維時麥稼登滿地黃雲稠播植良苦艱喜見千倉收皇情念民依感之紓殷憂願以庾廩資勤息覃遐陬詠哉七月篇庶幾追成周河西阻風戲示同行者失路依依獨問津楊花飄蕩撲征輪東風正似郵亭吏只解迎人不送人蘇濬三首濬字君禹晉江人萬厯丁丑進士除南京刑部主事尋改工部轉禮部員外郎出為浙江提學僉事歷陜西參議廣西副使貴州按察使有三餘集曉發界河客路逢秋杪中原曙色分無情原上草不斷嶺頭雲醉月懷梁苑觀風過汝墳楚天看漸逺何處問湘君卧病華髮星星短浮雲冉冉流客中千里淚夢裏五湖秋肺病傷春盡商歌入暮愁浮沉君莫問大壑一虛舟哭王恆甫茂才何處悲風急凄然獨掩扉斷雲空莫莫宿草故依依一夢愁如昨千秋事已非青山堪共老垂老忽相違陸懋龍一首懋龍字啓原鄞縣人萬厯丁丑進士除合肥知縣選授兵科給事中歷刑科都給事出為湖廣參政小院小院幽陰似井間風枝墮地點苔斑何時鏟却重簷去露出西南一角山丁此吕一首此吕字右武新建人萬厯丁丑進士歷官湖廣布政司參政有世美堂稿雨中望勾漏迢遞策敝車言尋稚川子風雨何淒其蕩然滌塵滓濛濛山下雲泠泠峽中水雲水幽以深徑路憑誰指丹竈突無煙白石徒齒齒至今不可攀邈焉懷斯理我家西山陽許令實同里玄都計非遙赤縣更伊邇沖舉遽難期沉淪恆自恥孺子儻可言請為公納履周汝登一首汝登字繼元嵊縣人萬厯丁丑進士除南京工部主事謫兩淮運司判官遷順天府通判轉南兵部主事出為雲南參政有海門先生文録恭聞册立皇太子諸王亦以是日受封志喜震索從天授年將德共宜尊師開閣早問寢出宫遲太后殷勤誨諸王次第隨微臣棲隴畞萬里想威儀孫成泰一首成泰字允交平湖人尚書植子萬厯丁丑進士除知道州遷蘇州府同知入為刑部員外歷郎中升饒州知府調邵武再調福建鹽運司同知以按察副使整飭大名道送尤司訓送君湖上正斜曛楚水吳山咫尺分今日莫辭杯底醉數聲風笛片帆雲吳安國七首安國字文仲長洲人萬厯丁丑進士除真陽知縣調永康徵授刑部主事歷員外郎中出為寧波知府升本省副使有葆光軒稿今是堂