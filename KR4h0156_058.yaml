君房曰吾其死夫未幾果卒萬八處士斯同嘗語豫云魯橋村半景臨墟塢雙榆闢里門秋風吹巷陌落日喚雞豚野外桑麻濶山中父老尊喧喧村釀集賽鼓正黃昏送包明臣之任潮陽簿七閩路盡是潮州莽蕩風煙漲海頭溪洞水腥常作霧桄榔葉暗不知秋琵琶洲畔蛟為窟甲子門前蜃是樓只有羅浮山色好蕭齋長得破羇愁王德新一首德新字應明安福人萬厯庚辰進士除南京兵部主事改刑部坐建言為民起補南工部遷光祿寺丞有警所先生集王希泉云光祿韻鬯神怡珠媚玉輝巋然風人雅致期登羅陽羅浮煙雨滿空山千仞崖藤尚可攀煮石眠雲誰禁得律僧翻羡老夫間葉初春一首初春字處元吳縣人世居洞庭自號吳西主人萬厯庚辰進士除廣州順德知縣擢兵科給事中歷户禮二科左右給事建言為民天啓初追贈光祿寺少卿有吳西佚稿詩話先太傅文恪公兩主鄉闈辛卯江西則吳西葉公為副丁酉南畿則福清葉公為副皆齊心一契關節不到者南昌徹棘之後葉公遊宴必俱嘗偕過鐡柱觀羽士言是許旌陽鎖蛟處先公以豫章城築自灌嬰而李白詩有浪動灌嬰井潯陽江上風之句辨此井即是滕公遺迹葉公大以為然先公賦五言有云潮生浪亦動疑是灌嬰井我言殊怪牒給事默心領蓋紀其事也既而先公掌容臺建儲之疏公私凡七十上最激切者劾鄭國泰一章而定陵不以為忤葉公以爭豫教再疏去官進言固有幸不幸也葉氏流芳録二卷載公疏草及門弟子挽詩公之韻語流傳特寡留别徐少南一律手書存少南族孫上舍惇復所楮墨漫漶以意補其闕字存之梁溪留别徐少南直北三千里郵籤第一程渾忘相送逺誰道别離輕驛火抽帆宿河氷策馬行不知遊子夢仍戀闔閭城邢雲路一首雲路字士登安肅人萬厯庚辰進士知繁昌汲臨汾三縣升兵部主事由員外出為河南僉事歷參議副使終按察使西湖竹枝詞裏湖外湖春水深斷橋不斷入湖心郎在外湖唱吳曲妾在裏湖吟越吟彭夢祖一首夢祖字應壽全椒人萬厯庚辰進士除户部主事歷員外郎中出知雲南府調南康升浙江按察副使進參政致仕有彭應壽集登岱空濛寶殿俯長天萬里中原亦眇然水落山根先入濟夜涼斗柄欲捎燕松陰曾濕秦時雨玉策長封漢帝年好借西風為羽翰圖成五嶽杖頭懸車大任三首大任字子仁邵陽人萬厯庚辰進士除南豐知縣歷南禮部郎中出知福州嘉興二府升浙江按察副使進右參政有囊螢閣草屠緯真云子仁詩色華而不豔音俊而不靡妙得詩家所賞而不犯詩家所忌足稱擅場陳玉叔云子仁詩有風致而不傷于境有才情而不泥于氣和平溫厚得古人之遺詩話子仁見賞于吳明卿明卿贈之詩曰靈均慷慨追三后太史憑陵陟九疑子仁深自喜也詩頗間放無局促態金溪苦雨咫尺金溪道年來幾度過郵程千里急鄉夢五更多雨色迷芳草風聲走濁河泥塗軒冕意去住欲如何送吳求叔還蒲圻我留君且住盡日醉春醪作客修長鋏歸心慰大刀片帆淮浦逺匹馬楚山髙莫負重來約相思夢寐勞與臨清武雙溪十載相逢漳水濱與君同醉異鄉春誰知今日清源道又向天涯别故人袁年四首年字子壽吳縣人萬厯庚辰進士除南京兵部主事歷員外郎中出知青州府遷江西按察副使轉雲南參政有觀槿齋集詩話子壽五言雖少精詣不墜胥臺家法白水道中驅車上山巔俯瞰人如蟻及從澗砥行仰觀亦同此地位有崇卑所見因乃爾林端宿鳥鳴天際浮雲起前村可息肩澄心會玄旨荆江感懷浩浩荆江流要渺望不極風雲倏回翔日月自出沒勢合巫峽通地分吳楚坼豈不稱天險中原非所亟吳蜀多英雄交爭遂相迫豺虎白晝嘷吞噬安所惜烈士負孤忠震怒天為戚千載垂芳聲至今有餘赫臨流惻愴滋涕泗霑巾幘豫讓祠智伯已亡後誰復君父讎傷哉一豫讓寧為刺客流恩深國未報形毁心獨留成敗不足料僇辱非所憂願為知已殉恥同肉食謀橋下試一擊厠中仍再投虀粉志始畢此外庸何求嗟嗟二心人過此良足羞雨宿一雲寺蠟屐候新晴攜尊陟西嶺松間聒濤聲樹杪挂瀑影雲起日欲晡雨來山亦冥徑窄怯笻躋林寒覺衣冷言投方外居因嘗雨前茗堂懸燈一粟門擁墨千頃鳴禽寫幽泉頓使萬慮屏楊于庭一首于庭字道行全椒人萬厯庚辰進士除濮州知州徵授户部員外轉兵部郎中有楊道行集贈李修吾轉南祠部見説君王已賜環金陵亦在五雲間兩都爭識神仙吏三禮仍居侍從班伏枕鄉心懸碣石挂帆秋色照鍾山謝公墩上重回首絶代風流尚可攀董嗣成六首嗣成字伯念烏程人萬厯庚辰進士除禮部主事歷員外郎中建言削籍有青棠集謝在杭云伯念古選憲章陶謝近體沐浴岑王如藐姑射仙人餐風飲瀣詠懷髙臺多悲風深坻多秋草男子志不伸咄咄縈懷抱盛年不可留誰能常壽考尚平遊名山婚嫁苦不早我思采紫芝逍遙以終老湖中夜泊效謝體落日沉逺樹寒煙出孤城湖中鸕鷀起沙際蟋蟀鳴社鼓發初響漁燈漾微明遙岑漸以沒但見蒼煙平空水饒雨色雲林散秋聲未深宋玉悲良懷逺公盟獨步縱遐矚曠焉寄微情發青陽驛條風啓征塗于邁自旭旦覽古舒逺懷解紱謝微絆廣衢殘雪開遙甸芳荑散逺揚既載敷谷禽亦時囀尚遊達者心點狂聖所贊唐風詠山樞感物有餘歎嚴道徹過訪不值寄懷河漢光皎皎照我彈鳴琴寂寂感物候白露霑我襟絃絶不復調良夜空沉沉抱此孤桐還藉以寄知音賦得關山月晚角開金鏡清笳落曉鈎關河今夕影迢遞幾人愁瀚海殘冬夜平沙古戍樓誰能歌出塞腸斷玉京秋渡江搖落長干道凄涼楓葉丹殘霞連海盡細雨入江寒楚樹帆前沒吳山夢裏看鄉關悵回首長路正漫漫臧懋循四首懋循字晉叔長興人萬厯庚辰進士官南京國子監博士有負苞堂詩選詩話何元朗臧晉叔皆精曲律元朗評施君美幽閨出髙則誠琵琶之上王元美目為好竒之過晉叔謂琵琶梁州序念奴嬌序二曲不類則誠口吻當是後人竄入元美大不以為然津津稱詡不置晉叔笑曰是惡知所謂幽閨者哉嘗從黃州劉延伯借元人雜劇二百五十種又購得楊廉夫仙遊夢遊俠遊冥遊彈詞悉鏤板以行序言鄭若庸玉玦張伯起紅拂等記用類書為傳竒屠長卿曇花道白終折無一曲梁伯龍浣紗梅禹金玉合道白終本無一散語均非是且言汪伯玉南曲失之靡徐文長北曲失之鄙惟湯義仍庶幾近之而失之疏其持論齗齗不爽詩亦不墮七子之習故雖從元美宴遊不入四十子之目亦磊落之士也送茅孝若應舉握手離堂夕椒盤與菜盤春風吹逺道遊子入長安玉躞裝詩軸黃金飾馬鞍桂枝行可掇計日為彈冠得吳載伯書却寄昔有三秋雁曾傳萬里書開緘先涕淚跪讀更何如白髮添愁鏡黃金罄客居不知相見日還隔幾年餘望亭夜泊向暝投何所依微識望亭客舟今復至津路昔曾經瑟瑟風吟樹離離雁度汀翻令鄉思逼數起視明星答汪仲嘉客路經春侣伴稀故鄉回首淚霑衣不知若箇吹長笛一夜梅花似雪飛章嘉楨四首嘉楨字元禮德清人萬厯庚辰進士纍官大理寺丞有姑孰集南征集中林草書座右見鹿指成馬聞蟻以為牛明乃戒獨任聰亦何深求谷風方習習草萎萬木秋瞻彼江漢波鱗甲鮮安流我愛曹平陽醇酒以忘憂三湖丹陽石臼固城水落三湖漘洲渚若阡陌水至三湖連彌天浩浩白怒濤漂田廬驚風斷塍埒豈無赬霞照覩之慘胸臆亦有蓮與芰不充飢者食民力疲隄工民命寄河伯湛酤湖之陰精禋冀昭假齊雲山下溪行白嶽朝真罷乘桴下小溪急湍清見砥芳草踏成蹊傍樹山樓出眠鷗浦漵低不須歌越調落日到城西勸農溪邊千嶂朝含雨竹杪一鳩午喚晴雲漏日明油壁暖吏人打鼓勸春耕張恆十三首恆字伯常蘇州嘉定人萬厯庚辰進士知茶陵興國二州入為刑部員外郎出知饒州府再知建昌歷按察副使升太常少卿有明志稿詩話伯常自序其詩謂語不必工意不必逺古不必合今不必離生不必名沒不必傳聊明吾志而已矣又曰譬諸候至而物鳴若有使之而不能已者以寫其優柔憺蕩之思數語非知詩者莫能言也宜其古風磊落近體亦安詳比於同邑四先生似覺挺拔合歡詩庭前雙瓊樹嘉實何離離鳳皇忽來巢載鳴復載飛鳥常比其翼樹亦連其枝宛若夫與婦燕爾良亦宜綢繆結深心嬿婉要終期登樓操瑟琴音響一何諧人生在志合豈必及宴私和德家乃昌泰交亦若斯百感詩六首渚鴻不登木蓼蟲不集芥物性寧可移足已復何待處卑夷即適茹苦習亦快魯享爰居悲衛軒野鶴駭藿食而衡棲自顧亦云太處身勿蘄髙但置風塵外射干生山頭挺幹故不長叢蘭發澗底隨時播幽香髙下殊所託物性自有常富貴多疵辱貧賤愈且康負乘為寇媒考槃古所臧素心茍無瑕跧伏道彌光富貴世所希不如賤與貧得喪在須臾轉盼殊戚欣居卑無隕墜處約離垢紛賜憲既異軌管華豈同倫丘園有餘賁抗志罔不伸揚衡閲世俗營營多僇民肅后秉睿哲於赫振乾剛永嘉既爰立密勿謨孔良言念撫鎮臣縉紳雜貂璫一朝決宸衷峻此閽寺防悉令還掃除無使穢封疆厥謀貽神孫昭然垂典常猛虎入柙中縱之騁康莊祖武近可繩聖心應不忘青蠅何營營趨利百其孔採榷遍山海方輿為之動妖狐導猛虎城市日接踵帑金髙於山源竭川流壅大決誰為防哲士心獨恐盡吸羣民脂蒿目悲林總渙居寧可期滿覆胡弗悚宣聖昔惡佞末俗佞乃尊小佞佞以言大佞佞以文富貴止好諛工拙不復分諛生眩屏幛諛死媚丘墳稱引豈不工清論淆且棼裒之費緗帙曷若烈火焚仲夏偕阮步文孫子極遊麻姑山良遊信多幸申約晨忽霽采真實天假選勝情亦鋭攀陟凌煙空雲霞生衣袂古壇隱松間紅泉響天際曠焉見田疇知否有井稅已覺雞犬殊時聞鸛鶴唳神仙何悠悠人代倏云逝千秋不可知遐覽有深契暮野煙霏霏宵巖星暳暳幽討愜豫懷世緣脫如篲步文子極偕遊從姑峩峩靈峯石雙拆若初判鑿磴才受趾陟崖迥迫面鐘磬出雲端杖屨入天半眷此清和月萬象俱蔥蒨日晃搖沙金林疏出江練蜿蜒圍暮嶺森錯分晴甸軍山聳孤髻麻瀑飛一線俯視何蒼茫俄頃嵐光變古今杳相接登覽時哲換嘉會洽歡悰長懷託文翰荆州迢遞長征客徘徊故郢墟風煙平野濶沙月大江虛峽近啼猿切天寒落雁疏蕭蕭荒草遍惆悵楚宫餘憶槎上舊居千古浮槎處吾廬乃在兹雲沙重護宅潮汐宛通池野鳥啼花徑漁人唱竹枝白衣諸故老伏臘互傳卮喜雨赤魃驕何甚辛勤父老情民惟依稼穡身可代犧牲雨應迎龍至雷和賽鼓鳴自非天澤遍何以謝蒼生涼州詞壚頭酒熟葡萄香馬足春深苜蓿長醉聽古來橫吹曲雄心一片在西涼張萱六首萱字孟竒博羅人萬厯壬午舉人授殿閣中書歷户部郎中有西園全集詩話孟竒熟於典故周見洽聞著書頗多其在西清重編文淵閣書目具載卷帙補前人之闕漏惜乎香厨所存已失其什九矣茱茰灣懷古茱茰灣頭蘆荻花秋風髙日蒸紅霞夜深打鼓負鹽去潮平軋軋鳴歸艖竹西歌吹杳何許垂楊兩岸黯不語一聲江笛叫江樓劃斷寒雲不知處邗溝懷古不盡邗溝水微茫日夜流潮連揚子渡煙接海門秋樹影浮荒堞蟬聲到客舟興亡無限意落木共悠悠過亡友韓伯舉故居主鬯依難弟遺文起後人一生唯好客到死不言貧門巷渾如昨池臺倏已新青山空滿地痛絶未埋身贈馮慕岡華省衷何玉峴南還往事誠顛覆今皇自聖明孤臣瀕萬死中詔賜餘生司馬能逃腐𢎞羊正待烹已聞干象緯不用借公卿自廣濟至瀫水峭帆斜日挂危檣疊鼓呼風亦太忙却聽舟人話潮信欲乘新月泛錢唐漁籬隄時築亦時崩野水曾侵竹幾層一任漁郎竹根宿夜歸猶得借漁燈何三畏二首三畏字士抑松江華亭人萬厯壬午中順天鄉試選授紹輿推官有芝園居廬集鳳山拜石堂稿陶周望云士抑詩備諸體不敷一家今唐元徵云士抑揚扢風雅有餘藴綜敘古有餘采辨晰名理有餘味使董思白云士抑居廬詩如哀螿勞雁人聞而泣下贈蘇爾宣卜居吳門金閶南市北市虎阜前山後山天色不風不雨先生獨往獨還金山寺口占示徐澤夫兼寄諸友先是澤夫北行余同友人餞席至是乃同發金山頂上三竿日揚子江頭一度春記得故鄉同送别如今也别故鄉人來知德二首知德字矣鮮梁山人萬厯壬午舉人以薦授翰林待詔有釡山詩集詩話待詔歌鹿鳴諸書不詳年嵗詢之蜀人言是嘉靖中而黃徵君俞邰分撰明史藝文志注云萬厯壬午或有所據姑從之俟再考相傳待詔隱萬縣之求溪二十九年注易始就今其書盛行而詩非專務易義亦非創獲蓋僻在一隅罕見羣儒之論述此自信之過遂蔑視諸先輩耳春風辭二首春風起兮花殘有美人兮江干三年不見兮路漫漫逺莫贈兮木難嵗崢嶸兮將暮心惆悵而難言及榮華之未落曷不驂夫翠鸞使我執手兮盤桓春風起兮花落有美人兮江閣三年不見兮路渺漠逺莫致兮金錯日窅窅兮下山竹紛紛兮解籜及青春之未徂曷不跨夫黃鵠使我並坐兮偕樂明詩綜卷五十八
