body:
  text: 明詩綜卷四十九翰林院檢討朱彞尊撰徐學謨一首學謨初名學詩字子言更字叔明蘇州嘉定人嘉靖庚戌進士授禮部主事厯郎中出知荆州府遷副使擢僉都御史撫鄖陽召拜禮部尚書加太子少保有海嵎春明二稿静志居詩話宗伯本名學詩以與劾分宜者同姓名遂更為謨昔杜欽損目人斥為盲鄴惡其同字遽自稱疾猶見詆於當時若宗伯更名乃屬患失百世而下知有直臣陳孟公之名遵何必驚坐諱哉宗伯雅負詩名然多懦響殆肖其人白螺行風吹巫峡江水大何者一螺當江坐勢壓水口抵齧崩沙脊嶙峋横伏䭾螺邉人家泛估船得魚買鹽撐日過去年水淹車水堤滿縣漂衝失耕作官府有差無處派翻視白螺為竒貨紛紛下帖迎上司白日索夫夜巡邏可憐殘子苦無皮忽聞使者收門課門既有差地有租此額更從何處科生血迸地不得收爺娘妻子忍遷播輸錢猶可輸命難偪側乾坤幾穏卧魯門爰居知避災眼前世事堪一唾老蛟跋浪白鱣泣賤夫只恐滄江破劉效祖四首效祖字仲修濵州人嘉靖庚戌進士除衛輝推官徴授户部主事厯員外郎中出為陜西按察副使有雲林槀朱仲立云仲修詩沉著渾雄得盛唐氣格李伯承之亞也詩話昭陵嘗遣中使索其題冊呼曰念菴念菴副使别字也因賦詩云更生雙鬢已蕭騷敢謂文章擅彩毫過誤偶承明主問因縁不是鬱輪袍人傳其事以為列朝所未有詩亦爽豁惜集不傳甕山耶律丞相祠作迢遞荒山下披榛拜古祠衣冠猶昔日嵗月已明時溪逺泉聲細林深日影遲黄沙空朔漠誰與問荒碑燕京歌元㑹初分庭燎光君王親御紫霞觴不知五夜春多少白日猶聞蠟炬香塞上曲龍沙近接古檀州多少從軍倚戍樓寒夜不堪愁絶處西山片月挂城頭九日獨酌南山遥對菊花開欲采無人為舉杯縱説柴桑貧謝客何曾不許白衣來張四知一首四知字子畏汝陽人嘉靖庚戌進士除刑部主事轉兵部郎中出為四川按察僉事有韶亭集上巳送陳子韶赴浙東僉憲暮春燕地草萋萋冠葢追隨漢苑西尊酒不須臨水泛宫鶯已聽隔花啼風流逺媿山隂客麗藻新傳上已題况是河梁明日别離裾莫惜暫相攜陳宗虞一首宗虞字于韶閬中人嘉靖庚戌進士厯官按察副使有卧雲樓稾六亭集穆敬甫云陳君詩過於激烈送胡生南歸揚子江風落暮潮𤓰洲夜月起蘭橈西湖歸去三千里家在芙蓉第一橋翁夢鯉一首夢鯉字希登莆田人嘉靖庚戌進士有雨川集次忻州故園杳無際凄然客思多雪中歸代郡冰上度滹沱野戍孤煙出寒空一鳥過邊庭誰與晤獨賦式㣲歌陳柏一首柏字子堅沔陽州人嘉靖庚戌進士厯官按察副使有蘇山集送正卿弟之黎平匹馬迢迢渡五溪雙旌遥指夜郎西莫憎逺道猶千里隨處花開更鳥啼田汝麟二首汝麟涿州人嘉靖庚戌進士燕銜泥燕銜泥巢君屋不食君家米與鹽但借君家梁上宿胡為閉門相棄逐遊空同山歌空同山乃在涇水之南太白西危峰峭壁與天齊上有栖雲千尺之幽洞下有迴流萬折之深谿煙岑古木渺無際虎豹鼪鼯白晝啼憶昔軒轅帝問道廣成子煮銅荆山下鍊藥鼎湖裏道成騎龍飛上天空留𤣥鶴巢雲煙𤣥鶴招之不可得翩翩四萬八千年我來空同尋仙跡欲索𤣥珠遊無極塵海茫茫何處求山寒日夕天空碧方𢎞靜一首𢎞靜字定之歙縣人嘉靖庚戌進士累官南京户部右侍郎王仲房云定之祖法盛唐而於王孟尤近若流水不知處幽禽相與飛不知春色減忽見林花飛永日空山寂幽然時一吟宛然二君遺響也東巖巖端曙日輝巗下啟松扉流水不知處幽禽相與飛青山長對席白髪久忘機試與西鄰叟攜壺上翠㣲欒尚約一首尚約字孔源膠州人嘉靖庚戌進士由溧水知縣選授江西道御史謫安州判官遷懐慶推官被論削籍詩話孔源宫詞不失温柔敦厚之教宫詞玉簫吹斷落花香空結流蘇五鳯皇不遣和戎即恩幸敢矜顔色過昭陽馮皋謨一首皋謨字明卿海鹽人嘉靖庚戌進士由刑部郎中出為江西按察僉事厯廣東參議副使福建左參政有豐陽集泊鴛鴦湖遲友不至野客饒春興輕舟坐夕曛湖光天下上暮色水氤氲戍鼓連城動漁歌隔岸聞參差吹未巳獨立望夫君潘季馴一首季馴字時良號印川烏程人嘉靖庚戌進士除九江推官擢江西道御史陞大理寺丞厯少卿以僉都御史治河累官南京兵部尚書罷歸起刑部尚書加太子少保總理河道有留餘堂集詩話印川自嘉靖乙丑受命治河至萬厯庚辰工成著有宸斷大工録先後四總河務晚輯河防一覽其大指謂通漕於河則治河即以治漕㑹河於淮則治淮即以治河合河淮而同入於海則治河淮即以治海立意在築隄束水借水刷沙以此奏功百年以来俱守其規畫可謂能捍大患者獨怪天啟初補諡列朝名臣而公獨不與焉録其詩為之嘆息除夕行到海窮處仍驚歳盡時燈前誰共影愁裏强吟詩游子歸何日芳春坐可期滿城簫鼓動客思已凄其梁夢龍一首夢龍字乾吉真定人嘉靖癸丑進士改庶吉士累官吏部尚書加太子太保贈少保諡貞敏宿三川驛寂寞三川驛風塵苦見侵王程方未巳客夜且髙吟山火延危嶺泉聲聒逺林幽懐良不淺何日慰招尋曹梅一首梅字子和鹽山人嘉靖癸丑進士官郎中沅州道中亂山盤錯入沅州瘴雨蠻烟動客愁囬首燕南家萬里斜陽誰倚故園樓孫應鰲一首應鰲字山甫貴州清平衛人嘉靖癸丑進士厯官南京工部尚書贈太子太保諡文恭有學孔堂稾華山雜咏玉女窗開眼倍明仙童肅隊奏鸞笙海雲初散蓬萊股人在蒼龍背上行王一鶚一首一鶚字子薦曲周人嘉靖癸丑進士厯官太子少保兵部尚書有舂陵集三月晦日花外東風送馬蹄平原一望草萋萋黄鸝苦欲留春住深樹斜陽到處啼張翀三首翀字子儀栁州衛人嘉靖癸丑進士厯官兵部右侍郎天啟初追贈尚書諡忠簡有鶴樓集别貴竹諸友十年與君遊千里與君别把袂意不言含杯氣欲絶漸隔瀟湘雲空留夜郎月一曲瑶琴彈知音對誰説登焦山夜歸短棹乗風去輕輿帯月歸花香入徑細漁火隔江㣲逺寺猶聞磬荒村半掩扉石橋横渡處醉看海雲飛有懐五落龍山葉三来雁足書夢中親舎近天外故人疎寥濶乾坤裏疎狂醒醉餘秋風吹短髪溪畔獨躊躇龎尚鵬一首尚鵬字少南南海人嘉靖癸丑進士除平樂知縣入為監察御史厯官右副都御史巡撫福建天啟初追諡忠敏有百可亭摘稾詩話少南視鹺兩浙總理兩淮長蘆鹽屯身處脂膏不能自潤集中虚室行去細視缾中久無粟舉火終朝待鄰曲長饑近午始一餐敢望豐年收萬斛自注三月中旬已貸粟矣即此亦是難得秋日園居物候隨時變那堪問歳華晚風三徑竹朝雨半籬花自比禪居靜從教物論譁浮生何所有醉處便為家吴時來一首時來字惟修仙居人嘉靖癸丑進士厯官右都御史掌院事卒諡忠恪有梧齋集焦山夜歸古寺探幽去山城倚醉歸留人林月上醒酒暑風㣲漁唱揺江渡村燈照夕扉獨憐沙上鳥已宿尚驚飛楊綵一首綵字質夫虎賁右衛人嘉靖癸丑進士厯官右僉都御史巡撫山西雁門述懐昔稱雁門郡嵯峨抱萬山樓煩隱天際滹沱水潺湲寒沙慘白日北風摧朱顔封侯詎非願王事顧多艱丈夫志四方兹游何時還李蓘六首蓘字于田内鄉人嘉靖癸丑進士選庶吉士除檢討遷南京禮部郎中厯官提學副使有太史集詩話于田博洽中州人以擬楊用修而歸田之後縱情聲伎放誕不羈女優登場至雜伶人中持板按拍主人知而延之上坐恬然不為怪及去借主人櫪上馬挾女優連騎而去此其狂態更甚于用修矣詩亦少深思絶句頗强人意懐姚敘卿謫居自從東郡别君侯吴楚茫茫悵逺遊故國鶯花牽客夢大江風雨動人愁偶縁散吏調琴鶴無復題詩上酒樓驛騎蕭條山海隔逐臣心事兩悠悠嘉靖宫詞四首沉水龍涎徹夜焚桂宫芝館結祥雲壇前纔布諸天位苑外先催學士文玉貌終年侍禁闈每逢時節賜金緋君王不愛纎腰舞裁作雷壇拜斗衣小車飛曳向𤣥都翠羽金翹笑自扶玉蝀樹邊長日市内璫争買大秦珠泥金檢玉祝長生萬國封章止進呈月滿西宫更漏永九重風落步虚聲都城雜詠西宫白日静波流小殿玲瓏夾御溝花樹重重春爛漫遊人偷上洗妝樓徐師曽一首師曽字伯魯吴江人嘉靖癸丑進士選庶吉士授兵科給事中厯刑科左給事有湖上集詩話伯魯説經鏗鏗又輯文體明辨以廸後學一官清要五疏乞歸其述志賦云相先民之不朽兮託三事而流傳吾何有一於兹兮死速朽而猶􅀢惜青春之不我與兮忽已至乎衰年胡不及時以精進兮擇可修而勉旃昔賢有言耄未至惛衰不及頓尚可厲志於所期又言進不及達退無所矯伯魯之謂矣詩亦清婉葢斤斤學唐者宿磚河驛渡頭風色晴漁火隔沙明帆逐暮雲落潮隨春水平長蘆昨夜月甲馬舊時營關隘今無事稀聞擊柝聲顧曽唯一首曽唯字一貫吴江人嘉靖癸丑進士除金華知縣擢浙江道御史巡按廣西引疾歸有閩越雜咏同賔峰集我渡山房旅客貪呼伴芳尊共解顔清池来浴鳥髙閣俯重山墮酒松花細抽梢竹筍斑一作當軒蘿月閒夷猶二三子竟日不知還姜子羔二首子羔字宗孝餘姚人嘉靖癸丑進士除成都府推官入為禮部主事終行太僕卿黄太冲云太僕幼侍王文成講席不與詩人争一聫半句之工然俊爽之氣湧出行墨之間不可掩也登峨嵋絶頂吟君不見大峨之山矗西土乃在軒轅之臺列仙之府我騎飛龍叩天戸九州厯厯皆可數初由平陸瞻青冥丹梯翠磴愁攀登亦鳥伸而猿引斯飇舉而雲升下視大壑不知其㡬萬仭惟見長蛇尺蠖挂絶壁之蒼藤攀危厯險趣未畢積雪隂風轉蕭瑟初疑雲自石中生寧知日向雲間出普賢巖前雲日晴圓光倒照何熒熒曄然五色相照耀有若虹蜺跨海掩赤城是非山澤氣無乃隂陽精須㬰雲散日西走光亦隨雲隠巖口對此喜極心神舒聖燈又出南山隅初㸔一炬何趦趄少焉萬簇皆東趨神竒鬼怪事殊絶銀燈火樹焉足娱歸来作歌但坐嘯還問山靈有意無下巖寺一入招提境登臨思已牽地將金作界山以玉為泉僧定魚皆出江空月自懸虚巖尊者像幻跡至今傳鄭茂一首茂字士元莆田人嘉靖癸丑進士除海鹽知縣擢兵科給事中厯官河南按察使過草萍驛古驛荒煙斷征驂向晚停吟回江雨白坐對越峰青萬事皆蕉鹿吾生亦草萍勞歌猶未巳短鋏復衝星林命一首命字子順建安人嘉靖癸丑進士厯官廣東按察使有陽溪集遊定恵院和韻言㝷僧舎出東門紫菊黄橙處處村秋盡逺峰含翠靄天寒斷岸落潮痕山中花謝臺空在亭上詩成酒續温不見美人湘水畔數聲漁笛欲消魂季科三首科字與登江隂人嘉靖癸丑進士除行人選授禮科給事中出為江西布政司㕘政有雪浪間居二稾了菴鷗盟録詩話與登歸田之後田産所入悉以築圃圃在萬壽山麓中有六曲徑蒼雪嶺賜間堂雪浪湖湖中有青螺墩妙髙閣湖上有寄寄堂紅雲閣華陽㓊天又鑿洞為小桃源中有赤城樓來鶴亭桃花泉曲水亭雲林桐江片石恒與朋舊觴詠其間足稱好事詩亦安整不佻太保顧惠巖公祇役泰山途次和答紫極傳丹詔青霄訪玉華霓旌翻日觀瑶島接星槎寒蹋峯頭雪晴攀海上霞翩躚雙白鶴遥駕五雲車次韻答鄧薇山社長祖席分襟地江闗積雪天寧知廬阜約翻上汶陽船夢斷清秋半書來白雁前心期渺流水虚奏伯牙絃曲水亭飛瀑雲中響清觴石上浮蘭亭還我輩不減晉風流侯祁一首祁字應文鄆城人嘉靖癸丑進士厯官闕知府浮圖峪雄闗北峙萬山中天外浮圖接太空白馬逺從青海入紫臺髙與碧雲通秋風沙塞寒煙暝古戍旌旗晚照紅自是聖朝無戰伐漢家不數貳師功劉侃一首侃字正言京山人嘉靖癸丑進士由戶部郎中為知府有新陽館集隴西雜興西極秋髙白鳥翻慿闌送目到河源乆無槎影通銀漢遥見天光下火敦青海風濤還積石玉門車馬半中原崑崙故是征西路寄語山前吐谷渾盛周一首周字文郁秀水人嘉靖癸丑進士除知浦城縣入為刑部主事厯郎中出知東昌府詩話太守少從王龍溪遊與沈先生靖夫講學于聞湖書院遺址在梅家蕩水中央其子姓至今聚族於斯聞其報最日忤分宜父子不得臺諫葢莊士也蔡見麓過夜坐南浦停車暝色催故人相見且銜杯月明何處吹長笛落盡空山㡬樹梅王可大一首可大字元簡吳江人嘉靖癸丑進士台州知府有懸筒集宫詞承眀殿裏諫章來封事君王次第開此日昇平邊圉静日斜猶自在平臺史起蟄一首起蟄字徳龍江都人嘉靖癸丑進士江上溪雲窈窕海天晴檻外江流似掌平午夢醒來無一事水雲亭上看潮生吳文華一首文華字子彬連江人嘉靖丙辰進士累官南京兵部尚書贈太子少保諡襄惠有濟美堂集謁岳武穆祠㡬樹蕭森岳廟東一杯懐古酹西風凱歌竟負黄龍飲信誓虚傳鐵券功無復翠華回絶漠最憐白雁入行宫神州恢復千年恨讀罷遺詩恨未終方九功一首九功字允治南陽人嘉靖丙辰進士厯官南京工部右侍郎有息機堂稾歐禎伯云允治詩嚴整夷惕范介孺云允治音節清亮意趣雋永獨超物外不罥一綺麗語泊滄州有感世事看流水漂零見此身他鄉猶是客失路竟依人樹引長堤暮花殘故國春卷簾聊對酒幽寂恐傷神周詩一首詩字興叔錢塘人嘉靖丙辰進士厯官通政使有與鹿集赴天津仲夏衆芳歇沃野羣卉稠曜景窮北陸薰風獻南陬伊余赴期㑹東騖戒方舟晴雨逓昏晝凉燠變絺裘瀠洄見湖澳寂厯懐滄洲結髪事明主䇿勲慕前修名賤業匪建時往命不猶才將世途左道與隠者謀漆園侈達生柱下崇致柔優哉聊卒嵗庶以謝愆尤胡直二首直字正甫泰和人嘉靖丙辰進士除刑部主事出為湖廣按察僉事厯四川布政司叅議乞休起補湖廣提學副使陞廣西左叅政歸有衡廬精舍藏稾孫山甫云正甫胸次洞然有物我同體之懐故其詩暢而鬰直而婉天趣獨深非追琢可及登衡嶽弱齡慕遐舉中為世網嬰雖抱及物志而非濟時英家本衡廬交早負泉石盟秉憲渉湘沅吏事滋牽縈靈岳奠疆域渺若隔蓬瀛恭承帝新命駕言自西征廻車恣探厯使我夙心傾朝暾蕩雲巘導我游上清吾衰疲塵鞅學道未有成安得同心友眷言事耦耕龍洲窈窕繁花路清虚野甸居漸為逃世客嬾荅貴人書水閣依鷗鳥塵編信蠧魚日㝷垂釣侣長到月明初張潛一首潛字用昭華州人嘉靖丙辰進士除户部主事轉員外改禮部厯郎中出為廣平知府陞山東左㕘政有東谷集送邃菴相公廵邊羽書昨夜入甘泉朔漠流沙起塞煙遂使至尊親授鉞遥煩上將出廵邊望隆數入論思地寄重三持節制權諸鎮安危憂不細宵衣應待凱歌旋黎民衷一首民𠂻字惟和從化人嘉靖丙辰進士厯官吏部郎中出為廣西㕘政月夜吳舍人過集向夕羣愁起幽期幸不迷天垂鳷鵲外城轉鳳皇西翠斝淹宫漏春星散馬蹄十洲飛夢逺何路問丹梯姚汝循六首汝循字敘卿上元人嘉靖丙辰進士除杞縣知縣遷南京刑部郎中出知大名府謫嘉州知州有錦石齋集詩話敘卿詩格不髙然五古逺倣陶韋近體能宗太厯此益藩潢南道人入之李何諸公之列目為盛明十二家也夏夜對月落日暑暫歇微風蕩靈襟囂塵淨庭宇竹樹森繁隂皎月牆東來照見石上琴揮手一再鼔悠然生逺心鍾期乆不作千載誰知音秭歸立秋晷運相推斥昨夏今已秋𤣥蟬鳴不歇大火莽西流人生寄一世漂如波上漚乃為一尺組而來萬里遊琴書委不理與言非故儔曉起戴星行入夜尚不休勞勞寡懽悰戚戚増煩憂短景易以邁兹嵗且復周功名建何時霜華欲滿頭自不堅始願及此將誰尤自横梁放舟還郡解纜横梁渡鳴橈濯錦川秋山初過雨夕漲欲浮天四野明殘照孤城合暮煙媿無仁者政竹馬亦橋邊半峯禪院遲同遊諸君策杖欵禪扃垂藤交古路却顧後來人蒼蒼隔煙霧囘雁峯囘雁峯頭望帝京寒雲黯黯不勝情賈生已道長沙逺今過長沙又㡬程巫峽書所見巫山萬仞鬰嵯峨巫峽嘈嘈湧白波多少行人齊下淚漁郎猶唱竹枝歌施篤臣一首篤臣字敦甫青陽人嘉靖丙辰進士官至順天府尹社日沽頭作蕭蕭沽城東纍纍陌上墓掃除骨肉稀含淒當古路墓上車馬喧墓中人不寤摵摵白楊枝怪鴟啼無數人生若流水一去誰迴顧形骸草木姿詎比金石固往者何足歎來者將焉措驅車此彷徨擬續招魂賦卞錫一首錫字叔孝嘉善人嘉靖丙辰進士除中書舍人選吏部稽勲主事有豹山集陳仲醇云分宜柄國言者以蚍蜉撼樹不勝者止司勲往往抗其盛氣方袖封章彈之適聞親訃還里故其居恒所為詩聊蕭不平感慨畢露曉舟即事野寺侵雲出千家草色匀晩風吹浪白夜雨濕苔新去雁聲何急當樓皷尚頻回看煙樹合殘月下城闉鄭洛一首洛字禹秀安肅人嘉靖丙辰進士除登州推官遷廣東道御史累官少保兵部尚書兼右都御史贈太保諡襄敏冬夜獨坐天涯嵗暮夜淒淒皷角初傳月已低一榻悠然成獨坐不知身寄玉關西曽同亨一首同亨字于野吉水人嘉靖巳未進士累官太子太保南京吏部尚書諡㳟端有泉湖山房集贈趙大㕘赴山西雁門關外羽書飛帝念西征數解衣邊徼皷鼙渾未歇人家煙樹覺全稀無煩兵法儲行槖自請長纓出禁闈十二屯田方畧在䇿勲㸔拜徹侯歸魏時亮一首時亮字敬吾南昌人嘉靖巳未進士以兵科左給事使朝鮮累官南京刑部尚書平壤拜箕子墓并訪井田遺跡禹範留西土先生獨向東道無浮海歎義與采薇同舊井存殷畫冔冠尚古風荒丘平壤外麥秀想遺宫沈節甫一首節甫字以安烏程人嘉靖巳未進士累官工部左侍郎贈右都御史諡端靖有太樸集題且住軒此邦非吾鄉此室非吾廬情知匪乆客且復卜其居蕭蕭環堵中俯仰欣有餘天地為逆旅百年亦湏臾羲娥無停轂吾生自有初念此坐長歎秋風起庭樗飄蓬任回飇素位恒晏如張鹵一首鹵字召和儀封人嘉靖巳未進士厯官右副都御史巡撫真定改大理寺卿調南京太常寺卿得張崌崍銅梁書萬里蠶叢寄一書開緘涕涙滿衣裾可憐話别六年後同事招魂九死餘事過始諳渾失計眼前莫更問何如寒灰老我𡨕心定汴水河干已結廬沈奎一首奎字文叔江隂人嘉靖己未進士除户部主事厯郞中出為浙江按察僉事分巡嘉湖遷江西布政司叅議有歸興集富春雨後衆山青汀邊雙鳥白挂㠶趁西風遥看富春驛沈啓原五首啓原字道升秀水人嘉靖巳未進士厯官陜西按察副使有鷃園草項里西楚霸王廟符命通神契天心屈霸圖風雲空叱咤陵廟且榛蕪悔失師中范徒憐帳下虞江東餘父老伏臘走村巫同劉教授羅訓導再過福昌寺赴縣尉祝子餞為踐東林約相要竹裏行升堂秦博士倚席魯諸生吏道空馳傳賔筵再鼓笙不緣仙尉引誰共冶遊情懐陸仲長京洛追游處春風次第吹官從一命始别是隔年期藥裹趣中禁方書得上池正逢欣賞日未許動鄉思謁宋真宗廟玉輦巡游處荒亭半緑苔攀號龍已去瞻禮客重來漢畤空遺蹟秦封亦有臺何如恭巳日稽首咏康哉冬日偕袁池南楊完愚陳䕫石餞盧外山鄉丈於靈應觀觴詠移日飲餞離亭日半黄飛雲落葉對清觴江山去住皆陳迹賔主東南是故鄉翠竹含風仙院靜白蘋牽浪楚天長追攀未盡登臨興野水寒禽又夕陽錢鎮四首鎮字守中烏程人嘉靖巳未進士官兵部郎中有淡菴集許孟中云淡菴詩冲逸似陶韋詩話守中從唐子鎮講學居弟子之首而詩無塵腐之習中年卜宅思溪掘地得宋王觀察永從墓亟掩之而築堂其上不以為忌也永從嘗刋五代史纂誤雜録二書置本郡庠後取以補監本見陳氏書録解題今思溪土人不復有知其姓名者矣録守中詩附識於此餘不前溪苕水從南來真源自天目始出纔涓涓蛙跳雀可浴東風桃花水一夜髙於屋百里下吳興一汛更一曲青山浮水面處處居可築草𤣥伊誰亭名花間疎竹自昔稱餘不佳名豈虚辱山中雜興結廬傍青山繩樞甕為牖生涯陌上桑行逕門前栁獨行媿偊偊顧盻無與偶䇿杖求友生陶潛去我乆豈伊逃醉鄉翻念魯中叟寂寞柴桑間豈意千載後廬山舊遊路往跡今已朽古今諒同轍悵望一騷首新晴散歩自唘郊扉曳履行傍溪雲日放初晴新皇拔地已數尺黄鳥隔林時一聲老去任情忘檢束客來廢禮闕逢迎家臨西塞清溪口坐㸔桃花錦浪生田家雜興細艸行來芳徑修篁覆處茅菴借問丈人生計薄田自種溪南張祥鳶六首祥鳶字道卿金壇人嘉靖巳未進士除户部主事厯員外郎中出為河東運司同知遷知雲南府有華陽洞稾虚菴集詩話道卿詩瀟灑絶俗頗類永嘉四靈東平道中驅車涉長道荒塗曠無人斜陽澹古木驚風翼征輪候館莽牢落日暮寒城闉停驂一以憩振我衣上塵庭樹集歸鴉依依得所欣如何客遊子不念平生親新秋帆舟過西莊聽雨話舊放船秋水落能載兩三人坐愛清波影輕揺白㲲巾到門纔繋纜藉艸便垂綸野飯無兼味嘉魚色勝銀京口月夜惜别春江明月夜不是别離時酌以桃花酒贈之楊栁枝轉蓬身共逺倦鳥意俱遲明發天涯路青山惱夢思園居人境重重隔溪流宛宛分竹隂飛翠雨花氣結晴雲籬缺牽蘿補園蕪植杖芸禽言能細譯幽事賴先聞上巳日寄鄭虚舟三月三日春可憐百勞聲裏花如煙臨卭大夫有佳客廣文先生無酒錢放歌誰和舞雩曲洗硯獨寫蘭亭篇我欲從之問竒字出門無那春風顛登北固山孤峯縹緲赴江天白石紅塵樹杪縣一道澄波開斷壁千林黄葉下寒煙鵰盤寥廓秋風急山缺西南落日圓萬里中原勞北顧蕭梁陳迹酒杯前申時行七首時行字汝黙吳縣人嘉靖壬戌賜進士第一累官少師兼太子太師吏部尚書中極殿大學士贈太師謚文定有賜閒堂集馮元成云申公有韻之文對口立就不為呌囂亢厲之音卑弱浮靡之調古體淵源建安近體沉浸初唐不事摹襲而自無不合詩話趙尚書羾識于足益於早嵗顧尚書璘識張叔大於童時傳者以為佳話先太傅公九齡獲見文定文定特起避席時先公末就塾文定留之邸第讀書一日從師出遊先公失足蹈汙尼文定命僮子回取履童子誤持文定朝鞵至先公不敢納文定笑曰履之終當踐我迹耳及舉順天郷試同學少年有恃才者曰朱兆隆亦能成名邪文定怫然曰兆隆將大魁天下若輩焉知明年先公果臚傳第一其藻鑑不爽若是文定不以詩見長然鉅篇長律鋪揚典麗足令操觚者縮手如云老去空悲千里驥秋來真憶四腮魚風度可想也題清秋出塞圖生不識醫無閭夢不到狼居胥瞥然示我出塞圖令我目眩心神徂憶昔籌邊贊廟謨桓桓司馬傑丈夫帝授節鉞臨𤣥莬髙憑熊軾佩虎符榆關九月沙艸枯霜鷹下擊秋原蕪煙荒雲慘天糢糊惟兹遼左僻海隅頻年侵擾無寧都射雕躍馬彎強弧司馬申令陳師徒指揮鐵如意玩弄金僕姑揚旌督戰親援枹萬卒超距爭先驅奔狼突豕皆就俘凱歌入奏天顔愉司馬讓功欿若無伹云將士多勤劬何以勞行役請蠲幕府租何以恤飢疲請發司農儲人人挟纊齊歡呼自從司馬歸江湖遼人茹苦若堇荼荷戈不解甲輓粟仍飛芻羽徼徴材官絡繹在道塗震隣之恐非剥膚騷動根本何為乎安得再起司馬登戎樞坐紆長䇿銷隠虞國威震疉邊人蘇洞庭篇壽嚴中翰崔嵬乎洞庭之山乃在勾吳之墟具區之藪芙蓉㸃㸃七十二雙結青螺綰其口我昔淩滄洲振衣千仞巔西登縹緲接銀漢東望莫釐生紫煙珠宫貝闕儼相向恍似員嶠方壺天吾聞靈威丈人入林屋手探蒼水金庭籙又聞毛公羽化留空壇時有鸞鶴來雲端兹山信美多靈秘幽棲故是神仙地主人三殿倦揮毫出山便作還山計只今六十早歸田攝生日誦叅同篇洞庭之水釀春酒醉來恣拍洪厓肩哭王子幻慘澹江天裏何人問客星空傳懷舊賦無復艸𤣥經物外悲長往人間忌獨醒牀頭孤劍在永夜泣青萍送初主簿罷官歸楚吳苑初傾葢荆門早挂冠宦憐潘岳拙曲和郢人難畏路窮棲棘芳洲信采蘭浮沉何足問江漢有漁竿大閱詩應制廟畧收羣䇿宸遊簡六師代當全盛日春是大蒐時雲捧蒼龍駕風迴翠鳳旗轅門開複道帳殿繞行麾細栁前軍駐長楊後騎隨虬鬚天䇿將猿臂羽林兒拂劒星文動彎弓月影披連營分雁翼布陣合魚麗禮示三驅正鋒藏九變竒張侯仍是豹賈勇盡如羆引滿雙鵬落騰空萬馬馳元戎歸節制法從肅威儀詎數誇胡獵還欣奏凱期大風歌漢士吉日誦周詩我祖黎庭烈先皇保泰規永言思繼述持以贊雍熙立春日賜百官春餅紫宸朝罷聽傳餐玉餌瓊肴出大官齋日未成三爵禮早春先試五辛盤迴風入仗旌旗煖霽雪當筵七箸寒調鼎十年空伴食君恩一飯報猶難辛夘元日紫宸元㑹輟朝天咫尺無由捧御筵遲日曈曨虚正殿非煙縹緲在甘泉王師未奏康居捷農扈誰占大有年衮職自漸無寸補惟應投老賦歸田余有丁一首有丁字丙仲鄞縣人嘉靖壬戌賜進士第三除編修厯司業洗馬右諭徳左庶子出為南國子祭酒召入為少詹事兼侍讀學士遷太常卿厯禮部左右侍郎改吏部進禮部尚書入直文淵閣改户部尚書兼武英殿大學士終少傅兼太子太傅建極殿大學士卒贈太保諡文敏有文敏公集詩話文敏送肖甫一律絶類劉文房送張崌崍客行新霽後曙色唘城頭曉徑穿雲濕春塘帶雨流江籬牽客思山鳥動春愁何事新芳歇王孫不可留蹇達一首達字子修重慶人嘉靖壬戌進士累官太子太保兵部尚書冬日登毘盧閣塞雁南飛逈髙樓北望寒暮雲千嶂暝積雪萬家殘四海徴輸盡三巴道路難天涯對揺落那得旅愁寛林烴三首烴字貞耀閩縣人嘉靖壬戌進士厯官南京工部尚書有覆瓿集諸公餞送城南樓寄謝冉冉嵗云暮于役殊未休冠葢集相送置酒城南樓微雨霽朝景騁望消人憂蒼蒼逺山色浩浩清江流丹楓羅曲岸白鳥戲中洲景物紛可恱驪歌促行騶衡門昨棲遲杖屨忝從遊奈何逺離别一日如三秋索居感羇旅乆要慕前修適意豈非達徇祿良足羞山靈勿相誚早晚歸林丘府江渡朝發陽朔崖暮次昭潭渡行邁千餘里孤舟日東騖川途阻且長耳目漸非故巉巖夾崇山杈枒羅茂樹四望寡人煙三時昏瘴霧深林蹊徑絶怪石波濤怒虎穴幸徙蹤狼烽猶置戍客子獨何為艱險常道路雖懐叱馭心寧免垂堂懼白日易蹉跎𤣥髪忽改素人生苦拘束多為浮名誤萬事良悠悠達生庶可慕苦雨述懐我行赴京華征途纔及半渡江越淮南原隰何渺漫溽暑當兹時氣候變昏旦迅雷激中宵隂雲翳層漢山雨驟淋漓川流俄浩涆陽烏避何許水鳥羣相喚髙浪没危橋飛湍瀉崩岸我馬淖不前我車靷已斷屈詰厯羊腸回顧屢顛汗僕夫仰天號客子撫膺歎吁嗟行路難徬徨日將晏塵中苦局促物外思蕭散挂冠亦繇人何事長羈絆戚元佐一首元佐字希仲秀水人嘉靖壬戌進士除禮部主事厯員外郞中陞尚寳司少卿有青藜閣稾詩話吾鄉彭子殷論詩即尚七子然其詩不類也至戚希仲則余以七子為圭臬弇州列四十子不及希仲何與早朝鳳掖傳呼早晨趨逼禁闈天香浮輦静宫漏隔花微仙掌明河動周廬列宿稀不知風露重先濕侍臣衣髙則益一首則益字受所南昌人嘉靖壬戌進士官至四川叅政聖駕大閱歌平明仙蹕下丹霄千騎風雲擁射鵰盡道吾皇能將將軍中誰是霍嫖姚蔡可賢一首可賢字子齊成安人嘉靖壬戌進士官至按察副使有西征鼓吹樓煩山後山前十六州天涯盡處是偏頭雲開大漠風沙走水折長河日夜流萬户金繒愁見月千羣鐵騎畏逢秋却思大漢無中䇿一曲胡笳倚戍樓鄭履淳一首公字伯寅海鹽人嘉靖壬戌進士除刑部主事改尚寳司丞建言廷杖終光禄寺少卿有集詩話昭陵繼世海宇宴清少卿時為尚寳丞初無言責乃上痛哭之書至云物怪人妖天鳴地震彗星兩見於尾女日月繼蝕於元春鬼神告凶災害洊至始有陳渉與赤眉之徒窺伺於世雖李綱宗澤之才展布猶難其亦過於激烈矣當日予杖一百流血濡縷至今遺袴藏其故宅春閨朝來靈鵲遶簷鳴果得雲箋慰逺情伹說别來長見憶歸期依舊不分明沈𤣥華一首𤣥華字䆳伯一字少河嘉興人嘉靖壬戌進士除禮部主事厯官南京太常寺卿轉大理寺卿詩話明南都太廟嘉靖中為雷火所焚尚書湛若水請重建而夏書阿世宗意請罷有㫖并入奉先殿按長陵每自稱曰朕髙皇后第四子也然奉先廟制髙后南向諸妃盡東列西序惟碽妃一人具載南京太常寺志葢髙后從未懐妊豈惟長陵即懿文太子亦非后生也世疑此事不實誦沈大理詩斯明徵矣大理性恬退不樂膴仕歸遂潔白之養殁後𤣥孫傳弓摭拾遺集早夭失傳是詩獲於髙工部寓公家敬禮南都奉先殿紀事十四韻髙皇肇太廟松桷連穹霓尊祖有孝孫典禮遹升躋一從遷都後遺制終未暌有司列俎豆上公視瓚圭豈意嵗甲午烈火隳榱題譆譆出出音其兆先端倪盈廷議移祀中廢成町畦猶餘奉先殿薦新及葅臡㣲臣承祀事入廟歌鳬鷖髙后配在天御幄神所棲衆妃位東序一妃獨在西成祖重所生嬪徳莫敢齊一見異千聞實錄安可稽作詩述典故不以後人迷徐廷綬一首廷綬字受之淳安人嘉靖壬戌進士除刑部主事厯員外郎中出知辰州府遷陜西按察副使有錦泉集胡松麓自瑞州以書見寄搔首西風裏懐君思惘然江湖千里隔雲樹寸心懸客淚隨猿落鄉書有雁傳惟應今夜月相對共遥天穆文熙二首文熙字敬甫東明人嘉靖壬戌進士除行人進司副遷工部員外改尚寳司丞轉吏部員外出為廣東按察副使有逍遥園集石拱辰云敬甫早年詩頗象宕摩鍊既久遂臻大雅詩話敬甫論詩沾沾自喜亦强作觧事爾集為劉子盛石拱長所定又安得佳聞拱辰符卿至自京志喜漳水燕山道路賖相思常苦暮雲遮到來不必論時日三見庭前木槲花題乾山卷㡬年為客滯江關夜夜汾陽有夢還卷裏書圖君莫看斷人腸處是家山楊汝允一首汝允字惟明南昌人嘉靖壬戌進士厯官姚安知府有九霞山人集同日册封六妃官花笑日草生春喜動天顔沐寵新同侍翠華遊幸地不知辭輦是何人錢貢一首貢字時庸桐鄉人嘉靖壬戌進士除知新建縣入厯刑部郎中有愛存稾京邸懐歸適妻弟唐楮汀來謁於其還賦長句言别此日意不樂掩關有所思忽聞君逺來錯愕令我疑平生不辭鄉安得來京師去年與君别屈指已一朞南望懐故人日與浮雲馳嗟予坐羈束素顔日以緇金門盛才賢迂疎將何為感之百憂集歎息還自嗤君今馬首南握手復何辭投簪雖未能煩君語吾兒貧賤雖爾慙富貴匪我期願言各努力勉將門戶支予家柞溪東緑水環茅茨豈獨饒桑麻松竹植亦宜好闢十畝園樹藝須及時䕶筍編枳棘灌花引泉池待予此中老與君同栖遲此願良未果永懐常在兹去去勿復陳人生多别離夜闌欹枕卧暑雨捎罘罳詩話錢公居甑山之隂没𦵏山麓其後人至今聚族柞溪左右桑麻松竹蔥舊依然長篇不事雕繪有白太傅遺音楊成名一首成名字志完建安人嘉靖壬戌進士武進知縣有遂初集秋日郊行路遶溪流細山廻樹色分客沽村店酒牛卧隴頭雲林葉含秋露溪煙澹夕曛兒童迎我笑拍手自成羣許國二首國字維禎歙縣人嘉靖乙丑進士改庶吉士除檢討厯編修右贊善洗馬遷南國子祭酒轉太常卿協理詹事陞禮部侍郞進尚書入直東閣加太子太保累晉少傅吏部尚書建極殿大學士卒贈太保諡文穆有許文穆公集擬御製勸農詩四民皆天職嗟農獨苦辛所以古哲王廵省及兹辰簫鼓吹豳詩訓迪良諄諄東郊土脉動好鳥鳴芳春桑間拂其羽催耕一何頻乗時播嘉種原隰何匀匀念兹民所天珠玉安足珍一日茍不作飢寒將立臻勿惜沾體勞但憂年嵗屯沾體勞尚可嵗屯傷我民憶昔先皇時端居軫郊闉載賡憫農咏丕揚烈祖仁禁苑籍千畝雨𤾉雩百神玉食豈不足貴令四海均九重髙結念况爾謀其身古人有良言嵗計在於寅豈伊公家賦婦子亦相親春風正發育萬物皆鮮新勉以東作力佇見西成禋秋聲銀漢滄浪淨碧空天街一葉下梧桐霜前凄切兼砧杵月裏悲凉斷塞鴻何處羈人驚伏枕㡬囘中夜感飄蓬繇來志士輕搖落莫向西風憶桂叢何洛文一首洛文字唘圖信陽州人嘉靖乙丑進士選庶吉士厯官禮部左侍郞兼翰林院學士有震川集詩話震川大復之孫仕雖通顯詩頗庸熟去祖武尚逺章皇帝御筆白馬臺上黄金駿毫端白雪驄玉花生御榻寶繪奪天工照夜雙珂瑩凝霜匹練空瑶池仙馭逺猶見畫圖雄周子義一首子義字以方無錫人嘉靖乙丑進士改庶吉士厯官吏部左侍郞兼侍讀學士贈禮部尚書諡文恪有交翠軒佚稾送何小坡致政還信陽海鶴逺罝網𡨕鴻謝鞲籠人間千丈絲安能縶游龍所以達命士脫迹塵囂中眇兹盈尺組曽是羈我躬何侯東海彦司牧早奮庸一麾指淮右載斾佐漢東斯民有父母國論方爾崇朝宗甫竣事髙蹈隨赤松薄言戒行李云歸天目峯惜此逺行别不得少從容載歌驪駒詞聊以紓我衷林如楚二首如楚字道翹候官人嘉靖乙丑進士厯官工部右侍郞有碧麓集初秋齋居作招揺指坤隅六龍忽迴軫清啇應候至碧梧乗夕隕離居及素節徙倚步華楯睠彼元運馳往復良有凖人生何勞勞年命如朝菌曩觀隨化徂新緒緣物引無以騷人悲將貽榮公哂吾其解天弢去來守𤣥牝㑹江驛停舟異昔年城郭尚依然樹影浮天外江流㑹驛前暮㠶懸海月晴磬出山煙稍喜春來近居人話種田陳文燭三首文燭字玉叔沔陽人嘉靖乙丑進士除大理評事厯寺副寺正出知淮安府遷四川提學副使厯漕儲㕘政福建按察使右布政使江西左布政使陞應天府尹終南京大理寺卿有二酉園五岳山房集胡元瑞云玉叔詩清婉典飭居然名家送楊惟喬侍御北上驛路飛新雨荒亭落晩風賜環霄漢上擊楫大江中此地曽留犢都人尚避驄春華今又半樽酒㡬時同送陳仁甫太史使楚玉署承天遣桐圭錫帝封浮湘即司馬作賦是元龍春盡寒江雨潮廻故國鍾禹碑如可辨還上祝融峯送别落日青絲騎西風白苧詞廣寧門外栁折盡向南枝管大勲一首大勲字世臣鄞縣人嘉靖乙丑進士改庶吉士官至南京光禄寺卿有休休齊集安慶渡李陽客路荆舒盡江㠶海國賒天風蔽晴日煙雨漲平沙水濶疑無岸春深不見花暮潮南浦泊指㸃驛樓斜胡涍二首涍字原荆無錫人嘉靖乙丑進士除永豐知縣再知安福入為廣西道御史以建言落職為民有采真堂集詩話侍御以建言削籍任俠結客所識窮乏多受其恩殁後王承父為具狀屠緯真為銘墓王元美為作傳咸盛稱之詩亦間有合作過雅宜别業不見王摩詰猶餘華子岡隔河山杳靄斷樹水微茫有子開松徑留歡正夕陽漁舟投暝合杯外即滄浪梅隴上春風生江梅㡬枝發仙人坐吹簫飛墮一樓月潘志伊一首志伊字嘉徴吳江人嘉靖乙丑進士除定州知州陞南京兵部員外厯郞中出知九江府謫知陳州移紹興府同知轉南康知府以江西按察副使備兵袁州以行太僕寺卿轄甘肅遷廣西㕘政詩話潘公從遊吾鄉沈石雲先生之門講學之餘詩不多作所題存石草堂一篇即石雲之書屋也題存石草堂名園迥塵域參差開石林丹梯襲曉光碧嶂含夕隂昔自鬰林來置此閒幽襟緬彼巨靈跡宛在梧江潯夫子肯堂構誅茅面雲岑棲巖意已逺陟岵思逾深摳衣縁磴道拭目見嶔崟兹言懐仰止誰謂愜登臨沈淵一首淵字子源濟南新城人嘉靖乙丑進士改庶吉士授檢討進編修陞國子司業有中秘稾塞上聞笛何處吹羌笛秋風度玉關㡬年愁作客此日更摧顔慘淡邊雲合凄凉朔雁還梅花知盡落一夜滿天山許僴一首僴字文夫靈寶人嘉靖乙丑進士除三原知縣徴授戶部主事厯員外郎中出知漢中府調南寧陞陕西行太僕少卿有後崖集西坪路蒼蒼古木中夕陽忽已晩隔浦聞雞鳴人家知不逺王圻二首圻字元翰上海人嘉靖乙丑進士除清江知縣調萬安擢雲南道御史出為福建按察僉事謫卭州判官兩知進賢曹縣遷開州知州厯官湖廣提學僉事陞陕西布政使㕘議有洪洲類稾吳明卿云洪洲詩不落筌蹄不涉蹊徑惟意所適一無蹈襲鄭美命云逺之北地信陽近之海門所稱七子此亦一是非彼亦一是非諸君子為的而後進之士射聲焉未有能中者也先生詩黜其佻巧而本之自然謝其夸毗而歸之實際去其呌噪而由乎冲虚葢矯志而獨行者也之陸伯生云先生詩近大厯貞元際晚年冲逺入陶韋門奥詩話洪洲拜分陕之命即詣告終養既歸淞江之濵㮑梅萬樹目曰梅花源仰屋梁著書門溷皆安席硯所撰續文獻通考謚法通考兩浙鹽志海防志三呉水利考稗史彚編雖舛漏尚多體例未當要亦留心有用之學者觀忠惠祠有感傑哉龍陽尉忠義今所希民瘼一憤激抗疏干天威手持登聞莛口呌閶闔扉但念流亡苦豈惜軀命微雉經悟明主捐生視如歸嵗額減過半始願終不違皇恩與士節千古同光輝春秋薦蘋藻英爽此永依遺跡炳簡䇿身沉名自飛願爾賢達裔奕世延清暉啇邱早行遇雪雲暗啇邱野天連葛伯城懐人霄不寐奔命雪仍行粉絮因風舞瑶華帶雨傾貂裘寒欲透客淚洒塵纓歸有光六首有光字熙甫崑山人嘉靖乙丑進士除長興知縣量移順徳通判遷南京太僕寺丞有震川先生集詩話弇州早年評震川文謂如秋潦在地有時汪洋不則一瀉而已晚嵗乃作贊云千載有公繼韓歐陽子豈異趨乆而自傷葢悔之深矣詩非兼擅然猶勝七子成派逰靈谷寺晨出東郭門初日照我顔春風吹習習好鳥鳴􅚓􅚓巖阿見黄屋登坡㝷神仙半日猶山麓十里長松間蜿蜒芳草路寂寞古禪關畫廊落丹雘朱户蝕銅環殿起無梁逈墖留玩珠攀蒼鼠戲樹㨗野鹿㸔人閒山深静者愛日宴未知還和俞質甫夏雨三十韻浮雲方靉靆光景遂已戢浹旬深霪澍千里破封蟄茫茫河㑑歎蕭蕭山鬼泣靈曜䆳髙居朱明閟赫翕希微澹將開淅瀝吹又急遇夜轉連綿釃流更湁潗萬壑㘊霵鳴百川灌注入池容添紋縠林色浸淤浥離畢月暫耿宿井星恒濕㶑灧湖光翻蹙咽海潮澀霓旌尚髙翔雲衣猶日緝水覆詎可收天漏誰能葺馬牛三江混鴻濛九峰立嗟我來自東獨行阻虚邑夢裏思明兩筮坎成洊習誰假卜啇葢伹戴杜甫笠繽紛餘花落寂寞愁烏集窮巷長閉門髙河近通汲天地政氤氲雷風遞呼吸悽悽聽晨鳥濛濛睇宵熠作乂徴時暘思文憂民粒鼃黽費灰洒魚蝦饒掇拾廣室坐増悽匡牀聽生悒何由度日闋安能使家給泥塗跲重繭梅潤侵什襲寒袍故戀綈瀾簡庸唘笈顧歎風雲滿寧使蛟龍蟄短屐徒齒齒折巾空岌岌俯仰觀宇宙坱圠迷原隰阻饑知不免寅亮豈所及寳應縣阻風夜泊淮隂城蚤向淮南路理棹逢西風猖狂恣號怒清河千里中東風日相悞祈此一日風終竟不可遇蒼天豈有心莫可詰其故伹㸔北去舟凌風如飛渡翻為去人快頓忘吾所務淼淼湖波深今日何可渡邢州叙述為令既不卒稍遷佐邢州雖稱三輔近不異湘水投過家葺先廬決意返田疇所以泣岐路進止不自由亦復戀微禄俶裝戒行舟行行到齊魯園花開石榴捨舟遵廣陸棃棗列道周始見栽苜蓿入郡問驊騮維當撫彫瘵天馬不可求閭閻省徴召上下無怨尤汝南多名士太守稱賢侯戴星理民政宣風達皇猷郡務日稀簡吾得藉餘休閉門少將迎古書得校讐自能容吏隠退食每優游但負平生志莫分聖世憂竚待河氷泮稅駕歸林丘甲寅十月紀事經過兵燹後焦土遍江邨滿道豺狼跡誰家雞犬存寒風吹白日鬼火亂黄昏何事征科吏猶然復到門初發白河邊風刮地起黄沙三月長安不見花却憶故鄉風景好櫻桃初熟正還家袁尊尼三首尊尼字魯望長洲人嘉靖乙丑進士官至山東提學副使有集長安感遇朱華謝南土逰子客冀方豈不念遄歸簡書勞未遑悠悠若懸旌倐忽意靡常魏牟阻江海蘓子怨何梁失路良可悲曠望迷周行春陽念將歇滯淫非我鄉願假鸒斯翼超飛厯故疆長興徐太守自汝寧歸王元美諸君同集胥江分韻贈之得關字自薄淮陽守終然返故山江湖一麾罷嵗月二毛斑中論何當就浮名秖是間因君夢苕水早晚叩雲關送長兄再入留都雲陽郭外草萋萋作陣楊花路欲迷㡬樹黄鶯啼不歇行人回首晉陵西李栻一首栻字孟敬豐城人嘉靖乙丑進士官至浙江按察副使送友人還楚南浦仙舟發飈風江上清故人從此去悵望若為情落日浮彭蠡歸雲滿洞庭思心逐流水西下武昌城施愛一首愛字欲周福州左衛人嘉靖乙丑進士歸安知縣有息菴集寄李五噫嘻復噫嘻與君恒别離秖隔一溪水相見良難期芊芊池畔草灼灼園中葵倐然悲風來凋謝寔萋其思君令人老𤣥鬢忽成絲贈君青萍劒神物合有時眀詩綜卷四十九
