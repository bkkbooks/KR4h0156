body:
  text: 明詩綜卷四十二翰林院檢討朱彞尊編陸釴五首釴字舉之鄞人正德辛已賜進士第二授編修出為湖廣按察僉事轉江西督糧參議山東提學副使有少石子集靜志居詩話崑山陸鼎儀鄞縣陸舉之其名同賜進士第二人同一從史館出為太常一從史館出為外臺適相合也鼎儀盛有詩名詩却平平舉之不以詩名而詩似勝於鼎儀其督學山東也見山東舊無通志而曰周公孔子百世之師也六經斯文之祖也泰山五嶽之宗也此一方文獻而天下古今之事備馬志奚可廢也乃編緝成書河山十二得公數言而增色矣建昌道中赤阪揚塵霾朱飇轉炎熾下有修竹林清泉蔭涼翠行子苦鬱蒸居者自幽憩豈為躁靜分亦緣身世異東門瓜已稀南山豆堪藝回車理故岑願言遂髙致愛峰篇愛山愛孤峰峰髙不可即誅茅卧其旁憑軒看空碧裊裊金芙蓉海霞蕩日夕下有蛟龍盤波濤起淵宅浮雲倏蔽虧白日慘無色蔽虧良有時我情終不易請看石上蘿綢繆自今昔妙髙臺石徑入迂回髙臺出林杪逺岫迎歸雲層巒礙飛鳥崖崩樹交撑壇靜花不掃凌風一振衣清曠絶塵抱仰接煙霞重俯視樓觀小安得鞭蒼虯翛然下蓬島錢塘懷古黃屋南遷日蒼山結鳯樓可憐江海地曾是帝王州鐘梵傳宫樹笙歌恣客遊寒潮自來往難雪古今愁謁交山祠丞相名髙宇宙垂螺江合有報恩祠運移諸葛身殱日義盡雎陽力竭時戎馬中原空下淚松林異代尚南枝彌天碧草傷春色楚賦招魂有所思張孚敬一首孚敬初名璁字秉用永嘉人正德辛巳進士上疏言大禮除南京刑部主事再上疏超擢翰林學士升禮部尚書兼文淵閣大學士厯少師兼太子太師吏部尚書華蓋殿大學士贈太師諡文忠有寶綸樓和御製詩蘿峰集詩話蘿峰不由史館起家特授學士又以議禮為持名教者所輕以是嫉詞林特甚尤惡詩人文人八才子無得免者比諸夏嚴更覺深刻恭和御製翊學詩聽講大學衍義作帝王治有道修身宜所先於皇聖天縱受命真自天陋彼霸功小愛此王道平經筵講大學治法三代前乾乾自不息安安而能遷升堂入其室登山陟其顚擴之保四海泉達火始然卓哉真德秀義能衍斯篇微臣忝進講膺服同拳拳張治三首治字文邦茶陵人正德辛巳進士改庶吉士授編修以左贊善使交南進學士升吏部左侍郎掌翰林院事拜南京吏部尚書入為禮部尚書兼文淵閣大學士加太子太保卒贈少保諡文隱改諡文毅萬厯初復改諡文肅有龍湖詩集王元美云張文邦如藥鑄鼎燦爛驚人終乏古雅顧玄言云文肅才雄思贍抽緒錯彩岌然衡嶽之秀詩話吳有洞庭山名也楚冇洞庭湖名也郭景純賦云爰有包山洞庭巴陵地道潛達旁通幽岫窈窕蓋謂君山有石穴通吳之包山故包山亦以洞庭名酈善長注水經二湖俱以洞庭為目誤也張文肅夜過洞庭詩云曉發吳閶門夕渡廣陵沚日暮江帆遲洞庭三百里微風淡無波明月照天水隱隱見君山鐘聲翠微裏是吳地也而混於楚矣善長北人未柝南條諸水文肅家茶陵與洞庭湖密邇豈得以君山屬吳耶雜興望湖亭下水如天曾是宣皇賜幸年玉輦不來鳬鴈冷一湖楊柳鎖春煙發石鐘山望廬山廬嶽亭亭翠萬重懸泉千尺挂飛龍石鐘山下江如鏡映出青天五老峰送鍾時亭之南雍霜落燕山萬木稀君行歲晚欲何依十年空獻君王策猶向橋門著布衣李默二首默字時言甌寧人正德辛巳進士改庶吉士纍官太子少保吏部尚書兼學士贈太子太保諡肅愍有羣玉樓稿秋夜泊下邳值雨濁河元楚塞古驛自秦城旅泊河山異飄零風雨生波濤喧獨枕鐘鼓暗深更秋事方蕭索應知歲晏情月下鐘鼎非吾事神仙亦世稀停杯忽惆悵明月上人衣黃佐十一首佐字才伯香山人正德辛已進士改庶吉士授編修出為江西按察僉事調廣西召入為左司諫歷侍讀諭德國子祭酒少詹事兼翰林學士卒贈禮部右侍郎諡文裕有泰泉集屠文升云才伯詩會詮條貫近體雄深麗逸旨逺格精樂府古詩兼總古今出規入矩張崇象云才伯博極羣書而能反約於心其詩頴出流俗質巨而力雄於陳師孔云泰泉摛詞酌雅取材於西京割正李唐研精於南宋其言奧以文其思婉而微粹然一出於正王元美云黃才伯如紫瑛石大似韎韐晚年不無可恨河顧玄言云性尚沖和韻含芳潤譬之龍躍懸鳯鳴阿閣輝映髙絶信足接武曲江格陳卧子云才伯亦窺見律詩話文裕撰體頗正而取材太陳故格雖聳髙而氣少奔逸然嶺表自南園五先生後風雅中墜文裕力為起衰如黎維敬梁公實輩皆其弟子嘉靖中南園後五先生二子與馬蓋嶺南詩派文裕實為領袖功不可泯也學古贈胡承之歸關中翩翩雙鳴鴈噭噭雲中飛娟娟蛾睂女札札流黃機棄置不成匹歎息減容輝問女何所歎良人悵有違萬里遙相望何由接音徽蕙樓鑒素月蘭燈曖虛幃身非驂與服安得同車歸河清尚可俟會合何可希臨岐奏此曲淚下誰能揮碧梧丹鳯圖為黎侍御一卿題鳯兮鳯兮爾來當何時知爾之德萬古長不衰不然上天縱爾九苞羽安用毰毸為君不見桃蟲當日飛為雕脊令原上啼鴟梟舄几几音嘵嘵室家恐為隂雨漂偃禾風定杲日出岡上碧梧寒不凋爾於此時來和鳴叶簫韶成王優遊君奭喜卷阿為爾歌且謡鳯兮鳯兮披圖對爾起三歎久矣不夢周公旦咸陽宫前多枳棘何用屑屑悲秦漢南征詞三首鳯野傳清蹕龍旌逼絳霄風雷隨鼓角日月耀金貂躍馬宜春苑呼鷹織錦橋何如穆天子空賦白雲謡翠網張瑶浦黃旗漾碧流殷勤供廟薦蕭灑事宸遊御氣通鮫室祥煙化蜃樓魚龍應自喜何敢負王舟柳映金陵暮花搖玉帳春江淮明炮火閶闔動梁塵祕戲徴西域迷樓構北辰三千歌舞伎誰似掌中人雨膚寸雲初起彌天雨正狂魚龍空窟宅草木各輝光爽氣連南紀愁隂接上方故山青未了歸夢此宵長對月江月初成鏡山城獨倚樓徘徊如伴客浩蕩更隨舟陌上清光滿樽前爛漫遊豈知離别後對爾轉添愁彌羅閣秋望與馬子仲房羽觀臨霄漢飇臺出薜蘿霞觴延客久琪樹受涼多日色隱平楚秋聲連大河君看愜幽意吾醉即狂歌春夜大醉言志拔劒起舞臨髙臺北斗插地銀河回長空贈我以明月天下知心惟酒杯門前馬躍簫鼓動柵上雞啼天地開倦遊却憶少年事笑擁如花歌落梅王元美云此公作美官也講學恐人得而持之故宫怨上陽宫殿倚雲霞天外時聞度翠華魚鑰重重鎖窗户夜來春雨到梨花采蓮曲隔花相見兩徘徊蕩槳低頭笑不來雙棲白鷺忽驚起遙見浮萍一道開王用賔一首用賔字元興咸寧人正德辛巳進士纍官南京禮部尚書有三渠集出塞賀蘭山下羽書飛廣武營中戰馬肥壯士爭誇神臂弩打圍先射白狼歸何棟二首棟字伯直長安人正德辛巳進士選授河南道御史調宜興知縣升順天通判轉工部郎中歷右通政太僕寺卿以左僉都御史撫大同左遷四川參議用薦起右副都御史提督薊州加兵部右侍郎轉左侍郎進右都御史有太華集玉泉鬼斧何年鑿仙源此日看濺珠翻石溜拂鏡漾晴瀾鸚鵡春塘淨雲霞夕影寒分流入內苑故作九龍盤登真覺寺浮圖凌空垂寶塔披霧出銅盤影照青蓮色光寒白露團霞標窺日近風洞泄雲寒靜坐觀空界天花繞石壇廖道南一首道南字鳴吾蒲圻人正德辛巳進士改庶吉士授編修歷侍講學士謫為徽州通判尋復職有玄素子集王元美云廖鳴吾如新決渠浮楚濁泥一瞬皆下詩話鳴吾詩望之若精選體然其質鈍轄句束字易於滯澀靜海遇張汝禎夜話日夕繫蘭橈山城圍海縣嵐光互明滅水霧遞隱見涼月鑒廣原靈飇振芳甸幽人抱遐心踟蹰夜將半仰觀河漢流俯察昆蟲變側聞哀鴻音攜手淚如霰童承敘一首承敘字士疇一字漢臣沔陽人正德辛巳進士改庶吉士授編修進侍講歷中允司經局洗馬國子司業左春坊左庶子有內方集詩話庶子與張文邦廖鳴吾號楚中三才永陵雲以從龍侍臣遇之詩篇比廖差優論者擬之夏秋水不可方物失其倫矣臨清雜興健兒新殺雲中將彍騎長驅塞北塵遂使龍顔憂朔漠逺分虎旅出咸秦推誠詎識皇心厚不戰應知廟略神萬里風煙勞極目安危須倚近邊臣倫以諒一首以諒字彥周南海人正德辛巳進士改庶吉士歷官南京通政司右參議有石溪集詩話嶺表科名之盛莫若南海倫氏自諭德文敘會試殿試俱第一其子祭酒以訓會試第一殿試第二通參以諒鄉試第一與郎中以詵皆二甲進士出身然諸公文詠皆各有集傳者特少其後人亦無繼起者昔王筠論家門謂崔氏雕龍不過父子兩三世非有七葉之中人人有集如吾門者以是知古人所重者著述科名不足較也白山以訓自號穗石以詵自號舟中夜坐寄弟白山穗石秦淮煙月蔣山雲回首金陵隔紫氛别浦停橈渾不寐孤城吹笛詎堪聞春來花看同鄉樹嶺外鴻歸逐舊羣何事人生獨惆悵百年岐路幾回分張衮三首衮字補之江隂人正德辛巳進士選庶吉士授監察御史復改翰林編修厯侍讀諭德進侍讀學士遷太常寺卿掌國子祭酒事左遷南太常少卿終南光祿寺卿有水南集奉和順之陽溪别業之作千峰羅杖底選勝武夷旁夜雨蘼蕪徑春風薜荔牆鑿渠分海色種竹隱嵐光會發王猷興籃輿就辟疆陪衍聖公祭先師廟鸞鳯趨蹌地笙鏞迭奏時千春王者祀百世聖人師禮器羣賢别宫牆數仭宜上公詩禮在釋奠有新儀寄樊僉憲一賢同是三湘放逐臣歸來猶自厭風塵長沙日落秋隂滿愁殺當時痛哭人王同祖一首同祖字繩武崑山人正德辛巳進士授翰林編修進司經局正字遷國子司業有五龍山人集王元美云繩武詩往往朗秀玄著舂容爾雅涿鹿遇杜道士晚渡桑乾水西風匹馬過寒城歸鳥急古道夕陽多邂逅班荆地蕭條伐木歌匆匆更南北回首意如何周祚三首祚字天保紹興山隂人正德辛巳進士除來安知縣擢給事中有定齋集孫仲可云詩以拔去陳故為尚天保樂府婉而厚古詩醇而巨近體脫略纎冶非自空同出邪詩話給事同懷兄弟四人皆取甲第而能不戀熱官遠師北地遊心風雅即其不以門望驕人可以停澆激薄矣集四卷玄孫工部郎襄緒刋行之雜詩二儀愆恆運日月斯晦蝕隂陽靡協和風雨失其職天道垂常象君子重刑式百揆理四時允為天子翼一物茍失所憂懷動顔色邈哉古聖賢旁招暨幽側重華闢四門尼父取三益周公致太平吐哺不終食吳偉畫册為成中丞題國朝畫師能悉數筆力孰過江夏吳眼前冨貴王侯無故能瀟灑超其徒或時酒酣赤兩足亦或脫帽空頭顱五嶽四瀆生斯須一峰忽從天際拔九派真見江流趨中丞何由得真迹列方布册看有餘清秋示我閭山下白日宛坐仙人區由來神物易飛去九苞之鳯不在笯昨聞九月雷電作滄海恐失珊瑚株后峰落日滄江返照來江光倒射碧山隈山人愛聽楓林響月滿柴門未肯回張逵一首逵字懋登餘姚人正德辛巳進士改庶吉士授刑科給事中坐劾郭勛李福達謫戍遼陽卒贈光祿少卿有義樂集新年􅀈甕三杯酒方牀一覺眠天涯萬里客如此過新年謝蕡一首蕡字維盛閩縣人正德辛巳進士除禮科給事中以議大禮廷杖又劾張桂憸邪不可用奪俸尋命出知太平府未上官卒于道隆慶初贈太常少卿有給諫集白沙月下感懷野曠霜空萬木凋歲寒孤棹傍清宵江聲永夜驚虛枕月色中天上逺潮千里風煙勞夢想十年心迹愧漁樵白沙翠竹情無奈玉宇瓊樓望轉遙馬揚一首揚字抑之上蔡人正德辛巳進士除兵部職方主事改監察御史有蓍臺集詩話蓍臺有意法古特章句未遒阻雪張橋驛懷徐道長人生如浮萍同生水一涯聚者忽焉散合併安可期豈不憶王孫芳草迷路岐客持雙鯉至云是美人貽與我期何所乃在淮水湄忽忽玄雲浮雨雪一何滋駕言思往從徑滑馬行遲相隔匪逺道無緣接髙辭始願既已違延佇益凄其楊言一首言字惟仁鄞人正德辛巳進士除行人擢禮科給事中以言事廷鞫謫判宿州久之遷吏部郎再謫知夷陵州三遷至湖廣參議落職有集李杲堂云先生詩婉秀明麗行舟次朱雲巖迢迢山障月寂寂鴈汀秋百丈牽三老千峰送一舟窮猿相叫嘯祭獺互沉浮不是巫山路空餘楚客愁任淳一首淳字元朴堂邑人正德辛巳進士官監察御史野渡潦深望不極問渡莫悽然漁笛蒹葭裏因風到客船邵經邦一首經邦字仲德仁和人正德辛巳進士除工部主事改刑部署員外郎建言廷杖發鎮海衛充軍有𢎞藝録詩話永嘉以議禮驟貴繼為陸子餘所劾業勒歸矣尋即召還會陽月日蝕先生上言議禮貴當用人貴公陛下私議禮之臣是不以所議者為公禮也夫禮惟當乃可萬世不易使所議非公則禮可守也亦可變也可成也亦可毁也陛下果以禮為至當欲子孫世守莫若厚其賚豫全其終始以答議禮之功然後轉遷碩德置諸左右使萬年之後廟號世宗不亦美乎永陵震怒既豫杖復下獄發邊衛充軍明之列辟永陵猜忌之尤李襄愍以漢武帝唐憲宗發策猶難免於瘐死矧以人主生前臣下輒敢預為擬諡乎沈孝廉景倩疑世宗二字默契宸衷遂從末減亦未必然豫謂先生幸言之於嘉靖初年爾使在西內營齋之日則斷不能保首領矣先生詩少敦琢第七子盛行之日不治其流派正見鯁骨處四十明朝是四十明朝是頻聞畫鼓撾殘燈持自照忽吐兩三花敖英四首英字子發清江人正德辛巳進士除南刑部主事出為陜西提學副使改河南終河南右布政使有心逺堂稿熊閣泉云方伯詩興幽思逺盡絶蹊徑足稱名家塞上曲二首軍中頻宴樂醉後擁雕鞍紫塞連天逺黃雲拂地寒羌兒叱撥馬畨女固姑冠逐隊營門立春風倚笑看無定河邉水寒聲走白沙受降城上月暮色隱悲笳玉帳旄頭落金微鴈陳斜幾時征戰息壯士盡還家别業漫興門對寒江舊不斜旋開三徑學陶家秋來不問登髙節日日攜壺醉菊花輞川謁王右丞祠蜀棧青騾不可攀孤臣無計出秦關華清風雨蕭蕭夜愁殺江南庾子山黃潤一首潤字以誠晉江人正德辛巳進士官至參政孟秋玉衡指孟秋階前鳴促織光隂良易邁坐覺老來迫四十道未聞眷言心孔衋空死讀書螢徒取譏有識迷塗幸未遐周道矢焉直千里雖云遙終當勵餘力田頊一首頊字太素龍溪人正德辛巳進士歷禮兵二部郎中湖廣僉事貴州提學副使有秬山集即事聞道迷陽寇東屯信不虛風雲隨戰伐天地日丘墟列洞分旗鼓行營接羽書哀哀荷殳子生計本樵漁吳檄二首檄字用宣桐城人正德辛巳進士除襄陽推官入官戶部主事歷武選郎中出為湖廣參議轉山東雲南副使終陜西參政有皖山集詩話王道思官司封郎為當國者所不恱謫判毗陵嘉靖乙未三月之望朝士出餞於海淀者八人唐順之應德陳束約之張元孝少室李遂邦良李開先伯華熊過叔仁吕髙山甫其一則用宣也海淀在阜成門外其地為張昌國園林昌國罹禍之後亭臺悉圯諸公置酒為之不樂惟用宣詩先成所云絃管不隨流水奏綺羅應化暮雲飛者是也夏桂洲聞之遂劾元孝遂二司官無事漫遊竟下獄七人者相次罷謫惟用宣幸免爾何元朗述顧東橋赴嚴分宜飲升堂競上産酒行嫌冷不堪既昜酒至又嫌太熱指顧揮霍不知有主人而分宜執禮愈恭因謂使桂洲當此則東橋不免有雙江之禍矣蓋嚴夏皆媢嫉而當時之論若似乎夏之傾陷有甚於嚴者觀伯華海淀詩序則桂洲西市之禍朝士未始不有快意者矣春日黃鳥鳴髙樹春聲滿鳯城憐豫長作客聞此倍含情何處步芳草出門逢友生東風隨杖屨迢遞晚山晴甲午冬過茌平聞吳叔羽癸巳五月卒哭之南歸曾得蜀中書道爾平安守故廬茌縣忽聞摧折久草堂翻恨往來疏家貧妻子應難給歲晚朋儔日已虛都下送君成永訣忍看詞賦哭相如張羽一首羽字子儀崑山人正德辛巳進士刑部郎中有集雜言蜀嚴好沉冥日食止百錢卜筮人所輕久之操彌堅君子有所貴乃不在當年百世有知音何必鍾期然子雲太區區譽之公卿間卑哉益州牧乃欲吏髙賢豈無王侯貴敢言不敢言斯道誠兩得永為後世傳陳大濩二首大濩字則殷長樂人正德辛巳進士思恩府同知有雙溪集十五夜舟中對月水國人初靜江村月漸髙九天開霽色百里見秋毫興已懷鱸鱠官猶滯馬曹孤舟對清夜湖海思滔滔朱仙鎮嶽武穆祠駐馬朱仙鎮傷心武穆祠誰憐宋社稷竟失漢旌旗星墮天應憤師班帝豈知空餘祠外柏蕭索向南枝浦瑾一首瑾字文玉無錫人正德辛巳進士麗水知縣有桂巖集詩話文玉晚而通籍牽絲作宰之官三日而病三月而徂故邵國賢深惜之詩如池萍漲雨青浮岸鄰樹分隂緑過牆林迥微風生木末江空落日上簾鈎日斜天外初微雨雲薄樓西忽斷虹頗與國賢同調間居漫興萬里橋東一草堂烏皮隱几竹方牀池萍漲雨青浮岸鄰樹分隂緑過牆乳燕出時炊麥熟繭蛾飛後曝絲香不知何處炎蒸在日日清風灑葛裳張含六首含字愈光永昌衛人正德丁卯中雲南鄉試有禺山詩選楊用修云愈光未丱能詩及長博極羣書條入葉貫上獵漢魏下汲李杜弗工弗庸弗似弗止然工於求古昧於適俗寄贈窮困節氣之交萬言不竭於通達周旋之友片言即窮皆中繩墨任少海云愈光詩險怪詰屈不必王元美云張愈光如拙匠琢山骨斧鑿宛然又如束銅錮腹滿中外遺言穆敬甫云張君藻麗精深殊有襟度顧玄云愈光如蘭津夭矯騰逸浮空若鴻鴈不傳天外字芙蓉空照水中花銅柱蒹葭鴻鴈響鐵城煙雨鷓鴣啼此例數篇非雕飾曼語㔩葉元禮云禺山詩如峽中女子野花山葉翠銀叉非不飾姿弄鬢拭粉遊紅奈時作蠻語詩話禺山雖北學於獻吉然詩不盡出其流派而一以用修為歸觀其襞積字句乏自運之神方之用修逺不逮也戾蟲謡嗟哉猛虎橫行道阻我欲射虎誰藉我弩我欲殺虎誰假我斧悠悠蒼天寧獨豫苦岐中夔州城下隂霏霏我寄客船他夜歸越舲蜀艇幾烏榜赤甲白鹽雙翠微煙蘿一帶野猿嘯石壁萬仭明星稀三巴迢遞望三楚京洛紅塵愁滿衣已亥秋月寄升菴金馬秋風十載餘芙蓉深巷閉門居登樓莫作依劉賦奉使曾傳諭蜀書卧病可憐天一柱獨醒無奈楚三閭北來消息風塵斷白首滄江學釣魚覽升菴舊時辭翰兼紓别懷蕭條别館君為客寂寞荒村我閉關鸚鵡洲邉空作賦鳯皇池上幾時還羈身萬里棲填海歸夢三更過蜀山此地斷金俱白髮往遊傾蓋正紅顔寄升菴公子思歸幾歲華王孫芳草遍天涯樓頭豔曲包明月海口新鉛蔡少霞自注升菴近撰海口碑文極竒光祿塞遙空遞鴈上林枝好只棲鴉夢中記得相尋處東寺鐘殘北寺斜顧惟賢云集中絶唱春暮春暮南溪花氣香亂峰驚蝶不成行漁竿在手不須放釣得鯉魚三尺長鄧黻二首黻字文度其先松江華亭人徙常熟中正德丁卯舉人詩話文度歌鹿鳴後喪母遂不上公車以通經博古為務嘗與客論文其大略云文章粹於經聖賢以其精藴而形諸辭辭可以已聖賢必無事於作作焉者不得已也三代而下放臣棄婦之辭讀之尤足以興感者性情也今之為文者無古人之性情與其所遇之時事辭與意背以諛為容以聚為約浮濫而無法則可以無作或言西京之文近乎古不知壞古人之文者揚子諸人有貴焉書出陸子餘歸熙甫皆是之當嘉靖中伯安道思應德既往于鱗元美明卿伯玉本寧之派盛行詩古文交失其真文度之論其力挽元氣者與詩亦崛竒不沿七子之習致道觀七星檜琳宫何岧嶤爽氣凌青蒼中有古檜樹傳植自蕭梁歲逺四樹存如斗酌天漿東株久已朽慶厯補其亡中株麗瓊壇少日嬉其旁今已翦不遺取斧斯其香兩株在東南偃蓋覆修廊攢枝細而密葉聚如針芒兩株在西南赤立膚無霜偃蹇捎殿角督力示堅強北株最怪異不與羣木行質幹盡屈鐵夭矯互低昂四檜皆左紐枝柯鬱相望霽晴亦慘黯昏黑常晶光蜀廟青銅柏涿郡羽葆桑圖經儼封殖况我桑梓鄉石田昔塗寫遺墨好事藏聊復陳我歌我歌亦堂堂雷殿畫壁致道古仙都山水夙清美雷宫設像畫種種盡其技淳古出遒逸意熊得深旨左壁挾風雲沙礫卷空起有神操火具張目怒獰視當其焰所及妖窟泣神鬼右壁已淋落雲氣來纚纚似聞轟雷車不遑掩其耳南壁雲參覃電光閃復止有神被甲胄軀偉髯舊紫執殳見真宰如以職備使北壁方晦冥相去不辨咫有神手天瓢九龍運其水勢欲翻河波雷伯鼓未已靈祠本清肅長夏顙無泚入門見粉墨鮮不生戰葸乃知藝事能凝神始臻理吳生貌地獄施帛日雲委惟以神妙故見者雜悲喜兹事已千年遺迹久零圯兹壁雖尚完能保後無毁誰為補圖人三歎遜前軌汪本一首本字以正歙人正德丁卯舉人有西巖集王仲房云以正童稚即解為詩弱冠挺興遂傳髙唱潛思取境不落常情天不愛才壯即夭折惜哉詩話十嶽山人王寅輯新都秀運集以本詩壓卷稱其愁邊草木歇夢裏關山多之句蓋是時新都風氣咸以篁墩為宗本獨以古為師故亟取之旅邸述懷歲月秋將晚風塵鬢欲華孤雲天外影寒菊夢中花濁酒賖難得滄洲興未涯何當返初服歸駕鹿門車吳益夫二首益夫字惟裕閩縣人正德丁卯舉人武學教授有古迂集晚歸夕陽下西林草徑含暝色鳴蜩在深樹向晚猶不息歸騎且遲遲中天雲未黑喜晴朝日麗郊原晴風動梧竹沙鷗不避人飛來傍船浴于震一首震字孔安餘姚人正德丁卯舉人知福安縣罪言北來軍壘幾時平官府無人解治兵豈謂干戈是凶器本來樽俎屬書生麟符玉册權空貴鐵馬金戈勢轉橫歎息廟堂天地隔白頭無路請長纓管浦三首浦浙士登科録作溥字𢎞濟餘姚人正德丁邜舉人官萊州府通判送顧宗朝還孟城龍江木落風亂鳴龍江水邉舟欲行玉瓶酒盡不成醉青杉淚濕難為情借問舟行向何處美人别我淮南去海天渺渺孤鶴飛回首江東隔雲樹髙堂一笑夀且康弄雛載戲斑斕裳湖水梅花鬭清絶尋詩載酒還徜徉我欲東歸歸未得風雨茅堂轉相憶故園迢迢千里餘雙鯉憑將寄消息繆天自云平穩舟中雜興江水白於練江花紅欲然長風一萬里吹送木蘭船田家豆花香暖木棉開禾黍髙低秀作堆落日松風一樽酒石壕無吏夜深來吳天祐一首天祐字吉甫豐城人正德丁卯舉人官知縣和答同年徐豐崖勞生會晤豈易得别十五年方一來故人幾人道相合今夕何夕樽同開感君情深愈於舊使我樂極翻成哀天空月明耿長夜梧葉蕭蕭飛露臺周青士云坳體頽放漸近自然不知者以為牽率然非解人不能也顧彥夫四首彥夫字承美無錫人正德庚午舉人官河間府通判有瀛海集老年謡婚嫁紛紛事俱了齒豁頭童容色稿縱是扶筇門外行亦妨頓足風中倒白晝才興更欲眠黃昏未飯先愁飽著眼看花眼已花臨書戒草書皆草從容一笑淚反多急遽數言心似搗此翁耄矣真可憐東抹西塗亦曾好此身還可作典刑世事何須纍懷抱君不見古來豪傑多軒昻功業將成不能老南村題桞君宗鎬卷崇文門外四三里茅屋數間村落裏犬吠花邊驚客來鳥投樹底知風起主翁散步幽情多點簡災畬早晚禾歸來一飽有餘樂勢利炎炎如我何隔牆喚過鄰家叟野菜隨時斟白酒酒後齊聲唱竹枝不覺簷前挂星斗和詠梅官閣梅花冷亦開主家故暖賞春杯憑誰寄與人千里許我來看日幾回竹外一枝風灑落琴中三弄思徘徊如何不入靈均賦自古山林有逸材淮隂祠淮陰城下弔王孫心事昭昭不待論一飯尚能酬漂母後來何忍負君恩張綖二首綖字世文髙郵人中正德癸酉鄉試除武昌通判遷知光州有南湖集顧英玉云南湖詩操筆立就而尤工於長短句率意口占皆合格調之朱子價云世文入楚後詩旨趣沉著超西崑畛域闖少陵之堂室詩話南湖學詞曲於王西樓以此擅場詩其餘事如設菖蒲之葅縱有嗜者要非逸味秋雨秋雨中宵滴寒蛩四壁吟燈前搔短髮誰會此時心湖上欲理木蘭舟且檥垂楊樹沙觜兩鴛鴦飛入前湖去王希旦一首希旦字維周候官人正德癸酉舉人官禮部郎中有石溪集僧院訪蔡可泉答莊石山來韻我欲重來此君能幾日留居然人外境已似故鄉秋别院幽芳雜諸天色界浮都無簪組意猶自問歸不袁達四首達字德修閩縣人正德癸酉舉人貴溪知縣坐事詔下獄既釋補湖廣都司經歷有佩蘭集幽懷沖懷悅魚鳥放迹棲丘樊永息喧中想方知靜者尊農人談稼穡稚子牧雞豚時有會心侶晤言孤樹根獨行清澗濵覽物懷悽惻蘭生何芬芳草掩無顔色漆割乃自為木伐先其直林深不可留哲人慎日昃美人天一方遊子日千里相期青雲端乃滯滄江涘折梅寄逺心結草酬知已野外號歸鴻淚下不能止五月鶗鴂鳴衆草怨芳菲堅氷翕而至碩果存其微醴酒嘉早決機肉迷先幾冥冥河上公流沙去不歸杜華一首華字子朴安仁人正德癸酉舉人有古山先生集丙子重過石上五載今重至人間地亦幽坐深松月夜吟苦竹橋秋問宅憐曾舍尋山憶昔遊主人無限意翻恐僕夫愁董穀一首穀字碩甫海鹽人正德丙子舉人授安義知縣改漢陽有碧里雜存宿靈璧連城鋪題日暝鴉歸野色昏解鞍投榻向荒村欲聞清罄何由得明月滿庭空閉門自注縣出磬石方邦望一首邦望字表民閩縣人正德已卯舉人惠州推官有平洲集詩話表民與郭澄卿皆喜為詩林文恪謂郭學杜而短於才方學孟而學不足以充之鄉曲之言不阿所好可使掌邦國之志矣春日别洪子枝上曉鶯飛江亭春未稀輕舟移浦漵别酒惜芳菲風急寒潮響天長逺岫微此時頻徙倚空憶謝玄暉張鋐一首鋐字叔治鄞人正德已邜舉人有鳯山稿讀史汾河簫鼓集樓船萬里巡遊瀚海邉但慕蓬山連弱水豈知烽火達甘泉侍臣只奏凌雲賦詞客虛傳出塞篇日暮五陵原上草古今回首一潸然陶成一首成字懋學寶應人正德間舉人寄朱存仁别來心事不堪聞細雨孤燈獨念君短髮漸看添亂雪此身寧得化歸雲東風楊桞題歌扇夜雨琵琶醉舞裙幾度江干空買棹未知何日到淮濆詩話雲湖寫人物山水最工豫嘗從喬侍讀子靜處見之歎為絶品凌溪其女壻也計偕入都雲湖語之曰聞張家灣某氏丁香花盛開子盍隨我觀乎凌溪云去禮部試僅三日公無往雲湖不許明旦凌溪他避雲湖乘箯輿徑去醉主人家五日榜發凌溪中式比雲湖還鄉人醵錢賀凌溪雲湖於席上畫丁香一本尤妙絶洵曠達之士也存仁即凌溪之友明詩綜卷四十二
