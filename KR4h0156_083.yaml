body:
  text: 明詩綜卷八十三翰林院檢討朱彞尊編秦藩二人朱敬錪一首敬錪字季量秦愍王樉八世孫有自吟亭詩草靜志居詩話季量詩太淺率曩富平李孔徳曽以秦藩二詩集見貽久乃失去不復再覩當更訪之江邨雨夜驟雨連山黒荒邨夜色侵瀟瀟霑暗壁颯颯動秋林江鴈濕難度草蟲寒更吟愁人當此夕寂寞倍闗心朱誼㳆四首誼㳆字子斗秦愍王九世孫有集詩話子斗才情横溢極為富平李孔徳所稱覽其祀竈千一百二十字雖未悉工而浩涆不可及也雜詩欹器不受盈槖籥出以虚持是律吾躬可以例卷舒澡髮奉嚴訓兼受詩與書砥礪慎立節鄉里流歎譽世變觸駭浪時窮遁荒墟昔為桂與蘭今為櫟與樗昔出擁高蓋今行無柴車舊交零落盡羸老隨樵漁里正肆搜括唾靣不敢除内省雖不疚㫄觀嗤賤愚惓焉顧墳墓不忍捐此軀强顔留纊息不絶將焉如冬日開元寺訪子新茂之不遇世變僧猶在城崩寺尚存終傷游客少益信法王尊欲雪天垂暮重霾地轉昏無縁逢二妙惝怳返荒邨祀竈詩旅食隨遷次僑居傍酒壚饔飱資釜甑炊㸑立庖厨曲突焦埃墨横牕黯垢汚水妃臨正位火徳禀神符五祀由三代諸卿暨大夫精禋煩祝史側媚矧亡俘臘月驚春早温風感嵗徂幸存恒跼踳申禱敢踟蹰汛埽勞箕帚香燈照塈塗主人䖍跽拜子姓儼奔趨白犢何年有黄羊此地無豚肩虧博碩菟髕潤彫枯奠薦先陘竈尊崇復奥隅硬餳黏簠簋瑣果罥盤盂祼地宜如在登天諒不誣赫煙騰皁蓋烈燄走騂駒謁帝攀金陛朝元集絳都奏章通太乙闗請凂靈巫昭格惟聲響㣲情竊覬覦干戈逢喪亂墳墓幾榛蕪樵采悲翁仲椎埋泣湛盧孫階馴稚犬子舍保童烏日日牀邉筆年年户左弧空齋留破硯寒食酹芳壺别有深祈願因之切歎吁壹戎初底定百揆待匡扶庶寀窺台鼎將軍戀鼓枹武功勤逺略文敎未全敷偽俗澆淳朴訛言狃誑䛕閭閻驅罔象闤闠竄於菟怪蝎歕氷過妖蛟挾浪麁颶飇来廣漠雹雨墊平塗麥豆餘萁蔓樓臺毁墁圬劇聞填滻灞幸不到江湖嶺嶠雖枝葉邦畿實榦株北辰當紫禁南極邈蒼梧鄭使終歸晉山公豈患吳墄階聞羽籥府藏朽彤弧持㦸頻逃伍探丸賸有徒殘邨憑賂免完堡受兵屠城郭稀鳶鵲郊坰沸蟪蛄風黄馳響馬月黑嘯封狐濟濟寧多士盈盈燦麗姝巧環垂項領嚲帽綴琱瑜章句深穿鑿衣裳侈僭踰彩毫矜不律繡䘿壓諸于廢壟招屯種新畬怕責租瘡痍兼稊稗脂髓怯錙銖隠没棲丘貉飄颻泛水鳬市魁爭狡獪里正肆捓揄是事誰為宰斯民望愈孤中央甦混沌鯈忽謝鑚刳號慟投鎚斲神通返體膚至仁迴浩蕩大智用糢糊輿蓋還高下圓方偹楷模一元調玉燭七政順璇樞化育殷亭毒形生盡息蘇真官辭旭殿恩詔下雲衢黄雀酬隂隙金雞宥罪辜八風推鉅鞴二氣湊鈞爐民物更鎔鑄人才誕聖儒九重陪舜禹六合際唐虞勲伐追伊傅文章襲典謨經綸恢㝢縣禮樂耀寰區簴業銷鋒鏑艨艟洗舳艫匝瀛躬稼穡率土罷征輸雪夜輕收蔡炎荒薄渡瀘蕭牆安鄪郈社稷定顓㬰比屋擔珪組吞舟決網罛吳禽歸翡翠越樹却珊瑚嘉運爭寧謐彞倫罔斁渝孔懐諧伯仲好合共妻孥朋類堅膠膝姻聮託柿柎過庭承對問入里應歌呼機杼家家錦耡耰處處珠醴移甘井水飴變苦原茶緑濺沉浮蟻青乾子母蚨中州囚䝟貐北海放騊駼鸑鷟重銜籙龜龍再啓圖君臣交警戒朝野洽歡娛粟帛兼頒賚鐘鏞畢賜酺千秋亨大有萬國信中孚嫠婦憂忘緯終軍慨棄繻請纓傷耊老攬鏡媿睂鬚不忍懐迷寳深愁厠濫竽向空書咄咄凌險視瞿瞿蓬堵慚今我𤓰田守故吾無能安卼􅀈何計岀﨑嶇司命如瞪目迷魂似隕軀依稀聞咐囑叱吒戒誇訏忌諱時難觸嫌疑世所拘挈缾他自哲躍冶爾何愚足繭防蹉跌脣緘慎囁嚅耐寒饒契闊獻嵗在斯須更始邀光寵維新就快愉權宜綏福履次第啐屠蘇涸轍􅀢窮鮒欹巢哺好雛探環驚了了啼牖聽􅈱􅈱華表晨歸鶴松門夜訢鼯漸添丁熾盛全減涕沾濡道苑行舒轡詞場且弄觚晤談来勝侣傲睨哂狂奴譽聞身文繡哦吟口豢芻但拚佳興致莫恨久衰癯怳若施鍼石幡然已痛痡引吭餐沆瀣透頂灌醍醐沍澤開融靣陽林坼凍趺鶯花催爛漫紅紫雜縈紆哀樂情非異飛潛迹固殊宻雲懸沛澤其雨斷斜晡霜㦸休酣戰曦車弭迅驅㑹留三舍景末照及桑榆題旅舍空有千金意難酬一飯恩再来逢漂母不復念王孫周藩五人朱安􅧔二首安􅧔周定王橚𤣥孫夏夜寄懐謝山人時客汾陽良夜孤清賞懐君倍黯然客星一以别明月幾回圓紫塞雲邉樹青山雨後天相思何處寫隨意有氷絃送李子和山人遊西蜀諭蜀文誰著風流漢長卿欲投巴子國定向錦官城羸馬衝山色哀猨雜樹聲武侯遺廟在瞻謁重含情朱睦㮮三首睦㮮字灌甫號西亭周定王六世孫萬厯初舉宗正有陂上集詩話西亭以好客聞藏書為海内第一世所傳萬卷堂書目不列卷數撰人非故籍也予家藏有聚樂堂藝文志四册俱詳列卷數撰人係陂上鈔本曩孫侍郎耳伯筮仕祥符從西亭子竹居交契借鈔經解頗多今其撰述十存一二而已送舜符疇昔慕游遨與君數朝夕稍申初服懐共結沉冥跡促膝究微言披情閲仙籍盼眯恣丘樊留連眷泉石星霜歘云變婉孌成離析撫景念夙懽即事興今戚末路誰能同素心不可易淒淒冬日黄渺渺寒流碧暫舍故園林逺適京華陌時有北風來因聲慰岑寂送鄭處士信之還歙因憶同游諸君子同調日云稀憐君復逺違青山雙屐在白首一帆歸野燒浮殘雨寒林散夕暉因兹憶疇昔相對各沾衣荅田六深甫鄭二信之過陂上豈是譚經所真成載酒廬竹停仙客騎花翳孝亷車秉燭驚山鳥調琴出浦魚悠然對孤嶼宛在水中居朱睦横一首睦横字仁菴周定王六世孫輔國中尉其子勤􅲧輯其詩及已作下及孫朝􅵦題曰三業集送春風吹飛絮㸃池蘋無那傷春又送春試上驛樓高處望落花無主更愁人朱勤􅲧二首勤􅲧號南渚睦横子封奉國將軍學仙學仙貴養氣舉世少其真放之彌六合返則在吾身日月卒有毁藥石寧足珍非吾好妖妄但為知者陳巖穴亦多誤不獨朝市人朱仙鎮岳王祠未遂黄龍飲金牌止渡河艱難終奉詔痛哭乃迴戈三字翻成獄千秋尚輓歌不知廊廟計何苦但求和朱朝􅵦一首朝􅵦字汝升號崇岡勤􅲧子郊居雜興杏花漠漠桞毶毶路出隋隄十里南一夜水深三十尺朝來網罟集深潭齊藩二人朱慶􅀢一首慶􅀢字仲望高皇帝第七子榑封于齊建文元年廢為庶人永樂初復封四年奪爵安置廬州子孫俱為庶人散居南京慶􅀢有籜冠集王元美云王孫詩能直寫胸臆不剽襲人自合古轍秋日送李文仲訪友新安正值悲揺落那堪送客舟白雲江上晩紅樹驛邊秋細雨潤琴幔凉風添酒籌逢迎有知已暇日即登樓朱承綵一首承綵字國華齊王孫送茅平仲置酒長干路談深夜未闌山川牽恨逺風雨逼年殘天迥孤㠶没江空獨雁寒從兹君别去月共幾時㸔魯藩二人朱觀熰二首觀熰字中立鉅野僖順王𤣥孫封鎮國中尉有濟美堂稾詩話中立好為詩雖格調卑卑亦復自喜嘗輯山東諸家詩曰海岳靈秀集趙康王哀詞帝子東平侶浮名夢已殘叢臺春色冷澠水舊盟寒客散誰彈劍花飛自繞闌茫茫天地外何處駕青鸞送毛敎授還山未老思投老欲歸便得歸緇塵今漸逺不上芰荷衣朱頤琢四首頤㙇魯荒王檀七世孫封鎮國中尉登兖州城樓步上西城樓北望傷我心秋風吹大陸落日薊門陰𤣥霜被寒渚白鴈號中林孤飛何栖止嗷嗷悲不禁怵惕結心曲歸寫丘中琴朱絃感人意悽然發哀音中夜不能寐撫桐動沉吟寄懐邢子愿侍御相憶未相識髙名空復聞時因薊北鴈一望濟南雲謝傅青山屐羊欣白練裙風流誰可冄千載獨夫君賦得為我彈鳴琴贈王生憐君多雅調為我彈鳴琴曠矣丘中賞兼之物外心夜深山鬼泣江净水龍吟曲罷無人解松風披素襟蟋蟀蟋蟀闗何事哀音入夜偏寥寥閒永漏切切亂鳴絃乍逐㣲風斷還從踈雨連閨中有思婦怪爾不成眠遼藩一人朱術􅨈一首術􅨈字均焉簡王植七世孫輔國中尉換授鎮江通判遷戸部主事有綦組堂集詩話明初舊典宗室子不與内外銓除後因御史李日宣等所請援祖訓换授之法言皇族宜通仕籍得㫖允行寕王孫子斗詩云爵人本至公立法無頗偏大訓手自訂百度何森然郡王有孫子所司騐才賢换授凖任用升轉遵常銓諒哉二柱史抗章排拘攣先帝展科目今皇命試官椅桐委斷壑被以朱絲絃􅢒騮在外厩䇿以珊瑚鞭葢紀其事也天啟辛酉晉藩慶成温穆王表桐之曽孫慎䤰始舉辛酉山西鄉試明年壬戌賜同進士出身除中書科中書舍人歴精膳主事至崇禎戊辰寧藩瑞昌王孫統鉓由進士改庶吉士累官南國子祭酒自後甲戌則蜀藩奉􅀈寧藩統銍銍謀㙔子也丁丑則寕藩統鐀統􅀈庚辰則周藩朝㙓在􅀈寕藩綂鉟癸未則代藩鼎􅨺廷壻寧藩綂􅀈議汴皆以宗支取甲科而均焉得授鎮江通判其官户部陜西司主事曽召對平臺奏請仍設漕運總兵而思陵不允也後賊既䧟秦廷臣有撤寧逺守闗門之議思陵心動以問羣臣吳太常麟徴昌言撤之便而輔臣陳演力持不可而止使闗門有備而漕運有兵互相聲援何至巨冦如入無人之境哉然則均焉所對亦曲突徙薪之一策也均焉詩多至數千首率爾而成不費持擇元夕詞結句與白傅歌舞屏風花障上幾時曽畫白頭人同一愾已元夕詞春風如箭月如梭良夜匆匆瞥眼過聽到衆中喧笑處老年人少少年多寧藩七人朱多􅖷二首多􅖷字宗良寧獻王六世孫封鎮國中尉有朱宗良集詩話宗良佳句頗多如闗山曉月趨三輔鴻雁秋霜度九河太室出雲来苑裏黄河如帶挂城頭路經軒后臨戎坂山接高歡避暑宫格調高華惜全詩未見雨觸石隂霞北嶺遥逗風寒雨入簷飄天涯故舊惟孤枕篋裡衣裳祇敝貂綻雪蘆花紛歴歴經霜楓葉莽蕭蕭還應撼郭濤聲急只怪空江上夜潮塞下曲平明飛騎扣闗門漢將新收吐谷渾從此天山傳白羽不敎公主嫁烏孫朱多炡八首多炡字貞吉寧獻王六世孫封奉國將軍卒後私諡曰清敏先生有勌游稾詩話貞吉與從兄多煃用晦並有詩名用晦與金徳甫交契王元美入之續五子之列然其詩無足觀不若貞吉之有爽氣也貞吉好游變姓名為来相如蹤跡遍吳越間其子謀堚亦效之變姓名曰来鯤字子魚出游吳楚有集行世臨川湯若士為之序所傳溪樓連夜雪山縣隔年春其警句也送蔡氏為别既不易贈言良獨難小人各自媚君子乃憂歎投漆必以膠合椒必以蘭子其寧爾心失意古所安十四夜玩月玉繩界西陸澄空淨如澣庭柯泫零露早見圓景滿悄焉増永懐頓令衣帶緩四氣無終極人生一何短心悲雍門操涙隕山陽管徂謝子山丘悽其我華館臨觴慘不怡憂來莫能款龍沙龍沙駐蹕地皇祖紀南征草昧君臣定壺漿父老迎平臨章貢水逺視灌嬰城今古雄圖在低徊落照明對雨苦雨何曽歇愁隂暗不開春寒緱氏嶺雲暮楚王臺戲水飢鳶過褰簾濕燕来靜㸔雙屐齒無事長莓苔别胡雲從故侣三年隔離懐一醉銷烟花桃葉渡春草豫章橋末路難為别名山許見招天涯惟有夢相逐往来潮張叙甫園中牡丹作千花賦此賞之暮春之初天氣新日日銜杯誰主賔石家錦幛四十里漢闕粉黛三千人清絲急管巧相聒伏雨䦨風横見陳繁華狼藉且如此不醉恐礙花神嗔寄黎君寔司訓君才不薄廣文官依舊青氊一片寒家近郵筒傳自數地偏書籍借應難懐人夜雨䕷蕪草留客春風苜蓿盤聞道出游堪累月祇餘山色滿吟鞍泊長蕩蒹葭一望暮蒼蒼長蕩湖頭烟水長怪道今朝楓葉盡夜來七十二橋霜朱多㷵一首多㷵字知白寧恵王第四子石城恭靖王奠堵之𤣥孫詩話南昌郭外有龍光寺萬厯乙邜二月豫章詩人結社于斯宗子與者十人知白之外則宜春王孫謀􅩶文翰瑞昌王孫謀雅彦叔石城王孫謀㙔鬰儀謀圭禹錫謀臶誠父謀堢藩甫謀墾辟疆建安王孫謀㲄更生謀垔禹卿謀􅩶緝其詩曰龍光社草郡人都察院右都御史掌工部尚書事徐作汝念邢部主事張夀朋沖龢序之秋日社集躧步出郭門凉沙朗朝日迤邐入叢林花宫眩丹漆巍巍豫章臺萬木四排比音必從白香山讀高讌集友于討論及刋述清風吹素襟古調和瑤瑟㑹心豈在逺快意亦多術遥睇天際帆翩翩若風乙朱謀㙔四首謀㙔字鬱儀寧獻王七世孫以中尉攝石城王府事既卒豫章士人私諡貞靜先生有枳園近稾雷元亮云鬱儀古體出入漢晉温厚典則近體頡頏初盛高渾雄麗而又𢎞之以典籍參之以多聞足以名家楊計部曙宇載商甕漢壺千里相餉短篇志謝古陶出古丘閎深容斗許駮犖繡土花不知幾寒暑使君河北来載以入東楚欣然脱相贈何異獲鐘呂謂予古人風因之代縞紵豈無珠玉珍雅志非其所摩挲三歎息高誼誰當侣寘彼圖史間春秋惟爾汝送黄貞父入覲脂車秣良駟冠蓋如雲浮駕言趨上京述職遵諸侯王事既有程肅肅塗路修及兹正元初奉璋覲宸旒君抱廊廟資高視徧九州岀兼卓魯聲入與䕫龍游翔螭作時雨膏澤布陵丘壇石百里城豈足長淹留揆予慕高義夢想託綢繆賦詩申素衷踧踖翰墨儔清風播蘭􅉅令徳樹千秋願崇華岱尊黄髮長優游送姚龍文還永嘉百卉懐芬芳當春欣所觀時風和且柔好鳥鳴其間萬彚何熙熙我思獨盤桓良友當逺别惜此㑹靣難握手臨郊衢一往莫可攀願得少須㬰言笑暫為歡毋金玉爾音慰我遲暮顔燕至芳草無數綠雜花相間紅誰將雙燕至一一舞春風朱謀㬜五首謀㬜字康侯更字公退寧獻王七世孫有羔鴈淹留蕪城巾車四集姚園客云康侯詩如雨斷山青霞催月出清冷之中每成豔句又云南昌王孫多稱詩而康侯拔出客秦郵呈别閻使臣淮田三嵗潦民已半為魚日下司農檄星馳使者車市煙初寂寂鄉夢亦蘧蘧刺史今元結瘡痍可漸舒甲寅春日江邨即事三首水市沙墟地更偏卑棲無用買山錢荒厨慣乞漁家火行李時登估客船鐡柱江聲連野郭香爐雲氣隔湖天游蹤到處堪經月豈待男婚女嫁年綠水園亭白版扉輪蹄出郭到應稀江雷乍殷龍兒長社日初晴燕子飛飯熟東田觀午饁酒香西舍典春衣長堤何處無芳草莫怨山中客未歸江村負郭坂田多田舍風光草樹和孤鳥立殘牛背雨小魚吹散鴨頭波買山忽被高僧笑擊壤閒聽老父歌猶幸代耕餘薄祿門無胥吏夜催科寄賀文湛持入東閣焚魚學士最清華五世承恩太史家歸沐不言温室樹入朝時草内廷麻呉中舊宅卑依市都下新堤淺築沙儻為故人炊脱粟青門来種邵平𤓰朱謀堢一首謀堢字藩甫寧藩石城王孫九日誠甫宗侯招登明逺樓讌集分韻得無字有約登高興不殊天涯朋好接歡娛寒生南浦楓初落秋入東籬菊尚無詩派西江存大雅賔筵左顧敕中厨風前剰有叅軍帽醉後終須倩客扶朱謀圭一首謀圭字禹錫石城王孫秋日龍沙社集結駟城外游眷此郊原靜﨑嶇陟龍沙悠然見西嶺風日暢幽懐烟光澹雲影松門初地開清磬出禪境黄菊籬下繁紅芙木末冷心目既雙清和歌答佳景擾擾塵壒中真樂誰其領瀋藩六人朱恬爍一首恬爍號振菴沁水莊和王仲子封鎮國將軍李時逺云振菴詩圓熟動合矩矱詩話振菴五言入格如雲迎芝葢轉花傍藥欄開寒葉飛官路霜風滿驛樓香雲飛貝葉法雨下天花不失為初唐人語送呉平川判府致政歸桐城歸路東風晩悽心向夕煙青山相送日白首倦游年人渡春江上帆飛暮雨前知君投老去生事在林泉朱恬烷一首恬烷號達菴沁水莊和王叔子封鎮國將軍有達菴集李時逺云逹菴古詩近選近體有韋柳風致感遇候蟲鳴虚堂明月照高樹佳人不我過相思隔雲路人生無百齡奄忽若朝露努力求功名名成髮已素窮通各有時達人守天賦朱珵塯一首珵塯字純甫恬爍子封輔國將軍有玉田集李時逺云玉田近體爽朗瓌竒長信怨永巷風偏入深宫月易斜空牀愁獨守中夜起長嗟託意題團扇驚心見落花思君情不極惆悵減容華朱珵圪一首珵圪字崇甫恬爍子封輔國將軍有玉澗集李時逺云玉澗諸體皆備簡逺華麗兼而有之芳樹嘉樹晝芳菲重重在春苑風來翠幄褰日映朱簾卷嫩萼正葳㽔柔枝亦繾綣不惜與君攀無令歳華晩朱珵圻一首程圻字京甫恬烷子封輔國將軍有玉林集再逢友人道逺頻馳夢情深衹寄書相逢俱淚下翻似别離初朱效鐊一首效鐊字馴甫封奉國將軍有壺峰集夏日讌伯王園避暑梁王苑樓深翠竹間風生三徑爽日映八牕關作賦依芳沼開尊對逺山中林容小阮醉後未言還唐藩二人朱碩爋二首碩爋字孔炎唐定王桱五世孫封鎮國中尉有南陽集詩話南陽公子博雅工文所為詩頗饒錢劉風致送王山人游楚門前楊桞樹風亂麴塵絲日暮臨溪别春帆適楚時人烟揚子渡山木偃王祠處處生芳草悠悠千里思邵山人子俊見過話游梁事有客擔簦過草堂一尊風雨話游梁鴈池寂寞芙蓉冷逢著行人説孝王朱器封一首器封字子厚碩爋子有巢園集詩話子厚入弇州四十子之列而集不見傳游仙劉安守天厠彼乃赤帝精左右在帝側翺翔排玉京白雲蔽丹巘五鳯啾啾鳴石階秀朱草餌之可長生舉手謝人世爾曹等蒼蠅益藩一人朱常􅴈一首常􅴈字㓜良益端王四世孫古怨妾思亂如絲纒緜無斷絶難將摻摻手解得心中結明詩綜卷八十三
