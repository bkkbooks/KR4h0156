body:
  text: 明詩綜卷七十九翰林院檢討朱彝尊編王翃三十四首翃字介人嘉興布衣有秋槐堂集周青士云崇禎之季詩歸盛行人沿競陵流𣲖介人崛起禾中惟唐音是尚惜知已寥寥厄窮以沒伯道無兒若敖不祀良可悼也庭沈山子云介人所居止破屋一間種牽牛小中曉露未晞即對花吟詠日課數詩旁精詞曲有紅情言榴巾怨詞苑春秋博浪沙諸傳奇頗慨慷自喜遺藁多逸僅存百一而已靜志居詩話介人初擅詞曲後研聲詩志取多師不遺偽體其論詩於合處見離於離處求合啓禎之間大雅不作毅然以起衰自任而知者寥寥惟平湖陸職方嗣端心賞之嘗訪君於長水值君洗硯河頭挾之登舟家人不知也遍遊苕霅乃返既而入越謁陳推官卧子方置酒送客君詩有前路夕陽外行人春草中之句卧子擊節曰此今之髙三十五也為序其詩詞遭亂所居不戒於火惟餘小屋二間一供婦㸑一吟詠其中有故人官府寮者造之不見尋卒於京口五言如江湖長至日風雪上方山驛路通秦逺峰隂入晉多桄榔千樹雨瘴霧百蠻天日氣淫秋雨嵐光變夕曛楓林依水盡雲物近秋多一二故人在飄零佳訊稀江山雄白下人物近黃初山雪行人少江梅臘月多文章身後事邱隴夢中山白社違人日玄關閉子雲江山開一望吳越在孤舟七言如夜月旌旗五馬渡秋風草木八公山周道秋風行黍稷漢宫春雨長蒲桃西蜀喻通司馬檄中山謗滿樂羊書秦塞忽驚三月火漢家空待二師功三月晴風髙戰鼓九江春水下樓船鑄語髙華此方虛谷所云律髓是也銅雀謠銅雀來起髙臺銅雀落髙臺作銅雀飛臺成基夭桃三章灼灼夭桃花于中林顧子惠我寧不嗣音夭桃灼灼花于林薄遲子不至憂心鑿鑿陟彼南岡晨露瀼瀼匪岡則髙我心孔勞登臺日暮登臺秋風鴈來慨然念逺離居置懷躊蹰千里靜言勞思爰有旨酒斟之酌之拔劒髙歌哀音孔多沉吟忽斷中心奈何繁星告夕薄寒求衣明月不墮輕霜自飛稽山之東大海處之衆山所歸曾不盈而逶迤今古山川屢更嗚呼往者實多于生民兵行朝廷徴民兵移文下鄉縣縣官承選募抽丁悉貧賤含悲釋耒耜努力負弓箭未諳邉塞苦先絶室家戀臘月到漁陽飛霜割人面來朝兩軍合生死期一戰吞聲告同列封侯爾何羡牧牛詞二月三月春雨晴渚田水暖芹牙生牧童驅牛出原隰細草青青牛可食夕陽短笛不見人吹過村南又村北園桃春花爛漫開春鳥間關啼一朝坐見物華改鳥聲啼盡花成泥園中桃須老園中樹莫遣隨風到處飛飛出園中去休洗紅休洗紅洗多紅漸失曾記初著時人矜好顔色徒傷未敝成棄捐悔不作事慎從前烏栖曲深宫烏啼天未旦城頭擊鼓明星爛吳王宴罷星未稀繁霜落樹烏驚飛官船曲豅中水勢急與石相抵牾月暗富春山官船乘黑去山家畏虎狼日斜閉門卧向夜官船來捉人嚴守邏靜夜思虛帳含秋月髙樓怨别情明河一萬里夜靜水無聲長干曲揚帆下長江日落秋雲起夜半聞鄉音知是長干里江皋曲為愛新妝好東皋出采蘋春江千里色解珮不逄人會稽竹枝詞秋風秋雨正淒淒荷葉荷花香滿溪越女蕩舟愁日暮歌聲盡在若耶西楊柳枝詞春寒殘雨日瀟瀟一曲驪歌上灞橋想到啼烏今夜宿不教攀折最長條清涼山寺蒼山樹如蓋乘髙御清涼地逺暑亦寒江色明虛廊層崖仰萬象古寺崇榱梁眼迷金銀界鼻擁旃檀香白雲照巖穴有若日月光極視但長嘯凌風思翶翔寒夜談遷至故人越江海細雨連孤舟叩門告飢乏刺刺語不休自從逺遊歸中塗歷窮愁豈無相識人掃迹如仇讐腹值今日飢問余能食不聞之發長歎誠為吾道羞青眼古所難况于末世求伊余雖苦貧一飯君必留中園剪寒韭糟牀瀝新篘酒酣兩耳熱率意成歌謳人生感行樂不醉非良謀待范四不至落日淡清暉幽人在林樾回看往來路蒼蒼翠微沒天髙秋月空夜午星辰闊之子期不來長歌為誰發宿董氏宛委山房中夜虎渡水溪樹初風生颯颯吹哀湍衆山皆有聲深庭久無月黯然三四星憂人獨求醉釋此離居情王貽上云警拔可傳寄沈十二橫山生白雲鬱鬱半空起知君住其下獨宿白雲裏冬月靜巖扉寒泉滌心耳嗟余役風塵引領望之子王貽上云及格江亭遇舊老畏干戈滿愁聞羽檄頻鶯花射堂夕風雪故園春泉下悲先帝人間識舊臣空將垂白淚嗚咽對沾巾二十七夜見月纎月依微見愁人起四更暫時成死魄幾日又哉生花霧𡨕𡨕重星河湛湛傾鄰雞催薄曙知爾有同情四十初度不才吾老矣萬事一蹉跎今日尚如此他年知若何空囊初罷酒樂嵗且狂歌每欲尋巢許無從訪薜蘿送客還山右春草太行山行人一騎還夕陽前路逺離夢索居間鳳舉今誰匹鴻歸不可攀所悲流水意千里送潺湲石城晚眺客心正搖落獨上石頭城天逺垂垂下江寒混混平愁兼多病日老作異鄉情况值秋風後清砧急暮聲村居獨樹寒煙外孤村流水間偶隨花草去逺逐漁樵還川暝罷垂釣日斜常掩關何年事髙隱歸卧鹿門山周青士云全學輞川去越步出越城門回看越城樹久客成故鄉徘徊不能去客中九日細雨成隂近夕陽湖邉飛閣照寒塘黃花應笑關山客每嵗登髙只異鄉沈山子云不失唐音亂後得張子書沁園秋草舊回車惜别西河歎索居萬里河山經百戰十年重到故人書露筋祠野岸分流截海垠安歌誰復賽波神孤舟夜向祠前宿商女挑燈説露筋漂母祠一飯當年報所知王孫今日更何之平生自歎無知已千里來尋漂母祠維揚逢張子輪蹄自送出吳關楚乙燕鴻信不還誰料十年兵火後故人今日在人間夏錫祚五首錫祚字玄寵别字書巖長洲人補崑山縣學生有雪鴻堂詩草詩話書巖五古居然作家化城菴舊是趙凡夫隱居處入門無寸土起伏盡崖石其中窪者泉一一湛寒碧稍加斧鑿功構此幽人宅不忍山骨傷廬舍寧取窄崇卑就石勢為磴亦為壁雖行密室中犖確響行屐軒廊倚斷壑渡以橋盈尺昔人栖遁處逺與市塵隔今為佛子廬筠籃有遊客是時春事動山氣潤泉胍環轉軒櫺間漸聞聲湱湱岑樓面青巘飛翠坐來積西窗杏一枝鮮妍合畫格尚想寫生人玉臺去無迹謂文夫人俶也空山萬籟靜鐘磬響晨夕自紫霓澗至旋螺頂荒蹊鮮人蹤樵路僅可辨忽焉耳官清泉聲泠然善入谷山四合仰視天一線陰陰冷翠滴竹色緑人面泉行如秋蛇赴壑隨所轉回磴或厄之怒噴亦飛濺偃木傍石梁渡客攀援便故令坦塗隱不使門扉見路窮出階墀曲折趨古殿苔衣鹿胎斑亂點落梅片巖阿架精廬清閟獨所擅幽意領已永奇勝探未遍復尋來時路一步一繾綣夕陽照歸人紛紛下華甸鄧尉妙髙峰兹峯昔言峻豈意乃平坦倚竹為幽深遍植萬竿滿蒼蔚四面來不使濃翠散春時此天地未屬鶯花管相去叢林遙所喜遊蹤罕法侣罷逢迎經過便踈懶勿嫌坐箕踞我佛亦偏袒第損趙州茶一喫至七碗豈惟小住佳直可適豫館度風篁嶺至龍井不知何年代人家猶太古叢篁髙百尺深密掩村塢寥寂絶人聲濃緑滴環堵徑轉下坡陀丁丁響樵斧道旁萬松樹落落清可數叩門墮山翠竹裏僧開户呼童汲新泉泉自石穴吐烹以瀹茗芽炒焙初出釡客言香色絶僧意不自詡乍與佳勝辭回顧失紺宇樹密天疑陰泉吼聲帶雨忽聞逺村雞有路出漁浦詠龎德公風塵擾天地不到漢沔東至人所栖息山靈護微躬力田自韜晦婦饁耕者翁羣雄戰四野雲表翔冥鴻靜中有定鑒人倫識統宗詭辭對景升遺安樂貧窮豈知天下事已付南陽公方其拜牀下深意默已通漢燼既可噓匿影歸巃嵸采藥入鹿門世莫知所終神龍不見尾雲霧深濛濛顧圤三首圤字琢公一字山臣錢塘人有今年草詩話山臣工繆篆詩不為格律所縛持論亦復不羈家居奇窘有桑門勸其修行以資來世福山臣笑曰不知前生是何雞狗作之孽使我今生窮苦若從上人修行又不知來世是何雞狗安享是福傳者以為笑端然正可發愚夫愚婦深省也有夏淫函積洪潦八十有八日是月月小盡九十日餘一所剩無幾時夏令倐云畢陽光久淪陷隂慘恣騰溢龍蛇起平陸鬭水入人室翳此白晝輝恐為魑魅叱阡陌匯為海何有蓬與蓽人非金石軀浸寢自腰疾赤帝職烜赫位莫與甲乙豈問大火亡秋冬竄為質江南號炎方古語亦妄述土山焦欲流説者第詼譎彼蒼奪農夏豈有富民術無已請端䇿筮卦十之七其占不濡尾是日卜乃吉無何若木枝影向意表出朝光被畎畝疆理辨溝洫鉏鍤四五動田父不終逸時還衣我葛飢也樂我泌譬之出幽谷暗曶忽自失又如殿後師師老托軍實取勝在一伸安問嘗九絀無夏忽有夏有夏乃有秫有秋且釀酒以醉契玄謐江臯江臯有梅梅有枝青棲悅君君不知水郭舟喧趁潮去月落沙禽啼滿樹夜思疏雨乍過菡萏陂好風微動楊柳枝前溪後溪棹歌歇夜半水明飛鷺鷥陳道永一首道永字非玄更名確字乾初海寧學生詩話先生難經鏗鏗詩不求工然亦流暢柬董子春風亭子雨迷離旅思紛紛憶舊知别去好山遊幾處倦歸蕭寺記何時期君南閣尊前話看我西湖隄上詩莫謂兩人容易見滿頭白髮已如絲偕吳仲木再遊西溪秦望歸來興尚賒幅巾笻杖入山窪迷離不記前朝路寂寞還開古寺花春水橋邉雲萬樹晚風亭外月千家可憐潦倒吳公子頻道西溪勝若耶孫茂芝一首茂芝字若英嘉善人有燕遊稿江南曲少小住江南忘却江南好辛苦北遊還喜見江南道魏禹平云口頭語却佳蔣之翹一首之翹字楚稚秀水布衣甲申後隱于市詩話楚稚居射襄城詳對楚辭晉書韓柳文集鏤板以行又輯檇李詩乘四十卷搜録鄉黨先正詩無遺兼能備舉逸事使聽者忘倦晚年無子書籍散佚無餘詩乘亦亡可歎也泊止棹知何地㩦藜復有村落花緣艇出鬭鴨近人翻未乞田家火先邀野老樽百年知幾醉潦倒復誰論沈自昌一首自昌字君克吳江人禮部主事琦子國子監生客夜聞笛為夢西州早閉門髙樓橫笛正黃昏關山風月愁清夜楊柳梅花憶故園波起湘江飛落葉雨淋蜀道叫哀猿沙場多少征人淚一曲吹來欲斷魂沈自然三首自然字君復吳江人副使珫子居母憂不勝喪而卒其友私諡孝介先生有來思間情二集江南樂初景爛銀浦溘溘浮鸂鶒儂情兩搖蕩持比春江色江深蓮子齊水暖鴛鴦栖不須更相問家住橫塘西橫塘連夾浦曲曲明如許誰打白蘋開前溪夜來雨雨霽上南樓天髙水影浮出門郎不見仍蕩采蓮舟曉别曲月沒星闌曉雞唱離人催起同心帳殘膏無焰淚花紅不語含顰兩相向安得紅輪葬海底千年長伴多情死從此人間無别離門前不種相思子寄居湖上樓藕葉將凋桂葉濃隔湖隱隱見雷峰獨松關口秋聲急并入南屏寺裏鐘沈自徵一首自徵字君庸吳江人亦副使珫子辟賢良方正不就詩話沈氏多才自詞隱生璟訂正九宫譜為審音者所宗而君庸亦善填詞所撰鞭歌伎灞亭秋諸雜劇慨當以慷世有續録鬼簿者當目之為第一流詩則嫌其稍平衍也和施壘山學博送别韻苜蓿闌干春漸肥榆關滇海雁書稀管城亦有封侯骨磨盾看君試短衣沈自友一首自友字君張吳江人都御史珣子承父廕入國子監有綺雲齋稿平沙灘雲淡迷遙樹沙平障晚煙亂帆爭破浪斷岸逺連天野渡傷歸客斜陽冷釣船荻花風起處聞雁獨淒然徐韞奇一首韞奇字季華吳江人有西濛吟稿田家樂水繞莊窩竹繞牆宛然風景似柴桑雨來大芋髙荷夜秋在鱸魚蓴菜鄉户外最憐楓葉赤籬根也有菊花黃東鄰穫稻西鄰秫勸我先營碌碡場魏廷薦一首廷薦字友莊嘉善人有息踵居詩草家子一畫淵明采菊圖見貽戲作茅屋四五間修竹一二畝東籬繞曲折南山安户牗芙蓉既盛開菊又當重九此際陶淵明寧無人送酒徐開任一首開任字季重崑山人有愚谷詩稿朱長孺云季重詩原本少陵深情至性激發而出使讀之者留連往復而不能自已咏史新都居攝時符瑞日盈耳不有翟將軍人心俱已死移檄建義旗威名震遐邇時命雖不成稱兵從此始悲哉兩黃鵠無人恤義士送人遊下邳江南春色不勝情俠士辭家事逺征天下侯王寧有種世間豎子遂成名故交亂後無同志羇客愁時有定盟豪氣未除淮海習知君此去慰平生屠爌二首爌字暗伯嘉興縣學生有朂齋集詩話暗伯言無枝葉行有規矩詩亦雅正不以風華見長古意素絲非一絲機中織成帛卷舒生容光從郎自搖襞慎勿染為緇終身不見白贈别袁重其髙飛鴻雁滿關河此日寒江起夕波庾信哀時常作客梁鴻去國獨行歌霜淒茂苑清砧急月照荒臺落葉多為問吳中舊知已空山叢桂近如何孫治二首治字宇台仁和縣學生有集詩話宇台刻意摹古寧質不佻渡漳河北臨大水清漳還濁漳草迷銅雀緑沙走直沽黃疲馬愁荒渡飛烏逐野檣比來憂泛濫何計築渠塘與關六鈐故人栖托近如何聞道玄亭自詠歌梅福遊吳辭宦久虞卿去趙著書多秋風絶塞來鴻雁白露寒塘遍芰荷君意陸沉堪寄傲獨慙年嵗轉蹉跎張彥之一首彥之一名慤字洮侯松江華亭人朱朗詣云洮侯為人寬博無同異其詩莽蒼不事繩尺質本景純而臻于嗣宗擬古小鳥愛初陽交交鳴條柯皎日麗窗牖惠風揚薜蘿蘭蕙豈不懷馨香隔巖阿所思悵道逺軒車寧能過仰睇浮雲馳志竟成蹉跎煙海既迢遞雲峰亦嵯峨百年會有盡日暮徒悲歌董説十二首説字若雨烏程人晚為僧名南潛字寶雲有豐草菴等十八集詩話若雨腹笥便便未免有才多之恨至其硬語澀體絶不猶人方諸涪翁不足比於饒德操有餘讀曲歌歡是嶺上雲朝往暮來過斜陽照殘雨儂處獨晴多清明竹枝詞碧紗轎駐水塘灣楊柳風吹燕尾鬟要赴燈前絃子社莫攜儂上虎邱山南村秋鬼謠妖狐拜月霜花青髑髏騎馬空中行秋魂吹作塔鈴語呌斷東流一溪水鬼車曉喚精靈去緑燈移過江楓樹盂蘭招魂詞靈風飄幢塔鈴語小玉魂歸立秋渚只言夜踏陽臺雲蒼茫乍隔青楓雨擁髻來看水燈緑法王正奏無生曲春日煮茶煙透緑隂中遮屋黃茅間瓦松但遣異書供硯北不妨野語聽齊東香拈細雨招新夢門閉春風仗短童秋色今年應更好小窗移得碧梧桐山行落日射背木葉滑橫挑拄杖懸詩囊海天二月發新翠野廟斷煙生古香洞口楓樹根可坐山腰亭子名難忘垂藤松鼠忒孤僻才遇遊人竄道旁西溪客過期不至往昔刻約言不食此回逺遊心已貪夜來坐到露花滴更復望君蓮葉南眼底青天星四五夢中破琴徽十三豆棚放語自清絶莫待霜落分黃柑蠶豆誰賦田園雜興辭琅玕記取夏初垂喜看桑底懸新莢恰值蠶眼未吐絲細雨賣茶聲過後竹爐燒筍火停時沙瓶漆櫑分前詠踠豆今逢第二詩秋夜吟人行積水涯踏亂青松影吹滅秋窗燈月白飛光冷夢華潭口聽客話嘉隆間大內舊事記之二首月華門外轉靈旗照夜銀盤碧藕肥祠罷天孫桐葉落君王新賜鵲橋衣江南風景藥王灣霧縠單衣緑玉環紅芍藥邉棊局罷自裁團扇畫秋山秦良玉詞追奔一點繡紅旗夜響刀環匹馬馳製得鐃歌編樂府姓名肯入玉臺詩何述稷一首述稷字公藝常熟縣學生有晴蓑草堂詩集苦雨客舍淹淹雨春愁甕裏天竹含千嶂霧柳罨一溪煙凍鳥翔還下飢蠶起乍眠茅柴鄰酒熟慚愧貰無錢朱扉一首扉字開仲嘉興布衣詩話開仲弱齡多病終其身不婚獨處深村破甑勞薪手自執㸑間賦小詩不輕示人簡吳生一律興會自如簡吳生自誦梅花人日詩五旬不見但相思一春多雨愁無麥二月輸官定賣絲行藥橋東逢客返著書忩下少人知近傳孺子司村社想見粗豪割肉時金德開一首德開字爾宗蘇州嘉定人國子監生有詒翼堂詩紅葉濃緑看初改江頭日漸紅寒生一樹早秋老萬山同最豔朝霜後尤妍夕照中自能成晚興不欲媚春風奚濤二首濤字大蒙崑山人有肆間堂詩草雨霽自光福至玄墓幽尋無定期興發及新霽移舟入林煙登歷從所契杖䇿踰山橋淙淙澗流細蒼松夾道深修竹分籬翠草甲抽故心梅香有餘蒂登髙一憑眺湖水白無際微茫水鳥翻斷續雲峰繼有懷云誰思榛苓徒款睇舟行即事蠶月江橋外荆扉八九家鶯啼兩岸葉雨漬一籬花溝響新流細門抽稚竹斜村農行漸少無處問桑麻胡山二首山初名日新字天岫宜興人僑居海鹽徙嘉興梅會里與彭仲謀武原吾舊住結屋近滄溟鹽井縈沙曲魚風入市腥秋雲蜃浪黑夜雨鬼燈青會有乘槎興還尋織女星題畫漁家背山郭門掩青楓樹夜半潮水生孤舟渡江去李麟友三首麟友字振公一字于苑嘉興布衣沈十二以匹練見遺賦謝梅溪李生長衣褐冬亦不加夏不脫已經寒暑六七年領衽不完襟縫豁沈郎好我情不踈贈我匹練五丈餘製以為衣見賓客舉止覺與常時殊鄉人重衣不重德談笑從今壯顔色客夜夕隂山翠重寒色上河橋夜雨三更鴈秋風八月潮官亭人寂寂驛路馬蕭蕭裘敝經年客歸魂不可招登審山有懷周篔沈進諸子長水通梅里橫山近硤川登臨猶可見惜别已經年葉落清秋樹鴻飛薄暮天故人無恙否却望一淒然劉純熙一首純熙字晦生慈溪縣學生日暮牛羊下日夕素月柴門生宿鳥樹髙下微風雲重輕孤村轉閴寂萬象歸虛明地僻無鐘磬惟聞泉夜聲胡嗣璜一首嗣璜字映日平湖人有墨龕集秋泛舟痕移處一溪涼柿葉初紅豆葉黃不獨蓴鱸秋正美村醪也自發新香程用楫八首用楫字濟臣休寧人有遜敏居遺草詩話濟臣詩清真堅老卓然名家雨宿桃源菴夕雨四山來奔灑萬松裏卧聞藥銚泉激激聲不止道人然松膏中夜更坐起何處一燈青明滅深壑底曉看白龍潭應添數尺水慈光寺神廟賜額白雲斷峰腰峰下亂松栝盤盤一徑盡金碧見雙闕飛閣跨虛空長廊翳修樾風筝四角鳴香氣諸天發緬昔普門師王城走瓶鉢道感帝后尊帑藏賜禪窟幡幢內家製像設天宫豁鬱鬱慈光書銀榜何飛越人代復幾何下界事飄忽豈惟陵木拱講席亦消歇我憩娑欏隂窺窗賸棕拂三歎出寺門幽篁吐微月月夜宿院中小閣暝色起平坡鐘聲滿山户一禽忽驚聒涼月已復吐窗櫺色如水松葉紛可數樹底坐白猿鬚髯極清古湯泉黟山崚嶒神所家丹崖石柱攢蓮葩隂陽爐炭爇坎窞溫水千斛流谽谺人言驪山亦礜石惟有此地根硃砂傳聞軒帝服丹匕肌膚皴裂人驚嗟香泉一浴浸七日白龍晝見何衙衙珠衣寶冠照山谷便跨鱗鬛隨青霞至今玉壺酌酒處石室尚有樽罍窪嗟豫清淨本無垢追逐世好羈籠笯裹糧偶到天子鄣解衣初試靈泉涯浮丘天子不可見身輕疾愈還足誇山亭晞髮發長歎安得躡足登雲車喝石居石室雲正暮溪流聲更長懶殘何處去虎迹滿繩牀下食白鷴靜侵階紅术香無人指歸徑獨自立殘陽祥符寺即軒轅宫松梢佛剎金銀色傳是當年軒后宫隂殿已無丹鼎火古壇惟颭寶幡風煙中白鶴參差下屋裏清泉曲折通小坐山房話疇昔木蓮花發數枝紅初冬送友遊浙江水新安淺雲山太末通行吟隨處好烏桕與丹楓巨門樓唐人于德晦詩云間倚朱闌頻北望只宜名作巨門樓遍詢樓址無一知者成一絶句千層翠色向空浮百道紅泉石上流間詠唐人舊時句朱闌何處巨門樓戴長汛一首長汛號澄齋嘉興人有前後征草苕溪漫步四野干戈急蕭條此地秋村尨吠山鬼水鳥狎溪牛落葉飛重起哀湍咽更流無才堪濟世只合老林丘明詩綜卷七十九
