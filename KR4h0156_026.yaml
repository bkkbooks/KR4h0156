body:
  text: 明詩綜卷二十六翰林院檢討朱彜尊編彭韶九首韶字鳳儀莆田人天順丁丑進士除刑部主事厯官都察院右僉都御史巡撫蘇松召入為大理寺卿纍轉刑部尚書卒贈太子少保諡惠安有從吾滯稿靜志居詩話彭公以左僉都御史巡視浙江兼理鹽法憐亭户之苦繪八圗上進各系以詩雖未盡工然有元次山舂陵示官吏二詩風骨若臨江詞一篇慷慨激烈信足以起頑懦其云後來姦佞儒巧言自粉飾叩頭乞餘生毋乃非直筆蓋指修實録者而言考髙皇帝實録一修於建文元年五月至三年十二月書成再修於靖難後至永樂元年六月書成逮九年復修至十六年五月書成文皇帝實録修自洪熙元年五月至宣德五年正月書成四次纂修總裁楊東里一人均與焉即如書傳會選許觀景清實預纂修之列今刋本猶書其名而實録去之則建文諸臣在洪武中嘉言懿行概從刪削而顛倒其是非可知巳彭公所指斥殆為東里言之乎經進鹽圗詩八首兩浙山水鄉古稱天地藏西望出吳淞東行踰鴈蕩利孔非一塗鹽征為海王泉布充京儲芻糧助邊餉庶哉用物宏生意不復暢薪桂與炊玉晨昏增感愴敝屋棲寒蘆新畬倚孤嶂懷土思依依承家如草創右鹽場圗山木非不佳林麓非不㢋百年生聚繁分業薄如紙朝夕斧斤入不待黃落矣近伐慨山童逺入虞虎兕肩重何足辭突黔良藉此而況煮海功昏夜無停止菹薪茍不力公私亦何倚歲歲事辛勤猶勝棄桑梓右山場圗海壖咫尺地一望如掌平材木不生植草莽徒敷榮廣牧良有害泛取亦難成瓜分結亭户表絶自經營繁霜一以降百物俱雕零芻蕘忽萃止芟縛無留行輦運積官所來歲事煎烹負荷非為苦願言公課登右草蕩圗旭日朝沮場欣兹風色競錢鎛密如鱗沙塗平似鏡汲曬足灰泥層層白相映易地聚成堆再淋鹹始盛方池藉以茅小竇暗通阱蓮實重且堅浮浮力能勝祗恐山雨來一簣功未竟殷勤守餘瀝坐待滷池定右淋滷圗鹺液泛清泠牢盆戒修潔分畨忽後時及此旺煎月一勺盡傾瀉萬竈俱焚爇沈沈紅霧收蹙蹙晴波竭斂之白盈箕凝華燦如雪點檢入公私中心更煩熱荆妻慰苦顔摩挲汗流血却歎戍邊人垂老有離别右煎鹽圗詩話煎鹽之法惟海濱居民悉之書生多未詳也惠安是詩巳具其槩然不若施宿會稽志所載靡有剩義今節録於後云會稽亭户煎鹽法以海潮沃沙暴日中日將夕刮鹻聚而苫之明日又沃而暴之如是五六日乃淋鹻取滷然後試以蓮子每用竹筒一枚長二寸取老硬石蓮五枚納滷筒中一二蓮浮或俱不浮則滷薄不堪用謂之退滷蓮子取其浮而直若三蓮浮則滷將成四五蓮浮則滷成可用謂之足蓮滷或謂之頭滷然石蓮試以滷取最後升者為足蓮足蓮乃可驗滷有無足蓮者必借人巳驗蓮滷較蓮之輕重為之然後為審編竹為槃槃中為百耳以篾懸之塗以石灰才足受滷燃烈焰中滷不漏而槃不焦灼一槃可煎二十過淋下滷水或以他水雜之但識其舊痕以飯甑蓋之於中㧒去面水至舊處元滷盡在所去者皆它水或以甑簟隔之亦可以他物則不可分矣孔融論云敝簟不能救鹽池之滷意蓋指此練化術云飲食過鹹以飯簟竹數條炙之著其中則汁便淡蓋未易以理推也覽此讀惠安諸詩可以豁然無滯義矣小汛風日好大汛潮汐平袖長應善舞課羡易為征嵗歉伊誰知寧分雨與晴衣食豈不急國計良非輕擔石四面至倉庾一朝盈鹽官唱簿厯折閲頻呼聲況乃逃亡多荒額重加徵展限諒未允努力事餘生右徵鹽圗三邊乏儲峙良賈勞委輸償以榷海利子母多贏餘水膏易消耗蔀屋難貯諸多年積逋欠折算盡錙銖渺渺太湖畔盈盈東海隅雪山壓巨浪風帆恣所如每資藜藿食亦薦王侯厨誰念味中苦搔首空躊蹰右放鹽圗近寶固貧國厚貨亦貧民滷丁有常賦催目何紛紜侵耗嵗巳久夤緣具虛文商算無從給鞭箠不堪聞富黠自當爾哀此顛連人稱貸不見售絲榖無餘新寬減逢優恤感激謝皇仁滄海未終竭更始重辛勤右追賠圗臨江詞臨江右名邦佳麗傳自昔豈不産異人為兹壯顔色云何百年間不見有遺迹館人聞我言掩袂長歎息叩之至再三欲語還踧踖為言有姦臣名字不記憶闕十字內臺司風紀適遭陽九厄飛簡論曹魏戮力事討賊膠固不知幾祗顧順與逆闕五字竒禍嬰六戚兹事有始末賤子請闕一神考早謝世太孫推正嫡母妃開平家元勳載帝室隱然九鼎重姻婭萬人敵嫌隙一以開讒言肆罔極居然尾不掉大都勢耦國時有黃奉常子澄輕佻故無匹伴讀東宫中論事時造膝一旦削王侯匆徨何太亟細人暗大體國釁此焉隙漁陽動地來六軍盡股栗齊公泰為司馬折衝乃其職堂堂正正旗誓書嚴紀律內相方夫子孝孺早學冨經術倚馬草檄文樞機資密勿又有黃門陳迪自少稱英特餘者亦黨人我今半遺失當其自靖時鼎鑊甘如蜜之死矢靡他萬古常昭晰父母且不顧爵祿何能易寄語謝諸親怨尤意何益所貴士明志萬死奚足恤後來姦佞儒巧言自粉飾叩頭乞餘生無乃非直筆聖人順天命四海瞻堯日爾胡守戅愚甘心取族滅不覩解與胡乘時附鳳翼恩寵日以加聲名垂簡策徐貫一首貫字原一淳安人天順丁丑進士授兵部主事厯員外郎中出為福建參政遷本省右布政使山東左布政使拜都察院副都御史巡撫遼東召入為工部左右侍郎進尚書加太子太保卒贈太保諡康懿有餘力稿贈别張世禎故人成久别邂逅客都城夜雨方論舊春風又送行鄉關頻入夢雲樹逺含情迢遞清溪上相思對月明王佐一首佐字廷用天順巳卯舉人福州衛籍官訓導以子鼎貴封都御史有三留稿宫怨芙蓉帳冷減容光愁荷熏籠懶著牀寒氣逼人眠不得鐘聲催月下回廊詩話廷用是詩載集中候官曹能始十二代詩采之遊用之夢蕉詩話謂南寧伯毛舜臣留守南都灑掃舊內見别院牆壁多舊宫人題詠年久剝落不可辨識其一署曰媚蘭仙子書即此詩末二句也當出好事者傅會不然裕陵定都北京之後康陵未南巡以前安有宫人以廷用詩書之南內壁乎張元禎一首元禎字廷祥南昌人天順庚辰進士纍官吏部左侍郎兼翰林院學士掌詹事府事天啓初追諡文裕有東白先生集遊東郊招提回首日沈西十里香風送馬啼不是習家池上飲傍人休笑醉如泥沈暉一首暉字時暘宜興人天順庚辰進士纍官右副都御史巡撫河南有豫軒集夏夜悼亡青雀西飛竟不歸芙蓉猶剩舊羅幃山齋十日黃梅雨誰與熏籠夜焙衣鄭紀一首紀字廷綱仙遊人天順庚辰進士纍官南京户部尚書有東園集林雨可云東園詩得力于靜故能舉止安雅詩話尚書無詩名然如古塹斜連江樹沒飢烏低傍野人飛橋頭雨歇溪初溜天際雲收山漸多亦自琅然可誦送林慎學之官相送東郊去秋雲驛路寒秖因為客久欲别故人難馬向花間度琴攜竹外彈歸來不覺晚月色滿吟鞍秦夔十一首夔字廷韶無錫人天順庚辰進士厯官江西右布政使有五峰遺稿邵國賢云廷韶詩始馳騖中唐久之得其風格既而學杜復參諸蘇黃以下數家故所就如此謙程克勤云公詩清麗豐蔚不名一家錢與云廷韶詩流麗有唐人風東安道中南人喜乘舟鞍馬非所便自我離京師陸行苦迍邅長驅竟終日黃塵暗幽燕平原莽千里四顧無人煙況兹冬欲暮寒風正凄然霜嚴裂肌膚指直不得拳僕夫亟告勞長跪向我前下馬語僕夫窮塗須勉旃丈夫豈兒女壯志恆在邊微勞詎足惜去矣行策鞭送人還松江金陵城中花滿煙金陵陌上酒如泉送君臨岐一握手欲别未别心茫然匹馬遙遙向東去黃金作鞭光照路長安雖好不如家翹首吳門隔煙霧君家逺在雲水鄉正近吳王舊獵場海錯登盤玉脂滑鮮蓴出水銀絲長荒亭鶴去空塵迹三髙祠前秋月白惜君未得從君行斜日無言正愁寂登觀瀑亭麻姑之泉天下名有泉不可無此亭奔流直下蒼崖裏千丈玉龍飛不起鏗金碎玉聲潺潺恍惚置我匡廬間銀河句好續不得日暮悠然騎馬還同金廣信宗器遊番湖番湖水落秋容冷碧色澄鮮三萬頃樓船嗷嘈何處來十幅蒲帆弄秋影霜晴九月葭葦枯芙蓉著花秋滿湖吳興巳逺郭熙老誰為寫此秋江圗汀洲逺近迷雲樹東去滄波急如注康山一髮天際橫傳是先皇洗兵處當年血戰湖水黃日月照耀旌旗光鼎湖龍去不復返只有雁鶩飛茫茫天開大澤雄今古氣撼東吳及南楚巴陵洞庭何處邊目斷潯陽送樓櫓北風獵獵握雙旌此行竒絶如登瀛風波平地不須起向來魂夢今猶驚浩歌蓬底還搔首却憶同行信州守萍水飄零盡白頭相逢且醉餘干酒贈虞永錫赴金庭孰館西溪先生頭半白十年常作金庭客慣説金庭山水清嗟余俗眼何由識新春示我山水圗金庭乃在東南煙浪之具區洞天福地仙所都靈芝瑞草無時無危峰倒插青天孤下涉阻險連重湖秋風颯颯吹黃蘆白波漫天鴈鶩呼沙頭二老翁衣冠一何偉烏沙籠頭髮垂耳笑看雲山弄雲水就中一叟豪且雄恐是近世天全翁領客嘗遊湖水東脫屣冨貴尋崆洞英賢遺迹轉眼空好事寫入兹圗中不然胡為避世士被服却有今人風余生亦愛金庭好對畫題詩心懆懆會約先生作勝遊他日風流成四老和謝武選齋居長樂疏鐘曉龍墀細柳春天香飄御仗紫袖引才人萬乘求賢切諸公奏疏新幸逢虛巳日忠讜在忘身過髙郵四顧無山色蒼茫入望遙城池百戰在魚蟹四封饒小市黃茅店孤村白板橋停舟問民俗風景頗蕭條久雨劔外天常漏江南雨亦多隂雲連晦朔潦水接江河漫説禾生耳還聞麥化蛾憑誰問元宰調燮意如何南山小隱茅屋住山丘丘中事事幽茶香和雨摘果熟帶霜收石鏡當窗見山泉隔幔流何時謝軒冕來伴竹林遊望泰山中天積翠鬱重重勢入青冥望不窮山上白雲今古是漢王虛信起封中賞芙蓉獨倚秋風取次開小園攜酒幾畨來勸君莫惜花前醉昨日主人安在哉陸釴一首釴字鼎儀崑山人天順甲申賜進士第二授翰林編修遷修撰升太常少卿翰林侍讀時與張泰陸容稱崑山三鳳有春雨堂稿李賔之云張亨父陸鼎儀未第時皆有詩名亨父天才敏捷竒思硬語人莫攖其鋒鼎儀稍後作而意識超詣凌空徑趨擺落塵俗雖或矯枉過正弗恤也詩話鼎儀與西涯同登第西涯時年十七鼎儀瓊林醉歸詩所云行過玉河三百騎少年爭説李東陽是也西涯好推挽人才求詩者至填塞戶限乃賦詩以止作詩鼎儀聞之失笑戲作八止詩貽之西涯申雞酒之約未踐也會謝鳴治陳師召促西涯題詠西涯遂渝止詩之約偕謝陳兩公載酒鼎儀邸舍李明仲羅亨父亦至即席分韻詩成書之卷軸鼎儀又嘗與陸文量飲朱懋暹宅有教坊弟子王秀侑觴夜深風冽琵琶絃屢斷主人以洞簫繼之秀舍絃按拍清歌數曲歌詞有學士波字蓋方言也鼎儀為賦詩紀其事有醒後空慙學士波之句當日諸公逢太平盛際翰苑風流經過輒成勝引豫嘗過北平孫侍郎蟄室獲覩西涯陵祀歸和鳴治騎字韻詩和者數十人裝成行看子足稱玉堂嘉話也鼎儀邸在新堤今巳不知其處三月八日與亨甫歸自城西參差宫樹殿東西樹裏青山落日低回首旌旗猶未足晚來風起玉河堤李東陽五十七首東陽字賔之茶陵人天順甲申進士改庶吉士授編修纍官少師兼太子太師吏部尚書華蓋殿大學士卒贈太師諡文正有懷麓堂前後集南行北上諸稿徐子元云長沙大韶一奏俗樂俱廢中興宗匠邈焉寡儔獨擬古樂府乃楊鐵崖之史斷此體出而古樂府之意微矣穆敬甫云李公才情兼美於何李有倡始功大似唐之燕許易王元美云李西涯如陂塘秋潦汪洋淡沱而見砥裏又云長沙公少為詩有聲既得大位愈自喜攜拔少年雅俊者一時爭慕歸之雖模楷不足而鼓舞攸賴長沙之於何李也其陳涉之啓漢髙乎又云嚮者於李賓之擬古樂府病其太涉議論過爾翦抑以為十不得一自今觀之竒旨創造名語疊出縱未可被之管絃自是天地間一種文字若使字字求諧於房中饒吹之調取其字句斷爛者而模仿之以為樂府如是則豈非西子之顰邯鄲之步哉於胡元瑞云成化以還詩道旁落唐人風致幾盡隳獨文正才具宏通格律嚴整髙步一時興起何李厥功甚偉是時中晚宋元諸調雜興此老砥柱其間固不易也又云國朝詩流顯逹無如孝廟以還李文正楊文襄石文隱謝文肅吳文定程學士凡所製作務為和平暢逹演繹有餘覃研不足自時厥後李何並作宇宙一新矣顧玄言云文正以大雅之宗推轂後進學既該博詞亦宏麗天陳卧子云文正網羅羣彥導楊風流如帝釋人雖無與宗派實為法門所貴含陳元孝云西涯樂府得古詩之遺風刺並見蓄可味使人自得於言外别為一格奚而不可靜志居詩話文正宏奬羣英力追正始由其天材穎異長短豐約髙下疾徐滔滔莽莽惟意所如其自序謂耳目所接興況所寄左觸右激發乎言而成聲雖欲止之有不可得而止者此自得之言也昔賢以大謝繁蕪為纍大陸才多為患此翁亦然若其擬古樂府因人命題緣事立義别裁機杼方之楊亷夫李季和輩似逺勝之至或剛而近虐簡而似傲文之佳惡文正蓋自得之矣申生怨十日進一胙君食不得嘗讒言豈無端兒罪誠有名兒心有如地地墳中自傷兒生不如犬犬得死君傍天地豈不廣日月豈不光悲哉復何言一死以自明綿山怨五蛇上天一蛇蟄綿山經月火不滅君王恩重翻為讎不如放作山中囚君王有臣一非少貪天之徒但自保臣心見母不見君誰言母死非君恩今辰何辰夕何夕留與千秋作寒食屠兵來兒勿啼屠兵來趙宗一線何危哉千金賣兒兒不死真兒却在深山裏妾今有夫夫有子死兵易立孤難九原下報無慚顔趙家此客還此友穿何故亡盾何走誰言趙客非晉臣當時嬰杵為何人新豐行長安風土殊不惡太公但念東歸樂漢皇真有縮地功能使新豐為故豐人民不異山川同公不思歸樂關中漢家四海一太公俎上之對何匆匆當時幸不烹若翁淮隂歎營門書開齊犬吠蒯生相人先相背古來鳥盡良弓藏近時刎頸陳與張功成四海身無地歸楚楚疑歸漢忌極知猶豫成禍胎時乎時乎不再來君王恩深辨士走淮隂胸中血一斗婦人手執生殺機赤族不待君王歸君王歸神為惻獨不念秋毫皆信力殿上戲殿上戲丞相嗔丞相勿嗔吾弄臣臣可弄不可狎節度不來臣巳殺君王有道臣職遂細栁營中親按轡文成死文成封五利封神仙只在東海東文成死五利死天下神仙皆妄耳漢家武皇帝者英昔何懵矣今何明君不見百年身萬年計前秦皇後唐帝姦老革姦老革天下能有多許賊潼關以東大有人悔不盡殺東都民民不欲多多即亂安得龍舟數千夫八萬君不見江都城外人圗儂那能更到丹陽宫卿勿言卿勿言朕自思南詔覆師君不知卿勿憂朕自保范陽弄兵苦不早卿邪誰邪髙與楊非姚非宋還非張有言如此尚不用豈有藥石針膏肓君不見咸陽老人能直諫何曽得覩君王面青巖山青巖山甄郎髙風不可攀祿山使者封刀還入東京見黃蓋帝敇偽官階下拜鄭虔貶死王維生故人獨有蘇源明君不見舞象悲啼樂工哭賊斫工尸分象肉司農笏司農手中無寸鐵奮笏擊賊賊腦裂賊雖未死氣巳折奉天天子雙淚橫十年棄卿真負卿臣身區區勞記憶平原太守曽未識十六州契丹助晉兵一號三十萬晉人報契丹一數一匹絹三十萬絹未足惜一十六州空棄擲遂令宋統成偏安中原以北無幽燕金元相承二百載慟哭衣冠化兜鎧至今五鎮接三邊不備西陲備東海安石工端禮門金石刻丞相手書姦黨籍長安役者安石工不識人賢愚但識司馬公卑疏不敢預國事幸免刻名為後纍匹夫憤泣天為悲黃門夜半來毁碑碑可毁亦可建蓋棺事久乃見不見姦黨碑但見姦臣傳參謀來新將代舊將去參謀來軍有主受命犒不受戰參謀行真獨斷宋家養兵二百秋大功竟屬書生收翻令愧死劉揚州君不見陜西歸來笏畫地遺恨他年六州棄兩太師和議是塞外蒙塵走天子和議非軍前函首送太師議和生議戰死生國讐死國恥兩太師竟誰是花將軍花將軍身長八尺勇絶倫從龍渡江江水渾提劔躍馬走平陸敵兵不能逼主將不敢嗔殺人如麻滿川谷遍體無一刀鎗痕太平城中三千人楚賊十萬勢欲吞將軍怒呼縳盡絶罵賊如狗狗不狺檣頭萬箭集如蝟將軍願死不願生作他人臣郜夫人赴水死有妻不辱將軍門將軍侍婢身姓孫收尸葬母抱兒走為賊俘虜隨風塵寄兒漁家屬漁姥死生巳分歸蒼旻賊平身歸竊兒去夜宿陶穴如生墳亂兵爭舟不得渡墮水不死如有神浮查為舟蓮為食空中老父能知津孫來抱兒逹行在哭聲上徹天能聞帝呼花雲兒風骨如花雲手摩膝置泣復歎雲汝不死猶兒存兒年十五官萬戶九原再拜君王恩忠臣節婦古稀有嬰杵尚是男兒身英靈在世竟不朽下可為河嶽上可為星辰君不見金華文章石室史嗟我欲賦豈有筆力回千鈞尊經閣尊經閣閣髙不可攀前有文宣宫後有鍾陵山玉堂下直岸幘斜陽下疏林開逺山新涼灑衣袂爽氣清容顔林端見初月素彩生雲間褰裳步花影欲動愁闌珊向來竹林遊暫到巳復還寧知一畞內迥若離市闤浮生且為樂及此一日間陳玉汝所藏朱澤民畫睢陽書家流作畫如作草松根石峻嶒健筆凌絶島垂蘿飄人衣盤石坐不掃鳴琴聲差差石籟風稍稍君看蕭散姿稱彼林下老遺縑百年內嵐氣濕不稿陳郎湖海情得此恨不早我生不學畫入眼分醜好嘗觀耆舊傳歎息風流少此意君獨知丹青安足道師召席上餞邵文敬戶部使淮安得作字玄雲鬱重隂霖雨久逾大平田偃頽波萬彚同一挫纍纍黍穗落百畞不盈箇淮陽舊宜麥未足供甑磨稊稗價亦增誰能問粳糯官租苦未給生理安可作城市多遊民山林有遺餓流離及溝壑去住總無那地連兩畿邇業恐千家破近聞恩詔下巳放今年課漢臣發諸廪唐法通百貨王事須賢勞地曹有良佐名辭鴻臚籍檄自尚書座行哉車馬艱詎免泥塗涴東南民力竭要使皇仁播官雖問升斗職豈在揚簸平生翰墨場珠玉生咳唾簿書劇裁決餘暇得酬和羣情恣幽眇品類入摉邏德澤乃膏腴文章比粳莝舉世輕迂談兹言我當坐偶託平生交因君識吾過君當策勳伐極力起貪懦聊因贈行什預卜還朝賀題王維詩意圗平田渺成湖仲夏月多雨汀鷺濕不飛林鶯澀還語村煙多乞鄰饁餉常及午紫門無鎖鑰出入隨杖屨白鷗似相識亦足忘爾汝王丞詩家流畫格亦天與君看百代遺摹拓尚如許吾生慕丘壑偶此繫冠組試問松下翁幾人同出處送錢先生致仕得臆字成化巳亥冬公來自南國維時龍興節奉表宸旒側入朝未浹辰具疏寫衷臆臣年七十二鬚髮不復黑乞身謝圭組歸老東南域願為南極星中夜常拱北時當太平世聖夀千萬億臣雖在畎畞永荷陛下德聖皇眷耆舊曰汝豫輔翊古稱老成人豈獨賴膂力吾嘗奬休退卿意誠悃愊加官號冡宰名位班九棘貤封及三世兹典尤絶特公章再入省請解尚書職臣方避華要而敢蒙顯陟王言重丁寧公意增感刻願書歸榮字堂扁揭華織江山佳麗地從此生顔色再拜送公歸臨風逺相憶困暑次韻白洲髙堂遞晴隂炎熇氣呼闞燔同洪爐然溽入厚地黯繁星夜方搖淫雨晝仍濫炎光石成焦暝色山帶黶羲輪焰赫赫雷轂聲轞轞龜坼行在田濤翻坐平檻占風想乾鵲吠日驚蜀㺌彼浴空羡鳬吾冠不如􅢮甘泉冷將濯惡木繁可斬惔心甘獨勞炙手竟誰犯周扇懷仁風陶窗仰清範雖無簿書煩頗覺餐食減顰為窮兒愁怒作壯士喊亦有歲寒交綈袍義思范豈無雪夜訪杯酒情憶湛天時手中環世事波上艦晚尋東籬菊秋種南山豏思君正報熱有袂不可摻賀鼎儀遷諭德得檢字華蓋天穹崇青宫地深儼同時侍從臣一一皆妙簡陸君偉文行不抗亦不諂銛如囊中錐頴脫不受掩年勞秩屢遷德諭官曷忝名厪黼扆記薦豈公卿剡平生耐官職寵極翻自斂須知啓沃功不獨事編檢姓字符鼎彞文章歸琬琰非才獨慙豫同第名久玷交遊二十年道義足薰染攀躋竟何能時歲驚荏苒勳業乃攸期榮光詎相艷努力當壯齡時哉此其漸示用兒效玉川子作夜坐苦不樂作詩示用兒用兒爾何來來自東南陲自言廣西人州縣巳忘遺但知姓李氏世業本巫醫家有三頭牛有田可耘耔當年靖州蠻作亂勞王師夜聞狼兵到勢若虎與貔我耶被殺死血肉交淋漓我娘亦被虜存亡未可期官司簡少俊閹割隨俘纍用克年十三廣顙身尫羸生來左目翳幸免殘膚肌紅船載白粲驛遞來京畿兵曹奏名籍給配在有司臣愚本無功恩與公侯齊用兒亦何物御筆蒙親批彤庭頓首謝髫丱歸提攜煮羮為汝餐縫帛為汝衣役不忍汝勞過不忍汝笞居遣用兒侍行令用兒隨殷勤語子姪慎勿陵虐為丁寧戒僮僕疾病相扶持細思先皇德欲報何能追賜生尚必畜況此非豚雞今皇兩僮賜本出思恩夷岑梁年十一吳也二歲差渠視汝為兄汝可弟視之班行若鴻鴈戲弄吹塤篪渠小不足責汝長教所宜用兒爾來前訓汝好言詞清晨起必早日暮眠當遲操畚掃廳堂汲水澆園畦客來捧茶果客去收書棋有口莫喫酒酒醉死路岐有手莫做賊做賊送頭皮人生無貴賤但問所從誰長為官人奴勝作獞與黎用兒爾誠騃告汝汝不知垂頭睡莫對吾自吟吾詩習隱二首咿啞復咿啞隔牆聞水車車翻水汩汩如在東鄰家當軒理嘉樹傍檻移新花一澆潤枯稿再濯無塵沙濟川恐無用學圃良非差房山有南畞海子餘西涯安得謝簪纓悠悠送年華暑雨忽新霽曽軒開碧山浮雲避素月夜色明松關流螢遞隱見宛在深林間掃石坐彈絲天風下鳴環瓊樓正在望佇立難為攀夜過邵伯湖蒼蒼霧連空冉冉月墮水江湖日浩蕩行役方未巳羈棲正愁寂況乃中夜起長江行大江西來是何年奔流直下岷山巔長風一萬里吹破鴻濛天天開地闢萬物茁五嶽四瀆皆森然帝遣長江作南瀆直與天地相周旋是時共工怒觸天柱折遂使后土東南偏女媧補天不補地山崩谷罅漏百川有崇之叟狂而顛坐看萬國赤子淪深淵帝赫怒罰乃罪神禹來乘四載驅大章走豎亥黃龍夾舟穩不驚直送馳波到東海朝離巴峽暮洞庭九派却轉潯陽城縈紆南徐萬餘里更萬餘里通蓬瀛君不見黃河之水天上下其大如股空縱橫長淮清濟出中境曷敢南向爭權衡千流萬派瑣瑣不足數雖有吐納無虧盈下亘厚地上摩髙空日月出沒蛟龍所宫奇形異態不可以物象但見變化無終窮或如重胎抱混沌或如皓氣開穹窿或如織女拖素練或如天馬馳風騣空山怒哮飽後虎巨壑下飲渴死虹或如軒轅鑄九鼎大冶鼓動洪爐風或如夸父逐三足曵杖狂走無西東或如甲兵宵馳聚嘯滿山谷或如神鬼晝露萬象出入虛無中吁嗟乎長江胡為若兹雄人不識無乃造化之竒功天開九州十有二山南北並峙江流其間堯舜都冀方三苗尚為頑魏帝倚天歎征吳但空還吁嗟乎長江其險不可攀古來英雄必南騖我祖開基自江渡古來建國惟中原我宗坐制東南藩始知天險不足恃惟有聖德可以通乾坤長江來自西極包人寰環帝宅吾來何為為觀國泛吳濤航楚澤壯神功歌聖德聖德浩蕩如江波千秋萬歲同山河而我無才竟若何吁嗟乎聊為擊節長江歌風雨歎壬辰七月壬子日大風東來吹海溢崢嶸巨浪髙比山水底長鯨作人立愁雲壓地濕不翻六合慘淡迷乾坤隂陽九道錯白黑烏兔不敢東西奔里人蒼黃神屢變三十年前未曽見正統甲子嵗東村西舍喧呼遍牒書走報州與縣山豗谷洶豺虎嘷萬木盡拔乘波濤洲沈島滅無所逃頃刻性命輕鴻毛我方停舟在江臯披衣踞牀夜復晝忽掩青袍涕雙透舉頭觀天恐天漏此時憂國況思家不覺紅顔坐凋瘦潼關以西兵氣多蘆笳吹塵塵滿河安得一洗空干戈不然獨破杜陵屋猶能不廢嘯與歌世間萬事不得意天寒歲暮空蹉跎嗚呼奈爾蒼生何夜過仲家淺閘日維乙未月丙戌青天無雲月東出舟人喧豗夜濤發翻沙轉石紛出沒是時水淺舟在地閘門崔嵬晝方閉閘官醉睡夫走藏倉卒招呼百無計民船棄死爭赴閘楫倒檣摧動交碎舟人號咷乞性命十里呼聲震天地我時兀坐驚舂撞攬衣而起心傍徨同行無人僕隸散獨與船底相低昂攀崖陟磴不得上咫尺如在天一方流行埃止信有數向來蔑視淮與江霜風欺人衣袂薄呼童酌酒纍數觴燈殘酒醒閘亦過北斗墮地天茫茫送平江伯陳公總督修河兼簡劉都憲時雍黃河西來忽東決張秋舊堤先受齧奔波赴海勢不停百里漕渠一時泄官船賈舶如山壅河砥沙乾日欲裂九重南顧回舜瞳三命中朝持漢節陳公舊是恭襄孫奕代簪纓萬人傑爭誇仙種非凡材復道家傳有真訣兵符夜檄鯨鯢走將令晝驅雷電掣指揮能事天地回坐計功成同解結時方六月霖雨多地苦沮洳況炎熱民窮到骨聲徹空忍使鞭笞汗成血極知國計須元氣乍可因時治癥噎比聞水發舟巳通暫遣丁歸待農輟三犀永作洪濤鎮一蟻不潰金隄穴古來大事當逺圗豈論竹頭兼木屑慣從前史鑑興衰巳聽髙談能激切湖南中丞久奉使頗覺憂勞成耄耋因公寄謝平生友自愧官曹容逸拙靈壽杖歌吾聞武當之山四萬二千丈半在雲根半天上不知三十六宫何處稱絶竒産出靈株非一狀蛟螭蟠拿露頭角熊經樹顛虎山腳根盤節錯相紏纒含風飽雪經炎寒九年洪水之水浸不殺十日之日暴烈何時乾梯懸磴接跬步不可上誰采青璧紅琅玕見之羡者不容口錫以嘉名曰靈夀爪之不入行有聲金可同堅石同久吾家此物舊所有神與相扶鬼為守自從病足跛曵不得前巳覺山林落吾手一病經旬不出門手中此杖嗟猶存下牀欹足立不定此時託子以為命不顧四體無微疴但願謝病歸山阿左扶右策夾以二童子下可涉園徑上可凌坡陀願裁萬本截萬杖窮崖隂谷生森羅靈兮壽兮此物儻可致直遣四海赤子頭雙皤題黃宗器秋官所藏何太守山水圗濕雲浮空山欲動亂壑回峯互吞湧當溪獨樹雨冥冥青苔覆地春陰重深山白石幽人居鈎簾寂寂坐看書竹橋入林野有簌草閣傍水門無車行人細路隔山腳曵杖前登後還却浦口輕舟信往還鐘聲逺寺空寥廓此中可釣亦可耕不然且濯滄浪纓酒酣夢覺兩相失此興豈獨憐丹青風流太守何侯筆三十年來巳蕭瑟君今愛惜須久傳豫亦題詩坐終日劉尚質南樓題王舜耕山水圗溪聲潺湲雜林壑山勢蜿蜒去還却浮雲欲起未起時半在溪頭與山腳入空髙鳥飛欲盡背屋斜陽慘將落更無剩地與間人縱有紅塵何處著南畞老翁雙鬢斑筆法頗似髙房山少年豪宕老疏放往往醉墨留人間平生畫癖兼山癖一見此圗三歎息愧我不如樓上人日日開窗看秋碧張侍御世用所藏山水圗歌秋山日落川氣黃樹影下映寒潭蒼叢篁入林豁蒙翳石角路轉山東岡茅堂對山復面水髙者可屐深可航閉門却掃動經月落葉委地苔覆牆豈無山客跨款假亦有孺子歌滄浪吾生早覺簪組纍十年丘壑成膏肓畫圗仿佛見此景褰裳欲渡川無梁空堂五月熯如火使我鬱塞廽中腸安得盤陀一片石坐醒殘醉生餘涼君今持節行萬里要遣霜雪清炎荒請看窮谷最深處或有隱逸藏聲光揚清激濁付公等吾欲拂衣辭太倉書蒙翁先生書畫卷後蒙翁書法天下豪坐驚風雨隨波濤有時意匠入幽眇力與造化爭纖毫仰觀千年俯一世紛紛弄筆皆兒曹書家論定價亦定須識我翁人品髙戲將水墨灑縑素如飫梁肉甘醯糟殘山剩水世莫覩流落數紙青蒲萄一登翁門遂隔世齒頰未獲霑餘膏如遊神山見石髓頃刻再往不復遭莆田鄭郎得寶藏明珠雜佩金錯刀摩挲兩眼百過讀使我涕淚盈青袍三年留玩一朝去久假似覺歸心勞泰山東頽日西墮欲往從之中鬱陶詩成起立歲將暮空庭短髮空蕭騷徐用和侍御所藏雲山圗歌何人醉寫雲山圗浮雲澒洞山糢糊空明射地日漏影稍覺林樹開扶疏平原蒼莽不知處忽有細路通榛蕪茅堂枕山半閣水卷幔正對前峰孤幽人深居不出戶縱有鄰舍無招呼低頭把卷苦吟諷語暗不辨楚與吳中流棹歌似相答欲斷未斷聲嗚嗚雲多水闊望不見知是滄洲舊釣徒長安六月晴復雨若非塵土還泥塗城中見山如見畫剛可髣佛求形模山猶可見水莫涉尺潦豈足容長艫十年舊遊憶南國歲月催人非故吾鸚鵡洲前漢陽樹此景此詩今有無因君此圗意披豁便欲買棹遊江湖華山圗歌為喬太常宇作嗟哉此山吾不知其幾千丈兮但見巍然屹立乎天中中有三峯聳拔而直上部位離立西南東諸峰羅列在其下有似長老隨兒童縱令立表以識不得算雖有記里之鼓難為功我聞上古之世開鴻濛沙水蕩汩相結融融者為泥滓結者為石為山峰石堅山積理亦爾試看崛拔斬削别有造化之神工山名五嶽此其一特出似異衡與嵩天門重重隔煙霧鐵鎖懸崖引長路摳衣欲進苦不前十步行時九回顧山腰流泉如瀑布仙掌撑空若承露虎踞龍蟠各有形鸞鶱鶴舞紛無數置身忽在中峰頂極目乾坤莽回互秦關蜀徼厄塞豈足論遙指扶桑最髙樹噫吁嚱自有天地兮即有此山萬物代謝兮山巋然古人今人到者相接踵誰復騁步窮其巔我生好古厭塵俗險絶獨慕昌黎韓昔年南遊復東眺二嶽只尺不一攀有客西來詫我以大觀歌聲上徹秦雲端畫圗指點向空廓巳覺天上非人間喬生喬生如此好竒者世不可以多得安得與子一日遍歷千巑岏王孟端竹長卷九龍山翁興豪放手持蜿蜒青竹杖酒酣怒擲江中流化作一龍長數丈一龍躍起一龍隨倏忽羣龍駭奔浪穿沙觸石連雲霧頭角森森各相向其間小者稱籜龍鱗甲蛻盡風神同人道此翁善劇戲造化乃在指掌中君不見九龍山翁去何許九龍山上多風雨素壁空堂杖影寒夜半無人作龍語鍾欽禮雲山圗為史都憲天瑞題江南畫史誰專門會稽老鍾清且溫圗成長練置急雨筆墨滅盡風神存陽崖隂谷半明翳上有煙雲時吐吞深林蓊鬱石塊磊野水不斷天無痕當其得意每自許傲睨恥受王公尊勾餘拙翁善墨竹史號勾餘一拙二者異法須同論謂渠畫格自有派房山之子南宫孫手持此圗自東海海色尚帶扶桑暾千巖秋聲萬壑樹只尺不辨東西村幽亭野集者誰子似有賔主無琴樽問之不答若莞爾物外别自成乾坤我生愛山復愛竹對此病目開餘昏君看巖谷最深處好著數箇蒼筤根題丁御史同年墨竹走筆長句浙江之東縣新昌乃在千巖萬壑之中央側身重足恐無路五步一澗十步岡君家茅屋此卜築白石叢抱青篔簹西接林薄南通塘低者出地髙出牆江南此物賤如草買種不費鍤與筐野生石迸小如指一夜風吹還尺強煙鉏雨櫛歲屢改舊葉換盡新梢長青苔白石淨如掃吳紵越羅生雪霜脫巾箕踞坐其下野叟林夫相與狂吹洞簫飛羽觴鳴玉琴舞霓裳隂風颯颯左右至耳熱不受秋山涼醉中恍惚無定所顛倒萬籟隨宫商忽如壯士入沙場鐵騎夜蹙隂山疆不聞鼓角動但見矛戟森開張忽如仙人來帝傍翠環金節聲鏘鏘不聞鸞鶴呌但見雲中雙鳳皇蛟龍起舞鬼陸梁復如扁舟渡瀟湘九疑山前鷓鴣泣二女聞之雙斷腸是時騷人醉半醒孤棹萬里回滄浪十年宦遊隔江海此興落落何由償深知良工心獨苦愛畫不減青琳琅往時王孟端近者夏太常二公之畫世所藏此物何為在君堂君心自有百鍊剛見此意氣俱飛揚烏臺退食宴佳客看竹不礙肩輿郎我當攜琴載雙鶴坐子林間青石牀錢唐江潮圗為喬少卿希大作錢唐江頭江倒流中有潮聲號萬牛堆銀如山雪如屋逺影滅沒當空浮千峰將頽樹欲秃海若服栗天吳愁來船歡欣勢自下瞬息千里無淹留去船乘危貴得正力盡一過且復休躋攀分寸偶失手頃刻下飽黿與鰌由來咫尺不自覺逺望不敢凝雙眸客來未到膽巳落借問同行還見不何人嬉笑欲起舞越東老翁搔白頭羣兒招呼或助呌倏忽過耳風颼飀達士遐觀得竒賞七澤五湖同一漚天道虛疑月盈缺世情妄假人恩讐復將險巧作戲劇鄉里少年誇善泅潮來潮去亦何意人間萬事良悠悠我時渡江不相值空對燕客談杭州壯懷髙興兩莫遂三十五年秋復秋誰將妙思入畫本似與造化爭雕鎪酒酣月落不知處夢醒尚作江南遊題湖山春晚圗湖船著水平無舵篷上使篙篷下坐山光四面錦屏開橋影中天彩虹卧輕鴉拂樹還千點老鶴呌空時一箇宴客遙將綺席隨遊人不惜青鞋破江南風物今餘幾看畫題詩兩無那却恐湖山畫不如他年自買扁舟過子昂畫馬卷翰林學士真天人平生書畫皆通神自言少小嗜毫素寸紙遍作雲煙䀶老來意態盡物理畫馬欲過曹將軍此圗似出西域種骨法權竒氣軒聳將身蹴地局不前矯首見人驚欲踊燕家死馬猶堪賣況此風神解飛動在野須教一顧空登臺未覺千金重崔郎愛畫復好竒向來得此信且疑為渠指點是真迹老我聰明非昔時圗窮忽見銀鈎筆復訝驪珠海中出江南贋本今巳多入眼自須分甲乙世人得者惟見一至寶逢時故難匹從此髙堂展玩頻明窗淨几無長日題許廷冕職方畫路轉循岡背橋回傍水根幽人不到處茅屋自成村浦樹經秋落山鍾向晚昏偶然一攜手相與倒芳樽太皇太后挽歌詞北郭車塵逺西陵樹色重地棲華表鶴雲逐鼎湖龍命使三時奠空山半夜鐘他時駿奔地冠佩想追從九日渡江秋風江口聽鳴榔逺客歸心正渺茫萬古乾坤此江水百年風日幾重陽煙中樹色浮瓜步城上山形繞建康直過真州更東下夜深燈火宿維揚胡忠安公挽詩四十韻文廟臨朝日英皇復辟年我公台鼎貴臣職始終全舊錫恩榮傍仍居侍從員皂櫜繁出入彤陛儼周旋擾擾羣疑會皇皇四牡篇路應窮地軸嵗屢變星躔公受密命巡視四方前後十有七年曉謁班留筍宵歸炬擁蓮至今天上語不遣外人傳少海驚波定金縢密疏虔論功同李泌辱命豈張騫南國非旁郡東僚亦左遷獻陵貽睿想宣室問遺賢典禮煩咨嶽為舟憶濟川廟廊資治理帷幄贊兵權討逆東平漢從征北過燕從容陳俎豆談笑却戈鋋仗鉞風塵際留司雨露邊兩曹兼掌握三少纍登延紫誥蛟龍織珍羞玳瑁筵篆分銀印細花簇錦袍鮮棨戟城西第桑麻海上田雲霄三接近優遇一時專緑野家山在丹心聖主憐挂冠雙鳳闕歸棹五湖船老子元知足陶朱不愛錢弟兄頭總白賓客戶常闐面受婁公唾身無董氏弦恩魚隨綱散馴犬上階眠公有犬當庭卧公出入必避之碑板尋常見醫方次第詮甕留京口釀瓶引惠山泉壽愷堂何愧忠安諡有焉相台秋正拆卿月夜虛圎異骨殊凡品前身本解禪公自言天池和尚後身浮生過九十空界出三千海內文章伯人間冨貴仙姓名兒女説簪笏子孫聮桃李當時盛葭莩後代連髙山嗟仰止先輩巳茫然日月居諸裏江湖涕淚前賦詩禆國史詎有筆如椽吉安府山勢西來斷江流北去平萬家深樹裏聞是吉州城見月野宿秋雲暝溪行曉霧寒歸心與明月夜夜到長安西園秋雨詠苔豈不愛佳客畏人踐我苔西園十日雨三徑不曽開慈恩寺水繞湖邊樹花垂石上藤長來寺前坐不識寺前僧嘉杭道中煙籠近浦沙白雨急長溪水渾一夜江頭潮滿釣船撑到柴門春園雜詩三月三日佳麗辰五十五年衰病身閉門一枕午時夢江草江花無數春長沙竹枝歌二首馬殷宫前江水流定王臺下暮雲收有井猶名賈太傅無人不祭李潭州江頭彩旗耀日明船上撾鼓不停聲湖南樂事君記取五月五日潭州城謝鐸一首鐸字鳴治天台人天順甲申進士選庶吉士授編修厯官南京國子祭酒移疾歸起為禮部右侍郎掌祭酒事卒贈禮部尚書諡文肅有桃溪淨稿李賓之云方石詩沈著堅定非口耳所到桃溪淺水難容棹繁花自作村分明幽絶地不是武陵源倪嶽一首嶽字舜咨由錢唐徙上元中天順甲申進士纍官太子少保吏部尚書贈少保諡文毅有青溪集新春感事烽火邊城鼓角悲黃沙漠漠北風吹關山逺隔雲中戍車馬新屯灞上師賈誼有才思報國杜陵多病尚憂時侍臣誰有如椽筆擬撰燕然第二碑劉大夏一首大夏字時雍華容人天順甲申進士選庶吉士改兵部郎中厯官右都御史總督兩廣拜兵部尚書卒贈太保諡忠宣有東山集詩話忠宣謀猷是經王室倚賴李景文東山草堂歌九重移榻數吕見夾城日髙未下殿英謀密語人不知左右微聞至尊羡明良景象百世猶起遐思送别離筵酒盡淚霑衣别後憑誰問是非午夜夢回明月在天南天北共清輝姚綬七首綬字公綬嘉善人天順甲申進士授監察御史謫知永寧縣告歸有榖菴集詩話吾鄉丹丘先生成化中以侍御謫知永寧縣集中永寧有感簡周縣諭詩云孤臣漂泊萬山中家住鴛鴦湖水東為縣底須論地僻謫居應不笑文窮五株栁樹無端緑一點榴花作意紅百八灘頭船可買思蓴何必待秋風遂以母老辭歸今府縣志但云出知永寧而近人選詩集加一府字誤矣吉安秩官表可稽也先生初號榖菴居大雲寺之東亦號雲東逸史又自稱蘭臺逸史天田老農上清仙吏懶仙仙癡紫霞碧月翁家有振衣亭出乘滄江虹月之舟粉窗翠幕吹竹彈絲望者以為水仙畫書詩皆逸品户部郎江隂卞榮贈詩云西崦新為墅東橋近在坰太常卿同郡吕常贈詩云兩屐登山輕上下一橋分宅作東西尚書烏程閔圭贈詩云松徑掃雲招野鶴畫船搖月貫晴虹皆實録也先生吟情甚敏今榖菴集所載不及什一吾宗寒中上舍購得先生七律多至二百餘乂從書畫家儲藏真迹所見尤不少念遺集為先生手定故集外詩不多録云前有尊酒行前有一尊酒俎豆亦共之青春未晚日桃李花開時且歡娛無刺促尊若空酒再續有所思我思不在天上虎豹之九關我思不在海上三神山山芩芃芃繞晴麓隰榛翳翳沿清灣朝煙散兮雙鶴外夕月落兮斷猿間跂豫望之心孔殷奈何可望不可攀吁嗟西方美人兮何日還飛龍引龍不可騎帝騎之鼎湖一去無還時髯拔墮弓五雲裏小臣空抱烏號悲飛龍飛龍何不載帝還宛移天宫之樂來人間勾漏朱砂錬作丹俾我人人竊服亦得永保冰玉顔望龍仰天歌此曲君不見龍來復溪居水暖鵁鶄浴花香蛺蝶飛青絲聊繫酒白苧巳成衣溪闊容蘭槳林深著板扉留賓將薄暮猶待釣魚歸湖上雜言桃李漫山白間紅繞湖樓閣晚煙中客船慣向灣頭泊不畏波濤夜半風追次張伯雨韻春暮雨晴池水添夜深池面漾新蟾刺桐花影毿毿動不省虗亭是隔簾贈曹竹西畫并題白下追遊記昔年青山如畫樹如煙郭家歌舞楊家酒一度尋思一悵然張泰一首泰字亨甫太倉人天順甲申進士選庶吉士授檢討遷修撰有滄洲集李賓之云先生詩縱手迅筆衆莫能及及其凝神注思窮深騖逺一字一句寧闕然而不茍用晚乃益為沈著髙簡之辭而盡斂其峭拔奔洶之勢蓋將極于古人而不意其遽止也為唐元薦云成𢎞間藝苑則以李懷麓張滄洲赤幟而和之者或流于率易遊江詞仙人天上好樓居門外離離種白榆一曲洞簫吹向月夜深驚起海中烏倪輔一首輔字良弼平湖人天順甲申進士厯官湖廣參政有類劇藏稿題竹送昌世僉憲四川春明門外斷秋風夢隔煙花紫禁中何處竹枝傳别調子規殘月在巴東陳音一首音字師召莆田人天順甲申進士官至太常寺卿有愧齋集重九會白雲觀分韻得然字長春宫觀鎖寒煙駐馬斜陽老樹邊白鶴不歸雲影外黃花仍放酒杯前空餘談馬王劉像莫辨龍蛇虎兔年燕子蹉跎重九至西風落帽一凄然沈棨一首棨字元節平湖人天順甲申進士厯貴州參政有頤貞集再遊清溪再發扁舟興兹遊不厭重溪山元有約昆弟且相從北渚水銜月南臯雲在松誰云秋意晚猶及采芙蓉閔圭一首圭字朝英烏程人天順甲申進士纍官少保兼太子太保刑部尚書贈太保諡莊懿有集題玩芳亭羣芳掩映草亭虛知是元龍舊日居滿地緑隂新雨後一簾香霧午風初屏開屈戍春無際人倚闌干畫不如容我數來間坐久愛臨流水看芙蕖明詩綜卷二十六
