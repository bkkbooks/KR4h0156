body:
  text: 明詩綜卷五十三翰林院檢討朱彞尊編徐獻忠一首獻忠字伯臣松江華亭人嘉靖乙酉舉人知奉化縣及卒友人私諡曰貞憲先生有長谷集靜志居詩話長谷以作者自期持論謂詩人之作代出意匠以增前人之能旨哉言也其比六朝聲偶品唐詩原樂府皆有功後學惜其書不盛行詩亦沖淡無纍句特少警拔耳俞氏水樓故人江樓月照見千里心遊子未言歸清光被滿襟西陵隱簷際南湖澄夕隂持杯向木末捲幔對遙岑悵然不能去徒令江水深沈爚一首爚字世明一字伯逺嘉善人嘉靖乙酉舉人有石聫遺稿送顧梧石之衡州瀟江路轉千峰碧冉冉蒼雲拂樹低此去臨風憶回首月明江上鷓鴣啼顧聞二首聞字行之吳縣人嘉靖戊子舉人自號九嵕山人嶽東伯云九嵕才華瑋麗鋪敘豐長究其所歸靡不有自至於染翰人稱其能並美者矣折楊栁芳草接金隄垂楊緑更齊夕絮離天逺春絲别霧迷曲中青鏡改愁畔紫騮嘶紅樓歎少婦腸斷玉關西夜泊崔鎮聞笛雲落清河夜天橫片月涼江樓莫吹笛明日是山陽孫宜十首宜字仲可華容人嘉靖戊子舉人有洞庭漁人集顧玄言云漁人新聲竒調在李唐二孟之間河嶽隱淪之敻秀者詩話洞庭漁人胡氏詩藪稱其學杜然實源於大李故論詩絶句云我愛風流太白豪萬言珠玉在揮毫特其運筆癡重斯與謫仙人不類耳其於空同大復少谷太初迪功西原皆其所取法滔滔莽莽下筆不休亦楚産之傑出者十三夜月良晤既匪易佳節亦復過今夕非昨夕光景忽已多霏霏失玄霧灩灩增金波昔眄猶室隅兹升眇庭柯當扉萬象啓側戶三星羅蕭爽候愈寂沈冥夜如何興言恱至賞眷此成清歌十四夜月循環乃常度盈昃亦至理幾望已在兹持盈有深旨天運恆自然人事安足恃未滿溢漸形欲盛衰伊始倚伏本貞機損益妙良軌志以道自虛情緣欲斯侈守義焉所窮法乾信云美送周氏黃河逾東逝白日淹西沈人生不滿百奈此世慮侵貧賤豈得渝富貴安可欽浮榮竟杳漠要路恆﨑嶔邵侯恱瓜田陶令謝華簪達觀信有及古道良足針得喪匪人為憂樂由我心願言返初服聆我山水音茭港結軫倦久疴嚴裝理前遊山行稍云疲水宿良所由弭棹臨别浦揚舲逝安流波回路曲折雲霽天沈浮霜荻響近渚風篠鳴長洲沙翔去來鶩岸並連拳鷗澤蘭晚漸垂江茝秋始柔遵嶼乍離合凌飇屢優遊擊楫情已乖乘桴興將侔即此締􅉨盟抽詞贈同舟行視别業禾稼作徇祿返塵軌卧疴遂幽坰為圃竟不習學稼鮮所明薄田委僮僕懶性謝經營春陽始云改夏序亦以征輟翰越城棲振衣事郊行既暢景物麗復感禾黍盈雲葉被畛秀風花覆阡平修渠逐細流佳實播初馨堅好類周穡耗蠧殊魯螟利婦足遺穗築場喜新晴澤忝我私及秋荷今嵗成粗糲甘自嘗飽暖奚更營且免洛陽歎聊結杜曲盟王生入山謝事戲簡疾風吹雲暗江縣東城之雷北城電城中一雨絶可憐十日不見王生面昨當折簡傳深意咫尺山城爾須至揚雄草玄亦避人矦葩載酒曽多事秋日歌二首秋風忽吹洞庭草萬壑千崖覺秋早江邊白石回波濤湖上蒼雲亂昏曉少年日月易搖落即目繁華已枯稿人事天事合併催風塵何必長安道秋風淅淅吹茅屋東流之水西日速地連南極北極雲葉落千山萬山木江上漁人罷釣歸臨風拋擲緑荷衣黃塵碧海真漂泊白石滄波誰是非同諸友遊郭曲地勝因湖得堂幽對野開晚風吹笛起秋水抱城回溪友留魚去鄰翁送酒來為言九日近引客試登臺十三夜月柬謝子今夕江樓月能添昨夜明苑雲寒自斂城角霽尤清露警花間鶴風微樹杪螢百壺髙興在端坐待君傾陳津五首津字道通長洲人嘉靖戊子舉人仕至兵部職方郎中有莪齋集詠史貧賤希富貴富貴履危機赫赫丹徒子當樞思布衣五鼎有覆餗一瓢堪樂飢可知東門犬不若西山薇火烈飛蛾集泉深鯉魚肥胡為即顛越而不鑒於微不見成連子千載揚音徽怨詞明妃絶世姿少長君王側一忤丹青人咫尺成離隔何況窮居士欲望君王識石山驛四野動力作荷鋤紛出村開塍望新沃喜見前山昏嵐氣藹林杪春風搖草根丘中有來信燕子入衡門螢分將光自照肯擬暗中投寂厯依書幌分明點客舟露涼深映竹風定直衝樓不恨飄零晚終隨大火流陸冰修云五六清警燕子磯燕子何年集釣磯春氣不見舊烏衣空餘芳草迷前浦長自寒潮送落暉刺眼野桃臨岸發多情山鳥傍人飛獨慚白髮紅塵客此日披襟對翠微鄧遷一首遷閩縣人嘉靖戊子舉人官嘉興通判感秋白露下亭皋涼風吹綺陌一夕芙蓉花紅芳變瑶碧包桐一首桐字子同號同谷鄞縣人嘉靖戊子舉人官知縣送屠秋官國望復任留都寒江渺渺煙霞開揚舲西指鳳凰臺大夫十年不得調風塵千里胡為哉銜杯欲别别最苦拔劒當歌歌莫哀璧水貫城當咫尺相逢還許坐莓苔黃省曽一首省曽字勉之吳縣人嘉靖辛卯舉人有五嶽山人集皇甫子循云勉之思劇沈幽語罕仍襲宿搆非工食時為敏徐紹卿云勉之才藻富捷篤尚深華夜徐子元云勉之詩宗六朝如空江月明獨鶴警王元美云黃勉之如假山池雖爾華整大費人力家穆敬甫云山人從空同遊刻意為詩遂成一嶽東伯云五嶽遊覽之餘操觚靡倦剪剔綺繡咀嚼瓊英每篇輟筆粲然警目詩話勉之詩品太庸沙礫盈前無金可揀當時從遊李何漫無師資之益反不若方山泭溪二賈人子尚有秀句可采也江南曲旖旎緑楊樓儂傍秦淮住朝朝見潮生暮暮見潮去史元中一首元中號鹿泉鄞縣人嘉靖辛卯舉人魚臺知縣有青蓮集詩話鹿泉知魚臺縣事值嵗大祲盜賊起有簡瑞者為盜魁善運矟馳馬出沒官道鹿泉以計縛之簡卧庭下瞪目曰吾左手持矟右短兵橫行千里間今為書生掩取天也公笑曰汝輕書生耶即起著短衣持其所用稍運之左右回旋如舞匹練忽矟斷為三擲示簡曰汝矟豈足用耶簡叩頭稱死罪乃繫之獄至冬月將論決簡求見公曰身亦山東男子不敢負公乞假十日一生别老母公即縱之去衆皆懼及期先一日簡就獄離魚臺三十里為獨山大盜劉儀久嘯聚其中有衆數千開府曽公銑議進剿以公為前鋒既擇日陳兵禡祭畢公知獨山有謀者在軍乃命植一竿百步外公手挾矢誓曰某以書生任將兵若一舉滅賊當三矢中此竿時萬目齊注監司請將俱色變公從容三發三中呼譟震地是日公即察得諜者三人釋其縛賜以美酒食笑謂曰汝來觀吾射耶諜者股栗盡吐賊虛實及所入獨山徑道公立提兵襲其寨擒劉儀還曽公大喜方論薦公會曽公遷制三邊尋為相嵩所害赴市鹿泉歎曰事尚可為耶即日挂冠歸里時年四十二家居復四十年守令思一造見不可得老益貧惟賣文以自給云秋思世事吟邊改流光醉裏過嵗收頻下下公賦益多多有暇窮漁獵無憂隱薜蘿康衢終見及擊壤續堯歌林垠一首垠字天宇閩縣人嘉靖辛卯舉人選授桂陽知州遷撫州同知終戶部貟外郎有野橋集拒馬河作拒馬河邊驛路長蜚狐口外又斜陽春光已過六十日不見花枝枉斷腸唐鉞一首鉞字君錫蘭溪人嘉靖辛卯舉人任揚州府同知升楚府左長史江行客計方歸越征橈更背吳風螢臨水亂江月向人孤洲已過迷子山行及望夫可憐清夜色強半在長途黃中三首中字文卿處州人蘭臺法鑒録作遂安人浙士登科考同嘉靖辛卯舉人授鉛山知縣擢貴州道御史出為山東按察副使有南窗紀寱集田叔禾云括蒼詩派倡自郁離子自郁離子殁作者無聞嘉靖中有黃西野出焉可當作者李時逺云副使為詩不泥法度不主故常沖融渾化意境兩忘識者謂其衆體皆備長相思二首妾夢一處所積雪滿空山覺來向人語道是玉門關萬里傳郎信開緘喜欲狂報得郎身健遲歸亦不妨久雨河東早秋風已涼況乃隂雨難禁當客子衝泥出門望蓬蒿滿徑如人長翻飛紫燕不妨濕婀娜黃花今漸香歸來獨酌對山色圓笠依然戴石郎強仕三首仕字甫登無錫人嘉靖辛卯舉人選授江西廣昌知縣遷知德州有考槃寤歌綺塍集咏向長子平謝纍辟雅志在隱居乏食或有饋取足反其餘讀易深自悟人世等蘧廬謂貧富不及謂賤貴不如敕言婚嫁畢家事無關余同好有禽生肆意相與娛五嶽遊躅遍髙風映簡書咏王霸儒仲有清節始亦赴徵命造廷抗髙辭不肯臣萬乘歸來事躬耕蓬藋掩門徑翩翩故人子相過容服盛一念兒曹羞客去卧不應賴有賢婦言不失初守正嘉遁遂終身清輝兩相映咏梁鴻伯鸞古賢人乃在杵臼間夫婦共守志逃名入深山凄涼五噫歌東出辭帝闤齊魯復荆吳長往遂不還為傭豈無勞顧已少外患終葬烈士旁髙風邈難攀劉成穆一首成穆一名嘉夀字玄倩又字文孫崇慶人嘉靖辛卯舉人有劉玄倩集朱秉器云玄倩詩文初不經意即席揮灑頗有佳者詩話孝亷過漢武帝陵詩云嵗暮霜殘過漢都武皇陵墓舊荒蕪不將玉匣藏天馬猶使金燈照野狐賦客詞園清露盡仙翁丹竈白雲孤千年惟有秋風曲渭水長流啼夜烏楊用修見而甚愛之然按其字句尚欠帖妥故置不録城南送友送汝歸南國燕山正早秋獨傷千里别同憶五陵遊漢殿相如賦吳江范蠡舟相思同易水日夜自悠悠髙應冕四首應冕字文中仁和人嘉靖甲午舉人官光州知州有光州詩選顧玄言云文仲材致清贍聲調遒拔平平寫出亦自沈淨江上行白日江上沒江雲滿滄洲鷗鳥各隨羣煙波何悠悠還將不繫心送君千里舟相思不相見極目令人愁同張玄洲胡圓洲王曉山張元洲項芳溪江樓觀潮分韻江聲秋益壯江草秋還歇夫差自亡吳子胥何怒越盤盤江上山盈盈江頭月此景亘千古不逐浮雲沒江村晚眺荒村沈夕照煙樹幾人家野渡迎潮急寒山帶月斜漁歸無逺市鴈下有平沙寂寂秋江晚芙蓉自落花渡湘江有感扁舟復何去五月下瀟湘遙望蒼梧迥還憐楚水長暮潮下野渡逺樹帶殘陽渺渺雲山外蒼茫隔故鄉陳芹三首芹字子野系出交南國王永樂中避黎氏之亂來奔遂家南京中嘉靖甲午舉人六試禮部不第謁選知奉新縣調簡得寧鄉之官九十日謝病歸結青溪社有陳子野集詩話近見有人序金陵社集詩云海宇承平陪京佳麗仕宦者誇為仙都遊談者指為樂土𢎞正之間顧華玉王欽佩以文章立墠陳大聲徐子仁以詞曲擅長江山妍淑士女清華才俊翕集風流𢎞長嘉靖中年朱子價何元朗為寓公金在衡盛仲交為地主皇甫子循黃淳父之流為旅人相與授簡分題徵歌選勝秦淮一曲煙水競其風華桃葉諸姬梅桞滋其妍翠此金陵之初盛也萬厯初年陳寧鄉芹解組石城卜居笛步置驆邀賔復修青溪之社於是在衡仲交以舊老而蒞盟幼千百穀以勝流而至止厥後軒車紛遝唱和頻煩雖詞章未􅈺大雅而盤遊無已太康此金陵之再盛也其後二十餘年閩人曹學佺能始回翔棘寺遊宴冶城賔朋過從名勝延眺縉紳則臧晉叔陳德逺為眉目布衣則吳非熊吳允兆栁陳父盛太古為領袖臺城懷古爰為憑弔之篇新亭送客亦有傷離之作筆墨橫飛篇帙騰涌此金陵之極盛也戊子中秋余以銀璫隙日采詩舊京得金陵社集詩一編蓋曹氏門客所撰集也嗟夫日中月滿物換星移舟壑夜趨飲獵旦改白門有烏無樹枝之可繞華表歸鶴悵城郭之併非撰文懷人吁其悲矣謂我何求亦無瞢焉覽其文者謂淋漓盡致盛衰今昔之感具於是矣然斯人考之未得其詳青溪社集倡自隆慶辛未而非萬厯初年也朱秉器停雲小志云青溪自後湖分流與秦淮合當桃葉淮清之間有邀笛步者晉王徽之邀桓伊吹笛處也陳明府芹即其地為閣焉俯瞰溪流頗有幽致嵗辛未費參軍懋謙約余為詩會其上於是地主則明府次則唐太學資賢姚典客浙胡民部世祥華廣文復初鍾參軍倬黃參軍喬棟周山人才甫盛貢士時泰任參軍夢榛先後遊而未入會者則張太學獻翼金山人鸞黃山人孔昭梅文學鼎祚莫山人公逺王山人寅黃進士雲龍夏山人曰瑚紀亳州振東陳將軍經翰汪山人顯節汪文學道貫道會沈太史懋學程文學應魁周文學時復癸酉復為續會則吳文學子玉魏廣文學禮莫貢士是龍邵太學應魁張文學文柱每月為集遇景命題即席分韻同心投分樂志忘形間事校評期臻雅道前會録詩若干刻之命曰青溪社稿許石城先生敘其首續會録詩若干吳瑞穀序之會余領渝郡符任參軍入興都稿遂散逸後方民部沆葉山人之芳入焉余馳書社中期稍收輯無何胡民部費參軍以詿誤謫黃參軍以領郡行已方戶部亦因事出盛會不常良朋星散回首江東雲樹在望秦淮煙月黯爾銷魂因記舊遊略次其姓氏篇什如左按此青溪社集之本末始備序者止覩曹氏門客撰本而未見秉器小志故也折欄會和周銀臺韻新嵗詩家集深更興未闌共憐今夜月仍似去年看社主歡投轄車徒怨折欄綵梅紅對酒忘却外邊寒秦淮煙月秦淮煙暝水長流明月空懸萬古愁春去秋來風景别鳴箏夜夜酒家樓聞笛有懷朱比部空林寂寞雨絲絲折得梅花未滿枝正值鄰家夜吹笛倚闌無限故人思王礦二首礦字公范閩縣人嘉靖甲午舉人官思明府同知有冶山拙稿送太行謝驛梅使琉球使節分星象仙舟捧御函絲綸宣海嶽天地極東南服荷殊宣賜才推絶域堪逺人胥樂附異俗乃能諳父老相如檄詩書陸賈談徵牢宵踰十館穀日過三牛馬風何隔金銀氣不貪兩階遐格舜九扈乍聞郯専對名非忝周咨迹豈慚歸航應載石赴闕及傳柑國體從兹振兵威不自戡梅花洋信近延佇慰朋簪青魚灘青魚灘上野人家曲徑疏籬長物華漠漠午煙吹不散鷓鴣飛出木棉花薛欽二首欽字寅甫懷安人嘉靖甲午舉人太平儒學教諭有東山集詩話薛君詩頗清越近於皆山樵者曹能始序徐惟和詩云閩自林繕部後百餘年而得鄭考功又數十年而得薛博士其推重若是句容道中望茅山崒嵂盤江甸遙天紫翠分風塵應不到鸞鶴自為羣曉徑連青靄秋山遍白雲可憐句曲望不見華陽君雞鳴寺古寺浮仙嶂層甍近帝家洞香流石乳僧午飯胡麻金剎盤飛鶴丹池聚浴鴉俄聞孤磬發蕭颯滿煙霞郁蘭一首蘭字文芳秀水人嘉靖甲午舉人官南京刑部主事有比部稿詩話嘉靖倭亂胡總制宗憲有捍患功及被逮繫陽川時知績溪縣事力覆護之至以去就爭願上印綬始得免羅織可謂長者今鄉曲之士知其名者寡矣矧詩乎讀五代史天地沈冥際山河戰伐中可憐長樂老只是愛三公吳節一首節字子甘江隂人嘉靖甲午舉人任江西新昌知縣登仙阜亭仙阜孤亭敞憑髙發興新風帆斜入浦雲樹曲通津丹井迷芳草清池覆緑蘋月明歸去近涼影忽隨人陳紹文一首紹文南海人嘉靖丁酉舉人官通判幾日南巡詔旋看下九霄五花邊將馬七葉禁臣貂帝子馳金輅神人駕石橋康衢應有頌誰為采風謡吳旦一首旦字而待南海人嘉靖丁酉舉人謁選為知州有蘭皋集詩話蘭皋南園後五先生之一也惜其集不傳秋夕城闉納涼同遊冠蓋晚相招澤國山川正泬寥官閣迥臨秦代壘女牆斜帶越江潮流螢草細風先動繞鵲枝長露易飄多少髙樓人不寐碧天涼月夜吹簫蔡宗堯宗堯臨海人自號東郭子嘉靖丁酉舉人選授松陵教諭有龜陵集麗情曲曲房過雨蕙徑空緑雲藹藹懷春風欹枕牙床睡初醒胭脂汗濕羅衣紅鴛鴦牽繡絲未歇流蘇夜暖斜明月珠簾半卷春日髙海棠飛起雙蝴蝶鍾廣漢云八義遺響方效一首效字去病桐城人嘉靖丁酉舉人有石洲集歸途大龍之嶺髙插天石塘湖邊秋可憐稻花菊花裛寒露逺壑近壑屯晴煙江聲激壯自今古峽徑縈紆還嵗年悠然獨馬渡河去日暮滄洲停客船郭文涓二首文涓字稚源古田人嘉靖丁酉舉人官保寧同知有享帚集遊西山緬維京國遊夙憶西山勝前期戒朋儕昧爽理征鐙連鑣出都門散轡遵郊徑夷猶望晴巒迢遞陟煙磴蒼茫紫翠分參差金碧映雲際鬱層甍風中發孤磬山光足怡愈池色湛清瀅覺花粲竒馨慧草紛延亘梵影空中懸經聲榻前聽行恐苔痕穿嘯聞谷響應翠巘屢攀躋朱闌恆眺憑取適情易酬息機意初稱登臨愜賞懷攬結動幽興聊兹却喧囂庶以慰蹭蹬夜懷疏燈孤館寂落木萬山空夜色誰家月秋聲何樹風鄉園歸鴈外身世轉蓬中祗益離羣意凄然思不窮劉熠一首熠字元麗號東沙海鹽人嘉靖庚子舉人官監察御史有同春堂遺稿山中風雨春來風雨倍凄凄咫尺雲峰萬木迷竈下濕煙離突起庭前幽草上階齊夢來旅況殊鄉國聽去江城盡鼓鼙縱擬單車待明發子規聲已遍前溪方興邦一首興邦字懋翼莆田人嘉靖庚子舉人官至廣西參議有矞村集得子相書尺素中宵慰索居美人南國意何如江淮殺氣昏牛斗豺虎烽煙蹙羽書天入蒹葭孤鴈盡秋來風雨五陵疏朱門鳴瑟誰知已莫漫逢人賦子虛許邦才五首邦才字殿卿厯城人嘉靖癸卯舉省試第一任永寧知州遷德府長史有海右梁園二集魯藩中立云空石詩倣于鱗而氣格不逮然于鱗詩多客氣而空石溫厚或過之謝茂秦云殿卿軒軒豪舉傍若無人殊宋轅文云于鱗亟稱殿卿其梁園集不稱絶句差快意詩話殿卿如鋭頭年少騁獵平原耳後生風鼻頭出火長歌有云長卿慕人千載前何似與君俱少年子雲慕人千載後何似與君俱白首爽氣殊倫令張正言為之不過此也王元美贈詩云是時厯下李攀龍往往道汝文章伯乃巵言評詩竟不之及又夷之四十子之列取舍似未公也寄懷元美鴻鴈驚秋海上還片雲孤月薊門關如何昨夜西窗夢不道千山與萬山送髙都護入賀將軍白馬插雕弧自傍屬車誇射烏陛下聖明三萬嵗微臣直至執金吾送謝中丞歸射洪二首六月江干冰雪涼射洪美酒鬱金香自從笻竹通西夏漢使年年出夜郎巫峽江陵一水分猿聲兩岸夜成羣遙知月下孤臣淚才過三聲不可聞留别劉公秋風長鋏幸生還明日孤臣入楚關莫道三年人萬里天涯消得幾重山韓詩二首詩字承志長洲人嘉靖癸卯舉人知永豐縣遷雷州府同知有勗齋詩集小齋即事小齋寂厯似山居池上逍遙與世疏盡日不通門客刺經春懶報故人書捎簷細竹含風響繞榻輕雲過水虛願得郡中無一事十年不調更何如戎來賔一首來賔先名國振字孔塘鄞縣人嘉靖癸卯舉人榜後更今名官南昌府通判郊居即事作吏才偏拙為園意頗深風塵元畏路山水是知音徑曲叢篁密堂虛淡月侵平生甘放浪自合蚤抽簪梁柱臣一首柱臣字彥國廣州順德人嘉靖丙午舉人官灤州知州入為刑部貟外有梁彥國存稿寄懷蘇雲谷逸士吾鄉隱君子質素古人風性豈琴書癖身將猿鶴同捲簾山閣暮䇿杖海雲空一别麻源谷相思桂樹叢陳所有一首所有字彥沖莆田人嘉靖丙午舉人合浦知縣草堂草堂在西林露頂避溽暑客來剝啄聲葛巾不知處孫樓一首樓字子虛嘗熟人嘉靖丙午舉人湖州推官有百川集郊西詩上苑春偏麗西郊更可憐輕塵花半妥斜陌栁初眠緑樹鶯聲外青山馬首前夕陽南北淀倣佛太湖田邵圭潔一首圭潔字伯如一字茂齊常熟人嘉靖已酉舉人有北虞集蘇臺竹枝詞魚尾晴霞片片明鴨頭新水半塘生平川蕩槳一十里深巷賣花三五聲黃尚質二首尚質號原闕餘姚人嘉靖己酉舉人知息縣事遷知景州有青園録再過半山堂春風重過半山堂依舊千峰入坐蒼更有好花明後院旋添新竹蔭虛廊畫圖想象摹雲谷詩句糢糊認雨牆却怪山禽似相識向余啼上卧龍岡采茶女結束烏椎髻攜筐去采茶歸逢鄰女笑也插杜鵑花葉春及八首春及字化甫歸善人嘉靖壬子舉人選授福清儒學教諭升惠安知縣遷興國知州轉鄖陽同知召為戶部郎中有綗齋集詩話歐陽永叔日本刀歌云徐福行時書未焚逸書百篇今尚存令嚴不許傳中國舉世無人識古文永叔雖有是言亦詩人托興而已故葉少藴馬翔仲均疑之鄭麟趾髙麗史宣宗八年五月李資義還自宋奏云帝聞吾國書籍多好本命館伴書所求書目録授之且曰雖有卷第不足者亦須傳寫附來目録首開百篇尚書而髙麗未之有也先是咸平中日本僧奝然以鄭康成注孝經來獻不言有尚書王惲中堂事紀載中統二年髙麗世子禃來朝宴於中書省問曰傳聞汝邦有古文尚書答曰與中國書不殊然則百篇尚書髙麗且無之兄日本乎萬厯初絅齋在郎署有命遣使臣封倭絅齋上言請多方索之以歸未免近於迂矣絅齋令惠安幾與姑臧萊蕪比潔有繡衣按郡經縣治騎從過盛將止宿焉絅齋前曰日未旰惠安小縣豈容駐節乎強之去強項甚矣及解組歸隱居羅浮之石洞吟咏自適雖以講學聞詩宗杜陵不墮程邵門戶飲陳巽卿宅即席賦得帝字黃公避秦皇子陵傲漢帝萬乘彼不榮五斗吾何利邇來脫桎梏麯蘖聊避世田父尚不辭況乃夙同志髙堂敞華筵上客縱橫至日暮飲未休舍坐還席地屢舞倩人扶歡言答賔戲因思劉參軍荷鍤有深意飛雲頂峰到飛雲絶晴看赤日沈露凝霜鬢白龍起二儀深積氣連吳楚啼猿自古今天門知不逺乘興欲登臨小砟石臺倚劒孤城暮登臨萬壑秋潮平沙岸失月落島煙浮白鹿通夷國黃雲滿戍樓南征斷消息橫吹不勝愁訪詹咫亭先生巢雲書院兼呈社中諸友二首巢雲髙不極飛閣倚雲開樹杪滄溟盡尊前紫翠來江湖雙涕淚天地此樓臺縱有終焉計能忘國士才惆悵出門去徘徊流水間菊花深復泛桂樹晚重攀返照孤城斂寒雲大壑還來朝羈物役清夢到柴關白雲洞口號二首洞晚雲隨入巖秋雨自飛莫愁霑野席猶得浣塵衣嵗月吾將老煙霞興不違昔年招隱處叢桂可同歸古洞何年闢長留宿白雲江山千里盡風雨半天聞芝术堪時往壺觴到夜分依依乘月去猿鶴惜離羣初春滕方伯支學憲招飲藥洲藥洲南漢離宮有池今名白蓮池畔有九曜石留客平原飲賢哉二大夫致身霄漢近傾蓋古今無冀北空良驥關西得舊儒偶然山澤叟今夕一尊俱張鳴鳳一首鳴鳳字羽王豐城人嘉靖壬子舉人選授府通判留别黃門周公清時落拓愧無能何事髙人獨見稱朝議遽寬重譴吏聖恩因借六安丞雲山曙色催行李秋渚離心醉采菱夢裏亦知雙闕路幾回深夜悵殘燈陳師一首師字思貞錢塘人嘉靖壬子舉人有復生子稿潞河舟中作夾岸垂楊青可憐出門仍是葛衣天鄉書不到東吳鴈客夢重尋潞水船季子貂裘重那敝王喬鳬舄幾時旋年來作客渾南北囊底曽無貰酒錢吳景明一首景明字復陽休寧人嘉靖壬子舉人知州有西洲集赴西州任道中即事灘險飛流急林深毒霧遮溪行朝避蜮山宿夜妨蛇屋匝桄榔樹籬編茉梨花從知邊徼地風土異中華姚光虞一首光虞南海人嘉靖乙卯舉人官至知府送周國雍守順慶使君千騎擁朱幡此去誰云蜀道難列都分符虞嶽牧前驅負弩漢衣冠湓城月色揚舲渡巫峽濤聲倚劒看行矣外臺今不薄循良卿相滿長安鄧元錫六首元錫字汝極建昌新城人嘉靖乙卯舉人徵授翰林院待詔學者私諡文統先生有潛學稿擬古人皆願延年延年欲奚為一夕復一夕忽與百嵗期誰能繫西日長挂扶桑枝羣流赴巨壑寧復有還時劉安將雞犬八公徒愕貽秦皇與漢武但為方士嗤雜言别傅陳二友羲娥無停轂青陽忽朱明柔條奮翹柯原隰何青青往者日以徂來者日以榮嗟余至寡劣希聖徒有營邁往信不力逾覺時序傾我身所以立豈不恃友生奈何同心侶中道各有程戚戚增紆思薄言寄深情古詩送王子仁噓物寧非風風徑物乃戕駕車寧非馬馬疾車以僵百獸伏騶虞衆禽景鸞凰豈無鷹隼姿搏鷙難為良别江子良農程嵗功豐凶非所諳良賈經儲積利鈍皆所甘曽以水旱故棄捐任與負曽以貿易薄棄捐絲與布十年經世業料理亦有素奈何乘軿輈中逵思改騖人生各有職治職各以勤永誦蟋蟀篇愾然念先民初夏登眺天峰江城開宿雨孤嶠共躋攀龍氣留蒼壁鶯聲響碧灣危峰斜帶郭幽徑曲盤山不淺東林興迢遙未忍還途中雜詩河水走平土都邑何逼側君莫問河防河防無上䇿周式南一首式南字仲翰吳江人嘉靖戊午舉人以孫宗建貴贈太僕寺卿萬松巖為愛山幽選勝來城南絶巘翠屏開澗邊黃葉自秋色門外落花空古臺松影半分禪榻靜潮聲一道海門回聖朝欣覩平夷頌欲賦長楊愧不才劉魁一首魁字煥吾泰和人由舉人選授寶慶通判移知鈞州遷潮州府同知入為工部貟外郎諫徙雷壇廷杖繫詔獄者再以宮禁火赦還有晴川集詩話永陵好道詔徙雷壇於禁中曰雷霆洪應之殿有壇有城有轟雷軒有嘯風噓雪靈雨耀電之室有清一齋有寶淵門有靈安精馨輔國演妙之堂有八聖居有馭仙次各懸以額又别建凝道雷軒帝晝日常御之其始作也晴川疏請停止帝怒豫杖繫獄與楊伯修周順之講學囹圄中是年八月西苑神降于乩請宥三臣乃得釋俄復逮繫明年宮禁火放還晴川陽明弟子也郡人鄒公元標合三人詩刋之題曰三忠文選過德州次納溪韻寄斛山才過滄州又德州緑楊堤岸菊花秋未論秦楚萬餘里且共風波一葉舟農圃漁樵俱是侶江湖廊廟敢忘憂獨憐腰腳差還健有約同登華嶽遊張燾四首燾字水波南昌人由舉人仕至府同知有崇古堂稿先鋒樓噫咦哉延城之山髙兮天際頭況此城上更架百尺先鋒樓登樓一望覽無際但見萬里蜃氣滚滚直與蒼天浮三峰九溪不暇數時有倭雲刺日出沒亂我雙吟眸憶昔使君提兵駐此地雄據八郡當襟喉生靈百萬賴保障勞集不讓髙密侯爾來兵力日綿薄肉食誰為天王謀向來鄰郊有小警遂使五嶺欲撼杉關愁噫咦哉粵山如昨粵水流壯士一去天悠悠東南猺獞尚可語西北烽煙誠足憂去年北兵下井陘遂使烽火通幽州令人拊髀歎不已投筆每為班生羞安得使君溪前仗劒起直走塞下一鼓甲士皆貔貅漠南河西羌種盡擊滅從此玉門遣戍空防秋秋思二首本朝宣大屹秦關北轉河戎部落間魏闕頻看優詔下玉門誰唱凱歌還黃沙鼓角野狐嶺白日羊駝天馬山節鉞不來楊石逺蚤秋烽火照愁顔中原舊服緣河套百戰翻成縮內邊空使健兒遺白骨不聞中帥給青錢六騾徑入榆林寨衆鴿橫飛好水川安得征西班節使坐收氐海淨狼煙康山忠臣廟髙王卷甲南征日掃蕩亡陳向此洲焚炬未應誇勝算覆巢原已畫先籌江東父老空憐楚垓下山河盡屬劉寂寞康山湖上廟至今煙雨不堪秋李蔭一首蔭字襲美內鄉人官刑部主事有五遊集雪霽登雲門山晴雲落澗春水鳴好風吹人衣袂輕有山如此不一醉啼鳥可憐空數聲碧石崔嵬跨絶壑白雲爛漫連孤城楚客興來每獨往浩歌不減升天行張邦伊一首邦伊字孺覺鄞縣人以父時徹廕仕至陜西苑馬少卿沈嘉則有三楚之遊席上得分字春城斗酒惜離羣把袂髙歌到夕曛地入衡廬三楚盡天回襄漢九江分停舟夜聽湘靈瑟倚閣朝搴鄂渚雲知爾尚平家纍淺逢人勝事好相聞仲春龍一首春龍字原仁秀水人以太學生選授文淵閣中書舍人有九山樵子集少年行鏤金鞍子百花裝三尺流虹飲血光白日報仇官市上青春調笑酒壚傍潘緯一首緯字仲文一字象安歙縣人入資為武英殿中書有養疴遊淮園居諸集王仲房云仲文年少攻詩不甘常調雖羽翼方翔而風力厚負閶門尋周公瑕王和仲所居不得閶門九陌通車馬往來逢入郭尋舊識望閭迷舊蹤空停秋江棹漫聽寒山鐘相隔城闉裏煙雲凡幾重項元淇一首元淇字子瞻秀水人光祿署丞有少嶽山人集皇甫子循云子瞻古選沖逸五言典雅七言清婉同陳白陽登閣月宇臨清桂星筵拂絳河已投車轄飲兼倒接㒿歌砧杵催秋急風煙向晚多春波門外路乘興數經過周錫三首錫字子純太倉人嘉靖中以薦授潮州府通判有南遊東山蒹葭得已諸集詩話子純下筆不休間有合作相傳攝潮陽縣印巨冦楊三總林大帥率黨千人駕三十艘壓境警報踵至子純徐曰鼠輩爾胡能為衆皆懼子純挾弓矢上馬引滿射三發三中的桴鼓應之擊走三總擒大帥以歸縣境以寧洵豪士也海豐道中長夏苦于役炎風吹鼓鼙山深榕子落雨急鷓鴣啼野渡從流下斜陽在竹西極知行路險愁殺嶺雲低茅屋茅屋自成趣况丁離亂中敲冰兩孺子曝背一衰翁客至村醪薄樵歸樹葉空三江十萬戶安樂幾人同吳門夜泊谷口揚帆風正急野亭雲木雨霏霏晚來城郭維舟穩老去湖山見面稀十里煙光開疊嶂兩崖樓閣帶斜暉夜深欲傍寒山寺依舊鐘聲落翠微吳承恩七首承恩字汝忠淮安山陽人長興縣丞有射陽先生存稿陳玉叔云汝忠緣情體物其辭微而顯其旨博而深淮自張文潛以後一人而已按李本寧云汝忠與徐子與最善往還倡和今其集獨不類七子率自胸臆出之以彼其才僅為縣丞以老一意獨行無所扳援附麗豈不賢於人哉詩話汝忠論詩謂近時學者徒欲謝朝華之已披而不知潄六藝之芳潤縱詩溢縹囊難矣故其所作習氣悉除一時殆鮮其匹對月人言天上月中有姮娥居孤棲誰與共顧兔銀蟾蜍冰輪不載土桂樹無根株紛紛黃金粟嵗嵗何由舒一閉千萬年玉顔近何如相違不咫尺照我闌干隅一杯勸爾酒為我留須臾富貴曲效溫飛卿體燒燭迷妝閣春旗隔步廊兩眉京兆畫三日令君香裙窄芙蓉衩叉危翡翠梁羡他雙海燕先占鬱金堂楊栁青村旗誇酒蓮花白津鼓開帆楊栁青壯嵗驚心頻客路故鄉回首幾長亭春深水漲嘉魚味海近風多健鶴翎誰向髙樓橫玉笛落梅愁絶醉中聽田園即事大溪小溪雨已過前村後村花欲迷老翁打鼓保社裏野客䇿杖官橋西黃鸝紫燕聲上下短栁長桑光陸離山城春酒緑如染三百青錢誰為攜秋夕竹火煎茶寺菱歌載酒航人間秋夕好第一是錢唐柬未齋陶師牀頭社甕鵝兒熟江口春船石首來欲就吾師謀一醉講壇何日杏花開勾曲紫雲朵朵象芙蓉直上青天度逺峰知是茅君騎虎過石壇風亞萬株松曹大同一首大同字子貞南直𨽻通州人由嵗貢生授光祿寺署丞有玉芝樓集秋日田居屏居謝人徒朔風吹寒雨逺樹既盤紆泄雲亦交互愁鴟戀故林隱豹諳長霧羃厯川光昏蒼茫野火聚耳目暫無擾間情託豪素拙訥罷干時賞心於此遇飛光忽我遒咄咄嵗云暮眷言採三秀頽齡儻能駐遊仙有道百靈初無名萬物始九氣煉中和三元謝甲子化升隨感遷清越徹表裏玄圃御斑麟丹丘乘赤鯉左拍浮丘肩右躡羡門趾山成數寸塵海無三尺水長嘯宇宙外超然得不死張循占一首循占字元易蒲州人官光祿署正有嘉樹齋稿軍城秋夜寂寞軍城暮浮雲暗斗杓戍樓人未散絶塞馬仍驕夜雨千門冷秋風萬木凋籌邊王相國金甲未應銷錢元鼎一首元鼎字實夫桐城人鴻臚寺丞偶出卧榻淹三伏肩輿出早秋青溪通小市香稻滿平疇有約過鄰舍忘機對水鷗已成迂懶性身外更何求沈堯龍一首堯龍字易之湖州人由貢生官鹽運司有列藝集丙寅誕日年來蹤迹逐風塵忽感懸弧笑此身白髮有時還到我青山何處不容人漢家鹽鐵錙銖重楚國旌旗日夜新且與蘋洲亭上客一竿春水共垂綸魏學禮一首學禮字季朗長洲人以嵗貢選鎮江訓導擢國子學正升廣平同知時與劉鳳齊名合刻詩曰比玉集李時逺云季朗辭鋒甚鋭當勝子威一籌昭君怨翠袖辭金殿青苔閟紫宮香寒羅帳曉春盡玉階空明月琵琶曲驚塵朔漠風一作豔態消衣上悲情落管中君恩原未薄妾夢向來同贈黎仲子伊人結客少年場芳草長亭正夕陽忽見雙魚來萬里始知尺素下三湘布衣然諾輕朱建冠蓋縱橫憶鄭莊郢曲自來多白雪遲君早晚賦長楊孟思一首思濬縣人通判有龍川集秋夜期友不至西風散秋聲搖我庭間樹月寒草露光山靜星河曙林鳥相向啼昆蟲紛若語美人期不來幽客徒凝佇周沛三首沛字允大紹興山隂人有浮峰集詩話周氏宗譜不言允大登仕籍而徐文長集有哀周鄭州沛二詩别顧孝常馬離鳴故羣人去懷心知憶昔遘君始意氣如連枝如何倐離别旦夕殊歡悲滔滔斯世士孰與吾心期言念古之人同心不同時同時復睽隔何用同時為冬日滯霪迫冬日山川掩重岡引領望郊邑逺樹鬱蒼蒼浮雲馳白晝迅風激衣裳中野少逢人乃見鳴鴈翔我有一束書因之以逺將其多至萬言其音悲且傷終以重見辭翩翩各一方攬涕下長坂躊躇不能忘紅羅女山東之賊紅羅女用兵迅疾如風雨白蓮授術成妖精能令照鏡生公卿海內承平日已久乍見干戈皆却走馳驅費盡中丞心羽書未報收刁斗紅羅女爾非男子身蛾眉粉黛當青春跨馬彎弓無可樂何用風塵來殺人山間小民飢餓苦日辦官需夜猛虎貧賤那堪更亂離慎勿橫行到吾土張之象二首之象字月鹿一字玄超松江華亭人以太學生入資選授浙江布政司經厯有剪綵翔鴻聽鶯避暑題橋猗蘭擊轅佩劒林栖隱仙秀林新草諸集莫子良云玄超詩爾雅沖淡興寄寥逺春日遊燕子磯古稱秉燭遊行樂恐逮暮䇿駕尋名山居然得真趣展宇開霽旭熙陽斂昏霧雲錦被竒峰水鏡含芳樹眷兹風日佳開觴藉蘭杜頗懷披襟友諸美難具晤流鶯稍出谷飛花已盈路暢哉人境外屏迹遺世故勿為京洛士緇塵染衣素梅花落玉樹飛花早金閨引恨長雪明難見影風急易聞香舞處飄羅袖歌邊繞畫梁嵗華憔悴盡魂夢憶遼陽楊文卿一首文卿字子質鹽山人稷山知縣轉南京都察院經厯有鷗海集秋日送曽公子實卿之延書扇頭車馬翩翩送客行離愁遽逐海雲生三杯籬落菊花節一路蛩螿豆葉聲荒草濁河連古戍悲笳明月動山城鯉庭趨後勞相報婚嫁如今纍尚平朱永年一首永年字仲開儀真人官光山知縣有朱仲子集李時逺云仲子詩有曠達之趣詠懷南鄰競歌鐘北里吹笙竽我獨甘寂寞守此貧賤廬蓬戶不掩蓽簞瓢常晏如負郭住窮巷門無長者輿彈琴發雅操誦詠詩與書安神在閨房淡泊思玄虛至人求髣佛榮名非所需丘雲霄四首雲霄字凌漢崇安人嘉靖十七年貢士選南京國子典簿遷栁城知縣有止山齋集詩話止山驂鸞作吏解組歸田栖息武夷山中閉關講學嘗與其友夜宿髙明樓中夜有怪倚門作人語曰同遊不樂乎何卧之早也止山應之曰我載晨而遊抱日而歌汝胡不吾和而同其樂何為昏暮而來也怪應曰不能止山曰吾亦不能怪歎息而去可謂不惑不懼者已松陽徐夢陽評其詩稱其雅淡徑古景真情得要之不蹈襲前人異乎七子之派者也溪月初出水溪月初出水照我清夜堂沈憂不成寐踟蹰步寒光飛烏深夜號繞樹林煙蒼有懷空自知默默心摧傷怨詩江石如龜甲隱隱浮明沙不障東之水偏驚遊子查遊子去鄉國長風吹斷霞斷霞只在天遊子去無涯泠泠秋已老飄蕩未還家寒露同李洗松宿方塘書舍露重憐今夕秋深試薄寒溪聲亂籬落月色動柴關菊密欲藏徑花嬌故傍欄相看疑夢寐秉燭問更闌江晚帆勢迎風疾灘聲入暮喧漁燈出疏樹客路問前村野鶴沖煙迥山花帶雨昏寒江何處宿幽思未堪論施漸三首漸字子羽無錫人嵗貢生授海鹽縣丞有武陵集王元美云施子羽如寒鴉數點流水孤村惜其景物蕭條迫晚意盡俞汝成云子羽趣味悠深聲調雅雋在韋栁錢郎間詩話子羽僅初舜咨與華子潛酬和時號錫山四友三君皆非華敵子羽差優贈人遊蘭亭赴陳山人約靄靄深竹林林深阻修澗清川流其間懸崖俯可辨春蘭日以芳風氣日以變君往對山人如逢昔人面贈吳還山人為客吳門久白髮蒙茸將被首興到青山不問家笑來花肆常沽酒行路蕭然滿篋詩風流文采雅堪師自言身是陶𢎞景説與世人誰得知竹房寂寂春窗下惟餘修竹隂忽聞人共語送客出深林李才一首才樂安人舜臣子官主簿雲中寄周總戎雲中日夕傳烽火萬里邊風羽檄催代馬長驅光祿塞漢兵不度白登臺三關鼙鼓秋何急七郡蒸黎日轉哀試問漠南諸將士只今誰是出羣才嚴怡三首怡字士和如臯人以貢為博平訓導有石溪集擬古采采南山桐十年成一琴製者豈不苦謂世有賞音持以奉君子不與我同心擬鑄鍾子期家無雙南金石人髙岸勢若崩上有誰家墓已無墳上土尚有墳前樹樹下多行人車馬成廣路此地少豐草幸免穴狐兔石獸半埋沒碑版知何處往者盡如此來者永不悟石人不不解語空泣草頭露曲塘土牆茅屋竹籬笆楊栁風髙燕子斜可是曲塘人好事家家屋角有桃花李奎一首奎字伯文錢塘人以布政司吏再考錦衣從事有珠山集彭子殷云珠山詩一以興象為宗篇多渾融句多藻緻讀之爽氣滿前詩話伯文周旋沈青崖於獄中者以氣義聞詩特寄興也採藥山中宿雨過嶺上明霞赤荷鋤入南畦藥苗始堪摘黃精種未鋤紫芝已盈尺隔水望茅茨還歸煮白石明詩綜卷五十三
