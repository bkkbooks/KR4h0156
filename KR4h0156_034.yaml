body:
  text: 明詩綜卷三十四翰林院檢討朱彞尊編李夢陽八十首夢陽字天賜更字獻吉慶陽人徙扶溝𢎞治癸丑進士授户部主事轉員外郎應詔陳言彈夀寧侯張鶴齡繫錦衣獄旋釋之進郎中代尚書韓文草奏劾劉瑾坐姦黨致仕一云降山西布政司經歷復逮繫得釋起江西提學副使恃氣陵轢臺長訐奏罷官寧庶人既誅坐為庶人撰陽春書院記獄辭連及尚書林俊力持之得免卒後弟子私諡文毅天啓初追諡景文有空同子集何仲默云詩必以盛唐為尚宋人似蒼老而實踈鹵元人似秀峻而實淺俗僕詩不免元習而空同諸作間入于宋譬之于樂絲竹之音要眇木革之音殺直若獨取殺直而并棄要眇之音何以感情飾聽也試觀江西以後之作辭艱者意反近意苦者辭反常讀之如搖鞞鐸耳崔子鍾云空同慨然興復古之思自唐以後無師焉之顧華玉云獻吉詩卓爾不羣或失則粗矯枉偏不得不然又云空同言作詩必須學杜詩至于杜如至員不能加規至方不能加矩矣此空同之過言也夫規矩方員之至故匠者皆用之杜亦在規矩中耳何得就以子美為規矩邪王子衡云獻吉遊精于秦漢割正于六朝以柔淡為上乘以沉著為三昧以雄渾為神樞以蘊藉為堂奧會詮往古之典用成一家之言巨者日融小者星列長者江流濶者海受洋洋霩霩無所不極後有知言之選歎賞不暇尚安能為之揚抑哉髙徐子容云空同子詩衆體兼長渾厚沉著格調古尤工七言古歌辭開闔縱橫人不能述者獨摹寫曲盡雄健可喜即錯置杜甫髙適歌行中莫能辨也鍾黃勉之云空同先生靈蛇早握天池獨運黃特奏白雪孤揚主張風雅深詣堂室樂府古詩駸淫漢魏而覽眺諸篇逼類康樂近體歌行大陵太白往哲可凌後哲難繼明興以來一人而已古陳約之云𢎞治中文教大起學士輩出力振風盡削凡調一變而為杜則李何為之倡李楊用修云𢎞治間文明中天古學煥日藝苑則懷麓張滄洲為赤幟而和者多失于流易山林則陳白沙莊定山稱白眉而識者皆以為傍門至李何二子一出變而學杜壯乎偉矣又云空同以復古鳴𢎞德間觀其樂府幽秀古艷有鐃歌童謡之風其古詩緣情綺靡有徐庾顔謝之韻而人但稱其律詩豫謂空同之可傳者不在律空同之律少陵之餘瀝遺胏耳任少海云獻吉詩如媧皇鍊石補天奔走百靈雷電日月星辰悉躔爐冶徐子元云本朝詩莫盛國初莫衰宣正至𢎞治中西涯唱之空同大復繼之自是作者森起雖格調不同于今為烈又云空同嵩髙之秀上薄青冥龍門之𣲖一瀉千里穆敬甫云李詩雄竒髙古律法嚴整貫少陵之壘而拔其赤幟化邵𢎞齋云國初詩是元如楊鐵崖解大紳成間是宋如陳白沙莊定山至𢎞德來駸駸乎盛唐矣如何大復李空同皇甫子循云薛君采詩俊逸真憐何大復粗豪不解李空同夫大復未足於俊逸空同不全于粗豪也王允寧云空同有神交無方之用有精純不雜之體縱橫竒正不一其裁粹美同也珩琚璜璫弗一其形溫柔同也至倒插頓挫之法自少陵善用之後空同一人而已學者未覩其大漫試詆醜以空同掠古市美比之剽掠嗟乎空同賦才神解能自作古假令與李杜二豪並生當代不為李則為杜矣徐伯臣云獻吉力持氣格濟以葩豔可謂雅道中興惜其和平之氣未舒悲涼之情太勝袁永之云獻吉發憤慧業掃蕩陳言吐詞則振羽沉宫宣藻則日光玉潔維時徐生虎視于荆吳邉丞蛟躍於齊魯何子揚瀾于河洛而君騰踔蹂躪總統包容所謂無可無不可者也周允大云獻吉仲默一代絶倡邈焉寡儔家莫子良云近世談藝之士獨稱空同大復二至曰廣長數千里上下數千年始得二人其見慕如此豈不以二子詩逺追蹤于少陵視三百篇指義特近哉何元朗云楊東里李西涯詩猶沿元人之習至空同出遂極力振起之仲默廷實昌榖諸人相與附和而古風遍域中矣如王元美云李獻吉如金翅擘天神龍戲海又韓信用兵多寡如意排蕩莫測又云獻吉才氣髙雄風骨遒利天授既竒師法復古手闢草昧為一代詞人之冠要其所詣亦可略陳騷賦上擬屈宋下及六朝根委有餘精思未及撰樂府自魏而後有逼真者然不如自運滔滔莽莽選體建安以至李杜無所不有第比謝監未是初日芙蓉僅作顔光祿耳七言歌行縱橫如意開闔有法最為合作五律及五七言絶時詣妙境七言律雄渾豪麗深于少陵抵掌捧心不能厭服衆志又云成𢎞之際頗有俊民稍見一斑號為巨擘然轍不及古中道便止搜不入深遇境隨就北地矯之信陽嗣起昌榖上翼廷實下毗敦古昉自建安掞華止于三謝長歌取裁李杜近體繼軌開元一掃叔季之風遂窺正始之塗天地再闢日月為朗詎不美哉又云國朝習杜數家華容孫宜得杜肉臨清謝榛得杜貌華州王維楨得杜一支閩中鄭善夫得杜骨就其所得亦近似耳惟夢陽具體而微又云涵洪并纎與亭毒並吾推獻吉然不能諱其滓洲吳明卿云空同詩縱橫跌宕搖五嶽而凌滄胡元瑞云李獻吉手擘盛唐之𣲖可謂逹摩西來獨闢禪教又如曹溪卓錫萬衆皈依陸羽吉云成𢎞以降北地信陽諸君子出執牛耳以凌厲詩壇宇內談藝之士率嚮往之然蒼素混質繁音亂雅揣摹攫攘勦襲其近似者以為名往往炫色澤而乏神理程之于古無當也黃清甫云昔陳思總東京之闕謝客振江表之衰子昻變陳隋之靡今李公夢陽湔宋元之陋斯文肇起實由于兹厥功邈矣其詩專意上摹逝遵故轍斷自漢魏迄于少陵少陵以下薄不經目故能近謝靡曼遠標遒舉一篇一詠咸有所屬無論堂室直將並驅豪雄之氣矯然千仭之上如時來屠沽奮迹往英雄傷斗然一峰上不信萬山開中宵見海日南斗豁天門斯並純任骨力振絶鉛華故能獨挽頽波屹為文柱故常之才難與慮始後王伯榖云明興以來作者絶少逮乎正統以則益猥弱雕瑣無足采觀李君崛起關隴蛟騰虎視力挽七朝之廢古必漢魏律必盛唐一時海嶽英靈之士翕然趨之風雅之學亦遂復振吾獨惜其調髙而意直才大而情疏體正而意庸力有餘而巧不足也何則矯枉太過和平不及摹仿刻深陶鎔未暇此猶戰國嬴秦之後繼以炎劉方其持寶鍔斬白蛇除煩草削苛政其功非不快也然問其詩書則陸生爾矣禮樂則叔孫通爾矣此李君之詩撥亂反正之力多粉飾太平之事少所謂可與創造難與守成者也馮元成云空同雄渾悲壯深于少陵宇宙間異色絶焰孫文融云空同格律雄渾真無可疵其古詩更髙絶近代罕兩神馮開之云空同深嗜而冥契者杜陵故得其理而靣目隨之江進之云空同于鱗世謂其有復古之力然二公固有復古之力亦有泥古之病彼謂文非秦漢不讀詩非漢魏六朝盛唐不看故事凡出漢以下者皆不宜引用噫何其所見之隘也夫詩人所引之物皆在目前各因其時不相假借如雎鳴螽斯桑扈蟋蟀樛木夭桃芣苡葛藟是三百篇所用之物也降而為離騷則用芷蕙荃茝木蘭菊英蛟龍鳳皇文虯赤螭曽有一物假借於毛詩乎又降而為唐人之詩則用江梅岸栁澗草林花乳燕鳴鳩羣鴉獨鶴曽有一物假借於離騷乎非不欲假目到意隨意到筆隨自不暇舍見在者而他求耳至于引用故事則凡已往之事與我意思互相發明者皆可引用不分今古不論久近乃曰漢以上故事方用此特有見于漢家故事字眼古雅遂為此言其實繫用之善不善非繫于古不古也陳卧子云獻吉志意髙邁才氣沉雄有籠罩羣俊之懷其詩漢魏以至開元各體見長然崢嶸清壯不掩本色其原蓋出于秦風遂曹潔躬云獻吉雖産于秦其父正教授封丘徙家大梁故登科録直書河南扶溝人居於康王城葬于大陽山麓然則李何皆中州人矣李王後起以中原二子自居王稱李云人龍自起中原卧李稱王云髙卧中原堪有客又云足知上國羣公疏猶作中原二子看蓋隱然自比於李何也有孫豹人云先生五言古詩本於陸謝句中皆筋骨七古能以紀事兼諷議誦之風飇烈烈五律意象俱妙七律髙亮間入于宋絶句信手拈來調絶今古俞右吉云獻吉五言古詩康樂以後一人七言近體少陵以後一人七言絶句太白以後一人惟五言近體少遜前賢頗有才多之恨然如江從樹裏斷山入雨中無隴樹迷關道吳山蔽驛樓揚鞭指河各立馬説周秦楚越窗中地江山戰後容風雲餘霸氣吳楚混前朝塞口孤城斷峯腰細澗分林疏山盡出風順櫓濟開暮雨津城樹春帆水國樓江山百戰後登眺兩人初爽氣固殊倫也靜志居詩話成𢎞間詩道傍落雜而多端臺閣諸公白草黃茅紛蕪靡蔓其可披沙而揀金者李文正楊文襄也理學諸公擊壤打油筋斗樣子其可識曲而聽真者陳白沙也北地一呼豪傑四應信陽角之迪功犄之律以髙廷禮詩品浚川華泉東橋等為之羽翼夢澤西原等為之接武正變則有少谷太初傍流則有子畏霞蔚雲蒸忽焉丕變嗚呼盛哉獻吉五古源本陳王謝客初不以杜為師所云杜體者乃其摹仿之作中多生吞語偶附集中非得意詩也至效盧駱張王諸體特遊戲耳惟七古及近體専仿少陵七絶則學供奉蓋多師以為師者其謂唐以後書不必讀唐以後事不必使此英雄欺人之言如江湖陸務觀司馬今年相宋朝秦相何緣怨嶽飛等句非唐以後事乎河之水歌二章有序河之水歌李子為其子作也以子追不及河之水流濺濺望父不見立河干河水淲淲舟子搖櫓東方漸明我不得渡招隱山辭三章山之桂青青秋風緑葉冬不零王孫幾時歸山空蕙草摧山之草萋萋春風花發桃源迷子規啼竹隂日暮愁人心秋之夕螢飛山風霜露霑人衣洞門翳寒蘿奈兹華髮何左袒行陵曰不可平曰可安劉者誰勃與我寄不信祿不入軍左袒計安出朱近修云此仿西涯樂府而作車遙遙車遙遙遙遙復邁邁望見秋塵起不見車輪轉知在秋塵裏雁門太守行鴈門太守汝何人治邦三月稱明神我有牛羊賊不來掠我有禾黍人不敢割昔我無衣今有袴著我思禮拜太守太守不見憐但聞太守身姓邊紫髯廣額聳兩顴太守出門四牡騤騤後擁皂蓋前導兩麾行者盡辟易居者不敢窺旁問太守何所之云訪城南皇甫規楊用修云神似古樂府魏晉以下絶無僅有內教場歌雕弓豹鞬騎白馬大明門前馬不下徑入內伐鼓大同邪宣府邪將軍者許邪一解武臣不習武奈彼四夷西內樹旗皇介夜馳鳴炮烈火嗟嗟辛苦一解轅駒歌世徑互險夷富貴安所需昔為櫪中駿今為轅下駒白日仰悲鳴青雲立踟蹰未蒙主人顧何繇效馳驅朝思碣石津夕睇流沙隅常恐侣凡蹇棄捐中路衢雜詩二首西國有佳人獨立青雲端容豔若桃李左右佩芳蘭含思理玉琴泠泠一何間更節有餘悲曲終再三歎借問歎者誰中意難自宣沉吟攬衣帶仰視鳴鶴翻思阻望不申何况隔丘山梲榱蝕以傾梁棟誠獨難流言播四國周公有疑患涼飇激頽景奄忽不可攀衆羽日繽紜朱鳥戢其翰殺身茍無益去去從所安傷哉式微詩千載起余歎發京師二首驅車彰義門遙望郭西樹冠蓋耀青雲車馬夾廣路威風何赫奕各蒙五侯顧回飇動地起白日倐已暮棄擲委蔓草榮華若朝露亮無金石交人生豈常故絺綌足禦冬誰念紈與素愾彼白華篇氣結不能訴蔦蘿附松柏枝葉固相因行子戀儔匹况遇同鄉親北風起河梁日暮多飛塵攜手同車歸駕言西適秦道逺長渴飢客子懷苦辛仰瞻天漢流夜永不得晨驂馬媚其曹鳴雁各求羣明星出東方照見車下人夙興即往道登彼髙路津還顧望京邑愴焉何所陳衛上别王子晨風應候至雞鳴各嚴車我今遊宋中子當旋舊閭僕夫理前綏轅馬悲鳴趨一别阻秦周相望萬里餘首春霜露重厚汝征衣襦昔為同袍士今在天一隅故者日以逺疇能察區區贈徐禎卿獨處忽不懌攬衣循東廂樹木何修修春風起飄揚我友駕在門告言適江湘倉皇挈玉壺追送臨河陽顧瞻兩飛鳬並戲水中央翩翩厲羽翮鳴聲一何長奈何遊客子一别永相望時澤亮有周天命固其常薄終義所劣别離庸詎傷懿彼回路贈慷慨申此章贈劉氏矯矯雲中鵠忽忽晨南翔連翩客遊子駕言逝何方霜露日夜零東路悠且長意欲從子逝我馬玄以黃徒思諒無益欲置難遽忘愛子千金軀雙親在髙堂時命篇代馬不戀越荆禽豈巢燕鸜鵒渡汶水君子憂未然奈何客遊子率爾辭故山行獸顧丘林出雲有歸還交交聲利塗軒車日駢闐誰念牛下人悲歌夜中歎豪門有棄襦我衣恆不完張儀懼諸侯泄栁乃閉關貧賤豈盡愚時命當自安述憤二首小草生枯桑芊芊競芳辰雖云殊本根寄託各有因自我罹幽囚忽焉經浹旬我兄千里餘渺渺長河津妻子日望豫蒼蒼隔西鄰所幸二三友笑言越昏晨宵鐙促燕膝昵語忘苦辛患難茍相得毋論骨肉親明月出東方徒行反家室室人走相訊問我何由出明知非夢寐欲辨仍自失喜極雙涕零轉靣各銜恤垂鐙照緗卷浮埃滿朱瑟愁言卒未傾忽復見晨日雜詩宛宛春田鳩飛鳴柔且間一朝化為鷹肅肅厲羽翰衆禽不敢並孤立秋雲端鳥既不自知人胡究其然豫懷百門山水尚矣頗有移家之志交春氣熙欣焉獨往述情遣抱示同好數子浮海傷固窮逾河歎誠邁濯纓萬里流髙視九州外功成奔運徂氣至流飇代淒淒秋柯零冉冉春條媚周覽倦河壖孤悰冀巖瀨道以沉寂超賞與崇深會豈惟肆逺情亦因謝塵籟聿想山中人風吹女蘿帶折麻凌險屼采秀越森薈眷彌志終申獨往竟誰礙嵉嵉太行峰嶤嶤百門對抗手别故歡乘雲弄煙瀣自大過渡河趨陂沙岡凌春逺行邁遊目恣沿越漸辨林中曙遽失霞上月觸物誰為情悲歎曷可歇載登隋疆場况眺宋城闕陽坡散初栁隂曲峙寒雪只此判氣候豈必殊燕粵湝湝濁河駛畟畟晨風發揚帆截驚贛倚棹望窮髮鳬雁眇難即汀蘭翠堪纈美人既莫期天路復幽絶陂岡鬱參錯岸沙皓明滅日暮孤雲興何以慰忡惙陽武詠懷陳平張蒼遂及博浪之事玉璽戒不力金鏡淪無光大人既龍興烈夫亦鷹揚伊人各乘時矯若孤雲翔韓椎豈在屢秦氣日以喪六竒佐揮戈五運開靈昌時來屠沽奮迹往英雄傷平生冀風期况乃逾故疆灑淚越修坰含淒遡河梁古墳密嶕嶢春沙鬱茫茫徒瞻松柏路詎甲椒蘭芳遺榮竟何尤任智終自戕羡彼赤松遊援筆即此章覽遊百泉乃遂登麓眺望束髮懷幽竒覽籍兾有遇來登百門泉果協佳勝趣毖毖員波踊藹藹浮陽聚止坎渟泓洌激石迅湍注昔聞滄浪濯今解川上喻豈惟傷衛歌兼以發蒙慮况值春序中羣物已改故菰蒲冒清深鱗介各有慕行羡浴渚鳧靜對棲雲鷺巖扉空潭影林藹變朝暮極目北上帆朝宗感遊寓德安趨潯陽始征晨風息雲流日色展登陸艱且澀厲澗一何𬗟維時仲秋交颯颯林飇卷緑竹垂我車丹花映行幰冒巒維有松繡石盡成蘚攀搴雖多恱亘頓乃勞倦日中迫廬嶽蹊徑愈回蹇雲湧連遙崿雨暗失近巘奔崩萬壑會嶮絶一徑轉遽訝川梁沒幸遇石瀨淺道以習坎利用待既濟顯介石諒益固巨川豈遂眩誰哉能豫謀隨寓斯可遣白鹿洞遍覽名迹情髙忽凌厲步健輕巉𬗟葛弱亦須捫崖滑每獨踐涉清愛重屢探阻遺驚眩始兹陟五峯遂憩松下巘巖桂紛始華石耳翠可卷追想白鹿迹伊人竟何遣觸端緒自縈薜荔况在眼慨歎意莫置顧望日已晚夕湖浴岑峭流光滅蘭坂命酒寫幽獨鳴琴且遊衍始至白鹿洞曠哉超世志𬗟邈平生思鬱一眷名迹久注匡山陲南涉枉嘉命果諧夙所期仲秋巖壑清宫館復在兹白石激寒湍巖蘿裊空基黯傷逝者往密慚來者追性同道豈隔塗異理空悲興言懷昔賢日竟眺前岐榛荒徒鬱紆林崦一何冞感情匪哀歎聊詠昭言垂赴懷王山作始臨清溪寺不謂兹路艱﨑嶇踰南嶺轉見山鬱盤重隂起北谷凍雨響前巒志定邁孰禦勇往竟孤攀挽葛接懸狖架木凌飛湍律律巖壑變颯颯嵐風寒隔港望絶岫嵉嵉已雲端廣獄成還南昌候了夕棲瑞洪渚遙覽渚北山相傳洪崖子乘雲自此間履迹今尚存其人邈莫攀粵豫登征塗頻年涉間關毀譽一嬰心寤言多所歎于兹誠踟蹰振衣躡前巒洚水莽浩浩驚風蕩回川欲濟惜無梁飇輪儻中還湘妃怨采蘭湘北沚搴木澧南潯渌水含瑶彩微風託玉音雲起蒼梧夕日落洞庭隂不知篁竹苦惟見淚斑深宗子相云顔謝逸響秀宋轅文云深自從行自從天傾西北頭天下之水皆東流若言世事無顛倒竊鈎者誅竊國侯君不見姦雄惡少椎肥牛董生著書翻見收鴻鵠不知黃雀啅盜跖之徒笑孔邱我今何言君且休西來行冬草六日十二月西來泛湖雨明滅雨寒著樹盡成雪天波霮路幽絶鴰鶬秃鶖立如人銜魚避船偷眼嗔雪晴獵夫會尋汝乘時早可收其身土兵行豫章城樓飢啄烏黃狐跳踉追赤狐北風北來江怒湧土兵攫人人叫呼城外之民徙城內塵埃不見章江塗花裙蠻奴逐婦女白奪叉鐶換酒沽父老向前語蠻奴慎勿橫行王法誅華林桃源諸賊徒金帛子女山不如汝能破之惟汝欲犒賞有酒牛羊豬大者升官佩綬趨蠻奴怒言萬里入爾都爾生我生屠我屠徑弓毒矢莫敢何意氣似欲無彭湖彭湖翩翩飄白旟輕舸蔽水陸走車黃雲卷地春草死烈火誰分瓦與珠寒崖日月豈盡照大邦鬼魅難久居天下有道四􅊂守此輩可使亦可虞何况土官妻妾俱美酒大肉吹笙竽楊用修云只以謡諺近語入詩史而髙古不可及征孫豹人云贑州賊作亂都御史陳金奏調廣西狼兵之土兵行所由作也此詩當與杜陵北征詩並傳上元訪杜鍊師宣王昔時乘八風御龍遊戲行煙空馬前兩兩侍玉女别館多在蓬萊宫朝天宫中舊時殿樓臺晝鎖無人見琉璃井塌青苔滿松柏森森月如練嗚呼往事難具陳燈火如山又一春北斗壇西訪隱淪我師黃衫白㲲巾坐我更致西樓賔玉杯瀲灩赤瑪瑙織罽四角銀麒麟酒肉山堆滿堂醉仙厨往往來八珍孝宗之朝五真人師也磊落當其倫自言召見親賜食曽把丹書獻紫宸如今寂寞看春色銀魚玉帶無消息豈惟魚帶無消息欲語吞聲淚霑臆勸師對此莫酸辛世間萬事如轉輪且將芝草供生計聊與煙霞作主人月偏彩雲當牖生旋呼兩童吹玉笙聞師妙得逡巡術百壺倒盡還須傾古來仙子向誰在飲者翻垂千載名名垂千載亦區區酒闌燈昏夜復徂不見泰陵草已宿春生樹啼雙老烏此時亦應羣帝趨金燈翠旗光有無奉送大司馬劉公歸東山草堂歌東山有草堂縹眇雲嶠孤前對祝融峰下瞰巴陵湖明公昔時此堂居麋鹿熊豕當窗趨洞庭日落風浪湧倒影射堂堂欲動慘淡誰聞紫芝曲獨善不救蒼生哭先帝親裁五色詔老臣曽受三朝祿此時邉檄多戰聲曵履謁帝登承明謝安笑却淮淝敵魏相坐測單于兵九重移榻數召見夾城日髙未下殿英謀密語人不知左右微聞至尊羡自從龍去不可攀公亦卧病思東山湘娥含笑倚竹立山鬼窈窕堂之側上書苦死只欲歸聖旨優容意悽惻內府盤螭縷金織賜出傾朝皆動色白金之鋌紅票記寶鈔生硬雅翎黑崇文城門水雲白是日觀者塗路塞城中冠蓋盡追送塵埃不見長安陌人生富貴豈有極男兒要在能死國不爾抽身早亦得君不見漢二疏千載想慕傳畫圖即如草堂何處無祿食􅌤竊胡為乎乃知我公真丈夫嗚呼乃知我公真丈夫二月四日部署宴餞徐顧二子春日載陽官署幽東吳二子過我遊庭空日斜吏人散窅然何異經林丘今晨驚蟄暖氣逹昨夜哀鴻呼故儔中庭古槐蒼蘚溽上有百鳥何啁啾倉庚交交刷其羽君看巨細各有求明時冠軒幾邂逅得暇胡不攀淹留自從去年識徐顧令我意氣傾南州徐郎近買洞庭柁顧子亦且錢唐舟浮生飄轉若飛藿倐忽聚散誰能謀風光爛熳况復爾願寫清壺消客憂故人苦稱不好飲舉杯入脣還復休妙歌時時激慷慨鄙夫何以答綢繆嚴柝沉沉靜夜色北斗倒挂城南樓祗恐天明驅馬出攬袪延望河之洲苦熱諫屠參議豫章之熱真毒淫六月已破仍不禁赤雲行空日在地萬里一望炎煙深東蒸扶桑幹欲稿黑河水乾龍不吟院松亭亭我所愛比遭摧炙無好隂縱令跣足欲何往此地寸氷如寸金層簷大厦尚喘喙矮屋茅堂淚滿襟滕王有閣髙百尋閣下澄江清映心紫薇使者卧其上卷幔恰對西山岑赤腳門子搖大扇行坐吟哦揮素琴幾欲往訪簿書積豈我無酒同誰斟亭午蘊隆潭水沸蛟蜃下徙黿鼉沉何况走原之獸棲枝禽嗚呼豫章之熱其苦有如此而我胡為營營與世爭華簪徐子將適湖湘余實戀戀難别走筆長句述一代文人之盛兼寓祝望焉爾崢嶸百年會浩蕩觀人文建安與黃初叱吒皆風雲大歷熙寧各有人戞金敲玉何繽紛髙皇揮戈造日月草昧之際崇儒紳英雄杖䇿集軍門金華數子真絶倫宣德文體多渾淪偉哉東里廊廟珍我師崛起楊與李力挽一髮回千鈞天球銀甕世希絶鼇掣鯨翻難具陳洪川無梁不可越日暮悵望勞余神徐郎生長蘇臺隂二十作賦雄海濱朅來抱玉叩閶闔長安繡陌行麒麟是時少年誰最文太常邉丞何舍人舍人飄颻使南極直窮金馬探瀘津爾雖不即見顔色夢中仿佛形貌真余也潦倒簿書客諸公磊落清妙身大賢衣鉢豈虛擲應須爾輩揚其塵休令黼黻怨岑寂要與琬琰增嶙峋海陵先生雅愛士晚得徐郎道氣伸喬王款接雖不數邇聞亦欲來卜鄰驊騮造父兩相值一瞬萬里誰能馴都門二月芳草發御溝楊栁垂條新徐郎綰牒將逺適使我旦夕生悲辛為君沽酒上髙樓月前醉舞梨花春天明挂帆向何處鴻雁哀鳴求故羣南登會稽探禹穴西浮湘水弔靈均洞庭波寒木葉下峽口風急猿嘯聞司馬太史有遺躅歸來著書追獲麟朝飲馬送陳子出塞朝飲馬夕飲馬水鹹草枯馬不食行人痛哭長城下城邉白骨借問誰云是今年築城者但道辭家别六親寧知九死無還身不惜身為城下土所恨功成賞别人去年賊掠開城縣黑山血迸鴉翎箭萬里黃塵哭震天城門晝閉無人戰今年下令修築邊丁夫半死長城前城南城北秋草白愁雲日暮聞鳴鞭林良畫兩角鷹歌百餘年來畫禽鳥後有吕紀前邊昭二子工似不工意吮筆決眥分毫毛林良寫鳥祗用墨開縑半掃風雲黑水禽陸禽各臻妙挂出滿堂皆動色空山古林江怒濤兩鷹突出霜崖髙整骨刷羽意勢動四壁六月生秋䬞一鷹下視睛不轉已知兩眼無秋毫一鷹掉頸復欲下漸覺颯颯開風毛匹綃雖慘淡殺氣不可滅戴角森森爪拳鐵迥如愁胡眥欲裂朔雲吹沙秋草黃安得臂爾騎駟鐵草間妖烏盡擊死萬里晴空灑毛血我聞宋徽宗亦善貌此鷹後來失天子餓死五國城乃知圖寫小人藝工意工似皆虛名校獵馳騁亦末事外作禽荒古有經今皇恭默罷遊燕講經日御文華殿南海西湖馳道荒獵師虞長俱貧賤吕紀白首金爐邉日暮還家無酒錢從來上智不貴物淫巧豈敢陳王前良乎良乎寧使爾畫不直錢無令後世好畫兼好畋錢選畫張果圖張翁紙驢真有無錢也何意傳其圖印記雖明幅斷裂李侯完之亦竒絶所恨圖尾錢有詩就蛇添足將無癡憶昔翁來集賢院入宫詔許肩輿便一日聲名人主動千年靣目吾今見帝貌深沉玉榻雄侍人一異三人同漢皇信有瑶池降秦始枉慕蓬萊宫玄言未竟鈴殿風寸驢躍出青箱空有童追捉雙眼紅此驢蹩躃盤當中李侯一看一絶倒每稱獨苦嗟良工細觀張翁骨格古徐福五利寧其伍曰嬪真令天下疑遄歸轉覺皇心蠱長生殿前牛女辰廣寒仙桂舞鸞身世間但識申師巧誰解中條放浪人洛陽道桃花馬金絡頭白面郎紫貂裘三月洛陽道垂栁蔭清溝溝水東流不記春花開花落幾回新東風日暮楊花起愁殺髙樓獨倚人朱仙鎮水店回岡抱春湍滚白沙戰場猶傍栁遺廟只棲鴉萬古關河淚孤村日暮笳向來戎馬志辛苦為中華徐墓書張相國碑銘不讀南州傳誰知髙士心江城遺像在春日古祠深竹鳥嚶嚶合松牆靡靡隂曲江千載碣書罷淚盈襟明逺樓春望貢院初開閣春隂獨倚欄栁邉千艦聚花裏萬家殘風雨江聲壯兵戈地色寒斷腸沙塞雁羣起向長安蔣仲舒云含愁無限酬京師友人見寄浮雲悲故國積水起鳴雷不見長安日愁登古吹臺故人三月别天上一書來欲問經行處山中杜若開東陂秋泛久説東陂好今陪上客遊綺筵開畫舫哀笛奮中流舞每低輕燕歌先起白鷗稍前休更進吾愛荻花洲遊兵聞道新開口遊兵未解圍只須殊死戰莫放隻輪歸漢月已自滿林烏常夜飛早將書插羽天子日宵衣環縣道中西人習鞍馬而我憚孤征水抱琵琶寨山銜木鉢城裹瘡新罷戰插羽又徵兵不到窮邉處那知逺戍情赴郊觀宿城邉水色靜春茅苑外鶯啼拂露梢萬戶煙花臨復道九天宫殿鎖南郊霓旌夜發清溪繞彩仗晨飛碧樹交身到鈞天渾不解坐聞仙樂下雲旓謁陵本朝陵墓傍居庸聞説先皇駐六龍一日玉輿回朔漠遂令金殿鎖秋峯明禋衮職雖多預備物祠官豈盡供報祀獨知今上切每于霜露見愁容秋懷三首慶陽亦是先王地城對東山不窋墳白豹寨頭惟皎月野狐川北盡黃雲天清障塞收禾黍日落溪山散馬羣回首可憐鼙鼓急幾時重起郭將軍宣宗玉殿空山裏野寺霜黃鎖碧梧不見虎賁移大內尚聞龍舸戲西湖芙蓉斷絶秋江冷環佩淒涼夜月孤辛苦調羮三相國十年垂拱一愁無大同宣府羽書同莫道居庸設險功安得昔時白馬將橫行早破黑山戎書生誤國空談裏祿食驚心旅病中女直外連憂不細急將兵馬備遼東穆敬甫云諸作如雲屯髙嶺風涌飛流雪後朝天宫馬上城中見雪山白雲蒼霧滿燕關蓬萊咫尺無人到松柏黃昏有鶴還當日翠華遊物外百年金殿鎖人間浮塵擾擾江湖逺悵望巖棲不可攀艮嶽篇宋家行殿此山頭千載來人水一丘到眼黃蒿元玉砌傷心錦纜有漁舟金繒社稷和戎日花石君臣棄國秋漫倚南雲望南土古今龍戰是中州潼關咸東天險設重關閃日旌旗虎豹間隘地黃河吞渭水炎天白雪壓秦山舊京想像千官入餘恨逡巡六國還滿眼非無棄繻者寄言軍吏莫嗔顔别徐子禎卿得江字我愛南州徐孺子明瑶美璧世無雙新從北極看南極便自吳江下楚江日落鷓鴣啼廟口水清斑竹映船窗禰衡王粲俱黃土千載何人復此邦臺寺夏日古臺髙並鬱岧嶤斷塔稜層鎖寂寥積雪洞門常慘慘炎天松柏轉蕭蕭雲雷畫壁丹青壯神鬼虛堂世代遙惆悵宋官偏泯滅二靈哀怨不堪招漢江歌送范子之桂陽漢江江上鶗鴂鳴漢江遊客無限情青山落日下帆影芳草月明聞棹聲黃鶴磯頭暮雲盡鸚鵡洲邊春水生莫倚仲宣能作賦洞庭南接桂陽城秋望黃河水繞漢宫牆河上秋風鴈幾行客子過壕追野馬將軍韜箭射天狼黃塵古渡迷飛挽曰月橫空冷戰場聞道朔方多勇略只今誰是郭汾陽王元美云雄渾流麗朱仙鎮水廟飛沙白日隂古墩殘樹濁河深金牌痛哭班師地鐵馬驅馳報主心入夜松杉雙鷺宿有時風雨一龍吟經行墨客還詞賦南北淒涼自古今東華門偶述銀甕爛生光盤龍繡袱香但知從內出不省試何王贈何舍人朝逢康王城暮送大堤口相對無一言含悽各分手豔曲父母愛小女女是聰明子生不識鴛鴦繡出鴛鴦是曉鶯睍睆夢中迷流鶯碧樹西起來紅日照已度别枝啼雲中曲二首黑帽健兒黃貉裘匹馬追奔紫塞頭相逢不肯通名姓但稱家住古雲州白登山寒低朔雲野馬黃羊各一羣冒頓曽圍漢天子健兒惟説李將軍聖節聞駕出塞千官北首望龍旗萬國車書集鳳闈八駿瑶池秋色逺幾時親擁白狼歸送周判官明鐙緑酒五花裘客舍新秋螢火流問君不飲真何事明日出城風葉愁月夜過訪王子率爾髙陽飲博徒酒酣擊劍膽何粗金門貴客如相許徑脫鸘裘付酒壚蔣仲舒云語爽夏口夜泊别友人黃鶴樓前日欲低漢陽城樹亂烏啼孤舟夜泊東遊客恨殺長江不向西别李生華也南來送我行青絲挈酒玉壺輕滕王閣下江千尺一曲滄浪萬古情送王韜王郎口談金虎文自稱師是紫陽君挂帆明日忽南去影落龍江五色雲經行塞上天設居庸百二關祁連更隔萬重山不知誰放呼延入昨日楊河大戰還歸塗詠古河濟誰言不共流青春惡浪古懷州蕩搖少室三花樹倒映天壇白石樓汴中元夕中山孺子倚新妝鄭女燕姬各擅場齊唱憲王新樂府金梁橋外月如霜京師春日漫興十日不出花盡開城南城北看花來即教閉戶從花盡莫遣看花不醉回蔣仲舒云語老而用意婉送人之南郡鼓刀朱亥本微寒白首侯嬴是抱關不為千金增意氣祇緣一諾重丘山明詩綜卷三十四
