body:
  text: 明詩綜卷八十五翰林院檢討朱彝尊編黄幼藻一首幼藻字漢薦莆田人蘇州府通判議之女林儀部啓昌之婦有栁絮編姚園客云幼藻麗才雅藻何减玉臺年未四十而卒臨終猶誦殘燈無燄影幢幢之句可悲也題明妃出塞圖天外邊風掩面沙舉頭何處是中華早知身被丹青誤但嫁巫山百姓家梅生一首生姓梅氏麻城士子周世遴伯玉妻詩話生有逸才兼工古文辭南昌王于一向予稱之其夫周伯玉赴試省闈生賦落葉小詩寄之伯玉省詩悽愴不入鎖院而返足以見伉儷之重矣傳聞生有外行未免蘭形棘心曾填小曲寄情人云假若是淚珠兒穿得起拚剪下一股青絲穿一穿寄把你于一謂古之喻淚者曰沱若曰漣如曰流泉曰垂露曰連絲曰玉箸曰綆縻曰鉛水曰日南珠未有道及此者于一好劇談談必傾座斯言稍過綫不能穿淚珠本香山句爾寄外落葉滿庭階秋風吹復起遙憶别離人寂寞何堪此馬氏一首氏虎關將家婦有香魂集詩話莆田宋比玉得馬氏詩集于荒邨老屋中見芳草無言路不明之句為之擊節録而傳之秋閨夢戍詩夫重封侯愛妾輕漫欹珀枕戀寒更夢回逺戍相㝷處芳草無言路不明沈紉蘭一首紉蘭字閒靚嘉興人參政黄承昊妻有效顰集秣陵道中風雨剔盡寒燈風動幃長途况是客單衣無端燕子磯頭雨一舫隨人到處飛吳令則一首令則桐城人諭徳應賓長女嫁生員何應瓊玉之憶玉之春來草色想河關逺道緜緜不可攀翻恨白雲飛去疾夕陽千里露童山吳令儀一首令儀字棣倩令則之妺兵部侍郎方孔炤夫人夜新月不來燈自明江天獨夜夢頻驚長年自是無歸思未必風波不可行方孟式三首孟式字如耀桐城人大理卿大鎮之女嫁山東布政使張秉文濟南城潰同其夫殉節贈一品夫人有紉蘭閣集寄任夫人可怪暌違日相思幾換年故園芳草合南國美人偏生死交難見悲歡意莫宣祗應三五夜明月共君圓秋興西風傷往事笑此客中身葉落蒼烟斷花開黄菊新天涯蓬鬢短邊徼羽書頻蟋蟀知秋意階前鳴向人憶舊一别江潭月幾圓相憐人面不如前依稀舊日㝷芳地秋雨梧桐十二年方維儀六首維儀桐城人亦大理卿大鎮之女適姚孫棨再期而夭遂請大歸守志有清芬閣集詩話龍眠閨閤多才方吳二門稱盛夫人才尤傑出其詩一洗鉛華歸于質直以文史當織紝尚論古今女士之作編為宫閨詩史分正邪二集主于昭明彤管刋落淫哇覽者尚其志焉集中句若白日不相照何况他人心高樓秋雨時事事異疇昔何其辭之近乎孟貞曜也死别離昔聞生别離不言死别離無論生與死我獨身當之北風吹枯桑日夜為我悲上視滄浪天下無黄口兒人生不如死父母泣相持黄鳥各東西秋草亦參差予生何所為死亦何所辭白日有如此我心徒自知傷懷長年依父母中懷多感傷奄忽髮將變空室獨彷徨此生何蹇劣事事安可詳十七喪其夫十八孤女殤舊居在東郭新栁暗河梁蕭條下霜雪臺閣起荒凉人世何不齊天命何不常孤身當自慰且免摧肝腸鷦鷯栖一枝故巢安可忘出塞辭家萬里戍關路隔風烟賦重無餘餉邊荒不種田小兵知有死貪吏尚求錢倚賴君王福何時唱凱旋獨歸故閣思母太恭人故里何須問干戈擾不休家貧空作計賦重轉添愁逺樹蒼山古荒田白水秋蕭條離膝下欲望淚先流旅秋聞冦蟋蟀吟秋户凉風起暮山衰年逢世亂故國幾時還盜賊侵南甸軍書下北關生民塗炭盡積血染刀環楚江懷吳妹茂松閣空林隕葉暮烏啼雲水迢迢隔皖溪夜發蒼梧寒夢逺楚天明月照樓西方維則一首維則大理卿大鉉之女嫁生員吳紹忠有茂松閣集詩話方氏三節一為孟式同夫殉國一為維儀十七而寡夀八十有四一為維則十六而寡夀亦八十有四白圭無玷苦節可貞足以昭諸彤管矣題竹小院何空寂相依獨此君雪深愁易折風急不堪聞白石移花影青苔擁籀文樓頭明月上空翠落紛紛姚淑人一首淑人上虞姚克俊女餘姚黄尊素配詩話淑人年十六歸忠端當公入為御史與楊左魏李諸公早夜相過語及羣小陰謀輒形之歎息或至泣下賓退淑人進曰公等不能先事綢繆涕泣何益公既被逮淑人每夜祈死北辰之下願以身代逆奄就誅賜章服三品教其子宗羲為復社領袖南國諸生顧杲等公訐閹黨阮大鋮宗羲名居第三大鋮後柄用中㫖逮治淑人喟然曰豈意章妻滂母萃吾一身山陰劉公宗周常熟瞿公式耜皆目之曰女師詠扇之作託物寓意不審關西惠元孺輩曾見之否詠蒲扇世間物性初無定百鍊剛成繞指柔何似萑蒲經織後能將九夏變三秋沈宜脩二首宜脩字宛君吳江人山東副使珫之女工部郎中葉紹袁之妻有鸝吹集感秋月向中天迥一作小人驚秋暮悲𤣥霜初落後一作候客夢未歸時縹緲三秋雁蕭條兩鬢絲空餘舊簫管愁對月明吹仲春寄表妺張倩倩湖外青山别路長沉吟舊事總堪傷故園明月門前栁回首春風各斷腸商景蘭三首景蘭字媚生㑹稽人吏部尚書周祚女祁公彪佳之配詩話祁商作配鄉里有金童玉女之目伉儷相重未嘗有妾媵也公懷沙日夫人年僅四十有二教其二子理孫班孫三女徳淵徳瓊徳茝及子婦張徳蕙朱徳蓉葡萄之樹芍藥之花題詠幾遍經梅市者望若十二瑤臺焉送别黄皆令徵調起驪歌悲風繞坐發人生百嵗中强半苦離别念君客㑹稽釜不因人熱兹唱歸去辭珮環攜皎月執觴指河梁愁腸九回折流雲思故島鼫鼠懷故穴帆檣日以逺山川日以越同調自此分誰當和白雪竚立望滄浪憂來不可絶關山月秋月開金鏡浮雲散碧空風吹榆戍北露濕栁城東影滿驚門鵲光沉起塞鴻秦關今夜色應與漢宫同悼亡公自垂千古吾猶戀一生君臣原大節兒女亦人情折檻生前事遺碑死後名存亡雖異路貞白本相成項蘭貞一首蘭貞字孟畹秀水人貢生黄卯錫之妻有裁雲月露二草送外赴試栁陰輕綰木蘭舟杯酒殷勤動别愁此去但看江上月清光猶照故園樓顧若璞一首若璞字和知錢塘人副使黄汝亨子茂梧之妻有卧月軒稾宫詞垂栁千條拂御墀凉風初到影蛾池銀筝玉笛花前奏不唱班姬團扇辭張倩倩一首倩倩吳江人沈秀才自徵之妻憶舊故人别後杳沉沉獨上高樓水國陰鴻雁不傳千里一作書底恨天涯流落到如今沈憲英一首憲英字惠如一字蘭友吳江人沈自炳長女悼宛君姑樓上春深乳燕來半簾花影自徘徊子規聲裏黄昏月叫斷東風夢不回葉紈紈四首紈紈字昭齊吳江人葉紹袁之女歸袁氏有芳雪軒遺稾暮春赴嶺西道中作二首故園别後正春殘陌上鶯花帶淚看何處鄉情最悽切孤舟日暮泊嚴灘烟樹重重失故鄉雲山極目恨偏長不知何日是歸日杜宇聲聲最斷腸秋日偶題一畨搖落一畨嗟咫尺天涯夢裏家莫道秋來不憔悴滿庭都是斷腸花哭妺牕花寂寂蕊初寒誰向簾前握手看風景不知人有恨月明依舊畫闌干葉小鸞二首小鸞字瓊章一字瑤期吳江人紹袁季女未嫁而夭有疎香閣遺集已已春哭沈六舅母墓下十載恩難報重泉哭不聞年年春草緑腸斷一孤墳哭姊雲散遙天鎖碧岑人間無路月沉沉可憐寒食梨花夜依舊春風小院深祁徳淵一首徳淵都御史山陰祁彪佳女嫁姜廷梧桐音送黄皆令西風江上雁初鳴水落寒塘一擢輕遶徑黄花歸故里滿堤紅葉送秋聲片帆南浦離愁結古道河梁别思生此去長塗霜露肅何時雙鯉報柴荆張徳蕙一首徳蕙字楚纕山陰人諭徳元忭之孫嫁祁公子理孫奕慶中秋秋氣中天淨愁人獨夜看停橈江愈濶却扇月初寒霜入桐陰薄風飄桂影殘扣舷情未已露濕綺羅單朱徳蓉二首徳蓉字趙壁山陰人太師燮元之孫嫁祁公子班孫奕喜送黄皆令青青楊栁枝飄搖大道旁大道多悲風游子瞻故鄉執杯送行客淚行沾衣裳憶昔弭逺櫂明月浮景光壺觴極勝引歌舞開華堂好鳥得其侣舉翼齊翺翔膠漆兩不解金石安可方分袂起倉卒永夜生䀌傷吳山何渺渺越水亦茫茫芙蓉被秋渚采采有餘芳願言贈所思曰歸紉為裳上已桃花新水浣春衣舊日蘭亭到亦稀斷岸羽觴晴日暖逺山横笛暮雲飛沙棠舟近江鷗起玳瑁梁空海燕歸尚有采蘩思未定不堪月色上羅幃黄脩娟一首脩娟字媚清仁和人參議汝亨女邨居即事寂寂邨居晩迢迢旅雁稀煙花迷曲徑山月澹清輝黄菊經霜浄秋蓴帶雨肥夜深寒漏徹漁火逐星歸項珮二首珮字吹聆秀水人處士吳統持之室有藕花樓詩稾詩話吳處士巨手有大宅在北郭之秋涇得吹聆為嘉耦琴瑟静好詩篇酬和甚樂也遭亂家破轉徙無定跡糠籺不飽然未嘗聞交謫之言所題卍齋即秋涇故居取方廣胸前字以為曲闌鄉人題詠者紛紛惟吹聆詩俱從梵夾中出極其熨貼或疑字韻書不收然三㸃成猶有想即伊字苑舎人咸詩可據也夫子書屋落成闌干皆用卍字遂名曰卍齋屬賦四十字夫子愛竒字迴闌繚繞之一時齊作卍三㸃不成樹色春浮並齋居繡佛宜定知人載酒送喜有芻尼社日過雨春泥白斜飛燕尾纖恰停鍼綫坐自起為鈎簾翁桓一首桓字少君錢塘人處士胡介妻重過西湖風風雨雨鳥空啼草緑山腰水滿隄畫閣已傾歌舞散十年重到六橋西姚媯俞一首媯俞字靈脩長洲人嫁嘉定侯演有再生餘事冬日坐擁烏皮倚隠囊且翻梵夾静焚香淒淒庭院悲風急漠漠江天朔雁翔一段旅懐還磊落百年心事付蒼茫登樓望逺迷鄉樹又見寒鴉送夕陽章有渭二首有渭字玉璜華亭人嫁嘉定侯泓有燕喜樓草舟行即事曉霧迷離彩鷁輕擢歌徐動見新晴臨湍鷺子亭亭立夾岸蒲花漫漫生遥指小山遮塔影忽經深樹出鐘聲晩凉不覺羅衣薄自愛澄湖片月明春感舞蝶莊生夢啼鵑蜀帝魂紫芝逢勝友芳草想王孫小閣聞雞唱閒庭聽鳥喧曉烟迷麥隴春霧鎖柴門魚戲青萍動風吹碧葉翻綵毫題玉柱緑蟻引金尊乍摘葳㽔草長依翡翠軒避秦無絶境何必問花源盛韞貞四首韞貞字静維華亭人邨居雜感三首自我來兹地重門曉夜扃蕭條門外栁幾度向人青采蕨懷商土占時望嵗星但能安病骨不必問池亭烽火吳關逺烟花谷水明孤墳應宿草白髪隔重城遺行書難就𤣥言較未成愁心託幽夢兹夕倍縱横蓬徑無人迹春厨斷暮烟稻梁謀自拙僕隸義相捐薄俗終難入幽棲性自便尺書兼斗粟慙媿主人賢寄兄一自雙親盡鄉園不忍旋七年三見面稚子漸齊肩夢斷燕山月春歸海樹烟書來能念我三復鶺鴒篇姚淑一首淑字仲淑金陵人庶吉士達州李長祥納為繼室有鍾山秀才海棠居集寄研齋太史年年歎離别此别何時休樓頭望不見從今不上樓無錢買鯉魚君書何處求倪仁吉二首仁吉字心惠浦江人進士仁楨之女宫意圖調入蒼梧斑竹枝瀟湘渺渺水雲思聽來記得華清夜疎雨銀釭獨坐時彈琴棃花小院午風輕謾理冰絲入太清一片梧桐心未死至今猶發斷腸聲錢敬淑一首敬淑字師令江寧人文學談允謙之妻泊浦子口殘年孤櫂泊近浦驗歸程雪圃芹牙白江醪竹葉清夕陽新别路衰草古離情隔岸寒山色含悽望舊京湯文玉一首文玉原闕司吾春游詩山雨初晴洗佛螺春風處處揭青莎采香不倦溪邊路多少飛紅趁韤羅周淑禧一首淑禧江陰人周榮公第三女詩話至元斥賣廣濟庫故書有采畫本草一部近吳中趙凡夫子婦文俶端容設色畫本草曲臻其妙江陰周榮公二女淑祜淑禧臨之亦成絶品淑禧寫大士象一十六幅陳仲醇謂其十指放光直造盧楞伽吳道子筆墨之外今文俶真蹟尚有存者周氏姊妹花草見者罕矣又石城女子李佗那善畫水仙則余亦未之見杜康廟酺有新糟醊有醨杜康橋上客題詩最憐苦相身為女千載曾無儀狄祠詩話海内圖經罕載杜康祠宇獨三吳有之相傳康有遺冢在江陰縣城南土人因于橋下建祠以劉伶配之季給事科草募疏云詩傳雅詠先歌既醉之章書有誥詞特謹徳將之訓溯麯糵流傳既逺而古今風味攸同酒星在天醴泉出地舟中之斛三百市上之價十千爰有飲中八仙竹林七子或沉或湎孰聖孰賢緬懷作醴之功豈止忘憂之具今杜氏之遺橋尚在而劉家之故巷猶存閲嵗久而年深為風侵而雨剥兹欲樹豐碑之七尺翦棘誅茅建祠屋之三楹崇基疊石俾千載相傳為勝事賴一時共濟以落成文頗流利然不若淑禧一絶之新警也紀映淮二首映淮字阿男金陵人嫁莒州杜氏早寡守節終絶句杏花一孤邨流水數間屋夕陽不見人牯牛麥中宿秦淮栁枝栖鴉流水㸃秋光愛此蕭疎樹幾行不與行人綰離别賦成謝女雪飛香謝五孃二首五孃萬厯中湖州女子有讀月居詩小園即事翠竹青梧手自栽芙蓉未秀菊先開小軒睡起日卓午黄葉滿庭山雨來感懷四面簾垂碧玉鈎重重深院鎖春愁天涯行客無歸信花落東風嬾下樓曹夀奴三首夀奴小字山姑崇禎間吳興女子有觀静齋稾詩話夀奴詩頗有林下風致贈姊一篇其源出於楊方贈伯姊草有並蔕花木有連理枝果有合歡核豆有同根萁魚或比目游鳥亦比翼隨同功繭作緜合卺玉為卮我與子姊妺願得不相離出必同車輪居必聨屋楣見月每共拜弄珠定雙嬉子妝我掠鬢子盥我捧匜我衣擣子砧子濯汙我私機張我續織鏡聽子兼持子褰我衾裯我餔子粥糜寒輒擁子背暑還扇我肌子女迭相抱帷帳恒並施生從比肩人沒以百嵗期夫君北行以菩提數珠留贈百八菩提子紅絲貫小纓無眠他夜月留記逺鐘聲寄外去作西湖十日期經年猶滯謝公池别來夜夜雙行淚只有珊瑚舊枕知李因一首因字是菴㑹稽人一云杭州人光禄卿葛徵竒之妾有竹笑軒吟草續稾詩話是菴善畫花竹之夭斜禽鳥之跳躑具有生動之趣刻沉香為像以奉白陽山人詩其餘事爾然無鉛粉之飾郊居用松陵集韻避世牆東住牽船岸上居雨分三徑竹晴曝一牀書上坂驅黄犢臨淵網白魚衡門榛草遍長者莫停車黄媛貞四首媛貞字皆徳秀水人先世父貴陽守副室有卧雲齋詩集俞右吉云亡友黄鼎平立二妹一字皆徳一字皆令均有才名皆徳為貴陽朱太守房老深自韜晦世徒盛傳皆令之詩畫然皆令青綾歩障時時載筆朱門㣲嫌近風塵之色不若皆徳之冰雪淨聰明也丁卯冬十二月留别妹皆令北風悽以栗不忍吹羅襟高雲語征鳥離思兩難沉今我逺庭幃與子分芳衾寧忘攜手好所以傷我心一言一回顧别淚垂不禁但得頻寄書毋使相望深聽雨長夜一燈灺獨愁誰與言牕前幾㸃雨井上芭蕉翻山邨春山春水碧依依草屋風輕燕子飛行到半坡亭小住野雲何事亦來歸貴陽廨中天涯二月早芳菲官舎何曽逺翠微如此溪山堪累月杜鵑猶道不如歸陸氏一首氏華亭夏考功允彞侍妾追悼錦瑟蒼凉憶舊蹤芳年行樂太悤悤濃香簾幕圖書静明月樓臺笑語通人並玉壺丘壑裏才分采筆黛螺中祗餘華表魂歸去夜夜星辰夜夜風徐簡簡三首簡簡字文漪嘉興人休寧吳璵小妻有珮蘭閣草夢居集詩話文漪縁情有餘風格未老然亦閨中之秀宫詞一首沉香亭子玉勾闌遍植名花按月看第一莫栽紅芍藥此花開日定春殘庭院沉沉盡日扃自將書法學蘭亭中官領得芙蓉粉催入長春寫御屛寄懷夾岸垂楊卷落花春風咫尺是天涯重門深鎖樓中燕獨有王孫不在家江娥一首娥宗室來鯤侍兒年十三能詩戊戌除日守嵗和王孫作仙茆筆秃硯成冰守嵗無聊寢復興柏葉酒香瓶已罄小牕留得隔年燈朱大韶婢一首題壁無端割愛出深閨猶勝前人換馬時他日相逢莫惆悵春風吹盡道旁枝詩話華亭朱吉士大韶嘉靖丁未進士性好藏書尤愛宋時鏤板訪得吳門舊姓有宋槧袁宏後漢紀係陸放翁劉須溪謝疊山三君手評飾以古錦玉籖遂以一美婢易之葢非此不能得也婢臨行時題詩於壁吉士見詩惋惜未幾捐館予聞之李高士延昰云明詩綜卷八十五
