body:
  text: 明詩綜卷三十九翰林院檢討朱彞尊編楊慎二十五首慎字用修新都人正德辛未賜進士第一授翰林修撰以議大禮泣諫杖謫永昌天啓初追諡文憲有升菴集薛君采云用修窮極詞章之綺麗牢籠載籍之菁華其卓絶之才𢎞博之學直欲追軋古人爽張愈光云升菴詩豫不喜其深邃而喜其朗也王元美云楊用修如暴富兒郎銅山金埒不曉喫飯著衣又云用修工於證經而疏於解經詳於裨史而忽於正史詳於時事而不得詩旨求之宇宙之外而失之耳目之前又云徐昌穀有六朝之才而無其學楊用修有六朝之學而非其才又云楊修撰之南中稿穠麗婉至華學士之巖居稿清淡簡逺俱逺勝玉堂之作然穆敬甫云用修學富千古人謂其詩不逮學其詩亦非貞元以後語也藩陳德逺云用修詩取材六代間似杜陵王臣云先生詩時而漢魏時而六朝時而四傑時而李杜其於才無所不構而於體無所不兼顧玄言云修撰咀英搜玉咳唾成珠深陳玉叔云用修采托既富蹊徑終存近體多沈之思絶句極風人之致又云用修著書百餘種時分宜故相乞品詩於萬里外司空劉元瑞得神樓曲棲息終身其珍重如此至海內名流若永昌張愈光謂其立朝去國𢎞業葆貞華容孫仲可謂其旁通廣畜名髙衆忌嘉州程給事謂其稗官小説因微適道崑山周太僕謂其權衡操縱含英茹實四明張司馬謂其片詞纎指根沿古初太倉王廷尉謂其才情蓋代使事最工即諸家品而用修可知也黃清甫云楊喜用用僻事多著浮彩搜羅刻削無出其右而駢繪既繁性情多盡傳謂美能沒禮詩亦有之至誦其可憐風雨夜長在客塗中又江花與江草異國看春生情境俱窮真堪隕淚李時逺云用修評他人詩精當不可假借其所作未必如所評亦人才之通弊也胡元瑞云用修才情問學在𢎞正後嘉隆前挺出倔起無復依傍自是一時之傑格不甚髙而清新綺縟獨掇六朝之秀合作者殊自斐然又云皇甫子循以六朝語入中唐調而清空無迹楊用修以六朝語作初唐調而雕繪滿前故知詩有别才學貴善用陳卧子云用修繁蔚之中時見新警宋轅文云用修病在貪博故使事處往往求巧得拙要其天才本是竒麗真如七寶流蘇靜志居詩話虞伯生告袁伯長云文章之妙惟浙中庖者知之若川人之為庖也粗塊而大臠濃醯而厚醬非不果然饜也而飲食之味微矣浙中之庖則不然凡水陸之産皆擇取柔甘調其湆齊澄之有方而潔之不巳視之泠然水也而五味之和各得所求羽毛鱗甲之珍不易故性為文之妙亦猶是耳讀用修詩無異川人之庖矣豫為之調擇澄潔去其濃醘厚醬蓋竊比於浙中之庖之義云行旅行旅苦日短勞人知路遙忽忽嵗云暮客心中搖搖曠野積寒氣四望但寂寥嚴霜下豐草朔風鳴枯條浮雲起為蓋堅氷結為橋白日隱餘照玄雲暗層霄鳴轂無停輪嘶馬不解鑣飛鳥夕知還征塗何迢迢無以慰苦辛興言自成謡三岔驛三岔驛十字路北去南來幾朝暮朝見揚揚擁蓋來暮看寂寂回車去今古銷沈名利中短亭流水長亭樹賦得千山紅樹圖送楊茂之蕭郎雅工金碧畫愛畫碧雞與金馬畫作千山紅樹圖行色秋光兩瀟灑搖落深知宋玉悲登山臨水送將歸丹林初曉清霜重紫谷斜陽赤燒微故人辭我故鄉去滇樹遙遙接巴樹桑落他山共醉時楓香客路銷魂處白首遐荒老未還流波落木慘離顔錦城紅樹那能見千里隨君夢裏攀錦津舟中對酒别劉善充錦江煙水星橋渡惜别愁攀江上樹青青楊栁故鄉遙渺渺征人大荒去蘇武流離十九年誰傳書札上林邊北風代馬南枝鳥腸斷當年蜀國弦送余學官歸羅江豆子山打瓦鼓陽坪關撤白雨白雨下娶龍女織得絹二丈五一半屬羅江一半屬玄武我誦綿州歌思鄉心獨苦送君歸羅江浦宿金沙江往年曽向嘉陵宿驛樓東畔闌干曲江聲徹夜動離愁月色中天照幽獨豈意飄零瘴海頭嘉陵回首轉悠悠江聲月色何堪説腸斷金沙萬里流山行即事桐子花開映村塢單衣初試貧兒舞春寒已過四十五十二月朔旦南郊扈從省牲天仗雲門外宵衣曉漏前蒼龍旗影動朱鷺鼓聲傳星爛甘泉燭霜清泰畤煙南郊警新畢重覩孝皇年方思道云得初唐體咸陽帝里繁華歇神皋嵗月多秦城依北斗渭水象天河頽堞無遺土驚川有逝波丘陵沈霸氣松柏起悲歌青橋聞道盤雲棧郵亭枕水涯猿猱臨客路雞犬隔仙家風起青丘樹春迷玉洞花旅懷今日豁停幰問裦斜送髙公次長洲尹祖帳燕臺下官曹震澤東星躔牛斗近地脈海潮通新水催飛鷁微霜度早鴻循良多暇日題詠繼文雄寄石季瞻赴臨安謫聞道炎方謫遙從瘴海過後期淹嵗月前路任風波霄漢蜚鴻逺關門虎豹多小居何處問薜荔在山阿送周子庚都憲撫邊肅肅戒嚴程蕭蕭邊一作斑馬鳴龍庭新節制騎省舊才名玉律調秋氣金鐃寢夜聲隴雲笳外結關月笛中明鸞朔臨秦障鶉瓢繞漢城沙汀行見鴈海樹坐聞鶯遊霧懷前賞歸風遡别情佇聽歌凱入一舉塞垣清送客合尊且醉花間分襟易慘愁顔朝下春風紫陌天涯落日青山美人明月相望遊子浮雲獨還愁見河橋栁色勞歌一曲陽關春興最髙樓上俯晴川萬里登臨絶塞邊碣石東浮三絳色秀峰西合點蒼煙天涯遊子懸雙淚海畔孤臣謫九年虛擬短衣隨李廣漢家無事勒燕然中秋禁中對月漢家臺殿號明光月滿秋髙夜未央銀箭金壺催漏水仙音法曲獻霓裳路車天逺鸞聲靜宮扇風多雉影涼千里可憐同此夕美人迢遞隔西方懷歸星橋南望沈犀渚雪嶺西連抱珥河關塞渺茫魂夢隔山川迢遞别離多汀洲春雨搴芳杜茅屋秋風帶女蘿心事未從詹尹卜生涯聊聽僰童歌李君偕過皋橋新居言别沙門草閣對漁舟坐俯昆池萬里流蕭索暮塗猶浪迹登臨暇日豈銷憂阮公失路誰青眼江令還家尚黑頭行見羣英滿青瑣寧忘一老在滄洲竹枝詞夔州府城白帝西家家樓閣層層梯冬雪下來不到地春水生時與樹齊滇海竹枝詞東浦彩虹懸水樁西山白雨點寒江煙中艇子搖兩槳空裏鷺鷥飛一雙自注滇人喚虹霓為水樁寄逺曲濯錦江頭煙水緑相思萬里人如玉瑶琴别後不曽彈今朝才理將歸曲江陵舟中贈田李二子落月寒沙夜未分玉簫金管醉中聞明朝回首沅江路愁聽清猿和白雲望中條山征馬長鳴向北風崤關回首暮雲東太行過盡中條出一路青山白雪中于役江鄉歸經板橋千里長征不憚遙解鞍明日問歸橈真如謝朓宣城路南浦新林過板橋贈箏人綺筵雕俎喚新聲博取瓊花出玉英肯信博陵崔十四平生願作樂中箏張璧一首璧字崇象石首人正德辛未進士改庶吉士纍官太子太保禮部尚書東閣大學士贈少保諡文簡有陽峰家藏集尹巽峰遣祀衡山得配字天王御宸位相國熙帝載維時肇初元秩禮肆禋類皇皇遣近臣肅肅將逺賚顧兹南嶽鎮而與朱鳥配星分當翼軫地望等恆岱坤維得艮止后土資負載祝融正盤紆靈爽豈茫昧巽峰天下士祗命壤內晨裝發潞河夕舸達江匯犧宰設衡楅虞人剪荒穢再宿整襟冠三薰潔醇酹樂張洞庭野紉憶蘭芷佩探歷道彌廣登覽神愈倍禮成眷桑梓敬止重風槩秋徂命倌人星言理征駾於皇念啓沃遲子日展對悽惻懷修塗音塵慰寮寀王以旗一首以旗字士招江寧人正德辛未進士纍官太子太保兵部尚書兼右都御史贈少保諡襄敏有石岡集九日登長城關樓邊塞髙登百尺樓遙天極目迥消愁穹廬逺向西番徙烽火無勞內地憂四野牛羊隨處牧千家禾黍滿場收喜看安阜叨清宴醉倚黃花插白頭孫承恩一首承恩字貞父松江華亭人正德辛未進士歷官太子少保禮部尚書兼翰林學士掌詹事府贈太子太保諡文簡有使郢稿經孟浩然故里孟六亦髙人神思乃清朗讀書陋拘牽制行喜疏曠賦詩妙天趣力索不可仿沖融大雅音金石振遺響禁中遇天子召對心所向終焉意不合歸哉南山放唐詩盛千古公也李杜行布衣一時窮髙譽後人仰我來經故里慨矣勞緬想鹿門當時月依依漢江上王道一首道字純甫武城人正德辛未進士改庶吉士歷官吏部右侍郎贈禮部尚書諡文定有順渠文集詩話順渠説經不墮宋人理窟詩雖無意求工亦少習氣過舊居有感破屋頽垣是幾年重來下馬一悽然丁寧好護門前栁曽繫詩人萬里船汪玄錫一首玄錫字天啓婺源人正德辛未進士選給事中升太僕卿擢都御史巡撫江西入為戶部侍郎卒贈尚書有東峰集朝鴉景陽鐘動曉鴉飛漢殿千官拜玉墀仙仗才移東殿去翩翩棲滿萬年枝陳達甫云此司徒初入掖垣時作也託喻可想許成名一首成名字思仁聊城人正德辛未進士改庶吉士授編修歷諭德進侍讀學士遷太常寺卿掌國子祭酒升禮部右侍郎有龍石稿蘇榖原云龍石詩清新俊逸健拔謹嚴蓋朱中立云龍石詩氣平音和晚唐之佳者西師上谷烽煙猶未定西戎消息近如何莎車空憶班都護銅柱曽聞馬伏波鐵騎休論榆塞險羽書今報劒門多何時籌䇿銷金甲會見旋師振玉珂陳用亶云詩亦具體特銅柱鐵騎金甲未免近復爾屠徑一首徑字直卿鄞縣人太保滽子正德辛未進士官吏部郎中夜聞笛夢破寒猶重更長客更愁何人吹短笛今夜在南樓屠僑二首僑字安卿鄞縣人正德辛未進士纍官太子太保左都御史贈少保諡簡肅有東洲雜稿江頭晚步薄晚江行意若何夕陽微影漏林柯緣崖白鳥沙痕淺隔岸青山塔影多下網人聽潮外語入村船載渡頭歌觀瀾不用登遐絶百里蛟門送海波雨夜泊塘棲出關彌望凍雲低畫鷁迎春未試題四十五程燈火夜一川風雨泊塘棲柴竒一首竒字德美崑山人正德辛未進士歷官應天府尹有黼菴遺稿鄒謙之云黼菴胸無城府言無粉繪行無機穽詩文皆典雅雄健不落骫骳不矜刻峭鬱周子籲云京兆詩文雄麗􅔍有氣勉聞姪汝父三十三一疾棄諸孤汝母二十九赤手抱二雛辛勤二十年完此身後圖汝兄亦已矣所望在汝軀汝今逾三十尚爾在泥塗年齒日已長嵗月易以徂父書能讀否狂藥曽戒無汝若不努力何以慰老夫繆天自云語雖淺而不膚汪文盛一首文盛字希周崇陽人正德辛未進士除饒州府推官入為武選主事諌南巡廷杖嘉靖初出知福州府歷官按察使以僉都御史巡撫雲南進大理卿有白泉集西苑萬年枝上露華清百子池邊月色明宮草經秋猶自碧君王御輦不曽行郭維藩一首維藩字價夫儀封人正德辛未進士歷官太常寺少卿兼翰林院侍讀學士掌院事送髙穎之少卿赴南都廣陵别後金陵别舊嵗君來今嵗歸回首十年猶反掌含情千里各沾衣江萍逐棹隨流水雲樹連天入翠微卿佐官間南國勝湖山清賞莫相違郝鳳升二首鳳升字瑞卿汀州衛人正德辛未進士大理寺副有九龍山房集聖駕入城警蹕都門裏傳呼天子歸有生皆帝德不怒自民威衣帶千金誓湯城萬里圍自今歸馬後紫極但垂衣無題來去渾疑雲雨蹤楚王宮北數聲鐘情當厚處翻成怨淚到乾時不覺濃煙縷湘裙飛蛺蝶玉屛羅幕墮芙蓉月中剩有森森桂遮却清光第幾重遊璉一首璉字世重連江人正德辛未進士歷官廣東按察副使有少石稿興田道中興田驛路人家繞煙火依稀出逺山䉀圃秧分疏雨外茶煙人語亂雲間半生戀闕心空赤五馬之官鬢欲斑獨坐肩輿懷正惡武夷遙望一開顔汪必東一首必東字希會崇陽人正德辛未進士歷官河南參政有南雋集過劉家隔崛起劉家隔周流漢水川白連雲夢澤青帶郢門煙蜂蟻偏屯聚魚鹽競貿遷最憐貧土著蒿裏剪桑田齊之鸞十五首之鸞字瑞卿桐城人正德辛未進士改庶吉士授刑科給事中歷吏兵二科左右給事世宗即位考察謫崇德縣丞移知長興縣稍遷南京刑部郎中以陜西按察僉事巡寧夏升副使改河南再改山東終河南按察使有蓉川集汪可亭云公屬文藻麗不尚竒澀而語意新妙詩有一韻疊至數十首者搜探竒崛毫末不遺他人多即難工公有餘力矣文錢飲光云公詩文妙當世開吾鄉風氣之始絶去枝蔓直攄所欲言詩有氣力精采往往造出人意表大抵一意孤行無所依附潘蜀藻云讀齊公南征紀行入夏録未嘗不咨嗟歎詠以為沈鬱渾脫大得瀼西之傳北地猶去而千里詩話蓉川在給舍最為敢言侃侃不阿止康陵罷設花酒店不當論威武大將軍功寧庶人造龍艘戲劇潛結近幸邀帝南幸圖謀不軌行有日矣偕邢給事寰許給事復禮留駕及康陵親征又作回鑾賦以諷且力白王新建之誣洵骨鯁之臣也顧見容於康陵而不容於永陵何哉及入西夏值早潦之餘見居人刈蓬科其類有棉蓬刺蓬二種子皆可以為麵飢民藉以充腹取而啖之苦惡辛澀乃封題以進且言國家有大可憂之事三廟謨有深可惜者四斥及議禮大臣并責永陵不能虛已可謂言人所不敢言矣入夏諸詩山川險隘誦之有如聚米與尹僉事耕並工惜乎志邊關者均未之采録也晚宿良鄉我行至良鄉車駕已臨涿官藏供億煩吏走威勢捉人馬正飢疲晚得粟一握華館據髙軒敝廬聊破幄階前樹却佳緑葉未全剝獨坐新霽清悠然念盤錯自顧章句生胡此擁矛矟感時不成寐起視明河數月色忽半窗枕上聞吹角龍門龕伊水出龍門疏鑿惟禹績溪縈匯澄潭雲斷劃絶壁泛舟巡南崖諸龕空翠滴逺疑穴陶復近聽境寥闃黃冠一人來導我縱幽覿何年驅鬼工深窟隱金狄頎然丈六身大小隨刓剔旁有鉦鼓鳴愚氓伺考擊自從拓跋來事佛轉成癖荒哉魏王泰孝誠空爾激不知文德賢坤美符帝錫天堂無則巳有則必登歷何事石上災千古不可滌無乃託親名志祈潛奪嫡欲為生民主先被河神溺向使正儲位亦終貽唐戚經行謾誅心期使來者惕稠桑道中望黃河桃林蟠土山谷入昧所出地底無傍風天際有中日仰視耕穫人轉折忽相失仄登蟻緣枝幽盤蠧閉帙僕夫虞殞傷反汗更股栗伊豫慕昔賢馭吏屢遭叱徑盡躡河壖黃流過箭疾踰關勢彌雄四齧奔馬逸不知真宰意何貴砥柱窒泛濫民其魚豈止桑田溢三門中古開神禹功誰匹至今沮洳場盡作粳稻窟吾生髮半蒼世路十不一及兹瞻華嵩眼豁心神翐向來險逺虞兹晨憂已釋寧州曉發燈火啓嚴城戴星行未已夜來下絶坂左右崇墉倚昏黑迷前旌時顧斗杓指晨雞登頓初險澀曙光紫林原衍山巔溪壑行地裏坡陀首乾龍浮立土不滓所以穴居民患燥不患水改邑視井泉卑棲固其理耕者百仞上汲者千尋底下山阻深溝上山據髙壘四鄰守無虞塞馬徒為駛民貧獨可憂咸秦此脣齒書郾城縣臺壁長路淹炎日驅馳損壯心倦便雙柏坐幽伴一蛩吟嘉穀連河內飛蝗度汝隂經過見人樂亦足豁煩襟邠州曉發二首殘月征人早州城奧窔間呼船渡涇水立馬望豳山禾黍髙低壟煙雲逺近關誰能渠白石種稻濁泥灣涇北山橫絶穿崖細路髙偏懸疑有麓峻極乃平皋嶺露催禾黍秋風颯苧袍憂勤見遺俗無地立蓬蒿靈祐驛次毛東塘韻江路盤山轉頽垣此驛亭塞雲風外白畦菽露中青鳥雀無歸樹驊騮不在坰誰教心匪石自信迹如萍元旦次潘大行宗魯韻三朝待漏趨金闕五拜瞻天散紫宸宦迹只尋常裏過皇圖又十四回新花邊劒佩明初景塞外旌旗駐早春安得封疆倚頗牧坐紓北顧掃蜂屯將至茌平長途秋暮馬騑騑風起塵髙雉堞微蟬到夕陽聲更急樹經寒露葉初飛正聞老母平安信兼喜中丞克捷威揚䇿不知行色倦欲沽村釀解朝衣謁范韓祀拓跋餘凶勢更張二公相望屹金湯一堂俎豆瞻遺像萬古河山識巨防賈䇿清時薪抱火虞淵昏夜日重光秋隂晝轉空階樹恨入邊烽照朔方赤木裏口墩下坐憩赤木空濛翠接天懸車路杪下烽煙須驅虎北馮金塔更走龍南跨玉泉青草谷中兼得水白雲巖下盡堪田奔馳庶竭涓埃報心苦三陲版幹前過田州故城河外軍藩麥秀中唐兵昔數朔方雄韓公北築三城路至德中興一旅功番刻徑銷春蘚碧漢花穠映寺門紅髙雲不罩田州塔水鶴歸巢戛暮空九日塗次登清水關城朔方三度重陽節河曲干旌嵗嵗忙鬢髮已甘塵路白菊花猶見塞垣黃中丞疏有回天力太宰功無縮地方雲外好呼南去鴈繫書先為報江鄉渡河六言有意唱籌益粟無神驅石修邊四月黃沙八渡雙旌紫塞三年毛憲一首憲字式之武進人正德辛未進士官禮科右給事中有古菴集詩話古菴講學主道南書院詩非所長具體而已題扇雲山擁前溪竹樹傍崖石晴風駕扁舟興到任所適水色與天光上下涵一碧習靜久忘機魚鳥亦馴格誰知至樂心物類固無隔周廷用四首廷用字子賢華容人正德辛未進士授宜黃知縣入為御史外補僉事參議福建備兵四川進江西按察使有八崖集顧華玉云子賢才稟超融文鋒迅湧援筆長賦爛然成章詩話八崖放言忤俗東橋深惜之國寶新編以之為殿贊云按察人豪闊視放言文藻性成早垂巨篇然製作庸庸求其巨篇頗罕池上晚坐皎鏡淨方塘月波涵一碧瀲灩照修篁風聲鳴瑟瑟愛此淡忘歸呼童卷湘帙清籟動我衣微露潤我幘繁星燦以羅羣嚻久復寂沖曠得所怡稅駕將何適攢宮宋家陵墓滿空山北望嵩丘路險艱一代龍蛇逢末運百年鳬鴈出塵寰空聞玉椁金城返不見旌旗瀚海還無限鼎湖湘水怨白雲斑竹淚潸潸經廣武城廣武城邊草樹青濁河波浪晝冥冥天呼垓下真龍起事異鴻溝白馬刑日晚沙場留返照秋風磷火亂殘星英雄自古功無敵阮籍狂言未可聽過壤東壤東瀼西雲日晴官船撾鼓上灘行不憎檣燕風前語最愛山花雨後明杜甫草堂元地勝孔明圖陳自天成明朝灩澦瞿塘上却望連雲棧閣橫孫繼芳一首繼芳字世其華容人正德辛未進士除刑部主事改兵部歷員外諫南巡廷杖尋遷郎中出為雲南提學副使有石磯集送徐太史使遼府節重天王使情親帝子家雲霄三殿詔波浪九江槎庾亮樓前月湘娥廟裏花金樽髙宴罷須擬弔長沙北征還朝凱歌牙旗寶蓋耀星文椅鹿牽羊總百羣二十四通催羯鼓帳前齊賀大將軍李際元一首際元陽穀人正德辛未進士歷官按察僉事雙流次韻鼓角催晨發川原藹暮隂小溪清見石新栁細垂金洞迥雲依樹山深鳥隔林天涯看落月盈縮飽經心盧雍一首雍字師邵吳縣人正德辛未進士官監察御史有古園集泊頭晚泊欲訪子濟侍御不果河流寒未凍市集晚猶喧日落新橋驛煙生獨樹村沙船露燈影灘石帶氷痕不見西臺客幽懷誰與論王璜二首璜字廷實濬縣人正德辛未進士除陜西道御史巡按浙江雲中歌二首潮湧雲屯外四家操回馬首帶金花行人莫笑應州小武廟當年駐翠華雲州城外日風沙雲州城裏日繁華金叉行酒將軍喜醉倒銀壺小校家徐咸五首咸字子正海鹽人正德辛未進士除知沔陽州入為兵部主事歷官襄陽知府有東濵稿詩話東濵為豐崖同母弟昆友皆嫻風雅歸田後築園城闉名曰餘春中疊石為小東山與錢東畬太守朱西村山人輩結小瀛洲十老社其後倭人入冦所在焚儲積遂舍園基以為倉焉句如路自窮崖入人如倦鳥還千年牛首寺一勺虎跑泉客醉黃花酒僧供白雪糕棘林花落子茒屋燕將兒山逺不聞漏夜寒疑有霜頗類賈島佛井南社飲得影字層樓俯青林芳筵接髙迥衆賔來逶迤被服野而整時維沍寒後風日不作冷江梅泄春香鳴禽戀餘景時物適我懷忘却酒力猛飄風吹人衣素髮颯垂領浩歌入城闉海鶴振孤影石首蓬萊閣蓬萊髙閣臨清漢閣下風濤日夕撞花日映紅明霽野草煙浮緑翳晴窗雕闌逺挹荆南勝玉笛新開洞府腔悵望謫仙何處去娟娟秋月照澄江夜坐涼飇落長松明月出東嶺空山夜無人玄鶴不聞警西園雜詠南園老梅苦寂寞移種北園臨小池却憐池水淨如鏡照見橫斜三兩枝湖上涌金門外水青青倒浸西山似畫屏十里暖風魚浪細扁舟忽過望湖亭趙漢二首漢字鴻逵平湖人正德辛未進士除建昌推官入為給事中轉山西參政有漸齋集泊瓜州山寺清鐘曉江帆細雨秋瓜洲三日泊不為阻風留湖上鳥入山光去舟分樹影過秋江平似掌何處起風波南大吉二首大吉字元善渭南人正德辛未進士授戶部主事歷郎中出知紹興府有瑞泉集詩話元善好青紫囊書妙善占墓其守紹興謂窆石非禹葬處别於廟東南建豐碑題曰大禹陵其後望秩於是處焉五言詩頗穩帖無秦人慷厲之氣聞駕幸朔方鐵騎緑沈槍傳聞下朔方紫臺邊月白青海陳雲黃寢閣雞聲早行營虎步長巡遊稱聖世車迹到幽荒和馬仲房雨涼風吹晝雨蕭颯自西岑細細緣郊迥霏霏度闕深雙虹明夕照萬戶動秋砧為想西征輦應停北塞隂常倫五首倫字明卿沁水人正德辛未進士除大理評事謫夀州判官遷知寧羌州有評事集王元美云常明卿如沙苑兒駒驕嘶自賞未諧步驟運陳卧子云明卿氣骨髙朗頗能自望山有懷故居羈步局重城流觀狹西野髙髙見西山鄉愁冀傾寫天際望不極延佇一瀟灑落葉歸故根山雲滿秋檟無情尚有適何以慰離者客行篇寄山中所知客行千里道塵土緇裳衣鬱鬱胡不樂思欲復西歸逝者如斯夫朝露待日晞人生一世間乃與願相違黃鵠舉何迥鷦鷯棲何卑撫劒獨嗟吒臨岐浩徘徊因風寄黃綺管晏非所希和王玉溪過韓信嶺漢代推英武將軍第一人禍竒因躡足功大不謀身帶礪山河舊丹青祠廟新長陵一抔土寂寞亦三秦竹庭竹娟娟色虛堂肅晚隂翠交紅果潤清蔭碧苔深涼月侵氷簟流風送玉琴嵗寒終不改長此護雙林采蓮曲素月開歌扇紅蕖豔舞衣隔江聞笑語隱隱棹歌歸俞璋一首璋字朝相崑山人正德辛未進士官大理評事上方山寺晝隂寂緑蘿覆繩牀乍愛石苔古忽聞蘭草香逺樹多暮色幽泉有深光持此積喧意來訪逍遙場頓鋭九首鋭涿州人正德辛未進士官戶部主事一云長史有鷗汀漁嘯集詩話長史時名籍甚北人語云涿郡有才才一石鋭得其八詩頗警拔微嫌冗長耳樓桑廟迎送神曲二首帝子降兮范之陽恍臨睨兮舊鄉山蒼蒼兮水泱泱神之來兮驂駟虯玉鸞鳴兮啾啾雲車兮羽蓋樓桑隂兮蔽芾牲既肥兮酒香繐帷施兮雕玉牀荃髙坐兮樂未央帝子去兮安之違桑梓兮心孔悲白帝城兮永安宮魚之腹兮蠶叢巫陽雲雨兮洞庭波雖信美而非吾土兮矧蛟鰐與黿鼉歸來兮歸來其樂兮如何銅雀妓西陵芳草合松柏半為薪宮殿飛銅雀下飲漳河濵檀煙冷餘燼繐帳網流塵白頭歌舞妓來教晉宮人出聖水關往鳳皇山寺鑯峻攢泬寥參差入煙霧塗疑鬼工鑿石截亂流渡詰曲駭千轉坦蕩不數步隂崖匯靈淵未冬已寒沍欲上仍趦趄先登必奮怒谷響雜鼯鼪澗蹤過狐兔斷徑屢猱接傾巖數狼顧肆貪興會竒強制心膽怖睨憎仄磴危足試欹岑固漸與世人隔遂愜平生慕絶塵乃無地升天疑有路得意真忘言無心忽成句象設教莫袪煙霞疾已痼空寂排冥詮清虛獲玄悟塵網奄頽齡恨為造化誤臯湖秋晚木落天宇清草枯風力徑平湖著微霜摧此萬荷柄蓐收浸無權玄冥欲司政逺山寒更翠積水曠而淨湘娥理晨妝髻鬟墮明鏡輕飇漾淪漣碧緑交掩映水鳥各沈浮遊泳自其性安得金石膏瘥我山水病湖莊秋事郊墟絶喧豗村落斷輪鞅况兹千頃湖初秋減新漲無日不沈山有風即生浪微波淨漣漪晴宇墮空曠野服時登臨箕踞衡臯上興闌聊詠歸扶將獨藜杖鹿門龐德公栗里陶元亮如此足百年外無分寸望觀鬬蟋蟀蟋蟀著豳風泉壤恆食息迎隂已振羽欲鳴先鼓翼候氣感化機吟秋率其職於世無所爭豈有剛膂力都緣助人意自負萬夫特見敵豎兩股怒鬚如卓棘昂藏忿塞胸彭亨氣填臆將搏必踞蹲思奮肆陵逼既却還直前已困未甘踣雄心期決勝壯志冀必克依稀觸與蠻蝸角並開國人生亦類斯駒隙競失得知雄守其雌老氏有淵識房山孔水洞石竇水拖練靈源地絶塵浪傳飛白鼠無處隱赬鱗入夏桃花盡經春荇葉新輕舠不可入豈有避秦人西巡曲飛輪擊水日三千咫尺長安在日邊試向茂陵髙處望未央前殿立銅仙王溱一首溱字公濟開州人正德辛未進士除沁水知縣擢廣西道御史出知平陽府遷鹽運使致仕落星寺别蔣南泠别意隨流水回船過落星湖光侵寺碧山色入簾青鷗鷺馴沙岸魚龍駭石汀虛堂歸興渺煙浪晚冥冥陸俸一首俸字天爵號桃谷吳縣人正德辛未進士歷官寶慶知府嶽東伯云桃谷早登仕籍無暇篇章晚就操觚遂超多士靈心夙構穎悟居多朝夕苦吟已收時論蓋能守約少陵之方博施唐人之作者也酬劉子古鏡古鏡不自惜遙緘千里音懸懸照肝膽奚啻雙南金貟質凝精光螭盤古銘深明月入我懷聊復理吾簪與君别幾時鬢髮雪已侵冉冉悲年暮悠悠空陸沈願言保不缺報君久要心明詩綜卷三十九
