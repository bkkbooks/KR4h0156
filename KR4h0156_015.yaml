body:
  text: 明詩綜卷十五翰林院檢討朱彛尊編周致堯四首致堯字煥文崇德人平江書院山長有山長集靜志居詩詁山長舊有鈔集存崇德縣學有閩人知縣事者携之歸遂失傳今所存者槜李英華湖海耆英集所收一二而已曹能始石倉詩選載山長詩較富或在閩得覩其全爾豫友髙念祖謂豫山長名棐以字行而蔣布衣楚稚則云字煥文致堯其名考陳緝熙文有送周煥文從唐伯剛之吳興作疑布衣之言得其實也懷古我愛陶淵明所居惟種柳與世實寡諧委懷在杯酒不有千古心誰識千載後意欲從之遊斯人復何有夏夜宿流虹寺有感馳騖竟朝暮似緣飢凍迫如何百年間區區為形役世塗寡相知靦顔徒自飾所獲既非寶所喪良可惜生理固草草進退量我力聖道卒未聞怛焉增內惕西津夜泊孤帆夜落石橋西橋外青山入會稽卧聽海潮吹地轉起看江月向人低一春衰謝憐皮骨萬國艱虞厭鼓鼙何處商船歌水調令人歸思益悽迷寄沂陽劉廷鎮員外故人相與最從容尚憶論詩向一作五夜中白首無家千里别青山何處一樽同夢回孤館燈前雨目斷西風塞上鴻誰識離懷愁絶處野亭依舊穆陵東劉渙二首渙字彥亨紹興山隂人至正間薦授三茅書院山長道梗不赴卒于洪武間詩話彥亨受學楊門不離書樓舊染絶句二首白玉搔頭金步搖春衫紅勝海棠嬌只因記得當年事重到桃花第四橋鬢薄雲鬆緑霧涼春風額點麝臍黃背人撲得雙胡蝶滿扇薔薇露水香凌雲翰二十首雲翰字彥翀錢塘人元末蘭亭書院山長洪武初以薦授四川成都教授有柘軒集瞿宗吉云先生兼工諸作不以一善成名樂陳光世云柘軒詩諸體悉備莊敬而不褻和而不淫雖無刻苦麗密之工而平易典則發乎情之自然有足觀者詩話柘軒學於陳衆仲故其詩華而不靡馳騁而不離乎軌五言如陪祭作七言如鬼獵圗才情奔放不可羈靮直可搴郁離之旗摩青丘之壘集中與張行中論詩云艱深文淺近臭腐化神竒每到真成趣由來不費辭其自得之深矣奉和許彥章檢校陪祭有作三十韻學古始入官為有民社寄此理均人臣矧職居相位祀典遵百王法守由一揆丘陵以為壇陶匏以為器既嚴神祗稱復辨上下次成象本乎天成形本乎地牲牢貴腯充禮樂尚明備瞻仰民所從財用國攸繫兩儀同乾坤七廟異渙萃日臨齋戒期卜叶享祀利不愆斯不忘能備乃能祭皇風浩無垠盛世寧有替於時蟄蟲驚應候玄鳥至風霆為昭明山川載神氣鍠鍠鳴鼓鐘秩秩陳簠簋翩然靈之來允矣誠所致有美文武臣夙抱純一志燎明夜向晨月白天在水鵠立儼當中駿奔走其際欣欣神樂康簡簡福相熾湛露流玉階泠風襲瓊佩方當感格時已著充滿意禮行士無譁樂奏神所蒞益之以十朋介之以繁祉祈報止春秋敬恭止壇壝玉燭一鼎調金成萬寶遂三獻迄有終九府均被賜豈期康衢民獲覩放勳世雷動車馬還日出海波沸作詩聊記年皇明甲寅嵗送趙永貞改丞德化縣舟行何遙遙南風揚旗尾江上無雜花青青盡蘆葦于時潮已平波動日光煒中流雙櫓鳴愛此兒郎偉餞行豈無詩成章愧其斐會看展驥足如公信無幾畫菜髙田宜種蔬下田宜種穡嵗饉與飢同安敢望肉食雨餘理荒畦甲坼資地力會看根本長取之戒勿亟天公憐我貧此物頗不嗇便如終嵗謀十甕擬可得含笑披畫圖流涎欲霑臆長能咬菜根天下無此色趙大年蘆鴈圖平林帶煙波渺渺風低葭菼秋聲小望中疑是彭蠡湖十百為羣盡陽鳥楚天未雪無雨霜南來豈必無稻粱哀音若訴雲路迥老翅不厭關河長汀洲水落成平陸散亂鳬鷖聚沙曲低飛不肯伴寒鴉猶繞荒村破茅屋屋中有客揮五絃從之不得心茫然何人畫圖能著此趙氏丹青稱大年徽廟元年頒鳳厯此圖正是當時迹便從宣和到靖康艮嶽禽聲起秋夕古往今來幾盛衰摩挲老眼竟成悲良工心苦人莫識似寫周宣鴻雁詩包山玩月次瞿宗吉韻昔我曲江觀怒濤越山不及吳山髙如何古有任公子一釣乃能連六鼇我今杖藜尋翠麓地有白雲人不俗丹房火冷碧窗虛夜半秋聲撼林竹踏歌連臂下仙壇目斷西山吳彩鸞桂花飛簾作香雪轉首便覺秋闌珊人生歡樂難再得始信光隂如過客陶令空披漉酒巾謝公謾著登山屐菴前堵牆如白虹洞門不掩來江風分師半席師已許經筵蠟燭搖秋紅郊何為寒島何瘦新雨能來寧論舊今宵爛熳得好晴知是何人補天漏少壯而老理則常胡能不死雕三光放麑西巴誠不忍歌鳯接輿無乃狂兹遊可繼五君詠祀事同陪匪乘興中庭坐待明月來樹影團團一時並關山雪霽圖前峰後峰雪糢糊東村西村春有無快雪時晴入佳想况復見此關山圖關山迢遞相聨屬玉潔珠光眩人目扶桑飛上金畢逋暗水流澌度空谷野橋行過路三乂青旗插簷沽酒家驅驢倦客得少憩悵望逺道還咨嗟詩翁好事常起早天寒祗恐梅花老柴門時有故人來階下白雲須用掃此圖一日落塵寰筆法依希荆與關人生逺遊固云樂何似在家長看山我本識字耕夫耳占祥便作豐年喜田園歸隱會有時麥飯飽餐茅屋砥送謝鐵崖遊龍虎山有美人兮懷逺遊逍遙九州復九州暫來淮楚與吳越五雲飛上千金裘八公山在淝水上草木尚若森戈矛澄江如練誰解道况聞好鳥喧春洲東山薔薇幾回落昔人何處青苔稠錢唐故宫盡禾黍帝子一去江空流客兒亭前髙興發便欲著屐窮深幽天雞三鳴更五點海日湧出黃金虯瑶笙聲斷白鶴逺知有子晉從浮丘蟠桃開花今已實似許方朔重來偷如何去作龍虎客逺慕漢代張留侯我聞仙翁號虛靖草菴宛在山之陬長乘丹光翳彩鳯或有紫氣垂青牛子能候之問至道黃庭內景非難求四方上下遊已遍歸來十二仙人樓樓中長嘯弄明月握手一笑三千秋陳居中進馬圖明王慎德蠻夷賔尺天寸地皆王臣逺人重譯貢龍馬流沙萬里來麒麟金丸聲動佛郎國寶劒氣接明河津不知何年離榆塞但見此日朝楓宸毛騧生來玉琢鼻錢驄隱起花攢鱗最後赭白信無敵如此丹青疑有神騰驤欲飛使者喜控制不得奚奴嗔我聞陳閲善匠意無乃韓幹為前身按之圖中得所似惜哉世上遺其真驪黃牝牡不易索九方皋後知何人鬼獵圖終南進士乃好武野魅山精皆部伍搜田也欲從四時作氣恍如聆一鼓銅鉦先鳴地欲裂皂蓋後張風為舉蹇驢足跛不受鞭良犬尾搖何用組錦絛未許縱蒼鷹鐵縆猶能縳玄虎跳踉衆鬼為卒徒矍鑠一翁作謀主或為狼顧背拔鎗或作猱升前試斧鴟鳴口應已張弓蛇偃肩擔來彀弩身憑大盾宛轉遮手㺯飛槌髙下舞坐作擊刺衆莫當進退超驤孰敢侮猙獰似覺口吐牙輕捷渾疑臂生羽逐禽不假御車輿獲獸何勞施網罟亦如塵世有司存頗類神仙足官府畫工後輩效前人戲筆何年追舊譜已無吳生名擅場復有顔輝好竒古周易取象車載一韓子送窮名數五如斯情狀不易知更欲形容亦良苦且須留取作嵗除竹爆一聲春滿宇詩話畫終南進士者南唐周文矩蜀石恪汴京楊棐其初類設色為之至龔髙士聖豫易以深墨其法師趙千里丁香鬼離竒變化自比書家草聖於是詩林多作長歌自聖豫而外若宋子虛李鳴鳯王肖翁韓性陳叔方楊廉夫李宗表劉伯溫各事摹寫要未若柘軒之淋漓盡態也鍾馗畫北風吹沙目欲眯官柳搖黃拂溪水終南進士倔然起蝟磔于思含缺齒袍藍帶角形甚傀烏帽裹頭鞾露指白澤在旁口且哆馴擾不異麟之趾手持上帝書滿紙若曰新嵗錫爾祉一聲竹爆物盡靡明日春光萬餘里湘湖草堂為貢友初賦湘湖卜宅似江郊梅柳同栽己放稍春雨漏時愁在屋秋風怒處憶飛茅蓴絲流滑羮長用荷葉分香飯屢包買得扁舟梭樣大呼童繫在石塘坳清江文會詩為崔驛丞賦清江之水如練澄盍簮此地皆良朋一錢尚懷會稽守二松好效藍田丞忘機鷗鳥偶在座入饌鱸魚還可罾蘭亭陳迹在圖畫新詩莫惜傅溪藤林塘幽乃會稽陳惟賢軒扁又號西疇因贈詩賀監湖頭一曲開林塘幽處著亭臺青山在上水在下黃鳥自啼鷗自來棊局不移長對奕酒船才放即銜杯會稽我昔曾遊地杖履何時得重陪曾瑞卿所作山水圖山關迢遞野橋斜䇿杖幽尋豈憚賒路轉峰回連佛寺雞鳴犬吠隔人家白雲作雨多如絮紅葉驚風少似花不是褐夫能貌得空令泉石老煙霞夏日書懷次沈欽叔韻黃梅子熟暑蒸潤冬青花開雲作隂昨宵北牖雨聲急明日西湖流水深論才子建得八斗換酒太白輕千金幽懷欲寫託長句又聞緑樹新蟬吟送孫敬義還鄉孫綽曾聞賦遂初陶潛亦復詠歸與田園偶爾成圖畫道路依然畏簡書老去還鄉非是速醉來題句未為疏翻思映雪寒窗下客夢時時到故廬嶽鄂王墓前相汪黃後相秦力圗恢復竟何人朱仙路近旌旗晚古汴城髙草木春江月照空薶劒獄邊沙遮斷屬車塵棲霞嶺下將軍冢夜夜悲風起石麟題畫山雨忽開霽溪流繞茅屋時有濯纓人雲端看飛瀑次徐總制韻燕子來時花滿城海棠絲雨半籠晴行人最愛西湖水流入官河也自清劉文質松溪小像為聽松風直過溪長琴分與小童携白雲不隔天台路千樹桃花一鳥啼胡奎六首奎字虛白海寧人寧府教授有斗南老人詩集詩話虛白泊舟鄱陽望湖亭見石刻東坡黑雲推雨未遮山絶句次韻和之書之於壁俄見一叟來誦其詩曰子非斗南老人邪乃為長揖回顧不知所之因以斗南老人自號髙青丘贈胡校書詩所云簸㺯明月琵琶洲者是已其詩功力既深格調未免太熟誦之若古人集中所已有者吾鄉雲東逸史曽手書其稿舊藏項氏天籟閣繼歸髙氏稽古堂今為華山馬思贊所藏余借觀録其六首秋夕月出萬井秋商聲在髙樹風條絡緯鳴露葉流螢度天河一杯水流向西南去坐念素心人佳期渺何處吳江月夜泛舟餘霞斂遙岑微靄生近浦江行得涼夜月出鳴柔櫓茫茫天欲浮厯厯星可數水螢乍明滅沙禽或翔舞此意與誰同三髙渺千古鴛湖舟中玩月團團三五月挂在鴛湖東方舟泛流光坐我青天中低頭看月月在水倒影姮娥呼不起三更露下苧袍涼恍然濯足銀河裏城南斗酒真珠紅與月共醉鮫人宫醒來月落不知處張帆且趁清明風吳江竹枝詞三首青裙女兒雙髻螺唱出吳宫子夜歌酒醒月明眠不得秋風吹起太湖波第四橋邊楓葉秋青裙少婦木蘭舟月明打槳唱歌去驚起蘆花雙白鷗西山日落東山黃儂唱竹枝行晚涼十幅蒲帆弓樣滿南風吹送白龍堂李延興十七首延興字繼本東安人占籍北平至正丁酉進士授太常奉禮兼翰林檢討洪武初屢典邑校有一山集詩話一山北方之學者其詩文頗拔俗長歌尤擅場洪武中雖未仕于朝集有與友人書云從東安丞李遂招致親夏楚事未幾逼為訓導乂有移教房山留别雄縣周尹詩又淶水縣學記云延興猥以謭才代匱學職又自敘云洪武戊午永清劉宰招致攝其鄉學則其典邑校者屢故自贊畫像有云雖同乎今之人而以聖賢為矩墨雖食夫今之祿而視軒冕猶泥塗然一山本元進士而上總戎詩則曰大將軍出沙漠萬里河山盡開拓獲其名王歸四面凱聲作功成獻俘蒲萄宫天清日白開洪濛遂使樓煩之壤化為冠帶衍為提封未免言之太盡無復一成三戶黍離麥秀之思矣江皋圗江晚月未上白煙滿芳洲雨止山氣佳衡扉在巖幽浦迥沙漫漫松深露浮浮水田早稻熟稍欣獲有秋曠爽來清風朱夏炎歊收野人樂江居垂綸水西頭得魚送鄰家酒好仍見留童丱喜相隨浩歌送蜚鷗古時放逹人傲睨輕王侯焉能繫塵鞅憧憧為身謀壁間雜畫山中之人氣奕奕愛畫雲山與水石逺山近山恣一揮頃刻生綃數十尺今代只數髙尚書妙處不減米家筆後之善畫者為誰青山白雲久蕭瑟忽驚座上煙靄生漠漠平林翠如織平生夢想不可到乃在君家雪色壁花發窮林破曉紅水合長天蕩晴碧蘆邊鴈影落回汀沙上漁蓑曬斜日白髮蒼顔四老人棋罷松間坐爭席筍皮笠子大如繖歸去不愁山雨濕爐經九轉鍊丹成杖挂百錢沽酒喫眼看此景不可親况復憧憧事塵役會須結屋山之阿更求好田水之側野人生理日有餘耕歸牛角懸書帙茅簷夜火促寒機古甸秋風收晚栗安車若便下丘樊為勸光生不可出松雪翁畫馬西海之西天地翕合敷靈氛天産天骨超崑崙月窟而東而北幾萬里是馬乃能籋星辰踰渤澥掃空冀北凡馬羣曹將軍是開元以來善畫者蚤以絶藝動紫宸不問驪黃與牝牡筆力到處春無垠往時嘗見一二本世之畫者徒紛紛吳興學士昔在詞林館畫人畫馬咄咄能逼真玉堂朝日射碧瓦瑣窗晴雪吹青春文章之暇奉詔寫龍種氷絹萬幅清無塵此圖神采更飄逸妙處不減曹將軍飛雲滿空散靈雨五花凌亂曉濕蒼龍文人言此是明皇御愛者天香滃鬱飄滿身瑶池渴飲雪滉漾霜蹄迥踏雲嶙峋黃鬚圉官似是太僕張景順自幼調馬馬亦馴想當牽來赤墀下皎如飛龍下天門山齋看畫白晝靜丹粉如沐清心魂龍媒一逝九霄隔龍沙泱漭霜風昏縱今有馬無善畫誰與寫之傳世人吳興自有古作者髙風逺韻不可聞九京安得起公死請公為我放筆電掃層空雲陳君愛畫不弱南金與西玉百回展玩當爐熏南金西玉可力致嗟此神物敻然獨立而無鄰烏乎神物為物固有神直恐變化為龍飛上清都紫微之帝閽石鼓歌乾坤清淑之氣蜿蟺扶輿亘西極化作岐山之陽石鼓十六丁二酉剷斷崑崙之瑶峰縹眇雲根墮穹碧層崖秋碎方祇愁大星宵隕圎靈泣中虛不露疏鑿文太素猶涵渾沌質偉哉周家宣王中興時戈鋋彗雪九縣一明堂受朝羣后來天威不違顔咫尺岐陽之狩載揚國之靈王氣騰霄何赫奕八鸞聲戛秋風髙九旗光動朝暾赤歌車攻詠吉日張皇維昭帝績泰山盤石之祚炳烈千萬春勒之貞珉古無匹其形如鼓不可叩之鳴其體渾朴絶似大造無痕迹其字遒逸宛是篆與科其文古雅髣佛周之什吉甫歌史籀筆制作森嚴照其邑年多物化理則然金字半滅無人識老蛟摧裂野火焚古墨淋漓苔雨蝕青城學士昔在大德初見之林下久歎息入朝亟為丞相言如此至寶何可以棄擲大車彭彭挽致來孔庭天地風雲亦動色我嘗愛此十鼓文字竒撫玩摩挲不知日之夕荏苒光隂數十春春風吹愁髮生白近時再過石鼓旁階草蒙茸沒雙屐細看字畫轉么麼徙倚回廊淚霑臆東安鄧尹彈琴清桂林議論文章脫塵格平生好古如古人直欲搜抉周秦之故實里中更有朱先生白首著書窮日力寄書逺訪石鼓文細字滿箋珠的皪書中宛宛見髙情識者見之爭愛惜乃知先生好古不減吾鄧侯吾徒委瑣豈復如先生喜新厭舊猶戲劇吾友秦郵李希文新來小篆亦傑出夷門梁君子宜苦學張顛之草書電掃千番爛如拭我生雅恨不能書每見名家如有失朱先生古遺直甚欲相從不可得山中茅屋書滿牀何時一到虛軒分半席直須和我石鼓歌戰退蘇韓入堅壁烏乎古之作者往往苦用心豈惟杜預雅有春秋僻今人無復見古人徒勞紙上賞遺墨魚目滔滔久混珍後來此鼓誰收拾燕之石等圭璧荆之璞同瓦礫古風不返天茫茫何如爛醉林皋卧苔石雙鶴吟若有太古之仙乃在瀛洲之上方壺之間門前雙鶴不知幾嵗月雪飛風舞迥隔青雲端天空月白雙影靜玉笙合奏瑶臺寒石壇暝踏松子落林溪晴啄苔花殘仙翁手執相鶴經一卷逸思泛若孤雲間興來引雙鶴笑入三茅山三茅山中瑶草碧九皋雨散春煙濕鶴飛亂點層峰青彩鳳蒼鸞往往與相識價重不減雙南金質瑩不弱雙白璧不慕懿公之華軒不逐王喬之飛舄不巢西湖處士之孤山不憩黃州謫仙之赤壁棲紫霞護丹室六翮凌層曝朝日友茅君呼木客盡日聽琴香案側山中之人問訊時相過蟬聨飛繞羊公石鶴之逝風翩翩遙空雲落秋無邊鶴之返山娟娟紅塵不到藝窗前恍如元方季方在潁谷倏如陸機陸雲來洛川燦如同穎之禾敷秀唐叔壤宛如王雎之鳥著美周南篇薛公之鶴何其夥趙抃之鶴何其偏異哉兩位骨不偏不夥全其天問鶴往時託巢在何許邈在遼海之東華表柱問仙豢鶴到今凡幾春前五百年嘗與令威一相遇鶴飛來向何所不渡海之涯不涉江之浦直欲飛近天上神仙之官府天門寥濶不可通誰到十二瓊樓最髙處鄧林之廣豈無一枝之可棲何為乎涉雲霄冒風雨春去秋來恣軒翥仙亦竟不留鶴亦更不駐山邪鶴邪笑我蹩躄於風塵相隨直上青雲去早過五門二首曙色動髙城鐘殘櫪馬鳴千門春放暖十日雪開晴勳業非吾事詩書寄此生青衫王粲老猶欲俟河清霜白掖樓曉寒鴉城上啼微雲閶闔外斜月建章西憂國心常切成㓛計轉迷十年京闕下貧病尚羈棲丙申嵗詠懷三首白首殊方客奔馳戎馬間時危憂母老嵗晚寄書還凍雪連荒野寒雲出亂山蒼茫西日外痛哭寄紫關辛苦憐吾弟荒山久避兵素書連月斷白髮滿頭生雪翳窗燈影風沉戍鼓聲寸心憂百結寂寞度殘更妻子何時見凄涼病轉侵虛傳千里信已負百年心茅屋飛霜滿空階落葉深白頭吟正苦回首淚霑襟贈境上人山館夜蕭蕭天寒酒力消鴈行衝雪斷燈影隔江遙渡口人爭岸船頭客待潮倦塗誰慰藉風景不相饒晚出短䇿扶衰病輕衫受晚風煙花連浦白霜葉墜林紅骨肉兵戈裏乾坤涕淚中飄飄江海上回首愧漁翁自述八口凄涼生事微中原羽騎日霏霏天寒嵗晚歸難定水逺山長信轉稀青眼故人頻送米白頭慈母尚縫衣蕭蕭漢渚蒹葭老好向兒時舊釣磯河上宛宛寒山入暮煙河流直到寺門前店頭買酒風吹幔浦口乂魚雪滿船翻覆世情堪大笑寬間野屋得清眠虛堂月色明如晝獨坐清彈五十絃京口夜泊醉客滿船歌月明隔江燈影逐人行帆衝雨腳回京口鐘送潮頭打石城南渡衣冠愁北望東皋簫鼓報西成桑田海水依然在不管人間有變更沙河沙河市頭黃葉飛沙河道上行人稀天隂古冢狐狸出雪滿霜田鴈鶩肥百錢魯酒足供醉十嵗奚兒能打圍别家三月不得信關塞蕭條何日歸别易水諸公一家逺隔萬重山古道人稀獨自還夜月屢傾燕市酒春風又渡鴈門關晴天雨散千峯外野屋雲生半席間兄弟何時重會面燈前相對話時難袁華三首華字子英崑山人洪武初府學訓導有可傳集詩話子英名其集曰可傳東維子序之曰吾鐵門稱能詩者南北凡百餘人求如張憲及袁華輩者不能十人又題吕誠敬夫詩曰蘇支邑凡六獨崑山多才子魁出者往往稱吕袁子英敬夫也然其序郯韶九成詩則曰吾求之東南永嘉李孝光錢唐張天雨天台丁復項炯毗陵吳恭倪瓉有本者也近復得永嘉張天英鄭東姑蘇陳謙郭翼而吳興得郯韶也序郭翼羲仲詩曰合吾之論者斤斤四三人焉蜀郡虞公集永嘉李公孝光東陽陳公樵其人也繼其緒餘者亦斤斤得四三人焉天台項炯姑蘇陳謙永嘉鄭東崑山郭翼也顧子英不與焉然則東維子之餘論固無一定矣東維與李五峯論詩謂梅一於酸鹽一於鹹食鹽梅而味常得於鹹酸之外若子英之詩僅一於酸鹹而已羲仲卒于至正二十四年朱圭名迹志載有盧熊墓志可以為據或者乃云洪武初徴授學官度不能有所自見怏快而卒誤矣和鐵崖先生踏踘篇冶家女兒髻偏梳教坊出入不受呼蹙金小襪飛雙鳬飛雙鳬曳雙袂玉圍腰珠絡臂哀宋姬有序宋姬者宋肅王樞之女也幼戲水濵得玉印一文曰金妃之印靖康遭俘入京金主納之為妃或云符印之讖夫父讐不共戴天况國亡家滅之餘猶委質以求全者君子不取也吾觀姬之心則不然欲求其死以不死耳故甘屈身為巾櫛之侍箕帝之奉冀一言以悟主聽庶幾二帝生還雖血濺金庭骨縻鼎鑊亦不惜也否則蓄謀藏機俾其禍生於衽席間以雪大辱大恥然則不幸而誅戮雖死猶不死也至後又徙二帝於五國城姬驟諫而主怒以匕首殺之豫哀姬之志不得伸而嘉姬之死得其所嗚呼處變而不失常道者其惟宋姬乎乃作辭以哀之其辭曰膏吾車以北征兮厯黃龍之故城山川蚴蟉以盤欎兮實完顔氏之所京當二世之雄特兮日從事乎兵革何靖康之多難兮身降庶而竄殛維肅王之有女兮亦俘纍而在行符玉文之印識兮充下陳於蘭房甘伏節而委命兮羌殺身其何益俟機隙之或可乘兮雖九死而不惜彼得雋而神怡兮又將徙二帝於窮山之隂昧大義而共戴天兮荃不愧於中心陳讜言之謇謇兮諌不從而繼以死也何彼蒼之不鑒其忠誠兮竟捐生於寸匕也噫吁身既失兮讎不能復謀弗克兮遭殺戮河流湯湯兮征鴈肅肅泰陵兮拱木金源兮走鹿些吾辭兮弔貞淑魂其歸來兮故國叶谷客海津送郭秀才草低沙軟見牛羊煙霧蒼茫落日黃燕女如花不相識笑傾馬潼勸人嘗殷奎奎字孝章一字孝伯崑山人洪武初以薦例授州縣職以母老請近地忤帝意除咸陽儒學教諭卒於官門人私諡曰文懿先生有支離稿婁曲叢稿絶句霜落水禽啼寒流繞大隄長魚不受釣躍過石梁西邵亨貞十一首亨貞字復孺嚴州人徙居華亭明初為松江府學訓導有蛾術集詩話貞溪詩辭氣和易比於袁景文管時敏則不及方諸陶九成顧謹中似為過之送傅子初先生之信州録事去年十月交冬淺寒輒沍客居江城館燈火在風露君從錢唐來舍舟縱遊步一見心為開問勞出情素番陽與雲間相望千里路會合非偶然况是夙所慕江左古世家粲粲美風度射䇿衣繡歸春生五陵樹文章天機錦到手眩昏瞀坐談極疇曩歡然獲知遇自冬更徂春不間朝夕晤君於稠人中走獨心所寓傳舍稍密爾泥濘亦枉顧閉卷析疑義沛然決東注賞音風雅間神會見天趣平生耿耿懷不為流俗具因君頗呈豁欣快未易喻誓將與此老結納視親故款洽豈有極忽復報瓜戍録曹雖民職未足展抱負行者崇令德政化藹先務分違坐契濶引領不可遡中年别親友作惡若深忤梅風彭蠡寬歸鷁慎速渡後約仍綢繆中情尚能賦芳洲蹇誰留懷哉美人暮沙湖凌晨出沙湖杲杲寒日赤望路指西南趂風挂帆席行行數里間舟底盡沙磧嵗暮寒水落過者總煩劇篙師力支撑進寸乃退尺呌呼問鄰舟始得指所失中流植萑葦表以深水迹由兹遂無阻四望始充斥迢遞逹岸旁回首日已夕嗟豫匪徒行衰謝牽物役人生苦多虞仰羡投林翮青梗夜寒宿秣陵曉霽度青梗旁臨總溝壑不啻瞰眢井俯視層氷橫照目光炯炯輿人亦良苦交馳畏肩並霧昏迷轍迹有力不敢騁我時舍車行屐滑不憚整殷憂莫暫置懷抱常耿耿山川不我厭衰晚負清景何當問蒙莊寸心若灰冷寒食次雲翁韻春信催玄鳥客愁聞杜鵑一村寒食雨三月杏花天物色知誰賞風光亦可憐西湖長入夢人在采香船還家舟中口號人語荒村晚船行逆水風平蕪鷗外緑落日鴈邊紅奔走生涯拙歡娛往事空故園看漸近喬木有無中橫泖雜言廣厦人來少青山逺對門緩潮通曲港髙樹接遙村井記袁嵩宅鄉連宰我墩行吟聊適興心迹未須論袁嵩宅宰我墩皆在數里間遺迹存焉橫溪夜思宿霧隨雲斂寒星著水明客舟移逺岸戍柝報初更老覺馳驅倦愁思喪亂平故人雞黍約嵗晚更多情貞溪初夏次南金韻四首雨後深林竹筍肥渡頭風急柳花飛柴門不掩緑隂靜人在間窗試苧衣巡簷燕子掠晴絲隔塢茶煙出院遲草色入簾人不到午風吹暖夢回時楝花風起漾微波野渡舟橫客自過沙上兒童臨水立戲將萍葉飼新鵝小巷繅車霜繭熟前村社鼓野人來鵓鳩聲在樹隂裏竹下柴扉晝不開虞堪三首堪字克用一字勝伯宋丞相雍公八世孫家長洲洪武中為雲南府學教授有鼓枻稿詩話勝伯避兵笠澤吳興施縉為創義孰延以為師趙郡蘇大年會稽薑漸為紀其事又力購雍公遺文刋行一時名士若遂昌鄭元祐吳郡沈右吕楨王謙周砥鄒奕豐城余詮魏文彛會稽韓友直陶澤髙平范成張緯王廓臨邛魏奎河東王嘏薊丘聶鏞太梁申屠衡蜀王立中黃夔咸賦詩美之今雍公集終無傳惜矣鼓枻集中題松雪畫一絶特工踏車謡一春多風復多雨田頭踏車最辛苦去年種田田無收還租賣却牛一頭今年城西盜賊起北巷南村盡燒毁城頭土崩日夜修壯者服役老者憂晨食糟粳每忘晝妻子長飢面皮瘦公家喫酒歌呼奴不念農家租不敷公家若念農家苦水潦祈晴旱祈雨題錢舜舉畫蠶桑圗桑中鳴琴巧如鴂吳娘養蠶夜不歇暖雨寒風惱殺人正是江南三四月苕溪遺老白髮翁畫蠶畫葉搖春風千金難買吳娘笑故寫生枝椹子紅題趙松雪畫王孫今代玉堂仙自畫苕溪似輞川如此青山紅樹砥可無十畞種瓜田顧祿二首祿初名天祿字謹中松江華亭人明初以國子生除太常典簿遷蜀王府教授有經進集解大紳云謹中詩噓吸風雲奔走造化皇張汝弼云謹中詩雄肆瓌竒簡知髙帝宜也秋夜一寒一暑相推移四序平分秋暑悲山川蕭條草木萎金風淅瀝吹羅帷夜何長兮晝何促欲眠不眠歎幽獨樓上寒更聲斷續飛蛾翩翩燒殘燭題王叔明所畫松下奕棋圗十日一水五日山王侯妙筆無荆關山如蒼龍騰入霄漢表水似白虹㵼出溪潭間長松直下有巨石風雨剝落莓苔斑兩翁對奕盤礴坐其上笑語自若終日無愁顔飢來豈待事煙火瑶草紫芝俱可餐不知何年修習到此地知有神仙境界無人寰我今讀書三十載抗塵走俗猶未間問翁不語愈覺心自恚髙風逸韻邈矣終難攀安得翁能示神異授以九轉入爐丹圖中之景果然真有否便欲御風一去何須還曹孔章一首孔章字子文長興人官府學教授間齋書事林響溪雨來蕭蕭客窗暝瑶琴倦不彈石闌晚猶憑煙深鳥依樹花落風滿徑隔岸誰誦經泠泠發清磬朱升一首升字彥升無錫人洪武初舉明經任本縣訓導升上虞教諭擬古霜露悴百草蟋蟀鳴聲悲朔風寒以厲良人久無依時服委深篋路逺難致之仰視投林翮還依故巢飛物性有如此念君歸無期矧當苦寒節坐傷音問違周啓一首啓字公明號溪園叟吉安人訓導夏日雜興一片殘紅落紫苔笙歌無夢到樓臺山雲晝鎖石橋斷溪雨夜添春水來江上客扶歸馬醉柳隂人喚打魚回不知上苑花開否無分行看羯鼓催黎貞一首貞字彥晦新會人洪武初舉邑訓導不就坐事戍遼東尋放還有秫坡集詩話秫坡為孫仲衍門人仲衍就誅解衣裹尸負其棺萬里歸葬鄭巨君而後不多見也陳公甫云髙山景行吾鄉先輩黎秫坡一人而已其推崇若此詩多庸實豫遊嶺南偕得鈔本録其一篇行路難君不見天上浮雲任舒卷白衣蒼狗須臾變又不見瞿唐嘈嘈水倒流奔湍激石能覆舟人情有時亦如此紛紛輕薄何足比平嘗意氣同死生急難何堪託終始嶺南狂客窶且貧長將青眼待時人豈知此道不足貴翻使皋鶴儔羣雞不如託身與鷦鷯蓬蒿之下同逍遙鄭涔三首涔字起深黃巖人洪武末為樂清訓導有直正齋集詩話廣文詩不多傳跌宕自喜客夜西風蕭蕭木葉稀秋深作客何時歸城頭月出照擊柝江上露寒催搗衣燕鴻附書孰可致烏鵲繞樹還驚飛三更不眠欲起舞躍馬卧龍誰是非梁家堰梁家堰頭桑扈啼早潮帶雨草平堤煙中碧樹依江重天外浮雲接海齊客店上簾沽白酒商船結纜度青泥十年猶在江湖上何處經行無鼓鼙劉氏菴風急落花紅滿林孤村月色晝沉沉一百五日寒食近七十二橋湖水深世路難行甘屏迹鄉關入望苦經心古今萬事知多少抱膝聊為梁甫吟吳舜舉一首舜舉字士源歙人洪武初以耆儒舉除本府教授有石溪吟稿秋日覽物悲搖落傷時厭亂離二毛潘嶽賦三峽杜陵詩壁潤蝸行字窗晴蟢吐絲物情還自適人事苦難期朱應辰一首應辰字文奎吳人明初為本府儒學訓導改江隂有潄芳集題管仲姬畫竹夫人寫竹如寫字不墮畫家蹊徑中料得山房明月夜晴窗葉葉動秋風曹䙲䙲字從善歙人洪武中舉明經授府學訓導遷遼府審理紫陽觀席上作紫陽山麓神仙家青山繞屋生煙霞枯林風過落黃葉寒菊雨餘開白花隻雞斗酒自可樂千駟萬鍾何足誇興闌携手過橋去斜日稻田飛亂鴉王嘏一首嘏字伯純揚州人松江府學訓導送秦東海法師遊上清觀為愛仙山絶世氛蒼苔寂寞路難分白羊嵗久渾成石瓊樹春深半是雲洗藥泉香龍蛻骨吹簫臺迥鶴為羣隱文祕訣無人識我欲相逢一問君鄭真十二首真字千之鄞縣人洪武壬子鄉試第一授臨淮教諭秩滿入京賜宴升廣信教授引年歸有滎陽外史集詩話千之文極為宋潛溪推重裴典簿中嘗屬其撰著存堂記别請潛溪為之千之記先成潛溪見而歎曰人徒慕吾名爾使我執筆焉能過之後數年典簿復請於潛溪答曰有鄭先生記在發明洞徹使之獨步可也千之既領解與計吏偕除臨津儒學教諭厯九年進牌朝於奉天門七奉天殿十四華蓋殿二十七文華殿三武英殿一中右門二賜酒饌者十一命賦早朝賜宴及續御製菊綻西風露脂楓葉等詩微員之受恩遇至矣考明初士子舉于鄉者例稱鄉貢進士樊餘慶詩云聖代新開進士科而干之送閩人黃彥機詩亦云兩省同年進士科是也如南海孫蕡番禺李德皆鄉貢進士而緝地志者削去鄉貢字竟稱進士後人因之不察遂謂蕡中洪武三年進士不知洪武三年第下科舉之詔以是年八月為始未嘗會試天下士後雖下三年疊試之詔惟辛亥有登科進士爾此一誤也嘉興湖州二府明初屬之直隸故實録於洪武九年十二月書直隸湖州嘉興諸府水災遣户部主事趙乾等賑給十一年五月敕工部定嵗造軍器之數其書湖州嘉興亦冠以直隸字至十四年四月復置巡檢司嘉興府一嘉興縣之杉青閘湖州府三烏程縣之後潘德清縣之下塘新市仍以直隸文冠之考是年十一月始以二府改隸浙江布政司故千之跋同年録云洪武壬子秋浙省承詔旨合九郡之士試之得四十名上諸京師又送何本道還金華序云洪武五年詔命三年疊試於是浙江所屬九郡以其名上之行省而金華何本道與焉其云九郡者嘉湖二府斯時尚屬南畿不在其內也庚戌鄉試中式相傳嘉興則有許信孚俞志文馬思明王鏞毛永升潘椿年朱楨王貞海鹽則有盛潛德清則有王軫此當載於南國賢書不當載於浙江登科録顧張氏朝瑞宜書而不書陳氏汝元不當書而書又一誤也壬子浙闈千之名居第一是科四十人中式故王用吉詩云桂籍題名四十人明州自鄭真外有郭可學樊餘慶黃夢熊顧厪王振王廷直王用吉孫原仲吳倫陳希貢汪義方何撡陳仲賢汪瓉共一十五人若陳氏所載鄞縣王藹王道顯二人明州府鹿鳴宴不之及我不敢信也又黃自強王景何本道見於干之他文上虞李繼先烏程陳咨見於府縣志餘若王麟王驥趙惟一杜誼沈新民徐思誠翁希顔俞尚禋駱文凱吳佐俱載陳氏録中姓名可知者三十人顧陳氏以真倫元仲義方希貢餘慶屬之辛亥科此又一誤也草昧之初舊聞放失總緣修地志者不得其人於古事則芟除之於近事則混書之訛以傳訛若非得滎陽外史百卷某何由訂其實乎北關經楊左丞營長營何盤盤云是苗猺洞悲哉楊將軍紛紛甲兵弄劒妝白玉鐔馬按青絲鞚短袴百褶裙前鋒誇勇衆戰功稱上多胡為恣貪縱人心失所歸地險馬足用禍機暗中發喧然強敵鬨倣徨欲何之宛若蟲鼠甕尚能不辱身一死誠足慟伯氣久消歇頽基荒草葑我行寒雨中塵沙深沒䩸過眼閲盛衰春風吹過夢龜山水母廟青山如伏龜巨石壓晴浪岡巒相起伏隱隱城郭狀憶惟南渡餘金戈嚴保障封疆南北分放歌一悽愴鐵鎖錮支祁禹功千載上吁嗟水母稱誰能辨誣謗清流關峩峩清流關形勝壯淮甸南來入江海北去通潁汴粵昔五代餘諸侯日酣戰蟠李有餘枝遐陬寢席奠設險禦中州紛紛甲兵繕俄傳點檢來威聲炎火煽良將致生擒面縳轅門獻一笑滁州平凱歌錫芳宴肆令歐陽公登髙情眷眷我行入濠梁居然腰腳倦前登最上頭目力窮視盼前修有佳句鑿鑿蒼石片風流今百年有如親覿面臨流一徘徊棲棲雲物變僕夫催進程山風急於箭日食詩辛丑四月朔日有食之既氛祲煙雲相蕩摩天地山川忽蒙翳省垣大臣威令傳從宫車馬咸紛然正笏峩冠向玉闕瓣香百拜哀籲天嗇夫奔馳庶人走叫嘯嘔呼亦良久路途錯莫若半夜仰見明星大於斗城中編户百萬家喧闐金鼓紛相撾何物妖蟲肆吞齧奮戈我欲凌雲霞人言七政失躔度厯家推演錯昏暮清臺路阻兵革深萬里不聞傳救護須臾爭訝紅光還將相公侯開笑顔羲和重整六龍轡夕陽倒景明西山我年三十誠罕見憂國憂家心戀戀九重神聖正當陽天象何為召斯變舉頭問天天不言人事祗今殊可憐聖筆昭然示訓戒春秋二百四十年寄烏繼善先生紅心驛外望家山颯颯西園兩鬢斑繫鴈書成霜滿地飯牛歌罷月臨關誤傳海外蘇公死終許羌村杜老還客舍不知身健否何時訪我白雲間用韻答夏原威述懷雉堞煌煌壯國都移家住近月明湖秋風籬落花長好夜雪庭階草不枯煙逺山庖供晚㸑雲舂野碓急秋租浮生已付形骸外何羡商巖隱者徒石梁謡二首土塹為家似燕巢秋來風雨怕蕭蕭馬通拾得團成餅曬向牆頭作炭燒東屯西屯雲晝隂上關下關淮水深淮水逺從天上去美人不見愁人心王莊驛日落西山一片霞愁來有路不容遮秋風三徑陶彭澤正待南歸看菊花題李璋梅花三年為客海東涯萬里羅浮一夢賖霜月夜寒天地白開門曾憶看梅花題墨梅先春逺寄墨淋漓折得寒香第一枝夢繞西湖三月暗漆紗窗外影參差題蘭國香散落翠巉巖靄靄芳叢玉露涵楚佩可憐零落盡春風春夢過湘南陳燧一首燧字民初永嘉人訓導詩話民初詩不多見送邵鍊師作亦稱具體他如江湖千里去來易故舊一尊離别難正自不俗送邵鍊師歸江隂青門隱者人不識騎鶴來尋華蓋君姹女夜棲丹鼎火玉妃春繡紫衣雲愁聞南國旌旗暗愛聽中天歌吹分此去元都舊時路碧桃紅雨正繽紛陶振一首振字子昌吳江人徙居華亭洪武中舉明經授吳江縣學訓導改安化教諭有釣鼇集詩話子昌詩多率爾成篇故選家恆置不録其吳王濞長歌云哀吳王汝非他人姓系本卯金刀髙祖封汝沛五十三城壕冀汝犬牙相制磐石牢汝胡招致亡命即山鑄錢海水私自熬下收民心蠲賦徭睥睨劉家社稷使動搖汝之初有反相髙祖臨遣汝訓戒嘗昭昭汝後以子故失藩臣禮文帝不加戮賜汝几杖老不朝汝之末反兵起馳書六國膠東膠西並受招連山大澤羅旌旄景帝又殺諫臣錯謝六國復汝削詔地赦汝元惡而頭不汝梟汝胡殺使者不奉氣益驕嗚呼吳王汝獨不聞前時烹韓盧醢彭越剪伐九江王布如蓬蒿胡乃視死輕鴻毛漢家條侯將中豪奉揚天兵誅汝曹刳汝腸蹀汝血搗汝穴破汝巢汝子授首汝母將安逃致令六國灰飛而煙消嗚呼哀吳王汝之罪何滔滔千古竹帛猶腥臊斯蓋指斥長陵而作顧紀述建文遺事者莫之采焉因具録之送章彥德遊錢塘錢塘之地何雄哉秀壓元圃超蓬萊大江如龍天際起山從佛國西飛來雲間三百六十寺含丹凝紫開樓臺湧金門前浪花白好峯兩點青如苔宋朝文物已草莾荒碑遺碣髙崔嵬黃龍白虎消王氣金鳬玉鴈飛寒灰鴟夷浮江去不返渺渺萬里雲濤堆吾生守拙門不出結屋低傍山之偎會稽未及探禹穴赤城未及遊天台每懷此地不得到矯首遐望空徘徊君今逺遊别我去南風十幅蒲帆開望湖樓前吹鐵笛冷泉亭下傳瓷杯問君此去何時回安能西子湖頭放歌逐君去一洗胸中結轖之塵埃趙宜生二首宜生字德純餘姚人洪武初訓導黃太沖云德純本宋宗室子至正中晦迹耕牧自號騎牛野人洪武初舉為鄉邑訓導宋無逸詩往來慰衰暮感慨寧無同者謂德純也其詩五言學陶七言仿佛李長吉自挽二首嗚呼騎牛人汝往一何速形神如此癯夀命終亦促壯嵗即抱病有書不能讀守兹固窮節不能養親祿既無耕種力靡適水與菽日月忽不淹今晨當就木大化已云終何勞妻子哭先輩多逹士後人罔知死苦為聲色迷蚩蚩竟如彼我當半百年己悟此中理富貴隨所望貧賤隨所以布衣及蔬食適足充諸已修短自由天氣化返為鬼哭者何必哀爾豈不然爾田橫有悲歌秋風起蒿里張庸一首庸字熙載江隂人洪武中舉明經授本縣儒學訓導江口晚發四月南風紫棟花扁舟春水白鷗沙阿儂近住雙涇口一趂回潮即到家林賜一首賜字闕二字莆田人洪武癸酉鄉試第一官溧陽訓導題翁石山房玉澗隨處深蘿衣謝時早幽棲同鹿門勝地即蓬島緬懷京國遊却戀雲山好何日賦歸來相將拾瑶草髙嵩一首嵩字子髙閩縣人洪武中教官立春日題壁漂泊江淮老廣文昨宵黌舍又逢春月支二石五斗米録著諸生四十人鄉逺已拚歸夢數身間不厭在官貧笑看朝日盤中味可有青青泮水芹張時二首時字敏中錢唐人洪武中訓導有自怡集詩話張君自怡集鄉里罕傳康熙戊寅客福州從林秀才侗借觀鈔本録其二首歸詢之武林耆舊未有知其姓氏者矣匡廬精舍圖巍哉江上之廬峯東南諸山無與同丹梯石磴杳難度層巒疊障相爭雄涼飈翻江吼霹靂嵐光射日開芙蓉香爐沉沉紫煙裏瀑布上與銀河通九江秀色在指掌五老雲氣長鴻濛我昔壯遊事厯覽秋濤滿耳來松風星子灣頭蕩輕楫石頭渡口聆晨鐘今日披圗倍悽愴信知此樂難再逢賢哉公孫慕髙隱結屋正在山之中詩書滿架恣探討雲林對户蟠心胸幽禽引雛白日靜老鶴呌月秋林空只今公已嚮時用故山可望不可從繪為丹青揚坐側傳示藝苑無終窮過枝江縣近峽江逾窄推篷路轉斜丹青山外寺紅白雨中花暮警官船鼓晨吹野戍笳亂雲千萬里何處是京華林常二首常字伯庸永嘉人長史溫之弟本府儒學教授風雨過鄱陽湖有感三月雨多風滿天湖中水髙難繫船大魚跳浪白如雪好山隔岸青於煙去官莫過彭澤縣讀書擬上匡廬巔人生百年苦行樂帝鄉遙遙心自憐北苑造茶即事青州州前溪水漣殘紅滿川花可憐垂髫何處采茶女落日去家呼渡船緑隂青子山雨歇遊絲飛絮春風顛荒村逺客官舍靜新愁惱人聞杜鵑陳德甫溪山春曉圗郭外長溪接逺江磯頭新水白鷗雙萬山雲氣翻春雪一枕松聲響夜瀧賔客不徴綺里季子孫終老鹿門龎何時我亦來同隱多種桃花映酒缸邵誼誼字思宜休寧人洪武中由薦辟授本縣儒學訓導轉黟縣教諭有鉏雲集春日同諸子郊行黟縣設自秦至今少城郭人稱小桃源煙霞護叢薄四山如龍蟠蜿蜒分脈絡羣居寡喧囂宇宙覺開廓為問塵網人何如在丘壑明詩綜卷十五
