body:
  text: 明詩綜卷九十七翰林院檢討朱彛尊編静志居詩話明以賈客而稱詩者衆矣若歙州之鄭作程誥龍游之童珮皆賈也然鄭程皆受學于李空同童執經于歸太僕則不得以賈人目之故録雜流自谷淮以下而傔從之能詩者附焉谷淮三首淮字文東秦中賈人客淮揚間傭書給事澄江張學士家顧𤣥言云谷郎能仿文徴仲書法兼善音律日以文翰為業其家詆為書癡其詩殊有雅致寄逺瓊花臺上雨初收黄歇山前水急流莫道别來鄉國逺南江愁是北江愁病中一貧成病竟年年愁入蒼茫嵗暮天客至擁衾聊起坐冷風吹雨濕忩前題畫十月山家落木稀髙忩終日見雲飛柴闗地僻無人到獨向峰頭抱犢歸李東白一首東白京山人為衣工姚園客云東白黄鶴樓詩秋在仙人鐵笛中一語可云絶唱李宗定恒誦之後游秣陵歸舟至雲夢澤中蒿臺寺自吟云好水好山來路逺秋風秋雨到家遲拍手一笑墮水而死登黄鶴樓西望家山一改容白雲飛盡楚江空興饒老子胡牀上秋在仙人鐵笛中鄂渚霜花沿岸白漢陽楓樹隔江紅倚䦨拍手招黄鶴千古登臨感慨同盧澐一首澐字宗潤鄞人義烏縣吏有月漁集詩話月漁託身文無害㝷即棄歸以醫自給有邀之治疾者見壁上詩和之繞榻吟哦至旦主人以為怪不服其藥每得金置袖中為人探去不知知亦不問也故人有知黟縣事者徒歩萬山中訪之距縣百里而病夜夢挽其髮盡變為黄絲寤而語人曰色絲為絶吾死矣夫果死于客舎平居語沈嘉則曰古人旅葬祼葬無所不可何必故鄉嘉則因買山於休寧東郭外葬焉題曰詩人盧九之墓西亭同朱近臣送沈嘉則送君江山行路近梅根渚雨急天欲昏不盡别時語周俊五首俊字伯英江隂賈客有南岑集詩話伯英詩頗清越如海風吹雨散江月伴潮生亂鵶千樹曉新水一篙秋市酒薄於水漁燈密似螢風前雙鬢逢秋短海上孤城過雨寒俱出塵埃之表蕪城對酒寄懷張淡雲校書樓上春雲黯夕隂折花載酒偕同心芙蓉繡幄隠紅燭美人一笑輕千金南浦别離情脈脈栁花繚亂風無力愁來獨上廣陵城江水微茫天一色吳陵暑夕斷虹收宿雨大火欲西流一片水浮月三更人倚樓蒹葭迷白露蟋蟀響清秋惆悵江南北年年事薄游鵝鼻磯細雨晚山晴殘霞映江樹不見垂綸人寒潮自來去春日雜詠春來懶慢起常遲六尺枯藤强自支忽見栁花飛作雪小橋回首立多時贈張淡雲星河淡淡夜迢迢深院凉生動絳綃傳得揚州新樂府倩誰人並坐吹簫黄徽一首徽字季美杭州人為閩賈沈翁贅壻繼其業有鷇音詩話季美詩何侍郎稺孝稱之為作詩賈傳其略曰唐人以詩名桑門閨秀皆進乎技賈人缺焉季美詩不妨賈賈不揜詩遂無前人其賞譽若是竹﨑水口薜亭官長在捜鹽日午喚停船平明舎櫂山城外竹轎迎人又索錢李佸一首佸扶溝人江行有懷醉起意不盡江邊㝷杜蘅折來何所寄游子在西京惜别三春晚窮年百慮生日斜空悵望一水隔盈盈焉來如一首來如内鄉人翰林李蓘之僕江上懷吳人朱侍山久羈均陽江草江花一水長憐君何事滯均陽逢人為報鄉園侣吳客而今作楚狂李英三首英字少芝以青衣給事南海歐大任俞汝成云計有功唐詩紀事二百餘年詩人千一百五十家而卷末有僕二人一為咸陽郭氏捧劒之童一為池陽刺史㦸門門子朱元余輯盛明百家詩僅得李英一人可以為難矣宋轅文云李生詩清勁可誦能宗其主人初去故園留别諸友風烟一以别把酒戀同游人去江樓晚帆飛海國秋青山馳逺夢黄菊動離愁曽是滄洲客能無念白鷗秋思曽是滄洲舊釣徒西風落魄寄江都望中故國千山阻别後經年一字無庾嶺烟霞秋思逺楚天風雨暮帆孤誰憐飄泊他鄉客不為蓴鱸滯五湖十月京師紀事蕭闗風急馬頻嘶四塞河山動鼓鼙獨立髙臺望烽火蘆笳多在薊門西林汝元二首汝元閩王粹夫家青衣詩話錫山俞汝成輯盛明百家詩録青衣一人南海李英也他無聞焉後人選詩又益以二人扶溝李佸内鄉馬來如余録詩綜又益一人閩林汝元也聞閩中青衣善詩者不止汝元尚有陳香初陳竹逸鄭蘭子三人未詳其名澄江楓葉老斷岸菊花疎香初句也月明黄葉露花隠赤䦨橋蘭子句也古墓棃花鸜鵒雨荒原麥穂鷓鴣天竹逸句也附疏于此當博訪之溪行雪壓梅花破霜侵楓葉稀林間黄犢卧沙際白鷗飛水急灘聲亂溪逥樹影微前峰新月吐樵子蹋歌歸京口夜泊隠隠漁歌隔岸聽娟娟新月照中泠江南風景今宵始回首𤓰州一抺青胡梅二首梅字白叔吳人給事徐通政申宅晚瞽以醫自給自號清壑道人詩話白叔幼而秀頴以狐旦登塲四坐叫絶徐通政維嶽俾掌書史甞取通政友人赤牘畀之炎火為通政誦之不遺一字有納妾者白叔賦催粧詩其人擊節於是詩名藉甚而選録其詩目之曰山人予取以附雜流之末盖不敢沒其實云沈璧甫自城南移居虎丘和周安期韻君住城南已數年今移虎阜寺門前紅疎未補薔薇架緑滿初停茉莉船雨過峰頭流一壑月明隄上聽三絃酒壚餅肆皆隣近我欲頻來莫惜錢曉飯小孤山下兩岸黄蘆雪滿船推篷曉㸑鷺鷀前小孤山下風初定江面剛生一寸烟吳忠一首忠華亭姚元龍宅青衣陳徴君繼儒賞其桃花詩勸其辭主人送至小崑山為焚香道者詩話余既録二李一馬之詩又益以胡白叔閱東吳舊話又得吳忠一人按徐文長逸藁有詩云南海大夫歐泉州處士尤泥中雙緑鬢詩伴兩蒼頭自注尤山人侍者范鹿能詩不減歐楨伯之僕惜其稿不得見也桃花游子訪桃源桃源在深處不用問漁郎谷口隨花去明詩綜巻九十七
