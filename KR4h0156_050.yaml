body:
  text: 明詩綜卷五十翰林院檢討朱彞尊編皇甫沖十首沖字子浚長洲人嘉靖戊子舉人與弟涍汸濂並有盛名稱四皇甫有華陽集弟子循云兄詩兼綜諸體之妙而不能稱之以一長盡臻名家之奧而不能擬之以一子此二陸辭藻獨秀於平原三謝聲華莫先於康樂也如樂府雄深古選雅淡歌行縱逸五言近體之典麗絶句之清婉差弱者其七言近體乎云張文寺云四皇甫之才子浚為冠鍾廣漢皇甫昆弟詩如謝家兒女張燈蠟淚皆成珠鳳靜志居詩話四皇甫詩源出中唐兼取材於潘左江鮑清音亮節淨掃氛埃髙蘇門華鴻山楊夢山而外無有及之者順義戰鄰有順義人告我庚戌事八月月生魄道傳諳達至朝聞古北屯暮見遼陽騎李生正下帷奮激報守吏守吏不敢言雙目乃直視馳馬歸赴敵城門忽已閉登城望家室膏血乃塗地里閈盡焚燒妻孥身首異李生按劍怒眥裂聲色厲詎惜中山羮甘心河東棄惜哉無一兵不能為之計乃有陳使君挺身獨不避下令開四門彎弓插兩幟左書報仇文右寫勤王字當門據方牀潛軍弛銜轡李生與之俱不覺增勇氣諳卒來覘窺一矢兩人殪卒驚齚指奔倉皇解圍去城邑不破殘凡以二子庇功髙主不知事往名亦墜斯理自古然况乃居今世請君勿復言此事猶為細安山道泊舟安山道忽見山南船銜尾若魚麗鉦鼓紛喧闐樓櫓樹干楯笭箵插戈鋋雕弓赤羽箭朱旗當檣懸長年盡紅巾抹額絳絲纒言與郡盜鬭僅不為摧殘請看身上創衣血何新鮮聞之不敢進倚棹生憂煎載聞持節使提兵羅河堧脫者有重聚獲者無幸全哀此封中氓棄擲潢池間雖云飢寒故信也誰為宣懷保道不足政刃皆深淵服妖古所畏涓涓乃滔天巢角鑒不顯此理庶可研上已觀田橋祓禊望所期客青山結層嵐新流漾周澤陽景屬良辰遊人滿晴陌聯翩塘上行去來江邊客拾翠行且留擷芳散還集臨賞遲所思搖搖冀來覿夢寐時見之寤言忽復隔昔人三秋懷宵旦今屢易為問修禊人憂心何能祓從田橋石徑赴拂水江光開初霽山雲未全斂輕煙尚棲花積雨猶在蘚攜屐遵回麓援蘿上修峴環林何逶迤磴道幾回轉遊心自忘罷䇿足乃知蹇含章樂丘園耽隱易台鉉頓使昔念舒乃得今抱展將尋出世人一往不復返於巖石上眺東西兩湖旭踐山中蹊午憩巖上石雲移石欲墮雨霽蹊猶濕倚䇿眺兩湖波光渙相襲東若既紆青西蘅亦凝碧芙蓉落雙鏡天影浮重璧不覩水分流但覺洲如織檣烏有離聲磯鷗無並翼會茲物化情感彼髙深迹從適得所遣何為苦拘迫維摩寺雨坐回嶺無仄徑陟岡有夷壤展睞入空濛遊心益昭朗長風吹輕衣飄搖翠微上古寺迷夕煙明燈淡綃幌冥雨從東來驚雷自西往林巒忽不見但聞山澗響景寂非避喧心瑩乃成賞為禮沉疴蹤因之知幻象送劉朝甫還吳同遊心事已成非忍向都亭復送歸二月渾河氷尚合三春禁柳色猶微舊來道路愁能記此去音書憶到稀極目輕舟雲水上别君那得不沾衣皇甫涍三十五首涍字子安嘉靖壬辰進士除工部主事調禮部歷郎中改補右春坊司直兼翰林檢討左遷廣平通判量移南京刑部主事進員外升浙江按察僉事有少玄集文徴仲云子安詩沉蔚偉麗早嵗規仿初唐旋入魏晉晚亦玄造鑄詞命意直欲窺曹劉之奧而及之則兄子浚云子安體骨竒峻詞采英發陳風諭婉而不迫敘政事則直而不俚頌功德則艷而不誣不取妍於一字不求工於一詞詠之而有餘音咀之而無窮味工弟子循云兄詩錯錝魏晉而託宿於唐英特五言而七言近體薄不經想其為篇也幽玄以通思舂容以御氣婉麗以陳詞和易以達理憤悶以抒情綿暢以該事雋永以歸趣其始搆也隻字不愜於心片言無艷於目踏壁窮思擁衾寤索曽不少休是以吟苦則彌日不就神來則下筆立成惜王元美云皇甫子安如玉盤露屑清雅絶人輕縑短幅不堪裁翦篇黃清甫云司直咀華八代會心古人每製一必經百慮故能盡脫凡近獨詣髙逺晚薄杜陵之史心醉殷璠之鑒擬之謝客則調頗遒方之常建則音稍振陳臥子云少玄凝思選調意求雅則惟取境不廣無縱橫宕逸之致詩話子安逸藻風飛清文綺合視子循工力悉敵銖兩未分宜子浚之難為兄而子約之難為弟也春日齋中即事仲春氣妍和蘭薄幽可踐開軒望逺野文霞藹曾巘黃鳥鳴芳菲緑蘋泛清淺感物懷古人緗帙聊自展嘗欽柳下黜頗悅邴生免茍持齊物心得喪兩俱遣秋宵宴會與周山人以言嘉賔眷清夜相與娛思憂憂思沉中曲惜别屆徂秋顧念一世間快意焉可求别易會獨難世短歲復遒促襟展謔浪感此極歡遊明月懸中天芳華隨觴流妙歌激雲漢為樂四座周抒情告君子太康毋我尤雜詩凝霞晦朱陽繁雲結玄隂有淹興崇朝淫溢遂成霖涌溜交簷曲浮苕冒水潯冥霧縈緑池悲風激丹岑惟彼倦遊客感此物序侵慕類興長懷含思寄微吟秋日雜詩廓處乏歡悰出門眺長衢悲風吹落日四顧無行車蹉跎失盛年感慨獨嗟吁況我在樊籠六翮不得舒撫劍思西邁安能守故廬淮隂困閭里馬生戀邊隅桑梓豈我志蓬藿非我虞行行舍此去去去浮雲俱贈韓侍御謫滁州皎皎原中日照此城闕寒登山送歸客臨塗悵盤桓借問子何之竒服涉江干逺斥千里道飄颻冒驚湍急觴遡征雲悲風激長瀾我馬懷曾岡佇立發哀歎慷慨無所道贈子以加餐月夜贈伯氏叔季氏山人以言歡遊美清夜髙會良在茲金飇薄綺櫺鮮雲蕩華池涼氣發喬林湛露零丹㽔皎月升前隅中庭粲其輝密親既已具蘭友相攀追繁音豈不奏所樂吹塤篪齊願等金石皓首長不暌送周氏清晨餞我友駕言逺徂征前瞻齊魯墟千里浮雲興親交豈不昵懷役不遑寧曠野饒悲風揚塵翳邊庭中衢雪霰集邊馬寒無聲蹊谷無行迹側足層氷橫回首望京闕能不惻中情子其祗自愛順時保榮名省中贈别祗役辭蘭省驅車邁京陽大江浩無極遊子心慨慷疏星斂華闕朝霞興崇岡平原一顧望山樹靄蒼蒼集送臨城隅轅馬各傍徨道路豈云逺各在天一方念與我友别侘傺中自傷懷申生昔我承嘉惠竄迹大河潯洪流逝滔滔遊子憂思深回風飄虗閣索處悲難任申生藴璵璠投分義所欽緑綺久不奏為豫激哀音眷眷感離志冉冉遂逮今晤言恍如昨一别歲載隂微我殷思勞非爾誰為心十四夜月廣庭淨霄色良夜月流玩況對巢箕人同懷發幽讚散步林暝交微星吐華粲彼美雲中魄徐駕升清漢玉彩含霜來金霏隨風散繁絃起兩階孰知我心亂十六夜月明月有常玩員景亦不易三五昨已邁人生良如寄興雲結長霄清暉何由被弦望相推移賞心邈難嗣即事可逸生取樂在適意綴我巴人響歌之聊代匱十七夜月清風歷網户皓氣流中庭佳期殊惠來金波耀華星諒知蟾兔缺髣佛素娥形為樂貴及時百年詎我齡放歌目馳藻結思凌髙冥且念參酒德萬物如浮萍豫嗜琴山人張子妙得古法嘗學焉而豫輟響久矣舟夜臨流對月發琴而彈之興慨命篇伊豫寡世姿由來慕丘壑長從嵇生玩假物思所託匪盡至人理聊敘逸民樂改服暌宿心久負長往諾石房綴幽響泉蕊迎秋落沿泝開昔襟浮彈昨間作滄浪流潺湲明月照灼爍想見乘風人長懷披雲鶴且以慰營魂拊心終綿邈出處焉是非俯仰笑今昨元城書院示諸生豫昔慕丘園守道甘時棄弱植踐紛華介石慚貞義一朝世網嬰來為河曲吏逮茲民務隙肅徒究經事廣除氣暄妍衆芳粲以賁清風間鳥雀日華搖薜荔髙閣敞雲霞遊目適我志雖無兼席長頗協下帷思相與觀四教宅德歸一致忘筌朂所期反約良為懿夏日幽居述懷九巖多靈樹秦望有飛泉臺尚逝云久披籍慕其言念當去人羣返耕南山田即林事經始荷蓧開雲煙疇昔嬰華組芳歲屢徂遷憂思徒以積志髮坐相捐常恐衝飇激鳥路不及旋彼美淑人情緬邈誰為宣雜興二首薄雲散清澄秋氣滋寥廓傾暉奄西陸涼飇淒叢薄羈人苦物役容華逐年鑠沉吟覽時化空堂寂不樂惟我同心友守道厭蓬藿髙舉遺萬物逍遙處一壑永念從之遊無為自束縛騖節流炎紀馳暉屆清商遊魚湊重淵蟋蟀鳴空堂白露滋前墀隂風來北房我心亦何思所思天一方離居宛如昨再覩鴻鴈翔含情撫遙夜申旦獨傍徨哀彼采葛詩零淚霑衣裳茅山杳靄登春山嵯峨入雲嶺徴竒不覺逺發興日初永石叢孤亭秀花覆仙竈冷長揖山阿人坐使塵慮屛自溪口歸朝來醉别酒溪上孤舟還遙村轉江路落日迷松關平波望煙樹百里滄茫間坐愛丘中事春雲留碧山將命巡軺徙倚署閣彌辰倦紛牘徂春悵無樂庶以散豫襟獨此稽山閣霞蔚見層巒花深隱羣壑本自滄海人悔吝滋縻爵旋里東江軺徘徊眷林薄俄頃惻幽𠂻遇物悲離索且憑浮雲征聊希至人託使中都道中作將命適逺京夙駕戒征侣臨流别友生野塗曠延佇靖恭爾所敦我志不遑處揚斾越修坰舒節薄蘭渚日夕秋風生曽是歲不與淒淒聆候蟲肅肅望歸羽藴結愁我心沉憂誰能去悟彼詩人言歸來藝稷黍發郡城之天台道中述所經覽寄孔謝二憲副趙何二僉憲同年夕夢曾城阿曉行滄波上紫溪復含流連岑時隱障風湍信千轉雲峰非一狀錦繢紛迎玩氛氲忽彌望蘭泉芬可掬苔壁險難傍思偕同懷子攜手追禽尚由桐柏嶺趨瓊臺遊眺桐觀臨雲壑遙從此路回石門藹天闕借問幾時開鶴羽下清漢仙蹤空碧苔山人仍自去日暮嶺猿哀十六夜月牛渚風流地清江萬里長今宵懷謝尚乘月益清狂勝事已云盡佳期何可忘涼風吹舞袖白紵滿秋霜春日金元伯見過當時好竒客頻過旅人居及此歸來日翻憐會面疏花前兹夕醉湖上隔年書意氣君休問嗟今已不如致道觀溪口宿處玄林靜鐘聲清夜初星河山嶠滿雲霧洞門虗竹下邀中散松前問隱居溪隂是天路獨往意何如和子約莊遊對修和觀懷往仙宫緣縹眇孺子問滄浪獨望青山郭空懷碧草芳田疇諸島接雞犬百花藏何以寄幽興前溪春水長靈峰靈峰望縹眇疑是接曽城梯繞丹霞入人攀碧樹行洞門山日落石室海雲生何事吟招隱空令猿夜驚再别兄弟作可歎江潭客重為魏闕遊河梁一悵望芳草劇含愁隴樹三年淚邊雲萬里秋無由慰棲泊羇影任悠悠宴東河流杯亭送歐陽大參赴蜀流杯亭上酌修竹亂溪紋暝樹煙常合春山雨不分别情依去鳥客路入重雲懷舊仍傷逺勞歌夜獨聞席上送子循弟離樽日南至行役魯東門海徼雲千里寒城雪滿原聽歌仍有淚執手已無言何異飄飄鴈年年别故園早秋楊村旅次懷伯氏季氏滿川風露急涼度海門初薊葉先秋下江星永夜疏客心憑北極鄉路憶南徐塞鴈何時至平原有素書寄懷諸兄弟萬里南飛鴈何時塞上來客愁懸落日鄉夢繞胥臺投筆情猶在垂竿老未催淹留此懷舊長使壯心哀聞家兄之金陵聞君理孤棹欲向金陵遊却憶追歡日翻成羇旅愁鐘流客館夜砧響帝城秋得似滄江鴈東飛白鷺洲過維揚作念昔恭明祀三秋滯楚鄉今來還上國五月渡維揚戀土情何極曕塗意轉長川原歷迢遞煙樹引微茫浴渚飛鳬下驚沙白鷺翔江隅有芳草幽思獨難忘皇甫汸二十九首汸字子循嘉靖已丑進士歷工部郎中謫黃州推官召為南京吏部郎中又謫開州司知量移處州府同知升雲南按察僉事有司勳集薑玄仲云子循詩全效康樂甫王元美云子循今體風調頗似錢劉穆敬云皇甫伯仲以詩為業各臻妙境而司勳尤為白眉格胡元瑞云子循五言清空瀟灑色相盡空雖本中唐而神韻過之詩話百泉清音藻思五言整於小謝五律雋於中唐惟七言葸弱兄弟攸均集六十卷自言始為關洛之音變而為楚再變而為江左三變而為燕趙四變而為蜀既返初服取篋中稿檢閲凡興寄未深格調不古語非絶俗句非神采者刪之且曰有志慕古而力不逮心恥時尚而薄不為又言關中之詩粗燕趙之詩厲齊魯之詩侈河內之詩矯楚之詩蕩蜀之詩澀晉之詩鄙江西之詩質浙之詩嘽吳下之詩靡有髙視一世之槩焉要其五言清真朗潤妙絶時人匪徒火攻伯仁而已過武城謁言子祠作遡風枉輕帆戴星理扁棹超忽之武城有蕩瞻魯道古邑一何卑令猷久彌劭弦歌謝清響精華契深造曰豫厠文儒耽寂違時好剖符辭帝京腰章宰名趙諒乏操刀資懼貽製錦誚經過緬遐躅神對宣幽抱言采江上蘩薦此廟中貌誰謂千載殊可以同髙調奉答子安兄江郭改故隂家園藹新霽柔條始發林芳草漸紆砌潘居信為間楊亭况重閉曰豫忝明時與子承嘉惠分省各有愆佐郡慙所蒞暫就北山招轉愜東田稅情忘桃李言迹豈匏瓜繫感遇興長謡來章緬幽契寄懷王道思本乏希世姿翻為逢時誤良友豈不懷遄征詎遑顧日暮勞所思凌風未成晤將從夢寐求緬邈山川路秋夜把酒對月宋生陳九辨陸機歌百年悵兹清秋月聊使幽懷宣矯矯歸雲鴈嘒嘒含風蟬摧芳委朝露俄景流夕川鱗運有代謝蕣榮無常妍始知行樂貴何必居情牽長夜思秉燭新月正登筵金尊泛緑醑寶瑟縆朱絃商歌當棗下楚舞出花前餘名焉足藉達生乃為賢仲秋之月諸晜燕私風月雖佳雲雨或間五首奉義遊京邑數載違親宴迢迢明月光照我越江漢何如故鄉夜及此清秋玩鏡彩攬未盈璧景委才半桂樹敷丹英華萼紛相煥雖謝西園悰庶附南枝翰良辰信具美清夜永為歡明月已幾望華彩流雲端廣庭置芳座髙會列盤餐但云杯行緩不惜露下寒情來感今易迹往戀昔難一聞關山曲猶似别長安敦賞每卜夜行樂聊及時秉燭且不寐待月豈云罷鱗鱗玉葉薄皎皎金波遲髙臺臨窈窕回塘生漣漪載歌蟋蟀唱復咏鶺鴒詩清輝一以鑒素心同所期嘉月有餘照歡晤無限情寵弟載旨酒邀我坐華楹蓂齊莢復萎桂滿輪乍傾忽忽愁霖至瀏瀏悲風鳴員缺遞相運明晦焉足驚太康靖往訓知止崇令名肅肅斂朝雲娟娟收夕霧江上珠始來天際鏡方露列宿齊掩縟凝霜共呈素嘉肴尚堪薦美酒猶足具良友且無歸劇飲酬兹遇所願揚末光何辭照遲暮秋宵酬子安兄作清夜遊家園眷言懷丘壑素月升員靈千載共寥廓始出東南樓俄頃西北郭華燭滅蘭堂金波蕩羅幕雖過二八時光彩紛綽約商歌正流響魯酒亦未薄人生貴適意胡為坐羈縛結髮從至今朱顔悵非昨冶服豈常玩榮名焉足託良會聊具陳麗藻復間作穆如揚清風粲若敷春萼申意忝惠連何以獻康樂秋日往梅林莊居疏公守舊業班生慕常廬薄遊千里外一出十載餘偶與密親邇惄焉懷所居東林扉尚偃北郭徑始除青山藹盈戶緑水湛通渠流盼悉成往眷言思遂初將從古人學乞歸事耕畬顧驚年迹乖坐使情興紆冬日往虞山作故鄉誰不懷名山矧豫慕一為塵迹牽遂闊賞心晤偶值芳歲闌遙泛滄洲趣澄江帶餘霞丹壑收殘霧嚴霜委野草寒飇振皋樹指塗尋舊蹤流盼成新寓魚樂愧淵沉鴻冥羡雲騖歸來徒見今履往悵非素送陸宜甫還洞庭烈士晞康衢逸人免幽壑矯翼鮮寧棲潛鱗有深託陸君箕潁流雅志甘場藿被褐自行吟持經事耕作别來歲屢遒念往迹猶邈避亂辭東山韜光翳南郭聿暮促歸心申章敘離索雪積湖上居雲停林間閣挂席回青陽援琴遲芳酌願保黃髮期無渝素心諾臘月十五玩月答子約員景攬兔升馳光感駒隙西園將密親南樓遲佳客生無百年期能幾三五夕旨酒盈樽罍髙堂間琴瑟請誦唐風詩胡為坐拘迫棣華眷季方摛藻凌希逸往晤迹易陳來悰會難逆再滿清夜輝寧知芳歲隔偶懷虞山之遊因柬張比部寰我昔虞山泛登臨暮景斜雨迷當岸柳風度隔巖花奈此淹京邑傷哉歷歲華張騫髙興在早晚待星槎送陸給事燦謫都勻驛國論何年定鄉心此夕搖鴈飛天畔驛龍隱日南橋謫宦恩非薄居夷路詎遙誰憐梁太傅淚灑漢文朝蠶室成蠶館開周典鸞輿扈漢儀棘牆春窈窕桑沼晝漣漪繭獻夫人日衣明上帝時娥媌御王母玉珮降瑶池泊維揚地是南來域江分北望賖空餘前代宇不放昔年花物色圖丹壁春風想翠華誰憐歌舞處日暮有啼鴉臘月十五夜坐惜青天月能餘此度員乍來梅蕊下猶滿桂叢前江浦潮難落關山思可憐催人三五夜含照入新年承天候駕二首東幸方過沛南巡乃至衡翠華臨楚地黃屋駐樊城雲以朝歌白河因夜渡清寧知天子貴别有故鄉情兹地承嘉惠仙班喜復從天行傳駐蹕月出候鳴鐘禮樂河間事山川灞上容由來江漢水何處不朝宗靈巖棟宇開靈嶽池臺隱廢宫已看塵劫逺猶想霸圖雄野霽呈秋色濤喧見晚風從知挂帆意遙在五湖東十月十五夜月清漢月仍滿空山歲欲闌入林無礙葉映水覺池寒逺道心千里髙樓思萬端誰能三五夜長及盛年看舟中對月書懷不識别家久但看明月暉關山一以鑒驛路逺相違影落吳雲盡涼生楚樹微天邊有烏鵲思與共南飛騎省騎省慙三入鶯花過十春心徒懷許靖鬢已似安仁香草思公子明珠報美人那堪秋水上猶此隔迷津託宿報恩寺平野新秋入長干舊寺存青蓮非世界緑竹是山門塔火看生滅鐘聲悟靜喧迷方欲有問慙對逺公言諸君乘月攜酒見過遲謝山人不至席上作芳樹長安道春宵動旅愁一尊良宴會四海盡交遊玉漏寒頻度金河靜不流清輝憐謝監何事隔南樓寄子約弟兩地承嚴竄同時罷省郎因書問舟楫何日下沅湘客夢頻棲月征塗欲戒霜平生題賦意那得倦遊梁生朝寄兄弟白髮逢初度清尊思惘然鶺鴒原上夢犬馬客中年睂宇將雲結心旌共月懸朝來淇水望時問渡淮船早春寄子約弟豫方有悼亡之戚獻歲思吾弟何時報徙官夢勞池上積書到洛中看太史身猶滯潘生淚未乾梁園飛雪盡欲到剡溪難送王亮卿遊天台嶽路從兹始仙源信可求客情臨海嶠鄉語永嘉舟天外看霞起林間聽瀑流無能解纓去送子欲神遊九日寄子約漫有登髙興兼當望逺何對花驚白髮見鴈憶黃河亂後書來少霜前木落多不堪羈宦日同是阻干戈夢子安兄作一為生死别獨宦尚飄蓬白首行荒外青山值亂中九原人豈作萬里夢猶通今夜看春草池塘思不同登天平廢寺古寺空山裏重來感廢興尋溪迷蔓草攀壑藉危藤繞樹多寒鵲然燈止病僧獨憐青嶂外猶見白雲層與鄭司士夜話故國經年别他鄉會面難人疑天外至花似夢中看山瘴侵氊濕江流繞舍寒不知臺省客誰念一儒冠七月六日張幼于館燕别將赴豫章祖席叨君燕蕭齋與客過旱雲涼思少江月旅情多著作慙金馬遲回戀薜蘿欲知臨别恨來日視星河由罨畫溪登玉陽山院溪水鏡中渡風帆畫裏看潭猶名玉女地即傍銅官向夕山常雨先秋樹已寒洞宵供奉日歸隱聖恩寬答徐紹卿見懷停雲遙引望良晤近何疏以我丘中想開君湖上書花飛人别後木落鴈來初祗為懷徐孺長令夜榻虛何內翰招宴獲聞聲伎之盛房中樂自舊京傳促柱輕調慢拂弦曲罷周郎那得顧但聞餘響落燈前皇甫濂七首濂字子約一字道隆嘉靖甲辰進士除工部主事謫河南布政理問稍遷興化同知有水部集孫齊之云水部詩清敻罕儷其志亦復玄曠造黃清甫云水部詩意玄詞雅律細調清長於景務在幽絶雖物指區中而神超象外會其獨詣斯可與言詩矣兄子循云子約詩每出間曠彌覺沖逸興到詩成曽無造次應酬之語宋轅文云子約盛有才名其詩頗傷浮急詩話蔡子木哭子安詩云五字沉吟詩品絶一官憔悴世塗難李于鱗送子循詩云吳下詩名諸弟少天涯宦迹左遷多子約宦亦不達與諸兄同詩稍不逮也赴洛留别華陽兄浮雲薄髙山崇朝去還結遊子不憚煩悠悠復徂轍密親自兹曠臨流何能發衰林動逺風寒江冒輕雪遇物隆所悲興愁頓難絶無以赴洛人懷哉但吟越不赴郡檄答子循兄矯翮思霄翥遊鱗託淵沉物類各有適殊塗難並尋豈伊世網慮擾擾誰為心振衣還東山寢迹棲舊林江海多風濤舟楫弭川隂無令衝波激但恐歲序侵願言謝西府谷口有徽音陳卧子云固是雅人悼子乘冥冥雨露集熙熙歲始更靈蠢各有化人理獨無生念我泉下子一絶如朝榮生男以待終胡為遘夭煢清塵布虗室寒晦凝軒屛流目無存影淚涕交霑纓恫懷何能已歎息每遺聲堂闈曠綦迹詩書空復盈奚但腸九回心膂咸頽崩愧乏延陵達無乃傷我明昌平登陽翠領望居庸漁陽通古北上谷邇皇州綿山帶西日重關枕滄流澄霞澗影分歸雲嵐氣收隂崖忽成晦夏色驚先秋無以行邁心恤此烽煙愁伊昔布駿略婉矣幕中籌匪今重俠士自古並與幽傷哉投筆懷白首何所求從僧簡經説難少乏經世姿長逢行路迫何為百歲間坐使千慮積薄從沙門遊聊與同所適風逺水木華雲興梵鐘夕委叩愛良託空情藉深譯曾是投石心對爾翻經席乃協支許懷焉貴軒冕客初服儻有期永願庶可畢歲暮季冬違淑候但見玄隂結物化各以時胡能隆所缺濳深有神鱗鳴條感微蛻霜雪塗我庭何由吐芳茁諒此達化先匪伊明且哲送子循家兄赴嚴相公召修志袁州江水去悠悠征帆不可留一尊相送盡千里共含愁雲樹依殘日霜笳動早秋猶憐覽風物書記在袁州馮惟健二首惟健字汝強臨朐人嘉靖戊子舉人有冶泉集朱中立云陂門竒思駿發古選沖逸近體嚴整蓋傑作也登觀音寺天削孤峰峻醫閭最上頭窮巖藏古寺懸石結危樓雪瀑千林潤松門六月秋夜來禪榻卧天漢掌中流姑孰道中煙起樹色暝水生江岸仄夜來别故人風雨最蕭瑟馮惟敏四首惟敏字汝行惟健弟嘉靖中舉人謁選淶水知縣改鎮江儒學教授遷保定通判有海浮集朱中立云海浮詞雖逸而氣弱律雖協而調卑乏王元美云馮汝行如幽州馬客雖見伉俍殊都雅七里溪别墅二首知足始逺辱至人貴自全不羡公與侯所志受一㕓吾家有舊業乃在城東偏一丘藏一壑宛轉依清川生涯故不常中道成棄捐棄捐從此去一去二十年非無五畝宅在邑多糾纒幸兹協初心歸我汶陽田我田無逺近處處緑澄溪朝發巨洋滸暮泊野水棲野航流北陸香稻來東齊豈伊貴異榖美利貽蒸黎名山近村落逮暇恆攀躋仰瞻霄漢遙俯眺浮雲低翩翩比翼鳥乃在太行西終歲不合並激昻飛且啼詩話臨朐冶源山水勝絶髙梧一林修竹萬個泉流其中酈善長所云分沙漏石者也土人謂園是海浮所築緤馬林間想見東山絲竹之盛後遊莫再恆縈於懷讀先生二詩猶不禁神往柬郭次甫送子遊東嶽五月渡長淮誰言獨往人次甫自號獨往也中道臨當乖乘流豈不返因以安豫懷一諾重平生三年今始諧心期在山水所貴敦朋儕秋日動遐思良夜間髙齋螢火照裳衣蟋蟀鳴庭階何時披素襟一笑遺形骸石頭城有懷石頭城畔枕寒潮坐聽疏更夜寂寥生計已拚尋舊隱窮年猶自滯歸橈空悲浪迹淹三楚無復傷心問六朝稷下故人知健否何時散步汶陽橋馮惟訥五首惟訥字汝言惟健季弟嘉靖戊戌進士歷官江西左布政使以病請老特進光祿寺卿致仕有光祿集朱中立云少州詩俊逸秀麗縱橫繩墨間王元美云馮汝言如晉人評會稽王有逺體而無逺神取余世用云光祿詩沖雅和平則開寶詩話光祿詩亦華整可觀三馮並稱其賈氏之偉節乎吳郎坐見人餉衣香戲贈湘君搴薜荔魏帝采蘼蕪盤龍連帶理翠鳳合歡襦不能機上織學作府中趨定知香十里終然傾五都朱近修云六朝遺響春初玉泉觀餞别史子地擁秦亭北天臨渭水南樓臺千嶂起雲樹萬家涵塵劫何年盡仙宫此日探春光正可惜願一駐征驂送龔侍御清戎滇貴天王按劍欲專征詔使分麾十道行玉璽夜開鳷鵲觀樓船春下鳳皇城日南島嶼揚旍度徼外蠻司擁傳迎不用軍書馳朔漠年來百粵未休兵秋日寄懷家兄燕山木落鴈來遲逺客南歸未有期明月雙懸江海淚秋風一寄鶺鴒詩淹留賈誼才無敵漂泊馮唐鬢欲絲最是昭王遺恨處黃金臺上草離離秋日同參伯邵公遊鳳皇山鳳皇髙閣俯晴空萬里蠶叢此路通逺近村原秋色裏參差草樹夕陽中尊前舞袖翻霜葉天外清笳咽塞鴻回首舊遊成夢隔獨將遲暮歎征蓬卜大同二首大同字吉夫秀水人嘉靖戊戌進士授刑部主事歷官福建按察副使有監泉集同戴前峰遊赤壁共有探幽興言尋赤壁遊昔賢不可作吾輩復相求孤鶴今何在長江漫自流因之重懷古對此且淹留楚中思歸久欲辭塵網拂衣返故廬水田原不薄茅屋亦堪居五斗何為者三湘安所如勾留猶未去豈羡武昌魚卜大有一首大有字謙夫嘉靖丁未進士除知無錫縣調潛山遷南禮部主事終尋甸知府有益泉詩藁秋日遊牛首奉和賔巖韻黃菊枝頭未破叢曉臨蕭寺野煙空九江波浪開天塹六代繁華想帝宫醉後幾吟豪士賦興來直上最髙峰日斜徙倚朱闌遍縹眇孤雲是越中卜大順一首大順字信夫嘉靖癸丑進士除知當塗縣入為刑部主事改吏部歷稽勳司郎中有簠泉集鄧尉探梅日斜遊倦宿湖干一望苔枝湧翠巒午夜月明涼似水船頭獨坐不知寒詩話三卜同懷取甲第仕俱不達而子姓至今凋猶保其故廬其後嶽氏繼起雖臻膴仕而後嗣謝日甚矣謙夫頗好事著述多有刋行者豫既録三馮詩爰以三卜先生作附於後侯一元五首一元字舜舉樂清人嘉靖戊戌進士纍官河南布政使有二谷集詩話二谷詩雖率易然有真趣答鄭越山故人情不怡貽我書一尺云從去年秋及此春半夕恆雨失時暘有背不得炙西山薇苦艱東郭履無迹徒吟無正詩詎有救時䇿君問調元人尹去陟亦斥負鼎元自肥豈知天下瘠氷山頃已頽皎日方侍赫天子正更絃羣公各虛席谷口沉子真東山卧安石守道詎憂貧弗損自成益世事如格五人生不盈百念我七十翁當為幾時客書扇贈王少華古人有遺言惟白可受采齊紈變蟬雀昭質復安在願持君子心如月初離海太空無纎翳淳白終不改四海揚仁風蒼生良有待看新厯有感少日見星厯每自閲紀年常常在人後漸漸出其前壯志輕逺道久為車牛牽曾未幾何時歲月忽我遷一朝見新歷我辰不及編元雖貞下起所惜非故躔不知羲和馭何日還來旋在天無停晷在地無停川吾生良已矣來者其勉旃舟次感懷江城久客鬢垂絲故國長年入夢思老大總非童稚日川原猶是釣遊時笛中朋舊今誰在鏡裏衰顔轉自疑安得相隨慶禽侣雲山采藥任吾之甲戌七夕作是歲豫有悼亡之感靈匹經年悵已違佳期此夕儼相依悲歡轉首成陳迹明日橋邊鵲又飛侯一麟一首一麟字舜昭一元弟有龍門集競渡曲逺水浮雲不見天畫橈處處旋龍船誰家少婦輕回首忘却臨流墮翠鈿栗應麟二首應麟字仁甫長治人嘉靖己丑進士陳州知州歷按察僉事有去陳集雨夜泊舟天津答劉笏山民部時駕幸承天急雨危檣夜孤舟溟海涯風濤驚宦轍雲漢憶仙槎故國含情逺殘燈照影斜翠華在天末遷客敢言家興武營暮春感懷邊雲漠漠點征衣飲馬長城悵未歸春色不堪愁裏盡楊花又向客中飛栗應宏一首應宏字道甫舉人有山居詩集遊城南池偶下南山岑蕭然諧夙心漳干一徑入煙景四圍深秋水浸枯木夕陽明逺林相期杳難即漁浦晚沉沉髙岱四首岱字伯宗鍾祥人嘉靖庚戌進士除刑部主事出為景府長史有居鄖西曹集李伯承云伯宗擬古諸詩雖文通不能過伯蔣春甫云長史詩直與盛唐岑杜頡頏冒麟云伯宗富才徑力與七子爭道而馳感興二首天員不中規地方不中矩人生天地間安得無齟齬仲尼屢放逐顔回苦貧窶賢哲不偶時古今那可數達士貴樂天仁人亦安土勉哉宣令德庶以表千古鴻鴈萬里來翩翩渡彭蠡海燕去何之秋風辭故壘去亦不足悲來亦不足喜物性各有適景光一何駛運至疇不興時過亦云止世事俱茫茫靜坐觀無始登臺薊北收兵未長安無使來風塵連朔漠雨雪暗蓬萊去鳥為誰急寒花何意開孤臣頭白盡倚杖獨登臺寄懷李師孟水曹别署秋光滿千帆霽色開海風吹月上江雨帶潮來名著山公啓詩傳水部才不知登眺處誰與共銜杯髙啓口山一首啓口山字叔崇嘉靖丙辰進士官兵部郎中有遺稿山行欲訪山中人未識山中路茅屋漏疏林蒼蒼但煙霧何良俊二首良俊字元朗松江華亭人由歲貢生授南京翰林院孔目有清森閣集皇甫子循云吾鄉文徴仲以推擇待詔金門後十餘年而蔡九逵繼為南孔目又二十餘年而何君繼之杜甫草堂開於潭水羅含精舍寄之江濵狎梵僧以幽探結勝流而觴詠每一篇出匪但藝苑翕推抑且閭閻遞誦詩話元朗早歲入南都隨顧東橋遊宴多習舊聞東橋每宴集輒用教坊樂以筝琶侑觴當康陵南巡日樂工頓仁隨駕至北京得金元人雜劇元朗妙解音律令家中小鬟盡傳之置酒留賔恆自度曲有李節者善筝歌元朗品為教坊第一於時名彥咸賦詩留贈黃淳父詩所云十四樓中第一聲也其後引歸海上倭亂避地青溪旋徙吳門然文酒之會未嘗廢絲竹也詩頗率意其買宅句云一須焦革鄰舍二要秦青對門興固自豪第乖好樂無荒之義矣春日寓懷東方雖大隱終是漢庭臣如何敢恣肆嘲哂萬乘尊武帝本愛才寵賜亦殊倫百金買少婦終歲輒易人侍從匪孤逺諷説恆見親當時非不遇傲兀竟何因我今六尺軀頭白久沉淪始圖佐明時一官終為貧比肩侏儒笑爭食雞鶩嗔放身鹿豕場終勝金馬門若非速謝去孤意何由申包大侍御冬日過余城館見貽新詩率爾奉酬弱年慕大隱中歲棲附郭試以愜微尚兼用諧勝託環堵有舊營山楹無改鑿髙樹列偃蹇羣峰羅岝崿輕颸披藥房微雨灑菌閣新竹漸紫苞繁花吐芳萼春歸競敷榮秋至同瓠落林卧閲代謝天遊恣寥廓遺形偶斥鷃混迹隨屈蠖豈無寰市喧幸免纓組縛畢歲矢勿諼中懷諒無怍包子臺中彥風期眇丘壑暇日訪衡茅投我遊園作委曲陶令言纒綿尚平約丈夫貴得意乘時展明略勉終天上期庶果林中諾何良傅二首良傅字叔皮嘉靖辛丑進士官禮部郎中有禮部集許仲貽云叔皮詩舒徐暢達譬之洪流行地波瀾自生品卉在林采色各具徐伯臣云叔皮五言視漢人稍加藻繢而渾成和厚可稱作者七言歌詞得激歎流美之致律亦藴藉可讀贈徐伯臣補奉化令嚴程忽云屆將子臨河橋弱柳向微風黃鳥時交交感物傷余心申爾以久要雖有盈尊酒何以永今朝徘徊意不極揮淚發長謡董子元移居南郭寡塵鞅東林有勝名青山斜枕市緑水曲依城夜月家家笛春風樹樹鶯結廬心自逺寧復世人情金大車一首大車字子有其先西域密嘉國人明初歸義賜姓居南京中嘉靖乙酉鄉試有方山遺藁陳羽伯云子有詩學襄陽隨州辭義兼美送汪汝玉守思南謫宦君何恨髙名世所傳殊方原鬼國瘴水積蠻煙十口天邊寄孤帆灘上懸中原萬餘里後會定何年金大輿二首大輿字子坤諸生有集陳羽伯云子坤詩清新秀朗中秋夜集金素動四野佳氣集林塘中天圓景來冉冉揚清光芳池含微波流螢曜中堂良覿侈髙會促席飛華觴絲竹間哀響雲霞乍低昻人生宇宙中歡宴不可常名園秀且麗秋色清且長醉歌淹永夕清光未遽央與文源朱二過溧陽道上侵星發徂輛悠悠即長路家人前致詞問我將焉赴躬耕苦旱乾何以資朝暮衣食事奔走晨寒犯霜露楓林號夜烏宿草棲寒輕煙動墟里崩沙依淺渡悽悽浮客心黯黯長天霧逍遙思孔桴濩落嗟莊瓠去去返蓬蒿脫粟安吾素文彭一首彭字壽承長洲人待詔徴明伯子由歲貢生仕為國子監博士詩話二文翰墨無忝衡山詩雖流傳不多以比彭陸居周固當較勝題溪南别業西溪溪水深不流溪南更築林堂幽會心自有濠濮想乘興不數山隂舟一簾暮雨足吟眺萬疊春山作卧遊主人縱有蒼生寄清夢依然狎白鷗文嘉四首嘉字休承徴明次子由歲貢生官和州學正天池天池之山今始到仰首忽見蓮花峰池水潺湲瀉琴築石壁嶻嶪開芙蓉春疇連延麥初熟暮嶺回合煙已重肩輿催豫下山去悔不此地巢雲松石湖鵁鶄鸂鶒滿晴沙紅杏夭桃亂著花十里湖山開畫障一雙小艇載琵琶題畫二首清絶倪迂未易攀能將水墨繼荆關疏林斜日茅亭外一片江南雨後山沉香煙暖碧窗紗緑柳隂分夏日斜夢覺只聞鈴索響不知山鳥啄枇杷蘇濂二首濂字子川濮州人鴻臚署丞終府通判青石嶺鳥道盤雲細羊腸度坂危青回峰歷亂丹轉磴逶迤飲澗猿相挂懸崖樹倒垂平生愛山水此地足棲遲絶句新笋抽林與屋齊亂紅飛過畫闌西流鶯定惜春將去坐向緑隂深處啼蘇淡二首淡字子沖舉人有蘇仲子集鹽河聞鴈客子起常早月明殊可親一聲沙際鴈匹馬渡頭人顧侣鳴偏切悲秋興轉真蘭閨夢回處應憶客邊身暮秋夜宿紫荆關驛路飄黃葉關門薄紫荆上都瞻處近北斗坐來平塞冷秋笳斷原荒野燒明終軍雖老大還欲請長纓張獻翼一首獻翼字幼于更名敉國子監生有文起堂正續集魏仲嘉云幼于資鑒超敏標峯朗逸與兄伯起婉章新藻齊芬互映七夕同趙今燕賦翠帳紅妝送客亭佳人眉黛逺山青試從天上看河漢今夜應無織女星張燕翼一首燕翼字叔貽嘉靖甲子舉人送仲氏之南都鴒原惜别思依依洛下憑誰薦陸機池上夢隨芳草去江干心逐片帆飛愁添旅食頻彈鋏葉落空園靜掩扉欲識倚門情更切白雲回首是庭幃明詩綜卷五十
