body:
  text: 明詩綜巻十三翰林院檢討朱彛尊編鎦炳四首炳字彦昺以字行鄱陽人朙初獻書任中書典籖岀為大都督府掌記有春雨軒集楊㢘夫云彦昺詩音節甚古琅然漢魏之音士危太朴云彦昺馳騁戎馬决勝籌帷有古烈風故其詩悲壮沉鬱玉宋景濓云彦昺工力既深摹擬輒似詩如璞輝春蠙珠浴月蒋仲舒云彦昺詩篇峻潔尤多樂府清絶之氣可觀淒楚之調為甚旣累簡質然亦非本語静志居詩話彦昺詩純效鐵厓宜鐵厓之傾倒也至其病過于繁艶特擇其淡雅者著于編崩城操朝從城上哭長城與雲齊暮從城下哭長城化為泥嗚呼城崩兮猶可築夫君死兮百身莫贖春夕直左掖懷周侍御一作郎晚雨池上晴逶迤澹将夕金莖華月生綺樹流雲濕牕虚漏聲永幔巻爐烟襲憶我同袍人何繇共瑶席楊㢘夫云仿韋也左掖門朝退呈吳待制繆忝金閨籍聨班趨晚朝逶迤西上門窈窕長安橋殘雪帶逺樹夕陽明山椒不有同袍者疇能慰寂寥别京邑之東阿前年别鄉閭今年出京邑悠悠去江漢杳杳事形役所懼心志違况此風波急烏啼楓樹烟鴈下蘆洲夕回首望長安蒼茫寸心失郭奎三十首奎字子章以字行巢縣人明初朱文正開大都督府節鎮洪都太祖命奎輔佐參謀及文正得罪坐不諌誅有望雲集王元羙云参軍帥幕風流詞藻清麗究其品格在張徐之次洗曹潔躬云參軍詩以骨勝一元人穠麗之習詩話參謀詩格清剛句無浮響頗近汪忠勤長相思長相思小山下蘼蕪秋深沒行路王孫年年歸不去江南水落天色寒鴻鴈滄波連日暮我思昔兮金珮環羙人座上如花顔紫芝叢桂紛兩間下有流水清潺潺吹笙鼓瑟心常閒别來嵗久鬢髮斑青雲猨鶴不可以企及魂飛夢徃愁鄉闗長相思何時還烏夜啼石頭城上烏遥夜鳴相呼紫清道士有兩樹烏啼不離樹髙處千聲啞啞復萬聲中堂酒闌夢未成呼童把燭起開戸照樹惟恐鄰人驚庭前再拜向爾白我家舊住長淮北慈親已老返哺違零落猶為異鄉客嚴霜滿地江月輝東方未白羣星稀明朝日出當早飛莫使涕淚霑裳衣夜坐吟江風蕭蕭吹古樹關山蒼茫海生霧北斗漸落明河微城頭烏啼天欲曙客子不寐憂無衣東征三年猶未歸蟋蟀在戸嵗将暮洞庭霜白芙蓉稀男兒生當百戰死不執金吾即挾匕閉門勿用長夜歌騏驥終能致千里擬古贈别孟冬霜露降悴彼荷與蒲青青蘭蕙芳采之将焉如贈君夙昔意聊以慰斯須絃歌厲清響置酒岐路隅親戚念逺行各言勉良圖常恐不為樂日月方其除晨風奮髙翼北林多古榆臨岐執子手安得同車驅擬古思友鶡鳴嵗将宴蒹葭淒以霜思君隔山海道路悠且長睇彼參與辰清夜悲未央狂飇西北至一鴈方南翔言念疇昔歡與子同衣裳安知異寒暑日月不我将天髙則有斗川渉愁無梁憂心隠如惄出戸徒傍徨送江彦英還錢塘東南有髙樓華日照綺楹瓊筵列海錯雜以絃歌聲疏簾巻晨夕廻看蒼江清君今利攸徃我獨懷鹿鳴執事望長路駕言出東城嘉㑹常不足何况臨當行晴郊芳樹碧緑渚春蘭生持觴意難盡相思空復情紀夢忽忽頽芳年揺揺寄行役寢興勞形神鬢髪𤣥已白驚風響庭樹憂思日恒積夢魂清夜歸仿彿舊鄉邑青松在園田桑柘䕃廬室飛鳥雲際還牛羊下來夕澄湖澹微波秋山有佳色雞犬雜比鄰墟烟靄阡陌怡怡兄弟情淒淒丘隴側臨流濯長纓挂冠坐磐石似慰平生歡覺來異疇昔百年如轉蓬萬物乃遺舄天命良在兹勿用云得失寄陳教授敏蘭葉欲覆階馨香襲芳室雨露之所滋恵風偃華質采采不盈筐薄言贈離析憂傷嵗月愆同聲而異迹人生寄百年寒暑㑹有役歡樂難俱并浮名亦何益髙誼諒匪他可以比金石送王彬叔徃同安二首駕言出城門遥望西南路别離良在兹嘉㑹不常遇置酒張瓊筵綢繆復凝佇飲餞未崇朝聊以慰情素翩翩白羅裳皎皎瓊瑶樹髙歩凌青雲豈為紅塵汚春江及信潮芳舟襲蘭杜小人衆所疑君子誰不慕久欲同車行攀轅莫能去惜哉苦淹留年芳易遲暮顧盼懐殷勤増我越鄉慮南州亂無家宼盗縱横馳白骨蔽原野火炎城與池千里何蕭條四顧令人悲倬哉皖公城當此江之湄崇墉上峩峩陣列紛魚麗明公秉髙節徳澤被華滋而蒙天子恩慰爾長渴飢大田既多稼王師良有儀君子利攸徃樂土實在兹嘉賔復來集兼遂平生知春蘭麗芳渚鳴鳳翔髙枝徘徊岐路側未忍言别離别離何以贈再詠東山詩從軍詩朝濟彭蠡湖暮止匡廬山軍行飢且疲露宿聊解鞍方秋黍稷華徂征西南端奄忽嵗云晏雨雪凄以漫撃柝豈能寐哀哀想苦寒戰場久勞役裘褐俱不完鸛鳴在丘垤思婦應常歎誰無内顧懐受命誠獨難三苖阻聲教師出猶未還願公析天威戢舞羽與干上瞻太階平下覩斯民安勞旋詠枤杜貽爾室家歡滕王閣西南有髙閣下瞰滄江清飛闥百餘尺複道周四楹白日一何麗照耀丹青明借問誰所為云是滕王嬰壯哉大唐業封子臨斯城佩玉雜鳴鑾物換星亦更勝地罕常見賢者垂令名相公布文徳復此嘉㑹并羣才若雲集頌以謳歌聲陽春不為樂萬物爭光榮登髙矚曠世臨流忘濯纓再拜述短辭柱石齊天傾送孫良玉還同安送君江上去山路雨初晴落日平淮樹春潮帶皖城酒因今日醉人是故鄉情莫説王孫怨芳洲緑樹生嵗暮寒月出在戸江城鴈獨飛愁人不能寐鄉淚忽沾衣丘隴十年别星霜兩鬢稀為言叢桂老嵗暮憺忘歸琴溪吾慕琴髙子於焉隠遁棲松雲生峭壁山霜漲廻溪古迹行人識新春好鳥啼學仙誠有道安得謝輪蹄五嶺侵晨登五嶺石磴畏躋攀急雪沾衣白因風㸃鬢斑雲連秦劒閣天塞漢蕭關想見當時路班超奉使還出暖水向新營山陽暖水地舊是北軍屯一澗雲連棧千峰雪照門奉書觀壁壘馳驛到邉藩為卜歸人信今朝喜鵲喧寄陳檢校遥想紫薇省郎官直禁樓瓊花天上去清夜憶揚州二十四橋月玉簫吹兩頭秋風挂帆席㡬度大梁游中酒春來中酒朝朝病擁被髙眠嬾出門草没漸迷湖上路花開未到郭西村湘娥有瑟催歸雁楚客無書託故園惆悵東風醒亦醉夢中常是賦招魂游三門山黄茅葢屋石為門路轉溪廻更有村果樹連園收芋栗豆花滿地散雞豚雲深易就漁樵隠山逺全忘市井喧何獨武陵堪避世此中佳處亦難言宿雨宿雨瀟瀟悴客心髙牕連日滯秋隂一枝未遂鷦鷯託四壁應愁蟋蟀吟家在淮南青桂老門臨湖水白蘋深鯉魚風熟香秔早釣艇誰撐近竹林重憶西巖訪舊鶗鴂聲中宿雨晴白雲閒傍馬頭生東鄰茅屋新烟起南澗石橋春水平野老見多還問姓山花開盡不知名故人宅近青松下未到柴門已出迎寄劉彦基二首洪州别駕久相違驥足遲遲三月歸應被長干兒女笑春風不識繡羅衣九月征人未授衣年年書到故園稀無情恨殺湘天鴈不帶平安一字飛開嵗卧病多病文園渴未消自從人日遇花朝不知楊栁将春色緑到淮南第幾橋贈陳教授敏松樹連檐翠色多湖南春水澹生波貢家舊宅雲林在明月滿船聽櫂歌贈白紵山菴道人楊𤣥中四望亭前姑熟溪道人種玉住山西古松數株秋滿屋青鳥月明時一啼徳興山中樹頭飛翠濕空濛茅屋雞鳴霜澗東好借吳興唐棣筆畫圖傳我是仙翁銅陵寄劉知府雙尊特為故人将江路風濤忽渺茫坐對銅官不同飲馬蹄明日又涇陽早發分宜縣夜半荒雞鳴逺村板橋斜出縣西門征人衣上霜如雪猶未曽承國士恩夏煜一首煜字允中金陵人太祖下金陵辟為行省博士調浙東分省哀孫炎垂老戎馬間相知復何有幼與孫炎交於今俱白首炎也雅好詩落魄惟耽酒醉中有神助不放持杯手才豪不受羈焉肯事田畞精勤脫穎出盤錯迎刃剖浪迹帝王州結交英俠藪喈喈朝陽桐濯濯新春栁南北暗兵塵妖星下天狗我皇入金陵一見顔色厚髙談天下計響若洪鐘叩即拜丞相掾奉身事明后再分太守符兼綰都官綬括蒼實重地豺虎白日吼皇曰汝孫炎其徃總制某再拜謝不敏寵命敢虚受一年風俗淳二年民物阜三年逺人歸上表請官守文章曹劉亞政事龔黄右舊嵗過金華與炎適相偶寒燈夜半花春盤雪中韭終宴竟忘疲落月斜半卣臨分各上馬攬轡復立久為言有小女離家方襁負今來已五周見父能認否未必到家期封書附姑舅置書篋笥間纔隔兩月後墨色尚未乾語音猶在口胡為内變生哭我平生友復恐是夢中仰天當戸牖斗柄昬建辰月魄夕在酉乃知真死矣慟哭吞聲㖃復聞遇害時扞刀落雙肘奮怒髪衝冠大罵血漂臼維時東南天彗出芒如帚滛滛苦雨愁曄曄驚電走魂兮早歸來空山不可狃我過孰與規我病誰云灸春酒釀薔薇奠子墳山㟝西京七葉貂零落成草莽既有千載名焉用百年夀峩峩馮公巖與子同不朽熊鼎一首鼎字伯穎臨川人吳元年徴授中書博士遷起居注出為浙江按察司僉事改山東副使拜晋王右傅除參軍授岐寧衛經歴召還至西涼為朶兒只把所害敇𦵏之黄羊川上已日浴溫泉驪山宫殿鎻溫泉天寶遺蹤故宛然繡谷春融丹井火金波月滿鑑池蓮玉顔承寵専恩澤翠輦來游惜暮年我亦逢時修禊事白頭空負麗人天李應榮一首應榮字顯道東陽人元末平江路教授同章溢謁太祖於軍門留參戎務以說降方國珍累官尚寳少卿詩話實録說降方國珍為主簿蔡元剛處士陳顯再使為夏煜陳顯而尚寳此作見東陽歴朝詩奉使塗中作驅車出東郭逺上天台城峰髙插霄起屹立如廻屏前塗在雲杪仿彿秋蛇行俯視萬壑底澗水嘈嘈鳴恍然心目眩幾欲墮危崢况兼風雨至泥滑如飴餳一歩三退縮戰慄若履氷僕夫屢顛躓行者難為情神武恢疆宇垂念及生靈俾将誠信辭以息東南兵藐焉一小子敢不來趨承劉駟一首駟字宗道龍谿人洪武初倉攢以秀才徴試第一拜左都御史後坐事徙滇有愛禮先生集詩話宗道講學逺師北溪其闢釋老甚嚴目佛為泥厮集中有同安歎云噫嘻吁紫陽之化衰家家阿彌儒也墨衣墨也墨衣滿城遊遨誰我知不如歸也不如歸又游天蓋寺詩云若無僧寺塔直是一唐虞斯亦能言距楊墨者矣感興浮屠日以興平地生棘刺大道為之荒聖門為之蔽嗟哉末俗流每每謂之是觀古聖賢人顰蹙多因爾蹇予魯且蒙奚為生此世發憤逐前修質弱安能至聖道雖云逺戮力應可致丁麟一首麟字彦祥海鹽人洪武乙丑進士除給事中改御史坐法死詩話武原雙丁兄麒弟麟嘉禾二王兄鏞弟鈞詩雖格調卑卑然先民有作鄉曲後學不可不為表章也麒字彦禎官至濟南知府詩如烟寺行吟云得句便題林外竹脱巾長挂塔前松送人云西山日薄烏啼急南國風髙鴈影稀天星湖云隄畔馬嘶芳草碧沙頭人上畫船輕聞琴村云别鶴不聞雲外語野烏時向屋頭鳴亦能㧞俗西湖竹枝詞湧金門外春水多賣魚船子小于梭三三兩兩唱歌去驚起鴛鴦飛奈何曹介一首介字子直永嘉人洪武中監察御史金碧山水圖唐朝以來畫金碧小李将軍稱絶竒流傳所見恨不廣真蹟徃徃人間稀此景何人之所作老眼挼挲㸔宛若羣峰削翠撑晴霄一水流銀出丹壑初疑武陵溪桑麻夾岸花枝低漁郎昔日訪竒處回首但見蒼煙迷又疑天台山桃花流水非塵寰仙人劉阮采藥去虹橋一斷難躋攀我生胡為在塵市一見青山心獨喜拂衣便欲歸故鄉髙卧溪堂㸔雲起觴我酒絃我琴髙山流水誰知音許伯旅一首伯旅字廷慎黄巖人洪武中官刑科給事中有介石稾徐子元云廷慎若天台鴈宕雄踞東南小杜之名豈容多讓詩話天台林公輔嘗述廷慎論作詩之法矣其辭曰法可言也法之意不可言也上士用法得法之意中士用法得法之似吾詩㡬用法矣如是而起如是而終如是而為開闔如是而為抑揚頓挫如是而為輕重髙下意之所至辭必與俱固未嘗囿乎法亦未甞廢乎法也古之藝人若庖丁輩随其心手所出無他焉亦用其法爾由是而觀天下之術未有不用法而能神者也又論宋元二代之詩云人皆謂宋之文髙于元元之詩髙于宋殊不知宋之詩亦髙于元也論詞語工麗立節瀏亮宋或不及于元至于説古今道事理輕重明白豈元諸公所能及宋哉其言具有深㫖宜當時有小杜之目惜其集不傳惟餘赤城續志所載寥寥數篇而已畫馬曹韓畫馬久絶筆近代狀者多駑駘毫端不得千古意孰識世有真龍媒圖中此馬何所似人言昔産余吾水一聞髙價傾千金更覺雄心少千里雙瞳爍電筋權竒索不可繋何言笞變化應隨霹靂去死生或與英雄期涓人買骨吁可怪漢武勞師動横潰豈知神物在人間驪黄迥出天機外我生愛馬癖莫醫眼見畫圖神欲飛滎河真種當可致西扳弱水扶桑歸吳去疾一首去疾字去疾安慶人給事中詩話去疾列朝詩集不載其官閥考實録吳元年十月帝御㦸門與給事中吳去疾等論政務又甞為議律官春日雨中示友人二月已過三月臨茅堂寂寥長書隂梅花白白落已盡楊栁青青渾未深何日新晴出山郭及時行樂稱春心應須載酒窮幽賞爛醉扶肩過竹林陶誼一首誼字漢生天台人官員外郎山居烟蘿寂寂䕃柴扉路入蒼苔一徑微江燕定巢來自熟巖花結子落還稀修琴有制先鈔譜沽酒無錢更典衣采藥山童終日去夜深常與鶴同歸張適十首適字子宜長洲人洪武初以秀才舉擢工部都水郎中以病免後復舉明經授廣西理問歴滇池魚課宣課二司大使卒于官有甘白先生集陳嗣初云甘白先生詩發纎穠于簡古寄至味于澹泊詩話子宜免都水郎歸即朱長文樂圃故地居之詩所云坊存前哲號屋貯古人書也一時名流都為題詠見鐵網珊瑚詩有樂圃江館南湖江行滇池等集燬于火其孫柷得十之二三于煨燼之餘及士林傳誦之作合為甘白先生集今雕本已罕傳予從其後人星借觀録之雨中對齋前楊栁賦楊之枝二章楊之枝我不如子無知我心之憂曷其已而楊之花我不如子無家我心之憂曷其有涯擬古我馬既已秣我車亦已膏游子志逺行豈憚終夜勞海水自言深泰山自言髙去去渉長道歳月疾如埽譬彼風中花衰謝不復好惟有惓惓懐日夕不離抱别張訓導近識張夫子情深似故知何須雞黍約已有鹿門期此别五千里且論三百詩舟行在明發雲樹渺相思對雨住近南塘栁葢扉凉風送雨薄絺衣檐花暗應鄰舂下沙鳥明隨估舶飛蝸篆登牀延筆格燕泥上壁汚琴徽蒼苔駮石林間路一月春隂客到稀山中春盡蘿磴松巖百摺斜清溪窈窕有人家樹深風送還山鶴石上泉流出洞花就竹編籬防早筍當牕出火焙新茶門前過澗﨑嶇路安得能來長者車題山水小幀秋林雨過雲猶濕緑莎亭子小於笠漁榔欲來猶未來隔隄驚起雙谿􅠃翠岫樓臺圗巖下樓臺擁翠霞千章嘉樹䕃牕紗曲䦨干外東風急人隔珠簾㸔落花題畫巻青山歴歴樹重重寺在雲深第幾峰比屋人家西崦下夕陽長聽講時鐘過朱卿宅鎻却城東燕子樓荒村漂泊幾春秋如今占斷沙河曲更嬾全家上小舟楊彛二首彛字宗彛餘姚人洪武中以人才舉為沔陽倉副使遷都察院司獄調長泰主簿以獻詩擢吏部考功主事謫居滇南有鳳臺貴竹東屯南游諸稾詩話楊君傳詩不多頗饒跌宕之趣霅溪翁山居圖門前野水可通漁雲裏草樓方著書好山誰臨北苑畫斷橋我憶西湖居塵埃自著鷗鷺外霜露正當鴻鴈初為報秋風揺落早梅花消息近何如南城偶題城南好山何太幽人家對門溪水流春禽啼樹野花落雪瀑挂厓嵐翠浮長鑱自可斸靈藥短笻何必尋丹丘一聲清嘯暮天碧松頂月明人倚樓戈鎬一首鎬字仲京鎮江人洪武初徵士官禮部主事有鳳臺集詩話仲京詩原出于溫岐題野塘秋景芙蓉秋色滿銀塘白鷺雙飛下晚凉記得采蓮㸔越女醉騎驕馬觸垂楊范準一首準字平仲休寧人洪武中舉明經官至工部主事有韲甕西游何陋軒諸稾松蘿谷尋幽興未涯窈窕入深谷長松生晝寒香蘿蔓春緑緜緜石上葛冉冉籬下菊樵子時相逢和歌自成曲吾將從杖屨題詩滿青竹朱逢吉一首逢吉字以貞崇徳人洪武中官大理寺丞寄張世衡文穆公家四世孫清朝今見幾人存衣冠入市爭投刺風雨讀書深閉門坐詠逺山楓葉寺歸從新酒杏花村玉灣橋下莓苔路應有徵車故轍痕冷謙一首謙字啓敬嘉興人洪武初太常司協律郎詩話世傳協律仙去嘉興府治東北碧漪坊建祠祀之里人禱夢多騐祠三面距水今為土填淤矣協律著作罕傳僅首從郁氏書畫䟦録得一題燕肅山水巻依稀廬岳髙僧舍仿彿商山隐者家我亦抱琴來谷口白雲深處拾松花桂慎一首慎字宗敬慈溪人洪武中官中書舎人謫戍雲南臨安府登太華山寺昆明池上古招提樓閣參差近碧雞為愛白雲分半榻却隨明月過雙溪風前松子當牕落雨後苔衣拂石題如此清幽好棲泊為誰又度澗橋西朱芾一首芾字孟辨以字行松江華亭人洪武初徵授翰林編修改中書舎人詩話明初詩人善書法者正書則楊孟載張翔南行楷則唐處敬張藻仲草書則宋仲溫周履道章草則盧公武隸則吳主一邵復孺大小篆則張士行宋仲珩而孟辨名尤在諸子之上嘗以所書瘞之細林山中題曰篆冡董徴士良用贈詩云華亭朱茂才好古喜欲顛一埽世俗書習篆忘食眠秦望并之罘碧落兼新泉小者案間列大者屋壁懸平生囊橐貲多充買碑錢功深學既精齒壯志逾堅池魚染皆黑鐵硯磨将穿摹搨累萬番期差古人肩師法正在兹什襲比蹄筌孫樵文自祭智永筆忍捐嵯峩細林山圅之瘞其顛聚土封若堂鑱石表為阡寳劒賈胡發玉柙蔓草纒何如篆塜光夜映列星躔錢提舉思復歌云雲間苦嗜古手挍科蟲辨魚魯明牕淨几風日佳臨摹一掃千番楮商彛周鼓真吾師螎扁沉著沙畫錐鸞廻鳳翥龍夭矯長戈短劒相交馳書草日積充棟楣保愛何啻璧與珪細林山中一抔土緗笈緘縢重閉之合學士灘哥石硯篇誦之可謂好事者也賦得秦淮送宋仲珩春漲曉沄沄空明澹孤嶼中流送行舟緑波渺南浦鷗從青鏡下人立滄溟語素濲漾凉飈員紋散疎雨桃葉懐舊題後庭歌弔古因之寄離情前洲采芳杜宋璲一首璲字仲珩浦江人學士濂仲子洪武九年召為中書舎人詩話仲珩受業于趙古則故精于六書南村稱其大小篆純熟姿媚行書亦有氣韻今誦其五言離竒妥帖惜不永天年兼為書法所掩寄章允載兼簡項思復憶昔别京畿與子寓官廨一見即相驩不翅舊交快維時因道塗驅車久行邁忽逢弛擔初欣若身脱械握手坐氍毹軟語慰疲憊情投比黏膠意惬甚搔疥項君數過予滯下喜方瘥三人互談噱何殊合糾繣驂鑣出㳺衍古蹟探竒怪路入青蓮宫駐足聽梵唄薄晚始旋邸傾倒形忘瘵周詳論書譜從容說詩𣲖凡習尚浮華遺音日已壞作者固緐夥咸韶混夷韎瀾倒并波隨疇能捄危敗顧予樗散材頻年處卑隘枘鑿乖方員甘遭世俗賣人将競嘲譏子乃敦教誡苦言加箴規黙黙使心解酒酣示新篇辭源極滂湃却類任公子投竿下羣犗應知藝嘉禾薅治絶稊稗讀之神駭驚秋蛩罷嘶喝政圖藉薰陶别還隔遥界欲叩寝食安但復占爻卦浦汭守衡茅無從豁矇瞶譬諸鐵在爐伊誰鼓風鞴况乃患沉疴軀命猶纎芥侵尋閱暑寒孱弱乏剛夬精神盡凋耗靣目多腫䵳布衾暖閣眠藥貼晴簷曬年來獲告瘳書齋仍埽灑猨鶴亦争慶似索煙霞債綴賦詠雕蟲攻篆學垂薤有時看飛泉四山寂無㕦思取古遺經一覽適炙嘬蘭膏繼日晷矻矻警昏懈視已常欿然進業慙質䪥志須成絲枲未能脫菅蒯篤信宴安中懐毒劇蜂蠆蚤暮自深省此語諒非躗近聞子亦歸親朋樂情話千里感遺書殷勤持一介而翁幸康彊愧缺牀下拜執簡立臺端百壬不敢道逺竟莫前動若飛翮鎩嵗月無停輈季秋倐已屆籬菊傍雲肥江山日如畫軒車幾時來夜雨一燈挂明徳正可崇相期各云勱史靖可一首靖可鄞縣人中書舎人詩話潛溪之歸也孝陵諭之云大江春來風浪多宜就裏河逹于家靖可送行詩葢賦以紀實也靖可以吏部奏差洪武九年十一月授中書舎人載實録滎陽外史集有史行可文可殆其昆弟行送宋學士君王親為計歸程幾日攜家出鳳城江上春來有風浪扁舟好向裏河行谷宏一首宏閩人一云新淦人中書舎人行經華隂崔嵬太華出雲中積翠遥連渭水東秋色萬家連逺塞暮烟一帶遶離宫秦關日落行人少漢畤天隂古殿空寂寞武皇廵幸處祠郊木葉起秋風李舒章云是錢劉髙調宋轅文云調既不卑景色亦合陳潛夫一首潛夫字振祖錢塘人官國子監學正詩話吳人朱景春名所居之軒曰安分滕逺為寫作圖題其巻者甚衆潛夫及田子貞詩差優潛夫于洪武十八年二月曽上書言事載實録題安分軒圖一自幽棲白板扉略無塵夢到輕肥摩挲老眼臨書巻抖擻閒身稱布衣風竹翠廽琴響近雨苔青滿屐痕稀客來况說雲山好處處春苖長蕨薇莫士安一首士安名伋以字行更字維恭歸安人洪武初為府學教授遷知黄岡縣事入為國子助教詩話士安集不傳僅見于湖海耆英詩集其湖山圖長歌則從吾鄉郁氏書畫題䟦中録之永樂初以助教治水江南遂僑居無錫自稱柏林居士又號是菴載縣志流寓門今人罕有知者附識之洪武丁丑春題王叔明湖山清曉圖青山屏列水涯畔白雲練繞山腰半分明曉色澄素秋顛倒湖光接銀漢江霞滅盡海暾生巴雪銷多沔氷泮岌嶪巔崖髙莫梯回合源泉淨堪盥天逺匡廬秋杳冥雨足沅湘春瀚漫濃于藍汁可染衣赭若童顛未加冠盤谷繚通百折深緱嶺危撐半空斷澗橋䕃合踏新凉渚閣香凝坐平旦短屐扶藜野興濃輕舠聚網波紋散南灣農鄰猶閉關西崦人家未炊爨僧寺樓臺松滿林漁屋軒牕栁遮岸陶令秫田誰為耕邵侯𤓰地親将灌種桃莫問武陵津采芝偶得商於伴書封鴈帛感蘇卿鱠斫鱸絲羡張翰濯纓欲待滄浪清挽衣空歌白石爛樹樹巖花嵐霧重葉葉汀蒲水風亂蛺蝶暖依芳草飛鷓鴣晴入叢篁喚荇藻翻容避釣魚杉柟不借尋巢鸛壁帙芸枯粉螙生岫幌藤穿蒼鼠竄翠墮梧桐借翦圭羃結絲蘿愛垂幔米家尚存書畫船吳綾不減錦繡段人來西北淹壮遊地擁東南隔竒觀標靈顯秀環故居汎影浮暉在吟案誰能髙深故不兢我為登臨每無憚當時對景真仿彿遶次圍闌舊凝翫丹青物色眼停瞬鐵石心腸顔為汗蹤跡頓忘今昔非記憶方驚嵗年換半生自笑不歸去兩足其如有羈絆泉石膏肓百慮増塵土心胷一朝澣湖山如此慰相思天地茫然寄長歎繆天自云長篇用韻深穏非作家不能李曅三十三首曅字宗表錢塘人洪武初國子助教有草閣集徐大章云宗表詩縁情指事機動籟鳴無窮􅊧苦索之態而語皆天然不煩雕刻朱伯清云宗表善為詩精熟清新氣雄而詞暢一出李杜二公機軸蘇平仲云草閣詩多合乎三百篇格律與李杜不逺詩話草閣得詩法于李季和然季和猶為廉夫薫染草閣歌行則一氣孤行獨開生靣正如淮隂之師多多益善囊沙㧞幟辟易萬人當時四傑十友二肅二𤣥各有標榜如此逸氣髙格顧詩家月旦不及焉信夫知音者之難也古詩吾觀詩三百豈徒正而葩其言本情性反覆成詠嗟二南乃其端列國多滛鼃洋洋雅與頌制作功尤嘉善者固敦厚惡者亦紛挐聖人示我要蔽以思無邪菜圃為鄰畜所殘孟甞久不作吾徒食無魚長齋坐清晝賴此田中蔬僕夫勤灌漑引水通溝渠青青日已長盡是辛苦餘封豕從何來洊食良可吁一殘枝蔓傷再則根柢除遂令蒼翠場轉盼成空虚嗟我在羇旅草野聊暫居惜無専戮權悵望徒踟蹰踟蹰将奈何屏棄犂與鉏學圃聖所鄙且讀窗下書發雙溪峩峩金華城行李何淹留閏十月初吉始能具扁舟輝輝晴旭升莽莽寒烟收篙師戒晨發浩嘯當中流揮手謝送者此行實夷猶昔為山林居今作江海遊撫心媿麋鹿放跡同鳬鷗丈夫旣許國生理焉得謀功成纔拂衣庻以追前修泊鷺鷥灣朝辭婺女城暮泊鷺鷥灣鷺鷥暝不見但聞水潺潺水聲日西流客子何時還長風吹征衣惨澹生愁顔息灘息灘復息灘逆上如登天舟行勢齟齬百丈不可牽人持白木篙左右拄兩肩倒緣凌風檣俯貼衝波船分寸累丈尺始能就其顛回顧望來者相去一丈懸我生匪利渉坦易性所便因之戒行險庻兹逺游篇嘉禾晨發嘉禾城晴日舒我顔水深野岸濶驛古秋花斑回頭指㸃中已過三塔灣少年所游地頭白今始還沙鷗喜我還來徃清波間願為忘機翁與爾俱投閒遣瘧鬼汝本顓頊子變化逃其形胡不肖厥祖騎龍升帝青而為瘧鬼徒屑屑居滄溟復游人間世所在行威靈坐令命蹇子狼狽汝所丁其寒誰致然其熱孰使令淒淒挾絮纊喘喘思風亭肉黄靣亦皺呻吟不可聽巫師用桃茢醫師進豬令汝黨固蟠結百萟無一寧嗟汝聖王裔區區獨伶俜遷居迺令徳肆虐非常經我今賦新詩送爾揚歸舲東方有蒼龍鼓腹生雷霆西方有白虎利口惟膻腥赤鳥司南方丹砂耀修翎𤣥武在北門閃目光熒熒四方汝無徃恐汝罹天刑汝宜返故鄉寒泉肅泠泠緑荷以為衣丹霞以為扃珠簾水晶幌貝闕琉璃屏飄飄曵鸞旗洋洋下雲軿速行如風火晝夜不可停從此勿回首一去三千齡墨梅烏不涅而黔鵠不浴而白其類雖有殊各以見真色畫師亦何心變幻隨世惑展圖對梅花為爾心惻惻言懐今日忽不樂少為川上遊童冠相追随衣服紛好修紆徐既就坂﨑嶇亦經丘是時鳴雨餘氣候如清秋嗒然拄孤藤聽此涓涓流徃者既云邁來者無時休周流信無滯至樂常悠悠俗士勿與言永為智者謀逃難四郊日多壘勞生信乾坤朝來有警急鐵騎如雲屯賤子心實憂焉能守荒村呼兒戒行李一飯同出門路逢逃難人紛紛亦來奔或扶爺與孃或挈子與孫十歩九顛躓欲哭聲復吞間道徃方巖前後相豗喧牛羊亦隨逐飛橋為之翻我行已巖頂我僕猶巖根脣乾吻亦燥何處濁酒樽兹巖既云險况有靈祠存棲遲且茅屋生理安得論俯視西北隅殺氣猶昬昬寄太平諸友昨日東風吹雨過正值山齋罷書課無官可守真自得有酒不飲誰能那此時况當春夏交緑盡園林安敢唾出泥已誇籬筍嫩入饌頗憶溪魚大花間紫騮來幾匹葉底黄鸝鳴兩个桃巖諸公多俊才逺來相就同賡和野人擬作韋曲游諸公忍復東山卧誰謂更深雨復作到曉打牕驚夢破寧愁烏帽顛風吹尚恐蠟屐春泥涴拈毫惆悵題我詩天晴更為斯文賀贈地理逺碧山澗東瀍西曽卜洛定之方中楚宫作當時相宅論隂陽猶未經營到冥漠後來注意馬鬛封某丘某水尋靈蹤封侯作相在頃刻芒鞵踏遍青芙蓉逺師本有降龍技隨處㸔山逐龍勢金華一郡凡㡬家屢見牛眠得佳地我家近住東屏山時與逺師相徃還青囊和月挂松樹且酌羙酒開心顔我聞金陵帝王宅虎踞龍蟠出竒特逺師飛錫宜一遊歸來説與漁樵流踏車行南岸北岸聲咿啞東鄰西鄰踏水車車輪風生雷轉軸平地雪寒生浪花借問老農何太苦低頭欲語還咨嗟前月有雨田未耘非其種者紛如麻縣吏捉人應差役令嚴豈得營私家况當今日滴雨無陂塘之水爭喧譁雖如抱甕沃焦釜蹄涔豈足供泥沙語罷踏車車轉急田水何如汗流濕老妻貸榖猶未歸力疾無奈吞聲泣喜雨行五日不雨中禾焦十日不雨晚禾死農夫田父心煩勞桔槔搰搰徒為爾俄然雲起從西北一片飛來頭上黑六丁雷斧開天關不盡天瓢瀉甘澤沛如萬頃之銀潢疾如江漢流湯湯怒如乖龍騰變化颯如白帝行秋光在坑滿坑谷滿谷此雨何如雨珠玉甌寠汙邪無復分但見芃芃稻花熟東家老翁賖酒勸西家女兒賣釵釧青黄未接渾未憂屈指豐年眼中見我歌不獨如元豐我歌直與康衢同此身願作飯牛翁耕田鑿井堯無功嗚呼耕田鑿井堯無功誕日醉吟先生今年五十一兩鬢雖斑眼如漆挑燈終夜何曽眠細字蠅頭㸔書帙既不能握蘭起草趨明光又不能搴旗斬将赴敵塲布衣十載困江海空有崢嶸磊落驚世之文章近來結屋翠峰下白雲遶屋㸔如畫王侯卿相不到門自與農夫作鄰舎螘浮缸靣新酒渾清晨上夀誰稱尊阿兒拜前女拜後此樂欣欣難具論盤餐照眼復何有出甕黄韲間青韭山田放豚初告腯潑刺鮮魚貫霜栁須㬰剥剥啄啄叩門聲擕肴載酒來諸生陶然洗琖復更酌百川一吸如長鯨我醉欲眠卿且去謫仙未得其中趣玉山雖倒嗔人扶染筆從容賦長句我不願二十四考為中書我不願千二百嵗崆峒居但願百年三萬六千日日日醉吟歡有餘北上行送周士約停君鐵如意飲我金叵羅我有北上行起舞為君歌念此北上樂君行莫蹉跎披雲登太行敲氷渡黄河黄河連天與天碧織女大笑投銀梭紅雲暖光開玉闕流星煌煌夾明月簫韶之音下紫清太液恩波流不竭去年前席召賈生今年上書薦禰衡鵬搏虎變不可測布衣談笑為公卿為公卿吾道昌丈夫壮游須帝鄉紅顔才子青雲郎文光照曜宫錦裳紫騮馬肥金鞍光蓮花匣出三尺霜黄金臺髙天中央紫琳作佩聲鏘鏘聖主恩深誇陶唐好賢不數燕昭王北上行君莫忘九鷥圖何人水墨開毫素白日晴牕起烟霧强将醉眼窺微茫乃見江南九秋鷺兩隻長鳴一隻飛兩隻共啄菰米肥其餘四隻夢洲渚黄蘆白葦相因依我家曽住苕川上緑蓑披雨聽漁唱西塞山邊今有無桃花流水應新漲别來㡬載棲林巒身欲奮飛無羽翰巻圖髙詠風漠漠憶爾磯頭青釣竿胡将軍歌胡將軍邦之良武之豪身長八尺靣如鐵敵人見之凜凜生寒毛憶昨辛夘嵗九州沸鯨濤蒼生日塗炭呼天雨泣何嗷嗷吳王氣宇真天人手提秋水三尺之豪曹貔貅萬竈㑹滁上左右環列俱賢髦将軍謁轅門開口談六韜為王之爪牙出入行陣躬鞬櫜疾如風雨飛千艘王命胡将軍蝥弧蝥弧爾所操義聲西來動白日電光閃爍揺旌旄金陵宣城不日得徽州嚴郡隨風逃洞兵三萬餘刃鞘弓藏弢靈旗却指金華城父老爭先持酒羔喉衿閩楚信州地将軍又為殫力營城壕乃從元戎上台鼎横金拖紫獨立青雲髙将軍未下車民庶憂忉忉將軍既下車所犯無秋毫健兒不敢忤民意酷吏不敢􅊧民膏男兒務農耕婦女勤蠶繅將軍為之垣墉使民厚民適自樂將軍勞兜鍪貂蟬本無異擬變方召爲䕫皋嗚呼壬寅春二月肘腋禍所遭三軍盡躑躅萬姓皆號咷朝廷聞之為痛惜遣中使降丹詔遂有光禄大夫越國之崇褒有廟有廟依巖㟼春秋二時祠太牢吹笙鼓瑟兼伐鼛玉杯春酒釃蒲萄畫梁文栱倍煇赫焚香仿彿來蔒蒿英姿颯爽毛髪豎隂風吹動團花袍殿前近侍捫錦絛壁上先驅腰寳刀出師或銜枚班師或鳴鼗将軍雖死有餘樂魂魄上與星辰遨有子有子如將軍志欲與國除腥臊鄰敵侵我疆勇㨗如飛猱奮身與之戰以一當百戰已鏖将軍隂兵實助之似聞人馬聲嘈嘈敵驚靈火徧原野如中羽鏃相呼號我來祠下謁遺像秋林葉落風蕭騷雄文大字紀顛末翠珉已載黄金鼇嗚呼胡将軍生為名臣死廟食勸忠之作吾其叨題烟波疊嶂圖憶昨扁舟上南斗順風㸔山如馬走前山在眼後山失紫翠繽紛落吾手當年見山如畫圖畫圖得似當年無臨軒把玩笑絶倒蚤覺詩思生江湖江風蕭蕭煙水暮盡是漁翁釣魚處安得身輕如白鷗江上飛來又飛去題胡濟源聽泉樓冷泉亭子深且幽我昔杖履曽追遊山中正當朝雨霽坐聽泉水涓涓流初如松風灑萬壑忽如仙珮鏘鳴璆又如蛟龍起潭窟霹靂閃電摧林丘黄猨抱子挂秋影良久不下聲啾啾是時同行四五人相對毛髪寒颼飀乃知福地難久住却載酒壺登綵舟故鄉一别幾十載江湖浪迹如沙鷗風塵澒洞箭滿眼欲歸洗耳嗟何由飛來山色入我夢碧松丹桂枝相樛每逢泉石必宿留題詩感慨無時休胡公亦是聽泉者胸次磊落非常儔何當暇日登君樓與君作記樓上頭題鍾馗移家圖緑袍進士掀怒髥飢來嚼鬼如蜜甜酸風苦雨攪白日移家欲徃山隂尖隨兄小妹臉抹漆眼光射人珠的皪鬼奴鬼妾千萬形蟹怪貓妖最蕭瑟勢能使鬼鬼不違髑髏在後嗤鍾馗英雄如山堆白骨莫倚區區手中笏青山白雲圖若有若無青山之嶙峋欲斷不斷白雲之氤氲徃徃何人得此意髙公彦敬下筆藝絶倫我歌紫芝白雲裏白雲却向青山起裁雲為我衣推山作我几松花釀酒三千石醉後髙歌歌未已歌罷仰天笑此樂人中仙心揺赤城霞目斷蒼梧烟左執容成袂右拍洪厓肩五雲之佩何翩翩乗風欲徃蓬萊巔蓬莱巔渺何處金銀樓臺隔煙霧青鳥銜書海上來千嵗胡麻欲成樹悵不徃兮心茫茫雲浩浩兮山蒼蒼人間亦自有真樂還君之圖兮贈君青山白雲作題五馬圖開元四十萬匹馬誰是超然出羣者曹韓筆力非不工須信真龍最難寫真龍只有拳毛騧太宗騎此開唐家雄姿猛氣世無敵當年識者久歎嗟吳興公子畫五匹滿眼風雲起蕭瑟一匹玉花齧且驕一匹飛黄甚飄逸駮文殊者一匹䧺一匹紫電奔長虹中央正立一匹胡青驄遂令四馬皆下風想見承華春苜蓿此馬由來字天育殷紅盤袍帽紋縠奚官杖策來監牧花萼樓前風日遲五王宴罷何逶迤乃知畫師用心苦俟我落筆題新詩送胡季誠北上杭州從士真文儒乃是丹山九苞之鳳雛春風葳蕤開玉樹明月皎潔涵氷壺伊昔跨馬遊京都翩翩采服親庭趋太常博士衆所敬儀表自與常人殊嗚呼耆舊今已無空餘故宅臨東湖嗟余避地頗相見不得再見成長吁山中六月火雲熱多君為我來肩輿衣冠如覩太常靣令我舊事懷姑胥自注昔與季誠尊翁古愚先生㑹于楊廉夫姑胥寓舎呼兒出為佳客拜遣僕徃問香醪沽黄雞啄黍或可餉青韭翦雨時堪須夜深秉燭忘夢寐脱巾且挂長松株酒酣慷慨肝膽露駕言欲問青雲塗飄然挂席上北斗海濤日出扶金烏觚稜翹首天咫尺五雲深處陳嘉謨先公餘澤猶未已青氊故物還須㬰青氊故物還須㬰此行善保千金軀題陳世恭所藏山水圖歌米公老手無人繼從此乾坤少清氣畫師落筆頗似之素練曲折開秋意上有青山萬疊之嶙峋下有白雲千頃之氤氳丹楓翠柏森左右年深乃成十抱文白石坡頭野亭小一葉漁舟蕩清曉對岸想像㤀機翁坐石蒼苔談未了我嘗四載客京華每見畫圖成歎嗟垂老歸來愛幽獨欲借雲根半間屋題南山獻夀圖将軍落筆怪且雄能寫嵯峨崒嵂萬仞之竒峰糢糊猶含太古色慘澹頗帶清秋容儼如蓬萊三山翠且重又如廬山五老削出金芙蓉千盤萬轉不可測怳忽雲氣隨飛龍下有澩灂之流泉上有偃蹇之長松松根羽人顔色好抱膝盤陀事幽討云是南極天邊之壽星遨遊先天後天老被以青霞裘䕃以白羽葆龜游緑沼沉滄波鹿放蒼厓食瑶草有鶴有鶴飛且鳴雪衣丹鼎隨風輕兩鶴飄然入紫清一鶴獨立和以簫韶聲手拈雙青童載以白玉笙上朝三十六帝京五雲仙樂來相迎玉女投壺其聲錚錚白兔擣藥使人長生胡君欣得之喜氣何盈盈是時七月涼風生君來飲我黄金觥酒酣再拜求我歌須㬰落筆雷霆轟五岳為之動三江為之傾此圖足為仁者壽題以南山獻壽之佳名胡君胡君宜愛惜我歌歌罷千金值挂向髙堂雪色壁夜夜虹光射天赤煮豆酌白酒歌戊戌前作煮豆酌白酒豆肥酒氣溫相對二三子其樂難具論君不見曉來雨過東家村叢叢豆莢生籬根阿翁提籃跣雙足采摘采摘呼諸孫歸來笑指老瓦盆酒波猶帶新糟渾田家酒具如窪樽一盌入口春無痕兩盌三盌鯨濤奔四盌五盌和江吞須㬰飲至百十盌眼花耳熱低乾坤憶昨豺虎如雲屯旌旗滿目烟塵昏殺人如麻血成海十室九家無一存大臣自合死社稷况叨厚禄承君恩近聞省府日筵宴椎牛宰馬齊崑崙吾徒布衣在草野憂心惻惻懷至尊嗚呼蕭艾滿城邑馨香不數蘭與蓀呼童煮豆復進酒呼兒為我關柴門王子約雙鈎竹歌王君金華人畫竹誇當代此竹乃是鈎勒之所為坐上千人萬人愛愛君為人清拔俗興來踏遍篔簹谷籠籦桃枝紛入眼􅚠笆篻常經目往年曽見吳門道士張溪雲歸晚軒中事幽獨有時不作山水圖戲拈銀毫書此竹王君筆法乃過之比似張生更神速王君寫竹能寫形脫略粉墨辭丹青或如金錯刀或如鐵鉤鏁或如銀幡寳勝之飄颻或若金節羽衣之婀娜或如白鳳尾或若蒼龍漦天機逞其妙形状何瑰竒唐時亦有蕭協律所至清風起蕭瑟眼昏手顫藝轉工一十五莖稱絶筆宋時亦有文湖州畫竹人推第一流能令萬籜起厓谷出墻之梢為最優東坡作竹短而瘠别試蘢蔥在林僻玉堂多暇圖一枝復有小坡能畫石前元作者李仲賔琅玕卓立無纎塵薊丘家世不易得父子相傳俱絶倫吳興學士趙公子飛白之石誰能比水晶宫中春日長移得藍枝落忩几後來又有柯丹丘大葉長梢動冕旒天顔有喜頻賜予晚節衰颯江湖秋諸公畫竹工畫影隔簾仿彿瀟湘景我欲鼓柁游瀟湘碧雲萬頃浮天光羙人娟娟隔秋水欲來不來空斷腸我來乘風發清嘯扁舟直過湘妃廟中流鼓瑟聲鏗鏘和取湖南竹枝調何如曩昔行李遊京都故人為我共作翠竹紅梅圗原父寫梅君畫竹價重已壓青珊瑚挂在成均之左廡交遊軒冕觀如堵天上歸來十二年柴扉草閣荒山田此君風節還依然王君王君聴我語我歌長歌君起舞花溪水接雙溪長與君百里遥相望不如坐君西郊之草堂歙坑舊硯橢而蒼鵝溪素練雪色光風晴老嫩任君寫無使古人専擅場次何贊府遊夀山詩韻我昔手持緑玉杖徧觀夀山寺外崒嵂之竒峰天風吹我衣雲氣盪我胸峰形峙為五烟霞有路遥相通横秋雙澗橋影枕寒潭空上有欲落不落之怪石下有半枯半活之欹松一峰凌紫霄曙色何曈曨金雞喚醒海底日絶頂尚有蒼凉蹤一峰翠氤氳怳如武陵之景迷西東山泉春雨餘流出桃花紅左右一峰若覆釜氣蒸雲霧秀所鍾西㸔瀑泉吼飛雪乃有一峯迥出倒挂虹影於晴穹一峰後顧復何似贔屭儼若蟠蛟龍輸青獻翠千萬狀並視培塿誇豪雄香爐紫烟逺莫致廬山謾詫金芙蓉伊昔當年紫陽翁二三賢俊題名同嗟予寥落生苦晚不得親陪杖履遊其中兜率臺髙花雨濛金仙趺坐青蓮宫何當復約哦松公靈巖石室幽絶處笑揮白玉麈尾盡日相過從章三益匡山行戊戌後作仙人休吹紫鸞笙聴我一曲匡山行青蓮居士讀書處至今石室丹霞明龍泉西南百餘里四靣崢嶸翠峰起先生結菴當畫圖正與匡山景相似屋前屋後皆種松坐㸔百尺蒼精龍苔皮深含霜雪古鐵榦返走風雲從一亭下浸蒼波冷縹緲煙雲成萬頃中有神魚長比人翠鬐翻動玻瓈影一亭上與浮雲齊赤闌干外青天低分明投壺笑玉女仿彿出海聞金雞東南一亭隠林樾地位清髙隔炎熱人間赤日如火流疎簟琅玕自蒼雪最其秀者環中亭周遭萬朶芙蓉青朝來爽氣落吾袂蘿風吹日天冥冥鶴怨猨驚歸未得繡衣今作青雲客故山回首五情揺歸夢時時到寒碧自古山林鐘鼎同先生况有前賢風少待功成拂衣去入門依舊山花紅雨過許叔大山雨霑衣濕江雲渡水寒也應如杜甫曽此過蘇端緑蟻春漿甕青絲野菜盤平居謝拘束與子罄相驩紅梅滿林紅雪影毶毶夜静和春浸碧潭却憶騎驢二三月杏花小雨㸔江南暮歸山腰小路曲如蛇薄暮疎疎雨潤沙醉裏亦知春色老西風開遍木棉花明詩綜巻十三
