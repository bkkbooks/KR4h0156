body:
  text: 明詩綜卷六十七翰林院檢討朱彞尊編艾穆七首穆字和甫一字純卿岳州平江人嘉靖中舉人初仕為國子監助敎萬厯初遷刑部主事歴員外郎抗疏論張居正奪情廷杖遣戍西寧久之起補光禄少卿轉鴻臚寺卿再轉太僕寺卿以都察院右僉都御史廵撫四川有終太山人集靜志居詩話艾公與吾鄉沈純甫先生同論江陵奪情其謫戍一西一南艾公出都詩云病向西風一促装寥寥征鴈塞雲長流沙萬里無愁逺去國孤蹤信若狂楚客江魚身可葬漢臣馬革骨猶香青山到處皆吾土豈必湘南是故鄉是亦逹人之言西竄之後詩律頗效空同自公而後南風多死聲矣聞有救獲赦不果十年不向湘江返一疏翻為萬里行隴外儘令魑魅喜日邊應有鳯皇鳴極知故態仍狂瞽須信天王自聖明閒却綵衣誰為著塞雲邊月不勝情甘泉塞上呈中丞侯公青海灣頭調角聲賢王西牧欲横行塞門縱欵猶難測斥􅕤無烽却不驚破膽爭傳司馬諭受降髙築白狼城腐儒未識麒麟画只道風塵易請纓奉和岳州張兵備握蘭虎署為郎日意氣相看獨有君擊節幾談天下事建旄今領水犀軍幕中説劔雙龍動樓上停雲七澤分秋色滿湖吟眺足銀魚何苦碧山焚寄呈乾菴馬公拜相繡裳蒼玉自丹霄風采今看表百僚帝謂山龍惟爾補人期霖雨幾時調鳯池魚藻歡應合鴈塞狼烟燼盡消流落扶風門下士玉關猶得比班超别羅孝亷江城傾蓋識清狂意氣翩然調更長歌罷竹枝空下里賦成雲雨滿髙唐蜀門秋盡啼猿急涪渚霜清白鴈翔後夜思君出巫峽楚山巴月共蒼蒼寄懷沈純甫戍金沙衡陽那見鴈飛回庾嶺梅花幾度開謫後沈郎應更瘦調同楚客不勝哀金沙潮落珠光動銅柱風清海月來君在瘴鄉偏逸興新詩能為故人裁遼東大捷進橐駝志喜年來渤海不揚波忽聽遼陽奏凱歌白羽飛傳三箭㨗赤囊馳獻獨峰駝將軍絶勝嫖姚勇良馬何論大宛多此日天聲應萬里合標銅柱白狼河瞿汝稷一首汝稷字元立常熟人景淳子承父廕由五府屬歴郎署知黄州邵武辰州三府遷長蘆都轉運使加太僕少卿致仕有冏卿集曹能始云冏卿詩沿選體律絶步趨唐人斐然成章送僧游五臺欲叩三車奥還過五髻西飛雲先錫住怖鴿覔燈棲金閣看長在珠林望不迷天花開處處知與石牀齊屠本畯一首本畯字田叔鄞人尚書大山子承廕官太常寺典簿歴南禮部郎中出為兩淮運司同知移福建運使有屠田叔詩草詩話田叔好詼諧詩多不拘格律晚節歸田愛客益甚􅀢豉蒜果觴客必盡歡守辰州日禁民殺牛有唐生牒言家貧畜一牛不幸死請鬻其肉田叔度其偽也判以俸錢買牛葬之牽至乃生牛因命小吏飯之及解官衣深衣騎馬出門州父老泣相送牽牛隨其後時人為作辰陽留犢圖年既老好學不倦或曰先生老矣奚自苦為荅曰吾於書飢以當食渴以當飲欠伸以當枕席愁寂以當鼔吹未嘗苦也因自稱憨先生亦曰豳叟起生壙于甬上撰狀及表年八十餘乃卒至今甬東言風流儒雅輒首及之燕歌行登君罘罳藻井之堂坐君龍䰅琥珀之牀贈君五明七寳之扇酌君紫霞碧玉之漿烹鮮擊肥召吾客秦箏趙瑟鳴我旁世上浮名亦徒爾安有五侯七貴能文章勸君無言舌且藏毛以煃二首以煃字允奎吳江人萬厯中舉於鄉歴官慶逺知府進按察副使致仕有審雨齋詩稾邨居丘壑偏宜謝幼輿清泉碧篠愛吾廬祗知幽絶堪髙枕未解窮愁好著書閒過山僧烹笋蕨倦從野老課菑畬夕陽流水荆扉靜花滿清尊月滿裾山陰王伯良久滯京師却寄蛾眉十樣逐時新不是東鄰亦效顰况是浣紗溪上客那能不憶浣紗人吳詔相一首詔相字廷承宣城人由舉人萬厯初知汝州有吳汝州集詩話臨川湯義仍為廷承作傳述其生而不慧既就塾日記千言縣試令訝其幼謂曰童子豈外黄兒邪應聲答曰明府比中牟令矣令竦然異之廷承嘗夢紫衣人指㸃一閣道中松柏蔥青數里及知汝州果有閣道松林中歎曰命止此邪因慵於治事未秩滿稱病瘖去歸見其母抱持大哭失聲疾遂愈丁母憂未終喪而卒存詩雖無幾近年編續宛雅者竟遺之惜也同張侍御有光汎舟分韻桂櫂連朝發松雲卓午陰涼風轉蕭瑟細雨潤衣襟歌酒狂無奈耕畬思更深晩來餘興在不厭再相㝷費懋謙一首懋謙字民益鉛山人襲廕官南京都察院經歴詩話民益裙屐子弟綽有詩名兼善山水梅竹靑溪社集實首倡之相逢一篇源出繁欽楊方相逢行别吳中四子與君相逢處乃在青溪濵何意溪頭柳能令傷客神與君相逢處乃在邀笛閣何意笛中曲能令心不樂與君相逢處乃在射堂上何意堂前月勞勞生夢想與君相逢處乃在冶城宫何意冶中劔飛躍各西東我昔承清盼君亦憐我姿願以朱絲絃報君青桐枝終日不成縷對君空自持願以江干茞報君蘭蕙芳終日不成匊對君空自將願以青玉盌報君金琅玕終日不成琢對君倚長歎願以錦繡段報君貂襜褕終日不成章對君長煩紆贈君愛流晷我亦慎區區所貴各努力聚散誰能無中情既款款徙倚亦何須古人皓首言君諒我不殊王敬臣三首敬臣字以道長洲人參政庭子講學於吳以薦授國子監博士學者稱少湖先生有俟後編附詩詩話博士講學不立異同以躬行為本詩其餘事務去擊壤陳言更難得也古詩送陳憲副雨泉之任滇南黄鵠翔四海潛虯樂泥蟠飛沉各異塗言就性所安公行越萬里予留守故灘公勵王尊節九折驅無難予含令伯誠有懷良未殫俱奮古人心咸思效寸丹臨岐申贈言暌離何足歎相期慎明徳嵗晩同金蘭感興二首河伯侈秋水囂囂自矜誇一聞海若言頽然喪其多覆載㑹有終百年能幾何營營靡朝夕所得皆塵沙哀哉復哀哉是不可已邪月圓還復缺缺矣又重圓圓缺相倚伏造化良自然萬事皆如此孰能測其端君子通大道曠然釋嬰纒寸心良已罄付之蒼旻天莫是龍六首是龍字雲卿以字行更字廷韓松江華亭人如忠子以諸生久次貢入國學有莫廷韓遺稾唐君公云廷韓夙成㨗悟不屑為沉深之思詩話廷韓少謁王道思於閩道思贈以詩云畫舫夜吟令客駐練裙晝卧有人書然詩篇書法皆不見出羣五律稍勝登潤州城樓髙閣俯城陰松篁一徑深晴雲揺海色夕梵起潮音古戍關門斷山程驛道侵江流無日夜南望是鄉心過滕縣邑傳滕子舊爵序薛侯先壞地雖褊小君臣自井田禮猶宗國秉舘想上宫連遺恨千年事何勞授楚㕓送俞生之金陵驅馬向斜日秣陵㝷舊游人應草堂在月滿大江流春燕投新社離鴻失故洲看君留别意不減落花愁送陸生遊燕小陸江東俊名先入洛聞猶能藉知已未可怨離羣燕地春邊雪吳天野外雲翩翩徒羡爾西笑立斜曛宿河口酒家笑指停橈處烟荒一水斜邨旗招野客岸火認漁家淡月微侵幕初潮淺映沙海天應不逺吾欲訪霛槎贈任城故知此别何疎濶風烟宛昔游馬頭芳草路柳外木蘭舟易隔三年夢難期十日留任城今夜月閒殺酒人樓鄔佐卿一首佐卿字汝翼丹徒人有纒頭集西津别妓立馬江皋問暮潮片帆西上路迢迢人歸碧草離亭逺賦罷青山夢雨消雲影飄零桃葉渡月華淒斷鳯皇簫壚頭濁酒春堪醉還訪秦淮舊板橋寗祖武二首祖武字仲先吳江人以貢生官肇慶通判有迂公詩草詩話别駕未晩投簪娛情泉石預營繭室自為之銘號曰迂丘嘗欲買木版以覆塵几思送死棺所必需匠人告以元日徃購則木商不計值且有酒果相邀别駕遂以是日就肆飲酒疈果而回鋸木以覆几焉題詩云元日治凶具人情良獨難生以覆几塵死伴歸空山亦逹人之髙致矣别駕詩多率易録其二首知非真迂者新安夜泊芳草緑如此征塗尚未窮隔江商店火近市酒旗風人語邨邨異溪聲處處同不須愁落魄人世總飄蓬吳江竹枝詞唐家坊藕太湖𤓰消暑氷肌透碧紗水上納涼何處好垂虹亭子看荷花陶允嘉三首允嘉字幼美㑹稽人承父大順廕官鳯陽通判有澤農吟詩話幼美體弱然無塵坌之氣符離懷古一篇惜不令淳熙諸君子見之廣陵詞桃花新雨後載月出䢴溝棗板江南曲筠簾撶子舟飛飛雙燕子何處覔迷樓符籬懷古張都䕶殺曲端關中將士皆心寒秦丞相殺岳飛萬里長城一旦隳婁室歡顔烏珠喜小朝廷復何恃長脚太師吾何尤魏公九原知悔不髙邨謁漢髙皇廟髙邨湯沐地下馬獨徘徊落日吹原廟歌風想舊臺新豐雞犬去故土夢魂來猛士空煩憶韓彭安在哉黄繼立一首繼立字志學江陰人貢入太學官中書舍人初夏楊花初㸃渡頭萍十姊妹花紅滿屏門前忽見漁舟過風送鸕鷀一陣腥任山甫一首山甫字夢榛休寧人自號五安山人承天府經歴遷徳安通判和費民益韻萬里事行役經年往復還愁多生白髪病久改朱顔不厭沽新釀長思返舊山因君歎留滯牕外雨潺潺襲朂一首朂字懋卿章丘人以嵗貢生官江都訓導轉威縣敎諭再遷開平衛敎授有襲懋卿集詩話懋卿少貧牧羊豕山中手書卷不釋既而小吏誣其逋租受笞益發憤力學見李中麓以詞曲名恥之銳意學古文辭時稱為醇謹君子立秋烟雲黯慘仲宣樓荏苒年華逝水流白首鄉山千里外滿城風雨又新秋黄時二首時休寧人縣丞有順堂集白螺山吳大帝廟螺山何嵯峨荆江走其下上有紫髯祠祈報滿邨社自昔割據時炎劉失區夏聿求土宇寧遑恤名號假巴蜀徵讖符許洛盛戎馬於焉割朱方鼎立足相亞虎既負其隅龍乃戰于野哀哉爾汝歌誰永霸圖者來游陳我辭渚蘋薦盈把孟嘗君養士處官橋垂柳嬝闌干古薛遺墟駐馬看食客三千容易散至今惟説一馮驩李徳繼一首徳繼字子同鄞縣人由太學生選授光禄署丞有借樹齋集懷包參軍極目西來山色秋但聞長笛不勝愁故人家在清江上潮滿門前月滿樓劉成美一首成美字大卿漢陽人萬厯中舉於鄉由河源知縣歴官蘇州府同知有閒閒草南還道中春去花齊落人歸路轉賖峰陰昏霧合樹影夕陽斜溪隔循紆徑橋危度淺沙停驂聊對酒醉處即為家卞洪勲一首勲字世甫嘉善人司勲錫子官東鄉主簿有石居集嵗暮述懷户外塵非隔庭前草不除枝方慚畫虎賦已就枯魚燈影隨風蕩鐘聲帶雨疎半生無别嗜惟讀父遺書田藝衡一首藝衡字子秇錢塘人汝成子以嵗貢為休寧敎諭有留青日札月夜即席示座客雲散江城玉漏遥月華浮動可憐宵停歌不飲君何待試問當年李玉簫自注玉簫蜀宫人愛唱王衍宫詞月華如水浸宫殿有酒不醉真癡人之句謝三秀十三首三秀字君采貴竹人萬厯間學官有雪鴻集李本寧云君采詩觸境生情縁情體物格整而不滯氣雄而不亢㫖深而不晦致清而不蓴辭麗而不浮此治世遺音也纖陳伯璣云君采造語渾成即偶入詞不失大雅詩話君采詩甚清穩由其生於天末習染全無此黔人之軼倫超羣者城南江亭旦發虹梁門暝投漁磯路春水半篙緑褰裳不可渡溪深烟復深遥遥辨庭樹晩汎蕭湖㝷宋人虞仲房石壁川光鬱初霽野航恰受客天空斷鴈哀水落寒沙積絶峽響飛泉飄颻疋練白涼葉不禁霜楓林還槭槭輟櫂湖之陰突兀見瑶碧怳疑太始雪㧞地起百尺登眺極人目了了晰阡陌胡為水窮處乃有此竒石昔聞避地者於焉卜其宅愛兹雲木秀重以巖潭僻靡旦匪蘭橈或時仍柘屐遺詠蝕苔紋風流已陳迹髙躅杳難攀我來徒惋惜商飈増暮寒㫖酒若為適興盡鼓柁歸滄浪黯將夕蠻娃曲蠻娃出户筠筐隨琇子穿環帕裹頤東鄰女伴競相逐四月深山采葛時葛葉萋萋葛藤緑挼葛為絲給春服經絲易脆緯絲柔裂指猶嫌䌟不速破牕風急寒池生流黄軋軋無停聲織成未敢問刀尺明日輸租應到城到城杼軸歸公府吁嗟蠻娃亦良苦君不見北里春風歌舞人曲罷羅裳棄如土湯陰道上見楊花如緜戲作古道多垂楊春殘花亦白毶毶隨晩風到地忽盈尺中原凋敝民力微安得吹上流黄機若敎織作機中素九月何人不授衣安莊夜聞警鼙鼓中宵急愁聞戰伐頻數家出煨燼一郡入荆榛地亂難為客塗窮恥傍人披衣待明發華髪鏡中新邨行即事十里荒邨路㝷幽到薜蘿陂寒菰葉少籬晩豆花多廢寺紛蟲網貧家靜雀羅老翁晞髪坐相對説兵戈送吳使君攝八畨郡事才子漂零久今看治郡功地當三楚盡山到八番雄詞賦霜毫裏桑麻露冕中孤城饒吏隠解帶聽松風夜集薛葵軒明府西巖曲磴穿叢篠風烟憶武陵飲能齊阮籍嘯或似孫登投轄留山客呼船送嶽僧江城無堠火薄暮見漁燈焦溪雨渡逺岸平蕪緑寒流似若邪雨深人喚渡春老客思家野葛牽青蔓溪藤落紫花浮名是何物漂泊又天涯辰陽晩泊春流似建瓴春色晩冥冥溪菜盤餐滑江魚匕箸腥月來沙漸白烟歛樹猶青漁父方舟處聞歌媿獨醒洞庭夜泊石門對月平湖涵霽景涼月漾晴暉樹極長天盡雲歸别島微燈前秋社燕夢裏故山薇誰念滄洲客飄零未授衣西菴徑中萬竹翛然喜而賦此負杖入深竹一盤仍一盤鄰僧分路去野客到門看不雨夜尤緑無風夏亦寒素琴多逺思宜對此君彈題趙文度畫西溪梅花欲雪不雪天淒淒南枝北枝開漸齊因訪梅花過橋去始知春在西溪西王象艮二首象艮字思上濟南新城人仕為姚安府同知有迂園詩集董思白云思止風華秀絶骨力沉鬱錯出大歴長慶之間公孝與云思止舂容淹雅白真韋澹自然神合豫讓橋義士負竒節所重在知己讓也慷慨流恩仇惟一匕將以酬智伯勢必危襄子一徃志不返肯以彼易此所重者一言所輕者一死荒橋至今在過者猶興起立馬對斜陽湯湯聽汾水雨中登鹿角山宿趙荆石宅厓古憑空閣崚嶒石徑斑龍源花外水鹿角雨中山幸有心知共兼逢地主閒登臨無限意信宿不知還徐成一首成字竟之金華人仕為鎮國將軍洞庭謁湘君廟帝輦南廵竟不還亂雲愁絶九疑山空憐湘水通三楚遥想蒼梧近百蠻墮涙有痕留竹上落花無夢返人間千秋哀怨存遺廟悵望蘭旌不可攀吳稼竳七首稼竳字翁晉孝豐人維嶽子以例除南光禄典簿累遷雲南通判有𤣥蓋副草又北征南諧滇游諸稾詩話翁晉樂府如健兒騎駿馬左右馳突靡不如意近體頗合西崑歸自滇南里居極絲竹雲林之趣自號大滌先生病革語其子以布衣幅巾斂謂如此庶足以見疇昔詩人於地下蓋以貲郎自懲云礦山謡朝采金暮采金草枯山根裂居民涙沾襟狺狺之犬昔以吠夜今以給傳舍喔喔之雞昔以司晨今以飽游民水衡積錢爛如土何不詔取中官歸御府牆頭草牆頭草秋零春復抽胡不生彼庭中生牆頭庭中無不可惡木枝蔭我又豈無野田塍農夫二三月荷鉏將見凌牆上趨難為階託根髙固其荄牛羊欲食不得食牧豎過之徒歎息嵗晏偶成嵗云暮矣風淒然豆萁零落南山田疎篁掩映半庭雪獨鳥棲息中林烟溪上老翁索魚價壚頭女兒催酒錢衡門暫啟一失笑復有僧雛來募縁秋懷二首金荆為枕紫荆牀已共秋塵委曲房燈下有情啼絡緯機中無夢到鴛鴦明星爛爛愁天老爝火離離歎夜長一樹桐花零落盡可憐梧子自經霜重扃落葉迥相依羅袂無聲事已非寳鏡欲開鸞自泣玉釵初斷燕猶飛旅葵未合生空井苦檗真堪染故衣滿目清秋何所似白雲愁色逺微微社日過山莊背依叢竹面清溪茅屋蕭疎類瀼西兒子社錢無用覔田家秋釀且相攜梁間已去將雛燕階下新行傍母雞一束荆薪兼藴火不愁山路夜歸迷金陵酒肆贈茅平仲暮年看爾壯心孤落落酣歌擊唾壺但數一錢憐姹女纔誇千騎笑羅敷棃花雨濕紅襟燕楊柳春藏白頂烏欲向盧家借雙槳莫愁不是舊時湖薛文炳二首文炳字有孚嘉興人鴻臚署丞有調疴集江城登望三月清明近風光動客愁葉齊江柳暗雲暝石塘幽戰伐悲新鬼登臨憶故丘南湖春欲暮羈思羡鳬鷗閒居雜興最愛江南小滿天櫻桃爛熟海魚鮮一聲布穀啼殘雨松影半簾山日懸王同軌一首同軌字行父黄岡人以貢生知江寧縣行山中雨餘林氣靜山晩日光斜野店依孤樹邨橋卧斷槎馬嘶遥澗水犬吠隔林花白首鉏雲者春風自一家華善繼三首善繼字孟逹無錫人仕為浙江布政司都事遷永昌通判有折腰漫草詩話孟達詩不及其弟舟中述懷髙城片雨外倚櫂亂蟬鳴逺樹他鄉色浮雲過客情泉甘知早竭木散得長生悔逐時人後空將骨肉輕雨後髙樹留殘雨層城帶晩烟㕑香菰米熟架滿豆花鮮未改狂奴態還為長吏憐不因公事暇那賦白雲篇春盡即看春欲盡漸覺客衣輕燕以飛蟲下魚因落絮驚看雲忘拙宦對雨憶躬耕最愛新移竹清風葉葉生華善述十六首善述字仲達無錫布衣有被褐先生詩稾王元美云仲達詩翩翩霞舉或艱或易忽沉忽揚瑕瑜互見不可為典要詩話仲逹與兄善繼孟達竝有才名王元美列其兄於四十子之列而仲達不與焉觀其詩品矜竒灑落幾欲御風而行一時詞客末或過之而元美序之謂不可為典要是亦拘牽之論已長相思長相思相思長幾許黄河三三曲曲曲通牛渚巫山六六峰峰峰度神女枯槎不來雲不雨夢落風波安可語休洗紅休洗紅洗紅紅可惜初洗猶作黄再洗漸成白紅芳既去質亦移雖有茜草將安施海樓篇上客且歸休我歌送行舟君家近東海海中有瀛洲瀛洲不可見但見金銀樓此樓誰為之無乃蜃氣浮相望邈無梁引領成悲愁濠梁篇濠水清若虛鯈魚此中居鯈魚何所樂水濶忘呴濡莊惠去已久懷古思有餘子是梁上人非魚諒知魚雜詩白髮白更長白花白更香春風一相見嵗月久難忘君耕石田熟余亦起羣羊山中作達士貴薄游幽人安坦步耿耿梧月初蕭蕭竹風暮握蘭青厓陰采蘋寒水渡荷衣秋始製何用畏多露答錢化臣𤣥蟬餐清風長日鳴茂林蟋蟀飲繁露永夜莎根吟二蟲夫何知聽者多苦心絃桐與無絃視之誰非琴曰余室湖渚開口當遥岑既無簪組累又鮮轅馬臨終嵗足暇豫長謡散幽襟偶為好事傳詎取時名侵媿君錫嘉譽撫已安可任重送世叔清樽可續沽孤舟且緩發款欵垂别語皎皎初圓月幸自合一心無令歎華髪庭草作花有感中庭無嘉植青碧翳芳草秋至花亂開翠色亦自好既不藉溉灌復無採摘擾無名且無種生意可常保今夕行今夕何夕露為霜湖中之水寒且蒼明月倒落水中央遡游從之葭菼香雲山層層思難忘我有故人隔他方三年不歸松菊荒誰謂河廣一葦杭爾獨胡為勞我腸湖中之水歌湖中之水常東流眼前無事不可愁貴如博陸死夷族富如衛尉生斷頭勲如淮陰竟葅醢親如文信俄仇讎唯有文章稱不朽髙名往往垂千秋試㝷名下人安在左馬屈宋空土丘不朽者文朽者骨寸心枉作蛛絲抽自古多才更多累我獨何為生煩憂招隱吟和伯氏招隱吟寒山蒼蒼日欲沉風來萬木皆蕭森飛泉激石流清音聽之如玉復如金須㬰月出罔兩侵猿鳴後林鶴前林青松白露光淫淫珠璣墮地不可㝷有美一人薜茘襟横陳古昔三尺琴一指未下意已深廣陵之散愁人心抵節髙歌招隠吟蟠桃思蟠桃開花予共汝十日瑶池白雲語蟠桃結子汝棄予萬里澤國紅塵居等閒便擲三千嵗相憶那無一字書旅懷萬里秋將盡孤舟夜未殘獨愁成淚易清夢欲歸難鴈落繁霜白鷗飛片月寒朝來行客鬢映水黙相看晩秋鄒靈壽見過野田猶汎濫籬落亦荒蕪啟户聞鳴鵲停舟散浴鳬愁來説鴻寳酒後憶雕胡君定知朝事今年可賜租寫懷薄俗空相苦寒泉只自甘鶴應知夜半狙不喜朝三北斗懸牕北南山横舍南從敎斷來徃端坐待鸞驂梅守箕九首守箕字季豹宣城縣學生有居諸前後集詩話梅氏一門羣從禹金最負時名嘗後先過王元美元美贈之詩云從誇荆地人人玉不及梅家樹樹花季豹為禹金從父譽雖稍遜禹金然詠諸作恐小阮亦當避席也招隠曲寄吳允兆勝游不擇塗山棲不避幽魚鳥有本性何以異沉浮昔者東方生金門可優游亦有嚴君平足跡謝帝州真情愛松桂同器忌薫蕕輪轂淹泥淖樽俎潛戈矛流塵眩目光魑魅走道周舍㫋盍言旋春草盈芳洲詠懷三首飛閣臨馳道櫺軒俯四隅逺望可當歸何以心不娛夾巷叢灌莽第宅成丘墟魑魅嘯中林夜啼猿與烏密親不我與我友不我俱拊劒明所懷託情於素書愛極翻自疑驩極易以悲所以樂莫樂固在新相知皎皎中天月虧盈尚有時惠思念疇昔忉怛無好懷嵗暮空堂上明星照我扉身各天一隅安知渴與飢慰我同心人膠漆未可期索處無適懷羣居興怨尤素交夙已盡闤闠起相仇甘醴善逆人終始寧為謀同心託蕭艾一器戒薰蕕匿怨而友人見鄙於左丘信哉朱穆言獲我心所求雜感獨坐不能寐振衣將逺行悲風自南來吹我榛與荆河水何泱泱中有好鳥鳴我欲往從之惜哉已徂征白日難少留年嵗忽已傾願借明月暉流光燭我形古詩二首日月易流邁哀榮曽何期霜霰忽來集衆芳忽已辭物象貴其新故心誰當持懷念如夙昔中情苦不怡人生一世間離合亦有時超忽即變化展轉焉可知郭東亦有墳郭西亦有墳登城一以望纍纍正相因狐兎穿為巢魑魅託為鄰潛燐不自照幽路何由伸陰風卷秋草日莫常悲辛送吳允兆秋氣何寥凓廓處羈旅間淹留蹇無成惆悵私自憐駕車出行游願從吾所驩所驩良已篤情好若蕙蘭素風飄廣路枝葉忽以殘結誠殊匪薄永久思弗諐敘意衷所期令徳思勉旃贈祁羡仲有序羡仲俠士能詘伸好竒筴少游豫章乏食即行乞市中客游小四海不裹千里糧城中乞食已忽醉胡姬旁縱横狹路間褐夫視侯王吁嗟不逢時蓬累職所當梅鼎祚七首鼎祚字禹金宣城人國子監生有鹿裘石室集歐禎伯云禹金五言古蒼然骨立七言馳驟樂府時極杜陵之致近體氣純而完聲鏗以平思麗而雅時王仲房云禹金詩確守風格乖僻不生竒宕作沈君典云梅叔子天才駿發詩如王子晉來緱嶺清吹泠然詩話禹金周見洽聞著書甚富詩乘文紀之外旁及書記小説兼精傳竒所填韓君平玉合記為詞家所賞有云風中絮陌上塵歎韶光何曽戀人亡友王介人極稱之雜詩智愚無常稱妍蚩無定容名徳貴易立顰笑賤難工登髙疾赴響所處固已崇流俗快目前安得察其終雜感忽忽中不懌駕言陟髙丘髙丘臨四野湛湛長江流豈不懷所歡欲濟無輕舟佳期曠何許嵗月倏已遒蹟徃既非故撫來難豫謀俛仰千秋間涕下不能收雜懷鵾雞厲其羽𤣥鳥歸故鄉日夕凉猋發大火戢朱光陰氣馴以至草木率焜黄九六代為窮龍戰血縱横堅氷自有時聖人戒履霜哭麻鴻臚驚風下平楚白日歸虞淵彼此相代謝時至有固然所以上知士徃徃不待年比嵗在龍蛇汝命竟不延詎意黄公壚倏忽成河山逝水豈顧反行雲何當還形神曠不接而况㝷笑言先後等斯須喟焉摧心肝金陵寄王仲房宛水一為别金陵再寄書王家桃葉渡秋日柳條疎客久少知已吾將歸弊廬向君㝷舊約百里共樵漁金陵客懷乙酉暮秋作恣意游能數多懷望轉迷清秋雙闕外佳氣二陵西鴈已先霜下烏仍近夜啼都亭酒太惡不得醉如泥九月八日城東樓晩眺寄史使君姑孰落葉來鴻秋可憐孤城晩眺正蒼然向傳李白題詩處重見𤣥暉在郡年霜後鳴碪千户月風前哀笛一江烟倚闌却憶龍山㑹誰共黄花插酒邊梅蕃祚一首蕃祚字子馬宣城人鼎祚從弟官寧鄉主簿有涉江草王程草詩話子馬與季豹禹金同負詩名王元美詩較他羣從更髙華蓋指子馬言也然非李父賢兄之比重過道甫叔山居谷口子真宅松蘿境自偏當牕懸衆壑隔樹見飛泉送客柴門下㝷僧野寺邊時時來取醉人道竹林賢汪道貫三首道貫字仲淹休寧人道昆弟有汪仲淹集李本寧云仲淹詩頡頏其兄才情節奏出入陶韋王孟間贈鄧孝孺聞汝幽棲處澄湖一片明青衿生事拙白髪著書成澤國堪髙卧山田足耦耕華陽仙路近千古傍茅盈鄉榜被放作得路難如此飄零似去年曉風池上月秋水鏡中天咄咄悲生事勞勞問酒錢啼猨與征鴈總使涙潸然題扇落日照前溪倒影映紅樹幽人不出山白雲自來去汪道㑹一首道㑹字仲嘉休寧人亦道昆弟諸生有小山樓稾李本寧云仲嘉秀色天然盡去雕飾過王百穀秣陵三月柳含烟猶憶城南送酒錢雙槳暮潮桃葉渡一尊寒食杏花天江門隔嵗書相問吳苑今宵月再圓執手莫須論往事傷心近廢鶺鴒篇劉潤一首潤字徳祖歙縣人有鶴嶼集寄王仲房不見風流王石軍詩名湖海日相聞歸期漫阻黄梅雨鄉思遥懸白岳雲千里音書秋後斷一江南北夢中分潭園草罷閒居賦誰共清尊醉夕醺劉澳一首澳字本瞻潤弟九日同葉茂長汪和叔登髙燕集九日他鄉菊未開相逢同上竹西臺江南木落千峰出薊北風髙一鴈回笑指青山懷杖履羞看白髪㑹歸來明年此日難同賞烟雨何妨數舉杯吳元樂三首元樂字振之休寧人春日有懷仲仁獨行墟落間舊徑生芳草一見蝴蠂飛三歎青春好故人不可同能無傷逺道八月十二夜作暝鐘初定後秋氣漸深時顧此蒼苔上泠然白露滋蛩還依砌響月自隔林移不見素心者空懷夙昔期湖上憶别河橋三月水平津兩岸輕波漾緑蘋曽向此中傷逺别故人今隔幾回春産科一首科字缺望江人由貢生萬厯中知通江縣事茗山洞羅隠曽隠此山有蓮花峰相傳仙人嘗憩其頂峰陰廻合擁青蓮詞客遺蹤尚儼然啼鳥故疑歌白雪飛泉猶似奏朱絃林扉蕭瑟無塵躅石室逢迎有洞仙安得向平婚嫁畢拂衣吾亦弄雲烟明詩綜卷六十七
