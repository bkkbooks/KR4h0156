body:
  text: 明詩綜卷七十七翰林院檢討朱彛尊編黃道周一首道周字幼玄一字螭若漳州鎮海衛人天啓壬戌進士改庶吉士授編修厯中允以言事鐫級俄落職尋起官以諭德掌司經局再遷少詹事協理府事與經筵講隨謫江西布政司都事逮至京廷杖下詔獄遣戍福藩稱制進禮部尚書南京既下猶督師出婺源師潰執繫故尚膳監不屈丙戌二月死於市有大滌函書浩然咏靜志居詩話詞臣無言責居無咎無譽之地需次待遷而已逮石齋先生入翰苑與上虞同年倪文貞公俱自任天下之重崇正去邪盡忠補過引裾折檻九死不回先生詩所云親從霹靂推車過又得滂沱自在春蓋實録也及退而講學於杭則大滌洞天於閩則蓬萊峽少長咸集遐邇具來監史主賓琴瑟鐘磬庶幾濓洛之遺風焉先生璣象之學辭義深奧後生或昧其指歸詩才亦未免踳駁要其光焰不啻萬丈也曲周路皓月過銅山弔先生詩云道德公自重文章公自深若夫軍旅事似非公所任用違其才此百世所惋惜者西湖忠烈祠迎送神曲雷鼓闐兮龍在野雲離披兮龍血下龍上天兮星無光椒楈偷兮蘭不芳靈之集兮四國鴻八蹄兮驎九翼淩滄澥兮拍白日蹌徂征兮何不得息歸休兮此堂水周兮中央寒雞葅兮菖蒲羅百珍兮瓊漿驂素虯兮騑文鴦柅靈車兮縶靈馬執靈袪兮淚盈把珮琚兮灑灑晝不足兮宜宵夜維舟兮鏤筵新夫君兮王正年靈參差兮無後先淡眉鬚兮馭青天靈何為兮中悁悁路振飛一首振飛字見白曲周人天啓乙丑進士除涇陽知縣選授四川道御史纍官漕運總督右副都御史後入閩自縊于邵武山寺除夕仗劍以從戎自憐轉自喟黔驢欲噬虎病馬思追驥匡濟術渺然進退兩無致漂泊海舟中面目亦堪恚天心或垂憫俾全名與義寸衷百慮嬰竟夕不成寐雞鳴又一年嵗月悲空棄談梁生云柄國酬知之日乃作此垂首喪氣之語足見不昧心人彭期生一首期生字觀民海鹽人萬厯丙辰進士厯官江西按察副使分巡湖西守贑州城亡自縊有弱水山人詩集詩話先生與楊萬諸公力保孤城死之日守備楊大器潛收其尸瘞于萬安縣之百家村仲子孫貽訪其遺骸未得久之鄉人胡樞知萬安縣事一夕夢先生語曰遺骸在縣境君能歸之故鄉幸甚會大器之友曾堯昶亦以狀白樞樞資遣之至海鹽家人詰其事皆合子女旋以血漬遺骨俱沁入乃慟哭葬之説者比於思歸之溫序焉送秋悲秋秋去轉堪悲枉復登臨賦楚辭逺壑水殘斜照斂荒原煙冷朔風吹天邊白鴈迷消息月下清砧感别離蟋蟀似能占物候寂寥一夜傍牀帷姚竒胤二首竒胤字有僕錢塘人中崇禎庚辰會試癸未進士除南海知縣後死贑州之難有草玄堂詩集秋夜遙夜苦無寐起視明月光涼風天上來隨月入我堂披衣步前除獨立以倣徨蟪蛄既已鳴鴻鴈亦來翔感此時物變怨彼去日長生非金石姿安得恆壽康憂來不可輟慷慨吟此章遊虎丘髙丘窈窕恣幽探席展諸天坐蔚藍聽徹疏鐘歸棹動半塘漁火泊城南劉同升二首同升字孝則吉水人祭酒應秋子崇禎丁丑賜進士第一人授修撰謫按察司知事尋復官守贑州死詩話劉公與楊萬諸公固守贑州或云城未陷先病卒或云城破死之傳聞異辭再考由百花溪登玉笥山朝看山出雲暮看雲入笥山行若無蹊恰有青童至指點絶壁間仙臺藏勝地藤枝匪易攀屐齒猶可置日午聞雞鳴巖椒啓金字出險坡漸平劃然人境異連峰涌下界撲面聳層翠因過丹竈房縱覽紫微志白花雨外明紅果林間墜晚食供芋魁晨鐺倒茶匱坐久慵下山踟蹰想真寄塵網詎得辭幽期偶然遂句曲山中地肺通幽處泉流決決聞山形同一已仙籍注三君衣潤恆燒术人來欲贈雲青童煩指點十賚拓遺文楊廷麟八首廷麟字伯祥清江人崇禎辛未進士選庶吉士授編修改職方主事軍前贊畫降調起補編修死贑州有兼山集詩話伯祥慨慷淋漓特取材未純故辭多鬱轖懷楊進士青青東門阪上有藤蘿結願得一心人白首無磷涅周才慎所處不敢居明哲開户見性情羣動齊巧拙翔烏安其巢離獸營彼穴萬物各為友吾生何所悅名山豈易求耦耕效長桀諸葛武侯祠霸氣西南日嘗聞屢出師才為王者佐學與古人期柏剩一孤樹桑移八百枝中原仍帝魏遺恨史臣辭示城兒歸舟今日逺西望獨沾巾骨肉天涯濶山川枕席親誦詩思有汝好學或如人以此發深省鄉書不厭頻别葉侍御渾水橋邊寺北田行縢東去雨連綿桑村古渡沙移岸茅屋人家鳥就煙江左衣冠悲楚澤淮西烽火接秦川更聞羣盜郊原遍欲下潯陽萬里船秋興四首北湖菱葉近漁家煙浦荒荒鴈路斜濕鳥立沙聞社鼓野人當户飼田瓜月明露上蒲萄蔓夜靜風生莨蕩花悵望故園溪外渡一聲橫􅐟冷蒹葭司户祠前一騎回邊烽未舉嫚書來漢臣獨有和戎策楚子誰稱執政才半壁但愁軍餉乏三關不覩陳雲開最憐風雪盧龍塞換取牙門酒一杯強弩將軍七萬營銀鞍金甲耀東征市兒果鋭輕言戰上相安危慎用兵海鳥自啼狼虎嶺妖星空照鳯凰城河西百里無消息又道青山夜火明漢家嵗嵗戍居延新築渾河北斗邊文學未諳鹽鐵論公卿誰進度支錢髙城寒聽菰蒲雨戰骨秋枯苜蓿田壯士不聞還易水至今賓客淚澘然萬元吉一首元吉字吉人南昌人天啓乙丑進士授潮州推官補歸德再改永州入為大理評事遷兵部主事出知揚州府厯太僕寺卿監軍江北死贑州遊月巖謁周元公廟中嵗不聞道泛泛逐萍梗緬懷先哲型沈憂不出熲兹來瞰巖月鬼斧鑿天影尺竇泄素雲一星射瑤井物理竟何如遐蹤忽深省元公昔幽憩萬慮悉以屏隂陽動靜初澄心得妙領於焉瞻遺廟百世尚嚴整冥心無極前衣露遍清泠梁朝鐘二首朝鐘字未央廣州順德人崇禎已卯舉人有喻園集題畫兼寄友人灞陵山色動秋風開遍黃花九月中每憶江南帶霜樹夕陽疏葉渡頭紅陳子壯二首子壯字集生南海人萬厯已未賜進士第三授編修天啓末削籍崇禎初以原官起用厯諭德詹事升禮部右侍郎進尚書家居殉難有雲淙集耕籍禮成恭紀天子親行畝微臣相秩宗清塵傳蹕靜瑞靄出郊濃髙栁喧靈鵲華芝結衮龍普天應有兆九穀在三農春日侍諸父泛舟桃花塢欲作郊居即瀼西紅芳十里勝金堤不知南漢千年苑更入東風幾曲溪負局客來籬犬吠和歌誰伴乳鶯啼清時羣從多遊好豈是秦人世外迷陳邦彥三首邦彥字會斌廣州順德人貢生以兵保清逺師潰死于難有巖野集詩話巖野僻居嶺南與黎美周歐子建陳喬生以文章聲氣遙應復社卒殺身以成仁其南上草自序云商聲曼歌慨當以慷亦各言其志也又臨命歌云書生漫談兵時哉不我與君子誦其詩而悲之南雄道中逢霍階生病後無顔色秋深有逺行漸於鄉土隔翻遣故人驚歸思珠江道前塗白下城嶺梅殊未發貽贈若為情重别葉公士大雅風斯逺知音世所稀他山情獨切兩地夢俱飛楚塞丹楓暗吳門翠岫微祇憑文賦在萬里未相違雨夜宿吳潮泗江閣去家五百里相過重鄉音客路樽前語江流檻外心風連三峽暗雲隱二禺深莫作登樓賦柴扉尚可尋明詩綜卷七十七
