body:
  text: 明詩綜卷六十八翰林院檢討朱彛尊編宋登春三首登春字應元新河人有鵝池生集靜志居詩話王喬之玉棺桓司馬之石椁可以諡曰至愚然而楊王孫之倮葬劉伯倫之荷鍤便埋亦矯枉之過也鵝池生語邢子愿云君視宋登春豈杉柏四周中人行將浮錢塘脱履江干乘潮解去既而果躍入江魚腹之葬果勝於一棺之土乎君子譏其誕矣生詩平淡寡深思不失為賈浪仙李才江一流薊門桑柘兵殘後人家夕照中天秋沙鴈没月冷戌樓空選將燕山北擒生遼海東城南餘戰地燐火夜深紅九月三日方别駕攜酒殽見過因懷徐荆州客淚秋能下人情老自知塞寒鴻鴈早江暖菊花遲對酒憐吳語聞歌憶楚辭明年誰更健重把紫萸枝秋日野望聽鳥中林性看雲故國心地卑湘漢濶天逺洞庭深老馬空知道窮猨豈擇林十年書劒客寂寞到如今陳昻三首昂字雲仲莆田人有白雲先生集詩話山人以倭亂率妻子奔豫章織草屨易粟不給則賣卜已而入楚蜀轉客金陵間賣文為活阨窮以死其自序略云昂於詩尢嗜五言第家貧無書誦王右丞即作師右丞誦杜工部作即師工部可謂多師以為師者也宿江邊閣暝色江邊閣行吟易斷魂風前兩岸葉月下一聲猿夜哭誰家婦寒號何處邨洞庭春水動雇艇去荆門閩南登樓切莫登樓望令人更慘淒戰場多鬼哭息壤聚烏啼黄霧埋城郭寒風死鼓鼙深樓巢燕子來徃亦銜泥移居巴陵此即巴丘戌相傳魯肅城古今餘徃事兵火剩殘生楚水為漁便湘山結室平地靈如獲託亦足寄遐情馮遷七首遷字子喬上海人有長鋏齋稾潘子仁云子喬采掇菁英鋪張平實吾見其進未見其止也雅朱邦憲云子喬縁情定體因體鑄辭雄麗澹之言皆備詩話子喬詩出辭似淺而鍊格頗遒淘之汏之沙礫自去與俞仲蔚仲蔚青雲姿偃蹇山澤間遺棄當世事賦詩獨精專大雅既寂寞下接蘇李肩晨昏弄筆札几席生雲烟流傳翰墨林字字堪磨鐫相過遇佳夕春風盎和顔燃燈設清醴微奥相與宣髙懷曠千載鬱鬱忘冥筌所嗟嵗云暮何以奉周旋病卧十日城中米價騰踊感而賦此兒童負裹朝出市日暮歸來哭不止斗米新騰價百錢布匹雖行賤如水盡言久旱江水枯賈舶商船難到此城南早稻秀不實城北晩禾乾又死悲哉野老啼無聲十日病卧茅屋裏送唐世其北上君去青山外予吟緑水邊忘機鷗性狎快意馬蹄穿魏闕通霄漢吳臺思管絃遥知聽雨夜定憶小樓眠潘伯明邀飲朝天宫邀我來仙界林深引玉笙坐來黄鶴舞醉倚白雲生江作千年塹山圍六代城興亡易悲感何地訪初成荆溪夜泊細雨延春酌寒雲濕暮鐘客舟依樹小野火隔溪重風水期無定登臨興轉濃明朝買雙屐共爾躡羣峰復餞顧内翰於南浦因經曹公戰壘映竹船牕水氣凉渚風微泛白蘋香今朝相送即相别明日故人非故鄉蔓草女牆横斷靄荻花軍壘䕶斜陽銀河舊與滄波接一望靈源萬里長葉之芳五首之芳字茂長無錫人有雪樵集寒食金陵病中作東風吹短褐寒食傍天涯客舍孤城雨鄉心二月花逺山青極浦芳草緑平沙不盡王孫淚年年感物華靈江舟中赤城東去水瀠洄無數寒花夾岸開越國青山臨海盡靈江秋雨挂帆來舟中客淚隨楓落天外鄉心逐鴈哀如此蕭條須盡醉已知淪落不言才送韓漢章自楚還蜀河梁日暮罷離尊送爾西游入故園湘渚月明春飲馬巴江花落夜聞猨青山易墮天涯淚芳草空消客路魂何事不歸嘗寄食道傍誰解惜王孫題江邊柳揚子津邊柳秋風葉乍凋生當離别後不得長長條入新安可怪新安水舟從石上行千㝷猶見底不數越江清柳應芳三首應芳字陳父海門人有柳陳父集姚園客云柳陳父詩如田舍翁暴作封君舉止生澀詩話陳父僑居金陵之杏花邨每出行吟俛首沉思觸人肩而不自覺語所知曰作一詩必離魂數番乃得稱意昔人所云撚斷數莖髭用破一生心不過是矣其詩頗選髙格第去七子仍未逺送周京兆建言再謫代州判官向託湘流弔屈原十年岐路不堪論到來京兆纔三宿謫去承明只一言馬邑秋髙邊月近鴈門春盡塞花繁再投萬死風霜地猶感全生聖主恩初聞倭警有感東倭海外播風烟回首扶桑氛祲連白羽插書傳幕府黄金刻印拜樓船朝廷欲問來王日父老曽經入冦年辛苦折衝胡少保永陵一詔至今憐春閨黄鶯不隻啼紫燕還雙栖栖在安梁上啼向妾牕西安紹芳七首紹芳字茂卿無錫人國子監生有西林集葉茂長云茂卿學贍才髙生不得志有浮雲當世之志厭栖鄉曲慷慨逺遊興至為詩調髙辭秀㢠㧞時流好俞羡長云茂卿詩不追逐時搦管抽思一以清婉為尚山中夜坐夜氣何蕭森空山思寥廓不知風露寒彌覺衣裳薄美人渺難期對酒不成酌白日虛牖生微聞桂花落旅泊秋盡仍為客江寒獨繫舟微霜下木葉逺火露蘋洲無那風前鴈偏生枕上愁孤帆明更發何處復淹留送曽中丞入蜀玉節遥看萬里行鳴笳吹角動西京天邊劒閣雲連棧樹裏巴江錦作城檄到百蠻新喻蜀圖開八陣舊藏兵褰帷父老煩相問辭賦何人似長卿花津水上春霞明花開幾千樹不是避秦人人疑避秦處一葦渡夕陽下前溪西風吹野渡不見折葦人獨立滄江暮春盡日寄華公衡惆悵春風暮懷人興轉孤夕陽空極目芳草隔南湖柳枝詞赤欄橋畔柳絲長帶雨和烟總斷腸肯向西風恨揺落願留春色待蕭郎聞龍三首龍字隱鱗鄞縣人處士有行藥吟幽貞廬詩集屠田叔云隱鱗詩如溪上人家曲几疎牕長與水雲弄色王右仲云隱鱗詩清和穩暢卓然成家詩話隠鱗為冢宰莊簡公孫以孝友徳行聞於鄉里初不以韻語自負然其近體頗閒整特少警㧞耳山居即事積雨朝來歇諸溪盡急流隔河看飲犢倚檻有浮鷗雲冷松根石風微竹外樓蕭然無一事開徑遲羊求送趙彦忠游吳興吳興舊游地逺想尚依依荻岸青簾舫桑林白版扉計程千里近屈指一年違從此斜陽外看山悵獨歸聞吳少君病而阿霽死悵然懷之來徃家無定饑荒病未蘇路危僮僕盡身老子孫無何日忘機事全生付酒壚榮期自有樂不用哭窮塗譚清海一首清海字永明東莞人有靈洲詩草詩話處士以布衣思自奮功名永陵時上言十事不納穆宗即阼復走京師進三大禮疏其略曰我太祖髙皇帝文徳武功前此未有一傳至建文君紛更法制文皇帝於是訓兵除之即位之後悉復洪武舊制夫成祖未即位之先建文君天下者也四年以來其措置雖不足觀然有一日之君必有一日之政事而使之湮没不傳將來者何以徵也且洪武三十一年爾今曰三十五年豈賔天之後猶能撫綏四海統理萬幾此非所以示信也陛下宜勅令史官修其一朝實録仍以建文年號復告髙廟而追諡之庶幾文獻足徵可以信今而傳後矣又按正統十四年也先入㓂大同失利太監王振不與大臣謀議獨挾天子親征命郕王居守師駐土木天子䝉塵京師大震皇太后召百官入集闕下命郕王權總萬幾既而復命郕王宜早正位蓋以時方多事國賴長君故也王涕泣固辭於時文武羣臣交相勸進然後不得已即皇帝位夫土木之難非國家大變哉當是時社稷為重君為輕使非景皇帝預登大寳臣恐天下之事難言矣况多難之秋篤任于謙選將擇能練兵主戰宗社不至於南遷伊誰之功歟及英宗皇帝駕還景皇帝迎拜相持而哭推遜良久授受之意昭如日星一旦不豫英宗復位此天之所順也人之所歸也而賊臣徐有貞軰廼貪天功以為已功首倡奪門動揺國本駕言定策獵取侯封構骨肉無已之禍端損國家萬年之元氣遂使景泰七年君臨天下之號一旦改除于謙社稷之臣竟死刀下每讀國史流涕傷心不能不飲恨也英宗復鑒其誣深懷怨恨未及改遽爾上賔憲宗敦念親親用成先志上尊諡曰㳟仁康定景皇帝然而未得稱宗未饗太廟歴朝因循實為缺典夫人臣有功於國者猶得附饗於廟而况正位於九重之上七年之間社稷攸賴徳在天地功在祖宗不幸晏駕一二讒賊之臣迺隨而媒孽之遂至不得以列羣宗而安廟祀孔子所謂正名之義安在今陛下即位之始宜明詔中外尊為某宗祔祀太廟以正一代昭穆之倫以敦萬世宗親之義仍以于謙配饗用報有功復勅有司震暴有貞之罪削其官爵夷其墳墓以為將來不忠之戒庶幾祀典可明而典刑可正矣又按太祖髙皇帝首建太廟為同堂異室之制而奉𤣥恒裕淳四帝居之成化間九廟已滿下詔議祧於是以𤣥皇帝為始祖以太祖太宗為世室於寢殿後建祧廟羣主以次遷入焉至嘉靖十七年先帝斷自宸衷獨奉髙皇帝為不遷之祖改號太宗為成祖復上獻帝為睿宗而竝附九廟祀焉夫太祖有功於天地創業垂統為萬世計尊之為始祖禮之正也獻帝篤生聖子入繼天朝我先帝一念報本之心不能自已而尊之為帝祀以天子之禮此猶可以義起者若升祔九廟而與列聖竝饗臣不知於義何取於禮何居天下之分奚辨乎昔武王纘太王王季文王之緒以有天下是天下者太王王季文王之天下也故武王得以追王太王王季文王也猶我太祖之追尊四祖也今先帝所嗣之緒果纘之獻帝乎抑纘之祖宗列聖乎使纘之祖宗列聖則先帝之天下祖宗列聖之天下也先帝不得而私其親也今饗其親於九廟之中則是先帝之天下既受之祖宗列聖矣而復受之獻帝謂非有兩統乎此一人之私也非天下萬世之公也我朝之制子為天子其母稱太后不稱后不得竝嫡同饗於是有奉慈之殿所以明微也陛下謂君臣之分與嫡庶之分奚殊焉獻帝本安陸之藩王曽北面於武宗者今升祔九廟而與羣宗竝列則是儼然居武宗之上矣為天子之母者不可以庶而竝嫡為天子之父者獨可以臣而尊君哉臣聞獻帝在藩邸時克遵朝廷制度惟謹天下稱順焉故於其崩也而武宗諡之曰獻夫生而能恪守藩臣之禮未有死而肯倒置冠裳者也今儼然居武宗之上臣恐獻帝在天之靈必以上下之分不可踰也禮義之防不可越也祖宗相傳之統不可私也將蹙然不安於其位矣夫祭者所以安先人之神也既蹙然不安於其位則又何愛於附饗何取於太廟哉陛下方將秉正奉公為天下矜式必不以私親之故而廢禮其勅禮部㑹多官集議再訂廟儀務求典禮之正庶於祖宗祭統不至生嫌獻帝神靈得以安饗而亦不失先皇尊親報親之心祀典由是而正禮義由是而安天下之分由是而辨而萬世人心之公定於此矣以上三事皆言人之所不敢言且倡議於楊時喬詹泝劉曰梧歐陽調律諸臣之先而實録不書野史失載故節録之處士善談兵見知於戚少保歸隠羅浮見日峰鄉里稱為見日山人西游别貞復君望東海歸予從西粤游興言感今昔行路何悠悠白日徃不返頽波逝東流青青澗中蒲泛泛江上鷗連枝與比翼庶以解我憂楊承鯤七首承鯤字伯翼鄞人太僕卿美益子國子監生有西清閣詩草詩話伯翼論文謂先民有作彀率存焉不入彀率雖工無當也論詩厭薄王李謂暗中摸索知為今人之詩惟誦之不類今人而不蹈古人之迹斯善矣譬如學書然方其心慕手追必盡肖古人及其成也不必盡肖乃成家可稱知言者也七哀詩二首朝發桑乾河暮宿樓桑邨王氣久消落靈跡祕陳根物色遞遷化日月屢崩犇奈何此征夫䟦涉無朝昏驅車冒榛荆忍飢過市門餘雪照墟里頽陽藹荒邨隴墳鬱相望賢達無一存顧彼翳桑人太息涕潺湲客行無昏曉乘月理歸軒仰視明河低畢昴正闌干繁霜生肌骨齒戰不能言空野無人聲雞犬互悲喧羸馬為哀鳴僕夫自辛酸行行日已老帝鄉日已窅朔風裂緇衣客歸苦不早燕雀懷故棲游魚思在藻日月逝不處誰能長美好眷我平生親言旋永相保無能漠漠島烟合紛紛林月生小山全入霧大水半浮城鳴櫓通晨過疎星永夜明無能逐世好嬾與癖相成寄題江心寺勝絶江心寺江空墖影長潮痕剥斷石海氣濕危廊僧老秋無寐鵰寒翅有霜英雄餘涕泗風雨弔殘陽小山還山抱黄犢沙草日䝉䝉竹屋難禁雪松門不掩風香餘栗葉火寒落桂花叢寥落清江外吾生亦有終小山歸得長文書及新詩二首兼惠茅栗如數奉荅茅栗何年種分匡見小奚色兼霜芋早味與露葵齊歛䄂呼兒子嘗新媿老妻永無懷橘日剩有萬行啼翛園觀刈稻詠懷老覺衣裳薄寒摧捃拾頻㝷常邨徑小來徃路人新沼靜飢魚出林卑宿鳥馴雞豚與閭巷不厭野夫貧諸葛鯨一首鯨字君騰襄陽人一云蘭溪人渝城人日簡孛給事訪舊來何晩輕帆落驛亭江廻劒外白山繞漢中青萬里逢人日孤城感客星知君懷諫草翹首望明廷沈懋嘉一首懋嘉字㑹真平湖人懋孝之弟諸生有白巖遺稾秋鳥陳山西麓海東頭細網長竿帶緑韝買得山禽如粉脆屠墳十里稻花秋詩話吾鄉屠康僖墓在乍浦陳山山濵海宰木蓊鬱毎東風起冇鳥海外來集於樹土人張羅持竿捕之大者曰蛓毛鷹亦曰鷗鶘中者曰花雞小者曰鑽籬剖其腹有青椒其骨甚脆號為秋鳥文學詩蓋紀其實裴邦竒一首邦竒字庸甫聞喜人有巢雲集望嶽衡陽秋色翠一作碧氤氲南望蒼梧隔楚雲自去重華招不返月明瑶瑟怨湘君黄維楫二首維楫字説仲天台人送王元甫舍人使襄藩玉門將醖酒使者捧銅圭玉節湘雲外星軺漢水西恩頒丹鳯詔歌唱白銅鞮山簡流風在能無醉似泥武林與王符李葉四博士夜酌烟草碧連天吳山春可憐客情千里外鄉語一尊前細雨鳴深夜疎燈照别筵關河又明發罷酒各淒然陳有守二首有守字達甫休寧人有六水山人詩集徐子與云山人詩篇雖不盡離津筏而體裁宛密大雅不羣詩話山人好游轍跡遍湖海以郡有南浦六州水胥滙於川注海遂自號六水山人一曰天瀛山人又曰斗下老人自比沈麟士王孺仲其詩取材目前不甚鎔錬所選徽郡詩斤斤繩墨不失正音游邵氏園極目眺逺山振衣出東郭白雲媚幽岡蒼烟澹長薄登皋一舒嘯餘響應林壑空緇城市塵未諧江海諾夙心愜超曠世故任龍蠖觀音巖紺閣披雲竹樹參天花傳説見優曇妙音一去諸天逺癡絶行人拜石龕盛時泰二首時泰字仲交上元人貢生有蒼潤軒集詩話沈啟南題倪元鎮畫云筆蹤要是存蒼潤畫法還應入有無盛仲交畫師元鎭文徴仲遂以蒼潤題西冶城之小軒仲交性愛山水去郭二十里為攝山山之左有大城山結精舍其中時跨一靑騾欣然獨往嘗為子娶婦其妻戒勿他徃忽隨友人徃城南古寺數日乃還妻愠而詈之乾笑而已張肖甫開御史臺於句容仲交醉撾㦸門之鼔肖甫曰安得此狂生必盛仲交也邀入復飲達旦乃别萬歴初元以陪貢試吳下肖甫謂曰子過姑蘇宜一謁王元美遂攜所著兩都賦謁元美於小祗園元美贈之詩曰遂令陸平原不敢賦三都又三日之内遍和元美擬古詩七十章元美為之氣奪云初春送朱比部幾年官寄白雲司日日行吟湖水湄五馬西川今作守一尊南郭暫相持天邊雲樹依臺逺雪後春濤出峽遲自昔蜀中饒勝蹟品題應是待新詩寄武林朱九疑湖上輕風拂柳條美人吹笛向平橋欲知胥浦潮初退正是秦淮雪半消張正䝉二首正䝉字子明江寧人顧太初云隱君年九十餘猶能日行數十里無倦不多飲酒而善飯如壯夫詩法中盛唐饒王孟韋柳之趣商人怨江上商人歸試問商人事商人不敢言相對但垂淚過王徳載牆東别業舊是君公隠相期共避喧落花春雨巷垂柳暮烟邨牕外青山出尊前白鳥翻澗聲流不竭吾意欲㝷源馮敏効一首敏効字忠卿平湖人給事汝弼之子有小有亭集舟行水逺連天碧秋深共客寒孤舟迷去路頻對夕陽看程伯陽一首伯陽字師道歙人王仲房云師道家貧賣藥自給詩多漫與而沉思者自入法過南山懷許宣平仙人去已久訪古經南山丹竈亦已沒白雲長自閒風吹桂枝緑雨落桃花斑空傳負薪句沽酒何時還馮科一首科字子盈嘉善人布政使盛世之父有東皋吟吳江逢越客徐生賣藥長為客浮萍寄此身因沽吳市酒得值越鄉人白雨三江暗丹楓十月春追思十載事不覺淚沾中孫文篪一首文篪字伯諧歙人王仲房云伯諧好神仙山居獨行洞簫在佩不顧俗人訕笑其詩任性放吟嬾於祖述間有合作便越凡情若行人欲問前朝事翁仲無言對夕陽足稱佳句逢鄉人爾從山中來恰喜江上遇吾家老梅花開到第幾樹曹昌先一首昌先字子念一字以新太倉人少年行長安兄弟舊知名半是期門半射生醉就胡姬壚畔宿明朝齊赴受降城欽叔陽三首叔陽字遇公吳縣學生入國子監有集詩話太監孫隆以督織造駐蘇州朝廷方起税額惡少年行賄充委官乘輿張蓋勒索商税民不堪命崑山人葛成率衆二千人分作六隊一人揺蕉扇前行後執挺隨之知長洲縣事鄧雲霄見民情洶湧擒委官頭目械於𤣥妙觀衆立毆死裂其尸知府朱燮元勸諭始得解散此萬厯二十九年事也時葛成慷慨就獄後得宥罪又二十餘年而有顔佩韋等實先啟其兆云遇公謡凡一十三首兹録其音節近古者税官謡三首四月水殺麥五月水殺禾茫茫阡陌殫為河殺禾殺麥猶自可更有税官來殺我千人奮挺出萬人夾道看斬爾木掲爾竿隨我來殺税官税官來百姓哭虎負嵎猱升木壯士來中貴走十二人三授首歡樂崇朝不及夕倏忽頭顱已狼籍投畀烏鳶烏不食張名由二首名由初名凡字公路蘇州嘉定人有張公路詩集詩話公路居平世而好言兵棄家産僮僕以避徭役可稱知幾之士蓋先唐婁程李四子稱詩而學文於震川者吉貝辭禹貢故江道今已失其真西亂北入婁浦東接春申中淤百餘里髙飛起黄塵三年棄不治地頗生理殷九夏耰鉏出三時雨露新吉貝萬餘頃其葉何蓁蓁秔稻産三吳初不係海濵陵谷日變遷造物亦至仁嗟嗟肉食謀此理難具陳空堂秋蟲響空堂纖月下幽渚鳥驚風外林花落庭中樹羈棲興逺懷城河隔新雨耿耿良不寐脈脈以無語俞安期十三首安期初名策字公臨既更今名改字羡長吳江人有翏翏集朱雲子云羡長語多雄壯如望海云星臨東極無分野山入南荒有沃焦廬山絶頂云爭趨大海千江定纔入中峰兩郡分寄臨洮監司云桃花東道來天馬木葉西山見玉狼寄建昌兵備云笮馬全敎歸漠北竹王那許擅南中皆名貴可傳詩話羡長之名由元美明卿伯玉而成詩亦兼綜三家原本李獻吉長於獺祭賦景有餘言情不足如入隋苑觀翦綵花青紅碧緑非不爛然奪目即而視之與根株總不相附烏沙阻風獵獵閶闔風吹彼江漢流崩流一何急阻我西行舟擔篙引百丈人力非不周但如宋都鷁退行良非謀旅情既昏亂朱炎苦相讎畢竟泊楓林繁陰結綢繆憶從辭妻孥再見蓂葉抽前期猶漫漫返顧多沉憂沉憂不能揮奮思弋青丘武夷二首晨興命篙師溯流泛清汜鷁首轉石湍九曲兹其始峰巒縱異姿崖壁夾重詭參錯駭愕形萬狀不相似林林從孤舟紛紛列兩涘回眺天柱石端立若冠峙其上亦宏奥云有天池水易代投玉簡遣使歴千禩子騫謫居時仙客咸來止晉代八真人異姓四女子謫籍周有期上昇具由此控鶴彼何人曽否來主禮縶纜仙船巖三曲漸已及云何二仙艇中壁懸石隙嵗月固不知神化亦奚測更無堯年潦安得逮兹息豈墜絳渚間天路將安適或由巨靈掌攜之化人國莫謂藏壑牢夜半負有力願借拯迷津衆人免沉溺神鴉行甘將軍廟富池口廟前羣鴉何太馴商艑經過浪索食撲刺雙翅飛近人上投餅餌或片臠髙挐低攫疾若神競言此鴉莫彈射將軍精靈所變化中之不斃亦不傷風波恐使神明咤吁嗟乎將軍氣㮣籠古今强吳捍魏人所欽精靈縱化亦貔虎安得𤨏𤨏為微禽神鴉神鴉汝曹憑藉將軍力不加彈射還投食何殊僕𨽻在權門安然請索無不得卜居陽羡雞犬成墟落蕭蕭半畝宫湖山元作長田舍復稱翁五口中人産千家太古風無由知帝力耕鑿自為功憶家故國千山外經秋逺别離浮生能幾日為客此多時衰眼髙堂淚寒砧少婦悲天涯念游子風雨共淒其青草湖秋霜枯洞庭秋草入湖青漁屋遷卑壤風帆就逺汀鴈鳬沙不整魚鼈塹多腥回想波濤日陰沉託水靈過洞庭湖南北占星日相隨任逺飄輿圖輪浩蕩舟楫變昏朝鴈力翻風盡蛟宫隱浪遥最憐無定處雷雨失青霄望海積氣茫茫九水都望來空濶盡東隅雲霞午夜浮光動雷雨中流片影孤日有靈烏棲析木時無游馬繫秦蒲島夷向識滄波道烽燧防春亦逺圖送顧道行副憲之山東鬬雞走馬俗稱雄絶島窮邊路亦通卉服仍敎歸禹貢短衣須遣變齊風嶽雲今古懸封上海日㝷常起夜中我有所思愁逺道自今長望泰山東登祝融峰中天積氣入清凉雲霧翻看地混茫雨挾蒼龍奔下嶺星懸朱鳥定南方何年石簣藏金簡自古山祇禮赤璋壇上長流青玉乳神池髙捧帝臺漿謁禹陵水土開荒服憂勤任聖躬八年忘内顧四載畢前功厯數虞咨及廵游夏諺同㑹稽臨絶徼道里記方中玉帛諸侯集梯航萬國通重輝扶舜日後至戮防風論徳人無間傳家祚莫終寢園非逺隧祠廟異卑宫祭本天酬孝民猶俗尚忠穴深藏詭物石立窆神工祕守𤣥夷使竒探太史公為魚心感歎酌水意尊崇草莽成臣禮精靈鑒鄙衷願為松栢樹朝暮䕶青蔥東濠雜興青溪東九西九白鳥朝雙暮雙結屋何殊柳浪投竿别是桐江何白四首白字无咎永嘉布衣有汲古堂集詩話无咎起於側微事容有之第考萬歴庚辰履歴龍君御初授徽州府推官鐫級改温州府學敎授入為國子博士未嘗任温州司李也牧齋尚書殆亦道聽之説汲古堂集原亦出於七子頗與俞羡長相近長干客舍同周叔宗夜坐分生字莊塗輳塵軌未路多所嬰况復嵗遒盡懷歸軫予情之子秉髙韻神恬物自輕處順鮮有觸居喧若無營偃仰寄一室展玩忘寢興髙梧散縹帙風琴落虛聲櫩卑景先夕墉髙曦易傾幽光代明燭寒月曖前楹焚枯命芳醑歡燕惟平生情披語已洽罍虛時載盈寸愫得所遣冀此數來并村翁行老翁耕種居西邨白頭不到城東門翁言淳朴日非昔我覺勝兒兒勝孫大孫自託能當户負租徃徃凌田主日斜歸自縣門來桑下乘凉説官府淮陽歸興淮泗秋風動地來月明如水鴈聲哀南經伍員吹篪市北眺曹公較弩臺歸路漸香菰米飯佳期已負菊花杯愁聞烽火連東北極目浮雲黯未開莫愁湖逢程徳懋莫愁湖邊驚暮春暖風霽日揺青蘋柳條繫馬不辭醉飛絮滿天逢故人陸弼六首弼亦名君弼字無從江都人嵗貢生有正始堂集李本寧云無從詩有六朝之靡曼精工有唐宋之舒緩流暢各臻其勝有鳥有鳥東南來為巢良已劬彼鴆胡弗仁一朝奪而居我躬不遑恤安所念拮据逝將訴上帝九閽莫可呼鳯皇三歎息謂鳥亦何愚不聞晉與魯封土百里餘三桓逐其君六卿析其都遂使帶礪邦忽焉為丘墟自古皆有然勿謂天道迂天定能勝人兹理若轉樞韓侯祠秋風開古廟聞此祀王孫漫説封侯相徒傷過客魂楚歌空激烈淮水易黄昏我亦懷知已漂零未報恩哭亡弟惟良早罷諸生籍貧無季子田暮齡看汝健朝露竟余先無復誇聨玉徒令歎逝川山齋姜被在攬處一􅏰然哭梅季豹失意長為客招魂忍向君生難逢醒日死孰問遺文末路淹蓬累他山隔鴈羣蕭蕭桃葉渡團扇掩秋雲謁于肅愍公墓荒墳鄰近鄂王宫異代孤臣伏臘同北狩忽聞哀痛詔中興多仗保釐功百年社稷回元氣五夜松杉起疾風聖主祇今恢廟略飛狐聞已命元戎晩泊毘陵諸君攜酒過集舟中孤城春水浸桃花白髪逢君酒重賖一曲清歌滿船月不知今夜是天涯黄克晦八首克晦字孔昭惠安人有黄孔昭詩選沈嘉則云孔昭多深沉之思本之雄渾發以舂容情以景生語必自鑄字不虚設氣完神定大雅之材朱秉器云孔昭詩意常獨造雖以古人為宗而不蹈襲片語何思黙云孔昭詩如入幽林長薄其樹木皆世所有而鬱然蓊翳祇覺老蒼歴下瑯琊但稱盧謝未能或先也詩話孔昭少為畫工壯嵗以詩名其金陵游稾則張仲立刋之西山唱和編則李于美定之金臺詩則林登卿鐫之登卿稱其古風天籟自鳴近體森然紀律青溪社集諸公允當推為祭酒感時繁霜凋草木谿谷正悽惻𤣥冥慘不舒改嵗固云逼萬物各有因盛衰迭今昔寧見武安門猶納魏其客江行江風來自北弭櫂江水南白浪聒不息游氣昏空潭曠野何蒼蒼引步隨幽探鹿鳴求其牡豐草非所甘江燕啄不食念雛聲諵諵物性固如此游子何以堪慨彼江中水衝波無定端古人忍飢渴㫖矣非空談夢游武當山懷鄖陽江使君祝融奠朱方五嶽有定目胡不以嵾山竝列而為六夜夢登其巔游氣承我足千峰歴嶮巇如車走平陸上為帝者居星辰纒其麓崢嶸羽人宫參差徧巖谷中有不死人終嵗茹草木授我鳥迹書竒文不可讀雞鳴忽焉寤惋歎淚相續聽話西苑雷殿清虛太液秋至尊多在望仙樓樹深宫闕東西合月出東西下上流麟圃紫芝春曄曄兎園白鹿曉呦呦軒皇鼎在龍髯斷露箔風簾不上鈎送何仁仲鴻臚乍列鵷班黼座前懷山歸櫂忽悠然蘼蕪曉過湘妃廟葭菼春迷宋玉田白雪新聲供奉曲悲風古調别離篇重來何處偏相憶問我朱陵訪道年病中風雨寄歐楨伯薊門衰病颯驚秋風雨蕭蕭獨倚樓四海新知名下老頻年多病客中愁雲連北極迷宫樹水發西湖出御溝京國逢君歡不淺可憐經月罷同游欵乃曲二首五虎山如五虎蹲盡對無諸舊國門無諸去後山空在秋草蕭蕭日又昏微茫星月下江鄉三十六灣江水長夜半舟人相借問好風日出到洪塘鄭琰二首琰字翰卿閩縣人徐興公云翰卿工七言少游邊疆集中多悲壯語詩話翰卿詩名籍甚興致故超七言近體全得力於唐詩鼓吹者贈顧小侯甲第連雲瞰帝城畫簾繡箔照朱甍新開馳道千金埒舊領團營七較兵方士房中龍虎鼎侍兒花底鳯皇笙燕山二月春初好玉勒朝朝待曉鶯黄山道中微霜風物色淒淒路入黄山是五谿帝子不歸汾水上行人愁過穆陵西荒原曉露銅駝泣古驛秋風鐡馬嘶獨客傷神家萬里斜陽征鴈楚天低胡宗仁三首宗仁字彭舉上元人有知載齋稾姚園客云胡彭舉如空山泉落薄晩霞明多顧太初云彭舉詩竒峭新致詩話彭舉詩頗清真惜稾為楚人論定必去其菁華僅存皮骨矣立秋後夜起見明月深夜見明月漸低西南隅光華射虛檐照我牀頭書開函見細字歴歴如貫珠老眼未能讀惆悵坐庭除風生梧葉鳴光景殊蕭疎昨方入秋序清凉便有餘閒居寄友家住青溪曲春深花竹迷君來若相問直過西梁西桃葉渡桃葉渡頭桃葉春家家姊妹鬭妝新不知何處初來客未省吳姬解笑人王嗣經二首嗣經字曰常本姓璩上饒人郊遊禁樹青郊外重城緑水湄園林春閏月花鳥晝晴時逺岫平浮檻清泉曲到池晚紅翻蛺蜨新緑坐黄鸝烟斷游絲見風輕落絮知一陂芳草色禁得馬歸遲金陵元夕十二城門徹曉開金壺銀箭不相催行隨燈市家家月看到花林樹樹梅王伯稠一首伯稠字世周崑山人長干曲月出江頭白鷺飛江花采罷濕羅衣儂家住近長干里自唱蓮歌伴月歸鄧欽文一首欽文字徵父江陰人有倚竹紀游二集丘念先云山人摹仿唐賢色澤音調靡一弗具洪光寺懷陳更菴寺裏還藏寺山頭别起山磴盤千級上僧占一峰閒秀色杯前墮孤雲杖底還元龍負竒好惆悵不同攀程格一首格字良學休寧人翰林待詔有石林藳蕪城晩望同方太學元卿賦木落川原一望開孤城客思轉愁哉帆隨斷靄天邊沒鳥帶殘陽樹杪來黄葉疎鐘秋寺暝丹楓兩岸暮潮廻慿髙欲擬參軍賦愁絶西風半草萊汪乾利一首乾利字和叔歙人泗上芒碭山前秋草多彭城王業竟如何雲來還作真人氣風起猶傳帝子歌朔鴈南飛離紫塞淮流東下接黄河知君躍馬能乘興一路江山取次過吳大經一首大經字元常常熟人有叢桂軒集江水霞明江水淨潮落江帆急白鳥趂斜陽銜魚沙渚立姚悦一首悦字汝誾秀水人秋興用杜工部韻洞庭林屋逕逶迤震澤凉生萬頃陂菰蔣浮沉隄畔米芙蓉開落澗濵枝琳瓊書付靈威守鰕菜船從范蠡移七十二峰吾歴遍湖天疇識客星垂錢應晉三首應晉字次卿海鹽人萬厯丙子舉人蓬州知州有閬風館集九日故城舟中無處㝷籬菊何人送酒來故園知滿徑此地少深杯岸柳霜前脆雲鴻日暮哀悲秋憐楚客懷抱向誰開酬金文學一諾千金重貧交不世情把君書在手感我淚沾纓推奬期先逹泥塗艱此生秋宵相望處但有月同明過河間憶許長孺侍御攜手登臺畔存亡憶昔時酒家仍舊所柳色換新枝對月杯難覆攀條淚欲滋風流何處覔逝者竟如斯徐冽五首冽字仲容吳縣人萬歴癸卯舉人有嘯碧堂詩集踏車曲三首阿伴五更來喚儂踏車去赤日已三啇踏車未敎住人言田家樂不知踏車苦憐歡氣力微代歡當卓午東邊鳯仙花西邊烏桕樹不敎儂上車那共歡一處夜坐對酒二首松醪初熟甕生香數盞醺然對夜凉好拂桃笙魂夢穩月斜桐樹影初長已許侯封在醉鄉百年須醉萬千塲不嫌醉裏疎狂發自是先生醒更狂戴灝一首灝字升之嘉興人萬厯丙午舉人宿僧院共宿髙僧院深杯賦茗柯鐘聲沉逺樹鴈影度秋河近海金風早安禪白法多上方今夜月猶向斷橋過明詩綜卷六十八
