body:
  text: 明詩綜卷五十二翰林院檢討朱彞尊編余曰德三首曰德初名應舉字德甫南昌人嘉靖庚戌進士除刑部主事歷郎中出為福建按察副使有余德甫集午渠集靜志居詩話德甫於詩尚未窺見門户元美冠諸五子之首未免阿其所好矣然其仿敖陶孫作詩評未之及焉豈陽許之而隂抑之與懷徐子與苦憶湖州信兵戈尚未休感時愁更切念爾見何由萬國征輸盡三吳戰血流即今江海上那不問扁舟送萬彥和僉憲之粵繫馬花間挂玉鞭毿毿隄柳亂鳴蟬河梁自是銷魂地此日因君倍黯然過楊給事故居青瑣歸來迹已陳百年渾是夢中身江州滿目山如畫不與人間葬逐臣魏裳二首裳字順甫蒲圻人嘉靖庚戌進士除刑部主事歷員外郎中出知濟南府遷山西按察副使有雲山堂稿王元美云魏順甫如黃梅坐人談上乘縱未透汗不失宗門詩話順甫差勝德甫尚非助甫肖甫之倫雪霽同友人登王子山畏路誰能到幽懷我獨偏谷中初見日樹杪忽聞泉倚杖青山色銜杯白雪篇交遊仍舊俗風景又新年題白雪樓郢調淒涼思轉幽卜居還倚鮑山丘初疑海氣能成市不道仙人獨有樓乘興好看明月上登髙長嘯白雲秋琴心自在誰堪識且聽巴人下里謳汪道昆三首道昆字伯玊歙縣人嘉靖丁未進士除義烏知縣歷官兵部左侍郎有太函集汪禹又云伯玉聲調並佳能臻閫奧甚寡李舒章云汪司馬詩如薪芻滿地英楚徐蘭生云伯玉篇無警䇿妄自矜大余嘗借大陸語評之混妍媸而成體纍良質而為瑕徒悅目而偶俗固聲髙而曲下詩話王元美論詩文大指具於卮言七卷有云文繁而法且有委吾得其人曰李于鱗簡而法且有致吾得其人曰汪伯玉又云歷下極深新安見裁是心折李汪靡有間矣竊怪其效敖陶孫作詩文評茍有寸長必加品隲顧于鱗兩見而伯玊不及焉何與觀四部藁中贈汪序如云上本羲姒下則姬孔俯踞二京跨千載而上皎然若日中天其言太浮而夸似非出於中心之誠者聞伯玉晚年林居乞詩文者填户編號松牌以次給發享名之盛幾過於元美蓋元美所推奬二人于鱗道峻仕又不達伯玊道廣位厯崇階人情望炎而趨不慮其相埒也昧者不知詆諆伯玉未免太甚所引陸無從記一事見無從正始堂集中與所詆諆者略别伯玊裔孫稱無從為伯玉弟子而無從贈弇州歌云濟南新安狹已甚君子視之特小巫不應弟子而毁先師若是也送張虞部謫嘗州别駕謫去存吾道流言亦世情聖朝仍得罪佐郡且藏名落日梁溪棹平蕪瀫水城秋風回首地淚滿逐臣纓步月為愛青天月重開白板扉宵遊便故里露立任初衣罷柝連城靜當樓列宿稀正思良夜醉未覺少年非石林落日石林西林中擁煙霧樵歌何處郎猶記來時路張佳胤八首佳胤字肖甫銅梁人嘉靖庚戌進士除滑縣知縣徴授戶部主事改兵部右侍郎巡撫浙江徴拜兵部尚書加太子太保卒贈少保諡襄敏有崌崍山房集穆敬甫云肖甫詩律精嚴髙視千古李時逺云肖甫詩閎博縱肆凌駕前人稱陳卧子云銅梁莊雅亦李王後徑詩話肖甫以功業顯其詩亦多慨慷奮厲之氣與仰屋梁著書者不同人皆稱其近體不若五古較勝十籌詠懷毒暑不辭鍛嚴冬尚為漁裘葛有本性生事因其居伊豫觸世網轉與青雲疏一謫孟諸野再遷首陽且素位守明誡窮途豈欷歔貴者日以貴寧得辭勞劬賤者日以賤庶幾逺禍樞立秋簡徐子與涼風厲商氣颯然驚早秋白日下圓景大火西南流年序忽不處陳蔡難久留案牘繁以迫胡為日綢繆洪河逝如斯草蟲夜啾啾凌厲緬千古遺則懷前修女蘿挂喬幹玄蚓吸深湫託勢有崇卑適志共良謀晚入通海參伐昏正中脂車即廣路松燈馬首明嚴飇起夕霧海氣蒸春衣摐金逼髙戍微茫一褰帷不辨山與樹城邑行已遙寒濤響孤鶩萬里誡逺遊宵征何以故三甫入渝豫不能謁承枉書問且督南征並訂郢都之會而寄以詩良時罕再至嘉會復何如孟冬厲霜氣蓬蒿沒蔽廬興言念友生抗旌向巴渝便欲往從之山川鬱盤紆感兹綢繆意逺及銅梁書加餐字未畢殷勤勸脂車漁樵計已定樊籠日愁豫聞君下夔子目極生躊躇孤懷入大江萬古只東趨郢歌有白雪期我獻歲初醉罷陽春臺然後䇿驪駒上谷使院中課園丁有作小圃開臺西羣芳會首夏散屧退自公移觴託休暇改服課園丁流泉任委瀉膏雨抽新條停雲拂髙榭間關衆鳥鳴葳㽔落紅藉悠然抱甕情宛在南山下寄題永嘉王陽德陽湖精舍招隱豈在深智者秉微尚伊人卧陽湖幽襟謝塵鞅丹霞遞崇楸南北兩鴈蕩萬象厲景光凌緬非一狀鴟夷任所之滄浪發髙唱扁舟就何時逝將剡川放宿黃牛峽春到黃牛峽江辭白帝城楚雲髙不落巴水去無聲絶塞書難寄孤舟月更明棹歌聽自短幾處夜猿鳴登函關城樓樓上春雲雉堞齊秦川芳草共萋萋黃看雨後流河急青入窗中華嶽低客久獨憑三尺劍時清何用一丸泥登髙眺極鄉心起關樹重遮萬嶺西張九一六首九一字助甫新蔡人嘉靖癸丑進士授黃梅知縣考最擢吏部主事歷郎中升行尚寶少卿謫廣平同知遷湖廣按察僉事進副使擢右僉都御史撫寧夏有緑波樓集穆敬甫云助甫詩振宕不羈大有英雄之概胡元瑞云助甫近體髙之華雄爽類子相而精密過詩話金谷之筵不遺麥韭瑶池之駿圖及盜驪物之所以貴善用生也七子齊盟一時風氣雷同助甫稍能用生政爾拔俗殘日怪鳥啼殘日竒峰挂片雲波濤城市合煙火舳艫分卧並蛟龍穴遊將虎豹羣更傳銅柱北新駐越南軍初至家陳道義瞿睿甫見過歸及青春半芳園二仲來月生桐柏水雲斷景夷臺玉笛梅花落金尊竹葉開今宵張仲蔚為爾剪蒿萊寄見甫弟歷盡巴山白髮新西風何處不傷神馬曹蹭蹬官難起鳥道艱危老更貧九派長江春後鴈一年芳草夢中人相思况是無消息徙倚天涯涕淚頻陽和制府廨中緋桃甚盛乃毅皇帝手植方少保為賦詩遂次其韻制府東開一畝宫曾傳翠輦御微風緋桃手自先皇植花譜名將上苑同朔郡何時無雨露彤雲長得護簾櫳孤臣此日瞻春色想像天顔一笑中登會寧原上作黯淡山城古會州碧天雙目盡髙丘春深柳色猶霜雪日落邊聲起戍樓寒鴈啼雲皆北向濁河歸漢亦東流乘槎豈是窮源使投筆虛疑定逺侯黃陵廟黃牛朝暮望青春此日維舟白馬津古廟空山存漢碣屠羊伐鼓過江人九河注海猶稱異三峽開天始見神應共長年歌賽酒衣裳鱗介仰陶鈞俞允文四首允文字仲蔚崑山人有真逸稿王元美云仲蔚五言古詩調殊不卑所之精思又云仲蔚古調本是名家五律亦不惡李于鱗云仲蔚古詩沖雅有應徐之韻言陳卧子云仲蔚七絶句其調甚正詩話七子之教五言必宗河梁建安竊優孟之冠學壽陵之步求其合而愈離當日二子于五古極口仲蔚然仲蔚殊少神解余意尚在廬次楩下二子之言出一時之好未為定論也然仲蔚於歸熙甫文名未盛之時結契最先又論詩不心服于鱗亦有識之士感懷生命故有常於世鮮能由天道諒微昧禍福不相讐運促無修齡吾行將安休髙行令世疏寵耀逢厚尤何不永自持飄颻升九州橫厲越飛泉與彼列仙儔豈效榮華子跬步相機求送葉伯寅遊南都朝日揚素影零落泫盈條歸鴈辭碣石嗷嗷厲層霄念子遵舊都整䇿陟巖椒北眺窮朔陲東瞻越江潮崇雲象山嶽雙闕鬱岧嶤過彼雙闕間冠蓋相遊遨四節隨飇逝茂時乏佳招駿驥棄不收踠足有餘驕非子良見眷豈復縶場苗信心愜中賞沉吟結清謡共期玄冬月歡宴憩林巢送梁伯龍遊楚並寄周水部浮舟入楚江浩蕩千里豁况值清秋時逸興不可遏雲來巫峽長木落洞庭濶故人渺何許引領向天末搗衣重關月夜早涼分夜夜砧聲逐塞雲淚盡天南與天北悲笳同是月中聞盧柟八首柟字少楩一字次楩一字子木濬縣人太學生有蠛蠓集王元美云盧少楩如翩翩濁世佳公子輕俊自肆胡元瑞云次楩詩華藻不如茂秦而氣勝之音顧玄言云少楩古體如寒流出谷婉若調軫隨意適近體如夕禽觸林矯於避矰象逐思馳格髙韻雅駸駸元嘉之境陳卧子云山人排蕩自喜頗有越石清剛之氣詩話次楩詩足以髙視四溟雜詩髙樓有佳婦窈窕青雲端左蔭緑桂枝右紉芳澤蘭臨流戲珠浦拾翠遊芝田蛾睂衆所嫉蘧蒢翻見憐棄捐蓬蒿中誰來希令顔徘徊歲云暮拂衣聊長歎秋日奉别王元美比部還京爍爍天上星皎皎巖際月蟋蟀感夜吟涼飇遲晨發山木既云蒼江楓亦已脫遙望百里間茫茫但寥闊鴟梟鳴園陬虎豹步庭闕臨路别所親悵然增華髮安得瓊芳枝慰我長飢渴送人之塞上北風蕭蕭邊馬鳴君今棄我何逺行隂山雪花大如掌黃雲出沒單于營萬里龍沙那可見將軍大小七十戰捷書奏入建章宫寄我雲中一隻箭戲寄孟龍川舊日浮丘伯曾將王子喬周遊乘白鶴接引上青霄大藥留丹鼎天台度石橋不知千載後為爾一相邀鍾廣漢云此詩對仗原出襄陽聞吳吏部少槐哀僕乏嗣飭內入獄侍湯藥二首宓子彈琴日山濤謫宦時澤梁弛禁網鰥寡遂恩私未識洪鈞妙應霑造物竒周南王化逺終不負螽斯晉室嵇中散陳留蔡議郎彈琴神不去續史恨何長慘淡悲千古淒其滯此方翻思兒女意斷盡九回腸哭董縣丞紳二首有序丞強幹任事清苦厲節有古人風壬寅歲長揖恤刑沈法曹抗救洗寃於柟居甚今兹長往柟安得不悲故詩以哭之十月黃河穩天寒素舸孤斷雲低不去哀鴈起相呼忽暗郎官宿虛傳太史鳬哭君重回首愁色滿蒼梧列郡開方藥巖牆阻别離蒼生猶有待逝者竟如斯老去傷心地愁邊失望時玉棺誰為斂蕭瑟九原思李先芳六首先芳字伯承濮州人嘉靖丁未進士除新喻知縣徴授刑部主事歷郎中改尚寶司丞升少卿降亳州同知有東岱山房稿清平閣集李于鱗云伯承雄才名重當世洋洋雅音亦復盈耳于穆敬甫云伯承詩思秀發綽有右丞之風無垢云吾里兩李先生其稱詩不同歷下以氣骨合神湛涵萬有而發以雄迅意嘗超於象之表濮陽以才情赴調融洽衆采而出以和平力嘗畜於法之中譬之五音歷下則軒轅之鼓素女之琴髙張急節鏗鍧駘蕩足以駭耳洞心濮陽則昭華之琯嬴臺之簫肅雍和鳴可使龍吟鳳下蓋所謂異曲同工者而陳卧子云伯承為七子先驅其後不振詩話伯承與元美于鱗同舍皆故等夷既而七子盛名狎主壇坫元美收之廣五子之列意寖不平晚逃於詞曲觀其詩雋一書詳于淮北逺及巴蜀而獨黜大江以南蓋以吳楚揚粵之間七子實居其五其微意可窺也擬古二首青樓臨大道初日正杲杲感君桃李年使我懷春早佳人念良夕誓結同心好磐石轉有時華池多芳草秋風薄天雲一去迹如掃篩篩池上魚䎘䎘籠中鳥性情本非宜况復傷懷抱髙堂列廣宴美酒斗十千絲竹奮清響聽者有悲歡人性豈相殊中心難遽宣諒無黃鵠翼焉敢凌中天延情需所願歲月忽已殫要津何熠耀駑蹇徒迍邅達人貴自我珍此勞華年鄱陽湖吳人臨古渡湖水接天開一夜南風起扁舟萬里回波漂星子縣雲沒大孤臺却望蒼茫裏匡廬秋色來早春懷元美蘄王簫鼓日紛紛雪霽遙看玉笥雲借問江城春幾許梅花落盡不逢君由商丘入永城塗中作三月輕風麥浪生黃河岸上晚波平村原處處垂楊柳一路青青到永城再過玉河隄馬蹄日日逐紅塵白髮青山應笑人昨日玉河隄上過杏花開盡不知春吳維嶽七首維嶽字峻伯孝豐人嘉靖戊戌進士除江隂知縣徴授刑部主事出為山東提學副使擢右僉都御史撫貴州有天目山齋歲編王元美云吳峻伯如子陽在蜀亦具威儀又如初地人見聲聞則入大乘則逺又云峻伯詩小巧清新足炫市肆無論風格曹穆敬甫云吳公結社西詩中竒語往往驚人詩話峻伯如鉛刀土花不堪灑削然其五律頗具岑嘉州張司業風格句如關河春鴈少風雨暮鐘多細雨來因晚空山到已秋清飇涼帶葉零雨細沾沙亂水穿林響殘星綴嶺低剪藤舒柏葉芟草出瓜苗暮雨初收市秋江正長潮潮生風聽急江逺雨看無澗水斜牽筏林煙逺出村沙頭飛燕子市上賣櫻桃鐘殘寒雨外鴈沒逺煙中較之明卿子與輩故自勝之寶應湖即事逺水映空浮星分蘆荻洲漁蝦湖上飯簫鼓雨中舟擊楫成孤詠揚帆出亂流春還信可樂前路是揚州贈沈丞之甌寧一官知可薄其奈武夷山正好乘春水悠然出古關縣齋峰影下吏事酒杯間計爾傳詩日初遊九曲還立秋後一日雨中登樓涼雨蕭蕭下江城昨已秋潮聲入官舍山色帶書樓鼓散堂前吏帆歸海上舟喧聲聽晚市聊用遣鄉愁晨詣玉華山摘桂花口占凌晨採花遊蕭然遇山雨登閣啓雙扉新泉響何處江上淒淒江路風曖曖逺村樹愛殺鳴榔人長歌入煙霧孝豐西墟道中澗泉繞屋十里石屋棲雲數家何處微風醒酒溪南紅杏新花發南豐山程細雨桃花店關路長橋楊柳溪何事錦囊朝夕載南豐春色總堪題歐大任三十首大任字楨伯廣州順德人以歲貢選江都訓導遷廣州學正入為國子監博士遷大理寺評事終南京戶部郎中有思玄堂旅燕浮淮秣陵北轅南翥遊梁西署軺中詔歸蘧園諸集汪伯玉云楨伯意氣溢發一歸雅馴可謂治世之音行朱用晦云楨伯樂府近太康古詩師鄴下歌準嘉州間出青蓮語近體羽翼盛唐七言佳境頗類龍標李舒章云楨伯詩如新裁貢錦雖機杼未古而時有鮮藻詩話禎伯吟藁過多先後發雕年分地别不盡流傳嶺外嵗丁酉吾鄉曹侍郎潔躬出領粵東左轄思輯嶺南詩選屬豫甄録豫從楨伯孫博士正式借足本正式請豫持擇稍寬豫束版載歸點以朱墨後數載不知何人竊去深以為憾邇年復理明人詩念之不能釋懷忽從戴生錡書屋見之言獲諸質庫中不禁狂喜因載為施鉛録古今詩三十首吟誦數過似不為濫正式雖墓有宿草亦足慰於地下矣短歌行樂樂自生人窮反本生世幾何倐忽已晚去者日疏來者日親水流同源木生同根父母兄弟豈伊異人况有旨酒云胡弗歡白日冉冉明膏繼夕調軫鼓絲樂我親戚春有催耕秋有促織歲事方勤及此遊息今日同堂明日異鄉聽我短歌心如之何怨歌行髙臺風蕭蕭下澤波湛湛春草緑已萎遊子歲月深駕言御松舟寫我繁憂襟昔來雎鳩鳴今已蟋蟀吟遨遊將安歸弭棹回塘隂代馬嘶隴首塞鴻翔漢南我欲往從之江永思難任佇立睇川塗一寄瑶華音行行采蘭苕聊以紓我心烏棲曲月落未落烏將棲可憐夜夜夜半啼閨中少婦停梭泣淚濕鴛鴦不成匹泊樅陽眺覽盛唐遂憶漢武之遊行役屆皖城放舟下樅陽原隰鬱膴膴江波浩湯湯憶在元封中君王狩朱方大江深且廣及兹一葦航彎弧射蛟臺皇武何可當宸遊事既往六合無回光不見樓船還空餘蕙蘭芳追昔有虞氏恭已垂衣裳聖人重無為君子貴豫防覽古動悽惻延佇增倣徨泛湞江至修仁水尋范雲飲水賦詩處陸陟心苦艱江行意超忽揚舲恣擊汰理榜欣乘筏昔聞范內史於焉自怡悅賦詩散鬱陶飲水辨清淈今遊屬暮春逺放遵南粵三楓睇已遙五渡嗟應沒爰思雊雉馴尚想甘棠茇命駕稅山椒弭蓋依林樾眀霞帶逺巒瑞靄屯崇碣樊薄粲朱櫻原陵苞緑蕨感兹時物遷懼爾芳馨歇代更道豈殊事往迹空揭淒淒懷古吟心賞不可越鴟夷迥泛湖子牟悵懷闕采蘭向中洲眷此何由達沿洄發棹謳愈樂陶嘉月南越武王趙他墓故國多荆榛纍纍帶丘隴北眷天井岡莫辨尉他冡緬惟稱制時中原已雲滃閉關並揚粵畫甸賦秸總閩蠻漸東羈甌駱盡西擁黃屋並漢儀威邊自尊寵陸生踰嶺來班輪再南軵奉藩謹上書正極衆星共桂蠧貢雖入湟溪道仍壅志逺蒿里催運往朝臺聳黍苖被隧塗麏鹿交町畽金鳬幸不飛銀海豈能湧登壟躑躅歌空有牧豎踵誰為雍門彈千秋淚洶洶劉王郊臺五季亂豺虎厯數未有歸南漢驕自王帝粵保南陲白龍表上瑞圜丘祀蒼祇乾亨首紀元升壇列金枝薦德羞幣玉滌牲黷郊犧上帝肯居歆祝史虛陳辭君昏社已屋廢臺委山陂燔柴不復登茂草鞠荒基魯侯昔僭郊已歎周公衰甘泉與雍畤秦漢多陋儀矧兹蛟蜃國禾黍豈足悲十四夜元白維敬見過曖曖天宇豁涼夜皎如練鏡彩未盈規清輝逺彌見先臨太液池却麗昭陽殿須臾出漸髙歷歷指燕甸零露浥金莖嚴更促銀箭登樓枉嘉賔鳴佩總時彥列坐引濁醪行厨愧豐膳盍簪既非偶明德夙所眷共舒南渚情寧羡西園宴鄙劣謝久要期爾回光眄十五夜遲元白維敬玩月昨遊有餘興今賞不可忘况當圓景麗秋中氣清涼披衣坐前楹瑶空已飛光凝華映連觀流輝明洞房夫君幸伊邇䇿馬非異鄉懷賢切飢渴皎皎恆相望願從聆徽音示我以周行端州凱宴行自從大羅山賊來虔劉婦女驅嬰孩千家萬家室如掃倉囷杼軸皆塵埃幕府專征有成算漢軍逹軍勢如電飛符三楚調狼兵五將前驅我軍殿笳鼓長麾入瘴茅空巢不費諸軍箭羽書馳報請芻糧士飽馬肥思一戰西風鐃吹凱歌歸數十俘囚泮宫獻誰知首級半農商血裏淋漓那忍見椎牛釃酒饗歸士纊悍狼兵更愁怨金花錦帳排軍門諸司盡向端州宴吁嗟此事真兒戲曹幕諸山賊猶熾嶺南無歲無征戎願君勿似大羅功三河水三河水萬軍淚淚滴三河水不流胡笳吹落薊門秋河水流不住胡笳過何處誰使十年來移營兩屯戍君不見獷騎已馳牆子關漢軍尚哨熊兒峪次韶州臘月度湞水繫舟韶石間山髙連漢徼樹逺接秦關禹甸通諸粵堯封盡百蠻九成臺下路猶想翠華還夏日同陳世鳴憑虛閣宴集故事南朝日風流憶謝墩薜蘿延翠靄簫鼓送黃昏鍾阜深藏寺玄湖曲繞村帝城瞻王氣猶自護朱門得黃希尹金陵書送君白門去五載尚為郎握手知何日題書問故鄉潮聲江浦鴈秋色石城霜一葉西風外無因到洛陽入峽一峽束江水千峰不可攀廬猶匡氏宅壁擬謝公山有迹遊方外何心出世間儻逢乘鯉客明月棹歌還嶺上謁張文獻公祠南人誰爰立公始相開元忠豈酬金鑑恩空下劔門衣冠通德里桑梓曲江園父老修秦臘還來奠桂尊除夕寓九江官舍餞歲潯陽館羇愁強笑歡燭銷深夜酒菜簇異鄉盤淚每思親墮書頻寄弟看家人計程逺應已夢長安李符卿伯承左遷亳州夜同黎袐書惟敬吳侍御約卿往餞得長字殷勤一尊酒相送意何長薄宦投濠上歸心向濮陽使星珠斗外卿月玉河傍持慰山東客銜恩異夜郎謁文信國祠即柴市故迹憶昔南冠日崖山恨未忘魂沉柴市月淚盡薊門霜白鴈銜江草黃龍逐海航中原冠劒在歌舞待巫陽十月都下感懷寄諸弟生計由來薄兵戈日轉愁鄉書經歲絶客淚幾時收星暗臧宫劍霜凋季子裘老親衣線在辛苦事防秋萬歲山一名百果園五嶽來朝日三山路不迷長楊秦苑北盧橘漢園西珠斗凌空近瑶峰入望齊萬年同聖壽何用訪丹梯龍舟浦簫鼓中流發秋風散浦煙琳池新樂府汾水舊樓船賞勝觀濤日遊非習戰年甘泉思扈從回首濯龍川南臺下有水田村舍先朝曾於此觀稼西內風煙異南臺見水田艱難曾稼穡淳朴自山川農舍朝炊裏江鄉夕照前榖蠶勞睿藻豳雅定同傳同黎祕書劉山人遊西山經玉泉山池亭望西湖並馬今朝路西行訪石經山泉浮鉢緑湖草映袍青積玉迷春澗飛花入暮亭十年江上客煙雨憶揚舲送曾子澄之塞上曾是征南將今隨定逺侯白雲仍漢壘春色過邊州柳拂漁陽騎笳清紫塞樓酬恩知有日談笑看吳鈎九月十五夜月瑶草三秋色金風一夕寒書緣多難絶月在異鄉看淒斷驚霜角遲回望露盤刀頭今未定誰最憶長安曉出玉泉山經西湖玉泉散作鏡湖波聞道宸遊向此過宫闕三山浮弱水樓船千里度星河白麟朱鴈無消息瑶草金芝近若何詞客昔年誇扈從琳池花似漢時多嶺下酬蔣宋二使君見過梅花嶺下幾擔簦敢向中原論代興置驛豈期縫掖貴乘船猶愧孝廉稱虞廷此日咨州牧漢相何人起郡丞聞道長安推轂地歸朝行見璽書徴朝漢臺懷古甌駱猶歸粵河山尚隔秦誰令南海尉終作漢藩臣巴陵劉宗道自吉安與余同舟途中言别雨中同上吉州船分手潯陽思惘然明日思君是何處萬行煙樹入湘川王道行一首道行字明甫陽曲人嘉靖庚戌進士官至布政使有桂子園稿吕二山人自上黨以詩見貽贈此却寄山隂夜雪興何如客去遙天斷鴈書曾許王生重結襪未應梁苑倦驅車林開叢桂香飄席臺倚千峰草結廬遲爾憑髙一杯酒漫從張翰問鱸魚石星一首星字拱辰東明人嘉靖已未進士除行人選吏科給事中坐言事杖為民尋起原職升尚寶司少卿歷大理寺左右丞進少卿出為南太僕卿擢左僉都御史協理院事進左副都御史轉兵部左右侍郎升工部尚書加太子少保尋改户復加兵部削籍有東泉集詩話少保雖與弇州聲應氣求然風雅道逺弇州與陽曲王明甫齊進之續五子之列月旦如是初不為千秋起見止任一時之愛憎而已同穆敬甫舟中作回首雲深薊北臺不緣五斗賦歸來江湖我適扁舟興廊廟君終濟世材寒色侵人鄉夢斷濤聲入夜錦帆開平生擊楫成何事起向燈前歌莫哀黎民表十六首民表字維敬從化人民衷弟嘉靖甲午舉人選授內閣中書舍人出為南京兵部員外終布政司參議有瑶石稿胡元瑞云維敬近體深覯莊嚴類公實而老健過之李時逺云瑶石早受學于黃泰泉其詩自建安下逮齊梁靡所不合和平典雅渢渢乎盛唐遺響敬陳卧子云惟詩清華切秀詩話瑶石詩讀之似質闕而實沉著堅韌元美所取續五子無愧大小雅材者僅此一人而已其在都下偕龍遊童佩子鳴永嘉康從理裕卿江隂鄧欽文徴甫武陵陳思育仁甫新城沈淵子靜南昌楊汝允懋功靖江朱正初在明麻城丘齊雲汝謙盱眙李言恭惟寅無錫安紹芳茂卿蘭溪胡應麟元瑞壽州朱宗吉汝修凡一十三人為西山之遊縉紳韋布各參其半匪徒好事洵勝引也遊仙三首我思忽不愜藐然隘中區凌山度瑶碣肅駕自雲衢遨遊清都闕神猋吹我軀上帝垂藻旒羣后驂龍趨羡門進仙藥王喬授玉書餐和鍊真魄精神遊六虛自握無為寶年壽安足虞濯足紫泥海晞髮朝陽阿雲車載玉女皓齒揚清歌參差麗霄漢玉鱗隱相和駕言憩玄圃貽我瓊樹華光儀忽以逝兹意成蹉跎岧閬風岑泛泛蒙汜波仙才諒非偶浩歎將如何山林非所託所思在神州寓目八紘外經過華池幽神光颯然至青鳥從我遊靈妃奉玉觴清謡自相酬歡娛未終夕曜靈不可留山川敻綿邈白雲良悠悠安得不死藥千載復來求虎頭巖松徑光未黯賞心詎云釋攬勝陟崇崖褰衣履危石雲構方蒙茸乳竇正淅瀝險逾吕梁壑嶄異天井壁仰接驚猱棲俯視飛鳥迹緑帙晝常扃丹光夜逾赩杳杳曛煙生澴澴冬霰積功非夸娥掉竒假巨靈擘棲真事巖耕倩爾飛鳬舄同丁戊山人遊白雲寺流觀遍炎隩結賞自員嶠積陽熙層崖凝隂豁林杪雲構何厜㕒乳竇自窈窕澒洞出谷雲淵渟瑩神沼稍疲暫憩石選勝益躋表欄楯寄躨跜軒窗瞰深窅猛簴發鴻音寶輪晃餘照龕以曇花覆階將蕙草繞詎謂劫灰餘遂成夷原燎棟橈芝菌生瓦坼鼪鼯嘯金薤剝石幢汞藥遺丹銚惠逺豈復招巫陽不可叫蕭辰命良儔蘭觴展竒眺感兹玄運徂念爾沖規劭關河閡舟楫雲雨乖言笑潛虯媚煙霄冥鴻避矰繳勉敦谷口盟無貽北山誚豫告出京師貽同好諸子雙鳬戲中沚羽翼相因依眷言二三子疇昔同裳衣嬿婉未及終雲雨當乖離往嬰鴒原戚今懷機杼悲貞悔難具卜榮賤同一時衆人各有營疇能恤其私君子重明義申以皎日期采擷異葑菲以報瓊玖貽香山寺却月橫香閣祠星隱紺臺殿隨山勢轉池向水源開雙闕浮雲斂千林返照來鶴岑清絶處心賞信悠哉留都幽薊稱巖甸重襟亦在斯尚紆南顧䇿數費北門師霜悴青苗盡秋深赤羽馳誰能如賈誼流涕向明時豫章江行路已經吳越舟還遡豫章洪濤撞逺岸獨鳥下危檣地近長沙濕山連粵嶠長所思非逺道猶復歎殊方同黃淳父登雨花臺髙座翻經處捫蘿試一登羣峰當暮斂萬象入秋澄樹色分蕭寺松風起漢陵傷心烽火日樓櫓在西興楊祠部宅送陳玉叔之淮安故人遙擁傳炫服且還鄉芳草經吳緑清淮入海黃離襟分夜月官燭照西堂祇益風塵夢隨君郢路長峪口翠削龎峰峻髙蟠鳥道孤東西分幕府風土入穹廬牧馬間千匹當關用一夫傳聞漢諸將猶議塞飛狐紫荆關徑轉蛇盤險雲連鳥去長山桃微著紫沙柳不成黃重鎮臨天府神功劃大荒金城誰獻議老作尚書郎橫翠樓元將髙樓當絶塞春望轉氤氲百戰全燕地千重大漠雲控弦無掠騎飲羽憶將軍老去親戎馬悲笳向夕聞别吳而待戀闕心仍在還家路不迷淒涼弔古意疲馬入青齊友芳橋隔浦風煙暗桃花自不迷壺觴憐小阮時向竹林攜趙用賢一首用賢字汝師嘗熟人隆慶辛未進士選庶吉士除檢討以建言杖為民起春坊贊善歷南京國子祭酒升南禮部侍郎召還改吏部卒贈禮部尚書諡文毅有松石齋集陪祀昭陵紀事有作瑶壇晴雪淨春空劍佩聲沉苑路東霜露每勤憂聖主貂璫無復肅齋宫通原燎火分宵白拂樹霓旌映曉紅寂寞翠華誰望幸惟餘金粟鳥呼風李維楨四首維楨字本寧京山人隆慶戊辰進士選庶吉士歷南京禮部尚書有大泌山人集詩話本寧如官厨宿饌粗鹿肥麋雖腒䐹具陳鮮薧雜進無當于味太和雜題文祖初封嶽經營十二年景光如有見議禮不相沿畚臿三軍舉泉刀九府捐龍􅐖垂過膝象帝髮鬈然南都三首舊邦偏霸一隅雄帝命維新自不同再闢乾坤清朔漠雙懸日月啓鴻濛春開蒼震青陽後斗直黃旗紫蓋中率土王臣修職貢江流萬里亦朝東親提三尺渡江來宇宙東南帝業開不盡風雲生沛澤方升海日見蓬萊河山兩戒朝宗地草昧諸臣將相才髙廟神靈時出王龍文五色正昭回旌旗劍佩擁椒除尚想戎衣革命初緑草不侵雕輦路紅雲常護紫宸居金銀宫闕三山外煙雨樓臺六代餘誰謂長江天作塹八荒今日共車書屠隆九首隆字長卿又字緯真鄞縣人萬厯丁丑進士除潁上知縣調青浦升禮部主事歷郎中有由拳白榆采真南遊諸集陳卧子云緯真詩如衝煩驛舍陳列壺觴頃刻辦就而少堪下箸詩話長卿才非不髙而縱情奔放記云不知所以裁之者也彭城渡黃河彭城臨廣岸俯仰霸圖空白日照殘雪黃河多烈風所嗟人向北不似水流東回首滄溟曲山山雲霧中北地不識漁陽路愁心莫問程大都行曠野偶爾見荒城原樹衝人立氷沙映日明但逢茆店宿明發又孤征潞河晚泊回浦落帆盡長堤帶郭斜莫煙平吐樹春雨薄沉沙白艇藏漁市黃茆覆酒家一瓢雲水外不復問年華江北謡千錢與唱歌百錢與賣酒本是青州人家住黃河口江南謡日落晚天碧潮來江水渾漁燈楓葉下不覺到柴門竹枝詞二首木槿編笆土築牆田家住在水中央四月穿綿六月冷門前夜夜稻花香水仙愛種水仙花一灣江水廟門斜女冠夜送小姑出四野無人好月華真如寺招提信宿十年前香飯清齋不取錢佛首藤蘿僧舍雨重來歲月總茫然渡黃河野曠天隂日欲西北風吹雪鴈行低黃河渡口行人少一路寒沙沒馬蹄魏允中四首允中字懋權南樂人萬厯庚辰進士除太常博士遷吏部主事有仲子集舍弟東視海上諸郡余西歸共被復今夕分攜在今朝子車向北海我馬投西郊疾塵蕩山郭密樹回河橋相望忽相失憂來不假招芳華色黯淡鳴鳥聲蕭條加餐縱努力何以慰寂寥舟中贈泰峰先生漢署髙題柱周官藉理財詔從雙闕捧帆渡九河來驛路霜楓盡家筵露菊開無令淹使節東閣正憐才周生歸黃州涼風吹客帆落日過湖南握手空相送離心不可堪片雲縈楚岫一葉下江潭何地偏相憶朱家酒夜酣寄周元孚為郎仍被謫世事那能知才子原無罪明君未有私楚鄉芳草日江路落花時五嶺流人遍非君獨可悲胡應麟八首應麟字元瑞更字明瑞蘭溪人萬歷丙子舉人有寓燕還越計偕巖栖卧遊兩都蘭陰邯鄲華陽養疴婁江白榆湖上青霞等集合為少室山房稿王元美云元瑞才髙而氣充象必意副情必流暢歌之而聲中宫商覽之而色薄雲漢以比開元大歷亡勿合也兒王敬美云元瑞力追大雅絶不為柔曼浮艷女子之態故其詩多感慕意氣敦篤友誼有燕趙烈士風大曹子念云元瑞詩洪纎近逺觸手成象必麗雅骨屠長卿云元瑞近體無音不亮無思不沉無不徑要其變化離合不盡出於于鱗也陳卧子云元瑞如中賈張肆不皆珍異却無物不有又如老樂工清濁輕重都傳弟子詩話長律至百韻已為繁富矣元美哭于鱗乃增益至一百二十元瑞哭元美則更倍之蓋感知已之深不禁長言之也詩藪一編專以羽翼巵言壇坫既衰詆諆百出而少室山房筆叢沉酣四部自不失為讀書種子詎可因詩藪而槩斥之乎雜詩曜靈薄崦嵫光景忽已夕圓魄猶未升明星爛然出寒蛩號我前蟋蟀鳴我側涼風起庭戶樹木何蕭瑟佳人期不來延佇空歎息寧知三歲心為子長惻惻秋日偕同志遊金華屈子歌逺遊尚平有遐慕顧謝青雲人言尋赤松路歷覽窮幽深冥探愜情素澗壑捫嶔岑林巒涉回互崖傾黃葉積谷轉垂蘿護髙峰散餘靄峭壁屯寒霧娟娟初月升隱隱微陽暮長謡欽昔蹤獨往懷蹇步慮由忘物超道以遺榮悟迹契容成公神交子支父徘徊北山文惻愴淮南賦眷彼丘中人回飇對巖户贈髙深甫最憶髙常侍生平樂事饒千金求騄駬十院貯紅綃古迹留三代新聲和六朝湖頭明月滿無夜不吹簫自嚴灘至新安途中紀興一灘髙一丈諺云一灘一丈新安天上灘盡到天都疊嶂雲飛動隂崖日有無辛夷殘紫落躑躅亂紅敷獨少行雲廟分明入峽塗出塞曲大獵漁陽罷椎牛上谷營酒闌飛騎去夜奪受降城胥口落日溪水寒漾舟殊未已西泠何處村望望茶煙起寄江蘺館朝夢江蘺開夜夢江蘺落如何二十年不到江蘺閣塞下曲平沙一望隴雲開玉笛飛聲夜轉哀萬里朔風吹不斷梅花齊落李陵臺王世懋四首世懋字敬美太倉州人世貞弟嘉靖己未進士除南京禮部主事遷尚寶司丞出為江西參議歷陜西福建提學副使升行太常寺少卿有奉常集穆敬甫云敬美逸氣縱橫詞采豐蔚外胡元瑞云敬美拔新標於四家七子之徑逸遒爽宗吳謝李方之蔑如以配哲兄誠無愧色李舒章云奉常詩如烏衣羣少粗有風格不足對揚父兄詩話敬美才雖不逮哲晜習氣猶未陷溺初夏田家本愛園林居遂與塵世隔欹枕過鳥啼初陽在簷隙攬衣臨前除遊目恣所適藹藹千樹交紛紛里煙白清渠已新苗髙壟尚餘麥雀乳深茅茨魚防間萑澤野夫荷鉏語小婦當窗䌟周覽物候齊憺焉忘朝夕薄暮池上歸苔痕亂深屐人日袁考功見過今年人日百不娛客遊金陵家在吳金陵春事亦不薄有官何似當年無清溪館前日欲晡誰其過我袁大夫喜是舊日髙陽徒十千斗酒不用沽牀頭春甕足百壺春隂滿地雲糢糊渡口桃花未著葉門前楊柳難藏烏金陵少年紫驪駒有酒只過秦羅敷飛光荏苒歲易徂二毛便欲侵頭顱男兒才拄馬曹笏河山已限黃公壚仰天且莫歌嗚嗚尊中酒盡可復呼霜落烏啼更明日摧睂還向府中趨廬山雪朝日照積雪廬山如白雲始知靈境杳不與衆山羣樹色空中斷泉聲天半聞千崖氷玉裏何處覔匡君逢友歸來雙鬢兩蕭然見畫猶能記昔年風雨一船曾泊處借人燈火草堂前王錫爵三首錫爵字元馭太倉州人嘉靖壬戌賜進士第一纍官少保兼太子太保吏部尚書建極殿大學士贈太傅諡文肅有集詩話元美標榜詩人於五子四十子外以其弟敬美及文肅稱二友焉題成祖四駿圖録二首龍駒玉勒繡纒鬃天廄出真龍報恩茍得所寧論劍戟鋒是時元戎方首路霜毛血濺仍馳騖將軍抽矢前致詞願言不忘射鉤時飛兔白溝昔合圍龍駕忽三易不成玄武陳寧標飛兔迹髵䰄漬血汗成珠此時七萃紛前驅即今宛馬西來道試看茫茫白溝草壬辰秋日髙郵待詔即事慚愧春明别依然物色新風雲真遇主骸骨豈謀身市駿黃金盡籌邊赤羽頻總關遊子念其奈倚閭人明詩綜卷五十二
