body:
  text: 明詩綜卷六十五翰林院檢討朱彛尊編李流芳十一首流芳字長蘅嘉定人萬厯丙午舉人有檀園集山中喜張魯生至同㝷熨斗柄坐湖邊竟日而還偶作貪㳺不知止足力疲屢試起晩日當午偃曝聊自恣忽聞故人來發我湖上意出門何翩翩兩足殊快利嘗聞熨斗柄頗怪此名異昔年過其下髣髴已忘記今日天有風湖山想竒致相與歴西磧山窮見湖勢沿流正縈紆撫石得小憩飛湍擊嶒􅗆穹壁立贔屭洗出如削成斗絶畏崩墜閃爍絢丹堊剥落疑文字傾厓側足過隂壑縁藤縋燕磯與黿渚生平快游地遂儗兼勝槩怳忽理夢寐髙歌遏水聲浩蕩入胷次吾欲乘長風悠然向天際惜哉多舟楫使我不得濟過皋亭龍居灣宿永慶禪院同一濓澄心恒可上人步月每多方外㳺見僧即如故燈明一龕下夜長愜深悟不知山月上千林已流素出門㝷舊蹊愛踏松影路幽泉洗我心微鐘杳然度戲示山中僧侣山居不須華山居不須大所須在適意隨地得其槩髙卑審燥濕凉燠視向背樓閣貴軒翥房廊宜映帶或與風月通或與水木㑹卧令心神安坐令耳目快皋亭美林壑中墖亦稱最一樓負山立圭竇如向晦山僧請余住余性苦不耐勸令開八牕咄嗟變湫隘前楹布清隂後户攬蒼靄玲瓏稱人意蕭爽出塵界囅然謂山僧此中固有解往往住山人不知山好在我昨居新菴結構亦可怪居然仇凉風似欲杜靈籟古梅如老宿亭亭使人愛其下安竈突柯條半焦壞悲哉氷玉姿坐受熏灼害見之熱五内如身被桎械誰當共拯此移竈出樹外面南闢小扉日與香雪對區區一緡費功徳及萬倍吾言不見用終為未了債訪秦心卿溪上嬾園不遇有作溪上好園亭君家聞最勝經過已卄年今始識三徑翳然臨水間愛此飛閣映位置不在多貴與風物稱主人意疎豁事事得真性我來不相值維舟栁邊暝見戴自無須悠然發孤詠贈别洞庭葛實甫我懷洞庭月欲醉莫釐峰幽意乆不愜髙人今乍逢新詩正堪把歸櫂阻相從却羨秋山下丹黄已萬重黄河夜泊明月黄河夜寒沙似戰場奔流聒地響平野到天荒吳㑹日已逺燕臺路正長男兒久為客不辨是他鄉訪慧法師於皋亭桐塢作不見皋亭慧法師每勤書札慰相思蹉跎又作三年别慙媿終無一往時忽憶虎溪成舊社且㝷茅屋賦新詩闗門短櫂衝炎去黄鶴峰頭月上遲元夕雨邀里中諸君小飲檀園燈下次伯氏韻花邊樓閣月邊廊更愛繁燈照夜光雨氣無端先客到檐聲應為和歌長城頭結綺人俱散邨裏迎神鼓不忙且盡一杯酬令節泥深門外亦何妨為陳維立題輞川畫吾愛華子岡輞川流日夕如何舎此去傷心賦凝碧雨中看梅西磧即事邨園門巷逐花低藤蔓桑條咫尺迷花底泉聲認歸路沿流直到石橋西題畫似雪嶠師千峰頂上只通雲一水人家别有邨直到前山蘭若路清鐘落日不逢君成靖之一首靖之初名基命字毖于大名人萬厯丁未進士改庶吉士授編修累官吏部侍郎進尚書入東閣加太子太保禮部尚書文淵閣大學士贈太保諡文穆有雲石堂集送劉紫芝南還逺别人情惜君歸更若何匡時憐道直涉世患才多路栁催春去江風拂櫂過還應逢雨露且莫怨蹉跎錢龍錫二首龍錫字稚文號機山松江華亭人萬厯丁未進士授編修歴中允諭徳以少詹掌南京翰林院升禮部尚書東閣大學士召進文淵閣加太子太保致仕歸㝷逮繫詔獄論斬得釋戍定海衛乆之還里卒于家有兢餘存稾靜志居詩話公始入閣思陵命定附魏璫諸逆臣案出黄羅囊示之且曰忠賢一豎何能為皆外庭力為諂䛕至此囊中章疏悉媚奄人實蹟也公乃取以論罪分别重輕凡六等又慮罪人狡辯因請於諸臣姓名下各注所犯俾服其心逆案既定黨人銜怨刺骨袁崇焕經畧遼東入見帝大言期以五年奏功公疑焉退而詣之曰子方略將何如對曰不外東江闗寧雨路進兵爾東江者島帥毛文龍也公曰舎闗寧實地而問海道何與對曰譬如奕然局有四子東江其一也可則用之不可則有以處之崇禎二年五月崇煥行邊至雙島召文龍至以餉金十萬犒其師自與文龍登舟相視山海形勢酒間勾隊島帥麾下以邊警報者踵至崇煥乃疑曰吾軍亦有偵探卒何以不一至此速吾行爾起數其跋扈拔尚方劒斬之聲其罪置帥而返全軍莫敢譁也及大安口失事都城被圍崇煥勤王師至廷臣多言崇焕之殺文龍隂為主款地思陵大疑㝷有㫖俾縋城入下之獄訊叛狀於是御史髙捷劾公與袁同謀崇煥既誅御史史􅒇劾公逮繫詔獄論斬有司設厰於西市將用夏言故事既而緩决左中允黄道周給事中劉斯琜先後為公訟冤得釋戍定海衛居戍所九年乃還崇煥之死詳載本朝實録操史筆者不可不知初入翰林述志皇風被奕葉師濟協重熙妙選金閨彦登兹白玉墀慚予蹇劣士何幸沐恩私就將彌日月摹範承師資雕蟲既云拙温飽匪所思獨此葵藿心耿耿誓不移念昔皇祖日講藝恒孜孜天顔瞻咫尺宻室奉疇咨衮徳信多補臣忠實在兹顧問久寂寞簪笏徒委蛇四郊漸多故啓沃効者誰所願回宸照堂亷路不岐題豳風七月圖國本民生繫深思草昧存淳風懷墐户美俗寫朋尊卜洛從何始承邰信有源艱難開聖主告誡切文孫拭目丹青麗賡歌雅什温思隨工瞽誦欣望闢虞門楊漣一首漣字文孺應山人萬厯丁未進士除常熟知縣徵授户科給事中厯禮科都給事中升太常少卿擢右僉都御史進副都御史死璫禍贈太子少保左都御史諡忠烈有集詩話六君子被逮周朝瑞袁􅀈顧三公以五月到北司魏楊左三公以六月到北司比較之日六君子伏檐溜下楊居中左居楊之左魏居楊之右顧居魏之右周居左之左袁居周之左許顯純初猶作爾汝稱旋竟呼名叱咤獄吏有稱犯官者顯純怒罵曰此等犯人爾何官之有其刑具有械有鐐有棍有桚有夾棍遇比較流血灑地楊左魏三公先斃次袁次周次顧投繯而逝是年六月詔獄土地祠前樹下生一黄芝六君子至日光彩映人環視適六瓣見者疑吉兆顧公歎曰芝瑞草也而生於獄其妖乎未㡬六君子皆斃於獄楊公之歸櫬也負以二騾其子及一二蒼頭徒跣道上行路皆為飲泣云題柏子園青芸閣官閣凌空汶水深金飇初動客登臨浮雲易改三山色落葉先驚萬里心江上美人遺雜佩城南少婦拭清砧繁臺兔苑今禾黍日暮憑闌思不禁左光斗一首光斗字共之桐城人萬厯丁未進士授中書舎人擢浙江道御史升大理寺丞進少卿終左僉都御史死璫禍贈太子少保右副都御史諡忠毅有集詩話萬忠貞之死忠毅哭之以詩有云我有白簡繼君何能已與君同㳺杖下矣丹心留在天壤間默默之生不如死是亦不媿其言者也詩多晩唐風韻如濕雲留野樹晴雪照征衣凍犬迎人返飢烏下食齊一觴邀老友隨意發新歌過雨煤錢長將炎水價添野牆藤盖瓦村落樹為橋問節驚初度思親改嵗華疲驢衝道路破㡌出都門宛然鄭都官姚少監遺格憶龍眠山居卜築傍龍眠雲深一徑穿源窮纔見屋山盡忽開田芋栗新栽得芻蕘任往焉笑余縁底事一别動經年顧大章一首大章字伯欽常熟人萬厯丁未進士除泉州推官改補常州府學教授稍遷國子博士轉刑部主事歴禮部員外郎出為陜西按察副使被逮卒于獄贈太僕寺卿諡裕愍詩話楊忠烈攻魏忠賢人疑具草者繆文貞王莊毅攻客氏人疑具草者顧裕愍此兩公所以不免也裕愍與弟大韶仲恭詩義妙絶時人詩特具體而已被逮道經故人里門檻車塵逐使車轅一路知交盡掩門猶喜多情今夜月斜窺樹隙照離尊李標一首標字建霞髙邑人萬厯丁未進士改庶吉士除檢討累官太子太保禮部尚書文淵閣大學士題梁慎可墨香亭古様蕉衫白接䍦芳亭長日坐支頤焚香自悟無生訣拈筆閒摹有道碑竹韻松濤清自逺花觚茗盌靜相宜近來愛寫黄庭否好換新鵝浴小池許令典一首令典字稚則海寧人萬厯丁未進士官至淮安知府有靈泉蠃史集詩話稚則一官不達意薄淮陽散髪歸田陶潛之屋不豐范蠡之舟偏小籃輿竹杖紙帳繩牀雅饒樂趣所云愛官何似愛吾廬也詩取適意無意求工葢本於香山擊壤題陳平叔陋巷狹巷難容旋馬小池也愛籠鵝客來兒子教揖興到老人自歌馬徳灃一首徳灃字以容平湖人萬厯丁未進士改寧國府學教授入為國子監博士遷刑部主事歴郎中卒贈太常少卿曹園讌集名園成勝引畫榼出疎籬不厭杯頻勸何妨席屢移暮煙停客櫂宿雨亞花枝興劇忘歸去娑拖月上時鄒維璉六首維璉字匪石江西新昌人萬厯丁未進士除延平推官徵授南京兵部主事歴員外郎中改吏部坐削起南京通政司參議遷行太僕少卿以僉都御史撫福建終兵部右侍郎有願學編宦㳺友白導噫等集述懷羶塗難乆居盛名寧乆留所以鴟夷子五湖一扁舟應無雄辨士俯狥燕客求四時忌成功急湍無安流美服人所指權利倍添憂古意百年苦瞬息人事復乖違園中桃與李安能久芳菲天風埽枯葉北雁忽南歸嗟我行役人年年戍金微觱㮚自西來游子未授衣嚴霜墮闗塞明月照孤幃兩地共揺落兩情共欷歔秋興鴟梟得腐鼠輒以嚇鵷雛鵷雛飲清露髙飛棲碧梧飄然樊籠外野性常自如鴟梟即飽食能無畏張弧古云鹿生山命已懸庖厨達人訪物理深藏賦遂初初至夜郎逺戍天涯事可悲疎狂真負聖明時誰言鴻鵠能千里差喜鷦鷯託一枝草野數懸丹闕夢鄉園空望白雲垂髙山流水情堪詠已擬埋名老下帷閨怨妾恨憑誰寄君懷祗自知堂前雙燕子嵗嵗赴春期陌上偶成青青道傍栁轉眼忽成圍男兒客他鄉不知嵗月非徐從治一首從治字肩虞海鹽人萬厯丁未進士除桐城知縣改府學教授轉國子助教遷南禮部主事歴郎中出知濟南府以山東按察副使分巡兖東以布政司右參政分巡濟南加右布政使請告歸起薊州兵備道㝷加左布政使復移病歸再起山東武徳兵備道超拜都察院右副都御史巡撫山東萊州被圍中飛礮死事聞贈資善大夫兵部尚書賜祠曰忠烈有集詩話徐公平白蓮賊擒其魁徐鴻儒脅從四萬六千餘人悉赦罔治其奉命鎮撫山東詔駐青州而公以叛軍將掠萊州特與防撫謝璉治守城具三宿而兵大至固守七月為礮石碎顱殞於城上合乎以死勤事之祀典矣公孫曰全曰令均有文采以公遺詩三篇見示因録其一反覆誦之不異張中丞接戰春來苦孤城日漸危裹瘡猶出陣飲血更登陴之句也入萊州城被圍作崇禎五年春帝命師中錫俾撫大小東星言事羈靮於時二月朔告警馳羽檄叛軍無安巢掠地恣所歴萊牧實要衝羣兇首矍踢雖有防守臣敝甲同袒裼詔許駐青州欲往寸心惄萊民亦吾民不忍付焦溺單車指危邦夫豈尚沽激須㬰寇果臨疾風走沙礫孤城露南隅三面受鋒鏑雲梯匪一層地道發重甓捷如猱升木多於螘縁壁穴以穬熏尸臺縱火燔荻相隨八十騎騎騎奮長􅀈自顧一書生乃當萬人敵援兵絶蚍蜉礮石轟霹靂誰與生厲階失計遂貽慼一星燄不撲燎原衆斯惕兩葉生不除須用斧柯析奈何肉食謀議撫不議擊養癰久必潰累卵危終殈哀哉此邦人何讎委虺蜴效死職所甘智已窮墨翟沈聖岐二首聖岐字千秋烏程人萬厯丁未進士除工部主事歴員外郎中出知濟南府送閔昭余出守漳南閩南虎竹三千里苕水漁村二十年别後相思夢何處刺桐花發海雲邊即事送呉翁晉百尺飛絲送栁花青春欲暮未還家揚鞭忽到鳴箏處一笑初停白鼻騧錢文薦二首文薦字仲舉慈谿人萬厯丁未進士知新野宜春二縣入為工部主事有麗矚樓集詩話仲舉論詩升少陵於堂置之首座青蓮次之髙岑王孟又次之餘子隅坐侍酒而已自謂吾輩於此不可不占一坐否亦湏坐兩廡中聆鐘磬管絃之盛然觀其製作未免懦鈍譬之於樂僅比於柷敔椌楬焉爾至駮顧茂齊謂少陵詩窮後工以為非是詩至少陵窮固工不窮亦工也斯言得之月下懷馮正子太史夜坐林木清見此池上月羣峯忽已淨孤雲澹將没愁深白鷺渚夢斷蒼龍闕望望曙河遥思君不可越山居雜興自埽閒房卧能令俗慮輕披簾邀乳燕挈榼赴遷鶯海味梅魚滑山毛竹筍清湖天思盪槳恰喜報新晴趙崡一首崡字子函一字屏國盩厔人萬厯已酉舉人詩話子函好古撰石墨鐫華闗中金石藉其題識詩不見醜尚存康王遺格茂陵黄山歴盡見孤城城上樓髙眼倍明芳樹寢園今北望暮雲宫闕舊西京芙蓉晝冷仙翁露苜蓿春閒宛馬聲回首長楊誇獵地何人得似子雲名韓敬一首敬字求仲歸安人萬厯庚戌賜進士第一授修撰㝷謫行人司副題南陔山房碧山初築澗之濱選石疏池位置新坐守庚申偕道士橋名丁卯續詞人深情只託支頤笏時様爭傳墊角巾縱是漁師魚不賣暇從秋浦戲垂綸張慎言一首慎言字金銘陽城人萬厯庚戌進士官至吏部尚書有泊水齋集過洹水將入里有懐長安古人洹水纔過丹水流客愁爭似水悠悠汀洲緑映征𫀆淺桃李香迎語鳥柔耽靜計將書卒嵗懷人豈但目三秋歸來鄉里都如故晚計方思馬少游王志堅一首志堅字淑士崑山人萬歴庚戌進士官郎中寄長蘅吾觀仕宦人每每念丘壑雖復非真實兹意或間作譬如酒食困番思茗飲樂病茍稍稍去旋復恣饞嚼嗟余困折乆本自甘濩落兹㳺非得已黽勉就人爵人生能㡬何胡為乆熏灼寧為沙上鷗毋取籠中鶴尹嘉賓二首嘉賓字孔昭江隂人萬厯庚戌進士授中書舎人升兵部員外出為湖廣提學副使有焚餘集舟泊惠山夜坐思琴昔年與之子把酒對瑶琴明月蒹葭浦秋江楓樹林擣衣中夜緩落葉萬山深悵矣誰能理烟波不可㝷江上雜詠河豚雪後春還淺刀鱭風來水已波擕酒江邊吹笛坐看山何處出雲多莊起元一首起元字中孺武進人萬厯庚戌進士除浦江知縣調蘭谿遷南户部主事歴員外郎中出知撫州府官至太僕少卿有漆園卮言紫霞洞石室何寥廓蜿蜒信地靈洩雲終古白豔草自然青軒帝藏神鼎淮王貯道經翛然來物外思鍊羽人形鄭之文一首之文字應尼南城人萬厯庚戌進士授南京工部主事歴郎中遷知真定府有逺山堂錦硯齋集金陵元夕花下燈前出畫裙衣香一路暗氤氲不知南陌人如月但道東門女似雲王象春十首象春字季木濟南新城人萬厯庚戌進士除上林苑典簿遷南京大理評事歴工部員外改兵部終吏部郎中有問山亭集詩話萬厯中年詩派雜出季木自闢門庭不循時習雖引闗中文天瑞為同調然天瑞太支離未免邪徑害田矣未若季木之無戾羣雅也題項王廟壁一篇比於謝參軍鴻門作更覺遒鍊亡友潁川劉考功公㦷亟賞之㡬於唾壺擊缺此非邪師外道之傳也山老鴉山老鴉朝東暮還西過河拾杜棃日晩腹飽不歸去繒繳已伏河邊樹爾腹已飽爾不知飽人之腹良足悲打棗竿打棗竿光瑩瑩廣韻永兵切岸上小兒赤身擎去而復來無時停終日剝啄不盈升低枝已盡髙枝熟我竿恨無三尺六空城雀空城雀飛且止不營棲巢不哺子相呼莫向網羅死書項王廟壁三章既沛秦川雨入闗又縱阿房炬漢王真龍項王虎玉玦三提王不語鼎上杯羮棄翁姥項王真龍漢王鼠垓下美人泣楚歌定陶美人泣楚舞真龍亦鼠虎亦鼠送友人郭外溪邊寺年來兩送行攀條猶在眼落葉已無聲憶昔春山色能輕故國情好將詩酒約歸問魯諸生謁岳武穆廟衰草寒烟日暮時傷心瞻拜岳王祠君王自得偷安計臣子應班痛哭師東海未填精衛死南風不競杜鵑知由來和議非長策千古英雄恨莫追硤石懷古即崤陵真成箭括與車箱猶是千年古戰場想像國殤思蹇叔時因風雨憶文王楚人一炬曽輕入薊馬長驅亦未防三復青蓮蜀道曲休令所守化豺狼石城月金陵王氣未曽消水泊秦淮江上潮月到石頭城下好碧雲紅樹聴吹簫山家山家香穄飽椿芽雨歇籬傍自種花割麥績麻旋剝棗一年三度坐牛車不落夾慈寧宫裏佛龕崇瑶水珠燈照碧空四月䖍供不落夾内官催辦小油紅馬之駿三首之駿字仲良新野人萬厯庚戌進士除戸部主事歴員外郎中降廣徳州同知升應天府通判調順天㝷復官户部主事終員外有妙逺堂集詩話仲良才頗縱横㣲嫌圭黍未合十方禪院何處堪消夏非山即水鄉樹深渾欲暝花近反無香欲晩波難緑迎秋木漸蒼市譁原未逺烟景乃微茫秋日草橋作白屋邨邨度青帘面面迎野溪殘雨入側樹早隂生棃棗過橋色雞豚近市聲未論丘與壑出郭已多情送劉四别酒呼還輟欷歔百感俱兩年何事隔明日此身孤秋水殘城郭清霜點驛塗故鄉歸總好髙㑹復能無陳翼飛十五首翼飛字元朋平和人萬厯庚戌進士除宜興知縣被劾歸有慧閣長梧二集巳未庚申辛酉壬戌行卷詩話元朋牽絲百里遽挂彈文坎壈終身賴詩篇以陶冶集甚繁富㡬與明卿伯玉爭多史取一編惜乎未就觀其解組記自述與韓求仲偕㳺金山有詩僧慧秀攜沈孝亷虎臣札來謁韓中稱引宜興呉徹如觸韓怒嫚罵吳不絶口以慧秀詩挂松枝上斥而遣之慧秀訴之於呉時沁水孫尚書居相以御史督運漕呉嗾孫劾之代為草奏辭連鄒臣虎湯嘉賓黨禍既成元朋一跌遂不復振矣近見後學與求仲臣虎元朋皆同籍而所選詩槩削去不録嗚呼桑海既遷猿鶴沙蟲悉化而雌黄藝苑者黨論猶不釋於懷可為長太息也齋居白水浮官舎青山塞縣門案頭塵未積麈尾秃猶存莽莽雲中樹瀟瀟雪後邨齋居春事少農務與誰論温陵道中九日山前路登臨病未能煙蘿從皛皛雲樹㡬層層豹犬柴門月人魚海市燈不堪聞杜宇匹馬過温陵悵望寂寂何多緒憑髙魂易銷疎鐘蕭寺雨逺樹海門潮秋月七千里春風廿五橋愁來頻徙倚蹋破小山寮大湘灘遮莫上瞿塘灩澦大如象不見建溪石連亘三千丈甘露寺山色乍有無江光遞明滅夕陽大道傍行人讀殘碣清湖舟中枯柳霜中鵲長烟雨後山人來吹笛罷獨立碧溪灣落星石白榆何夕墮危石青如此疑是酒星沉渴飲湖中水馬當廟鼓持芭舞蠻歌日易斜分風能送客不忍打神鴉檀公壘故壘青仍在符鳩白不飛長城他日壞衰草夕陽歸横江館横江館外雲津吏莫東指但為放舟行風波日如此赤欄湖朝泛赤欄湖暮宿黄金浦多少采菱船來問襄陽估武昌西門郎採白蘋花儂開青箬酒夜宿武昌城朝折西門栁上元夜别金鴈欹斜記昔年輕籠慢撚最堪憐四條絃索無端絶一夕春風也颯然茘支詞梧州四月火山紅南海丹時黄雀風不及閩中焦核好定應饞殺葛仙翁無題二月長安醉是鄉青樓繫馬拗垂楊可憐韋曲花如錦惱殺相思賀二孃賀萬祚一首萬祚字孝延嘉興人萬厯庚戌進士授刑部主事調南禮部轉郎中再調兵部出為山東提學副使歴福建參政廣西按察使以江西右布政使分守嶺北道有大業齋集陳孟常云孝延詩寫情性質有其文周侍御行部蘭臺使者舊知名攬轡從容江海情抗疏共看任伯雨行軍還擬趙營平五花驄馬巡周道三輔黄圖歴漢京不獨艱危憂水旱前籌更欲請長纓朱大啓四首先伯祖字君輿别字廣原萬厯已酉以秀水籍順天鄉試中式庚戌賜同進士出身除南昌推官擢吏部主事歴員外郎中崇禎初升太常少卿轉太僕卿再轉大理卿遷刑部左侍郎贈尚書有曼寄軒集詩話東漢風俗之厚期功之䘮咸得棄官持服如賈逵以祖父䘮戴封以伯父西鄂長楊弼以伯母繁陽令楊君以叔父上虞長度尚以從父渤海王郎中劉衡以兄思善侯相楊著以從兄太常丞譙𤣥槐里令曹全以弟廣平令仲定以姊王純以妹馬融以兄子皆以憂棄官輕舉至晉而嵇紹拜徐州刺史以長子喪去職陶潛以程氏妹喪自免作歸去來辭自是而後古之道莫之行也先伯祖掌銓東曹聞先文恪公之訃請於朝乞歸持服徳陵允焉當時典禮者亦不以為過斯國史所當附書於禮志者此事尚未百年今則父母之䘮有不去其官者矣先文恪以宰輔歸所遺僅墓田七十畆先伯祖五倍之恒曰吾官階三品而恒産倍蓰於保傅死何以見叔父地下鄉黨傳其言數清門者必先吾朱氏焉先伯祖晩愛結方外社與秋潭萍蹤雪嶠諸法侣㳺更唱迭和故曼寄軒集禪誦之言居多良鄉除夕時改嵗元旦崇禎紀元是日立春古驛逢今夕他鄉對故人椒盤囊底舊霜鬢客中新守嵗剛辭臘乾元早布春聖恩方浩蕩何必歎風塵經海印廢寺我行海子橋不見鏡光閣惟有青蓮花凉風吹又落自信州還貴溪小艇恰容膝輕㠶下溜灘忽聞津吏語斜月挂江干黄巖道中萬樹棃雲白滿山桃花㡬㸃破紅顔春風榖日黄巖裏數遍峰頭不肯還郭忠宁一首忠宁字藎卿吳縣人萬厯庚戌進士除刑部主事歴郎中改工部出知河南府調台州道湖廣按察副使終陜西右參政有也園詩稾渡江飄然一櫂泝空明日午春潮尚未生回首江南増客戀新晴鐘鼓潤州城崔世召二首世召字徴仲寧徳人萬厯巳酉舉人知連州有秋谷集詩話崔君令巴山有為魏璫祠請頌徳詩者峻拒之遂被逮入都下獄崇禎初釋還補官桂東㝷司浙中鹺務詩頗清徹無塵坌氣昔昔鹽妙舞低垂手聴歌昔昔鹽閨人雙淚迸遊子五湖淹水餞春澌去堦延月影潛嬌鶯藏樹澀弱栁覆堤纎西舎徴簫板東鄰豔鏡匳燈孤煤漸剔被冷夢難懕雁過衡陽斷雞催鼓角嚴碧桃花又落蒼蘚逕仍添帶減驚投玦釵塵罷卷簾從來音信杳怕問卜書占昔昔曽相約頻將舊語拈重九章江門守風有賦時將被逮黑雲照空秋氣昏章江城外逆水渾封姨鼓浪掀江豚招招舟子亦銷魂酒罷問天天不言野雞午叫黄花村誰家買醉登髙原我已挂冠君落帽擢髪數罪難具論孫元化一首元化字初陽蘇州嘉定人萬厯壬子舉人從軍贊畫由兵部司務進職方主事天啓末閒住崇禎初起武選員外郎歴官都御史巡撫登萊吳橋兵變坐失事論辟有水一方人集詩話初陽慷慨從軍歴三獨坐當崇禎初召還有兩頭蛇見里居樂在堂之南軒賦詩而行詩中自况卒成妖讖其外孫侯開國語余公遺集凡百卷詩僅存數篇録之以當志怪兩頭蛇吾聞兩頭蛇其怪不可弭昔賢對之泣而我翻獨喜喜者意云何以我行藏似蜿蜒不留停奔赴孰驅使當南更之北欲進掣而止首鼠兩端乎猶豫一身爾蛇也兩而一相牽無窮已混心腹腎腸各口頰脣齒畢生難並趨終朝不離咫伸屈匪自甘左右何能以豈不各努力努力徒縈絫殺一誠便一一殺一亦死兩存終奈何聴之造物理李衷純七首衷純字𤣥白嘉興人萬厯壬子舉人選授如皐知縣升南工部主事轉兵部員外出知邵武府終兩淮鹽運使有激楚齋草黄貞父云𤣥白詩博通而裁練藻麗而瞻達上湖建安下逮大厯可稱通才學李本寧云𤣥白為如皋令治聲冠於江北文政事四科遂居其二言陳孟常云𤣥白才高學博千不厭其多春懷貔貅十萬下遼陽經畧專征有侍郎殺氣正殷箕子國捷書空奏日南王蠻天轉餉愁中絶異域孤軍蹈險亡何似乗機歌杕杜壁堅青海制扶桑登岱層巒絶巘轉氤氲倒影凌虚日觀分方詫河山同帶礪忽驚嘘吸總風雲珮環神女青霄度陸博仙人洞府聞聖主明堂知欲啓將無重過稷丘君送陳孟常太史奉使還朝春風楊栁拂雙旌使者星軺返玉京一詔責躬憂漢主九天持節識長卿花深禁苑分仙露月落宫城聴曉鶯還念東南民力盡好從講幄達承明浦口道中今年十月氣尚暖江北宛似江南天未彫楊葉黄冉冉欲吐麥苗青田田老農築場放犢卧少婦壓槽呼客前長塗風景亦不惡馬蹄且踏寒雲穿雨後夜靜空山中鳥鳴知雨歇寂寂啓寒扉林端澹疎月順昌道中山如眉黛水如羅谿上人家繡户多十五小姬催客酒銀箏彈出伯勞歌吳伯敷一首伯敷字同文宣城人萬厯壬子舉人燕子磯同梅禹金作江落鮫人窟磯傳燕子名濕雲抛雨散凉月帶潮生白浪浮虚閣青山挂斷城知君有髙調流水若為情李孫宸一首孫宸字伯襄香山人萬厯癸丑進士改庶吉士授編修歴左中允左庶子少詹事侍讀學士升禮部右侍郎進尚書有建霞樓集陳皇士云嘉靖以來作者並起流派各别登壇樹幟者無慮十數家各執偏見更相訾謷要之不能歸於大雅先生以優柔之韻抒穏順之詞純古淡泊藴藉深美龍池社集未盡登髙興重來結伴㳺江山仍舊識寒意改深秋席地妨樵徑攀花作酒籌醉忘歸路逺還為夕陽留曽楚卿一首楚卿字元贊莆田人萬歴癸丑進士改庶吉士累官禮部尚書自芋原至車盤驛數家烟樹鬱蕭森人語殊方莫辨音雲傍馬頭晴作雨松横嶺口晝成隂闗城晩色疎寒木古渡秋風亂夕砧信宿淹留吾有意故園已在白雲深葉燦一首燦字以沖桐城人萬厯癸丑進士改庶吉士授編修遷南國子司業歴左中允右庶子天啓末削籍崇禎初起補少詹兼侍讀學士加禮部右侍郎累遷南禮部尚書追諡文莊有天柱南中廡下讀書諸集抱病别業空山裏孤燈獨夜身交㳺江上涘風雨病中人宿鳥翻深竹溪流響亂榛居然成小隠日日白綸巾李繼貞二首繼貞字散尹太倉州人萬厯癸丑進士歴官兵部右侍郎有萍槎集五人詠義士殺人都市中姓名不藏身不匿明知國法熾如爐况是鉗網當羅吉挺身就吏不辭家無勞伍伯來相逼此時上官方自功御此五人如束濕夜提鈴晝設棘五人齒冷笑不必一尉一人抵於法自相匹即令倍償之二三亦已畢何煩五命酬一賊但取無失大璫心人命草菅何足恤臨刑駢首受青鋒相顧慷慨無變色嗟乎五人生為義士死作神不然厲鬼除君側猛虎行山深月黑風怒號猛虎磨牙求汝曹子欲夜行何處逃歸來有吏夜守門追捕如虎憂心焚雞豚鬻盡將兒孫不忍老年見生别寧拚瘦骨為虎吞同是猛虎此有冠騶虞見之徒心酸同是猛虎此有翼狡猊見之亦變色行乎行乎擇害莫若輕倖脱虎吻留餘生王心一一首心一字純甫呉縣人萬厯癸丑進士由行人選授江西道御史累官刑部左侍郎有歸田園集上太行驅車上太行山頑無竒石逶迤有千盤石磴轉偪側譬如摩空鳥漸與青雲迫俯見蒼崖間春花間紅白山家愛尺土縱横界如畫上有千年碑孔父留轍跡摩挲落日遲返景射石壁祇慮豺虎驕解鞍投荒驛繆昌期四首昌期字當時常熟人萬厯癸五進士改庶吉士授檢討厯左諭徳死奄禍贈詹事諡文貞詩話六君子之獄多以攻客魏取禍文貞無言責而黨奄人者尤惡之葢以善謀見嫉也文貞與顧涇陽書云東漢南宋之事某感歎於中者久矣互相標榜豈士君子之幸哉又與楊大洪書不肖歸矣便可不復出又與葉臺山云不入長安門不知世路之險且惡也是亦明哲之見而終不免焉命矣夫賦得夏母篇書文太君障子有序夏忠靖母廖夫人忠靖㓜孤夫人教之嚴而愛事姑甚謹姑病執其手語曰吾無以報汝願汝壽過我子孫事汝如汝事我忠靖拜大司農夫人年八十晉封太夫人三楊及胡祭酒諸公皆升堂拜焉忠靖掌邦計母廖尚皓首别殿賜宴歸髙堂介睂壽是時長陵中羣公並耆舊三楊列館閣胡公為祭酒連鑣登母堂却行拜階右鏘鏘委佩聲肅肅奉觴走母也徐唱言雍容三爵後上云主恩深報稱莫相負下云計臣勞提挈視吾友嗟此良宴㑹明時信非偶誰與矢徳音乃在一寡婦養姑泣下泉持家敝箕帚尚書信卿才訓迪自黄口蟲魚箋獨勞鈞軸教已乆繇來孤貧兒往往踐台斗送門人程灝然我已離羣乆君能嵗一來茶𤓰談舊事水石坐新苔病骨翻然醒愁容頓爾開且遲松際月莫聴暮潮催賦得秋聲一雁飛淅瀝金風動碧林瑶空獨雁助長吟聲寒絶塞三千里影照長安一片砧秦隴雲横朝起笛瀟湘月冷夜聞琴於今聖世銷烽火北海應無繫帛音洪葆原丈闗政報滿還朝錦帆簫鼓出江湄水凍黄河驛路遲鄉味乆應忘荔子客情偏自憶蓴絲閶門栁色非前日長樂鍾聲似舊時聞道使君亷載石江東父老望旌麾周宗建一首宗建字季侯吳江人萬厯癸丑進士除武康知縣調仁和擢福建道御史巡按湖廣被逮死奄禍贈太僕卿諡忠毅詩話魏進忠未更名日忠毅因氷雹即訟言攻之㝷又上言乳母不當入宫引王聖趙嬈陸令萱以為前鑒及徳陵遣劉朝行邊又言内臣典兵有三不可九害以是客魏之黨皆怨公刺骨曹欽程舊知吳江縣事遂希㫖誣公削奪逮捕考訊九死無屈辭可云百鍊之鋼矣詩亦慨當以慷感事宫禁髙皇誥尚存只今秉筆自言尊太阿已授宵人柄一作彤弓還待賢人禮檮杌齊沾聖主恩舊定朝儀増禄秩新開甲第擬侯門驚心流禍中原遍未許蒼生得叩閽周順昌二首順昌字景文吳縣人萬厯癸丑進士除福州推官徴授吏部主事轉員外郎死璫禍贈太常寺卿諡忠介有燼餘録詩話忠介之逮在天啓丙寅三月校尉至知吳縣事陳文瑞持檄詣公公從容談笑入書齋理圖籍見案有素楮為龍樹菴僧乞書者泚筆揮灑拂袖而出入縣廨越三日宣詔聚觀者累萬人巡撫立於左巡按立於右諸生王節等肅而前曰大人有事地方詎不知吏部居鄉立朝者今日人情如此明公獨不為青史計乎曷不據實上聞請外臺勘治撫按股栗不敢諾緹騎手鋃鐺擲之地大呼囚安在衆怒奮躍而登攀闌折楯歐諸校尉詰曰㫖何從出曰魏上公於是衆共擊持偽㫖者時大雨堂下萬屐齊擲緹騎伏撫按脇下一尉匿梁上驚墮而死是夜撫按具疏告變捕十三人下於獄論五人大辟五人者顔佩韋馬傑楊彦如沈揚周文元文元公輿丁也佩韋臨刑告知府寇慎曰囚等為周吏部死死於義非為亂也公既斃於錦衣獄歸𦵏白蓮橋南馬家墩崇禎初呉人毁魏忠賢普惠祠購佩韋等頭顱合尸𦵏於是曰五人之墓太倉張溥為作碑記先是御史倪文焕首劾公及敗畫見五人戎裝帶劍入其室須臾旌斾導公來庭中石井闌忽飛起轟震而去亦異事也公子茂蘭字子佩嘗齧指瀝血書疏草訟公寃故邀䘏典特優渥子佩髙隠不仕鄉人私諡端孝先生其血書副本尚存於家予曽見之為跋其尾愁獨坐雁聲急風髙秋氣空家書千里外舊事一尊中北地兵戈滿南園草木叢朝來看壯髪强半欲成翁詠梅春半梅將盡中庭尚一枝玉人何處是惆悵月明時呉伯與一首伯與字福生宣城人萬厯癸丑進士除户部主事歴員外郎中出為浙江布政司參議遷廣東按察副使有素雯齋集李本寧云福生詩簡逺曠達兼彭澤左司香山睂山之長燕董思白云福生騷賦古律體齊梁之綺靡兼趙之悲壯黄貞父云福生曠懷雄藻髙岑韋栁惟所汲取而激越時近樊川標張子環云宛陵若梅文學禹金湯司成嘉賔新領異各成一家君大篇短什時效切磋古體髙朗近體遒逸不規規於形似詩話福生素雯集雖無與竟陵酬和之作似亦降心從之者宿姑孰作客休嗟滯浮生合自勞蘋花一枕對蘆荻片帆髙生計存書史鄉心寄酒槽夜來寒不禁換却舊綈袍汪康謡一首康謡字唐徵休寧人萬厯癸丑進士除諸暨知縣降補順徳府敎授入為國子監學正遷戸部主事歴員外郎出知漳州府終福建按察副使有菉猗園詩集東阿道中髙岸深藏谷頽垣曲帶溪草香風過隴土滑雨沾犂泲水流終伏荒臺迹已迷前山不可極馬首暮雲低沈萃楨一首萃楨字君聚平湖人萬厯癸丑進士除工部主事改南兵部歴員外郎中出知蘇州府遷福建按察副使以參政分守蘇松道坐報呉江知縣曹欽程貪墨罷㝷落職起補湖廣按察副使轉福建按察使以湖廣右布政使引疾歸田園詩不淺鱸魚興君恩許挂冠城隂三畝宅日暮一漁竿風翮秋飛鴿花泥晩種蘭兀然微醉好髙枕傍闌干方尚恂二首尚恂字威侯淳安人萬厯癸丑進士除刑部主事歴員外郎中出知建寧府遷湖廣按察副使謫真定同知改衛輝有玉磬齋詩集焦山危嶼江天峙烟光寫翠微吹波豚下上狎浪鳥翻飛客與愁猿並僧呼老鶴歸潮痕出深樹片片濕征衣曹操疑冡漳水築荒臺臺荒銅雀失不知青蒼瓦後自何陵出沈鳳超一首鳳超字可凡鄞縣人萬厯癸丑進士除海陽知縣遷工部主事道卒自君之出矣自君之出矣妝奩日掩塵君心如明鏡獨照眼前人俞琬綸二首琬綸字君宣長洲人萬厯癸丑進士衢州西安知縣有自娛集明朝别醉子黄金卮一卮一番換明日山上山相思旦復旦古意不與子同行願與子同夢隨子夢所之相憐不相送羅賔王二首賔王字季作番禺人萬厯乙卯鄉薦仕為南昌府同知有散木堂集詩話季作罷官歸築哭斯堂於里門或怪其誕然方其佐郡欲率師勤王居恒忼慨好談天下事及陷身犴獄志不少挫詩歌多憤懣之詞亦竒士也辛巳三月寇陷襄陽弑襄藩逾旬破洛陽福藩死之兩郡居民屠戮不可勝紀文士侈言兵希取印如斗積誤非一朝寇至如拉朽召募煩中樞司農勞稅畝竭粟養驕兵漸積成敝笱卒爾襄陽城藩封失其守城陷鼓聲死日落大旗走曾聞賜上方三載專征久勉死謝三軍徒為軍國醜嗟彼泄泄人處堂不思咎悲憂草野人抱膝徒白首春日送友人入䖍州旅雁歸不盡春風朝又過東郊一以别青草更如何客舎炊榆火征衣換越羅闗河莫回首楊栁暮烟多崔培元二首培元字辰長海鹽人萬厯乙卯舉人官青陽知縣有横山草堂集長安二首陳寳開隆祀昆明辨劫灰古來成帝里今日自樓臺國事紆西顧天威儼北來綢繆闗陜地豈獨武臣才鶉野天文布龍山地軸雄翦桐開國事累葉後賢功車馬黄塵裏闗河紫塞中從來興王地文物兩京同明詩綜卷六十五
