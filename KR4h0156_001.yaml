body:
  text: 明詩綜卷一翰林院檢討朱彞尊編太祖高皇帝三首帝諱元璋姓朱氏字國瑞濠之鍾離東鄉人元至正十一年辛卯起兵丁未稱吳元年戊申建元洪武在位三十一年崩葬孝陵在應天府治東北鍾山之陽永樂元年上尊諡曰聖神文武欽明啓運俊德成功統天大孝髙皇帝廟號太祖嘉靖十七年改上尊諡曰開天行道肇紀立極大聖至神仁文義武俊德成功髙皇帝有御製詩集五卷神鳳操鈞天奏兮列丹墀俄翩翩兮鳳皇儀斂翺翔兮棲梧枝彼觀德兮直為我辭鍾山賡吳沉韻嵯峨倚空碧環山皆拱伏遙岑如劍戟邇洞非茅屋青松秀紫崖白石生玄谷巖畔育靈芝峯頂森神木時時風雨生日日山林沐和鳴盡啼鶯善舉皆飛鵠山中道者禪隴頭童子牧試問幾經年答云常辟榖春望牛首遙岑峙立勢蒼然春日鶯啼景物鮮疊嶂倚天江月外三山映帶石城邉劉基曰皇帝提一旅之衆龍飛淮甸不十年間奄有區宇自古以來武功之盛未之有也及夫萬幾之暇作為文章舉筆立就莫不雄深宏偉言雅而旨逺真所謂天生聰明可望而不可及者矣縱宋濂曰皇帝臨御以來用人文化成天下天聖能形諸篇翰揮灑之際不待凝神而思若淵泉有長江大河一瀉萬里之勢自然度越千古郭傳曰自漢而下興王代作然文經武緯一弛一張率不能兼濟其美惟唐太宗以兵力定亂及踐祚之後詞章奮發論者以其雕竒鏤彩徒與騷人韻士爭錙銖之巧惟皇上以一旅取天下不數年間混一南北至萬幾之暇復遊心道學志存詩書寓辭竹帛親搦管翰意無停機一揮數千百言粹然出於情性之正解縉曰臣少侍髙皇帝早暮載筆墨楮以俟聖情尤善為詩歌睿思英發雷轟電燭玉音沛然數千百言一息無滯臣輒草書連幅筆不及成點畫上進才點定數韻而巳或不更一字故嘗喜誦古人鏗鍧炳朗之作尤惡寒酸咿嚶齪齷鄙陋以為衰世之調為不足觀詩僧宗泐進所精思刻苦以為得意之作百餘篇上一覽不竟日盡和其韻雄深闊偉下視泐詩真大明之於爝火也成陸釴曰洪惟太祖應天順人創業垂統巍乎功煥乎文章稱盛美矣鄭嘵曰上初不識書每退朝暇延接儒士講論經典又取古帝王嘉言善行書之殿廡出入省視作為文章揮筆立就或命侍臣立榻下操觚授詞混混千言皆淳雅髙簡洞逹物情動引經史足法萬世飢髙岱曰太祖以武功定天下而崇尚文學如渴之於飲食每得儒臣皆待以腹心帷幄朝夕咨訪不倦至於解析經義又多天縱神啓有非老師宿儒之所能及者朱國祚曰髙皇帝詩發乎天籟自然成音當日賡歌揚言匪僅詹吳樂宋四學士而巳若逹魯與權吳伯宗劉仲質張翼宋璲朱芾桂慎戴安王釐周衡吳哲馬從馬懿易􅐧盧均裴植李睿韓文輝曹文夀單仲右諸臣進詩咸賡其韻今諸臣之作十九無聞而聖藻長垂宇宙髙矣美矣靜志居詩話孝陵不以馬上治天下雲雨賢才天地大文形諸篇翰七年而御製成集八年而正韻成書題詩不惹之菴置酒滕王之閣賞心胡閏蒼龍之詠擊節王佐黃馬之謡日歷成編和黃秀才有作大官設宴醉宋學士有歌顧天祿經進詩篇披之便殿桂彥良臨池聫句嫓於揚言韻事特多更僕難數惟其愛才不及因之觸物成章宜其開創之初遂見文明之治江左則髙楊張徐中朝則詹吳樂宋五先生蜚聲嶺表十才子奮起閩中而三百年詩教之盛遂超軼前代矣成祖文皇帝一首帝諱棣髙皇帝第四子初封燕王之國北平建文元年稱兵靖難四年入金川門建文帝自焚或傳出亡帝即位革除建文年號稱洪武三十五年踰年建元永樂在位二十二年崩於榆木川葬長陵在昌平州北一十八里天夀山諡曰體天𢎞道髙明廣嘉靖十七年更廣為肇運聖武神功純仁至孝文皇帝廟號太宗嘉靖中更成祖有御製集勃泥長寧鎮國山詩實録永樂六年十二月丁丑遣中官張謙行人周航護送嗣浡泥國王遐旺等還國初故浡泥國王麻那惹加耶乃言蒙朝廷厚恩賜封王爵國之境上皆屬職方而國有後山乞封為一國之鎮至是其子遐旺復以為請遂封其山為長寧鎮國之山命謙等即其地樹碑上親製文系之以詩炎海之墟浡泥所處喣仁漸義有順無忤慺慺賢王惟化之慕導以象胥遹來奔赴同其婦子兄弟陪臣稽顙闕下有言是陳謂君猶天遣其休樂一視同仁匪偏厚薄顧兹鮮德弗稱所云浪舶風檣實勞懇勤稽古逺臣順來怒趌以躬或難矧曰家室王心亶誠金石其堅西南蕃長疇與王賢矗矗髙山以鎮王國鑱文於石懋昭王德王德克昭王國休寧於萬斯年仰我大明沈德符曰文皇帝封外國山者凡四永樂三年十月封滿刺加國西山曰鎮國山四年正月封日本國鎮山曰夀安鎮國之山六月十二月封浡泥後山曰長寧鎮國之山十四年十二月封柯枝國中山曰鎮國山皆出御製詩文以炳耀海外且詞旨雋蔚斷非視草解楊諸臣所能辦因思唐文皇兵力僅伸於漠北而屈於遼水若文皇帝威德直被東南古所未賔之國贔屭穹碑昭回雲漢萬祀所無也詩話長陵稱兵靖難踐位之後加意人文成均視學有碑闕里褒崇有述以及姑蘇寶山之石武當太嶽之宮靡不親製宸章勒之豐碣而又五經四書性理大全有書聖學心法有書大典有書文華寶鑑有書為善隂騭有書孝順事實有書務本之訓有書不獨紀之以事抑且系之以詩至于過兖州則賜魯藩于吳則夀榮國交址明經甘潤祖等一十一人庶常吉士曽棨等二十八宿咸承寵渥三勒石於幕南之廷四建碑于海外之國此諡法之所以定為文與由是文子文孫復加繼述內閣則有三楊翰林則有四王尚書則東王西王祭酒則南陳北李觀燈侍宴拜手賡歌嗚呼盛矣仁宗昭皇帝二首帝諱髙熾成祖長子建元洪熙在位一年崩葬獻陵在天夀山西峯之下諡曰敬天體道純誠至德𢎞文欽武章聖逹孝昭皇帝廟號仁宗有御製文集二十卷詩集二卷冬至賜贊善徐好古清朝盛文治輔德資儒耆念彼筋力倦趨朝諒非宜賦詩有佳致納誨多良規起豫德深趣歡懷浩無涯新陽屆初復况此承平時酬勞有尊酒庶以勞期頤池亭納涼夏日多炎熱臨池憩午涼雨滋槐葉翠風過藕花香舞燕來青瑣流鶯出建章援琴彈雅操民物樂時康詩話獻陵天稟純明雅志經術東朝監國命徐贊善善述纂尚書直指進講詩成亦命善述改竄令旨呼其字而不名又嘗與曽少詹棨賡和如江樓秋望詩云蘋洲晴亦雪楓岸晝常霞絶似唐太宗設享年加永則成功文章巍煥何如焉宣宗章皇帝九首帝諱瞻基仁宗長子建元宣德在位十年崩葬景陵在天夀山東峯之下諡曰憲天崇道英明神聖欽文昭武寬仁純孝章皇帝廟號宣宗有御製文集四十四卷詩集六卷猗蘭操昔孔子自衛反魯隱居國中見蘭之茂與衆草伍自傷不逢時而託為此操豫慮在野之賢有未出者故擬作焉蘭生中谷兮曄曄其芳賢人在野兮其道則光嗟蘭之茂兮與衆草為伍嗚呼賢人兮汝其豫輔思賢詩有序宣德九年正月豫嗣守祖宗大位夙夜兢惕思惟致治之道必有賢臣相與贊輔雖屢詔求賢然恭默之思未已乃作詩以著豫志詩曰天命有赫付畀萬方肆豫承之夙夜弗遑亮天之工其責在豫亦惟求賢以作心膂堯舜大聖咨于臣鄰湯武致治敷求哲人稷契臯夔周召伊傅同德一心以匡以輔惟時匡輔百工允釐治效之隆臻于皞熙悠悠我心念之勿置欲得羣賢以弼豫治告言惓惓束帛戔戔命彼皇華歷于丘園庶幾多才拔茅連茹奮其功庸翼我王度惟天昭昭維嶽降靈篤生賢哲聿馳駿聲啓心沃朕以迪先德揚其耿光有永無斁賜許廓巡撫河南實録許廓字文超河南襄城人由國子生授錦衣衛經歷擢工科給事中轉鴻臚左寺丞升兵部右侍郎洪熙元年轉左侍郎宣德六年升兵部尚書嘗扈從北征董餉運交址入職方朝廷遣廓往覆實戶口田賦尋召還後命招撫河南流民歸者數萬戶尚書張本卒以廓代之河南百州縣七郡所分治前嵗農事缺旱潦始復繼衣食既無資民生曷由遂顧豫位民上日夕懷憂愧爾有敦厚資其往勤撫字徙者必輯綏飢者必賑濟咨詢必周歷毋憚躬勞勩虛文徒瑣碎所至皆實惠勉旃罄乃誠庶用副豫意憫農詩示吏部尚書郭璡雷禮列卿紀郭璡初名進字時用保定新安人由國子生出身永樂初為戶部主事歷遷福建參議山東參政進工部右侍郎改吏部洪熙初兼少詹事宣德初命掌行在詹事府事進尚書農者國所重八政之本源辛苦事耕作憂勞亘晨昏豐年僅能給歉嵗安可論既無粳核肥安得縕絮溫恭惟祖宗法周悉今具存遐邇同一視覆育如乾坤嘗聞古循吏卓有父母恩惟當慎所擇庶用安黎元示户部尚書夏原吉關中嵗屢歉民倉無所資郡縣既上言能不軫恤之周禮十二政散貨首所宜給帛遣使者發廪飭有司臨軒戒將命遄往毋遲遲命下茍或後施濟安所期吾聞有道世民免寒與飢循巳不遑寧因請書愧詞捕蝗詩示尚書郭敦雷禮列卿紀郭敦字仲厚東昌棠邑人洪武癸酉中鄉試後入太學擢戶部主事出知衢州府庶務畢舉召為監察御史升河南布政司左參政調陜西以禮部尚書胡濙薦擢禮部右侍郎巡撫順天等處洪熙初降太僕卿旋進戶部左侍郎兼詹事府少詹事宣德二年升戶部尚書蝗螽雖微物為患良不細其生實蕃滋殄滅端匪易方秋禾黍茂芃芃各生遂所欣嵗將登奄忽蝗已至害苖及根節而况葉與穗傷哉隴畞植民命之所繫一旦盡於斯何以卒年嵗上帝仁下民詎非人所致修省勿敢怠民患可坐視去螟古有詩捕蝗亦有使除患與養患昔人論已備拯民於水火朂哉勿玩愒減租詩實録宣德七年三月庚申朔敕諭行在部院近年百姓稅糧逺運艱難官田糧重艱難尤甚自宣德七年為始但係官田塘地稅糧不分古額近額悉依五年二月敕諭恩例減免中外該管官不許故違辛酉上退朝御左順門謂尚書胡濙曰朕昨以官田賦重百姓苦之詔減十之三以蘇民力嘗聞外間有言朝廷每下詔蠲租稅而戶部皆不凖甚者文移戒約有司有勿以詔書為詞之語若果然則是廢格詔言壅遏恩澤不使下流其咎若何今減租之令務在必行書曰民惟邦本本固邦寧有子曰百姓不足君孰與足卿等皆士人豈不知此朕昨有詩述此意卿當體念勿忘也六月戊子朔知蘇州府事况鍾上言近奉詔書官民田地有荒蕪者召人佃種官田凖民田起科無糧者勘實除豁租額臣勘得崑山等縣民以死徙從軍除籍者三萬三千四百七十二戶所遺官田召人佃種應凖民田科者二千九百八十二頃其間應減秋糧一十四萬九千五百一十石已嘗申達戶部未奉處分况官田有沒入海者糧額尚在乞皆如詔書除豁從之七月戊午戶部奏直隸松江府屬舊設官田宜凖民田例起科古額官田積年逋負稅糧請蠲以蘇民困上從之仍命今後各處官田糧俱凖此例官租頗繁重在昔蓋有因而此服田者本皆貧下民耕作既勤勞輸納亦苦辛遂令衣食微曷以贍其身殷念惻豫懷故迹安得循下詔減十三行之四方均先王視萬姓有若父子親兹惟重邦本豈曰矜吾仁憫旱詩實録宣德六年乙酉上以天久不雨禱祠未應憂之作憫旱詩亢陽久不雨夏景將及終禾稼紛欲稿望霓切三農祠神既無益老壯憂忡忡饘粥不得繼何以至嵗窮豫為兆民主所憂與民同仰首瞻紫微籲天攄精忠天德在發育豈忍民瘝痌施霖貴及早其必昭感通翹跂望有淹兾以蘇疲癃草書歌賜程南雲有序宣德七年二月朕幾務之餘遊心載籍及遍觀古人翰墨有契於懷嘗賦草書歌以寓意焉以爾日侍之勞書以賜之草書所自何所授初變楷法為章奏當時作者最得名崔瑗杜度張伯英三人真迹巳罕見後來繼之有羲獻筆端變化妙入神逸態雄姿看徑健風驚電掣浮雲飛蛟龍奮躍猛虎馳漢晉草法千載師張顛藏真亦絶竒一代精藝才數輩遺墨千人萬人愛固知頓挫出腕力亦用飛動生神采古來篆籀今已訛何况𨽻草訛愈多吾書豈必論工緻誠懸有言當默識何喬逺曰章皇寤寐思賢未嘗一日去書下筆螽涌皆傳修齊治平之道翰墨圖畫隨意所在盡極精妙詩話景陵當海宇承平之日肆意篇章嘗于九年元夕羣臣觀燈各獻詩賦彚成六册惜今巳無存即所遺御製集諸詩視民如傷從善不及宜薛祿武人比之南仲山甫而拊心感泣也英宗睿皇帝一首帝諱祁鎮宣宗長子建元正統十四年北狩皇弟郕王祁鈺奉皇太后令即皇帝位改元景泰尊帝為太上皇帝景泰元年帝還自迤北居南宫七年奪門復辟改元天順八年崩葬裕陵在石門山距獻陵西三里諡曰法天立道仁明誠敬昭文憲武至德廣孝睿皇帝廟號英宗有御製詩文一卷漢江歌賜襄王漢江滔滔出嶓冢兮偉兹巨浸壯南邦兮萬有千里流無窮兮逶逶迤迤志必東兮於戲漢水殆與天地同始終兮廖道南曰粵稽諸古大舜卿雲之歌文王鳯鳥之詩太和氤氳溢於帝藻逮乎漢祖大風之詞霸心猶在唐宗興慶之詠玉迹斯微惟吾皇祖親撰鍾山之賦及閲江諸詩英廟載製峴山之賦及漢水諸詠直可追軼虞休上嫓姬美豈漢唐諸君所可企及哉詩話裕陵以沖齡繼寶命即崇尚文治賜循良以招隱之歌及翠華返駕紫禁奪門而峴首襄陽頻頒宸藻昭同雲漢爛若星辰固知朔漠驚塵南宫夜雨文字之助所得良深耳御製詩文一册後附寶文圖書春對酒簾諸作今亡襄王憲王瞻墡也仁宗第五子宣德四年受封之國長沙正統元年遷襄陽府憲宗純皇帝一首帝諱見濟初名見深英宗長子建元成化在位二十三年崩葬茂陵在聚寶山距裕陵西一里諡曰繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝廟號憲宗有詩集四卷闕里孔子廟詩天生孔子縱之為聖生知安行仁義中正師道興起從遊三千往聖是繼道統流傳六經既明以詔後世三綱五常昭然不替道德髙厚教化無窮人極斯立天地同功生民以來卓乎獨盛允集大成實天所命有天下者是尊是崇曰性聖道曷敢勿宗顧豫眇躬承此大業惟聖之謨于心乃愜用之為治以康兆民聖澤流被萬世聿新報典之隆尤在闕里廟宇巍巍于兹重美文諸貞石以光于前木鐸遺響於千萬年成化四年六月詩話茂陵撰文華大訓一十八卷以進學養德厚倫明治為綱聖敬日躋終始典學間留意於詩章益莊王勿齋集有恭次皇祖憲宗皇帝四景連環詩韻四首則當時天藻曽頒諸藩服惜乎今不得而見之矣孝宗敬皇帝一首帝諱祜堂憲宗長子建元𢎞治在位十八年崩葬泰陵在史家山距茂陵西少北二里諡曰建天明道誠純中正聖文神武至仁大德敬皇帝廟號孝宗闕里孔子廟詩聖人之生天豈偶然命之大君俾贊化權二帝三王君焉克聖繼天立極道形於政大化既洽至治斯成巍巍蕩蕩渾乎難名周政不綱道隨時墜孔子聖人而不得位乃稽羣聖乃定六經萬世之師於焉足徴自漢而下數千餘嵗褒典代加有隆無替於皇吾祖居正體元六經是師卓爾化原列聖相承先後一揆逮及朕躬思𢎞前軌廟貌載崇祀事孔禋經言典訓彌謹彌敦俗化治成日升川至斯道之光允垂萬世𢎞治十七年閏四月李東陽記曰𢎞治甲子春正月重建闕里孔子廟成上親製碑文祝辭遣臣東陽申祭告臣東陽奉命以閏四月丁卯陛辭癸未至于廟衍聖公臣聞韶率族人迓于郊逺近大小來會者數百計前三日時雨降及期雨霽禮成之後星月朗耀神人歡暢歌工舞佾奉器執事之臣下逮胥吏僕從皆欣欣然如雲之從風水之赴壑有不令而集者敢紀成事用告來世若闡揚道德以彰教化則奎章宸翰昭如日星有目者所共覩臣何敢贊一辭哉朱國祚曰敬皇帝恭儉慈恕寬仁愛人清間之燕端坐肅然檢束身心謂嘗宜如是至于臨朝聽政剛毅果斷人莫敢撓而又霽色虛懷勵精訪落諌説雖切每見優容顧問大臣殆無虛日減膳節用尚德緩刑織造之役常紓蠲租之詔屢下十八年間與民休息培養太和迹其治效巳庶幾于唐虞三代之盛矣詩話泰陵聖學緝熙德修時敏非惟政事之勤實啓人文之化置永樂大典于便殿暇即省覽又命儒臣集歷代御製詩以為規範其賜李東陽靜中吟一首論者謂同二帝典謨三王訓誥焉帝既殂落羣臣哀挽之章遍於朝野有云日神月無私照乾坤仰聖功孝可通金石誠能動鬼雲容常昊日露禱必深更嵗旱憂疑獄天寒憫戍兵近臣常造膝元老不呼名孝宗天子真聖人平生好武復好文文多咨謀武籌略坐鎮海宇清風塵李東陽詩也人間何日忘𢎞治天下兹辰哭孝宗楊一清詩也惻怛蠲租詔丁寧餽戍金儲巏詩也年年揮淚地不見長蒼苔顧璘詩也十年放逐同梁苑中夜悲歌泣孝宗李夢陽詩也彌留念諸將顧命託三公何景明詩也當時侍從者慟哭幾人存徐禎卿詩也祠官如可乞長奉泰陵園邊貢詩也誰期陵樹果猶許侍臣嘗王廷相詩也微官渾忘却惟記孝皇年鄭善夫詩也弓劒仙原閟謳歌帝德昭王謳詩也要其觸景傷情引端而出雖不足包帝德之大而公是之不可泯固灼然矣近聞史局有専毀泰陵非令主者將使是非混淆是不可以不辨世宗肅皇帝二首帝諱厚熜興獻王子憲宗之孫武宗無子入繼大統建元嘉靖在位四十五年崩葬永陵在陽翠嶺距長陵東南三里諡曰欽天履道英毅聖神宣文廣武洪仁大孝肅皇帝廟號世宗有御製詩賦集共七卷御經筵講大學衍義有感賦此帝王所圖治務學當為先下作民之主上乃承之天致治貴有本本端化自平人君所學者其序有後前正心誠其意志定必不遷吾志既能定理道豈復顛身修本心正家國治同然國治乃昭明萬邦斯協焉於變帝堯典思齊文王篇萬國修身始朕念方拳拳張萱等重編內府書目曰嘉靖六年大學士楊一清賈詠翰林學士翟鑾進講大學衍義御製五言古詩一章用金龍箋書一清等恭和集為一册名翊學詩降敕諭答上用欽文之寶敕首三臣銜皆御筆也賜賈詠詩卿本中州俊簡在登台衡君臣際良難所貴德業并朕固亮卿志夙夜懷忠貞卷阿有遺響終聽鳯皇鳴談希思曰帝博綜經史親禮儒臣平臺召對西苑賡歌藹然如家人父子然終不少假以威福纂言屬意直抒自得往往有發前聖所未發者詩話世廟受天永命樂備禮明尤勤勤於韻語當時受賜者郭武定勛費文憲宏楊文襄一清石文介珤張文忠孚敬李文康時夏文愍言朱尚書衡他若席文襄書以病目期以弼亮趙尚書鑑以致仕嘉其止足龍箋御墨往往傳之世家而一清當歸田時武皇南巡親幸其第賜之絶句十二首其在政府詠元宵有愛看氷輪明似鏡之句世廟以其類中秋易以愛看金蓮明似月兩朝寵遇宸翰煒煌尤稱千古盛事云神宗顯皇帝二首帝諱翊鈞穆宗莊皇帝長子建元萬厯在位四十八年葬定陵在大峪山距昭陵北一里諡曰範天合道哲肅敦簡光文章武安仁止孝顯皇帝廟號神宗有集一卷畫眉山龍王廟碑詩有序畫眉山龍王廟在都城西一舍其地故有泉潭相傳以為龍之所居即其旁為廟祀龍王焉成化壬辰憲宗純皇帝禱雨有應新其廟而勒辭於豐碑萬厯十有三年春夏不雨麥稼焦枯以五月往禱于廟浹旬之間嘉澍屢霈郊野霑足三農忭舞爰出內帑金錢重增葺之為之記而系以銘詩於赫龍王不顯其光上下帝旁噓翕無方為雷為霆為雲為雨有開必先靡求不與我求伊何黍稷稻粱爾與伊何千倉萬箱眉山之下龍王之宇迄用康年榖我士女漷縣景命殿詩實録萬歷三十六年勑建景命殿于漷縣永樂店聖母皇太后誕育之地上御製碑文系之以詩翼翼京邑漷水瀠之璇源逺濬載奠坤維尊靈長樂歡洽重闈綿綿景命百祿咸宜眷兹湯沐啓瑞集禧周原膴膴寶殿攸基重門邃閣崇敞逶迤仁祠左拱靈宇右麗甍連棟接鳥革翬飛虹祥式闡慈念載怡爰及薄海耀景咸熙聖母之德綏此蒸黎百千萬祀永永無隳沈德符曰帝髫年即工八法賜江陵吳門諸輔臣堂扁巳極偉麗其後漸入神化批答詔旨間有改竄龍翔鳳翥運筆之妙有顔栁所不逮者可謂天縱多能矣詩話定陵筆精墨妙嘗覩先文恪公暨唐文恪公殿試卷御書第一甲第一名六字皆瘦硬通神餘如來青閣海淀諸扁亦然嘗序草韻辨體一書備古今翰墨之變內府向藏御製詩文一卷今已無存列朝詩集所載勸學詩一章未必出于御製也謹録龍王廟景命殿二碑銘詩廟在畫眉山俗名金山口成化中禱雨有應而建是碑立于萬歷十三年殿在漷縣永樂店萬歷三十六年勑建為孝定皇太后祝釐俗所稱九蓮菩薩者是莊烈愍皇帝一首帝諱由檢光宗貞皇帝第五子天啓七年以信王入踐位建元崇禎臨御十七年寇陷京師殉社稷葬思陵在鹿馬山賜石砫土司秦良玉蜀錦征袍手製成桃花馬上請長纓世間不少竒男子誰肯沙場萬里行王世德曰四川石砫土司女帥秦良玉帥師勤王召見賜綵幣羊酒銀牌御製四詩旌之帝即位春秋方十七魏璫竊國柄積威震天下乃不動聲色翦除之其才豈中主所可及而畏天災遵祖訓勤經筵崇節儉察吏治求民瘼種種聖德朝野共聞使得才堪辦賊之臣為之輔君臣一德將相同心則太平何難致乃不幸有君無臣卒致身殉社稷悲夫詩話思陵聖學時敏甲乙之夜不輟經書又妙解音律嘗于深宫鳴琴製於變時雍之曲躬幸太學御經筵會稡四聲之書特擢五經之士用人惟巳立賢無方萬幾餘暇灑墨為行草書龍跳虎卧嘗書視民如傷望道未見八字于便殿詩不多作然長箋小扇往往流傳人間其最傳者賜秦良玉楊嗣昌五絶句也良玉者石砫掌印宣撫使其兄邦屏邦翰皆以援遼力戰死幼弟民屏被創潰圍出歸不能視事諸部以良玉忠勇多大略遂襲宣撫使敗奢崇明于佛圖關破安邦彥于平越功居第一野紀謂良玉有男妾數十人而夔州李吉士長祥力辨其誣謂川撫嘗遣陸綿州遜之按行諸營良玉冠帶飾佩刀出見設饗禮酒數巡論兵事遜之誤曵其袖良玉引佩刀自斷之其嚴肅若是張獻忠僭號四川良玉號咷曰吾兄弟三人皆死王事吾以一婦人受國恩二十年不幸至此其敢以餘年事逆賊哉悉召所部約曰有從賊者殺無赦獻忠鑄金印齎之易其官不為動賊黨無敢入其境者亦勝于丈夫矣思陵葬日皇朝未收江南福藩稱制遙上帝諡曰紹天繹道剛明恪儉揆文奮武敦仁懋孝烈皇帝廟號思宗后諡曰孝節貞肅淵恭莊􅐧奉天靖聖烈皇后尋改帝廟號曰􅐧宗唐藩稱制復改威宗皇朝順治初更諡帝曰欽天守道敏􅐧敦儉𢎞文襄武體仁致孝懷宗端皇帝后曰孝敬貞烈慈惠莊敏承天配聖端皇后既而改稱莊烈愍皇帝凡五易而後定焉今神牌所書即順治初定一十六字第其下改書莊烈愍皇帝云當李自成陷京師思陵將殉社稷傳旨後宫令自裁而宫監王永夀從懿安皇后宫至白帝曰懿安皇后業自縊矣帝連稱好好乃走煤山經於海棠花下福藩遙上懿安后諡曰孝哀慈靖恭惠溫貞偕天協聖哲皇后詔云既慷慨以捐軀亦從容以就義而順治實録于甲申五月大書葬明崇禎帝后及天啓皇后張氏於昌平州陵國史存據可以無疑其後有魏忠賢養女任氏進之德陵立為貴妃寇亂後流轉民間詐稱天啓皇后因送於官光祿寺月有廪給人遂疑后失節沉寃莫雪故附白之又按明自太祖至愍皇帝纍朝多有御製詩文或傳或不傳敬録十帝之詩于卷首若武宗南巡過鎮江幸大學士楊一清第賜以十二詩命其和韻自題錦堂老人又于宣府製小詞有野花偏有色村酒醉人多之句傳誦人間惜乎未覩其全也昭皇后一首后姓張氏永城人彭城伯麟女洪武二十八年册為燕世子妃永樂二年封皇太子妃二十二年仁宗即位册立為皇后正統七年崩合葬獻陵諡曰誠孝恭肅明德𢎞仁順天啓聖昭皇后送司寶黃維德歸南海皇朝列聖御寰宇偉烈宏謨冠千古重惟仁化本家邦內庭百職需賢良咨爾惟德女中士自少從容知禮義一從應召入皇宫夙夜孜孜勤乃事昔時黑髮今如霜嵗月悠悠老將至九重聖主天地仁欲使萬物同陽春體兹德意賜歸去乃心感激情欣欣嶺海迢迢千萬里潞河官棹春風裏賜衣宫錦生光輝親戚相迎人總喜喜爾富貴歸故鄉我心念爾恆不忘彩筆題詩意難盡目極天南去鴈翔明詩綜卷一
