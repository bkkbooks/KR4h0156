body:
  text: 明詩綜卷九十九翰林院檢討朱彞尊編虞皋一首皋羅源人閩王璘時常鬻黄精于市龍啓間為道士陳守元所辱故人木當敏因背之去㝷入仙茅山羅喜洞當敏尾之望見洞中玉堂金闕麗人被珠襦者百數皋至皆却行前迎建翠旍孔蓋當敏大駭頓首謝罪皋目笑之有頃宴客堂上盛設食飲畀當敏以僕妾之餐坐之堂下然亦非人世所有滋味居十日當敏辭歸皋及賔客送之至洞門客吹尺八撃玉磬皋和而歌云云歌畢忽然俱去當敏歸城郭人民盡非昔日蓋洪武之十二年矣歌朝為雄兮暮為雌天地終盡兮人生幾時徐電發云足比彭令昭所歌人間可哀之曲貞元道人一首徐州鄧玉田扶卟仙于都下題詩畢自稱貞元道人詩勾漏山頭古洞天金堂玉室地相連門前千尺長松樹親手栽來不記年無上宫道人仙游歌静志居詩話萬厯庚寅秋古鄮吳道人以符録游江淮間㝷抵嘉禾仙降于周處士履靖逸之宅有曰無上宫道人有曰崖老縛筆于卟揮灑若風雨之驟由是彭輅子殷文嘉休承皇甫汸子循張之象月鹿侯一元舜舉李奎伯文仇俊卿謙之馮皋謨明卿莫雲卿是龍李日華君實異而交和之處士裒為一卷子殷序之君實䟦其尾焉君不見蓬萊縹緲三山幽天風萬里羣仙游光分日月五城界春滿烟霞十二樓洞門桃花嵗復嵗巖前桂樹秋復秋羣仙游兮上玉京翩翩自適春風情鞭龍或耕瑤草去騎鹿愛遶青松行感藻日之遄征歎浮生之易邁信人間之可哀留幔亭而髙㑹有時采藥來天台迷花宿霧臨瑤臺五三六㸃靈雨滴百千萬樹棃花開主人置酒初醱醅我今暢飲休相推風光如此不盡醉虚負青華赤玉杯崖老詩乍下人間世何須問姓名翩翩臨水影窅窅歩虚聲恣草黄庭帖還調碧玉笙江南美風物九月采蒓莖降道人探梅詩話崇禎辛已道人題畢人莫㑹意王翃曰道人起句謂舟輕則速十里之行等五里雪霽而殘一山所積止半山爾卟書王子可與言詩輕舟十里五里殘雪一山半山我意探梅獨往誰教放鶴先還轉華菴卟仙一首福州西闗外轉華菴壁挂卟仙詩字體飛動不類人間書見閩小記緑雲出洞又入洞黄鶴下山復上山道人此日歸何處雲自無心鶴自還候官卟仙一首嘉靖中倭亂起候官張經總督浙直軍務經行止未能决質之召卟者卟動大書曰我闗雲長也題詩云云經殊惡之後遭讒棄市詩萬里縱横事已空戰袍裂盡血猶紅夜來空有思鄉夢雨暗闗河路不通百泉書院降神詩一首天啓二年五月杞縣趙彦復集客于百泉山書院有神降卟題詩彦復曰神得非淮隂侯邪曰然詩相逢奚必定知名九里山前殺氣横不及清淮一竿竹風波静處過平生清真觀童子二首崑山柴竒讀書於清真觀夜二鼓月色如晝忽見五童子披鶴氅麾羽扇從空而下為迴波之舞復歌云云見周𤣥暐涇林續記歌二首駕而風兮策而霆乘白鶴兮入蒼冥山青青兮海澂澂璧為月兮珠為星駕赤虯兮上𤣥冥水㵿㵿兮嶽亭亭晚翠亭鬼一首載葉世竒草木子詩一徑入青松飛流澹晴緑道人晚歸來長歌振林谷山深不知秋落葉下枯木須㬰翠烟開月色照綵服鄭婉娥一首吳江沈韶洪武初汎舟游襄漢次九江登琵琶亭月下仿彿聞歌聲明日復往徙倚亭中有麗人來呼韶並茵坐曰妾偽漢主婕妤鄭婉娥也年二十而死殯于亭側因口占一律贈韶且命侍兒鈿蟬取酒韶與留連半載談元末羣雄興廢及偽漢宫中事歴歴可記臨别以金跳脫為贈贈沈生鳳艦龍舟事已空銀屏金屋夢魂中黄蘆晚日虚殘壘碧草寒烟鎖故宫隧道魚燈膏欲燼妝臺鸞鏡匣長封憑君莫話興亡事淚濕臙脂損舊容吳師禹二首成化中候官吳師禹於吳嶼結屋月夜載酒遍飲漁翁至嘉靖間已物故士人張君壽八月幾望舟泊吳嶼忽上流一翁盪槳而歌云云君壽刺舟與語翁曰我吳師禹也君壽不知其已死偕訪其家酒行復賦詩云云夜既䦨遂寝旦覺乃在叢莽中詩箋尚在觸手成灰詩蓼香月白醒時稀潮去潮來自不知除却醉眠無一事東西南北任風吹又詩世路無媒君莫悲開闌看取牡丹枝姚黄魏紫俱零落能得春風有幾時董槐一首萬厯中閩人董槐能文彊記年十七而沒殯於里之龍山長見形為母護湯藥墓上樹蟲齧成字或螘縁土為字皆成詩句末必書行仙董郎詩原南原北緑如烟萬囀千聲鳥可憐擷得榆錢盈兩袖春風寒食自年年詠松僧一首詩庭前兩株松風吹一株折朝減半庭隂夜露半庭月楊玊香一首成化中閩人林景清以鄉貢北上不第歸過金陵戀伎楊玉香既别而玊香夭泊舟白沙玉香魂夜至有詩和酬再過金陵訪之則死已一月矣撫棺而慟是夜獨宿見玉香從帳中出吟詩云云答林生天上人間路莫通花鈿無主畫樓空從前為雨為雲處總是襄王一夢中小水人六首安成彭氏築菴山中命僕守之暮有女子自稱小水人徑入卧室僕固拒之女云只見船泊岸不見岸泊船何無情乃爾㝷登僕榻僕懼取佛經執之女笑云經從佛出佛豈在經邪天将旦僕起撃菴鐘女取髻上牙梳掠鬢忽走入松林不見壁上題詩云妾住小水邊君住青山下青年不可再白日坐成夜只見船泊岸不見岸泊船豈能深谷裏風雨誤芳年薄情君抛棄咫尺萬里逺一夜月空明芭蕉心不展解下羅裙帶無情對有情不知妾意重只道妾身輕經從佛口出佛不在經裏郎在妾心頭郎身隔千里月色照羅衣永夜不得寐莫打五更鐘打得人心碎王秋英一首嘉靖中福清諸生葉夢雲過石湖山見遺骸哀而掩之是夜宿藍田書舎一麗人斂衽拜燈下曰妾王秋英字澹容楚人也父徳育元至正間以兵曹郎參軍入閩妾從父之官遇冦投厓死荷君子厚徳恵及骼胔是亦夙世縁也遂定情焉生一子曰鶴算萬厯癸已揮淚而别事載萬鳥啼春集歸楚留别夢雲兩年歡㑹夢魂中聚散人間似轉蓬嵗月無情催去燕闗河有信寄來鴻劒沉延浦光終合瑟鼔湘靈調自工他日扁舟㝷舊約夕陽疎影楚雲東冬橘一首女鬼冬橘張校官致祥遇之秋夜吟幽蛩響寒砌白露墮寒石獨立看月明不覺羅衣濕莆田女鬼一首萬厯初莆田有王太守良臣者築園亭郊外且傾圮矣崇禎中邑諸生梁鼎鐘假為學舎有女夜至自稱太守女鼎鐘與定情三年一夕别去作詩以贈生别梁生側側復力力與君長歎息出入自苦愁單情還相憶西寧侯邸花神二首閩人鄭琰翰卿客西寧侯邸晝夢黄衣少年要至廡下共飲少焉一麗人至少年自起舞歌春游之曲云云次及麗人作迎風之舞歌春愁之曲飲正歡少年駭曰文羌校尉來矣見一人緑袍張目至前遂罷席而寤起視庭中牡丹一花映日婉媚一黄蝶猶未去則少年也一螳螂長二寸集葉上是為文羌校尉麗人則牡丹花神云是年西寧侯薨春游曲芳草多情王孫未歸遲我良朋東風吹衣春愁曲金衣公子話春愁幾度留春更不留昨日漫天吹栁絮玉人從此嬾登樓妖䑕詩一首成化二年長樂陳豐獨坐山齋梁上二䑕相鬭忽墜化為二老翁長可五六寸對坐劇飲聲如小兒既而二女子歌舞勸酬歌詞云云酒既䦨乃合為一大䑕向豐作拱揖狀而去載晉安逸志歌天地小如喉紅輪自吞吐多少世間人都被紅輪誤張秋鴉語崇禎戊寅張秋鴉作人語云云未幾李青山作亂殺人盈野嵗饑民剥樹皮食之棗一升值錢五百兗東西四百餘里寂無人載張怡謏聞續筆人少人少無米怎了明詩綜卷九十九
