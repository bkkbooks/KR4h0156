body:
  text: 明詩綜卷九十一翰林院檢討朱彞尊編方澤六首方澤字雲望號冬谿嘉善人秀水精嚴寺僧有冬谿内外集彭子殷云嘉靖開士以善詩鳴者三人谷泉福玉芝聚西洲念冬谿子與之倡和古體上仿漢魏而律一以初盛唐為準晚乃旁溢稍及於錢劉皇甫諸家然力以繩墨自維語渉織險輒擯去之猶法吏之慎守三尺嗜古者不以瓦缶雜鼎彛也靜志居詩話冬谿詩格清純不雜偈語宜為唐應徳方思道屠文升所稱古意孟冬風始寒鴻鴈凌晨飛疇昔嘉樹林枝葉日以稀一隨氣運變誰能覺其非賢者貴特達在逺諒不違君看松柏姿嵗晚長依依泖月樓夕眺遲蔣白灘不至飄風鳴軒櫺落葉辭髙柯薄暮登層樓伊余心未和悠悠逺天雲泛泛清川波去者曽莫留來者奄忽過千秋旦暮事百嵗寧足多但願狎所親歡至相與歌幽人期不來奈此凉月何送范菁山丈之雲南大理北望雲霄迥南征道路長山逢驅象客地入卜雞鄉碧海常飛霧青林不隕霜聖君勞禦逺非是漢文皇送王翰林柘湖轉比部還京滄海有才名青春賦兩京乍辭金馬署復作爽鳩行苑栁深𫀆色宫鶯雜珮聲君王前席問應是為蒼生寄平野上人恵朗南歸後空山兩月過青春看已暮白髪近如何雨外鶯聲逺風前栁絮多遥知清夢裏還繞舊烟蘿仇生仇生有父風能畫擅江東縹緲千峰勢巑岏尺素中坐増吳苑秀不謝輞川工儻寫天台勝添余補衲翁祖福二首祖福號谷泉秀水龍淵寺僧後居無錫九龍山雨宿西閣浩蕩迷方客人淹江寺隈旅愁添夜雨嵗事到寒梅滄海無家問中峰有夢回燭花爾何事更傍客杯開人日鴛鴦湖頭新水生白龍祠前風日晴梅花作意開自好柏葉向人殊有情南國十年多羽檄北山此日有柴荆杖藜物色總春事回首江湖眼獨明正念一首正念號西洲秀水龍淵寺僧燕京春暮寄山中人鳥鳴不鳴山静花落未落春遲美人如雲天際芍藥空留一枝法聚二首法聚號玉芝嘉興人始居海鹽資聖寺後隱武康天池山有玉芝内外集吳山秋望呈張侍御子胥廟前江日晡越王城頭雲有無故宫臺榭幾黄葉南渡寢園今緑蕪長笛關山瞻北固清尊魚鳥傍西湖蕭蕭落木蒼郊外幾處寒烟破屋孤江邨殘陽在木末逺鳥沒孤嶼漁舟歸未歸吹笛芙蓉渚圓理三首圓理號雲東嘉興人出家天寧寺有雲東集林居雜言寄同志芙蓉謝春華鴛鴦念匹儔崇蘭委深谷枤杜生道周萬物各有時百川無倒流感之傷我懐端已義所仇顧瞻逺行客誰肯結綢繆請為林壑交得與爾同游終嵗混樵牧聊以忘世憂慈雲嶺仄徑攀蘿轉空山伐木聞兩崖危石抱衆壑細流分曉竹含蒼靄春田護白雲回看萬松裏唯有鹿麋羣招友人看芙蓉一水澄於練孤芳錦作叢故将遲暮景開向寂寥中夕露垂秋白江霞媚晚紅薄言方採掇持贈故交同明周一首明周號嬾雲潞安人居法住寺送人還壺闗林花未吐怯輕寒人在天涯送客還千里好山迎馬首白雲飛處是壺闗明曠一首明曠字公朗崇徳人住西林寺秋興大火倏以逝凉颸動幽林飛霞騁竒姿孤桐落秋隂願言縱芳躅擥秀歴遥岑髙視破宇宙曠焉開我襟靈籟妙徵羽何必筑與琴感此事媮恱聊復送長吟之子出世者俯仰増遐心戒襄三首戒襄字子成號平野海鹽天寧寺僧有平野集長安壩上河道中三月臨平山下宿沙棠一舟帆數幅清晨鼓枻看山行兩岸垂楊春水緑岸上人家挂酒旗幾樹桃花映修竹路人問我将何之我欲尋師向天目杜鵑夜向吳山宿朝從越嶺飛年年春欲暮催客淚沾衣樹冷悲殘月川長怨落暉花時無限好猶道不如歸曉過横塘半幅蒲帆九里汀石湖秋水接天青舟人指㸃䕷蕪外一帶遥山是洞庭果斌一首果斌號半峰嘉靖初住持天界寺有半峰集顧𤣥言云半峰詩多成於中夕沉思苦索而後得之對客揮毫非所能也正如南能腰石碓米已熟但欠篩在詩話半峰少從顧華玉游而詩未得其一體王十岳山房小隱空山絶四鄰野雲孤鶴自相親誰知一徑深如許猶有敲門看竹人宗倫一首宗倫字性彛芝溪人有覺隱遺風集旅懐東吳隔千里歸計尚茫然忽見梅花發他鄉又一年徳榮一首徳榮天台僧題國清寺竹院深深近翠㣲短簾容易墜斜暉香殘瓦鼎僧初定月上松巢鶴未歸落澗祗供煎茗水洩雲留伴坐禪衣客游正值春将半風落桃花片片飛洪恩二首洪恩字三懐上元人居長干寺有雪浪集過安民卿秦淮寓館安期東澥至暫向白門居緑酒稱從事紅妝用較書舟移淮水月饌出晉陵魚聞道西林勝能無一榻虚中秋日問主人病十日佳期踐山園半畝宫雨收殘暑盡月出大江空背屋一亭竹當門幾樹桐我來憐病榻數問主人翁徳清四首徳清字澄印全椒人出家南京報恩寺㝷入五臺棲牢山坐劾逮繋戍雷陽卒于曹溪有憨山夢游東游等集贈王徳操楚人疑鳳鳥仲尼愛麒麟豈不為世瑞所遇非所親耳目素不接誰能辨其真之子抱竒思翩翩邈風塵迷方日已衆微言難具陳撫膺發長歎衷曲誰為信出闗豈慕逺遯世甘沉淪良由知者希所以稱至人抵雷陽戍二首舊說雷陽道今過電白西萬山嵐氣合一錫瘴烟迷末路隨蓬累殘生信馬蹄那堪深樹裏處處鷓鴣啼萬壑奔流下千山積翠連帆飛五嶺驛猨挂九秋天客路浮雲外鄉心落日前吾生猶未定江漢是餘年題畫風雨孤舟夜微茫草樹春茅簷驚犬吠定是渡江人真可一首真可字達觀吳江人一云句容世號紫柏大師有茹退集詩話吾鄉楞嚴寺建自宋嘉祐八年至嘉靖間為勢家所占紫柏特興復之先從祖君升諱大猷經營規度象設皆冶銅為之佛書三藏易梵夾為方冊鏤板貯之徑山流通宇内既而游大房石經山進隋僧浄琬所藏佛舎利慈聖太后迎入宫中特賜紫伽黎俄而妖書獄起辭連入詔獄死集中吳氏廢園作蓋即楞嚴寺基先叔祖中萬厯壬子舉人吳氏廢園汾陽門第晉風流縹緲吳山感勝游今日松蘿誰是主斷雲殘月鎖江樓通岸一首通岸字覺道南海人居光孝寺有栖雲菴集曹溪雜詩為愛溪山好無人祗自看萬峰青不斷三月雪猶寒乳鹿藏深樹飛鳬過逺灘興來誰與晤長嘯碧雲端法生一首法生字化儀崇徳人少林寺僧後居徑山寄雲東十年滄海共離羣三月風塵信未聞芳草閉門春苒苒落花啼鳥暮紛紛嵗華江上看流水世事人間喻薄雲鴈宕天台何處所采芝捫葛幸同君傅慧一首傅慧字朗初寧波人居延慶寺夜渡揚子空江信淼茫月出水生光入浦潮如雨沾衣露欲霜天清沙氣白夜静澥雲黄漸覺鐘聲動應知到上方智觀一首智觀字止先號蔚然江都僧雪浪弟子居吳興雙髻峰有中峰草山居漫言板屋黄茅爛棲禪已十春更無孤鶴伴且免衆狙嗔天地寧私我谿山不假人四分僧律在吾自率吾真大壑二首大壑字𤣥津杭州浄慈寺僧有吳詠上方寺遲同游不至湖光斜遶寺松影曲藏闗颿過烟中樹僧歸雨外山井梧秋更老橋蘚晚逾斑目極天涯盡扁舟不易還蓀谷曲磴餘蒼蘚危梁度碧雲山深溪屢合樹宻徑斜分佛火寒猶見僧鐘晝不聞空留争席處野老自為羣通潤一首通潤字一雨吳人居常熟有秋水菴集将歸簡三如學公曉起春寒甚思君巖上廬當門雪幾許倚杖興何如不日理歸櫂無人傳别書臨行重相憶先此寄雙魚斯學五首斯學字悦支號庾山海鹽慈㑹寺僧有幻華集詩話庾山詩格清圓句如薄衾寒入夢細雨逺沉鐘白雲非舊主黄葉自前朝客來黄葉雨鬼嘯白楊風太原山繞中條近小有天通上界寛均有幽致禪藻集載某居士稱之曰清冰勵操栗玉明襟韻似道林不屑飬馬才優無可不愛除官可云賞譽之至雜詩二首落日迫西崦吐月銜東島逝景故悠悠人世漫浩浩所思耿中情憂愁惄如𢷬宴㑹苦不常容顔徒自老子有鼓與鐘勿伐亦勿考一委溝壑中身名同腐草披雲卧丘壑凌風稅籠樊芳節忽已邁朱明照前軒嘉樹滋以緑幽草萋以繁丹藿耀庭戸黄鳥啼林園俯聽石潭響仰視髙崖暾佳期託縣圃遐想踰崑崙臨川有長歎冀與智者言秋夜與羅吉甫同賦夕露鳴蟪蛄秋風動楊柳嘉候苦不常芳華詎能久真境總㑹心萬理弗挂口寫此石上琴醉以山中酒寄吳少君山人知君好芳草荷芰半衣裳一别春山緑㡬經秋葉黄海門生片月江寺送殘陽曾有天台夢相攜度石梁邊城晚眺獨上層樓望欲迷滿城砧杵更悲悽河流曲抱内黄北山勢遥連太白西落葉亂随秋雨下斷鴻斜引夕陽低自來幽朔寒偏早繞樹啼烏未肯棲寛悦一首寛悦字臞鶴南京人居普徳寺有堯山藏草送歐楨伯工部玩世藉㣲禄懐歸騐夙心一樽霜露冷三徑草堂深月是初弦夜秋當欲暮隂蛩聲寒咽雨流入短長吟如愚一首如愚字藴璞江夏人少為諸生負俗為僧居衡山㝷居金陵碧峰寺有飲河稾石頭菴集春日龍潭菴對雨苔蘚空門外烟蘿夾徑隂春流一澗急寒雨數峰深鳥倦還山翼雲遲過客心望中燈火起人語出遥岑𢎞灝一首𢎞灝字空波鄞人傅慧弟子屠田叔云空波詩爾雅而調適詩話上人朗初學詩于楊伯翼侍几杖於五井山伯翼遺草得𫝊皆其力也朗初以詩法轉授空波及西來休逺時人以比支遁支亮支纎謂之一朗三支云秋江晚歸流覽山川幽意多渾忘落日挂藤蘿潮催客子還家櫂風送漁舟入浦歌深樹煙披連翠幕逺峰雲在失青螺臨行笑指芙蓉發明日還期倚杖過佛引一首佛引字西來鄞人屠田叔云西來詩温簡而開暢晚晴寄空波空明休逺前邨收薄靄舍外雨新晴竹䑕争枝墜檐烏得食鳴峰開餘日氣水咽過灘聲芋熟沙田早連朝憶友生圓復二首圓復字休逺鄞人李杲堂云三支詩以休逺為第一此外又有萬詵希聲福亮覺真道東起白宏演敬中皆延慶寺僧俱一時之秀山中槲葉縫衣翠松花作飰香全生無長物辛嵗有餘糧觀瀑衣忘溼縁流路轉長偶然逢怪石趺坐一林霜留别念空問水㝷山各自忙草鞋無底踏秋霜江南游遍還江北何日能來共竹房廣印一首廣印字聞谷嘉善人居杭州開元寺登毛公壇黄屋辭仙闕𤣥闗向此開驅雞何處去跨鶴幾時來殘雪明丹井清霜肅古臺寒烟縹緲外一望一徘徊廣潤二首廣潤字等慈吳興人居雲栖寺終老虞山之拂氷菴晚泊南岸有懐吳允兆茅孝若客燕中孤櫂倚江濆魚梁浦樹分北書曽未達南鴈最先聞碧海生寒月空山冷暮雲不堪三逕逺何以慰離羣蕪湖道中江明分采石柳暗夾横塘驟雨菱芡亂輕風禾黍香秋聲催鴈鶩暝色下牛羊逺道人烟少偏令游子傷如清一首如清字石浪城固人祝髪紫栢山㝷居匡廬金輪峰下有枯木吟荅客問小徒到家消息瓢笠星霜三月周計程應到錦江頭縱教雨雪羈行李不在嘉州在簡州圓㦂一首圓㦂字心柏秀水天寧寺僧有青蓮居集懐黄山吳仲玉千里黄山别幾年冥鴻不見一書傳昨宵忽共殘燈夢三十六峰青刺天行忞一首行忞字闕擇號復元湖州人有且止菴詩集馮開之云忞公詩清真孤迥如倪元鎮畫逺水疎林孤雲片石絶無酸餡氣詩話忞公少出紫栢之門而不相下居於南潯與馮開之朱文寧董遐周尤仲弢輩結方外社遐周稱其口不談貴介筆不流凡近文寧至謂字字作金光明色譽之未免過實吳江道中與陸叔度竝載晚至鸎脰湖别斜日松陵道扁舟共汝還不期初握手旋復動離顔水積猶餘岸雲多莫辨山宵來分寢處宛在漵沙間如觀一首如觀字藴虚海鹽人居雲岫寺有夢華幻住禪餘等集春日胡孝轅過崇福菴肩輿人病足村路邈何長獨歩入深院老梅生暗香霞飛山欲暝風急蝶猶狂相送虎谿外悠然忘夕陽如曉二首如曉字萍踪蕭山人栖隱天台石梁下晚居湖上往來嘉禾有萍踪道人巖艇草天啟甲子朱廣原居士為余構巖艇于湖上九月落成以詩招之心期慧逺山中社興發張融岸上船最好鯉魚風信後東籬無雨菊花姸春暮雨過郊原遍落紅柳絲無力繋東風春隂何處栖雙燕寂寞梨花小院中本成一首本成字在乆蘇州慧慶寺僧有嬾雲詩稾早行木葉墮寒溪軒窻月已西客心驚吠犬茅店乍鳴雞漸覺人烟動相看馬力齊霜華前路滑不住亂鴉啼實䚮五首實䚮字可南吳洞庭山人傷朱雲從别君三日前書來期我顧别君三日後書來是君訃殷殷易簀語一一見心素世事無了期頽陽易遲暮啼烏竟夜啼啞啞感行路梅花手自栽門前落無數蝦蝃嶺君不見蝦蝃嶺崔嵬横截日無影特立太湖烟水中飛鳥何曽至絶頂崩崖挂倒樹日乆生莓苔飛瀑灑石壁磴道鳴殷雷百歩幾蟠曲去矣如復回蝦蝃嶺何年開日見行人天上來送燕晚稻花香處西風送爾歸路長誰是主社逺漸無依故壘殘烟斷虚檐落葉稀春來芳草遍莫忘舊柴扉懐葛震父虎峰言别後嬾與慢相兼已過探梅約翻因病酒淹孤烟生石突飢雀下茅檐昨夜林中雪看山一卷簾曉行東林初日上羣壑開霧色樵夫先入山霜草見行迹闕明一首闕明字若昧廬山開先寺僧有空響集堯山余氏溪上納凉夏館苦煩熱策杖出東扉於焉臨曲澗趺坐憺忘歸嘉木散清隂芳華揚素輝先秋蟪蛄吟薄暮鵁鶄飛情忘境自適心寂理無違願言與同好丘壑長相依明賢一首明賢字履中常州人住鶴林寺有上方集送僧歸梁溪峰烟漠漠水雲低欲挂輕颿日已西江月照人人不住隨風一夜到梁溪圓信一首圓信字雪庭更字雪嶠寧波人初住武康雙髻峰後居徑山有語風稾詩話雪公造詣淵㣲與天童悟禪師同為禹門法嗣天童以巾拂付弟子一十二人再傳登獅座者多至六百七十八人居士不與焉雪公終身不付一弟子手攜藤杖甚竒古或見之以為難得雪公笑曰小大魔王動以拄杖拂子付人十年之後此物不中打狗謂悟公暨通容也將示寂坐髙齋俛見擔糞者過其下呼至授以拂子曰拏去趕蒼蠅可謂獨立不懼者已其居徑山書亭柱云孤雲游此中萬山拜其下臨終偈云三間茅屋傍溪住兩扇竹牕關月眠均瀟灑有致早秋對雨之作尤覺出塵早秋過朱子葵太守鶴洲草堂對雨分韻得飛字方花礎潤晚凉歸隔浦蓮舟望漸稀林下自聞秋葉雨燈前亦有草蟲飛巡檐半濕黄藤杖倚檻重添白苧衣明發霅溪新水下前邨應沒舊魚磯法藏二首法藏字於宻無錫人居常熟烏目峰有山居集山居二首覓得三峰好卜棲月凉松影到階齊山空萬籟由來寂卧聽隔林啼竹雞花落軍持入澗香寥寥浄域絶思量不知下界黄昏近猶向西牕戀夕陽海明一首海明號破山四川人主嘉興東塔寺後入蜀有破山語録詩話張獻忠殺人之多較黄巢百倍自甲申正月犯蜀陷重慶悉斷民右手既破成都僣號大西改元大順授其義兒孫可望為偽平東將軍監十九營李定國為偽安西將軍監十六營劉文秀為偽撫南將軍監十五營艾能竒為偽定北將軍監二十營次年五月可望報一路殺男子五千九百八十八萬女子九千五百萬定國報一路殺男子七千九百餘萬女子八千八百餘萬文秀報一路殺男子九千九百六十餘萬女子八千八百餘萬能竒報一路殺男子七千六百餘萬女子九千四百餘萬此外各營分勦川南川北所殺之數及獻忠偽御營殺人數目自有簿記之不與焉於是四川之民靡有孑遺迨屯營于西充鳳皇山至自殺其卒日一二萬人初殺蜀卒蜀盡則楚楚盡乃殺共起之秦人後令量之以度過不及者皆死駐西充時尚存兵一百三十萬逾兩月劓刵宰割者過半矣相傳破山和尚嘗勸賊帥李止殺賊帥以羊豕進曰和尚食此吾當封刃破山遂食之此破山之徒杖雪通醉載之語録者綏宼紀略謂勸獻忠誤也予友髙念祖對予述之别石車禪師欲别難為别西林落月銜且飛千里雪聊挂一風帆草引石梁屐花飛金粟巖浮雲本無著何處尺書緘通發一首通發字師逺内江人有山居草再過永慶寺山涌孤城外舟行一水前落花柔櫓撥斜日斷橋連丈室依林住雙扉倚竹偏再來情不厭知是主人賢大璸三首大璸字石公雲棲寺僧有石公詩選初出江口孤嶼天際浮連檣霧中出秋容肅驚飇潮勢盪落日凭欄舒逺眸推牕散餘帙未能冥至理且冀綜道術吾生定有涯誰能困蓬蓽别馥菴偶裂塵網出因為汗漫游愛兹山水縣與子成淹留朝看白雲起暮聽江水流有時還䇿杖臨壑復登丘茅屋多真意動息無所求心期既歴落顧此忘百憂好風西南來羽翰生素秋臨岐一揮手意氣凌滄洲君還坐巖壑幸無生怨尤詠史興慶宫西花萼樓五王簫鼓晝同游曲江宰相千秋鑑纔得開元二十秋性琮一首性琮字白法嘉興楞嚴寺僧有剰草夜坐新凉微月上雜坐小庭前莫更燒明燭飛蛾絶可憐讀徹七首讀徹字蒼雪呈貢人居蘇州楞伽之中峰有南來堂稾將游黄山留别友人孤舟明日發再宿皎公房莫惜通宵坐懸知此别長草花黏露重山色入春黄遥指丹臺月心期一片霜再至崇川地盡應臨海天寒欲授衣月隨秋水上人共夜潮歸一犬無聊吠羣鷗自息機橋頭燈火裏猶記舊僧扉自吳門之雲間春雨夜淹淹春波幾尺添背花揺短櫓礙栁揭髙簾三兩家邨落一行書酒帘華亭看不逺的的九螺尖葑門化城菴留别社中諸友相送了無意臨岐忽黯然回看吳苑樹獨上秣陵船春老還山路江昏欲暮天白鷗休避我拍拍碧波圓送朗癯入匡山獨向匡廬去安禪第幾重九江黄葉寺五老白雲峰落日啼蒼兕飛泉挂玉龍憑將嵗寒意先報虎溪松入林入林不知深但覺衣裳冷新緑滿空山低頭不見影雜詩天氣秋晚晴坐看西山色前溪有故人草深行不得契靈二首契靈字仲光號佛石蕭山人居杭州理安寺有山居詩山居二首屈曲山路長曽不見車馬鳥啼落日黄處處逢樵者懸崖老樹枯樵斧不敢剨亂挂猢猻藤不知幾千尺明澗一首明澗字道間成都人落葉臨髙觀逺浦愛此水氣清一葉欲辭樹百葉相隨鳴不能同枯枝遂此幽禽情明河一首明河字汰如南直𨽻通州人絶句二月山容醒林端别有香心知春尚早蜂蝶一齊忙一作巳先忙𢎞句一首𢎞句字致言歙人雪嶠弟子東溪過朱子蓉門外秋𤓰蔓垂垂過板橋東溪一夜水竈下有魚跳通藴一首通藴字靈章臯亭山僧有巢枸集寄周青士作去聲詩賣米周青士白業還能精進無忽憶嵗朝風雪裏扁舟訪我到西湖道源四首道源號石林太倉州人居吳北禪寺有寄巢詩集詩話石林好讀儒書嘗類纂子史百家為小碎集又以餘力注李義山詩三卷其言曰詩人論少陵忠君愛國一飯不忘而目義山為浪子以具綺靡華艶極玉臺金樓之體而已第少陵之志直其詞危義山當南北水火中外箝結不得不紆曲其指誕謾其辭此風人小雅之遺推原其志義可以鼔吹少陵惜其書未刋行㑹吳江未長孺箋義山詩多取具説間駮其非於是一時詩家謂長孺隂掠其美且痛抑之長孺固長者未必有心效齊丘子也早梅萬樹寒無色南枝獨有花香聞流水處影落野人家雪後留雲淡籬邊待月斜牀頭看舊厯知欲換年華寄黄新都子羽入蜀七千里一官行路難鳴琴知訟寡薄賦喜民安閣道雲中見峨嵋雪外看逺書貽藥物不減握中蘭題徐巢友𤣥洲聞之上古人都不記寒暑來者問以年笑指花開處湖邨晚興和陳確菴韻芙蓉水面落殘紅尚有餘香逐岸風一片秋光描不得翠禽時掠夕陽中智觀二首智觀字止先一字蔚然江都人有中峰草山居二首於世了無味戀兹湖上山萋萋芳草合寂寂小庭閒竹筧分泉逺松林待鶴還閉門何不可誰耐日躋攀新開百弓地已得曬袈裟朝暮狙公芋冬春鹿女花薄寒風落木過雨海蒸霞堅卧從頭白何勞問歳華廣化一首廣化字無期嘉興人住持海鹽天寧寺有唾餘集晚次毘陵驛城邊暮雨掩殘罾野店黄昏颭客燈風俗他鄉曽不辨隔谿人指是毘陵明懐一首明懐字墨浪山隂雲門寺僧有寱言雲門和王陽明先生壁間韻偶入空巖逺扶笻趁鹿游為憐千嶂寂擬結一茅休漱玉飛泉潤生雲抱石幽行吟溪上月清影逗林丘明盂二首明盂字三宜雲門顯聖寺僧北塘散歩北塘行數里漸逺入雲根酒斾緑楊渡漁罾黄鳥邨泉流長繞樹山色盡當門荒冢歸牛馬沙隄日又昏病中送魏冰叔還寧都石罅秋棠一節紅主人新病客堂空送君歸度翠微嶺早有梅花小雪中智誾一首智誾字六雪江西瀛山寺僧有炊香堂文集石澗雪瀑交飛谷口喧石橋虎過漸黄昏瘦笻問我誰為伴笑指攀厓下樹猿無文五首無文字貞白崑山鵠林僧有鵠林草呼徳下云貞白死時年三十三遺詩僅六十餘首語新體潔雅近中唐摘其佳句即皎然齊已何多遜焉擬古時俗好蔽美佩艾捐芳蘭天地一以閉賢者詎茍完白璧獻楚人投棄身為殘伯牙失鍾子山水不復彈寥寥千載間所歎知音難聞雞一聲天漸曉野外獨相親乍落城頭月旋飛馬足塵出關仍有客起舞更無人舜跖分何易聞聲太息頻將之潤州簡崑山諸子囊攜贈什滿朋箋豈用臨岐更黯然瓦盋未謀前路食草鞵先乞故人錢江山半壁全輸我風雪何心亦上船他日若吟懐友句定驚深壑老龍眠送嬾雲師歸滇一身初越死生關萬里惟憑白足還怕說雨昏江上寺愁逢花發夢中山心摧故國浮雲外淚濕春風岐路間瓢笠天涯誰念逺無窮哀怨不能刪過胡白叔舊居衡宇依然沒草萊已無吟叟杖蒼苔夕陽一片疎籬下幾㸃寒花獨自開照影三首照影字指月吳江江楓菴僧有鏡齋詩草安慶南北稱方鎮江淮接鼓鼙濤奔皖口急山壓土城低逺戍生煙少飛帆入暮齊欲㝷公瑾墓目落大龍西聞角哀角聲何切寥寥此夜長可憐南浦月更下北庭霜漸起棲鴉翼應迴斷鴈行愁人難及曉一望海雲荒蘭舟渡蘭舟古渡已茫然雲外山横百瀆煙留得龍堂鐘磬響寺門長泊洞庭船道盛一首道盛字覺浪閩人住金陵天界寺詩話浪公早登猊座聲動楚越之交白蓮之社不少宗雷青豆之房恒多龍象詩如清明㣲雨後花鳥亂飛時苦竹長遮徑髙松自䕶闗足稱天籟清機也浴龍池枕流漱石亦何心荇帶蘋花何處㝷夜靜月明風在樹坐聞泓下有龍吟明詩綜卷九十一
