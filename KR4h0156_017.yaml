body:
  text: 明詩綜巻十七翰林院檢討朱彛尊編鄭梴二首梴字叔髙浦江人元宣政院使渭之子擬古二首秦筝一何哀中有淒涼音纍纍孤臣操咽咽嫠婦吟晨霜為之寒浮雲為之隂聽罷復三歎不覺淚沾襟披衣歩庭皋嘉樹鳴曙禽嗒然吾喪我情與海水深孤齋悄無人絳燭夜吐芒羽蟲忽飛来投火欲自戕知為明所誤曷不務韜光子房願封留淮隂喻弓藏法戒既昭然昧者何茫茫髙山有白石行當煮為糧鄭杕一首杕字叔韡梴之弟宋學士女婿也有學古齋集懐宋學士亦知離别逺喪亂近何如流水天涯路征鴻塞外書緜緜飛雪晩㸃㸃落梅初日月重回首那堪已嵗除鄭榦一首榦字叔恭亦梴之弟從宋學士游永樂初以薦授監察御史詩話叔恭宣撫廣東民以取珠為苦至即奏罷永樂十二年年已七十有二矣值長陵埽平沙漠因進五言詩帝歎曰可謂滿朝詩伯第一叔恭因告歸帝予敕書許致仕賜宴於禮部畀以金繡衣問誰可代者叔恭舉從子煁御筆即除御史義門詡為盛事寄宋仲珩鷽斯桑下飛青鳥海上游如何不同調羽翼有短脩故人昔相見時時話綢繆出入念同車無衣念同裘一朝參商如豈不懐百憂初盟儻不渝在逺情愈周但願似夙昔烏用苦相求鄭桐一首桐字叔成榦弟洪武中以薦授滁州判官春思棃雲淡淡霧濛濛人在青樓第幾重鸞鏡未開簾未巻羅衣先怯五更風髙伯恂一首爵里未詳詩見光岳英華寄梁紹輝花時醉裏匆匆别回首西風錦樹秋明月相思隔江浦素書不見到林丘松隂塵榻晴還拂池畔清樽晩更留山水閒情宜共賞碧雲涼鴈思悠悠梁紹輝一首未詳詩見文翰類選登小孤山亭子飛亭結構半山隅雲影天光入畫圗清漲九江吞漢沔髙標孤柱限荆吳風来舟楫欹危疾雲暗魚龍變化殊獨倚畫䦨吟不盡白雲飛去寸心孤張廸一首廸字文海華亭人宋徽宗畫半開梅上皇朝罷酒初酣寫出梅花蕊半含惆悵汴宫春去後一枝流落到江南章誾一首未詳詩見皇明風雅送張二貢士煙靄㪚春晴亂鴉深樹鳴千山懸落日一騎出孤城急管催離宴飛花惱客情殷勤懐上䇿謁帝向承明王超一首未詳詩見荆溪外紀張緒歸舟落日半帆収張溪古渡頭花明汀樹雪香泠渚蓮秋碧浪揺檣影青山枕柁樓曾知風景好記此一停舟黎充輝一首充輝字睿之臨江人府志云充輝名慎山雲辭将歸作清江兮淙淙上有山兮穹窿白雲兮谷口一碧兮千峰晻靄兮絶壁挂偃蹇兮長松朝迎兮秋陽暮巻兮秋風山之人兮雲從被薜荔兮搴芙蓉来乗雲兮朝九重跨一鶴兮江東點汀花兮白蘋雨霜葉兮丹楓忽雲歸兮人逺山蒼蒼兮倚晴空丘輔仁一首輔仁字友文歸安人詩話友文少有至行不樂華靡母衣之以綵帛赧顔不服長博通經史恥為章句之學潘元明據湖州使人召之亡去洪武初始歸里業農終其身詩集失傳南湖南湖二月水如天羅綺東風醉少年十里好山都㸔盡琵琶催撥夕陽船謝林三首林字璚樹武進人應芳子有雪樵集煮雪窩稿詩話璚樹名林本係一人列朝詩集複出誤也潁城鳳凰臺鳳凰臺臺何髙野雲黄業風蕭騷不聞孤鳳鳴但見鳥雀棲蓬蒿梧桐摧折傾舊巢鳳兮何處翔赤霄無由再覩兮使我心勞梳洗臺雲為裳月為璫鄭姬不見臺己荒千年臺下土花碧猶帶洗時脂粉香今古繁華易衰歇溱洧水流聲嗚咽曾識宫中歌舞人只有臺前舊明月青城虞勝伯顔丘氏小軒曰看帆為賦律詩因以寄予次韻録奉彦章風帆己逐歸雲盡江水何如客意長荏苒嵗華駒過隙飄揚生理鴈隨陽從知白髪非春事醉看青山即故鄉獨笑夢中忘未得落花風起動回檣張端義一首未詳詩見鐵網珊瑚送張吳縣之官嘉定分賦得錦帆涇風吹闔閭城花落錦帆涇錦帆去不返春流日夜生故人在何處恨滿城邊路月明烏夜啼霜冷丹楓樹涇水抱城流直通東海頭布颿挂落日相送練川游徐文舉一首文舉武進人賦得百花洲春花迷繡幄春水漾金鳬照影和明月流香過石湖錦帆應不見沙鳥自相呼感舊復傷别愁傾雙玉壺詩話金壇張徳常起家吳縣丞厯縣尹遷嘉定州同知其行也諸名士分賦吳中舊蹟送之廣陵陳廷珪得龍門廬山陳汝秩得采香逕宛丘陳秀民得靈巖吳郡鄭元得越公井錢唐范致大得石湖江隂張端得林屋館青丘劉堧得虎丘太原王逢得劒池薊丘聶鏞得天平山四明陳朴得白雲泉㑹稽張憲得吳王井田明陳桱得太湖石勾吳周砥得洞庭山晉陵張體得琴臺巴西鄧徳基得玩花池清河張端義得錦帆涇崑山盧熊得館娃宫吳郡王行得放鶴亭渤海髙啟得響屧廊髙郵龔宜得梧桐園吳郡黄本得白公檜延陵徐文舉得百花洲江隂張瑄得采蓮涇海昌董翔凰得辟疆園無錫顧常得夫椒山而遂昌鄭元祐亦賦采香涇且為之序巻中賦鱸香亭者脫去姓名吳人米存理編鐵網珊瑚具載其詩余詮一首詮豐城人海水操陳母莊傷其夫溺死於海作海水蕩潏兮茫無津涯夫君一去兮杳無還期為死為生兮曾莫我知欲往從之兮襁褓有兒同室同六兮我志獨違恨深海水兮曷其己而劉堧一首堧字公坦江隂人題東章孟山水廬江公子稱三絶詩妙書精畫亦工落茟多宗董北苑髙情不減米南宫天低碧樹春雲合潮滿滄洲暮雨空却憶買船同載酒城樓山館醉東風茹湜一首湜字季清無錫人有爪膚集楊白花楊白花身輕不由已一夕長風生飄飄度江水江南處處好繁華悠揚落地知誰家知誰家不復歸永巷春深人迹稀悲歌連臂空腸斷回首長秋鴉亂飛馬麐一首麐字公振崑山人有醉漁草堂二集和楊亷夫新居韻楊子樓居飲馬河書舟日日檥晴波未論栗里功名薄總為䕫州詩句多逺樹入簾秋若薺亂雲渡水白於鵝何當共把凌風袂醉和仙人鐵笛歌蕭岐一首岐字尚仁泰和人明初以賢良徴為潭府左長史固辭謫楚雄儒學教授改平涼學訓導有正固先生集入閩自入閩中道偏諳物外情田從山下種船向石稜行海味空多族榕根盡倒生連城公舘好驛使逺相迎顧協五首協字允廸無錫人貢監生有鳴志集詩話允廸以諸生貢入成均詩有脱却朝衣換布衣之句則亦通朝籍者詩頗清穏五言如亂峰烟外紫殘日樹頭黄佳句也待鶴白鶴去何之想在蓬莱頂月下漫沉吟衣沾露華冷夜乆不歸来立盡青松影次錢助敎見寄韻窮巷誰相問蕭條獨掩扉雨中花旋落江上燕初歸計拙身從嬾才疎事轉違思君長入夢莫怪往来稀送張翰臣幕掾還廣西曾持刀筆贊元成不數區區野戰功青鬢消磨千嶂外舊交零落十年中雪晴官路梅花白雨熟蠻鄉荔子紅三十六原何處是馬蹄輕踏緑楊風舟中次韻西風吹老白蘋花獨倚歸舟感物華漠漠秋雲暗山谷不知何處是吾家孟夏書事脱却朝衣換布衣始知今是昨来非緑隂庭戸無人到惟有一雙新燕飛陳鈞一首鈞字衡臣羅源人洪武中以人才薦官建徳縣丞有退軒集徐器之云衡臣詩體法聲調一歸於正題金山壁間畫空翠忽入戸飛来何處峰人家多傍樹僧寺不聞鐘流水衝橋急閒雲出岫慵何當撫琴坐願學卧遊宗鄔修一首修字存誠南昌人洪武丁丑進士厯官太平知府中秋分韻秋月己成規秋闈猶列㦸妙契結金蘭今夕是何夕時序有代謝情懐增感激對酒發新吟此樂良難極劉欽謨云冲澹和平詩話革除四載文獻無徴成化初吳人劉昌提督河南學政得建文元年湖廣鄉試棘闈倡和詩集中作者豫章胡儼若思鄔修存誠廬陵謝矩子方陳孔正闕鄱陽洪初善初閩張勉學思哲江陵熊釗伯機蜀川郭璲孟温聶潮責廷輔㑹稽陳安惟康馬文炯闕三衢張起師震何逺思道清江袁士誨文政郫筒王景應星萬川冉通穎逹桂林唐昉景升維揚李駱文載栁州莫忠彦良容山周廸遵道廣饒袁本于中凡二十一人昌鏤板以傳且序之曰是科所取第一人實太師石首楊文定公而胡公評其文謂能董子之正言不效公孫之曲學者愚按福建是科領解則建安楊文敏公明年文定文敏俱成進士而胡文穆廣金文靖㓜孜胡忠安濙顧端肅佐皆建文庚辰榜釋褐者卞同一首同字孟符吳人倪雲林畫雲開見山髙木落知風勁亭下不逢人斜陽澹秋影梁楶一首楶字𢎞宇南海人寄董宗輔東江去悠悠送子孤行舟舟行復幾時江鄉生逺愁海水無定影萍踪忽飄浮雖非千里别出門成久逰采采芙蓉花欲寄無輕郵念昔携好手中情鬱綢繆商歌寄逸響素琴鳴芳洲如何曠髙躅杳若隔山丘馳情託緘素日暮風颼颼無由慰離索一鴈横髙秋王敬中一首敬中字敬中鄞縣人洪武辛亥進士刑部主事題丹丘四窗山色可攬秀雲根石屋髙嶙峋林間遺舄曾化虎洞口㹼猴渾似人奔流直下幾千尺髙蹈今逾四十春靈光夜夜照丹室應有飛仙来往頻陶琛二首琛字彦珩吳縣人過徐良夫耕漁軒次倪元鎮韻西山久思往經春復逾秋廻看岸傍樹尚繫煙中舟日月倐飛騰不異川波流至今逺游興浩然殊未休東風江上来沄沄水生洲便欲引雙屩飛行紫巗頭如何苦蹉跎徒睇雲路修谷鳥在林杪鳴聲亦相求今君展清讌胡不邀同遊開舘集羣彦翩翩文采優相逢尚難得况兹旬日留懽然對樽俎情意兩綢繆嗟彼丘壑賞豈顧茅茨幽愁来發清詠獨倚城南樓詩話吳中徐逹左良夫耕漁軒名士留題甚衆朱徳潤澤民為作圖仉機沙大用作傳髙遜志士敏作記唐肅處敬作銘王行止仲作序楊基孟載作説釋道衍作後序因編為金蘭集其十二世孫大業受業於予出先代所遺詩箋百餘幅正草篆𨽻靡所不有如束筍然皆元季明初諸公手蹟也未幾以訟破家悉為有力者所得過眼雲烟不復可覩矣惜哉自陶琛以下三人均某中詩題江參長江圗石出夜潮落山明寒霧消江空千里櫂村迥一歸樵樹色連沙嶼人家傍野橋還同舊棲地風景日蕭蕭余震三首震字以聲九月廿一日偕范孟學李徳輿訪徐良夫耕漁軒是夕乗月過溪寺登擁翠方丈分韻得下字商猋發清秋孤月耿深夜𤣥賞悟真情况兹幽林下蕭蕭殘葉飄瀏瀏飛湍瀉驚鵲鳴髙枝流螢繞空榭芳絃既巳歇佳詠豈云罷復與道人期逍遥宿精舍月下聞琴别邵先生包秀才孤光澹燈室微煙繞香几誰彈膝上琴夜半離聲起瑟瑟度涼風泠泠寫秋水流音松竹外却憶空山裏過邵𢎞道先生墓次韻孤墳四尺鳳崗前此日重来又一年新土有痕分草色舊蹊無跡長苔錢殘花自落山中雨逺樹空迷嶺外煙回首令人多感慨賦詩揮淚寫長箋董逺一首逺字仁仲城頭烏示良夫城頭擊柝邊月低啼烏繞樹寒不棲天邊明星白如月空階落葉風淒淒房帷静悄夜何永青燈無眠照孤影蠨蛸在户人未還闗河十月衣裳單謝常三首常字彦銘吳江人洪武中舉秀才召試丹鳳朝陽賦稱㫖帝欲官之辭歸隠震澤東溪有桂軒稿東溪集詩話彦銘楊亷夫弟子詩尚纖麗縣志稱洪武末舉秀才帝欲官之辭疾不拜考集中詩事在洪武十五年八月其詩云歸飬慈親荷聖恩喜傳天語出金門河陽敢問花誰種彭澤應知菊尚存則以飬親辭非以疾辭而所辭之官似屬縣令也又寄靈谷定巖長老詩序云不肖衰朽目昏鬢毛皆雪幸有老母百又六嵗荷䝉恩渥勅許終飬足為明證矣集又有永樂元年八月陪祀縣庠丁祭及鄉飲分題之作句云喜當時盛陪清列或者曾攝邑校耶竹枝詞送别闔閭城邊楊柳黄吳姬如花明月璫送郎不勸銀缾酒持贈雲鬟金鳳皇和靖觀梅圗孤山嵗晩水迢迢竹外横斜挂緑么吟到暗香疎影句黄昏月上雪初消携琴訪友圗秋林紅葉晩蕭蕭乗興携琴過野橋人在翠微尋不見白雲如練束山腰吳中一首中字宗本自號青霞處士有林霏集白鶴山吳興多名山兹峰特竒秀不知自開闢隂陽幾昏晝云有未髭僧㝠棲刻蓮漏香臺儼有在祥室己新構松下伏神龜竹間走飢鼬白鶴不受招仙蹤亮難究伊昔屢登臨空翠濕衣袖窮摉不知疲幽討寜嫌逗巖扉與澗戸一一為重叩和詩寄山靈餘生敢多又劉子建一首字里未詳浦城漫興清溪何似百花潭谷口雲峰半夕嵐借問子真歸隠未鷓鴣春雨滿江南謝恭一首恭字元功長洲人徽弟有蕙庭集過張水部樂圃林館和髙季廸韻故人非傲吏舊隠勝愚溪塵世人難到空林鳥自啼青山懸榻下緑樹斷厓西終日無餘事長吟信杖藜潘子安二首子安和州人有海天清嘯集詩話子安詩見湖海耆英詩集其字未詳吾鄉郁氏書畫䟦載有潘伯濟題畫詩云全篇清婉繹其名字疑是一人然未敢臆决附録之以侯再考九日王時融招飲喜見長缾破曉風忽移春暈上衰容故人己覺樽前少佳節偏於客裏逢千里暮愁連蟋蟀無邊秋色醉芙蓉而翁此際登髙處應在三山第一峰題畫岷峨雪消春水急瀟湘雨餘雲樹濕迢迢翠嶼孤鶴㢠湛湛珠宫老蛟泣征帆數點風濤中出没不計天西東鄉闗杳渺在何處矯首遥送雙飛鴻陳士楚一首士楚揚州興化人書錫山驛嗚嗚畫角冷涵秋一曲梅花動暮愁不管江南斷腸客夜深吹上月明樓沈應三首應字徳䖍吳縣人元夕燈月滿春城金吾縱夜行誰家無畫鼓何處不銀筝願以昇平樂懽歌答聖明次錢文伯題雲林詩韻紅葉橋邊草舍低半灘斜照水平溪舊時曾記題詩過疎雨桐花一鳥啼看山老年己免綴朝班林下於今許我閒流水小橋紅葉逕杖藜隨意㸔青山史謹一首謹字公謹崑山人過七星闗萬里投南徼層闗度七星嶺雲和瘴黒木葉向冬青路逺家難問愁多酒易醒相逢但樵牧何以慰飄零朱武一首武字仲桓紹興山隂人張子正春雨鳴鳩圗東風簾巻小紅樓三月棃花喚錦鳩曾記玉人将鳳管隔花低按小梁州吳倫二首倫字文伯吳人苕溪春曉圖夜聽溪上雨曉看溪上山雨歇山更佳尚在空濛間白雲掩疎鐘緑樹迷逺島居人想未起村村自啼鳥賦得秋江送别秋隂日易夕江空嵗云晏惻惻傷物情悽悽屬昏旦聳秀林際峰流響雲中鴈煙蕪銷逺緑霜楓炫餘粲時芳遞衰榮人事更聚㪚方敦金蘭契遽念蠨蛸嘆夙駕嚴霜寒晨起明星爛揚船子夷猶㐲枕我羈絆那知惜暌離矧復值憂患秋吟不成章一辭媿莫賛徐基一首基字立本臨海人寜海道中中嵗事行役勞生卒未休大星垂野白逺水際天流土俗魚鹽富民居橘柚稠何年謝塵鞅歸卧此林丘陳文東一首文東字同闕松江華亭人宿陕州横渠舖獨客卧車上羣僕卧車下車前或明火時時照牛馬朱希晦三首希晦樂清人有雲松巢集詩話處士元季與吳主一趙彦銘隠居鴈山時稱鴈山三老明初不仕有薦於朝者朝命未至而卒集為七世孫𤣥諫刋行其夏日書懐云白髮生涯人已老緑隂時節雨偏多寄友云煙色春歸楊柳底雨香紅入杏花初傷時云城邊向晚黄狐立海外何年白雉来自歎云家貧觕具千金帚國難曾無一箭書訪僧云松隂夜静鶴初警花院日長僧未還皆佳句也客邸中秋對月去年中秋秋月員浩歌對酒清無眠煙霏滅盡人境寂仰看明鏡懸中天今年客裏中秋月静裛金波更清絶可憐有月客無酒不照歡娛照離别夜䦨淅淅西風涼月中老桂吹天香悠然長嘯動歸與坐久零露沾衣裳浮世悲懽何足數庾樓赤壁俱塵土風流己往明月来山色江聲自今古納涼無事解衣坐超然心境空深林翳炎日萬壑来夭風閒停白羽扇拂拭朱絲桐醉罷不知夕月生滄海東寄友雨過溪頭鳥篆沙溪山深處野人家門前桃李都飛盡又見春風到棟花甘復二首復字克敬餘干人有山窗遺稿曉出西園由谷中歸披褐陟西園煩襟㪚清曉微風動髙樹零露下芳沼始行幽谷中忽出清林杪流水漂餘花修筠度啼鳥身縁翠石廻思逐白雲杳負杖孤賞懐春䦨緑隂悄送别凉飈應秋氣草木歛華英客游總念歸子有千里行悤悤儔侣催悄悄離思盈丈夫懐志氣孰不戀榮名華薦起當路使者促前征追餞東門道把酒哀絃鳴蕭條野驛暮泛灔江波清宻謀植帷幄慰彼蒼生情古来盛名士多是起釣耕鄭洪二首洪字君舉永嘉人有集詩話鄭君舉詩一巻曹侍郎古林藏本侍郎題是永嘉人而鮮于伯幾書趙子固水仙巻稱元貞二年正月同餘杭盛元臣三衢鄭君舉觀于困學齋初疑君舉乃三衢人然考周𤣥初来鶴詩有永嘉鄭洪君舉之作見鶴林類集則君舉為永嘉人無疑来鶴事一在至正十七年一在十八年一在洪武十四年一在十五年一在二十七年吳山白塔寺江山襟帶尚依然王氣銷沉巳百年八葉龍孫東渡海六宫虎士北歸燕銅駝荆棘荒山裏石馬莓苔落照邊玉匣游魂飛刼火五陵無樹不啼鵑寄毛府判南湖水長没蒹葭西浦横橋對白沙鴻鴈来時菰有米鳳凰飛去竹無花石田賦寫張平子雲閣書通蔡少霞零落江陵千樹橘青門猶戀故侯𤓰朱友諒一首友諒常熟人詩見鶴林類集周尊師禱雨歌道人鞭龍出潭底黒雲一片山頭起仰看紅日不見光黒龍頭揺白龍尾有時登壇步七星一呼一吸成雷霆白波翻空海水立銀河落地天瓢傾去年京師禱雨雨輒至大田小田總霶霈定知夜半拜封事自有精誠感天地王公貴人知其賢屈師闡教来琴川今年旱魃又為虐禾稼半死民熬煎縣官投詞庶人跪道人受命應且喜笑書鐵牌役海鬼疾驅一百五十里甘泉龍居萬丈深神符召集如飛矢今朝雨脚来自南半是吳江四橋水頂山有龍名大白口噀湖水成甘澤道人驅龍喝龍出五雷使者閒不得龍兮龍兮一噀日失色金蛇掣電光千尺再噀山氣黑飄風盤旋走沙礫上天有寳不愛惜噴下驪珠千萬石兩龍行雨勢未休須㬰潦水平田疇疲農入城報沾足道人一笑山雲収詩話尊師世居嘉禾從紫虚觀李拱瑞為道士李南谷杜真人髙弟也周伯温紀畧云先生受法於顧飬浩步雲岡雲岡受之張雷所雷所受之王繼華繼華受之莫月鼎宋景濓傳畧云霅川有莫洞一授其徒王繼華繼華授張善淵善淵授歩宗浩宗浩以授尊師禱雨事一在洪武元年一在二年永嘉鄭思先序之思先詩云道人緑鬢雙青瞳自言前身河上公歘騎黄鶴辭帝宫歸来塵世發羣䝉海虞福地秀所鍾七星逢老檜摩蒼穹道人重来御泠風屠維作噩歲式季夏旱熯何爞爞縣令延師師說從飛書上奏徹九重鐵劵怒起神淵龍左驅飛亷右豐隆天地俄頃驚晦曚廿霖注地疾若舂千村萬落沾渥同頓回枯槁蘓疲癃旋斡造化非常功道人拂袖喜滿容笑指霽日扶桑東其篇法頗與友諒相近然不若朱之朗朗也思先官至福建布政而温州府志失載葉谷亮一首字里未詳詩見沈巽明詩選䢴溝懐古丞相三軍出曾聞此㪚亡黄蘆今夜月白骨舊時霜世已尊王室人猶説戰場維舟重感慨涕涙在衣裳胡温一首温字遵道㑹稽人詩話温異人也少落魄湖海間後入閩性好飲不常得人方置酒不問主客逕造飲酒盡不謝而去日出行市中羣小兒逐之呼曰風子温顧而自笑夜宿古祠下雖寒冬雪甚衣布單衣履草屨身不顫慄人或遺以衣不至數步遇寒者輒解予之駙馬都尉王恭守閩孝陵賜以織金衮衣僉具酒賀温突入曰某亦賀公持酒覆其衣恭不為忤温亦自若漳帥徐玉好士温特過其家玉召飲同官俄而温至歌詩起舞至慢罵坐客玉亦不厭也過元漳州守迭理迷世祠酹之水祭以文曰衆之生不如侯之死侯之死名長在此萬嵗千秋元之臣子拜已大笑而出著書名曰竹帛流芳載元忠臣義士并貞烈女叙其本末系之以辭類鐃歌輕重皆有深意一日告徐玉曰吾将歸矣負槖行三舍為關卒阻而回發槖中止有硯一易酒飲之起舞作喜鵲之歌歌畢仰户而死時洪武七年冬也玉葬之漳州西門外天台林公輔為作胡風子傳其大畧如是公輔稱其生死如在巳葢冷謙張邋遢周顛仙一流歌閩山喜鵲少越山喜鵲多如何不歸去其奈羅網何明詩綜巻十七
