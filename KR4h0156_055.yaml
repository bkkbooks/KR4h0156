body:
  text: 明詩綜卷五十五翰林院檢討朱彞尊編陳淳二首淳字道復後以字行别字復甫長洲人國子監生有白陽集張石川云白陽從游衡山稱入室弟子有雲林之瀟灑而無其癖同石田之髙潔而通於和所謂逺性風疎逸情雲上者邪錢功甫云先生詩瀟散閒雅恬憺自然如梧桐半階月楊栁一簾風流水去無住停雲意自閒晚涼生竹塢新水溢花渠咸臻妙境靜志居詩話白陽冩生全學石田詩亦倣之特少神解耳畫梅風引上春香雪弄南枝色為有惜花心樓中莫吹笛聞鳥重重煙樹鎖招提野客来㝷路不迷纔過板橋塵土隔落花無數鳥爭啼彭年一首年字孔嘉長洲人有隆池山樵集徐伯臣云孔嘉詩中含沈鬱之思外被組繢之華聲調和平詞致暢越可謂風流自命者也王元美云彭孔嘉如光禄宴使臣餖飣詳整而中多宿物詩話孔嘉人品足亞徵仲何穉孝長歌云隆池處士彭孔嘉徵仲並軌吳人誇特詩不及庚申秋書事内􅛎傳焚廿四坊錦雲花隊一朝亡渥洼未見来天馬槃木無聞貢白狼此日朝廷思李牧他時文簿抑揚湯運籌急為攄長䇿薄伐宜城古朔方陸治二首治字叔平吳縣人嵗貢生有包山遺詩詩話叔平遊道復之門當時鄉曲之論謂詩得其興畫得其趣然叔平畫以工緻勝詩則與道復同流治平寺納涼竹根雨過石苔斑鐘梵蕭然晝掩關坐愛微涼生碧殿忽看飛雨失青山雲分暝色来天外風卷潮聲落樹間最是晚晴宜眺聽夕陽横抹蓼花灣桃花楊栁舞鴨圖二月吳淞水上灘栁絲風急絮漫漫詩翁賦罷閒凭處花滿春池鬭鴨欄錢穀一首穀字叔寳長洲人有懸磬室詩詩話叔寳貧無典籍遊文徴仲之門日取挿架書讀之以其餘力㸃染水墨超入逸品晚葺敝廬題曰懸磬室王元美為賦詩所云空梁頗受落月色北窗靜竢涼風眠者是也手抄異書最多至老不倦倣鄭虎臣吳都文粹緝成續編聞有三百卷其子功父繼之吳中文獻藉以不墜與公瑕伯穀奔走相門者逺矣夜登虎丘次韻遥憶梅花閣還思修竹林煙迷山徑窅雲鎖石苔深香界期重宿筠亭擬更臨悠然停采艦燈火晚隂隂居節四首節字士貞吳縣人有牧豕集詩話商谷繩削斤斤不失晚唐家數晚坐鴉背夕陽盡柴門暮色初山寒漸風露人語半樵漁落葉聞碪急蘆花映日疎年年楚江上不見雁將書雨後緑嶼青林白練溪艸深市井路全迷雲將片雨歸何急麥釀輕寒秀欲齊一水遥連蕭寺外千山不斷石橋西欲營三徑添松菊立盡殘陽見鳥栖重題自畫小景贈戴子文去畫時四十年矣㸃染青山四十年寸縑不改舊風煙散人漫竊江湖號未買松江一釣船村居圖茅簷日暖燕交飛雲過牆隂濕翠微中酒經旬掩關卧蒼苔渾欲上人衣周天球一首天球字公瑕長洲人諸生中秋長干曲玉笙低引紫簫長不許商音斷客腸聽到月斜纔入破飛来七十二鴛鴦王懋明一首懋明字僅初長洲人僑居錫山毛氏樓居即事為樓山郭外登眺起幽思片雨沈江暗孤煙上嶺遲鴈還逢寄字花發滯歸期逺念吳山勝春遊恐後時姚咨二首咨字舜咨無錫人有潛坤集桂亭為豫章萬隠君賦南山鬱秋霽重巒桂花白髙人愛巖棲躋攀理輕䇿覽彼雲木秀悠然縱所適結亭青林端幽賞非矯迹冷風吹霞裾涼月挂石壁襲芳和天倪餌實駐顔色淮南詎可招此意良自得願貽瑶華音一慰山中客西樓席上聽梨園琵琶戲贈少年文采復風流適意吳山竟日留老去不忘歌舞興琵琶猶載木蘭舟周詩一首詩字以言崑山人有虚巖集皇甫子循云山人詩婉麗以㑹景俊逸以宣情舂容以達氣真得古人之髓至王元美云周以言如中智芘蒭雖乏根具不出小乗語詩話虚巖頻與皇甫昆弟酬和故派亦近之其言云詩之淵妙近體難工而鮮叛選體易似而實離倩衣毛嬙借飾西子始勞髣髴終露本来作者既非匠心覽者又皆庸目乃曰甲幾魏晉乙庶齊梁是何古人之多也斯言可鍼巵言詩藪之膏盲靈隠寺靈隠何年寺青山向此開澗流元不斷峰石自飛来竹覆空王苑花藏大士臺冥探有𤣥度莫遣夕陽催唐詩二首詩字子言無錫人有石東山房稾九日登牛首山牛首登髙處黄花細雨前山深寒似臘江逺澹於煙寳刹珠光淨金陵王氣連六龍曽駐輦聽話武皇年采蓮曲風微波不起日暮未迴船貪看鴛鴦鳥時時誤采蓮沈仕一首仕字子登杭州人刑部侍郎銳子自號青門山人王道思云青門樂府古詞雜咏遊適之作麗而有則風致藹然邊關諸詩意氣激發於聲律之外殆雄心俠氣有不能自釋者邪中岳東伯云青門身本貴介志則清真野服山江遊海覽新篇雅調逺邇齊稱翰墨丹青兼能游藝信乎野鶴之在雞羣祥麟之遊郊外村居春日栁堰迷丹日蓬扉啓緑煙人閒啼鳥外興劇落花前野色連三徑山光滿四筵鷫鸘如可解堪作酒家錢陸楫一首楫字思豫上海人承父深䕃入國子監讀書有蒹葭堂稾次韻送顧龍山南歸官河春水送行舟君去匆匆不可留須信故園春正好莫因風雨駐揚州牟嘉叙八首嘉叙字寅定黄巖人有霞溪漫稾趙方崖云先生以布衣處窮谷游情景物能自得師於語言之外而不越乎尺度矩矱之中擬古二首驅車出門闌車行復遲遲百艸委霜露涼風正凄其天寒道路艱問君將何之駕言往宛洛相從遊俠兒遊子去萬里旋歸竟何時安得附飄風致此殷勤辭灌木産崇岡鬱鬱蔽層丘芳艸依澗側託蔓相綢繆美人隔遐方宜為君子仇未及登君堂嵗月倐已遒慨彼芙蓉花漫爛當清秋采采欲為贈道路阻且修願君保明哲妾心亦何尤遊江心寺登康樂亭子輕舠截奔浪水國散微隂㳂洄眺孤嶼寳塔凌雙岑兹遊夙有期始得遂幽㝷淵室接梵語花臺遶龍吟滉漾元氣中日華映珠林謝公有遺蹟孤亭俯江潯曠懐寄𤣥賞海嶠振徽音清芬詎可挹髙情傾古今西堂夢不返池艸春自深同方用晦遊西谷褰裳涉西沚披莽散輕屩稍觀山川異煙火隔墟落沿洄傍溪曲窈䇿入穹壑幽㝷葛可捫晻曖路疑錯巖雲冐巾幘霏翠灑林薄汲深俯重淵采秀踄崇崿坐聆伐木音益感良遇樂返䇿復流憩逍遥展歡謔眷兹丘園賞胡為就羈縛漁家用從姪存勇韻茅茨傍江口斷岸依漁梁榜舟蘆花渚閒歌和滄浪日出水禽散風至蒲帆張青蓑濕不解卧看南山蒼送馬斗南歸揚州去年九月黄花秋邂逅與子城南遊髙才磊落不易得竟日尊酒情淹留三年為客風塵裏末路相逢即知己禹穴探幽興未窮梁園作賦詞堪擬一别嗟余懐故丘聞君亦欲㝷歸舟萍蓬蹤跡本無定使我感慨增離憂一片孤帆向何處日落雲横廣陵樹天姥峰前送月明姑蘇臺畔聽鴻度江煙慘淡江草青衆賔估酒雙玉瓶别君惆悵不忍去碧雲回首天冥冥觀古壁畫山水歌危樓百尺凌空起古壁丹青畫山水淨掃浮埃據榻觀筆跡何人乃能爾想當盤礴時巧思妙入神胷中羅萬象寫出皆天真迴峰疊嶂開嶙峋白波浩蕩渺無垠仙人宮闕擁出碧雲裏宛如三山隔水無通津松間白鶴呼不下却思整翮凌蒼旻超然風景異人世四時花木相鮮新溪林冥密碧艸合又如花源有路通秦人蒼茫逺勢尤莫測渤澥崑崙看咫尺一葉漁舟歸未歸洞庭秋淨湘煙碧野橋沙岸曲徑通髙樹下有長髯翁恍如著我圖畫中手攜雲鑱倚青松萬籟不起千山空仰天一嘯看飛鴻青田溪上月出髙峰潮上灘叮嚀舟子放舟還蒲帆不掛春流急又過前溪白鷺灣陳體文五首體文字仲約號寄委江隂學生有友録稾劉應谷云寄委詩靡有承襲成一家言詩話仲約早辭學宫肆志詩律築耕舍於郊西有田數十畝力耕而食賔至必治酒酒酣賦詩詩有云得魚便覔酒有酒且留人如此即為樂何須復苦貧無魚亦無酒宜主不宜賔如此即髙卧何愁不及晨可謂達生之士矣平居詩不留草其友花左室見輒手録之故名友録稾五言不為舊格所拘頗自超脫是時五岳十岳諸山人率以韋布效縉紳語未免可憎菰蘆中有此人大是不俗雜詩三首林間慈烏鳥哺母聲嗚嗚城上雙䲭梟破巢還啄雛韝鷹飽食肉勁翮翻平蕪不擊城上䲭但擊林間烏漢家有通儒窮經三十年腰下鮮尺組囊中無一錢出門逢髙車呵者當其前問之彼為誰牧兒新助邊明鏡不在逺籹臺當目前只言他人􅑦長謂自已妍人亦不能别鏡亦不能宣遂使效顰子翻希惑者憐三月晦日作造化如驅車春歸一何早本為天地客又復客中老榮華已潛奪安得顔色好君看庭下花開者行當掃宴起老覺春無賴朝来起最慵鳥聲殘夢裏花氣宿酲中樓日連城下池風過苑通却悲寒食節嵗嵗客江東王襞一首襞字宗順泰州安豐場人處士艮仲子自號天南逸叟有東崖遺集詩話東崖隨父心齋之㑹稽傳陽明良知之學吳興沈秱贈之詩云念子賢者後至理早已融譬彼三世醫指授寧無從詩其餘事然如一室風過雨三更月到窗好雨應宜早秋花不恨遲坐雨新亭曉聞潮落月時老攜杖屨歸山谷閒看兒孫種水田亦有活脫之趣漫成青春去何速白髮將奈何豈乏大藥資而不棲巖阿擾擾苦勞生所得諒無多古人貴聞道道在焉問他岳岱一首岱字東伯蘇州衛人有漳餘子集詩話東伯集交友詩為今雨瑶華猶存次山篋中遺意征南安南易姓舊相因封賜還應到海濵萬里版圖曽郡邑殊方小醜亦君臣炎風毒霧煩諸將翠羽明珠入紫宸想見乞降矜面縛天威此日轉陽春方學漸一首學漸字達卿桐城人貢生有連理堂集詩話方氏門才之盛甲於皖口明善先生實濬其源東南學者推為識志焉如東征句云豈謂憑陵愁日本至勤師旅出中原宛然空同華野遺響白雲巖磴道斜飛瀑巖花半入雲望中孤鳥沒天外一江分竹柏山樓色旃檀石鼎熏軒然長嘯發清興好誰聞方學箕一首學箕字紹卿學漸從弟有卷石山房稾劉慎吾贈石怪石從何得玲瓏自可憐感君同白璧置我小窗前張士瀹一首士瀹字心父崑山人有張氏集送人還京臨岐一别酒惆悵故人違落葉雨中滿歸舟江上稀路將天欲逺帆逐燕同飛去去還鄉落無勞淚濕衣陳鳳鳳字羽伯更字鳴岐無錫人有石邨稾穆敬甫云山人不務竒詭而意象悠然詩話明詩人同姓名者甚夥然猶世代相去字里未同至金陵陳鳳字羽伯梁谿陳鳳亦字羽伯兩君詩皆平平既無春城寒食之作可别韓雄始猶兩存終愁兩湮沒耳春夜阻舟尤村渡華子攜酒見訪盤谷春雲覆竹扉夜船燈火宿霏微故人何意一尊共野渡不堪孤鴈飛世路波濤渾不定客程風雨竟誰依重来應待晴芳好栁絮桃花滿釣磯宿尤邨渡同李思齊寒煙蒼蒼溪路昏月出斷岸溪光分孤舟畏險不復渡兩人對酌皆成醺苦憐白日易華髪所喜青天無片雲櫂歌漁父杳然去縱横野水蘆花村雨中客至新水柴門漲碧紗孤邨煙樹隠漁家客来湖上偏逢雨春到江南又見花沽酒隔鄰傳小甕打魚深夜出枯槎浮生莫遣浮名誤醉裏還驚兩鬢華朱察卿四首察卿字邦憲松江華亭人有朱邦憲集荆軻七首無功壯士醜函封可惜將軍首秦廷一死謝田光社稷何曽計存否不知秦王環柱時舞陽在前何所為當時太子不早遣待客俱来事未知對簿詩日出雪不消天寒日亦冷蕭蕭枯楊下危牆見人影對簿慚予来公門日延頸囚服僮僕嗤囊空吏徒屏懐刑媿君子惡慝時自省嗟彼羣凶心持石待下井雨中感懐春雨久不歇春寒戀衣裳駟馬斷委巷蝸牛蠧空牆卧讀感舊篇惻惻各悲傷人生貴適意所就何短長屠狗足成名豢龍終亦亡虎鞟腐泥沙繭絲成文章物理有盈虧人情空較量不如典春衣沽酒澆吾腸江南江南千里暗妖氛野哭家家不可聞落日羣狐窺白骨荒林萬馬卧黄雲將軍不下征夷令使客空傳祭海文試問九重宵旰處殿頭香氣正氤氲吳擴二首擴字子充崑山人有長吟閣稾貞素堂集謝茂秦云子充吐詞新麗不減唐人詩話子充游大人以成名甞於元旦賦詩懐分宜閣老其友聞之笑曰厯頭第一日懐中朝第一品官循是懐人即嵗除亦輪不到吾輩此可入啓顔録嘉靖間山人若呂中甫謝茂秦之徒排難報恩不無可取若子充所謂斗筲之人無足算也懐伯兄老至無家别飄零何處邊音書甞不定生死竟誰傳朔鴈驚秋思隂蟲攪夜眠空庭孤月下顧影一潸然漂母祠賢哉一飯恩千載猶廟食如何漢諸陵寂寞生荆棘鄭𤣥撫一首𤣥撫字思祈歙縣人有梧野集折楊栁嬝嬝河堤栁年年送别離攀條不忍折拭淚强相持弱態君應惜柔情妾自知春来愁幾許試看向南枝汪寛一首寛字子敬祁門人鸚鵡被寵翻遭縶能言太逼真主恩非不厚野性詎能馴去國長憐爾呼名輒應人江南盛雲木何似隴山春邵正已一首正已字格之休寧人有𤣥石山房艸詩話格之尃精墨務詩亦斐然銅雀臺寂寂銅雀望飄飄繐帳懸君王遺令日是妾斷腸年舞影傷羅綺歌聲咽管絃西陵松檟冷日夕鎖寒煙吳錦一首錦字有中休寧人有吳有中詩集送金伯謙北行浮雲西北征客心渾不住到日屬秋深寒生灞陵樹吳瑗二首瑗字子欽歙人采蓮曲二首㳐㳐蘭槳鳴雙雙屬玉起不見采蓮人知在蓮花裏采得雙蓮蓬中有百蓮子一一自生心外面空相似吳瓊二首瓊字邦珍休寧人有紫芝社稾嵗暮書事海上猶多壘江東未息兵如何觀察使遽報武功成寒沍凝春令隂霾蔽日明不堪黄浦路雞犬寂無聲旅邸除夕老至謀仍拙天寒酒易消冰霜愁裏過鄉國夢中遥一嵗秪今夜百年能幾宵病懐堪自遣無復歎蕭條葉一清一首一清字本靜祁門人王仲房云本靜詩格稍落而意旨融洽遣興頗怪逢迎嬾經旬不出溪草堂一夜雨新漲忽平堤翠篠吟風細青靄壓樹低滄洲意不淺獨坐領鳬鷖汪少亷一首少亷字古矜休寧人有汪山人集邊憤漠南在昔王庭少内地而今戍皷多何將突營騎白馬先朝失計割紅螺虚令互市通蕃貢翻遣降王解漢歌獨喜郭侯曽一戰十年瀚海不揚波程柶一首柶字来周休寧人有大石山人稾東原翠竹孤村舍黄花曲徑饒租完無吏過酒熟有鄰招碧澗當門釣青山隔岸樵自慚非世用長得任逍遥戴巏一首巏字子京休寧人得子秀兄避冦消息問訊東吳使秋来尚避兵一身依短劒數口傍孤城旅食應無定歸舟未有程此時正愁絶天末斷鴻鳴程天符一首天符字夢甫婺源人飲酒昨非未皆非今是未皆是是非皆茫昧寧知譽與毁毁于我何悲譽于我何喜時對無極翁翛然鳴緑綺張應文一首應文字茂實蘇州嘉定人有巢居小稾食新米作人生欲無涯各各饜梁肉吾獨薄滋味一飽但饘粥屏居事躬耕辛苦踰三伏瀰瀰白露滋栗栗香稻熟滌我碌碡場納之杼與軸揚糠已隨風漬水乍離䉛欣欣婦子語足比玉田玉力穡斯有秋薦廟乃甞穀先民戒肯播老氏尚實腹感彼桑田巫食新詎非福張應武一首應武字茂仁蘇州嘉定人有文起齋集郊居雜言屏居兮西郊學圃兮躬稼岸崟崟兮似山水沄沄兮遶舍鳥嚶嚶兮鳴春草萋萋以迎夏芳菲兮及時有美不来兮徂謝念我同學兮結珮拖紳紛車馬兮要津蓴魚懐兮未得猿鶴怨兮無人曷歸来兮郊西劃松竹兮為鄰晨耕兮午饁作盛世之逸民張鑾一首鑾字顯文萬載人多善行年九十三舉鄉飲大賔夀百有七嵗而卒百嵗作石門茅屋野人家百番春風換嵗華盡道長生縁辟穀不知香飯有胡麻范如珪一首如珪字文瑞休寧人江上江上西風雨復晴菰蒲深處釣絲輕何人隔岸吹長笛楊栁秋江一夜生孫良器一首良器字貢甫休寧人有九野稾王仲房云貢甫詩才清思暢言簡意微過姑蘇一首亂離在目讀之不覺悽然過姑蘇有感東吳城外盡烽煙百姓流移半在船為問秋風舊来鴈稻梁今剩幾家田鄭孔庶一首孔庶字子富歙人雪後柬張碧川吳橋殘雪漲新痕客舍無人閣酒尊不為寒梅覔春信東風長日不開門葉杲一首杲字杲卿休寧人旅次江夏嵗暮投南楚蕭然一旅身江山遥對酒鄉里少逢人細栁舒殘臘疎梅報早春故園歸未得物候倐更新汪子祜二首子祜字受夫祁門人有石西集吳園次云石西詞博而昌調清而越貧病夜讀朝慵起晨餐午未炊邇来貧亦樂真與病相宜過受三彭録游憑二仲隨科頭忘日暮倚杖步雲遲獨行日杲秋猶暑林棲鬢欲華獨行銷白晝得意見黄花稻熟莖莖穗薑肥寸寸芽竹堤香漸近水次有漁家李敏一首敏字功甫休寧人有浮丘山人集發盤塘朝發盤塘㘭夕望平陽郭江空雨㝠㝠無風客帆落郭第一首第字次甫丹徒人隠於焦山甞為嵩岱游有廣篇何元朗云次甫江月不可留山雲坐相失之句駸駸窺盛唐之室錢塘雨泊一片迎潮雨錢塘泊岸逢煙明六和塔雲暗兩髙峰茶熟篷窗火香殘野寺鐘湖頭舊游路濕翠想髙松陸九州二首九州字一之無錫人荆溪東風靜卷游絲長桃花吹落流水香美人照水芙蓉裳蘭橈玉腕擊波去欲来不来空斷腸鍾廣漢云語皆前人已道者而其章法却合唐音半山山深翠微寒飛花亂如雨輕風抽布帆落日在髙樹張文介四首文介字惟守龍游人有少谷集湖上晚興日夕湖水佳波光皎如雪沿堤蹋花去獨行自怡恱浮香時有無流螢乍明滅興盡櫂歸舟山齋照涼月九日風雨登吳山亭子今日復九日自憐猶未還巖亭足佳菊風雨亦躋攀漠漠煙中寺𡨕㝠海上山鄉園渺何處空佇白雲間遣懐一水斜通棧羣山曲抱城短簷殘雪色逺寺暮鐘聲茅屋仍加稅天河未洗兵空懐太平䇿誰問魯狂生吳江舟中向夕問舟人吳江將至否須傍微月中繫船好沽酒王應辰一首應辰永嘉人夜遊曲燕舞起香塵鶯歌出絳脣直須滅銀燭恐有絶纓人趙綱二首綱字希大無錫人黄勉之云希大寄李秀才二十字入唐人詩中未易辨也黄纛車楚人拒滎陽漢事日以亟絳灌亦何為相顧徒失色紀生何雄哉毛骨無所惜黄纛甘自焚赤龍乃得出如何垓下平其功竟淪沒寄雒陽李秀才未得吳公薦空憐賈誼才年年三月裏相憶看花来朱陽仲一首陽仲以字行失其名遂寧人有青城山人集李時逺云文學詩聲調意境絶類中唐金溪曲呈方使君金溪流水發新安一片孤帆兩岸山估客自吹龍女笛路人遥指玉郎灘余慶一首慶字惟徳固始人貢士有障風集送吳隠君南還可歎論交日翻成餞别時空江憐嵗晚逺道念歸遲行色關鴻鴈鄉心挂栁枝殷勤一杯酒相勸復相思邊習一首習字仲學厯城人尚書貢仲子有睡足軒詩集王貽上云𢎞正四傑惟何氏之後最大李氏次之徐氏有子伯虬稱詩吳中名載今雨瑶華而仲子以尚書之胄食貧授徒有遺稾一卷薄暑不成雨夕陽開晚晴其佳句也雨止訪舊歸来夕照中半天涼雨一溪風須㬰雨盡浮雲斂笑看兒童指螮蝀禹龍一首龍字子化揚州興化人九日登髙佳辰何事恨相仍萬里髙臺醉復登淮海煙塵迷客路濠梁烽火照皇陵牙旗分閫原非將羽檄徴兵却到僧遂使英雄増激烈不堪遲暮欲飛騰官一䕫一首一䕫字舜鳴平度州人官府同知有少泉詩集九日獨有幽懐客逢秋感慨深菊荒三徑雨荷老半池隂嵗月人間世神仙病後心北山髙興在殊未罷登臨張墾一首墾字禹卿南昌人生員有白榆園稾送仲逸同懋功太守遊滇池滇南西去在天涯匹馬先看楚地花但有故人嚴僕射杜陵隨處即為家陸光宙一首光宙字與甞平湖人有鉏餘稾詩話與甞隠居郊園與宗旭初暘璩之璞君瑕輩一十八人結文酒之社晚夢一道士持陶靖節小像索題諦視之即已也題云在晉為淵明躬耕辭五斗昔以節自持今惟義自守千載復歸来春風吹五栁曽識白蓮人逺公是吾友葢十八人中有白蓮道人如本也翌日復作偈言投筆而逝鄉之遺老至今傳之歸燕萬里衡陽鴈春来又北征誰憐失羣影故作斷腸聲朔漠風猶勁關山月自明素書吾欲寄須到雒陽城姚兖二首兖字叔信秀水人有𤣥岳山人詩集王伯穀云山人詩清真古澹不事藻繢興善寺訪戚希仲養疴西林禪房限韻橋分龍藏北水接馬涇西一棹通祇苑孤笻引曲堤梅同殘雪映竹覆濕雲低不淺陶潛興清尊許共攜寄懐朱宗魯太醫憶昔都城醉故人睽攜二十四迴春心隨明月長飛夢目斷停雲欲愴神藏室書成周柱史丹箴筆紀漢宮臣何時得副還山望芝草琅玕共采真詩話此贈先少保作也少保保御三朝曽撰太醫院志定陵親政後醫或進以金石劑起居未安先公入視疾奏曰聖體病在肝腎宜寛平以養氣安靜以益精帝喜命大璫陸敬書之屏斯叔信詩有丹箴句也戴乾一首乾字元泉桐城人嘉靖中處士述古英雄一身存安有仇不報覆楚與復楚各不出所料後此博浪椎報仇志未了進為漢廷傑退偕赤松老成功匪所期封留豈足道鄭坤一首坤字順卿吳縣人有石南集俞汝成云順卿詩賦有蕭散清逸之風同王駕部遊慧山題秋聲小閣輞川居士共襟期小閣登攀欲暮時山色可淹今日酒秋聲還憶去年詩閒雲竹埽無留影老樹藤纒不剰枝景物漸隨人事謝隔窗幽鳥未曽知張虞卿一首虞卿順天人雜詩青青江上艸關關洲中禽物類各有待因時樂相㝷嗟予久漂泊感遇情難任豈無他人好咸非心所欽所思在逺道關河阻重深寒暑屢變節魚鳥空浮沈離憂共誰語强坐彈鳴琴孤鸞與别鶴此曲傷人心王叔承十四首叔承初名光徹以字行更字承父晚更字子幻吳江人有吳越遊閩遊楚遊嶽遊諸集詩話承父才情奔逸下筆不能自休其論詩不甚傾心王李大指謂事與景者天地所自有之物偶遇而收之情與意者吾所本有之物偶觸而發之彼吾役也吾不彼役也斯言良是惜其所作牽率者什九王元美序之稱其句就而色自傅篇就而用恒有餘驟讀之恍然若新既諷之而又恍然若故王敬美序之稱其能以牛溲馬渤為藥餌嘻笑怒罵為文章葢皆寓貶于褒之辭而承父自負其才受二美之籠絡不覺也平情而論承父亦安能敵元美即就宮詞百首而觀已逺出元美之下特其卷帙繁富不減弇州詩部爾當嘉隆間布衣稱詩若沈嘉則王伯穀及承父三人咸以多勝人今厯年未久全集流傳日寡後世誰相知為重刋其詩者豈惟重刋覽其全集而不欠伸思卧者亦稀矣奚以多為將渡江訪戚世秀阻風雲陽道中作大江何茫茫晨風䬃已夕故人如浮雲可望不可即有夢亦須㬰寤言轉悽惻生别時易徂一日三秋隔袖中懐素書零落餘紙墨區區方寸心相看皎猶昔自桐廬入七里瀧出嚴州舟中懐古入瀧還出瀧宛轉千盤經既登桐君廬復憩嚴子亭水光鴨頭緑山色蛾眉青雲中雞犬隔天際鸞鶴停往往至人宅選勝開巖坰舊壇秘光彩遺廟虚精靈朱鳥不可見哀歌許誰聽題陳從訓所藏惠崇溪山春霽圖卷惠崇一詩僧宋首柴周尾丹青入禪觀别自通𤣥理能於尺素間㸃染千山水昨登金焦興不孤陳郎示我溪山圖畫家精工多近俗寫意得神形不足此僧妙趣種種兼不滿三尺吳興縑針頭毫末宻相接有如蟭螟寄蚊睫或言工勝趙大年又云妙超展子䖍只須三日坐其下一花一草生意全乃知陳郎揮灑信有本恥與當今畫家混我歌長句君莫嗤惠崇惠崇郎所師水北菴醉歸書興水深肥紫蟹稻熟美黄雞溪饌秋来賤酒人閒處齊醉歸廬嶽社惱殺太常妻㸃檢明朝約野橋煙樹西屯溪乗竹筏抵紋溪作緑竹揚輕筏屯溪渡早暉魚梁羣鷺下石碓亂泉飛小市環青麓長橋跨翠微前峰仙路近樹色滿秋衣金陵艷曲緑江天作塹翠嶺石為城栁暗黄金塢花明白玉京春風十萬戸戸戸有啼鶯揚州歌二首二十四橋邊當壚最可憐妝成窺客坐不耐數青錢東家女十三西家女十五夜半褰娘啼嫁與并州估益卿簡寄家兄酒錢志感異姓憐兄弟天涯寄酒錢急難那得汝我媿鶺鴒篇觀音巖訊蘇道人適山頭虎層巖飛茗煙道人正髙坐牧童折山花笑指神虎過西湖雜興看花須近寒食看潮待過中秋二月十五花信八月十八潮頭荆溪雜曲二首賣殘竹菌筍還来收罷蘭花蕙又開但焙茶芽先穀雨不愁虎跡遍莓苔蜀山山下火開窑青竹生煙翠石銷笑問山娃燒酒杓砂坏可得似椰瓢竹枝詞白鹽出井火燒畬女子行商男作家橦布紅衫来換米滿頭都插杜鵑花黄姬水一首姬水字淳父長洲人省曽子有白下髙素二集王元美云黄淳父如比里名姬作酒糾才色既自可觀時出俊語送汪太學遊江都千里王孫歸未能風雲意氣每超騰年来裘馬遨遊處不是金陵即廣陵王穉登十二首穉登字百穀一字伯固長洲人國子監生有晉陵金昌燕市客越青雀竹箭梅花什荆溪松壇諸集詩話百穀詩亦華整第嫌肉勝於骨至袁文榮所賞色借相公袍上紫書生薄命原同妾等句媚竈之詞近於卑田乞兒語矣近見選本甄録太繁予刪其什九而風骨始刻露甞鼎一臠未為不知味也送吳郎遊金陵兩地三春别孤帆千里愁君今遊帝里誰與共仙舟夜雨連瓜步春潮滿石頭長干管絃地走馬莫淹留送慧師還五井兼懐其故師楊伯翼持鉢南歸去長天接逺汀未霜吳樹赤過雨越山青帆外桃花渡函中貝葉經還將二泉水一酹子雲亭婁東訪顧靖甫訪爾山城下秋風一徑偏溪魚名箭鏃野菊類金錢艸廢歸吳宅潮通入楚船馬鞍峰頂石把酒憶當年看梅過𤣥墓山中橋外花開日分明雪作圖不將他樹雜未有一家無多處半青嶂香時過太湖濁醪元易得市逺亦須沽送吳中丞之金陵建業青山是帝都蹔勞開府握軍符花間朱鷺鐃歌曲江上黄龍水陣圖玉節中丞新盪冦樓船諸將舊平吳不知燕子磯前地容得陳琳草檄無邊警琵琶洲上香山澳来往初通海上艖漸習文書通漢語别居城郭慕中華餘甘却載西商舶吉貝先歸市令家島冦須防勾引漸斧柯莫待翦萌芽長安春雪曲春風吹雪下桑乾添得城中一夜寒鳷鵲樓髙消不盡長安街上馬頭看都下寒食騎馬㝷春春尚遲東風空自向人吹燕王城裏千株栁寒食来看未有絲望湖亭亭邊楊栁水邊花落日行人正憶家不及江南湖上寺木蘭舟小載琵琶湖上梅花歌二首山煙山雨白氤氲梅蕊梅花濕不分渾似髙樓吹笛罷半隨流水半為雲虎山橋外水如煙雨暗湖昏不繫船此地人家無玉厯梅花開日是新年清明前一日慈雲菴訪怡菴上人春風駘蕩日初晴與客㝷僧入化城牆裏杏花牆外栁始知佳節近清明梁辰魚一首辰魚字伯龍崑山人有逺遊稾詩話伯龍雅擅詞曲所撰江東白苧妙絶時人時邑人魏良輔能喉囀音聲始變弋陽海鹽故調為崑腔伯龍填浣紗記付之王元美詩所云吳閶白面冶遊兒爭唱梁郎雪豔詞是已同時又有陸九疇鄭思笠包郎郎戴梅川輩更唱迭和清詞豔曲流播人間今已百年傳竒家曲别本弋陽子弟可以改調歌之惟浣紗不能固是詞家老手詩律猶未細觕能駢贍而已登西塞山訪張志和遺跡晚登西塞山翛然出林薄諸峰自南来兹嶺獨岝㟧攀援上蘿磴翠微搆蘭若清梵懸香林法鼓時間作零雨飄巖阿殘雲卧松閣緬懐𤣥真子雅志甘寂寞雲鴻入冥冥孤飛避繒繳風雨湖上歸浮名寄蓑箬斯人邈千載髙風滿寥廓伊余慕肥遯世故還束縛名境雖盤桓猶未諧宿諾何時返初服於焉此棲託夏口泛舟荆溪暮宿湖口五月荆溪上驚湍走白沙風檣欹聽燕浪檝逺衝花山勢通吳直溪流向月斜維舟見漁火深樹有人家秦嘉禾二首嘉禾字吾田桐城處士自號大龍山人有彭澤稾小孤山砥柱從開闢中流自古今神龍常在窟怪木不成林絶頂雲流影懸崖鳥過音吾題百丈壁仙跡倘相㝷汎湖汎汎楓湖十里中薄雲細浪夜初融月明㑹聽雙龍起我欲騎之到海東汪泹一首坦字仲安鄞縣人國子監生有石盂集夜上嚴灘上灘似牽羊下灘如走馬灘髙月未出亂石怒流瀉離離巖際星風雨聲在下夜久漁火明疑是披裘者徐韋二首韋字明佩江隂人國子監生有觀夢菴集重經故居荒臺欹側栁凋零故里重過悵獨行燕子不來花落盡夕陽偏傍斷橋明過復元從孫銀蠟風多䕶錦屏飛觥不逐舞腰停當筵莫唱江南曲白髮周郎已倦聽沈倬五首倬字道章吳江諸生以子琦珫珣貴累贈通奉大夫有紀志稾松際月清風湖上来徐徐入松下風吹松子落拾之欲盈把月出松際雲清光滿籬舍題張師清望樓曉色臨平野髙樓屬斷雲連峯當户入一水傍階分樹影參差動禽聲上下聞主人方擁傳莫草北山文送别空城積雨煙霧深驛亭迢遞江沈沈桃花一樹感春淚楊栁萬條驚别心燕趙古来多結客秦淮道上誰知音丈夫意氣偶相得脫贈豈惜雙南金月夜明月吐夜光寒影在溪水山人抱琴来坐久秋雲起花溪客舍孤燈坐来昏凄其不成宿夜鸛忽驚栖翻飛入修竹卓明卿一首明卿字徴甫仁和人以太學生選授光禄寺署丞有集葉茂長云微甫詩華贍和暢才調過人江上别黎惟敬執手河橋上遥天起片雲仙帆千里發客路一江分桂嶺先秋色樟亭半夕曛家山到何日兩地惜離羣陳九州一首九州字維同江隂縣學生夜泊荆溪細栁湖邊岸青蒲水上舟星隨孤月動山入暝煙收鼓枻聞漁浦懸燈見佛樓客途春欲盡歸思滿滄洲王逢年一首逢年字舜華初名治字明佐崑山人同祖之子諸生有海岱集王元美云明佐綿麗宏博纚纚不竭秋曉聞鴈北斗横天秋夜闌朔雲遥度鴈聲寒夢回旅館燈初落書寄衡陽葉未殘隠隠斷行迷極浦蒼蒼斜月帶長安湘南塞北關情逺人倚青樓幾處看汪時元一首時元字惟一休寧人九日舟中秋風葉正飛江上逢重九人世幾登髙寂寞黄花酒周青士云詩有不必深言而選家必録者此作是也袁景休三首景休字孟逸吳縣人詩話孟逸隠於卜肆殁後閩人林古度寓法水寺見孟逸夫婦停棺于寺傷其無子取摺叠扇畫兩棺貯破屋中上雨傍風極悽慘之狀題詩其上有新安客見而憫之出私錢庀窀穸古度又口授遺詩刻之成集余購之不得繡谷蔣氏藏孟逸墨蹟五翻凡十絶句亟録三首孟逸夙見知於沈嘉則其送嘉則詩云道上霜寒連白鴈馬頭木落見黄河殊有爽氣宜其訕笑詆諆及劉子威侍御也入慧慶寺新秋入古寺涼氣何清越樹杪夕陽微山蟬鳴不歇春日過南城黄鳥當三月城南景正繁桃花千萬樹不異武陵源自江村望虎丘兹山竒且麗迥與江村合幽人去復来斜陽在孤塔王受甫一首不知何許人詩載袁中道游居録題九山壁一心貪與白雲期解帶歸来任所之每過名山經月住蘇門山上更多時袁小修云九山去輝縣十里上有斧劈石石上題詩後云嘉靖癸夘受甫不知何人明詩綜卷五十五
