body:
  text: 明詩綜卷三翰林院檢討朱彞尊編劉基一百四首基字伯溫青田人元進士洪武初官至御史中丞論佐命功封誠意伯為胡惟庸毒死正德中追諡文成有覆瓿集犂眉公集楊維新云子房不見詞章玄齡僅辦符檄公勳業造邦文章名世可謂千古人豪徐子元云青田鈞天廣樂聲容不凡開國宗工不在兹乎以陳彛仲云洪武間髙侍郎先鳴文成次之固咀其精華窺其堂奧王元美云劉伯溫如劉宋好武諸王事力既稱服藝華整見王謝衣冠子弟不免低眉又云明興立赤幟者二家而己才情之美無過季迪聲容之壯次及伯溫當是時孟載景文子髙輩實為之羽翼而談者尚以元習短之謂辭美於宋所乏老蒼格不及唐僅窺季晚然是二三君子功力深重風調諧美不得中行猶稱殆庶翩翩一時之選也穆敬甫云劉公詩如乘風載響音徽逺播汪胡元瑞云青田才情不若楊孟載氣骨稍減忠勤以較張徐諸子不妨上座何稚孝云伯溫詩沿元習其精者學韓退之卧蔣仲舒云劉詩如河朔少年充恱慷健陳子云文成雅辭微傷缺體婉弱令人思留侯之貌少王介人云文成詩純正較之四傑雖縱橫遜而似覺寡疵詩陸氷修云伯溫早見知於虞道園道園稱其云發感慨於情性之正存憂患于敦厚之言是不可及若其體製音韻無愧盛唐其推奬至矣特不與楊亷夫顧仲瑛輩結詩酒之社然視四傑十友皆後進也犂沈山子云誠意樂府古詩勝近體覆瓿集勝眉公集固當與季迪爭長並驅王元美以劉次於髙胡元瑞以劉為髙之羽翼要非篤論至何仲默以袁景文為明初詩人之冠則置二公于何地乎鍾廣漢云文成論詩謂今天下為詩者取則於逹官貴人而不師古此語深中元人之病試讀公集中詩皆有古人之一體可謂善于師古者也靜志居詩話樂府辭自唐以前詩人多擬之至宋而掃除殆盡元季楊亷夫李季和輩交相唱答然多構新題為古體惟劉誠意鋭意摹古所作特多遂開明三百年風氣其五言古詩専仿韋左司要其神詣與相伯仲諸體均純正無疵若二鬼一篇直欲破劉義之膽矣公在元時有和王文明絶句云夜涼月白西湖水坐看三台上將星好事者遂傅會之謂公望西湖雲氣語坐客云後十年有帝者起吾當輔之此妄也當公羈管紹興時感憤至欲自殺藉門人穆爾薩抱持得不死明初既定婺州猶佐舒穆嚕宜生拒守即其酬和詩句如中夜登髙樓遙瞻太微座衆星各參差威弧何時正鴻鴈西北來安能從之飛周婺矛牙不恤緯楚放常懷闕却秦慕魯連存齊想田單蓋未嘗終食忘大都也是豈預自負身為佐命者邪其題太公釣渭圖云偶應飛熊兆尊為帝者師則公自道也世人多以前知目公至凡緯讖堪輿若披肝露膽等書皆指為公作豈其然乎思美人雨欲來風蕭蕭披桂枝拂陵苕繁英隕鮮葉飄揚煙埃靡招搖激房帷發綺綃中髮膚憯寂寥思美人隔青霄水渺茫山岧嶤雲中鳥何翛翛欲寄書天路遙東逝川不可要芳蘭華日夜雕掩瑶琴間玉簫魂睘睘心搖搖望明月歌且謡聊逍遙永今宵顧玄言云出入騷雅寒夜謡今夕何夕嵗聿其徂草木雕落山川縈紆瞻彼鴻雁拂翼天衢雍雍和鳴載悠載徐雖無羽翰心與之俱華月出雲青燈在隅歌以寫懷云何其盱秋懷喓喓草蟲栗栗其股嵗暮如何爾獨良苦瞻望日月綿綿我愁如彼逝矢一往不留嗟爾小子時不再得匪緡曷魚不藝胡稷蕭蕭草蟲烈烈其音嵗暮何為祗攪我心思歸引山髙髙兮可以望四方胡躋爾巔兮不見我故鄉嵗云暮兮無衣裳車罷馬羸兮僕夫頓僵水有蛟鱷兮陸有虎狼吁嗟奈何兮惟懷永傷墻上難為趨行弱水不可以航石林不可以車人生貴守分牆上難為趨茫茫八極內狹徑交通衢紛紛皆轍迹擾擾論錙銖焦原詫齊踵龍頷夸探珠片言取卿相杯酒興剪屠機事一朝露妻子化為魚林間有一士蓬蒿翳窮廬種稻十數畞種桑八九株有酒且飲之無事即安居孰知五鼎食聊保百年軀悠悠身後事汲汲復何如夜夜曲冬夜恆苦長夏夜恆苦短短長相蔽虧殷勤望推挽紉茅作繩繩易斷汲水作池池易旱故鏡塵昏難逺照故衣絮敝無新暖西風嫋嫋吹桂枝白露點苔黃葉滿東飛伯勞歌南飛鷓鴣北飛鵠黃昏雞鳴白日燭珊瑚石上栽兔絲鴛鴦獨宿枯桑枝永夜涼蟾入羅幕蟬翼不如秋鬢薄寒塘露蓮千葉紅可憐零落空隨風走馬引天冥冥雲濛濛當天白日中貫虹壯士拔劒出門去手提讐頭擲草中擲草中血漉漉追兵夜至深谷伏精誠感天天心哀太一乃遣天馬從天來揮霍雷電揚風埃壯士呼天馬馳橫行白晝吏不敢窺戴天之恥自古有必報天地亦與相扶持夫差徒能不忘而報越棲於會稽又縱之始知壯士獨無愧魯莊何以為人為長安道長安道送盡芳菲到枯稿人生衰盛苦不嘗何異長安道旁草漢家將軍初拜官門前上客車班班一朝勢衰煙焰歇車輪無聲馬蹄絶明年有詔封冠軍依舊車馬來如雲鳴鴈行雍雍鳴鴈鳴逹旦舉翼相連拂雲漢平原漠漠生野煙鴈飛只向江南天江南十月多禾黍一半輸官半供汝明年二月歸養雛雛成又望江南去隔谷歌戰鼓咽悲風弓折不可把弟兄隔谷不相聞咫尺人間與泉下丈夫誓許國殺身非所憐兩心本一氣何能坐相捐登埤四顧望慷慨肝膽裂不見救兵來但見繞城鐵甲光如雪飛禽在羅網尚或念其飢身為髙官馬食粟忍見手足居重圍相彼鴻與鴈亦各顧匹儔挽弓射一猿羣猿拔箭聲啾啾鳥獸且有情人心獨何尤嗚呼田家紫荆雖微木不忍聽君歌隔谷冬暖行孟冬十月暖桃李花盛開蝴蝶草間出飛上花枝來蝶知愛花為花出不知冬暖無多日霜風一夕花作塵墜粉飄黃愁殺人築城詞君不見杭州無城賊直入台州有城賊不入重門擊柝自古來而况四郊多警急愚民莫可與慮始見説築城俱不喜一朝城成不可踰挈家却向城中居寄語築城人城髙固自好更須足食仍足兵不然劒閣潼關且難保獨不念至元延祐年天下無城亦無盜畦桑詞編竹為籬更哉刺髙門大寫畦桑字縣官要備六事忙村村巷巷催畦桑桑畦有增不可減凖備上司來計點新官下馬舊官行牌上却改新官名君不見古人樹桑在牆下五十衣帛無凍者今日路旁桑滿畦茅屋苦寒中夜啼琅琊王歌駿馬須好鞍強弓須徑箭將軍不知兵健兒空自健薤露歌人生無百嵗百嵗復如何古來英雄士各已歸山阿鍾廣漢云音韻悲涼初讀之嗚咽再讀之慷慨懊憹歌白鴉養雛時夜夜啼逹曙如何羽翼成各自東西去宗子相云古韻凄調玉階怨長門燈下淚滴作玉階苔年年傍春雨一上苑牆來長門怨白露下玉除風清月如練坐看池上螢飛入昭陽殿宗子相云不作怨語怨已自深感懷四首驅車出門去四顧不見人回風卷落葉颯颯帶沙塵平原曠千里莽莽盡荆榛繁華能幾何憔悴及兹辰所以芳桂枝不爭桃李春雲林耿幽獨霜雪空相親啾啾草間雀日隨黃口飛爭先赴稻粱寧顧野人機便便善柔子懷利近相依但慕春荑好不見秋霜霏驅車逐走鹿中路忘所歸豈不愛其躬天命與心違古道今已矣感寤空涕歔結髮事逺遊逍遙觀四方天地一何濶山川杳茫茫衆鳥各自飛喬木空蒼涼登髙見萬里懷古使心傷佇立望浮雲安得凌風翔稿葉寒摵摵羅帳秋風生悽悽候蟲鳴嚦嚦賔鴻驚美人抱瑶瑟仰視河漢明絲桐豈殊音古調非今聲沉思空幽寂嵗月己徂征感時述事八首十羊煩九牧自古貽笑嗤任賢苟不二焉用多人為師行仰供給州縣方告疲差徭逮所歷添官有權宜奈何乘此勢爭先植其私百私並效尤貨賄縱橫飛列坐隘公堂號令紛披離名稱到輿隸混雜無尊卑正官反差出道路不停馳徇祿積日月官吏之所希此輩欲何求朘剝圖身肥世皇一宇宙四海均惠慈盜賊乘間發咎實由官司云何未悔禍救焚用膏脂姻婭遂連茹公介棄草茨農郊日增壘良民死無期天關深虎豹欲語當因誰先王制民産曷分兵與農三時事耕稼閲武在嚴冬亂略齊憤疾戰伐厥有庸那令異編籍自使殊心胸坐食不知恩怙勢含威凶將官用世襲生長值時雍豈惟昧韜略且不習擊􅩶悍卒等驕子有令亦無從跳踉恣豪橫鼓氣陵愚蠢所以喪紀律安能當賊鋒崩騰去部曲蟻合尋歸蹤時方務姑息枉法稱寬容寧知養豺虎反噬中自鍾國家立制度恃此為垣墉積弊有根源終成腸肺癰何由復古道一視均堯封豢狗不噬禦星馳募民兵民兵盡烏合何以壯干城百姓雖云庶教養素無行譬彼原上草自死還自生安知徇大義捐命為父兄利財來應召早懷逃竄情出門即剽掠所過沸如羮總戎無節制顛倒迷章程威權付便嬖賞罰昧公平飢寒莫與恤鋭挫怨乃萌見賊不須多奔潰土瓦傾旌旗委曲野鳥雀噪空營將軍與左右相顧但目瞪此事己習慣智巧莫能爭廟堂忽逺算胸次猜疑并豈乏計策士用之非至誠德威兩不立何以御羣氓慷慨思古人惻愴淚霑纓五溪舊三苖蛇蚓相雜處其人近禽獸巢穴依險阻起居任情欲鬬狠競爪距未能識君臣且不顧子父所以稱為凶分北勞舜禹先朝慎羈縻罔俾來中土胡為倐而至馳驟如風雨見賊但趦趄逢民輒俘虜腰纒皆金銀衣被俱繡組所過惡少年改服投其伍農家劫掠盡何人種禾黍盜賊有根源厥咎由官府任將匪能賢敗衄乃自取竒材何代無推誠即心膂誰哉倡此計延寇入堂宇割鼻救眼睛於身竟奚補浙西耕桑地百載安生聚自從甲兵興徴斂空柚杼疲氓真可憐忍令飼豺虎追憶至元年憂來傷肺腑虞刑論小過夏誓殄渠魁好生雖大德縱惡非聖裁官吏逞貪婪樹怨結禍胎法當究其源剪鉏去根荄蒙蘢曲全宥駕患於後來濫觴不堙塞滔天谷陵頽總戎用髙官沐猴戴母頧玉帳飫酒肉士卒食菜薹未戰已離心望風遂崩摧招安乃倡議和者聲如雷天髙豹關逺日月照不該俱曰賊有神討之則蒙災大臣怨及己相視若銜枚阿諛就姑息華紱被死灰姦宄爭效尤無風自揚埃嘯聚逞強力謂是爵祿媒黎民亦何辜骨肉散草菜傾家事守禦反以結嫌猜慟哭浮雲黑悲風為徘徊赤子母不憐不如絶其胚養梟逐鳳皇此事天所哀胡為尚靡定顛倒䏶與頦春秋戒肆眚念此良悠哉八政首食貨錢幣通有無國朝幣用楮流行比金珠至今垂百年轉布彌寰區此物豈足貴實由威令敷廟堂喜新政躁議違老夫悠悠祖宗訓變之在朝晡瞿然駭羣目疑怪仍揶揄至寶惟艱得韞櫝斯藏諸假令多若土賤棄復誰沽錢幣相比較好醜天然殊譬彼絺與綌長短價相如互市從所取孰肯要其粗此理實易解無用論智愚矧兹四海內五載橫戈殳赤子投枳棘不知所歸塗一口當萬喙脣縮舌亦瘏導水必尋源源逹流乃疏藝木必培根根固葉不枯慎勿庸邇言揚火自焚軀尚克詰戎兵丕顯厥祖謨惟民食為命王政之所先海鹺實天産厥利何可専貪臣務聚財張羅密於氊厲禁及魚蝦鹵水不得煎出門即陷阱舉足遭纒牽炮烋用鞭箠寃痛聲相連髙牙開怨府積貨重姦權分攤算戶口滲漉盡微涓官征勢既迫私販理則然遂令無賴兒睚眥操戈鋋出沒山谷裏陸梁江海邉橫行荷虆籠方駕列船舷拒捕斥後懦爭強夸直前盜賊由此起狼籍成蔓延先王務廣德如川出深淵外本而內末民俗隨之遷自從甲兵興奄忽五六年借籌計得喪耗費倍萬千回憶至元初禁網疏且平家家有衣食畏刑思保全後來法轉細百體皆拘攣厚利入私家官府任其愆大哉乃祖訓典章尚流傳有舉斯可復庶用康迍邅秦皇縣九宇三代法乃變漢祖都咸陽一統制荒甸豪雄既鏟削瘡痍獲休宴文皇繼鴻業垂拱未央殿纍嵗減田租頻年賜縑絹太倉積陳紅圜府朽貫線是時江南粟未盡輸赤縣方今貢賦區兩際日月竁胡為倚東吳轉餉給豐膳徑危冒不測勢與蛟龍戰遂令鯨與鯢掉尾乘利便扼骯要國寵金紫被下賤忠良怒切齒姦宄競攀援包羞屈政典尾大不可轉聖人别九州田賦揚為殿中原一何膴所務非所先豳風重稼穡王業丘山奠夫征厲未習孰敢事遊燕哀哉罔稽古生齒徒蕃羡一羮而食十何以奉征繕長歌寄愁思涕淚如流霰程孟陽云感時諸詩可謂詩史追配杜老邁元白矣旅興十四首秋氣肅萬物百蟲競號鳴蟪蛄最可憐切切悲其生屣履步庭除素月員且明玩之不可掇渺焉忽西傾回身掩房闥愴恍煩慮盈太息以終宵展轉難為情窮巷屏人迹開門見青山青山似故鄉客子何當還蟪蛄日夜鳴緑樹亦已殷白日駛西征浮雲不可攀安得生羽翼奮飛出玄間雨來羣山暗雨過羣山明山明猿鳥喜山暗猿鳥驚嵗暮隂風起白日西南傾寒蟬枝上號阜螽草間鳴人生非草木能無感中情别離多苦懷三年當百載來者非所知往者今安在浮雲旦夕起白日薶光彩天地亦有形豈能長不改忡忡坐虛室曖曖日向暮空煙斂曽岑暝色半髙樹緬邈起遐思逍遙散輕步嬋娟天上月的皪草間露物情豈異昔人事殊非故芳嵗不可淹衰年况多慮諒無彭鏗術頽齡那能駐人生如浮雲聚散無定期驚風一飄蕩各自東西之粲粲陵苕花凄凄寒露時浮雲不可駐顧盼空齎咨青青瀟湘竹漪漪被寒水逰子如飛蓬佳人曠千里登髙左右望但見黃塵起鳳皇翔不下梧桐化為枳傷懷不可道憂念何時已吾觀穹壤間萬變皆有窮何如順天道原始以知終清晨攬衣起絺綌生秋風雍雍鳴雁來灼灼酸棗紅悵焉念所思悲感集豫衷佳期在何許瑶草成枯蓬佇立望日月勞心極􅍵􅍵烏鳴朝啞啞鵲鳴暮啾啾聞鵲既不喜聞烏復何憂世人務苟得君子絶外求滄浪迅風波無風即安流胡為自氷炭以貽逹者羞寒燈耿幽幕蟲鳴清夜闌起行望青天明月在雲端美人隔千里山河杳漫漫玄雲翳崇岡白露凋芳蘭願以緑綺琴寫作行路難憂來無和聲絃絶空長歎泊舟嚴子瀨遙望仙華山中有騎羊人皓齒赬玉顔餐霞飲沆瀣坐石濯潺湲長嘯起天風落日為之還悠悠隔雲雨杳杳不可攀日落天氣涼逍遙步庭墀蟋蟀已在宇鴻鴈來何遲少壯輕逺遊衰老傷别離念我親與友各在天一涯音容兩契濶悲歡絶相知鎩羽懷舊林葺鱗思故池百年能幾何逝者無還期俯仰增感歎有懷當語誰殷勤託宵夢聊用慰所思久旱草不生一雨青滿地新荑與舊枿好醜各自媚喈喈黃鶯吟習習玄鳥至間庭人迹稀白日淡清氣平生孟公綽庶足無妄覬但願長若斯撥置身外事秋髙潦水涸旻天亦凄清枯籜響悲音羈蟲振餘聲曀曀落日暉慘慘遊子情風林無定枝馳車鮮安旌自愧匪賢逹默默嗟其生遣興避地適他鄉息肩謝羈束生事未有涯暫止聊自足南園實清曠可以永幽獨曽樓靣羣山俯見湖水緑雜英被郊甸魚鳥得棲宿登臨且慰意未暇計逺躅聖賢有遺訓知命夫何卜琴清堂詩亭亭嶧陽桐斫為緑綺琴縆之朱絲絃彈我白雪音虛堂夜迢迢華月耿疏林鳳皇天上來虯龍水中吟曲罷起太息無人知此心周青士云神似蘇州晚同方舟上人登師子巖作落日下前峯輕煙生逺林雲霞媚餘姿松柏淡清隂振䇿縱幽步披榛陟層岑槿花籬上明莎雞草間吟涼風自西來飀飀吹我襟榮華能幾時搖落方自今逝川無停波急絃有哀音顧瞻望四方悵焉愁思深謝茂秦云逸韻飈舉幽思泉發新春昨夜東風來吹我門前栁栁芽黃未全草根青已有鵓鳩屋上鳴勸我嘗春酒我髮日已白我顔日已醜開尊聊怡情誰能計身後和舒穆嚕公得令字勾芒發陳根北斗轉東柄衆星各參差威弧何時正好生雖聖心明刑亦王政哲人慎謀始斯焉獲終慶徒言兩階舞可以懷逆命不見三危山萬里竄梟獍世德異唐虞民情好爭競那無跗扁醫尚有膏肓病波濤地軸􅑶虎豹天關敻雨露當春滋風霜及秋徑誰能奉明王順天行號令送布延子夀赴廣西憲幕離維荆衡南迤邐走蠻徼民風雜猺蛋地勢帶蒙詔迢迢商周前風水絶纎竅後王務廣土懷柔倚攻剽羈縻非本情疲疴復誰療大明侔日月幽裔靡不照化育之所加欣榮及蓬藋憲府僶百司選擇自廊廟偏方異習俗賦性實同調培養自殊塗激揚貴知要願言崇令業以繼南國召望武夷山作飲馬九曲溪遙望武夷峯長林抱回合丹崖造空濛浮暉淡寒翠水木皆曼容薄遊限塵務促景尼竒蹤緬懷紫陽子千載誰與同瓊佩邈煙霧石函閟遺封羈猿怨幽澗飛蘿冒芳叢瑶琴空流泉桂枝徒秋風悵望佳期阻纒綿憂思重殷勤尺素書願寄雲間鴻早發建寧至興田驛雞鳴戒晨裝上馬見初日露泫葉尚俯霧重山未出客塗得霽景緩步非縱佚矧兹嵗有秋髙下俱穎栗牛羊散原野鵝鴨滿阡術懷抱既夷曠神情自清謐寒花蔓籬落候蟲響蒙密霞標青楓林雪綻烏臼實幽覽雖云遽佳趣領已悉我行固無期况乃塵事畢自衢州至蘭溪秋郊斂微雨霽色澄人心振䇿率廣路逍遙散煩襟疏煙帶平原薄雲去髙岑湛湛水凝碧離離稻垂金薺麥霜始秀玄蟬寒更吟幽懷耿虛寂好景自相尋心契清川流目玩嘉樹林歌傳滄浪調曲繼白雪音仙山在咫尺早晚期登臨壬辰嵗八月自台州之永嘉度蒼嶺昨暮辭赤城今朝度蒼嶺山峻路屈盤峽束迷晷景谽谺出風門坎窞入天井冥行九地底髙闞羣木頂瀑泉流其中豃若泄溟涬哀猿嘯無外去鳥飛更永僕夫怨跋涉瘦馬悲項領盜賊逭天誅平人遘災眚佇立盼嶔岑心亂難為整夢草堂遣懷即事在自得強歌非正音所以春草句聲價重兼金若人千載下遺響邈難尋凄涼一池塘賴爾得至今我來當杪秋天淨橫潦沈枯荷有餘馨衰栁無殘隂鼓鼙響未已山水意徒深感時念兄弟惻愴傷我心在永嘉作髙屋集飛雨蕭條生早寒我來復幾時明月缺已團浮雲蔽青天山川杳漫漫狐狸嘯悲風鯨鯢噴重瀾孤鴈號南飛音聲凄以酸顧瞻望桑梓慷慨起長歎願欲凌風翔惜哉無羽翰中夜百感生展轉不遑安枯荷響西池稿葉鳴林端寥寥天宇空冉冉時節闌舉俗愛文身誰識章甫冠河流未到海平陸皆驚湍旗幟滿山澤嗚呼行路難晨詣祥符寺上馬雞始鳴入寺鐘未歇草際起微風林端淡斜月僧房湛幽寂假寐待明發松徑斷無人經聲在清樾發安仁驛雞鳴發山驛天黑路彌險煙樹出猿聲風枝落螢點江秋氣轉炎嶂濕雲難斂佇立山雨來客愁紛冉冉題山水圖江上何所有髙低千萬峯結廬覆以茅取足聊自容緑樹既蓊鬱清溪亦油溶地僻無車馬猿鳥多相從日落沙際明寒煙淡疏松蒼茫雲霞外隱見青芙蓉悠然一舸還好景時獨逢歸來山月出古剎鳴昏鐘别峯和尚方丈題唐子華山隂圖連山走坡陀大谷入暗曖屋藏深樹中路出巨石背煙雨時有無澗壑互顯晦輕盈曵飛綃縹眇沃浮黛雄梁矯修鼉騂璧駮文玳崢嶸紫霞髙屈曲白水匯隂森神鬼宅奮迅龍馬隊風雲氣象寬日月光炯碎借問此何鄉或有捐余佩答云越山隂信美無與對自從永和來燕遊推勝槩佳人去不還盛集嗟未再唐令實好竒掇拾歸畫繪上人逺公徒我亦淵明輩會晤屬時艱觀覽增慷慨故園沒灌莽舉足蛇豕礙放歌自太息激烈驚厚載寄江西黃伯善兄弟我思美人乃在洞庭之陽彭蠡之隂衝波亘天三百里離恨比之應更深揚瀾咆哮左蠡怒白日慘慘玄猿吟欲往從之憤余心黿鼉臲卼不可以駕風摐摐兮雨淫淫望厭原之飛煙邈匡廬之髙岑虹旌兮翠羽昌容兮鳯皇舞荍衣兮茝襟玉笙吹兮紫鸞音望不見兮悲莫任徐資生華山圖歌華嶽插天七千丈丹崖翠壁開仙掌壁間擘出黃河流大禹以之分九州河流衮衮赴溟漲華嶽拔出天河上雲宫霧窟疑本無石室金臺儼相向玉泉髙通玉井津中有蓮實如車輪世人肉食未羽化可望不得聊相親髙堂晚晴圖畫展眼明一見心目逺世間塵土今紛紛吾當拂衣卧山雲夏夜台州城中作江上火雲蒸熱風欲雨不雨天夢夢良田半作龜兆坼粳稻日夕成蒿蓬去年海賊殺元帥黎民星散劫火紅耕牛剝皮作戰具鉏犂化盡刀劎鋒農夫有田不得種白日慘淡衡茅空將軍虎毛深玉帳野哭不入轅門中健兒鬬死烏自食何人幕下矜竒功今年大軍蕩淮甸分命上宰麾元戎舞干再見有苖格山川鬼神當效忠何為旱魃還肆虐坐令毒沴傷和沖傳聞逆黨尚攻剽所過丘壟皆成童閫司恐畏破和議斥􅕤悉罷雲邉烽殺降共説有大禁無人更敢彎弧弓山中悲啼海中笑蜃氣繞日生長虹古時東海辟孝婦草木枯瘁連三冬六月降霜良有以天公未必長瘖聾只今幅員廣無外東至日出西太蒙一民一物吾肺腑仁者自是哀瘝痌養梟殈鳯天所厭誰能抗疏回宸衷夜涼木未挂河漢海嶠月出光玲瓏仰視皇天轉北斗嗚呼愁歎何時終陳彥德以畫見贈詩以酬之君不見昔日米南宫又不見今時趙學士能將翰墨爭鬼工天下流傳名父子栝蒼處士身姓陳小郎英俊尤可人欲收大地入掌握筆意所到如有神曉移小幅來贈我紅日滿窗花婀娜開軒展視心眼寬如在嶽陽樓上坐湖波吹煙入逺山君山乃在湖中間蒼梧九疑隔湘浦孤雲目斷幽篁斑漁舟一葉來何處巫峽雨昏啼鴂暮澤畔行人久不歸沙上輕鷗自飛去陳公子聽我歌深林大谷龍蛇多蓬萊三島可避世欲往其奈風濤何題富好禮所畜村樂圖我昔住在南山頭連山下帶清溪幽山巔出泉宜種稻繞屋盡是良田疇家家種田恥商販有足懶踏縣與州西風八月淋潦盡稻穗櫛比無蝗蟊黃雞長大白鴨重瓦甕琥珀香新篘芋魁如拳栗殼赤獻罷地主還相酬東鄰西舍迭賔主老幼合坐意綢繆山花野葉插巾帽竹箸漆碗兼瓷甌酒酣大笑雜語謔跪拜交錯禮數稠或起頓足舞侏儒或坐柏手歌甌簍傾盆倒榼混醯醬爛漫霑漬方未休兒童跳躍坐喧譟執遁逐走同俘囚出門不記舍前路顛倒扶掖迷去留朝陽照屋且熟睡官府亦簡少所求寧知宴安含鴆毒耒耜一變成戈矛髙門大宅化灰燼蓬蒿瓦礫塞道周春燕營巢在林木深山露宿隨猿猴三年避亂客異縣側身天地如浮漚親朋阻隔童僕散疏食水飲不自謀有時惝恍夢閭里驚覺五內攢百憂君家畫圖稱絶妙鑒别曽遇柯丹丘想應臨拓出祕府筆意精到世罕儔村歌社舞自真率何用廣樂張公侯太平氣象忽在眼令我感愴涕淚流近者鄉人來報喜今嵗髙下俱有秋豺狼食飽卧窟穴軍師已運招安籌人情自古共懷土况乃霜雨凄松楸神龜且被豫且困豫所勿念天我尤積薪厝火非逺計誰能獻納陳嘉猷長江波浪接淮泗白日慘淡騰蛟虯天下農夫總供給隴畞不得安鉏耰市中食物貴百倍一豕之價過於牛魚鹽菜果悉買米官幣束閣若贅瘤朝餐僅了愁夕膳誰復有酒澆其喉循環天運往必復邪氣暫至不逺瘳此生此景須再覩引領悵望心悠悠寄宋景濓我思美人乃在仙華之山山前夜半挂河漢天津兩旗俯可攀我欲從之阻河關初平不來白羊死瘦骨蝕盡莓苔頑風沙蕭蕭隔人間玄霜日夕凋玉顔有鳥有鳥丁令威側身下上空孤飛女媧石墜鼇腳折海水散作雲霏霏山中有竒樹一華一千秋美人何不折寄我使我歎恨長凝眸深沉洞谷山鬼集隂氣六月氷霜留嗟哉美人誰與儔明年定約赤松子與爾羣峰頂上遊二鬼憶昔盤古初開天地時以土為肉石為骨水為血脈天為皮崑崙為頭顱江海為胃腸嵩嶽為骨膂其外四嶽為四肢四肢百體咸定位乃以日月為兩眼循環照燭三百六十骨節八萬四千毛竅勿使淫邪發泄生瘡痍兩眼相逐走不歇天帝愍其勞逸不調生病患申命守以兩鬼名曰結璘與鬱儀鬱儀手捉三足老鴉腳腳踏火輪蟠九螭咀嚼五色若木英身上五色光陸離朝發㿩谷暮金樞清晨還上扶桑枝揚鞭驅龍抶海若蒸霞沸浪煎魚龜輝煌焜耀啓幽暗燠煦草木生芳蕤結璘坐在廣寒桂樹根潄咽桂露芬香菲啖服白兔所搗之靈藥跳上蟾蜍背脊騎掐光弄影蕩雲漢閃奎爍璧葩花摛手摘桂樹子撒入大海中散與蚌蛤為珠璣或落巖谷間化作珣玕琪人拾得喫者胸臆生明翬內外星官各職職惟有兩鬼兩眼晝夜長相追有物來掩犯兩鬼隨即揮刀鈹禁制蝦蟇與老鴉低頭屏氣服役使不敢起意為姦欺天帝憐兩鬼暫放兩鬼人間娭一鬼乘白狗走向織女黃姑磯槌河鼓褰兩旗跳下黃初平牧羊羣烹羊食肉口吻流膏脂却入天台山呼龍喚虎聽指麾東巖鑿石取金卯西巖掘土求瓊葳巖訇洞砉石梁折驚起五百羅漢半夜撥剌衝天飛一鬼乘白豕從以青羊青兔赤鼠兒便從閣道出西清入少微浴咸池身騎青田鶴去採青田芝仙都赤城三十六洞主騎鸞翳鳳來陪隨神清唱毛女和長煙裊裊飄熊旗蜚亷吹笙虎擊築罔象出舞奔馮夷兩鬼自從天上别别後道路阻隔不得相聞知忽聞寒山子往來説因依兩鬼各借聞始知相去近不逺何得不一相見敘情詞情詞不得敘焉得不相思相思人間五十年未抵天上五十炊忽然宇宙變差異六月落雪氷天逵黿鼉山上作窟穴蛇頭生角角有岐鰐魚掉尾斫折巨鼇腳蓬萊宫倒水沒楣欃槍枉矢爭出逞妖怪或大如甕盎或長如委蛇光爍爍形躨躨叫鹿豕呼熊羆煽吳回翔魌魑天帝左右無扶持蚊虻蚤蝨蠅蚋蜞噆膚咂血圖飽肥擾擾不可揮筋節解折兩眼不辨妍與媸兩鬼大惕傷身如受榜笞便欲相約討藥與天帝醫先去兩眼翳使識青黃紅白黑便下天潢天一水洗滌盤古腸胃心腎肝肺脾却取女媧所摶黃土塊改換耳目口鼻牙舌眉然後請軒轅邀伏羲風后力牧老龍吉泰山稽命魯般詔工倕使豐隆役黔羸礪斧鑿具爐鎚取金蓐收伐材尾箕修理南極北極樞斡運太隂太陽機檄召皇地示部署嶽瀆神受約天皇墀生鳥必鳳皇勿生梟與鴟生獸必麒麟勿生豺與貍生鱗必龍鯉勿生蛇與􅖆生甲必龜貝勿生蝓與蜞生木必松楠生草必薺葵勿生鉤吻含毒斷人腸勿生枳棘覃利傷人肌螟蝗害禾稼必絶其蝝蚳虎狼妨畜牧必遏其孕孳啓迪天下蠢蠢氓悉蹈禮義尊父師奉事周文公魯仲尼曽子輿孔子思敬習書易禮樂春秋詩履正直屏邪攲引頑嚚入矩規雍雍熙熙不凍不飢避刑逺罪趨祥祺謀之不能行不意天帝錯怪恚謂此是我所當為眇眇末兩鬼何敢越分生思惟呶呶向瘖盲泄漏造化微急詔飛天神王與我捉此兩鬼拘囚之勿使在人寰做出妖怪竒飛天神王得天帝詔立召五百夜叉帶金繩將鐵網尋蹤逐迹莫放兩鬼走逸入欽巇五百夜叉個個口吐火搜天刮地走不疲吹風放火烈山谷不問杉柏樗櫟蘭艾蒿芷蘅茅茨燔焱尉灼無餘遺搜到九萬九千九百九十九仞幽谷底捉住兩鬼眼睛光活如琉璃養在銀絲鐵柵肉衣以文采食以麋莫教突出籠絡外踏折地軸傾天維兩鬼亦自相顧笑但得不寒不餒長樂無憂悲自可等待天帝息怒解猜惑依舊天上作伴同遊戲程孟陽云公樂府多似太白少陵間學張文昌王仲初此又在盧同馬異間竒怪直仿佛昌黎矣過南望時守閘不得行客路三千里舟行二月餘壯顔隨日減衰鬢受風疏蔓草須句國浮雲少昊墟愁心如汶水蕩漾繞青徐殺氣殺氣乾坤黑隂氛日月黃已成心曲亂不復鬢毛蒼夜哭城笳裏朝煙野戍傍扶傾無郭李何地尚耕桑望孤山作返照千山赤寒煙一島青羈心霜下草生態水中萍黃屋迷襄野蒼梧隔洞庭空將垂老淚灑恨到滄溟青絲馬蹀躞青絲馬艱難赤伏符窮隂嵗欲暮落日鬼相呼見鴈愁心裂看天淚眼枯殷勤夜深月還照旅魂孤古戍古戍連山火新城殷地笳九州猶虎豹四海未桑麻天迥雲垂草江空雪覆沙野梅燒不盡時見兩三花客路客路秋風裏扁舟夕照時渚鴻魚復陳江樹井陘旗衰朽嗟誰與愚蒙荷帝慈山中牧羊子嵗暮爾相期不寐不寐月當戶起行風滿天山河青靄裏刁斗白雲邊避世慙商綺匡時愧魯連徘徊懷往事惻愴感衰年夏日雜興曽樓迢遞俯清郊天際羣山檻外交日暖水禽鳴哺子風輕沙燕語尋巢緑荷雨洗藏龜葉翠竹煙寒集鳳梢可歎仲宣歸未得苦吟終日倚衡茅二月七日夜泊許村遇雨漫喜晴天出北門還愁急雨送黃昏山風度水喧林麓野樹翻雲動石根宿麥巳隨江草爛新泉休共井泥渾魚龍浩漫滄溟濶澤畔誰招楚客魂二月二十三日自黃岡還杭塗中作日照江邉春樹林繁花亂葉感人心花間蛺蝶漫多事葉底杜鵑非好音舉目山川成皓首側身天地一霑襟解愁惟有尊中酒疾病年來己厭斟春興深春積雨感年芳暮館輕寒透客裳翠栁條柔先改色紫蘭花冷不飄香山中虎豹人煙少海上樓臺蜃氣長燕子新來畏霑濕一雙相對立空梁次韻和新羅嚴上人秋日見寄愛汝精藍抱翠微青松緑竹共依依龜臺落日明霞綺鰻井寒潮長石衣銀杏子成邉鴈到木墀花發野鶯飛鐘殘永夜禪心定一任秋蟲促杼機宿賈性之市隱今年冬雨不作雪屋頭鳥聲渾似春絶憐草色緑鋪地可愛梅花白照人時物己迎新嵗換交情空向異鄉親忽思昨夜殘燈裏錯認還家夢是真次韻和孟伯真感興二首五載江淮百戰場乾坤舉目總堪傷己聞盜賊多于蟻無奈官軍暴似狼緑水青山人寂寂長煙蔓草日荒荒弟兄零落音書絶腸斷春風鴈一行無用文章豈療飢勞生筋骨己支離窮愁杜甫家何在落魄陳平志未竒草澤狐狸三窟固江湖波浪一帆危故園春色年年到緑葉紅花好為誰感興二月江南雪始飛吳山寒色動征衣莫尋花徑防泥滑且掩衡門待日晞弱栁先舒應自損蟄蟲己出更安歸乾坤處處旌旗滿肉食何人問采薇廢雲山堂有感堂在府治聽事後郡守退食之所雲山堂畔垂楊栁曽見新堂結構成一吏傳言奔里役幾家掩淚輟農耕花明粉黛春開宴月照樓臺夜按箏破瓦斷磚今滿地緑莎青草為誰生次韻和林彥文在縉雲見寄十年井邑化為墟滿眼荆榛塞路衢雞犬真成天上去神仙不復好樓居風凋野樹無棲鳥水落池蓮有涸魚欲訪軒轅問消息太微風雨隔清都丙申嵗十月還鄉作三首故園梅蕊依時發異縣歸人見却悲花自别來難獨立人今老去復何之未能荷鍤除叢棘且可隨方著短籬等待熏風暄暖後枝間看取實離離手種庭前安石榴開花結子到深秋可憐枝葉從人折尚有根株為客留枳枸悲風吹白日若華髙影隔青丘壞垣蟋蟀知離恨長夜凄涼弔獨愁小舟衝雨清溪上雨密溪深宿霧昏遊子到家無舊物故人留客欲空尊荒畦蔓草纒蒿草落日青猿叫白猿語罷不須還秉燭耳聞目見總銷魂聞盜過界首季君亦蒙訪及以詩唁之妖星何故犯奎躔鶴上雲霄鯉入淵寇退喜聞曽子反書焚尚賴伏生傳虀酸并與青氊去瓜苦空餘緑蔓牽慚愧北郊湯博士白鹽赤米數相憐贈西巖道元和尚西巖寺裏雲巢子不到人間幾十年杖錫野猿迎路側談經山鬼立燈前塵飛劫火青春夢雪滿長松白日眠近得淵明入蓮社興來時復有詩篇愁感代哭燕鴻北去又南來斷壠荒岡幾劫灰慈母磯寒風落木望夫石老雨添苔江流定與天河合客淚還經地底回未必春光便銷歇白華猶發燒殘梅感興百年強半已無能愁入膏肓病自增千里江山雙白鬢五更風雨一青燈繁絃急管誰家宅廢圃荒窰昔代陵不寐坐聽雞唱盡素光穿牖日華升江上曲數樹垂楊緑水邊問郎何不繫蘭船浦沙新漲看山逺半夜月明無杜鵑題沙溪驛澗水彎彎繞郡城老蟬嘶作車輪聲西風吹客上馬去夕照滿川紅葉明送鮑生之閩中青青芳草夾長堤漠漠輕煙送馬蹄他日相思建溪上棠梨花發鷓鴣啼絶句漫興莫道花開便是春莫言沙漲即成津北風過了東風起愁殺江頭待渡人江行雜興二首馬當之山中江中其下乃是馮夷宫良宵月出江水底行人喜值天無風九龍山西西日沉江雲壓地生層隂汀洲無人蘆葉響哮虎一聲風滿林過閩關二首關頭霧露白濛濛關下斜陽照樹紅過了秋風渾未覺滿山粳稻入閩中峻嶺如弓驛路賖清溪一帶抱山斜髙秋八月崇安道時見棠梨三兩花過蘇州二首姑蘇臺下垂楊栁曽為張王護禁城今日淡煙芳草裏暮蟬猶作管絃聲陌上清歌最可聽誰知此是斷腸聲就中更有楊枝曲恨殺昏鴉及曉鶯有感魚鹽充牣稻梁肥誰寤繁華是禍機日暮無人唁亡國寒鴉猶帶夕陽飛明詩綜卷三
