頓覺隔氛埃遥山雲斂雨初霽極浦波平潮又來明月似迎星使出輕帆須趁晚風開佳辰佳境兼佳客乘興休停到手杯金麟孫一首麟孫官議政府左參贊次韻别吳副使臨分盡醉側烏紗長路髙低日易斜好雨多情知滑道輕風惜别解飛花留春縱欲兼留客戀闕其如又戀家一去茫茫遼薊逺銀河何處問仙查沈彦光一首彦光字子求官吏曹判書詩話子求望逺亭詩有白鴈依寒渚青驢度小橋之句頗饒晚唐人風韻徐敬徳花潭集有次留守沈相國彦慶韻詩當是其晜弟太平舘次韻春鳥花邊啼暮鴉樹頭宿何事逺遊人不秉良宵燭許洽一首洽參政琮之孫官至議政府右參贊詩話洽與弟沆俱有時名甞集其先世詩號陽川世藳沆官吏曹參判兄弟皆執國政詩有漁店日斜遥笛起海門風急曉帆開之句亦覺爽氣殊倫漢江陪宴次韻緑水靈源自五臺新添好雨絶塵埃長洲芳草移船近逺渚輕鷗避櫂來景物盡供今日興襟懷須向此中開猥參勝引非吾分擬向巖前倒玉杯國有酒巖酒流出其下金謹思一首謹思官議政府領議政别吳副使次韻方空嵗嵗蹙輕紗半榻香烟一穂斜萬里往來蝴蝶夢三春開落杜鵑花吹殘逺笛誰懷土過盡良辰不在家日暮關山雲樹隔天津何處泊靈查尹殷輔一首殷輔官至議政府領議政游漢江次韻江上天然百尺臺澄波無緑鏡無埃茫茫極浦舟南北渺渺長空鳥去來汀草有情吟外碧岸花隨意望中開叨陪髙㑹誠踰分乘興還須倒百杯黄𤦺一首𤦺由承政院右副承旨遷都承旨開城白駒難自縶青眼更離筵江海相忘處烟波欲暮天落花飄醉袖芳草入吟鞭翰墨真餘事功名正妙年金安國一首安國字國卿號慕齋官刑曹判書至領議政有慕齋集詩話使東國者前有張芳洲後有華鴻山皆中朝之詩伯鴻山至日舘伴十有一人非不每篇踵韻然中律者寡矣十一人者議政府領議政尹殷輔議政府右議政金克成議政府左叅贊栁貫户曹判書尹仁鏡吏曹判書成世昌禮曹判書李龜齡工曹判書尹世豪漢城府判尹鄭士龍承政院都承旨黄𤦺左承旨申瑛及安國也鴻山留國中僅五日而返此見於皇華集者不能多焉開城太平舘次韻温鞵陵廢井空青種穄田荒但記名舊跡不隨時代滅停驂落日一傷情申光漢一首光漢字漢之由吏曹判書官至正憲大夫議政府左參贊兼知成均舘事𢎞文舘藝文舘大提學同知書筵春秋舘事有企齋集詩話舊典使于東國必命儒臣給舎迨嘉靖二十三年恭僖王薨遣使改諡及賻改命司禮監太監郭璈副以華亭張行人承憲於是中官偕行道塗無酬荅之作禮成而返乃緘詩以寄國人爰有吏曹判書申光漢議政府右贊成栁仁淑成均舘司藝林亨秀禮曹正郎李洪男戸曹參判沈連源黄海道觀察使權應挺相與追和之仍刋為皇華集一卷而鄭士龍為作序暮景樹宻深濃翠孤烟澹作雲前村聞犬吠暗路草中分林百齡一首百齡官議政府右議政詩話張行人既使東國諭祭恭僖王懌成禮而返明年榮靖王􅀈復薨於是别選廷臣遣行人長安王鶴往賜祭及諡陪臣以詩贈荅議政府右議政林百齡禮曹判書尹溉工曹判書任權吏曹參判慎居寛成均舘大司成李潤慶司藝崔演承政院右副承旨洪叙疇奉常寺僉正朴忠元開城府留守李澯京畿觀察使宋騏壽而鄭士龍尹仁鏡申瑛李洪男亦與焉游漢江次韻王室千年作翰藩欣聞使節頌聲喧登樓未倦陪歡賞汎水還容接笑言舉網漁人貪似獺操舟穉子捷於猨夷猶領得滄洲趣還向春風望故園李潤慶一首潤慶官成均舘大司成漢江次韻漢江形勝表東藩使節登臨鼓吹喧對景每憑詩遣興通情猶借譯傳言忘機自幸參沙島隨世何殊束檻猿回首風光堪逺矚雨催新緑遍郊園李澯一首澯官開城府留守詩話花潭集有贈留守李相國澯詩泛臨津江臨津傳勝事駐節是仙舟烟羃沙邊樹風迴水面鷗笑談情不淺詩酒興難收絶域萍蓬㑹無忘此日遊徐敬徳二首敬徳朝鮮生員有花潭集詩話花潭講學専以周邵為宗詩亦效法撃壤以金安國引薦授參奉力辭集中酬和者李相國澯朴相國祐沈相國彦慶李留守龜齡金都事洪林正字薈沈教授義張教授綸趙上舎玉沈别提宗元朴參奉溉而朴民獻頤正金漢傑士伸趙昱景陽金恵孫彦順以及黄元孫許太輝等疑皆從游講學者也山居花潭一草廬蕭灑類仙居山色開軒近泉聲到枕虚洞幽風澹蕩境僻樹扶疎中有逍遥子晨朝聞讀書靈通寺次題壁韻松溪一路入青林林下禪居晝亦隂觸石泉流三面轉倚天山色萬重深清歡直欲朝連夜勝引應難後繼今數局枯棊談笑裏不知雲日已西沉辛應時一首應時官校書舘校理詩話隆慶元年以即位頒詔朝鮮歙縣許公國南昌魏公時亮持節以往是時恭憲王峘又薨兩公返命共成詩一卷國中屬而和者止工曹判書朴忠元一人議政府左贊成兼知書筵春秋館事洪暹序之曰小邦不幸兩公之來適丁大戚滿目愁慘無意於覽物輒題逐篇和進亦非有喪者所當為所以倡之少而和之寡也於此足徴其為秉禮之國矣明年衡陽歐希稷以行人奉使舘伴辛應時朴淳等始復有贈送詩焉送歐大行還朝鴨緑江頭送櫂聲東風吹淚若為情人間離别傷今日天上音容隔此生衡浦鴈迴驚逺夢洞庭春盡渺歸程遥知萬里相思處南斗横斜片月明朴淳一首淳官吏曹判書太平樓次歐公韻來遊萬里魂應斷獨倚青冥思更賖天濶楚鄉飛客夢路窮蓬海駐仙查山連睥睨雲長瞑春半池塘草欲花簾外夕陽看漸沒消愁惟有醉流霞李珥二首珥徳水人官議政府右贊成詩話吾鄉葵陽黄公以編修使朝鮮在萬厯十年八月自珥以下三人暨許状元篈皆充舘伴者也辱編修黄公示沿塗之作賦呈丁年行役記吾曽遼薊修途客念憑歴歴道邊孤店月依依天上早朝燈身回蝸殻何由轉班入蛾眉不再能玉署新詩分物色瑤臺指㸃一層層送黄公還朝長川氷雪覆寒沙此日愁聞入塞笳兩地雲泥分席上一江南北即天涯徒勞永夜游仙夢漸逺明河貫月查珍重詩篇兼贈處媿将燕石報瓊華金贍一首贍官吏曹佐郎送别正使黄公還朝月落闗城鼓角鳴星軺夙駕向神京長江自昔分南北兩地從今隔死生接塞凍雲迷别路亂山晴雪照行旌那堪獨夜龍灣舘愁對寒燈夢不成髙敬命一首敬命官司贍寺僉正别正使黄公好音無路托西歸心逐仙查自奮飛鴨水寒波添别淚鶻岑晴雪㸃征衣謾将便面藏懷袖何計承顔御靮鞿匏繋海濵身已老百年形影欲誰依栁根一首根字晦夫狀元自號隠屏居士有西坰集詩話蘭嵎諸公以萬厯丙午使東藩栁晦夫李孝彦許端甫為舘伴公攜有唱和詩卷歸墨蹟今存予家萬厯丙午五月送朱蘭嵎太史還朝玉節東來鳳詔頒暮春江上乍承顔髙懷獨出形骸外雅賞長存水石間目斷未堪魂夢逺形留只得鬢毛斑相思别後如明月萬里清光不可攀李好閔一首好閔字孝彦探花樞相有五峰書巢集郊院别席西郊菡萏緑盈池折得芳華贈别離此去金臺情不斷寸心真似藕中絲許篈三首篈舉進士第一萬厯壬午官成均司成熊州引一作牽情引熊州樓觀飛雲外白簡霜威凌皁蓋組練三千引繡衣羅裙二八鳴珠帶九華之帳香氤氲寂寂瓊樓午夜分苧里佳人嬌薦枕巫山仙子渺行雲牽情夢罷看歸路别恨迢迢隔烟霧妾心苦作藕中絲郎意何如荷上露錦水東西楊栁新往來愁殺斷腸人欲将心事寄青鳥芳草年年空復春謝編修黄公恵詩扇越槖傳輕箑良工制作勞古藤分剡曲寒竹截湘皋灑落留清什飄揚動彩毫書因逸少重價為謝安髙自得雙金贈還同一字褒年年火雲日長是憶仙曹奉别正使黄公迢遞飛旌入漢闗鴨江晴雪展氷紈仙蹤已隔雲霄外晤語猶存夢寐間中嵗不堪頻送客此生難卜再承歡空餘一握蒲葵扇分得清風兩袖還許筠三首筠字端甫篈之弟與兄皆舉進士第一自號白月居士送參軍吳子魚還天朝國有中外殊人無夷夏别落地皆弟兄何必分楚越肝膽每相照氷壺映寒月倚玉覺我穢唾珠復君絶方期久登龍遽此成離訣闗河路險巇秋郊方蠲熱此去慎行休毋令阻回轍東陲尚用兵海嶠日流血須憑魯連子却秦掉寸舌勿嫌九夷陋勉狥壯夫節陪吳參軍子魚登義城平野垂天末長江接海流雨餘多牧笛風急少行舟獨鶴盤雲去雙鳬就渚浮相憐無限意空憶仲宣樓晚詠重簾隠映日西斜小院回廊曲曲遮疑是趙昌新畫就竹間雙鶴坐秋花金尚憲四首尚憲字叔度有朝天録聞柝撃柝復撃柝夜長不得息何人寒無衣何卒饑不食豈是親與愛亦非相知識自然同袍義使我心肝惻九日黄縣城邊落日朱橋驛裏重陽菊花依然笑客鬢髪又度秋霜早春水際城邊野馬飛漸聞宫漏晝間稀東風日日蘼蕪緑塞北江南總憶歸初至登州南商北客簇沙頭畫鷁青簾幾處舟齊唱竹枝聯袂過滿城明月似揚州崔澱二首澱字彦沉海州人進士有楊浦集李栗谷云彦沉詩似丹穴鳳雛聲纔出穴已足驚人讀之風露爽然殆非食烟火人語置之盛唐詩中亦無媿也鄭經世云彦沉信口吐詞皆成瓊屑俊任叔英云彦沉服膺盛唐其詩清越逸詩話彦沉八齡能詩年十八中進士二十二而沒甞輕衫幅巾登鏡浦臺倚柱而吟大書于壁曰蓬萊一入三千年銀海茫茫水清淺鸞笙今日獨飛來碧桃花下無人見國中疑為真仙許篈愛而和之其逝也李廷龜申欽鄭協李綏禄趙纘韓具􅀢韓浚謙皆賦詩以悼詩有云楊浦烟花三月酒匡山風雪十年燈句亦自佳春日楊栁依依江水生杏花如雪落無聲青霞巻盡畫樓出中有玉人吹玉笙贈人碧溪哀玉響楓林山水孤懷恣逺㝷仙子不來秋已暮古樓斜日獨登臨李廷龜一首廷龜號栗谷崔彦沉輓詩有友今亡矣無端夢見之長㝷臨訣語獨紀贈行詩宛爾龍蛇字森然玉雪姿青山一坏土衰白淚雙垂明詩綜卷九十四
