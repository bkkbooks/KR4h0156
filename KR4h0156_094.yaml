body:
  text: 明詩綜卷九十四翰林院檢討朱彛尊編髙麗静志居詩話髙麗文教逺勝他邦自元以前詩曽經大司成雞林崔瀣彦明父選目録曰東人之文凡二十五卷度必有可觀惜無從訪求今之存者僅㑹稽吳明濟子魚朝鮮詩選而已近又有人為王氏諸臣白冤可謂發潛徳之幽光矣予更證以髙麗史東國通鑑東國史略殊域周咨録皇華集輶軒録訂其異同補其疎漏論次稍加詳焉偰遜一首遜囬鶻人初名百遼世居偰輦河因以為氏家世仕元順帝時中進士歴翰林應奉文字宣政院斷事官選為端本堂正字恭愍王七年避兵東來賜第封髙昌伯改封富原侯有近思齋逸稿山雨一夜山中雨風吹屋上茅不知溪水長祗覺釣船髙鄭夢周三首夢周字達可髙麗迎日縣人初名夢蘭又名夢龍既長改今名恭愍王九年應舉擢第一人累官政堂文學進三司左使改進賢舘大提學知經筵春秋舘事兼成均大司成領書雲觀事初封永原君加封益陽郡忠義君為李成桂所殺梟其首于市籍其家後贈大匡輔國崇禄大夫領議政府事修文殿大提學兼藝文春秋舘事益陽府院君諡文忠有圃隱集詩話靖難君臣改修明太祖實録因方孝孺而其父克勤循吏也乃沒其實黄觀景清修書傅㑹選而削其名且誣方先生叩頭乞哀觀於鄭麟趾髙麗史夢周圖李成桂不克為芳逺所殺芳逺猶知贈官易名麟趾等亦直書其事是簒竊之芳逺賢于長陵而下國之史官勝于楊士竒輩多矣可歎也夫感遇人心如雲雨翻覆在須㬰素絲變其色安能復厥初啞啞羣飛烏集我中田廬雌雄竟莫辨涕泣空欷歔使日本書懷水國春先動天涯客未行草連千里色一作緑月共故鄉明游說黄金盡思歸白髮生男兒四方志不獨為功名偶題赤葉明村徑清泉潄竹根地偏車馬少山氣自黄昏李穡一首穡字穎叔中征東省鄉試第一明年赴元廷試擢二甲進士授應奉翰林文字累官政堂文學封韓山府院君進位門下侍中與鄭夢周同謀去李成桂放於韓州再放衿州徙驪興㝷封韓山伯卒諡文靖有牧隠集早行凌晨問前路曉色未全分帶月馬頭夢隔林人語聞樹平連野霧風細繞溪雲異國堪愁絶南天無鴈羣李崇仁一首崇仁字子安京山府人恭愍王時登第官至簽書密直司事同知春秋舘事李成桂簒立以鄭夢周黨削職逺流有陶隠集挽金太常禮儀今太叔史學昔公羊四十人間世千秋地下郎空庭餘敗草老樹逼一作耿斜陽俯仰成陳迹經過只自傷李詹一首詹洪州人恭愍王時及第授藝文簡閱三轉為正言歴知申事雜咏舎後桑枝嫩畦西薤葉稠陂塘春水滿稺子解撐舟權近一首近初名晉字可逺一字思叔號陽村髙麗秀才有應制集詩話陽村至京師髙皇帝優禮待之賜衣賜食爰命賦詩陽村先之以本國廢興之由道塗經過之所次之以本國離合之勢山河之勝與夫鄰境之情形兼述東人感化之意既成精華炳蔚音響鏗鏘帝覽之稱歎因命與劉公三吾許公觀景公清戴公徳彛張公信輩偕游南北市來賔重譯鶴鳴醉仙諸樓帝又賜以御製三詩此洪武丙子嵗事建文四年春朝鮮恭定王李芳逺令知申事朴錫下議政府鏤板以行於是嘉靖大夫藝文舘提學國人李詹暨奉使翰林史官兵部主事金陵端木孝思均為作序而淮南陸顒番陽祝孟獻題詩其後焉陽村賜游酒樓實録未之載予所見應制集則天順元年朝鮮本也題鶴鳴樓鶴鳴樓上久徘徊環珮珊珊緩歩來已喜清歌和寳瑟况看纎手奉金杯南臨帝甸山河壮北對天門日月開得被内臣宣聖澤六街三日醉扶回權遇一首遇爵里未詳竹長寺衙罷乘閒出郭西殘僧古寺路髙低祭星壇畔春風早紅杏半開山鳥啼金九容一首九容初名齊閔字敬之安東人中進士拜三司左尹與李崇仁權近等上書都堂阻迎北元使竄竹州召為左司議大夫終成均大司成㝷流大理衞有惕若齋集詩話敬之年十六中進士國王命賦牡丹詩敬之居首既因諫迎元使被流扁所居曰六友堂以詩酒自娛亦瀟灑之士也江水江水東流不復回雲帆萬里向西開菰蒲兩岸微風起楊栁長堤細雨來别夢逺迷箕子國旅愁獨上楚王臺行行見說巫山近一聽猨聲轉覺哀趙云仡一首云仡髙麗豐壤縣人恭愍王六年登第調安東書記累轉閤門舎人以刑部員外郎從王南幸遷國子直講歴全羅西海楊廣三道按亷使辛禑三年起授左諌議大夫辛昌立召拜僉書密直司事升同知恭讓王二年出為雞林府尹李芳逺簒立授江陵大都䕶府使以病辭又拜簡校政堂文學不授禄詩話云仡以典法郎退居尚州露隂山下自號石磵棲霞翁出入騎牛超然有世外之想及轉判典校復退居廣州古垣江村營板橋沙平兩院自稱院主敝衣草履與役徒同勞苦李氏簒立爵禄不受臨終自誌其墓云趙云仡本豐壤人髙麗太祖臣平章事趙孟三十代孫恭愍代興安君李仁復門下登科歴仕中外佩印五州觀風四道亦無聲績亦無過諐年七十三病終廣州古垣城無後以日月為珠璣以清風明月為奠而葬于古揚州峩嵳山南銘曰孔子杏壇上釋迦雙樹下古今聖賢人豈有獨存者可謂嶔竒跌宕之士考云仡仕恭愍朝非李氏得國之後以鄭氏髙麗史為正即事荆門日午喚人開歩出林亭石滿苔昨夜山中風雨惡一溪流水泛花來朝鮮詩話髙麗朝鮮一也然王氏建國本名髙麗迨李氏稱藩始更朝鮮未可以王氏死事之臣入之朝鮮也今以李芳逺襲位之後諸陪臣别為朝鮮庶幾無戾通鑑綱目書法鄭道傳一首道𫝊官右軍總制使芳逺立召為奉化郡忠義君重九故園歸路渺無窮水遶山圍第幾重望欲逺時愁更逺登髙莫上最髙峰曹庶一首庶甞使明流金齒國道經五靈廟題詩五靈廟村南村北雨淒淒古廟靈風楊栁低十里江山看枕上竹林深處午雞啼鄭希良一首希良爵里未詳偶題十年一劒逺平戎勲業蕭條歎轉蓬瘴氣曉來雲似墨山容霽後雪為峰地連龍穴天多雨門對鯨波晝亦風幾被故人吟桂樹客忩落莫傲歸鴻朴原亨三首原亨官戸曹判書調刑曹判書詩話天順元年使朝鮮者翰林修撰呉陳鑑緝熙太常博士㑹稽髙閏居平三年奉使則刑科給事中餘姚陳嘉猷世用四年奉使則禮科給事中海鹽張寧靖之原亨凡三充舘伴靖之贈詩云朝鮮賢臣朴判書老成文物非凡儒蓋其國中翹楚也登漢江樓次張黄門韻二首逺岫横如黛芳郊緑漸平歸鴉翻夕照啼鳥哢春晴暫得新知樂還教别恨生闗山逾萬里何處望燕京春光方浩蕩嵐翠轉霏微雪浪揺歌扇汀蘭襲舞衣素鱗時潑潑輕燕已飛飛景物看如此從教緩緩歸渡大同江次韻逺傳丹詔促行装暫駐星槎浿水陽江浦雪消春意動郵亭日暖客懷長一杯且可酬佳節萬里無勞憶故鄉野濶天低山似畫不禁詩思入蒼茫申叔舟二首叔舟字汎翁自右弼善歴禮曹判書積官至議政府領議政以功封髙靈君有汎翁集詩話考叔舟於景泰二年八月國人鄭麟趾進髙麗史表修史官三十二人叔舟與焉書銜曰中訓大夫集賢殿直提學知制教世子右輔徳兼春秋舘記注官知承文院事臣申叔舟天順元年官議政府右贊成四年進左議政成化七年十二月奉國令撰海東諸國紀書成作序書銜曰輸忠協策靖難同徳佐翼保社炳幾定難翊戴純誠明亮經濟𢎞化佐理功臣大匡輔國崇禄大夫議政府領議政兼領經筵藝文舘春秋舘𢎞文舘觀象監事禮曹判書髙靈府院君臣申叔舟紀書日本代序及八道六十六州頗詳所著詩集二十卷孫從濩編寧都董尚書越使其國為作序陽徳驛北塞歸逺塗千里度陵谷日暮投陽徳舘宇半茅屋輕風吹枯枝短垣依斷麓雨歇低行雲山深聽鳴鹿坐久正蕭然清溪走寒玉逺客自無寐呼童剪殘燭次韻登漢江樓綺席登樓迥春江碧玉流早梅香澗曲芳草滿汀洲賔主歡情洽江山喜氣浮良辰須酩酊莫惜更遲留權擥三首擥由吏曹判書累遷右議政詩話陳緝熙使朝鮮國人賦詩繼和者自朴原亨申叔舟外有若仁順府尹寳文閣提學金守温領議政鄭麟趾禮曹參判盧叔仝禮曹判書洪允成兼成均司成金鈎金未左承旨曹錫門而權擥為之作序書銜曰吏曹判書集賢殿大提學知春秋舘事後二年進議政府右賛成明年進右議政其序略云詩者人心之感物而形於言也心之所感既不能無邪正故言之所形亦不能無是非惟聖人在上則人皆親被其化以成其徳有以得夫性情之正故其所感而發於言者粹然無不出於正矣其持論頗中繩尺登漢江樓二首南樓初縱目檻外俯長流雪盡落梅塢春深芳草洲湖光晴灩灩山氣暖浮浮使節陪登眺斜陽更挽留城南一樽酒相對暮山青小艇横前渡孤帆落逺汀江雲連復斷主客醉還醒落筆龍蛇動髙懷入窈冥楊花渡次陳給事韻山亭置酒近江湄興至頻傾白玉卮萬里歸來多客恨一時登眺得神怡髙標已覺氷霜操新調還聞白雪詞北去他年如記憶也應飛夢到遐陲尹子雲三首子雲官都承旨登漢江樓次韻三首髙軒時暫駐勝地許相招詩律吟邊改愁懷醉後銷汀花經雨動岸栁受風揺忽起中流興春心付短橈何處窮遐矚丹梯近百層陽坡先有草隂壑已無氷美景時相引風懷晚尚仍欲成賔主好觴詠正堪憑風光觸處好春氣望中微山浄濃如畫江深緑染衣夢隨蝴蝶亂心逐野雲飛人世難開口惟須倒載歸李克堪一首克堪官左承旨登漢江樓次韻遲日晴方好和風暖更微山隂追禊事沂上換春衣劇飲金卮滿清譚玉屑飛牆頭輕燕舞有意惱人歸徐居正一首居正字剛中議政府左參贊有北征稿詩話成化丙申祁主事順使朝鮮居正充逺迎使既為舘伴因時與倡和為序其北征稿北征稿者天順庚辰居正奉王命入覲而作也順稱其博古通經長篇短章淵淵乎有本浩浩乎不窮與中國之能詩者殊不相逺云即事小沼如盤水淺清菰蒲新發荻芽生連筒引却前溪水養得芭蕉聽雨聲申從濩一首從濩叔舟孫官成均直講傷春茶甌飲罷睡初輕隔屋聞吹紫玉笙燕子不來鶯又去滿庭紅雨落無聲許琮六首琮字宗卿安興人由進士為吏曹判書積官至參政府議政有尚友堂詩集詩話孝宗即阼之初以右春坊右庶子兼翰林院侍講寧都董公越工科右給事中上元王公敞頒詔于朝鮮宗卿時為舘伴繼和之作綽有唐人風格句如春歸飛鳥外天闊落帆中細雨全沉樹孤城半帶烟東風𤓰蔓水斜日竹枝歌風急摶羊角波翻起鴈羣官橋晴曬網野渡晚維舟俱清婉可誦董公為作序稱其音律諧暢蕭然出塵非虚譽也董公後仕至南京工部尚書贈太子少保諡文僖王公亦仕至太子少保兵部尚書贈太子太保宗卿祖愭字原徳官奉甞有梅軒集曽祖錦字在中官判書有野堂集見龔吳兩公序登浮碧樓次韻渚草平如翦江雲濕不飛餘霞飄綺席新浪濺苔磯古寺蘿垂壁漁家水浸扉眼前多少景惆悵客将歸安興道中次王黄門韻韶光如酒著人迷漫把霜毫取次題山北山南春雨歇隔林紅日鵓鳩啼登鳳山樓次韻獨倚雕䦨㡌影斜客中衰鬢已非鴉不禁杜宇聲聲苦啼盡東風第一花松林晚照次韻一村桑柘夕陽微芳草叢生栁絮飛已過蘭亭修禊後風寒猶未著春衣所串舘道中即事次韻二首數株官栁野橋傍飛絮紛紛撲馬香江雨欲來龍氣黒水風吹作十分凉家在江南水竹村鳥啼花落掩柴門年年奔走東西路坐席何由得暫温成俔一首俔西京觀察使詩話朝鮮兵曹判書魚世謙𢎞治元年序皇華集録俔詩四首王尚書稱為成中樞又稱成同知又為作風月樓記則云西京觀察使惜成化一朝奉使之詩無存未能詳考矣擬古今日良宴㑹嘉賔滿髙堂綺肴溢雕俎美酒盈金觴左右燕趙姬眉目婉清揚朱絃映皓腕列