body:
  text: 明詩綜卷二十二翰林院檢討朱彞尊編瞿佑十二首佑字宗吉錢唐人洪武中以薦歷仁和臨安宜陽訓導升周府右長史永樂間謫戍保安洪熙乙巳赦還有存齋樂全集香臺百詠靜志居詩話明初詩家以楊廉夫為祭酒亷夫見同調綴以評語不曰牛鬼則曰狐精此王常宗論文即以狐比廉夫也宗吉幼為廉夫所賞拾其唾餘演為流派劉士亨馬浩瀾輩爭效之譬諸畫仕女者肌體癡肥形神猥俗曽牛鬼狐精之不若矣其稍有風骨者如射虎何年隨李廣聞雞中夜舞劉琨蹈海莫追天下士折腰難事里中兒庶與凌彥翀李宗表相近當時嘗取宋元金三朝律詩一千二百首編為鼓吹續音惜乎不得見矣天魔舞承平日久寰宇泰選伎徵歌皆絶代教坊不進胡入聲旋女內廷自試天魔隊天魔隊子呈新畨似佛非佛蠻非蠻司徒初傳祕密法世外有樂超人間真珠瓔珞黃金縷十六妖娥出禁籞滿圍香玉逞腰肢一派歌雲隨掌股飄颻初似雪回風宛轉還同鴈遵渚桂香滿殿步月妃花雨飛空降天女瑶池日出會蟠桃普陀煙消現鸚鵡新聲不與塵俗同絶技頗動君王覩重瞳一笑天回春賜錦捐金傾內府中書右相內臺丞袖無諌章有曲譜天魔舞筵宴開駝峰馬乳黃羊胎水晶之盤素鱗出玳瑁之席天鵝擡彈胡琴哈哈回吹胡笳阿牢來羣臣競獻葡萄杯山呼萬歲聲如雷天魔舞不知危高麗女六宫妃西畨僧萬乘師回紇種類皆台司漢兒回避南人疑天魔舞樂極悲察罕死孛羅歸鐵騎驟金刀揮九重城闕煙塵飛一榻之外無可依天魔舞將奈何多藏金叵羅急駕白雲駝隂山之北避兵戈春社詞十日一風五日雨社前拜祝神己許瓦盆瀲灧斟濁醪高俎縱橫薦肥羜嗚嗚笛聲坎坎鼓俚曲山歌互吞吐老巫狡獪神有靈傳得神言為神舞祭餘分肉巫自與醉裏狂言相爾汝小兒覓餅大兒扶頭上神花付鄰女高門歎高門成高門壞不及十年見成敗獸鐶移去屬何人重構高門臨要津門前牢栽楊栁樹莫被他人又移去義士行鍊金鑄范蠡買絲繡平原逝者恐無知徒用勞心魂陋矣哉烏江八千軍壯矣哉海島五百人任安念舊不改轍豫讓報讎須殺身酒不必澆劉伶墳上土劔不必挂徐君墓前樹感君恩重死相從冥漠重泉有逢處看燈詞六首東家砍竹縛山棚西舍邀人合鳯笙官府榜文初出了今宵喜得晚來晴銷金小繖揭高標紅藕青梅滿擔挑依舊承平風景在街頭吹徹賣餳簫傀儡裝成出教坊綵旗前引兩三行郭郎鮑老休相笑畢竟何人舞袖長風簾珠翠動紛紛笑語聲喧隔戶聞明月滿街天似水不知何處著行雲文錦坊西後市南閙竿挑過百花籃少年遊子誇輕俊拾得雙頭碧玉簪村裏兒童暫入城隨羣齊上大街行歸來徹夜渾忘睡從此春田懶去耕清明兼旬蹭蹬在京華又見東風御栁斜客裏不甘佳節過借人亭館看梨花過蘇州白蓮橋下暫停舟垂栁隂隂拂水流舞榭歌樓俱寂寞滿天梅雨過蘇州偶桓九首桓字武孟太倉衛人洪武中應秀才舉為崇安從事授桂林河泊大使終荆門州吏目有江南軒集王元美云吏目頗協風格故多鴻爽之詞詩話明初詩家操選政者賴良直卿許中麗仲孚劉仔肩汝弼沈巽士稱王稱孟揚皆有所蔽惟瞎牛乾坤清氣一編能開生靣惜豫所鈔闕七言近體絶句未得全書恆以為憾雜詩二首衡茅日岑寂嘉樹生繁隂夙興挹朝爽翛然澄我心如彼倦飛鳥冀得棲故林抱經味遺言且復理鳴琴惜哉鍾子沒曠世誰知音養疴卧丘樊庶得脫塵鞅三徑日就荒行樂倦還往荆榛既蕃蕪荼蓼亦滋長幽蘭獨憔悴况復纒草莽不因馨香發豈獲君子賞早發灕江示同舟戴伯貞夜泊南熏亭曉上白石潭北風颯以爽蕭蕭動征衫灕氷激沙礫桂嶺浮煙嵐顧此道里修遙遙在天南常恐瘴癘惡三年情不堪今晨始得歸灑然脫塵凡况遇同袍友高歌酒初酣搔彼頭上雪短髮各䰐鬖相顧但一歎往事悉己諳林泉在何處為我洗餘慚夜渡郎官湖夜渡郎官湖波影忽動蕩搖搖泛孤舟軋軋打雙槳天闊星自流山黑月未上何處虎牙關令人起遐想赴夷陵迢迢上夷陵意促日易暝亂石劖馬蹄叢棘冒衣領登山若攀天度壑如赴井撫膺欲嘔心喘息屢延頸但逢過虎迹敻絶行人影顧兹客懷惡况乃道里永毫素難具陳聊以述短詠秦文仲授溧陽教諭賦此贈别淮海秦徵士鬅鬙雪滿顛五年三拜詔十日九朝天自許償詩債誰能與酒錢冷官歸更好不負舊青氊送陳民初歸廣州兼問訊趙知事公傑靜江遙帶五羊城官舸乘風畫鷁輕客館鄉人秋送别高齋弟子日相迎桄榔接葉蠻煙暗螺蚌含珠海月明到郡為詢賢贊府幾時鞍馬定朝京趙王孫墨羊圖王孫長憶使烏桓因念蘇卿牧雪寒落盡節旄無復見寫生傳得兩羝看王孟端墨竹鳯池退食寫琅玕醉墨淋漓尚未乾寄贈故人良有意清風日日報平安謝縉五首縉字孔昭吳人有蘭庭集張繼孟云孔昭詩憤戚而不傷和悅而不流可謂得性情之正詩話孔昭畫入能品豫嘗見其山水真迹華亭董尚書稱為勝國名流然其詩集刋於永樂中汝南周傳浚儀張肯序之卷末有送盛啓東還吳詩并寫雲陽早行圖以贈題云永樂丁酉十月徐用理選其詩入湖海耆英集不得謂之元人矣修竹塢訪蕭隱士草堂寂寞西澗坳隔林犬吠聲寥寥幽人無事不出户送客有時還過橋溪上斜陽立將盡莎間細路歸仍遙明朝秋風桂花發卧穩東山誰見招春思簾幕風微篆有香起來時候巳斜陽梨花雲冷不成夢蛺蝶一雙飛過牆寄王廷桂山連罨畫雲煙好路入苕溪水木清如此江南好風景故人何事不歸耕寒食村中流水涓涓映淺沙石林風急亂啼鴉荒村寒食無人到何處香來枳殼花漫興村村昏黑樹隂濃咫尺湖塘路不通夜半風來雨吹散棹歌依舊月明中趙迪四首迪字景哲懷安人自號白湖小隱有鳴秋集顧玄言云景哲興洽情真固是逸才詩話景哲五古學唐人而得其丰韻二玄逺遜之不知當日何以不列十子之目牧齋據二徐氏辨景哲非山人其實不然福州林孝廉佶獲徐興公所藏鈔本鳴秋集有景泰五年迪仲子壯後序中云先人值時多故投老林泉而同時閩人鄭閻公望鄭關公啓郭厪敬夫均有挽鳴秋山人詩則宜陽人官吏部侍郎賦元夕應制詩者自是别一人矣壯懷安人中宣德十年鄉試官南海知縣具載閩省賢書題浦舍人梧竹圖吾懷出塵想飛思凌滄洲湘江夜來雨寒色川上浮涼飄金井夕露滴銀塘秋故人隔千里對此空離憂幽人獨憩圖幽人遺世氛心與浮雲薄薜蘿寒可衣山泉時自濯白雲林下來黃葉衣上落高風不可攀逍遙在林壑山水圖蘇耽昔隱處落日惟孤雲青山丹竈前橘井香氤氲湖光林際斷嵐氣霞外分仙源不可即清思徒紛紛周青士云頗近常建殘雨黃陵日己昏蕭颯涼飇起殘雨挂空江冥濛若千里郭厪二首厪字敬夫福州人有鏡湖清唱徐興公云敬夫吾鄉隱君子百年來罕有知者其題青鋪嶺絶句云家林想在空濛外一帶螺江隱翠微又有門前湖白與山青分攜空過白湖亭之句其所居當在白湖螺浦之間與趙景哲相鄰並也懷鳴秋先生之京澄江晚悠悠離思杳難極西風鴻鴈飛我憶鳴秋客逺樹帶餘暉前川起寒色即此待歸舟沙頭掃苔石送友之京我正愁寥落君今又北遷春歸萬里外人去五雲邊塞栁迎征斾江花照别筵離情不可道去住各悽然鄧林一首林初名觀善字士齊新會人洪武丙子以明經中鄉舉官南昌教授擢吏部驗封主事文皇改名林後坐法戍保安遇赦晚居杭州有湖山遊詠録退菴集二月九日大駕北巡賦詩紀事虎衛三千士龍旗十二辰兩京嚴古制六載重時巡宿雨開新霽青陽屆仲春鍾山浮王氣輦路動香塵河嶽提封舊車書制度新覃恩深似海過化速如神夀域熙民物貞符叶鳯麟太平無以報願效華封人沈山子云初唐遺􅒇平顯二首顯字仲微錢唐人以薦授廣西藤縣知縣謫戍雲南沐黔國延為西席張宗海云仲微沂長江徑洞庭道夜郎謫昆明其為歌詩怪變豪放得於逺遊之助題丁野夫畫野夫巳沒四十載化鶴歸來知是非郭外梅村更地主筆端松石見天機一時好手不可遇千古賞音如此稀長憶西湖舊遊處畫船秋雨白鷗飛光霽堂碧雞翠鴻濛夕影到滇水月出金馬東徘徊白雲裏施敬十一首敬字孟莊錢唐人謫居滇詩話孟莊詩頗清越句如斜日黃留漁浦樹隔江青度海門山鷓鴣踏翻黃竹葉翡翠啄破蒼苔花天吳拔斷蛟龍尾月露洗出珊瑚枝夕陽靄靄衆山暝秋水迢迢雙鷺明芣苡緑深江路草枇杷黃盡客窗枝均有風致若歸燕一首疑是感革除而作送吳文學東還結歡未云久詎盡平生語執手臨路隅離觴聊一舉殘鐘草堂夕落雁蘆洲雨相憶渺天涯深悰若為處題梅德芳杏林圖梅仙煉丹處山杏栽無數賣藥到人間衣裳帶紅霧花開不知歲子落還成樹我欲與之言飄然騎虎去送人還廣陵會面情方洽暌違意更長天涯同是客秋杪各還鄉黃葉飛揚子青山繞夜郎分襟即萬里相顧兩茫茫歸燕已知秋社近更繞畫梁飛主意豈不念天時難獨違雙歸遼海逺對語夕陽晞花雨重來日故巢還是非送談孟端蘼蕪葉齊春水生故人欲歸傷吾情草堂酒盡落花滿山驛馬嘶殘月明醉中執手不忍别路上逢人須寄聲明朝相望隔關塞惟見白雲天際橫巴陽夜泊獨棹三巴夜秋高片月孤灘聲將客夢萬里下東吳貧樂軒長卷束牛腰簞瓢繫牛角讀書深樹中不知山日落塞上曲八月秋高塞草斑將軍千騎獵前山彎弓不射南飛雁恐有征人附信還南行途中寄錢唐親友萬里移家入瘴煙故鄉音耗若為傳衡陽自古無來雁况去衡陽又八千漕溪夜泊空山孤驛鼓逄逄明月流輝滿大江水鳥夜寒棲不穩一雙飛影過篷窗讀程原道昆陽詩悵然有懷昆陽市上美人家飲酒曽停過客車萬里相思不相見東風吹盡蜜檀花劉叔讓一首叔讓揚州人詩話叔讓題正南門城樓云紅樹一村蒲甸晚黃雲滿地僰田秋秋夜述懷云南詔羈棲傷短鬢東湖寥落憶扁舟蓋亦明初徙滇者憶弟漂泊嗟吾老羈遲見汝難西風鴻雁急落日鶺鴒寒渭北書長絶滇南淚不乾相思朝夕夢懷抱幾時寬陸顒一首顒字伯瞻揚州興化人洪武中舉明經官户部員外郎永樂初與修太祖實録奉使朝鮮有頤光集吳江道中鱸肥蓴脆正秋風緑水紅橋宛轉通不獨季鷹思故里扁舟吾亦戀吳中李孝謙七首孝謙名本以字行鄞人與弟悌謙洪永間相繼舉孝廉皆以母老固辭有中林集詩話孝謙悌謙忠謙兄弟三人皆有至行其父仕開饒於資時會稽胡舜咨金華戴叔能錢唐楊彥常曹南吳主一豫章揭伯防先後遊四明仕開招致賓館俾諸子問業故其詩文有法孝謙撰長律英華度有可觀惜其不傳題畫青天際逺水落日明遙岑奮袖拂蒼石憩此長松隂涼飇灑露頂正可絃吾琴古調詎自祕坐惜無知音美人隔秋水望望煙波深何當一相晤曠焉諧素心題柴昆陵越山春曉圖君莫著謝公登山屐更莫問子猷泛雪舟請君試看高堂壁仿佛李白天姥夢中遊於越山川甲天下秦關蜀道皆土苴柴侯晚年天機精酒酣潑墨為豫寫天姥高出東南天天台四明相蟬聨影落平湖一鑑淨正對賀老山莊前近山青青逺山小煙霧冥濛漲春曉雲門日出似聞鐘耶溪樹緑應啼鳥鳥啼不可聞林深不見雲只疑空青四山合倐訝飛瀑雙崖奔極知妙手奪天造真宰上訴天應笑獨腳山魈作鬼精偷向靈巖拾奇草水竹江花何處灘漁郎翠蓑露未乾青簾酒家石橋右檥舟却憶姚江干長松之下一片石竹杖芒鞋二三客脫巾高挂白雲邊醉倚青天翠如滴送徐允迪還城中寒梅照虛牖嚴霜凋弊裘故人動歸興歲晏不可留徐卿立身何坦蕩行年五十猶偃仰不思唾手取公卿却甘低頭在草莽市中賣藥能逃名枚頭挑錢還解酲悲來不作窮途哭時復有詩鳴不平忘年之交古來有臭味相同即為偶來遲去疾奈爾何無限離情付杯酒北風吹雨凝作花船頭敲氷船尾划道傍行人指歸路城上棲烏還到家城市塵埃易更改還念山林青眼在看花有約明年來教我村童掃門待送巽上人還台州挂錫遙憐野寺鐘赤城何處問芙蓉歸心千里月千里行色一重山一重霞洞春深多藥味石橋雲斷少人蹤秋風紅葉桃花似此日相期谷口逢新秋寄德鄰一雨兼旬水沒塍江村涼思陡然增鴻來燕去非迎送扇故衣新豈愛憎逺戍有書終可到小樓無賦且須登不知明日還晴不船過湖南聽采菱寄題黃巖張氏隱居天台佳氣鬱蘢蔥中有留侯慕赤松繞屋溪聲長落水對門雲氣悉成峰果林秋熟猿將子藥圃春肥鹿長茸幽討莫辭行路逺穿雲巳辦一枝笻題畫溪頭春水碧粼粼溪上春山絶點塵不信白雲都占盡也應茆屋有間人李悌謙三首悌謙名未詳亦以字行擬古驅車前送君送君長亭道落日照道周君行何草草結交既已晚相去一何早世路多險巇君身詎能保别時春草深於今巳枯稿思君衣帶寬憶君容顔老春社今日報春社風光處處同社公三日雨花信幾畨風野老還祈穀村醪可治聾醉歸茅屋卧花月淡朦朧八月草夕起東軒步月今夕何夕耿無眠攬衣起聽更漏傳中秋能隔幾夜逺明月巳減三分圓雲開數雁影貼地露冷獨鶴聲徹天心情未覺坐來倦燒燈更讀離騷篇尤安禮一首安禮字文度吳縣人建文元年舉於鄉官至貴州布政司參議詩話少參為高士敏方希直所取士樹屏歸田人罕見其靣况太守鍾入覲揚東里詢其起居鍾無以應東里曰公為守土吏乃不識尤文度耶鍾歸訪之見一老絡絲巷中布衣紃屨環堵蕭然鍾欲割官地益宅謝不可遺以金亦不受鄉人至今傳為美談其遺文尚存韻語特少送人從軍一篇雖乏警句然唐名家作古詩亦有如是而止者送人從軍秋風正搖落遊子遽離羣結髮事戎行逺戍驃姚軍悠悠歲月邁渺渺川塗分何以慰心曲努力樹功勳錢安二首安字靜能後以字行鄞縣人臨安訓導遷韓府紀善永樂改元聞其名召至京固以老辭放還有畦東集李杲堂云紀善詩健朴有蒼然之色舟中遣懷朝發浙江頭暮宿越城下寒月照船窗清霜肅原野豈不念别離吾道有用舍俯仰宇宙間孤懷浩難寫強取囊中琴起彈仍復罷悠悠世上人誰是知心者喜晴秋風忽起卷重隂日色微茫照樹林野老扶藜看白石山人伐木度青岑門前溪水深三尺牆外竹梢高十尋明日甕頭新酒熟且依松下一開襟鮑仁濟二首仁濟字原𢎞黃巖人永樂初伊府紀善有恕菴集絶句月移階上花露滴階下樹四顧寂無人流螢自來去燈下有述白頭紀善病艱難一點青燈坐夜闌千里恐驚親骨肉緘書猶自報平安林枝一首枝字昌達閩縣人號古平山人有效顰集詩話閩自十才子外能詩而不與其列者有趙叔迪景哲林紹淳裕鄭文霖汝衆林敏漢孟陳本固及昌達也昌達集不傳徐興公家有老儒手録明初詩今歸林孝亷佶豫借觀録之寄彭韞玉空齋牢落思寥寥荏苒年光逝水消憶得當時分袂處栁花如雪過江橋劉績七首績字孟熙紹興山隂人隱居不仕人稱西江先生有嵩陽集顧玄言云孟熙會稽名家屬興豪華才思雄健詩話殘雪未消雙鳳新春先入五侯家晚唐張蠙詩也孟熙易殘以霽易新春以春風攘為巳作遂以此得名人或少之然竹影橫斜水清淺桂香浮動月黃昏非江為詩乎林君復易疏暗二字竟成千古名句所云一字之師與活剝生吞者有别也張作全詩不稱不若劉之首尾相當其自題詩本云幼小工刺繡極知針線難祗緣花樣古不耐俗人看是時人爭學溫李宜其以拔俗為嫌耳題西陵送别圖送姚進士悠悠復悠悠風吹江上舟今朝天色好送客西陵頭西陵在何許羃䍥春郊樹搔首望行人迢迢上京路京路一千程官梅照眼明春風濃似酒難浣别離情别離餘幾日佇得君消息折取杏園花慰我長相憶相憶夢相仍高樓只自登春潮知我意日夜向西陵送周明德應詔之京師閶門栁條未堪折只宜相見不相别人生蹤迹各東西半是車輪與馬蹄把酒送君城北路曉日鴉啼烏桕樹一聲歌罷淚沾巾僮僕催人上塘去願為轆轤纒青絲轆轤可轉心不移男兒出處自有分與君那得不相離官家有程行莫緩後夜相思月還滿送友人歸番陽芳草緑尚淺故園春未殘平生為客慣今日别君難短棹吳歈曲哀絲楚女彈江花正滿眼且莫下長干送王內敬重戍遼海别淚不可忍杯行到手空風塵重作客寒暑易成翁曙色連關樹秋聲起塞鴻天涯見親友還與故園同早春寄京師白虛室先生帝城佳氣接煙霞草色芊芊紫陌斜霽雪未消雙鳯闕春風先入五侯家歌鍾暗度新豐樹遊騎晴驕上苑花獨有揚雄才思逸應傳麗句滿京華結客行結客千金盡酬恩一劔存羞為狗盜伍不傍孟嘗門月夜獨坐憶錢唐暹師房聽施彥昭摘阮忽思吳客四條絃出谷新鶯咽洞泉一曲醉翁何處聽冬青樹底佛堂前鄭嘉一首嘉字原亨紹興山隂人時稱柿莊先生秋日懷孟熙故人丘壑隱塵路往來遲寒暑空相憶雲山不可期古碑梅福寺荒井石郎祠舊日同遊處偏勞入夢思趙宗文二首宗文名文以字行長洲人官鄱陽知縣有慎獨齋集詩話趙叟傳詩不多率晴穩可誦其題金山寺云淮海西來三百里大江中湧一孤峰凌厲無前惜乎全詩不稱送薑公實還汝陽同知是日飲餞至曉始别酒醒江館夜燈微故舊殷勤不忍違孤棹近從滄海發一官獨向汝陽歸雲開逺浦青山曉霜落空江野樹稀明日相思成兩地西風愁見塞鴻飛清明道中書懷東風道上亂開花遊子偏驚見物華寒食已過嗟在客春衣將換憶還家山城樹暗人逾靜野店鶯啼日未斜空約同遊與諸弟今朝猶自各天涯陳靖逺一首靖逺南昌人姑惡行芳池月隂春草碧有鳥有鳥鳴不息千聲萬聲道姑惡新婦低回淚痕落姑惡姑惡姑不惡努力窗前勤織作嗟爾小鳥胡不思新婦會有作姑時錢遜一首遜字謙伯紹興山隂人洪武末以薦授寧夏提舉水利吏目永樂初遷知孟津縣改弋陽坐纍戍交趾復官文昌主簿有謙齋集春詞紅杏蕭牆翠栁遮重門深鎖屬誰家日長亭館人初散風細鞦韆影半斜滿地緑隂飛燕子一簾晴雪捲楊花玉樓有客猶中酒笑撥沉煙索煮茶何澄一首澄字彥澤江隂人建文元年舉人永樂初歷官袁州知府題畫鴈蘆花瑟瑟水茫茫落月沉沙夜未央離思不禁天外鴈孤舟燈火客三湘吳鎮鎮字稽陽吳江人重過沙河有感白鶴沙頭水自波扁舟曾載夕陽過東風一路䕷蕪緑添得春愁别後多陳觀一首觀字思賢南海人詩話明洪永間有四陳觀一不知何許人中洪武辛未進士一中洪武丁丑進士福建永福人一中洪武庚午舉人字子瀾冨陽人一南海人字思賢子瀾初筮為延平教授調黃州升國子助教力請補外改武昌教授再調荆州初充應天同考試官再為江西福建考官調荆州後又為江西福建考官致仕後復起為應天同考試官掄文六次居教職五十餘年洵異事也陳少保循志其墓稱誨諸生之暇輒為詩文以應四方之求及引年歸日與故舊賦詠為樂惜其詩傳者罕矣九日登高一律南皮李時逺云是南海陳觀之作今從之九日陪李上猶登高百年能幾遇重陽逐伴登高引興長邑宰喜陪元亮飲參軍那似孟嘉狂山雲映水搖秋色浦樹含風送晚涼滿路黃花應笑我白頭猶自客他鄉董儒一首儒字大賓鄱陽人四明夜泊孤城臨野戍短棹倚江橋客路辭家久親闈入望遙斷雲晴後樹明月夜深潮感此無窮恨令人倍寂寥吳子恆一首子恆豐城人寧海縣丞有雪崖詩集詩話子恆詩一卷其曾孫巡撫雲南都御史祺刋行秀水陶照華容孫繼芳臨海趙淵零陵楊材皆為之序其弟叔潤中永樂丙戌進士仕至浙江按察僉事及卒子恆哭以詩云出仕應同歲歸休又共年又云介夀周花甲為官歷四朝則其卒在正統間也又有八旬自述詩云天與遐齡八十秋六旬老矣得歸休蓋歸田草載後乃沒考之南昌台州二府志皆不載其人詩雖欠工趙淵稱其不出位不狎物若老人整中體貌自别因存其一絶高洲青山西峙水流東㿩谷縈紆一道通老去相知一藜杖天邊扶我最高峰錢復亨二首復亨松江華亭人蕭山儒學教諭有講餘集魏仲房云復亨詩清而不枯華而不豔蘇臺懷古闔閭城栁幾春風山逺臺高望眼空麋鹿不來人亦去鷓鴣啼處是吳宫題畫嫋嫋涼風斷復連青山深處藕花邊誰家樓外停歌舞又上西湖十錦船詩話西湖船製不一以色名者有明玉鎗金金勝寶勝大緑間緑遊紅申屠仲權詩紅船撑入栁隂去釋道原詩水口紅船是妾家是也以形名者有龍頭白樂天詩小航船亦畫龍頭是也有鹿頭楊亷夫詩鹿頭湖船唱赧郎是也形色雜者有百花十樣錦錢復亨詩又上西湖十錦船是也以姓名者有黃船董船劉船見吳自牧夢粱録蓋大者謂之頭船最大者賈秋壑所造車船也車船棚上無人撑駕但用車輪腳踏而行其速如飛小者謂之瓜皮船亷夫詩小小渡船如缺瓜歐陽彥珍詩瓜皮船子送琵琶張大本詩瓜皮小船歌竹枝周正道詩瓜皮船小水中央是也又有總宜船取東坡居士淡妝濃抹總相宜之句名焉李宗表詩總宜船中載酒波凌彥翀詩幾度湧金門外望居民猶説總宜船是也四水潛夫述武林舊事值探春競渡日畫橈櫛比如魚鱗無行舟之路楊謹思詩大船撾鼓銀酒缸小船吹笛紅繡窗今則敗舫數艘無復徵歌按舞者矣蔡庸一首庸字惟中紹興山隂人徐氏席上聞歌有感休遣雙鬟唱竹枝聽來渾不是當時自從夢隔巫山雨嬴得秋風宋玉悲詩話惟中與鎦孟熙唐愚士毛鼎臣齊名時號唐鎦毛蔡席上聞歌一絶宛然劉夢得杜牧之遺音鄭關四首關字公啓閩縣人有石室遺音蔀齋集暇日南湖莊上門徑絶車塵惟聞沙鳥語誰識忘機人山間坐朝暮南風吹雨來颯爽溪頭樹白鷗知我間相看不飛去題秋江送别圖美酒雙玉壺沙頭送行客瑟瑟荻花風寒江秋水白落日下長空返景明石壁去去入煙霞相思楚天隔挽任本立陸沉誰分聖明朝老向窮途怨未消荒冡巳無行客弔歸魂徒有故人招臨風短笛腸空斷落月空梁夢漸遙從此不須頻北望嶺猿江樹日蕭蕭竹枝詞十二灘頭水接天千山隂雨萬山煙自從前路風波惡不敢回頭望别船朱琳一首琳字玉林號雨椿嘉興人雨中過韶州船下韶瀧日欲晡四山雲起漸糢糊沙鷗衝浪頻來往汀樹迷煙半有無作客又驚三月暮思家其奈一身孤愁懷結轖渾如醉獨倚篷窗聽鷓鴣曽一本一首一本南昌人挽屠指揮一别驚淪沒空遺大樹隂愁枯雙淚眼交絶百年心瘴海連天闊黃茅過嶺深料應魂未返悵望獨長吟李進三首進字孟昭嘉興人永樂初聘為府學訓導有西園先生集高念祖云吾鄉少傅俞公山為孟昭弟子西園先生集五卷少傅子誥所刋也以校官兩應省闈之聘其在閩則永樂庚子也其在山東則癸卯也海鹽李孟璿志墓稱其居喪哭母眇一目而廬陵陳方序其集稱其詩清麗工緻變態不一錢唐薑蓉塘亦極稱之詩話孟昭鐡松居士懷用和士林詩選取以壓卷句如杏花村裏青旗酒楊栁隄邊畫鷁船三月東風初去雁一畨新雨又飛花菰蒲風外呼漁艇楊栁隂中認酒樓均有晚唐人風致花遊曲飛花入簾宫漏長遊絲落絮春茫茫金鞍駿馬青絲勒綺閣小姬紅粉粧黃金作丸落花底啼鳥隔花飛不起明朝更欲載東風早買湖船放春水同陳劉二掌教遊湖作湖光瀲灩鳥間關小棹夷猶意獨間春正好時初過雨望中佳處惜無山花明逺岸青旗出栁拂微風畫舫還四美由來俱不易人生莫遣鬢毛斑西湖夜泊蹇驢衝雪岸烏紗夜醉西湖賣酒家十六吳姬吹鳯管卷簾燒燭看梅花薑明叔云藴藉風流謝矩一首矩字元規鄞人有鳴窮集賦望郎回山望郎回望郎不回心欲摧化作山頭一拳石質堅不朽心不灰花開花落秋復春煢然獨立誰與鄰夜深惟見皎皎月雨晴只有英英雲將心誓比雲與月雲有卷舒月圓缺百年夫婦終古心豈辨新離與故别此心炯炯天地知山高水深終相期郎君應有歸來時姚黼一首黼字廷章嘉興人處士有可間集寄景伊文學憶昨逢君四月初笑談懷抱最相符朝乘白下看花騎暮醉長安賣酒壚别去江山頻悵望歸來松菊未荒蕪登臨日候南飛雁肯寄平安一紙無張璨二首璨字藴之嵊縣人詩話藴之取材選體古意猶存君子有所思行騁駕向名都縱觀極西京煌煌九衢裏列第起朱甍虹梁架層漢翬閣度紫清高槐蔭金溝弱栁垂雕楹前揚許史鑣後曵金張旌燕姬撫瑶瑟趙女彈鳴筝歡娛豈終極為樂擬千齡清川去悠悠白日光易傾金谷歎緑珠上蔡悲蒼鷹繁華會當歇大運有虧盈勿嗤黔婁室寂寞掩柴荆婕妤春怨太液栁垂絲昭陽花滿枝如何長信草獨是得春遲項伾一首伾字如僉溫州瑞安人秋江送别為戴友諒賦蕭蕭落葉早寒天忽送秋聲到耳邊千里客心驚歲月五湖鄉夢入風煙青山紅樹還家路緑水滄州載酒船夜半燈前對兒女白頭重話謫居年明詩綜卷二十二
