body:
  text: 明詩綜卷二十九翰林院檢討朱彞尊編謝遷一首遷字于喬餘姚人成化乙未賜進士第一纍官少傅兼太子太傅戶部尚書謹身殿大學士贈太傅諡文正有歸田稿李時逺云木齋歸田後專事吟詠有沖淡間雅之趣山莊一首真得陶家情景旱過山莊避暑次陶公韻侵晨理孤棹山居將避喧好風忽南來吹我烏帽偏宿鷺未移渚落月猶在山候門兩稚子問我何時還高山與流水此意向誰言王鏊四首鏊字濟之吳縣人成化乙未賜進士第三授翰林編修厯侍講諭德進學士擢吏部侍郎纍官少傅戶部尚書武英殿大學士卒贈太傅諡文恪有震澤稿邵國賢云濟之詩蕭散清逸有王岑風致靜志居詩詁濟之以經義重詩非所長集中十二絶句甚得諷諌之體今録其三諸公南巡詩雖多皆當遜席己巳九月舟次相城幾年約兹逰為訪石田叟石田今己亡不使此言負相知三四人拿舟過湖口行行抵相城自卯將及酉四顧何茫然天水合為藪茅屋數家存荒蒲與衰柳本來魚鱉宫自合鷗鷺守始田者為誰餒也非自取有司事誅求亡者十八九念此為傍徨獨立延佇久作詩當風謡以告民父母絶句三首少年天子重邊功烏帽戎衣手角弓行遍漁陽來上谷並無彍騎到雲中安化跳梁即日平中原羣盜敢縱橫洪都定亂誰堪使除是君王自將兵燕雲漠漠鎖重樓八駿驅馳正未休莫道十旬猶不返金陵原是帝王州馬中錫三首中錫字天祿故城人成化乙未進士拜刑科給事中再疏言事受杖出為雲南按察僉事改陜西入為大理少卿以右副都御史巡撫宣府正德初起撫遼東召為兵部侍郎劾罷劉瑾黨之冒邊功者瑾矯詔改南京工部尋褫職瑾誅起撫大同召為右都御史督軍務討流賊升左都御史掌院事以師老玩寇徵下獄踰年卒有東田集西掖晚歸有感時事聊賦述短章用呈同志者虛窗缺月照人寒殘雪留簷凍不乾衰信己憑雙鬢寄世緣聊作一枰看斜封官好空批敕神武門髙未挂冠誤却登山與臨水十年騎馬走長安晚渡咸陽野色蒼茫接渭川白鷗飛盡水連天僧歸紅葉林間寺人喚斜陽渡口船表裏山河猶往日變遷朝市巳多年漁翁看破興亡事獨坐秋風釣石邊謁元世祖廟世祖祠堂帶夕曛碧苔年久暗碑文薊門此日瞻遺像起輦何人識故墳棹楔半存蒙古字陰廊尚繪伯顔軍可憐老樹無花發白晝梟鳴到夜分曹潔躬云用事典實鑄辭悽惋可稱絶唱起輦見元史志吳洪一首洪字禹疇吳江人成化乙未進士纍官南京刑部尚書贈太子少保詩話少保𢎞治中官太僕卿與禮部尚書長州吳原博禮部侍郎嘗熟李世賢都御史長洲陳玉汝吏部侍郎吳縣王濟之詩酒唱和立五同會五同者同時也同鄉也同朝也而又同志也同道也因以為名亦曰同會者五人爾少保因屬越人丁綵繪作圖五家各藏其一於是原博序之濟之題詩其後所云鄉邦自昔誰同會人事從來苦不齋是己今諸家所藏或亡于兵或燬于火豫從同官徐電發所獲見一卷蓋少保家藏物也客中和史明古一尊誰共合朋簮又見空階覆緑陰草色不消遊子恨月光偏照故人心霜前白雁音書在雨外青山别路深安得攜琴溪上去社中重覓舊知音秦瓛一首瓛字廷贄崑山人成化乙未進士官至貴州按察副使間居絃桐不終曲坐起囊我琴非憚摩拊勞所嗟無賞音中心潛鬱陶曵杖循空林松風有古意石泉清俗心愛此憺忘歸前山生夕陰王弼一首弼字存敬黃巖人成化乙未進士除溧水知縣入為刑部主事出知興化府有南郭集舶上謡連艘飛過石頭城獵獵黃旗發鼓聲中使面前傳令急江南十月進香橙彭綱三首綱字性仁清江人成化乙未進士雲南提學副使有雲田集宿鄧川驛風走落葉聲山犬吠不己披衣夜出戶明月照溪水李渭清云誦之泠然姚安分司吟人夜未眠迢迢漏初永起步山月中疏枝露猿影李渭清云詠猿不以聲而以影彌見體物之工妙詠刺桐花樹頭樹砥花楚楚風吹密葉翠翩翻露出幾隻紅鸚鵡楊用修云刺桐花雲南名為鸚哥花形酷似之彭公此詩本四句命吏寫刻於扁遺其一句復誦之自覺意足乃不更改其詞風韻可愛洪貫二首貫字唯卿鄞縣人成化丁酉舉人鄧州教諭遷從化知縣改政和有太白山人稿李杲堂云先生詩法盛唐嘗擬杜陵秋興八首傳至京師李文正大加賞歎晚結廬東皋自號稼翁年九十尚不忘摛翰每一詩成好事者輒傳寫焉唐宫詞二首花萼遙連務本樓五王文采盡風流不知凝碧池頭宴落盡宫槐一樹秋雙飛金鳯緑雲翹舞袖三千盡絳綃一自鑾輿西幸後白頭如夢説前朝梁儲一首儲字叔厚廣東順德人成化戊戌進士選庶吉士授編修進侍講洗馬掌翰林院學士選吏部侍郎進尚書纍官至少師兼太子太師華蓋殿大學士卒贈太師諡文康有鬱州遺稿元夜應制雲中珠翠壓鼇頭雉尾雙雙護冕旒聖主經年少巡幸春來方覩屬車遊伊乘一首乘字德載上元人成化戊戌進士厯官按察僉事有集遊虎丘舟行山在眼到門山忽失去郭僅七里攀磴窮百尺巖姿互明晦潭影杳深黑步倦松暫憩醉眠草堪席不逢試劒人猶覩試劒石臺殿半空起雞犬下方隔經聲雜梵唄禪定悟空寂晉唐厯劫多劉白不世出闃劇固殊調登覽各有適重來預作期昨遊宛然憶了性未有因寓形何苦役依此憺忘歸於焉永終日林俊四首俊字待用莆田人成化戊戌進士授刑部主事厯員外下獄謫姚州判官復官南京刑部員外擢雲南按察副使進按察使調湖廣轉廣東右布政使以僉都御史巡撫江西改四川升右都御史工部尚書改刑部加太子太保諡貞肅有見素西征集楊應寧云見素詩宗子美晚乃出入黃山谷陳無巳間初視之若有隱澀語久而咀嚼悠然有餘味焉致王元美云林待用如太湖中頑石非不具微無乃癡重詩話中山狼小説乃東田馬中錫所作今載其集中世傳以訾獻吉者數其負德涵也考之康李未嘗隙未黃才伯有讀見素救空同奏疏詩云憐才不是雲莊老愁殺山中獵後狼然則當日所訾乃負見素耳門扇峽瀼西一舍近兩山勢回合巨石壯此門鐵衣護周匝楚蜀錯犬牙乾坤互開闔當關一夫守萬馬不敢踏雲龕嵌玲瓏元氣深吐納推篷見巫峰哀猿響相答别鄉人驛路迷燕浦官梅動越吟相看今日意同是故鄉心祖道寒沙上停橈緑栁陰滄洲有竒事未老忽抽簪送方上舍客路阻風沙離心逼嵗華潮平今夜月梅作去年花囊澀書還購天寒酒待賖席珍逢聖主未許卧煙霞有題山崦雲猶暮江天雨欲晴院深芳草合日落野舟橫古路稀人迹青林但鳥聲春風期載酒相對面柴荆陳章一首章字一夔松江華亭人成化戊戌進士除刑部主事厯郎中降瑞州府同知遷髙州知府移黃州有西潭稿詩話一夔自髙州移黃州吳匏菴哀詞云一朝下恩旨稍幸得量移齊安佳山水足以為詩資如何始聞命己與人世辭蓋未至齊安而沒也又云平生無所好所好止於詩積成西潭稿千首尚多遺今其集竟不可得即席贈趙栗夫菜市街西新卜居豆棚瓜蔓共蕭疏胸中冨有書千卷誰信家無儋石儲陳璚璚字玉汝長洲人成化戊戌進士改庶吉士授戶科給事中厯南京都察院左副都御史有成齋集詩話成齋出西涯之門當時雖不以詩名而恆與西涯方石匏菴諸公接席聫句知見賞於西涯者深矣曉經分水卧聞水禽聲推窗看分水低岸雜茭蒲吳淞宛相似波澄緑漪漪流急清駛駛荇舞翠帶長鷗翻白雪比垂楊遷嬌鶯柔莎露遊鯉分明一鏡開身在鏡光裏停梭緩緩行神爽情亦喜我苦思歸人鄉閭將近矣陳烓一首烓字文用閩縣人成化戊戌進士有留餘稿次毛參將秋日江居雲淨羣峰出江空一鳥遲雨前蘿補屋霜後菊編籬巢燕非新主沙鷗是故知考槃人自取天地豈吾私包鼎一首鼎字汝調嘉興人成化戊戌進士除兵部主事厯郎中出知池州府己丑下第南還孤舟千里賦南歸慚愧逢人問禮闈野浦關情芳草逺曲江回首杏花非半生事業雙蓬鬢十載風塵一敝衣臨水髙歌向何處夕陽煙樹共依微林榮一首榮字仲仁合浦人成化戊戌進士厯官雲南按察副使薊門聞笛冒寒重到薊門遊羌笛嗚嗚起戍樓應有開元遺譜在月中三㺯小梁州孫衍一首衍字世延松江華亭人成化戊戌進士除知沔陽州遷南京刑部員外郎出為延平知府有雪岑集寄沈宗逺挂席曽逢江上舟别來彈指又經秋間從何處爭棊局醉共誰人較入聲酒籌金鯽魚池芳草合女蘿花樹小庭幽客中無限相思意坐對寒燈獨自愁黃珣一首珣字廷璽餘姚人成化辛丑賜進士第二纍官南京吏部尚書贈太子少保諡文僖應制勸農四民皆天職嗟農獨苦辛所以古哲王巡省及兹辰簫鼓吹豳頌訓迪良諄諄東郊土脈動好鳥鳴芳春桑園拂其羽催耕一何頻乘時播嘉種原隰交畇畇念兹民所天珠玉安足珍一日茍不作飢寒將立臻勿恤霑體勞但憂年嵗屯霑體勞尚可嵗屯傷我民憶昔先皇時端居軫郊闉載歌憫農詠丕揚列祖仁禁苑藉千畝雨暘雩百神玉食豈不足貴令四海均九重尚結念况爾謀其身古人有良言嵗計在于寅豈伊公家賦父子亦以親春風正發育萬物皆鮮新勉矣東作力佇看西成禋趙寬一首寬字栗夫吳江人成化辛丑進士除刑部主事厯員外郎中出為浙江提學副使遷廣東按察使有半江集題畫細雨入林深孤雲映山薄何處是歸舟臨風倚江閣張吉二首吉字克修餘千人成化辛丑進士除工部主事坐上疏貶景東通判厯官貴州左布政使有古城集詩話古城窮理講學其詩罕傳觀其序晦菴感遇詩謂兼蘇李之體製陶孟之風調韋栁之音節非漢晉以下詞人所及生乎後者不根於此而有能詩聲我不敢知也其論詩亦非戶外語今録李忠烈祠送迎神曲李東陽記云成化五年春正月長沙府知府事臣錢澍言臣所守潭州當元兵至時宋知州李芾畫地而守士卒皆殊死戰城且陷芾召帳下沈忠遺之金曰吾力竭當死吾家人不可辱於俘汝盡殺之而後殺我忠辭不獲命乃醉其家人遍刃之芾亦引頸受刃忠焚芾居還自殺其妻子復至火所自殺是時先芾死者知衡州尹榖死於火參議楊震死於池後芾死者幕僚陳億孫顔應焱潭民多舉家自盡城無虛井縊於林者相望其事昭晰在史傳布揚在天下浹洽在郡人耳目而郡之祀事不立其為闕典不細臣己立祠於芾所居故地以尹榖等配著諸杞典儀物使有司永有所遵式事下禮部具春秋祭芾用豕一羊一粢盛備餘各羊一制可其本末頗詳附注以便觀者李忠烈公祠迎送神樂章紛犀甲兮翠幡亂湘流兮若雲春露兮秋霜無逺無近兮援枹執鼖折芳馨兮代舞旅牲醴兮芬熏公入廟兮有白其駒我維公駒兮在庭之隅公不醉飽兮我呻且吁修蛇兮蓁蓁猘犬兮唁唁臨衝兮茀茀彍騎兮詵詵兵血戰兮幾盡涕橫流兮霑巾彼蒼者天兮胡不仁死為趙氏鬼兮生為宋臣嗚呼我公兮人道之紀口不忍言兮心曷其己潔我肥羜兮稱我兕觥千秋萬嵗兮祀事孔明盧格一首格字正夫東陽人成化辛丑進士除貴溪知縣擢江西道御史有荷亭集詩話正夫難經伉伉雖朱子亦不心服其讀易詩云三聖若専尊卜筮宣尼何用絶韋編又云世儒問我五經原易道原居六畫先若説羲文專卜筮街頭盲瞽盡真傳又詠詩云夫子刪詩立義精國風雅頌各分明考亭半作淫奔什何用為邦放鄭聲所撰荷亭辨論八卷同郡章楓山不以為非蕺山劉念臺為作集序而曰後儒不及前人由其果於自信之意多而存疑者寡也幾於袒左矣遣興莫歎風塵行路難間過僧舍借花看數聲啼鳥不知處滿地緑陰清晝寒葉元玉元玉字廷璽清流人成化辛丑進士有古崖集次龍門衛作龍門關外龍門衛元是紛紛狡兔場今日草枯蕃馬瘦將軍穩卧緑沈槍王敞三首敞字漢英南京錦衣衛人成化辛丑進士厯官太子少保兵部尚書贈太子太保渡大同江和董內翰浿水元歸海山城半入江春潮翻石壁飛雨打船窗作賦才誰健凌雲氣未降濟川輸董相不日看經邦詩詁宫保與董文僖越同使朝鮮迭相唱和而諸詩蒼老頗勝董公登浮碧樓山閣凌空起孤雲挾雨飛好花臨驛路小艇占漁磯石磴斜通郭煙村半掩扉主人留客意薄暮肯言歸過箕子故城有感栁暗荒城水滿渠幾家門巷帶村墟井田己廢千年後故壘曽經百戰餘果下更無三尺馬盤中時有八梢魚遺封舊墓知何在試一停車問象胥方向一首向字與義桐城人成化辛丑進士授南京戶科給事中以言事謫多羅驛丞後官至瓊州知府有素亭集桃源道中桃源西望是辰州兩境中分五置郵征斾影隨紅樹沒斷橋水帶夕陽流關山迢遞孤臣路風物淒涼滿地秋半世飄零竟何事獨騎瘦馬重回頭侯直一首直字公繩松江華亭人成化辛丑進士厯官廣西參議夜集送楊君謙馬蹄日日走紅塵自怪微官繫此身滄海煙波無限好未歸真是不如人鄭瑗一首瑗字仲璧莆田人成化辛丑進士官郎中有省齋集獨不見東飛伯勞西飛燕我所思兮獨不見嵗云莫矣多霜霰日月推遷玄髮變煢煢處廓誰與鄰髙山無蹊河無津車粼粼馬侁侁車馬縱橫遍城闉獨不見意中人邵寶六首寶字國賢無錫人成化甲辰進士知許州入官戶部厯郎中出為副使以副都御史總漕江北再起巡撫貴州升戶部侍郎終南禮部尚書卒諡文莊有容春堂前後集泉齋勿藥集李賔之云國賢集該括情事摹寫景物極所欲言而無冗字長語王濟之云國賢古詩有魏晉之風師其意不師其辭興寄間逺體裁簡重和林待用云國賢根幹宋儒標致秦漢莊以潔以平紆徐容與辨博而不肆嚴浦文玉云先生詩謹重精純得諸宋雄渾森得諸唐爾雅深厚得諸漢鍾伯敬云空同出天下無真詩真詩惟邵二泉耳詩話二泉詩如平原彌望雖盡剪其荆蓁惜少芳華可采三一亭詩為俞吏科作暇望西岡亭我懷欒共子有言感豫衷千載猶仰止生三事之一誰能不由此出為升堂由入為趨庭鯉廊廟復江湖蒼生共憂喜俯仰天地間念念何時己所不盡吾心有如此溪水水北山莊圖歌近來善學孟端畫眼中吾許張臨湘臨湘病後作此幅樹色慘淡山蒼蒼水北山人好事者要我題詩惠泉下秋林逝矣不可招臨湘臨湘亦其亞菊有黃華夜榻深長吟偶坐吾玉林樽前擊節興未巳誰能和以無絃琴聽松菴裏廬山壁少日相看眼雙碧酒酣且作山人歌莫向山僧問疇昔夜坐有懷浦文玉哭子身仍病懷君我亦傷江湖秋欲老風雨夜初長鶴夢蕪汀逺蛩聲草砌涼蒹葭空獨賦愁絶不成章雞鳴山鍾山西引一峰髙雲磴盤紆步不勞畫裏樓臺自鐘鼓望中城市有林皋江流入海初奔放世路懷人更鬱陶却倚崔嵬發長嘯松風何處起秋濤盂城即事盂城驛前吟夕陽髙郵湖上好秋光紅分菡萏初經雨緑滿蒹葭未受霜逺浦有波長浴鷺近隄無路尚垂楊南來時見吳江棹却倚船窗問故鄉乞終養未許乞歸未許奈親何帝里風光夢裏過三月春寒青草短五湖天逺白雲多客囊衣在縫猶密驛騎書來字欲磨聖主恩深臣分淺百年心事兩蹉跎喬宇六首宇字希大山西樂平人成化甲辰進士授禮部主事轉吏部厯貟外郎中遷太常少卿光祿卿升戶部右侍郎遷左侍郎出為南京禮部尚書改兵部尋拜吏部尚書加少保兼太子太保卒諡莊簡有克蒙稿王元美云喬希大如漢官出臨逺郊亦自粗其威儀詩話莊簡詩有雄槩當時與邊李實為唱和交顧華玉敘其紀行之作謂正者凖雅則奇者抉幽險是不特功存社稷亦風雅之領袖也送甕山偶遇潘南屛朝日散林薄鐘聲出翠微青山面湖立白鳥背人飛勝地不常有幽期能久違會逢髙士話相對欲忘歸秋風亭下泛舟荒亭寥落野雲空漢武雄才想像中簫鼓橫流一作應聲開畫鷁帆檣飛影動晴虹山分秦晉羣峰斷水入河汾兩派通少壯幾時還老大不堪一作須回首歎秋風登大同城樓東南山勢繞皇都西北樓髙眺望孤荒磧平沙連塞逺片雲寒雁入空無長城萬里卑秦築文德千年仰舜敷今日北門誰鎖鑰受降城外盡輿圖幕府山説著看山興欲飛湖西雙徑踏霏微寧辭九日登髙會况是諸軍奏凱歸林外鐘聲開宿靄江頭帆影送斜暉亦知歡會何終極霜露休教上客衣懷張南園六詔山川萬里餘秋來長恨賦離居雁歸不過衡陽去何處逢人好寄書寄劉南坦司空江上青山多白雲秋來離思日紛紛别來擬鼓中流棹采得芙蓉一贈君蔡清一首清字介夫晉江人成化甲辰進士厯官南京國子監祭酒卒贈禮部侍郎萬厯中詔特祀于鄉追諡文莊有虛齋文集林見素云介夫詩文別出體格掖人心而繫名教卒澤於仁義道德粹如也别鄒汝愚謫雷州吏目識君未三月別君遽萬里吾豈小丈夫淚落不能止范遵甫云言簡意長王雲鳯三首雲鳯字應韶遼州和順人成化甲辰進士除禮部主事劾太監李廣下獄降知州升陜西提學僉事厯副使按察使召為國子祭酒以右僉都御史巡撫宣府有博趣齋稿詩詁虎谷與王恭襄喬莊簡齊名號河東三鳯頗留意吟詠古意中夜有所思所思君不知春風吹露草秋風吹霜枝所以别離人悠悠負心期別離非所惜年華難再得只恐君來時妾巳無顔色顔色既己非君寧無歎息送孟仲平陜西屯田僉事璽書初下建章宫諸將邊隅己望風秦甲連營金窟北漢屯分畝玉關東山薶凍雪侵雲白水落寒巖繞澗紅聞道西羌今欵塞莫留魏尚久雲中送客春濕蒸雲雨散絲飄飄遊子别離時愁看陌上青青草送盡行人總不知儲巏七首巏字靜夫泰州人成化甲辰進士授南京吏部主事厯郎中改北司考功升大僕寺少卿進本寺卿轉都察院右僉都御史厯戶部左右侍郎改吏部卒諡文懿有駉野柴墟二集顧華玉云公言沖淡沈鬱兼晉唐之風詩詁文懿掉鞅詞場與楊君謙徐子仁杜柳居襟契君謙嘗題扇寄之文懿愛惜緘題字未開視也一日子仁柳居過出扇作畫文懿因題詩寄君謙云為惜緘題入手遲清風千里故人思畫成一事知還欠封寄江南乞寫詩亦藝林韻事也李獻吉敘倡和詩云豫承乏郎署所與倡和則揚州儲靜夫趙叔鳴無錫錢世恩陳嘉定秦國聲太原喬希大宜興杭氏兄弟彬州李貽教何子元慈溪楊名父餘姚王伯安濟南邊庭實其後又有丹陽殷文濟蘇州都元敬徐昌榖信陽何仲默其在南都則顧華玉朱升之其尤也當日倡和文懿實居其首及李何教行執政欲加擯斥文懿以文章復古為國家元氣極其扶植得不傾陷風雅蔚興斯人攸賴今之論詩者鮮及之論世者所當表微也文懿卒於南都在正德癸酉後三年歸柩海陵攢於墓舍丁丑將葬啓視棺上生黝墨成繪畫文具畫家皴染之法前則奇石枯松旁出二篠莖葉咸備左則梅株夭嬌梢著數花右如左而樹枝差短其文深入木理四方來觀詫為神異華玉為作靈徵記此事甚怪近靈夀傳去異撰有明異叢寶應劉禹峰撰史外叢談探幽索隱獨此未載故附識之席上賦史巽仲歸雲洞悠揚滿洞中歸來不知處曉起語農人春田夜多雨却問洞中雲何時下山去有懷獨坐誰為伴清謡夜不眠懷人千里共看月幾回圎秦塞連雲戍荆門下峽船歸程那可料依舊析津年春晦贈别殘春餘幾日欲去且相留脈脈難為别匆匆不自由天涯芳草路花外夕陽樓誰道文園客新來賦倦遊病較芳時晚春含晦日陰曉鐘人不寐舊雨客難尋院濕蛛絲重庭虛鳥迹深平明有幽事移竹滿西林大房金源諸陵奉先西下亂山侵澗道回旋入暮林羊虎半存行殿迹莓苔盡蝕古碑陰秋山春水風流逺大定明昌德澤深却是宣和解亡國穹廬黃屋豈初心望岐溝野水荒煙沒斷橋欲尋遺老問前朝不因書記班師奏未必岐溝定屬遼老米店有感層氷一夕塞河船記得攜家己十年鮭菜燈前誰共飯月明行店一悽然楊循吉一首循吉字君謙吳縣人成化甲辰進士除禮部主事以病乞歸有松籌堂集詩話君謙官儀曹人目為顛主事每稱病不出長官厭之人或勸之歸賦詩云鄙人自從三月來腹心久已病癡瘕晨興至午尚不食夜枕呻吟睡尤寡有人謂我病如此何不抽身向林野一聞此言即再拜誰有愛人如此者久知山水淡有味漸覺功名輕可舍乘今秋事天漸涼定買扁舟向南下遂疏請致仕沈啓南聞其歸賦詩云都門祖帳百花飛多見龍鍾賦式微較取栁條千萬折不曽送一少年歸是時君謙年僅三十有一也其後康陵南巡為伶人臧賢所薦冠武人冠見帝應制賦打虎曲稱旨恆在御前填詞與俳優雜處乃謀於賢請急放歸其論詩曰詩不當以格律體裁為論惟求直吐胸懷實敘景象婦人小子皆曉所謂然後定為好詩其他餖飣攢蔟拘拘拾古人涕唾者亦木偶之假線索以舉動者吾無取焉故其詩多俚近然如陽山大石一篇賦情傲兀用韻妥帖非讀破萬卷書不能作也君謙好蓄異書孜孜不及題書厨詩云吾家本市人南濠居百年自我始為士家無一簡編辛勤一十載購求心頗專小者雖未備大者亦略全經史及子集一一義貫穿當怒讀則喜當疾讀則痊恃此用為命縱橫堆滿前當時作書者非聖必大賢豈待開卷看撫弄亦欣然奈何家人愚心惟財貨先墜地不肯拾斷爛無與憐朋友有讀者悉當相奉捐勝付不肖子持去將鬻錢又鈔書詩云沈疾巳在躬嗜書猶不廢每聞有竒籍多方必羅致手録兼貿人恆輟衣食費往來繞案行點畫勞指視成編亦艱難把玩自珍貴家人怪我癖既宦安用是自知身有病不作長久計偏好固莫捐聊爾從吾意是時吳中藏書家多以袐册相尚若朱性甫吳原博閻秀卿都元敬輩皆手自抄録今尚有流傳者實君謙倡之也詠陽山雲泉菴大石奉和諸公同遊聮句之作偉哉此陽山有石俟歌誦形將氷塊截勢與蓮花共仰觀一何髙登陟不可鞚鳥飛必徊翔雲出自騰滃孤員外成嶠空朗中含洞瘦如辟榖良清若食李仲深思殆天設乍至令人恐濃蘿作垂陰寒泉滴為凍戴菴亦顚危攜觴更交綜耳脅或駢㩌勤拳時獨送巍巍上少並森森下多從荒崖始誰開倒樹諒非種在兹三吳間當以九鼎重崇巖借冠冕卑巒聽提控勞呼猿固匿被壓松堪訟曲躬始得門側身還入弄拂苔劣容眠收乳兼資用志猶記秦餘材曷遺禹貢立久氣濕袍嘯髙聲答甕論年越殷周言時晦唐宋一為佛者居永作遊人奉病宜謐著史寐稱摶養汞四方傳不誣諸公評切中臨谷足還酸乘巔目偏縱支頤詎厭看極口難竭諷鬼鑿手須胼鯨負背應痛東岱徒小魯西華繆推雍懸磬風發鳴香爐煙結供曝沙伏靈黿食岡停逺鳯是知隆拔羣所貴秀合衆偷餘殿容榱就隙亭閣棟枯藤蔓穿竅長蛇舌撩縫輕盈受指彈玲瓏脫泥壅芾拜本無忝羽撼爭得動栽培稀尺間構架靡寸空炎伏涼自生清秋月堪㺯林深必賴燭嵐酷能作􅙄星光猶立芒龍吟殊叶䃔嶺獅馴巳賔阜虎寧敢閧久嗟隔勝賞頻勞落清夢即欲營終棲其奈懷微俸鮑楠一首楠字良用歙縣人成化甲辰進士官南京戶部員外郎有龍山集舟中野渡溶溶春水夕陽點點寒鴉欸乃數聲何處行人一棹天涯祝萃一首萃字維貞海寧人成化甲辰進士厯官陜西提學副使有虛齋遺集紀行訪舊指檇李棹出武原溪亭午厯璵城燠焉如春熙舟人共裸裼愛此南風吹老夫厄篷櫳默坐心獨疑雲雨易翻覆變態不可知戒言避中流沿涯泝清漪屏翳忽四合飛亷驟如馳艗首屢低昻怒波揚其威所幸誕登岸危致檣楫摧顧彼鄰舟人哀哉沈鴟夷古云行路難此語良不非相望不百里尚爾逢顚危而况千里程能保無嶮巇裁詩紀所遭進退宜知幾費宏宏字子充鉛山人成化丁未賜進士第一纍官少師兼太子太師吏部尚書華蓋殿大學士贈太保諡文憲有鵝湖摘稿有感次韻妖孽才消一戰收猶煩禁旅扈宸遊皇人縱有瑶池樂野老翻深杞國憂極北五雲瞻帝座淮南千里候龍舟秋風忽漫悲搖落鴻雁嗸嗸在荻洲詩話文憲在康陵時以守正拒寧庶人此詩因南昌巳平而康陵猶南征而作也石珤八首珤字邦彥藳城人成化丁未進士改庶吉士授簡討厯修撰侍讀學士遷國子祭酒升南京吏部侍郎改禮部尋掌翰林院升禮部尚書轉吏部入直文淵閣進武英殿大學士加少保兼太子太保卒贈太保諡文隱更諡文介有恆陽集李賔之云邦彥詩詞皆中矩度而七言古詩尤超脫凡近衆所不及王元美云石少保如披沙㨂金時時見寶詩詁少保爰立在永陵初年是時諸臣以議禮忤旨帝初欲援以自助而鯁直自守至三封內批帝心弗善也故雖位列中台其詩多蹇産而不釋如云黽勉二十年十事九失意又云人生值命薄所遇多不平又云雖云日偃仰亦復成局促又云趾發物己忤意行悔相連又云軒冕豈不華一喜生衆惕又云幡幡行春鳥解使朝變昏又云古來忠與邪往往激褊淺又云茍移造化柄蕢土亦易崇乂云寧為白璧碎不作脂與韋寧為鈍劒折不作鈎與錐又云事去朝露空安辨窮與達又云箋誥日紛綸君臣互相諛但聞都俞聲無復咈與吁又云終然千古下忽有知己歎蓋當日綸扉之間未盡和衷之雅一傅衆咻誰與為善乃知人生不得行胸懷雖作相與不遇等也近見東南文士有推少保詩為北方之冠者又或謂得長沙之指授俱未盡然然其詩頗類明初西江一派送邵國賢分韻君帆已南下僕念日旋軫豈謂萍水分如失繩與準平生東朝歡肝膽屢得盡曠然趨大塗一笑破畦畛器巨用不微多士宜汲引誰撞待問鐘虛往歸必稇吾聞凌霜幹乃自階下筍願培正直姿出身濟時閔雜詩皎月邈中天清光照無極秋毫森可數萬里經一拭寧知黑水潭其下深莫測龍蛇方蚴蟉行者為惻惻春日雜言長空多浮雲微雨霑四郊美人隔蘭渚雜佩不可要去年梁間燕今嵗將尋巢時物各芬芳吾興亦飄颻秋蓮曲西塘菡蓞初破紅小舟蕩漾東南風羅裙曵水蘸輕碧驚起沙頭雙落鴻昨日采蓮蓮尚好今朝采蓮蓮巳老緑房結子空垂垂翠黛朱顔可長保江頭日暮生嫩寒鴛鴦雙飛不過灘回頭女伴各無語淚灑銅仙承露盤芟田行芟田復芟田短刀長柄颼颼然開鎌先芟三百束村後村前轟陸續南風吹場場土乾烏犍載車角觳觫去年種麥麥不成今年麥熟家無贏為語農夫合勤儉汲水聊舂麥仁飯春渡滹沱世路無間日風波嵗嵗新東風沙上鴈落日岸頭人去國曽千里還家又一春林花應笑客夏病往來頻六言密雲欲雨不雨繁杏將開未開日暮小樓凝望江南燕子歸來會昌宫詞羽節貂裘謁內庭太和公主髮初星御前細説和畨事六院都來墮淚聽蔣冕一首冕字敬之全州人成化丁未進士纍官少傅兼太子太傅戶部尚書謹身殿大學士贈少師諡文定有湘皋集湘山寺孤塔湧山腰鐘聲隔煙樹朝暮見雲飛不見雲歸處毛紀一首紀字維之掖縣人成化丁未進士選庶吉士授檢討厯修撰侍讀左諭德升學士遷戶部侍郎拜禮部尚書入直內閣進少保兼太子太保吏部尚書謹身殿大學士卒贈太保諡文簡有鼇頭類稿武宗皇帝挽歌玉輦今何處宸遊事己空淚多湘水竹悲切鼎湖弓汗簡千年後鈞天一夢中空餘舊戎帳金甲凜霜風陸完一首完字全卿長洲人成化丁未進士纍官太子太保吏部尚書坐納宸濠賄論死議平劉六等功戍泉州籍其家有水村集題夏禹玉長江萬里圖雲山蒼蒼江漠漠紹興年間夏圭作珍重須知應制難卷尾書臣字端恪却憶當時和議成偏安即視如升平惟開緝熙較畫史兩河淪棄無人爭斯圖似寫南朝土還有樓臺在煙雨釣叟棊翁不可呼漁舟野店誰能數但覺層層境不同林泉到處生清風意逺筆精工莫比只許馬逺齊稱雄中原殷冨百不寫良工豈是無心者恐將長物觸君懷恰宜剩水殘山也畫終思效一得愚更把飛鴻添在圗願君且向飛鴻問五國城頭信有無王鴻儒二首鴻儒字懋學南陽人成化丁未進士由戶部主事厯官吏部侍郎南京戶部尚書卒諡文莊擬楊鐵崖小遊仙詞二首方壺員嶠月初生海色如銀萬頃明一片彩雲當面墮東華童子召飛瓊一別良常嵗月賖茅君相念寄瑶華五雲閣吏無人換猶是當年蔡少霞楊廉六首亷字方震豐城人成化丁未進士纍官南京禮部尚書贈太子少保諡文恪有月湖集詩話月湖詩派本白沙定山其言曰近代之詩大扺只守唐人矩矱不敢違越一步惟陳公甫莊孔暘獨出新格豫好公甫詩既選注之好孔暘詩又選注之其論絶句云於宋得濂洛關閩之作於元得劉靜修於國朝得陳公甫莊孔暘因類成一帙名曰風雅源流其師心若是然其七言長篇頗具排奡之力五言亦以朴勝不盡類陳莊二公過閘簡莫水部疏閘密閘連一帶南船北船此關隘往年水小謹啓閉十日五日閘邊待今年濟水偶然溢雪浪崩騰復砰湃下如落井上登天三老無功神是賴誰移兩山作一門管束千流與萬派當初本為畜水設豈知水大亦為閡世間未有無弊法十利未免兼一害人言月河且緩築不然水勢無由殺征夫自是懷往塗見月望弦今巳再履霜又恐阻氷凍帝鄉尚在紅雲外噫嘻水大莫怨遲還勝從前水小時往年得常山徐生惠硯甚佳丁未會試為監場軍士持去自後所得硯皆不及之偶然追憶成古風一篇常山硯多青紫色不徒發墨仍潤澤憶嘗過市親閲來惡者堆廛美藏匿再三苦索始出之坐賈乃邀三倍息徐生簡選持贈豫獲之如獲琮與璧硯兮亦視為我用口不能言似對臆南宫携去戰文場蟻垤蜂房專一席風簷交卷出門去竟為守舍軍士得脣焦口燥呼不還亟欲往追天巳黑歸來旅邸不成眠反覆思維良可惜當時妄意復得之焚香叩易揲蓍䇿得夬之革觀繇辭莫夜之戎即斯賊欲將此事白有司姓名無處稽尺籍三衢舊穴尚可尋巧匠斫山盈左側猶傳上品多更多紫袍玉帶殊輝赫雖然此特一物耳吾輩何為置欣戚但恨珍奇失所遇此意英雄或能識折桂寺境豈浮屠勝東南秀此峰澗流千丈瀑崖長萬年松少室留蒼鹿番君見小龍布鞋從此製雲嶠寄遐蹤哭鄒汝愚海舶傳消息傷心遂不還死同鄒別駕窮過蔡西山絶識何由得英風竟莫攀惟餘前日疏傳寫遍人間直科口占南科自分一枝安北轉惟添待漏寒吏事兩京終是少諌官直恐是間官題曹憲副采蓴卷三泖秋霖浸四圍水邊未覺露葵稀金盤玉箸長安客幾箇西風為汝歸吳儼一首儼字克溫宜興人成化丁未進士改庶吉士除編修厯官侍講學士終南京禮部尚書諡文肅有集齒落我年六十一己落第三齒若更活數年所存知有幾譬若建重門一扉常自啓外侮窺其間孰禦而能止又若築長堰隙穴不容蟻今己決尋丈不竭安肯巳或言死與生其機不在此此雖釋吾憂終焉非至理憶我初落時掩口含羞恥只今落己慣與不落相似作詩紀嵗月亦漫戲云爾羅玘一首玘字景鳴南城人成化丁未進士改庶吉士除編修厯南太常少卿吏部右侍郎贈禮部尚書諡文肅有圭峰集寓言送李希賢山僧下山時僧送不出山但問下山僧此去何時還乳水間一孔白雲留半間祗恐僧還少僧還誰閉關李堂一首堂字時升鄞縣人成化丁未進士纍官工部右侍郎總理河道有堇山集堇山莊雜詠紅葉亂紛紛秋光到小村莫憐蒲栁脆幸與菊松存猿狖貪山果牛羊戀蓽門石床涼不寐流水激籬根夏一首字德樹天台人成化丁未進士官南京大理寺評事有赤城集廣陵九曲池亭龍氣消誰家水調共蘭橈眼前亡國無多恨江水東邊是六朝蘇葵一首葵字伯誠廣州順德人成化丁未進士改庶吉士授編修出為江西提學僉事改四川終福建右布政使有吹劒集金陵寄故園諸子霜冷天空一鴈飛鳯皇臺上幾霑衣一燈夜雨人無恙萬里秋江夢獨歸醉客酒壚隨處好驚心人事異鄉非明朝又發金陵道搔首長吟對落暉周旋一首旋字克敬慈溪人成化丁未進士以兵科給事中出參廣藩有西溪小稿暮景斜陽含霽景江上去人稀垂老猶為客經冬未授衣僧鐘和月起漁火隔煙微故國雲霄外多從夢裏歸楊子器五首子器字名父慈溪人成化丁未進士知崑江髙平嘗熟三縣擢吏部考功主事進驗封郎中出為湖廣參議厯河南左布政使有栁塘先生遺稿詩話名父早朝詩多至三百首其終篇云除却早朝無一事更從何處效驅馳可想見承平景象矣排節宫詞若落盡燈花風定後移來樹影月明初巳判聖恩非我分不傳私語到人間詩可以怨不其然乎至於春花將及九分九天氣又新三月三則尋常百姓家皆可道之不類深宫中女也早朝五首東方曙色未分明玉陛千官接武行華蓋殿開鑾駕出部頭天樂一齊鳴九重天上六龍飛御氣氤氲拂太微鳯閣西頭明月在清光還照侍臣衣風定天街玉佩和露華滿地濕緋羅更畨奏對銀臺罷聽得西班喚六科仙漏迢遙隔絳霄兩行銀燭照趨朝鼓聲才歇鐘聲動不放朝官過御橋曉風吹動角端旗仗外祥光繞赤墀忽聽殿頭宣內閣獨承密旨退朝遲文森一首森字宗嚴長洲人成化丁未進士除知慶雲縣擢浙江道御史建言廷杖回籍起南宫太僕寺少卿終巡撫江西右僉都御史九日三載重陽菊開時不在家何期今日酒忽對故園花野曠雲連樹天寒鴈聚沙登臨無限意何處望京華沈山子云語不在深自然藴藉鄒智一首智字汝愚合州人成化丁未進士改庶吉士坐誣下獄免死謫廣東石城所吏目居四年得疾暴卒有立齋遺集詩話立齋以吉士建言請黜萬安劉吉尹直三小人而進用王恕王竑彭韶三君子泰陵初政不報既而萬尹被彈事去劉獨銜憾刺骨嗾其黨攻吉中書人湯御史鼐辭連立齋及劉夀州概李主事文祥董沔陽傑謂數人以詩酒相結納互相標榜詆毁朝政槩貽鼐書云夜夢一人騎牛將墜鼐手挽之不仆又見鼐執五色石引牛就正道人騎牛者朱也以為鼐將有扶持社稷之力法司周內坐以妖言惑衆律罪當死賴王端毅何文肅徐文靖諸公力持之得生而立齋逺謫化州千戶所吏目既踰嶺從陳文恭講學未幾夭折惜夫其獄中詩云人到白頭終是盡事垂青史定誰真夢中不識身猶繫又逐東風入紫宸誦者傷之至亂朝詩云望見衣裳只此時放臣逐客讀之尤為悽斷辭朝雲韶聲靜拜彤墀轉覺心驚不自持罪大故應誅兩觀網疏猶得竄三危盡披肝膽知何日望見衣裳只此時但願太平無一事孤臣萬死更何悲傅圭一首圭字邦瑞清苑人成化丁未進士纍官禮部尚書兼翰林院學士贈太子太保諡文毅有北潭集大寧僧舍村外重關護原頭怪石蹲水聲來樹杪花影上山根寺古殘碑蝕僧貧破衲存俗塵銷不得何用訪柴門周詔一首詔字希正長洲人成化庚子舉人由嘉祥儒學教諭遷興府伴讀升紀善食長史俸肅皇帝繼大統從入擢太常寺卿兼翰林院侍讀卒賜祭葬贈禮部右侍郎有歸吳和陶達意等集詩話太常從龍舊學特拜清卿王耕原詩云漢丈濳邸會風雲今日誰收第一勳夜半忽傳天上詔虎符新拜宋將軍殆為公而發也或云指陸武惠亦近是石文介作傳稱公因事納忠言多剴切使更延其年不知大禮之議作何折衷或未必為張桂等力持以致興獻立廟稱宗未可定爾飲酒和陶得時言或違人皆以為是失時言合道求全反致毁毁譽何足憑窮達亦偶一作不徒爾前程殊渺茫且來醉羅綺明詩綜卷二十九
