body:
  text: 明詩綜卷八十六翰林院檢討朱彞尊編靜志居詩話明制設內書堂以教小內侍用史官四員主之從學者約四十人其後撥入讀書者多至三百人所以教之者有方矣而三百年來此輩善詩文者蓋寡豫為搜訪僅得六人焉此外若楊友吕憲戴義李學輩雖間有詩句流傳多不成章雖欲廣之而未得也龔輦二首輦字中道南昌人𢎞治中為內官監左丞有沖虛集俞汝成云左丞雅事文墨兼尚理學沖虛一集所謂空谷之音贈顧潘與君少小定交遊今日相逢兩鬢秋天上風雲真似夢人間嵗月竟如流可憐王粲依劉表不遇常何薦馬周安得忘機共漁父白蘋洲上數沙鷗見狻猊偶作聖德彰戎服狻猊逺貢將雖然為異物費我大官羊陸咸一云辭旨溫厚張瑄一首瑄𢎞治中內官監太監鎮守廣西平南烏江道中山束平川小路斜不成村落兩三家分明橫幅桃源景只欠溪流泛落花傅倫一首倫正德中都知監太監鎮守桂林題望江亭山色拂雲青溪光照空碧靜觀元化初超然意自適王翶一首翶字鵬起順天通州人嘉靖中選入司禮監讀書歷御馬監右監丞有禁砌蛩吟詩話監丞集內鄉李蔭于美序之秋夜有懷西風吹雨夜蕭蕭客思逢秋倍寂寥十載已虛明主詔半生徒插侍中貂誰憐季子黃金盡無奈馮唐白髮饒何日一帆江左去獨尋山水混漁樵張維二首維字四維霸州人隆慶初選入伴讀東宫歷乾清宫管事御馬監太監提督內忠勇營有蒼雪齋稿詩話張監丞以善詩稱定陵呼為秀才命掌兵伏局駕幸局觀所造兵器手玩弄之奏曰兵凶器非至尊所宜操帝笑而止嘗於禁中退食地植竹數竿定陵題之曰蒼雪因以名其集瑶臺霽望天都五月雨一夜洗層臺日上芙蓉吐鐘鳴樓殿開石根雲卷盡松頂鶴飛來看盡南巖景筠籃詎忍回老姥詞使節從天下﨑嶇不計程野花微辨色山鳥未知名仙姥針猶在真人誥已成倚蘭探舊迹何處步虛聲孫隆一首隆字東瀛三河人萬厯中以太監督織造駐杭州題慧因寺笙歌日日娛西子為愛幽間到玉岑舊有髙人井西宅沿流且向寺門尋詩話寺在西湖南五代天成二年吳越武肅王建面玉岑背兔嶺有箕泉流繞寺門元黃子久曽築室於是明詩綜卷八十六
