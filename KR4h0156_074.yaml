body:
  text: 明詩綜卷七十四翰林院檢討朱彞尊編王留一首留字亦房吳人稚登子淮北道中沙灘高下浴鳬鷖新出菰蒲緑未齊移橘過淮應化枳種楊當路半生稊船頭鼓角頻逄驛河上金錢浪築隄醉後無端千里夢直隨明月到深閨茅維一首維字孝若歸安人有菰園集屠緯真云孝若天才絶高於體靡所不合季陳仲醇云孝若詩韶秀清華絶無纍句梅豹云孝若陶鑄古人篇琢句磨情旨諧暢早秋寄允兆秋風難作客匹馬欲南歸隴塞黃雲合江淮紅葉稀干戈愁獨卧鄉國夢全非已卜刀鐶約滄洲可拂衣盧原一首原字原甫南海人有五湖遊草甘露寺望金焦北固山頭寺崔嵬瞰大江縱無甘露下應有毒龍降陳迹羊為石新雛燕入窗望來浮玉近遙對碧峰雙卜舜年四首舜年字孟碩吳江人嘉興縣學生有緑曉齋集郊社迎神曲旦旭兮曈曚神鴉起兮雲中沐豫髮於蘭湯兮振豫衣於蕙風潔齋俟兮土公土公不來兮憂心忡忡黃浦晚渡殘照收黃浦孤舟何處依沙昏秋雁落潮滿夜漁歸薄海山川曠前塗廬舍稀帆輕天路近直與鶴俱飛冬夜垂虹橋卸馬垂虹畔深宵感慨增橋明霜正下江逺月初升吏醉城無柝僧歸塔有燈王風京路阻欲詠愧無能湖上送别西風奮枯林潮沸盛湖晚淚眼對殘陽看君行漸逺姚士粦士粦字叔祥海鹽人國子監生有蒙吉堂詩集薛潤娘七夕生日生逄烏鵲渡河秋乞巧今畨免上樓莫訝眼邊多俗物天孫亦祗嫁牽牛張屈二首屈字醒公長沙人處士鄉里私諡貞節先生有醒公詩集邢孟貞云醒公詩高寒類孟東野幽渺過之讀之使人不懼金孝章云醒公汲幽梯峻返之沖淡希夷不可方物山居懷金文裕江光映林際纎月微微落𡨕𡨕靜夜鐘沈沈響深閣言念君子交於道信不薄空谷常感懷終不我離索弔古弔古不疾哭欲哭聲已吞嘗瞻吾自苦對世不敢言中夜望星斗失序何足論至人竭精力能使移昆崙夏月落天霜方報君子恩邵升逺一首升逺字子近松江華亭人田家樂為陳孟言賦香稻收花穗已齊幽棲渾似瀼東西萬竿修竹千叢菊十角黃牛五母雞婦起炊糜朝出饁客來留榻夜分題橙黃蟹紫新醅熟日日何妨醉似泥沈𢎞之一首𢎞之字茂之蘇州嘉定人有清溪草堂詩稿李本寧云茂之近體含蓄不露得唐人之遺風濟寧舟中望月憶家野曠天連水登艫四望寬家逾千里隔月訝兩回看客裏光相對閨中影自寒郵籖計程速定已夢長安施武十三首武字魯孫别字百靈長洲人崇禎間遊于滇有楚遊草西覽篇詩話魯孫孝子佯狂玩世善草書鄭孝亷士敬謂曰君書直逼二王不雜唐宋以下筆法魯孫大喜於同人廣坐中遍題箋扇呼士敬曰君頗知書吾書究誰似士敬謬曰今日書不見佳魯孫瞪目左右視擲筆而去嘗語人曰吾於詩極力摹擬古人僅可雜之王仲初集中耳今吳人罕有知之者處士金侃亦陶藏其稿經候官曹能始墨筆點定豫亟録十三首滇黔風景可得其大概焉烏雅關朝上烏雅關暮下烏雅關老烏啼啞啞行人還未還關索嶺髙嶺呼將軍將軍祀其上行人仰望時白雲隔千丈相見坡上坡面在山下坡山在面相見令人愁不如不相見鳯羽詞鳯羽山名鳯羽低連鄧睒川山頭流水屋邊田額尖新樣姑姑帽五月羊皮帶汗穿鄧睒詔名姑姑帽滇人皆以羊皮繫額寒暑皆披街子詞滇中以作市曰街子逄辰亥戌未日為期豬街才罷又龍街蠻女牽羊入市來背上擔兒嘗慣負胭脂落盡小桃開土官出山詞土官唯參謁官長始冠帶居常但用皂綾青布裹頭嗚嗚牛角滿山陂腰下橫刀弩箭隨雜部椎頭皆束帛皂綾纒額長官司煮鹽詞滇中鹽井四唯黑白二井課稅甚多餘不及焉使君不及鬱林亷舊例逡巡新例添白井爭如黑井好一斤水煮半斤鹽出獵詞秋髙出獵草根枯漫縱韓盧不用呼新襲土官誇武健側身馬上獲雙狐歸化詞滇中山茶天下第一唯歸化寺者其本合抱花大如盂國初已前物也往來宦遊羇客留别交好至此莫不墮淚鴛鴦夢斷綵樓空馬首蕭蕭故向東歸化寺前多少淚年年三月蜀茶紅麗江詞麗江府即古笮國地也地寒五榖稀少惟産良金毛布之類方伯用貢金必索其直從來直指公皆不按其地聽之而已人皆耳上貫環好衣紅與西域相類麗江水繞雪山寒郡縣羈縻異國看千里羅些地名無貢賦黃金有價不輸官永昌詞永昌古哀牢國也國初流配獨多吳人故語言風俗宛似南都為滇之首郡漢武窮邊開永昌哀牢部落散丁當流人不學花蠻語城郭風煙半建康寶井詞寶井在姚關萬里外非容易至販寶者止于緬中交易緬中多瘴癘除三冬與初春通夷者不敢出緬中花落滿蠻山千兩鴉青馬上還寒食雨飛防瘴癘漢人不敢出姚關鴉靑寶名時適有是寶重一兩三錢價三十貫賣雪詞大理蒼山雪六月不化市上女郎賣之猶吳下之賣氷也雙龍關裏百花香銀海逶迤抱點蒼六月街頭教賣雪行人錯認是瓊漿鄒潾二首潾字中朗秀水人縣學生江行望廬山作亦知山有寺咫尺見雲封瀑布千尋水香爐何處峰向晴微見樹卓午詎聞鐘來往驅塵事深悲負短笻武陵仙源應不記年華洞口今開幾樹花若使重來津可問扁舟我亦願移家卓人月二首人月字珂月仁和人貢生有蕊園集詩話珂月才情橫溢所撰續千文穩帖而竒肆詩亦不為格律所拘泊烏鎮不寐作逆風逼歸期今夕寄淺港月出人不知閉户若螺蚌逺寺燈微明未罷老僧講良久喔喔聲荒雞引其項贈女鬟紅衣石家醋醋喜穿緋裹手擎觴率意飛坐上恨無薑石帚長歌一曲惜紅衣華淑三首淑字聞修無錫人雜詩斫木為車其半為輪車自招搖輪何苦辛洞庭西山圓湖比滿月青山猶挂影晴隂網輕瀾深翠積遙嶺瀠洄柔櫓前如魚狎藻荇戀彼楓柚香丹黃點妍靚終期宅此居一樓一舴艋舴艋石公遙樓當銷夏冷竹木待襟裾煙霞開簿領消夏灣平湖添一曲風色遂全幽晴泛亦疑雨山居猶在舟橘橙垂户户菱芡聚洲洲不信偏宜夏暄涼儘可遊林雲鳯三首雲鳯字若撫長洲人詩話若撫當鍾談焰張之日守正不回詩篇極其繁富惜知者寥寥困厄終老相如遺草已不可問矣行路難上客且莫餐聽歌行路難茹荼知味苦食梅知味酸蜜中亦有螫棘中亦有蘭人情反覆君自看泣者未必戚笑者未必歡曲如羊腸鬱以盤令我喟然摧肺肝韓淮隂廟韓侯遺廟在過客不勝悲未請真王印先收大將旗功忘百戰後恩報一餐時何似清淮上終身把釣絲憂邊絲綸閣下議東征為遣元戎出大明邊月曉懸弓劍影朔風秋散鼓鼙聲滄溟萬里波臣國紫塞三千浪子兵奏凱未聞糧援絶不知平壤幾時平項真一首真字不損秀水儒學生貢入國子監有西湖草詩話不損以門才自豪兼綜今古文深為李長蘅聞子將所賞有御史巡按至浙試士子文經書發題外俾作一詩題是賦得多雨紅榴折不損書法絶倫以行草縱筆寫之同學慮御史必怒咸為不損危而御史竟拔置第一益自負儻􅛅不羈入修門坐事瘐死于獄豫嘗見其為閨人銘梳奩曰人之有髮旦旦思理有身有心奚不如是筆法極其飛舞繹其語殆亦非真狂生也社集分賦得竹林入林非任達懷抱良有託把臂愜同志痛飲戀狂藥修竹何蕭蕭微風籜已落故叢擢纎枝碧影墮杯勺盤桓不能去嘯詠或間作管絃非所好況乃靈鼉咢仰視飛鳥翔醉眼空寥廓契此考槃趣謝彼彯纓縛寄語道旁子沈冥與爾各謝夢連三首夢連字孟草長洲人有遺詩陳玉立云孟草詩使事必穩標韻必諧以金孝章云孟草逺絶時調詩自然為宗不失唐人風韻送友人遊天台細雨蘼蕪緑扁舟渡若邪春流飛竹箭暮靄隔桃花佞佛何妨酒遊仙莫問家儻憐人外癖分我赤城霞治平寺寓友人攜酒見訪吾友攜尊至開門黃葉深斷雲孤岫冷斜日半湖隂獨往無千古相期有寸心行行難以别明月在長林秋夜木葉始微脫庭空蔭薜蘿誰云秋氣慘我愛夜涼多林逗纎纎月雲浮淡淡河坐深人境寂新鴈一聲過何大成一首大成字君立常熟人抵夔州覔少陵草堂成都草堂今若何且向西瀼飽經過亂山不斷煙雨色匹馬時聽巴渝歌峽中長年布帆穩驛路官長油衣多吳趨老人真好事貪訪遺迹空蹉跎邵濓一首濓字茂齊常熟縣學生馮已蒼云邵君詩清曠玄淡雨終日雨如絲連山芳草碧庭際孤雲屯遙村暮煙積野渡行人稀圓沙一鷗白寂莫想晤言誰破蒼苔迹屠應韶一首應韶字韶甫秀水人有松吟草贈歌童弱質偏姚冶清歌意獨新未須聞别調梁上已飛塵李翹二首翹字時實松江華亭人有樵雲居稿感遇幽蘭出深谷氷雪揚芬芳夭桃得春風榮華耀朝陽萬物各有時盛衰詎可量君子重制行通塞夫何傷對此遲日嘉且進花前觴寓言松柏有蔦蘿生死共依附柔弱不自持垂垂百尺樹草木匪金石榮華寧久駐摧折非所期飄零更誰顧丘遂一首遂字叔遂嘉善人初為僧字凡可中年以口舌忤鄉里貴人反儒服補縣學生有丘叔遂詩草江上雜詩竹筏歸從栁外汀鸕鷀隊隊晚風腥漁師不避豆花雨翻脫蓑衣覆酒瓶吳拭三首拭字去塵休寧人有遺稿徐武子云去塵慷慨重然諾中年以結客傾其家晚栖吳市尋避兵虞山困厄死其詩自出機杼決難泯沒朱子蓉云去塵夙饒于資破産結客贈豫手製糜丸不啻沈圭對膠也客金陵遍題十寺廊壁七言如花雨巳過寒食後風箏又傍社壇斜蠻鄉有夢三千里閩海無書二十年半偈嵗深香積飯一畨春老木綿衣移家轉近寒山寺探篋惟餘秋水篇衣上露涼飄桕葉鬢邊霜重壓蘆花誦之神采溢目苦寒嚴霜摧百草北風何其涼我愁豈在躬憂此道路長忽忽行役中不復知景光凝氷屬仲冬萬物咸閉藏吾非寒號蟲乃思驕鳯凰躊躇三歎息落日照路旁無題和斗生二首海外雲生碧浪隂頳鱗蒼鴈總浮沈寥寥天漢雙星小寂寂梨花一院深貞玉有光還易見明珠無定杳難尋輕鸞欲繡愁無力除是靈藝七孔針巫山逺在暮雲中愁隔春燈一點紅莫道金刀難翦水須知紈扇也驚風化為蝴蝶飛才並除是鴛鴦睡不同最是遊絲無賴甚又牽春去過牆東沈章六首章字宗玉嘉興人國子監生有苧莊集詩話上舍為亡弟千里婦翁詩頗崛竒所居苧莊略彴相通環以水竹余嘗讀書其地今其二子皆登鬼録遺書莫可問矣示弟漣蜂則有蛹蠶則有績矧伊人兮胡不爾德一解昔我先人實懋厥功靡不夙夜克纘其宗二解伊余懷兮程是稼穡一經不遺以永朝夕三解朝斯夕斯日月言邁令聞或忒我心匪懈四解人亦有言聲類是求相彼蒼鷹氣化為鳩五解淵氷在前惕焉戾止繩墨在御敢以勗子六解淮隂侯祠淮水十斗泥半石行人入門三歎息王孫功髙天下疑赤龍雌雉俱慙德前有渭水後桐廬進則不足退有餘曷不歸釣城南魚靈谷寺看梅下馬看碑度孝陵山椒十里樹層層半開香氣清於水一路人家靜似僧春動粉鬚都化蝶夜寒花片欲成氷思憑一枕羅浮夢月白煙黃睡未能岱宗次吳秋圃師韻四十里程半日行下觀鄒魯井中耕樹從樵口標秦漢人與繩籃託死生澡髮不知何處雨曝衣猶及上方晴東風無力吹雲去抹斷齊州水一泓隋隄懷古邗溝新碧晚濤平楊栁曾遮殿腳行誰道雷塘歌吹歇月明重按玉簫聲天池寺竊栗猿雛戲法幢天池中劈石門雙深山不是無燈火解惜飛蛾夜觸窗邵德生二首德生字大生平湖人崇禎中儒學生有清聞軒稿夜度清逺峽枕上不見山但聞水聲駛自非山百尋水急那如此楓亭草樹隨方别楓亭故有楓故鄉烏臼樹霜色更深紅陸夀國一首夀國字靈長長洲縣學生夭卒鄉人私諡孝簡子有嶺雲集虎丘春步好鳥語芳樹春山逺近看攀崖振蘿策度塔跨雲鞍縞袖翔飛燕青箋賦木蘭雨餘客去後新月上欄干吳道約一首道約字博之一字亞侯桐城人縣學生有大易山房稿懷方子恆王孫别去草萋萋江麓殘煙送馬蹄我念故人腸斷絶小橋流水夕陽西沈嗣貞一首嗣貞字紀常秀水縣學生有荀草堂集談梁生云紀常諸體俱臻典雅秋夜適館聞衙鼓歸家聽寺鐘欲為僧苦寂未作吏先慵夜永蘭膏減秋深玉露濃此中忘去住城市有髙蹤李肇亨三首肇亨字會嘉嘉興人太僕日華子有寫山樓率圃夢餘諸草詩話吾鄉鮮巖壑之勝然園亭之參錯水木之明瑟舟楫之沿洄縱遊覽所如而不倦萬厯以來承平日久士大夫留意圖書討論藏弆以文會友對酒當歌鴛湖之集談梁生偕會嘉和之先後賦詩者三十三人事未百年而閭閻故老已莫能舉其姓氏玉杯錦席之地皆化為宿草荒煙惟李氏寫山一樓尚未椒飛粉落宛然靈光之在魯録珂雪之作不禁憮然秋興溪樓間眺望秋思滿林塘潦水茨菰爛西風䆉稏香晴光翻去鳥野色動寒螿問詢東籬菊還須後夜霜題宋人江泊圖愛見江邊樹蕭疏落照前逺峰分霽色小塢共寒煙鴈迹留沙渚猿聲到客船十年湖海夢今日倍依然西泠寓室露氣橫疏栁香風送晚荷不知湖面闊止覺四山多駱雲程二首雲程字天遊一名雨禾字稚孫嘉興人有廣禽言布穀脫却破袴衣著新莫著故新人紈綺舊荆布貴易交富易婦朝還朝暮還暮人生肯繫如匏瓠鳯皇節節足足雌鳴雄續不集于梧不集于竹栖棘斯危在笯則辱雄兮雌兮何德之衰兮談貞和一首貞和字誾仲嘉興人贈太僕卿昌言次子社集分賦得金谷日月長麗矚溪山餘素期别廬欣賞間更復賓主宜監軍曠髙懷祭酒淡塵思盤礴澗道上澗冽荇參差竹柏既峭倩藥草復繁滋觥飛罍交錯絃急管威夷迢迢錦步障晃晃珊瑚枝姬侍列雲屏倡舞喧相追豪侈極人目俱言此會稀席終方奏序興往各稱詩遺韻珍當年勝遊示來兹不負嵗寒約意氣歡足持談貞竑一首貞竑字立生貞和貞良之弟有清音閣詩草南屏歸艇遇雨望裏南宫潑墨山小窗殘燭放舟還從容畢竟輸漁父藕葉菱花泊淺灣秦徵蘭八首徵蘭字楚芳常熟儒學生徐大臨云近傳天啓宮詞百首乃琴川秦秀才辭而同里陳悰攘為巳作公然鏤板行之詩話德陵實録為黑頭爰立者所攫天啓四年七年事遂爾遺佚秦秀才宫詞捃托禁庭瑣語頗稱詳核第合而觀之嫌其述客魏居多而事關德陵者寡不無微憾耳天啓宫詞八首紅粉排班玉輦旁西園花栁踏春陽中宫侍從偏無幾窄袖髙鬟一樣妝自注張后性淡靜愛憎稍與衆異客氏教宫人效江南作廣袖低髻尤為后所厭薄春秋佳日駕幸西苑等處坤寧宫侍從多不踰三四十輩其妝束如圖畫所見古人像客氏往往目笑之石梁深處夜迷藏霧露溟濛護月光捉得御衣旋放手名花飛出袖中香自注乾清宫丹陛下有老虎洞不知所始洞背為御街洞中甃石成壁可通往來上嘗于月夕率內侍賭迷藏為戲潛避其內諸花香氣上所篤愛時采一二種貯襟袖間故聖駕數武外輒識之以芳芬襲人也內河環繞禁城邊疏鑿清瀾勝昔年好是南風吹薄暮藕花香拂白鷗眠自注神廟靜攝年久紫禁城內河壅淤不通德陵復令疏浚之春夏之交景物尤勝禽魚菱藕儼若江南聖主多能絶代姿罷朝常是運斤時裕妃笑指燈屏問雕到寒梅第幾枝自注裕妃未罹禍時宸眷獨寵上好雕鏤木器護燈小屏八幅手刻寒雀爭梅戲畀諸少璫令鬻之仍諭以御製之物價須一萬翌日如數奏進大恱琉璃波面浴鷗鳬艇子飛來似畫圖認著君王親蕩漿滿隄紅粉笑相呼自注上數偕中官泛葉舟于西苑手操篙櫓去來便捷美人睂黛月同彎侍駕登髙薄暮還共訝洛陽橋下曲年年聲繞兔兒山自注兔兒山即旋磨臺乙丑登髙聖駕臨幸鐘鼓司掌印官執板唱洛陽橋記攢睂黛鎖不開一闋次年復如之宫人知書者相顧疑怪非特於景物無取語意實近不祥也不期月而鼎湖龍逝矣風掠輕舟霧不開錦鱗吹裂綵鰭摧須臾一片歡聲動捧出真龍水面來自注乙丑端午駕幸西苑用綵繒飾小舟首尾為龍形上手持划具同少璫劉思源髙永夀蕩漾橋北怪風忽起雲霧四塞舟覆二璫淹死管事談敬匍匐赴救扶駕出水氷鴨銀苗院院同鵲橋衣卸巧山空晚涼供罷波羅蜜去看河燈萬點紅自注七夕節各宫立乞巧山子宫眷衣鵲橋補自初一起至十四止中元節食銀苗菜藕之嫩芽也氷鴨先一夕煮熟凝成膏者甜食房進供佛波羅蜜西苑作法事放河燈已上數條宫中舊例惟宫人內宫深夜相攜看河燈則辛酉後事也吳天泰二首天泰字謐生秀水人嵗貢生有星帶草堂集示族子人生各分定如面異黔晳讀書求仕宦運數杳莫測不如事田漁勤苦但食力我家本清門中葉浸流失相將習遊間遂乃離朴質流覽五服遙頗喜見諸姪水國采菱魚陸海種粳秫上可奉髙堂俯足寧家室少遊嘗有言款段與下澤鄉里稱善人庶幾念祖德題周仲吉畫雪色滿天地扁舟傍深谷危峰入層雲幽意動遐矚溪橋凍未澌老鶴立寒木吳麟玉一首麟玉字稚禎别號雪翁秀水縣學生有醉月聽溪二軒詩稿村居屏迹市㕓外煙村聊索居貧無乞米帖懶有絶交書松下近調鶴雨餘新種書更添數竿竹遮却往來車徐淮一首淮字愛竹嘉興縣學生有愛竹軒詩宿金粟寺昨嵗曾遊此莓牆墨尚新雨花長似粟觀海更無津下榻便行客烹茶費主人時查孝亷寓此瀆書年來稀戰伐鼉鼓但迎神鼓係孫權所留徐仲選一首仲選字華海一字鶴友海鹽人國子監生有鶴友詩稿詩話鶴友近體刻意學陸務觀水村照檻晴光眼未迷瘦藤斜影度橋西沙頭白鴨黃鵝睡籬畔瓜棚豆架低屋似魚船疏荻繞亭如僧笠稚松齊此鄉風景真堪戀只合攜瓶坐菜畦嚴紹宗一首紹宗字隨翁無錫人有鳩緣集新秋廷鳴移具小樓待月秋至杳無迹颯然風滿林倚樓羇客思呼盞故人心紅葉踈簾冷青蘋小院深月明今共賦心事兩浮沈曾元良一首元良字君山秀水人有煙波集秋栁俄驚搖落渭城邊悵望遙隄絶可憐病葉幾能經驟雨柔條猶自鎖寒煙從教歌院頻翻譜忍見郵亭更折鞭淒斷新霜板橋曲衰荷相伴曉風天髙秉蕖二首秉蕖字友葵松江華亭人縣學生有潤照堂詩湖隄舍館意未安遊覽力已猛披衣出芳原蒼翠周四屏琳宫千百尺嶻􅑖吞皓景蘭若非一居鱗次若萬井旋窺大佛寺却失龍象整其陽枕江濤其隂負修嶺步步異前蹤行行惜去境斷橋曾不斷石隄相與永緑栁何葳蕤間之桃與杏柔颸翦綺縠密葉含藻荇羣秀欣有託萬象紛然炳歎息蘇長公千載若俄頃江山不改舊風月誰為領撫景念往昔令人發深省淨慈寺維艄緑楊岸爰命理輕䇿從者四五人鈎衣防亂石南屏鬱岧嶤琳宫寄崒嵂柱礎錯互置梲栱向背出檻鳳威羽翔幢龍鱗甲拆法象有三身應真計五百伊昔夀禪師于此布法席言銓雖已繁圓鏡乃歸一我來祗樹下髣佛天竺國碧篠吐笙簧青松韻琴瑟口分茵陳飯手展貝多帙逆風發旃檀香氣何馝馞非無豪士豪為憚律僧律徙倚淡忘歸山空落紅日沈文輝一首文輝字履亨嘉興縣學生有瓜田遺稿西莊乍喜人煙别都無俗客喧漸能諳稼穡不復厭雞豚仄徑苔梅古疏籬竹屋存東塍近僧院清磬報黃昏繆師伋一首師伋字孟思嘉興人九日黃菊東籬下還逢九日開今朝尊酒盡無復白衣來周青士云調合顧玘徴一首玘徵字文玉嘉興縣學生有讀書臺稿感舊烏衣門巷舊遊非王謝堂前燕子稀有客有客莫遑處式微式微胡不歸乾坤萬里愁雲合風雨三秋落葉飛極目天涯誰與語釣篷思老一魚磯嚴焞二首焞字子尹常熟人有南虞小草詩話子尹詩律頗細如詠雪云竹上有聲如雨夜庭中無月亦明時令永嘉四靈見之定把臂入林也長相思長相思在夢中自君之出羅幃空窗前淅淅來朔風滿天霜雪鳴孤鴻楓林青兮關塞黑終然萬里魂難通長相思何時終初夏偕顧魏二子遊西關散步西郊任所之雨餘新緑倍濃時同遊此日還同散明日分飛各不知曹臣一首臣字野臣歙人有鬼訂集郝公琰墓下作郝之璽今已矣憶君棄我已三年一棺裹骨黃泉裡我欲呼君君不起慘柏悲松聲聒耳幾莖瘦草不成叢是我頻來淚澆死湯傳楹二首傳楹字子輔更字卿謀吳縣學生有湘中草倚樓天影一何淡空庭無雜喧暮山隨靄沒黃葉帶鴉翻無徑不秋草與鄰同小園偶然搔首處竟夕未能言渡口别一水盈盈便渺然夕陽搖落渡頭船長堤燈火人歸後回首西樓盡暮煙馮元仲一首元仲字次牧慈溪人有天益山房詩集題晏常侍祠嗚呼晏常侍石室存道統上像皇帝三其左周召孔宋之四大儒一一接其踵峩峩殿三楹像皆刻石奉四壁龕者五分標五經總古人所未聞此是我作俑猗彼何人斯卓哉儒者勇詩話都城西山𢎞教寺傳是正德間中貴晏忠所造寺前有澗過澗壘石為門題曰道統門石殿三楹上琢三皇五帝三王像左鑿周召孔孟諸聖賢右鑿周程張朱諸儒像别一石龕以藏五經殿外一石亭壁列鐘簴干戚錢鎛辨裳之屬左龍馬馬毛旋五十五數具一如河圖右龜龜甲四十五數具一如洛書東堂三楹壁列忠臣龍比以下孝子曾閔以下若干人按元史泰定二年中書省言養給軍民必藉地利世祖建大宣文𢎞教寺寺賜永業當時已號虛費今遺迹已無可考觀晏公祠石象禮器制度渾朴不類明時匠人所鑿且元於儒釋初無所分疑寺即宣文𢎞教之遺址晏忠特從而修飾之爾金華薑給事應甲詩云空山石祠堂落穆跨深壑肖像古聖賢髙下坐淵漢殿墀列龜龍如出自河洛煌煌先儒語所為忠孝作性理纍百卷題壁見大略厯覽感吾心人傳晏公鑿厥志在尼山髙邈得所託愧哉彼檀施釁血塗丹雘則竟以為常侍所鑿次牧亦沿其誤至云古人所未聞此是我作俑不知祠宇列聖賢像始於文翁踵於趙岐漢之遺碑若司隸校尉魯恭荆州刺史李剛從事掾武梁祠皆有刻石聖賢像非作俑比也丁元公一首元公字原躬嘉興布衣晚為僧號願菴詩話原躬負竒恆與俗齟齬書畫俱入逸品兼精籕篆詩亦不屑作庸熟語題畫木芙蓉吹遍鯉魚江岸風露條霜蕊一叢叢謝家池上秋容一作空闊十里長隄間白紅喻應益一首應益字叔虞新建人滕王閣飛閣千年勝迹留層巒逺水檻中收萋萋岸緑王孫草湛湛江平帝子洲煙樹尚含羅綺怨風濤不散管絃愁飄零莫縱登髙目門掩斜陽獨下樓馮夢龍一首夢龍字猶龍長洲人由貢生選授夀寧知縣有七樂齋稿詩話明府善為啓顔之辭間入打油之調雖不得為詩家然亦文苑之滑稽也冬日湖村即事蒹葭一望路三義遙認莊窩去路斜舟響小溪過蟹舍屋頽髙岸露牛車輕霜隄栁餘疏葉暖日村桃早放花平野蕭條聊極目逺天寒影散羣鴉明詩綜卷七十四
