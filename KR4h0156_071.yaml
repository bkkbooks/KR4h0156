body:
  text: 明詩綜卷七十一翰林院檢討朱彛尊編文震孟二首震孟字文起長洲人天啓壬戌賜進士第一授翰林修撰以言事鐫級崇禎初復原官歷中允諭德掌司經局右春坊進少詹事以禮部左侍郎兼東閣大學士卒諡文肅有藥圃詩稿陳皇士云文公詩不多作然不失臺閣氣象靜志居詩話文氏自溫州守以來纍葉風流儒雅為士林所推相國晚達早歸崇禎五十輔臣骨鯁稱首烏衣子姓名節相繼不愧清門是難能也詩頗平縟擬古一章纒綿婉約庶幾屈宋唐景之遺音乎擬古逺行江之陽兮有嶼江之隂兮有渚朝而風兮夕而雨望夫君兮渺何許春波兮悠悠日暮兮夷猶攬青桂兮為楫搴木蘭兮為舟恍含思兮凝睇乘清風兮逺遊逺遊兮上下載行兮載舍遵中流兮待君將寄心於逺者蔣德璟一首德璟字若椰晉江人天啓壬戌進士改庶吉士授編修歷侍講諭德庶子掌司經局纍官太子少保禮部尚書文淵閣大學士有敬日草至廣州聞黎捿志喜重開幕府試雕戈七哨功成獻凱歌借問凌煙誰第一漢家劒履賜蕭何方逢年一首逢年字書田遂安人天啓壬戌進士改庶吉士除編修纍官禮部尚書東閣大學士有雪滌齋集越來溪層臺築五年髙見三百里如何越兵來不知渡溪水馮元飈一首元飈字爾􅌢慈溪人天啓壬戌進士知澄海揭陽二縣入為戶科給事中歷官兵部尚書首善書院感舊作維貞皇帝神授符詔出明光徴大儒有臣元標首應詔誰並進者臣從吾一時諸儒相繼入王道蕩蕩民所趨貞皇雖逝嗣王少譬之日出時未晡諸儒可謂睹上治力崇正學開榛蕪請為天子建書院揭以首善天之衢漢唐宋代何足數升堂入室泗與洙當使亂臣賊子懼如陸有軌水有桴豈無贋鼎相錯列能由是路亦吾徒越嵗壬戌策進士臣飇蒙與諸臣俱二十為學志方壯晨起盥潄遵修塗少焉諸儒次第入鳴鐘擊鼓聲錞于衣冠肅對寂未語森若披古賢聖圖儒者寧盡濶世務憂天往往多訏謨乃知名教自足樂照耀萬古焉可誣彼譖人者亦太甚曰宋之敗由程朱封疆在今多事日裦衣博帶何其迂輔臣向髙為此懼手自伏疏陳青蒲誰為此言告陛下當付之吏法當誅天子寬仁置勿問忍見白日舞妖狐嗚呼諸儒死不恨宣尼栗主誠何辜乙丙之際不可説故老欲哭徒嗟吁丁卯八月聖人出讒者栗栗憂頭顱臣飇再入問書院門外細草翔啼烏聖人豈不重經術時危未暇陳蒼瑚竊見京師富梵室口語以唄拜以膜亦有髙閣祀天主談兵治厯喧齟壺獨使書院屏勿事臣飇敢復惜微軀卿雲縵縵天子都諸儒靈爽應未徂大道經天終有孚幸甚為念臣區區孫耳伯云京師首善之地琳宫梵宇鴟吻相望獨無學者敬業樂羣之地往時羅文恭徐文貞講學率借僧舍誠大闕事也天啓二年御史臺諸公構書院一所於宣武門內東墻下南皋少墟兩先生朝退公餘不通賔客不赴宴會輒入書院講學一時士風為之少變未幾逆璫用事郭允厚朱童蒙輩相繼論劾以講學為門戶及楊忠烈劾魏忠賢疏上黨禍大作善類一空而御史倪文煥遂奏請毁書院棄先師木主于路左左壁有記為葉公向髙文董公其昌書並碎焉書院既毁逆祠乃建矣詩話萬厯二十九年二月庚午朔天津河御用監少馬監堂進大西洋利瑪竇所貢土物時先太傅文恪公掌禮部尚書事疏言會典止有西洋瑣里國而無大西洋其真偽不可知又寄住二十年方行進貢與逺方慕義獻琛者不同且所貢天主天主母圖既屬不經而行李中有神仙骨夫既稱神仙自能翀舉安得遺骨此韓愈所云凶穢之餘不宜令入宫禁者也乞速勒歸國勿許潛居兩京與內監交往以致别生支節眩惑愚民疏進不報後其徒湯若望以其國中厯法徴大統之差徐宫保光啓篤信之會大時雍坊所建首善書院鄒忠介馮恭定講學之所董其役者周忠毅宗建吕工部克孝時先大父楚雄知府以任子除都察院照磨竹頭木屑實司其勞書院成葉文忠撰記董文敏書之先大父業遷官故未書名于石也兩公講學事在天啓二年既而御史倪文煥等詆為偽學疏略曰聚不三不四之人説不痛不癢之話作不深不淺之揖噉不冷不熱之餅是年碎其碑暴之門外毁先聖栗主焚經籍於堂中崇禎初文煥伏法院僅存宫保率若望等借院修厯署曰厯局久之西洋人踞其中更為天主堂至今不改矣馮公是詩毋沗詩史倪嘉善一首嘉善字迪之桐城人天啓壬戌進士改庶吉士授檢討遷司業歷中允諭德有媚筆泉集詩話崇禎己巳帝幸太學賜倪公坐講周易泰卦又嘗侍經筵講論語益者三友帝問孰為益孰為損對曰天子尚友在法堯舜而已帝為改容公太僕卿贈工部侍郎應眷之子太僕天啓中請留楊左尋削籍者也九日牢落家居久頻逢令節過秋聲聞鴈少霜意入林多幽思驚時換山遊奈雨何韋生髙卧穩黃菊許誰歌張有譽一首有譽字誰譽江隂人中萬厯已未會試天啓壬戌賜進士出身除南京戶部主事纍官戶部尚書加太子太保晚為僧居蘇州之靈巖俞無殊移居光福山同顧茂倫樵水訪之不值留贈一徑逶迤入升階眼膜開當忩羅洞壑平地儼樓臺山翠侵簷落花香拂案來扁舟同訪戴興盡尚徘徊倪嘉慶二首嘉慶字篤之江寧人天啓壬戌進士除戶部主事歷戶科給事中晚為僧名函潛又更名大然有靈潭集詩話倪公治賦之才崇禎戊辰在樞部上言國計入不敷出嵗額缺至二百三十餘萬何以支持其言瞭若指掌假令思陵此時聽公之言綢繆區畫則後此雖有水旱寇賊尚可緩於危亡而惜乎不見納也既而兵科給事中劉徽疏請裁驛遞有旨裁十之三省郵傳銀六十萬公獨昌言曰驛遞之説貧民不能自食者賴之裁之太過將鋌而走險此盜生之源也俄而李自成果以驛卒被裁走入髙迎祥隊中後遂以亡明朝野咸服公計慮之逺云獄中九日寄友人禁柝方嚴晝掩扉登髙作賦苦相違更無叢菊開籬落只有飛霜上客衣九月吟蟲猶夜泣五年征鴈失南歸山頭廷尉遙相望緊繫茰囊送夕暉驟雨雨驟泉聲急雲涼樹色濃不知何處寺忽送一聲鐘王錫衮二首錫衮字龍藻雲南右衛人天啓壬戌進士改庶吉士授檢討歷侍講南國子司業諭德庶子祭酒以吏部左侍郎兼翰林學士聖駕臨雍恭紀二首乍挹方諸水來湘泮水芹金樞淡華月玉露展蕭辰俎豆三千士都俞十九人公庭看萬舞未許羽衣陳朴學皋謨古昌言聖主聆硬黃摹獵碣淡墨捧名經胄子齊歡洽真儒足典型自今隆祀典長照簡編青詩話崇禎十四年八月太學當釋奠思陵有詔再臨辟雍於是罷遣閣臣及分獻官時能虎山真人張應京適在都疏請入監觀禮尚書蔣公德璟暨王公咸持不可駮回十七日王公奉遣祭夕月壇二鼓始詣國子監十八日卯初刻駕自長安左門出由崇文街至成賢街入廟門兩公導帝升階坐御幄內官持金瓶金甌金爐者六人天漸明行釋奠禮畢幸彛倫堂祭酒南居仁講書臯陶謨自天敘有典至敬哉有土司業羅大任講易咸卦尋命賜茶文班自衍聖公及閣部共一十九人武班三十八人分東西坐帝命禮臣將進士題名碑并石鼓悉摹拓進呈又諭閣臣周程張邵朱六子不當槩置先儒之列乃定議改稱先賢云是舉也蔣公紀之特詳今節録以證王公之作文安之一首安之字汝止夷陵人天啓壬戌進士改庶吉士授檢討遷南國子司業歷中允諭德詹事有鐵菴藳山居漫興一江煙雨理漁蓑筍笠長拋首自科薄醉久無中使促夜歸須憚灞陵訶雲連西塞回青嶂樹繞東流旋緑渦為傍赤磯依舊隱月明堅坐扣舷歌齊心孝一首心孝字君求桐城人天啓壬戌進士改庶吉士授編修詩話太史賦詩無多與女郎沙蘭英章文玉定情一物相貽拳拳叩叩宜其為情死也答女郎沙蘭英貽鴛鴦枕含情少婦倚銀釭繡罷鴛鴦日滿忩解得世間離别苦故將好鳥織成雙姚孫矩三首孫矩字心甫桐城人天啓壬戌進士知龍遊晉江二縣擢江西道御史謫上林典簿遷吏部主事歷郎中纍遷至尚寶卿有石嶺集久雨新霽喜殷氏兄弟邀飲閉門十日隂門外喧屐齒已聞前溪漲更見屬垣圮曜靈胡匿輝風雨橫如駛暮霞照東隅魚尾差可擬凌晨下簷楹邂逅逢之子相邀卧甕頭一斗飲未已醉翁意有在歌者聲且止車中漫紀二首茅店孤燈黯繩牀旅夢安不知一夜雪但覺五更寒際曉山山白因風樹樹殘憂時誰紀瑞默坐卷簾看初日照髙樹前山霧始開怒飇一以發寒氣轉相催野色遙難即羈愁莽欲來故人居不逺去去好銜杯喬可聘一首可聘字君徴一字聖任寶應人天啓壬戌進士除中書舍人選授河南道御史有醉陶集詩話崇禎丁丑侍御巡按浙江既入境屬吏伏謁道左公首詢先太傅第宅吏以鍾秀坊對旌蓋闐于藉袈之橋公自巷左舍車徒行百步入自門升階肅衣冠拜祠下復坦步出巷之右乃升車鼓吹導以行余總角時目擊其事又六年武陵唐公紹堯分守嘉湖道入境亦展謁先公祠則將及門而步入然禮容甚恭於時弟子敬其先師若是由今觀之正可綴入觚不觚録也苦雨雨喜及時好雲隂竟不開馬牛幾莫辨鷗鷺盡飛來茅濕痕多漏沙崩響易哀田園生意盡排悶強持杯黃宗昌一首宗昌字長倩即墨人天啓壬戌進士知雄縣調清苑選授山西道御史詩話三殿告成論功行賞長倩時官御史上言國家名器盡為閹寺收買腹心之助大行賔天在八月二十二日而殿工行賞在二十一日正彌留大漸之時何暇出詔此輩直偽官爾詔令指名長倩乃舉黃克纘霍維華吕純如等六十六人以對請盡行削除是亦勇於觸邪者已唐諺五角六張作事不成七夕結句蓋用此語七夕有懷危坐撫佳節蕭蕭但雨聲閨中兒女態天上别離情秋入玄蟬急年侵白髮生所嗟垂老意張角總無成吳振纓一首振纓字長組歸安人天啓壬戌進士除中書舍人考授廣東道御史有顛石齋詩集棲賢看梅萬樹惟一色半山堆白雲鳥啼村不夜香逺客先聞近寺松隂合橫枝澗影分誰家修竹裏簾外亦紛紛詩話詠物詩最難工而梅尤不易林君復雪後園林讒半樹水邊籬落忽橫枝此為絶唱矣他如疏影橫斜水清淺暗香浮動月黃昏僅易江為二字以竹桂為疏暗是妙於點染者餘則蘇子瞻竹外一枝斜更好髙季迪薄暝山家松樹下亦見映帶之工髙續古絶句云舍南舍北雪猶存山外斜陽不到門一夜冷香清入夢野梅千樹月明村可謂傳神好手朱希真詞橫枝清瘦只如無但空裏疏花數點李易安詞要來小酌便來休未必明朝風不起皆得此花之神若朱雍之梅詞黃晞顔之梅苑李龏之梅花衲釋明本之梅花百詠詩愈多而神愈逺矣侍御棲賢之作實獲我心何萬化一首萬化字宗元青浦人天啓壬戌進士授南京兵部主事歷禮部郎中升福建提學副使轉右參政終廣東按察使詩話宗元仕閩為制府畫䇿平劉香入楚同諸軍協力擒張普薇是亦開濟之才不徒以雕篆見長者贈别彩鷁銀燈此夜親相看莫惜酒杯頻明朝茅店風霜苦縱有盈觴不醉人金肇元一首肇元字木公一字司杓東陽人天啓壬戌進士除徽州推官入為工部主事調兵部轉員外出為江西參議進副使遷福建參政雨過鳳陽望祖陵濠右鍾靈地關河迥未窮江回雙闕北淮繞二陵東古驛荆榛雨髙原燕麥風遙瞻松柏路佳氣鬱青蔥蕭士瑋三首士瑋字伯玉泰和人中萬厯丙辰會試天啓壬戌賜同進士出身除行人歷吏部郎中有春浮園集趙韞退云先生詩以才慧勝出入宋元客愁不待秋風起思鄉念已生髮愁今夜白月好故園明孤客人千里荒城鼓二更停燈沽濁酒屈指數遊程春日送繆當時被謫南歸正好留連日翻為惜别人憐君愁對酒作客怕逢春芳草迷歸棹啼鶯傍逐臣東風如有意莫遣栁條新滁陽晚行禾黍斜陽道秋風匹馬行古原荒霧白野水暮雲平酒逐年偏減情因老更生不知今夜月何似故鄉明宋玫一首玫字文玉萊陽人天啓乙丑進士知永城杞二縣事選授吏科給事中厯太常少卿大理太僕卿轉工部右侍郎家居萊州城破被縛見殺閨思征人磧裏正思鄉八月看雲送鴈行生小不知門外路如何飛夢到沙場陸錫明一首錫明字幼輿平湖人天啓乙丑進士除工部主事厯員外郎出知常州府再知徽州府升江西提學副使白嶽太素宫天遣名山護紫虛芝泥曾到使臣車石幢隱見宫中線碧瓦參差帝者居封禪有書非漢畤榔梅何地不秦餘未須泛海尋靈藥水落花開自起豫郭紹儀二首紹儀字汾仲平湖人天啓乙丑進士除當塗知縣擢南京湖廣道御史有青蒲草遊仙詩少室垂三花盈盈秀菌閣我驅一卷石偃蹇卧溪壑輕隂斂素秋虛篁散紫籜自得枕中祕始知塵外樂容成采玉芝抱朴煉五藥矯首鴻天長此志欣有託同官李匡山成寶慈俱以疏劾輔臣被謫感而有作花莫盼武陵花酒莫飲烏程酒武陵花豔迷人目烏程酒甘誘人口李公骨鯁天下竒壯志屹立山勿移此時朝廷重鈎黨皂囊霜簡無遲疑成公凛凛氣雄發夜漏沉沉整袍笏漳江學士孤鳳鳴慘淡萇𢎞碧流血成公裂眥那肯平苦諫危辭三伏闕二公名義垂不朽二公既去儒林醜武陵花烏程酒花殘酒歇終何有君不見栁外東風動江樹輕薄紛紛飛作絮莫遣烏啼白下門豫亦飄然拂衣去李模三首模字子木太倉州人天啓乙丑進士除東莞知縣選授雲南道御史以憂歸補浙江道謫南國子典籍有碧幢集王無異云先生同不失已異不傷物合乎易所云知進退存亡而不失其正者鬼車謡鳳皇將九子雍鳴何秋秋羽蟲三百六賦性多令攸奈何有怪鳥一身伏九頭誰者齧其一灑血聲啁啾晦冥乃潛出四野風不休人號犬亦吠滅燭收兒䙔同心如禦冦懼其少溜留非徒祓不祥恨非陽鳥儔遺音雖遽已戾氣猶噓咻是關玄黃戰豈惟風雨憂吾聞多見可此類安足仇豺狐並晝嘯前鶬後鴰鶖勞勞服不氏枉矢焉能讎誓將叩閶闔桃茢殉九州寒夜有懷浩浩夜氣長霜風凛寒衾思來乍如髮繚繞不可尋清夢倐飛越山海何崇深孤月懸青松鶴子多竒音戶牖洞開豁中有緑綺琴南思畦丁忽報韭牙春對對河魨入饌新笑指蘆根堪續命不須子細祝厨人陸澄原一首澄原字嗣端平湖人天啓乙丑進士除工部主事歷員外郎謫順天府照磨遷大理寺副以兵部員外被察間住有芝房集詩話思陵初政職方首攻魏崔海內想其風采無難遽躋膴仕而乃厭薄門戶不屑附東林其封事略云有市恩修怨舉劾失平者雖東林亦可謂之小人不得以楊左為護身之符有特立獨行恪共厥職者雖非東林不失為君子不得以崔魏為陷人之穽又云臣寧寡援孤立為硜硜之小人決不依草附木為疑似之君子由是見嫉於東林拒之惟恐不力一官蹭蹬被察而歸放浪山水以詩酒自娛斯狂狷之流也詩亦不入鍾談流𣲖溪外短橋隱隱隔清溪溪外人家更向西行盡西溪人不見一林修竹畫眉啼葉紹袁一首紹表字仲韶吳江人天啓乙丑進士除武學教授轉國子助教遷工部主事至郎中有遷聊集甲申聞三月十九日之變衡門薜荔久侵尋自愧才非抱膝吟逝水總流千古恨夕陽空負百年心蒼生四海同仇切白髮三春憶主深七日誰人牆下哭一回北望一沾襟熊開元二首開元字玄年號魚山嘉魚人天啓乙丑進士除崇明知縣調吳江選授吏科給事中謫山西按察司檢校遷行人司副以言事廷杖削籍遣戍晚為僧名正志字檗菴居蘇州之華山有華山紀勝集詩話魚山欲劾宜興適思陵許奏事者於𢎞政門召對及入見宜興侍側因言軍事而出既而召見德政殿輔臣亦入乃言曰易傳有云君不密則失臣臣不密則失身臣所言願輔臣暫退思陵諭曰輔臣管密勿熊開元前所奏卿等皆與聞可以不退是日不敢盡言思陵命草疏入仍有茶果餅餌之賜逮疏入遂被收思陵怒且不測矣會薑公如農疏有皇上何所見而云然乎等語怒益甚兩公受杖之苦用刑之慘其不死者幸也爰書既上思陵一曰讒譖輔弼再曰讒譖隂狡三曰謗毁狡肆人皆疑思陵曲護宜興獨尹樞部宣子謂思陵時巳恚宜興命魚山具疏者度必列款欲據之便按問及見疏乃曰如此不痛不癢思兩邊做好人邪蓋實怒其不力參而反以誹謗大臣為罪非思陵本意也斯言得之宣子諱民興亦嘉魚人有菴園集詩務詭異多牛鬼蛇神語不足存鳥道卧獅石從來入蜀歎﨑嶇九折何如此路迂若是香林黑獅子向前翻擲肯踟蹰穿雲棧盡日凝雲谷口封倦還飛鳥亦迷蹤何如近借齋厨鉢鞭取耕煙白耳龍詩話華山在吳西偏相傳支道林銷夏之所劉宋時會稽守張裕舍宅為寺縣志稱南渡乾道中祕書監張廷傑占為别墅然范致能有華山寺詩云五湖西岸孤絶處栴檀大士來同住蒙泉新潔鑑泉明瀹茗羮藜甘似乳何須苦問蓮開未桂子菖花了今古三翁彩筆照青霞從此他山都不數我今間行作間客暫借雲忩解包具魂清骨冷不成眠徹曉跏趺聽粥鼓乾道中寺未嘗廢張氏别墅乃占斷間田爾魚山紀勝詩序中仍沿縣志附疏於此朱治􅍀三首治􅍀字子暇嘉興人天啓辛酉舉人選授肇慶通判詩話子暇宣勞戎務一星卒殞天南生為進表之劉琨死作思歸之溫序其詩不沿時習磊落嶔竒至賣宅一律悽惻纒綿菤葹之草心實傷已麥章誾贈硯麥君遺我硯采自羚羊峽鸜之鵒之眼審視碧光眨白如蕉葉萌黑比魚雲壓中有青青花瑣細不可掐山川藴精氣匠石變遺法雀斑幾點露鱔血兩邊夾外規直且平中池淺而狹注兹水一泓三宿尚容歃我來吏端州判牘日鈎押勞人何草草有時服韎韐頻年硯欲焚是物不我甲朝來三摩挲貯以琉璃匣他日抽簪回篷忩恣賞狎作詩崇禎年月塗嵗協洽胡將軍一青臨陳歌將軍用槍如擲梭馬上殺賊功最多馬頭一卒鷙鳥過往來拔刃誰敢何果下之馬山頭坡有時奪取紫橐駝將軍神勇孰同科除是漢代雙伏波我書露布盾鼻磨比田僧超壯士歌得家報知敝廬已賣歎之拮據經吾手書來已屬人一身猶長物四壁委微塵歌哭今無地琴尊别有鄰庭梅應為我望絶嶺南春楊文驄六首文驄字龍友貴陽人天啓辛酉舉人崇禎中知永嘉縣事歷官都御史有洵美堂集刑孟貞云洵美堂詩紆徐以導逺篤摯以達情引物連類廣博曼衍屢出靡涯而源流師法燦然可指史弱翁云龍友詩沉淡淵逺有正始之音遊太湖龍觜晚色淡將夕探竒出林藪大龍與小龍礪齒震澤口鱗而鬐鬛張㟏岈悉諸有落潮洗塗泥寒玉森户牖淘沙尋金書人各繫在肘吾欲窮其幽慮為鬼所守肅然袍笏侍下拜不敢茍豈知層雲根乃勝洞天九海上作水驛將三宿茅茨近百家舉鉏刪濕葦迎月伴荒衙燈下哀汀鴈潮頭漉浦蝦小民方疾走官稅莫紛拏宿木瀆竟日秋光冷維舟寄古村隔橋依榜火晚市辨方言水已通湖氣沙看露樹根館娃談往事歌舞夢中喧答陳司理卧子峻節山隂道魚書過婺州逺人驚異數髙論許同舟僻壤蘭為國荒城竹作樓自憐隨去住淮海亦曽留苦雨海國重隂合涼飈五月寒淋漓欹枕聽朝暮倚簾看問路空懸屐尋山欲墊冠獨憐黃鳥語終日自綿蠻夜過練瀆松風謖謖澗粼粼金鎖曽輝畫角新借問水犀三十萬何如君子六千人鄭龍采四首龍采字聖昭歸安人天啓辛酉舉人婺川知縣有髙密堂詩集詩話聖昭雅尚清狂與烏程丁永鑑同舉於鄉酒分詩情最相親昵丁有為山閣詩大都北里冶逰之作聖昭牽絲入黔謁楚撫何公騰蛟公欲留為監紀辭曰朝廷命某宰婺川不命參公軍事也及解組過楚何已殉難既歸祝髮入卞山不復與聞世事句如長江無六月驟雨不崇朝明月幾時上歸雲未得間花飛晴見雪竹密畫垂隂殘雪重重白歸鴉陳陳圗暗泉蒙澗草驚鳥落山花寺隨人意改身列上方間戌荒遲夜柝人定話歸潮非蹈襲者所及小雨復止小雨公然止車薪水一杯已經三伏盡更得幾時來鵲尾搖晴樹螢光上濕苔終宵仍不寐傾耳聽殘雷雪崖禪師向有法雲社約别後十年矣適晤在初溟涬二師於天聖講席出示社中諸作因題不作陶元亮攢眉為酒杯十年千里外二妙一時來聽法知三藏瞻雲識五臺何時入林去同看白蓮開方水檻漫作竹裏孤煙直溪流釣未歸豆花鋪地白絡緯應時啼半謝荷重發新紅葉漸微避人最宜逺或恐叩柴扉采松花美人采松花紛紛落黃雪花落松枝輕當風更搖曳張次仲七首次仲字元岵海寧人天啓辛酉舉人有待軒遺集詩話先生晚隱郊廛髙蠱上履二之節詩有真意不盡規橅古人月出微涼今夕好月出正當門岸幘微風至鈎簾清露繁客來宜卜夜吾醉孰留髠軟語勞紅袖頻催碧玉尊天闕東風吹大海日夜動孤城若木津難逮乘桴汛有程童三千徐市士五百田橫料得逢同調援琴移我情北固山登臨來北固俯視大江潯鐵甕人煙起焦山水氣深浮沉天設險來往客何心一塹分南北茫茫自古今寄陸真如草緑風翻戶河平水繞村放船隨逺近隱几度涼溫盆貼新荷葉忩依老樹根悠然觀化理清興與誰論屏迹蘇村漫題屋壁鹽官城北郭溪東草屋蕭蕭寒雨中瓜架豆棚新築圃長竿短笠老漁翁提攜小豎敲茶臼勞苦山僧理藥籠吾老自應耽伏枕人前那敢説冥鴻詠史匕首投銅柱金椎中副車吾謀適不遂天意復何如苔徑苔徑路欹危幽人自來去但聞啼鳥聲不識鳥啼處錢千秋一首千秋字真長海鹽人天啓辛酉舉人有青崖集過張王府基落日張王府春風麥秀齊誰知沼吳士依舊越來溪髙皇帝破吳師由湖州至錢嘉徴一首嘉徴字孚于海鹽人天啓辛酉順天鄉試以國子監生中副榜晚選授松溪知縣還自閩卒於里有松龕剩稿詩話孚于以秋試留國門首上書論魏忠賢十大罪自漢東京宋南渡諸太學生後久無此風節矣或勸其勿上孚于慷慨言曰虎狼食人徒手亦當搏之舉朝不言而草莽言之以為忠臣義士之倡雖死何憾自是言者相繼而起元惡乃除信豪傑之士也福州口號杜牧三生憶舊逰珠簾遮住一層樓此間真色無梳洗蕙箭開時插滿頭董守諭一首守諭字次公鄞縣人天啓甲子舉人有董次公集詩話次公於詩不屑寄人籬下然與風雅尚逺憶婁子柔與君隔山川邈然託素臆靜言想德容淵致若不測宛然河汾生論文篤悃愊使我飢渴懷如飽秋稼穡斯文儻我期願言求懿德鉏用登一首用登字百榖秀水人天啓甲子舉人小園初成陳仲醇過版築登登罷圖書處處遷茅柴過橋酒燈火到門船竹徙上畨雨荷開半兩錢醉吟無不可為我拂朋箋沈𢎞度一首𢎞度字公雅桐鄉人天啓甲子舉人有五願齋集容餘軒稿畏吟小草憶北園頗憶衡門下幽居有北園覆簷新竹嫩滿地刺梅繁好友時來過清琴每自援齊民有要術試驗老農言池顯方一首顯方字直夫同安人天啓甲子舉人西湖暮靄朝煙色轉濃微茫不辨是何峰堤花半上春人鬢湖水長留昨日容逐粒禽魚爭一隊同舟男女坐雙重南朝歌舞沉荒草愁聽黃昏兩岸鐘談元春二首元春字友夏景陵人天啓丁卯舉鄉試第一有談子詩歸張文寺云伯敬入中郎之室而思别出竒以其道易天下多見其不知量也友夏别出蹊徑特為雕刻要其才情不竒故失之纖學問不厚故失之陋性靈不貴故失之鬼風雅不遒故失之鄙一言以蔽之總之不讀書之病也詩話鍾談並起伯敬揚歷仕塗湖海之聲氣猶未廣藉友夏應和𣲖乃盛行詩歸既出紙貴一時正如摩登伽女之淫咒聞者皆為所攝正聲微茫蚓竅蠅鳴鏤肝鉥腎幾欲走入醋甕遁入蕅絲充其意不讀一卷書便可臻于作者此先文恪斥為亡國之音也桐鄉錢麟翔仲逺友于友夏恆言詩歸本非鍾談二子評選乃景陵諸生某假托為之鍾初見之怒將言于學使除其名既而家傳戶習遂不復言云讀曲歌交歡久貝齒有時落歡獨長在口得蜀中故人書蜀川兵定人靜老友天寒信來莫怪草堂深閉小橋邊有門開吳有涯一首有涯字茂申吳江人天啓丁卯舉人崇禎中署金壇教諭遷平陽知縣晚為僧隱鄧尉山送張向之之京口張子頭多白隆冬獨往還辭家一束被踏葉萬重山天末兵方擾雲中詩自刪攜笻更何處笑别向昭關張永禎一首永禎字仲燦順天人天啓丁卯舉人薊州道中匹馬漁陽道休嗟行路難霜林無定葉秋水有餘寒白雁飛初下明霞落未殘盤山凝望裏煙外出層巒胡振芳一首振芳字來子秀水人天啓丁卯舉人選授漢陽知縣歸里後碧漪坊黃氏要主童子孰自返牆東宅何曽竈突黔已無五斗米笑脫兩鞾襜旅夢安蕉鹿浮名上竹鮎從今兔園册一任老夫潛明詩綜卷七十一
